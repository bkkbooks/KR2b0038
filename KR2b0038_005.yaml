body:
  text: 凡例一綱目三編現在遵㫖照御批通覽輯覽改纂凡紀年系統諸大端及一切書法均應仰遵筆削定例永示凖繩至三編原本每年所列綱目不過數條而輯覽內條數較多于一代治忽所關更為明偹自應將輯覽所增一併敬謹添輯一查朱子綱目原有尹起莘發明劉友益書法及質實正誤附入各條綱目之下明代所修續綱目內亦有發明廣義諸條皆所以推闡大義考證故實足為本書羽翼而綱目三編內從前未經辦及現在御批通鑑輯覽俱仰稟睿裁大㫖微言昭揭星日臣等遵照改輯自應于特筆所在各倣照前例恭加發明詳悉闡繹庶衮鉞謹嚴大公至正之意更足昭示萬世至其間姓名爵里及輿地官制等類本文內未能該盡者並擬各加質實俾讀者開卷了然似于體例尤為周密一原書內如載福王之國撥給莊田四萬頃一條葉向髙集內實作二萬頃仰蒙聖明指示臣等因檢明史福王傳內詔賜莊田四萬頃句下有所司力爭常洵亦奏辭得減半之文因原書採摘未全紀載遂致失實又福王傳于此條下尚有奏乞張居正沒産沿江洲稅四川茶銀淮揚鹽引河南北齊楚間所至騷動等事必須連類並載足以見神宗寵溺失德之實而原書概行刋除亦不免過于簡略今擬各條紀事俱將明史紀傳逐一參訂考核異同如有舛漏即行詳確改正其或有情事未能詳盡者亦各酌量添修務令首尾該具核實無訛庶足永稱傳信一綱目三編內所有蒙古等人地官名之對音訛舛譯字鄙俚者均應倣照現辦遼金元國語解之例譯改一此次改編綱目折衷論定均仰荷聖訓詳明應請恭録前後諭㫖冠于簡編次列御製原序庶俾辦理原委次第秩然
