body:
  text: 起戊申元順帝至正二十八年明太祖洪武元年盡壬子明太祖洪武五年凡五年戊元順帝至正二十八年髙是嵗閏七月元申帝出奔以後為明太祖皇帝洪武元年春正月吳相國李善長等奉吳王朱元璋為皇帝國號明元璋字國瑞先世家沛徙句容再徙泗洲父世珍始徙濠之鍾離生四子元璋其季也母陳氏元天厯元年元璋生室中數有光比長姿貌雄傑志意廓然至正四年大飢疫時年十七父母兄繼殁無所依乃入皇覺寺為僧遊食諸州復還寺是時元政不綱盜四起方國珍起海上劉福通奉韓山童起潁州徐壽輝起蘄水衆各數萬他盜擁兵據地寇掠甚衆十二年定逺人郭子興等起兵濠州元璋謁之子興竒其貌留為親兵戰輒勝妻以所撫馬氏女明年收里中兵得七百人子興署為鎮撫既而與所部將徐達湯和費聚等南略定逺降驢牌寨民兵三千襲張知院于模澗山收其卒二萬道遇李善長與語大悅留掌書記遂東攻滁洲下之其年張士誠起髙郵十五年子興遣張天祐等攻拔和州命元璋統諸將守其地未子興卒福通立山童子林兒于亳檄子興子天敘為都元帥元璋及天祐為左右副元帥元璋不受然以其勢方盛可倚藉乃用龍鳯年號以令軍中常遇春來歸遂渡江拔牛渚下太平十六年取集慶路改為應天府會池州已為夀輝將所據士誠自淮東陷平江諸路轉掠浙西元璋慮壽輝士誠強江左浙右諸郡遂為所併於是命將取鎮江廣德尋自稱吳國公次第略定江左浙右士誠兵不得四出勢漸蹙而夀輝將陳友諒日強二十年友諒弒壽輝僭偽號盡有江西湖廣地欲東取應天元璋患友諒與士誠合設計令其故人康茂才紿友諒速來敗之于龍灣明年自將舟師征友諒敗之於江州克其城友諒奔武昌分徇南康建昌蘄黃廣濟皆下旋克撫州二十二年友諒偽丞相胡廷瑞以隆興降改為洪都府元帝遣使授元璋江西行省平章政事不授時林兒屢為元師所敗勢大窘二十三年士誠將吕珍圍林兒于安豐破之殺福通元璋馳救擊走珍以林兒歸居之滁州友諒大舉兵圍洪都元璋自將救之友諒撤圍逆戰于鄱陽湖屢敗中流矢死其將張定邊以友諒子理奔武昌二十四年元璋自立為吳王建百官復自將征理降之封為歸德侯又二年林兒卒遂以明年為吳元年建廟社宫室祭告山川蓋至正二十六年也二十七年九月徐達克平江執士誠十月命逹為大將軍常遇春副之率師二十五萬北定中原十一月湯和克慶元方國珍遁入海十二月國珍降李善長率百官勸進乃以是年春正月乙亥祀天地于南郊即皇帝位定國號曰明建元洪武質實天厯元文宗年號泰定帝致和元年九月文宗即位改為天厯元年至正元順帝年號龍鳯偽宗韓林兒年號沛縣秦置元屬濟州明屬徐州今屬徐州府句容漢縣元屬集慶路明屬應天府今屬江寧府泗州唐置元屬淮安路明屬鳯陽府今直𨽻州濠州隋置元改臨濠府尋復曰濠州明太祖吳元年復曰臨濠府洪武二年升為中都六年改中立府七年改鳯陽府今因之鍾離漢縣元濠州治明改臨淮縣屬鳯陽府今省皇覺寺在鳯陽府城北明曰龍興寺穎州後魏置元屬汝寧府明屬鳯陽府今升府蘄水唐縣元屬黃州路明屬黃州府定逺梁縣元屬濠州明屬鳯陽府今並因之橫澗山在定逺縣西北七十里滁州隋置元屬揚州路明直𨽻州髙郵漢縣宋軍元路尋改府明為州屬掦州府和州北齊置元屬廬州路明直𨽻州今皆因之亳州後周置元屬歸德府明屬鳯陽府今屬穎州府牛渚山北曰采石相去里許在當塗縣西北二十里太平宋州元路明改府今因之應天府元建康路文宗改集慶明初建都今江寧府池州唐置元路明改府平江隋蘇州宋平江軍尋升府元路明蘇州府鎮江宋府元路明初曰江淮府尋復曰鎮江府廣德晉縣宋置軍元路明初改府尋降直𨽻州今皆因之龍灣在上元縣西北十五里江州隋九江郡唐為江州明改九江府武昌三國吳郡元路明改府南康宋軍元路明改府建昌宋軍元路明初改肇昌府尋改建昌府蘄州後周置元路明初改府尋降州屬黃州府黃州隋置元路明初改府今皆因之廣濟唐縣明屬蘄州今屬黃州府撫州唐置元路明改府隆興漢豫章郡治南昌縣唐為洪州都督府南唐為南昌府宋改隆興府元路明改洪都府尋復為南昌府安豐隋夀州宋夀春府乾道四年改安豐軍元路明復為壽春府尋降夀州屬鳯陽府今皆因之鄱陽湖即彭蠡湖在南昌縣東北百五十里慶元唐明州宋升慶元府元路明初為明州府尋改寧波府今因之南郊在上元縣東北南山之陽方國珍黃巖人劉福通穎州人韓山童欒城人徐夀輝羅田人郭子興其先曹州人父郭公以日者術遊定逺遂家馬馬氏是為明孝慈髙皇后宿州人徐達字天德湯和字鼎臣皆濠人費聚字子英五河人李善長字百室定逺人張士誠泰州人張天祐郭子興婦弟常遇春字伯仁懷逺人陳友諒沔陽人胡廷瑞沔陽人後易名美康茂才字夀卿蘄州人陳理友諒次子發明是年閏七月元順帝出居北漢明始一統故通鑑輯覽用朱子綱目厯朝嬗代一嵗兩繫例于是年分為二卷以昭正統之公今作明紀綱目專敘明一代事迹故于嵗首即書洪武紀年仍列元至正於前雙行分注至洪武二年始大書標紀兩書體例雖有不同而史法之正則一也追尊祖考為皇帝髙祖考曰元皇帝廟號德祖曾祖考曰恆皇帝廟號懿祖祖考曰裕皇帝廟號熙祖考曰淳皇帝廟號仁祖妣皆皇后詔製太廟祭器如事生之儀質實髙祖伯六曽祖四九祖初一祖妣王氏太廟祭器如事生之儀按明史禮志宗廟祭器用銀以金塗之尋盡易以金酒壺盂􅊦每事皆八朱漆盤碗二百四十揮椸枕簟篋笥幃幔浴室皆具立妃馬氏為皇后世子標為皇太子后仁慈有智鑒好書史當吳漢接境戰爭無虛日后手緝甲士衣履佐軍嘗言治天下以不殺人為本帝善之既即位欲官后族謝曰爵祿私外家非法力辭而止乃追封后父馬公徐王修墓置廟標后長子也質實馬公逸其名后母鄭媪追封王夫人以李善長為左丞相徐達為右丞相善長冇智計習法家言䇿事多中帝嘗問曰四方戰鬬何時定乎對曰漢髙起布衣豁違大度知人善任不嗜殺人五載成帝業今元綱既紊天下土崩瓦解公濠産距沛不逺山川王氣公當受之法其所為天下不足定也帝稱善諸將來歸善長察其材言之帝復為帝布欵誠使皆得自安帝深倚之自將征討皆命居守轉調兵餉無乏嘗請定鹽茶法斟酌元制去其弊用益饒而民不困帝稱吳王時拜右相國吳元年封宣國公十月命百官禮儀俱尚左改左相國而徐達為右至是詔以左丞相兼太子少師達年二十二從帝與常遇春俱為軍鋒冠及為大將拔鎮江克常川寧國盡護諸將帝稱吳王為左相國克廬州平湖湘及淮南北拜大將軍征吳達與遇春約曰師入我營其左公營其右令將士曰掠民財毀民居離營二十里者死既破平江執士誠吳人安堵如故封信國公長于謀略所至不擾帝諭諸將御軍持重有紀律戰勝攻取得為將之體者莫如大將軍達北定中原齊地悉平至是為右丞相兼太子少傅質實鹽茶法按明史夲紀至正二十一年春二月甲申立鹽茶課食貨志初立鹽法置局設官二十取一引茶百斤輸錢二百常州隋置州寧國唐置軍廬州隋置州元皆為路明改府今皆因之庚寅彗星見彗星見於昴畢質實元史順帝本紀明史天文志同志又云三月辛卯彗星出昴北大陵天船間長八尺餘指文昌近五車四月己酉沒於五車北按彗見除舊布新之象征南將軍湯和克福建元平章陳友定死之先是至正二十六年秋八月元以友定為福建平章盡有八閩之地帝命和由明州海道取福州胡美由江西趨杉關而别遣使至延平招友定友定置酒會諸將殺使者􅅹血酒中與衆酌飲之誓以死守已聞杉關破急分軍為二以一軍守福而自帥一軍守延平和舟師扺福之五虎門蟻附登城守將遁參政尹克仁宣政使多爾瑪不屈死僉院拜特穆爾殺妻妾二女縱火自焚死時胡美已克建寧和遂進攻延平友定欲以持久困之諸將請出戰不許數請不已友定疑之殺蕭院判軍士多出降者會軍器局災成中炮聲震地明師知有變急攻之友定呼其屬與訣退入省堂仰藥死達嚕噶齊巴哈瑪勒副樞陳英輔皆自經死所部開門納明師舁友諒出水東門未絶也天大雷雨友定復蘇械送京師帝詰之友定厲聲曰國破家亡死爾尚何言遂併其子海殺之延平既下興化彰州皆望風附獨漳州路達嚕噶齊德爾密實自殺時稱閩有三忠謂友定拜特穆爾德爾密實也質實明州海道自府屬定海縣沿海而南即取福州之徑道福州唐置元路明府今因之杉關在邵武府光澤縣西北九十里西至江西建昌府百二十里延平元路明府今因之五虎門在福州府閩縣東百里海中五虎山下建寧宋府興化宋軍泉州漳州皆唐州元皆為路明改府今因之陳友定字安國福清人徙清流多爾瑪舊作朵耳麻拜特穆爾舊作柏帖木耳達嚕噶齊官名首領也舊作達魯花赤巴哈瑪勒舊作白哈麻德爾密室舊作迭里彌實今並改發明按明史友定頗任威福有跂扈心漳州守將良責之怒竟以兵誅良而陳瑞孫孔楷詹翰皆被殺威震八閩然事元未嘗失臣節嵗輸粟數十萬石海道遼逺至者嘗十三四順帝嘉之卒能父子死義其功罪尚不相掩若庫庫特穆爾忿其削爵見討遂據太原殺官吏致敵人得以乘釁長驅其貽悮宗邦實甚雖元亡後未嘗不以興復為志﨑嶇塞外百戰不屈明祖亦歎為天下竒男子不可得而臣然其始之叛迹非晚節所能蓋固未可與友定相提而諭矣元削庫庫特穆爾爵邑命圖嚕李思齊討之元至正二十五年庫庫特穆爾受詔平江淮檄關中邠國公李思齊等會師思齊故與庫庫特穆爾之父察罕特穆爾同起義兵齒位相埒得檄大怒曰吾與若父交若髮未燥敢檄我耶令一騎毋出關庫庫特穆爾遂入關攻思齊等相持經年數百戰未能決元帝詔令罷兵専事江淮庫庫特穆爾不奉詔遣其驍將摩該趨河中欲出不意搗鳯翔覆思齊巢穴行至衛輝軍變摩該遂不聼庫庫特穆爾節制疏列其罪狀上之朝初元年章博羅之亂太子阿裕實哩達喇出奔大原欲用唐肅宗靈武故事自立庫庫特穆爾不可及博囉伏誅奉太子還京師元后諭今以重兵衛入城脅元帝禪位又不從由是太子深銜之而元帝亦心忌其跋扈會摩該奏至元帝乃削庫庫特穆爾太傅中書左丞相今以河南王就食邑分所部兵𨽻諸將太子開大撫軍院于京師總制天下軍馬専備庫庫特穆爾庫庫特穆爾受詔退軍駐澤州其部將關保亦自拔歸于朝元帝知其勢孤詔思齊等東出關與摩該合攻之而今關保以兵戊太原庫庫特穆爾憤甚引兵據太原盡殺朝廷所置官吏於是元帝下詔悉奪其爵邑令圖嚕等四面進討質實河中後周蒲州唐改河中府元屬晉寧路明復曰蒲州屬平陽府本朝雍正三年升直𨽻州六年升府鳯翔唐郡尋改府金為鳯翔路冶置總管府元至元九年更為散府明及今因之衛輝周衛國地唐為衛州元置衛輝路明改府太原秦郡元冀寧路明改太原府今並因之澤州隋置元屬晉寧路明為直隸州保本朝雍正六年升府庫庫特穆爾本王姓小字保平章察罕特穆爾之甥養為子圖嚕陜西行省左丞相李思齊羅山人察罕特穆爾沈邱人庫庫特穆爾舊作擴廓帖木兒圖嚕舊作秃魯察罕特穆爾舊作察罕帖木兒摩該舊作貊髙博羅舊作孛羅阿裕實哩達剌舊作愛猷識里達臘今並改三月修女誡帝謂翰林學士朱升等曰治天下修身為本正家為先正家之道始於謹夫婦后雖母儀