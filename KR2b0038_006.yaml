縣金興州明初降縣屬太原府今因之二月免太平鎮江寧國田租帝如中都至自中都先是建圜丘方丘日月社稷山川壇于太廟于臨濠帝諭中書省臣曰臨濠為朕興王之地今置中都宜以傍近州縣通漕運者𨽻之甲戌幸中都壬午還京師質實明太祖實録議以夀邳徐宿潁息光六安信陽九州五河懷逺定逺中立蒙城霍邱英山宿遷睢寧碭山靈璧潁上太河固始光山豐沛蕭十八縣悉𨽻中都元平章劉益以遼東降益為元遼陽行省平章籍所部來降詔置遼東衛指揮使司以益為指揮同知未幾元平章洪保保馬彥翬等殺益右丞張良佐執彥翬殺之保保走依納克楚良佐權衛事以狀聞帝授良佐蓋州衛指揮僉事納克楚者元穆呼哩裔孫為太平萬户府帝拔太平獲之待之甚厚納克楚常鬱鬱不樂帝召語之曰人臣各為其主况爾有父母妻子乎乃縱之北還據金山屢為邊患帝數以書諭之皆不答帝以遼陽懸絶納克楚未靖八年乃設遼東都指揮使司統轄諸衛命葉旺馬雲往鎮之質實遼東秦郡元初置東京總管府後改遼陽路明洪武四年置定遼都衛八年改遼東都指揮使司今遼陽州屬奉天府蓋州唐置後改辰州金復元及明初因之洪武九年改衛今蓋平縣金山明史地里志遼東三萬衛西北有金山方輿紀要山東南距衛三百五十里考明三萬衛今為奉天府開原縣地金山蓋在縣邊門外葉旺六安人鎮遼陽以功與焉雲俱進都督僉事在邊十七年修城隍撫輯軍民懇田萬餘頃為永利馬雲合肥人嘉靖初以二人有功于遼命立祠祀之納克楚舊作納哈出穆呼里舊作木華黎今並改三月䇿試天下貢士賜吳伯宗等進士及第出身有差乙酉朔䇿貢士于奏天殿登第者百二十人賜吳伯宗等三名進士及第二甲十七人賜進士出身三甲百人賜同進士出身伯宗授禮部貟外郎髙麗入試者三人惟金濤登第質實此廷試始吳伯宗名名祐以字行金溪人誠意伯劉基致仕帝嘗手書問天象基條答甚悉而焚其草大要言霜雪之後必有陽春今國威已立宜濟以寬大至是賜歸老于鄉夏五月免江西浙江秋糧六月湯和至重慶明升降帝之遣傅友德也密諭之曰蜀人聞我師西伐必悉精鋭東守瞿塘北阻金牛若出不意直搗階文門户既隳腹心必潰兵貴神速患不勇耳友德疾馳至陕西集諸軍聲言出金牛而潛引兵趨陳倉攀援岩石晝夜行抵階州敗其將丁世珍克其城蜀人斷白龍江橋友德修橋以渡破五里關世珍復集兵據險都督同知汪興祖中飛矢石友德攻拔文州龍州進破綿州龍鑲衛指揮史鑑戰死將渡漢江會水漲伐木造戰艦欲以軍聲通瞿瑭乃削木為牌數千書克階文龍綿日月投漢水順流下蜀守者見之皆解體初夏人聞大軍伐蜀丞相戴夀等果率衆守瞿瑭及聞友德破階文搗江油始分兵援漢州以保成都未至友德已破其守將向大亨于漢州城下授師至友德迎擊大敗之遂拔漢州帝聞湯和駐兵大溪口欲俟水平進師詔趨之廖永忠聞命先發兵至瞿瑭阻鐵鎖橋不得進永忠密遣人百人持糗糧水筒舁小舟踰山度關出其上流蜀山多草木令將士皆衣青蓑衣魚貫入崖石間度已至率精鋭出墨葉渡夜五鼓分兩軍攻其水陸寨水軍皆以鐵裹船頭置火器而前黎明蜀人始覺盡鋭來拒永忠已破其陸寨將士舁舟出江者一時並發鼓譟而下下流之師亦擁舟急擊上下夾攻大破之遂入夔州明日和始至乃分道進永忠帥舟師直搗重慶升大懼羣下勸奔成都升母彭泣曰成都可到亦僅旦夕耳不如早降升乃請降永忠以湯和未至不受越五日和至升乃面縳銜璧輿櫬率官屬降于軍門和等承制撫慰之時丁世珍復陷文州指揮僉事朱顯忠千户王均諒死之友德調兵來援世珍遁質實金牛峽在漢中府寧羌州北三十里又自沔縣西南至四川劍州之大劍關口皆曰金牛道漢中入蜀要路也階州唐置宋明因之明屬鞏昌府今甘肅直𨽻州文州北周置即漢陰平道也元復置州明改縣屬階州今因之陳倉縣秦置唐改寶雞縣元明及今因之屬鳯陽府白龍江橋在階州南亦曰南橋造舟為梁跨白龍江上白龍江源出鞏昌府岷州經階州文縣與白水江合五里關在文縣北龍州西魏置元屬廣元路明初仍為龍江嘉靖中升龍安府今因之綿州隋置元初屬成都路後屬潼川路明屬成都府今因之漢江即雒水在漢州城南亦曰中水克龍文龍綿日月按明實録四月丙戌克階州己丑克文州辛丑克龍州明復克綿州江油蜀漢戍西魏置縣元併入龍州明復置江油縣屬劍江後屬龍安府今因之漢州唐置元屬成都路明屬成都府今因之大溪口在夔州府鐵鎖橋明史明升遣莫仁夀以鐵索橫斷瞿瑭峽口又遣戴夀吳友仁等助之北倚羊角山南倚寨城寨鑿兩崖石璧引鐵索為飛橋用板置炮以拒守夔州唐置元路明改府今因之丁世珍蜀平章事後率餘黨犯秦州不克走宿梓橦廟中為帳下小校所殺汪興祖巢縣人張德勝養子追封東勝侯戴夀與向大亨走保成都舁降亦降至夔峽皆鑿舟自沉死朱顯忠如臯人裏創力戰為亂兵所殺王均諒先受夏主命攝禮店元帥府同知來朝授文州副千户被執不屈磔死事聞鑑與顯忠均諒贈恤有差秋七月傅友德下成都四川平友德進圍成都戴夀等以象戰友德令強弩火器衝之身中流矢不退將士殊死戰突其象陳象反走躪藉死者甚衆遂降成都分兵徇州邑克保寧執吳友仁蜀地悉定質實保寧唐閬州後唐置保寧軍元為保寧府明及今因之發明太祖製平西蜀文盛稱友德功第一永忠次之師還授上賞而湯和以逼遛不進屢被責諭則平蜀之功主將不得專之也故和與友德並書于綱以方克勤知濟寧府克勤以治以德化不喜近名曰近名必立威立威必殃民吾不忍也時詔民墾荒閲三嵗乃稅吏不俟期徵民輒棄田去克勤嵗如期區田為九等以等徴發吏不得為姦立杜學數百區葺孔子廟堂延名士為師弟子繫籍者三千人盛夏郡將督民築城克勤曰民方耕奈何畚鍤重困之為請中書省得罷役會天會遂大澍濟寧人歌曰孰罷我役使君之力孰活我黍使君之兩使君勿去我民父母質實方克勤字去矜寧海人見明史循吏傳封明升為歸義侯升至京羣臣請降御殿受俘如孟昶降宋故事帝曰升幼弱事由臣下與昶異免其伏地待罪之儀授爵歸義侯賜居第八月免中都淮陽及泰滁無為田租質實淮安宋州元路明改府揚州隋置元路明改府秦州南唐置元屬揚州路明屬揚州府今皆因之振陕西飢九月庚戌朔日有食之設糧長帝以郡縣吏每額外徵收命有司料民田以田多者為糧長督其鄉賦稅糧萬石長副各一人輸以時至得召見語合輒蒙擢用其後官軍兑運法行糧長不復至京師在州里頗滋民害其孱弱者乃為勢豪所凌耽延逋角率鬻産以償遂至隕身喪家景泰中革未幾又復質實官軍兑運法詳見後宣德四年冬十一月免陕西河南被災田租西安鳯朔慶陽三府開封府屬祥符等五縣及睢州以早聞詔免其田稅質實祥符縣宋置明及今因之為開封府治睢州金置明及今因之屬歸德府十二月逮漢中知府費震尋釋之震以賢良徵為吉水知州寬惠得民擢知漢中府時陕西旱飢漢中尤甚鄉民聚為盜震發倉粟十餘萬石貸民盜聞皆來歸鄰境民亦爭赴震令占宅自為保伍籍之得數千家秋大熟悉還前貸至是以他事被逮帝曰良吏也釋之以為牧民者戒授寶鈔局提舉質實吉水元州明改縣屬吉安府今因之費震鄱陽人洪武十一年以提舉超拜户部侍郎尋進尚書出為湖廣布政使致仕壬子五年春正月置親王護衛指揮使司每王府設三護衛衛設左右前後中五所所千户二人百户十人質實明史職官志王府護衛指揮使司設官如京衛掌防禦非常護衛王邸有征調則聼命于朝遣翰林院待制王褘使雲南被執不屈死元梁王巴咱爾斡爾密鎮雲南大都不守順帝北去王嵗遣使自塞外達元帝行在執臣節如故蜀既平天下大定帝以雲南僻難進兵而王所遣漠北使者蘇成適為北平守將所獲乃命褘齎詔偕成往招諭王待褘以禮會元主遣托克托徴餉雲南知褘在王所疑王有他意脅以危語王不得已出褘見之托克托欲屈褘褘叱曰天既訖汝元命爝火餘燼敢與日月爭光耶我奉使逺來豈為汝屈遂自刎梁王具衣冠斂之質實明史職官志翰林院待制五品品雲南漢西南夷滇地唐開元二十六年册南詔蒙歸義為雲南王天寶九載遂有雲南之地僭號大蒙及元滅大理至正十三年立雲南行中書省洪武十三年置雲南承宣布政使司今因之王褘死事在洪武六年十二月建文中贈翰林學士諡文節正統中改諡忠文巴咱爾斡爾密元世祖第五子雲南王和克齊之裔巴咱爾斡爾密舊作把匝剌瓦爾密托克托舊作脫脫和克齊舊作忽哥赤今並改徙陳理明升于髙麗或告陳理明升有怨言帝曰童儒輩言語小過不足問也但為小人蠱惑將不能保始終宜處之逺方則隙無自生乃徙髙麗遣徐達李文忠馮勝等分道征庫庫特穆爾達軍敗績文忠勝敗元兵而還帝與諸將籌邊事徐逹曰王保保出沒邊境願勦絶之帝曰徐逺處絶漠以死自衛不如姑置之會諸將皆以達言為然帝乃命達為大將軍出雁門趨和林文忠為左副將軍出居庸趨應昌勝為征西將軍出金蘭趨甘肅三月達先遣都督藍玉敗庫庫特穆爾于圖拉河五月庫庫特穆爾與賀宗哲拒達于嶺北達軍敗死者數萬人七月湯和至斷頭山遇敵指揮同知章存道力戰死勝至蘭州遣副將軍傅友德前驅敗元兵于必里克圖山取西涼至永昌下甘州又敗元兵于和囉噶口勝復敗之索琳山拔蕭州下額齊納路次賓都山元岐王多爾濟巴勒遁去獲其平章昌嘉弩等二十七人友德復追至瓜沙州斬獲甚衆文忠至臚朐河留輜重疾馳至鄂爾坤河馬中流矢指揮李榮以所乘馬授文忠而自奪敵馬乘之文忠殊死戰遂破敵追奔至青海推牛饗士而還是役也宣寧侯曹良臣指揮使周顯張耀指揮同知常榮俱戰死獨勝全師而還以私匿駝馬故賞皆不行質實金州金置元以龕谷縣省入明改縣今因之屬蘭州府圖拉河源出喀爾喀鄂諾河西北圖埒爾吉嶺之西及嶺北小克特山斷頭山在明陽和衛邊外今陽城縣西北十里必里克圖山在涼州北塞外西涼宋置府元改州明改涼州衛今涼州府永昌元路明改府今永昌縣屬涼州府甘州西魏置元路州路明甘肅衛今甘州府和囉噶口在甘州西北索琳山在肅州北肅州唐置元路明洪武中改衛今直𨽻州額齊訥路漢居延故城元立總督府在甘州北一千五百里賓都山在肅州西塞外瓜州古允姓戎地唐置瓜州治晉昌元徙瓜州民于肅州明為沙州衛地今安西州沙州前涼置元沙州路明改衛今安西州燉煌縣元史地里志沙州去肅州千五百里臚朐河或曰即西平河也今名充魯倫河源出克特山南直河套北二千里許鄂爾坤河源出喀爾喀杭愛山南流數百里與圖拉河合青海方輿紀要云在和林境元為屯田所臚朐河西為圖拉河又西為鄂爾坤河又西北為青海藍玉定逺人存道章溢子平陽左衛指揮同知曹良臣追封安國公諡忠壯周顯合肥人驍騎左衛指揮使張泰泰州人神䇿衛指揮使常榮定逺人遇春再從弟振武衛指揮同知賜賜祭葬罕必里克圖山舊作别力篤山和囉噶口舊作虎剌口索琳山舊作掃林山額濟訥路舊作亦集乃路賓都山舊作别篤山多爾濟巴勒舊作朵兒只班昌嘉努舊作長加奴鄂爾坤河舊作阿魯渾河青海舊作稱海今並改以鄧愈為征南將軍討湖南廣西蠻先是三年四月慈利土司覃垕連搆諸洞蠻為冦楊璟討之垕遁入溪洞師還尋復出冦十月周德興討之拔溫陽關垕復遁至是帝以辰澧諸蠻常便化乃命愈往討以德興及吳良副之愈出澧州討散毛諸洞蠻德興出南寧討婪鳯安田諸州蠻良山出靖州討會同五潭溪古州蠻悉平之質實慈利縣置元升州明初復縣屬澧州今因之縣西有覃今垕塞溫陽關在慈利縣西辰州隋置元路改改府因之澧州隋置元路明初為府尋降州屬嶽州府今直𨽻州散毛洞元置散毛誓崖等處軍民宣慰司明置宣撫司屬施州衛今施南府來鳯縣婪鳯宋羈縻州元廢地在今田州東安州元來安路明廢地在今田州西田州唐置元路明為土府嘉靖七年降州今州屬思恩府靖州宋置元路明改府洪武九年降直𨽻州今因之會同縣宋置元明及今因之屬靖州五開元上黎平長官司屬思州明洪武十八年置五開衛屬湖廣永樂十一年改置黎平府屬貴州𢎞治十年徙府治衛南今為黎平府開泰縣地潭溪宋置長官司元明因之今司屬黎平府古州元古州八萬洞長官司明古州變夷長官司屬黎平府今有同知駐之按五開潭溪古州是時皆屬湖廣永樂後乃屬貴州二月安南陳叔明弒其主日熞自立遣使入貢却之叔明逼死日熞而自立懼討遣阮汝霖入貢以覘朝廷意主客部受表主事曾魯取副封白尚書詰使者曰前王日熞今何驟更名汝霖不敢隱具言其實帝曰島夷乃狡獪如是却其貢叔明復遣使謝罪乃命以前王印視事質實陳叔明日熞伯父按明史傳日熞以洪武四年冬被弒主客部禮部屬洪武初設六部部各四屬亦皆稱部至二九年各部增設所屬始俱定稱清吏司置茶馬司初令賣茶之地宣課司三十取一户部言陕西四川茶宜十取其一以易番馬從之于是諸産茶地設茶課司定稅額設茶馬司于秦洮河雅諸州自碉門黎雅抵朵甘烏斯藏行茶之地五千餘里西方諸部落無不以馬售者質實茶馬司明史職官志云茶馬司大使一人正九品副使一人從九品掌市馬之職宣課司職官志云稅課司大使一人從九品典稅事明初改在京官店為宣課司府州縣官店為通課司後改通課司為稅課司府曰司縣曰局陕西四川茶明太祖實録四年十二月户部言陕西漢中金州石泉漢隂平利西鄉諸處茶園四十五頃茶八十六萬餘株宜十取其一民所收茶官給直買之無户茶園令漢中府軍士薅採官八軍二每百斤為一引五年二月又言四川産巴茶凡四百七十七處茶户凡三百十五茶二百三十八萬餘株官十徴其一無户茶園令人薅種十取其八皆貯以易番馬明史食貨志云番人嗜乳酪不得茶則病故唐宋來行以茶易馬法明制尤密有官茶冇啇茶皆貯邊易馬茶課司見食貨志茶法中洮州後周制元屬鞏昌路明改洮州衛今為廳屬鞏昌府雅州隋置元屬鞏昌路番等處宣慰司明四川直𨽻州今升府黎州漢沈黎郡後周置黎州元屬土番等處宣慰司明改黎州長官司萬厯時降千户所今溪縣縣屬雅州府碉門黎雅五代置碉門黎雅安撫司元置碉門魚通黎雅長河西寧逺等處宣撫司及天全招討司明初合為天全六畨招討司碉門砒在雅州府榮經縣西北百五十里黎即黎州雅即雅州朵甘在四川徼外烏斯藏在雲南西徼外今西藏西畨諸部落明史西域傳云西番族種最多自陕西四川雲南西徼外皆是散處河湟洮岷間三月免京役民應天府言運輸官物悉役京民帝曰京民自聞國以來勞費倍于外郡今兵革漸息正當休養命免其役未幾又賜京民絹户一匹以禮部主事魏觀知蘇州府前守陳寧苛刻人呼陳烙鐵觀盡改所為明教化正風俗郡中翕然課績為天下最明年擢四川行省參政以部民乞留命還任初張士誠以蘇州舊治為宫遷府治于都水行司觀以其地湫溢還治舊基又濬錦帆涇興水利或譖觀既滅之基帝怒命御史亷其事遂被誅帝尋悔命歸葬觀與長洲髙啓善為移其家郡中帝見啓所作上梁文怒腰斬于市質實錦帆涇在蘇州府盤門故內相傳吳王錦帆以遊陳寧初名亮賜名寧茶陵人髙麗國王請遣子弟入國子學髙麗國王王顓遣密直同知洪師範鄭夢周等奉表賀平夏貢方物且請遣子弟入太學帝以涉海逺來離其父母令中書省諭其國王與羣下熟議母勉強夏四月振濟南萊州飢山東行省言濟南萊州連年旱潦傷禾麥民食草實樹皮帝即命于淮安運粟振之質實濟南漢國宋置府元改路明復府萊州隋置元仍為州明洪武九年升府今因之詔天下行鄉飲酒禮應天府及直𨽻各行省府州縣每嵗孟春孟冬有司與學官率士大夫老者行之于學校民間里社以百家為一會糧長或里長主之年最長者為正賓餘以齒序每季行之讀律今則以刑部所編申明戒諭書兼讀之武職于每月朔日以大都督府所編戒諭書率僚佐讀之六月定宫官女職帝以漢唐宫官過多宜防女寵法將來命禮部議定設六局一司凡官七十五人女史十八人質實六局尚宫尚儀尚服尚食尚寢尚功一司宫正俱正六品作鐵榜戒功臣帝以功臣不能檢下作鐵榜臚目凡九以申誡之質實一內外各指揮千户等不得私受公侯金帛衣物二公侯不得私役官軍三不得強占官民埸泊園冶四內外官軍不得于公侯門首侍立聼侯五管莊人等不得倚勢欺歐人民六屯佃奴僕及其親屬人等不得倚勢侵奪田産財物七不得私託門下影蔽差徭八公侯之私欺壓良善侵奪人者四犯與庶人同罪九不得受諸人投獻物業振山東飢免被災郡縣田租山東髙唐濮二州聊城堂邑朝城等縣飢敕吏部尚書趙莩堅往振之又命以米六萬六千餘石振萊州東昌飢蠲登萊二州逋租及今年夏麥是月又命振慶陽府安化合水環三縣飢自五月至秋七月鳯翔平涼雨雹二麥傷豆麥詔免其稅蘇州府崇明縣水詔以所報報未盡令盡報免之八月免通州海門縣被水田租質實髙唐州元置明及今因之屬東昌府濮州隋置明屬東昌府今屬曹州府聊城秦縣明為東昌府治堂邑縣隋置明屬東昌府今皆因之朝城縣唐置明屬濮州今屬曺州府東昌元路明改府今因之安化縣唐置明為慶陽府治合水縣唐分隋合水縣置環縣元環州明改縣俱屬慶陽府今皆因之崇明縣元州明降縣𢎞治中改屬太倉州今因之通州後周置明屬揚州府今直𨽻州海門縣後周本置元明屢徙年省入通州今改設海門廳朝康熙十一秋八月倭冦福寧明州衛指揮僉事張億討之中流矢卒倭入冦前後殺掠居民三百五十餘人焚燒廬舍千餘家劫官糧二百五十石張億率兵討之中流矢卒事聞遣使致祭恤其家質實福寧元升長溪縣為福寧州明初降縣後升直𨽻州今升府元兵侵雲內州同知黃里死之質實雲內州遼置金元因之明廢為衛拉特所據今烏喇特旗西北在歸化城西三百六十里冬十月免應天太平鎮江寧國廣德田租十一月納克楚侵遼東十二月詔百官奏事啓皇太子御定資治通鑑綱目三編卷一
