仍屬中書省大赦詔赦殊死以下恤從征將士家逋卒許首免輸賦道逺者官為轉運今嵗水旱災具以實開蠲其租賦鎮江旱甚悉免今年秋租及明年夏稅避亂民復業者給以荒田復三年闕里常遣官致祭有司以禮聘致賢士中書省量材授任興學校議刑從中典毋非時決重囚除書籍田器稅免逋徴蒙古色目人有才能者一體擢用鰥寡孤獨廢疾者存恤之民年七十以上復一子他利富當興革詔所不載者其以聞質實闕里在曲阜縣城中背洙面泗牆南北一百二十步東西六十步四門各有石闕北門去洙水百餘步御史中丞劉基致仕初帝北巡命李善長與基留守基剛嚴凡中書僚吏宦者宿衛有過必懲中書都事李彬姦事覺彬素附善長善長請緩其獄基不聼馳奏報可時方祈雨善長曰禱兩可殺人乎基曰殺李彬天必雨遂斬之故善長銜基及帝還與怨基者訴基専恣僇人壇壝下不敬會基有妻喪賜告歸質實劉基字伯溫青田人徴元故官至京師既至帝御奉天門召問元政得失馬翌對曰元有天下以寬得之亦以寬失之帝曰以寬得之則聞之矣以寬失之未之聞也元季君臣耽于逸樂馴至淪亡其失在縱弛實非寬也聖王之道寬而有制不以廢事為寬簡而有節不以慢易為簡施之失中則無弊矣帝如北京放元宫人遣內官往諭之曰宫人皆良家子幽閉深宫誠有可憫至即放遣適人勿使失所九月江西行省參政陶安卒安傳涉經史初帝取太平安迎謁陳王道命知黃州移饒州民懷其德吳元年初置翰林院首召安為學士徴諸儒議禮以為總裁官諸禮律多所裁定至是年四月授江西行省參政及卒追封姑孰郡公質實饒州隋置元路明府今因之陶安字主敬當塗人冬十月帝還南京十一月庚子冬至祀天于圜丘先是中書省臣李善長等撰進郊祀議請遵古制分祭天地于南北郊冬至則祀昊天上帝于圜丘以大明夜明辰太嵗從祀夏至則祀皇地祇于方丘以五嶽五鎮四賣從祀帝如其議行建圜丘于鍾山之陽方丘于鍾山之陰有司議配祀帝謙讓不許是月庚子冬至前期帝親為文告太廟及南郊竣事詣太廟告禮成還御奉天殿受賀翌日宴羣臣于奉天殿質實此明初分祭兩郊之始也郊祀議略言王者事天明事地察故冬至報天夏至報地所以順隂陽之義也祭天于南郊之圜丘祭地于北郊之方澤所以順陰陽之位也周禮大司樂冬日至禮天神夏日至禮地祇此三代之正禮自秦立四畤以祀白青黃赤四帝漢髙祖復增北畤祀黑帝至武帝有雍五畤及渭陽五帝甘泉太乙之祠而昊天上帝之祭則未嘗舉行魏晉以後宗鄭元者以為天有六名嵗凡九祭宗王肅者以為天體惟一安得有六一嵗二祭安得有九雖因革不同大抵多參二家之説自漢武用祠官寬舒議立后土祠于汾陰脽上禮如祀天而後世因于北郊外外仍祠后土又鄭元惑于緯書謂夏至于方丘之上祭昆崙之祇七月于泰折之壇祭神州之祗析而為二後世又因之一嵗二祭元始間王莽奏罷甘泉泰畤復長安南北郊以正月上辛若丁天子親合祀天地于南郊由漢厯唐千餘年間皆因之其親祀北郊者惟魏文帝周武帝隋髙祖唐元宗四帝而已宋元豐中議罷合祭紹聖政和間或分或合髙宗以後惟用合祭之禮元成宗始合祭天地五方帝已而立南郊専祀天泰定中又合祭文宗至順以後惟祀昊天上帝今當遵古制分祭天地于南北郊按唐書睿宗太極元年夏五月祭北郊是月改元延和八月元宗即位改元先天是親祭北郊者睿宗非元宗也此議偶誤耳鍾山一名蔣山在江寧府城東北遣使訪求賢才遣文原吉詹同魏觀吳輔道趙夀等分行天下訪求賢才質實文原吉官侍御史詹同字同文婺源人魏觀字杞山蒲圻人皆官起居注餘未詳以孔子五十六世孫希學襲封衍聖公希大世襲曲阜縣知縣先是元仁宗封孔思晦秩四品至順二年改三品帝謂禮部曰孔子萬世師後世秩止三品弗稱其授希學秩二品錫銀印置衍聖公官屬曰掌書典籍司樂知印奏差書寫各一人立孔顔孟三氏學教授學録學司各一人尼山洙泗二書院各山長一人復孔氏子孫及顔孟大宗子孫徭役其官屬皆衍聖公選舉質實曲阜少昊都周魯國漢魯縣隋改曲阜縣明屬兗州府今因之孔希學字士行思晦孫按通鑑後紀至正八年夏四月乙亥帝幸國子學賜衍聖公銀印升秩從二品豈一時特恩而非常制與召劉基還帝手詔敘基勳伐及彭蠡同舟之難曰今天下一家爾當疾至輔成治功庶不負昔者多難之相與既至賜賚甚厚質實彭蠡同舟之難至正二十三年秋七月太祖與陳友諒大戰鄱陽湖日數十接基侍側忽躍起大呼趨更舟倉卒徙别舸未定飛炮擊舊所御舟立碎建大本堂延儒臣教授太子諸王上時臨幸評論古今嘗御文樓太子侍問近與儒臣講何史對曰漢七國事問曲直安在對曰曲在七國上曰此講官一偏之説景帝為太子時以博局殺吳世子及為帝又輕聼鼂錯黜削諸侯七國之變實由于此若為諸子講此則當言藩王當上尊天子毋撓王室公法如此則為太子者知牧睦九族隆親親之恩為諸子者知夾輔王室盡君臣之義矣十二月徐達克太原元庫庫特穆爾走甘肅山西平達既定元都進取山西常遇春先下保定中山真定真定達嚕噶齊濟農實克章聞元都破朝服登城西崖墜死馮勝湯和下懷慶度太行取澤潞庫庫特穆爾遣將來禦戰于韓店楊璟大敗會元帝自開平命庫庫特穆爾復大都庫庫特穆爾乃引兵出鴈門由居庸以攻北平達聞之謂諸將曰庫庫特穆爾逺出太原必虛北平有孫都督足以禦之今乘敵不備直搗太原所謂批亢搗虛者也彼若還救進退失據必成擒矣諸將皆曰善乃率師趨太原庫庫特穆爾至保安聞之果還救太原遇春謀于達曰我騎兵雖集步卒未至驟與戰必多殺傷若夜襲