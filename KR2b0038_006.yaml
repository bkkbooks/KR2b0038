率庶人終畝是日宴勞百官耆老于壇所質實上元縣唐置在今江寧府治東北江寧縣惰置在府治西南俱附郭三月徐達克奉天常遇春克鳯翔元將李思齊據鳳翔張思道孔興圖魯卜等駐鹿臺以衛奉元徐達兵入關思道遁去郭子興將輕騎直搗奉元守將棄城走御史桑噶實哩與妻子俱投崖死郎中恩克仰藥死檢校阿實克布哈自經死三原尹朱春謂其妻曰吾當以死報國妻曰君能盡忠妾豈不能殉節俱投繯死之遂改奉元路為西安府時關中飢詔户賑米三石民大悅遇春兵至鳯翔思齊奔臨洮質實奉元元初曰安西路皇慶初改奉元路今改西安府鹿臺即鹿苑原在西安府髙陵縣西南三十里寰宇記上有鹿臺祠禱兩輒應臨洮西魏郡金改府元明因之今改狄道州郭子興一名興濠人官都督僉事與滁陽王同姓名圖魯卜舊作脫列伯桑噶實哩舊作桑哥失里恩克舊作王可阿實克布哈舊作阿失不花今並改夏四月命博士孔克仁授諸子經功臣子弟並令入學質實孔克仁句容人馮勝徇臨洮李思齊降時張思道弟良臣守慶陽徐達會諸將議所向皆曰張思道之才不如李思齊而慶陽易于臨洮請先慶陽達曰不然慶陽城險兵精猝未易拔臨洮西控羌戎北界河湟得之其人足備戰鬬物産足佐軍儲蹙以大軍思齊不西走則東手就降矣臨洮既克于旁郡何有遂度隴克秦州下伏羌寧逺入鞏昌遣馮勝逼臨洮思齊果束手不初思齊在鳯翔帝以書諭之且言誠能審去就當以漢待竇融之禮相報思齊得書欲降其養子趙琦本狄道人紿思齊奔吐番思齊信之遂奔臨洮琦私竊實貨婦女逃匿山谷問思齊窮威遂降琦尋亦來歸思齊至京帝深慰之授江西行省左丞不之官久之遣往招諭庫庫特穆爾至則待以禮尋使騎士送之還至塞下辭曰主帥有命請留一物為别思齊曰吾逺來無所齊騎士曰願得公一臂思齊知不能免遂斷與之還未幾卒質實慶陽古義渠國宋府元明及今因之隴坂在隴州西北六十里秦州魏州明直𨽻州今因之伏羌唐縣寧逺宋寨改縣金廢元復明及今縣皆屬鞏昌府鞏昌秦隴西郡元府改路明改府今因之狄遒漢縣元明縣為臨洮府治今改州屬蘭州府吐番夲西羌屬漢發羌南掠秃髮烏孤之後姓勃窣野都邏些城唐貞觀八年始通中國元置吐畨宣慰司于河州又于四川徼外置烏斯藏明置西畨烏斯藏朵甘衛指揮揮使司今西藏地趙琦世為元土官時呼為趙脫兒五月甲午朔日有食之癸卯夏至祀地于方丘羣臣固請配祀帝曰俟慶陽平議之八月慶陽平十一月冬至羣臣復固請乃奉皇考仁祖淳皇帝配天于圜丘明年祀方丘亦如之御史中丞章溢卒溢初應聘與劉基葉琛宋濓同至應天帝勞之曰我為天下屈四先生今天下紛紛何時定矣溢對曰天道無常惟德是輔惟不嗜殺人者能一之耳浙東設按察使以溢為僉事督饋餉平諸冦數有功帝即位與劉基並拜御史中丞時廷臣伺帝意多尚嚴苛溢獨存大體不以摶擊為能李文忠之征閩也溢子存道以所部鄉兵萬五千人從閩平詔以所部從海道北征溢奏曰兵已入閩者俾還鄉里昔嘗叛逆之民藉為軍使北上一舉而思威著矣帝喜曰非先生一行無能辦者溢行至處州遭母喪乞守制不許鄉兵既集再乞終制許之哀毀卒帝痛惜親文文祭之質實處州隋州明府今因之章溢字三益龍泉人葉琛字景洲麗水人六月常遇春克開平元帝奔和林遇春下鳯翔詔還備北平以李文忠副之帥步騎九萬敗元將江文清于錦州敗伊蘇于全寧進攻大興州分千騎為八伏守將夜遁盡擒之遂拔開平元帝北走追奔數百里獲其宗王齊克慎平章鼎住等斬之凡得將士萬人車萬輛馬三千匹牛五萬頭薊北悉平質實和林在今喀爾喀西部杭愛山東元太祖初都此後置和寧路綿州遼州元屬大寧路明置廣寧中屯左屯二衛今錦州府治錦縣全寧元置全寧路明廢故城在今喀爾沁故大寧城西北大興州即興州金末嘗寄治利民鎮俗呼為小興州故名此為大興州距古北口可三日程在今熱河界內齊克慎舊作慶生今改封陳日煃為安南國王日煃遣使貢方物因請封爵詔翰林侍讀學士張以寧等使其國封日煃為安南國王賜以駝紐塗金銀印心寧等以十月至安南界而日煃先以五月卒其姪日熞嗣立迎請詔印以寧不與諭日熞請命于朝以寧駐安南俟命質實宋大宗祥符三年交趾郡王黎至忠為其臣閩人李公藴所篡八傳嗣絶傳其壻陳日煚日煃日煚之元孫也張以寧字志道古田人秋七月副將軍鄂國公常遇春卒于軍詔李文忠領其衆遇春師還次栁河川暴疾卒年四十遇春沉鷙果敢善撫士卒每戰出則當先退則殿後未嘗敗北采石之役舟距磯三丈餘遇春奮戈直前敵接其戈乘勢登遂拔之鏖戰康郎山殪陳友諒克姑蘇縳張士誠功最著自言能將十萬衆橫行天下軍中呼常十萬長于大將軍達二崴其從征伐聼約束惟謹及其自將善以少為衆一時名將稱徐常喪歸帝用宋太宗喪趙普故事臨于龍江追封開平王諡忠武質實栁河川在宣化府龍門縣西康郎山在饒州府餘干縣西北八十里翻陽湖之南崖也龍江關名在今江寧縣西門外八月元兵攻大同李文忠擊敗之文忠受詔會徐達攻慶陽行次太原聞大同圍急謂左丞趙庸曰閫外之事苟利于國専之可也遂出鴈門敗元遊兵于馬邑擒其平章劉特穆爾進至白楊門天雨雪已駐營文忠引數騎入山察視疑有伏遽今移前五里阻水自固元兵果乘夜來劫營忠令堅璧不動質明敵大至以二營委之殊死戰度敵疲分分軍為左右翼身當前鋒畬擊大破之擒其將國魯卜俘戮萬餘人窮追至東勝州孟克倉而還先是元帝北走屯哈里泊今圖魯卜孔興以重兵攻大同欲圖恢復至是圖魯卜既被擒孔興走綏德其部將斬之來降元帝知事無濟不復南向矣質實馬邑秦縣元明屬朔州今屬朔平府白楊門在馬邑縣北東勝州遼置金元因之明初改東勝左右二衛後廢故城在今歸化城西南一百四十五里湖灘河朔渡口土名托克托城孟克倉在大同府邊外綏德金州元因之明屬延安府今直𨽻州趙庸廬州人劉特穆爾舊作劉帖木孟克倉舊作莽哥倉哈里泊舊作蓋里泊今並改定內侍官制諭吏部曰內臣但備使令無多人顧謂侍臣曰此曺善者千百中不一二以為耳目即耳目蔽以為心腹即腹心病馭之之道當使畏法勿令有功畏法則檢束有功則驕恣矣質實明太祖實録定置內使監奉御六十人尚寶一人尚冠七人尚衣十人尚佩九人尚履八人尚藥七人紀事二人執膳四人司脯二人司香四人太廟司香四人涓潔二人置尚酒尚醋尚麵尚染四局局正一人副二人置御馬御用二司司正一人副二人內府庫大使一人副使二人內倉監令一人丞二人置東宫典璽典膳典翰典服典藥典乘兵六局局郎一人丞一人置門官午門東華門西華門元武門奉天門左右順門左右紅門皇宫門坤寧門宫左門宫右門及東宫門官東和門東宫後門宫左門宫右門各設門正一人副一人封王顓為髙麗國王顓遣使朝貢且請封爵命符璽郎偰斯賫詔及金印往封之質實髙麗漢以前曰朝鮮漢末扶餘人髙氏據其地改號髙麗又曰髙句驪居平壤即樂浪也後唐時王建代髙氏徙居松嶽曰東京偰斯溧陽人徐達克慶陽擒張良臣斬之陕西平達自臨洮下蘭州襲走元豫王盡收其部落輜重還出蕭關克平涼張思道懼使其弟良臣守慶陽而自奔寧夏與其驍將金牌張俱為庫庫特穆爾所執良臣以慶陽降達遣莭顯受之良臣先出迎尋叛襲傷顯良臣之降也捷聞帝戒曰曰張思道兄弟多譎勿墮其計中良臣果叛達督兵圍之良臣求援于庫庫特穆爾庫庫特穆爾遣將攻原州陷涇陽為慶陽聲援達遣馮勝扼驛馬關敗其將哈扎爾等良臣撓勇軍中呼小平章養子七人皆敗戰軍中語曰不怕金惟怕七條槍良臣自以慶陽城髙險上有井泉可據守又倚思道庫庫特穆爾為聲援賀宗哲哈哲爾為羽翼姚暉格斡為爪牙故降而復叛及被圍猶日開門出汲馳聘城下達進營逼其四門良臣數出戰不利求援寧夏者又悉被穫糧乏絶至煮人汁丸泥咽之將士相繼開門降達勒兵自北門入良臣父子俱投井引出斬之時元賀宗哲攻鳯翔指揮使金興旺與知府周煥嬰城守敵編荆為大箕形如半舫五人負之攻城矢石不能入投藁焚之輒揚起乃置鉤稿中擲著其隙火遂熾敵棄箕走復為地道薄城攻不已會百户王輅收臨洮降卒還入城共守敵拔營去衆欲追之輅曰未敗而還誘我也偵之至五果坡伏果發還師復圍城衆欲走興旺叱曰天子以城畀我豈可去耶以輅所將皆新附乃括城中資令曰敵退當大犒新兵新兵喜協力固守持十五日宗哲聞慶陽下引去尋掠蘭州達遣馮勝率騎往擊宗哲渡河遁勝乃引還質實蘭州隋州宋復置金元明因之今升府蕭關在平涼府華亭縣西北百四十里平涼金府元明及今因之寧夏元路明改府尋改衛今仍府原州後魏州元復置尋改開成府並置開成縣後又改府為州明洪武中省州入開成縣孝宗十五年改固原縣屬平涼府今因之涇陽漢縣故城在平涼府西南非西安府屬之涇陽也驛馬關在慶陽府安化縣西南九十里五里坡在鳯翔縣西哈扎爾舊作韓扎兒格斡舊作葛八今並改修禮書詔舉素志髙潔博通古今綀達時宜之士年四十以上者禮送至京于是儒士徐一夔梁寅等與曾魯同纂修明年書成名大明集禮質實徐一夔字大章天台人梁寅字孟敬新喻人九月置中都以臨濠為中都營城郭如京師京師制帝召諸老臣問以建都之地或言關中險固或言洛陽天下中汴梁為宋舊京或又言北平故元宫室就之可省民力帝曰所言皆善惟時有不同耳長安洛陽汴梁實周秦漢魏唐宋故都但平定之初民未蘇息若建都于彼供給力役悉資江南重勞其民若就北平宫室亦不無更作建業長江天塹龍蟠虎踞足以建國臨濠前江後淮有水可特有水可漕朕欲建為中都何如羣臣皆稱善遂營之質實長安漢縣元屬奉元路明屬西安府洛陽周下都漢置洛陽縣元屬河南路明屬河南府今皆因之建業孫吳都改秣陵曰建業今江寧府發明帝王之興以德而地形亦與焉明祖起于濠泗則臨濠其豐沛南陽也建都應天以江淮為根本而守江必先守淮鍾離據淮之中定為中都亦一時因地制宜之意然天下形勢居北極而拱四方據髙屋而建領水冀北為上關中次之是以成祖遷都燕京纍世蒙業彼江左偏安之地汴洛四達之衝曷足以較優劣哉冬十月詔天下府州縣皆立學府學設教授一員訓導四員生員四十人州學設學正一員訓導三員生員三十人縣學設教諭一員訓導二員生員二十人十二月封阿答阿者為占城國王阿答阿者奉表貢象虎方物時安南與占城搆兵帝既遣使諭解又命中書省管勾甘桓等賫印詔往封之質實占城周越裳地秦林邑漢象林縣後漢末區連始稱林邑王唐時或稱占不勞或稱占婆王所居曰占城至德後改國號曰環迄周宋遂號占城元庫庫特穆爾侵蘭州指揮于光死之庫庫特穆爾偵知徐達軍還率兵掩至蘭州指揮張溫固守敵圍城數重鷹揚指揮于光守鞏昌將兵來援至馬蘭灘猝與敵遇力戰敗被執使呼城內出降光大呼曰我不幸被執公等堅守大軍旦夕至矣敵怒批其頰遂遇害城中聞光言守益固庫庫特特爾引去質實馬蘭灘在蘭州東大河南岸于光字大用都昌人死時年四十三命配享功臣廟庚戌三年春正月命徐達李文忠分道北伐時元帝尚在近塞帝再致書不報而庫庫特穆爾為西北邊患帝以達為大將軍文忠及馮勝鄧愈湯和副之分二道出兵達自潼關出西道搗定西取庫庫特穆爾文忠自居庸出東道絶大漢追元帝二月文忠至興和降其守將進兵察罕諾爾擒元平章珠占五月次駱駝山走平章沙布鼎次開平降平章沙哈等質實定西元州明改安定縣屬鞏昌府今因之興和遼金撫州元為興和路明廢故城在今張家口外鑲黃旗牧厰西南察罕諾爾即白海子在大青山之北駱駝山在張家口外鑲黃旗察哈爾東南作察罕諾爾舊作察罕腦兒沙布鼎舊沙不丁沙達哈舊作上都罕今並改吏部請謫有罪于儋崖不許帝曰前代謂儋崖為化外以處罪人今天下一家若有風俗未淳宜更釋良吏治之豈宜居罪人耶質實儋耳漢郡唐置儋州宋元曰南寧軍明仍為儋州珠崖漢郡隨置崖州宋元曰吉陽軍明仍為崖州今皆因之屬瓊州府振西安鳯翔飢先是張李搆兵西安諸府旱粟麥不登民多飢死二年冬詔有司正月二月户給米一石至是耆民宋升等來言户部奏請運粟濟之帝曰民旦暮待餔若待運粟死者多矣即命户部主事李亨馳驛往西安鳯翔振之户加粟一石二月追封郭子興為滁陽王立廟滁州祀之妻張氏為王夫人以其三子從祀質實三子從祀按明史郭子興傳子興長子前戰死次天敘天爵俱仕偽宋被殺子興後遂絶有一女小張夫人出者事太祖為惠妃生蜀谷代三王按通鑑後編考異辨證曰滁陽夫人張氏次夫人亦張氏據張來儀廟碑初勸滁陽館髙帝于二室者次夫人也免應天等府州及河南山東北平田租詔曰成武功者必資民力各郡邑供給有先後豐歉有不同凋弊之餘未能蘇息其蠲應天鎮江徽州寧國池州太平廬州廣信饒州金華嚴州衢州處州廣德滁和十六府州及河南山東北平今年田租又免徐邳二州夏稅五月又免蘇州逋糧三十萬五千八百石質實徽州宋置元路明改府廣信元信州路明改廣信府金華元婺州路明改金華府嚴州元建德路明改嚴州府衢州唐置元路明改府今皆因之邳州後周置元屬歸德府明屬淮安府今屬徐州府夏四月封子九人為王俠為秦王棡為晉王棣為燕王橚為吳王楨為楚王榑為齊王梓為潭王杞為趙王檀為魯王從孫守謙為靖江王帝懲宋元孤立失古封建意于是擇名臣大都豫王諸子待其壯而遣就籓服外衛邊郵內資夾輔其制祿親王嵗萬石置相傳官屬護衛甲士少者三千人多者至萬九千人籍𨽻兵部冕服車旗邸第下天子一等公侯大臣伏而拜謁禮無與鈞惟列爵而不臨民分籓而不錫土與周漢封國稍異焉質實樉帝第二子封西安棡第三子封太原棣第四子即成祖封北平橚第五子有司請置護衛于杭州帝以財賦地不可洪武十一年改周王封開封四王俱皇后生楨第六子胡充妃生封武昌榑第七子封青州梓第八子封長沙二王俱達定妃生杞第九子明年殤檀第十子郭寧妃生封兖州守謙帝長兄子文正之子封桂林徐達大破元庫庫特穆爾于沈兒峪達至安定庫庫特穆爾退屯沈兒峪達逹軍薄之隔深溝而壘日數交戰庫庫特穆爾遣精兵千餘人由間道從東山下劫東南壘左丞胡德濟倉卒失措軍驚擾達親擊却之德濟大海養子也達械送京師而斬其下趙指揮等數人以徇明日整兵奪溝死戰大破庫庫特穆爾兵擒郯王濟王及國公平章以下文武僚屬千八百餘人士卒八萬庫庫特穆爾僅挾妻子毅人從古城北遁去至黃河流流木以渡遂奔和林違自徽州南出一百八渡至略陽克沔州入連雲棧攻興元取之鄧愈亦自臨洮進克河州德濟至京師帝釋之而以書諭達曰將軍效衛青不斬蘇建耳獨不見穰苴之待莊賈乎且將軍在軍中誅之則已今下廷議吾且念其信州諸暨功不忍加誅繼自今將軍毋事姑息是役也都督孫興祖燕山右衛指揮平定大興右衛指揮龎禋等兵次拉音布拉克川遇敵兵力戰皆沒于五郎口音甚悼惜追封興祖燕山侯諡忠愍配享通州開平王廟質實沈兒谷在鞏昌府安府縣北之車道峴南徽州元置明因之今改縣屬秦州一百八渡在略陽縣城東源出徽縣下流入嘉陵江渡凡一百八處故名略陽縣元置屬沔州明改屬漢中府今因之沔州元置明改縣今屬漢中府連雲棧漢中府志褒斜谷中元時有板閣二千八百九十二間統名之曰連雲棧興元唐府元路明改漢中府今因之河州前秦置元河州路明改州屬臨洮府今屬蘭州府信州今廣信府見上諸暨秦縣元州明初改諸全尋復為縣屬紹興府今因之賽音布拉克川在蘭州府靖逺縣北其西為五郎口胡大海克信州太祖命德濟守之漢將李明道冦信州德濟力戰擒明道會大海為蔣英所害張士誠遣其將吕珍冦諸全德濟救之入城守夜半斫珍營珍遁去此其功也胡德濟字世美今賽音布拉克川舊作三不拉川改封陳日熞為安南國王安南使臣杜舜欽以其王日煃卒來告哀帝御西華門素服見之遣使往奠又命吏部主事林唐臣賚詔封日熞為王質實林唐臣名弼漳州人元帝殂于應昌詔諡之曰順帝其國人諡曰惠宗子阿裕實哩達喇嗣改元昌光立八年而殂國人謐曰昭宗質實按元史明實録元帝殂在是年四月二十八日丙戌夀五十有一應昌城距故開平衛東北三百里元置應昌路領應昌縣在今克什克騰旗西北捕魚兒海旁朱彛尊書髙麗史後曰庚申君遁走沙漠髙麗間猶通使稱為北平北元主奔應昌以洪武三年庚戍四月殂落國人追諡曰惠字其子嗣立以餘兵走和林十年丁巳遣使至髙麗行宣光年號國人不允後二年又遣僉院富芬告紀年天元辛遇遣永寧君王彬往賀相傳立十一年而殂北元諡為昭宗者也按昭宗殂于洪武十一年戊午非立十一年也洪武十年行宣光年號後二年告紀年天元則其子特古斯特穆爾之元年也彛尊考誤富芬舊作甫非今改五月始設科取士詔自今年八月為始明年春以天下初定令京府及各行省連舉三年自後三年一舉鄉試以八月會試以二月著為令李文忠克應昌獲元密迪哩巴拉送京師文忠聞元帝殂督兵兼程進圍應昌克之元嗣君阿裕實哩達喇北走獲其子密迪哩巴拉及后妃諸王官屬數百人並護宋元玉璽金寶玉册鎮圭大圭玉斧等駝馬牛羊無算窮追至北慶州而還道與州國公江文清等降三萬七千人至紅螺山又降楊思祖之衆萬六千餘人海寧衛指揮副使孫虎至落馬河與元太尉瑪魯戰死之追封康安郡伯質實北慶州遼置故城在今巴林西北遼史地理志慶州元寧軍有赤山黑河即此北邊紀事舊慶州在大寧北六百餘里地皆大松號曰千里松林紅螺山亦作紅羅山一統志今獨石口文御馬厰西有烏蘭哈郎噶山即紅羅山也明初李忠敗元兵于此落馬河一統志落馬河在喀喇沁右翼東蒙古名伯爾克源出大斧山北流入敖漢界入老金史大定府松山三韓二縣有落馬河又翁牛特右翼北有落馬河出汙達該山西北東南流入老河又方輿紀要落馬河在應昌東北相近固都遜地即偏將孫虎戰死處達密迪哩巴拉舊作買地里八喇瑪魯舊作買驢汗該舊作海他漢固都遜舊作苦脫孫今並改是月旱六月朔帝親禱于山川壇越五日雨帝齋于西廡皇后躬執㸑為農家食太子諸王饋于齊所帝素服革屨徒步至壇席藁曝日中夜卧于地凡三日詔省嶽囚命有司訪求通經術深明至道者越五日大雨質實按明實録六月戊午朔壬戌雨頒平定朔漠詔于天下封密迪哩巴拉為崇禮侯李文忠捷至羣臣臣稱賀帝謂治書侍御史劉炳曰爾本元臣今日之捷爾不當賀因命禮部榜示凡北方捷至勿與賀者勿與賀翌日中書省草詔進帝見有侈大之詞責省臣曰元主中國將百年朕與卿等父母皆賴其生養元之興亡自是氣運于朕何與而以此張之四方有識之士口雖不言心未必以為是也可更草以進密迪哩巴拉至京師羣臣請獻俘帝曰武王伐殷用之乎楊憲對唐太宗嘗行之帝曰是待王世充耳若遇惰之子孫恐不爾也令以本服朝見賜冠帶封崇禮侯諭省臣曰故國之妃朝于君者元有此禮不必效之令母妃皆朝中宫賜第龍光山又曰前代革命之際獲其后妃往往不以禮遇欺孤虐寡非盛德所為朕甚不取今元托郭斯后在此飲食居第務適其宜乃頒詔天下有天命靡常殷鑒可畏語質實龍光山即龍舟山一統志覆舟山一名龍舟山在江寧府東北太平門內楊憲字希武陽曲人匆托郭斯舊作脫思今改葬宋理宗頂骨于故陵先是元至元間西僧薩古密桂欲毀宋會稽諸陵夏人嘉木楊喇勒智為江南總攝奏請如二僧言遂發諸陵取其金寶以諸帝后遺骨瘞于杭之故宫築浮圖其上名曰鎮南以厭之以截理宗頂骨為飲器嘉木揚喇勒智敗籍入宣政院以賜所謂帝師者帝與侍講學士危素論宋元興替素備言始末帝歎息久之即命北平守將吳勉訪索頂骨所在得之西僧汝克鼐廬中既送至命有司厝于京城之南髙座寺西北至是紹興府以永穆陵圖來獻遂敕葬于故陵質實按西僧毀宋陵事見周密癸辛雜識至元二十二年乙酉事有陵使羅銑買棺置衣收斂又陶宗儀輟耕録所載羅有開義士唐鈺瘞宋諸陵骨傳及鄭元祐書義士林德陽收髙孝兩朝骨事迹傳聞異辭而宋濓髙啓楊維禎王逄原彭瑋諸家所紀乃甲申僧格為相與嘉木揚喇勒表裏使僧薩古密桂上言明年僧格矯制報可嘉木揚喇勒智敗飲器歸于宫以賜帝師會稽陳縣明為紹興府治今因之作薩古舊作嗣古密桂舊作妙髙嘉木楊喇勒智舊楊輦真珈汝克糴舊作汝納僧格舊作桑哥今並改立開中鹽法山西行省言大同糧儲自陵縣運至太和嶺路逺費煩請令商人于大同倉入米一石太原倉入米一石三斗給淮鹽一小引商人鬻畢即以原引赴所在繳之帝從其請召商輸糧而與之鹽謂之開中其俊各行省邊境帝召商中鹽以備邊儲儲計道里逺近自五石至一石差質實陵縣原州明初改縣永樂中于縣置德州而移縣治于舊德州屬濟南府今因之太和嶺即勾注山在雁門關西馬邑縣東南六十里徙蘇松嘉湖杭民無業者田臨濠以五郡地狹民衆無田以耕臨濠田多未闢令就墾為業給牛種車糧資遣之三年不征稅徙者凡四千餘户其後復徙北平山後民散處諸府州縣徙沙漠遺民屯田北平又徙江南民十四萬于鳯陽又徙山西民于河北又屢徙浙西及山西民于滁和北平山東河南終洪武之世徙民最多質實松江元府明因之嘉興宋府元路明改府湖州隋置元路明改府杭州隋置元路明府府今皆因之山後石晉所割新偽儒武雲應朔武八州也新今保安州媯今懷來縣儒今延慶州武今宣化府雲今大同府應今應州州朔今朔州蔚今蔚州秋七月中書左丞楊憲有罪誅憲有才辨裁決明敏然意刻深有不足于己者輒中傷之為司農卿時浙西初平憲欲增賦畝為二因倍征之民不堪其苦在中書欲盡易省中故事几舊吏皆罷去更用已所親信者汪廣洋為右丞以憲專決依違不與較猶不能得憲意憲竟嗾侍御史劉炳刻罷之且請徙廣南帝不從且復有所論刻帝覺其誣下炳獄炳吐實遂并誅之質實汪廣洋字朝宗髙郵人冬十一月大封功臣徐達李文忠師還至龍江帝出勞于江上甲午告武成于郊廟越二日大都督府兵部上諸將功績帝自定其次第遂班爵行賞封公者六人宣國公李善長進韓國公信國公徐達進魏國公常遇春子茂卿鄭國公文忠曹國公馮勝宋國公鄧愈衛國公侯者二十八人湯和中山侯唐勝宗延安侯陸仲亨吉安侯周德興江夏侯華雲龍淮安侯顧時濟寧侯耿炳文長興侯陳德臨江侯郭子興鞏昌侯王志六安侯鄭遇春榮陽侯費聚平涼侯吳良江陰侯吳禎靜海侯趙榮南雄侯廖永忠德慶侯俞通源南安侯華髙廣德侯楊璟營陽侯蘄國公康茂才子鐸蘄春