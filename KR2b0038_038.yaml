  - {type: page-break, offset: 0, content: '', id: KR2b0038_WYG_038-1a, image: WYG0340/WYG0340-0612a.png}
body:
  text: 起甲子明熹宗天啓四年盡丁卯明熹宗天啓七年凡四年甲子四年春正月何宗彥卒宗彥清修有執攜尚書事六年遇事侃侃數奏時望甚隆㑹推閣臣廷臣多首宗彥獨吏科給事中張延發不署名遂不獲預宗彥旋乞假去神宗末齊黨勢盛非同類即排去之宗彥獨無所附麗故終不安其位光宗立即家拜禮部尚書兼東閣大學士天啓元年夏巡朝屢加吏部尚書建極殿大學士及是卒於官日赤無光有黑是日癸未日赤無光有黑子二三蕩于旁漸多至百許二月京師地震宫殿動搖有聲銅缸之水騰波震蕩帝遂不豫至三月始愈地復屢震夏六月左副都御史楊漣劾魏忠賢二十四大罪中㫖切責漣忠賢肆惡日甚漣抗疏列其大罪二十有四其略曰髙皇帝定令內官不許干預外事違者法無赦乃有肆無忌憚濁亂朝常如東厰太監魏忠賢者敢列其罪狀言之忠賢本市井無賴中年淨身夤入內地初猶謬為小忠小信以幸恩繼乃敢為大奸大惡以亂政祖制以擬㫖專責閣臣自忠賢擅權多出傳奉或徑自內批壞祖宗二百餘年之政體大罪一劉一燝周嘉模顧命大臣也忠賢令孫杰論去急于翦己之忌不容陛下不改父之臣大罪二先帝賓天實有隱恨孫慎行鄒元標以公義發憤忠賢悉排去之顧于黨護選侍之沈㴶曲意綢謬終加蟒玉親亂賊而讎忠義大罪三王紀鍾羽正先年功在國本及紀為司寇執法如山羽正為司空清修如鶴忠賢搆黨斥逐必不容盛時有正色立朝之直臣大罪四國家最重無如枚卜忠賢一手握定力阻首推之孫慎行盛以宏更為他辭以錮其出豈真欲門生宰相乎大罪五爵人于朝莫重廷推去嵗南太宰北少宰皆用陪推致一時名賢不安其位顛倒銓政掉弄機權大罪六聖政初新正資忠直乃滿朝薦文震孟熊德陽江秉謙徐大相毛士龍侯震暘等抗論稍忤立行貶黜屢經恩典竟阻賜環長安謂天子之怒易解忠賢之怒難調大罪七然猶曰外廷臣子也去歲南郊之日傳聞宫中有一貴人以德性貞靜荷上寵注忠賢恐其露己驕橫托言急病置之死地是陛下不能保其貴幸矣大罪八猶曰無名封也裕妃以有娠傳封中外方為慶幸忠賢惡其不附己矯㫖勒令自盡是陛下不能保其妃嬪矣大罪九猶曰在妃嬪也中宫有慶已經成男乃忽焉告隕傳聞忠賢與奉聖夫人實有謀馬是陛下且不能保其子矣大罪十先帝青宫四十年所與護持孤危者惟王安耳即陛下倉卒受命擁衛防維安亦不可謂無勞忠賢以私忿矯㫖殺于南苑是不但仇王安而實敢仇先帝之老奴况其他內臣無罪而擅殺擅逐者又不知幾千百也大罪十一今日奬賞明日祠額要挾無窮王言屢褻近又于河間毁人居室起建牌坊鏤鳯雕龍干雲插漢又不止塋地僭擬陵寢而已大罪十二今日廕中書明日廕錦衣金吾之堂口皆乳臭誥敕之館目不識丁如魏良弼魏良材魏良卿魏希孔及其甥傅應星等濫襲恩廕褻越朝常大罪十三用立枷之法戚畹家人駢首畢命意欲誣陷國戚動搖中宫若非閣臣力持言官糾正椒房之戚又興大獄矣大罪十四良鄉生員章士魁以爭煤窰傷忠賢墳脉託言開礦而致之死趙髙鹿可為馬忠賢煤可為礦大罪十五王思敬等牧地細事責在有司忠賢乃幽置檻阱恣意搒掠視士命如草管大罪十六給事中周士朴執糾織監忠賢竟停其升遷使吏部不得專銓除言官不敢施封駁大罪十七北鎮撫劉僑不肯殺人媚人忠賢以賢不善煆錬遂致削籍示大明之律令可以不守而忠之律令不敢不遵大罪十八給事中魏大中遵㫖蒞任忽傳㫖詰責及大中回奏臺省交章又再䙝王言毋論玩言官于股掌而煌煌天語朝夕紛更大罪十九東厰之設原以緝奸自忠賢受事日以快私讐行傾陷為事投匭設阱日夜未己片語稍違駕帖立下勢必興同文館獄而後已大罪二十邉警未息京師內外戒嚴東厰緝訪何事前奸細韓宗功潛入長安偵探虛實實主忠賢司房之邸事露始去假令天不悔禍宗功事成未知九廟生靈安頓何地大罪二十一祖制不蓄內兵原有深意忠賢與奸相沈㴶創立內操藪匿奸宄安知無大盜刺客潛入其中一旦變生肘腋可為深慮大罪二十二忠賢進香涿州警蹕傳呼清塵墊道人以為大駕出幸及其歸也改駕駟馬羽幢青蓋夾護環遮則儼然乘輿矣其間入幕效誅叩馬獻策者實繁有徒忠賢自視為何如人哉大罪二十三夫寵極則驕恩多成怨聞今春忠賢走馬御前陛下射殺其馬貸以不死忠賢不自伏罪進有傲色退有怨言朝夕隄防介介不釋從來亂臣賊子只爭一念放肆遂至不可收拾奈何養虎兕於肘腋間乎此又寸臠忠賢不足蔽其辜者大罪二十四凡此逆跡昭然在人耳目乃內廷畏禍而不敢言外廷縫結舌而莫敢奏間或奸狀敗露又有奉聖夫人為彌更相表裏迭為呼應伏望陛下大奮雷霆集文武勳戚敕刑部嚴訊以正國法並出奉聖夫人于外用消隱憂臣死且不朽疏上忠賢懼甚求解于韓爌爌不應遂趨帝前泣訴且辭東厰而客氏從旁為之剖析王體乾等贊之帝懵然不辨也遂溫諭留忠賢而于次日下漣疏嚴㫖切責先是漣疏就欲早朝面奏值次日免朝恐再宿泄機遂于㑹極門上之忠賢乃得為計漣愈憤擬對仗復劾之忠賢詗知遏帝不御朝者三日及帝出羣閹數百人衷甲夾陛立敕左班官不得奏事漣乃止當時中書舍人吳懷賢讀漣疏擊節稱嘆注其旁曰宜如韓魏公治任守忠故事即時遣戍其奴告之忠賢即逮懷賢下獄拷掠死籍其家質實吳懷賢休寧籍吳縣人大雨雹是日為丙申秋七月杖殺工部郎中萬燝自楊漣上疏被責廷臣益憤交章論忠賢不法給事中則魏大中許譽卿等御史則劉葉楊玉珂等京卿則太常卿胡世賞祭酒蔡毅中等勳戚則撫寧侯朱國弼南京列卿則兵部尚書陳道亨侍郎嶽元聲等凡七十餘人先後申奏或專或合無不危悚激切大學士葉向髙及禮部尚書翁正春請遣忠賢歸私第以塞謗帝不許燝憤抗章極論略言人主冇政權有利權不可委臣下况刑餘寺人哉忠賢性狡而貪膽粗而大口銜天憲手握王爵所好生羽毛所惡成瘡痏廕子弟則一世再世賚厮飬則千金萬金毒痡士庶威加縉紳一切生殺豫奪之權盡為忠賢所竊且忠賢固供事先帝者也陛下寵忠賢亦以此乃于先帝陵工略不厝念間過香山碧雲寺見忠賢自營墳墓規制宏敞擬于陵寢前列生祠又建佛宇璇題耀日珠網懸星費金錢幾百萬為己墳墓如此為先帝陵寢則如彼可勝誅哉忠賢竊陛下權內外止知有忠賢不知有陛下豈可一日尚留左右疏入忠賢大怒當是時忠賢方惡廷臣交章劾已無所發憤思借燝立威乃矯㫖廷杖一百令羣閹先至燝邸捽而毆之比至闕下氣息才屬杖已絶而復蘇羣閹更肆蹴踏越四日即卒御史黃尊素上言律例非叛逆十惡無死法今以批肝瀝膽之忠臣竟殞于磨牙礪齒之凶豎千載下史筆書之豈不上纍聖德乞復其故官破格賜恤時禁中方失火李應升復言部郎之杖血方腥祝融之烈焰旋作天譴甚明伏冀矜恤俱不報是年檢討丁乾學興江西鄉試發策刺忠賢忠賢怒矯㫖除其名使人詐為校尉往逮挫辱之乾學憤鬱而卒揚州知府劉鐸憤忠賢亂政書扇贈游僧有隂霾國是非句實歐陽暉詩也邏者得之遂逮治事既白㑹鐸家人夜醮都督張體乾誣以咒詛竟斬西市他若御史夏之令以劾毛文龍御史吳裕中以熊廷弼姻考功郎蘇繼歐以楊漣黨後軍都督府經歷張汶以被酒詆忠賢或下獄或杖死皆繼燝被害質實萬燝字暗夫南昌人兵部侍郎恭之孫崇禎初贈光祿卿官一子許譽卿松江華亭人蔡毅中字宏甫光山人陳道亨字孟起新建人丁乾學字天行浙江山隂人寄籍京師劉鐸廬陵人夏之令光山人吳裕中江夏人蘇繼歐許州人張汶邯鄲人尚書國彥曽孫葉向髙罷楊漣劾忠賢疏既上向髙謂事且决裂廷臣相繼抗章至數十上或勸向髙下其事可决勝也向髙念忠賢未易除閣臣從中挽回猶冀無大禍乃具奏稱忠賢勤勞朝廷待厚盛滿難居宜解事權聽歸私第保全終始忠賢不恱矯帝㫖叙己功纍百餘言向髙駭曰此非閹人所能必有代為草者探之則徐大化也忠賢雖憤猶以外廷勢盛未敢加害有導以興大獄者忠賢意乃决萬燝廷杖向髙力救不從無何御史林汝翥向髙甥也方巡城有二竪爭奪人財物鬪于塗汝翥笞之忠賢怒矯㫖命杖汝翥如燝汝翥懼逃之城外羣閹疑匿向髙第聚而圍之大肆詬辱向髙上言國家二百年來無中使圍閣臣第者臣今不去何面目見士大夫帝優㫖慰留盡收回中使汝翥尋出受杖幸不死向髙以時事不可為乞歸已二十餘疏至是請益力命行人護歸向髙既去韓爌朱國楨相繼為首輔未久亦罷忠賢恣意戮辱清流朝中善類一空云相向髙為人光明忠厚有德量好扶植善類自再入輔沖主閹人逞煬竈計時事日非向髙亦利方為圖然數有匡救老成持重為清流所倚賴帷庇門生王化貞不能决議致壞封疆事為時所咎焉河決徐州決魁山隄城中水深丈餘遷州治于雲龍山而治河事無言及者質實魁山即奎山在銅山縣東南雲龍山在銅山縣南常有雲氣蜿蜒如龍故名封光宗選侍李氏為康妃初帝即位降敕暴選侍凌毆聖母及妄覬垂簾狀且云停選侍封號以慰聖母之靈厚養選侍以敬遵皇考之意至是忠賢亂政請加選侍封號帝從之㫖與前移宮諭相背時謂前諭出自王安後㫖出自忠賢故彼此抵牾帝實不辨也發明奸閹為選侍請封非專欲尊崇選侍也徒以當日請即位請移宮皆出自楊左主張王安調護今安已殺矣而楊左諸人忠賢又將興大獄以置之死地故先以請封選侍為反案之始奸邪隂騺其伎倆固無所不至而熹宗懵焉不察以前此明諭中外之事一任奸閹之顛倒播弄致使前後詔㫖互相悖馳又何怪他日之駢戮諸臣而置若罔聞耶冬十月罷吏部尚書趙南星左都御史髙攀龍御史崔呈秀按淮揚贓私狼籍霍邱知縣鄭延祚貪將劾之以千金賄免延祚知其易與再行千金即薦之其行事類如此比還朝攀龍循故事考察盡發其貪汚狀南星議戍之詔革職候勘呈秀窘夜走魏忠賢所叩頭乞哀言攀龍南星皆東林挾私排陷復叩頭涕泣願為飬子當是時忠賢憤廷臣交攻方思得外廷助涿州人馮銓者少年官侍從家居與熊廷弼有隙遺書魏良卿勸興大獄忠賢冀假事端傾陷諸害己者得呈秀相見恨晚呈秀又言不去南星攀龍等吾輩未知死所忠賢大以為然遂與定謀㑹山西缺巡撫南星以太常卿謝應詳有清望首列以請既得㫖而御史陳九疇受魏廣微㫖言應祥嘗知嘉善魏大中出其門大中以師故謀於選郎夏嘉遇而用之徇私當斥大中嘉遇疏辨南星攀龍極言應祥以人望推舉大中嘉遇無私九疇妄言不可聼忠賢大怒矯㫖黜大中嘉遇并黜九疇而責南星等朋謀結黨南星遽引罪去忠賢復矯㫖切責放之歸明日攀龍亦引去南星里居時名日髙海內仰慕與顧憲成鄒元標並稱三君及召起為吏部忤忠賢忠賢與其黨恨不已每矯敕諭必目為元凶云質實崔呈秀薊州人謝應祥安福人陳九疇歷城人十一月削吏部侍郎陳于廷副都御史楊漣僉都御史左光斗籍先是萬燝杖死黃尊素語漣曰可以去矣漣曰苟濟國死生以之卒不去至是廷推吏部尚書漣注籍不預于廷等推喬允升馮從吾汪應蛟上之中㫖謂此次㑹推仍是趙南星私人顯是于廷漣光斗冇意徇私更責漣怙惡不悛注籍躲閃前者勘陳九疇事俱屬漣等主張朋比不公著並削籍且追漣光斗誥命質實喬允升字吉甫洛陽人汪應蛟字潛夫婺源人以徐兆魁為吏部侍郎喬應甲為副都御吏王紹徽為僉都御史兆魁應甲紹徽皆素為南星所擯而紹徽尤黨于忠賢善類既斥三人擢用由是天下大權一歸忠賢矣韓爌罷初葉向髙當國爌次之及楊漣劾忠賢二十四大罪忠賢頗懼求援於爌不應忠賢深銜之既向髙罷爌為首輔每事持正為善類所倚然向髙有智術籠絡羣奄爌惟亷直自持勢不能敵而同官魏廣微又深結忠賢偏引邪黨忠賢假會推事逐趙南星髙攀龍爌急率朱國楨等上言陛下一日去兩大臣臣民失望且中㫖徑宣不復到閣而攀龍一疏經臣等擬上者又復更易大駭聼聞有傷國體忠賢益不悅傳㫖切責未幾又逐楊漣左光斗陳于廷朝政大變忠賢勢益張故事閣中乘筆止首輔一人廣微欲分其柄囑忠賢傳㫖諭爌同寅協恭而責次輔無伴食爌惶懼即抗疏乞休略言臣備位綸扉咎愆日積如詰戎宜先營衛而觀兵禁掖無能紓宵旰憂忠直尚稽召還而搒掠朝堂無能回震霆怒後先諸臣之罷斥諭㫖中出之紛更不能先時深念有調劑之方又不能臨事執持為封還之戅皆臣罪之大者皇上釋此不問責臣以協恭責同官以協贊同官奉詔以從事臣欲補過無由矣乞急禠臣官為佐理溺職之戒中㫖責爌歸非于上悻悻求去聽還籍諸輔臣請如故事加以體貌不報爌罷時上疏謝有左右前後務近端良重綸綍以重仕途肅紀綱以肅朝寧語忠賢及其黨益恨爌五年七月逆黨李魯生劾爌削籍除名又假他事坐贓二千斃其家人于獄爌鬻田宅貸親故以償而棲止于先墓質實李魯生霑化人起崔景榮為吏部尚書初景榮為兵部尚書數為言官所論御史方震孺請罷景榮以孫承宗代之遂引疾歸至是特起為吏部尚書時忠賢盜國柄羣小相倚附逐尚書趙南星欲起景榮為助比至忠賢飾大宅以待景榮不赴錦衣帥田爾耕來謁又辭不見帝幸太學忠賢欲先一日聼祭酒講議裁諸聼講大臣賜坐賜茶禮又議減考選員額汏京堂添注官景榮皆力持不可浸忤忠賢指而不安其位矣質實崔景榮字自强長垣人忤忠賢尋削籍崇禎改元復原官十二月逮內閣中書汪文言下鎮撫司獄文言初以布衣任俠有智術神宗末逰京師輸資為監生用計破齊楚浙三黨先是三黨諸魁交甚密後齊與浙漸相二文言習知本末多方設竒間之諸人果相疑而浙黨鄒之麟以求吏部不得見惡齊黨亦交鬪其間于是齊浙之黨大離文言又交結東宫伴讀王安與談當時流品安恱之光宗初立外廷倚劉一燝而安居中以次行諸善政文言交關力為多及魏忠賢殺安文言亦下吏得末減益遊公卿間葉向髙用為內閣中書韓爌趙南星楊漣左光斗魏大中俱與往來㑹給事中阮大鋮與光斗大中有隙囑其同官傅櫆劾文言與光斗大中交通為奸利㫖下文言詔獄葉向髙以舉用文言引罪求去忠賢終憚向髙舊臣不深究而御史黃尊素語鎮撫劉僑曰文言不足惜不可使禍延縉紳僑頷之獄上止坐文言廷杖除名無株及者方忠賢得櫆疏喜甚欲借是羅織東林而獄遽解志不逞乃以劉僑不任事削其籍而用許顯純代欲再伺釁而動至是御史梁夢環知忠賢恨未己復劾文言詔立逮之下北鎮撫司獄即命顯純鞫治而大理丞徐大化亦希忠賢指劾漣光斗黨同伐異招權納賄于是東林之禍遂作質實汪文言歙人阮大鋮懷寧人居桐城梁夢環廣東順德人朱國楨罷葉向髙罷韓爌為首輔韓爌罷國楨繼為首輔魏廣微與忠賢表裏為奸視之蔑如給事中李蕃三疏劾國楨遂引疾求去忠賢語其黨曰此老亦邪人但不作惡可令善去乃加少傅賜銀幣廕子中書舍人遣行人護歸南京地震是日癸邜震聲如雷乙丑五年春正月我大清兵取旅順大兵攻旅順破之守將朱國昌等戰死質實旅順有關在寧海縣南一百二十里明時海運舟逹金州衛者至此登岸復聼勘御史崔呈秀官魏忠賢既得呈秀恨相見晚遂用為腹心日與計畫至是給事中李恆茂為呈秀訟寃忠賢即以中㫖復其官尋督三殿工忠賢以閲工故日至外朝呈秀必屏人密語移時先是顧秉謙魏廣微以己意㸃縉紳便覽一册若葉向髙韓爌趙南星髙攀龍楊漣左光斗等百餘人目為邪黨而以黃克纘王永光徐大化賈繼春霍維華等為正人進之忠賢俾據是為黜陟已而王紹徽編東林一百八人繫以宋時淮南盜宋江等諸名目為㸃將録令忠賢按名除退及是呈秀復進同志諸銀皆東林黨人又進天鑒録皆不附東林者由是羣小無不登用善類一空云執時中㫖頻出朝端以為憂給事中李魯生獨上言中者帝用中者王㫖不中出而誰出舉朝大駭呈秀既比忠賢不二歲晉兵部尚書兼左都御史出入烜赫勢傾朝野于時忠賢門下文臣則呈秀田吉吳淳夫李夔龍倪文焕主謀議號五虎武臣則田爾耕許顯純孫雲鶴楊寰崔應元主殺戮號五彪他若尚書周應秋太僕少卿曹欽程等號十狗此外又有十孩兒四十孫之號而呈秀尤為之魁暮夜乞憐者莫不緣之以進蠅集蟻附其門如市或不附己及勢位相抗者輒令其黨排去諸所傾陷不可悉數雖其黨亦畏之也質實李恆茂邢臺人王永光長垣人田吉故城人吳淳夫晋江人李夔龍福建南安人倪文焕江都人孫雲鶴霸州人楊寰吳縣人崔應元大興人周應秋金壇人曹欽程江西德化人三月我大清建都瀋陽太祖髙先是既得遼陽集貝勒諸臣議曰皇帝天既眷我授以遼陽今將移居此城耶抑仍還我國耶衆俱以還國對太祖曰國之所重在土地人民今還師則遼陽一城敵且復至據守舍已得之疆土而還後必復煩征討非計之天既與得也且此地乃明及朝鮮蒙古接壤要區天命七年我即宜居之衆皆曰善遂定議遷都乃于三月築城于遼陽城東五里太子河邉創建宫室名曰東京至是閲三年為天命十年三月太祖欲自東京遷都瀋陽與貝勒諸臣議皆曰邇者築城東京宫室既建而民之廬舍尚未完繕今復遷移又興大祖諭大役恐頻勞我國西征明路直且近北征䝉古二三日瀋陽形勝之地日可至南征朝鮮可由清河路以進汝等寧不計及耶于是自東京至瀋陽定宫殿廟社之制是為盛京發明臣等謹按自古建都立國皆以形勝為先而非常之原必由聖人定斷瀋陽之境東盡挹婁北接扶餘南近沃海實為神臯臭區而撫定征討則明及䝉古朝鮮悉指顧可及天眷與宅為我闢宇之始大清肇基太祖髙皇帝力排羣議定以獨斷規度形勢築宫闕定廟社鞏基于億萬世古稱髙山天作何以過焉以朱燮元總督雲貴川湖廣西軍務先是貴州官軍屢為安邦彥所敗自王三善被害後賊勢益熾廷議以川師不協助宜令一人統之乃晋燮元兵部尚書總五省軍駐遵義明年賂賊黨誘殺奢寅崇明年老無能為邦彥亦乞撫燮元聞于朝許之未幾以父喪去賊又熾崇禎初起故官合諸道兵蹙之崇明邦彥俱授首夏四月太白晝見是月癸未日也重修光宗實録御史楊維垣首翻三案給事中霍維華繼之痛詆劉一燝韓爌孫慎行張問達周嘉模王之寀楊漣左光斗而譽范濟世王志道等請改光宗實録中㫖允之免李可灼戍擢濟世巡撫志道等京卿時魏忠賢特恨東林諸人數論其罪實於三案及京察封疆事無與也羣小欲借忠賢力為報仇凡異己者概指為東林黨而去之清流之禍遂不可解質實給事中霍維華疏略曰梃擊紅丸移宫三案迄無定論臣吕為選侍之請封也請封妃也妃尚未封而况于后請之不得而况于自后不妃不后而况于垂簾前此宫不難移也王安等故難之也難之者所以重選侍之罪而張翊戴之功也神祖册立東宫稍遲而篤愛先帝始終不渝果有廢立之謀則九閽邃密乃藉一風癲之張差乎神祖升遐先帝哀毁遽發夙疾而悠悠之口致疑宫掖豈臣子所忍言孫慎行借題紅丸誣先帝為受鴆加從哲以弒逆鄒元標鍾羽正從而和之兩人立名非真晚節不振委身門户敗壞平生伏乞嚴諭纂修諸臣以存信史楊維垣文登人范濟世濟源人王志道漳浦人六月朱延禧罷中㫖令閣票稱魏忠賢為元臣延禧執不可御史田新阿忠賢意攻去之逮前副都御史楊漣僉都御史左光斗給事中魏大中御史袁化中太僕少卿周朝瑞陜西副使顧大章下詔獄尋斃之削前吏部尚書趙南星等籍先是讞汪文言獄詞連趙南星李三才及漣光斗等二十餘人許顯純坐漣等以移宫罪徐大化獻策于魏忠賢曰但坐移宫則無贓可指若坐納楊鎬熊廷弼賄則封疆事重殺之更有名忠賢以為然乃令許顯純復鞫文言五毒偹至使引漣等納廷弼賄文言仰天大呼曰世豈有貪贓楊大洪哉至死不承大洪者漣别字也顯純乃手作文言供狀文言復張目謂曰爾莫妄書異時吾當與面質顯純遂即斃之而具獄辭以上漣光斗各作二萬大中三千化中六千朝瑞一萬大章四萬餘復多所牽引中㫖漣光斗六人逮下詔獄南星三才等俱削籍下所在撫按追贓漣光斗等先後逮至顯純非法拷掠血肉狼籍贓不肯承光斗私計曰彼殺我有二法因我不承而酷刑以斃之一也夜半令獄卒潛殺之二也承則當下法司庶有見天之日諸人然其言俱自誣服忠賢乃矯㫖仍令顯純五日一追比下下法司諸人始悔失計至七月漣光斗大中同夕為獄卒所斃漣之死土囊壓身鐵釘貫耳最為慘毒光斗大中亦皆體無完膚越數日始報三人死尸俱已潰敗不可識又踰月化中朝瑞亦斃惟大章未死羣小謂請人潛斃無以厭人心宜移付法司定罪明詔天下乃移大章刑部獄比對簿大章詞氣不撓而刑部一如鎮撫原詞以移宫事牽合封疆坐六人大辟爰書既上忠賢大喜矯詔布告四方仍移大章鎮撫司大章曰吾安可再入此獄呼酒與其弟大韶訣趣和藥飲之不死乃投繯而卒初漣等被逮祕獄中忽生黃芝光彩逺映及六人畢入適成六瓣或以為祥大章嘆曰芝瑞物也而辱于此吾輩庸有幸乎已而果然時以六人為六君子初汪文言之再下詔獄也煆鍊兩月餘不屈有㫖杖之百其甥哭失聲文言叱曰孺子真不才死豈負我哉而效兒女子相泣耶逮慘酷備加最後不能堪始仰視許顯純曰吾口終不似汝心任汝巧為之我承焉可也顯純誣楊左魏周諸人以贓文言蹶起曰天乎寃哉以此衊清亷之士有死不承楊漣之被逮也士民數萬擁道攀號所歷村市悉焚香建醮祈祐生還既死産入官不及千金母妻止宿譙樓二子至乞食以養微贓令急鄉人競出資助之至賣菜傭亦為輸助光斗前興畿輔水利尋督學政士民德之容城孫竒逢者節俠士也與定興鹿正倡義醵金諸生爭應之得金數千謀代輸緩獄而光斗已前斃正即善繼父世所謂鹿太公者也光斗死而贓未竟撫按嚴追兄光霽坐纍死母以哭子死都御史周應秋猶以所司承追不力疏趣之由是家族盡破後忠賢定三朝典要移宫一案以漣光斗為罪魁議開棺戮尸有解之者乃免大中長子學洢以父被逮號慟欲隨行大中止之乃微服間行探刺起居既抵都邏卒四布變姓名匿旅舍晝伏夜出稱貸以完父贓未竟而火中斃學洢慟哭幾絶扶櫬歸晨夕號泣水漿不入口遂死化中前佐髙攀龍發崔呈秀贓私呈秀恨之又繼漣疏效忠賢有忠賢鋌而走險其橫逞之毒將不在縉紳而即在陛下等語忠賢益大恨因竄名獄中朝瑞嘗請宥廷弼戴罪令守山海徐大化與之相訐大章在刑部時讞廷弼獄援議能議勞例從寬遣戍楊維垣劾其受賄故二人並坐而大章贓尤多也秋七月削李三才顧憲成籍三才才大而好用機權撫淮十三年結交遍天下若顧憲成鄒元標趙南星劉宗周皆推轂三才官加至户部尚書以謗議故落職天啓初遼陽失欲起用不果後起南京戶部尚書未赴卒至是御史石三畏追論京察事詔削籍憲成官吏部郎亦以京察事忤神宗意黜去憲成既廢益講學研究名益髙中外推薦無慮百十疏乃起南京光祿少卿力辭不就未幾卒天啓初贈太常卿亦以三畏追論與三才並削奪質實石三畏交河人忠賢門下十孩兒之一也八月毁天下書院御史張訥上疏力詆鄒元標孫慎行馮從吾余懋衡等請毁其講學書院于是元標慎行從善懋衡俱削奪東林關中江右徽州及天下一切書院皆毁訥為忠賢鷹犬最效力忠賢深德之書院既毁未幾逆祠建矣質實時元標已前卒追論奪官崇禎初贈尚書諡忠介慎行尋以紅丸事遣戍從吾以病卒崇禎初復官諡恭定懋衡字國持婺源人亦于崇禎初復官張訥閬中人以周如磐丁紹軾黃立極為禮部尚書馮銓為禮部侍郎並兼東閣大學士預機務輔臣缺詔推老成幹濟者禮部尚書周如磐以年老推用侍郎黃立極與忠賢同鄉故援之熊廷弼之獄紹軾與銓謀居多紹軾素憾廷弼以御史吳裕中為廷弼姻言于忠賢而杖殺之銓亦與廷弼有隙家居時曽遺書魏良卿勸興大獄及侍講筵出市刋遼東傳譖于帝曰此廷弼所作希脫罪耳帝大怒於是廷弼死遂决至是推閣臣銓資淺年未及四十忠賢黨李魯生上言成即為老而非必老乎年幹乃稱濟而即有濟于國銓遂柄用如磐閲三月即罷歸紹軾未踰年亦卒質實周如磐莆田人丁紹軾貴池人黃立極字中五元成人馮銓涿州人魏廣微罷楊左之獄廣微實預謀顧秉謙調嚴㫖五日一追比吏部尚書崔景榮懼其立斃杖下亟請廣微諌止廣微不自安疏言漣等在今日誠為有罪之人在前日實為卿寺之佐縱使贓私果真亦當轉付法司據律論罪豈可逐日嚴刑令鎮撫追贓乎身非木石重刑在之下就死直須臾耳以理刑之職使之追贓官守安勿論傷好生之仁抑且違祖宗之制疏入大忤忠賢意廣微懼急出景榮手書自明而忠賢怒已不可解乃具疏乞休不許居兩月廣微丏秉謙為解忠賢意少釋然卒不自安復三疏乞休許之既而景榮亦罷殺前遼東經略熊廷弼傳首九邊先是法司論廷弼獄與王化貞俱論死已而楊左諸人俱坐贓斃獄㑹邏者獲市人蔣應暘謂與廷弼子出入禁獄隂謀叵測忠賢遂欲速殺廷弼其黨門克新石三畏等復希㫖趣之及是遂棄市傳首九邉化貞竟不誅御史梁夢環謂廷弼侵盜軍資十七萬御史劉徽謂廷弼家資百萬宜籍以佐軍中㫖從之罄資不足償姻族家俱破江夏知縣王爾玉責廷弼子貂裘珍玩不獲將撻之其長子兆圭自刎死圭母稱寃爾玉去其兩婢衣撻之四十逺近莫不嗟憤時太倉人孫文豸顧同寅作詩誄廷弼為邏者所得二人坐誹謗俱斬連及其同郡編修陳仁錫修撰文震孟並削籍質實陳仁錫字明卿長州人門克新汝陽人劉徽清苑人九月賜魏忠賢及客氏印賜忠賢印文曰顧命元臣客氏印文曰欽賜奉聖夫人發明明代如蹇夏三楊輩曽各授印章許其密封言事故其文多有用繩愆糾繆者為一時優異之典顧朝廷之上所言公公言之嘉謨入告雖以責望老臣而賜印祕陳苟非其人即不免開告訐之漸而况可施之婦寺乎且是時逆閹窺竊大權中外爵位黜陟一任焬竈者之主持更有何人壅遏之而不使上聞者其不欲上聞之事固未嘗不可矯㫖從中出而又何待乎賜印不過習見前朝最異之數欲畢致于其身而後快又安顧其名義之不可居也哉冬十月罷孫承宗以髙第代為經略初魏忠賢以承宗功髙欲親附之㑹帝遣內官王應坤犒邊賜承宗蟒玉忠賢即令應坤申意承宗不與交一言忠賢由是大憾㑹忠賢逐趙南星髙攀龍等承宗方西巡薊遼念抗疏帝弗省往在講筵每奏對間有入乃請以賀聖夀入朝面奏機宜欲因是論其罪魏廣微聞之奔告忠賢曰承宗擁兵數萬將清君側公立虀粉矣忠賢悸甚繞御牀哭帝亦為心動令內閣擬㫖顧秉謙奮筆曰無㫖離迅地非祖宗之法違者不宥夜啓禁門召兵部尚書入令發三道飛騎止之又矯㫖諭九門守閹承宗若至齊化門反接以入承宗抵通州聞命而返忠賢遣人偵之一襆被置輿中後車鹿善繼而已忠賢意漸解而其黨李蕃崔呈秀徐大化等連疏詆之至比之王敦李懷光承宗遂纍疏求罷不許給事中郭興治請令廷臣議去留論冒餉者復踵至遂下廷臣雜議吏部尚書崔景榮持之乃下詔勉留而以簡將汰兵清餉三事責承宗㑹馬世龍有栁河之敗死者四百餘人于是臺省劾世龍并及承宗章疏數十上承宗求去益力遂許之以兵部尚書髙第代為經略第素恇怯以關外必不可守欲盡撤錦右諸城守禦移關內袁崇焕力爭謂兵法有進無退錦右搖動則寧前震驚關內亦失保障第慝堅且欲并撤寧前二城崇焕曰我寧前道也官此當死此我必不去第不能奪乃撤錦州右屯大小凌河及松山杏山塔山守具盡驅入關委棄米粟十餘萬軍民死亡載塗哭聲震野民怨而軍益不振質實馬世龍栁河之敗世龍以孫承宗荐為山海總兵領中部俾南北二部俱受節制世龍定計守城頗盡力至是有降人劉伯漒自耀州來言城內虛可襲世龍從之遣副將魯之甲等率師往檄水軍游擊金冠以舟濟師冠違令不至師次栁河不得渡軍陷泥淖中逐敗殁桞河亦曰楊桞河在海城縣南一故里西北流入三岔河錦右錦即錦州右即廣寧右衛屯也塔山堡名在錦縣西南髙第字登之灤州人魯之甲里系無考本朝乾隆四十一年追諡烈愍十二月榜東林黨人姓名示天下御史盧承欽上言東林自顧憲成李三才趙南星而外如王圖髙攀龍等謂之副帥曹于汴湯兆京史記事魏大中袁化中等謂之先鋒丁元荐沈正宗李朴賀烺等謂之敢死軍人孫丕揚鄒元標等謂之土木魔神宜一切榜示海內俾奸慝無所容忠賢大喜悉刋黨人名示天下質實盧承欽餘姚人丙寅六年春正月作三朝要典先是給事中楊所修請集梃擊紅丸移宫三案章疏倣明倫大典編輯為書頒示天下霍維華亦以為言至是作三朝要典以顧秉謙黃立極馮銓為總裁施鳯來楊景辰孟紹虞曾楚卿副之極意詆諆東林暴揚罪惡其論挺擊以王之寀開釁骨月為誣皇祖負先帝論紅丸以孫慎行創不嘗藥之說妄疑先帝不得正其終更附不討賊之論輕詆皇上不得正其始為罔上不道論移宫以楊漣等內結王安故重選侍之罪以張翊戴之功于是遂以之寀慎行漣為三案罪首時方修光宗實録凡事關三案命即據要典以改及書成忠賢令顧秉謙擬御製序文冠其首刋布中外質實楊所修商城人施鳯來平湖人楊景辰晋江人二月髙第罷以王之臣代為經略袁崇煥巡撫遼東大先是我寧逺髙第與總兵楊麒擁兵不救寧前參政清兵圍袁崇焕集將士誓死守盡焚城外民居擕守具入城檄前屯及山海關凡將士逃至者悉斬人心始固大軍戴楯穴城矢石不能退崇焕令閩卒羅立發西洋巨炮圍遂解時督屯通判金啓倧以燃炮死事聞擢崇煥僉都御史削髙第楊麒職以之臣代第以前屯總兵趙率教代麒鎮關門尋命崇煥巡撫遼東駐寧逺質實王之臣潼關衛人金啓倧起小吏時為督屯通判死贈光祿少卿世廕錦衣試百户逮前左都御史髙攀龍吏部員外郎周順昌蘇松巡撫周起元諭德繆昌期御史李應升周宗建黃尊素攀龍自沉于池順昌等俱下獄死攀龍雖削籍崔呈秀恨不已亟言于魏忠賢必欲殺之順昌家居魏大中被逮過吳順昌出餞與同起卧者三日許以女聘大中孫旗尉屢趣行順昌瞋目曰若不知世間有不畏死男子周順昌耶因㦸手呼忠賢名罵不絶口旗尉歸以告忠賢大怒倪文煥即希指劾順昌與罪人婚削籍昌期典湖廣鄉試程文論中引趙髙仇士良寓規諷忠賢嗛之楊漣劾忠賢二十四罪疏或言昌期代草而髙趙諸人去國昌期率送之郊外執手太息忠賢益大恨昌期知勢不可留具疏乞假有小璫至閣曰此人尚可留之送客耶遂傳㫖落職宗建首劾忠賢目不識丁應升尊素皆繼漣抗疏力攻忠賢應升疏有云忠賢之罪千真萬真無可復辨千罪萬罪又不勝辨臣為陛下計莫若聼忠賢急自引退以全旦夕之命為忠賢計又莫若早自引決以乞帷蓋之恩不然惡稔貫盈欲保首領而不可得末又切責閣臣謂君側不清焉用彼相一時寵利有盡千秋青史難欺不欲為劉健謝遷者恐并不能為李東陽倘投䇿求歡不幾與焦芳同傳耶時魏廣微方深結忠賢知應升譏已調㫖切責而尊素尤有智慮為羣小所深忌曹欽程希指劾宗建應升尊素皆東林護法皆削籍㑹吳中訛言尊素欲效楊一清誅劉瑾用蘇杭織造李實為張永授以祕計忠賢大懼遣刺事者至吳凡數輩侍郎烏程沈演家居記忠賢日事有迹矣于是忠賢益遣使譙訶實知實與前巡撫起元素有隙蓋起元撫吳時公亷愛民絲粟無所取實素貪橫妄增定額恣誅求又惡同知楊姜不屈已具疏誣劾起元為姜辨寃並劾實不法數事實以此斂威而銜起元不置至是忠賢乃索取實空印白疏令李永貞僞為實奏誣劾起元為巡撫時乾沒帑金十餘萬日與攀龍輩往來講學因竄入順昌等名矯㫖並逮之攀龍聞旗尉將至謁道南祠為文以告歸與二門生一弟飲後園池上及暮書遺表訖具衣冠自沈于池表云臣雖削奪舊為大臣大臣受辱則辱國謹向北叩頭從屈平之遺則逺近聞其死莫不傷之順昌故有德于鄉士民聞其被逮憤怒號寃開讀日不期而集者數萬咸執香為周吏部請命旗尉厲聲罵曰東厰逮人衆輩敢爾大呼囚安在手擲鋃鐺于地聲琅然衆益憤曰吾始以為天子命乃東厰魏太監耶遂蜂擁上勢如山崩旗尉東西竄衆縱橫毆擊立斃一人餘負重傷踰垣走巡撫毛一鷺不能發一語知府寇慎吳縣知縣陳文瑞素得民曲為解諭衆始散順昌乃自詣吏是日旗尉往浙江逮尊素者泊舟胥門外市人知城中有變擊其舟而沈之旗校泅水以遁失駕帖不敢往尊素聞即囚服自投詔獄順昌既就逮一鷺飛章告變東厰刺事者言吳人謀斷水道劫漕舟忠賢大懼已而一鷺言縳得倡亂者顔佩韋楊念如周文元馬傑沈揚亂已定忠賢乃安然自是緹騎不敢復出國門矣方諸臣之被逮也顧秉謙忽持正請付法司論罪忠賢不從已而昌期先至慷慨對簿詞氣不撓坐贓三千偹受五毒不勝酷刑時四月晦日槖饘中傳出片紙自此遂斃至五月二日獄卒以死報終莫知為何日其殮也十指墮落掬置兩袖中蓋以其為漣代草故云順昌宗建應升尊素繼至許顯純各坐贓數千宗建至一萬三千五日一酷掠順昌輒大罵忠賢顯純椎落其齒順昌噀血唾顯純靣罵益厲遂于夜中潛斃之時六月十七日及領埋已越三日皮肉皆腐僅存鬚髮宗建為顯純酷訊偃卧不能出聲顯純罵日尚能詈魏公一丁不識否以沙囊壓之而死時六月十八日尊素知獄卒將害己叩首謝君父賦詩一章時獨應升尚在尊素隔墻呼之曰仲逹我先行矣遂死時為閏六月朔日明日應升亦死起元道逺至則順昌等已俱死顯純酷加搒掠竟如疏懸贓十萬罄資不足親故多為破家及九月亦斃之獄中時以順昌等慘死詔獄與前楊左諸人先後略同遂與髙攀龍並稱為後七君子以配楊左等共十有三人為逆閹時死節之最著者云攀龍學本濓洛操履篤實涵養邃密粹然為一代大儒既死呈秀憾猶未釋矯㫖下其子世儒吏刑部坐世儒不能防間其父謫為徒順昌就逮時諸生朱文祖間行詣都為納饘粥湯藥及徵贓令急奔走稱貸諸公間順昌櫬歸文祖哀慟發病死其所捕顔佩韋等五人比臨刑語知府寇慎曰公好官知我等好義非為亂也延頸就刃而死後吳人合葬之虎邱傍題曰五人之墓昌期應升至常州開讀知府曽櫻咸助之資應升師吳鍾巒詣府署與應升語竟日謂應升曰昔蔡元定竄道州晦翁餞之蕭寺微視元定不異平時何圖今日親見此景真一夕千古已而忽聞署外有數千人閧聲皆言忠臣何故被逮櫻素有惠政得民力為勸諭始解散而諸校方怖蘇州事有越垣而仆者適賣蔗童子過之曰我恨極惜不能殺汝即取削蔗刀割片肉而去宗建死後所親蔣英代為輸贓亦坐削籍尊素家尤貧坐贓雖不及三千同年門舊及鄉人咸助之始得完趙元方撫吳罷歸順昌為文送之指斥無所諱議者謂起元順昌之禍已伏于此及兩人死吳中士民無不垂涕者質實道南祠即楊龜山祠周茂蘭字子佩順昌長子曾櫻字仲含峽江人進本朝乾隆四十一年追諡忠節吳鍾巒字巒稚武人蔣英嘉善人沈演即㴶之弟兵科給事中羅尚忠疏陳漏餉剝軍弊尚忠言各邉解銀往領銀回者或各衛鑽求情分委放軍糧或將領轉委偏俾遽相抽扣而將官遇有司餉之權者雖品位過之亦甘卑禮厚幣甚至星相遊人當事荐往者亦𣲖扣各軍禮而歸之又甚有將官放債倍扣利息者及管庫司官以情面淺深幣交厚薄為各邊發糧之先後乞飭各督撫委各邊道將查明軍數軍若干餉若干刻成冊各送計部計部總計九邊額兵若干嵗餉若干彚册進覽一送該部一送各司俾奸書無所去其籍得㫖所言給餉情弊甚悉其應裁應禁速議尋不果行三月設各邊鎮監軍內官時各邊鎮增設內臣監軍太監劉應坤鎮守山海關大學士丁紹軾兵部尚書王永光等屢諫不聼發明熹宗之時邊事已不可為經撫不和疆場日蹙朝廷即力加整飭尚恐不能有濟而乃復設內官監軍以益其弊是猶抱薪而救火也往時內官典兵如曹吉祥郭敬輩覆轍俱在惟嘉靖力抑宦侍其鋒稍挫神宗時雖監稅肆出而典兵者尚少至是魏閹亂政一切魁柄皆欲歸其同類始則借犒軍以刺事關庭供役士卒愁苦繼乃各設監軍牽制邉將稍一拂逆戮辱隨之疆事如此國事又如此岌岌殆哉其能久乎夏四月搜括應天各府貯庫銀命南京守偹內臣搜應天各府貯庫銀充殿工及兵餉五月王恭厰災王恭厰火藥局也是日雷震火藥自焚地中霹靂聲不絶煙塵障空白晝晦冥軍民昏仆死者無算未幾朝天宫又災六月地震先是五月薊州密雲連震三日及是京師天津宣大山東河南皆震閏月建魏忠賢生祠忠賢生祠之建始于潘汝楨汝楨巡撫浙江疏請建忠賢生祠于西湖織造太監李實請令杭州衛百户守祠詔賜祠額曰普德勒石記功德閣臣撰文書丹自是諸方效尤幾遍天下薊遼總兵閻鳴泰部內建祠七所費數十萬其頌忠賢有民心依歸即天心向順語開封毁民舍二千餘間創宫殿九楹儀如帝者巡撫朱童䝉建祠延綏用琉璃瓦劉詔建祠薊州金像冕旒其諸祠務極工作之巧像皆以沈香木為之眼耳口鼻宛轉如生人腹中腸肺俱以金玉珠寶為之髻空穴其一以胥四時香花一祠木像頭梢大小豎上冠不能容匠人恐急削而小之以稱冠小豎抱頭痛哭責匠人凡疏辭揄揚一如頌聖稱以堯天舜德至聖至神閣臣輒用駢語褒答督餉尚書黃運泰迎忠賢像五拜五稽首稱九千歲都城內外祠宇相望有建于東華門外者工部郎中葉憲祖曰此天子臨辟雍道也土偶能起立乎忠賢聞之即削其籍初汝楨請建祠巡按御史劉之待㑹稿遲一日即削籍而薊州道胡士容以不具建祠文遵化道耿如杞以入祠不拜皆下獄論死時海內望風獻媚自督撫巡按而外宗室若楚王華烓勳戚若武清侯李誠銘保定侯梁世勳等廷臣若尚書邵輔忠詞臣若庶吉士李若琳部郎若郎中魯國楨諸司若通政司經歷孫如冽上林監丞張永祚等亦皆建祠恐後下及武夫賈豎諸無賴子莫不攘臂爭先洶洶若不及最後巡撫楊邦憲建祠南昌至毁周程三賢祠益其地鬻淡臺滅明祠曵其像碎之比疏至熹宗已崩莊烈帝且閲且笑忠賢覺其意具疏僞辭輒報允無何忠賢誅諸祠悉廢凡建祠者概入逆案云質實潘汝楨桐城人劉詔杞縣人黃運泰永城人葉憲祖字美度餘姚人劉之待興國州人胡士容黃州廣濟人耿如杞字楚材館陶人李誠銘慈聖太后姪梁世勳珤之後邵輔忠定海人李若琳大興人魯國楨臨川人馮銓罷銓以媚事魏忠賢登宰輔素與崔呈秀昵呈秀欲入閣其黨孫杰霍維華嗾贓方郎中吳淳夫力攻罷銓又慮王紹徽為吏部不肯推呈秀令御史袁鯨攻罷紹徽而杰等慮忠賢意變復以計沮之自是羣小携二質實袁鯨湖廣龍陽人京師大水江北山東旱蝗秋七月以施鳯來張瑞圖李國􅕠俱為禮部尚書兼東閣大學士預機務鳯來素無節概及在閣惟以和柔自媚于世瑞圖于諸事迎合魏忠賢意忠賢建祠碑文多出其手書詔㫖褒美忠賢詞極駢麗皆瑞圖筆也國􅕠去釋褐才十四年忠賢以同鄉故援之質實張瑞圖晋江人李國􅕠髙陽人九月庚午朔我太宗文皇帝嗣位以明年為天聰元年太祖髙八月我大貝勒代善于諸子中為最長而我皇帝崩太宗文皇帝時稱為衆望所屬代善因作議書言紹承大統四貝勒功德隆茂得聖君始能戡亂致治以成一統自顧德薄願共推戴四貝勒嗣位入朝遍示諸貝勒大臣衆皆喜冬遣使遺袁崇太宗辭讓再三代善意益懇切乃從之是年煥書曰爾停息干戈遣李喇嘛等來弔喪並賀新君即位爾循聘問之常我亦豈有他意既以禮來當以皇考往禮往故遣官致謝至兩國和好之事前尚未回答汝寧逺時曽致璽書與爾令爾轉逹至今主如答前書欲兩國和好我當覽書詞以復之兩國通好誠信為先爾須實吐𠂻情勿事文飾也顧秉謙罷自秉謙為首輔凡魏忠賢傾害忠良皆屬其票擬三朝要典之作秉謙為總裁是非舛謬特甚及是羣小各有所左右同黨中如魏廣微馮銓輩日夜交軌秉謙不自安遂乞歸秉謙于崇禎初削籍尋入逆案論徒家居又為鄉黨所惡聚衆僇辱之屋室資財焚掠殆盡秉謙竄漁舟得免久之寄居他縣以死冬十月進魏忠賢爵上公從子良卿寧國公先是皇極殿成帝御殿受賀忽有聲如怒濤自殿中出羣臣班亂至是三殿告成太監李永楨奏魏忠賢功吏部尚書周應秋亦奏如永楨言忠賢遂進上公加恩三等良卿前已封肅寧伯進侯至是復進封公已而諸邉築隘口成南京孝陵工竣甘肅奏捷法司捕盜並言忠賢區畫方略詔書褒美閣臣皆擬九錫文半歲中廕錦衣指揮使十七人同知三人僉事一人擢其族孫希孟希孔等世襲都督同知甥傅之琮馮繼先俱都督僉事章奏無巨細輒頌忠賢稱厰臣不名山東奏産麒麟大學士黃立極等票㫖言厰臣修德故仁獸至其誣罔若此故事內官為司禮秉筆非公事不得出忠賢每歲必數歷畿甸坐文軒駕四馬笙鼓鐃吹之聲轟𨼆黃埃中錦衣玉帶鞾袴而握刀者夾車左右而馳自厨傳優伶蹴踘輿皂隨者動以萬數嘗自琉璃河祭水還歷西山碧雲寺士大夫皆遮道拜伏凡有章奏其黨遣急足馳請然後下客氏既朝夕侍帝所而每數日必出至私第輿過乾清宫前竟不下客氏盛服倩粧儼同妃后侍衛赫奕照耀衢路至宅則老祖太太千歲之聲喧呼震地犒賚銀幣無算或數日不返忠賢促之始入凡忠賢濁亂朝政毒痡海內皆客氏為內主也十二月南京地震先是寧夏地大震至是南京地亦震丁邜七年春正月以太監崔文升總督漕運河道文升先侍光宗藥為廷臣所論已放南京魏忠賢作三朝要典遂召還至是命兼督河漕文升之任即多參劾忠賢矯㫖稱其能力挽漕運盡心國儲深體厰臣籌邉至意嘉之被參者削籍治罪二月召王之臣還光是袁崇焕與滿桂不協請移之他鎮乃召桂還王之臣代髙第為經略又奏留桂崇焕又與不協中朝慮僨事命之臣專督關內以關外屬崇煥畫關而守崇焕慮廷臣忌已上言陛下以關內外分責二臣用遼人守遼土且守且戰且築且屯屯種所入可漸減海運其大要堅壁清野以為體乘間抵隙以為用戰雖不足守則有餘守既有餘戰無不足顧奮迅立功衆人必忌任勞則必召怨䝉罪始可有功怨不深則勞不著罪不大則功不成謗書盈篋毁言日至從古已然惟聖朝與廷臣始終之朝議以崇焕之臣不相能召之臣還罷經略不設以關內外盡屬崇焕并便宜從事大清兵征朝鮮崇焕與趙率教巡歷錦州大小凌河議大興屯田漸復髙第所棄舊土㑹大清兵方討朝鮮渡鴨緑江崇焕乘間遣將繕錦州中左大凌三城未畢朝鮮及毛文龍同告急朝命崇焕發兵往援崇焕以水師援文龍又遣率教等九將將精卒逼三岔河為牽制之勢而朝鮮已為大清所服諸將遂引還勒太康伯張國紀回籍國紀皇后父也后性嚴明見魏忠賢及客氏亂政數于上前言之客魏交恨一日帝至后宫后方讀書帝問何書對曰趙髙傳也帝默然而出忠賢聞之益恨曽有張匿名榜于厚載門者列忠賢反狀及其黨七十餘人忠賢疑國紀為之邵輔忠孫杰欲因此興大獄借國紀以搖中宫事成則立魏良卿女為后草一疏募人上之諸人慮禍不敢承順天府丞劉志選年老而嗜進無厭惑家人言謂己老必先忠賢死也竟上之疏中極論國紀罪末言毌令人訾及丹山之穴藍田之種蓋忠賢嘗誣后非國紀女故云疏上事叵測帝無所問但令國紀自新而已忠賢意大沮梁夢環偵知之復深論志選疏且故詰丹山藍田二語忠賢將從中究其事大學士李國􅕠及王體乾交沮之事乃止而國紀竟勒歸故郡遣瑞王常浩及惠王常潤桂王常瀛之藩三王皆帝叔父魏忠賢潛蓄逆謀不利其在內御史張訥希㫖即疏趣之藩于是三王以次就國儀物禮數刻意貶損羣小反盛稱忠賢節費為國帝即下詔褒美質實瑞王常浩神宗第五子初太子未立有三王並封之㫖謂光宗福王及常浩也尋以羣臣爭遂寢二十九年東宫立與福惠桂三王同日封常洵以長先之藩至是常浩之藩漢中惠王常潤神宗第六子至是之藩荆州桂王常瀛神宗第七子至是之藩衡州夏四月逮前刑部侍郎王之寀下獄死劉志選疏頌要典言命德討罪無微不彰即堯舜之放四凶舉元愷何以加焉且云慷慨憂時力障狂瀾于既倒者魏廣微也當還之揆席以繼五臣之盛事赤忠報國弼成巨典于不刋者厰臣也當增入簡端以揚一德之休風又言王之寀宜正典刑孫慎行宜加遣戍忠賢矯㫖逮之寀下詔獄坐以贓八千竟瘦死慎行亦遣戍寧夏知府曾櫻故緩之未行而忠賢敗王之寀于天啓初上復仇疏中言梃擊之謀變而為用藥之術蓋梃不中而藥促之是文升之藥慘于張差之梃孫慎行辨析紅丸有曰由前則過信可灼有輕進之罪由後則曲庇可灼有不討賊之罪兩者皆無可逃其言峻直故羣小俱恨之刺骨發明逆閹亂政流毒縉紳一時呈身獻媚之徒借其力以翻三案遂至顛倒是非刋為要典而劉志選者乃復劾逮之寀瘐死圍扉煽焰推波莫兹為甚顧志選耄惛嗜進揣風燭之將殘冀氷山之可恃卒之十罪朝彈元凶暮竄曾不踰年而身膺顯僇為逆案之罪魁所謂孽不可逭者其志選之流乎五月監生陸萬齡請祠魏忠賢于國子監萬齡請以忠賢配孔子忠賢父配啓聖公其疏曰孔子作春秋厰臣作要典孔子誅少正邜厰臣誅東林黨人禮宜并尊持疏詣司業林釪釪援筆塗抹即夕挂冠櫺星門去司業朱之俊為奏請從之釬坐削籍孔同時又有一張生者欲上疏以忠賢與子並尊入國學自稱見子路擊之遽殂質實林釬字實甫同安人秋七月遣魏良卿享南北郊祭太廟上不豫以錦州之捷遣良卿告南郊北郊及大廟代行禮于是天下皆知忠賢欲竊神器矣發明國家郊廟重典必躬必親昭其敬也嘉靖時祈榖明堂嘗遣武定侯郭勛恭代識者已譏其非禮乃良卿以魏忠賢之孽儼然攝行大祀對越于兩郊九廟之間其僭妄孰甚焉且寧逺錦州之役滿桂僅以身免盈庭藉藉方爭劾袁崇焕之不能救援顧在督師則明斥為罪在內豎則詭冒為功甚至晉秩太師良卿倍邀優叙馬鹿混淆謬以捷告豈果謂天祖之可欺耶蓋是時忠賢懷奸莫測特欲假托邉功令其兄子得因代祭以干帝制逆志之萌于前具見又何待傳呼呈秀私語密謀而後覺其有覬覦神器之心耶罷袁崇焕以王之臣代之太宗文時我親督兵至大凌河守城士卒皆遁遂進圍錦州皇帝大太監紀用總督趙率教遣使請和我精兵四千繞出清遺書責之袁崇焕令祖大夀等統大清兵後别遣水師東出相牽制大壽等未至營濠內大清已分兵抵寧逺城下崇焕督將士登陴列大用炮拒擊而滿桂亦率尤世威以兵來赴我滿尋解兵疾馳進擊大敗之追至城下尸填壕塹皆寧逺圍復益兵攻錦州以溽署不能克毁大小凌河二城而還魏忠賢使其黨劾崇焕不救錦州崇焕乞休去以王之臣代之及論守寧錦功文武冒濫增秩賜廕者數百人崇焕止增一秩先是尚書霍維華嘗進仙方靈露飲于帝帝飲而甘之已漸厭及得疾體腫忠賢以咎維華維華懼甚慮帝不測有後患欲先自二于忠賢㑹寧錦叙廕維華請以讓崇焕魏忠賢覺其意降㫖頗厲封魏忠賢從孫鵬翼為安平伯加少師從子良棟安東侯加太子太保良卿加太師良棟鵬翼尚在襁褓鵬翼以寧錦奏捷封良棟以殿工封從吏部尚書周應秋請也八月帝崩遺詔皇五弟信王嗣位帝疾大漸召閣部科道諸臣于乾清宫諭以魏忠賢王體乾皆恪謹忠貞可計大事黃立極對曰陛下任賢勿二諸臣敢不仰體及崩遺詔以弟信王嗣位王即夕入居宫中羣臣于比明始至方入臨內使十餘人轉呼崔尚書甚急呈秀入與忠賢密謀久之語祕不得聞或云忠賢欲篡位呈秀以時未可止之也質實信王諱由檢光宗第五子天啓二年封信王信王由檢即位赦是為莊烈帝以明年為崇禎元年九月追諡母賢妃劉氏為孝純皇太后初入宫為淑女萬歷三十八年十二月生莊烈帝已失光宗意被譴薨光宗中悔恐神宗知之戒掖庭勿言葬于西山及莊烈帝長封信王追進賢妃往者莊烈帝問近侍曰西山有劉娘娘墳乎曰有每密付金錢往祭及即位上尊諡曰孝純皇太后質實劉大后海州人後籍宛平立皇后周氏天啓中后選入信邸時神宗劉昭妃攝太后實宫中之政悉禀成于熹宗張皇后故事宫中選大婚一后以二貴人陪中選則皇太后幕以青紗帕取金五跳脫繫其臂不中即以年日帖子納淑女袖侑以銀弊遣還張后疑后弱昭妃曰今雖弱後必長大因册為信王妃帝即位立為皇后質實周皇后蘇州人徙居大興生員奎之女奎後封嘉定伯賜李莊妃弟成棟田莊妃李氏即所稱東李者也仁慈寡言笑位居西李前而寵不及莊烈帝幼失母育于西李既而西李生女光宗改命東李撫視天啓元年二月封莊妃客魏用事惡妃持正宫中禮數多被裁損憤鬱而覺至是帝立詔賜妃弟成棟田産念撫育恩也冬十月南京地震震自西北迄東南隆隆有聲十一月放魏忠賢于鳳陽道死詔磔其尸帝素稔忠賢惡深自警備及即位其黨自危楊所修揚維垣先劾崔呈秀用以嘗帝時呈秀丁母憂奪情視事不用縗纆所修請令呈秀守制維垣繼攻之呈秀罷歸于是主事錢元愨遂劾忠賢上言忠賢本梟獍之資先帝假以事權羣小蟻附稱功頌德布滿天下如王莽之妄引符命列爵三等畀及乳臭如梁冀之一門五侯遍植奸黨分置要津如王衍之狡兔三窟輿珍輦實藏聚肅寧如董卓之郿塢自固廣開告訐誅鋤士類如曹節王甫之鉤黨株連陳養死士陳兵自衛如桓溫之壁後置人皇上待以不死宜勒歸私第魏良卿等有玷茅土並宜禠革員外史躬盛主事陸澄源亦交章諭之而嘉興貢生錢嘉徵更劾忠賢十大罪一曰並帝內外封章必先關白稱功頌德上配先帝及奏俞㫖必曰朕與厰臣自古未聞有此奏體二曰蔑后皇親張國紀于御前面折逆奸遂遭羅織欲置之死賴先帝神明祇膺薄懲不然皇親危則中宮危矣三曰弄兵祖宗朝不聞內操忠賢外脅臣工內逼宫闈操兵禁中深可寒心四曰無二祖列宗髙皇帝垂訓中涓不許干預朝政乃忠賢一手障天流毒縉紳凡邉腹重地漕運咽喉多置腹心意欲何為五曰尅削藩封三王之國莊田賜賚甚薄也而忠賢封公侯伯之土田膏腴萬頃六曰無聖先師為萬世名教主忠賢何人敢祠太學之側七曰濫爵古制上非軍功不侯忠賢竭天下之物力佐成三殿居然襲公之爵靦不知省八曰掩邉功遼左用兵以來墮名城殺大將而冒侯封伯九曰傷民財郡縣請祠遍天下一祠所費不下五萬金敲骨剝髓孰非國家之脂膏十曰褻名器崔呈秀之子鐸目不識丁賢書遂登前列疏上帝召忠賢使內侍讀之忠賢震恐喪魄急以重寶啖信邸太監徐應元求解應元故忠賢博徒也帝知之斥應元安置忠賢于鳯陽榜其罪示天下尋諭曰逆惡魏忠賢擅竊國柄誣陷忠良罪當死姑從輕發鳯陽乃不思自懲素蓄亡命之徒環擁隨護黨勢若叛然令錦衣衛逮治忠賢行至阜城聞之與其李朝欽偕縊死乃磔其尸懸首河間呈秀聞忠賢死亦自縊明年追戮其尸時言者劾呈秀為五虎之首宜肆市朝有詔逮治籍其家呈秀聞之列姬妾羅珍實呼酒痛飲盡一巵即擲壞之飲已自縊詔開棺追戮其尸其子鐸覆試僅得二義削籍質實錢元慤歸安人史躬戒烏程人陸澄源平湖人戍邊罷諸邉鎮守中官天啓六年三月各邉俱增設內官鎮守至是帝諭兵部先朝于宣大薊遼東江之地分遣內臣協鎮一柄兩操甚為無謂且宦官觀兵自古有戒其槩罷之免天啓時逮死諸臣贓釋其家屬黃立極罷山隂監生胡焕猷上疏論黃立極施鳯來張瑞圖李國􅕠等身居揆席一意媚閹並宜斥罷立極等疏辨帝猶優詔報之及是立極終不自安乞休去時楊維垣等交章論焕猷疑東林指使請按問乃詔除焕猷名發明黃立極等以逆閹黨人夤緣政府逄奸肆惡靡所不為逆閹既誅其黨自應罷斥乃大臣不為舉發言官不聞論奏而紏劾之疏且出自一山隂監生則諸臣平日封章交論相與水火者徒知爭門户之私而于國家進賢退不肖之義曽不涉其胸臆也莊烈帝深知立極輩之附奸特不欲驟斥衆臣故為除焕猷召以安其意而楊維垣等案乃疑其為東林指使疏請按問是時逆閹雖誅逆未定故猶以東林為罪惡之歸小人變亂黑白何所不至乃鼎象已昭而魑魅猶不自覺亦可哀也夫十二月以錢龍錫李標來宗道楊景辰黃道登劉鴻訓並為禮部尚書兼東閣大學士預機務帝以施鳯來輩皆忠賢所用不足倚詔廷推閣臣倣古枚卜典召九卿科道入乾清宫貯名金甌焚香肅拜以次探之得龍錫標宗道景辰輔臣以天下多故請益一二人復得道登鴻訓並命入閣質實錢龍錫字稚文松江華亭人李標字汝立髙邑人來宗道蕭山人黃道登吳江人劉鴻訓字默成長山人追復熹宗成妃李氏裕妃張氏封號客魏肆惡日幽成妃别宫不死斥為宫人裕妃幽别宮絶飲食而死至是俱追復封號客氏及魏良卿侯國興等伏誅先是熹宗崩客氏將出外宅氏于五更赴梓宫前出一小函用黃色龍袱包裹皆熹宗胎髮痘痂及纍年落齒剃髮痛哭焚化而去及是詔赴浣衣局掠死籍其家良卿國興與客光先等皆棄市家屬無少長皆斬嬰孩赴市有盹睡未醒者人以為慘毒之報莫不快之方客氏之籍也于其家得宮女妊身者八人蓋將效吕不韋所為帝大怒命悉笞殺之御定資治通鑑綱目三編卷三十三
