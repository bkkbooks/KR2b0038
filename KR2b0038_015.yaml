body:
  text: 起甲子明英宗正統九年盡己巳明英宗正統十四年凡六年甲子九年春正月遣成國公朱勇等擊烏梁海王振言于帝曰三衛雖鍚為朝貢而數冦邊宜討之乃命朱勇出喜峯口著督馬亮出劉家口興安伯徐出界嶺口都督陳懷出古北口各同太監錢僧保曹吉祥劉永誠等率精兵四萬人分勦之已而諸將皆捷勇奏敗敵于富峪川亨奏敗敵于土河懷奏敗敵于虎頭山亮奏敗敵于黑山然俱無大功捕其擾邊者曰所掠人畜而已兵部尚書徐晞劾勇等不㑹訪軍深入遽旋師宜治罪命宥之尋論功加勇太保進亨興安侯封亮招逺伯懷平鄉伯諸將士並升賞有差其後巡邊者多以斬擊邀功由是三衛積怨遂導衛喇特入寇質實劉家口在永平府遷安縣東北有關舊為出大寧要路界嶺口在永平府撫寧縣北舊有闕城土河在今喀喇沁右翼東南一百八十里虎頭山在故大寧城北黑山方輿紀要在朵顔東境朱勇能之子馬亮淇縣人徐亨祥之孫曹吉祥灤州人劉永誠永樂時以內官為偏將纍從北征後監鎮甘凉軍三月帝詣國子監行釋奠禮以新作國子監成也祭酒李時勉當進講㑹久病及升堂講尚書辭旨凊朗帝悅賜豫有加時勉為祭酒六年列格致誠正四號訓勵甚切崇亷恥抑奔競别賢否示勸懲諸生督令讀書燈大達旦吟聲不絶人才盛于昔時英國公張輔暨諸侯伯奏願偕詣國子監聽講帝命以三月三日往時勉升師席諸生以次立講五經各一章畢事設酒饌諸侯伯讓曰受教之地當就諸生列坐惟輔與抗禮諸生歌鹿鳴之詩賓主雍雍盡暮散去人稱為太平盛事少師華蓋殿大學士楊士奇卒士奇公正持大體雅善知人好推轂寒士所薦逹有初未識面者于謙周忱况鍾之屬皆用士竒薦居官至一二十年亷能冠天下為世名臣帝初即位凡所建白無不行及王振用事擅作威福士竒與楊溥依違其問無所救正士竒既耄子稷傲很嘗侵暴殺人或告士竒稷乃訐告者私事誑士竒士竒輒信稷稷惡日甚士竒不得聞於是言官交章劾稷朝議不即加法封其狀示士竒復有人發稷朴虐事遂下之理士竒已老疾在告帝恐傷其意降詔慰勉士竒感泣憂不能起至是遂卒年八十贈太師諡文貞後數月稷瘐死獄中次子􅀈以廕補尚寶丞附初士竒言衛喇特漸强將為邊患邊軍缺焉請于近太僕寺關領西畨質馬悉給之士竒殁未幾有土木之難識者思其言質實土木驛堡在今宣化府懷來縣西二十五里西至保安州四十里為往來孔道本名統漢鎮唐初高開道據懷戎時所置後訛為土木明永樂初置堡夏四月以翰林學士陳循入內閣預機務初延議天下吏民建言章奏皆三楊主之至是榮士竒已卒循及曹鼐馬愈在內閣禮部援故事請帝以楊漙老宜優間令循等預議于是循與鼐愈遂皆參决質實陳循字德遵泰和人秋七月下駙馬都尉石璟于獄璟詈其家奄王振惡賤已同類下璟獄質實石璟昌黎人尚宣宗女順德公主免河南被災稅糧免開封衛輝南陽河南懷慶彰德等府所屬去年被災糧三十萬三千餘石閏七月復開福建浙江銀場浙福之交山溪深奐故多銀場洪武末年定嵗課永樂及宣德間增之地力竭民不堪帝初即位詔封坑冶福建參政宋彰浙江參政俞士悅以盜礦日熾言開銀場則利歸于上而盜無所容下三司議浙江按寨使軒輗奏曰復開銀場雖一時利然凡百器用皆出民問恐有司橫加科人心搖動其患尤深為今之計莫若揮官典守嚴加禁捕盜白衰息朝廷是挽言得止至是礦盜葉宗留及陳鐖胡等聚衆至數千盜福安礦肆行劫掠參議竺淵往捕之被殺死于是刑科給事中陳傅復請開礦中官及言利諸臣爭和之乃命户部侍郎王質往經理定歲課福建銀二萬一千餘兩浙江銀四萬一千餘兩雖比宣德時減半已十倍洪武時官屬供億資較課銀尚過之日是民困而盜益衆質實明實録洪武中福建藏課二千六百七十餘兩浙江二千八百七十餘兩永樂中福建增課三萬二千八百餘兩浙江八萬二千七十餘兩宣德中福建增課四萬二百七十餘兩浙江九萬四千四十餘兩福安宋析長溪置福安縣明屬福寧州今屬届寧府宋彰交址人彰與中官多故舊侵漁萬計案明史丁瑄傳作宋新與明實録異俞士忱長洲人軒輗字惟行鹿邑人竺淵奉化人陳傅閩縣人王質大和人葉宗留青田人陳鑑胡麗水人發明聚烏合亡命之侣為徒手攘利之舉此即奸民之尤者及其未熾而剪滅之惟恐不速逮盜勢日張乃欲開銀場而使盜無所容此猶抱薪救火也幸而從軒輗奏停止而所云嚴加禁捕者有司又不實力奉行徒為文具致葉宗留肆行劫掠尋至戕害參議尚不痛加勦捕以靖亂階而轉踵前轍議仍開礦以弭其變政治之顛倒紕繆莫此為甚厥後屢興大師合數省兵力聲討無功延至景泰初年始得平戢涓涓不息流為江河可不慎歟雷震奉先殿震殿鴟吻八月免陜西被災稅糧免糧四十八萬六千石有竒敕諸將嚴邊備額森充狡桀驁北部皆服屬惟烏梁海未附額森屢擊破之又結婚沙州赤斤諸衛脅制哈密巡視陜西都部史陳鎰以聞帝敕諸將嚴為備九月命王驥陳鎰經理西北邊防質實陳鎰字有戒吳縣人冬十月丙午朔日有食之戍御史李儼于鐵嶺衛儼在光祿寺監收祭物王振過之怒其應對不跪下錦衣衛獄謫戍之時振以義子馬順掌鎮撫司官無大小悉送順考訊戕害甚衆順大通賄賂車馬冠蓋其門如市乙丑十年春正月磔錦衣衛卒王永王振專恣日甚朝臣無敢言者永心不平乃數振罪惡為書揭之通衢又揭于振姪王山家為緝事者所獲刑部坐以妖言當斬詔即磔之不必覆奏二月京師地震免陜西逋賦帝如天夀山壬申車駕發京師三月甲戌朔謁陵丙子還宮自是嵗三月謁祭以為常夏四月甲辰朔日有食之六月振陜西饑免田租三之一秋七月下霸州知州張需于獄戍之需見民游食者衆每里置簿列男女大小口數計具耕桑樹畜為設方略服則躬自巡視有不如教者罰之民皆勤力州以饒富有中官牧馬擾民者需笞其校卒中官詣于王振執下錦衣衛獄箠楚幾死詔戍邊並坐需舉主順天府丞王鐸罷為民質實霸州後周置明屬順天府今因之王鐸池州人發明振之為毒甚矣天下恐不得良有司如張需者禁游民設方略俾百姓勤力閭里富饒此真以實心牧民者乃以禁責擾民校卒傾陷戍邊且牽連妄坐不問是非逞閹黨而肆福威擾生民而賊善政天下事尚可問哉八月免湖廣旱災秋糧免蘇松嘉湖十四府州水災秋糧冬十月以兵部侍郎苖衷工部侍郎高穀入內閣預機務衷穀與焉愈曹鼐皆楊士竒所薦及是四人並在內閣而鼐尤通達政體閣務多取决焉丙寅十一年春正月豫太監王振等錦衣衛世職振若林世製指揮僉事錢僧保姪亮高讓姪玉當吉祥弟整蔡忠姪軍俱世襲副千户發明明季之寵任宦宦濫竊名器無所不至而書豫世襲者始于王振後極于魏忠賢夫賞延於世為國家酬庸褒德莫大之與尋常勳舊且不得輕與璫豎何物而竟邀此殊錫乎既施於振之從子而因及其同類私人幾似錦衣一職為若輩所得世據之官卒至厚毐族誅小人之自為身家計者以稔其禍哉二月異氣見奉天華蓋二殿異氣見于華蓋殿金頂及奉天殿鴟吻之上帝遣官祭告天地詔恤刑獄三月下户部尚書王佐刑部尚書金濓右都御史陳鎰等于獄尋釋之安鄉伯張安與弟爭祿詔逮治法司與户部相諉言官劾佐及濓鎰等俱下錦衣衛獄數日釋之質實金濓字宗瀚山陽人張安壽州人安鄉伯興之子遣御史桞華討礦盜福建銀場既開盜礦者益衆葉宗留為賊首自稱大王帝遣户部郎中楊諶招撫浙江參議吳升言福建礦盜出沒浙江江西廣東諸境東捕則西逃南搜則北竄若合而為一其患不小宜特遣朝臣專董勒捕乃命栁華督福建浙江江西軍討之華至福建遣兵分捕羣盜令村聚皆置隘門望樓編民為甲擇其豪為長使自置兵器督轄巡夫盜稍戢而宗留劫掠如故質實栁華吳縣人吳升懷寧人夏六月京師地震丙辰夜震有聲秋七月增市稅先是以于謙言天下稅課司局課鈔不及三萬貫者悉罷之領其稅于有司上下稱便至是户部尚書王佐諸增稅課置彰義門官房收商稅課鈔天下稅課司一萬五千貫以上者俱諸復設征榷漸繁質實稅課司局明史食貨志京城諸門及各府州縣市集凡四百餘所其後以次裁併正統初于謙奏革直省稅課司局領其稅于有司罷濟寧徐州及南京上新河船料鈔移漷縣鈔關于河西務船料當輸六十貫者减為二十貫商民稱便少保武英殿大學士楊溥卒溥入內閣後楊士竒楊榮二十餘年及卒亦最在後溥質直亷靜無城府性恭謹每入朝循壔而走諸大臣論事爭可否或至違言溥平心處之諸大臣皆歎服時謂士竒有學行榮有才識溥有雅操皆人所不及云比榮士竒相繼卒在閣者皆後進望輕溥孤立王振益恣橫溥卒年七十五贈太師諡文定官其孫夀尚寶司丞三楊俱卒後中外大權一歸王振矣八月謫大理寺丞羅綺戍邉先是綺參贊寧夏軍務嘗以爭劾指揮任信陳斌二人皆王振黨至是信斌訐綺不法事下總兵官黃真覆核真謂綺嘗詈宦官為老奴以激怒振召還京法司擬贖振令改錦衣衛再霸指揮馬順煆鍊成獄謫戍遼東質實羅綺磁州人下吏部尚書王直等于獄尋釋之光祿寺卿奈亨諂事王振擢户部侍郎亨嘗以事干請吏部不行怨郎中趙敏搆之詞連尚書王直侍郎曹義趙新並下獄三法司六科廷鞫論亨斬直義新俱徒帝宥直義奪新亨俸視職如故時行人尚禠言右者刑不上大夫今文武大臣偶因微眚遽陷囹圍事或涉虛旋即復職是今日衣冠之大臣即昨日受辱之囚繫面僚友而統屬官寧能無愧請自今有犯者召至午門大臣㑹問事實則疏其輕重請上裁决不實即奏還其職帝頗然之而惑于王振不能改也褫尋授南京御史時工部郎中王祐亦以諂振擢本部侍郎祐無鬚一日振問之對曰爺無鬚兒安敢有聞者莫不鄙之質實奈亨香河人曹義字子宜句容人尚褫字景福羅山人王佑字廷佐浙江山隂人冬十二月大雨雷電是日壬寅翼日乃止丁邜十二年春三月始命天下學校考取附學生洪武初設學校生員未幾即命增廣不拘額數宣德中定增廣之額京府學六十人在外府學四十人州縣以次減十及是鳯陽府知府楊瓚言民間子弟可造者多請增廣生員毋限額禮部議如瓚請于是諸生日衆初設食廩者謂之廩膳生員增廣者謂之增廣生員仍依洪武宣德時定額以歲科兩試高等者補充之而提學言考校取額外俊秀准令入學者謂之附學生員天下學校之有附學生自是始質實楊瓚蠡縣人免杭嘉湖被災秋糧凡免糧五十一萬五千餘石徙沙州衛之衆于山東永樂初沙州酋長昆濟楞邁珠率衆來歸帝置沙州衛授二人指揮使尋擢邁珠都指揮同知昆濟楞都指揮僉事久之邁珠卒昆濟楞掌衙事進秩都督僉事及帝即位昆濟楞屢為哈密所侵且懼衛喇特見逼率其屬二百餘人走塞下陳饑窘狀詔邊臣發粟濟之令議所處置邊臣請移之苦峪從之自是不復還沙州但遙領其部而已元年又進秩都督同知四年其部衆百三十餘家亡入哈密赤斤亦納其叛人而罕東久駐牧沙州不去昆濟楞屢訴于朝朝廷數敕責諸部多不奉命九年昆濟楞卒長子訥格率其弟恭羅凌戩來朝授訥格都督僉事其弟都指揮使賜敕戒諭既還兄弟乖爭部衆携二甘肅總兵官任禮欲乘其饑窘遷之內地會訥格亦來言請入居肅州禮遂遣使偕訥格先赴沙州撫諭其衆而親率兵隨其後比至訥格意中變陰持兩端其部下多欲奔衛喇特禮進兵迫之收其全部入塞居之甘州凡二百餘户一千二百三十餘人帝命徙之山專居其頭目于東昌平山二衛分其部落為三屯居清平博平二縣于是沙州遂為罕東所據初太祖成祖以次置哈密沙州罕東赤斤四衛于嘉峪關外屏蔽西陲及是沙州先廢而諸衛亦漸不能自立肅州遂多事質實苦峪城在今安西州東南罕東衛在嘉峪關西南明洪武三十年置後廢地在今安西州煌煌縣東南東昌衛明宣德五年建在東昌府城南平山衛明洪武五年建在東昌府治東今東昌設東昌衛及濮州所清平縣隋置元屬德州傳平縣漢置宋徙寃河鎮明並屬東昌府今皆因之嘉峪關在肅州西嘉峪山西麓明洪武初置有城關外即沙漠地昆濟楞舊作困即來邁珠舊作買住訥格舊作喃哥恭羅凌戩舊作克俄羅領占今俱改國子監祭酒李時勉致仕時勉以王振擅柝不能諂事屢疏乞休至是始得命朝臣及國子生出餞都門外者幾三千人鼓樂前導觀者塞途商賈為罷市或逺送登舟俟舟發乃還無不淚下夏四月免蘇松常鎮被災秋糧凡免糧八十八萬四千餘石六月奪英國公張輔田大監喜寧侵輔田宅輔不從寧弟勝帥閻奴毆輔家人妻墮孕死輔訴之帝宥寧勝而戍關奴于邊已而爭嗾青縣知縣奏輔占民田二十頃帝命以田還民而置輔不問輔實未嘗占也時王振視勳戚如奴𨽻諸勳戚亦望塵頓首呼曰翁父惟輔獨與抗禮振亦致敬于輔至是輔既衰老又數為喜寧所侮亦少屈以避禍矣質實青縣宋靑州明改青縣今縣屬天津府喜寧本降番後土木之難又降于額森秋八月庚申朔日有食之九月禮部侍郎兼學士馬愈卒愈端重簡㸃門無私謁論事務寬厚嘗奏天下獄久者多瘐死宜簡使者分道决遣帝納馬邊警方命將而别部使至衆議執之愈言賞善罰惡為治之本波及于善非法乘人之來執之不武帝然之及是卒贈尚書兼學士贈官兼職自愈始冬十一月皇長子生貴妃周氏生是為憲宗皇帝質實貴妃周氏昌平人以大理寺少卿于謙為兵部右侍郎先是謙巡撫山西河南以父憂歸至是起復適革山西河南巡撫官乃有是命以宋彰為福建左布政使彰為福建參政與都指揮僉事鄧安進表至京以萬金饋王振又囑安其疏薦之為吏科所劾帝特允安請遂遷布政使彰扺任後計所費命縣官驗户斂錢民不堪命由是盜賊四起以楊洪為總兵官鎮宣府洪威望素著衛喇特使至托克托布哈及額森皆致書于洪并遺之馬洪開于朝敕令受之而報以禮戊辰十三年春三月復遣王驥征麓州蠻思機發竄匿孟養屢遣使入責謝罪朝廷亦屢敕招諭許以不死然心疑畏終不敢出詔總兵官沐斌討之未幾以糧盡瘴作引還王振以斌師出無功必欲生致思機發犁其巢穴意乃嫌于是復命驥總督軍務都督同知宫聚為平蠻將軍侍郎焦宏督餉統兵十五萬討之質實沐斌字文輝晟之子晟卒斌尚幼嗣爵居京師而以晟弟昻代鎮昻卒斌始之鎮云與宏字克明葉縣人夏四月兩畿山東河南湖廣旱蝗陕西江西水五月禁用銅錢洪武中鈔一貫折錢千文至是止折錢三文帝從御史蔡愈濟言詔交易用錢者以阻鈔論追一萬貫全家戍邊後至天順中乃弛其禁秋七月河決一自新鄉漫曹濮抵東昌衝張秋潰壽張沙灣瓌運道東入海一自榮澤漫原武經祥符南又由陳留厯睢亳入渦口至懷逺界入淮淹地二千餘里壞城垣廬舍溺死男婦不可勝計命工部侍郎王永和往理其事永和至山東後以沙灣未成冬寒停役且言河决自衛輝宜敕河南守臣修塞帝切責之明年三月永和濬黑洋山西灣引其水出太黃寺以資運河修築沙灣堤大半而不敢盡塞置分水閘設三空放水自大清河入海且設分水閘二空于沙灣西岸以泄上流是時河勢分橫溢自沙灣分流而東不専向徐吕于是二洪遂膠淺而臨清以南運道亦益艱阻質實新鄉古鄘國地隋縣明屬衛輝府今因之張秋鎮在東阿縣西南六十里運河所經與夀張陽穀二縣分界明𢎞治七年賜名安平鎮壽張東漢縣金大定中移治竹口鎮十九年復還舊治明洪武初廢尋復置移治王陵店屬兖州府今因之沙灣在夀張縣東南三十里永樂初分黃河支流由此至臨清入衛河渦口在鳯陽府懷逺縣北一里渦水自潁州府䝉城縣流入又東入淮謂之渦口唐李吉甫云濠有渦口之險即此太黃寺隄在開封府境大清河即古清水自泰安府東平州東南戴村壩分泄汶河之水西北流經州城西北至盧家村與七里河㑹古濟汶合流處也又北流經東阿縣西東北流經平陰肥城二縣西北又東北流入濟南長清縣界俗亦呼為璽河王永和字用鄯崑山人發明河自宋至和閭始决大名熙寧問始次澶州河遵而趨遂至梁山濼分為二派一合南清河入于淮一合北清河入于海此黃河入淮之始也明洪武二十四年决原武經聞封南至潁州壽州則全入于淮而黃河故道遂淤永樂九年復疏入故道至是决自滎澤終合并于淮夫隋唐以前河與淮分各自入海宋中葉以後河始合淮明至正統間橫溢至二千餘里子是河盡入淮遂成古今河徒之一大局矣京師蝗是日乙酉朔飛蝗蔽天罷保舉宣德朝及正統初保舉得人最盛後漸奔競徇私者有之教論傅璿給事中余忭御史凃諫屢以為言遂罷之質實傳璿上虞人余忭奉化人凃謙豐城人發明保舉之行也似亦月人之一法然行之既久則奔競開而私謁盛滋弊實繁詔罷之良是也乃說者謂既罷之後進退人材大權一歸王振殊不知振之竊弄威擅柄操豫奪即保舉仍著為令安保振之無意喻色授百司之不希風承旨乎是罷與不罷一也本實先撥尋其枝葉何補耶八月福建賊鄧茂七作亂遣御史丁瑄討之茂七江西人與弟茂八殺人避仇走關之寧化縣依縣豪民陳政景假信義集無賴為衆所推先是福建多礦盜部史桞華往按令編民甲茂七茂八皆為甲長益役屬鄉民其俗佃人輸粟田主例饋少物茂七倡其黨令佃者毋饋而田主自往受粟田主訟于縣縣逺茂七不赴下巡檢追攝茂七拒捕者殺官兵數人上宫聞遣軍三百勦之被殺幾盡巡檢知縣皆遇害茂七遂刑白馬歃血誓衆舉兵反大肆劉掠攻沙縣尤溪進圍延平時政景亦率黨攻汀州推官王得仁擊之先敗被擒送京師斬之獨茂七勢不可制有尤漢壚主蔣福成者亦乘亂集衆與茂七為聲援茂七益猖獗其進圍延平也刷卷御史張海登城諭賊賊曰吾等皆良民苦富民魚肉有司不我直耳乞貰死免三年徭役即解散海以聞帝遣御史丁瑄勦撫而命都督劉聚僉都御史張楷以大軍繼後當是時福建兵衛久弛及茂七倡亂村氓聞風畏死又皆苦布政使宋彰虐政于是相率從茂七為盜衆至數萬都茂七據陳山寨自稱剗平王設官屬攻陷二十餘縣指揮范真指揮彭璽等先後被殺東南震動帝以聚等兵少復命寧陽候陳懋為平夷將軍保定伯梁珤平江伯陳豫副之尚書金濓參贊軍務率京營浙江兵㑹討質實寧化縣本沙縣地唐置黃連縣後敗寧化明屬汀州府沙縣尤溪俱唐置明屬延平府今皆因之陳山察在沙縣西南二十里陳山之麓王得仁名仁以字行新建人丁瑄史傳不詳里系張楷字式之慈溪人梁珤汝陽人銘之子陳豫字立卿合肥人瑄之孫冬十月幸大興隆寺寺王振重修役軍民萬餘人麋帑數十萬既成壯麗甲京師延崇國寺僧主之帝親傳法稱弟子公侯以下趨走如行童馬質實大興隆寺在西長安衛本名慶壽寺金章宗時建元初建二塔一九級一七級正統十三年二月修大興隆寺改賜新額樹牌樓曰第一叢林十月完工嘉靖十四年四月大興隆寺史十五年五月改為講武堂己巳十四年春正月太白晝見二月御史丁瑄擊斬鄧茂七于延平瑄始至先令人賫敕往撫茂七不肯降瑄馳赴沙縣圖之賊首林宗政等萬餘人攻後坪欲立寨瑄令通判倪冕等率衆先據要害而身與都指揮雍野等邀其歸路斬賊二百餘級其渠陳阿巖送京師伏誅及是瑄用沙縣民羅汝先誘賊復攻延平瑄督兵分道衝擊賊大敗遁走指揮劉福遣之遂斬茂七餘賊在陳山寨者聞茂七死復擁其兄子伯孫聚後洋攻劫州縣瑄擒斬其渠林子得鄭永祖等㑹陳懋軍至諸將欲盡殱賊衆恐不可下令招之其黨多降尋進攻賊寨破之伯孫走餘衆潰散懋遣兵勦捕獲伯孫送京師誅之先是張楷等監大軍討賊至建寧頓不進日飲酒賊詩為樂及聞瑄破賊則疾馳至延平攘其功瑄被脅依違具奏劉福心不平欣陳懋奏之詔責瑄具狀楷等皆獲罪瑄有功不問然功亦競不録當是特浙閩盜所在剽掠為民患皆以誅王振為名諸將帥率玩冦而文吏勵民兵拒賊往往多斬獲閩則建寧知府張瑛汀州推官王得仁之屬浙江則金華知府石瑁擒賊蘇才于蘭溪處州知府張佑擊敗劇賊擒斬千餘人于是帝降敕數詰讓諸將諸將無以自解指揮僉事鄧安等因歸咎于前御史栁華擅編夫甲時王振方欲殺朝士威衆因坐華奉詔捕盜聞措置失當致賊益熾遂逮華華時已出為山東副使命仰藥死並籍其家男戍邉婦女沒入浣衣局而宋彰輩以貪虐激變反得長繫尋遇赦謫驛丞天順初猶復官天下咸惡振之橫擅威福而咎朝廷之失刑云質實後洋在延平府沙縣陳山之後通汀州府寧化縣蘭溪唐縣今屬金華府張瑛字彥華浙江建德人擢參政後以逐賊被執死之石瑁應州人張佑舍山人王驥擊思機發再破之思機發遁遂班師驥自騰衝㑹師直扺金沙江賊栅西岸官軍造浮梁濟師拔其栅大破之賊又柵鬼哭山巔驥連破其十餘柵墜溺死者萬計而思機發竟脫去時官軍已踰孟養至孟那海其地在金沙江西去麓川千餘里諸蠻皆震讋曰自古漢人無渡金沙江者今王師至此發豈天威耶驥慮大軍逺涉餽餉不繼謀引還時思機雖遁匿而思任發少子思陸復擁衆據孟飬驥度賊終不可滅乃與思陸約立石金沙江為界表誓曰石爛江枯爾乃得渡思陸亦懼而聽命遂班師四川㑹川衛訓導詹英抗疏劾驥大略謂驥多役民夫舁彩繒散諸土司以邀厚利擅用腐刑詭言進御實充私役師行無紀十五萬人一日起行互相蹂踐每軍負米六斗跋涉山谷自縊者多扺金沙江倣皇不敢渡既渡不敢攻攻而失都指揮路宣翟亨等又多捕魚户為俘以地分木邦𬗟甸掩敗為功奏下法司王振左右之得不問而命英從驥軍自效英知往且獲罪匿不去質實金沙江在孟密司南與唐勒江俱環司治西流入緬甸此江達南海與麗江府之金沙江名固而流異鬼哭山本名鬼窟山在孟養司東極其險峻蠻人據為硬寨俗訛為鬼哭山思陸蠻稱其長曰發時思機發尚在故思陸不稱發思機發脫去後至景泰五年為緬人所執送京師誅之詹英貴州人發明王驥屢討麓川以師老而還議者咎之㑹詹英抗疏劾驥所陳罪狀多切中處而以王振左右其間遂不問夫事關軍務下之法司而可以中寢紀綱之謂何且尤可異者英劾驥罪而即令英從驥軍自劾是欲塞人言驥之口而與之英以聽其挫折振之險巇肆毒幾至莫敢誰何而詹英者若隱然知中旨不出于朝廷亦竟匿而不去卒亦未聞以此罪英上下朦朧各行其私意可勝咎哉夏四月礦盜葉宗留為其黨陳鑑胡所殺巡撫浙江大理寺少卿張驥招鑑胡降之鄧茂七之亂宗留鎰胡往附之散掠浙江江西福建諸境參議耿定僉事王晟敗殁于麗水都指揮吳綱禦之建陽都督陳榮與戰玉山皆死監軍僉都御史張楷機永豐知縣鄧顒擊之顒伏兵截殺賊衆大至顒力戰不敵遂被執不屈罵賊死賊勢日熾逺近皆震及茂七誅宗留鑑胡擁衆如故至是以酒色相角鑑胡遂殺宗留自稱大王國號太平建元泰定僞署帥將進圍處州然是時官軍漸集鑑胡亦頗懼驥遣麗水丞丁寧率老人王世昌等齎榜入其寨招之煆胡遂偕其黨出降惟陶得二不就撫入山為亂如故于鑑胡至京法司以首惡不赦請論如法命宥死繫獄後遇赦釋充留守衛軍額森入犯鎰胡乘問亡被獲伏誅質實麗水隋析松陽地置栝蒼縣唐改麗水縣明為處州府治建陽晉析建安縣地置宋改嘉未元復為建陽明屬建寧府玉山唐析常山須紅弋陽三縣地置以懷玉山而名明屬廣信府今皆因之永豐唐析上饒縣北置尋省宋復置明屬廣信府今改廣豐縣仍屬廣信府張驥字仲德安化人耿定和州人王晟鄆城人鄧顒樂昌人死事後贈光祿寺少卿諡忠毅丁寧以招降鑑胡升處州同知王世昌等授巡檢五月命太監金英同法司録囚築壇大理寺英張黃蓋中坐尚書以下左右列坐九卿抑于內官之下遂為永制以翰林侍讀學士張益入內閣預機務益博學强記三楊雅重之及是入直文淵閣質實張益字士謙江寧人福建巡按御史汪澄坐失機棄市并以前御史柴文顯匿賊不奏磔之澄初按福建以茂七亂檄浙江江西會討尋以賊方議降止兵勿進既知賊無降意復趣進兵而賊已不可制浙江巡按御史黃英恐得罪具白澄止兵狀兵部因劾澄失機福建三司亦言賊初起接臣柴文顯匿不奏釀成大患遂俱下獄澄棄市磔文顯籍其家質實汪澄仁和人柴文顯浙江建德人六月旱熒惑入南斗時侍講徐理頗知天文私語其友劉溥曰福不逺矣亟命其妻子南還質實徐珵字元玉後改名有貞吳人南京謹身等殿災是夜雷電大震風雨驟作明日殿基生荆棘高二尺詔修省大赦前少保大學士黃淮卒淮性明果達于治體宣德二年以病乞休父性卒賜葬祭淮詣闕謝值燈時賜遊西苑詔乘肩輿登萬歲山命主會試此歸餞之太液池帝為歌送之英宗立再入朝至是卒年八十三諡文簡秋七月衛喇時分道入寇自正統初以來衛喇特遣使入貢王振以藻飾太平為名賞賚金帛無算凡所請乞亦無不豫已而額森以二千人貢馬號三千振怒其詐令禮部計口給餼虛報者皆不與而所請又僅得立之一額森恚怒遂誘挾諸部分道大舉入寇初額森欲舉兵內犯托克托布哈止之額森弗聽曰汗不為吾當自為其部衆有來歸者言之帝亦不報及是額森遂借核減貢使為兵端托克托布哈以烏梁海寇遼東阿喇知院寇宣府圍赤城别將寇甘肅額森自擁衆從大同入至貓兒莊參將吳浩迎戰敗死西寧侯宋瑛武道伯朱冕都督同知石亨與額森戰于陽和口為監軍太監郭敬所撓瑛冕戰殁亨單騎奔還敬伏革中得免諸邊守將俱逃匿是時廣寧右衛指揮僉事趙忠守鎮城靜堡敵圍堡甚急忠乘城力戰歸語其妻左氏曰若破吾不苟活汝母子當自為計敵攻益急訛言城陷妻與三女皆縊死攻圍凡兩晝夜以堡堅解去守臣上忠全城功擢都督同知贈左氏淑人旌其門曰貞烈質實貓兒莊在大同府陽高縣北一百里有堡明永樂初築陽和口在今陽高縣西北十五里亦名前口其東北二十里有將軍口又東二十里名後口按宋瑛朱冕與額森戰處則後口也廣寧右衛在今錦州府廣寧縣城內西北隅明洪武二十七年置初治大凌河永樂元年徙治于此今發鎮靜堡在今廣寧縣北宋瑛定逺人晟之子尚成寧公主死贈鄆國公諡忠順朱冕沂州人榮之子與瑛俱練兵大同死諡忠慤石亨渭南人阿喇舊作阿剌今改發明按元自順帝北去國號尚存元主殂順昌後阿裕實哩達喇稱宣光特古斯特穆爾稱天元皆子孫承緒繼世稱汗凡南北交兵猶以興復為詞自藍玉深入破其軍特古斯特穆爾偕子天保努欲遁往和林為其臣伊遜岱爾所襲殺部落遂潰五傳至坤特穆爾篡弒相尋不復知有國號矣建文永樂之交郭勒齊篡立稱汗非元種布尼雅實哩繼之亦元逺族且改號稱韃靼其後西部衛拉特有三曰瑪哈穆特曰太平曰巴圖博囉而瑪哈穆特尤强君臣間自相攻殺元後如托克托布哈穆爾格爾䝉古勒克哷青吉斯等皆隨弒隨立置如奕棋跋扈者欲自汗不可不得已而奉之而其主亦皆士元逺支與順帝嫡裔有别今于額森大舉則特書入寇以見國號既改部落并吞正如丐奴在漢頡利在唐凡與中國交兵例宜書寇謹以春秋大一統之義為斷也帝親征命郕王祁鈺居守邊報日數十至王振勸帝親征兵部南書鄺野侍郎于諫力言六師不宜輕出不聽吏部尚書王直率百官力諫曰陛下宜固封疆申號令堅壁清野蓄鋭以待之可圖必勝不必親御六師逺臨塞下况杖暑未退旱氣未回青革不豐水泉猶塞士馬之用未充兵凶戰危臣等以為不可亦不納遂下詔令郕王居守車駕即發京師振及英國公張輔諸公侯伯尚書侍郎以下官軍私屬五十餘萬人從行倉卒就道軍中常夜驚過居庸關羣臣請駐蹕不允至宣府風雨大至邊報益急羣臣交章請留振虓怒成國公朱勇等白事皆滕行聽命尚書王佐鄺野忤振意跪革中至暮不得請欽天監正彭德清振私人也告振曰象緯示警再前恐危乘輿振曰倘有此亦命也學士曹鼐曰臣子不足惜主上繫宗社安危豈可輕進振終不從至陽和見伏尸滿野衆益危懼八月師還潰于土木額森以帝北去是月戊申朔帝至大同王振尚欲北行郭敬密止之始班師振初議從紫荆關道由蔚州邀帝幸其家既恐蹂其鄉禾復改道宣府鄽野再上章請疾驅入關嚴兵為殿不報又詣行殿申請振怒曰腐儒安知兵事再妄言必死野曰我為社稷生靈何得以死懼我振愈怒叱左右掖出之及發宣府額森兵襲軍後恭順侯吳克忠及其弟都督克勤禦之力戰死後軍潰鷂散略盡成國公朱勇永順伯薛綬帥師四萬往援次兒嶺遇伏全軍俱覆辛酉次土木日未晡去懷來僅二十里衆欲入保城中振輜重未至留待之即駐營土木地無水革敵已合圍掘井深二丈餘不得水其南十五里有河已為敵所據人馬饑渴束手不得動敵分道自土木傍麻路口入都指揮郭懋拒戰終夜敵益增明日圍御營不得發額森遣使議和帝詔曹鼐革勃許之敵佯退振據令移營回族問行列已亂敵以徑騎四面蹂躪入大呼解甲投刃者不殺衆裸袒蹈藉死尸蔽塞川野諸宦監宿衛士矢被體如蝟帝與親軍突圍不得出下馬據地坐敵擁之去中官喜寧從振等皆死官軍死傷者數十萬英國公張輔泰寧侯陳瀛駙馬都蔚井源平鄉伯陳懷襄城伯李珍遂安伯陳塤修武伯沈榮都督梁成王貴户部尚書王佐兵部尚書鄺野吏部左侍郎直內閣學士曹鼐刑部右侍郎丁鉉工部右侍郎王永和右副都御黃史鄧棨侍讀學士張益左通政龔全安太常寺少卿養正載慶祖王一居大僕寺少卿劉容尚寶司少卿凌壽給事中包良佐姚銑鮑輝中書舍人俞拱潘澄錢昺監察御史張洪黃裳魏貞夏誠申祐尹竑童存德孫慶林祥鳯郎中齊汪馮學明員外郎王健程思溫程式逯端主事俞鑑張瑭鄭瑄大理左寺副馬預行人司正尹昌行人羅汝墉欽天監夏官正剽信序班李恭石玉等五十餘人皆死帝既入敵營敵以枝尉袁彬來侍額森擁帝至宣府傳諭楊洪羅亨信開門出迎城上人對曰所守者陛下城池日暮不敢奉詔乃復擁帝至大月索金幣廣寧伯劉安都督僉事郭登侍郎沈固給事中孫祥知府霍瑄等出謁伏地慟哭以金二萬餘及宋瑛朱冕內臣郭敬家資進帝以賜額森等是時敵營城西登噂遣壯士劫營迎駕不果額森遂擁帝北行質實按明實録八月戊申朔駕至大同自戊申至辛酉凡十有四日其明日帝北去蓋十有五日壬戍也鷂兒嶺在今宣化府宣化縣東二十里麻峪口在今宣化府保安州之南當龍門南口有堡明洪武二十五年築吳克忠贈邠國公諡壯勇克勤贈遵化伯諡僖敏朱勇進封平陰王諡武愍薛綬本䝉古人其祖薛台洪武中降賜姓遂家于昌平追封永順侯諡武毅張輔追封定典王諡忠烈陳瀛奉州人圭之曽孫死贈寧國公諡恭愍井源邢臺人尚仁宗女嘉興公主追封巨鹿侯諡榮愍陳懷追封平鄉侯諡忠毅李珍和州人贈襄城侯諡悼僖陳塤巴縣人追封遂安侯諡榮懷沈榮滁州人贈修武侯諡僖愍梁成贈任邱伯諡壯勇王貴追封阜城伯諡武僖王佐贈少保諡忠簡鄜野贈少保諡忠肅曹鼐贈少傅尚書兼文淵閣大學士諡文襄後加太傅改諡文忠丁鉉字用濟豐城人贈尚書諡襄愍王永和贈尚書諡襄敏鄧榮字孟擴南城人贈右都御史諡襄敏張益贈翰林學士諡文僖龔全安蘭溪人贈通政使黃養正名䝉以字行瑞安人贈木寺卿戴慶祖溧陽人贈本寺卿王一居上元人贈本寺卿包良佐字克忠慈溪人姚銑候官人鮑輝字淑大浙江平陽人張洪安福人黃裳字元吉曲江人魏貞懷逺人申祐字天錫貴州婺川人尹竑字太和巴人童存德字居敬蘭溪人孫慶安州人林祥鳯字鳴臯莆田人齊汪字源澄天台人程思溫婺源人程式常熟人逯端仁和人俞鑑字元吉桐盧人張瑭字廷玉慈溪人鄭瑄濟寧人尹昌吉水人羅如墉字本崇廬陵人劉容梁成王貴凌壽俞拱潘澄錢昺夏誠馮擎明王健馬預劉信李恭石玉等里屋悉無考袁彬字文質江西新昌人劉安宿遷人榮之子郭登字元登濠人英之孫沈固丹陽人孫祥大同人霍瑄鳯翔人賽堪舊作賽刋達通舊作大同今俱改皇太后命郕王監國帝入敵營之明日命袁彬作書遣千户梁貴齎以示懷來守臣言被留狀且索金帛守臣送至京師以是夜三鼓從西長安門入太后遣使賫金寶文綺載以八騎皇后括宫中物佐之詣額森營請還車駕羣臣聞之聚哭于朝議戰守時京師疲卒羸馬不滿十萬人情􅍅􅍅侍講徐珵大言曰驗之星象稽之天數天命已去惟南遷可以紓難尚書胡濙不可曰文皇定陵寢于此示子孫不拔之計也侍郎于謙厲聲曰言南遷者可斬也京師天下根本一動則大事去矣獨不見宋南渡乎請速召勤王兵誓以死守學士陳循是謙言力贊之太監興安亦厲聲曰若去陵寢將誰與守金英因叱珵出之太后以問太監李永昌對曰陵寢官闕在兹倉虞府庫百官萬姓在兹辭甚切太后怡議遂定中外始有固志越三日太后遣額森使不得報命郕王總百官大小事俱啓王始行運通州糧入京時議欲焚通州倉以絶寇資㑹厯天巡撫周忱在京言倉米數百萬可充京軍一嵗餉令自往取則立盡何至遂付灰燼于諫以為然王乃令京官及軍有能運通州糧至京者官以腳值給之都御史陳鎰總其事徴兩京河南山東江北軍入衛檢取兩京河南備操軍山東及南京沿海備倭軍江北及北京諸府運糧軍亟赴京師令羣臣直言時事舉人才令諭文武羣臣曰國家為政莫急于聽言用人人臣為國莫先于輔忠薦士爾等國之股肱耳目凡冇治國安民除邪輔正禦災捍患備賊方略並許直言無隱皇太后立皇子見深為皇太子皇太子時年二嵗仍命郕王為輔代總國政撫安天下以于謙為兵部尚書謙上言寇得志要留大駕勢必輕中國長驅而南詣飭諸邊守臣協力防遏京營兵械且盡宜亟分道募民兵令工部繕器甲修戰具分兵九門列營郭外附郭居民皆徙入內文臣如軒輗者宜用為巡撫武臣如石亨楊洪栁漙者宜用為將帥至軍旅之事臣身當之不效則治臣之罪王深納也籍王振家夷其族郕王攝朝御午門左門右都御史陳鎰等慟哭請族誅王振振黨馬順叱羣臣退給事中王竑捽順髮嚙其肉罵曰汝倚振作威今尚敢爾耶與衆共擊之立斃朝班大亂衛卒聲􅍅􅍅王懼欲起于謙直前掖王止請王宣諭百官曰順等罪當死勿論衆乃定謙袍袖為之盡裂尋執王山至令縛赴市磔之振族無少長皆斬籍其家得金銀六十餘庫玉盤百珊瑚髙六七尺者二十株他珍玩無算已而郭敬自大同逃歸亦籍其家下獄錮之方于謙之止王諭衆也既定退出左掖門吏部尚書王直最篤老執謙手曰國家正賴公耳今日雖百王直何能為于是朝廷益倚重謙謙亦毅然以社稷安危為己任質實下門左掖門春明夢餘録紫禁城門凡八曰承天門曰端門曰午門東曰左掖門西曰右掖門再東曰東華門再西曰西華門胸北曰元武門王竑字公度其先江夏人祖戍河州遂著籍封楊洪為昌平伯仍鎮宣府額森以帝命誘洪開門者三洪皆不聼又令帝為書遣洪洪封上之王遣使報洪曰此書僞也自今有書悉拒毋受于是洪一意堅守以羅通為兵部員外郎提督守備居庸關初通自交趾還改户部員外郎出理宣府軍餉繼遷兵部郎中從尚書王驥整飭甘肅邊務以事謫廣西容山閘官已調廣東東莞河泊所官及是于謙薦之遂復以員外郎守備居庸通上言開敵送駕回京恐因之入寇大小關口宜各增兵口凡三十有六可通人馬者七宜各增人千可通人不可通馬者二十九宜各增人百仍命大將一人統兵三萬分駐十營于關外從之通尋進郎中又擢副都御史質實容山在梧州府容縣西北二十五里東莞番昺地晉置寶安縣唐改東莞明屬廣州府今因之月晝明是月辛未月晝見與日並明壬申癸酉夜天嗚有聲如㵼水召前大理寺少卿薛瑄用給事中程信薦乃召為大理寺丞質實程信字彥實休寧人以翰林院修撰商輅彭時入內閣預機務以陳循高毅薦也彭時以繼母喪乞終制不許質實商輅字宏載淳安人舉鄉試第一正統十年進士會試殿試皆第一終明之世三試第一者輅一人而已彭時字統道安福人九月廣寧伯劉安以罪下獄安以額森欲與帝結姻啓王王切責之尋自大同馳至京師言帝已進已為侯廷臣劾安擅離守地自加僕爵宜正與刑王令禁錮之時雲南鹽課提舉司吏目胡仲論坐事入都奏言今日之事不可屈者有七萬乘之主壻于寇敵此不可屈者一也敵假議和使我無備二也和親之後驕尊自大三也索我金帛使我坐困四也以送駕為名乘機入犯五也逼上手詔誘取邊城六也欲求山後之地七也七者稍從其一則大事去矣今宜亟命大同宣府守將固守城池整肅軍伍使敵不敢輕進果其送駕還京密敕楬洪邀其歸路石亨據其險既俊駕至關堅聞勿出則戰無不勝而聖駕得還矣若不戰而和非計之得也事下禮部議行之皇太后命郕王即位廷臣合辭請太后曰車駕北狩皇太子幼冲古云國有長君社稷之福請定大計以安宗社太后允之羣臣以太后旨告王王驚讓再三遜歸郕邸羣臣復固請于謙曰臣等誠憂國家非為私計㑹都指揮嶽謙使衛喇特還口傳帝旨以王長臣賢令繼統以奉祭祀王始受命癸未即位以明年為景泰元年遙尊帝為太上皇帝尊帝為太上皇帝頒詔大赦書諭諸王巡撫山西副都御史朱鑑請罷內官監軍不從敬上言竊見王振亂天下江南寇發俱以誅振為名夫事歸朝廷則治歸宦官則亂况今額森詭詐百端往來覘伺宜專將帥事權悉罷監軍中貴重懸賞格鼓勸義旅庶大駕可還敵兵自退帝雖嘉納不能從也已而山東布政使裴綸言山東既有巡撫又設內官鎮守有司供應以一科十實為擾民請下廷議凡內地已有巡撫者鎮守內官悉召還京疏入責綸陳狀綸服罪乃巳時臨洮府同知田晹聽選知縣單宇陜西舉人假堅工部辦事吏徐鎮俱上言詣召還監軍鎮守中官詔以為祖宗舊制不可更皆不納其後南京軍匠餘丁華敏上書言宦官十害略曰內官家積金銀珠玉動以萬計從何而至非內盜府藏即下朘民膏害一也怙勢矜寵占公侯邸含興作工役勞擾軍民害二也家人外親皆市井無賴縱橫豪悍任意為奸納粟補官貴賤淆雜害三也建造佛寺耗費不資營一己之私破萬家之産害四也廣置田莊不入糧稅寄户府縣不受征徭阡陌聨亘而民無立錐害五也家人中鹽虛占引數轉售他人倍支巨萬壞國家之法奪商人之利害六也奏求塌房邀接商旅恃强賖買經歲不還行賈坐敵莫敢誰何害匕也賣放軍匠俾辦月錢致內府乏人工役煩重捶楚不堪害八也買置物料以一科十虧官損民害九也監工所至非法酷刑軍匠塗炭害十也事下禮部寢不行質實裴綸監利人發明議罷置監軍于土木既潰之後已為亡羊補牢景帝目擊閹寺之敗裂至此義當王振籍家夷族之後乘機因勢改弦而更張之易如反掌乃始則嘉納而不能從繼則以祖制而不敢易至十害之陳言皆痛切亦止下部議而卒不行豈真積重難返歟前車不鑒是後車又當覆也可慨也夫減浙江福建銀場課帝以浙閩銀場嵗課重為民困乃詔減其額尋命封閉之以郭登為總兵官鎮大同先是登以都督僉事充參將佐劉安鎮守大同時大同軍士多戰死壁壘蕭條城門畫閉人心􅍅􅍅登慷慨奮勵修城堞繕器械拊循士卒弔死問傷親為裹創傅藥曰吾誓與此城存亡不令諸君獨死也帝監固進都督同知充副總兵及是代劉安為總兵官登萬五初蒞鎮士卒堪戰者才數百馬百餘匹不數年馬至千精卒數萬大同兵遂為天下最以楊信民為僉都御史討廣東賊黃蕭養蕭養以行劫被獲繫都司獄獄甲重囚皆山海巨盜蕭養密與結乘問殺出威喜諾行賄獄吏飲酒携物出入自如禁益疏縱一日潛使人納斧飯中以入伏其黨于外至夜與囚百七十人皆破械出劫軍器局收兵仗嘯聚海濱旬日間衆至萬餘人進圍廣州總兵官張安敗死指揮僉事王清被殺圍三月不解將士戰輒敗禁民出入樵采以絶卿民避賊來者拒不納多為賊所害民益愁苦于是從賊者益衆時信民方以于謙薦守備白羊口廣東人官京師者上章乞信民乃以信民為僉都御史巡撫其地信民先為廣東參議有惠政士民聞其來皆喜信民至開城門發倉廩刻木鍥給民得出入賊見木鍥曰此楊公所給也不敢傷避賊者悉收保民若更生信民益厲甲兵多方招撫降者日至乃使使持檄入賊營諭以恩信蕭養曰得楊公一言死無憾尅日請見信民單車詣之濠與語賊黨望見歡曰果楊公也爭羅拜泣下蕭養且降而朝廷以都督同知董興為左副總兵侍郎孟鑑贊理軍務徵江西兩廣兵㑹勦明年二月興至廣州賊忽中變逾月信民暴卒軍士聚哭城中皆綺素賊聞之亦泣曰楊公死吾屬無歸路矣益復大掠聚舟千餘艘勢甚熾諸將以徵兵未集請濟師有天文生馬軾者從興在軍中謂興曰廣民延頸久矣所徴狼兵驍悍往擊猶拉朽耳興從之進兵奮擊殺溺死者甚衆餘多就撫蕭養中流矢死函首以獻賊黨皆伏誅質實楊信民名誠以字行浙江新昌人董興長垣人孟鑑字克明博野人貴蕭養南海人冬十月額森奉上皇至大同遂入紫荆關先是都指揮僉事季鐸奉皇太后命詣上皇所告帝即位及立皇太子鐸還帝復命鐸奉書上皇並致書額森言即位之故額森以帝立㑹衆議欲大舉入寇帝必南遷大都可有也叛閹喜寧初從上皇北狩遂附額森為問謀盡以中國虛實告之教額森奉上皇至邊脅諸將開關召總兵鎮守官出見則留之可以得志額森以為然乃詭言奉上皇還京至大同總兵官郭登不納遂由陽和進陷白羊口守將遁守備通政司謝澤督兵扼山口大風揚沙不辨人馬或請移他關避賊澤不可賊至兵潰澤厲聲叱賊遂被殺賊扺紫判關喜寧與額森弟逹通王夾攻關城守備都御史孫祥都指揮韓青戰死敵遂入關長驅而東質實謝澤上虞人詔諸王遣兵入衛時監生練綱條八事一曰謹天變二曰急先務三曰軍法四曰布思澤五日廣言路六日屏奸邪七曰公薦舉八曰察羣吏大要謂中興之業轉敗為成因請京軍堅守親王大舉入援納之質實練綱字從道長洲人尋授御史以于謙提督各營軍馬詔諸將皆受謙節制都指揮而下不用命者先斬以徇然後奏閲京師戒嚴廷議禦敵之䇿石亨請毋出師苐堅壁以老之于謙曰敵張甚矣如此則示弱令敵益輕我乃即分遣諸將帥師二十二萬列陳九門外謙自與亨帥副總兵范廣等陳德勝門當額森悉閉諸城門絶士卒返顧下令臨陳將不顧軍先退者斬其將軍不顧將先退者後隊斬前隊于是將士知必死皆肯用命質實分遣諸將列陳九門明實録總兵官武清伯石亨陳于德勝門都督陶瑾陳于安定門廣寧伯劉安陳于東直門武進伯子朱瑛陳于朝陽門都督劉聚陳于西直門副總兵顧興祖陳于阜成門都督指揮李端陳于正陽門都督劉得新陳于崇文門都指揮楊節陳于宣武門皆受石亨節制京城九門南曰正陽南之左曰崇文南之右曰宣武北之東曰安定北之西曰德勝東之北曰東直東之南曰朝陽西之北曰西直西之南曰阜成范廣遼東人詔宣府遼東總兵官山東山西河南陜西巡撫皆入援大臣有奏留邊將守京師者兵科給事中葉盛言今日之事邊關為急獨石馬營不棄師何以陷土木紫荆白羊不破冦何以薄都城即此而觀邊關不固則京城雖守不遇保九門而已宜急固守宣府居庸為便時總兵官等皆率兵入衛邊境人心惶懼帝從盛言入援者旋遣其留者以别將代之質實馬營堡在赤城縣西北六十里元為靈州之大同猫兒峪明宣德七年築堡葉盛字興中崑山人額森犯京師于謙督諸將擊却之額森自紫荆開奉上皇遇易州至良鄉父老進茶果羊酒進次盧溝橋園官進果上皇作書三一奉皇太后一致帝一諭文武羣臣額森列陳至西直門上皇止德勝門外是日都督高禮毛福夀敗敵彰義門北殺數百人奪還所掠千餘口明日額森擁上皇登土城喜寧嗾額森邀大臣迎駕帝以通政司參議王復為右通政中書舍人趙榮為太常少卿出城朝見喜寧又嗾額森以二人官小邀于謙石亨胡濙王直出見索金帛萬萬計復榮不得見上皇而還廷臣欲議和遣人至軍中問謙謙曰今日止知有軍旅他非所敢聞已而額森遣騎窺德勝門謙亨設伏空舍令數騎誘敵敵遂以萬騎來薄伏兵出范廣發火器擊之額森弟博囉平章茂諾海中炮死敵轉至西直門都督孫鏜斬其前鋒數人逐之敵益兵圍鏜鏜力戰不解會石亨分兵至敵引退欲還土城居民皆升屋呼號爭投磚石擊敵囂聲動地王􅎫毛福夀亦來援敵遙見旗幟不敢復前額森初輕中國既至相持五日邀請既不應戰又輒不利其别部攻居庸者五萬㑹天大寒羅通汲水灌城氷堅不得近七日敵遁走通追擊之三戰三捷斬獲無算額森氣大沮喪又聞勤王師且至乃夜拔營由良鄉而西大掠所過州縣仍擁上皇北去帝以謙亨功大進封亨武清侯加謙少保謙固辭不允敵之退也焚毀長獻景三陵寢殿而餘寇之未出關者分屯畿內四出剽掠諸降人亦乘開並起帝以昌平伯楊洪充總兵官帥孫鏜范廣討捕之遣官復修三陵寢質實盧溝橋在宛平縣西南三十里盧溝河上金大定二十九年以盧溝河流湍急命建石橋明昌三年成名曰廣利明正統九年修城本朝康熙元年重修土城在德勝門西北亦名土關即古薊門遣址亦謂之薊邱毛福壽祥符人王復字初陽固安人趙榮字孟仁其先西域人後家閩縣孫鏜字振逺東勝州人博囉舊作孛羅茂諾海舊作卯那孩今改詔止勤王兵冦既退出紫荆關因詔止各藩府各鎮勤王兵衛喇特托克托布哈遣使入貢時衛喇特君臣鼎立額森專國兵最多托克托布哈雖為汗兵較少阿喇知院兵又少三人外親內疏其合衆南犯利多歸額森而害則圴受至是托克托布哈遣使入貢帝從胡濙王貢等議厚賞賜以間之十一月修沿邊關隘時顧興祖劉安劉聚等坐罪落職兵部以缺官巡關乃復起用以興祖為左軍都督同知安為右軍都督同知聚為中軍都督僉事修塞沿邊關隘上皇至衛喇特額森以上皇至老營惟袁彬哈銘從初上皇入敵營之夕額森有異志㑹雷震死其所乘馬而上皇寢幄復有異彩乃止及是上皇所居毳帳每夜有赤光奕奕統其上若龍蟠額森見之大驚異尋欲以妹進上皇上皇却之愈敬服自是五七日必進宴置酒為壽稽首行君臣禮上皇在迤北所居止毳悵敵幃旁列一車一馬以備轉徙而已袁彬周旋患難未當違忤夜則與上皇同寢天寒甚恆以脅溫足質實哈銘䝉古人幼從其父為過事至是亦侍上上宣諭額森嘗使銘額森輩有陳請亦銘為轉達以左都督朱謙鎮宣府僉都御史王竑鎮居庸關先是楊洪奉詔入援宣府人心危懼欲棄城走都御史羅亨信仗劍軍門諭止之衆始定至是學士陳循以洪善戰請帥所部留京羅通曉暢兵事請亦召還參洪軍務帝從之于謙言宣府京師之藩籬居庸京師之門户今洪既留京通復召還宜更選重臣鎮守宣府乃以朱謙鎮守紀廣楊俊副之王竑及夏忠魯瑄守居庸關質實朱謙夏邑人楊俊洪之子十二月尊皇太后為上聖皇太后宣宗后孫氏英宗立尊為皇太后至是太后命郕王即位尊為上聖皇太后以王驥充總兵官討貴州叛苖初驥自麓川還㑹湖廣貴州諸苗所在蜂起圍平越清平諸衛貴州東路閉驥至民遮道訴驥曰吾定命征麓川不受命討苗也去之軍無紀律苗前後截擊死亡數萬比至武昌詔還軍討苖㑹土木難作羣臣劾王振兼及驥朝議以驥方在軍且倚之平苖置弗問至是苗益熾命驥佩平蠻將軍印充總兵官討之質實平越元為平月長官司明洪武十四年改平越衛萬厯二十七年分播州地置府于衛城內清平明初置清平衛後分衛地置清平縣屬都勻府今並因之尊生母賢妃吳氏為皇太后立妃汪氏為皇后吳太后帝生母也宣德三年封賢妃至是尊為皇太后汪后正統十年册為郕王妃至是册為皇后質寶皇太后吳氏丹徒人皇后汪氏順天人上皇后錢氏徙居仁壽宫帝北狩后傾中宫資佐迎駕夜哀泣籲天倦即卧地損一股以哭泣復損一目至是徙居别宫質實仁壽宫在奉先殿束北履順蹈和二門之內彗星見丙辰彗星見至乙亥凡二十日始滅額森犯寧夏喜寧勒額森西犯寧夏掠苑馬直趨江表居上皇南京袁彬謂上皇曰天寒道逺陛下又不能騎徒取凍饑且至彼而諸將不納奈何額森聞之怒欲殺彬上皇力解乃止額森遂自冦寧夏掠人畜期月始退仍留數千人于河套時入寧夏為冦質實河套明史地理志大河自寧夏衛東北流過榆林衛北至廢勝州東北乃折而南所謂河套也一統志今為鄂爾多斯地御定資治通鑑綱目三編卷十
