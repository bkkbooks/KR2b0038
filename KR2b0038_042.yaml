body:
  text: 起丁丑明莊烈崇禎十年盡己卯明莊烈崇禎十二年凡三年丁丑十年春正月辛丑朔日有食之賊犯安慶張獻忠既紏羅汝才諸賊自襄陽順流東下烽火達淮揚南京兵部尚書范景文操江都御史王道直總兵官楊御蕃分泛固守安池道副使史可法馳駐太湖扼賊衝賊從間道突安慶石牌口連營百里巡撫張國維告警詔左良玉馬爌劉良佐合兵援之賊轉犯桐城掠四境知縣陳爾銘嬰城守賊走廬江犯潛山可法與左良玉敗之楓香驛三戰皆捷馬爌劉良佐亦屢敗賊于桐城廬州六安賊竄入潛山之天堂寨國維檄良玉搜山良玉不應放兵掠婦女屯舒城月餘竟北去賊乃復出太湖副將潘可大程龍守備陳于玉等率兵四千餘禦之酆家店賊先犯可大營龍等至夾擊之賊多死夜復至中伏亦敗去尋賊衆數萬大至圍數重諸將突擊頗有殺傷可法偕副將許自強馳救扼于賊發大炮遙為聲援諸將亦呼譟突圍會天雨甲重不得出賊四面衝入營將士短兵接戰可大戰死龍引火自焚于王手執大刀左右殺賊傷重力竭北靣叩頭自刎守備詹兆鵬莫是驊詹世龍千户王定逺百户薛自昌王鴻猷武舉陸天猷等皆遇害士卒晚者僅千餘人賊遂分屯其衆于桐城之練潭石井陶沖總兵官牟文綬劉良佐擊敗之挂車鎮賊乃四走獻忠入湖廣是時江北震動與可大等先後殉節者有羅田守將郭金城龍江都司王寅泗州守備陳正亨蘇州衛指揮同知包文逹天堂寨巡檢吳暢春潛山鄉官冮襟楚生員陳貞申義民張清雅陳廷選江之璞蕭縣鄉官任之豪桐城生員尹秋桐吳晉昭左旋左光燦義民姚孫極王夷吾趙之藝陳力均儒士笪光宏等賊黨分擾楚豫隨州知州王燾鄧州知州孫澤盛同知薛應齡上津知縣屠紹臯守備冦士元鄖西知縣劉元伯澠池知縣李遇林廣濟典史魏時光皆以守城死參將范志驃禆將李春貴以捍賊開封死攸縣舉人陳來學蘄水武舉程為常偕邑人徐至蘭蔡巨人胡方壺徐用極沈邱義民王繼東以禦賊死上蔡生員張址曹震南趙應選李思選周奭彭凌碧葛祥生等並以被執罵賊死質實石牌口在懷寧縣西百里上達潛太宿望四縣即宋樊若水試舟處也楓香驛在宿松縣北五十里天堂寨在潛山縣西北一百里天堂山酆家店一名酆坂在宿松縣西三十里練潭鎮在懷寧縣北接桐城縣界石井山在桐城縣西二十里陶沖驛在桐城縣西南四十里挂車鎮在桐城縣西三十里挂車山下攸縣漢置元升州明洪武初復為縣屬長沙府蘄水劉宋置唐移治于浠水縣明屬黃州府今並因之潘可大江寧人程龍歙縣人詹兆鵬婺源人莫是驊詹世龍皆蘇州人王定達鎮江人薛自昌武進人王鴻猷為賊所執鋸齒斷足罵不絶聲死陸王猷宿松人殺賊過當賊臠分其肉死郭金城四川人賊犯羅田率所部五百人戰斬級百餘追至英山賊大集困三日突圍不得出被執脅降不從見殺王寅錢塘人調守泗州陵賊將來犯寅曰賊衆我寡及其未集可破也捲甲疾趨至旴𣅿斬其前鋒一人戰自午至申賊來衆與陳正等陷陳死包文達蘇州人擊賊宿松陷伏死吳暢春漢陽人賊犯潛山練鄉兵禦賊斬獲甚多屢却賊賊再至死守力竭被執不屈自刎死江襟楚官瓊州通判罷歸賊軌之不屈死張清雅據父棺哀泣賊斷其手子超藝年十六求代賊復斫之俱死僕雲濟不食死陳廷選負母謝氏避草間為賊所執請代母死賊殺之而拾其母妻亦殉之任之豪官蘇州府教授罷歸賊𨹸蕭縣殉節死尹秋桐見賊殺其母奮身擊賊被害吳晉昭聚鄉兵捍賊相持十日格鬬死子先璘先􅀈子婦李氏許氏同死王燾字清仲崑山人由教諭歷隨州知州州經羣盜焚掠户不滿千燾訓民兵繕守具土冦李良喬為亂殱減之及流賊奄至燾且守且戰擊斬三百餘人賊攻益力相持二十餘日天大風雪守者多散燾知必敗入署整衣冠自經則焚其署火獨不及燾死所尸直立不仆賊望見駭走已覔州印得之燾所立尺土下事聞贈太常少卿明福王時賜諡烈愍建雙忠祠與同邑蔡懋德並祠孫澤盛掖縣人薛應齡福清人賊陷鄧州同戰死屠紹臯寧國人冦士元上津人有膂力由諸生薦授守備與紹臯守城城陷力戰死李邁林完縣人魏時光南昌人善舞雙刀崇禎九年夏為廣濟典史邑遭殘破長史設排兵三百人委之教練其冬賊據蘄州河口憚時光不敢渡時光益募死士夜襲具營手殺數賊賊不敢逼及是賊大至步卒皆散時光單騎據髙坡又殺賊數人賊環統之靷斷被執不屈死其兄陳于上官却不奏兄憤發病死友人收殮之哭盡哀曰弟為國死兄為弟亡吾獨不能表暴之乎具牘力陳乃奏聞贈廣濟主簿豫恤典范志驟虞城人流賊攻開封奉調督勦戰敗被執不屈死王本朝乾隆四十一年追諡濬大可忠烈程龍陳于詹兆鵬莫是驊詹世龍薛自昌王鴻猷郭金城王寅陳正亨包文達吳暢春范志驃魏時光李春貴烈愍江襟楚王燾孫澤盛屠紹臯冠士元劉元伯李邁林節愍王定逺等並入祠二月我大清下朝鮮大先是我朝鮮攻克義州安州進薄平壤國王李倧遣清往征太宗文其弟覺求和許之既而朝鮮復屢背約隂持兩端我皇帝既受尊號宣諭羣臣皆行三跪九叩禮惟朝鮮使臣羅德憲李廊不拜太宗諭曰朝鮮使臣無禮是皆其國主有意搆怨欲朕先啓釁端戮使臣耳救之勿問尋倧申誠邊臣有棄好修頒書詰備語為我使臣所得以聞因責倧且諭其使臣曰爾王若自知悔罪當送子弟為質不然朕即舉大軍以臨爾境雖悔何及倧卒負固不悛我太宗親統大軍征之先遣大臣馬福塔等率兵三百為賈人裝往圍其國都倧遣將以精兵拒戰悉斬之倧懼率其長子􅓭及官吏遁南漢山城而令次子淏三子㴭攜眷屬竄江華島我大宗大軍徑渡漢江直抵南漢城西駐營岱等齎敕往諭倧環視山城形勢遣户部承政英固爾倧請和未決其國八道兵捲甲赴援皆擊敗之時我軍炮車復至將渡臨津氷已解匆隂翳雨雪交作寒太宗曰甚氷復合遂坦然徑渡此天意也復再四倧稱臣乞降諭書往太宗憐而許之倧猶逡巡不敢出及我偏師以飛船八十攻克江華島王妃暨溴㴭等皆就獲復以敕往諭之倧知妻子被執援兵皆敗南漢旦夕且破乃率羣臣獻上敇印築壇于漢江東岸三田渡太宗親臨受降宥倧前罪為質遂班師國人感悅立碑三田賜宴遣歸國留其子􅓭淏思德焉渡紀鮮之告急也登萊總兵官陳洪範督各鎮舟師方朝大往救方出海朝鮮已下可喜等攻鐵山皮島山東巡清遣孔有德耿仲明尚撫顔繼祖聞于朝請急敇洪範及總兵沈世魁堅守皮島世魁旋戰敗洪範遁入石城島副將金日觀偕諸將楚繼功等相持七晝夜力不支陳歿世魁亦授首皮島遂下副將白登庸降于大清有沈志科者世魁從子也索世魁敇印于監軍副使黃孫茂不與志科怒殺之並殺理餉通判邵啓于時石城諸島雖有殘卒不能成軍朝廷亦不置大師以登萊總兵遙領之而已明年夏兵部尚書楊嗣昌決策盡徙其兵民于寧錦而諸島一空質實朝鮮三田渡碑其銘曰天降霜露載肅載育惟帝則之并布威德師殷殷轟轟如虎如貔西番窮髮暨失北皇帝東征十萬其皇帝孔貉執殳前驅厥靈赫濯既嚴且溫始迷不知伊戚自仁誕降恩言十行昭回帝有明貽如寐覺之我后祇服相率而歸匪惟畏威惟德之德皇帝嘉依澤洽禮優載色載笑爰束干矛何以錫之駿馬輕之皇帝之裘都人士女乃歌乃謳我后言旋賜皇帝班師治我赤子哀我蕩析勸我穡事金甌依舊翠壇維新枯骨再肉寒荄復春有石巍然大江之頭萬載三皇帝之韓安州在嘉山郡之東亦屬平安道南漢山城在熊庥津江南江華島任開州城南海中漢江一名熊津江在國城南十里源出金剛五臺二山合流入海臨津一名楊花渡在漢江之濵朝鮮各道餽餉皆聚于此八道京畿江源黃海全羅慶尚忠清咸鏡平安也三田渡在漢江上遊石城島在寧海縣東一百八十里沈世魁本市儈其女有殊色為毛文龍小妻倚勢橫行島中冒功至副總兵崇禎六年黃龍殉節遂代為總兵官金日觀浦江人以前守馬蘭峪功加都督同知旋進左都督移萊州副總兵殉節後贈特孫進光祿大夫太子太師世廕錦衣副千户建祠黃茂廣昌人楊嗣昌字文弱陜西總督鶴之子孫本朝乾隆四十一年追諡金日觀楚繼功烈愍黃茂節愍三月起楊嗣昌為兵部尚書嗣昌初以兵部侍郎總督宣大山西軍務請開金銀銅錫礦以解散賊黨屢疏陳邊事規畫稱旨帝異其才旋丁父憂復遭繼母喪在藉會尚書張鳯翼卒帝顧廷臣無可任者乃起嗣昌為之嗣昌博涉文史多識先朝故事有口才至是抵京召對帝以為能所奏請無不從曰恨用卿晚嗣昌議大舉平賊以陜西河南湖廣江北官軍為四正責其分勦専防延綏山西山東江南江西四川為六隅責其分防協𠞰謂之十面之綱總督總理二臣隨賊所向征討因議增兵十二萬增餉二百八十萬措餉之䇿有四曰因糧因舊額量加畝輸六合石折銀八錢傷地不與嵗得銀百九十二萬九千有竒曰溢地土田溢原額者核實輸賦嵗得銀四十萬六千有竒曰事例富民輸資為監生曰驛遞前此郵驛裁省之銀以二十萬充餉議上帝下詔有暫纍吾民一年除此腹心大患語改因糧為均輸布告天下尋以賊攻淅川左良玉擁兵不救山西總兵官王忠援河南稱疾不進兵譟而歸嗣昌請還僇失事諸帥以肅軍令遂逮忠及故總兵官張金昌府法司並謫戍惟左良玉以楓香驛破賊功戴罪自贖夏四月以熊文燦為兵部尚書兼都察院右副都御史總理南畿河南山西陜西湖廣四川軍務文燦官閩廣久積資無算厚以珍寶結中外權要謀久鎮嶺南帝未識其為人因遣中使假廣西采辦名往覘之既至文燦甚有贈遣留飲十日中使喜話及中原冦亂文燦方中酒擊案罵曰諸臣誤國耳若文燦往詎令鼠輩至是中使起立曰吾非往廣西采辦也銜上命覘公公信有當世才非公不足辦賊吾今還公旦夕且召文燦出不意悔失言隨言有五難四不可中使曰吾見上自請之若上無所吝即公不得辭矣文燦詞窮應曰諾中使還朝果言于帝初文燦自貴州徙家蘄水與邑人姚明恭為姻妮明恭官詹事與楊嗣昌相善嗣昌握兵柄得帝眷以帝急欲平賊冀得一人自助明恭因薦文燦且曰此有內援可引也嗣昌遂薦之時侍郎王家禎代盧象升討賊己半載矣賊盡鋭趨江北留都震驚家禎未嘗一出中州又不能戰下家丁鼓譟至縱大燒開封西門家禎夜自外歸慰諭犒賞詰旦發往南陽討土冦楊四以去言官爭劾家禎恇怯帝亦以家丁之變心輕之遂命家禎専撫河南而以文燦代家禎為總理文燦拜命即請左良玉所將六千人為己軍而大募粵人及烏蠻精火器者一二千人以自護弓刀甲胄甚整比抵安慶良玉桀驁不受節制其下與粵軍不和大詬文燦不得已遣還南兵然良玉軍實不為用嗣昌言于帝乃以邊將馮舉苗有才兵五千人𨽻焉當是時嗣昌建四正六隅之䇿增兵餉大半期滅賊賊頗懼文燦顧決計招撫刋檄遍懸通都曰心示諸家賊待以不死帝聞之怒嚴旨譙責嗣昌乃曲為之解曰網張十靣必以河南陜西為殺賊之地然陜有李自成惠登相諸劇賊未能勦絶法當驅關東賊不使合而使陜撫扼商雒鄖撫扼鄖襄安撫扼英六鳯撫扼毫頴應撫之軍出靈陜保撫之軍度延津然後總理率邊兵孫文元等車禁旅豫撫率陳永思諸軍并力合勦若關中賊逸出關東則秦督率曹變蛟等出關協擊巡撫不用命立解其兵柄簡一監司代之總兵不用命立奪其帥印簡一副將代之監司副將以下悉以上方鉏從事則人人效力何賊不平乃剋期三月平賊帝可其奏嗣昌復言于帝曰熊文燦甫任事洪承疇七年不效論者繩文燦急而承疇縱寇莫為言帝知嗣昌有意左右之變色曰督理二臣但責成及時平賊奈何以久近藉口嗣昌乃不敢言文燦既持撫議所加餉悉捐以撫賊帝不復詰廷臣亦不敢言之已而滅賊踰期帝令嗣昌察行間功罪嗣昌請削承疇宫保尚書以侍郎行事總兵曹變蛟左光北貶五秩與祖大弼期五月平賊終右文燦置不議而文燦實不知兵謂撫必可恃嗣昌亦隂主之所請無不曲𧾱遂不復言十靣張綢之䇿矣質實王家禎長垣人揚四舞陽劇盜也初四與其黨郭三海侯馭民降于河南巡撫陳必謙尋復叛後南陽同知萬年䇿與監紀推官湯開達諸將左良玉牟文綬等連破四四焚死其黨亦為請將所擒誅云六月溫體仁罷體仁在閣八年流冦躙畿輔擾中原民生日困未嘗建一䇿惟日與善類為仇其所引與同列者皆庸材苟以充位且藉形已長固上寵帝每訪兵餉事輒遜謝曰臣夙以文章待罪禁林上不知其駑下擢至此位盜賊日益衆誠萬死不足塞責顧臣無知但票擬勿欺耳至於兵食之事惟聖明裁決有詆其窺帝旨者體仁言臣票擬多未中窽要每經御筆批改顧服將順不暇詎能窺上旨帝以為撲忠愈親信之官至少師兼太子太師吏部尚書中極殿大學士階左柱國兼支尚書俸恩禮優渥無與比而體仁専務刻核迎合帝意前二年春帝以鳯陽陵寢之變下詔寬恤在獄諸臣吏部以百餘人名上體仁靳之言于帝僅釋十餘人秋決論囚帝再三詰問體仁略無平反陜西華亭知縣徐兆麟涖任甫七日以城陷論死帝頗疑之體仁不為救竟棄市帝憂兵餉急體仁惟倡衆助馬修城而已所上密揭率報可體仁自念排擠者衆恐怨歸已倡言密勿之地不宜宣泄凡閣揭皆不發并不存録閣中冀以滅迹以故所中傷人廷臣不能盡知當國久先後論劾者不可勝計布衣楊光先上書極論其罪至輿櫬待命帝皆不省愈以為孤立斥責言者或張采等倡為復社與東林相應和太倉人陸文聲者輸資為監生求入社不許會體仁亦憾溥方募人劾溥文聲遂詣闕言風俗之弊皆原于士子溥采倡復社亂天下體仁欲興大獄擬嚴旨究治以提學御史倪元珙副使馮元揚不承風旨皆降謫之蘇州推官周之夔坐不謹罷去私計撼復社逄執政意可冀幸復官因溥等把持計典罷職實其所為章下巡撫張國維言之夔去官無與溥事體仁擬旨譙讓國維株連不已者且七年于是姦人張漢儒窺體仁銜東林甚夤緣入其門下相與定密謀乃抗章訐錢謙益瞿式耜居鄉不法體仁從中主持之逮二人下詔獄嚴訊國維及巡按路振飛交章白其寃不聽謙益危甚求解于司禮大監曹化淳化淳故與王安善德謙諡嘗為安作碑文頗為營解漢儒偵知之告體仁體仁密奏帝請並坐化淳罪帝以示化淳化淳懼自請案治乃盡得漢儒等姦狀及體仁密謀獄上帝始悟體仁有黨命漢儒等立枷死體仁佯引疾意帝必慰留及得旨竟放歸體仁方食失匕箸天下聞其去皆快之然體仁雖罷其所推薦張至發薛國觀之徒皆效法體仁蔽賢植黨國事曰壞以至於亡質實楊光先歙人張溥字天如張采字受先皆太倉人倪元珙上虞人馮元揚字爾賡慈溪人周之夔閩人路振飛宇見白曲周人薛國觀韓城人兩畿山西江西大桿秋七月山東河南蝗大飢時四方災祲踵告浙江亦大飢至父子兄弟夫妻相食給事中李汝燦言流賊馮陵以來天下財賦之區已空其半而又遇此亢旱吳楚齊豫之間赤地數千里是所未盡空者殆將盡空矣臣謂斂怨干和皆財用為之也國朝軍屯之制千古稱善自軍額虛而議兵民始不得安其身自屯田廢而議餉農始不得有其食有兵不練兵增則餉益匱有餉不核餉多則兵愈冒比者核實之使四出而掊克屢聞侵漁如故可謂有政事乎若夫輔成君道尤在相臣今乃此瞻彼顧結黨徇私八九年來召災釀變始于端揆積于四海水旱盜賊頻見疊出勢將未己何怪其然帝下下汝璨獄質實李汝璨字用章南昌人以史可法為右僉都御史巡撫安慶廬州太平池州總理熊文璨専主撫賊賊益狂逞盤互江北應天巡撫張國維見賊勢日熾請于朝割安慶廬州太平池州四府别設巡撫遂擢可法任之令兼轄河南之光州光山固始羅田湖廣之蘄州廣濟黃梅江西之德化湖口諸縣提督軍務設額兵萬人安慶之設巡撫自此始也可法甫拜命賊已東陷和州含山定逺六合天長分掠瓜州儀真乘勢犯盱眙縣故無城知縣蔣佳徴豫䇿賊必至訓民為兵設伏要害親率兵往誘賊殱甚衆賊怒環攻之力戰死母聞之亦投繯死在良玉聞江北警頓兵不肯救令河南士大夫合疏留已帝知出良玉意不能奪而賊亦遂自盱眙轉趨河南時河南被賊害者三年矣夾河千里無炊煙關府市集皆虛殘黎伏豐草深林採野穗以食田隴間亂木槎故皆成拱把虎狼千百為羣行道路以故賊無所向則南走鄖襄或東還冦江北可法遣部將汪雲鳯敗賊潛山僉事湯開逺監安廬二郡軍善擊賊從可法東西馳禦賊稍稍避其鋒質實德化五代時楊行密置湖口唐鎮南唐升縣明並屬九江府今因之蔣佳徵灌陽人殉節後部議贈尚寶少卿巡撫御史言佳徴母子忠義宜從優典以植倫常乃建表忠祠并母奉祀湯開逺字仲開主事顯祖子也本朝乾隆四十一年追諡佳徴忠愍八月以劉宇亮傅冠為禮部尚書薛國觀為禮部侍郎兼東閣大學士預機務國觀為人隂鷙溪刻不學少文溫體仁因其素讐東林密薦于帝遂與字亮冠同入閣冠性簡易字亮短小精悍善擊劒居翰林常與家僮角逐為樂素不嗜書館中纂修直講諸事皆不與座主錢士升在閣時力援之竟馴至柄用質實劉宇亮綿竹人傅冠字元甫進賢人冬十月李自成犯四川先是自成在陜偕其黨過天星蝎子塊冦三原官軍不敢出會孫傳庭督曹變蛟諸軍來救連戰七日皆克蝎子塊降自成與過天星奔秦州時傳庭與洪承疇共矢滅賊承疇戰關以西傳庭戰關以東連破賊先後降其渠一條龍鎮世王上山虎等拓養坤聖丗王一翅飛諸賊皆授首小紅狼圍漢中承疇擊走之關中賊勢漸衰而自成窺四川備禦單弱乘間陷寧羌知州周應泰衛指揮徐大行死之遂越七盤關以十萬衆分三道入蜀總兵官侯良柱禦之于綿州衆寡不敵戰殁廣元昭化劔州梓潼江油黎雅青神皆失守劔州知州徐尚卿吏目李英俊舉人楊于鼎昭化知縣王時化鄆縣主簿張應竒金堂典史潘夢科皆死巡撫王維章方守保寧反在外不能禦賊賊進攻成都七日不克乃解去分陷三十餘州縣承疇率變蛟及賀人龍等由沔縣出朝天關馳援山髙道狹士馬飢疲嵗暮抵廣元賊已走還秦變蛟等還軍邀擊斬首五百餘級賊渠號六隊者與大天王混天王爭管王四部連營東犯過天王混天星二部伏階文間獨自成以明年三月自洮州出番地承疇令變蛟人龍追之連戰皆捷斬首六千七百有竒番地乏食賊多死變蛟人龍轉戰千里身不解甲者二十七晝夜餘賊潰入塞祖大弼駐洮州扼戰不力賊乃走入岷州及西和禮縣山中質實照化宋置明屬保寧府今因之梓潼漢縣明屬劔州以𨽻于保寧府今改屬綿州青神西魏青衣後周改青神明屬眉州金堂唐置明屬成都府西和宋置西和州治長道縣元省縣入州明洪武初改州為西和縣屬鞏昌府今皆因之周應泰麻城人徐尚卿南平人知劔州料賊必至集士民泣曰城必不能守若輩速去吾死此衆泣請偕去尚卿不可偕吏目李英俊舉人楊于鼎分陴守閲二日城陷尚卿投環死英俊從之于鼎巷戰殺賊為賊支解死子令青亦同死王時化江陵人張應竒義烏人時士人以殉節聞者于鼎之外有成都貢生顧鼎絃被執不屈死本朝乾隆四十一年追諡侯良柱忠烈徐大行烈愍周應泰徐尚卿王時化節愍餘并入祠以太監曹化淳提督京營時有工部員外駱方璽者窺帝意方任中官上言陛下即位遂置魏忠賢于大僇豈溺情閹豎者不過以外廷無一諸臣可用而借才及之况人臣感激思遇苟知邱報何論外內廷臣處地懸絶自不若宮廷􅉏御效忠倍易凡此內臣邀兹曠典孰不欲棄捐頂踵以酬陛下疏入給事中何楷駁其通內呈身吏部請削方璽籍帝固不欲罪方璽以楷言直不可奪改從薄謫不數月即有化淳提督京營之命復以李明哲提督五軍營杜勳提督神樞營閻思印提督神機營鄭良輔總理京城巡撫于是中官皆布置要地矣質實駱方璽諸暨人發明王振橫而徐晞折節汪直恣而戴縉稱功劉瑾専而張綵焦芳奔走逢迎之恐後逮至魏閹亂政五虎十狗之徒贄導擁戴者尤不可更僕數莊烈手翦忠賢定逆案以掃除閹黨可謂卓矣無何以廷臣不職猥欲參用中官夫天下縱乏才亦何至盡出中官下而方璽乘瑕抵隙遂因此為借才之説以希風旨而貢媚貂璫是即向者徐晞戴縉之故智也何楷紏其呈身通內泃為洞燭姦邪乃不立豫嚴懲而反改從薄壝甚至提督京營之任不旋踵而畀之化淳豈誠有感于方璽之言邪厥後甲申之變化淳實開關延賊以底滅亡所謂目不見其睫者殆莊烈之謂矣十二月黃士俊罷士俊在閣甫餘一載纍加少傅豫告歸戊寅十一年春正月裁南京冗官凡裁八十九員以給廩不足故也二月改河南巡按御史張任學為總兵官任學按河南見羣盜從橫諸將縮胸不敢進慨然曰事不辭難臣職也賊勢如此我輩可雍容坐鎮邪遂上疏極詆諸將請易武階親執干戈為國平賊帝壯之下吏兵二部及都察院議諸臣以文史無改武職者請仍以監軍御史兼總兵事帝不從命授都督僉事為河南總兵官河南舊無總兵左良玉陳永福並以客兵備援勦至是大將特設而麾下無兵兵部乃撥署鎮許定國兵授之使參將羅岱為中軍岱健將屢著戰功任學倚以自強然所隸兵不能當賊之什一賊渠羅汝才馬進忠李萬慶等蹂躙中原民人據塢璧自保者數十賊悉摧破之踞息縣光州磔人投汝水水為赤任學雖矢志擊賊亦不能大創也質實張任學安嶽人御經筵尚書楊嗣昌方庇熊文燦主招撫因于講筵誦孟子善戰服上刑譖帝咈然詰之曰今天下一統非戰國兵爭比羣盜弄兵潢池不能即撲滅奈何為是言嗣昌漸不能對乃召翰詹諸臣顧錫疇等二十餘人問保舉考選孰為得人庶子黃景昉言保舉多私近日考選亦不公推官成勇朱天麟亷能素著乃不能與清華選少詹事黃道周言樹人如樹木須養之數十年近來人才逺不如古况摧殘之後必深加培養既復班又詢之對曰立朝之才存乎心術督師之才存乎形勢先年督撫未諳形勢隨流賊奔走事既不效輒謂兵餉不足其實戚給餉己踰十萬果無冒濫無侵漁可用兵四十萬何煩别籌增兵餉邪時尚書鄭三俊方下吏景昉因請宥三俊帝曰三俊雖清亷何濟又命諸臣各陳所見帝曰言須可行如故講官姚希孟竟欲折漕一年誤矣道周聼未審謂帝將寬三俊念希孟也遂言故輔臣文震孟一生謇直未蒙惟蓋恩天下士生如三俊殁如震孟希孟求其形似未可多得帝以所對失實令回奏再奏再誥凡周道所建白未常得一俞旨然帝自經筵召對後頗知考選未當天麟得改官而三俊以孔貞運揭救旋得釋質實顧鍚疇字九疇崑山人明唐王時殉節稚本朝乾隆四十一年追諡節愍黃景昉字太晉江人成勇字仁有安樂人以進士厯饒州開封歸德推官流賊攻歸擊走之行取入京時變考選例優者得翰林公論首勇及朱天麟而吏部尚書田唯嘉抑之勇得南京吏部主事以去莊烈帝以景昉言親試諸臣天麟得翰林編修而勇以赴南京不與尋用御史塗必泓言授南京御史朱天麟字逰初崑山人亦以進士為饒州推官有惠政貧不能行賂考選已授部曹及臨軒發策乃改官鄭三俊時官刑部尚書會工部錢局有盜穴垣命按主者罪三俊擬輕典莊烈帝大怒禠其官下獄三俊為人端嚴清亮正色立朝故其下吏也時人多惜之三月賀逢聖罷逄聖為人廉靜東修砥行而議論矯僻嘗詆髙攀龍左光斗為言官所劾又與同官張至發交善會太子出閣擇講官至發擯黃道周不與楊廷麟等在選中心不平上章推讓道周至發欲草疏辨謀于逄聖逢聖曰往者道周辭論德疏有文章義氣不如鄭鄤語可籍為口實也遂代為屬藁言鄤杖母明旨煌煌道周自謂不如安可為元良輔疏出時論譁然逢聖亦不自安遂致政去質實楊廷麟字伯祥清江人明唐王時殉節諡本朝乾隆四十一年進忠節夏四月張獻忠偽降總理軍務熊文燦受之先是帝以中原盜熾命京營副總兵孫應元黃得功周遇吉將徑卒萬人討賊頗驍敢善戰甫抵豫大破賊鄭州再破之密縣先後斬首千七百級賊大懼開熊文燦下招降令多欲就之降劉國能者賊中所號闖瑁天者與張獻忠有隙慮為所并又數敗衄遂率先乞撫于隨州頓首文燦前曰愚民陷不義且十載賴公湔洗更生願悉衆入軍籍身𨽻麾下盡死力文燦大喜慰諭之署為守備國能受約束無異志而張獻忠方偽為官軍旗熾欲紿南陽城屯于南關左良玉陳洪範敗賊鄖西旋師過其境疑而急召之獻忠倉皇走官軍追急發兩矢中其肩良玉復揮刀擊之靣流血幾被獲馬馳以免會京營又大破賊于舞陽光山固始四日奏三捷斬首二千九百有竒降其渠馬士秀杜應金于信陽城下獻忠勢孤因襲據穀城以求撫偵陳洪範𨽻文燦為總兵遣間齎重幣獻洪範曰獻忠蒙公大恩得不死公豈惡之邪願率所部降以自效洪範喜為告文燦文燦狃于國能之撫竟受其降巡按御史林鳴球分巡副使王瑞柟與良玉知其偽俟獻忠至而執之文燦不可曲殉獻忠請處其衆數萬于榖城之郊居民洶洶欲竄知縣阮之鈿蒞任盡心調劑民稍安策獻忠必反以告文燦時獻忠遣賊將孫可望重賂文燦徑寸之珠十碧王長尺餘者二名妹八文燦重昵獻忠惡聞之鈿語之鈿乃疏于朝言獻忠虎踞邑城其謀叵測所要求屯住之地實兵餉取道咽喉秦蜀交會胍絡令皆為所據姦民甘心效用善良悉為迫脅臣守土牧民之官至無土可守無民可牧庫藏殫虐民産被奪無賊可徵名雖縣令實贅貟爾乃廟堂之上専主撫議臣愚妄謂撫勦二策可合言未可分言致損國威而挫士氣時不能用獻忠遂益怒乞十萬人餉于文燦文燦不能決賊衆浙出野外行劫之鈿執之以告其營將稍置之法及再告皆不應曰官司不給餉耳得餉自止由是村民徙亡殆盡遂掠及闡闠稍拒輒挺刃相向日撫有死者一城大囂監軍僉事張大經奉文燦令來鎮亦不能禁質實密縣漢置明屬禹州以𨽻于開封府今徑屬開封府林銘球廣東海豐人王瑞柟字聖木永嘉人明唐王時殉節城本朝乾隆四十一年追諡忠烈阮之鈿字實甫桐人諸生以保舉授榖城知縣張至發罷至發嘗詆黃道周頌溫體仁屢為言者所攻內閣中書黃應恩悍戻至發倚任之恃勢恣橫頗招權道賄至發終庇應恩會復故總督楊鶴官許給誥命應恩當撰文因其子嗣昌得君力為沋雪忤旨將加罪至發擬公疏揭救同官孔貞運傅冠曰曩許士柔事吾自輩未嘗救獨救應恩何也至發咈然曰公等不救我救之連上三揭帝不聼恃降諭削應恩籍嗣昌疏救亦不聼無何應恩賕請事敗詞連至發至發憤甚連疏請勘帝雖優旨褒答卒下應恩獄至發乃自謂當去者三而未嘗引疾忽得旨回籍調理時人傳笑以為遵旨患病云至發為府丞時以清強稱及入內閣一切效法體仁與黃道周諸正人為難時論非之又起家外僚諸翰林多不服帝亦以其望輕故因其乞休即勒之去至發既歸捐資改建淄城賜敕優奬十四年夏帝思用舊臣特敕召周延儒賀逢聖及至發獨至發四疏辭十五年四月卒于家質實許士柔事士柔字仲嘉常熱人崇禎元年髙攀龍贈官士柔官翰林草詔辭送內閣未給攀龍家故事贈官誥敕乃中書職掌而褒恤諸忠臣者翰林或為之中書以為侵官不悅及攀龍家請給士柔己官南京祭酒距草制時十年矣主者仍以士柔前撰文進黃應恩以誥語違禁白張至發蓋崇禎三年有誥文駢儷之禁也至發素憾士柔還劾之降二級調用司業周鳯翔抗疏為士柔辨言誥敕用寶嵗有常期未有十年後用寶進星而轉以崇禎三年申飭之禁追咎元年草制之史官者疏入不報五月熒惑逆行帝素服減膳敕羣臣言事兵部尚書楊嗣昌應詔上書厯引漢元帝建武二十三年明帝永平二年唐憲宗元和七年宋太宗太平與國三年事應謂月食五星史不絶書然災祚感召不一其致且言永平火星之變其時明帝圖畫功臣于雲臺馬援以椒房不與事耀青簡今陛下修德治內亦必有災而不害者疏出都給事中何楷駁之言古人謂月變修刑又言禮虧則罰見熒惑誠欲措刑莫如右禮誠欲右禮莫先省刑今爰書之賾極矣部司議宥止于重辟數人而未折之獄先後纍纍莫過而問嗣昌不體陛下修省之意而徵古誣今引建武欵塞事以申通市之説引元和田興歸正事以申招撫之説引太平興國連年兵敗事以申不可用兵之説徒巧傅會耳至所述永平時事更不知其意之所指南京御史林蘭友亦相繼論劾帝方眷嗣昌置不問時詔書懇執有哀籲上帝語而羣臣多以諛詞相解户部主事李鳯鳴至謂火星逆行常而非變亦為給事中解學尹所駁獨中書舍人陳龍正以東厰緝事宛濫上養和好生疏語中時弊略曰回天在好生好生無遇減死阜陶贊舜曰罪疑惟輕良以獄情至隱人命至重故不貴専信而取兼疑臣居家所見間四方罪犯無甚窮凶竒謀者及來京師此等乃無虛月且罪案一成立就誅磔亦宜有所懲戒何犯者若此纍纍臣願陛下懷帝舜之疑寧使聖主有過仁之舉臣下獲不經之愆蓋陰指東厰事也越數日帝果嚴諭提督中官王之心不得輕視人命云質實林蘭友字翰荃仙遊人李鳯鳴歙人解學尹揚州興化人陳龍正字惕龍嘉善人發明星象之變虗而難憑政治之失實而可據方明之季朋黨角于朝冦盜熾于野中官之權復盛百姓之困日深此即無熒感逆行垂亡之勢巴屬不可救樂楊嗣昌妄引前史以為災而不害其欲曲申行事之無失以為𨗳諛信有如何楷所駁詰者觀莊烈詔書亦知哀籲于帝而不于用人行政之大端深求其悔過彌災之道諸臣復多以諛詞相解是君臣上下之間一無應天之實又豈獨嗣昌之矯誣為足責也哉六月孔貞運罷初溫體仁當國欲重治復社值其在告貞運從寬結之體仁怒語人曰句容亦聼人提索矣句容貞運所居邑也自是不敢有所建白及張至發去位貞運代為首輔會帝御門召考選諸臣問兵食計卷下輔臣再閲貞運及薛國觀頗有所更及命下閣擬悉不從帝自擇十八卷拔曽就義第一下部議行適新御史羣謁朝房貞運言諸卷説多難行新御史郭景昌遂劾之貞運即引歸貞運既罷崇禎十七年五月莊烈帝哀詔至貞運哭臨慟絶不能起遽得疾卒質實曾就義以知縣應考選對策言百姓之困皆由吏之不亷使守令俱亷即加派以濟軍需未為不可語獨稱旨故得首拔郭景昌洛陽人以楊嗣昌程國祥方逢年蔡國用為禮部尚書范復粹郎並兼東閣大學士預機務嗣昌仍掌兵部初國祥官户部尚書嗣昌議增餉國祥不敢違度支益匱四方奏報災傷者相繼國祥多方區畫亦時有所蠲減最後建議借都城賃舍一季租可得五十萬勛戚奄豎悉隱匿不奏所得僅十三萬而怨聲載逆然帝以此眷國祥至是帝將增置閣臣出御中極殿召廷臣七十餘人親試之發策言年來天災頻仍今夏旱益甚金星晝見五旬山西四月猶大雪朝廷腹心耳目臣務避嫌怨有司舉劾情賄關其心尅期平賊無功而勦兵難撤邉餉日絀民貧甚正供猶難有司侵削百方如火益熱若何處置得宜禁戢有法卿等悉心以對會天大雨諸臣靣對後漏已深終考者止三十七人顧帝意已前定特假是為名耳居數月改國祥禮部尚書與嗣昌逢年國用復粹俱兼東閣大學士入參機務時劉宇亮為首輔傅冠薛國觀次之驟增國祥等五人惟逢年起自翰林餘皆外僚也國用前以中書舍人厯工部侍郎督修都城需石甚急不克辦國用建議用牙石為之牙石者舊列索文宣武二街備駕出除道者也帝閲城嘉其功因大用之復粹嘗為巡按陜西御史陳治標治本之策以任將飭防留餉為治標廣屯蠲賦招撫為治本帝深褒納遂厯大理左少卿超擢入閣尤屬異數蓋帝欲閣臣通知六部事故每部任一人首輔劉字亮由吏部國祥以户逢年以禮嗣昌以兵國用以工刑部無人復粹以大理代之然皆委蛇其間獨嗣昌兼掌兵部最用事又以奪情居政府時論譁然質實程國祥字仲若上元人方逢年遂安人蔡國用金溪人范復粹黃縣人兩畿山東河南大旱蝗帝以災祲屢見又寇氛日熾避正殿齋居斷庖割后周氏見帝體日瘁具饌將進帝方得徐夫人奏言夜夢孝純太后歸語及帝瘁而哭且曰我為語帝食母過苦徐夫人者孝純太后母也帝特奏入宫后適進饌驚詢曰汝何以為此豈亦有所聞耶對無有曰外人有𨗳之者耶對無有因追念孝純且感后意出奏示后再拜舉筯相向哭淚溢盤槅質實徐夫人宛平劉應元妻生女入宫即明莊烈帝生母孝純皇太后也應元旱卒崇禎十三年追贈應元瀛國公封徐氏瀛國太夫人秋七月謫少詹事黃道周官初遷安郭鞏以逆案謫戍其鄉人為訟寃楊嗣昌時巡撫永平聞于朝為科臣所駁自是與東林郤及奪情入閣又起復逆案陳新甲代盧象升為宣大山西總督于是給事中何楷御史林蘭友修撰劉同升編修趙士春相繼論之道周上三疏一劾嗣昌奪情一劾新甲走邪徑一劾遼東巡撫方一藻主和議會廷推閣臣道周名在列帝不用用嗣昌等帝疑道周怨望嗣昌復上言鄭鄞杖母飛走不如今道周又不如鄤何用談綱帝為且其意欲庇凶徒飾前言之謬立心可知因自乞罷免帝優旨慰之及是召內閣暨諸大臣于平臺并及道周帝與諸臣語所司事久之問道周曰凡無所為而為者謂之天理有所為而為者謂之人欲爾三疏適當廷推不用時果無所為乎道周對曰臣三疏皆為國家綱常自信無所為帝曰先時何不言對曰先時猶可不言至簡後用不言更無當言之日帝曰清固美德但不可傲物遂非且惟伯夷為聖中之清若小亷曲謹是亷非清也時道周所對不稱旨帝屢駁誥道周復進曰惟孝弟之人始能經諭天下發育萬物不孝不弟根本既無又安有枝葉嗣昌出奏曰臣不生空桑豈不知父母顧念君為臣綱父為子綱君臣固在父子前況古為列國之君臣可去此適彼今則一統之君臣無所逃于天地之間仁不遺親義不後君難以偏重臣四疏力辭意詞臣中有如劉定之羅倫者抗疏為臣代請得遂臣志及抵都門聞道周學術人品為人宗師乃不如鄭鄤帝曰然朕正擬問之乃問道周曰孟子欲正人心息邪説古之邪説别為一教今則直附于聖賢經傳中係世道人心更大爾言不如鄭鄤何也對曰匡章見棄通國孟子不失禮貌帝曰章子不得于父豈鄤杖母者比爾言不如豈非朋比道周曰衆惡必察帝曰陳新甲何以走邪徑託捷足道周對曰人心邪則行徑皆邪又曰奪情在疆外則可朝中則不可帝曰人既可用何分內外道周曰我朝自羅倫論奪情前後五十餘人多在邉疆故嗣昌在邉疆則可在中樞則不可在中樞猶可在政府則不可止嗣昌一人猶可又呼朋引類竟成一奪情世界益不可帝又詰問久之曰少正卯當時亦稱聞人心逆而險行僻而堅言偽而辨順非而澤記醜而博不免聖人之誅今人多類此道周曰少正卯心術不正臣心正無一毫私帝怒有間命出候旨道周曰臣今日不盡言臣負陛下陛下今日殺臣陛下負臣帝曰爾一生學問止成侫耳叱之退道周叩頭起復跪奏臣敢將忠佞二字剖析言之夫人在君父前獨立敢言為侫豈在君父前讒諂靣諛為忠耶忠佞不别邪正淆矣何以致治帝曰固也非朕漫加爾以佞但所問在此所答在彼非佞而何再叱之退顧嗣昌曰甚矣人心偷薄也道周恣肆如此其能無正乎乃召文武諸臣咸聆戒諭而退是時帝憂兵事謂可屬大事者惟嗣昌破格用之道周守經矢帝意及奏對又戅直帝怒甚欲加以重罪念其名高傳諭數百言戒廷臣毋為道周劫持相朋黨乃貶道周六秩為江西按察司照磨同升士春皆謫外已而南京御史成勇兵部尚書范景文等疏論嗣昌奪情隨亦獲譴質實陳新甲長夀人劉同开吉水人趙士養常熟人方一藻歙縣人八月傅冠罷時有章奏發自御前者冠以為揭貼援筆判其上既知誤惶恐引罪帝即放歸九月我大清兵入邉燕京戒嚴大先是將進討睿親王多爾衮移檄諸邉曰我清兵皇上軫念爾國軍民塗嵗屢遺書議和而爾國君臣欲尋干戈膜視爾軍民而不知恤故我奉命西討乃與多羅貝勒杜度等將兩翼兵分道入牆子嶺青鄧山口薊遼總督吳阿衡總兵魯宗文敗死監視中官希詔遁走遂深入駐牛欄山時宣大山西總督盧象升遭父喪候陳新甲受代未行詔督總兵楊國柱王朴虎大威諸軍入衛冬十月象升至三賜尚方劍命與中官髙起潛分督援軍樞輔楊嗣昌及起潛隂主和議有瞽而賣卜者曰周元忠嘗往來于遼遣之奉書議和象升聞而心非之召對平臺帝咨以方略對曰臣主戰帝色變良久曰和乃外廷議耳象升因奏備禦形勢甚悉帝壯之而戒象升持重令與嗣昌起大潛議當是時帝心知而恥言和故委廷議以答象升清兵鋭甚力不能敵象升出與兩人議不合即日陛辭嗣昌送之屏左君欲有言久而不能出口第丁寧母輕戰而已帝先後以四萬金犒軍象升念帝意頗鋭決策議戰而事多為起潛撓憤甚疏請分兵嗣昌議以宣大山西三帥屬象升關寧諸路屬起潛象升名督天下兵實不及二萬越數日嗣昌至軍象升責以阻師且曰公等堅主和議獨不思城下之盟春秋所恥長安口舌如鋒恐袁崇煥之禍立見嗣昌曰公直以上方劍加我矣象升曰既不奔喪又不能戰齒劍者我也安得加人嗣昌曰公母以長安蜚語陷人象升曰周元忠赴邉講和往來非一日事始于薊鎮監督受成于本兵通國聞之誰可諱也嗣昌語塞而去又數日會起潛安定門象升大言非血戰無以盡臣職起潛曰恐野戰非我所長耳兩人始終各持一議會新甲亦至復分兵大與之而我通州河西由盧溝橋趨良鄉涿州分兵南兵已會于下質實吳阿衡裕州人魯宗文長清人四川總兵欽子本朝乾隆四十一年追諡阿衡節愍宗文烈愍冬十月洪承疇大敗李自成于潼關承疇既令總兵官曹變蛟等逐自成于畨地自成敗入氓州竄山中變蛟引兵還勦自成伏不敢出惟其黨號六隊三隊者及大天王爭管王混天王仁義王過天星混天星等勢猶張大天王犯慶陽寶雞陜撫孫傳庭方扼商雒還軍戰合水破走之獲其二子追擊之延安過天星混天星等從徽秦趨鳯翔逼澄城傳庭分五道擊破之斬二千餘級大天王知二子不殺遂降餘賊引而北犯延安傳庭策鄜州西合水束三四百里荒山邃谷賊入當自斃乃率標兵自中部過其東檄變蛟自慶陽扼其西伏兵三水淳化間賊飢出掠食則大張旗幟鳴鼓角以邀之一日夜馳二百五十里賊大驚西奔遇伏兵而敗復走寶雞取棧道再中伏大敗折而走隴州關山道又為伏兵所挫三敗賊死者無算過天星混天星並降總兵官左光先躡賊于秦州六隊總管王復走成縣階州為變蛟所扼三隊仁義王混天星降于光先六隊還與自成合自成以秦兵統偕六隊及其黨祁總兵避走入蜀副將馬科賀人龍邀擊之還走階文及西鄉憚變蛟乃走漢中又為光先所扼六隊祁總管皆降惟自成東遁承疇令變蛟窮追之而設三伏于潼關之南原變蛟追及大呼斫賊伏盡起奮矛掩殺賊尸相枕藉先後降者數十萬甲仗委如山村民用大棒擊逃者自成妻女俱失從十八騎遁去十八騎者劉宗敏田見秀李錦谷可成張世傑髙一功張鼐李過李雙喜任繼榮任繼先田虎劉汝魁其五騎則長械兒也自成創甚匿商洛山中及承疇傳庭入援京師總理熊文燦力主撫諜者或報自成死文燦益不以自成為意自成得乘間收其衆衆復大集質實關山在隴州西八十里其山髙峻盤折而登凡五十里始至絶頂有分水嶺為秦要害之地成縣西魏曰成州五代梁開平初改文州貞明初地入于蜀後唐同光初復曰成州明洪武二年降縣屬鞏昌府本朝雍正七年改屬階州十一月大清兵克髙陽前大學士孫承宗死之大先是我涿州勒統兩翼軍為八部分三郡深入一由清兵自淶水出易州一由新城出雄縣一由定新出安肅遂以十一月九日攻髙陽城承宗率家人拒守大清兵將引去繞城而呼者三守者亦應之三曰此城繯笑也于法當破圍復合明日城陷被執望闕叩頭投而死年七十有六子舉人鉁尚寶丞鑰官生鈰生員鋡鎬從子練及孫中書舍人之沆之滂之澋尚寶丞之浩之瀗從子之徹之漢之泳之澤之渙之瀚皆戰死督師中官髙起潛以間帝嗟悼命所司優恤當國者楊嗣昌薛國觀鞏陰扼之但復故官豫祭葬而已是冬大清兵循下畿輔列城長吏多望風先遁其以死事間者有深州知州孫士美趙州王端冕知縣有任邱白慧元慶都黃承宗靈壽馮登鰲文安王鑰蠡縣王採新河崔賢巨鹿郭司南鹽山陳志故城王九鼎青縣張文煥興濟錢珍慶雲陳緘安平孔聞俊等教官有巨鹿教諭唐一中鹽山教諭孫璜深州訓導吳恂蠡縣訓𨗳馮大緯吳橋訓𨗳劉廷訓臨城訓𨗳張純儒文安訓𨗳郭養性等佐二官有文安主簿安衡典史湯國紀等鄉官有喬若雯李禎寧李崇德馬從聘弟從龍子士偉耿蔭樓周甘雨弟霖雨時雨等士人有舉人董祚檀光閭生員桑開基武生田興死國等而髙陽里居知縣魏克家則與承宗同時質實髙陽漢縣明屬安州以𨽻于保定府今徑屬保定府淶水隋置明屬易州以𨽻于保定府今升易州為直𨽻州縣仍屬焉新城唐置元改新秦州尋復為新城縣明洪武初屬雄州六年改屬保定府今因之深州漢為下博縣後周于縣置靜安軍宋時廢移深州治此明屬真定府今升直𨽻州巨鹿漢縣明屬順德府今因之鹽山漢髙城明改鹽山屬漢縣以𨽻于河間府今改屬天津府故城元始以故城鎮置明屬滄州以𨽻于河間府今徑屬河間府安平漢縣明屬晉州以𨽻于真定府今改屬深州孫士美青浦人守深州城三日既失守自剄于角樓父訥亦自縊一家死者十三人贈太僕少卿訥亦被旌王端冕江陵人白慧元青澗人為中書官所誣劾被逮未行新令李亷仲縋城遁慧元躬擐甲胄防禦甚力及城破一門俱死贈僉事黃承宗威海衛人城破與子朝鍹俱力戰中采流矢死妻劉氏自縊馮登鰲膚施人王鑰武功人王澤州人崔賢戈州人郭司南安塞人僕張爾璋同殉王九鼎潛山人張文煥掖縣人陳緘清流人唐一中全州人孫璜三原人吳恂安平人馮大緯登鰲從父劉廷訓順天通州人以嵗貢生為吳僑訓導知縣李綦隆欲遁廷訓止之與共守外圍將合綦隆縋城走廷訓急趨城上語守者曰守死逃亦死盍死于守為忠義鬼乎衆泣諾乃堅拒三晝夜廷訓中流矢束胸力戰又中六矢乃死張純儒新安人率諸生共守城城破死之喬若雯臨城人由吏部員外出充州府知府剔除積弊豪猾飲手以疾歸士民遮道泣送及城陷若雯端坐按劍以待遂被殺贈太常少卿李貞寧任邱人官山西按察司罷歸佐白慧元拒守城破率家衆格鬬身中數槊而死一門從死者數人李崇德青縣人官户部員外郎馬從聘字起莘靈壽人官延綏巡撫引疾歸城破從聘年八十二謂其三子曰吾得死所矣自縊死三子長士偉官知州次官生士慤次生員士通皆自縊事聞贈從聘兵部尚書縊介敏從龍官揚州府經厯與子士祿同死節耿陰樓字旋極從聘同邑人官吏部員外郎乞假歸與子參同死節周甘雨行唐人官倒馬關參將霖雨關淮安同知時雨官潼川州同知兄弟堅守城破皆死之董祚隆平人檀光閭任縣人桑開基玉田人田興國深州人魏克家官鄒平知縣有惠政貞本朝乾隆四十一年追諡孫承宗忠定喬若雯李寧忠烈孫士美劉廷訓周甘雨烈愍孫瀹孫之沆孫之浩王端冕白慧元黃承宗馮登鰲王鑰王采崔賢郭司南陳志王九鼎張文煥錢珍陳緘孔聞俊李崇德馬士偉耿蔭樓周霖雨魏克家節愍孫鉁唐一中安衡董祚等並入祠羅汝才偽降總理軍務熊文燦受之先是文燦在洛州羅汝才馬進忠諸賊聚南陽文燦下令殺賊者償死賊不肯從則齎金帛酒牢犒之名曰求賊帝詞得狀曰文燦大言無實文燦恐然終擁兵不戰謂張獻忠已就撫他賊可無慮而汝才進忠等遂驅宛雒之衆箕張而西以窺潼關時陜撫孫傳庭方大破關中賊引軍東出關遙望賊營聫結數十里拊髀嘆曰天下大冦盡在此矣我擊其西總理擊其東賊不降則滅此賊平天下無賊矣獻忠即狙伏無能為也乃縱兵擊賊大戰于閿鄉靈寶間貫其營而東復自東以西賊窘甚以文燦招降手諭為辭曰旦夕且降傅庭曰爾曹日就熊公言撫而日攻堡屠塞不已是偽也降即解甲來稍遷延即非真降吾明日進兵矣明日擐甲而出得文燦檄于途中曰母妒吾撫功又進得樞輔楊嗣昌止兵手書傳庭怏怏還賊迄不就撫移瞰商雒文燦悔期傳庭夾擊傳庭遣將吏三戰三敗之賊奔內鄉淅川而去尋復南走鄖襄分鋸諸險隘勢張甚文燦不得已出師次襄陽諸將請戰文燦議分兵進中官盧九德曰兵分則力弱一失利全軍搖矣莫若厚集其力而合擊之衆曰善乃合左良玉陳洪範龍在田軍戰于雙溝大破之斬首二千餘級汝才等率九營走均州其黨李萬慶等率三營走光固會京師戒嚴召洪承疇及傳庭合兵五萬入衛汝才等以討已也懼而叩太和宫提督中官詭辭求撫于文燦許之汝才猶豫文燦令房縣知縣郝景春單騎入其營偕汝才等歃血盟汝才乃率九營詣軍門降文燦分處汝才及一文青小秦王一條龍四營于鄖縣惠登相王國寧常德安楊友賢王光恩五營于均州上疏請貸汝才等罪令諸將宴汝才于迎恩官署署以為遊擊將軍供億甚備汝才自言不願署官亦不願食餉願為百姓耕田房竹間文燦一切羈縻之檄汝才解散其黨簡驍壯從征立功汝才不聼因據鄖均諸邑奪民地錯壞而處與穀城張獻忠遙為聲援是年安撫史可法連敗賊于英山六合順天王乞就撫未幾死于是陜西河北湖廣諸賊或降或竄勢大衰城邑罕聞陷者獨紫陽宗孔商南典史賈汝秀賈儒以殉賊難聞質實雙溝在襄陽縣東北七十里明置巡撿司于此官本朝因之太和宫在均州武當山龍在田石屏上舍人郝景春字和滿江都人何宗孔直𨽻通州人祠本朝乾隆四十一年追諡何宗孔秀并入冬十二月方逢年罷是年夏熒惑之變刑部尚書劉之鳯請修刑言自今獄情大者一月奏斷小者半月至逺年贓賊無可追比者祈悉宥免全生生之仁帝雖可其奏而心惡之鳯欲罪之及是刑科奏摘參未完疏逢年以追贓既久人亡産絶瓜蔓戚屬遂輕議以上帝怒責逢年疏忽逢年引罪及罷歸而之鳯尋亦下吏質實劉之鳯字雍鳴中牟人以修刑疏不稱旨每上獄詞莊烈帝必嚴駁之懼甚諸司呈稿遲疑不敢遽發屢疏謝病不許會范景文劾南京給事中荆可棟貪汗下部訊之鳯與輕比遂下之鳯于吏坐絞給事中李清言于例未合同官葛樞復論救鐫樞級調外之鳯竟瘐死督師侍郎盧象升兵敗于巨鹿死之大清兵既分道南下象升間之從涿州進據保定遣將出禦大戰于慶都猶未敗衄而一時列城多失守編修楊廷麟劾樞輔楊嗣昌誤國嗣昌大怒奏改廷麟兵部主事贊晝行營奪象升尚書銜以侍郎任事象升擢自兵備副使與流賊角賊雖強皆烏合之衆一敗即散走故所向摧破及是大軍在前又為嗣昌所扼餉不時給將士飢甚自知必死晨出帳四靣拜曰吾與將士同受國恩患不得死不患不得生衆皆泣莫能仰視遂率所部以行宿于野次畿南三郡父老間之咸叩軍門請曰明公出萬死不顧一生之計為天下先乃姦臣在內孤忠見嫉棲遲絶野一飽無時明公誠從愚計移軍廣順召集義師三郡子弟喜公之來同心戮力一呼而裹糧從者可十萬孰與隻臂無援立而就死哉象升泫然流涕謂父老曰感父老意雖然自豫與流賊角經數十百戰未嘗衄今者分疲卒五千徑旅西衝援師東隔事由中制食盡力窮旦夕死矣無徒纍父老為也衆號泣雷動各擕斗粟餉軍或貽棗一升曰公煮為糧是月十一日進師至巨鹿賈莊起潛擁兵寧關在雞澤距賈莊五十里而近象升遣廷麟往乞援因與訣曰死西市何如死疆場吾以一死報君猶為薄耳廷麟詣起潛起潛不應象升行至蒿水橋與大清兵遇總兵王僕先引兵逃去獨虎大威楊國柱從象升率麾下卒居中大威帥左國柱帥右戰移時勒兵還營夜半角聲四起明日騎數萬夫至環之三匝象升麾兵戰呼聲動天自辰迄未炮盡矢窮大威請潰圍出象升不許奮身鬬後騎皆進手格殺數十人身中四矢三刃遂仆掌牧楊陸凱懼衆之殘其尸而伏其上背伏二十四矢以死僕顧顯者亦殉一軍盡殁惟大威國柱得脫起潛聞敗倉皇遁嗣昌既夙惡象升而起潛懼坐誅諱象升死狀嗣昌疑不死詔驗視廷麟得其尸戰場麻衣猶被體一卒遙見即號泣曰此吾盧公也三郡之民聞之哭失聲競立祠祝之順德知府于穎核其狀以上事始白嗣昌故靳之踰兩月而後殮明年象升妻王氏請恤又明年其弟象晉象觀又請不許久之嗣昌敗廷臣多為言者乃贈太子少師兵部尚書賜祭葬世廕錦衣千户方象升之戰殁也嗣昌遣三邏卒察其死狀其一人俞振龍者歸言象升實死嗣昌怒鞭之三日夜且死張目曰天道神明無枉忠臣于是天下聞之莫不郗歔並恚嗣昌矣質實賈莊蒿水橋並在巨鹿縣南于穎金壇人按山西通志有宣府參軍張巖者陽和人從象升戰殁于陳愍本朝乾隆四十一年追諡象升忠肅張巖烈楊陸凱俞振龍並入祠己卯十二年春正月己未朔却廷臣朝賀時事多艱故也軍書旁午帝每省治達旦以嵗朝謁劉太妃于慈寧宫朝畢就坐俄假寐太妃戒勿驚命尚衣者覆以帔左右皆植立屏息以俟有頃帝覺攝衣起謝曰神祖時天下少事宫中皆晏安太妃所親見也今苦多難兩夜省文書未嘗交睫自謂年甫踰壯尚可磨耗不謂蚤困劣在太妃前惛然不自持至此太妃之泣下為質實劉太妃明神宗妃也萬厯六年册為昭妃天啓崇禎時嘗居慈寧宫掌太后璽莊烈帝禮事之如大母大清兵下濟南德王由樞被執巡按御史宋學朱布政使張秉文死之大先是自畿輔而西抵山西界復南下臨清渡會通河清兵徇下山東諸州縣臨邑知縣宋希堯博平知縣張列宿荏平知縣黃廷極邱縣知縣髙重光武城知縣李承芳皆死之時樞輔楊嗣昌以德州為南北孔道檄山東巡撫顔繼祖率標下兵三千扼之于是濟南空虛止鄉兵五百萊州援兵七百勢弱不足守巡撫御史宋學朱行部章邱急馳與布政使張秉文副使周之訓翁鴻業參議鄧謙鹽運使唐世熊等議守城連章告急于朝嗣昌無應督師中官髙起潛兵方移駐臨清大擁重兵不敕總兵官祖寬倪寵等亦觀望解甲援兵清兵遂臨濟南秉文等分門拒守晝夜不竟無至者是年正月二日城潰秉文擐甲巷戰已被箭力不能支死之妻方氏妾陳氏並投大明湖死學朱之訓鴻業謙世熊及濟南知府苟好善推官陸燦同知陳虞允通判熊列獻馬嗣煜厯城知縣韓承宣布政使理問薑道元舉人劉元化及子漢儀皆死焉德王由樞亦被執質實荏平漢縣故城在縣西荏山下金時劉豫移今治明屬東昌府今因邱縣漢平恩縣金省入曲周縣元置邱縣明屬臨清以𨽻于東昌府州本朝順治初改屬東昌府乾隆四十一年升臨清為直𨽻州仍以縣屬之大明湖在厯城縣西北隅周十餘里宋希堯長治人黃廷極武功人髙重光字秀恆清苑人宋學朱字用晦長洲人張秉文字含之桐城人周之訓黃岡人與妻劉氏偕死闔門殉之翁鴻業錢塘人鄧謙孝感人戰于城上與季父有正偕死母莫氏匿民間不食死族戚傔從死者四十餘人唐世熊灌陽人分守西門被殺苟好善醴泉人陳虞允上元人熊烈獻黃陂人城破與二子俱死馬嗣煜同州人韓承宣大學士爌孫與妻妾同死薑道元餘姚人妻來氏子廷梁殉節死由樞德莊王見潾六世孫時有郡王一人奉國將軍一人同就執又有郡王五人輔國將軍一人鎮國將軍一人奉國將軍四人被殺史逸其名陸燦平湖人有劉大年者江西廣昌人官兵部主事奉使南京還朝道厯城城破抗節死又恩縣鄉官李應薦天啓時官御史以附魏忠賢麗名逆案至是捐資募士佐有司守城城破身被數刃死事聞張秉文贈太常卿周之訓贈光卿卿韓承宣劉大年光祿少卿建祠祝之餘贈恤有差學朱死不得尸格不豫明福王時贈大理卿本朝乾隆四十一年追諡宋學朱忠烈張秉文忠節鄧謙烈懲周之訓翁鴻葉唐世熊苟好善陸燦陳虞允熊列獻馬嗣煜韓承宣薑道元宋希堯張列宿黃廷極祠髙重光李承芳劉大年節愍劉元化及子漢儀並入以洪承疇總督薊遼軍務孫傳庭總督保定山東河北軍務尋下傳庭于獄帝從楊嗣昌議移承疇薊遼盡留秦兵之入援者屬承疇東守傳庭言于嗣昌曰秦兵不可留也秦中賊未滅留則賊勢且張是代賊撤兵也况秦兵妻子俱在秦久留于邉必譁而逃歸以合于賊是驅官軍使從賊也安危之機不可不察嗣昌不聼傳庭疏爭之帝亦不能用不勝鬱鬱耳忽聾初傳庭入衛盧象升方戰殁命代統諸鎮援軍傳庭以強事決裂由計畫差謬即請召對決大計而嗣昌及髙起潛與傳庭不協從中沮之竟不得入朝至是有總督保定山東河北之命復疏請陛見嗣昌大驚謂傳庭將領已飭來役賫疏還之傳庭憤甚耳益聾不能聽機事遂乞休嗣昌又劾其託疾帝大怒斥為民下巡撫楊一俊覆真偽一俊奏言傳庭實聾非託疾並下一俊獄傳庭長繫待決舉朝知其寃莫敢言質實楊一俊鄰水人喬宇亮罷初燕京戒嚴帝憂甚宇亮自請督察軍情帝喜即革總督盧象升任命宇亮往代宇亮請督察而帝忽改為總督大懼與薛國觀楊嗣昌謀具疏自言乃留言象升而宇亮仍往督察各鎮勤王兵皆屬馬甫抵保大定象升已戰殁偵者報急趨晉州避之知州陳宏緒清兵將至相顧無人色閉門不納士民亦歃血誓不延一兵宇亮大怒傳令箭即納師否則軍法從事宏緒亦傳語曰督師之來將以進戰也奈何斂兵退處城中芻糧不繼責在有司欲入城不敢聞命宇亮馳疏劾之有旨逮治州民詣闕訟寃願以身代者千計宏緒得鐫級調用帝自是疑宇亮不任事徒擾民矣是年正月聞大清兵悉鋭趨山東乃敢移師次天津恐解嚴後重得罪疏論諸將退縮為卸責地因及總兵劉光祚延遛狀詔斬光祚軍前宇亮以兵事未解方倚諸軍自衛遽殺大將恐生變乃繫光祚于獄具疏乞宥以為報武清之捷帝責以前後矛盾下九卿科道議僉謂宇亮玩弄國憲大不敬宇亮疏辨部議落職間柱給事中陳啓新等復重劾之乃削籍去國觀代為首輔三月我大清兵出青山口大是役也我二千里三十三戰皆捷下畿輔州縣城四清兵深入十有三曰趙州深州文安慶都博野蠡髙陽任邱青興濟寧津吳橋東光故城南皮鹽山慶雲獲鹿元氏靈夀樂城無極行唐南宫新河安平饒陽隆平髙邑臨城寧晉沙河南和任內邱唐山平鄉巨鹿廣宗雞澤威清河魏下山東府州縣城十八曰濟南府髙唐州長山濟陽禹城臨邑陵平原海豐商河博平荏平萃清平邱恩夏津武城俘獲人口四十六萬有竒乃自青山口旋師事既定給事中李希沆言陛下御極以來京師戒嚴者三己巳失事之罪未核致有丙子丙子失事之罪未核致有今日語侵樞輔楊嗣昌御史王志舉亦劾嗣昌誤國請用丁汝夔袁宗煥故事帝怒希沆貶秩志舉奪官命嗣昌議文武諸臣失事罪分五等曰守邉失機曰殘破城邑曰失陷藩封曰失亡主帥曰擁兵觀望于是薊鎮總監中官鄧希詔分監巾官孫茂霖順天巡撫陳祖苞保定巡撫張其平山東巡撫顔繼祖薊鎮總兵吳國俊陳國威山東總兵倪寵援𠞰總兵祖寬李重鎮及他副將以下至州縣有司凡三十六人同論死而嗣昌貶削不及質實東光漢縣明屬景州以𨽻于河間府今徑屬河間府南皮漢縣明屬滄州以𨽻于河間府本朝雍正九年置天津府以縣屬之獲鹿漢石邑唐分置鹿泉縣尋改曰獲鹿宋以石邑省入明屬真定府元漢縣樂城東漢縣唐改樂氏宋仍曰樂城無極漢毋極唐改毋曰無明並屬真定府今悉因之南宫漢縣明屬冀州以𨽻于真定府𨽻本朝順治初徑屬真定府雍正二年升冀州為直州仍以縣屬之沙河隋分龍岡縣地置南和漢縣任縣漢縣唐山唐堯山金又改唐山平鄉漢縣廣宗元以洺水縣之武道鎮置明與沙河南和任唐山平鄉廣宗並屬順德府今悉因之雞澤漢廣平隋改雞澤清和漢東武隋改曰清河明並屬廣平府今因之魏漢縣明屬大名府濟本朝乾隆二十三年省入大名縣長山隋置明屬南府今因之海豐隋無棣縣元初割縣之半置東無棣縣明永樂中改海豐屬樂安州以𨽻于濟南府宣德元年改樂安為武定州隋本朝雍正十二年升武定州為府縣仍屬焉恩縣析武城縣地置厯亭金為恩州治明洪武二年降州為縣屬髙居州以𨽻于東昌府今改屬臨清州李希沆安化人王志舉山東新城人陳祖包海寧人繫獄飲鴆卒帝怒祖苞漏刑錮其子編修之遴永不敘張其平偃師人與顏繼祖等駢死西市夏四月總兵官左良玉敗賊于南陽初賊渠馬士秀杜應金就撫良玉處其衆于許州之郊外許大州也良玉諸將寄孥與賄焉會河南巡撫常道立檄良玉勦他賊于陜州久征不歸士秀應金在文燦軍中托事請歸許假良玉軍號紿入城夜半縱火燒城南樓劫庫殺官吏殱良玉家挈其資投李萬慶萬慶者賊魁射塌天也良玉聞變將施軍討之適奉勤王詔遂率降將劉國能北行未抵京詔還討河南賊以國能反正後頗效用特擢副總兵曰張獻忠能立功視此于是良玉國能南旋擊馬進忠于鎮平關大破之進忠降是時河南總兵張任學亦以入衛却還率部將宋懷志孔道典王應龍尤之龍協勦楚豫諸賊連敗賊于陳州于襄陽于葉縣于裕州賊渠賀一龍藺養成伏深山不敢出惠登相逺走秦蜀順天王已前死萬慶及馬光玉許可變在豫勢益孤熊文燦徵良玉𠞰萬慶于唐縣分三營擊賊逐入山中禆將王修政趨利戰死文燦收二營卒令良玉蹙之內鄉而任學亦以兵來會萬慶乃依山結壘遣賊將至軍請降良玉慮其詐謀之文燦益調諸將陳永福羅岱等兵進𠞰副將國能亦至遂分道擊萬慶及先玉可變萬慶等敗大奔良玉令國能以二十騎往偵且諭萬慶降萬慶馳見輸情于國能遂執許州叛黨于汝虎以降處其衆四千人于內鄉城下士秀應金見進忠萬慶降而懼復來歸有劉喜才者夜取順義王首以獻光玉等走淅川自是賊勢少衰文燦遂上言臣兵威震懾降者接踵惟馬光玉等尚稽天討可旦夕平也帝優詔報之文燦益自喜而湖廣諸僚吏頗以為憂巡撫余應桂貽書文燦言羣賊雖相繼降張獻忠必反可先未發圗之其書為獻忠邏者所得獻忠騰牒布告曰余撫軍欲殺我文燦聞之糾應桂撓撫事應桂疏辨帝不聽方進忠萬慶之未降也應桂以文燦撫勦乖方上書極詆之其縷陳文燦之舛尤悉略言文燦初撫劉國能其黨李萬慶等諸大賊盡走謐陽棗陽時文燦良玉並在德安臣以為兵勢方盛宜乘此追勦而文燦調良玉諸軍盡赴信陽勦馬進忠臣謂進忠於諸賊中最弱惟強者當急勦弱者可徐圖文燦不聽自此機一失賊走西而文燦東致萬慶等收合餘燼勢復振而豫楚之患遂自文燦之愎諫貽之矣逮賊西潰之後遮飾上聞妄報斬級其自恃其所長惟火炮凡經過州縣用舁夫八百死亡載道未見其一試也且文燦辦賊之䇿曰先撫後𠞰乃檄諸軍會𠞰于茶山不效于麻城又不效第見招撫之旗絡繹于道一遣使招賀一龍而使者被殺再遣使招李萬慶與之通市賊反因此大縱焚掠天下有如是撫法乎其一切軍需悉取于所過有司名曰借辨致城市空虛孑遺盡絶文燦軍至麻城民不堪淫掠欲焚其署始踉蹌而走及次蘄水其兵殺鄉民報捷民家環哭竟不敢治一兵是以捷報日張冦勢愈熾十三家之賊蹂躙南陽汝寧如履無人之境文燦駐宛汝已久調度不聞天下有如是勦法乎獻忠在穀城招納亡命買馬置器人人知其叵測文燦顧欲借之為前茅遣官調之非惟不應復留解餉之官求為湖廣總兵今已造浮橋跨漢水矣文燦前既誇張而敘功後復掩匿而不報可不謂之欺君乎以總理之大柄畀之顛蹶之耄夫臣不知其可也而文燦謂茶山失賊罪實由應桂嗣昌銜應桂嘗劾其父鶴奏逮之應桂自辨雖力帝不納竟下之獄未幾獻忠果叛獨國能進忠萬慶三人者帖然無異志萬慶尋亦授副總兵官質實鎮平關在南陽府西七十里鎮平縣界棗陽本漢蔡陽縣地後周置廣昌隋改棗陽明屬襄陽府今因之常道立三原人余應桂字二磯都昌人明桂王時殉節政本朝乾隆四十一年追諡忠節王修入祠程國祥罷國祥為人亷謹既入閣布衣蔬食不改儒素然短于才同官薛國觀楊嗣昌方用事國祥旅進退自守而已至是召對國祥無一言帝傳諭責其緘默大負委任于是國祥遂乞休去五月以姚明恭張四知魏照乘並為禮部尚書兼東閣大學士預機務三人皆庸劣四知尤甚嘗以貪汙為言官所紏四知力辨于帝前言已孤立帝意頗動薛國觀力援之遂與明恭照乘同入閣質實張四知費縣人魏照乘滑縣人張獻忠羅汝才復叛先是總兵張任學入衛道謁文燦言獻忠狼子野心終為國患我以勤王為名出其不意可立縳也文燦往復惡鎮巡官屢以獻忠為言屏其謀不用及獻忠反形日露穀城知縣阮之鈿憂甚往説之曰將軍始所為甚悖今幸得為王臣當從軍立功垂名竹帛且不見劉將軍國能乎朝廷手詔進官厚賚金帛此赤誠交也將軍若慮有他之鈿請以百口保何嫌何疑而復懷異志獻忠素銜之鈿遂惡言及罵之之鈿憂憤成病題數言于壁自誓以死至是獻忠果約羅汝才反劫庫縱囚毁其城之鈿仰藥未絶獻忠遣使索印堅不與賊殺之旋縱火焚公署骸骨為燼賊竟挾僉事張大經以去遂攻房縣招汝才當是時鄖陽諸屬邑久罹冦患城郭為墟獨房縣知縣郝景春善拊循粗可守而汝才等四營雜處于郊居民日惴惴景春乃偕主簿朱邦聞守備楊道選修守且輯諸營聞獻忠反穀城與汝才有約景春子鳴鑾諸生也力敵萬夫諸父曰吾城當賊衝而羸卒止二百城何以守乃擐甲詣汝才曰若不念前日盟乎慎毋亂汝才洋諾鳴鑾覺其偽歸與道選授兵登陴而獻忠所遣前鋒已至擊斬其將一人遣使縋城乞援于文燦凡十四往不報已而賊大至獻忠兵張白幟汝才兵張赤幟俄二幟相雜環城力攻賊黨白貴黑雲祥策馬呼曰以城讓我保無他也獻忠又以張大經檄諭降景春罵碎之鳴鑾且守且戰閲五日頗有所殺傷賊乃為負板穴城城將崩鳴鑾爇油灌之又擊傷獻忠左足用間入賊壘隂識獻忠所卧帳將襲擒之而指揮張三錫啓北門揖汝才入道選巷戰死部將張見炫被執亦死大經使汝才説景春降怒不答門庫藏儲蓄安在叱曰庫藏若有儲蓄城豈為汝陷賊怒殺一典史一守備恐之卒不屈與鳴鑾俱被殺僕陳宜殉之邦聞及其家人亦不屈死于是賊勢大張鄖西保康皆陷知縣王元會楊鏡死之惠登相等五營在均州懼見討相與歃血拒獻忠無何亦叛去文燦聞變驚愕無所措急請敕楚撫方孔照防荆門當陽鄖撫王鰲永防江陵逺安陜撫丁啓睿蜀撫邵捷春各嚴兵待于鏡上而陜督鄭崇儉主提兵合擊議不決孔照乃請率所部扼德安黃州守承天護獻陵江漢以南専責鰲永防禦時孔照預䇿獻忠等必叛隂厲士馬備戰守故賊畏孔照乃不敢東阮之鈿郝景春並以死事贈尚寶少卿楊道選等亦贈恤有差後莊烈帝召見閣臣賀逢聖備述景春死事狀改贈太僕少卿張三鍚尋為官軍所獲磔死張大經陷于賊不能死明年張獻忠敗于瑪瑶山偕賊將曹威等歸于軍門士論恥之質實逺安晉髙安後周逺安明屬夷陵州以𨽻于徑州府令徑屬徑州府王元會蓋州人楊鏡四川人方孔照字潛夫桐城人王鰲永淄川人鄭崇儉字大章寧鄉人節本朝乾隆四十一年追諡郝景春忠烈阮之鈿忠楊道選烈愍王元會楊鏡節愍朱邦聞張見炫等並入祠六月畿內山東河南山西旱蝗時災荒四告流冦日熾緣墨吏朘民民益走為盜盜日多民生日蹙給事中王家彥乃上疏曰臣見秦晉之間飢民相煽千百為羣其始率自一鄉一邑守令早為之所民何至接踵萬盜盜何遂潰裂至此論者謂功令使然催科急者書上考督貴嚴者號循良不肖而墨者以東濕濟其叨餐一二賢明吏未于文法晨布莫由惟稍寬文網臺令撫綏盜之聚者可散散者可不復聚又舊制捕蝗令史部崴九月頒勘合于有司請實意舉行帝皆納之質實王家彥字開美莆田人加徵練餉廷臣多請練邉兵樞輔楊嗣昌定議宣府大同山西三鎮兵十七萬八千八百有竒三總兵各練一萬總督練三萬以二萬駐懷來一萬駐陽和東西策應餘授鎮監巡撫以下分練延綏寧夏甘肅因原臨洮五鎮兵十五萬五千七百有竒五總兵各練一萬總督練三萬以二萬駐固原一萬駐延安東西策應餘授巡撫副將以下分練遼東薊鎮兵二十四萬有竒五總兵各練一萬總督練五萬外自錦州內抵居庸東西策應餘授鎮監巡撫以下分練汰通州昌平督治二侍郎設保定一總督合畿輔山東河北兵得十五萬七千有竒四總兵各練二萬總督練三萬北自昌平南抵河北聞警策應餘授巡撫以下分練又以畿輔重地議增監司四人以一人兼轄大名廣平順德三人分駐鎮定保定河間薊遼總督下增監軍三人議上帝悉報可嗣昌所議兵凡七十三萬有竒然民流餉絀未嘗有實也帝又採副將楊德政議府汰通判設練備秩次守備州汰判官縣汰主簿設練總秩次把總並授轄于正官専練民兵府千州七百縣五百捍鄉土不他調嗣昌以勢有緩急請先行畿輔山東河南山西從之于是有練餉之議初嗣昌增勦餉期一年而止後餉盡而賊未平詔徵其率至是督餉侍郎張伯鯨請全徵帝慮失信嗣昌曰無傷也加賦出于土田土田盡歸有力家百畝增銀三四錢稍抑兼井耳薛國觀力贊之乃于勦餉外復增練餉七百三十萬言者謂九邉自有額餉槩豫新餉則舊者安歸邉兵多虛顯今指為實數餉盡虛糜而練數仍不足況兵以分防不能常聚故有抽練之議抽練而其餘遂不問又所謂抽練者仍屬虛文邉防愈益弱至州縣民兵益無實徒糜厚餉以嗣昌主之卒不可奪御史衛周嗣郝晉相繼劾嗣昌流毒天下民怨何極帝不納質實張伯鯨字繩海江都人衛周嗣曲沃人郝晉棲霞人發明明季百姓之困至是極矣流冦蔓延生民塗炭不思所以附循安輯之而日議增餉往時嗣昌十面張綱之策增勦餉至二百八十萬至是有練餉之議復增七百三十萬而向之勦餉期于一年而止者期滿而復全徵不思冦盜之盛由於貧民附盜盜未平而惟議加賊賊加而民不聊生民不聊生而益起為盜是加賦不惟不能平盜而適以驅之歸盜也至九邉二餉既有常數不核邉兵之虛糜而徒增抽練之新額卒之練兵而兵不加精增餉而餉不充用且勦餉藉以平賊而文燦用以資撫練餉名以養兵而邉防日以益弱國家無補瘡之益而小民被剜肉之苦史稱自萬厯至此先後增賦至千六百七十萬盜賊充斥土田荒蕪賦從何出而嗣昌猶謂土田盡歸有力加賦稍抑兼并嗚呼安得此亡國之言而莊烈信之而不可奪明祚雖欲稍延得乎哉秋七月總兵官左良玉討張獻忠于羅􅀈山敗績獻忠合羅汝才自房縣西走總兵官張任學遣其中軍羅岱偕良玉追之良玉令岱為前鋒已隨其後逾房縣八十里至羅􅀈山軍乏食賊伏兵要害岱與副將劉元捷鼓勇直上伏四起岱馬足絓于藤抽刀斷之蹶而復進乃棄馬步鬪賊圍急矢盡被執不屈死良玉軍後至亦大敗奔還軍符印信盡失棄軍資千萬餘士卒死者萬人事聞良玉以輕進貶三秩任學坐禠職時賊渠馬光玉屯淅川之吳村偽乞撫規渡漢江應獻忠淅川知縣郭守邦説降其黨許可變胡可受可變即賊中所號改世王可受則安世王也可變夜至淅川城下守邦處之東關可受為光玉所持約未定會總兵官孫應元黃得功方率京軍過南陽慮光玉合于獻忠則賊勢益熾乃趨內鄉掩擊其背令副將周遇吉等分道擊可受遇吉偕參將馬文豸等力戰可受拜呼曰始與許可變約降者我也今歸命遇吉駐馬受之應元得功益進兵攻光玉光玉黨分營南北兩山用木石塞道應元率文豸戰其南得功率副將林報園戰其北文燦所遣陳洪範亦至以所步兵過其東賊大潰光玉遁走遂不得與獻忠合獻忠既敗官軍于羅􅀈山謀入陜陜督鄭崇儉牽賀人龍李國竒軍禦之興安獻忠乃還走興山太平據楚蜀之交以屯其衆質實羅􅀈山一名羅㬋山在房縣西八十里太平明正德十年割東鄉縣置屬逹州以𨽻于夔州府本朝初徑屬夔州府雍正六年升達州為直𨽻州縣仍屬焉愍本朝乾隆四十一年追諡羅岱節熊文燦有罪削籍尋逮下獄帝聞穀城之變大驚削文燦官令戴罪視事及聞左良玉敗績大怒遣使逮文燦下獄生大辟所親姚明恭柄國而不能救也初文燦受命為總理自廣東之安慶道出廬山謁所善僧空隱僧迎謂曰公誤矣文燦屏人問故僧曰公自度所將兵卒制賊死命乎曰不能曰諸將有可屬大事當一面不煩指揮而定者乎曰未知何如也曰二者既不能當賊上特以名使公厚責望一不效誅矣文燦却立良久曰撫之何如僧曰吾判公必撫然流冠非海寇比公其慎之文燦乃辭去至是竟以撫致敗八月命楊嗣昌督師討賊嗣昌舉傅宗龍自代方解兵部事專治閣務而羅􅀈山敗書聞嗣昌疏引罪帝特旨令督師再疏辭不允賜尚方劍統制諸方兵馬總督以下並聽節制副將以下先斬後聞九月朔召見于平臺慰勞備至命吏部用人户部措餉兵部調度俱內外協應嗣昌曰臣聞君言不宿于家臣朝受命夕當啓行顧軍資甲仗未備望敕所司遄發帝悅曰卿能如此朕更何憂初四日復召見密有所諭左右莫得聞出御製贈司詩一章嗣昌跪誦拜且泣命賜宴趆二日陛辭復賜繕以二十九日抵襄陽即上疏為熊文燦辨四廷臣以文燦不能勦賊誣其無才不能用兵誣其無算文燦特過持重耳且流寇數十百萬不可勝誅必撫勦兼施方可解散文燦任事兩年功已十成六七獨獻忠再叛諸營動搖今以一眚廢置井所用之人訾之非公論蓋文燦之罷由河南巡撫髙名衡劾之及嗣昌檄召知府萬年策僉事孔貞會效用軍前名衡又劾二人以撫愚文燦不可用嗣昌以此發憤且曲庇文燦而帝卒重罪之不用嗣昌議也嗣昌既受代以十月朔大誓三軍湖廣巡撫方孔照總兵官左良玉陳洪範等畢會以良玉有將才請拜為平賊將軍報可是月賊賀一龍等掠葉圍沈邱焚項城之郛冦光山副將張琮刁明忠率京軍踰山五十里及其巢射殺緋袍賊二人斬首千七百有竒嗣昌稱詔頒賜十一月賊渠王國寧復以衆十人來歸國寧自號興世王與惠登相等同叛者也嗣昌受之于襄陽處其妻子樊城良玉既佩將軍印志益驕遣使以書謝嗣昌嗣昌不悅會賀人龍大敗賊興安嗣昌請進秩賜奬欲漸貴之以抗良玉良玉知之甚恨初獻忠及羅汝才惠登相等屯鄖陽興安山間聞嗣昌以宰相督師大軍並集頗懼雖時掠南漳穀城房竹山竹溪勢未甚熾諸將推鋒急擊宜可滅而嗣昌始至即有養鋭之説諸將遂無鬪志且積驕玩嗣昌令刁明忠自承天赴荆門乃自隨至襄陽嗣昌將戮之諸將力救僅搒百而已監軍僉事殷太白兩違軍令請于朝斬之其下始畏然嗣昌雖數遣將但遙相遏未嘗督令合擊又去賊逺而偵探時不實朝士皆憂之傅宗龍尅十二月平賊數趣分道進兵嗣昌不聽遷延至嵗暮未一戰張琮賀人龍之捷本非嗣昌功嘗檄巡撫方孔照遣楊世恩羅安邦勦羅汝才惠登相深入全軍皆覆他將戰黃麻又敗嗣昌劾孔照且自劾孔照被逮嗣昌亦戴罪立功質實髙名衡字什平沂州人孔貞會句容人楊世恩官湖廣副總兵羅安邦官荆門守備河本朝乾隆四十一年追諡世恩烈愍安邦節愍按南通志有信陽團練守備劉煜者儀封人于是年禦賊戰死山西通志有真定副總兵王震仲者蒲州人亦于是年擊賊將任國竒力戰殁于陳今並追諡烈愍冬十月我大清兵攻寧逺總兵官金國鳯死之大先是國鳯以副總兵守松山炮臺堞俱摧城中人負清兵攻其南門尋復環城發扉以行國鳯以木石甃補多方拒守終不下圍解帝大喜立擢署都督僉事為寧逺團練總管官再論功大署都督同知廕錦衣衛千户至是率親丁數十人出清兵復攻寧逺國鳯憤將士恇怯禦鏖戰移時矢盡力竭與二子俱死總督洪承疇上言國鳯素懷忠勇前守松山兵不滿三千乃能力保孤城非其才力優也以事權重號令一而人心肅也逮擢任大將兵近萬人反致隕命非其才力短也由營伍紛紜號令難施而人心不一也乞自今設連營節制之法戰守惟總兵官令是聽庶軍心齊肅所係于封疆甚大帝即允行之方松山被團巡撫方一藻議遣兵救援諸將莫敢應獨副將楊振請行至中道遇伏一軍盡覆振被執令往松山説降未至里許踞地南向坐語從官李祿曰為我告城中人堅守援軍即日至矣祿詣城下致振語城中守益堅振祿皆殉節死質實金國鳯宣府人死事狀聞于朝莊烈帝痛悼贈特進榮祿大夫左都督賜祭葬有司建祠增世職三級及國鳯父子柩歸復念其忠命所遇有司給以舟車且加二祭其妻張氏援劉綎例乞加宫保部議格不行而請于世職增級外再蔭本衛試百户以勸忠臣從之楊振義州衛人以殉難從優恤李本朝乾隆四十一年追諡金國鳯忠烈楊振烈愍祿入祠十二月下兵部尚書傅宗龍于獄初宗龍巡按貴州討定叛苖威名大著厯薊遼總督罷官歸前二年冬流寇大入四川陷三十餘州縣帝拊髀而恩宗龍曰使宗龍撫蜀賊安至是哉趨即家起宗龍代王維章與總兵羅尚文禦却賊是年夏以楊嗣昌薦召為兵部尚書秋八月至京召見宗龍為人抗直任氣不能從諛承帝意憤中樞失職嗣昌以權詭得主知宗龍朴忠初入見即言民窮財盡帝頗然之顧言之不已遂佛然曰卿當整理兵事爾既退語嗣昌曰何哉宗龍善策黔而所言卑卑皆他人唾餘何也自是所奏請多中格熊文燦既罷宗龍乃言向者賊流突東西嗣昌故建分勦之䇿今則流突者各止其所臣請收勢險節短之效總理止轄楚豫秦督兼轄四川鳯督兼轄安慶各率所屬協勦期十二月成功薦湖廣巡撫方孔照堪代文燦帝不用嗣昌督師嗣昌既至軍上章請兵食宗龍按例豫之不盡如所請嗣昌劾中樞不任職宗龍亦劾督師徒耗敝國家不能報效以氣凌廷臣會薊遼總督洪承疇請用劉肇基為團練總兵官中官高起潛又揭肇基恇怯宗龍不即覆帝遂怒責以抗旨命對狀奏上復以戲視封疆下吏法司擬戍邉不許欲置之死御定資治通鑑綱目三編卷三十七
