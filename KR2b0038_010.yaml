所載交址疆域最詳足資考證故備列之張顯宗字明逺寧化人王平息縣人以丁鈺為刑科給事中山陽民里社賽神鈺誣訐其聚衆謀不軌坐死者數十人法司因稱鈺才可用立命為給事中伺察百僚小過輒上聞舉朝側目輒鈺居官十年貪黷不顧亷恥母喪未朝起復視事隨衆大祀齊宫復與慶成宴為言官所劾謫戍邊質實丁鈺山陽人發明告訐小人姦黠之事也給事耳目清切之官也帝於是可謂教民偷而濫天爵矣一時陳瑛紀綱馬麟秦政學趙緯李芳等肆其毒螫朝野側目殃及無辜意㫖所在其流滋甚是年刑部尚書則吕震也都御史則陳瑛也瑛不足道史稱震為人佞諛傾險首先降附即迎㫖舉鈺一節鄙夫情狀不亦可恥乎秋七月皇后徐氏崩后好讀書常為帝言當世賢才皆髙皇帝所遺陛下不宜以新間舊又言帝堯施仁自親九族始帝輒嘉納初后弟增夀為惠帝所誅帝欲贈爵后力言不可不聽竟封之使其子景昌襲以告后后曰非妾志也終弗謝及是崩年四十有六帝悲慟為薦大齊於靈谷天禧二寺聽羣臣致祭光祿為具物諡曰仁孝皇后冬十一月彗星見諭趙王髙燧曰彗星見燕分爾宜謹慎出入伺察邊境母或怠忽修永樂大典書成先是元年秋七月帝諭翰林侍讀學士解縉等曰天下古今事物散載諸書篇帙浩穰不易檢閲朕欲悉采各書所載事物類聚之而統之以韻嘗觀韻府回溪二書事雖有統而紀載大略爾等其如朕意凡書契以來經史子集百家至於天文地志隂陽醫卜僧道技藝之言備輯為一書毋厭浩繁二年十一月翰林院學士兼右春坊大學士解縉等進所篡録韻書賜名文獻大成既而上覽所進書尚多未備遂命重修敕太子少師姚廣孝刑部侍郎劉季篪及縉總之命翰林院學士王景侍讀士王達國子祭酒胡儼司經局洗馬楊溥儒士陳濟為總裁翰林院侍讀鄒輯修撰王褒梁潛吳溥李貫楊覯曾棨編修朱紘檢討王洪蔣驥潘畿王稱蘇伯厚張伯頴典籍梁用行庶吉士楊相左春坊左中允尹昌隆宗人府經厯髙得晹吏部郎中葉砥山東按察僉事晏璧為副總裁命禮部簡中外官及四方宿學老儒有文學者充纂修簡國子監及在外郡縣學能書生員繕寫開館於文淵閣命光祿寺給朝暮膳至是書成凡二萬二千九百三十七卷一萬一千九十五冊賜名永樂大典帝親製序冠之賜廣孝等二千一百六十九人鈔有差質實韻府羣玉元隂時夫隂中夫撰回溪史韻宋錢諷撰陳濟字伯載武進人以布衣召書成授右贊善梁潛字用之泰和人王洪字希範錢塘人王稱字孟揚閩人葉砥上虞人戊子六年春正月岷王楩有罪削其官屬楩在藩與沐晟交惡帝以書諭楩而詔戒晟楩沈湎廢禮殺戮吏民帝怒奪寶冊尋念楩建文中久囚繫復子之楩不悛削其官屬護衛洪熙初徙武岡寄居州治久之始建王邸質實武岡州宋武岡軍明初府尋降州屬寶慶府今因之二月除北京逋賊詔除北京永樂五年以前逋賦免諸色課程三年三月除河南山東山西永樂五年以前逋賦夏四月始命雲南鄉試雲南巡按御史陳敏言雲南自洪武中已設學校請如各布政司三年一試從之五月亰師地震六月張輔沐晟班師還京自唐之亡交址淪于蠻服四百餘年至是復入版圖輔等振旅還京上交址地圖東西相距千七百六十里南北相距二千八百里户三百十二萬帝為賦平安南歌論功輔封英國公晟封黔國公王友清逺侯桞升安逺伯餘爵賞有差質實王友荆州人秋八月交趾復亂大軍之討黎氏也陳氏故官簡定先降將遣詣京師復逸去說化州僞官鄧悉阮師等下之定僭號稱大越改元興慶出沒乂安化州山中大軍還即出攻盤灘鹹子關扼三江府往來孔道諸州縣皆響應事聞帝命沐晟以兵四萬討之至冬成與簡定戰於生厥江敗績參贊尚書劉俊被圍自經死吕毅及參政劉昱皆死明年春復命張輔王友帥師與晟協勦簡定自稱上皇立陳季擴為帝改元重光季擴本蠻人詭言陳氏後交人不忍陳氏之亡相率歸季擴賊勢益張質實生厥江在交州府西劉昱武城人九月詔里獄囚科臣劾刑部都察院淹禁罪囚瘐死者衆帝召尚書吕震等切責期三日內悉疏雜犯死罪以下囚冬十二月命安逺伯栁升平江伯陳瑄率舟師沿海捕倭明年春升遇倭於靈山敗之瑄追至白山島百户唐錠等追至朝鮮義州界捷奏敕還師質實靈山在萊州府膠州東南海中白山島在登州府蓬萊縣海中阿嚕台殺果勒齊立布尼雅實哩為汗韃靼知院阿嚕台以果勒齊非元裔殺之迎元之後布尼雅實哩于巴什伯里立為汗己丑七年春正月申茶禁洪武中以茶易馬上馬給茶八十斤中下以次減之帝初年招來逺人遞增其數至是碉門茶馬司至用茶八萬餘斤僅易馬七十匹且多瘦損乃申嚴茶禁增設茶馬司後又特遣御史巡督二月帝北巡命皇太子監國詔惟文武除拜邊軍調發上請行在自餘常務悉啓太子處分命吏部尚書蹇義兵部尚書金忠右春坊大學士黃淮左諭德楊士竒輔太子監國時御史袁綱覃珩黨附陳瑛陷兵部主事李貞太子察其寃立白之以帝方寵瑛故特宥英而下珩於獄又御史方恢匿父喪太子令械送行在于是人皆服用法之當質實袁綱覃珩陷兵部主事李貞明史瑛言兵部主事李貞受皂隸葉轉等四人金請下貞獄貞妻擊登聞鼓訴寃皇太子命大臣廷鞠之自辰至午貞等不至惟葉轉至訊之云貞不承不勝拷掠死三皂隸皆笞死三日矣貞實未嘗受金先是袁綱覃珩至兵部索皂隸貞猝無以應綱珩銜之興化獄茹瑺下獄死瑺以首勸進封忠誠伯坐不送趙王遣歸里既復逮至京得釋還過長沙不謁谷王王以為言時方重藩王禮谷王又開金川門有功帝意嚮之陳瑛遂劾瑺違祖制逺下錦衣衛獄瑺知不免命子銓市毒藥服之死法司劾銓毒其父請以謀殺父母論後以銓實承父命减死與兄弟家屬二十七人謫戍廣西河池仁宗立釋還發明瑺洪武時起家監生至尚書太子少保建文朝暴昭發其賊罪出掌河南布政司尋復召為兵部尚書任亦重矣乃金川門之啓不能致命反首先勸進遂封爵子鑑尚秦府郡主以為可長保富貴也豈知仰藥囹圄陷其子於大惡人孰無死如瑺真悔其不早耳史稱瑺居官謹慎謙和有容其死也人頗惜之瑺蓋庸鄙者流迫於瑛綱之毒手雖殺不以罪而不書其官所以勵臣節也三月都督僉事平安自殺初惠帝時安以列將驍勇善戰屢挫燕軍已而兵敗被執送北平帝即位纍進後軍都督僉事及是帝覽章奏見安名曰平安尚在耶安聞遂自殺夏閏四月詔重罪皆五覆奏發遣以上皆五覆奏以示欽恤五月封威喇特瑪哈穆特為順寧王太平為賢義王巴圖博囉為安樂王威喇特䝉古部落在韃靼西元亡其強臣孟克特穆爾據之帝自起兵北平即與之通和已而孟克特穆爾死衆分為三其渠曰瑪哈穆特曰太平曰巴圖博囉帝即位屢遣使諭賜至是使諾觀達什等來貢馬仍請封遂封三人皆特進金紫光祿大夫加王號自是嵗一朝貢質實威喇特駐鐵柱谷在歸化城西三百六十里帖巴圖博囉舊作把秃孛羅孟克特穆爾舊作猛可穆兒諾觀達什舊作暖答失今並改餘見前遣給事中那驥使韃靼為所殺帝以書諭布尼雅實哩不聽命至是復遣驥往布尼雅實哩殺之詔御史勿復用吏召御史張循理等二十八人至問其出身皆由進士及監生惟洪秉等四人由吏帝曰用人雖不專一途然御史為朝廷耳目之寄宜用有學識達治體者黜秉等為序班詔自今勿復用吏明年冬申諭吏部著為令秋七月以邱福為征虜大將軍帥師征韃靼敗績帝以福為大將軍王聰霍親副之王忠李逺為左右參將將精騎十萬北討時布尼雅實哩已為威喇特所襲破與阿嚕台徙居臚胊河福帥千騎先馳遇遊兵擊敗之遂渡河獲其尚書一人言布尼雅實哩聞大兵至惶恐北走去此可三十里福大喜曰當疾馳擒之諸將請俟諸軍集偵虛實然後進福不從率衆直薄敵營戰二日每戰敵輒佯敗引去福鋭意乘之初帝慮福敢戰輕敵陛辭日戒之曰兵事宜慎重勿易敵為所紿及是李逺諌曰敵誘我深入進必不利始天子與將軍言何如而遂亡之耶王忠亦力言不可福皆不聽敵衆奄至圍之數重聰戰死逺馬蹶被執罵不絶口死福及霍親王忠皆被殺全軍盡沒事聞帝震怒奪福封爵徙其家海南追贈逺莒國公諡忠壯聰漳國公諡威毅念諸將無可任遂决意親征九月庚午朔日有食之冬十一月張輔討交址破之獲簡定輔以賊負江海不利陸師乃駐北江仙遊就叱覽山伐木造舟招諒江諸府避寇者復業遂進至慈亷州破喝門江克廣威州孔目柵遣徐政戍盤灘賊黨鄧景異來攻飛鎗洞政脅猶力戰腹潰死輔進師鹹子關賊以舟蔽江為營時八月西北風急官軍衝擊乘風縱火俘斬無算追至太平海口鄧景異迎戰短兵接擊斬三千級餘衆皆潰于是季擴遣使自言陳氏後請紹封輔曰向者遍索陳氏後不應今詐也吾奉命討賊不知其他叱斬之遂遣朱榮等以步騎先輔舟師繼之自黃江至神投海㑹師清化獲簡定於美良山中及其黨送京師皆伏誅惟陳秀擴遁去帝留沐晟討之召輔還質實喝門江在交州府西南太平海口在鹹子關南黃江在舊清化府東元和志謂之小黃江下流入海神投海亦曰神符海口在舊建平府南美良交址舊縣在故廣威州東南徐政儀真人建文時為揚州衛副千户全城歸升都指揮同知始令中官刺事守京城內使言城門郎縱酒擅離所守城門郎亦言以母病白內使暫歸即來嘗以事忤內使故搆臣皇太子曰城門郎無罪內使上網朝廷下誣無罪者下錦衣衛治之令榜示今後內官內使言事不實及誣私枉人者置重典御定資治通鑑綱目三編卷五
