  text: 欽定四庫全書御定資治通鑑綱目三編卷五
  hash: sha256:d6f002a36ccde6497e1a48a9ba0a84b89eaffd91004b1a658b369dee56cb396c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0038_WYG_010-1a, image: WYG0340/WYG0340-0103a.png}
body:
  text: 起癸未明成祖永樂元年盡己丑明成祖永樂七年凡七年癸未成祖文皇帝永樂元年春正月復周齊代岷四王國帝即位復四王爵遼王植改封荆州至是四年皆子舊封各令之國谷王橞以開門功賞賜優渥尋徙封長沙遼府長史程通建文朝上封事陳禦備策有言其多指斥者下獄死并捕其友人徽州知府黃希范論死籍其家質實按明史諸王表以遼王植之改封荆州系之永樂二年而遼簡王傳云建文中燕兵起植渡海歸朝改封荆州是又謂植之改封在建文時考明成祖實録洪武三十五年九月敕遼王植曰弟以遼地荒逺經涉海洋固請改國荆州且以廣寧重鎮就留三護衛于彼以益邊防欲于荆州别給一衛備使令言之再三却而復至勉從所請建國荆州而仍舊封號則植之改封荆州實于成祖即位之九月明史表傳皆誤希本朝乾隆四十一年追諡程通黃范節愍以北平為北京設北京留守行後軍都督府行部國子監行太僕寺改北平為順天府質實行都督府置左右都督同知僉事等官行部置尚書二員侍郎四員所屬六曹各設郎中等官二月遣御史分巡天下命監察御史分詣各布政司巡視民瘼自是為定制至洪熙元年定出巡史期以八月徙寧王權于南昌初權之被誘入關也帝許以事成中分天下及即位留之京師時大寧殘廢已無可歸乃乞改南土請蘇州及錢塘皆不許封之南昌詔即布政司為邸瓴甋規制無所更已而有告權巫蠱誹謗者密探無驗得已權自是日韜晦搆精廬一區讀書鼓琴其間終帝之世得無患質實姜清祕史王屏從兵與老中官數人偕往南昌稱病卧城樓乞即封南昌帝不得已封之考明史寧王以善謀稱既被成祖誘執復不許封內地當必圖免禍自全豈有不俟命而徑往南昌之理成祖實録云遣王之國賜鈔一萬錠親製詩送之野史不足據也錢塘秦錢塘縣改唐為塘明為杭州府治今因之遣中官侯顯等使外域帝聞烏斯藏僧哈里馬勒善幻化欲致一見因通迤西諸番命顯齎書幣往迓選壯士健馬護行未幾又遣馬彬使瓜哇蘇門答剌諸國李興使暹羅尹慶使滿剌加柯枝諸國于是中官銜命異域者紛紛四出矣質實瓜哇在占城西南宣德七年入貢表書一千三百七十六年蓋漢宣帝元康元年乃其建國之始蘇門答剌在占城西南海中或言即漢條支唐波斯大食二國地西洋要㑹也暹羅即隋唐赤土國後分為暹與羅斛二國元時羅斛并有暹地遂稱暹羅斛洪武十年來朝賜暹羅國王之印自是始稱暹羅滿剌加在占城南海中或言即古頓遜唐哥羅富沙柯枝在西海中或言即古盤盤國哈里瑪勒舊作哈立麻今改三月徙大寧都司于保定始以大寧地畀烏梁海初北平兵起厚賂三衛說之來既誘執寧王權乃選烏梁海三千人為竒兵從戰至是改北平行都司為大寧都司徙保定遂割大寧地畀烏梁海以償前勞自是洪梁中所築諸城盡廢北邊失一重鎮天順末末遼為東西及三岔河北故地悉為烏梁海所有遼東宣府聲援隔絶矣質實遼河在奉天府西一百里有東西二源自邊外合流而南經開原鐵嶺二縣西又南經承德遼陽海城之西又南入海三岔河一作三汊河遼河流經鐵嶺縣北清河自東來㑹入雙峽口西南分為二曰內遼河外遼河遠縣之西南合為一至開城為巨流河又分流復南滙經海城縣之西與太子河㑹謂之三汊河左右即遼東遼西所由分命平江伯陳瑄等督海運餉北京遼東洪武中靖海侯吳禎等先後督江浙邊海衛軍嵗轉遼餉至三十年以遼餉贏羡罷海運及是北方軍儲不足乃命瑄與都督僉事宣信帥舟師由海道運糧四十九萬石餉北京遼東自後嵗以為常振直𨽻北京山東河南饑夏四月命户部尚書夏原吉浚吳淞江時蘇松嘉湖數郡頻年水災命原吉治之原吉上言浙西諸郡蘇松最居下流嘉湖常頗髙環以太湖綿亘五百里納杭湖宣歙溪澗之水散注澱山諸湖以入三泖頃為浦港湮塞漲溢害稼拯治之法在濬吳淞諸浦按吳淞江袤二百餘里廣百五十餘丈西接太湖東通海前代常疏之然當潮汐之衡旋疏旋塞自吳江長橋抵下界浦百二十餘里水流雖通實多窄淺從浦扺上海南蹌浦口百三十餘里潮汐淤塞已成平陸灧沙游泥難以施工嘉定劉家港即古婁江徑入海常熟白苑港徑入江皆廣川急流宜疏吳淞南北兩岸安亭等浦引太湖諸水入劉家白苑二港使其勢分松江大黃浦乃通吳淞要道今下流遏塞難濬旁有范家濱至南蹌浦口徑達海宜濬令深濶上接大黃浦達泖湖之水庶幾復禹貢三江入海之舊水道既通乃相地勢各置石閘以時啓閉每嵗水涸時預修墟岸以防暴流則水患可息帝命發民丁開濬原吉晝夜經畫布衣徒步以身先之明年原吉復行九月功遂成質實吳淞江即古松江自太湖分流經吳江縣東南下流至嘉定縣入海太湖在蘇州府西南常州府東南湖州府北周五百里亦曰五湖震澤具區笠澤皆是也歙縣秦置明為徽州府治今因之澱山湖在崑山縣東南八十里松江府西北七十二里澱山舊在湖中嵗久沙淤山去湖十餘里三泖即泖湖在婁縣西三十五里有上中下三名北為上泖亦曰圓泖中為大泖南為下泖亦曰長作泖長橋在吳江縣東二里長一百三十丈下界浦一夏駕浦在崑山縣東南二十里南蹌浦舊志在上海縣東北三十六里今堙劉家濱即劉河口在嘉定縣北二十四里太倉州東南七十里婁江入海之口也常熟縣梁置唐移置于故海虞城明屬蘇州府今因之白泖港在常熟縣東七十里今曰白苑浦在太倉州東北宋嘗置寨于此安亭在崑山縣東南四十五里今有鎮大黃浦在松江府東南十八里首受三泖諸水東流經華亭諸縣至上海縣東北合吳淞江入海相傳楚春申君所鑿亦名春申浦范家濱在松江府東二十五里三江史記正義蘇州東南三十里名三江口一江西南上七十里至太湖曰松江一江東北下三百餘里入海曰下江亦曰婁江一江東南上七十里至白蜆湖曰上江亦曰東江方輿記要云按原吉治水時多艷稱之議者謂原吉浚白茅欲以泄湖水不知白茅勢髙于湖終不足以泄震澤之水又鑿下駕浦掣吳淞江水北達婁江不知婁江雖通僅自復故道而新洋下駕二浦橫衝松江之腹是反為之害也又浚上海范家濱掣吳淞江南達黃浦入海不知松江為東西橫流大水勢順流駛黃浦為南北縱流小水勢逆流緩𨗳南北之縱浦奪東西之巨流是通其小而塞其大計一時之近功忘百世之逺圖也其後三吳多水患實原吉創垂未善云秋八月徙富民實北京時發流罪以下墾北京田又徙直𨽻蘇州等十郡浙江等九省富民實之削歷城侯盛庸爵尋自殺帝初命庸鎮淮安旋移山東庸常不自安陳英誣以心懷異謀遂削其爵庸自殺冬十一月頒大統厯于朝鮮諸國北京地震閏十一月封胡􅐏為安南國王建文初黎季犛弒國王陳日焜立其子顒又弒之立其弟􅀢復弒􅀢而篡其位更姓名曰胡一元名其子蒼曰胡􅐏謂出帝舜裔胡公後僭國號大虞年號元聖尋自稱太上皇傳位于􅐏朝廷不知也帝初踐祚􅐏遺使奉表朝貢詭言安南王陳氏嗣絶臣陳氏甥為衆所推乞賜封爵帝遣使齎敕諭其陪臣耆老詢以陳氏繼嗣有無及推立誠僞􅐏隨遣使還奏遂詔封􅐏未幾安南舊臣裴伯耆詣闕告難言臣祖父皆執政大夫死國事賊臣黎季犛乃故經略使黎國髦之子弒主篡位屠戮忠良滅族者以百十數臣兄弟妻孥亦遭害臣禦冦東海遁逃詣闕明年老撾送前國王日煃弟陳天平來奔請兵復讐􅐏方使賀正旦帝出天平示之皆錯愕下拜有泣者伯耆責使者以大義帝始悔封􅐏之誤遣使詰責令具篡弒之狀以聞􅐏復遣使謝罪請迎天平歸國帝信之三年冬遣都督僉事黃中吕毅以兵納天平於安南四年春將至芹站山徑險惡􅐏伏兵邀殺天平輔行薛嵓自經死中等整兵欲戰橋斷不得前引還帝大怒决意興師徵中毅至貸其死隨軍立功自贖質實成祖實録陳天平奏云臣天平前安南王烜之孫天明之子日煃弟也日煃卒弟曔立子晛繼之晛子顒顒子􅀢皆為黎季犛所弒與史傳小異老撾古不通中國成祖即位土官刀線歹貢方物始置老撾軍民宣慰使司其地南至交趾西北六十八程至雲南布政司今為南掌國芹站在二安南國舊諒山府雞陵關南吕毅項城人􅐏有低邸音又七修類稿安南黎季及子奆疑即䎰字音昨奆權上聲玉篇甚大也始命內臣出鎮初惠帝御內臣嚴燕兵逼江北多逃入軍中漏朝廷虛實帝深以為忠於已及即位封賞既行諸宦官言功不已帝患之㑹鎮逺侯顧成都督韓觀劉真何福等出鎮貴州廣西遼東寧夏諸邊乃命宦官有謀者與之偕行賜公侯服位諸將上未幾雲南大同甘肅宣府永平寧波亦各相繼遣使已又設京營提督大權悉以委寄遂為一代厲階質實王世貞史料以中官出鎮自永樂八年遣馬靖始明史本革除備遺録始于是年特書于本紀今據之書于此甲申二年春三月始選進士為翰林院庶吉士先是庶吉士不專屬翰林及是春廷試進士賜曾棨等及第出身有差復命於第二甲擇文學優等楊相等五十人及善書者湯流等十人俱為翰林院庶吉士于是庶吉士遂為翰林官尋又命學士解縉等選才資英敏者就學文淵閣縉等選修撰棨庶吉士相等二十八人以應二十八宿之數庶吉士周忱自陳年少願學帝喜而俞之時人謂之挨宿以其在二十八宿之外也質實選進士為翰林院庶吉士謂之館選其後或閒科一選或連科屢選或數科不選所選多寡無定額比三年試之其留者二甲授編修三甲授檢討不得留者為給事中御史主事或外為州縣官謂之散館宣德五年始命學士教習萬厯以後掌教習者以吏禮二部侍郎為之曾棨字子啓永豐人楊相泰和人湯流泰和人周忱字恂如吉水人按實録縉等選修撰曾棨編修周述周孟簡庶吉士楊相劉子欽彭汝器王英王直余鼎章敞王訓柴廣敬王道熊直陳敬宗沈升洪順章朴余學夔羅汝敬盧翰湯流李時勉段明倪維哲袁添祿吾紳楊勉二十八人就學文淵閣命司禮監月給筆墨紙光祿給朝暮膳禮部月給膏燭鈔人三錠工部擇近第宅居之周述字崇述吉水人孟簡述從弟劉子欽吉水人彭汝器安福人王英字時彥金溪人王直泰和人余鼎星子人章敝字尚文㑹稽人王訓廬陵人柴廣敬餘姚人王道永嘉人熊直豐城人陳敬宗字光世慈溪人沈升海寧人洪順懷安人章朴寧海人余學夔泰和人羅汝敬吉水人盧翰星子人李時勉名懋以字行安福人段明守時舉武進人倪維哲一作惟善晉江人袁添祿衡山人吾紳字叔縉開化人楊勉江寧人夏四月立子髙熾為皇太子封髙煦為漢王髙燧為趙王帝初起兵髙煦常從戰有功帝以為類已髙煦亦以此自負謀奪嫡及議建儲邱福等言髙煦有功宜立獨金忠力爭以為不可帝召解縉問之縉稱皇太子仁孝天下歸心帝不應縉又頓首曰好聖孫為皇孫瞻基也復問黃淮尹昌隆對與縉同帝意乃决質實髙煦初封雲南後改樂安髙燧封彰德皇孫瞻基仁宗孝誠張皇后生是為宣宗以僧道衍為太子少師道衍從帝藩邸定䇿起兵戰守機事皆决焉帝即位授道衍僧録司左善世及是論功為第一拜資善大夫太子少師復姚姓賜名廣孝帝與語呼為少師而不名命蓄髮不肯賜第及兩宫人皆不受常居僧寺退朝仍緇衣帝往來兩都出塞北征留輔太子於南京皇長孫出閣就學又侍說書六月汰冗官帝以吏部所録中外官數比舊額增數倍命汰之尚書蹇義等言在京各官額外添設者送部别用在外令所𨽻上官嚴行考核今年所取二甲三甲進士量留七十員分𨽻諸司觀政各王府教授伴讀缺於第三甲內選用餘悉遣歸進學從之封哈密恩克特穆爾為忠順王哈密漢伊吾盧地元末以威武王納固爾鎮之改封肅王卒弟恩克特穆爾嗣帝即位遣使招諭遂入貢詔封忠順王明年迤北汗郭勒齊毒死之以病卒聞命其兄子托克托襲封質實伊吾盧後漢置宜禾都尉於此唐置伊州明設哈密衛其後為土爾番所據今編旗視各䝉古有通判駐之在嘉峪關西北一千六百里納固爾元族子恩克特穆爾舊作安克帖木兒納固爾舊作納忽里托克托舊作脫脫今並改秋九月周王橚來朝獻騶虞百官請賀帝曰祥瑞之來易令人驕是以明主遇祥自警未嘗因祥自怠警怠者國之安危繫焉騶虞若果為祥在朕更當修省以胡儼為國子祭酒儼在閣承顧問嘗不欲先人然少戇帝以為祭酒遂不預機務冬十月河决開封命河南都司布政司城池有衝決者即修之黃河清蒲城河津黃河清十二月同州韓城黃河亦清質實河津宋宣和初改龍門縣曰河津明屬蒲州今屬絳州同州西魏置明屬西安府今升府韓城隋改夏陽縣曰韓城明屬同州今屬同州府籍長興侯耿炳文家炳文自殺刑部尚書鄭賜都御史陳英劾炳文衣服器皿有龍鳯飾玉帶用紅鞓僭妄不道詔籍其家炳文遂自殺子璿前軍都督僉事尚懿文太子長女江都公主建文初進駙馬都尉炳文北伐璿勸直搗北平不聽帝即位璿稱病不出坐罪死弟瓛後軍都督僉事與弟尚寶司卿瑄皆坐罪死炳文雖太祖功臣然以惠帝肺腑戚故賜等希㫖劾之遂及十一月京師地震濟南開封亦震蠲蘇松嘉湖杭水災田租十二月李景隆有罪削爵初景隆以迎降功加太子太保授左柱國朝廷有大事景隆以班首主議諸臣皆不平周王首發其建文時至邸受賕事廷臣復劾其與弟增枝謀逆有狀詔削勳號絶朝請至是李至剛復言其居家不道事遂奪爵固私第籍其家質實李至剛名綱以字行華亭人乙酉三年春正月韃靼索和爾內屬初北平兵起㑹果勒齊弒坤特穆爾稱汗遣使賀之遂與通和其國公趙圖嚕根等率衆助戰並厚加犒賜及帝即位屢使致書果勒齊賜之銀幣并及其知院阿嚕台等至是阿嚕台别部索和爾及察罕達嚕噶等先後來歸質實索和爾舊作掃湖兒趙圖嚕根舊作脫列干達嚕噶舊作達魯花今並改免順天永平保定田租二年以數年用兵供給特勞故休息之二月命趙王髙燧居守北京夏四月除直𨽻浙江湖廣四川廣東江西福建河南户絶田租計田三萬五千一百八十餘頃是春免湖廣被水田租六月振蘇松嘉湖饑免天下農民户口食鹽鈔秋九月蠲蘇松嘉湖水災田租凡三百三十八萬石六月遣中官鄭和使西洋帝疑建文帝亡海外命和及王景𢎞等蹤跡之多齎金幣率兵二萬七千餘人造大船六十有二由嘉定劉家港泛海至福建達占城以次遍厯西洋頒天子詔宣示威德因給賜其君長不服則以兵懾之五年和等還諸國使者隨和朝見帝大喜未幾復命和往遍賚諸國由是來朝者日衆和先後凡七奉使三擒畨長諸番利中國貨物益互市通商往來不絶故當時有三保太監下西洋之說而後之奉命海表者莫不盛稱和以誇外番然中國前後耗費亦不資其隨行軍士或以舟敗漂沒異國有十餘年始得還者什不存一二云質實鄭和雲南人初使擒舊港酋陳祖義舊港故三佛齊國也再使擒錫蘭國王伊埒古鼐爾及其妻子最後蘇門答剌王錫斡拉謀弒其主并欲殺和和率兵討擒之和是年奉使五年九月還六年九月再使九年六月還十年十一月往十三年七月還十四年冬往十七年七月還十九年春往二十年八月還二十二年正月往比還成祖已晏駕洪熙元年二月仁宗命和以下番諸軍守備南京南京設守備自和始宣德五年六月和景𢎞復奉命厯忽魯謨斯等十七國而還和事三朝所厯占城瓜哇真臘舊港暹羅古里滿剌加渤泥蘇門答剌阿魯柯大葛蘭小葛蘭西洋瑣理瑣里加異勒阿撥把丹南巫里甘把里錫蘭山南渤利彭亨急蘭丹忽魯謨斯比剌溜山孫剌木骨都東麻林剌撒祖法兒沙里灣泥竹步榜葛剌天方黎伐那孤兒凡三十餘國剌伊埒古鼐爾舊作亞烈苦奈兒錫斡拉舊作蘇斡今改正遣中官山夀帥師出雲州時命武城侯王聰覘邊兵别遣山夀帥騎兵出雲州北行㑹之人齎一月糧每三十里置五騎以待馳報宦者典兵自此始質實雲州驛在今赤城縣北三十里即元故雲州也明洪武初廢州置驛宣德五年置城戍為雲州堡景泰五年增設千户所本朝改設守備冬十月殺駙馬都尉梅殷初殷守淮安悉力防禦及帝即位殷尚擁兵淮安帝迫公主齧血為書招之殷得書慟哭乃還京既入見帝曰駙馬勞苦對曰勞而無功徒自愧耳帝默然二年陳英奏殷祝詛畜養亡帝命執殷家人送遼東至是殷入朝都督僉事談深指揮趙曦擠殷死橋下以主殷自投水聞公主牽帝衣大哭問駙馬安在帝曰為跡賊無自苦尋都督同知許成發其事帝命法司治深曦罪深曦大呼曰上命也奈何罪臣帝大怒立斬之籍其家封成永新伯官殷二子順昌為中府都督同知景福為旗手衛指揮使鄂爾和者降人也事殷久請於帝斷深曦手足剖其賜祭殷遂自經死又國子博士黃彥清坐在殷軍中私諡建文帝誅死質實黃彥清歙縣人爾本朝乾隆四十一年追諡彥清節愍鄂和舊作瓦刺灰今改正十二月沐晟討八百大甸降之初洪武二十一年八百入貢設宣慰司自是及永樂初頻入貢賜豫如例二年以土官刀招你為八百者乃宣慰使其弟刀招散為八百大甸宣慰使已而遣內官齎敕諭孟定孟養等部道經八百大甸為招散所阻及是晟帥車里諸宣慰兵至八百境破其猛利石崖及者答二塞又至整線寨木邦兵破其江下等十餘寨八百恐詣軍門降敕班師質實八百世傳部長有妻八百各領一寨因名八百媳婦元元統初招附