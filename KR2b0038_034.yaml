body:
  text: 起壬寅明神宗萬厯三十年盡壬子明神宗萬厯四十年凡十一年壬寅三十年春正月振湖廣灾湖廣潛江沔陽石首巴陵華容廣濟景陵平江荆門安鄉大冶興國等州縣灾荒巡按御史王立賢請將改折緩徵錢糧蠲免振貸從之質實潛江漢竟陵縣唐置潛江縣明屬安陸府石首晉置縣以縣北有石首山而名明屬荆州府巴陵晉置縣明為嶽州府治華容漢末置安南縣隋改曰華容縣明屬嶽州府平江秦羅縣後五代唐改平江明屬嶽州府今皆因之安鄉晉置縣明屬嶽州府之澧州今屬澧州直𨽻州大冶唐為永興縣地置大冶場南唐為大冶縣明屬武昌府之興國州今屬武昌府王立賢山西儀衛司人二月振福建灾以福建晉江南安惠安同安蒲田仙遊諸縣並告灾分蠲振質實晉江晉晉安縣唐析置晉江縣明為泉州府治南安三國吳置東安縣晉改為南安縣明屬泉州府莆田隋置縣仙遊唐置縣明並屬興化府今皆因之帝不豫召大學士沈一貫具詔除弊政翼日帝瘳寢前詔皇太子姻禮甫畢帝忽有疾急召諸大臣至仁德門俄獨命一貫入啓祥宫後殿西暖閣皇太后南面立稍北帝稍東具冠服亦南面太子諸王跪于前一貫叩頭起居畢帝命之前諭曰朕病篤矣礦稅事朕因三殿二宫工未竣權宜採取今可與江南織造江西陶器俱止勿行所遣內監俱令還京法司釋久繫罪囚建言得罪諸臣咸復其官言已就卧一貫尋叩頭出擬㫖以進是夕閣臣九卿俱直宿朝房漏三鼓中使捧諭至具如帝語一貫者惟中加南京供應機房并舊制并蘇杭織造內有御用及婚禮袍服俱著仍舊已採徴在官金銀等件并織完絨匹燒完磁器還著原差內官押解進用如有姦惡截阻及驛遞應付遲慢者指名參處數語諸大臣期即奉行翼日帝疾瘳悔之遣中使二十輩至閣追取前諭一貫不能持惶遽繳入時司禮太監王義方在帝前力爭曰王言何可反汗帝恕欲手刃之義言愈力而中使已持前諭至後義見一貫唾曰相公稍持之礦稅撤矣何怯也自是大臣言官疏請者日相繼皆不聽閏二月復河套諸部貢市先是套部市賞既罷者十有餘年二十四年乞欵進馬詔許增其價後因各部侵軼不常由是欵議罷遂復松山築邊城諸部長恐至是濟農巴爾章等輸誠乞欵兩鎮新舊撫臣皆言欵便許之時濟農巴爾章等乞欵聞延綏巡撫王見賔將去恐後欵事不成請益切在寧夏者曰珠蘇爾亦請之巡撫楊時寧兩鎮交奏㑹孫維城代見賔時寧亦遷去以黃嘉善代之二人並申約束維城議上善後六事一市貨務精委官協辦并程以殿最一撫賞宣撫必諗識情形如波羅參將馬應時口習畨語應令兼管一選廉幹文武官各一員専驗馬匹臕壯堪備騎操方聽解道驗烙一市賞須有定額軍民不許私易將官不許貪功經勞官不許扣尅及以濫物搪塞一延鎮應改創邊牆築圍垣如城匝以深池庶緩急無虞一定市期并赴賞之例其進貢之馬務擇臕壯不得槩收嘉善議上善後七事一市銀請自二十年以後每年照數聽鎮咨部題發一每嵗之中一年無犯方準一次欵市一市分衝緩守備通判等官按地分管便于責成一定撫賞之例如生事則議革一定易馬之額如驗堪騎操方許分給營堡一松山近始收復不可不加計防之如陽順隂違即當出兵勦伐一每嵗彙查將領有無失事報部處分兵部皆議復從之自是欵事之議復堅河州黃河竭陜西河州黃河水乾見底至三月水突漲壞橋并墩房衝去陜西總督李汶巡撫賈待問疏言黃河上流水盡乾竭今嵗火星失度日光如赭風霾黃霧種種變異然未有若此河之為變者河瀆之行猶元氣之周身而貨財之流布於天下也今天下財力可謂匱絀問閻貧府庫貧獨礦稅監使及參隨土棍之家富耳神河天險源涸流徙此脈竭財匱之象也夫民匱則愁苦愁苦則思亂直須時耳伏望罷礦稅撤中使人心既悅天意自回不報夏四月振順天永平饑二府所屬各州縣告灾蠲振有差五月四川地震地大鳴如雷至六月復有聲房屋俱動六月福建地震戊申興化泉州二府同日震辛亥福州興化泉州三府復同日震秋七月緬犯騰越初雲南稅監楊榮開採阿瓦猛密諸寶井云嵗可得數十萬既而所進不得什一又開採麗江土司地勢益橫番漢居民相率燔稅厰殺委官至是緬人以稅使貪暴為辭攻陷蠻莫宣撫使思正奔騰越緬賊追及之有司殺思正以謝賊始解質實猛密即孟密安撫司明神宗時改為宣撫司時又析孟密地置蠻莫安撫司九月大星見己未朔夜有大星見東南色血紅大如碗忽化為五中一星最明久之㑹為一星大如簏辛巳夜流星大如雞卵青白色尾有光又流星大如碗起自參入天苑又有大小星數百四面交錯而行禮科給事中張問達以星變請罷礦稅不報質實張問達字德充涇陽人冬十月振南直𨽻灾宿松望江二縣重灾惟改折休寧祁門婺源等縣以次振恤泗州虹縣等十二州縣蠲振冇差質實宿松望江並隋置縣明屬安慶府祁門唐置縣以縣東北有峰名祁山其西南有兩石對峙如門故名明屬徽州府虹縣唐置縣明屬鳯陽府今皆因之十二月大學士沈一貫奏御史巡差缺員不報時天下御史巡行諸差務凡十有三處至是缺其九一貫等奏請遣御史分往受事庶監察有所責成而綱紀可振不報癸卯三十一年春正月營兩宫復建乾清坤寧宫輔臣沈一貫等入視工程因亟言巡漕巡倉二差及河南陜西二巡撫缺應補授差遣發明神宗時南北卿曹半皆虛設司道郡守比嵗缺員庶務之廢弛百司之曠職無有甚于此者輔臣往往經年無入對之事雖有書思補衮之忱無由徑達獨于入視工作之地乃有畫接從容賜茶問答之候此沈一貫等所以乘召亟請也夫巡撫為封疆表率察吏安民一方之責綦重即漕倉巡察凡儲備經理之宜亦將賴以考核責成此豈可申請再三而或留中不報補缺虛懸者若必待營建兩宫而後得敷陳盡說無論股肱惰而萬事墮日滋叢脞即此藉將作之臨為納牖之舉顧可以垂諸史策哉詔户兵二部核軍實時內府所供寖多户部困不能支九邊軍額八十六萬有竒將辨率以空名支餉且多尅減邊兵屢譁帝急命户工二部鈎考軍實卒不能振刷也三月吏部奏天下郡守缺員不報時天下郡守缺者幾十之五是時南北六卿正二亦多缺不補沈一貫請發羣臣章疏不省一貫等言各衙門本章例應三日即下皇上初年始有留中之事至于今日有奏而不發票者有栗上而不發行者在皇上蓋出詳慎不輕之意且昭操縱不測之權而人心自此怠弛政務從而壅滯且嵗月滋久保無乘機壅蔽藉手作姦者乎况始于權宜後遂成例亦何可昭示萬世請將各衙門章疏可行者即賜允行不可行者明示改正必期無一疏不報無一事不決疏入不省遼東火大福堡火焚燬房屋軍器無算又火起地中大如車輪髙三丈烟髙三丈餘質實大福堡在廣寧左屯衛西大興堡之東北夏四月丁亥朔日有食之是日當享太廟禮部侍郎郭正域言春秋書災異莫大于日食故禮諸侯旅見天子入門不終禮者有四日食與焉當祭而日食牲至未殺則廢况時惟四月又為正陽變異非細是日辰時食至巳時若救護後午刻祭享曾未踰時兩興大禮精禋不肅宜以朔旦救日詰朝享廟詔改享太廟于初五日質實郭正域字美命江夏人承天地震二十日丙午承天府鍾祥縣地震自南方起至西北方屋宇皆震裂有聲五月京師地震二十三日戊寅京師地震是日鳳陽大雨雹毁皇陵殿脊六月黜楚中尉華越為庶人初楚恭王得廢疾隆慶五年薨遺腹宫人胡氏孿生子華奎華璧或言華奎乃恭王妃兄王如言妾尤金梅子華璧乃妃族人王如綍奴王玉子內官郭綸取以養之儀賔汪若泉嘗訐奏事下撫按王妃持甚堅得寢帝八年華奎嗣爵華璧亦封宣化王宗人華越者素彊禦忤王及是遣人訐華奎異姓子不當亂宗沈一貫納華奎重賄屬通政使格其疏不上月餘華奎劾華越疏至乃上之事下禮部未幾華越入都訴通政司邀截實封及華奎行賄狀楚宗與名者凡二十九人通政司懼召華越令更易月日以上㫖并下部署尚書事郭正域楚人也頗知假王事請勘虛實以定罪案一貫右華奎言親王不當勘但宜體訪正域以事關宗室不經勘問誰敢分剖華奎懼奉百金為正域夀且屬毋竟楚事當酬萬金正域嚴拒之已而撫按行勘皆言無左驗而華越妻乃王如言女持僞王說甚堅廷議令覆勘詔公卿集議于西闕門議者三十七人各具一單言人人殊李廷機以禮部左侍郎代正域署部事正域欲盡録諸人議廷機以辭太繁先撮其要以上一貫嗾御史康丕揚等劾禮部壅閼羣議不以實聞正域亦發一貫匿疏沮勘及華奎饋遺事中㫖以楚王襲封已二十餘年何至今始發且夫妻訐證不足憑據遂坐華赿等誣奏降庶人錮之鳳陽明年華奎獻萬金助工經漢陽宗人疑其輸賄遮奪之巡撫趙可懷屬有司捕治宗人方恨可懷治楚獄不平持兵突入撫署擊殺可懷于是逮捕諸宗人置重典者六人禁錮閒住者四十五人質實楚恭王名英㷿顯榕次子康丕揚濟南陵縣人山東水泰安州大水溺死男婦八百餘口屋宇傾圮千餘問秋七月京師大雨雹時祁州安肅並大風雨氷雹頃刻水深尺餘拔樹折禾苗稼盡傷祁州復大水田廬盡沒城垣傾壞清苑蝗食禾聚如蟻質實祁州唐置州明屬保定府清苑北齊樂鄉縣明為保定府治今並因之八月禮部侍郎郭正域罷初正域之入館也沈一貫為教習師後服闋授編修不執弟子禮一貫不能無恨及一貫為首輔沈鯉次之正域與鯉善而心薄一貫楚王之獄正域右華趆積忤一貫給事中錢夢臯遂希一貫指劾正域陷害親藩楊應文又言正域父懋嘗笞辱于恭王故正域因事陷之正域疏辨言恭王卒于隆慶時臣父方以舉人任知州何由被笞留中不報因乞休去已而華奎亦奏劾正域略如應文言且訐其不法數事請禠正域官詔下部院集議李廷機謂正域已去可無苛求給事中張問達言藩王欲進退大臣不可訓乃不罪正域而令巡按御史勘王所訐以聞皆無狀質實錢夢臯富順人楊應文無錫人冬十一月獲妖書先是刑部侍郎吕坤嘗撰閨範圖說太監陳矩購入禁中帝以賜鄭貴妃妃重刻之二十六年秋或撰閨範圖說跋名曰憂危竑議其文託朱東吉為問答東吉者東朝也其名憂危以吕坤曾有憂危一疏因借其名以諷言坤書首載漢明德馬后由宫人進位中宫意以重妃而妃之刋刻實藉此為奪嫡地妃兄國泰以給事中戴士衡嘗糾坤全椒知縣樊玉衡並糾貴妃疑出自二人手言于帝帝重謫二人事遂寢至是續憂危竑議復出朱賡于寓門外獲之其詞假鄭福成為問答鄭福成者謂鄭氏子福王當成也大略言帝立東宫出于不得已他日必當更易其用朱賡為內閣者以賡更同音寓更易之意詞極詭妄時人謂之妖書帝大怒敕有司大索奸人沈一貫以楚宗事銜郭正域又以沈鯉與已地相逼而正域罷欲因是陷之乃為帝言臣下有欲相傾者為之蓋徵引其端以動帝意亡何錦衣衛都督王之禎等四人以妖書有名指其同官周嘉慶為之東厰又捕獲妖人皎生光巡城御史康丕揚為生光訟寃言妖書楚事同一根抵請少緩其獄賊兄弟可授首闕下意指正域及其兄國子監丞正位帝怒以為庇反賊除其名一貫力救始免丕揚乃先後捕僧人達觀醫者沈令鸞等而同知胡化則告妖書出教官阮明卿手未幾厰衛又捕可疑者一人曰毛尚文數日間銀鐺旁午都城人人自危嘉慶等皆下詔獄嘉慶旋以治無驗令革任回籍令譽故嘗往來正域家達觀亦時時游貴人門嘗為正域所搒逐尚文則正域僕也一貫丕揚等欲自數人口引正域而化所訐明卿則錢夢臯壻夢臯大恚上疏顯攻正域言妖書刋播不先不後適在楚王疏入之時蓋正域乃沈鯉門徒而沈令譽者正域食客胡化又其同鄉同年羣妖結為死黨乞窮治根本定正域亂楚首惡之罪勒鯉閒住帝令正域還籍聽勘急嚴訊所捕者達觀拷死令譽亦幾死皆不承法司迫化引正域及歸德歸德鯉邑名化大呼曰明卿我仇也故訐之正域舉進士二十年不通問何由同作妖書我亦不知誰為歸德者帝知化枉釋之都督陳汝忠掠訊尚文遂發卒圍正域舟于楊村盡捕媪婢及傭書者男女十五人與生光雜治終無所得拷生光妻妾及十嵗兒以針刺指爪必欲引正域皆不應生光仰視夢臯丕揚大罵曰死則死耳奈何教我迎相公指妄引郭侍郎乎久之獄不能具會皇太子在東宫數語近侍曰何為欲殺我好講官諸人聞之皆懼而陳矩提督東厰屢會法司拷訊心念獄無主名帝必怒甚恐輾轉攀纍無已遂與法司歸獄生尤磔之釋諸波及者正域始得歸初沈鯉將入閣年七十一矣沈一貫以士心夙附鯉深忌之欲諷鯉辭召命乃貽書李三才曰歸德公來必奪吾位將何以備之三才答書言鯉忠實無他腸勸一貫同心一貫由此并憾三才鯉既至即具陳道中所見礦稅之害他日復與賡疏論之皆不納楚假王被訐事起禮部侍郎郭正域請行勘鯉是之及姦人所撰續憂危竑議發一貫輩張皇其事令其黨給事中錢夢臯直指為正域鯉所造并羅織鯉姦贓數事帝察其誣不問而一貫輩使邏卒日夜操兵圍其居已而事解復譖鯉詛呪鯉嘗置小屏閣中列書謹天戒恤民窮開言路發章奏用大僚補庶官起廢棄舉考選釋寃獄撤稅使十事而書其上曰天啓聖聰撥亂反治八字每入閣輒焚香拜祝之讒者遂指為詛呪帝深知鯉不之信也質實吕坤字叔簡寧陵人陳矩安肅人戴士衡字章尹蒲田人樊玉衡字以齊黃岡人皎生光順天生員性險賊多脅取人財又嘗僞作富商包繼志詩有鄭主乘黃屋之句以脅鄭國泰及繼志金故錦衣衛疑而捕之發明沈一貫以楚獄銜郭正域又因沈鯉名位逼已遂遽借妖書一事欲羅織二人于極典輔臣身秉國鈞而居心狡險若此則是將朝廷紀綱法度悉以行其生殺愛惡之私國事尚可問乎尤可異者御史康丕揚等復曲意阿附執政直謂妖書楚獄同一根柢傅㑹株牽幾成莫須有之大獄以殺人之事媚人乃至顛倒是非變亂黑白雖久之而獄未能具然一時輦轂之下人人自危矣厥後三案繼起聚訟紛爭流毒無已早于此階之厲耳致仕東閣大學士王家屏卒家屏歸後八年儲位始定遣官齎敕存問及是卒贈少保諡文端甲辰三十二年春正月閣臣請補司道郡守及遣巡方御史不報沈一貫擬各差御史敕以上不省乾清宫成敘賞工部官夏四月辛巳朔日有食之時大同陽和等處流星大如斗先白後赤光芒燭地閣臣請補科道官缺不報沈一貫等上疏催補科道行取考選吳道行等四員熊鳴夏等三員散館題授王元翰等八員不報質實吳道行宜興人熊鳴夏江西豐城人王元翰雲南寧州籍南直𨽻鳳陽人開濬泇河成泇河界滕嶧間南通淮海引漕甚便前總河侍郎翁大立首議開濬已都御史傅希摯復言之朝廷數遣官行勘迄無成畫其後尚書舒應龍創鑿韓莊以引微山湖之水劉東星又開良城侯莊以試行運時漕舟行泇河者十之三東星卒官役遂止至是總理河道工部右侍郎李化龍與淮揚巡撫李三才循東星舊跡修之由直河入泇口抵夏鎮凡二百六十里避黃河吕梁之險㑹化龍憂去侍郎曹時聘終其事由是泇河遂為漕道永利質實泇有東西二河今運河上自山東滕縣下至江南邳州統謂之泇河韓莊在嶧縣微山湖東今有閘良城在邳州北漢置良成縣晉改良城唐省侯莊在韓莊東今為侯仙閘直河在邳州東蒙沂諸山之水所滙直河入泇口在邳州西北李化龍疏言河自開歸而下合運入海其路有三由蘭陽道考城至李吉口過堅城集入六座樓出茶城而向徐邳是名濁河為中路由曹單經豐沛出飛雲橋泛昭陽湖入龍塘出秦溝而向徐邳是名銀河為北路由藩家口過司家道口至河家隄經符離道睢寧入宿遷出小河口入運是名符離河為南路南路近陵北路近運惟中路既逺於陵亦濟於運前督臣排羣議以興兹役竟以資用乏絶不得竣事然自堅城以至鎮口河形尚爾宛然故為今之計惟循故跡開泇河其善有六其不必疑有二泇河開而運不借河有水無水聽之善一以二百六十里之泇河避三百三十里之黃河善二運不借河則我為政得以熟察機宜而治之善三估費二十萬金開二百六十里比朱尚書新河事半功倍善四開河必行召募春荒役興麥熟人散富民不苦賠窮民得以養善五糧過洪必約春盡實畏河漲運入泇口朝暮無妨善六為陵捍患為民禦灾無疑者一徐州城向苦洪水暴至泇河既閒徐民之為魚者亦少無疑者二疏下户部議至四月庚戌工部尚書姚繼可言泇河業冇成績泇成而漕可藉矣至于黃河衝徙魚鱉豐沛若非因勢利導何以振救元元總河議于堅城集以上開渠引河而下流多通復分六座樓苑家樓二路而水勢多殺既可以移豐沛之患又不至沿碭山之城行所無事莫善于此自今開泇分黃兩工並舉並從之曹時聘獲鹿人五月雷火焚長陵明樓帝以陵灾下詔咨實政大學士沈鯉請除礦稅屬沈一貫朱賡各為一疏俟時上之一日大雨鯉曰可矣一貫等問故鯉曰帝惡言礦稅事疏入多不視今吾輩冒雨素服詣文華奏之上訝而取視亦一機也一貫等從其言帝得疏疑必有急事啓視果為心動户部尚書趙世卿亦上疏力請帝優答之然不為罷質實趙世卿字象賢厯城人疏言今日實政孰有切于罷礦稅者古明王不貴異物今也取悖入之財斂蒼生之怨節儉之謂何是為君德計不可不罷者一多取所以招尤慢藏必將誨盜鹿臺巨橋必致倒戈之禍是為宗社計不可不罷者二古者國家無事則預桑土之謀有事則議金湯之策安有鑿四海之山𣙜三家之市操弓挾失戕及良民燬室踰垣禍延雞犬經十數年而不休者是為國體計不可不罷者三貂璫漁獵翼虎炮烋毁掘冡墓則枯骨蒙殃姦虐子女而良家飲恨人與為怨歡譟屢聞是為民困計不可不罷者四國家財賦不在民則在官今盡括入姦人之室故督捕租而逋租絀稽關稅而關稅虧搜庫藏而庫藏絶課鹽策而鹽策薄徵贖鍰而贖鍰消外府一空司農若掃是為國課計不可不罷者五天子之令信如四時三載前嘗曰朕心仁愛自有停止之時今年復一年更待何日天子有戲言王命委草莽是為詔令計不可不罷者六陛下試思服食宫室以至營造征討上何事不取之民民何事不供之上嗟此赤子曽無負于國乃民方歡呼以供九重之欲而陛下不少遂其欲民方奔走以供九重之勞而陛下不少恤其勞民方竭蹶以赴九重之難而陛下不少恤其難反之于心必有不自安者今天譴頻仍變不虛生故欲回天意在恤民心欲恤民心在罷礦稅無煩再計而決也六月太白晝見沈一貫等以灾異疊見疏請罷礦稅出繫囚補闕員發臣下章奏帝答以修省實政俟次第舉行一貫等又言俟之為言有何底極臣等非不欲俟而天下危亂恐冇不能俟者帝不省昌平大水壞長泰康昭四陵石梁并壞陵垣蟲食長陵松柏葉盡秋七月大雨水京師大霪雨兩月不止正陽崇文二門城牆中陷者七十餘丈民居多壞發銀十萬兩振被水居民時永平府屬諸州縣大水溺死男婦無算八月羣臣伏文華門疏請修舉實政詔切責之文武大小九卿科道持公疏齊赴文華門奏請修實政詔切責其瀆擾朝儀沈一貫言欲朝儀靜肅當收天下之心欲收天下之心當恤天下之言近年天下久罹礦稅之苦而又習聞停止之言跂望恩綸以日為嵗諸臣千章萬牘總出懇誠豈可罪之為激為瀆乎閏九月陜西地震鞏昌府禮縣地震聲如雷一日十餘次城垣厔宇皆傾質實禮縣元禮店明成化中置禮縣屬鞏昌府之秦州今屬秦州直隸州振畿南諸府饑畿南諸府州縣水患異常詔以太僕寺振濟餘銀分振尋命于順天保定等處發通倉米平糶冬十月四川天鼓鳴四川華陽縣天鼓大鳴似雷非雷質實華陽本成都縣地唐乾元初改華陽縣明為成都府治今因之乙巳三十三年夏五月京師大雨雹自四月至是京師再雨雹鳳陽大風雨毁陵廟雨壞孝陵正殿寶座雷震郊壇雷火擊毁南郊望燈髙杆杆髙十丈餘碎上段三丈餘為百數十片皆有火痕其下六丈餘左右各有爪損痕廣西地震廣西陸川縣地震聲若頽山城垣屋宇多壞壓死男女無算質實陸川唐置縣明屬梧州府鬱林州今屬鬱林直𨽻川左都御史溫純罷純清白奉公五主南北考察澄汰悉當妖書事起力為沈鯉郭正域辨誣又楚宗人殺撫臣純言無反狀積忤沈一貫時大計京朝官純與吏部侍郎楊時喬主之一貫所欲庇者鍾兆斗錢夢臯等皆在謫中一貫怒言于帝降㫖切責純察疏亦不下盡留被察科道官純力求去夢臯等遂連章訐純楚事誣以納賄給事中陳嘉訓極論夢臯兆斗朋比為姦請聽純歸以全大臣之體帝豫純致仕夢臯兆斗亦罷歸是時京察章疏一貫請留中主事劉元珍龎時雍御史朱吾弼等力爭之謂二百年來計典疏無留者時南京察疏亦留中後迫衆議始下質實楊時喬字宜遷上饒人鍾兆斗海鹽人陳嘉訓鄱陽人劉元珍字伯先無錫人龎時雍汶上人朱吾弼字諧卿髙安人秋七月泰州天有聲如潮泰州天鳴有聲如潮而怒起自南方轉東而下數日不止鎮江宜興等處亦同時鳴而鎮江西南山裂開二三尺巡按御史黃汝吉江防御史李雲鵠各疏以聞并言南京兵部尚書與鎮江道府諸官久關亟請推補不報質實宜興元宜興州明洪武二年改縣屬常州府今因之李雲鵠內鄉人九月昭和殿災罰內官等下法司提問治罪有差質實昭和殿在西苑孫國敉燕都遊覽志云南臺在太液池之南上有昭和殿北向京師地震丙申申刻自東北向西南連震二次冬十月濬朱旺口前年河決豐縣單縣口亦潰魚臺濟寧間平地成湖河臣李化龍上言自泇河既成起直河至夏鎮與黃河隔絶山東南直間河不能為運河害獨朱旺口以上法單則單沼決曹則曹魚及豐沛徐邳魚碭皆命懸一線隄防宜急會化龍憂去曹時聘代至是時聘大濬朱旺口凡役夫五十萬六閲月工竣自朱旺達小浮橋延袤百七十里渠廣隄厚河歸故道焉沛時河道總督曹時聘言舊河既疏決口已塞勢必然東下新挑之河其深廣僅半上源則放水之後行隄亟宜補築即曹縣之王家口曹家樓儀封之小宋集蘭陽之銅瓦廂祥符之張家灣比之伏秋防守更宜加謹其最險要者王家大壩黃壩新隄皆洶溜經行之處令管河各官儲料集夫時刻防備勿懈時工部又奏總河大挑之役業已奉㫖興工矣朱旺口二股原係黃河中路北股出濁河者再疏再壅南股出小浮橋者地形卑下可因就下之河形復已湮之故道其問義安之建壩徐州之砌隄正使水不旁溢滔滔東注弗蹈往者黃堌符離之故轍為泗濱憂蓋濟運護陵未始不兩利而兼成耳今如前議疏浚引水東注或於南岸倍加封幫築勿令侵潰仍將下流分水之說詳求至當以底成功並從之質實朱旺口在碭山縣西十一月皇長孫由校生選侍王氏所生質實皇長孫即熹宗選侍明制太子女侍有淑女選侍才人名號王氏順天人十二月詔罷天下開礦以稅務歸有司中使仍留不撤自礦稅使設廷臣諫者不下百餘悉寢不報自二十五年至是年諸璫所進礦銀幾三百萬兩金珠寶玩貂皮名馬雜然進奉帝以為能㑹長至日沈一貫在告沈鯉朱賡謁賀仁德門帝賜食司禮監陳矩侍鯉因極陳礦稅害民狀且言礦使破壞天下名山大川靈氣盡矣恐于聖躬不利矩乃具為帝道之帝悚然遣矩咨鯉所以補救者鯉言急停開鑿則靈氣自復帝為首肯一貫慮鯉獨收其功急草疏上帝不懌復止踰月始下停礦之命以稅務歸有司嵗輸所入之半于內府半户工二部然中使不撤吏民尤苦之其害遂終帝世發明自神宗三十年詔罷礦稅并撤中使旋不果行至是又復數年其弊日甚一日中間廷臣籲請者踵相繼而悉置不報幸沈鯉以危言入奏神宗方惕然悚懼此正轉移之一機為閣臣者自宜和衷調濟協力同心務使弊政速除庶為有禆乃一貫轉慮鯉獨收其功草疏觸忌遂致停留踰月是惟知以爭權弋譽為能全不從國是民瘼起見一貫前既以奉行不速致使反汗德音兹復以嫉善妬賢有乖將順之義其罪實無可逭矣至開礦雖停而中使依然不撤禍本猶在除惡務盡之謂何即沈鯉亦不能辭其咎也赦以皇長孫生詔赦天下丙午三十四年春二月大學士沈鯉朱賡請補六部大僚不報鯉賡奏言臣昨同文武百官齊赴文華門候駕見二品班內止户部尚書趙世卿一員其餘尚書左右侍郎員缺甚多官聫廢闕一至於此政務叢脞誰為修明理亂所關良非細故乞於前後㑹推人數內亟賜㸃用以慰中外之望不省三月雲南指揮賀世勳等殺稅監楊榮雲南孟密土司有寶井正德以後多以內臣掌之及榮領稅使妄奏井多晴緑珍瑰之屬可嵗數十萬帝特賜之專敕而榮所進不得什一㑹緬賊侵蠻莫其執詞以奉稅使令令殺宣撫思正以開道路正奔騰越緬人追之有司不得已殺正以謝賊乃退既而榮又請麗江土知府木增獻地聽聞採巡按御史宋興祖言太祖令木氏世守兹土限石門以絶西域守鐵橋以斷土畨奈何自撤藩蔽生逺人心不報榮由是怙罷益橫番漢居民恨入骨相率燔稅厰殺委官榮猶弗悛恣行毒虐杖斃數千人至是以求馬不獲繫指揮使賀瑞鳯且言盡捕六衛官于是世勳等率寃民萬人焚榮第殺之并殺其黨二百餘人事聞帝為不食者數日欲逮問守土官閣臣沈鯉揭爭且密囑太監陳矩剖陳帝乃止誅首凶世勳等時髙淮徵稅遼東時時出塞射獵發黃票龍旗走朝鮮索珠冠貂馬數與邊將爭功山海關內外咸被其毒于是前屯衛軍盡甲而譁誓食淮肉未幾錦州松山軍復變淮所遣承舍吳守政自剄死淮懼內奔閣臣朱賡言未踰月而遼境四亂皆淮所致饑軍合叛者衆臣不知其所終矣不報質實鐵橋在麗江府西北宋興祖中江人發明遼東為京師屏障尤非滇南可比而髙淮竟敢出塞射獵與邊將爭功甚至擅發旗栗索賄外藩毫無法紀以至悍卒屢變邊境騷然此較前時中官監稅之剝民為害者情罪更不相侔乃髙淮因軍變輒以京師為逋逃藪而神宗亦竟聽其內奔而不問逮朱賡進言仍付不報既不正淮誤國之罪亦不究遼軍合叛之由罪璫亂兵皆法所不宥而俱得脫然無事是朝廷直不以疆事為念矣又豈特縱一宦寺已哉真定順德廣平大名災蠲振有差從直隸巡按御史錢桓請也質實錢桓太倉州人貴州巡撫郭子章討諸苗平之先是貴州東西二路苗名曰仲家苗介於銅仁者曰山苗紅苗之羽翼也窺黔自平播後財力殫弱有輕漢心經年剽劫無虛日子章請命于朝命總兵陳璘參政洪澄源率漢兵五千益以土兵五千監軍布政使趙健率宣撫安疆臣領番兵萬人使遊擊劉嶽等督之兩路並進九十餘日而克之兩路既平乃專責總兵陳璘率漢土兵五千進攻東路苗不一月克其六箐諸苗盡平質實銅仁元屬思州軍民安撫司明永樂中置銅仁府今因之洪澄源晉江人趙健涇縣人夏六月幾內蝗自春正月至夏不雨及是順天文安永清三河寶坻諸縣大蝗秋七月沈一貫沈鯉罷給事中陳嘉訓御史孫居相交章詆一貫姦貪一貫憤求去帝為黜嘉訓奪居相俸而允一貫歸一貫數與沈鯉忤懼去後鯉為己憂因密傾之帝亦嫌鯉方鯁㑹鯉同時乞休並遂命致仕而一貫獨得溫㫖焉貫鯉遇事秉正不撓壓於一貫志不盡行而是時一數被論引疾杜門鯉乃得行閣事皇孫生詔赦天下中官請徵茶蠟夙逋鯉以戾詔㫖再執奏竟報寢帝乳母翊聖夫人金氏其夫官都督同知歿請以從子繼鯉言都督非世官乃已真人張國祥謂皇孫誕生已有祝釐功乞三代誥命且世襲詹事主簿鯉力斥其謬乃賚以金幣帝惑中官言將察核畿輔牧地論鯉撰敕鯉言近年以來百利之源盡籠於朝廷常恐勢極生變况此牧地豈真有豪右隱占新墾未科者姦民所傳未足深信遂止雲南武辨殺稅使楊榮帝怒甚將遣官逮治鯉具陳榮罪狀請誅為首殺榮者而貸其餘乃不果逮陜西稅使梁永求領鎮守事亦以鯉言罷遼東稅使髙淮假進貢名率所統練甲至國門鯉中夜密奏其不可詔責淮而止時一貫雖稱疾杜門而章奏多即家擬㫖鯉力言非故事是以一貫密傾之鯉既歸至家疏謝猶極陳怠政之弊以明作進規年八十遣官存問賚銀幣鯉奏謝復陳時政要務又五年卒年八十五贈太師諡文端一貫輔政十有三年當國者四年枝拄清議好同惡異與前後諸臣同治楚宗妖書京察三事獨犯不韙之名論者醜之雖其黨不能解免也一貫歸言者追劾之不已其鄉人亦多受世詆諆云質實孫居相字伯輔沁水人冬十二月棄六堡初六堡既築生聚日繁至六萬四千餘户至是李成梁以地孤懸難守與總督蹇達巡撫趙楫建議棄之盡徙其居民於內地居民懸戀家室其有不從者則以大軍迫之死者狼籍給事中宋一韓力言棄地非策御史熊廷弼亦以為言帝卒用成梁議自是遼左藩籬盡撤質實蹇達重慶人宋一韓陳州衛人熊廷弼字飛百江夏人丁未三十五年春正月給事中翁憲祥言撫按官不宜聽其自去不報是時官方多滯撫按官候代或十餘年不歸部郎俸深多借差以出㑹有江西巡撫許宏綱之事宏綱以父艱告歸薦陸長庚王佐自代不復候命解組而去於是吏科右給事中翁憲祥言撫按官解任宜候命不宜聽其自去不省故事正郎不奉使撫按必俟代至是多反之時大僚多缺侍郎揚時喬楊道賔旬日間相繼物故吏禮二部長二遂無一人兵部止一尚書飬疴不出户刑工三部暨都察院通政大理皆無見官憲祥言九卿俱曠大傷國體因陳補闕官起遺佚數事報聞質實翁憲祥字北隆常熟人夏四月伊勒登岱青犯涼州官軍擊破之時松山既復寇復據賀蘭山結青海諸部寇鈔不已伊勒登岱青尤桀驁三十三年連營入犯總兵官達雲與副將柴國柱擊之冦大敗去未幾青海寇復大入將士分道遮擊生擒其將薩賴餘敗走至是伊勒登岱青復連兵犯涼州雲與國柱及副總兵官秉忠搦戰大破之冦屢被挫悉去質實柴國柱字寧衛人秉忠榆林衛人作伊勒登岱青舊作銀定歹成薩賴舊沙賴今並改五月以于慎行李廷機葉向髙俱為禮部尚書兼東閣大學士預機務時內閣惟朱賡在帝命增置閣臣廷推慎行廷機向髙三人遂用之并召還王錫爵三辭不允時言官方厲鋒氣錫爵進密揭力詆中有上於章奏一概留中特鄙夷之如禽鳥之音等語言官聞之大憤交章論劾錫爵闔門養重竟辭不赴質實葉向髙字進卿福清人六月湖廣及徽寧太平嚴州大水湖廣黃州府蘄州黃岡黃梅羅田等處大水漂沒廬舍武昌承天鄖陽嶽州常德等府先各亢旱入夏大雨至是民舍漂沒几數千家南直徽寧太平等府山水大湧繁昌黟歙南陵等縣溺死男婦無算浙江嚴州山水大湧建德桐廬淳安遂安分水五縣漂沒者數千户質實黃岡唐置縣明為黃州府治黃梅隋置縣明屬黃州府繁昌漢春穀縣地東晉僑置繁昌縣繁昌本漢潁州郡屬縣也隋并縣入東塗南唐始復置繁昌縣明屬太平府黟縣秦置縣明屬徽州府南陵梁置縣明屬寧國府建德漢富春縣地三國時吳折置建德縣明為嚴州府治桐廬漢為桐溪鄉吳黃武中置桐廬縣遂安晉置縣分水唐置縣明並屬嚴州府今皆因之秋七月京師久雨溝洫皆壅閼晝夜如傾壞廬舍溺人民東華門內城垣及德勝門城垣皆圮禮科右給事中汪若霖疏言雨者隂氣水者隂象隂盛則雨災見其應在禁闈及臣下有邪謀今東宫五年不學諸臣悠悠莫以為意大臣比周私相植黨詩云不令不寧百川沸騰其咎乃在皇甫卿士今日之事誠足寒心未可僅以齊禱為文而已户科給事中江灝亦陳郊廟朝御日講及聽言求人理財六事以為消弭之方皆不報質實汪若霖字時甫光州人江灝漳浦人八月振畿內饑先是命太僕寺發銀十萬兩振救壓傷窮民至是復命五城御史查勘災荒先京城次及直隸各府剗量重輕一體振恤并令各省各撫按官搜括庫藏及預備義社等倉振濟饑民彗星見自是月辛酉朔見于井度色蒼白尾指西南約長二尺漸往西北至丁丑厯于房兵科給事中宋一韓上言春秋二百四十二年孛見者一終綱目之世彗見十七今彗星復見東井其咎安在臣謹按星野東丹秦分彗尾指西南漸往西北又指秦地秦其急乎今套虜久留青海儻有隂謀必且波及內地又土官魯光祖勢重氣驕鋤之不動其心愈肆兵爭之端必起于此且彗者掃除之象刑人之職也小人用之以掃除為職君子用之以除舊布新今李鳯鯨噬於粵東潘相蝮螫於江右其他諸處內使其為掃除之役等耳宜因此變悉撤之因而一新舊令勤政講學親賢逺姦復三朝之制補九列之班平積薪之歎沛賜環之詔作臺諫之氣決章疏之壅慎節鉞之選懲僨帥之風出禁藏之儲杜冏寺之借釋詔獄之寃紓都民之困不報冬十月山東旱饑蠲振有差山東各屬以旱災告其被災最重者禹城濮州臨邑陵等二十六州縣次重者南河平原鄒平德平等二十三州縣又次者沂州寧陽長清德州肥城等十二州縣俱酌量振濟質實禹城唐置縣明屬濟南府今因之商河宋置縣明屬武定州今屬武定府鄒平後漢置縣明屬濟南府長清隋置縣明屬濟南府今皆因之肥城古肥子國漢置縣明屬濟南府今屬泰安州十一月于慎行卒初慎行由詹事遷禮部尚書明習典制諸大禮多所裁定先是嘉靖中孝烈后升祔祧仁宗及帝初元穆宗升祔復祧宣宗慎謂謂非禮作太廟祧遷考言古七廟之制三昭三穆與太祖之廟而七劉歆王肅並以髙曾祖禰及六世五世為三昭三穆其兄弟相傳則同堂異室不可為一世國朝成祖既為世室與太祖俱百世不遷則仁宗以下必實厯六世而後三昭三穆始備孝宗與睿宗兄弟武宗與世宗兄弟昭穆同不當各為一世世宗升祔距仁宗止六世不當祧仁宗穆宗升祔當祧仁宗不當祧宣宗引晉唐宋故事為據其言辨而核事雖不行識者服其知禮又言南昌夀春等十六王世次既逺宜别祭陵圉不宜祔享太廟亦寢不行十八年正月疏請早建東宫出閣講讀及冬又請帝怒再嚴㫖詰責慎行不為懾明日復言冊立臣部職掌臣等不言罪有所歸幸速決大計放歸田里帝亦不悅責以要君疑上淆亂國本及僚屬皆奪俸山東鄉試預傳典試者名已而果然言官遂劾禮官皆停俸慎行引罪乞休章纍上乃許之家居十餘年中外屢薦率報寢三十三年始起掌詹事府疏辭復留不下居二年廷推閣臣七人首慎行詔加太子少保兼東閣大學士入參機務再辭不允乃就道時慎行已得疾及廷謝拜起不如儀上疏請罪歸卧於家遂草遺疏請帝親大臣録遺逸補言官數日卒慎行學有原委貫穿百家神宗時詞館中以慎行及馮琦文學為一時冠質實馮琦字用韞臨胊人十二月蠻陷武定武定自洪武十四年以女土官商勝首先歸附詔設土知府即以勝署府事至正德初武定阿英以賄通劉瑾得襲土知府改姓鳯氏嘉靖中土舍鳯朝文與尋向土舍安全合兵為亂官軍討誅之未幾鳯繼祖復叛繼祖本他姓子冒姓鳯氏宗謀嗣職遂發兵圍府劫掠州縣屢敗官軍會鎮撫官督諸道兵並進繼祖走東川婦家賊帥者色斬之以獻朝廷以武定屢叛乃改設流官投鳯厯子思堯為經厯厯以思堯不得知府怨望復謀作亂誅死鳯氏土職盡絶至是鳯繼祖之孫阿克徙居金沙江有馬頭四十八人而鄭舉稱首栗忤多力富于財知府陳典收禁之舉以兼金置魚腹中饋典獲免已復收之如是者再四舉惡其無厭乃誘阿克作亂隂結㑹川諸蠻攻陷武定大肆劫掠連破元謀羅次諸城索府印會知府攜印㑹城不能得乃劫推官直抵㑹城請冠帶印信鎮撫以徵兵未集遣人以府印授之賊退入武定立阿克為知府質實元謀元縣今屬武定府羅次元州後改縣今屬雲南府戊申三十六年春正月河南江北饑户部言山東河南及南直之淮安鳳陽徐州揚州諸屬水旱為灾請發帑振濟不報二月京師地震昌平州亦震飭邊備大是時蒙古喀爾喀諸部悉歸我臣亦請亟罷礦稅以清薊遼總督蹇達疏請為備廷安人心不省尋命守臣飭邊備夏六月南畿大水南京科道等官揭報霪雨連綿江潮泛漲自留京至蘇松常鎮諸郡皆被淹沒蓋二百年來未有之灾乞速行振濟禮科都給事中胡欣言部院藩臬諸官懸缺不補人民愁怨召沴宜籌所以修省之實不報質實胡欣陜西秦州人李成梁罷成梁始鎮遼東鋭意封拜師出必捷威鎮中外已而位望益隆子弟盡列崇階僕𨽻無不榮顯貴極而驕奢侈無度軍資馬價鹽課市賞嵗乾沒不資全遼商民之利盡籠入已以是灌輸權門結納朝士中外要人無不飽其重賕為之左右其戰功率在塞外易為緣飾若敵入內地則以堅壁清野為辭擁兵觀望甚或掩敗為功殺良民冒級閣部共為蒙蔽以故物議沸騰後中時行許國王錫爵相繼謝政成梁失內主遂以去位其所藉健兒李平胡孫守廉輩皆富貴擁専城又轉相掊克士馬為之消耗及成梁再鎮遼又議棄六堡為言者論劾帝素眷成梁不之罪及是罷久之卒秋七月京師地震丁酉京師震甲寅北直𨽻各府州縣同時俱震八月振南畿及嘉興湖州饑十二月再振南畿免稅糧九月武定賊平鳳阿克既自立為知府益結賊徒四出焚掠巡撫陳用賔總兵沐睿俱以失事下獄論死時尋向土目揚禮亦結火頭色者及土婦海冲為亂攻破嵩明吏目韋宗孝學正龍旌死之官吏多為賊殺御史周想相急調霑益等處土兵擊之屢戰皆捷及是鎮撫官分五路兵進勦鄭舉等方西破祿豐知縣蘇夢賜力戰死聞諸路兵已大集舉與阿克遂奔東川官軍追及之土司緑哲縳阿克鄭舉以獻而參政楊俊臣亦擊敗海冲副使羅希益復擊斬楊禮于是武定及元謀羅次嵩明祿豐等州縣皆復械阿克等至京師磔于市乃悉置流官質實祿豐元縣明屬雲南府之安寧州今屬雲南府冬十一月朱賡卒賡醇謹無大過與沈一貫同鄉相比時給事中陳治則姚文蔚等以故蒙詬病當一貫鯉去位時賡年七十有二獨當國政時朝廷日弛中外解體賡疏揭月數十上十不獲一下賡因力請帝更新庶政於增閣臣補大僚充言路三事語尤切帝優詔答之而不行賡乃素服詣文華門懇請終不得命賡以老屢乞引疾閣中空無人乃用于慎行李廷機葉向髙而召王錫爵于家以為首輔給事中王元翰胡欣以廷機之用賡實主之疏詆廷機並侵賡賡疏辭帝為切責言者既而言路攻訐四起先後疏論者至五十餘人是時賡已寢疾乞休疏二十餘上言者慮其復起攻不已至是卒于官質實陳治則餘姚人姚文蔚錢塘人十二月朵顔寇薊州京師戒嚴朵顔察罕之子賚琿岱狡黠為邊患與其從父莽吉勒潛入薊鎮大掠河流口參將馬棟等不能禦時援師所過居民望見火光驚為敵至逃入京師者日數萬九門盡閉兵部尚書李化龍請以三十萬金補薊鎮缺餉并修守備之具而度支告匱户部請暫借內庫礦稅銀限以嵗月補還帝難之命發太僕寺馬價十萬户部銀十萬畀之軍情稍定敵以有備引去賚琿岱舊作賴暈歹莽吉勒舊作莽金今並改發明朵顔入寇居民見援師而驚為敵至逃奔京師此時正宜撫輯曉諭以安衆心何至倉皇失措九門盡閉一若強敵之臨城下者則是時上下皆無定見而時事之失可知矣至度支告匱實由理財乏術而費用不經所致咎何足責乃户部請借內庫礦稅銀而神宗猶復難之國家儲蓄本為軍國預籌乃以礦稅所入守為私財雖兵餉守備之急尚不肯支發應用則向來中使四出豈專為內府厚藏計乎且太僕馬價寧獨非天子之財而于彼于此自生岐視真有莫能為解者耳己酉三十七年春正月永昌地震自元日至十日地震聲如雷三月貢圖陷大勝堡先是朵顔結鴻台吉謀犯喜峯口總兵官杜松受總督王象乾指潛搗歡台吉帳以牽薊寇乃從寧逺中左所夜馳貢圖營掩殺百餘人以大捷聞兵備副使馬拯謂彼無故被勦必復仇事且叵測至是果以五千人攻大勝堡執守將耿尚文支解之殺掠幾盡復深入小凌河二十二里官軍禦之大敗時杜松駐大凌河不敢救遼人多咎松部議亦以釁由杜松令戴罪自效松恚甚言撫按諸臣附㑹馬拯害其竒功令自提兵出塞將搗巢以雪前恥而所得止五級士馬多陷沒松益慚盡焚鎧仗置兵事不問乃勒還籍質實大勝堡在錦州府錦縣北大凌河在錦縣東源出喀拉沁威蘇圖山下流至鮎魚塘入海杜松字來清崑山人王象乾字子廓濟南新城人鴻台吉舊作黃台吉貢圖舊作拱兔今並改葉向髙請發言官章疏不報時言路互相詆訐帝心厭之章悉留中御史鄭繼芳力攻給事中王元輸貪婪不法元翰亦疏詆繼芳左右二人者復相角不已向髙請盡下諸疏敕部院大臣評曲直罪其論議顛倒者一二人以警其餘不報諸臣既無所見曲直益樹黨相攻元繼芳劾元翰姦贓數十萬即潛遣人圍守元翰家翰憤甚乃盡出筐篋畀置國門縱吏士簡括慟哭辭朝而去吏部坐元翰擅離職守謫其官質實鄭繼芳鹽山人夏五月福建大水建寧等府大水丁口失者殆十萬六月甘肅地震軍民壓死者八百四十餘人邊墩搖壞者八百七十里東關地裂南山一帶頽壞河流絶數日秋八月山西等省告災山西宣府饑江西福建大水江南徐州以北及山東濟南青州諸府蝗湖廣四川河南陜西旱貴州大烈風白氣亘天嵗歉九月左都御史詹沂封印自去先是沂詣告已數年大學士葉向髙以為言不報至是沂拜疏出城候㫖向髙等言目前最急者無如都察院刑剖兩官都察院有考察之事刑部有審録之事且以審録往例準之近已逾期矣不省冬十二月留畿內山東諸省稅銀三之一振饑民時各省皆報災傷重大至是詔户部借馬價二十五萬并工部稅銀十五萬解給各鎮支用其北直山東河南山西陜西福建四川常年徵在官聽解內帑稅銀準留以二分解部充軍餉一分振饑民庚戌三十八年春二月天鼓鳴山西陽曲縣天鼓鳴又有流星大如斗墜落西北碎星不絶閏三月旱禮部以京師旱災言今日旱災皆政務廢弛所召蓋天下人情莫鬱于此時鬱氣浮發必結為災如儲宫天下本也不令與諸臣相接講明經術練習世務而久置之深宫使耳目聰明俱塞天下之人心鬱乎不鬱乎大僚為國家撐持禎幹闕其大半按差為朝廷察吏安民久請不下甚至刑部衙門懸印半載讞決無人控籲無路咎氣滿獄天下之人心鬱乎不鬱乎內帑山積而閭閻半菽不充父賣子夫鬻妻慘不忍聞而坐視其死亡天下之人心鬱乎不鬱乎逮繫之臣如滿朝薦卞孔時皆一時循吏為君上愛養百姓者以權璫羅纎而使之纍年淹禁見天無日天下之人心鬱乎不鬱乎廢棄諸賢久錮銓曹日補牘以請而㸃用百不得一登進無期正氣塞結天下之人心鬱乎不鬱乎四海同一鬱積以故結成旱魃誠慨發德音將以上諸政一旦舉行則甘霖遍宇內矣疏入不報質實逮繫滿朝薦卞孔時朝薦知咸寧縣有廉能聲稅監梁永縱其下劫諸生槖朝薦捕治之永怒劾具擅刑稅役詔鐫一官會巡撫顧其志極論永貪殘狀乃復朝薦官無何永遣人蠱巡按御火余懋衡事覺朝薦捕獲其人永懼率衆擐甲入縣庭吏卒早為備無所掠而去城中數夜驚言永反或謂永宜自明永遂下教自白不反狀然蓄甲者數百而朝薦助懋衡操之急諸惡黨多亡去朝薦追之渭南頗有所格傷永懼使使繫書髮中入都訟朝薦劫上供物殺數人投尸河中帝大怒立遣逮治下詔獄搒掠遂長繫中外論救百十疏不聽孔時為武昌同知稅監陳奉誣劾被逮長繫廷臣救者數十疏皆不省至四十一年秋以葉向髙言二人乃得釋夏四月正陽門災丁丑夜正陽門箭樓火至次日辰刻未熄給事中周曰庠上言正陽門樓與正殿門樓相對面午義取當陽正南面以臨天下者也自萬厯二十年來深宫大內大小臣工莫能接見朝夕左右不過宦寺之流一念精明強為之心日斂月消而人材邪正政事得失皆置之膜外昔年宫殿災業已示譴迄今十餘年玩愒如初所謂恭已正南面者杳無時日則何取于正陽之名為哉天故火之庶幾顧名思義耳願稍加振刷勤庶政信百官親百姓則天下事尚可為也疏入不報質實周曰庠臨川人振畿內山東山西河南陜西福建四川饑各省告災詔發銀十萬兩振濟仍發米三十萬石給振畿輔災民復留三十八年春夏稅銀給振四川福建冬十一月壬寅朔日有食之禮部右侍郎翁正春言前兩嵗食四月朔純陽之月也今食十一月朔陽生之月也仲冬之月于律為黃鐘于卦為復乃羣隂已極一陽初生之候而有此虧蝕其災異尤甚君德象日宜照臨宣布不宜暗汶閉藏自萬厯二十年後財貨日斂聚人才日剝落一切請補大僚考選起廢率皆不報六卿九列之地三五嚴星閭闔徒號天聽愈杳天下不見陽和舒育之氣如在窮隂沍寒之中是以上天譴告如此然日之食典更祇在一時而皇上之寢與行祇在一念誠翻然轉移立見改轍將日中之治可保無疆矣疏入不省質實翁正春字兆震候官人辛亥三十九年春二月巡撫鳳陽都御史李三才罷三才在淮久以凌折稅監得民心山東稅監陳增兼領徐州數窘辱長吏獨三才以氣凌之裁抑其爪牙肆惡者常密令死囚引為黨輒捕殺之增為奪氣歙人程守訓以資官中書為增參隨縱橫自恣三才劾治之得贓數十萬增懼為己纍亦收獲守訓違禁珍寶聞于朝論死逺近大快屢加至户部尚書然頗通賂遺結納遍海內輔臣缺建議者請參用外僚意在三才由是忌者日衆工部郎中邵輔忠劾其貪僞險橫御史徐兆魁喬應甲給事中王紹徽等十餘人繼之胡怡曹于汴等交章論救朝端聚訟數月未已顧憲成方講學東林三才與憲成深相結嘗請增大僚選科道録遺佚因言諸臣祇以議論意見一觸當途遂永棄不收要之于陛下無忤今乃假天子威以錮諸臣復假忤主之名以文已過負國負君罪莫大于此意為憲成發也于是憲成貽書葉向髙孫丕揚盛稱三才廉直御史吳亮索善三才以憲成書附傳邸報中由是議者益譁三才力請罷去疏至十五上不得命遂自引歸帝亦不罪也三才才大而好用機權善籠絡朝士其用財如流水嘗宴顧憲成止蔬三四色厥明盛陳百味憲成訝而問之三才曰昨偶乏即寥寥今偶有故羅列憲成以此不疑其綺靡故盛譽之三才既家居忌者慮其復用御史劉光復劾其盜皇木營建私第至二十二萬又侵奪官厰為園囿且言三才與于玉立遙執相權意所欲用銓部輒為推舉三才疏辨請遣中官按問給事中劉文炳御史李徵儀等亦相繼論劾三才憤甚請諸臣㑹勘乃詔徵儀偕給事中吳亮嗣往未幾光復坐事下獄三才請釋之而復力為東林辨白言東林者顧憲成講學之所從之遊者如髙攀龍姜士昌錢一本劉元珍安希范嶽元聲薛敷教等並束身厲名行何負國家哉偶曰東林便成陷阱如鄒元標趙南星等被以此名即力阻其進所朝上而夕下者惟史繼偕諸人耳人才邪正實國祚攸關疏入衆益恨之亮嗣等既往勘久之無所得第如光復言還報遂落三才職為民方三才之罷攻之者邵輔忠徐兆魁喬應甲等後皆附魏忠賢名麗逆案而推轂三才若顧憲成鄒元標趙南星輩皆表表為時名臣故世以三才為賢質實邵輔忠定海人喬應甲猗氏人王紹徽咸寧人曹于汴字自梁安邑人吳亮武進人中行子劉光復青陽人于玉立字中甫金壇人劉文炳寧晉人李徵儀廣德州人吳亮嗣廣濟人姜士昌字仲文丹陽人安希范字小范無錫人史繼偕晉江人三月大計京官祭酒湯賔尹等降黜有差時廷臣黨勢日甚賔尹與諭德顧天竣各牧召朋徒干預時政謂之宣崑黨以賔尹宣城人天竣崑山人也自帝倦勤內外章奏悉留中不發惟言路一攻則其人自去以故臺諫之勢積重不返有齊楚浙三黨齊則亓詩教周永春韓浚張延登為之魁而燕人趙興邦輩附之楚則官應震吳亮嗣田生金為之魁而蜀人田一甲徐紹吉輩附之浙則姚宗文劉廷元為之魁而商周祚毛一鷺過庭訓等附之與賔尹天竣聲勢相倚並以攻東林排異已為事創大東小東之說目東宫為大東東林為小東一人稍異議輒羣起逐之大僚非其黨不得安于其位天下號為當關虎豹是年當大計京官惡東林者設詞以惑吏部尚書孫丕揚令發單咨是非將隂為鉤黨計侍郎王圖急言于丕揚止之羣小大恨圖先典庚戌會試賔尹以庶子為分校官舉人韓敬嘗受業賔尹及㑹試敬卷為他考官所棄賔尹越房搜得之與各房互換闈卷凡十八人彊圖録敬為第一知貢舉侍郎吳道南欲劾之未果至是賔尹己為祭酒而圖方掌翰林院祭酒京察例由掌院注考賔尹恐被察屬圖鄉人王紹徽為之請圖竣拒之又御史金明時官居不職慮見斥會有為浙江巡按鄭繼芳僞書抵紹徽者書有云欲去福清先去富平欲去富平先去耀州兄弟又言秦脈斬斷吾輩可以得志福清謂葉向髙耀州兄弟謂圖與其兄國富平即丕揚也國時巡撫保定圖為侍郎與丕揚俱秦人故曰秦脈蓋小人設為挑激語以害繼芳輩而其言乃達之丕揚丕揚不為意明時廉得之疑書出選授御史徐縉芳等乃先上疏力攻圖并詆縉芳因及僞書事圖與縉芳皆疏辨朝端閧然及注考丕揚與侍郎蕭雲舉副都御史許宏綱領其事考功郎王宗賢都給事中曹于汴御史湯兆京喬允升佐之兆京謂明時倡言要挾逃察丕揚特疏劾之㫖下議罪而明時辨疏復犯帝諱字帝怒視其職其黨大譁謂明時未嘗要挑兆京祇以劾圖一疏為圖報復于是主事秦聚奎力攻丕揚等結黨欺君丕揚因發聚奎前為知縣時貪虐狀劾罷之而賔尹天竣御史劉國縉及前給事中鍾兆斗陳治則宋一韓姚文蔚御史康丕揚徐大化主事鍾振先張嘉言等咸被察又以年例出紹徽及其同官喬應甲于外時察疏未入黨人咸謂丕揚果以僞書故斥紹徽國縉且二人嘗攻李三才王元翰故為修隙議論洶洶禮部主事丁元薦甫入朝即抗章盡發宣崑搆謀狀于是黨人姚宗文等爭擊元薦為金明時訟寃賴葉向髙調護至五月察疏乃下由是諸失意者相繼攻丕揚及圖至秋圖遂引去明年二月丕揚亦拜疏歸初嘉隆以前士大夫廉恥自重以掛察典為終身之玷及帝之世閣臣有所徇庇間留一二以撓部權而羣臣水火之爭莫甚于是年及丁巳黨局既成互相報復至國亡乃已質實亓詩教萊蕪人周永春金鄉人韓浚淄川人張延登鄒平人趙興邦髙邑人官應震黃岡人田生金麻城人田一甲忠州人徐紹吉保寧衛人姚宗文慈溪人劉廷元平湖人商周祚會稽人毛一鷺遂安人過庭訓平湖人王圖字則之耀州人韓敬字求仲歸安人吳道南字㑹甫崇仁人金明時德清人徐縉芳晉江人蕭雲舉廣西宣化人許宏綱東陽人王宗賢清源人湯兆京字伯閎宜興人秦聚奎漢陽人鄭振先武進人張嘉言湘潭人丁元薦字長孺長興人天鼓鳴又流星見大如碗赤色照地夏四月京師旱六月大水先是五月廣東廣西大水至是南北兩畿及湖廣皆大水諸大吏請罷𣙜稅以蘇民命不省秋八月河南巡按曾用升以災請蠲振不報河南洊饑開封歸德汝寧等府自春夏霪雨連旬平地水深丈尺飛蝗蔽野用升奏言中州錢糧自三十年迄今逋負三十九萬有竒請罷免之并請留秋冬稅銀以振災重州縣不報冬十月户部尚書趙世卿上疏去位世卿饒心計在户部酌劑嬴縮軍國賴焉福王成婚及公主下嫁凡額外宣索世卿俱力爭楚王與宗人相訐世卿嘗官楚府長史言王非僞與沈一貫合遂為廷臣所惡論劾相繼世卿上疏乞罷出城候命踰年不報乃乘柴車去發明楚宗事至是幾十年矣而廷臣猶以世卿右王之故相繼論劾借端攻擊報復相尋朝事已不可問至世卿乞罷或聽或留不過一言而決乃遲之踰年竟付不報而世卿亦遂不待朝命怫然而去卒亦不聞以擅去為罪前此左都御史詹欣封印自去未幾吏部尚書孫丕揚亦拜疏自去而閣臣李廷機亦以上疏不得命竟歸一時大臣之去留朝廷若罔聞知者醫書以手足痿痺為不仁大臣國之股肱而一至于是其為痿庳不已甚哉壬子四十年眷正月天鼓鳴時宣府懷來延慶皆地震又有星如盞起左攝提光燭地三月振京師流民順天府以饑民流移皆集京師請給米煮粥振濟從之夏五月甲午朔日有食之是月太白晝見又雲南大理等府連次地大震秋八月以刑部尚書趙煥兼吏部尚書時帝怠荒益甚二十餘年未嘗一接見大臣曹署多空內閣止葉向髙杜門已久六卿惟煥一人又兼署兵部至是改置吏部兵部尚書李化龍卒召王象乾未至亦不除侍郎户禮工三部止各一人都察院自溫純罷去八年無正官六科止數人十三道皆以一人領數職在外巡按十餘年不得代督撫監司亦屢闕不補郡守缺什之五六文武大選急選官及四方教職積數千人以吏兵二科缺掌印不給牒久滯都下時攀執政與哀訴煥果疏乞除補始除侍郎數人既而考察命下補科道六十餘人時稱盛事云煥素有清望于朝臣無所左右雅不善東林諸人及附東林者咸起攻之至明年秋罷歸質實趙煥字文光掖縣人河決徐州特黃河水決衝徐州縷隄長二百八十丈并遙隄諸口正河悉為平陸邳睢河水陡耗總河都御史劉士忠挑引河水復故道至明年塞之九月李廷機罷廷機性廉潔然頗刻深不諳大體其在禮部楚宗人華趆以奏訐楚王既擬奪爵錮髙牆廷機援祖訓謀害親王例議置之死言路勢張政府暨銓曹畏之不敢出諸外年例幾廢主事聶雲翰論之廷機希言路意中雲翰察典初入閣廷臣爭論之廷機纍疏乞休杜門不出待命踰年乃屏居荒廟人跡都絶言者猶政之不已至是疏已百二十餘上不得命竟歸廷機繫閣籍六年秉政止九月無大過言路以其與申時行沈一貫密相比故交章逐之輔臣以齮齕受辱屏棄積年而後去前此未有也御定資治通鑑綱目三編卷二十九
