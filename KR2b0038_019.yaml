  - {type: page-break, offset: 0, content: '', id: KR2b0038_WYG_019-1a, image: WYG0340/WYG0340-0251a.png}
body:
  text: 起辛夘明憲宗成化七年盡戊戌明憲宗成化十四年凡八年辛夘七年春正月詔舉堪任州縣者英宗正統初嘗詔廷臣舉御史知縣至是從都御史李賔言復命京官五品以上及科道官各舉堪任州縣者一人以余子俊巡撫延綏時寇數入邊兵部尚書白圭請罷延綏巡撫王鋭推浙江左布政使余子俊代之以子俊嘗厯官陜西習邊事也先是延綏鎮治綏徳州屬縣木脂吳堡孙懸鎮外寇以輕騎入掠鎮兵覺而追之輒不及往往得利去子俊既至徙鎮榆林増益兵衛攻守器畢異榆林遂為重鎮寇杪漸稀軍民得安耕牧質實米脂宋以米脂川地置砦金升縣民屬餒徳州今因也吳堡宋收西夏地置砦金升縣明屬葭州今改屬綏徳州余于俊字士英青神人初由西安府知府厯陜西布政六年轉左調浙江甫半載有是命王鋭遷安人二月復設九江蘇州杭州鈔闗宣徳間始設鈔闗九江及蘇之滸墅杭之北新闗皆同時建置成化四年罷之至是戸部以京庫嵗用鈔不足遂議復設是年三月又從工部尚書王復請分遣司屬往蕪湖荆州杭州抽分竹木易銀解京以資營繕質實蕪湖漢縣明屬太平府今因之荆州抽分厰設于府治東南之沙市其設于杭州者謂之南新闗在仁和縣侯潮門外夏五月瘞京師暴骸嵗大疫民多道死乃置漏澤園六所于都城外以瘞之後二年四月因主簿邵文梧言復命巡街巡河御史瘞骸胔之暴露者秋八月振山東浙江水災戸科給事中李森等言山東七府及浙江嘉湖杭紹四府旬夏霪兩傷稼漂損廬舍人畜無算望遣亷幹名望大臣勘災蠲振從之九月浙江潮溢是月二日辛未潮溢衝决錢塘江岸千餘丈漂没居民田宅守臣以聞閏九月命工部侍郎李顒往祭海神修築隄岸質實錢塘江即浙江亦名曲江在杭州府城東南李顒字思城博羅人始立漕粟長運法宣徳間平江伯陳瑄請立兑運法與支運参行至是戸部因應天巡撫滕昭議又變𤓰淮兑運為長運令運軍徑赴江南水次交兑加耗外復給米為渡江費後数年命淮徐臨徳四倉支運七十萬石之米悉改水次交兑而官軍長運遂為定制質實按江米之法寅徳時已與𤓰淮兑運並行明史周忱傳云忱與陳瑄議民運至𤓰淮水次交兑漕運軍運至通州其附近軍未過江者即倉交兑加過江米二斗所謂附近軍者攷諸瑄傳盖謂湖廣江西浙江及蘇松安慶軍士而浙江兑運粮嵗六十萬蘇松安慶九十一萬八千附近軍領兑不盡仍多赴𤓰淮交兑昭建此議則并令江北軍過江就兑浙江等處石加過江米一斗南直𨽻等處一斗三升户部㑹議定石加脚米六升乃悉罷𤓰淮兑運是為長運法之始自宣徳兑運法行支運米日少天順時嵗運粮四百三十五萬石内支運者止七十一萬一千八百石及是從昭議改兑運為長運而四倉支運未改其改兑則九年九月也後孝宗從戸部言山東改兑粮復聴民自運臨徳二倉于是山東獨支運如故發明明季轉漕之法由民運而文運由文運而兑運至是始定為長運官任轉輸之責民免飛輓之勞其法可謂善矣顧交兑之際弊竇易生即責成于地方有司尚不能保無吏胥耗蠧乃聴民自兑于運軍則額外之需求必且日滋增益况既經改為長運則凡有漕糈皆當量為酌劑俾達之輦下以供官府廩食之需乃考食貨志稱淮徐臨徳四倉由支改兑者止限以七十萬石之額其餘交兑不盡者仍令民運赴四倉民力既未能紓而其後乆無支銷遂致有紅朽陳腐者又其時蘇松常嘉湖五府之白粮船俱仍令民運如故此皆立法未為周祥奉行不能盡善所致非長運之不可行也厥後漕臣邵寶徒見流弊之滋轉謂長運之之未善而欲復行支運是何異因噎而廢食哉冬十月命王恕為刑部左侍郎總理河道時運河淤塞廷臣言平江伯陳瑄治河通運六七十年近嵗以未規制廢弛灘沙壅澀不加挑濬泉源漫伏不加搜滌遂至漕舟阻淺急宜命官修治復瑄之舊然自通州至儀真𤓰州二三十里勢非一人所能獨任當分沛縣以南徳州以北及山東為三道各委曹郎暨監司専理且請簡風力大臣總理其事期以三年底績于是始以恕為總河質實儀真唐析江都縣地置揚子縣宋為真州治明洪武初以州治揚子縣省入尋降州為儀真縣屬揚州府今改曰儀微仍屬揚州府十一月立子祐極為皇太子祐極以五年四月生至是立為太子質實祐極憲宗次子栢賢妃生十二月彗星犯紫㣲光長竟天正晝猶見帝避正殿撤樂敕羣臣修省條時政得失彗至明年正月乃滅見閣臣于文華殿彗星乆見羣臣多言君臣否隔宜召大臣議政大學士彭時商輅力請中官約以御殿日召對且曰初見時情未洽勿多言姑俟他日将入復約如初比見時言天變可畏帝曰已知卿等宜盡心時又言昨御史有疏請減京官俸薪武臣不免觖望乞如舊便帝可之萬安遂頓首呼萬嵗欲出時輅不得已皆叩頭退中官戯朝臣曰若輩常言不召見及見止知呼萬嵗耳一時傳笑謂之萬嵗閣老帝自是不復召見大臣其後尹直入閣欲請見計事安止之曰君不聞彭公耶詩召對一語不合輒叩頭呼萬嵗今吾輩每事盡言太監擇而聞之上無不允者勝而對多矣安之容悦不識大體且善歸過于人如此質實明實録御史張斆因星又陳八事其一為兩京官俸禄宜暫减半時所謂昨御史有疏者葢謂斆也壬辰八年春正月皇太子祐極卒傳者謂萬貴妃害之也諡曰悼恭四川盜起時四川榮縣盜起殺人攻城據府庫緞獄囚已又焚劫犍為恣行剽掠官軍捕之輒為所敗鎮守中官梅忠等以聞事下兵部尚書白圭言往者蜀寇趙鐸等聚衆流劫所司不能以時撲滅勢乃益熾至一再用兵然後充之今瘡痰甫定盜復竊發宜勅忠偕巡按御史嚴督三司刻期擒𫉬兵力不支可徵威茂永寕分守官軍協𠞰毋如前日養寇帝納之尋擢江西布政使夏塤為副都御史巡撫四川任以平盗塤至官立互知㑹捕法盜為之少戢質實榮縣唐析大牢縣地置旭川縣為榮州治宋改縣曰榮徳元省入榮州明洪武九年降州為縣犍為縣隋置明與榮縣並屬嘉定州今並屬嘉定府夏塤字宗成天台人二月預徴山西河南明年賦以謀搜套也先是正月延綏㕘將錢亮禦瑪拉噶于安邊營敗績都指揮栢隆陳英戰死伽家色凌犯固原平凉邊警疊告兵部尚書白圭復建預徴之議檄下山西河南諸府縣於是内地騷然兵科給事中梁璟言山西預徵草豆每夫科銀二十兩嵗旱民飢逃亡載路太原一縣五日内已亡三百八十餘家人心駭懼乞發帑補買以甦民困事下戸部議格不行時侍講倪岳亦言山西河南之民飛芻挽栗徒步千里夫運而妻供父輓而子荷乃轉輸不足又有預徴水卑不可先知豐歉未能逆卜徴如何其可預也論者皆韙其言質實太原秦晉陽縣北齊分置龍山縣隋改龍山曰晉陽改舊晉陽曰太原宋廢二縣改置平晉元屬冀寕路明洪武八年復曰太原縣屬太原府今因之梁璟字廷美崞縣人倪岳字舜咨上元人發明預徵非制唐莊宗衰世苟且之法也然同光四年所謂預徵者亦祇于三月微秋夏之税如唐代宗之税青苖而已非懸豐歉不可知之明年而先責其賊也明至憲宗之時國用不節傾内帑以恣中官梁芳軰之侵弁府藏既虗而欲大舉搜套遂至以預徵為籌餉之計謬矣且豫晉為師行經過之區其民方任轉輸尢當减賦緩征以紓其力而乃行此苟且之法以重困之民勞不大可念乎况是時所發京兵素號冗怯前後令遣朱永趙輔劉聚三大將又皆畏葸不任戰者徴匱竭之餉以飽媮惰之兵一矢未發而内地且騷然矣雖欲復套得乎夏四月旱京畿速月不雨運河水涸遣使禱于天地社稷山川淮瀆東海之神遣使録天下囚初南京戸部侍郎陳翌因災異陳事請如正統例遣使録囚部又寢之至是帝憶其言乃分遣郎中劉秩等十四人㑹巡按御史及三司官審録後從商輅請復遣郎中張文昭等録天下囚遂定為五年一遣之例質實陳翌字冲霄虹縣人劉秩安福人張文昭平山衛人五月占城遣使告難占城自洪武二年遣使奉表入貢代著恭順正統七年安南闗王黎麟卒子濬繼濬侵占城奪新州港擄其王摩訶賁該以歸帝為立新王摩訶貴来敕諭濬歸其故王濬不奉詔侵掠占城人口至三萬三千餘天順三年濬庶兄諒山王琮弑濬而自立越九月為圖人所誅以濬弟灝繼成化四年灝侵據廣西憑祥帝命守臣謹偹之七年又攻破占城虜其王槃羅茶全王弟槃羅茶悦逃山中至是使臣樂沙㺯来告難兵部言安南并吞與國若不為處分非惟失占城歸附之心抑恐啟安南跋扈之志宜遣使齊敕寅諭還其國王與家屬帝慮安南逆命欲賜其貢使至賜敕責之逾月以槃羅茶悦請封命給事中陳峻等持節往而占城已為黎灝所據改為交南州不克入灝既滅占城遂優擾邊境廣東之瓊雷廣西之龍州鎮安雲南之臨安廣南皆數告警中朝務為姑息惟屢降敕諭灝益玩侮無畏忌言占城王槃羅茶全侵化州道為其弟槃羅茶遂所弑遂自立將受封而槃羅茶悦子茶質苔來又弑之其國自亂非臣灝罪帝雖知其詐不能詰質實瓊州唐分崖州地置元路又改乾寕軍民安撫司明改府今因之鎮安宋右江鎮安軍民宣撫司元路明改府廣南宋時蠻名特磨道元置廣南西道宣撫司明洪武中改廣南府今皆因之陳峻順天人命武靖侯趙輔為將軍偕王越帥師搜河套次于榆林業盛既奉命至延綏與王越等議軍事以邉偹乆虚搜套未可輕議請守固而後戰越因乞偕盛還朝而廷議以套寇不滅三邊終無寕嵗遂拜輔將軍以搜套任之敕陜西延綏寜夏三鎮兵皆受節至越仍總督軍務比至榆林寇已深入大掠輔越不能制乃奏言搜套非十五萬兵不可今餽餉煩勞公私困竭宜姑事退守㑹陜西巡撫馬文升復報寇警兵部論輔越擁兵坐視命給事中郭鏜往勘還言寇于六月入平凉鞏昌臨洮殺掠人畜三十六萬四千有竒七月縱横慶陽境輔越至榆林不進致部將遇敵輒以不得號今為辭當治其弛兵玩寇罪而輔越方以寇不戰自屈奏請班師兵部劾兩人欺謾帝終不之責也質實馬文升字負圖鈞州人郭鏜恩縣人秋七月南畿浙江大水南畿大風雨壊天地郊壇孝陵廟宇蘇松揚三郡亦以水旱告浙江海溢杭紹嘉湖寜五府地各被水災凡八郡渰没田禾漂毀官民廬舍畜産無算溺死者二萬八千四百七十餘人冬十一月趙輔有疾命寧晉伯劉聚往代之輔稱疾屢疏乞還郭鏜亦言其以病廢事乃有是命聚既代輔為將軍明年寇入花馬池率禆將擊却之其冬博勒呼們都埒伽嘉色凌連兵深入直抵秦州安定㑹寜諸州縣縱横數千里聚擁兵不能救寇既飽掠去㑹王越搗巢自紅鹽池還遂以大㨗聞紀功兵部員外郎張謹劾其虚冐所報首功皆邊民被掠者詔遣給事中韓文往勘還奏如謹言帝以寇既遁置之輔還猶督京營兵郡言輔既稱疾宜解營務帝亦置不問質實花馬池在慶陽府城北周迴四十餘里安定宋安定堡元改縣明屬延安府㑹寜金西寕縣元移㑹州治此尋省西寜縣入㑹州明洪武初改㑹寜縣屬鞏昌府今皆因之紅鹽也在榆林府西北與寜夏府接界張謹定逺人韓文字貫道洪洞人癸巳九年春正月真人張元吉有罪釋之元吉襲封真人恣行不法僣用乘輿器服擅易制書奪良家女子逼取人財物家置獄前後殺四十餘人有一家三人者事聞帝恕械元吉至京㑹百官廷訊論死刑部尚書陸瑜等請停襲去真人號不許命仍舊制時成化五年四月也元吉坐繫二年竟以夤縁免死杖百發肅州軍言官争之不納至是其子元慶復為父陳情斬免帝允之給事中虞瑶等言律殺一家三人者磔元吉以睚眦殺四十餘人罪豈容誅貸死發戊巳為枉縱今又有釋歸田里臣實未諭若以元吉母老子幼情或可矜則元吉所殺四十餘人豈無可衿如元吉者祖法朝綱不可不慎奏入命俟終養遣戍尋竟釋為民質實陸瑜字廷王鄞人虞瑶縉雲人土爾番據哈密初哈密忠順王布拉噶卒無子王母寜温達錫里主國事伽嘉色凌窺哈密無主襲破其城王母率親屬部落走苦峪遣使告難朝廷不能援成化二年韃靼兵已退乃資遣還故土其頭目哀請以都督同知巴圖穆爾襲封巴圖穆爾者故忠義王托歡特穆爾外孫也帝因擢為右都督攝國王事又卒其子哈商請嗣職帝許之而不命其主國事政令無所出是時土爾畨酋阿爾自稱蘇勒坦乗机入哈密虜王母劫金印去留其妹婿伊蘭據守之兵部言哈密實西城咽喉棄而不救恐赤斤䝉古等衛亦為所脅則我之藩難盡撤而甘肅之患方殷使套寇不退闗中供億愈難于是命都督同知李文右通政劉文赴甘肅經畧抵肅州遣錦衣千戸馬俊往諭阿爾抗不遜覊俊月餘文等乃檄哈商及赤斤罕東黙克埒諸部集兵進討質實黙克埒畨部名在哈密北托歡特穆爾布拉噶之族祖父也布拉噶之祖曰忠順王托克托永樂八年卒封其從弟推勒特穆爾為忠義王卒宣徳元年復以托克托子布達錫哩嗣忠順王是為布拉噶之父尋因忠順王年幼命推勒特穆爾弟嗣忠義王同理國事即托歡特穆爾也劉文四川榮縣人里布拉噶舊作卜列革寕温達錫里舊作弩温達失巴圖穆爾舊作把塔木兒托歡特穆爾舊作脱歡帖木兒哈商舊作罕慎蘇勒坦舊作速檀伊蘭舊作牙蘭阿爾舊作阿力黙克埒舊作也克力托克托舊作脱脱推勒特穆爾舊作兔力帖木兒特達錫哩舊作卜答失里今並改三月山東大饑民相食振之是年畿内陜西山西皆饑湖廣南畿亦被災而山東飢尤甚餒死者枕籍骼無餘胔乃命免今年租巡撫牟俸前後請發濟南倉儲減價以糶令臨清闗税收米麥助振又以民多轉徒請敕鄰境撫院官随所在安輯秋成貲遣復業且乞開中淮浙鹽百萬引盡蠲州縣道課詔具如所請更命移臨清倉粟十萬石以振俸尋乞截留漕粮并貸飢民布棉免柴夫折價銀移河南輸邊粟濟山東而别給銀為邊餉山東輸京租二十萬石給本地用帝皆嘉納于時俸不俟命檄發東昌濟寕倉粟十萬餘石為軍士月糧而以徳州臨清寄庫銀易米振濟請伏專擅畢帝特宥之月之甲午及四月丁夘境内忽黑暗如夜八月旱蝗旋大水明年又飢復諸發倉儲出貸俸撫山東五年治尚煩苛然頗盡心荒政所全活甚衆質實明史食貨志柴夫折價銀自宣徳五年置易州山厰僉北直𨽻山東山西民夫轉運後令輸直僱役所謂折價銀也牟俸巴縣人夏四月辛酉朔日有食之閲武臣騎射帝以武偹廢弛乃御西苑命武臣騎射黜指揮李勝等四十六人十一月重閲西苑罷定襄伯郭嵩等四人英國公張懋三發皆中帝大喜厚賚之質實郭嵩定襄伯之姪張懋英國公輔之子秋九月鎮守浙江太監李義殺指揮馬璋不問義至寜波指揮馬璋饋白金二十兩意不慊遂杖殺之璋母訟于朝帝命義自陳言因公事杖璋璋病死非斃杖也帝命宥之既而鎮守雲南太監錢能杖守礦千戸一人死巡按御史甄希賢劾之帝亦未嘗罪能也質實甄希賢麟遊人們都爾博勒呼嘉伽色凌並入寇王越襲破其孥于紅鹽池三酋大舉深入直扺秦州安定諸州縣王越策寇盡鋭西出必不備東偏乃率縂兵官許寕遊擊將軍周玊各將兵四千六百為左右哨從榆林紅兒山出知境盡夜兼行八十里涉白鹽灘北又百五十里偵寇老弱俱在紅鹽池乃分兵千餘伏他所而身寕寧玊張兩翼直薄其營伏兵又從後夾擊大破之焚其廬帳而還及寇飽掠歸則妻子畜産已蕩盡相顧痛哭自是稍徙北去不復居河套間盗邊不敢大入亦數遣使通貢於是延綏得息肩者數年質實紅兒山在榆林府北白鹽灘即白鹽池在定邊縣西北周玊字廷壁滁州人們都爾舊作門都埒博勒呼舊作孛羅忽今俱改甲午十年春正月命王越總制三邉前年冬刑部主事張鼎言延綏甘肅寧夏三邉鎮撫不相統一宜推文武重臣一人總制章下所司乃議設制府于開成控制三邉總兵巡撫而下並聴節制詔即以越任之時因紅鹽池之㨗論功加越太子少保增俸一級而越自謂功大賞薄遂怏怏稱疾還朝質實此三邊設總制之始越還朝即罷不設至𢎞治十年又起越為之十五年以命秦紘正徳元年繼以楊一清遂為定員嘉靖十九年改稱縂督張鼎字大宇陜西咸寜人三月罷總督兩廣右都御史韓雍雍在粤於鎮守中官黄沁不為禮沁憾之㑹栁潯諸蠻復叛㕘將楊廣等俘斬九百人方更進而賊䧟懐集兵部劾雍奏報不實沁亦訐雍坐視且言其土賞費財帝遣給事中張謙等往勘而廣西布政何宜副使張斆衝雍素輕已共醖釀其罪謙還奏事虚實交半乃命致仕去雍冇雄畧善斷臨戰躬親矢石不目瞬既承制專决自奉尊嚴軍門設銅鼔數十儀節詳密三司皆長跪白事禆將以下繩押無所假又坦中不為崖岸揮斥財帛不少惜故雖令行禁止而謗議亦易起雍既去兩廣人念其功為立廟祀質實懐集劉宋析四㑹縣置元局賀州明改屬梧州府今因之何宜福清人張謙清苑人夏六月武靖侯趙輔請世襲伯爵許之輔辭侯乞世伯帝許其世伯侯如故言官力爭不聴質實明史功臣侯表輔子承慶嗣伯傳爵至明亡乃紀發明國家所以馭下者賞有功刑有罪而巳趙輔受命西征坐視敵騎之蹂躪封殪而不加一矢弛兵玩寇罪孰甚焉憲宗即念輔大藤峽之舊勞貰之不正刑誅亦已幸矣顧曲徇其世伯之請辱酬庸大典以加有罪之人則是奨邉臣之媮惰而勸其效尤也此明之邊事所由日壞哉閏六月築邉牆初余子俊上言三邉惟延慶地平易寇屢入犯獲邊人為導徑入河套自是寇顧居内我反屯外急宜于沿邉築牆置堡其舊界石所在多髙山陡厓依山形随地勢以成邊牆于計為便尚書白圭以邉民方团奏緩其役八年秋子俊復言征套士馬屯延綏者八萬芻茭煩内地若今冬寇不北去又須偹來年軍資約八百二十五萬公私煩擾至此安得不變計臣前請築邊牆詔事寜舉行請於明年春夏寇馬疲乏時役陜西運粮民夫五萬給食興工帝從之會王越襲寇紅鹽池患少息子俊得一意興築東起清水營紫城砦西扺花馬池延袤千七百七十里鑿厓築牆掘塹其下連比不絶每二三里置敵臺崖砦脩巡警又于崖砦空處築短牆斜一斜二如箕狀以瞭敵避射凡築城堡十二邉墩十五小墩七十八崖砦八百十九時謂之槖駝城既告竣牆内地恚分屯墾嵗得粮六萬餘石質實按邉牆之築明史兵志謂在成化七年地理志謂在九年攷明憲宋實録八年三月葉盛疏云七年六月内用總兵巡撫議依界石山勢剷削如城然未借役民夫而成堡守偹兵不足供役乞量起山西陜西民修築詔今官軍以次整理不必借役于民則子俊初建邉牆之議已令官軍興築第格于部議未嘗役及民夫兵志以為七年築者葢據官軍興築之始也九年十二月張謹劾趙輔等昌功之罪有云余子俊方修治邊牆難于槩治則子俊告竣之疏所謂不三月功成八九者特約畧言之以見其成之速而其實輔等禦寇韋州之際即已糾衆興工地理志以為九年築者蓋據民夫興築之始也業盛疏又云正統間創築榆林城堡二十有三于其南二三十里之内植軍民種田界石是時即子俊疏所謂舊界石也明史楊一清傳云邊牆在延綏者余子俊修之甚固後邊備日踈牆塹漸夷又明世宗實録二十五年曾銑奏云余子俊修築邉牆東起黄甫川西至定邊營千五百餘里嵗乆傾頺不異平地則子俊所築邊牆至正徳時漸夷逮嘉靖中圮矣銑時餘址間存故所言東西起止頗與子俊告竣之疏互殊也延慶謂延安慶陽非宣化府之延慶州清水營紫城砦並在府谷縣東北秋八月以趙勝爲將軍禦伽嘉色凌命太監劉恒覃平監之伽嘉色凌㓂宣府乃命勝率京軍萬人以恒平監軍往禦之冦退尋召還是年冬復自馬營赤城入冦逰擊将軍周玉敗之明年春冦大同叅將李鎬等敗之自冦徙出套延綏之患寖稀而宣府大同諸邉頗被其擾矣質實趙勝字克功遷安人李鎬大同右衛人發明自永樂八年都督譚青營有中官王安與名奏事為明世閹宦監軍之始馴至正統四年曹吉祥興兵既乆藏甲于家遂有天順五年七月之變憲宗亦既目擊之矣乃改元之歲即命唐慎監米永軍尋又命裴當監楊信軍傳恭顧恒監永軍至是復命恒平視師宣府厥後汪直繼之睨然挾兩鉞以横恣于邉疆其不為吉祥之續者一間耳語曰前車之覆後車之鑒若憲宗者可謂甘蹈覆轍者歟賜廣東按察司副使孔鏞僉事陶魯林錦誥命鏞初以連山令從都御史葉盛征廣西有功薦擢髙州知府府四境屯徭賊十餘部其魁馮曉鄧公長勢尤熾鏞單騎諭降公長選壯士二百人乗夜搗曉巢縳其妻子歸曉亦以五百人降已又與僉事陶魯敗賊廖婆堡餘賊乃悉散去患以戢尋陟副使陶魯故嘗為新㑹丞㑹廣西猺流刼髙亷惠肇諸府破城殺吏無虚月魯召父老語曰賊氣吞吾城不早備且陷乃築堡砦繕甲兵練技勇以孤城捍賊衝建郭掘濠布鐵蒺藜刺竹于外城守大固賊來犯輒擊破之亦以盛薦就遷知縣韓雍征大藤峽魯與有功進僉事既與鏞破廖婆堡之明年復連破黄公漢于思恩潯州又明年亷州知府林錦亦以能禦冦陟僉事盖成化四年事也錦自合浦訓導條上禦盗方畧中機宜即為盛所異厯知靈山亷州皆值嵗饑諸猺四起剽掠錦綏輯流移討其梗化者境内悉平是時粤東西猺冦作亂卅郡無頼子應之所在盗賊充斥葉盛韓雍先後奉命督軍務材鏞等三人屢薦擢至監司以高雷軍事任鏞欽亷任錦而令魯治新㑹陽江陽春新興諸縣兵分道勦撫猺冦以漸衰息至是巡撫呉琛具三人治績聞于朝並賜誥命錦終按察副使魯後擢湖廣布政使仍留治廣東兵備領廣西事時稱魯為三廣公廣大倚之如長城鏞後累官至貴州廵撫有苖賊阿溪者桀驁多智横行諸部中守臣皆納溪賂縱其流刼鏞詢得溪所昵者二人以計擒溪磔之羣蠻皆震懾質實連山隋縣明屬連州惠州北宋置元路明府合滴漢縣明為亷卅府治今皆因之靈山唐縣明屬欽州今屬亷州府陽江縣蕭銑時置新興縣晋置明並屬肇慶府今因之孔鏞字韶文長洲人林錦字彦章連江人九月癸丑朔日有食之詔侯伯及駙馬年少者入國子監司業耿裕以勲戚子弟當先束身禮法乃采輯古諸侯貴戚言行可師者人授一編帝聞而稱善明年祭酒周洪謨以士風澆漓請復洪武中學規帝納其言命禮部榜諭于國子監崇信伯費淮怠不就學洪謨劾之奪冠帯以儒中赴監停嵗禄之半學政肅然質實耿祫字好問盧氏人刑部尚書九疇之子費淮南直𨽻定遠人崇信侯瓛之孫瓛于宣徳元年封伯子世襲冬十月都督同知李文等進兵討土爾番不克引還文等引兵至布隆吉爾川謀報阿爾集衆抗拒更結州别部謀掠罕東赤斤二衛文等不敢進遂請旋軍肅州散遣二衛兵固守本土令哈商及黙克埒輝和爾之衆退居苦峪駐牧章下兵部具如所請且以哈密人民無統教哈商權生國事因其請給米布賜以榖種文等無功而還土爾菜知中國不足憚乆㨿哈爾十三年冬乃命邉臣築苦峪城移哈密衛于其地質實布隆吉爾川在今安西州西北流逕敦煌縣入于哈喇諾爾輝和爾哈密種落之一明史哈密傳言其種落雜居一曰回回一曰輝和爾一曰哈勒琿拉布隆吉爾川舊作卜隆吉兒川哈喇諾爾舊作哈腦兒輝和爾舊作畏兀兒哈勒輝舊作哈剌灰今並改十二月罷採金時内費日侈帑金不足用命湖廣寶慶等郡開採嵗役五十五萬人死者無算僅得金三十餘兩撫臣劉敷奏請已之户部檄所司開遼東黒山金塲亦以巡撫彭誼言而罷質實黑山在今奉天寧海縣東劉敷字叔榮永新人彭誼字景宜東莞人乙未十一年春三月少保文淵閣大學士彭時卒時與萬安同在閣帝怠于政大臣希得見安結中官戚畹上下壅隔時顧懐憂每上言或留中或下所司多不見用常悒悒不得志屢請疾在告力懇放還不許至是疾革衣冠端坐徐言曰死生常理不足驚但冐居大位上不能報國下不能飬老父耳卒年六十贈太師謚文憲時立朝三十年持正存大體有所論薦不使人知燕居無惰容非義不取有古大臣風夏四月以吏部左侍郎劉珝禮部左侍郎劉吉入内閣預機務珝先以舊宫僚晉官直經筵日講反覆開導詞氣祝侃劉定之稱為講官第一帝亦愛重之入閣後嘗呼東劉先生珝性疎直吉則多智與萬安比質實劉珝字叔温夀光人劉吉字祐之博野人時内閣三人安貪狡吉隂刻珝稍優顧喜談論人目之為狂躁皆充位無所匡正諺謂之紙棚三閣老云乾清宫門災是月十四日壬辰夜也越四日乙未以災告于奉先殿譴躬自責五月始召見皇子於西内帝自悼恭太子薨常鬱鬱不樂一日召太監張敏櫛髪照鏡嘆曰老将至而無子敏伏地曰萬嵗已有子也帝愕然問安在對曰奴言即死萬嵗當為皇子主于時太監懐恩侍即叩首曰敏言是皇子潛養西内今已六嵗矣匿不敢聞帝大喜即日幸西内遣使至安樂堂迎皇子使至妃抱兒子泣曰兒去吾不得生兒見黄袍有鬚者者即兒父也衣以小緋袍乘小輿擁至階下時猶未剪胎髪髪披地走投帝懐帝置之膝撫視久之悲喜泣下曰我子也類我使懐恩赴内閣具道其事閣臣皆大喜懐恩並道帝意欲宣示外廷商輅曰當降敕禮部以定名為辭于是廷臣相率入賀帝即命皇子出見廷臣越數日帝復召閣臣問曰皇子既出将何以處之輅頓首曰陛下踐阼十年儲副未立天下引領望乆矣當即立為皇太子安中外心帝頷之遂定名祐樘頒詔中外質實懐恩髙遠人六月皇子母紀氏卒先是帝召見皇子留宫中而紀妃仍居西内大學士商輅恐有他患而難以顯言偕同官上疏曰皇子聰明岐嶷國本攸繫重以貴妃保䕶恩踰已出但外議謂皇子母因病别居乆不得見宜移就近所俾母子朝夕相接而皇子仍藉撫育于貴妃宗社幸甚紀妃遂移居永夀宫數召見逾月妃病篤輅言如有不諱禮宜從厚且請命司禮監奉皇子過妃宫問祖帝皆從之及乙巳卒追封淑妃諡恭恪莊僖質實明史后妃列傳妃居永夀宫萬貴妃目夜怨泣曰羣小紿我其年六月妃暴薨或曰貴妃致之死或曰自縊也張敏亦吞金死事與商輅傳所載互硃蓋傳閒之異永夀宫春明夢餘録月華門往北曰順徳右門再北向東與鳯彩門相對者曰咸和右門南者曰毓徳宫原名安樂宫後又改永夀宫秋八月浚通惠河先是漕運總兵楊茂言自張家灣舍舟車輓至都下僱值不貲通州至京舊有通惠河水道石牐尚存修牐瀦水用小舟剝運便帝遣尚書楊鼎侍郎喬毅相度上言舊牐二十四通水行舟但元時水在宫牆外舟得入城今水由皇城金水河出故道不可復行請濬玉泉龍泉及月兒栁沙諸泉水使入西湖閉分水青龍牐引諸泉水從高梁河分其半由金水河出餘從都城外濠流轉㑹正陽門併流大通橋牐河隨旱澇啟閉則糧艘可近倉甚便帝善其議以災異工未及舉至是命平江伯陳鋭等督漕卒七千人疏浚明年六月訖工濬泉三增牐四漕舟稍通然元時所引昌平白浮諸泉俱遏不行獨引一西湖又僅分其半河窄易盈涸不二載淺塞如故質實明史河渠志通惠河即大通河在大興縣東南元郭守敬所鑿由大通橋東下抵通州高麗莊與白河合至直沽㑹衛河入海長百六十里有竒十里一牐蓄水濟運又以白河榆河渾河合流亦名潞河洪武時漸廢永樂中濬河故道置牐以瀦之未幾俱湮此所浚者自大通橋至張家灣渾河六十里也方輿紀要張家灣在通州南十五里元萬户張瑄督海運至此而名元史地理志金水河源出玉泉山流入皇城故名金水戴司成集玉泉在京城西三十里西山之麓有石洞泉自中而出其上有芙蓉閣金章宗避暑處明實録龍泉月兒桞沙諸泉其源皆出于西北一帶山麓水經注西湖東西二里南北三里蓋燕之舊池也渌水澄澹川亭望遠為游矚之勝所水部備考青龍牐在都城西北三十里元史河渠志高梁河在順天府城西自昌平州沙澗流經髙梁店又東南流入都城積水潭白浮泉在昌平縣界西折而南經甕山泊自西水門入都城焉楊鼎字宗噐陜西咸寧人喬毅字志𢎞山西樂平人陳鋭合肥人平江伯瑄之曽孫們都爾伽嘉色凌遣使入貢遣使通阿等來朝貢馬燕賚甚厚仍以綵段酬其馬直通阿等九十二人皆授官有差予冠帯初伽嘉色凌以女妻們都爾故立為汗屢挾以入冦及是通貢患少息已而伽嘉色凌専恣日甚托羅該與伊斯瑪音謀殺之未幾們都爾亦死諸强酋相繼略盡邉人稍得息肩質實托羅該們都爾部下大頭目伊期瑪音乃穆哩罕之子其謀殺加嘉色凌事在成化十五年通阿舊作桶哈托羅該舊作脱羅干伊斯瑪音舊作亦思馬因今並改九月丁未朔日有食之冬十一月立子祐樘爲皇太子時皇太后居仁夀宫語帝曰以兒付我太子遂居仁夀宫一日貴妃召太子食太后謂曰兒去無食也太子至貴妃治食曰已飯進羮曰疑有毒貴妃曰是兒數嵗即如是他日魚肉我矣因恚成疾仁夀宫在奉先殿東北履順蹈和二門之内以朱英總督兩廣軍務自韓雍大征諸蠻以來将帥喜邀功利俘掠名為鵰勦英至鎮以寧靜約飭將士毋得張賊聲勢妄請用師招撫猺獞效順者定為編戸給復三年于是馬平陽朔蒼梧諸縣蠻悉望風附而茘浦立山鄉賊李公主有衆數萬乆負固亦遣子納欵為置永安州處之俾其于孫世吏目自是歸附日衆凡為戸四萬三千有竒口十五萬有竒帝甚嘉之初雍在兩廣雖有平冦功恢廓自奉贈遺過侈有司困供億公私耗竭既而呉琛代雍務為亷謹至英益持清節其威望不及雍而惠澤過之質實馬平梁縣明屬桂林府陽朔隋縣明屬桂林府蒼梧漢郡治廣信縣隋改縣名蒼梧明屬梧州府今皆因之立山鄉在永安州治東永安州本唐立山縣明洪武中省入平樂縣至是置縣屬平樂府今因之十二月改諡郕戾王爲景皇帝初制門州訓導髙瑶上言正統己巳之變先帝北狩宗社危如一髪使非郕王繼統國有長君則禍亂何日平鑾輿何由返六七年間海宇寧謐厥功不小迨先帝復辟貪天功者遂加厚誣使不得正其終節惠躋祀未稱典禮望敕禮官追加廟號以盡親親之恩章下廷議乆不决而左庻子黎淳力爭謂不當復且言昌邑既廢不聞復為漢某帝更始既廢不聞復為漢某王瑶此言有死罪二一誣先帝為不明一䧟陛下于不孝此必有小人主之者不然彼草茅疎遠安敢妄言帝曰景泰往事朕未嘗介意淳乃欲獻媚希恩邪切責之議遂寢其後御史楊守隨復請改諡事亦未行然帝終感瑶言至是乃命閣臣議復郕王位號商輅力贊成之遂下詔曰朕叔郕王踐阼戡亂保邦奸臣讒搆請削帝號先帝旋知其枉深懐悔恨以次抵諸姦于法不幸上賓未及舉正朕敦念親親用成先志郕王可仍舊里帝號尋上尊諡曰恭仁康定景皇帝令所司修餙陵寢質實荆門宋軍元州明洪武初屬荆州府嘉靖十年改屬承天府今府復名安陸州仍屬焉髙瑶字庭堅閩縣人楊守隨字維貞鄞縣人丙申十二年春正月南京隂霾地震敕羣臣修省于是南京科道官上言弭災之策乞進君子以正朝廷擇将帥以備邉鄙設法制以弭盗賊並乞飭天下鎮廵官及三司郡縣省刑薄歛拯饑緝盗毋妄興土木毋因公科擾詔下所司行之二月乙亥朔日有食之夏五月命左副都御史原傑撫治荆襄流民初項忠既平荆襄盜先後招撫流民九十三萬有竒移軍竹山捕遺孽復招出流民五十萬俘𫉬賊黨家屬二萬八千七百餘人家選一丁偕其孥屯戍湖廣邉衛其流民已附籍者給復三年未附籍者逐歸其鄉而著籍雖乆或占山數十里招集無頼千人爭鬬刼殺者亦令遣逐于是有司一切驅迫不前即殺之賊黨發戍者舟行多疫死廷臣遂一此咎忠忠陳善後十事亦祗増設營堡廵司多方偵守以厲入山之禁不數年禁漸弛流民復聚朝廷以為憂祭酒周洪謨著流民説畧言東晉時廬松之民流至荆州乃僑置松滋縣于荆南陜西雍州之民流聚襄陽乃僑置南雍州于襄西其後松滋遂𨽻荆州南雍州遂治襄陽今當增置郡縣聽附籍為編氓可實襄鄧戸口都御史李賓善其説聞于帝帝然之遂命傑出撫傑徧厯山溪宣朝廷徳意諸流民欣然附籍乃大㑹湖廣河南陜西撫按官籍之得户十一萬三千有竒口四十三萬八千有竒用輕則定田賦民大悅傑相度地勢以襄陽所割鄖縣居竹房上津商洛諸縣中道路四達且去府治遠山林深阻将吏鮮至猝有盜賊難遥制乃拓其城置鄖陽府以縣附之且置湖廣行都司増兵設戍而析竹山置竹谿析鄖置鄖西析漢中之洵陽置白河與竹山上津房咸隸新府又于西安増山陽南陽增南召桐柏汝州增伊陽各𨽻其舊府制既定将還以地界湖廣河南陜西事無統紀因薦御史吳道宏自代詔即命道宏綏輯人民十五年就擢大理寺卿撫治鄖陽襄陽荆州南陽西安漢中六府鄭陽之有撫治自此始也傑事方竣進南京兵部尚書未任卒于南陽鄖襄民為立祠質實忠陳善後十事一流民已復葉者給復三年復流入者全家戍邉衛一禁入山竊礦一増設營堡十二廵司八一竹山縣設立千户所一漢中西安流民責令陜西副使等官䕫州流民責令四川廵守官禦其越界一所留戍卒衛卒委指揮分領操練以助新堡聲威一撤回分守贊畫守備等官裁革新増撫民官及興山縣知縣一荆襄徳安令湖廣鎮巡官督屬防守南陽令巡按河南御史督屬防守一専任撫民之叅政等官宜時巡厯竹山諸縣及新建諸堡以遏竊礦流民一流民所棄山外田地分授主户承佃山谷新墾田税俱與間豁松兹漢縣屬廬江郡晋咸康中縣民避亂于荆南因僑置松滋縣明屬荆川府今因之漢之松滋今為潁州府霍邱縣地南雍州晉太元中僑置今為襄陽府地鄖縣漢錫縣晋改鄖鄉元改鄖縣明為鄖陽治治房縣後漢房陵隋為房陵郡治唐為房州治明改縣屬襄陽是年改屬鄖陽今並因之上津隋置元省明復置襄陽是年改屬鄖陽今省上津縣故城在鄖西縣北一百四十里商洛謂商縣與洛南也後周始置商州洪武七年降縣是年升州𨽻西安府今為直𨽻州洛南縣隋置金廢為鎮元復置屬商州明洪武初改屬華州是年復屬商州天啟初改洛為維今因之商東東九十里别有商洛廢縣則後周所置金貞元二年廢竹溪以尹店社置鄖西以南門堡置洵陽漢旬陽後漢省晉復置曰洵陽元省明復置屬金州以𨽻于漢中府萬厯十一年改金州曰興安州二十三年升直𨽻州更以白河屬焉白河以白石河置山陽晋豐陽縣金廢為鎮至是復是以在北山之南豐河之北故名山陽南召以南陽縣之南召堡置桐柏隋縣元廢為鎮至是復置伊陽以隋伊闕縣置今並因之呉道宏宜賓人秋七月黑𤯝見有物金睛修尾狀如犬貍負黒氣夜入民家至則人昏述徧城驚擾帝常朝奉天門侍衛見之而譁頃之始定帝于禁中祭告天地以四事自責大學士商輅疏弭災八事曰畨僧國師法王母濫賜印章四方常貢外勿受玩好許諸臣直言分遣部使録囚省寃獄停不急營造實三邉軍儲守沿邉闗隘設雲南廵撫帝優詔褒納質實四事自責用度不節一工役勞民二忠言不聞三仁政不施四八月以王恕巡撫雲南大學士商輅以雲南遠在萬里西控諸夷南接交阯而鎮守中官錢能縱恣不法議遣大臣有威望者為廵撫鎮壓之乃改王恕為左副都御史以行先是能遣指揮郭景奏事京師詭言安南捕盗兵入境帝即命景齎敕戒約之舊制使安南必由廣西而景徑自雲南往能因遺安南王黎灝玉帯寳縧蟒衣珍竒諸物灝遣将率兵送景還欲遂通雲南道景懼後禍紿先行白守闗者掦言安南冦至闗吏戒嚴黔國公沐琮遣人諭其帥始返而諸守臣畏能匿不奏能又遣景及指揮盧安蘇本等交通干崖孟密諸土官納其金竇恕至皆亷得之遣騎執景景懼自殺因劾能私通外國罪當死帝詔刑部郎中潘蕃往按之恕再疏發能貪暴狀且言昔交阯以鎮守非人致一方陷没今日之事殆又甚焉陛下何惜一能以安邉徼能大懼急屬貴近請召恕還恕遂改掌南京都察院能事立解蕃勘上得實詔宥能而論其黨九人罪能更為祈免亦多宥之恕撫雲南僅九月威行徽外黔國以下咸惕息奉命疏凡二十上直聲動天下質實孟密本木邦屬部景泰中蠻婦曩罕㺯叛木邦子思柄自稱宣慰使後大學萬安入其賂乃請析置孟密安撫司事詳成化十九年神宗十三年改宣撫司地距今雲南省三十三程沐琮黔國公成孫也藩蕃字廷芳崇徳人初冐鍾姓後始復發明人臣無越境之交况能以閹寺鎮守邉隅謬膺重任敢與安南黎灝潛通餽問此豈尋常縱恣所可曲宥者乎且史稱灝素欲窺伺雲南故發兵隨景假道使非沐琮遣人諭止其勢正未可測則能之罪更有不可勝誅者乃憲宗既得王恕之奏不特不明正能罪而轉改恕南京不惟能自邀曲貸抑且庇及黨儕國憲王章顛􅥚至於如此又何怪乎能輩之日横也九月令太監汪直刺事妖人李子龍者本侯姓名得權易州人少為僧行脚河南遇道士授以符術遂蓄髪變姓名先是陜西民李氏産子子龍有異徴得權因冐之往來真定間迤邐至京師主軍匠楊道仙家夤縁中官鮑石潛入大内石黨韋寒等敬信子龍皆北靣禮為上師尋錦衣校偵其謀不軌白中官黄賜上變寒自殺子龍及石等伏誅帝心惡之鋭欲知外事御馬監太監汪直故大藤峽猺種初給事萬貴妃宫為人便黠因命易服服將校一二人密密出伺察人莫之知也冬十月京師地震是月十一日辛巳也後六十日壬午陜西之蘭州亦地震十一月南京大雷雨是月二十三日癸亥也明年二月甲戌安慶大雪雷電應天廵撫牟俸言雷者陽氣之發雪者隂氣之凝十一月一陽初復而震雷早發已乖二氣之常二月四陽既盛而恒雪不已雷電復作隂陽雜糅尤天變之大者乞修人事以弭之帝乃詔求直言丁酉十三年春正月增孔子廟籩豆樂舞之數初洪武四年定祀孔子禮籩豆以十舞以八佾前年秋祭酒周洪謨請備天子之制章下禮部尚書鄒幹駮止之洪謨再疏爭言孔子像以冕旒十二既用天子之禮而佾舞乃用諸侯之樂以禮論樂則樂不備以樂論禮則禮為僭乞如前所請増籩豆為十二舞為八佾庻禮樂相稱益足章尊崇之典帝從其議乃命大學士商輅以增定禮制告孔子廟學士王獻告于闕里質實王獻字惟臣仁和人置西厰以太監汪直領之永樂中始置東厰令宦官訪緝逆謀大姦與錦衣衛均權勢至是又别設西厰刺事以汪直督之所領緹騎倍東厰勢遠出衛上會建寧衛指揮同知楊勰與父泰為仇家所訐既命刑部主事王應奎錦衣百戸高崇往勘而勰亡入京師因其姊婿禮部主事董序求計于韋瑛韋瑛者素無頼子鬻于宦官韋其蒙其姓冐延綏功授百戸方欲從直刺事無繇也乃諾勰為營解傾助其貲而潛報直謂勰父子殺人懼罪輦金鉅萬匿序所将賄諸用事者以緩其獄直信之即遣人捕勰序顧勰貲已盡于瑛大索序家無所得因考訊勰琶之三琶者錦衣酷刑也以加人骨節皆寸解勰不勝琶妄言寄金于其叔父兵部主事仕偉所瑛遂夜率邏卒突入仕偉家縳仕偉考掠及其妻子翰林侍備陳音與仕偉比屋居聞其聲甚楚乗墉大呼曰爾擅辱朝臣不畏國法耶邏卒應曰爾何人不畏西厰音厲聲曰我翰林陳音也瑛乃縶仕偉去而應奎崇勘獄猶未報直奏其受泰賂與泰並械至京獄具勰崇已庾死泰坐棄市籍其家應奎遣戍仕偉序並謫官直既發勰事頗誣左右大臣多得勰賄帝雖含隠不發然愈謂直可倚任直由此亦遂倚任瑛屢搆誣獄刑部郎中武清禮部郎中樂章行人張廷綱太醫院院判蔣宗武浙江左布政使劉福左通政方賢皆繫西厰獄被收案凡西厰逮捕朝臣初不俟奏請氣燄薫灼自諸王府邊鎮及南北河道所在校尉羅列民間鬬詈雞狗𤨏事輒寘重法人情大擾質實西厰在靈濟宫前武清自廣被收繫按明實録武清自廣西勘事還至通州西厰官校言其有所齎載執繫之獄鞫無實釋之竟不以聞方賢時以左通政掌太醫院事韋瑛索藥不得遣人恣撿其家得片腦沈香以為盜之官庫且藏有御墨及龍鳯甆器俱以違法論尋謫戍遼東樂章張廷綱同使安南還厰校執之鞫其受餽遺有跡奏聞命冠𢃄閒住劉福先已擢副都御史以母憂去尋坐為浙江布政時督造嵗幣不如法當鐫一級服除命以三品官外補搆之于直者遂執繫西厰亦以鞫無實釋之旋授陜西按察使蔣宗武無故被囚五月革西厰竟衣囚服本返其家家人猶未之覺也建寧衛屬福建行都司少朝順治十八年裁楊勰楊仕偉董序皆建安人勰師榮之孫陳音字師召莆田人王應奎慈谿人武清大同人樂章横州人張廷綱江寧人劉福益都人三月命慎妖言之獄時西厰旗校以捕妖言圖官賞多為膺書誘愚民而後捕之寃死相屬廷臣莫敢言有通判曹鼎知縣薛方者寧晉人也㑹罷閒家居厰枝誣其邑人王鳯與瞽者康文秀受妖書株連及之發卒圍其家榜掠誣伏既論死鼎方兩家人數聲寃下法司覆驗獄果妄而分守懐來中官廖禮復興妖人趙大獄所收繫甚衆廵撫殷謙等具奏如禮言獄成命官按之亦妄帝始悟向所罪妖言多被誣者乃下詔責禮等而諭諸法司慎鞫妖言之罪毋或瞻徇以虐非辜質實寧晋唐縣人屬趙州今因之殷謙字文撝涿州人夏五月大學士商輅兵部尚書項忠等請罷西厰輅以西厰官校勢日横因率同官劾直罪且言陛下委聼斷於直直又寄耳目于羣小擅作威福賊虐善良陛下若謂摘姦禁亂為有益則前此數年何以帖然無事近自直用事以來人心疑畏卿大夫不安于位商賈不安于途庻民不安于業若不亟去直天下安危未可知也帝得疏愠曰用一内䜿何遽危天下誰主此奏者命太監懐恩覃吉至閣詰責輅正色曰朝臣無大小有罪皆請㫖逮問直擅抄没三品以上京官大同宣府邉城要害守備俄頃不可缺直一日械數人南京祖宗根本地直擅收捕留守大臣諸近侍在帝左右直輒易置直不去天下安得無危輅等同心一意為朝廷除害無有先後恩等以實覆奏傳㫖慰勞翌日兵部尚書項忠亦倡九卿劾之帝不得已令直歸御馬監調韋瑛邉衛散諸旗校還錦衣衛中外大悦六月斥兵部尚書項忠爲民忠之倡九卿劾直也既具疏草令郎中姚璧持詣諸尚書署名先詣吏部尹旻旻素交驩直却曰奏出項尚書兵部宜為首璧對曰公六卿之長也旻怒曰今日乃知六卿長耶既署名即馳報直直銜忠甚謀于錦衣千戸呉綬綬嘗從征荆襄以罪為忠所劾亦深憾忠遂相與伺之急忠不自安乞歸治病未行而直綬嗾東厰校誣忠以劉江事劉江者金吾左衛都指揮也注選為江西都司巡按御史以其未諸軍政檄使領操而更令僉事掌都司印江不勝忿疏其事以請事下兵部言江妄奏當罪帝方以都指揮例得掌印江未為妄切責兵部阿御史言而東厰校忽騰飛語謂江選都司非例乃夤縁中官黄賜屬兵部得之賜故與陳祖生為司禮監直忮其位已上不相能啇輅之劾直直疑出賜祖生意賜祖生皆閩人直既譛其為鄉人楊給事中郭鏜等遂上章劾忠詞搆江事誣忠且以傾賜給事中郭鏜等遂上章劾忠詞連興武伯李震等交通忠狀震初與忠洪平荆襄賊亦吳綬所惡也詔並下法司會錦衣衛廷鞫忠抗辯不少屈衆雖知忠枉事皆無左驗然重違直意而綬又方為錦衣理刑官遂周内其獄黜忠為民江遣戍姚璧亦被牽引與震等謫有差質實姚璧桐廬人少保夔之子尹旻字同仁厯城人吳綬江夏人御史戴縉上書頌太監汪直功乃復開西厰大學士商輅引疾歸時西厰方革人心稍安顧帝眷直不衰令蜜出外刺事如故御史戴縉者性險躁千進以九年秩滿不得擢用探知帝意乃假災異上疏言近嵗以來災變屢臻敕諭廷臣修省未聞大臣進何賢退何不肖亦未闈羣臣袪何裨政效何嘉猷獨有太監汪直緝捕楊勰等之奸惡懲治髙崇王應奎之賦貪凡所摘發允協公論足以警懲服人特其部下官校韋瑛軰行事或渉張皇為大臣所奏罷伏望陛下推誠任人務俾宿弊盡革然後天意可回也縉初為此奏属所善錦衣千戸吴綬以稿示直直得之大喜為言于帝疏入遂復開西厰商輅引疾請歸帝先入直譛謂輅受楊勰金徒以大臣故置不問至是遂聼輅去而縉所上疏並乞令両京大臣自陳以傾直所不悦者于時大臣以次陳免者数十人士大夫皆俛首事直直勢愈恣矣然直雖倚勢多作奸亦時或發奸以取信于帝明年南京鎮守中官覃力朋進貢還以百艘載私塩武城典史誥之力朋擊折其齒射殺一人直亷得以聞逮治論斬力朋後得倖免而帝以此謂直不私益幸直質實武地古夏城地隋改舊武城為清河縣别置武城于此明屬髙唐州今屬臨清州戴縉字子容南海人發明明自宦官王振亂政御史李鐸以遇振不跪謫戍鐵嶺衛于是言官之氣始懾于宦官然未嘗顯與宦官比也前七年雲南鎮守中官錢能以疾將召還廵按御史郭陽譽能剛果有為乞留鎮守為士論所鄙然猶不至傾朝士以悦宦官也戴縉險躁于進言翕言翕訿訿頌西厰之功而掦其燄且以傾直所不恱者嗣後宦官用事遂多與言官相表裏馴至末流崔呈秀倪文煥之徒皆甘心効逆閹鷹犬毒痡海内以速明祚之亡而作俑實自縉始縉罪可勝誅哉秋八月振南畿山東州縣災帝以應天諸府及山東兖州水潦傷稼民大饑乃分遣曹郎往發倉振之並賜之敕所在有司貪酷者許逮治以聞質實分遣曹郎按明實録振兖州者刑部郎中張文淮安則兵部郎中張謹揚州則户部郎中谷琰徐州則吏部員外郎國泰鳯陽則户部郎中李炯然錦衣衛執工部尚書張文質下獄東厰官校發雲南百戸左昇私事詞連掌通政使兵部尚書張文質錦衣衛遂執下獄帝不知也在通政何琮等以掌印請帝乃知而釋青之錦衣衛官以擅繫大臣停俸質實張文質昌黎人何琮字文璧仁和人九月京師地震月之十日甲戍夜地震者三次戊戍十四年春二月皇太子出閣就學命太常少卿王獻等入侍學士彭華等充講讀官敕閣臣萬安劉珝劉吉董督之時有老閹覃吉者朝夕侍太子口授四書章句及古今政典帝賜太子莊田勸勿受曰天下皆太子有也太子偶從内侍讀佛經吉入太子曰老伴來矣急手孝經是年太子方九嵗端本正始吉有力焉質實彭華字彦實安福人大學士時之族弟也三月復開遼東馬市永樂間設馬市于廣寧及開原城東以待泰寧朶顔福餘三衛正統間以其部衆懐貳罷不設會們都埒暴强侵掠三衛三衛部長皆走避塞下頗饑困屢請復開馬市兵部持不可至是遼東廵撫陳鉞復為之請乃許之而通事劉海姚安肆侵牟朶顔諸部挾怨遂擾廣寧不復來市後鉞長兵部懼罪及已因詣治海安二人罪令參将布政司官一人監市毋有所侵剋于是互市如故質實陳鉞字廷威獻縣人上杭盗起以髙明巡撫福建督兵討平之上杭地接江西廣東山谿險阻為閩之盗藪天順中李宗政作亂廵按伍驥率兵搗其巢俘斬八百餘人亂乃定至宗曽宗鄧嵩等復屯結出掠勅鎮守中官盧勝廵按戴用督捕之而勢益熾時髙明方服闋特起為福建廵撫任以討賊明至汀即督兵入山不數月盗皆以次禽縳誅首惡三十六人餘減死遣戍析其地置永定縣由是上杭無盗患質實上杭宋縣明屬汀州府永定縣明屬汀州府今皆因之髙明字上達貴溪人自㓜事母以孝聞初為南京右僉都御史會揚州私販鹽者嘯聚為冦守兵失利詔明討之造巨艦曰籌亭往來江上督戰沿江置邏堡侯望賊蹤踪無所匿遂平之明亷約清峽所至事輙辦既平上杭盗旋移疾歸伍驥字徳良一字體純安福人驥與都指揮丁泉同討賊泉力戰為賊所害驥平賊後亦旋卒閩人並祠祀之知縣蕭定聞于朝賜祠額曰褒忠戴用萬安人丁泉汶上人夏五月以戴縉爲右僉都御史縉既頌直功復開西厰即擢尚寳司少卿然縉意未慊也直力薦之于帝旋有是命明年復自中㫖擢副都御史甫踰年進都御史代王越掌院事於時御史王億等競效縉所為相率媚直謂西厰摘伏發姦不惟可行之今日實足為萬世法傳聞四方無賢愚皆唾駡之指縉為罪首而縉驟躋顯秩益甘心黨直依阿淟涊臺中紀綱掃地後直寵日衰縉知不為廷臣所容謀出為南京工部尚書直敗黜為民質實王億銅梁人六月太白嵗星同晝見四川巡撫張瓚討平松潘疊溪苖先是松潘諸番冦邊僉事林璧言松茂惟設二參将以副使居中調度事重權輕臨敵禀令上官千里請戰謀洩機緩故常失利宜别置重臣彈壓或即命廵撫兼領専其責成乃詔瓉兼督松茂安綿建昌軍務瓚至軍審度形勢令副總兵克彧軍松潘參将孫暠軍威疊為夾攻計而自率兵攻白草壩數大砦斬獲無算移師狗茂州疊溪所過降附賊魁皆殱先後破滅五十二砦其他一百五砦悉獻馬納欵諸番盡平留兵戍要害乃班師質實安縣唐曰龍安元安州明降縣屬成都府今改屬綿州白草壩畨砦名在今龍安府屬之平武縣南張瓚字宗噐孝感人林璧武岡州人太監汪直行遼東邊前年冬遼東廵撫陳越以掩殺冐功激變直欲自往定之而帝命馬文升往安撫直不悦文升馳至鎮宣璽書撫慰無不聼撫者事垂定直思攘其功固請于帝挾其私人錦衣百戸王英日馳數百里箠撻守令遠近驛騷鉞聞之懼先遣人賂直左右令所過居民跪迎道左比至鉞出迓于郊望塵蒲伏盛供張以娱直左右既得賂復爭稱鉞賢直大喜至開原再下令招撫文升乃推功於直内慚文升又與抗禮奴視其左右直益不悅而鉞與文升素不合日夜譖之直直于是必欲傾文升矣發明明代宦官採辦刺事分鎮監軍出使皆肇自永樂而特遣廵邊則自憲宗之命汪直始夫直之擅作威福其時中外已莫不震讋原不待巡行邊徼而始張其聲燄也即今考其傳載率飛騎日馳數百里所過箠撻官吏各邉都御史皆服櫜鞬迎謁供張甚盛左右從者悉大通賄賂遠近爲之驛騷則于邉事又何益哉直年少喜兵欲以邉功自固乃有此行而為憲宗者亦何至曲徇其請而㒺顧邉釁之日啟也耶秋七月京畿山東大水分遣郎中林孟喬劉道員外郎袁江王臣往勘災振之尋詔廷臣條䘏民事宜而命南京刑部侍郎金紳巡視冮西災時冮西亦大水也于是科道官應詔言近嵗以來工匠以斧斤勞勞濫膺禄秋旗校捕獲妖言輒得遷官前雖勅法司慎鞫斯獄而緝捕者希求陞職恐其中不免枉誣刑賞過中災祲亦或繇此疏入帝下所司議之是年四月襄陽江溢壞城郭詔免被災秋糧五月陜西商州大水民多渰死者質實林孟喬福清人劉道懐仁人袁江祥符人王臣蒲城人金紳字縉卿上元人八月下蘇松巡撫牟俸於錦衣衛獄俸廵撫山東時陳鉞為布政使兩人負氣不相遂遂相惡也鉞既為汪直所喜欲逞前憾于俸從容言俸短直信之會俸議事至京直請執下錦衣獄先是俸所親學士江朝宗除服還朝道俸所部俸出迓之與聫舟並下所至有司供張頗盛直方求俸罪聞之疑朝宗必有所闗説并下獄榜掠朝宗不能堪誣引僉事呉㻞等十餘人俱被逮繫獄半載戍俸湖廣邉衛謫朝宗等官有差踰年俸竟卒戍所質實江朝宗巴縣人呉編山陽縣人九月擢嘉興府楊繼宗爲浙江按察使繼宗為嘉興知府以一僕自随署齋蕭然性剛亷孤峭人莫敢犯時集父老問疾苦為祛除之大興社學遇學官以賔禮師儒競勸文教大興御史孔儒來清軍里老多撻死繼宗榜曰御史杖人至死者詣府報名儒怒繼宗入見曰為治有體公但釐剔姦弊勸懲官吏若比戸稽核則有司事也儒不能難心銜之瀕行突入府署發篋視之敝衣數襲而已儒慙而去中官過者索錢于繼宗即發牒令取庫金曰金具在與我印劵中官咋舌不敢受入覲直欲見之之不可帝問直朝覲官孰亷直對曰天下不愛錢者惟楊繼宗一人耳至是秩滿超遷按察使數與中官張慶忤慶兄敏在司禮毎于帝前毁繼宗帝曰得非不私一錢之楊繼宗乎敏惶恐遺書慶曰善遇之上已知其人矣質實楊繼宗字承芳陽城人孔儒句容人河決開封壊䕶城隄五十丈河南撫撫李衍上言河南累有河患皆下壅壅塞所致宜疏開封西南之新城下扺梁家淺舊河口以洩杏花營上流而自八角河口扺南頓則當分導之以散其勢庻可免祥符鄢陵睢陳歸徳之災帝勅衍酌行之明年正月遷滎澤縣治于河北然衍所疏浚者不乆亦塞質實明史河渠志祥符䕶城大隄天順元年所修築也方輿紀要杏花營在開封府城西二十里一統志八角河口今曰八角店在祥符縣西南三十里南頓南頓子國春秋時又迫于陳而南徙因名南頓今陳州府商水縣北有故頓城鄢陵漢縣明屬開封府今因之李衍字文盛其先厯城人永樂初有李義者謫戍南丹後改編隆慶州民籍遂為隆慶人御定資治通鑑綱目三編卷十四
