body:
  text: 欽定四庫全書御定資治通鑑綱目三編卷四十甲五月明福王由嵩立于南京申是年福王仍稱崇禎十七年臣等謹按甲申三月莊烈殉國明社已墟福王偏立江寧逾嵗就滅一線苟延慆淫無度前恭纂輯諭㫖覽時特奉例存其紀年兹輯三編于甲申五月後用分注之聖訓附福王事一遵筆削謹嚴之至意云所指以冀有合我大清世祖章皇帝順治元年五月明兵部尚書史可法等奉福王由嵩監國于南京北都既陷莊烈帝殉社稷四月己巳報至南京人心惶懼時參贊機務兵部尚書史可法方督師勤王渡江抵浦口聞北都陷縞衣發喪南京文武大臣議立君討賊而福王由嵩潞王常芳俱以避賊至淮安倫序當屬福王諸臣慮福王立或追怨妖書及挺擊移宫等案潞王立則無後患且可邀功隂主之者廢籍禮部侍郎錢謙益力持其議者兵部侍郎吕大器而右都御史張慎言詹事妻曰廣皆然之其間往來游說者前山東按察使僉事雷縯祚禮部員外郎周鑣慎言曰廣等且移牒可法曰福王倫序當立而有七不可貪淫酗酒不孝虐下不讀書干預有司也潞王為神宗姪賢明當立可法亦以為然由浦口遂還南京而鳯陽總督馬士英利福王昏庸欲立之潛與阮大鋮計議主立福王又密與操江誠意伯劉孔昭總兵髙傑劉澤清黃得功劉良佐等結而公致書于史可法可法以七不可告之意未决甲申守備南京魏國公徐宏基等户部尚書髙宏圖等南京守備太監韓贊周等集議于朝大器署禮兵二部印不肻下者吏科給事中李沾操士英㫖厲聲言今日有異議守死之孔昭亦面斥大器而士英握重兵于外與諸將送福王至儀真連營江北勢甚張諸大臣乃不敢言可法亦不得已乃定立福王時文武官俱集內官宅韓贊周令各署名籍姜曰廣曰無匆遽請祭告奉先殿而後行越日至奉先殿以福王名告諸勳臣語侵史可法曰廣呵之于是羣小咸目懾曰廣乙酉迎王于江浦丁亥百官迎見于龍江關王素服角帶哭五月戊子朔王謁孝陵奉先殿出居於內守備府羣臣入朝王色報欲避可法曰王無避宜正受既朝議戰守可法曰王宜素服郊次發師北征示天下以必報讐之義王唯唯明日再朝出議監國事張慎言曰國虛無人可遂即大位可法曰太子存亡未卜倘南來若何劉孔昭曰今日既定誰敢復更可法曰徐之乃退又明日王監國質實浦口在江浦縣東三十里由江北渡江南處龍江關在江寧縣西儀鳳門外福王名由嵩神宗孫福恭王常洵長子初封德昌王崇禎十六年嗣封福王潞王名常淓穆宗孫潞簡王翊鏐之子翊鏐薨常淓嗣封吕大器後擁桂王監國卒于軍張慎言字金銘陽城人後乞休以山西陷無家可歸流寓蕪湖宣城間國亡後疽發背死姜曰廣字居之新建人本朝乾隆四十一年追諡忠確雷縯祚周鑣以異議為朱統􅠳所劾賜自盡劉孔昭基十二世孫徐宏基達十世孫髙宏圖字研文膠州人後乞歸寓㑹稽南京破逃野寺中絶粒死人本朝乾隆四十一年追諡忠直李沾松江華亭明福王以史可法髙宏圖姜曰廣王鐸並為東閣大學士入閣辦事馬士英為東閣大學士仍總督鳳陽等處軍務時廷推閣臣衆舉史可法髙宏圖姜曰廣而劉孔昭攘臂欲並列衆以勳臣無入閣例折之孔昭勃然曰即我不可馬士英何不可乃進士英東閣大學士兼兵部尚書都察院副都御史又議起廢競舉鄭三俊劉宗周徐石麒孔昭舉阮大鋮可法曰先帝欽定逆案無復言越二日拜可法禮部尚書兼東閣大學士與士英宏圖並命可法仍掌兵部事士英仍督師鳳廣陽姜曰廣先以曽有異議不用及再推辭臣乃以曰及王鐸等名上遂與鐸並命又以張慎言為吏部尚書慎言上中興十議曰節鎮曰親籓曰開屯曰叛逆曰僞命曰褒恤曰功賞曰起廢曰懲貪曰漕稅皆納之起劉宗周為左都御史徐石麒為右都御史尋改吏部尚書時宗周聞京師陷方召募義旅討賊及召以大仇未報不敢受職自稱草莽孤臣疏陳時政言今日大計舍討賊復讐無以表陛下渡江之心非毅然决策親征無以作天下忠義之氣一曰據形勝以規進取江左非偏安之業請進圖江北鳳陽號中都東扼徐淮北控豫州西顧荆襄而南去金陵不逺請以駐親征之師大小銓除暫稱行在少存臣子負罪引慝之心從此漸進秦晋燕齊必有響應而起者一曰重藩屏以資彈壓淮揚數百里設兩節鉞不能禦亂爭先南下致江北一塊土拱手授于流賊督漕路振飛坐守淮城久以家屬浮舟逺地是倡之逃也于是鎮臣劉澤清髙傑遂有家屬寄江南之說軍法臨陳脫逃者斬臣謂一撫二鎮皆可斬也一曰慎爵賞以肅軍情請分别各帥封賞孰當孰濫輕則收侯爵重則收伯爵夫以左帥之恢復而封髙劉之敗逃亦封又誰不當封者武臣既濫文臣隨之外臣既濫中璫隨之恐天下聞而解體也一曰核舊官以立臣紀燕京既破有受僞官而叛者有受僞官而逃者有在封守而逃者有奉便命而逃者法皆不赦亟宜分别定罪為戒將來至于僞命南下徘徊順逆之間實繁有徒必且倡為曲說以惑人心尤宜誅絶又言當賊入秦流晋漸過畿南逺近洶洶獨大江南北晏然而二三督撫不聞遣一騎以壯聲援流賊遂得長驅犯闕坐視君父之危亡而不救則封疆諸臣之當誅者一凶問已確諸臣奮戈而起决一戰以贖前愆自當不俟朝食方且仰聲息于南中爭言固圉之策却兵權于閫外首圖定策之功則封疆諸臣之當誅者又一新朝既立之後謂宜不俟終日首遣北伐之師不然則亟馳一介間道北進檄燕中父老起塞上名王哭九廟厝梓宫訪諸王更不然則起閏帥鄭芝龍以海師下直沽九邊督鎮合謀共奮事或可為而諸臣計不出此則舉朝謀國不忠之當誅者又一罷廢諸臣量從昭雪自應援先帝遺詔及之今乃槩用新恩誅閹定案前後詔書鶻突藝必彪虎之類盡從平反而後已則舉朝謀國不忠之當誅者又一臣謂今日問罪當自中外諸臣不職者始詔納其言宣付史館中外為悚動而石麒亦陳奏七事曰省庶官慎破格行久任重名器嚴起廢明保舉交堂亷所言皆切時政又起黃道周為吏部左侍郎令兵部尚書張國維以原官回任協理京營戎政先是莊烈帝令國維赴江浙督餉出都十日而城陷至是召還餘皆遷擢有差質實鄭三俊初為吏部尚書莊烈帝下詔求賢三俊舉李邦華劉宗周自代且薦黃道周史可法馮元揚陳士竒四人姜埰熊開元言事下獄及宗周獲嚴譴三俊皆懇救先後奏罷不職司官數人銓曹悉廪廪大僚缺官三俊數引薦賢士之廢斥者多復用徐石麒獲罪率同官合疏乞留後以興吳昌時謀出言官事為言官所詆三俊乞休致仕國亡後家居十年卒劉宗周初為左都御史以奏姜埰熊開元不當下錦衣衛獄當付法司帝怒其偏黨削職至是福王立起用後南都亡杭州亦失守宗周赴水不死絶食卒本朝乾隆四十一年追諡忠介徐石麒初為刑部侍郎以奏斬陳新甲失誤軍機為新甲黨所銜怒及擢本部尚書以中官王裕民坐劉元斌黨帝欲殺裕民石麒祗議戍帝怒其失出及宗周救姜埰熊開元奪職石麒疏留不納下刑部定罪石麒又據原詞擬開元贖徒埰謫戍不復鞫訊帝怒遂落職至是福王立起用尋又罷歸後大兵定嘉興石麒自經死妻孫氏赴水死楊本朝乾隆四十一年追諡忠懿黃道周崇禎中劾嗣昌等召對平臺反覆抗論坐謫戌南都亡見唐王請募兵江西得義旅九千餘人出徽州遇大兵戰敗被執不屈死總本朝乾隆四十一年追諡忠端張國維巡撫應天督河道有禦患治河功南都破請魯王監國紹興後江上師潰還守東陽國維知藝不支作絶命詞赴水死本朝乾隆四十一年追諡忠敏明福王稱帝于南京以史可法督師江北召馬士英入閣辦事史可法定京營制如北都故事侍衛及錦衣衛諸軍悉入伍操練錦衣東西兩司房及南北兩鎮撫司官不備設以社密告安人心時馬士英旦夕冀入相及督師鳳陽命下大怒以可法所與士英七不可書奏之王且令髙傑劉澤清疏趣可法視師而自擁兵入覲拜表即行可法遂請督師出鎮淮揚于是加可法太子太保改兵部尚書武英殿大學士命便宜行事各鎮並聽節制十五日壬寅王稱帝于南京仍稱崇禎十七年以明年為𢎞先元年癸卯士英即入閣佐理仍掌兵部尚書事乙巳可法陛辭請以總兵劉肇基于永綬李棲鳳卜從善金聲桓等隨征從之可法起行即遣使訪崇禎帝后梓宫及太子二王所在復奉命祭告泗鳳二陵祭畢上疏曰陛下踐祚初祇謁孝陵哭泣盡哀道路感勳若躬謁二陵親見鳳泗蒿菜滿目雞犬無聲當益悲憤願慎終如始處深宫廣厦則思東北諸陵魂魄之未安享玉食大庖則思東北諸陵麥飯之無展膺圖受籙則念先帝之集木馭朽何以忽遘危亡早朝晏罷則念先帝之克儉克勤何以卒隳大業戰兢惕厲無時怠荒二祖列宗將默佑中興若晏處東南不思遠略賢奸無辨威斷不靈老成投簪豪傑裹足祖宗怨恫天命潛移東南一隅未可保也王嘉答之時李自成棄京師西走青州諸郡縣並殺僞官據城自保未知南都擁立之事可法請速頒監國登極二詔慰山東河北軍民心開禮賢館招四方才智下僚有才被棄者亦悉舉任用之以監紀推官應廷吉領其事幕府稱得人質實金聲桓字虎夫遼東衛人明分淮揚鳳廬為四鎮以黃得功劉良佐劉澤清髙傑領之時議分江北為四鎮劉澤清轄淮海駐淮北經理山東一路髙傑轄徐泗駐泗水經理開歸一路劉良佐轄鳳陽駐臨淮經理陳杞一路黃得功轄滁和駐盧州經理光固一路仍進得功靖南侯封傑興平伯澤清東平伯良佐廣昌伯時得功澤清傑爭欲駐揚州傑先至固欲入城揚州民畏傑不納傑攻城急日掠村廂婦女民惡之知府馬鳴騄推官湯來賀堅守月餘進士鄭元勳家城中身詣傑營責以大義傑頗感悟為斂兵五里外城西北得暫啓門以通薪而守城者負約數以矢石中傑兵傑兵復進揚人競疑元勳通傑遂遇害既而傑知不可攻意稍怠而澤清亦大掠淮上臨淮不納良佐軍亦被攻王命可法往解得功良佐澤清皆聽命乃詣傑傑素憚可法夜掘坎十百埋暴骸旦日謁可法帳中詞色俱變汗浹背可法坦懷待之接偏禆以溫語傑大喜過望然傑亦自是易可法用己甲士防衛又檄必取視而後行可法夷然為具疏屯其衆瓜州傑又大喜可法乃開府揚州時職方主事萬元吉請奉詔宣慰四鎮且發萬金犒傑令保江淮乃渡江詣諸將營約共奬王室諸將嫌漸解廷議以元吉能輯諸將擢太僕少卿監視江北軍務時分四鎮各加封邊將多不平袁繼咸自九江鎮所入朝奏曰封爵以勸有功無功而封有功者不勸跋扈而封跋扈者愈多王曰事已行奈何繼咸曰馬士英引傑渡江宜令往輯王曰彼不欲往輔臣史可法願往繼咸曰陛下嗣位固以恩澤收人心尤宜以紀綱肅衆志乞振精神申法紀冬春間淮上未必無事臣雖駑願奉六龍為澶淵之舉王有難色因詣榻前密奏曰左良玉雖無異圖然所部多降將非孝子順孫陛下初登大寶人心危疑意外不可不慮臣當星馳回鎮許之熊汝霖自福建召還亦上疏曰臣自丹陽來知浙兵為邊兵所擊火民居十餘里邊帥有言四鎮以殺掠獲封爵我何憚不為臣意四鎮必毅然北征一雪此恥今戀戀淮揚何也况一鎮之餉多至六十萬藝必不能供即倣古藩鎮法亦當在大河以北開屯設府曽奧突之內而遽以藩籬視之質實黃得功開原衛人其先合肥人馬鳴騄褒城人湯來賀南豐人鄭元勳歙縣人守本朝乾隆四十一年入祠萬元吉後為兵部尚書贛州城城陷投水死春本朝乾隆四十一年追諡忠節袁繼咸字季通宜人熊汝霖後從魯王至海外投水死本朝乾隆四十一年追諡忠節明進封左良玉為寧南侯先是莊烈帝詔封良玉寧南伯畀其子夢庚平賊將軍印功成世守武昌命給事中左懋第便道督戰良玉乃條月日進兵狀以聞疏入未奉㫖而京師陷福王立詔至其部下有異議不欲開讀巡撫何騰蛟急詣良玉所爭之而良玉已從正紀盧鼎言開讀如禮諸將尚洶洶以江南自立君欲引兵東下良玉慟哭不許盡出所藏金銀綵物散之諸將曰此皆先帝賜也受國厚恩褐變至此良玉何心獨有之乎于是諸將噭然皆哭副將馬士秀奮曰有不奉公令復言東下者吾擊之以巨檻置炮斷江衆乃定㑹王命進良玉爵為侯廕一子錦衣千户以上流之事專委良玉制書到楚而良玉賀表亦至時李自成敗于關門良玉得以其間稍復楚西境之荆州德安承天而騰蛟及總督袁繼咸居江西皆與良玉善南都倚為屏蔽時良玉兵八十萬號百萬前五營為親軍後五營為降軍每春秋肄兵武昌諸山一山幟一色山谷為滿軍法用兩人夾馬馳曰過對馬足動地殷如雷聲聞數里諸鎮兵惟髙傑最强不及良玉逺甚然良玉自朱仙鎮之敗精鋭略盡其後歸者多烏合軍容雖壯法令不復相攝而是時良玉亦老且病無出兵意矣質實朱仙鎮之敗開封圍急良玉赴援次朱仙鎮見賊藝盛一夕拔營走襄陽諸軍皆潰事見莊烈帝十五年七月正紀良玉所置官名何騰蛟字雲從黎平人明分置應天蘇松巡撫以左懋第為應天安徽巡撫祁彪佳為蘇松巡撫時蘇州諸生檄討其鄉官從賊者奸民和之少詹事項煜及大理寺正錢位坤通政司參議宋學顯禮部員外郎湯有慶之家皆被焚劫常熟又焚給事中時敏家毁其三代四棺彪佳請議從逆諸臣罪而治焚掠之徒以加等從之時髙傑駐瓜州跋扈甚彪佳尅期往會至期風大作傑意彪佳未必來彪佳携數卒衝風渡傑大駭異盡撤兵衛㑹彪佳于大觀樓彪佳披肝膈勉以忠義共奬王室傑感歎曰傑閲人多矣如公傑甘為死公一日在吳傑一日遵公約矣共飯而别質實祁彪佳字宏吉浙江山隂人後杭州破紿家人先寢投水死本朝乾隆四十一年追諡忠惠宋學顯吳縣人湯有慶長洲人明以欣城伯趙之龍總督京營戎政之龍與士英比令督京營戎政質實趙之龍永樂功臣彜八世孫明淮揚巡撫路振飛擊賊黨董學禮于宿遷走之振飛初授御史陳時事十大弊曰務苛細而忘政體喪廉恥而壞官方民愈窮而賊愈亟有事急而無事緩知顯患而忘隱憂求治事而鮮治人責外重而責內輕嚴于小而寬于大臣日偷而主日疑有詔㫖而無奉行疏入詔付所司繼擢右僉都御史總督漕運巡撫淮揚賊陷山西振飛遣將金聲桓等十七人分道防河由徐泗宿遷至安東沭陽且團練鄊兵犒以牛酒得兩淮間徑卒數萬福周潞崇四王避賊同日抵淮大將劉澤清髙傑等亦棄汛地南下振飛悉接之至是河南副使吕弼周為賊節度使進逼淮上進士武愫為賊防禦使招撫徐沛而賊所遣僞制將軍董學禮等據宿遷振飛擊擒弼周愫走學禮竿弼周法場命軍士人射三矢乃解磔之縳愫狥諸市鞭八十檻車送南京誅之㑹馬士英欲用所親田仰為淮陽巡撫乃罷振飛振飛亦遭母喪無家可歸遂流寓蘇州振飛在淮安與巡按御史王燮頗號召義士同心戮力自振飛既去王燮亦升右僉都御史巡撫山東而劉澤清來居淮城威福自擅散遣義士其桀鷔者籍之部下劫掠村落一空又大興土木造宅壯麗僭擬皇居與田仰日肆歡飲士民憤怨時山東郡縣大已歸我亦不能往但逡巡河上而已清王燮質實吕弼周鄒平人武愫涇陽人田仰盧陵人六月明追上崇禎帝后諡號命諡崇禎帝曰烈皇帝廟號思宗周后曰孝節皇后皇又追諡其祖母鄭貴妃曰孝寧太后考福恭王曰恭帝上嫡母鄒氏尊號曰恪貞仁夀皇太后時太僕少卿萬元吉請修建文實録復其尊稱并還懿文追尊故號祀之寢園以建文配而速褒建文死事諸臣以作忠義之氣從之乃追復懿文太子廟號并追諡建文帝曰惠宗讓皇帝復封其弟允熥等為王並上景帝廟號曰代宗改諡孝宗張后曰孝成皇后方孝孺等皆為贈諡立嗣又聞崇禎太子及永定二王皆為李自成所害乃追諡太子曰獻愍定王曰哀永王曰悼以時朝廷大議多出髙宏圖手趙之龍欲傾髙宏帝圖思非美諡上疏糾駁尋改曰毅宗又尋改恭皇為孝皇帝尊其墓曰熙陵别立專廟明召阮大鋮陛見大鋮名掛逆案失職久廢鬱鬱不得志流寇福皖大鋮避居南京頗招納遊俠為談兵說劍覬以邊才召顧杲楊廷樞沈士柱黃宗義萬泰等皆復社中名士方聚講南京惡大鋮甚作留都防亂揭逐之大鋮懼乃閉門謝客獨與士英深相結周延儒內召大鋮嘗要之維楊且以士英屬延儒許之㑹鳳陽總督髙斗光以失城逮治禮部侍郎王錫衮薦士英才延儒從中主之遂起兵部右侍郎總督廬鳳等處軍務及福王立士英秉政招權罔利日事報復時髙宏圖姜廣曰張慎言等皆以宿德在位將以次引海內人望而士英必欲起大鋮因薦大鋮知兵初大鋮在南京與守備太監韓贊周昵及北都既陷中官悉南奔大鋮因贊周遍結之為羣奄言東林當日所以為貴妃福王者俾備言于王以潛傾史可法等羣奄便極口稱大鋮才士英亦言大鋮從山中致書與定策謀為白守其附璫贊導無實跡遂命大鉞冠帶陛見大鋮乃上江策曰聨絡日控扼曰進取曰策應且自白孤忠被陷痛詆孫慎行魏大中左光斗又指大中為大逆于是大學士姜曰廣疏言臣前見文武紛競既慚無術調和今見欽案掀翻又愧無能預寢遂使先帝十七年之定力頓付逝波陛下數日前之明詔竟成故紙梓宫未冷增龍馭之怨恫制墨未乾駭四方之觀聽惜哉維新乃有此舉臣所守者朝廷之典章所畏者千秋之公議而已侍郎吕大器疏言先帝骨肉未寒爰書儼若日星而士英悍然不顧視陛下何如主士英為大鋮奏辨力攻曰廣大器益募宗室統􅠳建安王統縷等連疏交攻而以大學士髙宏圖為御史時嘗詆東林必當右已乃言宏圖素知臣者宏圖則言先帝欽定逆案一書不可擅改給事中羅萬象疏言輔臣薦用大鋮或以愧世之不知兵者然大鋮實未知兵伏望許其陛見以慰輔臣延攬之意禁其復用以杜邪人覬覦之端應天府丞郭維經疏言逆案先帝手定今將修實録若此案不書恐在天英靈必有遺憾若書之而今日起用大鋮與前案違異非陛下所以待先帝並非輔臣所以待陛下也大理寺丞詹兆恆疏言逆案諸臣久圖翻局幸先帝神明內斷確不可移陛下駐蹕龍江時痛先帝異變對羣臣哭百姓聞之莫不灑泣捶胸願雪國恥近聞山東河南士紳皆白衣白冠呼籲先帝驅殺僞官各守險阻以拒闖獻餘黨此誠先帝德澤在人也今梓宫抔土未乾太子二王安在國讐未報而忽召見大鋮還以冠帶豈不上傷先帝靈下短忠義氣哉懷逺侯常延齡太僕寺少卿萬元吉等亦各疏諫乃命取逆案進覽兆恆即上進而士英亦以是日進三朝要典于是切責萬象等宏圖復請下九卿㑹議亦不聽質實顧杲無鍚人楊廷樞吳縣人沈士柱蕪湖人黃宗義餘姚人萬泰鄞縣人郭維經字六修江西龍泉人詹兆恆廣信永豐人常延齡開平王遇春十一世孫朱統􅠳新建人明吏部尚書張慎言罷時大起廢籍慎言薦前大學士吳甡尚書鄭三俊以王命召蛀陛見一日朝罷誠意伯劉孔昭欣城伯趙芝龍羣詬于廷指慎言及甡為奸邪叱咤徹殿陛給事中羅萬象言慎言平生具在甡素有清望安得指為奸邪孔昭等伏地痛哭謂慎言舉用文臣不及武臣囂爭不已孔昭至欲手刃慎言韓贊周呵之乃止既退又疏劾慎言極詆三俊且謂慎言當迎立時阻難懷二心乞寢甡陛見命且議慎言欺蔽罪慎言疏辨因乞休時兩解之萬象又言首膺封爵者四鎮也新改京營又加二鎮銜何嘗不用武年來封疆之法先帝多寬武臣武臣報先帝者安在祖制以票擬歸閣臣參駁歸言官不聞委勳臣以糾劾也使勳臣得兼糾劾文臣可勝逐哉史可法奏慎言疏薦無不當諸臣慟哭喧呼滅絶法紀恐驕辨悍卒益輕朝廷御史王孫蕃言用人吏部職掌奈何廷辱冡宰宏圖等亦以不能輯和文武各疏請罷俱不允而吳甡亦竟不復召慎言乃再疏乞休遂許其請且諭之曰晋疆未復卿亦無家可歸沿途僑寓需召慎言遂流寓蕪湖宣城間至國亡後疽發于背戒勿藥卒明總兵劉澤清入朝于南京吏部侍郎吕大器罷先是諸臣議擁立時大器主錢謙益雷縯祚言欲立潞王及馬士英等推戴福王因遷大器吏部左侍郎大器以異議絀自危乃上疏劾士英言其擁兵入朝靦留政地翻先皇手定逆案欲躋阮大鋮中樞其子以銅臭為都督女弟夫未履行陳授總戎姻婭越其本田仰揚文驄先朝罪人盡登膴仕亂名器夫吳甡鄭三後臣不謂無一事失而端方諒直終為海內正人之歸士英大鋮臣不謂無一技長而奸回邪慝終為社稷無窮之禍至是澤清入朝疏糾大器縯祚懷異圖而薦逆案張捷鄒之麟張孫振等大器遂乞休去以手書監國告廟文送內閣明無他士英憾未已令大常少卿李沾劾之遂削大器籍復命法司逮治之尋以蜀地盡失無可踪跡而止大器既去沾得超擢左都御史而謙益亦以附士英大鋮得為禮部尚書協理詹事府事疆時武臣各占分地賊入不以上供恣其所用置封兵事一切不問與廷臣互分黨援干預朝政擠排異己奏牘紛如紀綱盡裂而澤清所言尤狂悖擁立之初即援靖康故事請以五月改元又請宥故輔周延儒助餉贓銀又請禁巡按不得拿訪追贓又請法司嚴緝故總督侯恂及其子方域時皆曲意從之及是入朝復阿士英指力糾大器等本朝順治二年四月揚州告急命澤清等往援而大澤清已潛謀輸欵矣我清頗涉文藝好吟咏嘗召客清惡其反覆磔誅之澤飲酒倡和幕中蓄兩猿以名呼之即至一日宴其故人子酌酒金甌中甌可容三升許呼猿捧酒跪送客猿狰獰甚客戰掉逡巡不敢取澤清笑曰君怖耶取囚撲死階下剜其腦及心肝置甌中和酒付猿捧之前飲嚼顔色自若其凶忍多類此質實楊文驄字龍友貴陽人張捷丹陽人鄒之麟武進人張孫振霍山人明鎮江兵亂時史可法部將于永綬等四人駐京口浙江入衛都司黃之奎亦部水陸兵四千戍其地之奎御軍嚴永綬等四將兵恣橫刃傷民浙江兵縳而投之江遂有隙已而守備李大開統浙江兵又擊傷鎮江兵馬鎮江兵與相門射殺大開亂兵大焚掠死者四百人會巡撫祁彪佳至永綬等遁去彪佳劾治四將罪賙恤被難家民大悅明馬士英乞罷慰留之士英當國畏東林倚左良玉為難謾語修好而隂忌之良玉不自安屬承天守備太監何志孔巡按御史黃澍入賀隂伺朝廷動靜澍挾良玉藝當陛見面數士英奸貪不法且言嘗受張獻忠僞官周文江重賄為題授參將罪當斬志孔亦論士英罔上行私諸罪司禮太監韓贊周叱志孔退士英跪乞處分澍舉笏直擊其背曰願與奸臣同死士英大號呼贊周即執志孔候命時有內諭贊周欲令士英避位士英佯引疾請罷而賂福邸舊奄田成張執中等泣訴曰上非馬公不得立逐馬公天下將議上負恩矣且馬公在閣諸事不勞主上馬公去誰念上者明日即慰留士英士英亦畏良玉請釋志孔而命澍速還湖廣未幾復以他事奪澍官尋以朱盛濃言逮澍澍與良玉謀隂諷將士大譁欲下南京索餉因保救澍袁繼咸為留江漕十萬石十三萬金給之且代澍申理以良玉依仗澍為言士英不得已乃免逮澍遂匿良玉軍中良玉與士英由此有隙質實以他事奪澍官故督都掌錦衣衛劉僑者嘗遣戍由周文江賄張獻忠受僞命為錦衣指揮使及良玉復蘄黃僑削髮逃去澍持之急而士英納僑賄令訐澍遂復僑官削澍職尋以朱盛濃言澍當逮遂逮澍周文江麻城人朱盛濃楚府中尉明封福府千戶常應俊為襄衛伯應俊本革工福王值寇出亡時應俊常負行以免于難王初立即授左都督至是封襄衛伯世襲太監韓贊周盧九德及福府內臣屈尚忠田成張執中等亦以翊戴功各廕其弟姪有差明命魯王以海居處州時山東殘破以海棄藩南奔泊舟京口命暫駐處州明年南京破兵部尚書張國維等迎以海居于紹興大號魯監國以本朝順治三年六月部尚書余煌侍郎兵克紹興海遁入海圖維及禮陳函輝等皆死六年吏部尚書張肻堂復迎魯王居方山八年大兵襲舟山以海復航海肻堂自經死兵部尚書張煌言初奉表迎魯王至紹興復從入海大兵獲于舟山後執至杭州諭降不從死鄭芝龍子鄭成功奉以海居金門禮待頗恭既而懈以海不能平將往南澚成功使人沉之海中時順治十一年也其時同殉節者兵部尚書李向中禮部尚書吳鍾巒吏部侍郎朱永佑安洋將軍劉世勛左都督張名揚又有通政使鄭遵儉兵科給事中董志寧兵部郎中朱養時户部主事林瑛江用楫禮部主事董元兵部主事朱萬年顧珍李開國工部主事顧宗堯中書舍人蘇兆人工部所正戴仲明定西侯參謀顧明楫諸生林世英錦衣衛指揮王朝相內官監太監劉朝等亦不下數十人書以海監國起庶子余煌禮部右侍郎再起户部尚皆不就明年王以武將橫甚拜煌兵部尚書始受命時諸臣競營髙爵請乞無厭煌上言今國藝垂危朝政愈紛尺土未復戰守無資諸臣請祭則當思先帝蒸嘗未備請葬則當思先帝山陵未營請封則當忠先帝宗廟未享請廕則當思先帝子孫大未保請諡則當思先帝光烈未昭時以為至言及倡兵過江王航海煌赴水死陳函輝當北都陷誓衆義㑹福王立不許草澤勤王乃已尋起職方主事監軍江北事敗歸魯王擢為禮部右侍郎從王航海已而相失哭入雲峯山作絶命􅀈投水死張肻堂初從唐王王敗死肻堂飄泊海外後至舟山魯王用為東閣大學士王航海肻堂賦詩自經死質實魯王以海荒王檀九世孫方山在福建福州府南七十里南澳在廣東潮州府饒平縣東南海中距府一百二十里澳有三延袤三百里為閩粵門户今設南澳鎮總兵駐此張肻堂字載寧松江華亭人人本朝乾隆四十一年追諡忠穆余煌字武貞會稽陳函輝字上叔臨海人李向中鍾祥人董志寧鄞縣人吳本朝乾隆四十一年俱追諡忠節張煌言鄞縣人鍾巒字巒稚武進人上本朝乾隆四十一年俱追諡忠烈朱永佑字爰啓海人劉世勛上元人張名揚江寧人王朝相里系無考朱本朝乾隆四十一年俱追諡烈愍鄭遵儉㑹稽人養時江隂人林瑛福建人江用楫蘇州人董元㑹稽人朱萬年福建人顧珍長州人李開國臨山衛人傾宗堯長洲人蘇兆人蘇州人戴仲明鄞縣人林本朝乾隆四十一年俱追諡節愍顧明楫順天人世英福建人本朝乾隆四十一年俱追豫入祠秋七月明遣兵部侍郎左懋第等求成于我大清大我兵連破李自成河北郡縣亦相繼歸附時議遣使清通好而難其人懋第母陳殁于燕欲因是返柩葬請行乃拜懋第兵部右侍郎兼右僉都御史與右都督陳洪範太僕少卿馬紹愈偕而令懋第經理河北聨絡閣東諸軍務馬紹愈者故兵部郎官也嘗為陳新甲通使新甲既誅紹愈以督戰致衄為懋第劾罷及是紹愈已起官郎中乃進為少卿副懋第懋第請罷紹愈勿遣略言臣此行致祭先帝后梓宫訪東宫二王蹤跡臣既充使藝不能兼理封疆且紹愈臣所劾罷不當復與臣共事必用臣經理則乞命洪範同紹愈出使而假臣一旅偕山東撫臣收拾山東以待不敢復言北行如用臣與洪範北行則去臣經理但銜命北行而勿遣紹愈閣部議止紹愈改遣原任薊督王永吉命仍遵前諭懋第瀕行言臣此行死生未卜請以辭閣之身效一言願陛下以先帝讐恥為心贍髙皇之弓劍則思成祖列聖之陵寢何存撫江上之殘黎則念河北山東之赤子誰恤更望時時整頓士馬必能渡河而戰始能扼河而守必能扼河而守始能畫江而安衆韙其言時令齎白金十萬兩幣帛數萬匹以兵三千人護行時永吉總督山東軍務命永吉暫駐河上料理戰守候北使回時史可法鋭意進兵河南以懋第等方行兵不宜繼進諭止之懋第等以十月朔至張家灣我大清令以百人從行入都館之鴻臚寺懋第請祭告諸陵及崇禎帝不許乃陳太牢旅所哭而奠之旋以是月二十八日遣還出都陳洪範于途次陳密啓請身往江南招諸將劉澤清等降附而留懋第等勿遣于是自滄州追還懋第改館太醫院而縱洪範南歸至明年五月南京破懋第聞之慟哭其從弟懋奉先為大吏部郎降賊後歸我懋第曰此非吾弟也叱出之尋清授官矣來謁懋第與從行兵部司務陳用極游擊王一斌都司張良佐劉統王廷佐俱死之惟馬紹愈降質實王永吉髙郵州人左懋第本本朝乾隆四十一年追諡忠貞陳用極崑山人朝乾隆四十一年追諡忠節王一斌寧國人張良佐劉統王廷佐俱上元人本朝乾隆四十一年俱追諡節愍李自成遁歸西安大初自成西走至定州我可成自成西走真定益悉衆清兵追敗之斬賊黨谷大迎戰擊之賊不能走漸却自成中流矢創甚西踰故兵復大關入山西㑹乃得鳩合潰散走平陽以讒殺其黨李兵東返自成巖巖故勸自成以不殺收人心及陷京師保護懿安皇后令自盡又獨于士大夫無所拷掠牛金星等大忌之定州之敗河南州縣多殺僞官自保巖請帥兵往金星隂告自成曰巖雄武有大略非能久下人者河南巖故鄊假以大兵必不可制因譖其欲反自成令金星與巖飲殺之賊衆俱解體至是自成復遁歸西安遣别賊陷漢中降總兵趙光逺進掠保寧張獻忠以兵拒之乃還自成既屢敗益强狠自用僞尚書張第元耿始然皆以小忤死製銅鏌官民坐賕即鏌斬民盜一雞者死西人大警懼質實張第元汾陽人耿始然猗氏人明以張有譽為户部尚書內批特用户部侍郎張有譽為尚書髙宏圖封還力諌不聽蓋有譽素有清望馬士英欲借以開轉升幸門為阮大鋮地也未幾又以張捷為吏部侍郎捷因薦逆案吕純如得罪公論士英方欲用大鋮故亦以中㫖起之質實張有譽江隂人明釋髙牆罪宗為庶人前唐王聿鍵等三百餘人俱釋為庶人禮臣請復聿鍵王爵不許尋命徙居廣西平樂府明年南京破聿鍵方行次杭州遇總兵鄭鴻逵户部主事蘇觀生奉之入閩總兵鄭芝龍巡撫都御史張肻堂與禮部尚書黃道周等定議奉聿鍵監國閏六月遂自立于福州號隆武改福州為天興府以天興建寧延平興化四府為上游汀州邵武漳州泉州四府為下游各設撫按進芝龍鴻逵為侯鄭芝豹鄭彩為伯觀生道周俱大學士肻堂為兵部尚書餘拜官有差時權在鄭氏聿鍵不能有所為芝龍議簡戰守兵二十餘萬計餉不支其半請預借兩稅一年令羣下捐俸勸紳士輸助徴府縣銀榖未解者官吏督迫閭里騷然聿鍵屢促芝龍出兵輒以餉詘辭久之芝龍知衆論不平乃請以鴻逵出浙東彩出江西各擁兵數千號數萬既行託候餉皆行百里而還先是黃道周知芝龍無意出師自請行從廣信出衢州進至婺源遇我大清兵戰敗執至江寧不屈死時李自成兵敗走死其兄子李錦帥衆降于湖廣總督何騰蛟一時增兵十餘萬侍郎楊廷麟起兵復吉安臨江于是廷麟等請聿鍵出江右騰蛟請出湖南原任知州金堡言騰蛟可恃芝龍不可恃宜棄閩就楚聿鍵大喜授堡給事中遣觀生先行募兵先是靖江王嘉享僭稱監國不奉聿鍵命為巡撫瞿式耜等所擒以捷聞而魯王以海又稱監國于紹興拒聿鍵使者故聿鍵决意出江西湖廣十二月發福州駐建寧廣東布政湯來賀運餉十萬由海道至明年二月駐延平時我大清遣洪承疇黃熙允招撫江南福建芝龍密遣使輸欵會都督陳謙奉魯王使命至稱皇叔父不稱陛下聿鍵怒下謙于獄芝龍與謙有舊疏救不聽竟殺謙芝龍遂懷去志三月我大清兵取吉安撫州圍楊廷麟于贛州尚書郭維經出閩募兵援贛是月魯王遣使來聘聿鍵報以書略言吾無子王為皇太姪同心戮力共拜孝陵取浙東所用職官盡列朝籍何分彼此又遣都御史陸清原齎餉銀十萬兩犒勞浙東軍士至江上方國安縱兵盡奪其餉殺清原且出檄文數聿鍵罪聿鍵益蹙大六月我興魯王以海遁入海閩中大震芝龍假言海兵克紹冦至撤兵回安平鎮航海去守閩將士皆隨之仙霞嶺空無一人七月我大兵抵閩關守蒲城御史鄭為虹給事中黃大鵬延平知府王士和死焉進克興化副使知府事劉永祚仰大藥死八月聿鍵出走數日方至汀州妃至九瀧投于兵繼至從官奔散與妃曽氏俱就執水聿鍵死于福州給事中熊緯尚書曹學佺通政使馬思禮等俱死時順治三年也其前後殉節者又有巡撫邱祖德推官溫璜都督蔣若來總兵周之藩尚書總理軍務郭維經兵部左侍郎詹兆恆罷居大學士傅冠巡撫金聲推官吳應箕都御史王瑞柟職方司主事王之栻大學士楊廷麟巡撫楊文薦提督陳泰來給事中楊廷樞大學士朱大典總兵張鵬翼監軍道副使孫臨推官江天一中書夏完淳等皆捐軀自盡質實仙霞嶺在浙江衢州府江山縣南福建福寧府浦城縣北即古泉山之巔為浙閩通衢九瀧即九龍灘在清流縣南險峻為七閩最蘇觀生字宇霖東莞人金堡仁和人陳謙武進人殉節者鄭為虹字天玉江都人邱祖德成都人罷官流寓寧國舉兵應金聲兵敗執之不降死溫璜烏程人練徽州民兵為保障計城破刃妻茅氏及女自刎死蔣若來長洲人守金華援絶巷戰經日力盡自刎死周之藩井研人衛主巷戰矢集身而死郭維經里系詳前率師援贛州城破入寺自焚死詹兆恆里系詳前唐王命佐黃道周守廣信尋攻開化兵敗死于陳傅冠進賢人崇禎時入閣罷職歸唐王時起用督師江西尋致大仕下福建執之不降死兵本朝乾隆四十一年俱追諡忠烈曹學佺字能始侯官人金聲南都破保徽州通表唐王為大兵間道執至江寧不降死吳應箕貴池人舉兵應金聲屯師泥灣諭降不從死王璃楫永嘉人福王時極陳有司虐政唐王召入閩後歸溫州城破自經死陸清原平湖人唐王命犒軍江上大兵渡江投江死王之栻武進人唐王命宣諭江上遇大兵執之不降死楊廷麟清江人唐王命督師贛州援絶糧盡投水死楊文薦京山人守贛州城破執之送南昌絶粒死陳泰來新昌人戰撫州兵敗死楊廷樞大里系詳前國亡隱山中久之為隆四十一年俱追諡兵所執殺之泗州寺本朝乾忠節黃大鵬字文若建陽人熊緯字文江南昌人朱大典金華人福王命督江上軍福王就執走杭州守金華城破闔門死張鵬翼諸暨人守衢州城破執之不屈死本朝乾隆四十一年俱追諡烈愍王士和字萬育金溪人劉永祚字叔逺武進人馬思禮福建長樂人孫臨桐城人監楊文驄軍兵敗執之不降死江天一歙縣人金聲門人與聲舉兵執之不降死夏完淳華亭人允彛字亦執送江寧不屈死本朝乾隆四十一年俱追諡節愍明募兵雲南遣使往雲南募兵時廣西巡撫方振孺松江知府陳亨等各措餉募兵入衛建陽縣知縣蔣芬造火器募勇士勤王疏言倘邀天幸迅掃流氛指日奏凱社稷之福否則斷脰決腹瞑目地下以報國家三百年養士之恩以無負臣三十年讀書之志識者壯之明起章正宸為吏科都給事中正宸出周延儒門不肻阿附初以救李日暄謫戍至是復召正宸痛舉朝無復讐心上疏曰兩月以來大吏秉樞矣不聞獻俘武臣私門矣不聞公戰老成引遁矣不聞勸駕諸生捲堂矣不聞請纓如此而曰興朝氣象臣雖愚知其未也臣以進取為第一義進取不鋭則守禦必不堅比者河北山左忠義響應各結營寨多殺僞官為朝廷效死力不及今電掣星馳倡義進討是劘天下之氣而坐失事機也宜急檄江北四鎮分渡河淮聨絡諸路齊心協力互為聲援使兩京血脈通而後塞井陘絶孟津據武關以攻隴右陛下又何不縞素親率六師駐蹕淮上豈必冒矢石履行陳哉聲靈震動人切同仇勇憤百倍矣陛下欲赫然為中興令主嚴飭大臣速簡爾車徒備爾芻糗選爾將帥修爾戈矛繕爾城塹進寸則寸進尺則尺扼險處要以規中原天下大矣不患無人應運而出也時起用張捷鄒之麟張孫振阮大鋮輩正宸並疏諫不納尋改大理寺丞正宸請假歸後魯主監國署舊官事敗棄家為僧質實正宸字羽侯㑹稽人明以陳子龍為兵科給事中子龍上言中興之主莫不身先士卒故能光復舊物今入國門兩月矣人情泄沓無異升平清歌漏舟之中痛飲焚屋之內臣不知所終也其始皆起于姑息一二武臣以至凡百政令莫不因循臣甚為之寒心也疏入不聽明年二月子龍乞終養去興同邑夏允彛皆負重名允彛死子龍念祖母年九十不忍割遁為僧尋受魯王部院職銜結太湖兵欲舉事事露被獲乘間投水死質實夏允彛字彛仲南都失倣徨山澤間聞友人侯峒魯黃淳耀徐研等皆死乃賊絶命詞自投深淵以死侯峒魯字預瞻嘉定人黃淳耀字藴生嘉定人與弟淵耀同縊死徐汧長洲人投虎邱塘下死本朝乾隆四十一年追諡陳子龍忠裕夏允彛侯峒曽黃淳耀淵耀徐汧俱忠節八月明設厰衛緝事官尋罷之刑科給事中袁彭年疏言髙皇帝時不聞有厰文皇帝十八年始立東厰內官主之嗣後一盛于成化東厰西厰之設已不得稱純治再盛于正德谷大用等皆倚逆瑾煽虐天下騷然三盛于天啓逆璫魏忠賢幾危社稷厰衛之盛衰關世道之治亂故當時無不營而得之官中外有不脛而走之賄逃綱之方即在密綱之地作奸之事明係發奸之人前鑒不逺所宜深戒也疏入責以狂悖沽名謫浙江按察司照磨蘇州巡撫祁彪佳亦上疏極論其弊略曰洪武初官民有犯或收繫錦衣衛髙皇帝見非法淩虐焚其刑具送囚刑部是祖治原無詔獄也後乃以羅織為事雖曰朝廷爪牙實為權奸鷹狗舉朝盡知其枉而法司無敢昭雪慘酷等來周平反無徐杜此詔獄之始也洪武十五年改儀鑾司為錦衣衛專掌直駕侍衛等事未嘗令緝事也永樂間設立東厰始開密告門飛誣及于善良招承出于私拷欲絶苞苴而苞苴彌甚欲清奸宄而奸宄愈多此緝事之弊也古者刑不上大夫逆瑾用事始去衣受杖本無可殺之罪乃䝉必死之刑朝廷受愎諫之名天下反歸忠直之譽此廷杖之弊也大學士姜曰廣擬俞㫖羣奄共撓之曰廣曰緝事不除宗社且不可知何厰衛之有乃改命五城御史體訪而罷緝事官不設質實袁彭年公安人發明當時福邸舊奄漸皆用事大鋮之復召羣奄實贊之士英之慰留羣奄又贊之田成張執中輩隱欲把持朝政至厰衛緝事之設是顯然大肆奸邪矣明代當全盛之日瑾與忠賢濟惡岌岌乎已傾社稷况此南都殘局而復踵其故轍是不啻危卯而又纍之以石也當日諸臣疏諫固不因除此一事有救于將亡之藝然非法慘刑差幸免其殘毒非有力爭者而煽虐又可勝道哉張獻忠陷成都明蜀王至澍及巡撫都御史龍文光巡按御史劉之勃等死之初成都間賊急蜀王至澍謀遷于滇劉之勃持不可內江王至沂與之力爭王將行而守門卒洶洶亂輜重有被掠者事遂寢已而新撫龍文光總兵劉佳引率兵三千從川北來謀設守諸王大姓逸去者半華陽知縣沈雲祚謁蜀王陳守禦䇿不應聞太平王至淥賢往說之曰成都危在旦夕而王府財貨山積不及今募士殺賊疆場淪喪誰為王守至淥言于王亦不聽至是賊逼成都文光等分陴拒守佳引出戰而敗賊穴城實以火藥又刳大木長數丈者合之纒以帛貯藥向城樓之勃厲衆奮擊賊却二三里皆喜以為將去也初九日黎明火發北樓陷木石飛蔽天守陴者皆散賊遂入城蜀王率妃妾自沈于井之勃文光等皆被執賊以之勃同鄊欲用之之勃大罵賊攢箭射殺之復盡驅文武將吏及軍民男婦于東門之外將戮之匆有龍尾下垂賊以為瑞遂停刑文光佳引卒不屈文光見殺于濯錦橋佳引自投于浣花溪副使張繼孟陳其赤僉事劉士斗張孔教蜀府左長史鄭安民成都同知方堯相華陽知縣沈雲祚等皆死之士斗被執見劉之勃與張獻忠語大呼曰此賊也公不可少屈獻忠怒命捽以上士斗返顧語如前遂闔門被殺其赤投百花潭死堯相死于萬里橋下賊幽雲祚于大慈寺遣其黨饋食以刃脅降不從遇害後獻忠復欲用諸人備百官繼孟等不為屈遂並見殺質實濯錦橋在華陽縣南浣花溪在成都西郭外又名花潭萬里橋在成都府南吳般録諸葛孔明送費禕使吳曰萬里之行始此故名蜀王蜀獻王椿九世孫龍文光雒容人雲本朝乾隆四十一年追諡忠節劉之勃寶雞人沈祚字子凌太倉人本朝乾隆四十一年俱追諡忠烈張繼孟字伯功扶風人陳其赤字石文崇仁人鄭安民浙江人方堯相字紹虞黃岡人南本朝乾隆四十一年俱追諡節愍劉士斗字瞻甫海人張孔教字魯生會稽人本朝乾隆四十一年俱追諡烈愍明南京修興寧宫慈禧殿先是洛陽之陷福王母妃與王相失居于河南人郭守義家王既立始遣總兵王之綱奉迎及是至南京命于三日搜括萬金以充賞賜又諭工部以行宫湫隘亟修興寧宫慈禧殿尅期告成以居母妃尋又封母妃弟鄒存義為大興伯時土木並興賜豫無節御用監內官請給工料銀置龍鳳几捐諸器物及宫殿陳設金玉諸寶計資數十萬工部侍郎髙倬奏請裁省光祿寺辦御用器至萬五千七百有竒倬又以為言皆不納質實髙倬字枝樓忠州人明以前大學士王應熊為兵部尚書督師專討蜀寇起前寧夏巡撫樊一蘅為兵部侍郎總督川陜軍務時張獻忠已據全蜀惟遵義保境自守應熊與一蘅避其地命應熊督師一蘅總督軍務討之又遣御史米夀圖巡按四川命吏部簡堪任監司守令者從夀圖西行應熊等乃縞素誓師開幕府傳檄諸郡舊將㑹師大舉令巡撫馬乾復重慶副將朱化龍等復龍安茂州一蘅乃起舊將甘良臣為總統合參將楊展等所携潰卒得三萬人尋復叙州而副將曽英連敗賊軍聲大震亦受一蘅節制其他據城奉征調者洪雅則曹勛范文光松茂則詹天顔夔萬則談宏談詣一蘅遂移駐納溪與應熊㑹瀘州檄諸路尅期並進本獻忠頗懼事皆在明年至朝順治三年我大清兵入蜀誅獻忠餘賊南奔至重慶曽英戰歿應熊避之畢節衛尋卒㑹大兵北旋一蘅復駐江上為收復計時蜀中大亂諸將各據地自擅一蘅令不行順治八年大清兵南征一蘅遁山中遘疾卒蜀中將士俱盡而夀圖出奔沅州至順治十一年城破亦死質實樊一蘅字君帶宜賓人米夀圖宛平人馬乾昆明人曽英福建人范文光內江人曹勛黎州參軍詹天顔龍巖人俱本朝乾隆四十一年追諡忠節明以越其杰為右僉都御史巡撫河南時河南諸將各結寨自固其最大者開封汝寧間則劉洪起南陽則蕭應訓洛陽則李際遇諸帥中獨洪起勇而好義數殺賊有功常與巡按御史陳潛夫大破賊將陳德于栁園潛夫因請豫掛印為將軍馬士英不聽前僉事越其杰本坐贓遣戍赦居南京以士英姻婭特起為河南巡撫老憊不知兵潛夫所建白皆不用諸鎮兵無至者會其杰以事譖潛夫于士英竟調潛夫還而以凌駉代之質實以事譖潛夫時蕭應訓復南陽及祕陽舞陽桐柏遣子三傑獻捷潛夫授告身飲之酒鼓吹前導出三傑喜過望往謁其杰其杰覬其賄故為尊嚴厲詞詰責詆為賊三傑泣而出萌異心潛夫過諸寨皆鐃吹迎送其杰間過之諸寨皆閉門不出其杰恚故譖潛夫陳潛夫錢塘人後事魯王募兵江上紹興破偕妻孟氏妾孟氏投水死忠本朝乾隆四十一年追諡節凌駉歙縣人明選淑女時以母妃命選淑女羣奄借端肆擾隱匿者至鄰里連坐兵科給事中陳子龍言中使四出搜巷凡有女之家黃紙貼額持之而去閭井騷然明㫖未經有司中使私自搜採甚非法紀御史朱國昌亦以為言乃命禁訛傳誑惑者尋復使中使李國輔等分詣蘇杭採訪民間嫁娶一空質實朱國昌臨安衛人明賜北京死節諸臣贈諡北京文武臣殉難者並豫贈諡世廕立廟于雞鳴山贈額曰旌忠其列于正祀者文武二十四人武臣七人內臣一人婦人九人附祀者文臣七人武臣十五人內臣六人命有司春秋致祭然顧鋐彭琯輩特為賊拷死皆濫與其列而郎中周之茂等並以不屈死顧未邀贈恤他如御史馮垣登員外郎鄭逢蘭行人謝于宣皆拷掠死郎中李逢申知縣鄒逢吉等亦皆拷掠或逼令縊死與鋐琯輩並獲贈諡時南北阻絶多未能核實也又豫前大學士孫承宗太常少卿鹿善繼祠祀又湖廣殉難巡按御史劉熙祚參政許文岐推官蔡道憲並豫贈諡禮部尚書顧錫疇又言溫體仁得君行政最専且久其負先帝罪大且深乞削其文忠之諡而補文震孟羅喻義姚希孟吕維祺諸臣諡庶天下有所勸懲王亦從之質實正祀文臣二十四人范景文贈太傅諡文貞倪元璐贈少保吏部尚書諡文正李邦華贈太保吏部尚書諡忠文王家彥贈太子太保兵部尚書諡忠端孟兆祥贈刑部尚書諡忠貞施邦曜贈太子少保左都御史諡忠介凌義渠贈刑部尚書諡忠清吳麟徵贈兵部右侍郎諡忠節周鳳翔贈禮部右侍郎諡文節馬世竒贈禮部右侍郎諡文忠劉理順贈詹事諡文正汪偉贈少詹事諡文烈申佳𦙍贈太僕寺少卿諡節愍吳甘來贈太常寺卿諡忠節王章贈大理寺卿諡忠烈陳純德贈太僕寺卿諡恭節陳良謨贈太僕寺卿諡恭愍成德贈光祿寺卿諡忠毅許直贈太僕寺卿諡忠節金鉉贈太僕寺少卿諡忠節及大同巡撫衛景瑗諡忠毅宣府巡撫朱之馮諡忠莊布衣湯文瓊贈中書舍人諸生許琰贈五經博士按范景文事異前許琰字五仲吳縣人聞京師破趨古廟自縊為人所解及哀詔至競不食死武臣七人新樂侯劉文炳諡忠莊惠安伯張慶臻諡忠武襄城伯李國禎諡貞武駙馬都尉鞏永固諡貞愍左都督劉文耀諡忠果山西總兵官周遇吉諡忠武遼東總兵官吳襄諡忠莊內臣一人王承恩事具前諡忠愍婦人九人成德母張氏金鉉母章氏汪偉妻耿氏劉理順妻萬氏妾李各氏馬世竒妾朱氏李氏陳良謨妾時氏吳襄妻祖氏建坊旌表附祀文臣七人進士孟章明郎中徐有聲給事中顧鋐彭琯御史俞志虞總督徐標副使朱廷煥按孟章明徐有聲俞志虞徐標朱廷煥事具前顧鋐成都人彭琯永昌人武臣十五人成國公朱純臣鎮逺侯顧肇迹定逺侯鄧文明武定侯郭培民陽武侯薛濂永康侯徐錫登西寧侯宋裕德懷寧侯孫維藩彰武伯楊崇猷宣城伯衛時春清平伯吳遵周新建伯王先通安鄊伯張光燦右都督方履泰錦衣衛千户李國祿按朱純臣顧肇迹鄧文明薛濂楊崇猷衛時春吳遵周方履奏事具前郭培民營國公英九世孫徐錫登蔡國公忠十世孫宋裕德晟十世孫孫帷藩鏜八世孫王先通守仁曽孫張光燦興六世孫內臣六人李鳳翔王之心髙時明褚憲章方正化張國元按方正化事具前李鳳翔司禮秉筆太監髙時明故司禮掌印太監褚憲章張國元皆提督諸監局太監並殉難而王之心家最富降賊拷掠死凡附祠者贈官賜諡各有差馮垣登新昌人謝于宣鄞縣人諡忠節鄭逢蘭李逢申俱贈太僕少卿鄒逢吉湖口人贈太僕寺丞孫承宗髙陽人諡文忠劉熙祚武進人諡忠毅許文岐字我西仁和人蘄州陷被執賊繫之後營文岐隂與同繫舉人奚鼎鉉等數十人相結圖賊謀泄被害蔡道憲為長沙推官城陷被執賊啖以官嚼齒大罵賊磔之健卒林國俊等九人殉焉文震孟諡文肅羅喻義諡文介姚希孟諡文毅吕維祺諡忠節發明明福王于北都殉難諸臣槩子贈諡其意未嘗不欲表揚忠烈以激勵人心顧當擾亂荒迷之際考核無憑一時為賊拷死者皆得濫厠恤典而實能臨危授命者轉有未及即其豫應諡之朝定人品隲亦多不允協名實未符詎足傳信我鼎之初范景文諸人既加美諡近復奉命于勝國殉節諸臣詳為搜輯核實旌揚義烈無不闡之幽奸汚消溢膺之典夫而後尊名一惠卓卓不刋書之史册炳焉與日月爭光其福王所諡掎托既略褒貶未公時附録于此以紀其事而于各質實下皆削而不載用以昭千秋論定之公袪一時虛誣之議云爾明封鄭芝龍為南安伯尋命為總兵官鎮守福建復令其弟鴻逵帥舟師駐鎮江防守質實鄭芝龍泉州南安人初為海盜降明為逰擊後升參將署總兵弟鴻逵為副總兵時以海利交通朝貴寖得大顯至是封南安伯我大清兵南下芝龍降明以阮大鋮為兵部侍郎巡閲江防大鋮之召大學士髙宏圖以去就爭馬士英意稍折遲四月餘至是復用安逺侯栁祚昌薦起大鋮兵部添注右侍郎仍禁廷臣不得把持阻諫左都御史劉宗周疏言大鋮昔爭吏垣不得致魏大中死詔獄殺大中者魏璫大鋮其主使也即才果足用臣慮黨邪害正之才終病世道且祖宗故事九列必用廷推乃者中㫖頻降司農之後繼之少宰未幾而大鋮司馬又繼之其為墨敕斜封之漸有不待問者大鋮進退實係江左興亡乞寢成命給事中熊汝霖亦言大鋮以知兵擢當置有用之地若止優游司馬則樞府已優為之何必增置命切責宗周而格汝霖疏不聽尋命大鋮兼右僉都御史巡閲江防質實司農之後繼之少宰謂張有譽少宰謂張捷也栁祚昌升八世孫明免府州縣試馬士英奏童生捐免府州縣考上户納銀六兩中户四兩下户三兩競赴院試從之九月明黃得功趨揚州髙傑以兵襲儀真不克初史可法置得功儀真與傑隂相牽制及是登萊總兵黃蜚將之任蜚與得功同姓稱兄弟移書請兵備非常得功率騎三百由揚州往髙郵迎之傑素忌得功又疑圖已乃伏精卒道中邀擊之得功行至土橋方作食伏起出不意上馬舉鐵鞭飛矢兩集馬踣騰他騎馳有驍騎舞槊直前得功大呼反門挾其槊而抶之人馬皆麋復殺數十人跳入頽垣中哮聲如雷追者不敢進遂疾馳至其軍得免方門時傑潛師搗儀真得功兵頗傷而所俱行三百騎皆歿遂訴于南京願與傑決死戰命太監盧九德及可法遣監軍萬元吉和解之不可㑹得功有母喪可法往弔語之曰土橋之役無智愚皆知傑不義今將軍以國故盛怒而歸曲于髙是將軍收大名于天下也得功色稍和終以所殺亡多為恨可法令傑償其馬復出千金為母賵得功不得已聽之明大學士姜曰廣罷曰廣興髙宏圖協心輔政而馬士英挾擁戴功內結勳臣朱國弼劉孔昭趙之龍外連諸鎮劉澤清劉良佐等謀擅朝權深忌二人及阻阮大鋮進用益為所疾曰廣遂抗疏乞休大略言先帝善政雖多而頻出口宣職為亂階所得閣臣則貪淫巧猾之周延儒等所得部臣則隂邪貪狡之王永尤等所得勳臣則力阻南遷盡撤守禦狂稚之李國禎等所得大將則紈袴支離之倪寵王朴等所得言官則貪橫無賴之史葬陳啓新等後效亦可覩矣今又創一祕方但求面對立談取官同登場之戲劇下殿得意同嬴勝之販夫決廉恥之大防長便佞之惡習此豈可為訓哉臣待罪綸扉半壁東南有同蟆雀愧死無地終夜撫膺願乞骸歸鄊里疏入慰留士英大鋮滋不悅國弼孔昭遂以誹謗先帝誣蔑忠臣李國禎為言交章攻之曰廣又興士英面詆曰廣言上以親以序自應立汝何功士英厲聲曰臣無功汝輩欲立潞藩故成臣功耳爭辨久之宗室朱統􅠳素無行士英啖以官使訐曰廣疏不由通政司為禮科所駁通政司劉士楨亦劾其違制俱不問劉澤清復假諸鎮疏攻曰廣以三案舊事及迎立異議為詞請執下法司正謀危君父之罪頃之銃􅠳復劾曰廣五大罪一引用東林死黨把持朝政二交聨江湖大俠日窺南都聲息非謀劫遷則謀别戴三庇從賊諸臣四納賄五奸媳曰廣既連被誣蔑屢疏乞休至是始得請曰廣入辭諸大臣咸在列曰廣言微臣觸忤權奸自分萬死上恩寬大猶許歸田但臣歸後當還以國事為重士英勃然曰吾權奸汝且老而賊也因叩頭言臣從滿朝異議中擁戴陛下願以犬馬餘生歸老貴陽如陛下留臣臣亦但多一死曰廣叱之曰擁戴是人臣居功地耶士英曰汝謀立潞王功安在爭論久之王亦不能斷但諭以叔父賢明當立二先生無傷國體也既出復于朝堂相詬詈而罷曰廣遂還江西其後故將金聲桓者初在史可法麾下後𨽻左良玉良玉死聲桓降于我大清為南昌副總兵既而復叛附桂王由榔迎曰廣以資號召聲桓敗曰廣投偰家池死質實偰家池在新建縣西北偰家樓下朱國弼保國公永五世孫劉士楨萬安人明左都御史劉宗周罷宗周初聞召命自稱草莽孤臣即痛陳時政而馬士英髙傑劉澤清等深恨之滋欲殺宗周宗周請告不許遂抗疏劾士英大略言陛下龍飛淮甸天實豫之乃以扈蹕微勞晏然入內閣進中樞者非士英乎于是李沾劉孔昭等譁然聚訟而羣隂且翩翩起矣髙傑一逃將而奉若驕子劉黃諸將各有舊汛地而置若奕梅京營自祖宗以來皆勳臣為之陛下立國伊始即有內臣盧九德之命士英不得辭其責惟陛下首辨隂陽消長之機出士英仍督鳳陽聨絡諸鎮史可法即不還中樞亦當自淮而北厯河以南别立幕府與士英相犄角京營提督獨斷寢之書之史册為第一美政優㫖答之而促其速入士英大怒即日具疏辭位且揚言曰劉公自稱草莽孤臣不書新命明示不臣天子也其私人朱統􅠳遂劾宗周疏請移蹕鳳陽髙牆所在欲以罪宗處皇上而興史可法擁立潞王其兵已伏丹陽當急備而澤清傑日夜謀所以殺宗周不得乃遣客十輩往刺之宗周時在丹陽終日危坐未嘗有惰容客前後至者皆不忍加害而去㑹京口軍亂士英以統􅠳言為信亦震恐于是澤清疏劾宗周隂撓恢復欲誅臣等激變士心劉良佐亦言宗周力持三案為門户主盟倡義親征圖朝錯之自為居守疏未下澤清復草一疏署傑良佐及黃得功名上之言宗周勸上親征謀危君父隂結死黨迫劫乘輿如宗周入都臣等即渡江赴闕正春秋討賊之義疏入舉國大駭傳諭和衷集事初澤清疏出遣人録示傑傑曰我䡗武人乃預朝事耶得功則疏辨臣不與聞士英寢不奏可法不平遣使遍詰諸鎮咸曰不知遂據以入告澤清輩由是氣阻時宗周不得已以七月十八日至南京㑹阮大鋮方進用宗周復詣告王許其乘傳歸里將行復疏陳五事一曰修聖政毋以近娛忽逺猷國家不幸遭此大變今紛紛制作似不復有中原志者土木崇矣珍竒集矣俳優雜劇陳矣內豎充庭金吾滿座戚畹駢閧矣讒夫昌言路扼官常亂矣所謂狃近娛而忽逺猷也一曰振王綱無以主恩傷臣紀自陛下即位中外臣工不曰從龍則曰佐命一推恩近侍則左右因而秉權再推恩大臣則閣部可以兼柄三推恩勳舊則陳乞至今未已四推恩武辨則疆場視同兒戲表裏呼應動有藐視朝廷之心彼此雄長即為犯上無等之習禮樂征伐漸不出自天子所謂褻主恩而傷臣紀也一曰明國是無以邪鋒危正氣朋黨之說小人以加君子釀國家空虛之禍先帝末造可鑑也今更為一二元惡稱寃至諸君子後先死于黨死于殉國者若有餘戮揆厥所由止以一人進用動引三朝故事排抑舊人私交重君父輕身自樹黨而坐他人以黨所謂長邪鋒而危正氣也一曰端治術無以刑名先教化先帝頗尚刑名而殺機先動于溫體仁殺運日開怨毒滿天下近如貪吏之誅不經提問遽科罪名未科罪名先追贓罰又職方戎政之奸弊道路嘖有煩言雖衛臣有不敢問者則厰衛之設何為徒令人主虧至德傷治體所謂急刑名而忘教化也一曰固邦本無以外釁釀內憂前者淮揚告變未幾而髙黃二鎮治兵相攻四鎮額兵各三萬不以殺賊而自相屠毒又日煩朝廷講和何為者夫以十二萬不殺敵之兵索十二萬不殺敵之餉必窮之術耳不稍裁抑惟加派橫征蓄一二蒼鷹乳虎之有司以天下狥之已矣所謂積外釁而釀內憂也疏入亦但優㫖報聞而已明史可法遣諸將分守要地髙傑移駐徐州初可法出巡淮安閲劉澤清士馬返揚州請餉為進取資馬士英靳不發可法疏趣之因言今日事藝更非昔比必專主討賊復讐舍籌兵籌餉無議論舍治兵治餉無人才優㫖褒答而不能行至是可法議分布諸將奏請以總兵李成棟鎮徐州賀大成鎮揚州王之綱鎮河南李本身胡茂楨𨽻髙傑麾下為前鋒而令劉肇基駐髙家集李樓鳳駐睢寧以防河用張天祿為閣標前鋒駐瓜州髙傑故跋扈可法日以君臣大義曉示傑感其忠奉約束可法因與謀恢復議調黃得功劉澤清二鎮赴邳宿防河傑自提兵直趨開歸且瞰宛洛荆襄以為根本傑遂具疏上之曰得功與臣介介前事臣知報君雪恥而已安能與同列較短長哉然得功終不欲為傑後徑而澤清尤狡橫難任可法不得已乃移得功廬州以防桐皖調劉良佐赴邳徐進復黃汝與傑相聲援傑遂帥兵移鎮徐州以左中允衛允文兼兵科給事中監其軍徐州土賊程繼孔崇禎末被擒至京乘亂逃歸傑至徐州擒斬之質實衛允文字祥祉韓城人明逮前浙江巡按御史左光先下獄阮大鋮既得志専務報復既排去劉宗周等于是盡召逆案楊維垣虞廷陛吳孔嘉等十餘人及所善蔡奕琛唐世濟張孫振袁宏勳等布列要路浙江巡按御史左光先者光斗之弟故與大鋮世讐又嘗首劾士英大鋮益恨刺骨光先在浙嘗平許都亂亟按士英薦大鋮時光先爭不可大鋮得志逮光先亂道阻光先間行走徽嶺緹騎索不得乃止質實虞廷陛嘉興人吳孔嘉歙縣人唐世濟烏程人袁宏勳慈溪人明吏部尚書徐石麒罷石麒初入朝上疏陳七事褒納之時當考選石麒與都御史劉宗周矢公甄别擬莊元辰等十三人為科道馬士英庇其私人更易殆半御史黃耳鼎給事中陸朗有物議石麒以年例出之朗賄奄人內傳留用耳鼎尋亦復官石麒發其罪朗恚疏詆石麒耳鼎亦兩疏劾石麒並言其枉殺陳新甲石麒疏辨求去益力士英擬嚴㫖令馳驛歸石麒剛方清介值權奸用事鬱鬱不得志士英挾定䇿功將圖封石麒議格之中貴田成輩請囑石麒拒不應由是中外皆怨搆之去明年南京破大軍至浙江石麒方在城外曰吾大臣也城亡與亡復入居城中朝服自縊死質實徐石麒本朝乾隆四十一年追諡忠懿莊元辰鄞縣人黃耳鼎蘄水人陸朗上元人冬十月明以前兵部尚書張縉彥總督北直山西河南軍務時馬士英掌中樞絶不鋭厲恢復日以鋤正人引凶黨為務初舉朝以逆案攻阮大鋮大鋮憾甚及見北都從逆諸臣頗多附㑹清流者因倡言曰彼攻逆案吾作順案相對以李自成僞號曰順也士英因疏糾光時亨陳名夏周鍾項煜等以諸人皆附東林故重劾之其他大僚降賊者反不之及賄入輒復其官縉彥以本兵首先開門從賊自成敗走縉彥竄歸河南至是自言集義勇擒僞官收復列城士英主之即授原官總督軍務許便宜行事給事中李維樾言縉彥暗􅘈失機寸斬莫贖逆賊入宫青衣候㸃賊敗竄歸安能復收河北總督何官顧畀賊臣士英等竟勿恤時北都降賊諸臣多以賊敗南還史可法言北都之變臣子皆當有罪若在北者始應從死豈在南者獨非人臣即臣可法謬典南樞臣士英叨任鳳督未能疾趨北援鎮臣澤清傑以兵力不支折而南走是首應重論者臣等罪也乃鈇鉞未加且恩榮叠被獨于在北諸臣毛舉而槩繩之豈散秩閒曹轉重于南樞鳳督哉宜摘其罪狀顯著者重懲示警若僞命未汚當置不問其逃避後至者許戴罪討賊赴臣軍前酌用時亦不能盡從也質實光時亨桐城人陳名夏溧陽人周鍾鑣從弟明大學士髙宏圖罷初阮大鋮入見以宏圖不附東林引為證宏圖顧力言逆案不可翻大鋮及馬士英並怒一日閣中言及故庶吉士張溥士英曰吾故人也死酹而哭之姜曰廣笑曰公哭東林亦東林耶士英曰我非畔東林東林拒我耳宏圖因慫恿之士英意解㑹劉宗周劾疏上大鋮宣言曰廣實使之于是士英怒不可止力薦張捷謝陛朝端益水火矣宏圖因乞休召還還史可法皆不許至是凡四疏乞休乃許之宏圖既致仕無家可歸流寓㑹稽及南都破逃野寺中絶粒而死質實髙宏圖年本朝乾隆四十一追諡忠直明鳳陽地震鳳陽祖陵一日三震明遣太監孫元德督賦浙江先是命太監王肇基督催浙閩金花銀以給事中羅萬象執奏而止至是復遣司禮太監孫元德往浙督催內庫及户工二部錢糧尋以髙起潛請餉又于浙閩增派二十萬令元德催解軍前時户科給事中吳適疏言國恥未雪陵寢成墟豫東之收復無期楚蜀之榷殘彌甚舊都草創一事未舉萬孔千瘡憂危叢集伏惟陛下始終兢惕兼仿祖制早午晚三朝勤御經筵而咨朝政親近儒臣朝期勿更傳免而躬崇儉約省工作以寬民力慎爵賞以重名器無藝之征一槩報罷被災之地酌量蠲賑根本之計莫急于此疏入不省質實吳適長洲人王肇基即王坤崇禎時鎮守宣府發馬士英檄取公帑罪狀者也明以張捷為吏部尚書楊維垣為通政使馬士英獨握國柄一聽阮大鋮計朝政錯亂賄賂公行時徐石麒既去士英欲用張國維掌吏部而大鋮結內奄取中㫖特授張捷士英􅌓眙良久楊維垣力謀起官禮部尚書錢謙益因上疏薦維垣及蔡奕琛且頌士英功而盡雪逆案賈繼春等維垣遂得授通政使未幾進左副都御史而奕琛亦授吏部侍郎我大清兵西討李自成分兵下江南先是我睿親王多爾衮令南來副將韓拱藢參將陳物萬春等齎書致史可法書曰豫向在瀋陽即知燕京望咸推司馬後入關破賊得與都人士相接識介弟于清班曽托其手泐平安拳致衷緒未審以何時得達比聞道路紛紛多謂金陵有自立者夫君父之讐不共戴天春秋之義有賊不討則故君不得書葬新君不得書即位所以防亂臣賊子法至嚴也闖賊李自成稱兵犯闕手毒君親中國臣民不聞加遺一矢朝平西王吳三桂介在東陲獨效包胥之哭嫌爰整貔廷感其忠義念纍世之宿好棄近日之小貅驅除狗鼠入京之日首崇懷宗帝后諡號卜葬山陵悉如典禮親郡王將軍以下一仍故封不加改削勳戚文武諸臣咸在朝列恩禮有加耕市不驚秋毫無優方擬秋髙氣爽遣將西征傳檄江南聨兵河朔朝陳師鞠旅戮力同心報乃君國之讐彰我事機聊慕廷之德豈意南州諸君子苟安旦夕弗審國虛名頓忘實害豫甚惑之闖賊非取之于明朝也賊家之撫定燕都乃得之于國毁明朝之廟主辱及先人我代為雪恥孝子仁人當家不憚征繕之勞悉索敝賦如何感恩圖報兹乃乘逆寇稽誅王師暫息遂欲雄據江南坐享漁人之利揆諸情理豈可謂平將以為天塹不能飛渡投鞭不足斷流耶夫闖賊但為明朝崇耳未嘗得罪于我國家也徒以薄海同讐特申大義今若擁號稱尊便是天有二日儼為勍敵豫將簡西行之鋭轉斾東征且擬釋彼重誅命為前導夫以中華全力受制潢池而欲以江左一隅兼支大國勝負之數無待蓍龜矣豫聞君子之愛人也以德細人則以姑息諸君子果識時知命篤念故主厚愛賢王冝勸令削號歸藩永綏朝福祿待以虞賓統承禮物帶礪山河位在諸王侯上廷當朝庶不負討賊興滅繼絶之初心至南州羣彥翩然來廷伸義儀則爾公爾侯列爵分土有平西之典例在惟執事實圖利之挽近士大夫好髙樹名義而不顧國家之急每有大事輒同築舍昔宋人議論未定兵已渡河可為殷鑒先生領袖名流主持至計必能深維終始寧忍隨俗浮沉取舍從違應早審定兵行在即可西可東南國安危在此一舉願諸君子同以討賊為心毋貪一身瞬息之榮而重故國無窮之禍為亂臣賊子所笑豫實有厚望焉記有之惟善人能受盡言敬布腹心佇聞明教江天在望延跂為勞書不盡意可法旋遣人答書書曰南中向接好音法隨遣使問訊吳大將軍未敢遽通左右非委隆詣于草莽也誠以真大夫無私交春秋之義今倥偬之際忽捧琬琰之章不啻從天而降也循讀再三殷殷致意若以逆賊尚稽天討煩貴國憂法且感且愧懼左右不察謂南中臣民偷安江左竟忘君父之怨敬為貴國一詳陳之我大行皇帝敬天法祖勤政愛臣真堯舜之主也以庸臣誤國致有三月十九日之事法待罪南樞救援無及師次淮上凶問遂來地坼天崩山枯海泣嗟乎人孰無君雖肆法于市朝以為泄泄者之戒亦奚足謝先皇帝于地下哉爾時南中臣民哀慟如喪考妣無不撫膺切齒欲悉東南之甲立剪凶讐而二三老臣謂國破君亡宗社為重相與迎立今上以繫中外之心今上非他神宗之孫光宗猶子而大行皇帝之兄也名正言順天與人歸五月朔日駕臨南都萬姓夾道歡呼聲聞數里羣臣勸進今上悲不自勝讓再讓三僅允監國逮臣民伏闕屢請始以十五日正位南都從前鳳集河清瑞應非一即告廟之日紫雲如蓋祝文升霄萬目共瞻欣傳盛事大江湧出柟梓數十萬章助修宫殿豈非天意也哉越數日遂命法視師江北刻日西征匆傳我大將軍吳三桂借兵貴國破走逆成為我先皇帝后發喪成禮掃清宫闕撫輯羣黎且罷剃髮之令示不忘本朝此等舉動振古鑠今凡為大明臣子無不長跽北向頂禮加額豈但如明諭所云感恩圖報已乎謹于八月薄治筐篚遣使犒師兼欲請命鴻裁連兵西討是以王師既發復次江淮乃辱明誨引春秋大義來相詰責善哉乎推言之然此文為列國君薨世子應立有賊未討不忍死其君者立說耳若夫天下共主身殉社稷青宫皇子慘變非常而猶枸牽不即位之文坐昧大一統之義中原鼎沸倉猝出師將何以維繫人心號召忠義紫陽綱目踵事春秋其間特書如莽移漢鼎先武中興丕廢山陽昭烈踐祚懷愍亡國晋元嗣基徽欽䝉塵宋髙纘統是皆于國讐未剪之日亟正位號綱目未嘗斥為自立卒以正統與之甚至如元宗幸蜀太子即位靈武議者疵之亦未嘗不許以行權幸其光復舊物也本朝傳世十六正統相承自治冠帶之族貴繼絶存亡仁恩遐被號載在盟府寧不聞乎今痛心國昔在先朝夙膺封本朝之難驅除亂逆可謂大義復著于春秋矣昔契丹和宋止嵗輸以金繒回紇助唐原不利其土地况貴國篤念世好兵以義動萬代瞻仰在此一舉若乃乘我䝉難棄好崇讐規此幅􅊷為德不卒是以義始而貴以利終為賊人所竊笑也池不忍盡戮𠞰撫互用貽國豈其然往先帝軫念潢誤至今今上天縱英明刻刻以復讐為念廟堂之上和衷體國介胄之士飲泣枕戈忠義民兵願為國死竊以為天亡逆闖當不越于斯時矣語曰樹德務滋除惡務盡今逆成未服天誅諜知捲土西秦方圖報貴復此不獨本朝不共戴天之恨抑亦全始終之德合國除惡未盡之憂伏乞堅同讐之誼貴師進討問罪秦中共梟逆賊之頭以泄敷天之憤則國義問照耀千秋本朝圖報惟力是視從此兩國世通盟好傳之無窮不亦休乎至于牛耳之盟則本朝廟使臣久已在道不日抵燕奉盤盂從事矣法北望陵無涕可揮身蹈大戮罪應萬死所以不即從先帝者實為社稷之故傳曰竭股肱之力繼之以忠貞法處今日鞠躬致命克盡臣節所以報也惟殿下實昭鑒之至是山西山東郡縣已次第撫定我大清乃命英親王阿濟格為靖逺大將軍帥師西討李自成豫親王多鐸為定國大將軍帥師下江南我世祖章皇帝特賜敕王朕以福王及南方文武諸臣當明不國崇禎帝遭流寇之難陵闕燉宗社覆不遣一兵發一矢如鼠藏穴其罪一也及我兵進勦流賊西奔南方諸臣不行請命擅立福王其罪二也不思滅賊復讐而諸將各自擁兵擾害良民自生反側以起兵端其罪三也惟此三罪天人共憤因命王充定國大將軍統師聲罪討江南王今承命一切機宜當與諸將同心協謀而行毋謂自智不聽人言毋恃兵强輕視敵衆仍嚴偵探勿致疏虞如有抗拒不服者戮之傾心歸順者附之嚴禁兵將凡係歸順地方不許肆行搶掠務使人知朕以仁義定天下之意其行間將領功罪察實紀明彚奏如係小過即當處分至于護軍以下無論大小罪過俱興諸將商酌徑行處分王受兹重任當益殫忠猷用張撻伐立奏蕩平明定諸鎮兵額江北都撫四鎮額兵三萬楚撫額兵一萬京營額兵一萬五千時九江總督袁繼咸為馬士英等所惡因汰其軍餉六萬軍中有怨言繼咸爭之不聽又以江上兵寡議造戰艦檄九江僉事葉士彥于江流截買材木士彥家蕪湖與諸商昵封還其檄繼咸以令不行疏劾士彥士彥同年御史黃耳鼎亦劾繼咸言繼咸有心腹將校勸左良玉立他宗而良玉不從良玉聞之疑懼因疏明與繼咸無隙耳鼎受指使而言由是南京籍籍益謂繼咸與良玉倡和脅制朝廷矣質實葉士彥巢縣人十一月明鳳陽陵災先是廟門告災至是陵災松柏皆燼張獻忠僭號于成都時王應熊督川湖軍事兵力弱不能討賊獻忠既陷全蜀遂僭號大西國王僞稱大順元年修蜀王府居之名成都曰西京設丞相尚書五軍都督府等官用汪兆麟嚴錫命為左右丞相王國麟汪鼎鎮龔完敬為尚書養子孫可望艾能竒劉文秀李定國等皆為將軍賜姓張氏鼎鎮完敬尋以小過刲剔死脅川中士大夫受僞職前布政使尹伸給事中吳宇英皆不屈死遣諸僞將分屠各府州縣名草殺詭開科取士集于青羊宫盡殺之筆墨成邱冢坑成都民于中園殺各衛集軍九十八萬僞官朝㑹呼獒數十下殿獒嗅看引出斬之名天殺又創生剝人法皮未去而先絶者刑者抵死將卒以殺人多少叙功共殺男女六萬萬有竒賊將有不忍至縊死者僞都督張君用王明等數十人皆坐殺人少剝皮死并屠其家又用法移錦江涸而闢之深數大埋金寶億萬計然後決隄放流名水藏曰無為後人有也當是時諸郡義兵並起獻忠憤怒誅殺益毒川中人跡殆絶列城內至雜樹成拱云後二年獻忠盡焚成都宫室鏟其城率衆出川北又欲盡殺川兵僞將劉進忠率川兵一軍盡逃㑹我大清肅親王豪格統軍追𠞰獻忠兵至漢中進忠降乞為鄊導至鹽亭界大霧獻忠曉行猝遇大兵中矢墜馬匍伏積薪下擒出斬之質實鹽亭魏縣今屬四川潼川府尹伸宣州人吳宇英廣元人一本朝乾隆四十年俱追諡忠節明史可法帥師進次清江浦可法聞李自成敗還陜西決策北行高傑既赴徐州可法遂帥師進次清江浦遣官屯田開封為經略中原計時諸將各分汛地擇使利者自王家營而北至宿遷最衝要諸鎮不敢任可法自任之令幕下文武築壘緣河南岸可法以自成未滅上疏請頒討賊詔書大略言偏安者恢復之退步未有志在偏安而遽能自立者也大變之初黔黎灑泣紳士悲哀猶有朝氣今則兵驕餉絀文恬武嬉頓成暮氣矣河上之防百未經理人心不肅威令不行復讐之師不聞及關陜討賊之詔不聞達燕齊君父之讐置之膜外憶臣等迎駕時陛下言及先帝則泣下沾襟恭謁孝陵則淚㾗滿袖皇天后土實式鑒臨曽幾何時頓忘斯志先皇帝死于賊恭皇帝亦死于賊此千古未有之痛國家變出非常在北諸臣死節者無多在南諸臣討賊者復少此千古未有之恥夫庶民之家父兄被殺尚思穴胸斷脛得而甘心况在朝廷顧可漠置臣恐恢復無期即偏安亦未可保也今宜速發討賊之詔責臣與諸鎮悉簡精鋭直指秦關庶海內忠臣義士聞而感憤且陛下嗣登大寶原與先朝不同諸臣但有罪當誅曽無功足録臣于登極詔稿特將加恩一欵刪除不意後來仍復開載致貽笑天下今恩外加恩紛紛未已武臣腰玉名器濫觴自後尤宜慎重專待有功庶猛將武夫有所激厲至行兵討賊最苦無糧搜括不可行勸輸亦難繼請將不急之工程可已之繁費一切報罷朝夕之燕衝左右之進獻一切謝絶即事關典禮萬不容已者亦槩從節省蓋賊一日未滅即有深宫曲房豈能安處錦衣玉食豈能安享必刻意在雪恥報讐振舉朝精神萃萬方物力盡併于選將練兵一事庶人心可鼓天意可回疏奏不省時諸鎮位秩已崇咸逡巡無進師意可法悔之語其客欲斬已及馬士英髙宏圖姜曰廣四人頭為任事不忠之戒因上疏請責成諸鎮進戰可法每繕疏循環諷訟聲淚俱下聞者莫不感泣士英第取優㫖報之而已質實王家營在清河縣東北黃河北岸發明當時偷安江左士英所恃者徒以冇四鎮耳乃諸鎮位秩既崇逡巡江上而可法以一人枕戈泣血號召同讐即其慷慨激烈之心諸鎮或冀其聲援得助彼士英者當請餉不給當告警不省飛章以優㫖報聞徒令將士束手夫以當日之藝即中外同心戮力尚難救已傾之社而乃意外掣肘别有肺腸其罪何可擢髮數可法縱孤忠獨抱而一木豈能支危厦哉我大清兵入宿遷大我兵取海州遂取宿遷史可法舟次鶴鎮聞報遣總清大兵劉肇基往援復其城越數日軍城南相持半月而清兵圍邳州軍城北肇基援之解復分兵拔贛榆豐沛等縣皆降可法飛章報聞馬士英大笑不止坐客楊士聰問故士英曰君以為誠有是事耶此史公妙用也嵗將暮防河將吏應叙功耗費軍資應稽算此特為叙功稽算地耳時髙傑亦抵徐州與劉澤清書曰近日河南撫鎮接踵告警一夕數至開封上下北岸俱是兵衆問渡甚急惟恐一越渡則天塹失恃長江迤北盡為戰場時事到此令人應接不暇惟有殫心竭力直前無二于萬難之中求其可濟以報國恩而已澤清以聞時王鐸乃請視師江北不許質實楊士聰濟寧人明榷酒稅士英請𣙜酒助餉下部議從之又奏開助工等例暴斂益甚民間因有掃盡江南金填塞馬家口之謡明逮治前昌平巡撫何謙等御史沈宸荃初疏陳時事皆切利病已論羣臣醜正黨邪請王卧薪嘗瞻為雪恥報讐之計至是又言經略山東河南者王永吉張縉彥也永吉失機先帝拔為總督擁兵近甸不救國危縉彥官部曹先帝驟擢典中樞乃率先從賊即加二人極刑不為過陛下屈法用之而永吉觀望逗遛縉彥狼狽南竄死何以對先帝生何以對陛下昌平巡撫何謙失陷諸陵罪亦當案都城既陷守土臣宜皆厲兵秣馬以報國讐乃賊塵未揚輒先去以為民望如河道總督黃希憲山東巡撫邱祖德尚可容偃卧家園乎疏入永吉縉彥釋勿問逮謙祖德等付法司治之例時朝政大亂宸荃獨持正要人多疾之明年以年出為蘇松兵備僉事未赴南都破宸荃舉兵邑中魯王監國擢右僉都御史已而事敗宸荃棄家從王海外王次長垣連擢至大學士從王于舟山又從泛海抵厦門金門後艤舟南日山遭風沒于海質實沈宸荃慈溪人謙本朝乾隆四十一年追諡忠節何崑山人邱祖德字念修成都人明桂王常瀛卒于梧州常瀛初封衡州張獻忠陷湖南常瀛走廣西遂居梧州至是以憂悸成疾卒常瀛世子先卒次子安仁王大由􅀈未幾亦卒次由榔初封永明王至順治三年八月兵下汀州執唐王聿鍵于是兩廣總督丁魁楚廣西巡撫瞿式耜等迎由榔以十月十日監國十一月自立于肇慶以肇慶府署為行宫遂號永厯以瞿式耜為東閣大學士兼吏兵兩部尚書吕大器亦至並命吕大器丁魁楚為大學士魁楚兼戎政大器兼中樞大及我廣州式耜請駐軍峽口太監王坤不從奉由榔兵克大西走梧州至順治四年正月我俱棄去止式耜同吳兵破肇慶攻梧州魁楚大器等大炳吳貞育等由榔乃復走桂林我拒戰初由榔就執兵又薄桂林式耜急令𠫭將焦璉璉率衆攀城破械出之負王以行王德之用為參將至是戰守璉功最多式耜身立矢石中與士卒同甘苦援兵索餉式耜括庫不足妻邵氏捐簪珥佐之後城幾破㑹陳邦彥等攻廣州大兵引而東桂林獲全由榔封式耜臨林伯璉新興伯後武岡破王由靖州走栁州繼仍還桂林是年由榔以嚴起恆為禮部尚書兼東閣大學士時朝政壞于五虎起恆不能匡救徒植黨相抵牾順治五年南昌總兵金聲桓等叛降于由榔由榔時駐肇慶永州衡州並復式耜以機會可乘請王再還桂林圖出處之大計不納順治六年騰蛟守湘潭城遣將徐勇引軍入兵下湘潭總督何勇故騰蛟部將率衆羅拜勸騰蛟降騰蛟大叱勇遂擁之去不食七日乃殺之順治七年由榔又奔梧州九月全州破開國公趙印選居桂林衛國公胡一青守榕江與寧逺伯王永祚皆懼不出十月一青永祚大入桂林分餉榕江無戍兵印選出不肻行再趣之則兵益深入十一月式耜檄盡室逃一青等亦逃去永祚迎降城中無一兵式耜端坐府中家人亦散部將請式耜上馬速去式耜叱退之俄總督張同敞至誓偕死是夕兩人秉燭危坐黎明數騎擁去諭之降不聽幽于民舍日賦詩倡和後就刑與敞同死式耜死由榔大懼自梧州奔南寧時孫可望已據滇黔受封為秦王順治八年可望遣兵至南寧襲殺其大學士嚴起恆等順治九年可望遷由榔于安隆所改曰安龍府日益窮促聞李定國與可望有隙遣使密召定國以兵來迎可望偵知之遣人至安隆殺其大學士吳貞育等數人順治十三年定國至乃奉由榔走雲南由榔封定國晋王順治十四年孫可望自置內閣六部等官以文安之為東閣大學士初安之念川中諸鎮兵尚强欲結之勤王乃自請督師加諸鎮封爵由榔許其請可望聞而惡之遣兵邀安之至是以為大學士安之不為用走川東可望舉兵與定國戰大敗挈其妻子降于我大清順治十六年我信郡王多尼征南將軍卓布泰同大清遣安逺大將軍吳三桂議三路分兵進取雲南多尼自貴陽入三桂自遵義入卓布泰自都勻入俱㑹師雲南省城多尼大兵至盤江由榔遣將焚鐵鎖橋遁去我七星關有兵軍作浮橋以濟進擊大敗之三桂兵至屯守險乃從水西問道渡關遂直趨烏撒卓布泰至盤江渡口由榔遣屯兵扼險沉船乃從下流十里取所沉船乘夜潛師乃濟屯兵倉惶逃潰大敗之時定國令師據雙河口山頂卓布泰遣兵登山奪其形勝大定國以象陳來爭山路兵俱入雲南省城定國乃與兵又大敗之于是三大白文選擁由榔走永昌既而遁追及復迎戰隨擊敗兵遣前鋒進𠞰文選先拔營大之我永昌由榔及定國等又走騰越于是渡潞江追兵克之分八隊衝擊定國敗克騰越由榔走南甸遂入緬緬以四舟迎由榔隨行者六百餘人緬人于赭陘置茅屋居由榔遣兵防之順治十七年定國等與緬戰索其主連敗緬兵緬終不肻出由榔時平西大將軍吳三桂以由榔尚在請進兵緬甸以靖根株為一勞永逸之計我大清命定西將軍愛星阿率師㑹之三桂遂傳檄緬甸諭以擒獻由榔順治十八年正月三桂遣二土官至緬示師期三月師至猛卯㑹瘴發撤兵而緬酋莽猛白屢得三桂檄欲生致由榔乃蜜使人防守誘其從官沐天波等渡河盟盡殺之惟存由榔與其屬二十五人九月三桂及愛星阿帥師自南甸隴川猛卯進别遣兵取道姚關鎮康孟定十一月㑹于木邦時定國與文選不睦定國先奔文選尚憑江倚險欲分兵大拒我木邦晝夜行三百餘里臨江造筏將渡文選乃兵自奔茶山我定西將軍愛星阿别令偏師追之自領大軍直趨緬十二月次舊挽坡去緬城六十里緬使人請兵百人進蘭鳩江濱為扞衛遂執由榔及其親屬送軍前偏師追及文選于猛養文選亦降明年四月由榔死于雲南時先後同盡節者吏部尚書李若星總督揭重熙貴州布政使張耀巡按雲南御史羅國瓛經略兵部尚書李乾德大學士楊畏知兵部尚書傅作霖僉都御史范文光詹天顔大學士郭之彥兵部尚書楊鼎和總兵曹大鎬兵部侍郎余應桂監軍御史周震巡撫張孝起馬乾龍之虬耿庭籙總督洪淯鰲吏部侍郎王錫衮監軍御史麥而炫户部郎中朱寶蓮太僕少卿霍子衡兵部主事韓如璜指揮白常燦湘南道副使陳象明鎮西將軍朱旻如守備孟秦吏部主事侯偉如虎賁將軍王興沅江土知府那嵩雲南參將徐日舜總兵蕭曠兵科給事中劉堯珍吳霖御史張載述刑科給事中張鐫兵科給事中林青陽都督鄭允元大理寺丞林鍾太僕少卿趙賡禹翰林檢討蔣乾昌李元開吏科給事中徐極御史周允吉朱議㞙胡士端兵部郎中蔡演主事易士佳員外郎任斗據御史李如月晋寧知府冷陽春師宗知州徐道興僉事胡恆户部郎中談先哲巡按御史朱奉􅀈户部主事鄭廷爵永寧知州曽異撰興寧知縣吳子麒天全碉門招討使楊之明大理衛指揮陳禎楚雄衛指揮王承憲大理衛守備陳海瀾滄衛指揮李君植思恩知府董邦昌崑山知縣楊永言臨安通判劉之蘭其餘遷徙流離終于殉難者尚有總督林佳鼎臨安教授談三謨等而士民效死亦所在多有焉質實朝政壞于五虎明本朝順治四年桂王拜嚴起恆禮部尚書兼東閣大學士時朝政決于李元允元允者惠國公成棟子也初為錦衣指揮使進封南陽伯握大權而都御史袁彭年少詹事劉湘客給事中丁時魁金堡䝉正發五人附之攬權植黨人目為五虎起恆居其間不能有所救正然遇事持平與文安侯馬吉翔司禮中官龎天夀共患難久無所忤而五虎積憾起恆王在梧州尚書吳貞育等合疏攻五虎下獄將置之死起恆顧跽王舟力救貞育等惡之乃合攻起恆起恆力求罷王留之不得竟去後手敇召還仍為首輔五虎獄不解惟彭年以反正功免議堡與時魁並謫戍湘客正發贖配追贓方獄之初起也金堡嘗劾慶國公陳邦傳十可斬並及馬吉翔龎天夀及邦傳統兵入衛修舊怨貞育等主之遂合疏五虎誤國罪下錦衣衛而堡受刑尤酷有吕爾琠者吉翔門下士入臺班堡劾之曰臣何人爾琠何人昌宗之寵方新仁傑之表何在言甚不倫御史程源在王舟側大言兩語罪該萬死蓋為飛語以觸時忌于是都督張鳳鳴受密㫖陳刑具用厰衛故事嚴鞫之搒掠慘酷瞿式耜以國勢危猶起黨禍七疏救不聽論謫金齒後改清浪衛堡移居桂林桂林破剃髮為僧按堡初稱五虎橫行害政後又遁跡緇流靦顔苟活垂二十年其進退無據更不足齒于人兵孫可望封秦王可望初從張獻忠為盜後歸正時據滇黔乞封王起恆持不可後胡執恭矯詔封為秦王可望知其僞遣使求真封起恆又持不可可望大怒乘王播遷遣其將賀九儀張勝等帥徑卒五千迎王至南寧直上起恆舟怒目攘臂問王封是秦非秦起恆曰君逺迎主上功甚偉朝廷自有隆恩若専問此事是挾封非迎主上也九儀怒格殺之遂投尸于江此順治八年事也衡州唐江南道宋荆湖路元衡州路明為府全州漢洮陽晋全州元全寧府明為全州府後改州屬桂林府今皆因之安隆所元普安路明設守禦所今為貴州南籠府貴陽宋龍番元金筑明設程番府𨽻貴州後改名貴陽遵義宋為播州安撫司明初為宣慰司後改遵義府今皆因之雙河在雲南曲靖府南寧縣北三十里姚關在永昌府保山縣東南一百七十里明萬厯十一年灣甸導緬寇姚關十三年添守備駐之今省鎮康明置鎮康土州在永南府南三百八十里今因之瞿式耜字起田常熟人本朝乾隆四十一年追諡忠宣吳炳宜興人奔大靖州時令炳從王太子走為寺吳貞育字元馨宜興兵所執送衡州自盡于湘山人以謀召李定國為孫可望所殺府本朝乾隆四十一年俱追諡忠節焦璉字瑞亭宣人南寧練兵後自刎死廣本朝乾隆四十一年追諡烈愍陳邦彥順德人復州不克入清逺及城破不降死本朝乾隆四十一年追諡忠烈何騰蛟正本朝乾隆四十一年追諡忠誠張同敞江陵人居孫桂林敗執之就刃顏色不變而死天本朝乾隆四十一年追諡忠烈嚴起恆山隂人沐波定逺人英十二世孫從由榔入緬緬人劫之不屈受極刑死母陳氏妻焦氏先焚死至是妾夏氏亦縊死本朝乾隆四十一年俱追諡忠節李若星息縣人為御史討貴州有功桂王時召為尚書武罔破自刎死揭重熙臨川人屢率兵攻大撫州邵武不克為戮張耀三原人孫可望攻貴州耀兵襲執送建寧受至定番州乘城拒守城陷不屈死並家屬十三人同死羅國瓛嘉定州人孫可望攻曲靖城陷自焚死本朝乾隆四十一年俱追諡忠烈李乾德西充人經略川湖雲貴等處孫可望陷嘉定乾德驅家人及弟赴水死楊畏知寶雞人為孫可望所執以幘擊可望為所殺傅作霖武陵人監軍至武岡城破不降同妾鄭氏投水死郭之竒揭陽人孫可望殺嚴起恆集鄊勇起義不克後執至廣西不屈死楊鼎和江安人以阻封議孫可望追殺之曹大鎬貴池人江西破招亡卒往來廣信邵武明事敗不屈死余應桂都昌人以大事奪職家居久之起兵敗于江右遂自盡周震全州人兵至諸將謀降不從為所殺張孝起吳江人初為廣大州推官舉兵謀恢復不克後居龍門島陷不屈死妻兵破島不食死龍之虬永新人栁州城朱氏亦死耿廷籙臨安河西人孫可望陷河西赴水死洪淯鰲晋江人大兵下荆湘不屈死沙本朝乾隆四十一年俱追諡忠節王錫衮祿豐人定州之亂起義兵兵敗不屈死大麥而炫髙明人不降死朱寶連南海人與麥而炫復兵克髙明執之大髙明戰死霍子衡南海人廣州破赴井死韓如璜博兵至大羅人起兵攻東莞遇人迎陳邦彥守城戰死陳象明兵戰死白常璨清逺大東莞人徽餉至梧州遇堅守平樂城破自刎死孟泰兵戰死朱旻如臨桂人大全州人州守將降泰仰藥死侯偉如公安人從吳文兵至全大炳遇不降死王興漳州人兵至大兵平粵興自焚死那嵩沅江人人為雲南參將城破大兵至登樓自焚死徐日舜西安大不屈死蕭曠武昌人珍鎮雄府人吳霖歙縣人張載兵破黎平戰死劉堯述涇縣人俱以阻封為孫可望所殺張鐫寧國人林青陽新寧人鄭允元歙縣人林鍾湖廣人趙賡禹袁州人蔣乾昌晋江人李元開善化人徐極江西人周允吉錢塘人朱議㞙南昌人胡士端進賢人蔡縯九江人易士佳廬陵人任斗墟鄞縣人俱事桂王奉命圖孫可望事泄見殺李如月東莞人劾孫可望被殺冷陽春石阡人孫可望遣李定國陷晋寧拒戰死徐道興滁州人孫可望遣李定國陷曲靖被脅死胡恆竟陵州人孫可望陷卭州不屈死談先哲平壩衛人孫可望陷安順與妻劉氏同死朱奉􅀈華陽人禦孫可望于雅州兵敗死鄭延爵內江人拒孫可望于雅州陷陳死曽異撰榮昌人孫可望寇永寧城陷自焚死吳子騏貴陽人孫可望攻貴州戰敗死楊之明里系無考拒孫可望于飛仙關兵敗死陳禎大理衛人沙賊陷城巷戰死王承憲楚雄衛人沙賊之亂中流矢死陳海大理人李君植永昌人俱死于沙賊之亂董邦昌楊永言俱昆明人劉之蘭平越人俱殉節于滇本朝乾隆四十一年俱追諡烈愍林佳鼎莆田人迎桂王率兵戰海口不勝死又彭耀等七十餘人殉本朝乾隆四十一年俱追諡節愍談三謨昆陽人節雲南又李兆旗等四十人本朝乾隆四十一年俱入祠發明明福王偏立江左使能勉支嵗月猶可比宋髙宗之南渡若唐王朱聿鍵桂王朱由榔遁跡閩滇不復成國正如宋帝昺帝是流離瘴海殘喘苟延景炎祥興之不得書年律以春秋之例二諭㫖王亦如是矣乾隆四十年特奉未經載入但二王以二王自不等于福王故輯覽為明室宗支其始末雖無足道而稱尊擅號首尾十有餘年事跡多有可考與其聽不知者私相傳述又何如約舉大凡俾知邊隅偷息不過若是之窮蹙無成更可正傳聞之訛異至如各為其主守節不屈殉難捐軀者與宋文天祥陸秀夫相仿佛則又當嘉其忠事之義諭將二王本末撮叙梗槩並將死事諸臣亦為附載仰見我皇上大公至正雖勝國餘分尚與核實不遺臣等謹依隨文附見之例于二王事既以類詮次而當時殉聖訓節者並得登録亦惟仰遵冀以傳信闡幽云爾十二月我大清兵克河南府髙傑至徐州沿河築牆専力備禦且遣人通好許定國為絡聨河南計張縉彥亦奏定諸將分地王之綱自永城至寧陵許定國自寧陵至蘭陽劉洪起自祥符至汜水㑹大清兵至孟津先遣精兵渡河沿河十五寨堡俱望風歸附大兵入河南府總兵李際遇迎降縉彥等並走沈邱河南撫鎮飛章告急命傑率兵進屯歸德為備已而大兵别由濟寧南下至夏鎮復自洛陽圍鄧州可法傑及劉澤清等各具疏告警馬士英言北兵雖在河上然闖賊尚張不無後慮豈遂投鞭問渡乎况强弱何常赤璧三萬淝水八千惟在諸將策勵之而已卒不應明命馬士英閲兵將大閲京軍適有疾不出因命士英代之時工費無度荒酒漁色奄人田成等檀寵士英輩亦因之竊權固位政以賄成識者皆知其不堪旦夕阮大鋮嘗以烏絲闌寫已作燕子箋雜劇進之時嵗將暮福王一日居興寧宫憮然不樂韓贊周請其故王曰黎園殊少佳者贊周泣曰奴以陛下或思皇考乃作此想耶明重頒三朝要典追恤逆案諸臣楊維垣追論三朝黨局力詆王之寀楊漣等而為劉廷元霍維華等訟寃乃命將三朝要典宣付史館尋復令刪定刋行吏部尚書張捷力稱維華等忠請表章三案諸臣因盡追賜恤典贈廕祭葬諡全者維華等六人贈廕祭葬不豫諡者徐大化等三人贈祭葬者徐楊先等三人復官不賜恤者王紹徽等三人他若王德完黃克纘王永光章光嶽等雖名不麗于逆案而為清論所不豫者亦贈恤有差袁宏勳復請追論焚要典諸臣罪左良玉力言要典治亂所關勿聼邪言致興大獄袁繼咸疏言要典已經先帝焚毁何必復理其說未進宜寢之已進宜毁之不聽質實徐揚先江寧人章光嶽臨川人發明馬士英之進三朝要典也時為用阮大鋮地耳時姜曰廣吕大器髙宏圖等極力疏諫不啻痛哭流涕言之而福王全不知省逮馬阮弄權遂借是為報復翻十七年之定案而復興大獄其追恤諸逆臣非恤諸臣也欲黨邪害正而逞其毒也幕巢餘景尚晏然自以為安從容為蠱惑傾讒之舉以快其私諸臣固不足深責顧福王擁殘局以偷安速滅亡而罔覺猶聽傾倒于權奸之手抑又何耶明妖僧自稱齊王伏誅有狂僧大悲自稱齊王又稱潞王為趙之龍所捕下鎮撫司勘訊阮大鋮與張孫振謀欲假以誅東林及素所不合者令大悲引諸臣擁潞王可一網盡也因造十八羅漢五十三參之目書史可法高宏圖等名一時人望無不備列納大悲袖中錢謙益先已上疏頌士英且為大鋮訟寃修好矣大鋮憾不釋亦列焉將窮治其事獄詞詭祕廷臣皆自危而士英不欲興大獄乃第當大悲妖言立斬而止明進練國事兵部尚書初國事戍廣西久之赦還福王立召為户部左侍郎尋改兵部至是加尚書仍蒞侍郎事明福王由嵩𢎞光元年是年五月我大清兵下江南明福王就執于蕪湖明亡我大清世祖章皇帝順治二年春正月明以南京宫殿成推恩諸臣有差加史可法太保馬士英少師王鐸少保子廕仍以士英掌文淵閣印充首輔辦事可法力辭太保許之可法為督師行不張蓋食不重味夏不箑冬不裘寢不解衣年四十餘無子其妻欲置妾太息曰王事方殷敢為兒女計乎在軍中絶飲除夕遣文牒至夜半倦索酒殽肉分給將士已盡乃取鹽䜴下之思先帝泫然淚下憑几卧比明將士集轅門外門不啓左右遙語其故知府任民淯曰相公此夕卧不易得也令鼓人仍擊四鼓可法寤怒曰誰犯吾令左右述民淯意乃免質實任民淯字時澤濟寧人明定北都從逆諸臣罪削刑部尚書解學龍籍先是命治從賊諸臣嶽倣唐制六等定罪學龍定議為爰書分别上之其一等應磔者吏部員外郎宋企郊舉人牛金星平陽知府張嶙然太僕少卿曹欽程御史李振聲喻上猷山西提學參議黎志升陜西布政使陸之祺給事中髙翔漢潼關道僉事楊王休檢討劉世芳十一人也其二等應斬秋決者刑科給事中光時亨河南提學僉事鞏焴庶吉士周鍾兵部主事方允昌四人也其三等應絞擬贖者翰林院修撰兼戶兵二科都給事中陳名夏户科給事中楊枝起廖國遴襄陽知府王承曽天津兵備副使原育宗庶吉士何孕光少詹事項煜七人也其四等應戍擬贖者禮部主事王孫蕙翰林院檢討梁兆陽大理寺正錢位坤總督侍郎侯恂山西副使王秉鑑御史陳羽白裴希度張懋爵禮部郎中劉大鞏吏部員外郎郭萬象給事中申芝芳金汝礪舉人吳達修撰楊廷鑑及黃繼祖十五人也五等應徒擬贖者通政司參議宋學顯諭德方拱乾工部主事繆沅給事中吕兆龍傅振鐸進士吳剛恩檢討方以智傅鼎銓庶吉士張家玉及沈元龍十人也六等應杖擬贖者工部員外郎潘同春禮部員外郎吳泰來主事張琦行人王于曜行取知縣周夀明進士徐家麟及向列星李棡八人也其留北俟候定奪者少詹事何瑞徵楊觀光太僕少卿張若麒副使方大猷户部侍郎黨崇雅吏部侍郎熊文舉太僕卿葉初春給事中龔鼎孽戴明說孫承澤劉昌御史涂必泓張鳴駿司業薛所藴通政參議趙京仕編修髙爾儼户部郎中衛周祚及黃紀孫襄十九人也其叧存再議者給事中翁元益郭充庶吉士魯㮚吳爾塤史可程王自超白孕謙梁清標楊棲鶚張元琳吕崇烈李化麟朱積趙熲劉廷宗吏部郎中侯佐員外郎左懋泰禮部郎中吳之琦兵部員外郎鄒明魁行人許作梅進士胡顯太常博士龔懋熙及王之牧王臯梅鶚姬琨朱國夀吳嵩孕二十八人也其已奉㫖録用者兵部尚書張縉彥給事中時敏諭德衛孕文韓四維御史蘇京行取知縣黃國琦施鳳儀兵部郎中張正聲內閣中書舍人顧大成姜荃林等十人也奏入諭以周鍾等不當緩決陳名夏等未蔽厥辜宋學顯潘同春等擬罪未合令再議惟方拱乾名在五等以結納馬阮特免其罪至是學龍更擬周鍾光時亨等各加一等潘同春諸臣皆候補小臣受僞無據仍執前律時馬阮急欲殺周鍾學龍欲緩其死謀之王鐸乘士英注籍上之且請停刑鐸即擬俞㫖褒以詳慎平允士英大怒然事已無及大鋮暨張捷楊維垣等聲言欲劾學龍學龍引疾命未下保國公朱國弼御史張孫振等詆其曲庇行私遂削籍傳後周鍾光時亨仍同周鑣雷縯祚並殺大鋮等即㫖二等罪斬者謫雲南金齒軍三等罪絞者充廣西邊衛軍四等以下俱為民永不叙用然學龍所定案亦多漏綱而所擬一等諸犯皆隨賊西行實未嘗正刑辟也質實李振聲米脂人喻上猷石首人黎志升華容人劉世芳膚施人方允昌浙江人廖國遴長沙人原育宗蒲城人王孫蕙無錫人梁兆陽番禺人王秉鑑扶風人陳羽白南靖人申芝芳嘉定人金汝礪仁和人方拱乾桐城人繆沅錢塘人吕兆龍金壇人傅振鐸金溪人方以智桐城人傅鼎銓臨川人張家玉東莞人潘同春餘姚人吳泰來新昌人張琦無錫人徐家麟鄞縣人何瑞徵信陽人黨崇雅寶雞人熊文舉新建人葉初春湖口人龔鼎孳合肥人涂必泓南昌人薛所藴孟縣人衛周祚曲沃人翁元益上海人魯㮚山隂人史可程順天人王自超㑹稽人白孕謙涇縣人朱積華亭人吳之琦晋江人胡顯井研人朱國夀丹陽人時敏常熟人韓四維嵩縣人黃國琦南昌人施鳳儀嘉定人姜荃林鄱陽人明總兵許定國誘殺髙傑于睢州傑帥兵進次歸德定國方駐睢州定國嘗上書詆傑為賊故傑素銜定國而定國亦已遣使納欵于我大清且送其二子渡河為質乞濟師往援傑微聞之招定國相㑹不應傑復邀巡撫越其杰巡按陳潛夫同往睢州定國始郊迎毁其軍而以羸見且故為屈服狀傑心輕定國遂欲入城其杰止之不聽十一日定國置酒享傑傑飲酣為定國刻行期且微及送子事定國益疑無離睢意傑固促之行定國怒夜伏兵傳炮大呼其杰等急遁走傑醉卧未起衆擁至定國所殺之先是傑以定國將去睢盡發兵戍開封所留親卒數十人而已定國僞恭順多選妓侍傑而以二妓偶一卒寢卒盡醉及聞炮欲起為二妓所掣不得脫皆死明日傑部將回軍攻城自東門入老弱無孑遺定國遂走降于大清軍傑為人淫毒楊民聞其死皆相賀然是行也進取意甚鋭故時有惜之者黃得功聞傑死復引兵襲揚州將盡殺其妻子以報城中大懼史可法急命同知曲從直諭解之乃引兵去質實曲從直字完初遼東人明以吏部侍郎蔡奕琛兼東閣大學士入閣辦事尋復以唐世濟為右都御史皆阮大鋮援之也明以衛允文為兵部侍郎總督開歸軍務髙傑既死部下兵將大亂互為雄長睢州旁近二百里殺戮無遺史可法聞之流涕曰中原不可為矣遂馳至徐州以總兵李本身乃傑甥請用為提督代統其衆又令傑子元爵撫定其軍黃得功劉澤清良佐聞可法欲以本身將傑軍連章劾之而監軍衛允文希馬士英指亦論可法督師為贅士英喜即擢允文兵部右侍郎總督興平標下兵馬經略開歸軍務以分其權可法益不得展布矣尋撤傑兵回揚州改命劉良佐防歸德質實衛允文傑同鄊陷賊南還傑請為已監軍我大清兵克西安李自成走襄陽大我至潼關賊將劉芳亮迎戰奮擊敗之俘斬無算自兵成親率馬步兵至復大破之遂克潼關僞伯馬世耀以七千人來降斬之進克西安自成已焚宫室由龍大駒寨走武岡入襄陽復走武昌我安武昌等處窮追兵兩道追躡蹙之于鄧州承天德至賊巢連破走之當是時左良玉東下武昌虛無人自成屯五十餘日賊衆尚五十餘萬改江夏曰瑞符縣尋為我兵所迫部衆多降或逃散自成走延寧蒲圻至通城竄于九宫山既而自成留李過守寨自率二十騎略食山中為村民所困不能脫遂縊死或曰村民方築堡見賊少爭前擊之人馬俱陷泥淖中自成腦中鉏死剝其衣得龍衣金印眇一目村民乃大驚謂為自成也我兵遣識自成者驗其尸朽莫辨獲自成兩從父僞趙侯僞襄南侯及自成二妾金印一又獲僞汝侯劉宗敏僞總兵左光先僞軍師宋獻策于是斬自成從父及宗敏于軍牛金星宋企郊等皆遁亡自成兄子過改名錦偕諸賊帥奉自成妻髙氏降于總督何騰蛟時唐王立于閩賜錦名赤心封髙氏忠義夫人號其軍曰忠貞營𨽻騰蛟麾下永明王時赤心封興國侯尋死二月明以阮大鋮為兵部尚書命大鋮以尚書協理部事仍巡閲江防大鋮雖長中樞置一切兵事不問顧時時撓六部權任劉應賓為文選濁亂銓政再舉考擢其私人二十餘人為給事御史嘗欲罷撫按糾薦令納金于官糾者免薦者豫其謬誕如此間中書舍人林翹善星術以嘗決士英必大用半嵗遂躐授左都督銜蟒服趨事總督袁繼咸請以陳麟鄧林竒為總兵大鋮索賄始給敕印諸白丁𨽻役輸重賂立躋大帥時人為之語曰職方賤如狗都督滿路走質實劉應賓沂水人林翹江浦人三月明人有自稱崇禎太子者下獄治之北都之變李自成劫太子慈烺西走不知所終或傳其已遇害至是有自北來稱太子者召勳臣朱國弼等閣臣馬士英等翰林劉正宗等入見武英殿面諭府部九卿科道辨驗真僞日午羣臣奏係故駙馬都尉王昺姪孫王之明曽侍衛東宫家破南奔鴻臚少卿髙夢箕家丁穆虎教之詐稱太子乃下之明中城兵馬司獄越四日復逮夢箕穆虎鞫于午門皆具服亦下刑部獄時都下士民皆以太子為真衆論籍籍謂士英等朋奸導上滅絶倫理黃得功抗疏爭之疏略曰東宫未必假冒先帝子即上子未有了無證明混然雷同者臣恐在廷諸臣諂狥者多抗顔者少即明白識認亦不敗抗論取禍矣命三法司覆訊王之明等遂令燬得功原疏以絶奸謀又傳諭穆虎若非奸人豈敢挾王之明冒認東宫主使附逆實繁有徒著法司窮治蓋士英意在姜曰廣輩也左良玉亦疏請保全東宫以安臣民之心謂東宫之來實有符驗滿朝諸臣但知逢君不惜大體明知窮究並無别情必欲輾轉誅求遂使陛下忘屋烏之德臣下絶委裘之義普天同怨陛下獨與二三奸臣保守天下無是理也親親而仁民願陛下省之江督袁繼咸亦疏言太子真僞非臣所能懸揣真則望行良玉言僞則不妨從容審處多召東宫舊臣辨識以解中外之疑湖撫何騰蛟亦力奏北來太子不可殺謂太子到南何人奏聞何人物色取召至京馬士英何以獨知其僞既是王昺姪孫何人舉發內官公侯多北來之人何無一人確認此事關天下萬世是非不可不慎時以王之明自供甚明命法司將審明節略各諭之而已質實劉正宗安邱人王昺髙陽人尚穆宗女延慶公主髙夢箕河間人明河南婦人有自稱王妃者下獄治之河南有婦人童氏自稱藩邸王妃劉良佐信之巡撫越其杰具儀從送至京以為假冒下童氏錦衣衛獄以前巡撫御史陳潛夫嘗于途次稱臣朝謁亦逮治之中外譁然良佐因言王之明童氏兩案未協輿論懇求曲全兩朝彛倫毋貽天下口實命將獄詞刋布以息羣疑質實童氏福王為郡王時娶妃黃氏卒及為世子娶妃李氏以洛陽陷遇害童氏周府宫人逃難至尉氏縣依福王于旅邸生一子已六嵗福王南奔各不相顧太妃與童氏亦各逃散太妃自河南來陳潛夫奏妃尚在福王不召至是自越其杰所詣宫弗納劉良佐言童氏非假冒馬士英亦言苟非至情所關豈敢自詣宜迎入宫密諭河南撫按護宋皇子來京不聼下童氏錦衣衛獄獄中細書相遇月日及睢州情事甚悉付掌衛馮可宗呈覽棄不視可宗辭審福王命屈尚忠嚴刑拷掠斃之獄中我大清兵定河南大我既定關陜復移師下江南出虎牢關口分兵自龍門軍關及南陽三路同趨歸德克偃城上蔡諸縣所過城邑皆望風欵附遂進取歸德巡按御史凌駉及其從子潤生死之南陽副將李好降河南悉定質實虎牢關開封府汜水縣西龍門關河南府伊水北即伊闕明左良玉舉兵反良玉既與馬士英有隙士英謀築板磯城為西防良諸玉嘆曰今西何所防殆防我耳而黃㴻匿其軍中與將日以清君側為請良玉躊躇弗應㑹王之明事起良玉爭不聽心甚不平㴻欲借此激衆以報己怨召三十六營大將與之盟良玉亦以士英裁其餉益大憾反意遂決乃傳檄逺近以討士英為名復上疏請誅之疏言竊見逆賊馬士英無日不聞其罪狀無人不恨其奸邪先帝皇太子至京道路洶傳陛下屢發矜慈士英以真為假必欲置之死而後快其謀臣自此義不與奸賊共天日矣臣已提師在途將士眦目指髮人人必欲快食其肉臣恐百萬之衆發而難收震驚宫闕且聲其罪狀正告陛下仰祈剛斷與天下共棄之自先帝之變人人號泣士英利災擅權事事與先帝為難欽案先帝手定者士英首翻之要典先帝手焚者士英復修之罪不容于死者一也國家提衡文武全恃名器自賊臣竊柄以來賣官鬻爵殆無虛刻都門有職方賤如狗都督滿街走之謡如越其杰以貪罪遣戍不一年而立升部堂張孫振以賊汚絞犯不數月而夤緣僕少袁洪勳與張道濬皆詔獄論罪者也借起廢例復原官凡此之類直以千計罄竹難書罪不容于死者二也閣臣司票擬政事歸六部至于兵柄尤不得兼握士英已為首輔猶復掌樞是辨髦太祖法度且又引其腹心阮大鋮為添設尚書各操重柄以為呼應罪不容于死者三也陛下選立中宫典禮攸關士英居為竒貨先擇其尤者以充下陳罪通于天而又私買妓女寄養阮大鋮家希圖進選計亂中宫隂謀叵測罪不容于死者五也陛下即位之初恭儉神明士英百計誑惑進優童艷女損傷盛德每對人言惡則歸君罪不容于死者五也國家遭此大難須寬仁慈愛以收人心士英自引用阮大鋮以來睚眦殺人如雷縯祚周鑣等煆鍊周內株連蔓引尤其甚者借題三案深埋陷阱將生平不快意之人一網打盡令天下士民裹足解體罪不容于死者六也九重祕密豈臣子所敢言士英遍布私人凡陛下一言一動無不窺視又募死士竄伏皇城詭名禁軍以觀陛下動靜曰廢立由我罪不容于死者七也率士碎心號痛者先帝殉難皇子猶存授受分明臣前疏已悉士英乃與阮大鋮一手拿定不畏天道神明不畏二祖列宗不畏天下公議不畏萬古綱常忍以先帝已立七年之嗣君為四海謳歌訟獄所歸者付之幽囚天昏地慘神人共憤凡有血氣皆欲寸磔士英大鋮等以謝先帝此非臣之私言諸將士之言也非獨臣標將士之言天下忠臣義士愚夫愚婦之公言也伏乞陛下立將士英等肆諸市朝傳首四方用抒公憤臣等東兵計刻以待不禁大聲疾呼激切以聞疏上遂引兵而東自漢口達蘄州列舟三百餘里士英大懼急命阮大鋮劉孔昭率兵㑹黃得功趨上江堵禦袁繼咸請赦太子以遏止之不聽良玉之發武昌邀總督何騰蛟偕行不可則盡殺城中人劫之騰蛟解印付家人令速走將自剄良玉部將擁去置之别舟乘間躍入江漂十餘里漁舟救之起則漢前將軍關侯廟前也家人懷印亦至相視大驚覔漁舟忽不見人謂騰蛟忠誠得神祐云夏四月明周鍾光時亨伏誅遂殺前禮部郎中周鑣山東按察司僉事雷縯祚先是馬士英以鑣縯祚嘗立主潞王議指為姜曰廣私黨令朱統􅠳劾奏逮治及周鍾光時亨降賊賊敗鍾時亨竄歸南京逮下獄士英復言二人從逆罪應族誅請以鍾從兄鑣從坐阮大鋮亦與鑣有夙憾于是御史羅萬爵王懩等連疏詆鑣縯祚至比縯祚為成濟請亟正西市至是左良玉稱兵人情洶洶而良玉檄中復斥其搆陷鑣縯祚狀士英等益怒因謂鑣實召良玉兵遂戮鍾及時亨而賜鑣縯祚自盡質實羅萬爵蕪湖人明微劉良佐等將兵入援左兵將至馬士英急調良佐等入衛劉澤清亦以勤王為名太掠而東時史可法以大清兵將及淮南連疏告警福王謂上游急則赴上遊北兵急則赴北兵可法以為上遊不過除君側之惡大原不敢為難若都不保乃移書士英懇其選將添兵清兵一至則南而士英惟以左兵為急時大理寺卿姚思孝御史喬可聘成友謙亦請毋撤江北兵亟守淮揚士英厲聲曰若輩東林猶藉口防江欲縱左逆入犯耶北兵至猶可議欵左逆至則若輩髙官我君臣獨死耳力排思孝等議淮揚備禦益弱質實姚思孝歙縣人喬可聘寶應人成友謙南通州人明左良玉死于九江良玉至九江邀袁繼咸入舟中語及太子下獄事大哭因袖出密諭邀諸將盟繼咸正色曰先帝舊德不可忘今上新恩亦不可負良玉色變乃改檄為疏駐軍候㫖繼咸歸方謀拒守而部將郝效忠隂納良玉兵入城殺掠縱火殘其城而去而良玉已疾篤望城祕中火光太息曰吾負臨侯嘔血數升遂死其子夢庚不發喪諸將共推為帥留七日而東兵勢尚盛自彭澤以下皆陷黃得功方駐軍荻港進拒夢庚于銅陵破之解其圍阮大鋮等日虛張捷音以邀爵賞得功尋復敗其衆于板子磯乃封得功靖國公命移家太平一意防禦良玉後營總兵惠登相本降寇過天星感良玉恩有忠實心方諸將自九江東下連陷郡縣獨池州不破貽書言留待後軍登相大詬曰若此則反不如我前為流賊時矣如先帥末命何撤其軍返夢庚索輕舸追之相見大慟登相以夢庚不足事遂引兵絶江去諸將乃議還軍而大清兵已至衆北夢庚遂執袁繼咸及安慶巡撫張亮偕黃澍率歸附亮乘間赴水死繼咸北行亦不屈死質實袁繼咸字季通臨侯其别號也人本朝乾隆四十一年追諡忠毅張亮內江本乾隆四十一年追諡忠節我大清兵克泗州我定國大將軍豫親王多鐸等領軍自歸德府起行潁州太和悉下兵未至泗州二十里遣將先奪泗北大淮河橋守將焚橋遁走我餘里不及我豫親王遣將兵遂夜渡淮翌日追五十大率師至揚州城北獲船百餘艘是日城南獲船二百兵拒揚州城二十里列營又至揚州大餘艘于是州城下兵遂薄揚我大清兵克揚州明督師兵部尚書兼大學士史可法等死之大可法初聞將移軍泗州防護祖陵輜重已發而左良兵日南下玉稱兵召之入援渡江抵燕子磯黃得功已破良玉軍可法乃趨天長檄諸將救盱眙俄聞盱眙已降大清泗州援將侯方巖敗殁可法一日夜奔還揚州訛傳許定國兵將至殱髙氏部曲城中人悉斬關出舟楫一空可法檄各鎮兵無一至者獨總兵劉肇基自白洋河趨赴請背城一戰可法持不許先是我大清兵屯斑竹園招諭可法及衛允文等降不從總兵李棲鳳監軍副使髙岐鳳拔營出降城中藝益單諸文武分陴拒守舊城西門險要可法自守之作書寄母妻且曰死葬我髙皇帝陵側及我大清兵薄城下用巨炮擊城西北隅城遂破可法自刎不殊一參將擁可法出小東門既就執可法大呼曰我史督師也乃殺之劉肇基分守北門發炮傷圍者及城破率所部四百人巷戰格殺數百人後騎來益衆力不支與副將乙邦才馬應魁莊子固汪思誠等皆死衛允文及在籍侍郎張伯鯨運使揚振熙知府任民育同知曲從直王纘爵知縣周志畏羅伏龍吳道正縣丞王志端副總兵樓挺汪應龍李豫參將陶國祚許謹馮國用陳光玉李隆徐純仁逰擊李大中孫開忠都司姚懷龍解學曽及幕客盧渭歸昭等皆死之員外郎何剛庶吉士吳爾勳皆參可法軍事城破亦投井死其他諸生髙孝纘王士琇王纘王績王績又有武生戴之藩醫者陳天拔畫士陸愈義兵張有德市民馮應昌舟子徐某及婦女死節者不可勝紀時福王命劉澤清往援揚州而澤清已潛謀輸欵我大清惡其反覆磔誅之以史可法死覔其遺骸天暑蒸變不可識踰年家人袍笏招魂葬于揚州郭外之梅花嶺質實梅花嶺在揚州府新城廣儲門外一名士山白洋河在桃源縣西白洋鎮即潼水之下流也史可法為修墓葺祠本朝乾隆四十一年追諡忠正並御題其畫像詩刻石祠中劉肇基贛榆人侯方巖里系貴無考乙邦才青州人戰敗自刎死馬應魁字守卿池人巷戰死莊子固字憲伯遼東人屯徐州聞揚州城被圍馳救城破欲擁史可法出城格門死汪思誠城破殉節死衛允文赴水死張伯鯨江都人與當事分守城城破自縊死揚振熙臨海人城破殉節死任民育城破著緋衣安坐堂上就殺闔門赴井死曲從直興其子守東門城破不屈死王纘爵鄞縣人城破殉節死周志畏城破闔門俱死羅伏龍新喻人代周志畏城破殉節死吳道正餘姚人王志端孝豐人城破俱殉節死樓挺汪應龍李豫陶國祚許謹馮國用陳光玉李隆徐純仁李大中孫開忠姚懷龍解學曽里系俱無考諸人從史可法守城城破巷戰死盧渭字渭生長洲人在史可法幕投水死歸昭崑山人在可法幕守西門城破亦殉節死何剛字慤人上海人吳爾塤崇德人俱投井死髙孝纘王士琇王纘王績戴之藩俱揚州人城破殉節死陳天拔陸愈張有德馮應昌徐某俱揚州人城破殉節死本朝乾隆四十一年追諡劉肇基忠烈張伯鯨任民育何剛俱忠節乙邦才馬應魁莊子固曲從直周志畏樓挺江應龍李豫陶國祚許謹馮國用陳光玉李隆徐純仁李大忠孫開忠姚懷龍解學曽俱烈愍羅伏龍吳道正王志端揚振熙汪思誠侯方巖王纘爵俱節愍盧渭陸愈歸昭髙孝纘王士琇王纘王績王續戴之藩陳天拔張有德馮應昌徐某俱入祠五月我大清兵渡江大是月丙戍日我鄭鴻逵鄭彩以水師守瓜州副使楊清兵臨江總兵文驄駐金山扼大江而守㑹王擢文驄常鎮巡撫兼督沿海諸軍文驄乃還駐京口合鴻逵等兵南岸與大清兵隔江相持燈火夜放之中流南岸軍發炮石以大清兵編大筏置大為獲勝也日奏捷己丑夜我留舟師北岸敵至則以清兵乘霧潛濟陸續引渡又炮夾攻之及迫南岸明諸軍始知倉皇列陳甘露寺鐵騎蹙之悉潰蘇松巡撫霍達及文驄俱走蘇州鴻逵等縱兵大掠遁還閩中質實霍達長安人明福王出奔太平京口敗走奔還南京大震福王猶酣宴至夜半跨馬黔自通濟門出走遂奔太平劉孔昭斬關遁馬士英以兵四百人為衛挾福王母妃走浙江亂兵入獄擁王之明立之時黃得功方收兵屯蕪湖福王潛入其營得功驚泣曰陛下死守京城臣等猶可盡力奈何聽奸人言倉卒至此且臣方出戰安能扈駕王曰非卿無可仗者得功泣曰願效死英馬士英走浙江道廣德知州趙景和閉門拒守士攻破執景和殺之大掠而去走杭州守臣以總兵府為母妃行宫未幾阮大鋮亦自上江逃至及大兵平杭州士英欲謁魯王魯王諸臣力拒之士英與大鋮俱走嚴州方國安營國安士英同鄊也大鋮在營掀髯指掌日談兵國安甚喜而士英則以南渡之壞半由大鋮而已居惡名頗以為恨已而我大兵擊敗士英國安士英國安帥衆渡錢塘又窺杭州大兵擊敗之溺江死者無算士英擁殘兵欲入閩唐王大以罪大不許明年我誅之大鋮赴江干乞降從兵𠞰湖賊獲士英即大兵攻仙霞關僵仆石上死或曰士英遁至台州山寺為僧為我兵搜獲大鋮國恩先後降後得士英大鋮國安請唐王出關為內應疏遂駢斬士英國安于延平城大鋮自觸石死仍戮尸云福王母妃鄒氏被士英挾至浙江後有福王妃兄黃調鼎迎王母妃養于洛數年鄒乃卒調鼎葬之質實黃調鼎福王時官左都督趙景和錢塘人愍本朝乾隆四十一年追諡節我大清兵定南京大軍營城北明總督京營欣城伯趙之龍奉表納欵勳戚則魏國公徐州爵駙馬齊贊元靈璧侯湯國祚安逺侯栁祚昌等大臣自大學士王鐸禮部尚書錢謙益等文武數百員并城內官民迎降興平伯髙傑子元照廣昌伯劉良佐等亦于沿途歸附得馬步兵二十三萬八千三百豫親王奏聞我章皇帝以既平河朔旋定江南世祖詔行祭告大赦事而中時刑部尚書高倬行人司行人陸培大兵遂入屯城吏部尚書張捷副都御史楊維垣皆死之而庶寮殉難者則有儀制司主事黃端伯户部郎中劉成治戶部主事吳嘉允中書舍人龔廷祥欽天監博士陳于階青陽知縣龎昌允南昌知縣劉曙等其諸生布衣死者則又有文乘吳可箕金璽馬純仁陳士達等質實徐州爵宏基之子齊贊元尚光宗女遂平公主髙倬忠州人為御史有聲福王時議裁冗員不納南都破投繯死陸培錢塘人奉使歸值南京破以繩授二僕就縊死南本朝乾隆四十一年俱追諡忠節黃端伯新城人都破令降不屈死本朝乾隆四十一年追諡烈愍劉成治漢陽人南都破趙之龍將降封户部庫成治手搏之還寓自縊死吳嘉允華亭人奉使出都聞城破謁方孝孺祠自縊死龔廷祥無錫人南都破衣冠步至武定橋投水死陳于階上海人以史可法薦為博士南都破自縊死龎昌允西充人南都破走九華山謀舉兵事泄殉節死劉曙長洲人由進士授官未行南都破殉節死孟本朝乾隆四十一年俱追諡節愍文乘吳縣人震子南都破殉節死吳可箕休寧人南都破自縊雞鳴山黃金璽江寧人謀募兵守禦南都破扼吭死馬純仁六合人南都既下六合歸附題橋柱抱石沈死陳士達上元人南都破殉節死本朝乾隆四十一年俱入祠我大清兵至蕪湖明總兵田雄劫福王由嵩以降靖國公黃得功死之明亡大南京既定我軍豫親王多鐸遂遣官兵及降將劉良清定國大將大佐等襲太平福王復走蕪湖我兵趨擊之福王登舟欲渡江走大兵據江口截其去路黃得功以戰荻港時傷臂衣葛衣以帛絡臂佩刀坐小舟方督麾下八總兵結束前迎戰而良佐大呼岸上招降得功怒叱曰汝乃降乎忽飛矢至中其喉左偏得功知不可為擲刀拾所拔箭刺吭死其妻聞之自經死總兵翁之琪亦投江死田雄遂挾福王以降所屬總兵及部衆俱降我大兵執福王至南京改南直𨽻為布政司以應天府為江寧府郡縣無不歸附江南悉定我豫親王遣貝勒大博洛等統兵趨浙江持檄招撫閠六月夜渡錢塘江兵至杭州敵兵分兩路拒戰擊敗之乘大逃竄我江岸駐營敵兵見之以為江潮朝夕有信江兵追至岸之營必皆被淹而江潮連日不至闔郡驚為神助明潞王朱常淓遂率衆開門納欵浙江悉平時闖賊李自成既遁英親王阿濟格率兵追𠞰自成走死肅親王豪格𠞰擊流賊張獻忠屢經敗竄尋射殪之餘賊並陸續掃蕩其福建江西湖廣四川兩廣貴州雲南各省我大清以次平定海宇咸歸一統矣質實黃得功桓本朝乾隆四十一年追諡忠翁之琪錢塘人本朝乾隆四十一年追諡忠節發明明季自流賊禍熾莊烈殉社稷太子二王不知所終其正統已失矣福王擁立江左使稍能奮志有為或如宋髙南渡延明祚于一線乃政歸馬阮四鎮交訌不亡何待唐王擅權于芝龍桂王藝敗于五虎流賊竄走旋抵蹙亡益復何足比數我大清應運而興江南既下九宇蕩平一時親臣藎臣同心戮力肇立丕基溯自我世祖章皇帝順治元年四月定北都以來久垂大一統之盛皇上權衡百代以明福王比建炎之例于蕪湖就執始書明亡存勝國之餘分益以彰怙冒之無外聖朝勳德逺邁千古矣御定資治通鑑綱目三編卷四十
