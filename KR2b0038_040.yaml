body:
  text: 起辛未明莊烈崇禎四年盡癸酉明莊烈崇禎六年凡三年辛未四年春正月延綏飢延綏連嵗大䘲于是職方郎中李繼貞請發帑金糴米輸軍前且令四方贖鍰及捐納事例者輸粟于邊以撫飢民又言兵法撫𠞰並用非撫賊也撫飢民之從賊者耳今斗米四錢已從賊者猶少未從賊而勢必從賊者無窮請如神宗時特遣御史振濟故事齎三十萬石以往安輯飢民使不為賊以孤賊勢帝感其言遣御史吳甡以十萬金往振繼貞少之帝不聽甡至延綏用西安推官史可法主振事因諭散賊黨帝聞即命甡邇按陜西質實李繼貞字徴尹太倉州人吳甡字鹿友興化人史可法字憲之大興籍祥符人三月楊鶴招撫流賊于寧州尋復叛神一元聞杜文煥軍且至遂棄寧塞陷保安延安告急巡撫練國事檄賀虎臣及副將李卑援𠞰虎臣等進圍保安賊引河套數千騎挫虎臣軍㑹定邊副將張應昌以兵至破斬一元賊衆棄城去復推一元弟一魁為渠帥轉攻慶陽分兵陷合水知縣蔣應昌被執張應昌偕杜文煥趨戰慶陽圍解時楊鶴移駐寧州一魁求撫歸所執蔣應昌别賊拓先齡金翅鵬過天星田近仁獨頭虎上天龍等亦先後降鶴設御座于城樓賊跪拜呼萬嵗因宣聖諭令設誓或歸伍或歸農賊佯許之立赦其罪鶴以一魁最强致其壻帳中同卧起一魁果至數以十罪一魁伏謝即宣詔赦之升以官處其衆四千餘人于寧塞文煥聞之歎曰寧塞之役賊畏我而逃今者賊僞降楊公信之借名城為盜資吾尚可家于此乎遂以其族行未幾鶴移駐耀州别賊攻破金鎖關殺都司王廉李老柴獨行狼復攻陷中部降賊田近菴以六百人據馬欄山應之而一魁之黨茹成名者尤桀驁鶴令一魁誘殺之于耀州賊黨猜懼挾一魁以叛勢復熾一魁後為張應昌部將所得誅死或曰官兵攻之急其黨黃友中斬一魁獻于軍門質實定邊副總兵嘉靖四十一年設分守安定鎮靜等處提調大墻及墻口等處寧州北魏定安縣唐為寧州治元省縣入州明屬慶陽府保安宋保安軍金改縣尋升州元仍降縣明屬延安府今並因之耀州唐置明屬西安府今升直𨽻州金鎖關在同官縣北三十里神水峽明嘉靖三十年築關城馬欄山亦在同官縣北三十里或謂即晉隋之馬蘭山誤晉郡尉張光所戍及隋地理志所謂馬蘭山者别在今白水縣西北練國事字君豫永城人李卑字待平榆林人張應昌遼東總兵官承廕之子王廉本朝乾隆四十一年追諡節愍皮島參將劉興治作亂先是毛文龍死袁崇煥分其兵二萬八千為四協命文龍子承祚副將陳繼盛參將徐敷奏逰擊劉興祚主之後改為兩協繼盛領東協擢興祚弟興治為參將攝西協興治凶狡好亂與繼盛不相能㑹其兄興祚陳亡繼盛誤聽諜報謂未死興治憤擇日為興祚治喪諸將咸往弔繼盛至伏兵執之並執理餉經厯楊應鶴等十一人袖出一書宣于衆詭言此繼盛誣興祚詐死及以謀叛陷己者遂殺繼盛及應鶴等又僞為島中商民奏一通請優恤興祚而今興治鎮東江舉朝大駭以海外未遑詰也興治與諸弟兄放舟長山島大肆殺掠登萊巡撫孫元化請弭變乞以都督僉事黃龍為總兵官往定興治亂龍蒞皮島受事興治猶桀驁如故至是遂擁衆作亂突入參將沈世魁家盡戮其孥世魁走免夜率所部襲之殺興治亂乃定而其黨都司耿仲裕復相繼作亂仲裕者登州逰擊仲明弟也仲明所善禆將李梅以通洋事覺龍繫之獄仲裕在龍軍仲明在元化軍仲裕受仲明指激其部卒假索餉名圍龍署擁至演武場割其耳鼻將殺之諸將為救免未幾捕斬仲裕疏請正仲明罪元化庇仲明劾龍尅餉致兵譁帝命龍戴罪視事而飾撫按官核仲明主使狀質實長山島在登州東四十里孫元化字初陽嘉定縣人黃龍耿仲明劉興治皆遼東人夏四月旱敇羣臣修省極言時政得失于是給事中魏呈潤疏言驛站所裁才六十萬未足充軍餉十一而郵傳益疲藝必再編里甲是猶剜肉醫瘡瘡未瘳而肉先潰關外舊兵十八萬額餉七百餘萬今兵止十萬七千合薊門援卒非溢原數加派七百九十萬外新增又百四十餘萬猶憂不足可不為稽核乎邊事日棘非臣子言功之時而詭捷冒功躐加峻秩門客厮養竄名戎籍不階而升悉縻俸料臣懼其難繼也江淮旱灾五湖之間海岸為谷舊榖不登新絲未熟上供織造宜且暫停銓法壞于事例正途日壅不可不疏通撫按諸臣捐資助餉大扺索之民間顧奉急公之褒上蒙而下削不可不禁飭又條陳數策請大修北方水政帝皆納其言卒不果行質實魏呈潤字中嚴龍溪人副總兵曹文詔敗賊于河曲山西自河曲至蒲津千五百里與陜西接壤河最狹賊渡河往來無定王嘉允既擊敗王國梁于河曲遂久據其城文詔圍之六月嘉允乃棄城走復自嶽陽突犯澤潞轉掠至陽城南山文詔追及之其下斬以降文詔以功擢臨洮總兵官㑹巡撫練國事副將張全昌連破㸃燈子于郃陽韓城敗竄入山西文詔追之及于稷山諭降七百人㸃燈子遁去于是秦賊之流入晋者略定自秦賊初起延綏以北為逃軍為邊盜延綏以南為土寇為飢民邊盜則王嘉允土寇則王左掛為羣賊魁至是左掛嘉允相繼殄滅洪承疇張應昌敗不沾泥于葭州王承恩破王虎金翅鵬于宜川陜西都司曹變蛟殱寧塞遺賊于唐毛山連戰皆捷混天猴等謀襲靖邊應昌邀擊之真水川承疇復追躡之甘泉楊鶴興承恩𠞰上天龍等于鄜州又皆敗之賊敗則求撫既撫則旋逸去故秦中賊迄未平而嘉允餘黨復推王自用為賊渠即所稱紫金梁者是也自用結羣賊老回回曹操八金剛掃地王射塌天閻正虎滿天星破甲錐邢紅狼顯道神混世王黑煞神等及髙迎祥張獻忠皆聚于晉過天星諸賊亦自秦來㑹共三十六營衆二十餘萬闖將李自成乃自此起矣自成為迎祥甥世居米脂懷逺堡與張獻忠同嵗生幼牧羊長充銀川驛卒善騎射鬬狠無賴里中人苦之謬推為里長數犯法知縣宴子賓將置諸死脫去為屠尋殺人偕兄子過亡命投甘督所部將王國為卒㑹國奉調過金縣兵譁自成忽起縳縣官索餉國止之并殺國走依于迎祥迎祥擁闖將八隊一眼錢兒二㸃燈子三李晉王四蝎子塊五老張飛六亂世王七夜不收置自成于其末猶未有名質實蒲津關在永濟縣黃河西岸一名臨晉關跨陜西地又有蒲津橋在縣西門外唐六典曰造舟之梁四蒲津其一也陽城唐置明屬澤州今屬澤州府稷山隋置明屬絳州以𨽻于平陽府今升絳州為直𨽻州縣仍屬焉郃陽漢縣明屬同州以𨽻于西安府今屬同州府唐毛山在保安縣西北近靖邊縣元塞堡靖邊宋為西夏地明置靖邊營東本朝雍正九年置縣屬榆林府真水川在甘泉縣西魏置真川縣于此隋大業廢入臨真縣故又謂之臨真鎮甘泉唐初置伏鹿縣天寶時改甘泉明屬延安府今因之懷逺堡元為米脂縣地明天順中置懷逺堡西本朝雍正九年改縣屬榆林府銀川驛在米脂縣一百步明洪武初置張全昌遼東總兵官承廕次子曹變蛟文詔兄子六月錢象坤罷象坤溫體仁門生也體仁入遂讓而居其下然無所附和及是御史水佳允劾兵部尚書梁廷棟廷棟不待㫖即奏辨廷棟故出象坤門佳允疑象坤泄之語侵象坤周延儒惡廷棟並惡象坤象坤遂引疾歸廷棟落職質實水佳允鄞縣人秋八月我大清兵圍大凌城遼東巡撫邱禾嘉議築廣寧義州右屯三城孫承宗謂廣寧道逺當先據右屯築城大凌河以漸而進兵部尚書梁廷棟力主之遂以七月興工命總兵官祖大夀副將何可綱以兵四千據其地發班軍萬四千人築之護以石砫土兵萬人工垂成廷棟罷去廷議大凌荒遠不當城撤班軍赴薊責鎮撫矯舉令回奏大禾嘉懼盡撤防兵留班軍萬人以守時我夀等興城清以方吉納等議和方欲遣使定約聞大工為拒守計乃于是月丁未發兵薄大凌城掘濠樹柵四面圍合别遣一軍截錦州大道城外堠臺皆下城中兵出悉敗還承宗禾嘉聞之馳至錦州禾嘉親率師與總兵官吳襄宋偉合軍赴援離松山三十里大與兵遇大戰長山小凌河間禾嘉等敗收軍還錦州清大我追擊至城下禾嘉軍墮濠死者甚衆太僕少卿張軍春復監襄偉軍過小凌河五里築壘列車營為大凌河聲援進次長山距城十五里大清兵以二萬騎逆戰火器競發聲震天地我右翼軍衝入春營春軍敗襄及參將桑噶爾寨等先遁春收潰衆立營時風起黑雲見春乘風縱火火甚熾天忽雨反風春部率多焚死少頃雨霽兩軍復鏖戰偉力不支亦走春及諸將張鴻謨楊華徵薛大湖等三十三人俱被執副將張吉甫滿庫王之敬戰沒部卒死者無等祖大夀堅守不敢出城援自此絶至冬大凌糧盡食人馬我大清屢諭招大夀大夀及諸將皆欲降何可綱不從大夀令二人掖可綱出城外殺之遂與副將張存仁等大降于我言妻子在錦州請歸設計誘降守者遂縱歸清大夀大夀入錦州未得間而禾嘉知其納欵狀具奏聞于朝帝于大夀欲羈縻之置不問張春既見執諭之降春曰忠臣不事二君禮也我若貪生亦安用我遂不食屢賜以酒饌春仍不食守者懇勸感從居古廟衣舊日中服迄太宗文皇帝恩始一食令剃髮不不失臣節而死朝廷聞春守志遙遷右副都御史恤其家春妻翟聞之慟哭六日不食自縊死春未死時大我有議和意春為言之于朝朝中譁然詆春誠意伯清劉孔昭劾春敗降不忠請削其所授憲職朝議雖不從而有司繫其二子死于獄質實大凌城在錦縣東四十里周三里有竒門一長山在錦縣東南十八里峰巒綿亘四山錯列因名邱禾嘉新添衛人吳襄遼東中後所人張春字泰宇同州人何可綱廉勇善撫士卒被害時顔色不變亦不出一言含笑而死滿本朝乾隆四十一年追諡春可綱忠節張吉甫庫王之敬烈愍劉孔昭誠意伯基十二世孫何如寵罷如寵官禮部時貧宗婚嫁格于有司者千餘人用如寵言獲婚嫁者千餘帝欲族袁崇煥以如寵言得免及入閣為周延儒溫體仁所扼連疏乞罷歸九月復遣太監王應朝等監視諸邊軍餉張彛憲總理户工二部帝初即位時鑒魏忠賢禍敗盡撤諸鎮守中官委任大臣既而廷臣競門户兵敗餉絀不能贊一策乃思復用近侍至是遂遣王應朝監軍關寧王坤劉文忠劉允中監視宣大山西軍馬又遣張國元往薊鎮東協王之心中協邵希韶西協而以彛憲有心計令鈎校户工二部如涂文輔故事為之建署名曰户工總理其權視外總督內團營提督焉給事中宋可久馮元飇等十餘人論諫不納吏部尚書閔洪學率朝臣具公疏爭帝曰苟羣臣殫心為國朕何事乎內臣衆莫敢對彛憲遂按行兩部踞尚書上命郎中以下謁見工部侍郎髙鴻圖不為下抗疏乞歸削籍去工部主事金鉉戒同官無私謁彛憲愠甚假他事誣劾之落鉉職彛憲日益驕縱故勒邊鎮軍器不發管盔甲主事孫肇興恐稽滯軍事因劾其誤國帝命回奏罪至遣戍南京御史李曰輔禮部主事周鑣皆先後以諫被斥彛憲遂希㫖上言天下逋賦至一千七百餘萬請遣官督徵給事中范淑泰疏爭不聽于是催徵酷急民益起從盜時中璫勢復大振王坤至宣府甫踰月即劾巡按御史胡良機帝落良機職命坤按治給事中魏呈潤爭之亦謫外坤性狂躁敗言朝中大吏有欲倚之相傾擠者于是抗疏劾修撰陳于泰謂其盜竊科名語侵周延儒給事中傳朝佑言坤妄干彈劾之權且其文詞練達機鋒排激必有隂邪憸人主之其意指溫體仁帝置不問左副都御史王志道言近者內臣舉動幾于手握皇綱而輔臣終不敢一問至于身被彈擊猶忍辱不言何以副明主之知皆備責延儒欲以動帝帝怒削其籍帝方一意用內臣故言者多得罪至八年八月始下詔撤還監視總理然其後卒用髙起潛輩典兵監鎮以迄于亡質實宋可久膠州人馮元飇字爾􅌢慈溪人髙鴻圖字研文膠州人金鉉字伯玉武進人李曰輔字元卿南昌人周鑣字仲馭金壇人范淑泰字通也滋陽人胡良機字省之南昌人陳于泰宜興人傅朝佑字右君臨川人王志道漳浦人發明莊烈手誅逆閹盡撤鎮守中官一反天啓間濁亂之政可謂舉錯得其正矣乃是時將驕卒惰疆事日隳而在廷諸臣惟知門户紛糾無復殫心國事致使若輩復得逞志諸臣之罪自無可逭然使莊烈振作有方賢奸有别廷臣黨援之習豈難破除即諸臣之中亦豈無可委任顧計無所出遂思復用宦官是明知覆轍之在前而甘心蹈之後車之覆不待明者而知之矣及朝臣疏爭復以此面加詰責豈竟以任用內堅謂足以破朝黨乎卒之奸閹肆橫國是愈非自速其亡而不之悟又誰之咎也夫楊鶴有罪下獄以洪承疇總督三邊軍務李老柴獨行狼既陷中部巡撫練國事總兵官王承恩攻之數月未下慶陽賊郝臨菴等復往援之總兵官賀虎臣擊斬其魁劉六㑹文詔西旋與榆林參政張福臻合𠞰馘老柴及其黨一條龍餘黨突圍走副將張鴻業逰擊李明輔戰死先是朝廷得鶴報言慶陽賊就撫散遣俱盡旋聞中部陷久不下御史謝三賓因劾鶴欺罔謂中部之賊寧自天降疏下巡按御州史吳甡覆奏甡奏鶴主撫誤國帝怒逮鶴下獄戍袁詔承疇代為總督承疇既奉命檄文詔與逰擊左光先崔宗允李國竒分𠞰綏德冝君清澗米脂賊先後四戰皆大捷掃地王授首而延安賊趙四兒者自稷山敗遁潛竄山谷中比聞文詔還陜乘間糾合餘黨勢復振都司王世虎守備姚進忠敗歿四兒遂擁衆六千餘人屯石樓山中西距河三十里綏德知州周士竒守備孫守法偵其不備東渡河襲之賊四走承疇乃以陜西賊委承恩而自率兵追賊于山西賊且走且掠沁水縣東北有竇莊前巡按遼東御史張銓里居也銓父五典度海內將亂築所居竇莊為堡堅甚及是流賊至五典已歿銓子道濬以錦衣僉事官京師獨銓妻霍氏在衆請避之曰避賊而出家不保出而遇賊身更不保等死耳盍死于家乃率童僕堅守賊環攻四晝夜不克而去副使王肇生名其堡曰夫人城鄉人避賊者多賴以免承疇既入晋逐賊追及之大戰賊連敗擒斬趙四兒趙四兒者即賊中所稱㸃燈子也承恩亦以計斬陜賊談雄于是張獻忠羅汝才皆懼詣承疇降承疇遂還陜而擊走不沾泥張存孟于安定秦晉賊少戢未幾獻忠汝才復叛入山西偕羣賊焚掠如故而陜西降賊混天猴勾賊陷甘泉殺知縣郭永固參政張允登督餉至其地力禦不敵死踰月陷宜君又陷葭州僉事郭景嵩死之是時總兵官孫顯祖擊賊山西數敗之萬泉河津聞喜六戰皆捷而承疇聞甘泉之變與承恩往來關中奔擊日不暇給矣質實宜君東晉時苻秦置宜君護軍後魏置縣明屬鄜州以𨽻于延安府今升鄜州為直𨽻州縣仍屬焉沁水隋置明屬澤州今屬澤州府竇莊在沁水縣東北萬泉唐縣明屬蒲州以𨽻于平陽府今屬蒲州府郭永固絳州人張允登漢州人本朝乾隆四十一年追諡允登及王世虎姚進忠烈愍永固及張鴻業李明輔郭景嵩節愍冬十月辛丑日有食之十一月罷大學士孫承宗長山之敗廷臣交章論承宗禾嘉築城起釁承宗連疏引病歸禾嘉先已調南京太僕卿遂還京亦引病歸已而言者追論承宗喪師辱國竟奪官承宗復列上邊計十六事帝報聞而已閏十一月登州遊擊孔有德等反有德與耿仲明李九成皆毛文龍部曲文龍死走入登州登萊巡撫孫元化官遼久孫承宗袁崇煥俱辟為贊畫以寧前兵備推巡撫素言遼人可用乃用有德仲明為逰擊九成為偏禆且多收遼人為牙兵大凌圍急部檄元化發徑卒泛海趨耀州為聲援有德詭言風逆改從陸赴寧逺十月晦有德及九成子千總應元統千餘人以行經月抵吳橋天大雨雪衆無所得食新城邑紳王象春者有莊在吳橋有德兵屯其地卒或攫雞犬以食王氏子怒訴之有德有德笞卒以狥衆大譁九成先齎銀市馬塞上用盡無以償適至聞衆怨遂與應元謀劫有德為亂有德從之還兵大掠陷陵縣臨邑商河殘齊東圍德平既而舍去陷青城新城而新城受禍尤酷知縣秦三輔訓導王協中舉人王與䕫張儼然並死難以釁由王氏焚殺甚慘巡按御史王道純聞變移書山東巡撫余大成令討捕大成不信再促之遂託疾請告不得已遣兵往禦則皆敗而走大成恐遂定撫議而元化軍亦至興大成皆力主撫檄賊所過州縣無邀擊總兵官張可大率兵赴𠞰元化檄止之不聽次萊州遇元化復為所阻乃偕還登州嵗將晏有德暮薄城可大請擊之元化持撫議不許可大陳利害甚切元化期明嵗元日發兵合擊至期元化兵不發明日始發兵合可大兵擊賊戰城東可大兵屢勝元化部卒皆遼人親黨多無鬬志其將張燾先走可大兵亦敗中軍管維城逰擊陳良謨守備盛洛姚士良皆戰死燾兵半降賊賊遣歸為內應元化開門納之可大諫不聽時仲明領元化中軍方以弟仲裕作亂皮島朝廷將治其主使罪日懷叛志夜半賊至城仲明與都司陳尤福等舉火導賊自東門入城遂陷可大守水城撫膺大慟解所佩印付部卒間道走濟南上之還署辭母令弟可度子鹿徵奉母航海趨天津以佩劍殺其妾陳氏遂自縊元化自刎不殊與同城僚屬鄊官張瑶悉被執惟參將馬驄及瑶不屈死有德乃推九成為主已次之仲明又次之用巡撫關防檄州縣取兵餉令元化移書大成求撫曰畀以登州一郡即解大成聞于朝道純憤抗疏力爭帝革元化大成職候勘而以謝璉徐從治代即命道純監其軍元化尋為賊縱航海歸與大成俱下獄大成論戍元化論死首輔周延儒謀脫其死不得則援其師徐光啓入閣共圖之卒不得與張燾同棄市質實吳橋金析將陵縣吳川地置明屬景州以𨽻于河間府今徑屬河間府新城元析長山縣驛臺地置明屬濟南府今因之青城元以鄒平之青平鎮置明屬濟南府今屬武定府秦三輔三原人余大成江寧人張可大字觀甫應天人事聞贈特進榮祿大夫太子少傅諡莊節賜祭葬豫世廕建祠曰旌忠馬驄㑹稽人本朝乾隆四十一年追諡張瑶忠節張可大馬驄節愍管維城陳良謨盛洛姚士良烈愍王協中等並入祠壬申五年夏五月以禮部尚書鄭以偉徐光啓並兼東閣大學士預機務以偉讀書過目不忘而不能票擬章疏有何况二字誤以為人名也擬㫖提問帝駁改始悟自是詞臣為帝所輕遂諭館員須厯外僚而閣臣自是不専用翰林先啓雅負經濟才有志用世及入閣年已老周延儒溫體仁専政不能有所建白六月京師大雨水時淫雨損山陵昌平地動給事中李世祺上言日者輔理調燮無聞精神為固寵之用統軍衡才無術緩急無可恃之人中樞决策掩耳盜鈴主計持籌醫瘡剜肉州縣迫功令鞭策不前六曹窘簿書救過不贍簪筆執簡之臣接跡囹圄考槃薖軸之士抗聲鴻舉一人議疑及衆人一事訾疑及衆事黃衣之使頡頏卿二之堂貂蟬之座雄踞節鉞之上低眉則氣折强項則釁問各邊監視之遣已將期月初雖間有摘發尋亦同歸模稜效不效可概見伏願撤回各使以明隂不干陽之分然後採公論以進退大臣酌事情以衡量小臣釋疑忌之根開功名之路庶天變可回時艱可濟帝以借端瀆奏切責之質實李世祺字夀生青浦人秋七月以太監曹化淳提督京營戎政初帝遣中官張彛憲總理户工二部即命唐文征提督京營戎政至是以化淳代之後李自成犯闕化淳開廣寧門納之京師遂陷八月總兵官曹文詔等連敗賊于平京慶陽降賊混天猴既勾可天飛等連陷甘泉冝君葭州率衆夜突至鄜州兵備副使郭應響登北關集士卒守禦手殺三賊力不支遂死洪承疇王承恩分道𠞰賊賊聞官軍至輒奔竄甫退旋出剽掠延安慶陽諸屬邑多殘破而别賊紅軍友李都司杜三楊老柴者神一魁餘黨也屯鎮原將犯平凉巡撫練國事檄甘肅總兵官楊嘉謨副將王性善扼之賊走慶陽文詔從鄜州間道至與嘉謨性善合大戰西濠斬千級生擒杜三楊老柴餘黨糾他賊破華亭攻莊浪文詔嘉謨掩擊之賊走盤龍山逰擊曹變蛟馮舉劉成功平安等譟而上賊潰走性善及甘肅副將李鴻嗣參將莫與京等復以兵至共擊斬五百二十餘級嘉謨變蛟躡賊後夾擊又屢敗之賊餘衆數千欲奔漢南為逰擊趙光遠所遏乃由長寧驛走張家川其逸出清水者副將蔣一陽遇之敗都司李宫用被執文詔計剪其渠魁則羣賊可以次撲滅乃縱反間紿其黨殺紅軍友遂蹙敗之水落城追至靜寧州賊奔據唐毛山變蛟先登殄其衆時混天猴可天飛郝臨菴劉道江為承恩所敗亦潰而西獨行狼李都司等走與合勢復振連兵圍合水文詔往救賊匿精鋭以千騎逆戰誘扺南原伏大起城上人驚相告曰曹將軍歿矣而文詔持矛左右突匹馬營萬衆中諸軍望見皆出擊賊大敗僵尸蔽野餘衆走銅川橋文詔率變蛟嘉謨及參將方茂功等追及之大戰陷陳賊復大敗參將李卑馬科又破之延水關斬首六百二十餘級其地東限黃河賊溺死者無算科部卒斬混天猴以獻尋文詔與寧夏總兵官賀虎臣固原總兵官楊麒破賊虎兕凹麒窮追數百里所俘獲甚衆㑹洪承疇擊斬可天飛李都司于平凉降其魁白廣恩餘賊分竄者文詔追蹙之錐子山其黨殺獨行狼郝臨菴以降承疇戮四百人餘皆散遣李卑擊賊固原復斬其魁薛仁貴等關中巨寇略盡文詔在陜大小數十戰巡撫范復粹論奏首功第一而洪承疇抑不叙巡按御史吳甡上疏推奬甚至兵部又抑之卒不得叙質實鎮原漢髙平縣地後魏置原州元改鎮原州明降縣屬平凉府今因之西濠寨在鎮原縣北華亭後魏鎮隋改縣明屬平涼府今因之盤龍縣在莊浪縣南四十里長寧驛在興平縣西四十里與武功縣接界張家川在秦州清水縣境清水漢縣明屬秦州以𨽻于鞏昌府今升秦州為直𨽻州縣仍屬焉水落城在靜寧州西南百里亦謂之水落亭水經注水落亭在隴山之西近略陽界是也靜寧州金德順州元改靜寧州明屬平涼府今因之銅川橋在慶陽府安化縣西延水關一名永寧關在延川縣東南七十里虎兕凹在甘泉縣境錐子山耀州西北有箭幹山北為魏王樓樓東為錐子山郭應響福清人殉節後贈光祿少卿諡忠烈豫祭葬廕子入監讀書縣本朝乾隆四十一年追諡忠烈范復粹黃人九月流賊連陷山西州縣先是流賊紫金梁髙迎祥等擁衆聚山西其黨羅汝才張獻忠降未久復叛歸與之合分道四出連陷大寧隰州時邊兵宿將皆萃關中𠞰慶陽諸賊而山西備禦空虛無大帥前錦衣僉事張道濬者巡按遼東御史銓子也方得罪里居巡撫宋統殷以其家多蓄壯丁善禦賊遂檄至軍前贊畫歙人吳開先寓晉以驍勇聞監司王肇生亦以便宜署開先為將使共𠞰賊賊自隰犯澤州開先擊之戰城西賊敗去轉犯沁水寧武守備猛忠戰死道濬遣逰擊張瓚馳援賊乃退東掠陽城開先聞之西渡沁河逆戰擊斬數百人炮盡無援一軍盡歿賊乃再犯沁水鄉官張光奎與兄守備光璽千總劉自安等率衆固守八日援兵不至城陷並死澤大州遽為賊破賊乘勝又陷夀陽逺近震動未幾紫金梁老回回八金剛等以三萬衆圍沁水之竇莊謀執道濬以脅統殷往道濬官京師時其母霍氏嘗築城禦賊至是道濬復屢敗之賊少却㑹關中賊渠次第殱戮其餘黨東走附山西賊于是賊勢甚熾廷議命秦將率師協𠞰賊偵知秦師且至欲因道濬求撫紫金梁請見免胄前曰我王自用也誤從王佳允至此又一人跽致詞曰我宜川廩生韓廷憲不幸為佳允所獲久陷于賊請誓死奉約束梁道濬勞遣之隂使人啖廷憲圖賊廷憲日惎紫金就欵未決陽和兵襲之賊怒尤廷憲遂敗約分其衆南踰太行突濟源陷溫縣廷憲知紫金梁疑已思劫之歸並約道濬伏兵沁河以待道濬遣所部劉偉佐之是夕賊攻邑諸生蓋汝璋樓掘地深丈餘樓不毁賊怒誓必拔之乃還營廷憲不得間知事且泄偕偉倉猝奔賊追之及河伏起殺追者滚山虎等六人皆賊腹心也賊臨沁河索廷憲竇莊東面河道濬潛渡上流繞賊後大噪賊駭遁去賊黨復南犯臨縣據其城破修武殺知縣劉鳳翔焚掠武陟輝縣遂圍懷慶帝以藩封重地切責巡撫樊尚燝殺賊自贖命副將左良玉以昌平兵往援賊既盡嚮河北統殷肇生率軍次陵川扼賊北歸賊遇官軍殊死鬬乘夜爭險對營兩山頂賊緣崖劫官軍營官軍亂統殷肇生皆走與諸軍相失宣大總督張宗衡率逰擊猛如虎等將兵來援統殷肇生收潰卒以㑹擊賊于髙平大破之賊還走沁水朝廷以統殷不能辦賊詔許鼎臣來代宗衡乃以八千人駐平陽鼎臣以七千人駐汾州分扼要害已又合兵逐賊臨縣縣城倚黃雲山榆林河水出焉入于黃河城三面峭壁西阻水賊復與土寇田福田科等相倚久不拔尋李卑賀人龍艾萬年將關中兵至鼎臣檄以自從宗衡怒復檄之為己部三將莫之適從賊乘間入據磨盤山分其衆為三閻正虎據交城窺太原邢紅狼上天龍據吳城窺汾州紫金梁張獻忠突沁州武鄉陷遼州遼州知州李呈章鄊官楊于楷張友程舉人趙一亨侯標並死難既而紫金梁與亂世王有隙廷憲知之縱謀遣書間之亂世王果疑遣其弟混世王就道濬乞降道濬知鼎臣方主𠞰權詞難之曰斬紫金梁以來乃得請混世王怏怏去賊衆遂分部掠諸郡縣質實大寧後周置明屬隰州以𨽻于平陽府今升隰州為直𨽻州縣仍屬焉寧武漢樓煩縣地唐置寧武軍眀設寧武所今升縣為寧武府治夀陽晋置眀屬太原府今屬平定州濟源隋析軹縣置溫縣漢置眀並屬懷慶府臨縣唐臨泉明屬汾州府修武武陟皆唐置明並屬懷慶府輝縣唐輝州明降縣屬衛輝府今悉因之陵川隋置髙平後魏置明並屬澤州今屬澤州府黃雲山在臨縣東北三里磨盤山在臨縣東七十里又名連枝山吳城在孝義縣西南七十八里戰國時魏吳起為西河守築此以拒秦因名武鄉唐置明屬沁州今因之張宗衡臨清人猛如虎榆林人許鼎臣武進人李呈章信陽州人賀人龍艾萬年皆米脂人愍本朝乾隆四十一年追諡猛忠吳開先李呈章烈張光奎光璽楊于楷張友程等節愍劉自安等並入祠癸酉六年春正月命曹文詔節制山西諸將討賊關中賊略盡悉走入山西土賊王剛王之臣通天柱復起應之勢大熾御史張宸極言文詔威名夙著今秦賊滅且盡宜敕令入晉協𠞰帝從之遂有是命文詔東渡河扺霍州敗賊汾河孟縣追及于夀陽巡撫許鼎臣遣謀士張宰先大軍嘗賊賊驚潰文詔追擊之斬混世王餘黨走五臺逰擊猛如虎敗之黑山覆賊渠姬問鎖軍賊還走夀陽遇文詔兵于方山復敗五臺盂定襄夀陽賊盡平鼎臣令文詔軍平府備太原東張應昌軍汾州備太原西文詔連敗賊太谷范村榆社太原賊盡而應昌選愞逗撓務與賊相避總督張宗衡五檄之不至奏于朝乃限文詔應昌三月平賊文詔偵賊從河內上太行邀擊之澤州賊大敗走潞安文詔至陽城遇賊不戰自沁水潛師還擊斬首千餘賊循陽城而北張道濬設伏隘口賊至伏盡起擒賊渠滿天星等賊乃退結屯自固其他部陷平順殺知縣徐明揚文詔至賊走夜半襲破賊屯斬千五百級紫金梁老回回過天星分道走文詔擊之榆社武鄉黎城屢戰皆捷應昌迄避賊不敢進殺良民冒功為巡按御史所劾帝時遣中官孫茂霖等為文詔應昌內中軍時文詔所節制諸將艾萬年李卑劉光祚猛如虎虎大威頗希收與其兄子變蛟皆驍敢善殺賊賊渠多先後俘馘王剛王之臣通天柱等亦懼乞降軍聲大震而賊尤畏文詔次則道濬道濬自督家衆倡鄉人築堡五十四捍賊沁水沁水當賊衝去來無時前後凡五犯皆却走文詔復率兵至沁水大賊之擒其魁大虎賊避文詔鋒流入河北帝命文詔移師往討道濬藝乃孤賊旋陷和順鄉官樂濟衆死之復陷樂平永和遂陷沁水道濬率壯丁三百人馳赴賊退徙十五里道濬收散亡捕賊黨傾家囷以餉軍副使王肇生列狀上道濬功道濬故以賄敗當遣戍冀用軍功自湔祓而言者劾其離伍冒功乃更戍海寧衛文詔道濬既相繼去流賊顯道神等據岢嵐四出剽掠山西盜迄不得平質實汾河源出寧武縣西南六十里管涔山下繞欣州靜樂縣南流陽曲縣界凡經太原汾州平陽三府折而西至蒲州府榮河縣北入河與孟縣相近者則陽曲之汾河盂西距陽曲界計一百二十里盂縣隋置金升州明降縣屬太原府今因之黑山關在五臺縣東南九十里接直𨽻平山縣界方山在夀陽縣東北四十里接盂縣界壁立千仭頂方一里平定州宋平定軍金改軍為州明屬太原府今直𨽻山西省范村寨在絳縣東十五里今築為堡榆社隋置明屬遼州河內隋置明為懷慶府治今並因之平順明嘉靖八年分潞城縣之青羊里及壺關黎城二縣地置屬潞安府本朝乾隆二十九年省入潞城縣和順隋置明屬遼州今因之海寧衛陳于鹽官縣置海寧郡尋廢元升鹽官縣為州已又改海寧州明降縣屬杭州府于縣置海寧衛屬浙江都司以𨽻于左軍都督府本朝乾隆四十年升縣為州仍屬杭州府衛久廢張宸極河津人徐明揚浮梁人賊來犯設策禦賊城破不屈死樂濟衆官昌平副使里居遇難投井死節本朝乾隆四十一年追諡明楊烈愍濟衆愍二月流賊犯畿南河北初賊之圍懷慶也帝既命左良玉以昌平兵赴援未至圍已解其寇修武清化者亦還走平陽因今良玉駐澤州扼豫晉咽喉與曹文詔同討賊有急則秦兵東豫兵西良玉從中擊為四面援兵是年正月賊陷陽城舉人吳之秀賈煜張慶雲貢生張茂貞及弟茂恂死之遂乘藝趨河北良玉擊敗之涉縣西陂賊竄林縣山中飢民爭附之參將楊遇春往逐賊中伏死而别賊復流入趙州武舉李調興弟讓率鄉勇禦賊力竭陳亡賊乃據臨城之西山縱掠順德真定間參議寇從化檄守備李定王國璽擊之大敗內邱知縣王世泰與弟世寧扼賊于隘口亦敗歿畿南皆震副使盧象升偕總兵官梁甫力卻賊從化亦以兵來㑹戰屢捷逰擊董維坤被圍象升馳援維坤已戰死象升設伏石城南大破賊斬其魁十一人象升每臨陳身先士卒與賊格鬬刃及鞍弗顧失馬即步戰逐賊危崖一賊自巔射中象升額又一矢僕夫斃馬下象升提刀戰益疾賊駭走相戒曰盧廉使遇即死不可犯遂自邢臺摩天嶺西下抵武安林縣賊走與合敗良玉軍守備曹鳴鶚戰死主簿吳應科以民兵助戰亦死于是河北賊大熾尋轉入河內良玉整兵自輝縣逐之賊奔修武破逰擊越效忠軍于清化鎮效忠戰歿參將陶希謙墜馬死賊復走武安良玉邀擊之萬善驛連敗賊賊乃西扼于文詔又潰而南時良玉専𠞰河北賊而豫兵額止七千數被賊折亡殆盡良玉將昌平兵二千餘人前後與賊戰雖勝負略相當藝孤甚不足制賊賊出沒彰德衛輝懷慶三府焚掠殆遍質實清化鎮在河內縣東北四十里涉縣晉置明屬磁州以𨽻于彰德府今徑屬彰德府內邱漢中邱後趙石虎改曰趙安隋改內邱明屬順德府邢臺宋置明為順德府治今並因之摩天嶺在武安縣西北接山西遼州界萬善鎮在河內縣北二十里舊有驛今廢王世秦遼東人盧象升字建斗宜興人董維坤嵊縣人曹鳴鶚大興人吳應科蕭山人曹本朝乾隆四十一年追諡王世秦董維坤越效忠鳴鶚烈愍楊遇春陶希謙節愍吳應科吳之秀等並入祠官軍復登州先是朝廷聞登州陷兵部尚書熊明遇請以副將吳安邦代張可大為總兵官屯寧海規取登州以通州副將楊御蕃署總兵官盡將山東兵與保定總兵劉國柱天津總兵王洪兼程進遇賊新城洪先走御蕃拒之二日不勝突圍出遂入萊城與徐從治謝璉並駐萊以圖𠞰賊賊既據登州遣人招島中諸將旅順副將陳有時廣鹿副將毛承祿皆往從之賊黨益衆乘勢攻黃縣縣丞張國輔參將張竒功守備熊奮渭力戰死城破知縣吳世揚典史吳兹明被執皆罵賊不屈死進攻萊州從治璉偕御蕃登陴固守賊以萊城堅先分兵陷平度知州陳所聞自經死賊還益發兵攻萊輦西洋大炮置城下日穴城城多頺從治等投火灌水穴城者死無算使死士時出掩擊之毁其炮臺斬獲多而明遇卒惑撫議命主事張國臣為贊晝入賊營撫之國臣為賊致書從治等曰毋出兵壞撫局從治等知其詐遣間使三上疏言賊不可撫語極切至未報時外圍日急國柱洪及山東援軍頓昌邑不敢進兩撫臣皆困城中廷議更設總督一人以兵部右侍郎劉宇烈任之詔總兵官鄧玘將薊門四川宇兵副將牟文綬將密雲兵監以右布政使楊作楫從烈往援萊比扺山東與巡按御史王道純副將劉澤清參將劉永昌朱延祿等並集昌邑所統馬步軍二萬五千勢甚盛而宇烈無籌略諸帥巽懦進次沙河日十輩往議撫縱還所獲賊陳文才于是盡得官軍虛實益以撫愚之而潛兵繞其後焚輜重殆盡宇烈懼走青州撤三將兵就食玘等夜半拔營賊乘之大敗國柱洪走青濰玘走昌邑澤清接戰于萊城傷二指亦敗走平度惟作楫能軍三將既敗舉朝譁然明遇見官軍不可用撫議益堅安邦尤怯鈍方自寧海率兵至登州聞耿仲明將就撫遽撤兵離城二十五里而營中軍徐樹聲薄城被擒安邦走還寧海登既不能下而萊城被圍久璉從治御蕃日堅守待救不至賊發西洋炮轟城從治中炮死萊人大臨守陴者皆哭山東士大夫官南京者合疏攻宇烈請益兵乃調昌平兵三千以總兵陳洪範統之洪範亦遼人明遇日跂望曰往哉其可撫也天津舊將孫應龍者大言于衆曰仲明兄弟與我善我能令其縳孔有德李九成來當事信之豫兵三千從海道往仲明僞函他死人頭紿應龍曰此有德也應龍率舟師抵水城延之入猝縳斬之無一人脫者賊得巨艦勢益張遂破招逺圍萊陽知縣梁衡固守賊敗去守烈復自青州至昌邑洪範文綬等亦抵萊州推官屈宜陽請入賊營議撫賊佯禮之宇烈益信賊可撫為請于朝帝手詔諭九成等令解圍賊邀宇烈讀詔宇烈懼不往營將嚴正中舁龍亭及河賊擁之去賊且曰必萊州文武官出城開讀圍即解御蕃不可璉曰圍且六月既已無可奈何姑從之遂偕知府朱萬年出有德等叩頭扶伏涕泣交頤璉慰諭久之而還既又請璉御蕃同出御蕃曰我將家子知殺賊何知撫事璉等遂出有德執之猝攻城脅萬年呼守者降萬年呼曰吾死矣爾等宜固守且呼御蕃急以炮擊賊遂遇害賊送璉至登囚之正中宜陽皆死事聞舉朝恚憤逮宇烈下獄尚書明遇時亦致仕去遂絶撫議罷總督及登萊巡撫不設以朱大典代從治督主客兵數萬及關中徑旅四千八百餘人専任𠞰賊總兵官金國竒副將靳國臣劉邦域參將祖大弼祖寬張韜逰擊柏永福及前總兵官吳襄襄子三桂等皆屬焉而以中官髙起潛監護軍餉抵德州賊復犯平度副將牟文綬何維忠等敕之殺賊魁陳有時維忠亦被殺尋國奇等至昌邑分為三路國竒捋關外兵為先鋒鄧玘率步兵繼之從中路進昌平總兵陳洪範劉澤清及副將方登化從南路進參將王之富王文緯等從北路進檄逰擊徐元亨等率萊陽師來㑹以牟文綬守新河諸軍皆携三日糧盡抵新河東亂流以濟至沙河有德迎戰祖寬先進稍却靳國臣繼之賊大敗諸軍乘藝追至城下賊夜半東遁圍始解守者疑賊誘炮拒之起潛遣中使入諭闔城相慶既而南路兵亦至國竒等遂擊賊黃縣斬首一萬三千俘八百逃散及墜死者數萬賊竄歸登州官軍築長圍以困之城三面距山一面距海墻三十里而遙東西俱抵海分番戍賊不能出發大炮擊官軍多死傷者李九成遂出城搏戰官軍合擊之馘于陳賊乃曉夜哭賊渠魁五九成有德有時仲明承祿也及是殺其二氣大沮有德欲棄登州走入海島帥黃龍遣副將龔正祥率舟師四千拒之海口颶風破舟正祥陷賊中謀為內應事露被殺有德亦不果行㑹國竒卒以襄代之攻圍益急賊糧絶恃水城可走故不降及王之富祖寬奪其水門外護墻賊大懼有德先遁載子女財帛出海仲明以水城委副將王秉忠已以單舸遁官軍攻水城未下逰擊劉良佐獻轟城策穴城置火藥發之城崩將士湧入輒為賊擊退副將王來聘復先登中傷死官軍乘之入賊退保蓬萊閣大典招降始釋甲俘千餘人護秉忠及僞將七十五人自縊及投海死者不可勝計賊盡平有德等走旅順黃龍邀擊之斬九成子應元生擒承祿陳光福蘇有功等有德仲明逸去乃獻承祿等于朝磔之有德仲明俱降于我大清質實寧海唐置金州明改衛領中左千户所年本朝初𨽻海城康熙三年改𨽻蓋平二十設城守章京雍正五年設金州邇檢屬復州通判十二年置寧海縣屬奉天府旅順口關在奉天府寧海縣南一百二十里明時海運達金州衛者至此登廣鹿岸有南北二城俱明初建設中左千户所今廢島在奉天府海寧縣西北海中黃縣秦置唐省入蓬萊縣尋復置明屬登州府今因之沙河有二一在掖縣東四十里源出黃山一在即墨縣南四十里源出大勞山其下流俱入海新河自膠州東南三十里麻灣海口北流合沽河又西北經平度州西南合膠水又北至掖縣海倉口入海元至元十七年從萊人姚演議開鑿謂之膠萊新河水城在登州府城北本名備倭城南與府城接北即新開海口為海道要㑹之區城周三里許門一北砌水門以抵海濤引海水入城中泊船明設立備倭指揮于此蓬萊閣在登州府城北崖山下臨海岸宋治平中建熊明遇字良孺進賢人楊御蕃薊鎮西協總兵肇基之子謝璉字君實監利人張竒功真定人吳世揚洛陽人陳所聞文安人張國臣遼東人劉宇烈綿竹人朱大典字延之金華人明唐王時殉節祖寬遼東人劉澤清曹州人朱萬年黎平入王來聘大興人崇禎四年中武㑹試莊烈帝鋭意重武舉子運百斤大力者止來聘及徐彥琦二人而彥琦不興選遂下考官及監試御史獄悉貶兵部郎二十二人遣詞臣倪元璐等覆閲取百人視文榜例分三甲傳臚錫宴以前三十卷進呈欽定一甲三人來聘居首即授副總兵武榜有狀元自來聘始也來聘既拜命泫然流涕曰上重武若此不捐軀赴難何以報上恩至是遂死難事聞贈從治兵部尚書璉兵部侍郎萬年太常卿世楊光祿少卿所聞太僕少卿並賜祭葬建祠䕃子來聘國輔竒功亦贈恤有差本朝乾隆四十一年追諡徐從治朱萬年熊奮渭張竒功朱大典王來聘烈愍謝璉吳世揚屈宜陽嚴正中何維忠陳所聞節愍張國輔吳兹明入祠按浙江通志有署登州都司徐應泰者浙江西安人與諸帥合攻有德敗死海中今亦諡節愍山東通志有百户劉師古者福山人率鄊勇拒有德于萊州戰死今入祠夏五月套寇犯寧夏總兵官賀虎臣死之察哈爾合套寇五萬騎自清水橫城分道入守備姚之䕫等不能禦副將史開先參將張問政守備趙訪皆潰逃寇遂進薄靈州虎臣急領千騎入守旋盡勒城中兵出擊寇突至虎臣兵不及布陳且衆寡不敵戰歿指揮韓加爵被執支解死虎臣子讃俠五十騎突重圍出察哈爾聞大清兵將往征之亦遂解去盡驅其部衆渡河逺遁時蒙古諸部先後歸附于我大清明年大㑹諸部頒軍律焉大清兵遂質實虎臣死事後贈都督僉事賜祭葬世䕃指揮僉事韓加爵寧夏人加本朝乾隆四十一年追諡虎臣忠烈爵烈愍六月周延儒罷延儒為首輔溫體仁欲奪其位務為柔佞取悅于帝帝漸向之復曲謹以媚延儒而隂伺其隙延儒不知也體仁與王永光欲起逆案王之臣吕純如帝以之臣問延儒對曰用之臣亦可雪崔呈秀矣帝悟而止體仁益大恨㑹延儒子弟家人暴邑中邑中民爇其廬所薦巡撫孫元化復陷登州于是言路交章劾延儒並謂其受巨盜神一魁賄帝意頗動體仁復嗾給事中陳贊化劾延儒昵武辨李元功招搖罔利且謂延儒至稱陛下為羲皇上人語悖逆帝大怒下元功詔獄窮治延儒覬體仁為援體仁不應延儒大窘引疾歸體仁遂為首輔廷臣惡體仁當國勸帝復詔何如寵如寵固辭而給事中黃紹傑言君子小人不並立如寵贍顧不前體仁宜思自處帝怒紹傑幾獲譴而如寵卒辭不入質實陳贊化朝城人黃紹傑萬安人秋七月我大清兵取旅順總兵官黃龍死之孔有德耿仲明怒龍邀擊必欲報之㑹鴨緑江有警龍遣水師往援有德等偵知旅順空虛遂導大清兵襲其城龍數戰皆敗火藥矢石俱盡遂自刎逰擊李惟鸞知事不支自焚其家屬力戰死部將項祚臨樊化龍張大祿尚可義俱死焉廣鹿島副將尚可喜故與龍相犄角龍既死亦降于大清質實龍死事後贈左都督豫世廕建祠曰顯忠惟鸞等附祀本朝乾隆四十一年追諡龍忠烈惟鸞烈愍項祚臨等並入祠改總兵官曹文詔鎮大同山西巡撫許鼎臣請留文詔𠞰賊不許文詔既奉命討河北賊比移師至賊已敗鄧玘于林縣時玘新立功萊州廷議以左良玉軍孤命玘將川兵益以石砫土司馬鳳儀兵與良玉共角賊玘至濟源射殺賊首紫金梁屢却賊賊走林縣玘部將楊遇春邀賊中伏死賊用其旗並誘殺他將玘軍遂大敗文詔帥五營軍馳救乘夜襲破賊而潞王聞玘軍敗上書告急乞濟師帝命倪寵王朴為總兵官將京營兵六千赴援以中官楊應朝盧九德等監其軍而别遣中官監良玉玘軍未幾復命延綏副將李卑昌平副將湯九州援𠞰諸軍盡壁河北戰數有功然羣帥勢相軋且中官監軍意弗善也彼此觀望託山深道岐以自解莫利先入故賊無所憚獨憚文詔而文詔竟為御史劉令譽誣劾以去初文詔在洪洞時令譽方家居夙與忤及是令譽按河南而馬鳳儀軍覆賴文詔擊退賊甫解甲與令譽相見語復相失文詔拂衣起面叱之令譽怒遂以鳳儀之敗為文詔罪部議文詔恬勝而驕調之大同以李卑代署其事鼎臣上章留之不許文詔方出師逐賊敗老回回于濟源又大敗之懷慶馘其魁滚地龍誓必欲殄賊既聞命以軍事付卑遂與兄子變蛟俱西質實潞王名常淓簡王翊鏐子王朴榆林衛人湯九州石埭人馬鳳儀忠州人本朝乾隆四十一年馬鳳儀與楊遇春並追諡節愍九月以錢士升為禮部尚書兼東閣大學士預機務士升故出錢龍錫門下龍錫出獄周延儒詣之極言上怒甚挽救殊艱龍錫深德延儒未幾溫體仁至龍錫述延儒語且謝曰非公等安得生體仁佯曰上固不甚怒也聞者直體仁而惡延儒士升以座主故因歸心體仁體仁亦以士升鄉人遂引與共政質實錢士升字抑之嘉善人冬十一月以王應熊何吾騶並為禮部尚書兼東閣大學士預機務應熊熟諳典故而性溪刻强狠官吏部時以貪汚為給事中馮元飇所發帝不省及是廷推閣臣以望輕不與溫體仁力援之遂與吾騶同入閣命下朝野胥駭給事中章正宸劾之曰應熊狠愎自張縱橫為習小才足覆短小辨足濟貪今大用必且芟除異己報復恩讐混淆毀譽况狼籍封靡淪于市行願收還成命别選忠良疏入帝大怒下正宸詔獄削籍歸應熊益得志日與體仁及尚書張捷比力引逆黨吕純如等屢為言官所攻帝皆不問質實王應熊字非熊巴縣人何吾騶香山人章正宸字羽侯會稽人賊渡河陷澠池諸縣分掠南陽汝寧遂犯湖廣賊盡集河北髙迎祥李自成張獻忠羅汝才等俱至左良玉湯九州等扼其前京營兵蹙其後賊連戰皆敗欲逸阻于河大困乃詭詞乞降監軍內臣楊進朝信之為入奏諸將俟朝命不出戰㑹天寒河氷合賊從毛家塞徑渡河南軍無扼之者遂陷澠池教諭羅世濟督民兵力戰被執不屈死之賊乘勢攻破伊陽復犯盧氏中州承平久不誤備驟聞賊至吏民惶駭知縣金㑹嘉棄城遁賊入城鄉官李中正勒家衆及里中壯士奮擊衆寡不敵力戰歿賊縱掠城中執舉人靳謙書使跪不屈大罵而死賊既入河南自是屢陷名城殺將士無算紳士亦多被難其尤著者盧氏則生員常省身常嘉元孫孕秀閿鄊則在籍濟南教授髙第貢生閻思聰偃師則生員裴君合又宜陽馬足輕靈寶許輝新安劉君培馬山李登英陜州張我正張我德嵩縣傅世濟李佩玉孟津孫挺生上蔡劉時寵輩則先後以布衣抗節時巡撫元默聞賊南犯率良玉九州及李卑鄧玘兵禦之境上賊乃竄盧氏山中由間道入內鄊大掠南陽汝寧直走湖廣所在告急賊始起陜西髙迎祥最强李自成屬焉及渡河自成始别為一軍質實澠池漢縣明屬河南府今因之毛家寨在澠池縣西北閿鄉隋置明屬陜州以𨽻于河南府今升陜州為直𨽻州縣仍屬焉偃師漢縣新安亦漢置明並屬河南府今因之羅世濟平利人子得鴻練兵守平利殺賊甚多城破妻子俱死事在明年李忠正官兵部車駕司主事崇禎初謝病歸里常省身據險與賊戰兩晝夜力不支令妻子縊死拔劍自刎常嘉元孫孕秀俱罵賊死髙第投崖死閻思聰率衆攻賊營不克死裴君合事寡母至孝賊至招鄊人保沙岸塞十晝夜說之降大罵不從寨破磔死馬足輕性孝友聞賊渡河挈家避之石龍崖三女皆殊色慮賊汚悉投崖死足輕被執厲聲大罵賊怒並三子殺之家衆皆遇害惟存次子駿一人後登鄊薦許輝為縣隂陽官為賊所執大罵見殺劉君培有義行㩗子及從孫避難道遇賊欲殺其從孫君培曰我尚有男此子乃遺孤幸舍之而殺我賊如其言三子獲免馬山性剛直土寇于大中乘賊亂陷新安獲山使負米叱曰我天朝百姓肻為賊負米耶大罵而死李登英亦以罵賊死張我正率衆禦賊賊愛其勇欲生致之我正殺賊力竭大詈自刎張我德一門一十七人皆登樓自焚傅世濟興兄世舟俱被執將殺之世濟爭死奪賊刀自殺賊釋其兄李佩玉結壯丁捍鄊井往往奪賊輜重後鄰村被圍佩玉往救力戰死孫挺生避賊居河渚為賊所得與妻梁氏俱詈賊死本朝乾隆四十一年追諡李中正烈愍羅世濟等並入祠元默字中象靜海人御定資治通鑑綱目三編卷三十五
