  text: 欽定四庫全書御定資治通鑑綱目三編卷十一
  hash: sha256:d484344d575e471b97c4b01193cc757adaf006b4e0e441976b39e20225a1dca1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0038_WYG_016-1a, image: WYG0340/WYG0340-0200a.png}
body:
  text: 起庚午明景帝景泰元年盡丙子明景帝景泰七年凡七年庚午景皇帝景泰元年春正月朔罷朝賀以上皇在衛喇特也築城天夀山南名曰永安以居陵衛官軍三年移昌平縣治于內質實永安城即今順天府昌平州治州在府北少西七十里舊治白浮圖城在今州西八里始令輸納者給冠帶户部議令軍民輸納者給冠帶官吏罪廢者輸草于邊得復職帝用給事中翟敬議止給冠帶時輸納之例或米或粟或豆或草或鞍馬或牛驢或銀始于宣府大同其後兩畿及諸布政司遼東皆行之而米之輸尤多已而監生郭佑言非以國用耗乏謀國大臣欲行一時之急令民納粟者賜冦帶今軍旅稍寧而行之如初是以空乏啓戎心也章下廷議格不行質實翟敬大興人詔會試取士無拘額初洪熙時既定禮闈取士之額分南北取士及宣德時復分為南北中卷以百人為率南取五十五人北取三十五人中取十人正統中增額至百五十人而分地如故至是從大理寺丞李奎之請乃有是詔明年禮部奉行而給事中李侃爭之言部臣欲専以文詞多取南人刑部侍郎羅綺亦助侃言事下禮部覆奏臣等奉詔書非私請也取士若不以文詞考官將何所據北方中土人才所生古大聖賢皆非南人即以今言如靖逺伯王驥都御史王朔王文皆永樂中不分南北所取進士豈可預謂北無其人奏入帝命遵詔書行不從侃議未幾給事中徐廷璋復詣依正統間例禮部奏請裁定於是復從廷璋言分南北中卷質實南北中卷明史選舉志南卷應天及蘇松諸府浙江江西福建湖廣廣東北卷順天山東山西河南陜西中卷四川廣西雲南貴州及鳯陽盧州二府滁徐和三州也李奎汲縣人李侃東安人徐廷璋羅山人閏正月郭登敗衛喇特于栲栳山冦入大同至沙窩登召諸將問計或言賊衆我寡莫若全軍而還登曰我軍去城百里一思退避人馬疲倦賊以鐵騎來逼即欲自全得乎按劍起曰敢言退者斬徑薄賊營奮勇擊之諸將繼進呼聲震山谷遂大破其衆追奔四十餘里又敗之栲栳山斬賊首甚衆奪所掠男女一百十六人馬九十八匹牛騾驢六百二十一頭器械四百有竒自土木敗後邊將無敢與冦戰是役登以八百騎破冦數千軍氣益振捷聞封定襄伯後冦數至登屢擊却之質實栲栳山在朔平府平魯縣西北沙窩在朔平府東北即沙楞河口二月帝耕藉田懸賞格招陷敵軍民副都御史羅通奏請聖旨榜文于沿邊諭衆凡被陷人口有能自還者軍免差役三年民免徭役終身官支全俸各賞銀一兩布二匹有能殺賊一級者軍民人等俱與冠帶賞銀五兩官升一級一體給賞若能殺額森賞銀五萬兩金一萬兩封國公太師殺巴延特穆爾喜寧者賞銀二萬兩金一千兩封侯詔即行之遣武清侯石亨都指揮同知楊能巡邊帝用于謙議遣石亨率京軍三萬巡大同楊能統京軍一萬五千巡宣府時有敵三人至大同欲朝廷通好參將許貴以聞事下兵部于謙言前邊指揮季鐸嶽謙往敵兩敵隨入冦通政王復少卿趙榮不見上皇而還和不足恃明矣且我與敵不共戴天理固不可和萬一和而彼肆無獻之求從之則坐團不從則速變勢亦不得和貴居邊疆重地恇怯如此何以敵愾移檄切責之自是邊將無敢言和者質實楊能字文敬洪從子許貴字用和江都人叛閹喜寧伏誅先是寧數導誘額森擾邊上皇患之言于額森使寧及總旗髙􅢫等還京索禮物而命袁彬以密書付􅢫俾報宣府設計擒寧寧抵獨石宣府守將設伏野狐嶺令􅢫紿寧至其地伏盡起􅢫直前抱持之遂擒寧送京師羣臣雜治磔于市上皇聞寧誅喜曰自此邊境稍寧吾南歸有日矣時設伏擒寧者乃都指揮江福而參將楊俊飾奏于朝謂已定謀遣福等擒之帝嘉俊功加右都督賜金幣言官及兵部請如所懸賞格封俊侯爵賚福等以黃金千兩白金二萬兩帝不允復賜俊等金幣有差擢福都督僉事既而俊冒功事露兵部請下俊獄奪所加官罪帝别賞福等而宥俊使立功贖質實按明史于謙傳稱謙令鎮將擒寧考之明實録謙實未嘗與謀惟載楊俊奏有總兵官朱謙委臣相機行事語傳者或以同名致訛耳野狐嶺在今宣化府萬全縣東北三十里發明額森屢挾上皇入冦皆出喜寧之䇿是寧一日不誅上皇一日不歸也自江福擒寧額森失其嚮道尋即有宣府之挫遂決意遣使議和上皇南歸雖曰天幸豈非人事乎寧日侍左右而英宗能察其賣已潛以計誅之不可謂非一隙之明也生于憂患者固若是乎乃復辟而首崇王振之祀抑獨何也三月衛喇特復分道入冦陽和大同偏頭關野狐嶺萬全衛皆被冦時邊將禦敵互有殺傷惟寧夏慶陽朔州被敵殺掠甚衆質實陽和衛金白登縣元屬大同路明洪武初廢二十六年置衛宣德元年徙髙山衛來同治本朝順治七年改陽髙衛雍正三年改衛為縣屬大同府偏頭關五季北漢寨元改為關明置偏闕所今為縣屬寧武府按關為古武州地西逼黃河與套僅隔一水其地東仰西伏故名偏頭録土木死事諸臣後以死事諸臣忠子難各官其子有差質實按明英宗實録附載景泰元年三月辛亥以户部尚書王佐子道陽兵部尚書鄺野子儀俱為主事吏部侍郎曹鼐子恩刑部侍郎丁鉉子琥副都御史鄧棨子瑺俱為評事左通政司龔全安子廷暉太常少卿劉容子鑑俱為部照磨欽天監正廖羲仲子景明為司歷大醫院使欽謙子智為本院吏目翰林侍讀學士張益子翊尚寶少卿凌夀子暉俱為序班佐等俱從征陳亡故録其子而正統十四年八月壬戌備載土木死事諸臣無廖羲仲欽謙二人蓋明實録之疏漏也夏四月旱自去冬至春災異迭見黑氣四塞烈風拔木至是雨久缺大旱五月總督侍郎侯璡及副總兵田禮破貴州苗時羣苗西至龍里東至沅州北至武岡南至播州不下二十萬平越被圍已九月城中食盡掘草根煮弩革食之而王驥頓兵辰沅不進巡按御史黃鎬置疏竹筒中募土人乞援于朝乃更命保定伯梁珤都督方瑛會湖廣總督侯璡帥師往討時副總兵田禮已解平越圍璡遣兵攻敗水西諸賊貴州道始通又調雲南兵由烏撒會師開畢節諸路檄普安土兵援安南衛而自率兵改破紫塘等數十餘寨會賊復圍平越回師擊退之遂分哨七盤坡羊腸河等處東至重安江與王驥兵會鎮逺道亦通已而璡復檄方瑛攻賞改諸寨擒偽王王阿同及清平賊阿趙等而驥亦俘獲剗平王苗富蟲皆送京師伏誅是秋梁珤亦破湖廣苗會璡卒以王來代之明年春來與方瑛分兵連破三百餘寨苗衆縳其酋韋同烈并賊將五十八人以降質實播州漢牂牁地唐置郎州改播州宋置播州安撫司明初為宣厯司後改遵義府𨽻四川今𨽻貴州安南衛元為普安路地蠻名尾灑明洪武十七年置尾灑驛後改置安南衛𨽻貴州都司今為縣屬南籠府紫塘蠻寨名在平越府境七盤坡在平越府城東南五里盤回七里坡下有溪羊腸河在平越府城東二十里西南流合馬腸江入麻哈江重安江在平越府黃平州南三十里源出苗境經湖南靖州界為黔楚要津鎮逺元初置鎮逺沿邊溪洞招討使後改府明初改州永樂中仍置鎮逺府今因之賞改苗寨名侯璡字廷玊澤州人黃鎬字叔髙侯官人朱謙敗衛拉特兵于宣府衛拉特二千騎屯賈家營謙與參將紀廣等力戰却之封謙撫寧伯是時冦氣甚驕屢擾宣府大同意二城且旦夕下而謙守宣府郭登守大同數以羸師挫其徑騎額森由是氣益沮衛拉特遣使請和喜寧既誅額森失間謀所部兵亦多死傷而托克托布哈王阿拉知院又皆欲和于是額森決意息兵又恥自屈乃先令阿拉知院遣參政旺扎勒托歡等至懷來議和邊將以聞帝用陳循言賚使令還而以敕諭阿拉未行額森忽擁上皇至大同遣使賫文書以講和為言而自率衆至城下郭登仍欲謀奪上皇敵覺遂擁上皇去登以使及書奏帝厚賚使令與旺扎勒托歡皆還王直率羣臣上言曰太上皇惑細人言輕身一出至於蒙塵陛下宵衣肝食徴天下兵與羣臣兆姓同心戮力期滅此朝食以雪不共戴天之恥乃者天誘其衷額森有悔心之萌而來求成于我請還乘輿此轉禍為福之機也望陛下俯從其請遣使往報因察其誠偽而撫納之奉太上皇以歸少慰祖宗之心帝曰卿等言良然但前後使者五輩往終不得要領今復遣使設彼假送駕為名來犯京師豈不為蒼生患賊詐難信其更議之已而阿拉使復至胡濙等復以為言於是帝御文華門召廷臣諭以宜絶狀直又對曰必遣使無貽後悔帝不悅曰朕非貪此位而卿等強樹焉今復作紛紜何衆不知所對于謙從容曰天位已定寧復有他顧理當奉迎萬一彼果懷詐我冇辭矣帝意釋羣臣既退太監興安出呼曰公等欲報使孰為富弼文天祥者詞色交厲直面折之曰廷臣惟天子使既食祿敢辭難乎安始語塞乃以給事中李實為禮部侍郎大理寺丞羅綺為少卿及指揮馬顯等令齎璽書與阿拉使偕往諭衛拉特君臣質實敕諭阿拉文略曰我朝與爾衛拉特和好額森違天犯順朕兄太上皇帝興師問罪額森又輒遮留毒我生靈殘我邊徼朕嗣承大統宗室臣民咸請興兵討罪復讐朕念額森屢請送大駕回京以故遣人賜書授賞乃額森詭詐反覆今阿拉又使至朕欲從爾但聞額森尚聚衆塞上意在脅挾義不可從即阿拉必欲和好待衛拉特諸部落北歸議和未晚不然朕不惜戰也李實字孟誠合州人旺扎勒托歡舊作完者脫歡今改發明景帝當國家煩危之後能任賢用將一意戰守使敵不敢猖獗可謂轉危為安有功社稷矣然其不欲奉迎上皇雖羣臣屢請而遣使答書止言息兵講和不肯一語及迎復意委君親于草莾實出貪戀天位之私説者謂宋之徽欽迎請愈勤愈不可得卒委骸骨為萬世羞當日不急于迎復正使敵不能以竒貨可居挾留為質然上皇之歸實出天幸設以拒敵者棄君而君或竟不得歸其將何以對天下後世耶秋七月遣右都御史楊善等使衛拉特李實等既行托克托布哈及額森所遣使丕勒瑪尼哈瑪爾等復至賜之宴丕勒瑪尼哈瑪爾言于館伴曰昨知院使來朝廷遣人偕往今吾等乃汗及太師所命若不報使事必不濟胡濙等奏其語廷議請簡四人往帝命俟實還議之及是使者將返王直等固請報使乃命善及工部侍郎趙榮為正使以都指揮同知王息錦衣衛千户湯允績副之賫金銀書幣以往濙等言上皇在衛拉特久御用服食宜付善等隨行不報未幾實還述額森語云迎使夕來大駕朝發廷議請更遣大臣帝曰楊善既去不必更遣但以奉迎意敕諭額森足矣質實楊善字思敬大興人湯允績字公讓東甌王和之曽孫丕勒瑪尼哈瑪爾舊作皮兒馬黑八月上皇發衛拉特楊善奉使時賫賜額森金幣外餘無他賜善乃捐已資揣彼中所需者多市以往既至館伴田氏亦中國人留飲帳中善與語相得因以所齎遺之館伴喜明日善謁額森亦大有所遺額森亦喜善因詰之曰太上皇帝朝太師遣貢使必三千人嵗必再賚金幣載途背盟見攻何也額森曰奈何削我馬價豫帛多剪裂前後使人往多不歸又減嵗賜善曰馬價非削也太師馬嵗增而不忍拒故微省之太師自度價比前孰多帛剪裂者通事為之即太師貢馬有劣弱貂或敝豈大師意耶貢使多至三四千人有為盜或犯他法故自亡去中國留之何用賞賜惟據現在數浮于人則不與非減也額森屢稱善善見額森辭色和因曰太師再攻我屠戮數十萬太師部曲寧無損今還上皇和好如故中國金帛日至不亦美乎額森曰上皇歸何以處之善曰天位已定難以再移知院巴延特穆爾勸額森留善而遣使要復上皇位額森懼失信不可乃引善見上皇設燕奉餞額森自彈琵琶妻妾奉酒令善生善辭上皇曰太師命坐則坐善叩頭少坐即起周旋其間額森顧左右曰有禮巴延等亦各設宴畢額森築土臺坐上皇臺上率妻妾部長羅拜臺下上皇行額森送數十里遣知院帥兵衛送而自下馬伏地慟哭良久去詔議迎上皇禮初廷臣聞上皇將還欲奏請奉迎都御史王文厲聲曰公等謂上皇來耶額森不索土地金帛而遽送還耶衆素畏文皆愕然不決而罷及是果得還乃詔禮部議迎上皇禮尚書胡濙具議以上傳旨以一輿二馬迎于居庸關至安定門易法駕給事中劉福言禮太薄帝曰昨得上皇書具言迎駕禮宜從減省朕豈得違之羣臣乃不敢言會千户龔遂榮為書投髙穀而匿其名言奉迎宜厚主上當避位懇辭而後受命如唐肅宗迎上皇故事穀袖之入朝與王直朝濙等共觀之直曰此禮失而求諸野也濙欲以聞王文不可而給事中葉盛已奏之有詔索書濙等因以書追且言肅宗迎上皇禮正可倣行帝不悅曰苐從朕命無事紛更乃遣太常少卿許彬至宣府翰林侍讀商輅至居庸迎上皇時帝索遂榮書所從得甚急遂榮自縳詣闕言之下詔獄坐遣久之得釋質實劉福建安人龔遂榮淮安人業盛字與中崑山人許彬字道中寧陽人上皇至京師入居南宫赦上皇至自東安門入帝迎拜上皇答拜相持泣各述授受意推遜良久帝遂送上皇至南宫百官隨入行朝見禮赦天下詔詞有曰禮惟有隆而無替義則以卑而奉尊雖未酬復怨之私姑稍遂厚倫之願先是李實使上皇言于上皇曰南歸後當引咎自責上皇滋不悅及至宣府僅命許彬草敕諭羣臣而已復辟後實竟斥為民質實南宫在禁垣之巽隅亦有首門二門以及兩掖門即所稱小南城者是也二門內亦有前後兩殿旁有兩廡其他離宫以及圓殿皆天順間所增飾者非初制也以刑部侍郎江淵兼翰林學士入內閣預幾務時苗𠂻罷以淵代之初淵與徐珵同官侍講珵倡議南遷為太監金英叱出踉蹌至左掖門淵適至迎問之珵曰以吾議南遷不合也于是淵入具陳固守之䇿遂見知超擢刑部侍郎及是參與機務質實江淵字世用江津人御經筵御史許士逹言經筵舊典每月不過初六十六二十六三日如遇寒暑又援例停止一暴十寒聖學何以有成正統間上下蒙蔽無敢言者釀成大患陛下知之矣願陛下于經筵之外日召儒臣講論經史驗之于古會之于心以應無方之變帝優詔褒答質實許士逹歙縣人九月南京吏部尚書魏驥南京國子監祭酒陳敬宗致仕初驥為吏部侍郎端慎徑直王振方凌虐公卿獨嚴重驥稱先生尋調南京進尚書至是以請老至京大學士陳循驥門生也請問曰公雖位冢宰未嘗立朝願少待事在循輩而已驥正色曰若為輔臣當為天下進賢才不得私一座主退語人曰渠以朝廷事如一已事祇為私謀安得善終竟致仕去敬宗在官方嚴率下立教條革陋習六館士千餘人每升堂聽講設饌會食整肅如朝廷先是以秩滿入都王振欲致之不可得會應天巡撫周忱亦在京振知其與敬宗善今通意敬宗曰吾為諸生師表而私謁中官何以對諸生忱退謂振曰陳公倔強未可以勢力致顧善書法公試以禮幣求書彼來謝或可致耳振遂貽文錦羊酒求書程子四針敬宗書訖署名而已返其幣終不往見以故在南太學十七年不調及是與驥同引年致仕家居不輕出有被其容接者莫不興起驥在籍二十餘年衣布糲食不殖生産事兄教諭驥雖耄益恭教子孫孝弟力田講明理學以朂後進所行動應理法蕭山故多水患有宋時縣令楊時湖隄遺迹驥增修螺山石巖諸塘堰捍江湖興湖利鄉人賴之質實蕭山唐置明屬紹興府今因之螺山在蕭山縣東南二十里石巖在蕭山縣西南十二里冬十一月禮部尚書胡濙請令百官賀上皇生日不許上皇生日禮部請令羣臣詣延安門行朝賀禮帝命免行十二月濙又請明年正旦百官朝上皇于延安門亦不許自是嵗為始詔皆免行給事中林聰欲上疏言之葉盛謂曰今上孝弟上皇盛德兩宫帖然安靜若益以言則涉衆易疑恐無中生有反為非便聰乃止御史盛昶目盛曰已不為而乂阻人為之耶盛曰此大事當熟慮惟安與靜久長之道也質實林聰字季聰寧德人盛昶吳江人發明監國而即改元奉迎而不讓位景帝之攘為己有久假不歸之意形迹已自顯然即使儀文禮節曲意尊崇且恐無以共白于天下乃生日既不稱賀元辰復不許朝徒以逼已生嫌竟至百寮禮絶何忍而為此耶葉盛輩恐疏爭開釁固為彌縫苟且之圖然亦有以深窺其隱矣辛未二年春正月令軍民輸納者世襲武職都給事中金逹疏諫不聽其後給事中曹凱言近輸豆四千石以上得授指揮彼受祿十餘年費已償矣復令世襲是以生民膏血養無功子孫而彼所息長無窮也乞自今惟令帶俸不得任事帝然之今已授者如故未就者悉如凱言質實曹凱字宗元益都人度天下僧道先是僧道三年一度帝特詔停之至是太監興安以皇后旨度僧道五萬餘人于謙上言今四方多流徙之民三邊缺戰守之士度僧道太多恐乖本末帝不省二月帝詣國子監行釋奠禮禮既成帝升御座祭酒蕭鎡講尚書天聰明章辭旨敷暢帝甚嘉之質實蕭鎡字孟勤泰和人吏部郎中李賢上中興正本䇿其日有十曰勤聖學顧針警戒嗜欲絶玩好慎舉措崇節儉畏天變勉貴近振士風結民心帝深嘉納命翰林寫置左右備省覽質實李賢字原德鄧州人以星變修省欽天監奏土星逆行太微垣此上天垂象伏望日新聖德仍飭文武羣臣各加修省帝曰上天仁愛垂象示警朕當省悔五府六部都察院翰林院其計議寬恤條例以聞夏四月遣都督僉事孫安守備獨石初額森入犯獨石等八城俱殘毀議者欲棄之于謙曰棄之則不但宣府懷來雖守京師不免動搖乃薦安授以方略率兵守之安招士卒修城堡飭戰具弔死問傷流亡復業八城遂完質實八城獨石馬營雲州雕鶚赤城龍門李家莊長安嶺凡八城發明明代邉患一失于割廣寧以畀三衛再失于棄開平而守獨石若更棄八城則藩籬盡失根本為之動搖矣議者可謂無識幸于謙力排衆論特以孫安鎮守之兼授以方略據龍門之關募屯田之士且戰且守而八城復完不然委牖户子敵庭其能一日安枕耶五月遺衛拉特托克托布哈書上皇歸後托克托布哈及額森屢使致貢上皇所亦别有獻帝意欲絶衛拉特不復使使額森以為請尚書王直金濓胡濙等皆言絶之恐啓釁帝曰遣使有前事適以滋釁爾曩入冦時豈無使耶因敕額森曰前者使往小人言語短長遂致失好朕今不復遣而太師請之甚無益也太師使朕皆優禮厚給之顧亦須少人賞賚乃得從厚至是托克托布哈使又至送還帥掠招撫使髙能等請通好直等復相繼言之帝曰使臣不遣朕志素定巧享其使而以書報之復以楊洪鎮守宣府時宣府總兵官朱謙卒于鎮乃命洪復鎮宣府從子能信充左右參將洪奏言臣既佩印充總兵官而兄子能都督同知信都督僉事俱充參將子俊右都督管三千營一門父子同握重兵盛滿難居乞賜臣休致或調能等他鎮不許居數月以疾召還京卒洪久居宣府御軍嚴肅士馬精強為一時邊將冠六月戊辰朔日當食不見欽天監言是月邜初刻日當食至期不見秋七月京師地震癸丑夜京師地震自北而南八月壬申南京地亦震八月復午朝自永樂初舉午朝後漸罷不行給事中葉盛疏請復之帝即報可冬十月免山西被災稅糧凡一百八萬二千餘石十二月廣通王徽煠陽宗王徽焟謀逆廢為庶人徽煠惑家人段友洪致仕都事干利賔等言謂徽煠有異相當王天下作偽敕分遣友洪及蒙能陳添仔等以銀印金幣誘諸苗為亂封苗酋楊文伯等為侯令發兵來攻武岡陽宗王徽焟亦與通謀友洪歸為鎮南王徽煣所執有司以聞帝廢徽煠徽焟為庶人幽徽煠京師而錮徽焟于鳯陽蒙能率苗兵二千至武岡聞事敗叛入廣西稱蒙王糾生苗為亂質實徽煠岷王楩第三子徽焟楩第五子徽煣楩第二子立團營明初京營兵隸五軍都督府永樂中復置京軍三大營于是五都督府雖仍舊制其掌府者治常行文書而已非特命不預營事及是于謙以營政久弛京軍分隸三營各為教令臨期徴發挑選湊撥兵將不相習請遼三營軍十萬分五營團操名曰五團營具法五十人為隊隊有長百人兩隊有領隊官千人有把總五千人有都指揮體統相維兵將相識量敵多寡以為調法明年十二月謙又請益兵五萬并前五營為十團營每營置都督一人都指揮三人把總十五人指揮三十人每隊置管隊官二人仍各統以武臣內臣而謙及石亨內臣劉永誠曹吉祥往來提督其餘軍不在團營者歸本營訓練以衛京師名曰老營由是京軍之制一變已而謙繪陳圖上進依古法而變通之其為論甚悉帝然之命依法訓練謙號令明審目視指屈口奏悉合機宜石亨雖大將受成而已質實京軍三大營一曰五軍一曰三千一曰神機初洪武時建京衛四十有八成祖增至七十二永樂八年征布尼雅錫哩分步騎軍為五曰中軍左掖右掖左哨右哨既旋師仍之謂之五軍營嵗調中都山東河南大寧兵更畨上京師隸之是外又有十二營圍子手營及幼官舍人營之屬悉附五軍營中此五營之部也已得邉外降丁三千立營分五司一掌執大駕龍旗實纛勇字旗負御寶及兵仗局什物上直官軍一掌執左右二十隊勇字旗大駕旗纛金鼓上直官軍一掌傳令營旗牌御用監盔甲尚冠尚衣尚履什物上直官軍一掌執大駕勇字旗五軍紅盔貼直軍上直官軍一掌殺虎手馬轎及前哨馬營上直明甲官軍隨侍營隨侍東宫官舍遼東備禦曰還官軍此三千營之部也已征交址得火器法立營肄習謂之神機營營有中軍左石掖如五軍又因得都督談廣馬五千匹置營名五千掌操演火器及隨駕護衛馬隊官軍此神機營之部也三營各提督以內臣武臣居常五軍肄營陳三千肄巡哨神機肄火器大駕征行則大營居中五軍分駐步內騎外騎外為神機神機外為長圍周二十里而樵採其中三大營之制如此按明兵志謙請于諸營選勝兵十萬分十營團練于謙傳云擇精鋭十五萬人分十營團練其説互殊考明實銀景泰三年十二月癸巳謙與石亨議選五軍神機三千等營精鋭官軍十五萬分為十營則謙傳為得實而兵志誤也以禮部侍郎王一寧祭酒蕭鎡並兼翰林學士入內閣預機務鎡先代李時勉為祭酒元年以老疾辭國子生三千人叩闕請留帝允之至是與一寧並以本官兼學士入內閣一寧軟熟希世鐥學問該博而性猜忌遇事多退避二人在位皆無所樹立云質實王一寧仙居人額森弒其主托克托布哈托克托布哈娶額森姊生子額森欲立之托克托布哈不從額森亦疑其與中國通將害己遂治兵相政托克托布哈敗走額森追殺之收其妻子遣使獻捷且貢馬于謙上言額森雖悔過攄誠遣使入貢而罪大惡極終不可容今其君臣自相仇殺是天授我復仇之機臣請統團操軍馬分往宣府大同討賊帝不從壬申三年春二月户部尚書金濓有罪下獻尋釋之舊制秋糧輸米有折收銀布者夏稅輸麥有折收絲絹者帝即位詔免景泰二年稅糧三之一濓檄有司但減米麥其銀布絲絹微如舊學士江淵以告帝詰貴户部濓言未嘗追徵給事中李侃等請追問有司奉何明文濓恐事敗乃言絲絹銀布詔書未載今國家多用若概免國計何資于是給事中御史劾濓失信于民為國斂怨且訐其隂事帝欲宥之言官力爭遂下都察院獄三日釋之削太子太保改工部吏部尚書何文淵言理財非濓不可遂復還户部濓上疏自理乞骸骨帝慰留之質實給事中御史訐濓隂事按明實録濓奏臣被御史給事中劾臣充生員時為盜出妻蓋永樂七年臣因妻兄董英盜臣財物告官將英枷決妻亦休出又言臣往福建時母死不臨及還又不發喪蓋臣以軍務至重不敢以私廢命後蒙取回奏乞奔喪不允三月詔錦衣衛官訪事初王振亂政以指揮馬順理衛事流毒天下帝既即位廷臣極言官校緝事之弊帝切責其長令所緝送法司有誣罔者重罪之于時官校為之斂戢及是帝欲隂察外事乃命指揮同知畢旺董司偵訪而錦衣衛官漸用事矣夏五月廢皇太子見深為沂王立子見濟為皇太子帝即位後久欲以見濟代太子而難于發言遲回久之太監王誠舒良為帝謀先賜陳循髙榖白金各百兩江淵王一寧蕭鎡商輅半之用以緘其口然猶未發也會廣西土目黃􅎫以私怨戕其弟思明土知府􅒿并減其家巡撫李棠以聞下有司治其事􅎫􅎫父子入獄􅎫急使其黨千户袁洪至京師行賂有教其迎合帝意者乃上疏請易太子其疏曰太祖百戰以取天下期傳之萬世往年上皇輕身禦冦駕陷北庭冦至都門幾喪社稷不有皇上臣民何歸今且踰二年皇儲未廷臣惟人心易搖多言難定爭奪一萌禍亂不息皇上即循遜讓之美欲全天敘之倫恐事機叵測反覆靡常萬一羽翼長養權勢轉移委愛子于他人寄空名于大寶階除之下變為冦讐肘腋之間自相殘蹙此時悔之晚矣乞與親信文武大臣密定大計以一中外之心絶覬覦之望疏入帝曰萬里之外乃有此忠臣即下廷臣議且令釋􅎫罪于是禮部尚書胡濙集羣臣會議衆相顧莫敢發言惟都給事中李侃林聰御史朱英以為不可尚書王直亦有難色太監興安厲聲曰此事不容已即以為不可者勿署名毋得首鼠持兩端羣臣皆唯唯署議于是濙等上言陛下膺天明命中興邦家統緒之傳宜歸聖子黃􅎫奏是制曰可禮部具儀擇日以聞遂簡置東宫官及是更封太子為沂王立見濟為太子詔曰天佑下民作之君實遺安于四海父有天下傳之子斯固本于萬年大赦天下命百官朔望朝太子賞諸親王公主及邉鎮文武內外羣臣有差乂加賜循等諸閣臣黃金各五十兩東宫公孤官皆兼支二俸而􅎫罪竟得釋且赦其子云質實黃􅎫以私怨殘其弟􅒿按明實録廣西思明府土官知府黃􅒿致仕子鈞已代為知府􅒿庶兄都指揮使􅎫欲殺釣代以已子􅎫守偹潯州托言徵兵思明府令其子糾衆結寨于府三十里外夜馳至府襲殺􅒿一家支解􅒿及釣甕瘞後圃仍歸原寨明日乃入城詐發哀遣人報􅎫捕賊以掩其迹方殺􅒿時􅒿僕福童得免走訴憲司乃以事聞􅎫疏出衆皆驚愕謂必有教之者或疑侍郎江淵後粵人邱濬入翰林曰此易辨也廣西紙與京師紙異索􅎫奏視之果廣西紙其疑乃白思明唐羈縻州元為思明路明為思明土府屬廣西布政司本朝改屬大平府雍正九年改為思州土州李棠字宗楷縉雲人朱英字時傑桂陽人廢皇后汪氏立妃杭氏為皇后帝初欲易太子獨汪后不可曰如監國之稱何帝不從后以太子杭妃所生遂讓焉質實皇后杭氏錦衣衛指揮使昱女封上皇子二人為王封見清為榮王見淳為許王質實見清上皇第二子萬宸妃生封榮王天順復辟後改封德王居德州復改濟南見淳上皇第四子王惠妃生封許王明年卒官顔孟二氏子孫各一人命禮部取顔孟子孫長而賢者各一人至京官之遂以顔希惠孟希文並為翰林院五經博士子孫世襲未幾以希惠非嫡子乃改官其兄子議質實顔希惠復聖五十九代孫孟希文字士煥亞聖五十六代孫顔議字定伯六月建大隆福寺時太監興安用事佞佛甚于王振請帝建大隆福寺費數十萬明年三月工成帝剋期臨幸禮部郎中章綸諌河東鹽運判楊浩除官未行亦上章言之帝乃止質實大隆福寺在大興縣東大市街之西北章綸字大經樂清人楊浩濟南人河決沙灣河自正統十三年經由沙灣決口入海運道口益淺澀帝敕山東河南巡撫都御史洪英王邏協力合治積數月無功時議者謂沙彎以南地髙水不南入運河請别引水以灌運甚或言沙灣水湍急投以石鐵沖浮若羽非人力可為宜設齊醮符咒以禳之帝心甚憂命工部尚書石璞往治而加河神封號璞至濬渠自黑洋山至徐州以通漕而沙灣決口如故遣中官黎賢阮洛御史彭誼助之乃于沙灣築石隄以禦決河開月河二引水以益運河且殺其決勢隄既成璞還朝至是大雨浹旬河復決沙灣北岸四十餘丈旁近地皆淹沒詔英督有司修築及冬工甫竣明年正月河又決新塞口之南至四月決口甫塞五月大雷雨又決沙灣北岸掣運河水入鹽河漕舟盡阻帝復命璞往乃鑿一河長三里上下通運河而于決口築壩截之令新河運河俱可行舟以濟漕質實石璞字仲玉臨漳入洪英福建懷安人王暹字景陽浙江山隂人彭誼字景宜東莞人秋七月殺內使王瑤御用監阮浪侍上皇于南宫上皇賜浪鍍金繡袋及鍍金刀各一浪以與瑶錦衣指揮盧忠見之醉瑶酒而竊之上變言浪傳上皇命以袋刀結瑶圖復位帝震怒下浪瑶詔獄窮治之忠筮于術者同寅寅以大義折之且曰此大凶兆死不足贖忠懼佯狂以冀免商輅及中官王誠言于帝曰忠病風無足信不宜聽妄言傷大倫帝意少解乃并下忠獄坐以他罪謫廣西立功錮浪于獄而瑶竟磔死八月王一寧卒一寧之入閣也以中官王誠輩嘗受業私相援引遂致顯逹非士論所與也及是卒于官九月江淵以母喪起復初侍讀學士倪謙遭喪淵薦謙為講官謙遂奪哀至是御史周文言淵引謙正為今日地帝以事既處分不問詔自今羣臣遭喪毋濫保質實倪謙字克讓上元人閏九月開處州銀場時浙民乞復開銀場鎮守浙江冬十月以左都御史王文入內閣預機務時王一寧既卒閣中尚有五人陳循髙穀江淵蕭鎡商輅也循最寵任穀與循不相能以文強悍欲引文自助乃請增閣員循舉其鄉人蕭維禎榖舉文文方巡視江淮以得中官王誠助遂召入閣二品大臣入閣自文始文既居政府反與循比而不附穀人謂穀自生一敵云質實明史職官志都察院左右都御史正二品王文時為左都御史始以二品入閣考明直閣諸臣表翰林入內閣自解縉始加少保入內閣自楊士竒始都御史入內閣自王文始明朝重冢宰雖內閣歷二三十年不領吏部尚書內閣之領吏部尚書亦自文始內閣兼太子太保左都御史吏部尚書翰林學士者亦自文始于時陳循則户部尚書翰林學士少保太子太傅華蓋殿大學士文淵閣大學士髙穀則工部尚書翰林學士少保太子太傅謹身殿大學士東閣大學士且兼五官矣以故體統尊于三公而內閣之望益隆蕭維禎名兆以字行廬陵人十一月己未朔日有食之于謙辭總督軍務不許帝知謙深凡所陳奏無不從而謙亦每事抒忠直陳無隱由是人多忌之方敵初退都御史羅通劾謙上功不實且言韓信起自行伍禳苴拔于寒微宜博搜將士中如信苴者與議軍事若今腰玉珥貂皆苟全性命保爵祿之人未足與議也意蓋詆謙與石亨輩謙疏辨且乞罷請通指薦韓信禳苴其人者廷臣共留謙又謂通志在滅賊無他帝兩解之及論德勝之功石亨功不如謙而得世侯內愧疏薦謙子冕詔召赴京師謙辭不允冕至謙言國家多事臣子義不得顧私恩且亨位大將不聞舉一幽隱拔一行伍微賤以禆軍國獨薦臣子于公議得乎臣于軍功力杜僥幸決不敢以子監功亨大恚既立團營亨與謙共事亨縱恣謙每裁抑之亨恨甚疏辭總兵不許謙上言祖宗朝本無總督邇因邊事孔棘命臣兼領此一時之宜非經久之法即今敵情不定將任冝専臣見石亨纍奏辭職以臣為之軒輕也豈可以臣之駑鈍使亨不得行其志乞解臣總督軍務俾亨專任其事帝亦不允通與亨皆謙所薦舉顧前後齮齕之而言者復捃托不已諸御史屢以深文彈劾賴帝力持之謙略得盡其所施設然謙故性剛負才氣遇事冇不如意輒拊膺嘆曰此一腔熱血竟灑何地視諸選耎大僚勳臣貴戚意頗輕之故憤怨者益衆謙嘗留宿直廬不還私第素病痰疾作景帝遣興安舒良更畨往視聞其服用遇薄詔令上方製腸至醯菜畢備又親幸萬嵗山伐竹取瀝以賜或言寵謙太過興安等曰彼日夜分國憂不問家産彼去令朝廷何處更得此人遣使撫輯畿內山東山西流民先是五月河南流民復業者計口給食五年至是畿內山東山西逃民復賦役五年十二月額森使來廷臣請遣使報之不許額森自弒托克托布哈後屢使貢馬至是復遣使賀來年正旦尚書王直等請遣使答之詔兵部議于謙言臣職司馬知戰而已行人事非所聞帝從謙言遣使議乃罷既而洗馬劉定之言北庭遣使宜敕羣臣公議不當但委兵部蓋和戰皆所以待敵而兵部必不以和為請猶巫醫皆所以治病而巫者必不以樂為言各護其所短而欲見其所長也詔下羣臣更議給事中路璧以遣使有五不可帝以璧議為是使卒不遣質實劉定之字主靜永新人路璧安福人癸酉四年春二月以土酋黃􅎫為前軍都督府同知敕􅎫馳驛至京召見便殿以􅎫有機謀勇略命治前府事賜第居京師後天順復辟􅎫間自殺發棺戮其尸捕其子震誅之或云懷獻太子卒􅎫仰藥死三月鳯陽淮徐飢巡撫僉都御史王竑振之鳯陽淮安徐州大水道殣相望竑不待報輒開倉振之山東河南飢民亦相率就食竑以徐州廣運倉有餘積欲發以振典守中官不可竑曰民旦夕且為盜若不吾從脫有變吾先斬若然後自請死耳中官憚竑名不得已從之竑乃自劾專擅罪因言廣運所儲僅支三月請令死罪以下得入粟贖帝從其議復命禮部侍郎鄒幹齎帑金馳赴聽竑便宜竑乃躬自巡行散振不足則令沿淮上下商舟量其大小出米作粥以食飢民又勸富民出米麥穀粟而以銀錢絹布參之分給被災之家全活二百一十餘萬賦牛種及招撫復業者七萬九千餘户他境流移安輯者萬六百餘家病者給藥死者具槥鬻子女者贖而歸之還籍者子道里費民忘其飢頌聲大作歌曰生我者父母活我者巡撫初竑奏淮揚飢帝憂甚及得竑自劾疏喜曰好都御史不然飢死我百姓矣于是尚書金濓大學士陳循等頌竑功就進左副都御史時濟寧亦飢帝命南京户部尚書沈翼賫帑三萬往振散給僅五千金餘歸之京庫竑劾翼奉使無狀請以銀易米備振從之質實鄒幹字宗盛餘杭人沈翼字克敬山陽人開建寧銀場時浙江銀場既開户部奏福建建寧銀場與之相連亦請併開故從之命少監戴細保提督後孫原貞又奏臣覆視各銀場親臨各坑見坑路深逺礦脈細微亦有堅石深泉之處實難開煎伏望仍前封閉俟嵗豐民富時徐議其事乃罷夏四月始令生員納粟為國子生命各布政司及直𨽻府州縣學生員輸粟八百石于臨清東昌徐州振濟者入監讀書循資出身尋減三百石以胡濙言遂罷初洪武中監生與薦舉人材參用故其時太學生最盛逮薦舉既廢進士日重而監生漸輕至是納粟例開不久即止然其後或遇嵗荒或因邊警或大興功作率據前例行之而軍民子弟亦得援生員之例以入監謂之民生亦謂之俊秀或竟謂之例監而監生日益輕矣六月吏部尚書何文淵下獄尋釋之文淵自吏部侍郎進尚書協王直理部事銓選多私御史練綱等言直素行本端為文淵及侍郎項文曜等所罔宜按問其罪帝雖宥文淵等然頗以綱為直及是給事中林聰等劾文淵憸邪左庶子周旋疏言具枉聰等攻益力并劾旋御史曹凱復廷爭之遂與旋俱下獄文淵素善太監興安聰疏中有囑托內臣語安請帝詰主名時安方用事聰終不敢斥言乃釋文淵命致仕文淵前議易儲嘗言父有天下傳之子閣臣草詔即用其語後天順復辟或傳朝廷逮捕遂自經死質實項文擢字應昌淳安人周旋永嘉人秋八月額森自立為汗額森迫脅諸部東踰烏梁海西及赤斤哈密遂自立為汗以其次子為太師遣使致書稱大元特克紳逹罕未曰添元元年詔廷臣議報書所稱給事中林聰以為但敕諭來使不必報書安逺侯柳溥以為宜仍稱太師郎中章綸以為可稱衛拉特王而府部大臣則僉言宜從北俗稱為汗帝從大臣議書稱衛拉特汗賜之冬十月以徐有貞為左僉都御史治沙灣決河有貢即徐珵以倡議南遷為太監興安金英所叱久不得遷因諂事陳循以玉帶遺之且用星術言公帶將玉矣無何循果加少保大喜會太子立因引為右諭德時少保于謙方為帝所倚任凡用人多密訪之謙珵屬謙門下士遊説求國子祭酒謙為言于帝帝曰此議南遷者耶為人傾危將壞諸生心術珵不知謙之薦之也以為沮已深怨謙循揣帝惡珵告珵曰若第更名無為內家習知庶可希進用遂改名有貞及是河決沙灣已六年矣隨築隨決前後遣王永和石璞等治河皆無功璞所鑿新河雖成帝恐不能久令璞且留處置而命廷臣舉一人以專治沙灣衆共推有貞乃擢僉都御史以往十一月皇太子見濟卒諡懷獻甲戌五年春正月命江淵等撫輯山東河南兩淮軍民時山東河南雨淮大寒人畜多凍死巡撫都御史王竑上言比年飢饉洊臻人民重困頃冬春之交雪深數尺淮河抵海冰凍四十餘里人畜僵死萬餘弱者鬻妻子強者肆劫敓衣食路絶流離載塗陛下端居九重大臣安處廊廟無由得見使目擊其狀未有不為之流涕者也陛下嗣位以來非不敬天愛民而天變民窮特甚者臣竊恐聖德雖修而未至大倫雖正而未篤賢才雖用而未收其效邪佞雖屏而未盡其類仁愛施而實惠未漙財用省而上供未節刑罰寬而寃獄未伸工役停而匠力未息法制頒而奉行或有更張賦稅免而有司或仍牽制有一於此皆足以干和召變伏望陛下修厥德以新厥治欽天命去祖宗正倫理篤恩義戒逸樂絶異端斯修德有其誠矣進忠良逺邪佞公賞罰寬賦稅節財用戒聚斂却貢獻罷工役斯圖治有其實矣如是而災變不息未之有也帝褒納之命閣臣江淵偕平江侯陳豫撫輯山東河南兩淮軍民并敕內外臣工同加修省陳弭災之道三月減國子生額監生二千餘人俱仰給官廪以户部侍郎孟鑑言留年深者千餘人餘放歸質實孟鑑字克明傅野人命學士王文撫恤揚州及蘇常諸府尚書儀銘以江南北積雪沍寒死亡載道奏請振恤帝得奏即馳敕江淵王竑振淮北而命閣臣文振揚州及蘇常諸府先是正統以來蘇松常鍞四府糧自兑運外每四石折白金一兩民以為便後户部仍徵米輸淮徐凡一百餘萬石率三石而致一石民多破家文以便冝停之發米振飢民三百六十餘萬質實折白金按州縣嵗賦自起運兌運外糧四石折銀一兩解內承運庫謂之金花銀事詳英宗正統元年儀銘字子新髙密人智之子夏四月壬午朔日有食之五月下禮部郎中章綸御史鍾同於錦衣衛獄先是懷獻太子既卒綸與同偕朝語及沂王皆泣下因與約疏請復儲會定州獲北諜言額森使偵京師將以秋初大舉深入同聞之上疏抗論時政遂及復儲事其略曰近得賊諜言額森使偵京師及臨清虛實期秋初大舉深入直下河南臣聞之不勝寒心而廟堂大臣皆恬不介意臣草茅時聞寺人搆惡戕戮直臣劉球遂致廷臣箝口假使當時犯顔有人必能諌止上皇之行何至有蒙塵之禍陛下赫然中興鋤姦黨旌忠直命六師禦敵于郊不戰而三軍之氣自倍臣謂陛下方且鞭撻四裔坐致太平奈何邊氛甫忠瘡痍未復遂生侈心失天下望伏願取鑒前車厚自奮厲又言父有天下固當傳之于子乃者太子薨逝足知天命有在臣竊以為上皇之子即陛下之子沂王天資厚重足令宗社冇托伏望擴天地之量敦友于之仁蠲吉具儀建復儲位實祖宗無強之休又言昔嘗命將帥各陳方略經旬踰時互相委責及石亨栁溥有言又不過庸人孺子之計平時尚爾一旦有急將何策制之夫禦敵之方莫先用賢陛下求賢若渴而大臣顧排抑之所舉者率多親舊富厚之家即長材屈抑孰肯為言朝臣欺謾若此此臣所以撫膺流涕為今日妨賢病國者醜也疏入帝不懌下所司議寧陽侯陳懋吏部尚書王直等請帝納其言因引罪求罷帝慰留之越數日章綸亦疏言復儲并陳修德弭災事其大者謂內官不可干外政佞臣不可假事權後宫不可盛聲色又言孝弟者百行之本願陛下退朝後朝謁兩宫皇太后修問安視膳之儀上皇君臨天下十有四年是天下之父也陛下親授册封是衛皇之臣也上皇傳位陛下是以天下讓也陛下奉為太上皇是天下之至尊也陛下與上皇雖殊形體實同一人伏讀奉迎還宫之詔曰禮惟加而無替義以卑而奉尊望陛下允蹈斯言或朔望或節旦一幸南宫率羣臣朝見以展友于之情極尊崇之道更請復汪后於中宫正天下之母儀還沂王於儲位定天下之大本帝得疏遂大恕時日已暝宫門閉傳旨自門隙中出立執綸及同下詔獄榜掠慘酷逼引主使及交通南宫狀頻死無一語會大風揚沙天地晝晦獄得稍緩令錮之而方同下獄禮部郎孟圯者亦疏言復儲事帝不罪進士楊集上書于謙曰姦人黃􅎫獻議易儲不過為逃死計公等遽成之今同等又下獄脫諸人死杖下而公等坐享崇髙如清議何謙以書示王文文曰書生不知忌諱要為有膽當一官處之乃以集知安州質實安州金置元屬保定路明屬保定府今因之鍾同字世京吉安永豐人孟圯閩人楊集常熟人發明方黃􅎫疏請易儲之時景帝遂議立見濟其時如林聰朱英輩夙以亮直表節亦竟不能爭及見濟既卒儲位未定綸與同二人豈不知奏不濟必死然激於忠義遂慷慨不能自已其志洵可與劉球爭烈矣彼分金受餌諸臣當國家大事畏首畏尾曽無所補救殊多愧耳烏梁海三衛乞居大寧城不許額森虐使三衛逼徙其部落於黃河穆納地三衛不能堪其酌竒里瑪格根特穆爾等亡歸請得近邊屯駐因乞居大寧廢城于謙以為不可乃止質實竒里瑪舊作乞兒蠻格根特穆爾舊作革干帖木兒今並改秋八月減兩京課鈔時以鈔法不行今兩京市肆園埸稅悉納鈔户部按月征之商民以為病或閉户不敢市易拔圖蔬伐果木以避之給事中陳嘉猷言兩京根本重地軍民尤宜加恤豈可當嵗歉之時興擾民之政從使鈔法通而民已不聊生矣詔蔬果等暫免納鈔質實陳嘉猷餘姚人九月免蘇松常揚杭嘉湖漕糧共免二百餘萬石冬十月額森為阿拉所殺額森既弒托克托布哈自立為汗恃其強日益驕恣荒於酒色阿拉為額森知院求為太師曰主人衣新衣幸以故衣賜臣不許阿拉怒額森忌阿拉欲討之恐不勝乃自遣其子守西畨召阿拉二子從先鴆殺其次子阿拉懼詐言烏梁海盜馬請召還其長子合擊之額森先使賽堪逹通二王與俱臨行觴焉中途阿拉長子亦中鴆死阿拉益怨紿賽堪逹通前渡川自後率部落三萬攻額森數其三罪曰漢兒血在汝身托克托布哈王血在汝身烏梁海血亦在汝身天道好還血在我矣額森無以應約明日與戰退而與巴延特穆爾等議帳中有阿拉故部曲三人事額森久額森不之疑因共趨帳中拔所佩劔刺額森殺之并殺巴延時穆爾等賽堪王聞變領七千人躡之既知額森死棄衆去為其下所殺而逹通王領其人馬西奔未幾韃靼部保喇者復殺阿拉奪額森母妻并其玉爾求托克托布哈子穆爾格爾立之號小王子自是衛喇特遽衰額森諸子窮依哈密部衆分散而保喇與其屬瑪拉噶等皆雄視部中韃靼勢復熾質實按額森既亡數傳至博汗其世次不可考博汗生子曰烏琳台巴丹太師遂統部落是為準噶爾之始舊保喇舊作孛來穆爾格爾舊作麻兒可兒瑪拉噶作毛里孩又傅汗舊作孛汗烏琳台巴丹舊作烏林台巴靼今俱改十二月貶都給事中林聰為國子監學正聰遇事敢言為執政大臣所嫉王文尤惡之會聰甥陳和為教官欲得近地便養文嗾御史黃溥等劾聰下廷訊至專擅選法當斬胡濙不肯署稱疾不朝者數日帝遣興安問疾濙曰老臣本無疾前日議事驚悸至今不寧耳安問何為曰諌官有小罪而欲殺之所以悸也安入告髙穀亦力言之聰乃得釋貶國子監學正質實黃溥弋陽人乙亥六年春正月以江淵為工部尚書淵在內閣好議論每為同官所抑意忽忽不樂會于謙以病在告詔推一尚書協理部務衆佯推淵淵欣然不辭屬商輅草奏陳循王文密示以石兵江工四字淵在旁方知也比詔下改工部尚書石璞于兵部而以淵代璞淵大失望雨木冰癸酉曉刻四方濃霧既而成霜附木自是日至丁丑凡五日二月命太監王誠同法司録囚時中外繫囚有至十餘年者帝以災變命誡會法司審録之由是得減免者甚衆夏四月丙子朔日有食之韃靼遣使入貢穆爾格爾遣使貢馬駝禮部言迤北未有君長請量減賞賜詔從舊給之以慰其心五月帝禱雨南郊以兩畿及各省旱蝗也豫太監王誠等錦衣衛世職命太監王誠姪敏舒良弟玉張永兄琮郝義姪安王勤姪賢俱為錦衣衛帶俸世襲百户六月以宋儒朱子九世孫挺為翰林院五經博士世襲尋復以宋儒程頥十七代孫克仁周敦頤十二代孫冕俱為世襲博士奉祀事質實朱挺字益齡朱子九世孫世居福建建安縣之紫霞洲程克仁程子十七代孫世居嵩縣之六渾周冕周子十二代孫其先道州人熙寧中周子葬母江州子孫因家廬山蓮花峯下按克仁冕之授博士事在景泰七年五月時又以福建僉事吕昌奏增祀黃幹蔡沈劉爚真德秀于朱文公祠閏六月兩畿湖廣水遣官省視振恤徐有貞治沙灣決口成有貞至張秋上治河三䇿一置水門一開支河一濬運河議既定督漕都御史王竑以漕渠淤淺滯運請急塞決口帝勑有貞如竑言有貞守便宜言臨清河淺舊矣非因決口未塞也漕臣但知塞決口為急不知秋冬雖塞來春必復決徒勞無益臣不敢邀近功詔從其言有貞乃踰濟汶沿衛沁循大河道濮范相度地形水勢上言河自雍而豫出險固而之夷斥水勢既肆由豫而兗土益疏水益驈而沙灣之東所謂大洪口者適當其衝於是決焉而奪濟汶入海之路以去諸水從之而泄隄以潰渠以淤潦則溢旱則涸漕道由此阻然驟而堰之則潰者益潰淤者益淤今請先疏其水木勢平乃治其決決止乃濬具淤於是設渠以疏之起張秋金堤之首引而西南百里踰范暨濮又上而西北經澶淵以接河沁內倚古金堤以為固外恃梁山泊以為泄又置上下二閘以節宣之凡河流之旁出不順者築九堰以障之堰各長萬文崇三十有六尺厚什之柵木絡竹實之石而鍵以鐵凡五百五十餘日而工成賜其渠名廣濟由是河水不東衝沙灣而北出濟漕乃濬漕渠北至臨清南抵濟寧建閘於東昌者八水道以平先是有貞始興工有謂河決宜塞不宜疏者帝遣中使即問有貞出二壺而穿其一為五竅注水其中五竅者先涸中使還報乃決用其䇿及工將竣江淵請遣中官偕文武大臣督京軍五萬人往助役有貞言京軍一出日費不資今泄口已合決堤已堅但用沿河民夫自足集事乃止自沙灣之決垂十年至有貞治之決口始塞阿鄄曹濮間舊出沮洳者百數十萬頃山東河患少息然亦會黃河南趨徐吕東流漸殺故有貞得奏厥功云有貞之初築決口也下木石則皆若無者有貞思數日忽悟曰此下殆有龍窟耶吾有以制之矣乃鎔鐵下之不移時而決口塞有貞事竣還帝厚勞之尋復命巡視漕河明年秋山東大水河隄多壞惟有貞所築如故有貞乃修舊隄決口自臨清至濟寧水患悉平還朝帝召見奬勞有加進左副都御史質實按有貞疏上三䇿一置水門略曰臣聞水之性可使通流不可使堙塞禹鑿龍門闢伊闕為疏導計也故漢武堙瓠子終弗成功漢明疏汴河踰年著績今談治水者甚衆獨樂浪王景所述制水門之法可取蓋沙灣地土皆沙易致坍決故作壩作閘皆非善計請依景法損益其間置閘門於水而實其底令髙常水五尺小則拘之以濟運大則疏之使趨海則有通流之利無堙塞之患矣一開支河略曰几水勢大者宜分小者宜合分以去其害合以取其利今黃河勢大故恆衝決運河勢小故恆乾淺必分黃水合運河則有利無害請度黃河可分之地開廣濟河一道使水大不至泛溢為害小亦不至乾淺以阻漕運其一則濬運河請復陳瑄舊制置撈淺夫挑深河道以利漕運沁河源出沁州沁源縣東北羊頭山西南流合水峪河又西南流合湱河又南流徑縣東又南流合青龍河又西南流合西川河又南流合大南川又南流入平陽府嶽陽縣界范縣春秋晉范武子采邑漢置范縣明屬濮州本朝雍正十三年改屬曹州府金隄在今東阿縣平鎮南連夀張縣界參差隆起延亘鄆濮俗稱始皇隄漢文帝時河決酸棗東潰金隄即此澶淵在今大名府開州西梁山泊在今夀張縣東南七十里梁山下久湮廣濟渠西起張秋金隄通壽張之沙河至于范濮以逹河沁渠口即通濟閘也八閘在今東昌府龍灣及魏家灣迤南阿鄄曹濮謂東阿甄城曹州濮州也東阿漢縣後漢分置榖城縣北齊廢入東阿明洪武八年移東阿縣治于故穀城屬東平州初本朝雍正十三年改屬泰安府鄄城隋縣明洪武省縣入濮州故城在州東二十里發明沙灣之決在正統十三年維時陳留大水漲夏決金村黑洋秋決新鄉入柳樹口漫曹濮抵東昌衝張秋潰壽張沙灣由是壞運道東入海而徐吕二決遂淺澀理其事者先後如王永和洪英王暹石璞彭誼趙榮輩竭力修治而沙土易壞隨築隨決迄無成功有貞獨建三策用疏而不用塞會是時黃河亦南趨徐吕下流日有漸殺之勢可謂因利集事顧有貞以河決改名詭進始得仔肩其事詐以取功何足齒哉太白晝見帝即位後大白常畫見至是御史倪敬盛昶杜宥黃讓羅俊汪清以災異頻仍請罷齊僧輟遊宴止興作寬直臣之囚疏入帝不懌未幾都御史蕭維禎考察其屬諭令去之遂黜敬等為典史質實倪敬字汝敬無鍚人社宥江隂人黃讓無湖人羅俊安福人汪清固始人八月杖南京大理少卿廖莊於闕下謫為驛丞復下禮部郎中章綸御史鍾同於獄同死綸仍錮獄先一年莊在南京疏言臣曩見上皇遣使册封陛下每遇慶節必令羣臣朝謁東廡今上皇在南宫願陛下時時朝見或講論家法或商榷治道嵗時令節命羣臣朝見以慰上皇之心又言太子者天下之本上皇諸子陛下之猶子也宜令親儒臣督書䇿以待皇嗣之生使天下臣民曉然知陛下有公天下之意疏入不報及是莊以事至京詣東角門朝見帝憶前疏大恕命杖八十謫定羌驛丞左右言事皆由鍾同倡實罪魁帝乃封巨梃就獄中杖同及綸各百同竟死綸死而復蘇繫如故是年刑科給事中徐正請間言事亟召入乃言上皇臨御嵗久沂王嘗位儲副天下臣民仰戴不宜居于南宫宜遷置所封之地以絶人望别選親王子育之宫中帝驚愕大怒立叱出之命謫逺仕已復得其淫穢事遂謫戍鐵嶺衛又御史髙平亦言南城多樹事巨測遂盡伐之時盛暑上皇嘗倚樹憩息及樹伐得其故大懼至天順復辟後正平皆伏誅贈同大理寺左丞釋綸于獄命內侍檢綸前疏不得內侍從旁誦數語帝嗟嘆再三擢禮部侍郎質實定羌城在河州南九十里廖莊字安止吉水人按明實録莊上疏在五年七月鍾同之上疏也策馬出馬伏地不肯起同叱曰吾不畏死爾奚為者馬猶盤辟再四乃行同死馬長號數聲亦死徐正吳江人髙平里籍未詳濬京師城河備兩潦也冬十一月以方瑛為平蠻將軍討湖廣叛苗初庶人巖煠既廢其家人蒙能竄入苗中為亂詐作妖書糾生苗三萬餘攻龍里新化銅鼓諸城官軍屢勦不能克至是帝命瑛為平蠻將軍尚書石璞總督軍務率京軍討之時諸苗酋多與能相應合衆攻平溪衛都指揮鄭泰以火鎗擊能能被鎗賊舁還寨而死餘賊流劫武同分陷藕塘諸寨勢尚熾已而瑛進駐沅州分三道一自清浪一自平溪一自鎮逺會于賊境破鬼板等一百六十餘寒蒙能餘黨以次平質實新化明守禦所今為長官司屬黎平府銅鼓明衛今為錦屏縣屬黎平府平溪明衛今為玉屏縣屬思州府清浪明衛今為清溪縣屬思州府丙子七年春二月皇后杭氏崩諡肅孝三月天鼓鳴辛巳夜無雲西南方有聲如雷夏四月彗星見彗東北見於胃其光芒或長數丈或長丈餘自是月至于六月凡兩月餘及十二月又復見於畢宿五月敕內外羣臣修省以星變故也六月葬肅孝皇后河決開封時河南大雨決開封河南彰德三府田廬淹沒無算秋七月兩畿山東河南大水自夏至秋大雨不止諸水並溢髙地大餘以工匠蒯祥陸祥為工部侍郎蒯祥以木工陸祥以石工俱纍擢太僕寺少卿至侍郎仍督工匠時稱匠官八月浙江江西湖廣旱裁冗官帝以官多擾民敕吏部等議裁革于是省參政三參議二副使五僉事二同知以下一百五十餘員九月賜大學士王文陳循子俱明年會試自設科以來輔臣子弟少登第者是秋文子倫循子瑛應順天鄉試被黜文循搆考官劉儼黃諌欲殺之臺省譁然髙穀言于帝曰大臣子與寒士競進已不可況又不安于命欲殺考官可乎帝命翰林院禮部覆閟貢士卷有優于倫瑛者有相等者有不及者勉徇二人意命其子一體會試而心薄之于是六科給事中言宋范質為相其從子求遷秩質作詩戒之韓億之子維舉進士以父執政不就廷試方之陳循王文賢不肖何如也況應試者十八百有竒而中式者百三十五人倘一概援例求進是壞科目之制矣循等所行乖悖乞正其罪詔姑貸之質實劉儼字宣化吉水人黃諌字廷臣蘭州人追諡宋丞相文天祥侍郎謝枋得從巡撫江西僉都御史韓雍之請諡天祥曰忠烈枋得曰文節冬十月振江西飢十二月振畿內山東河南水災免被災稅糧並蠲逋賦是年凡免天下稅糧計米麥二百四十五萬四千二百餘石帝有疾癸亥帝不豫罷明年元旦朝賀御定資治通鑑綱目三編卷十一
