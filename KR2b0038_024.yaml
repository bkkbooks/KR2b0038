body:
  text: 起甲戌明武宗正聽九年盡辛巳明武宗正德十九年凡八年甲戌九年春正月乾清宫災帝每嵗張燈費將數萬及是宸濠别無竒巧以獻令所遣人入宫懸掛多著柱附璧以取新異帝復于庭問依設氊幕貯火藥其中偶不戒遂延燒宫殿乾清以內皆燼火盛時帝往豹房臨視回顧光焰燭天猶笑謂左右曰是一棚大烟火也楊廷和等以宫災自幼請帝避正殿下詔罪已又疏請早朝宴罷躬九廟祭祀榮兩宫孝養勤日講復靣奏開言路達下情還邉兵革宫市罷皇店出西僧省工作減織造諸言官亦各上章極諫語皆切至帝不省二月帝始微行夜至教坊司觀樂發明人君出入警蹕清道後行體至尊儀至重也漢武帝始為微行成帝效之朱子於綱目皆謹書之以為復鍳而武宗乃狎于羣小日事佚遊效富平公子之裝忘柏谷主人之戒其輕宗廟褻神氣為已甚矣况自此逺踰關塞動輒經年其不至見困于豫且者亦天幸耳以禮部尚書靳貴兼文淵閣大學士預機務貴以宫僚舊恩故有是命在閣三年無所建白致仕歸質實靳貴字充道丹徒人歸後二年卒未葬武宗南巡過鎮江親臨其喪命詞臣撰文皆不稱㫖帝乃自為文祭之按王瓊雙溪雜記云內閣劉忠去位楊廷和欲引門生靳貴代之朝廷以禮部尚書費宏代貴憾之後讒斥罷宏仍以貴代宏然考明史武宗本紀及明實録宏以五月乙丑致仕在貴既入閣之後並非以貴代宏且宏之去位以却寧王護衛之請事見明史宏傳亦非由貴讒搆瓊所紀者皆不得其實也夏四月復寧王護衛初宸濠賄劉瑾得復護衛瑾誅仍論奪會陸完為兵部尚書宸濠所素善也遂致書盛陳舊好欲復護衛及屯田完答書令以祖制為詞宸濠乃遣人厚結敘坊臧賢屬錢寧為內主比奏下完即為覆請而以屯田屬户部請付廷議內閣擬㫖上竟豫之舉朝譁然六科給事中高淓十三道御史汪錫等力爭章並下部久不覆南京禮科給事中徐文溥聞之上疏諫曰曩因寧藩不靖英廟革其護衛屯田及逆瑾亂政重賄謀復瑾既伏誅陛下又革之正欲制以義而安全之耳乃曰驅使乏人夫晏居深邃靡征討之勞安享尊榮無居守之責何所用而乏人且王暴行大彰剝削啇民挾制官吏招誘無賴廣行劫掠至舟航斷絶邑里蕭條萬民莫不切齒及今止之猶恐不逮顧可縱之加恣假翼于虎乎貢獻本有定制乃無故馳騁飛騎出入都城伺察動靜況今海內多故天變未息意外之虞實未易料宜裁以大義勿徇私情罪其獻謀之人逐彼偵事之使宗社幸甚時宸濠奧援甚衆疏入人咸危之帝但責其妄言而已完迫于衆論乃請納諫官言帝竟不聽質實汪錫仁和人徐文溥字可大開化人五月費宏罷錢寧方寵于帝最用事宏不與通寧時有所關請餽宏以綵幣珍玩峻却之寧慙且恚宸濠之謀復護衛屯田輦白金巨萬偏賂朝貴寧及陸完主之宏從弟編修寀其妻與宸濠妃兄弟也知之以告宏宏入朝完迎謂曰寧王求護衛可復乎宏曰不知當日革之何故完曰今恐不能不豫宏咈然曰公自任之中官齎奏至閣宏極言不當豫既而竟俞所請于是宸濠與寧合而搆宏寧數偵宏事無所得以御史徐珊嘗劾宏當國寀宜引避不得留翰林寧遂以此譖于帝責宏陳狀宏自伏乞休命并寀致仕寧遣騎伺宏後抵臨清焚其舟資裝盡燬宏歸杜門絶客宸濠復求與通宏謝絶之益怒會宏族人與邑奸民李鎮訟宸濠隂令鎮賊宏鎮遂據險作亂率衆攻費氏執所與訟者支解之發宏先人冢毀其家劫掠逺近衆至三千人宏馳使訴于朝下巡撫孫燧按狀始遣兵勦滅質實史乘考誤寧庶人之復護衛內閣大臣獨費鉊山持正不肯豫而楊新都梁南海輩畏禍而莫敢主持新都為首輔其罪有不容辭者苐不得以汙名衊之耳雙溪雜記謂大璫乘廷試讀卷日獨請楊師傅入票㫖其為讐口無疑苐楊用修丹鉊雜録謂為新都丁憂以後事則又誤之甚矣護衛之復乃正德九年四月丁酉而新都聞父春喪在十年三月丙申今欲他諉其可得乎余珊桐城人孫燧字德成餘姚人遣右都御史彭澤提督甘肅軍務經理哈密土爾畨既據哈密復遣使赴甘肅言巴雅濟不能守國故遣將代守乞犒賜總制鄧璋甘肅巡撫趙鑑以聞請遣大臣經略大學士楊廷和等交薦澤澤久在兵間厭之以家于蘭州遂藉鄉土為辭且引疾推璋及仇鉞可任帝復優詔慰勉乃行澤未至賊遣兵分掠赤斤苦峪諸衛聲言與我金帛數萬即歸城印澤抵甘州謂畨人嗜利可因而欵也遣通事馬驥諭還侵地及王當豫重賞莾肅爾為許之澤即使舍音和珊以幣二千銀酒鎗一往賂未得報澤輒奏畨酋悔過效順事已平帝即召澤還巡按御史馮時雍言城未歸澤不宜遽召不納初兵部缺尚書廷臣共推澤而王瓊得之且隂阻澤言官多劾瓊由是有隙澤又使酒常凌瓊復時時謾罵錢寧瓊以語寧寧未信瓊乃邀澤飲匿寧所親屏間挑澤醉罵寧聞大怒遂與瓊偵澤事欲共傾之舍音和珊者素桀黠雖為哈密臣居肅州隂通莽肅爾為之耳目據城奪印皆其謀澤不知而遣之及澤還巴雅濟迄不得返和卓塔濟迪音亦不肯退復要重賞始以城印來歸而已雅濟留如故會舍音和珊與莾肅爾忽有隙莾肅爾欲殺之大懼求和卓塔濟迪音為解許賂幣千五百匹期至肅州畀之且啖之入寇曰肅州可得也莾肅爾喜令其壻瑪哈穆特等俱隨入貢以覘虛實且徵賂時李昆代趙鑑為巡撫慮冦變羈其使甘州而驅舍音和珊出關懼弗去和卓塔濟迪音有弟曰和卓繖哲爾亦充貢使偕來為所羈和卓塔濟迪音閒之怒復奪哈密城請莽肅爾移居之分兵據沙州擁萬騎冦嘉峪關遊擊芮寧與參將蔣存禮都指揮萬榮王琮各統兵往禦寧以七百人先遇冦冦悉衆圍寧而分兵綴諸將寧軍盡沒遂薄肅州城副使陳九疇固守先絶其內應下舍音和珊于獄冦知事泄慮援兵至大掠而去朝廷初聞畨衆入冦復命澤提督三邉軍務率師西征而冦還至瓜州為副總兵鄭亷所敗又與衛拉特相攻力不敵移書求款澤罷行尋乞骸骨歸事在十二年五月澤既去瓊追論嘉峪之敗靖窮詰增幣者主名錢寧從中下其事大學士梁儲等持之乃已舍音和珊之以內應繫獄其黨實巴伊克被捶死及事平械舍音和珊赴京下獄實巴伊克子旋以入貢至京探知王瓊欲傾澤遂訟父寃法司行甘肅訊報瓊欲因此興大獄奏遣科道二人往勘明年還報無所引瓊怒劾澤誣妄辱國斥為民坐昆九疇激變逮下吏昆謫官九疇削籍澤材武知兵然性疏潤負氣其經略哈密事頗不當瓊與寧因交齮之乃得罪又明年舍音和珊减死夤緣寧入豹房與實巴伊克之子俱侍帝左右帝悅之賜國姓授錦衣指揮而莽肅爾自肅州敗後屢求通貢不得十五年歸先所掠將卒及巴雅濟家屬復求貢廷議許之而巴雅濟終不還質實趙鑑字克正夀光人馮時雍交河人王瓊守德華太原人李昆高密人陳九疇字禹學曹州人者瑪哈穆特舊作馬黑木和卓繖哲爾舊作火者撤兒實巴伊克舊作失拜烟客今並改六月詔自今言事黜謫者毋復用兵部員外郎韓邦靖言廷臣頃因災變極陳闕失未見聽納前後以言獲罪者未䝉召用乞開延攬採擇之門以收人心帝怒下邦靖錦衣獄黜為民乃有是詔質實韓邦靖字汝度朝邑人秋七月小王子犯大同宣府先是鞬靼别部額布勒與小王子仇殺額布勒竄西海阿爾托蘇與合逼脅洮西屬畨屢入冦巡撫張翼總兵王勛不能制漸深入邉人苦之尋擁衆來川遣使詣翼所乞邉地駐牧修貢翼啖以金帛令逺徙額布勒遂西掠烏斯藏據之自是洮岷松潘無寧嵗小王子亦數入冦殺掠尤慘以五萬騎攻大同趨朔州掠馬邑帝命仇越統兵禦之戰于萬全衛斬三級而所失亡十倍以捷聞時八年夏五月也至是敵連營數十冦宣大塞而别遣萬騎掠懷安總制叢蘭告急命太監張永督宣大延綏兵都督白壬為大將協蘭守禦京師戒嚴已而敵踰懷安趣蔚州蘭等預置毒飯于田間如農家餉而設伏以待敵至中毒伏猝發多死者敵乃還質實西海方與紀要在西寧衛西三百餘里亦曰􅀈海酈道元水經注古西􅀈之地亦曰青海亦曰鮮水海亦曰允谷鹽池西海則其總名海方數百里案西寧衛今為西寧府洮西畨屬明一統志洮西在洮州衛三十里洮河至初冬水凍疑結俗呼為珠子凌河河西皆畨人所居稱洸州十八族懷安漢上谷郡地唐置懷安縣屬新州明改置衛今仍為縣屬宣化府張翼介休人額布勒舊作亦卜剌阿爾托蘇舊作阿爾秃厮今並改八月辛卯朔日有食之京師地震是月十五日乙巳也九月謫編修王思為三河驛丞帝常喜觀摶虎一日虎迫帝江彬趨撲乃解帝戲曰吾自足辦安用爾至是復以狎虎被傷踰月不視朝思疏言孝宗皇帝子惟陛下一人當為天下萬世自重近者虎逸于押驚及聖躬臣聞之且駭且懼陛下即位以來于兹九載朝寧不勤政太廟不親享兩宫曠于問安經筵倦于聽講揆厥所自蓋有二端嗜酒而荒其志好勇而輕其身由是戒懼之心日忘縱恣之欲日進好惡由乎喜怒政令出于多門紀綱積弛國是不立上天示警日食地震宗社之憂凜若朝夕夫勇不可好陛下已薄有所懲矣至于荒志廢業惟酒為甚陛下露處外宫日湎于酒厮養雜侍禁衛不嚴即不幸變起倉卒何以備之此臣所大憂也疏入留中者數日匆傳㫖降逺方雜職遂謫三河驛丞質實三河驛在潮州府大埔縣西今有巡司為縣臣鎮王思字宜學太保直曽孫冬十一月廢歸善王沍為庶人當沍自殺初流賊攻兖州當沍帥家衆乘城取護衛弓弩射却賊降敕奬諭遂以武健聞數與卒袁質舍人趙巖校射質巖家東平武斷為鄉人所惡同里吏部主事梁穀少不檢頗倚質等為助既貴厭苦之又與千户高乾有怒會有銜質巖者誑榖云質巖且為亂穀心動因並指乾等告變于楊一清兵部議以大兵駐濟南伺變而當沍父魯王陽鑄入長史馬魁譖言當沍結質巖欲反虞禍及奏于朝帝遣司禮太監溫祥大理少卿王純等往按問圍當沍第索其兵械則前射賊弓弩半敞讞穀所指皆平人魁懼事敗乃諷所厚陳環及術士李秀佐證之復以書及賄抵鎮守太監畢真使逮二人詰問已而二人以實對書賄事亦為真所發于是御史李翰臣劾穀魁誣岡宜即訊近幸方欲邀功責翰臣為叛人掩飾下之獄謫德州判官而釋穀等不問御史程啓充疏言穀魁鼓煽流言死不蔽罪縱首禍而謫言者非國體不報廷臣議當沍罪卒無所坐以藏護衛兵器違祖制廢為庶人戍質等肅州所連逮多瘦死魁坐誣奏斬中官送當沍之高牆當沍大慟曰寃乎觸牆死聞者傷之質實當沍魯莊王陽鑄幼子王純字希大慈溪人李翰臣大同人程啓充字以道四川嘉定州人發明趙巖袁質𨽻卒賤人耳而當沍與之善其武斷鄉曲亦未必不倚藩府為聲勢當沍豈得為無過然不過交遊之濫誣以作亂初無實據而兵部張皇其事即議駐兵伺變遂至馬魁挾怨而售譖魯王懼禍以證子逮按問無狀讞訊已明當沍卒無所坐之罪而以射賊既敞之弓弩托拾以斷斯獄在近幸貪功而樂禍固不足深責彼廷臣既正魁罪則已為當沍昭雪其誣而復廢為庶人仍使含寃而死於非命豈得謂持讞之平哉十二月營乾清宫加天下賦百萬工部奏營建宫室庀材鳩工計直白金百萬兩請均賦于民嵗徵十之二恐徴輸不及暫于內帑借其半以給用帝終不欲假用內帑乃于一嵗中盡徵之于是催科旁午海內騷然矣乙亥十年春正月帝有事于南郊逮暮成禮是日漏下二鼓帝始還宫楊廷和等疏諌兵科給事中王良佐言尤切曰郊廟之祀天子必省牲必誓戒散齊致齊有常期有專所當祭之日夙駕而往行禮之祭無二爾心期昭假也邇者正月初五日躬祀太廟薄暮方出行禮則登獻夙戒之饈不將敗惡與祭斂戢之容不寖懈怠者寡矣初十日郊祀初七日當誓戒臣等導駕與百官具朝服候至夜漏下忽見執駕之人一呼而散宿衛之士羣噪而奔臣等佇集左掖昏暗中傳聞免朝不知㫖從何出惶懼失措徘徊久之至初九日車駕當臨齊宫百官莫不晨趨以俟乃薄暮方往倉猝至壇行禮行禮甫畢旋即下營臣愚不知陛下此行果事天耶抑遊幸也及次日駕還復至夜分城門失啓閉之常禁闥縱馳騁之樂一切非時與制矣又凡令節大朝賀每至昏暮而司晨之官尚報卯時傳之四方所損非細乞自今祭祀朝賀之期經筵講書之候起居寢興之節務各及時遵制舉行則事天事祖與百凡綱紀無不畢張天下幸甚不報質實王良佐夷陵州人民間訛言選女入宫御史張翰言旬日以來民間相傳謂朝廷欲博選女子以充後宫凡有女之家未字者不擇壻而配及笄者不備禮而成甚至藏於姻黨之家致惟簿之議京師如此傳之天下驚疑益甚上虧聖化下斁彛倫乞敕禮部榜諭以解萬民之惑不報尋有無賴子數輩挾二媪為媒氏乘夜猝入李姓者家强舁其女以去次夕復强舁祁氏女不從相詬爭為邇卒所獲詰其名乃蔡明馮玉吳綱安亨也錦衣衛以聞詔悉以付獄仍令都察院禁約之人心始安質實張翰遼東廣寧後屯衛人夏四月下江西副使胡世寧于獄時宸濠驕橫有異志皆莫敢言世寧憤甚上疏曰江西之盜勦撫二說相持臣愚以為無難決也已撫者不誅冉叛者無赦初起者亟勦如是而已顧江西患非盜賊寧府威日張不逞之徒羣聚而導以非法上下諸司承奉太過數假火災奪民㕓地採辨擾旁郡蹂藉遍窮鄉臣恐良民不安皆起為盜臣下畏禍多懷二心請于都御史俞諌任漢中專委一人或别選公忠大臣鎮撫敕王止治其府毋撓有司以靖亂源銷意外變章下兵部尚書陸完議專委諫計賊情勦撫之宜至所言違制擾民疑出僞托宜令王約束之報可宸濠聞大怒列世寧罪遍賂權幸必殺世寧章下都察院右都御史李士實宸濠黨也與左都御史石玠等劾世寧狂率當治命未下宸濠奏復至指世寧為妖言乃命錦衣官校逮捕世寧已遷福建按察使聞之即間道走京師自繫都察院復奏其畏避掩飾得㫖下鎮撫司拷掠于是御史徐文華言世寧之論寧府非特為朝廷亦為寧王慮也安有所謂妖言誹謗離問懿親者耶寧府隱蔽之事豈惟世寧知之痛之憂之中外之臣亦知之痛之憂之矣但人多顧忌而世寧則忠于謀國耳乃以忠獲罪始令御史逮繫復令官校捕解世寧恐懼間關赴訴其情蓋有難于顯白者夫人臣上為國家下為宗室發憤畢誠圖畫安危言適啓其口而災旋逮身亦可哀已比見寧王乞護衛則豫護衛乞屯田則豫屯田凡璽書之褒嘉思禮之稠疊諸宗藩未能或之先也威勢日以張大失今不戢容有紀極乎江西之臣畏其𨼆禍莫敢顯言世寧一言及之置之重法異日誰復敢為陛下言者臣以為杜天下之口奪忠鯁之氣弱朝廷之勢長宗藩之威招意外之虞皆自今日始可不為寒心哉乞履霜謹始曲賜優容庶逺僭逼之嫌全治安之體不聽世寧于獄中三上書言宸濠逆狀卒不省繫嵗餘言官程啓充等又交章救楊一清以危言動錢寧乃論謫戌居三年宸濠果反質實石玠字邦秀藁城人徐文華字用光嘉定州人閏四月以吏部尚書楊一清兼武英殿大學士預機務先是一清冉推內閣不用及是楊廷和以憂去遂以一清代之冬十月遣太監劉允使烏斯藏左右言西域胡僧能知三世帝欣然欲見之考永宣間侯顯入畨故事命中官劉允乘傳往迎閣臣梁儲等言祖宗朝雖嘗遣使西畨蓋因天下初定藉以化導愚頑鎮撫荒服非信其教而崇奉之也承平之後止因其來朝厚加賞賚未嘗輕辱命使逺涉其地今忽遣近侍往送幢幡朝野聞之莫不駭愕而允奏乞鹽引至數萬動撥快馬船至百艘又許其便宜處置錢物勢必攜𢃄私鹽騷擾郵傳為官民患今蜀中大盜初平瘡痍未起在官已無餘積必至苛斂軍民鋌而走險盜將復發況自天全六畨出境涉數萬之程道途絶無郵置人馬安從供頓脫中途遇冦何以禦之虧中國之體納外畨之侮無一可者所齊敇書臣等不敢撰擬帝不聽禮部尚書毛紀都給事中葉相御史周倫徐文華等並切諫亦不聽允行以珠琲為幡幢黃金為供具賜其僧金印犒賞以巨萬計敕允往返以十年為期所攜茶鹽以數十萬計允至臨清漕艘為之阻截入峽江舟大難進易以􅖻􅑳相連二百餘里至成都日支官廪百石蔬菜銀百兩錦官驛不足取旁近數十驛供之治入畨器物估直二十萬守臣力爭減至十三萬工人雜造夜以繼日居嵗餘始率將校十人士千人以行越兩月入其地畨僧恐中國誘害之匿不出見將士怒欲脅以威畨人夜襲之奪寶貨器械以去將校死者二人卒數百人傷者半之允乘善馬疾走僅免質實天全六畨唐宋時皆為羈縻之域𨽻于雅州元置碉門魚通黎雅長河西寧逺等處宣撫司屬吐畨等處宣慰司後改六畨招討司乂分置天全招討司明初合為天全六畨招討使司𨽻四川都司今改天全州屬雅州府峽江方輿紀要由瞿唐而下謂之峽江峽江兩岸重巖疊嶂蔽日𨼆天至于夏水長陵沼泝阻絶王命急宣有時朝發白帝暮到江陵其間千二百里雖乘奔遇風不能及也錦官驛在成都府城東毛紀字維之掖縣人葉相江都人周倫崑山人發明永樂中令侯顯輩持節入畨意在招徠異域顧中官奉使遐陬實有傷於國體乃武宗惑近習荒誕之言轉欲援為故事俾劉允逺迓西僧豈非成祖作法于凉有以貽之口實耶然侯顯之使畨僅齎書幣以往選壯士健馬護行而已而允則供具不資縻金無算甚至百艘並下漕阻臨清十驛難容郵增蜀道騷擾之害于兹極矣且烏斯藏距四川馬湖府止千五百餘里何遂往返以十年為期此必中官欲盛治資裝故極稱遼逺以聳聽卒之寶貨器械適足啓畨人潛襲之謀耗中國以取侮外藩蓋未有甚于此役者也十二月癸丑朔日有食之是日車駕當出視郊祀牲禮部請改次日因言視牲乃郊祀之始日食乃天變之微今大禮將舉忽遘此變上天示戒亦昭然矣伏望順承天意益加敬畏自兹以往皆郊祀之所有事起居必以其道出入必以其時一遵祖宗典訓西慎行之至于朝賀燕享亦莫不然則天心感格災變不足弭矣不納下寧波知府翟唐于獄先是浙江市舶太監崔珤藉貢物擾民為唐所裁抑奸民附珤為惡唐執而笞之尋病死珤奏唐阻格貢獻笞殺所遣人帝怒逮下鎮撫司獄栲治巡按御史趙春等交章救之給事中范玽亦言唐被逮日軍民遮道涕泣請宥令還任不聽帝方寵任宦寺勢甚恣中外官與抗者為所誣陷輒得罪時太監在浙者凡四人珤主市舶王堂為鎮守朝進督織造張玉管營造爪牙四出民不聊生僉事韓邦竒疏請禁止堂亦奏邦竒阻格下獄有工部主事王鑾出轄徐沛閘河織造中官史宣過其地索挽夫千人沛縣知縣胡守約給其半宣怒自至縣捕吏鑾助守約與抗宣奏于朝逮繫獄宣在鳯陽列黃梃二于騶前號為賜棍每以杖人有至死者自都御史以下莫敢問御史張士隆劾奏之又劾太監廖堂姪鎧奸利事其黨見疏大恨遂合搆以陷之御史張經出按宣府發鎮守太監于喜貪肆狀為喜所訐皆先後逮治于是給事中徐文漙言朝廷刑威所及乃在奄寺一言旗校絡繹於道途搢紳駢首於狴犴逺近震駭上下屏氣向一瑾亂政於內今數瑾縱橫於外乞治珤等誣罔罪帝終不省已而唐謫嵩明知州邦彥斥為民守約罷官鑾輸贖士隆謫晉州判官經謫安寧知州質實安寧州古滇國螳蜋州地漢為益州郡之連然縣唐武德初改置安寧縣天實初陷于蠻後為䝉氏段氏所據元取其地立安寧千户所後改州明屬雲南府今因之翟唐字堯佐長垣人趙春巴縣人范玽天台人韓邦竒字汝節朝邑人王鑾字廷和大庾人張士隆字仲修安陽人張經興州左衛人丙子十一年春正月朔帝御奉天殿受朝賀逮暮成禮御史程啓充言自古帝王勤惕匪懈所以畏天命收人心勵臣工威蕃服也今正旦令節文武羣臣及外蕃之使待漏入賀迄酉而後禮成逮散朝則夜久矣枵腹之衆奔趨赴家前仆後躓互相蹂踐有將軍趙朗者竟死禁門其他臣僚失簪笏毀衣裳至以得生相慶午門左右吏覓其官子呼其父僕求其主喧若市衛玩莫甚焉郊祀在邇駕出有期伏望屏棄宴遊益崇警畏以肅臣民觀瞻不報三月以馬昻為右都督昻初為延綏總兵官以驕橫奸貪劾罷有女弟善歌能騎射嫁指揮畢春有娠矣昻因江彬奪歸進于帝召入豹房大寵傳陛昻右都督弟炅昶並賜蟒衣大璫皆呼為舅賜第太平倉東熏灼動京師都給事中吕經等言陛下果為皇儲之圖自宜博選世族使備嬪御奈何溺卑汚以自褻且聞昻及諸子弟出入宫禁肆無忌憚應對左右殊乏臣禮又樹立徒黨以為羽翼小人之情無厭失今不治後悔何及伏望將昻顯示誅戮并斥所入孕婦庶幾人言可息御史張淮徐文華等亦以為言未報都給事中石天柱上疏曰臣等請出孕婦未䝉進止竊疑陛下之意將遂立為已子秦以吕易嬴而嬴亡晉以牛易馬而馬滅彼二君者特出不知致墮奸計謂陛下亦為之耶天位至尊神明之胄尚不易負荷而況么麼之子借使以陛下威力成于一時異日諸王宗室肯坐視祖宗基業與他人乎內外大臣肯俯首立于其朝乎望急遣出以清宫禁消天下疑卒不報帝每從數騎過昻飲一日飲酣召昻妾昻以妾病辭帝怒而起昻懼復結太監張忠進其妾杜氏遂傳升炅都指揮昶儀真守備昻喜過望又進美女四人謝恩然馬氏寵後亦漸衰質實吕經字道夫陜西寧州人張淮南皮人石天柱字季瞻嶽池人夏大旱命定國公徐光祚㑹昌侯孫銘新寧伯談佑禮部尚書毛紀以禱兩祭告天地社稷山川及城隍之神時四月丁巳也給事中徐文溥偕同官上疏曰頃者因災早禮部奏請修省伏讀聖諭謂關朕躬者皆已知之臣惟兹一念之誠足以事上帝迓天休矣雖然知之非艱行之維艱陛下誠能經筵講學早朝勤政布寬恤以安人心躬獻享以重宗廟孝養慈闈敬事蒼昊舍豹房而居大內逺嬖幸而近儒臣禁中不為貿易皇店不以罔財還邉兵于故伍斤畨僧于外寺毋昵俳優盡屏義子馬氏已醮之女弗留乎後宫馬昻梟獍之族盡奪其兵柄停諸路之織造罷不急之土木太倉局門户之內官禁水陸舟車之進奉出留中奏牘以達下情省傳奉冗員以慎名器則陛下所謂關朕躬者非徒知之且一一行之而不轉禍為福者未之有也報聞質實徐光祚中山王達六世孫孫銘會昌侯繼宗之子談佑新寧伯裕之弟五月録自宫男子三千四百人充海户月給米人三斗時自宫未録者尚數千人復扣禮部門求録用令逐歸原籍冉至京奏擾者罪之然卒不能禁絶也前兵部尚書劉大夏卒大夏忠勤懇篤遇知孝宗忘身殉國于權幸多所裁抑故深見嫉于小人既復官致仕清軍御史王相廣東右布政使吳延舉請復廪𨽻中官用事者終嗛之不許大夏家居教子孫力田謀食稍嬴散之故舊宗族預自為壙志曰無使人飾美俾懷愧地下也嘗言居官以正已為先不獨當戒利亦當逺名又言人生蓋棺論定一日未死即一日憂責未已及是卒年八十一贈太保諡忠宣先是大夏為劉瑾陷被逮方鋤菜圖中入室攜數百錢跨小驢就道赦歸有門下生為巡撫者枉百里謁之道遇扶犁者問孰為尚書家引之登堂即大夏也朝鮮使者在鴻臚寺館遇大夏邑子張生因問起居曰吾國聞劉東山久矣安南使者入貢曰劉尚書戌邉今安否其為外國所重如此秋八月大學士楊一清罷時義子錢寧用事一清以災異陳時政中有狂夫惑聖聽匹夫搖國是禁廷雜介胄之夫京師無藩籬之托語譏切近幸帝弗省寧與江彬輩聞之大怒使優人于帝前為蜚語刺譏一清寧又嗾武學生朱大周訐一清前任吏部考察不公吏科駁大周誣罔大周冉上書醜詆一清吏部以其撓銓制傷國體乞下法司定治寧從中主之詰責吏部互相掩飾令陳狀户科都給事中周金等上疏曰考察內外官皆吏部㑹同都察院奉命舉行此纍朝故事也問刑條例備㦸考察被劾之人不得挾忿托拾大周前後具奏瀆亂宸聰開羣枉之門闢僥幸之路據其肆言無忌必有主使之人舞亂國經未有若是之甚者請嚴鞫大周以為將來之戒御史陳軾等亦以為言皆不聽一清乃力請骸骨歸質實錢寧用事明佞幸傳初寧曲事劉瑾得幸于帝性狷狡善射拓左右弓帝喜賜國姓為義子傳陛錦衣千户瑾敗以計免厯指揮使掌南鎮撫司纍遷左都督掌錦衣衛事典詔獄言無不聽其名刺自稱皇庶子引樂工臧賢西域人于永及諸畨僧以祕戲進請于禁內建豹房新寺恣聲佼為樂復誘帝微行帝在豹房常醉枕寧卧百官候朝至晡莫得帝起居密伺寧寧來則知駕將出矣太監張鋭領東厰緝事橫甚而寧典詔獄勢最熾中外稱曰厰衛司務林華評事沈光大皆以杖繫校尉為寧所奏逮下錦衣獄黜光大貶華一級錦衣千户王注與寧昵橽人至死員外郎劉秉鑑持其獄急寧匿注于家而屬東厰發刑部他事尚書張子麟亟造謝寧立釋注乃已厰衛校卒至部院白事稱尚書子麟輩曰老尊長太僕少卿趙經初以工部郎督乾清宫工乾沒帑金數十萬經死寧佯遣校尉治喪逮經妻子扶襯出姬妾帑藏悉據有之中官廖堂鎮河南其弟錦衣指揮鵬肆惡為巡撫鄧庠所劾詔降級安置鵬懼使其嬖妾私事寧得留任寧子永安六嵗為都督養子錢傑錢靖等俱冒國姓授錦衣衛官念富貴已極帝無子思結强藩自全遂黨寧王宸濠遣人往宸濠所有異謀諷宸濠數進金銀玩好于帝謀召其世子司香太廟為入嗣地又以玉帶綵紵附其典寶萬鋭歸詐稱上賜凡宸濠所遣私人行賄京師皆主伶人臧賢家由寧以達帝左右周金字子庚武進人陳軾應城人以王守仁巡撫南贛汀漳南贛地連閩廣山谷深阻盜賊易為巢穴陳金俞諫先後討之稍戢不數年復嘯聚作亂謝志山據橫水左溪桶岡池仲容據浰頭皆稱王與大庾陳曰能樂昌髙快馬桞州龔福全等攻剽府縣而大帽山賊詹師富等又起于是江西福建廣東湖廣之交千餘里皆亂前巡撫文森稱疾兵部尚書王瓊劾罷森薦守仁謫遂自鴻臚卿擢右僉都御史以代之仁初守仁既謫龍場驛丞地在萬山中苗獠雜居守因俗化導夷人悅服相率伐木為屋以居之瑾誅後量移廬陵知縣纍遷鴻臚卿質實橫水左溪方輿紀要南源水在南安府崇義縣西南五十里出南源山東流北折合縣東南六十里之西符水蓋南源為橫水西符為左溪一云左溪即汀水亦曰鄞江在汀州府長汀縣東源出寧化下流至廣東大埔縣入海桶岡在崇義縣西二百餘里接湖廣栁州界浰頭山在惠州府和平縣北六十里亦曰和平峝綿亘深逺接江西龍南縣境最北近龍南者為上浰在岑岡者為中浰最南者為下浰大庾漢南野縣地武帝遣將庾勝討南越築城于此有大庾城之名隋因置大庾鎮唐升縣明為南安府治樂昌漢曲江縣地梁置梁化縣隋改樂昌明屬韶州府廬陵漢縣後漢改西昌隋復曰廬陵明為吉安府治今皆因之池仲容亦曰大鬢文森衡山人南京地震是月十九日戊辰也以禮部尚書蔣冕兼文淵閣大學士預機務冕清謹有器譏雅負時望及是入閣明年改武英殿兼太子太傅丁丑十二年春正月帝祀南郊遂獵于南海子初帝好佚遊然猶慮外廷知至是從近幸言乃于月之戊寅召百官至左順門明告以己丑郊竣將幸南海子觀獵大學士梁儲等暨廷臣極諫皆不聽及期連藏祀事遂往畋文武大臣扈從者不許入既晡始令歸候承天門夜半駕還宫御奉天殿行慶成禮以所獲麞麕處兔賜府部大臣暨翰林科道官二月增設陜西織造中官給事中任忠言陜西地瘠早寒民多穴居衣皮餔藿無他生計沉沿邉郡縣屢遭冦掠耕牧曠廢其腹裏不被兵者又以調集士馬挽運芻糧亦皆疲敝牟麥槁于春夏苗稼盡于雪霜逃竄流移十室而九近復遣中官往監織造資輒數萬催督峻急民不堪命夫鳥窮則啄獸窮則攫臣不勝意外之憂民或啄以攫也疏入不報尋以兩淮浙江四川河東鹽課給陜西充織造之用質實任忠崑山人夏五月以禮部尚書毛紀兼東閣大學士預機務紀前在禮部以帝遣使烏斯藏冉疏切諌不報郊祀畢請勤朝講又以儲嗣未建乞早定大計亦不聽尋改理誥敕掌詹事至是靳貴致仕去遂代入閣同列皆倚重之六月乙巳朔日有食之秋八月帝微行至宣府江彬欲擅權數導帝逺遊使諸幸臣不得近因言宣府樂工多美婦人且可觀邉釁瞬息馳千里何鬱鬱居大內為廷臣所制帝然之遂將出關幸宣府巡關御史張欽上疏諫曰比者人言紛紛謂車駕欲度居庸逺遊邉塞臣度陛下非漫遊蓋欲親征北冦也不知北冦猖獗但可遣將徂征豈宜親勞萬乘英宗不聽大臣言六師逺駕遂成己巳之變夫匹夫猶不自輕奈何以宗廟社稷之身蹈不測之險況今內無儲二國家多事甘肅有土畨之患江右有奉賊之擾淮南有漕運之艱巴蜀有採辦之困京畿諸郡夏麥少收秋潦為沴而陛下不虞禍變欲縱轡長驅觀兵絶塞臣竊危之已聞朝廷切諌皆不納復疏言臣愚以為乘與不可出者有三人心搖動供億浩繁一也逺涉險阻兩宫懸念二也北冦方張難與之角三也臣職居言路奉詔巡關分當效死不敢愛死以負陛下疏入不報至是帝急裝微服出德勝門幸昌平傳報出關甚急欽命指揮孫璽閉關納門鑰藏之分守中官劉嵩欲詣昌平朝謁欽止之曰車駕將出關是我與君今日死生之會也關不聞車駕不得出違天子命當死關聞車駕得出天下事不可知萬一有如土木我與君亦死寧坐不開關死死且不朽頃之帝召璽璽曰御史在臣不敢擅離乃更召嵩嵩謂欽曰吾主上家奴也敢不赴欽因負敕印乎劒坐關門下曰敢言開關者斬夜草疏曰臣聞天子將有親征之事必先期下詔廷臣集議其行也六軍翼衛百官扈從而後有車駕之音羽旄之美令寂然一不聞輒云車駕即日過關此必有假陛下名出邉勾賊者臣請捕其人明正典刑若陛下果欲出關必兩宫用寶臣乃敢開不然萬死不奉詔奏未達使者復來欽伕劒叱之曰此詐也使者懼而返為帝言張御史幾殺臣帝大怒顧錢寧為我速捕殺御史會梁儲蔣冕毛紀追及于沙河請帝歸京師帝徘徊未决而欽疏亦至廷臣又多諌者帝不得已乃自昌平還意殊怏怏又二十餘日欽巡白羊口帝復微服自德勝門出夜宿羊房民舍遂疾馳出關數問御史安在欽聞追之已不及欲冉疏諌而帝使中官谷大用守關禁毋得出一人欽感憤西望痛哭帝至宣府彬先為帝建鎮國府第悉輦豹房珍玩女御實其中彬從帝數夜入人家索婦女帝大樂之忌歸稱曰家裏質實沙河昌平州志沙河北店距州二十五里南店距州二十七里羊房堡名在青邉口西南張欽字敬之順天通州人九月帝自稱總督軍務威武大將軍總兵官時自宣府至陽和所駐蹕稱軍門凡有徴發概以威武大將軍鈞帖行之尋命户部發銀一百萬兩輸宣府以備賞勞尚書石玠持不可帝弗從乃輸其半冬十月小王子入冦帝自將禦之先是帝在陽和聞小王子帥五萬騎駐邉將入冦帝喜雄略得自見遂命大同總兵官王勛副總兵張輗遊擊陳銓孫鎮軍大同城遼東參將蕭滓軍聚落堡宣府遊擊時春軍天城副總兵陶杰參將楊玉延綏參將杭雄軍陽和副總兵朱樂軍平魯遊擊周政軍威逺時九月戊戌也至是月辛丑冦分遒南下勛等率所部禦之帝命春澤往援政巒及參將麻循高時繞敵役夾擊又調宣府總兵官朱振參將左欽等俱會陽和參將江桓等為之䇿應越四日甲辰勛與敵遇督軍步戰冦南循應州而去明日勛等復遇敵於應州城北五里寨戰數十合殺傷頗相當薄暮敵騎傍東山去既而分兵圍勛等比曉天大霧圍解勛等入應州城巒及都指揮徐輔兵至明日勛等出城大戰時春滓等兵亦至冦復以别騎迎敵官軍不得合帝乃率太監張永魏彬張忠都督江彬等兵自陽和來援衆殊死戰敵稍却諸軍乃得合日暮即其地為營乘輿止焉明日敵來攻帝復督諸將禦之自辰迄酉戰至百餘合敵退引而西帝與諸將歸敵後至朔州邉會大風霧畫晦官軍亦疲困遂還是役也斬首十六級官軍死者五十二人重傷者五百六十三人乘輿幾陷勛等以捷聞於朝質實聚落堡在大同府東六十里天順三年築城周三里天城衛在大同府東北百八十里東南至蔚州百五十里洪武三十一年置今改天鎮縣屬大同府平魯衛在大同府西二百五十里今改平魯縣屬朔平府應州五代唐分雲州地置應州竝置金城為應州治洪武初省縣入州屬大同府今因之十一月召楊廷和復入閣先是十年三月廷和以父憂歸及是服闋召之還朝既至疏請回鑾不報復與蔣冕馳至居庸欲身出塞請谷大用扼關門不得出乃還戊寅十三年春正月朔帝在宣府文武羣臣於奉天門行遙賀禮振京畿饑給事中邵錫言自去年雨水為災順天保定河間被害尤甚真定大名等五府次之人民艱食餓殍盈路流移不止盜賊將起非細故也陛下軫念災傷既發户部金及德州倉糧遣郎中二人振濟竊恐待餔者衆所發不足供所需郎官權輕無以督率羣吏請别遣重臣增給銀穀以往其稅糧物料仍乞例外蠲免以蘇民困帝可其奏乃遣僉都御史李鉞督振而敕巡撫李瓚臧鳯撫恤真定等府饑民乏耕種具者官為補助是年二月留廬鳯淮揚徐州兑運糧五萬五千石及折糧腳價銀四萬兩淮浙鹽價銀各三萬兩分給廬鳳等府縣亦以水災故也質實邵錫安州人李鉞字䖍甫祥符人臧鳯字瑞周曲阜人李瓚濮州人帝至自宣府帝將還京禮部具迎駕儀令京朝官各朝服迎候而傳㫖用曵撒大帽驚帶且賜羣臣大紅紵絲羅紗各一其綵繡一品斗牛二品飛魚三品蟒四品麒麟五六七品虎彪翰林科道官不限品級皆與焉惟部曹以下不與言官論其非制不納及是迎帝德勝門外羣臣具綵帳數十綵聨數千皆金織字序詞惟稱威武大將軍不敢及尊號衆官列名于下亦不敢稱臣各陳羊酒白金綵幣手紅梵夾候道左蓋中官預傳帝意如此時帝戎服乘赤馬佩劍邉騎簇擁遙見火毬起戈矛間烟直上乃知駕至羣臣齊伏地叩首帝下馬坐御幄大學士揚廷和奉觴梁儲注酒蔣冕捧果槅毛紀擎金花二稱賀帝曰朕在榆河親斬敵首一級亦知之乎廷和等皆頓首稱聖武帝遂馳馬入東華門宿豹房是日太雨雪帝至時夜已久羣臣迎駕者僕馬相失曳走泥淖中夜半得入城有幾殆者質實明史五行志曵撒大帽行役所用非見君服皆服妖也輿服志洪武二十四年定公侯駙馬伯服繡麒麟白澤文官一品仙鶴二品錦雞三品孔雀四品雲雁五品白鵬六品鷺鷥七品鸂鶒八品黃鸝九品鵪鶉雜職練鵲風憲官獬豸武官一品二品獅子三品四品虎豹五品熊羆六品七品彪八品羣牛九品海馬時文臣服色亦以走獸而麒麟之服逮于四品尤異事也榆河即榆溝山西通志鎮川堡十五墩北直榆溝門又西十九墩北直牛心山山左右胥榆溝也罷南郊致齊是月庚戌當南郊以初至不及致齊遂行禮先是帝在宣府既閲嵗未還內外羣臣皆恐帝竟忘返不得親郊南京禮部尚書吳儼上疏諌語極劉切略言臣等初聞車駕出幸昌平曾具疏極論不家采納既而又聞出居庸幸宣府大同宰輔不及知羣臣不及從六軍之士不及衛護臣等戰懼驚惶未測其故伏而思之是必因邉圍告急陛下慮羣帥之不力憫邉氓之被俘急于制御遂不暇咨謀而行耳然今在廷之臣文武如林寧無一人可委任者而陛下必欲自行耶方車駕之初出臣民引領北望皆謂回鑾必在九月萬夀節時則以天下之朝賀者畢至蕃服之貢獻者在廷豈宜使之空行及九月既過人謂回鑾必在長至令節時則以九廟有灌獻兩宫有慶賀豈宜遣人以代及長至既過又謂必在明年元旦時今過元旦又十日矣車駕還否逺不可知萬一未還則郊祀大禮尤非臣下所敢代者將遂缺而不舉歟若謂冦尚在邉則待冦滅而後還歟又萬萬無此理况近者內外人心搖動口語籍籍轉相傳播徐淮以南饑饉千里去冬雨雪為災民無衣食至于父子流移兄弟離散略不繫念甚有自引决者民窮至此安保其不為盜臣恐所禦之冦尚在藩籬而不虞之患或起肘腋此不可以不慮也時户部侍郎張津慮天府丞許延光給事中孫懋御史潘􅞜先後馳疏請回鑾皆不報帝既還京雖不失郊期而倉猝成禮仍獵南海子翌日始還宫御奉天門陳示應天所獲刀械衣器令羣臣縱觀質實潘􅞜未詳案是年正月辛丑朔武宗以丙午還京乃月之六日吳儼疏有過元旦十日語蓋儼官南京尚未知武宗之已還也帝復如宣府帝以是月丙午還京居十四日復如宣府廷臣從者四人餘以次追及楊廷和等冉疏諌不聽二月太皇太后王氏崩諡孝貞皇后帝還京師孝貞皇后崩于是月己卯帝聞赴告乃自宣府還壬午至京師發喪夏五月己亥朔日有食之六月葬孝貞皇后先是帝以孝貞皇后將葬假啓土為名欲復巡幸給事中石天柱念帝盤遊無度廷臣雖諫帝意不回思所以感動之者乃刺血草疏略曰臣竊自念生臣之身者臣之親也成臣之身者纍朝之恩也感成身之恩欲報之于陛下者臣之心也因刺臣血以寫臣心明臣愚忠冀陛下憐察近者吳天不弔禍延太皇太后喪禮大事孫子所當自盡陛下于太皇太后未能盡孝則羣臣于陛下必不能盡忠不忠將無所不至猝有變故人心瓦解矣方今朝廷空城市空倉廪空邉鄙空大下皆知危亡之禍獨陛下不知耳治亂安危在此行止此臣所痛心為陛下惜復昧死為陛下言也凡數千言當天柱刺血時恐為家人所阻避居密室雖妻子不知既上即易服侍罪聞者皆感愴而帝終不悟遂往幸昌平既視隧道幸密雲時民間競傳欲括女子斂財物以充進奉所至遁匿永平知府毛思義下令以為大喪未畢車駕必不出此必奸徒矯詐自今非有府部撫按文書妄稱駕至擾民者悉捕治之帝闈大怒執送錦衣獄降雲南安寧知州帝復往喜峰口駐驛馬招朵顔三衛人至關宴勞畢還幸河西務指揮黃勳以供應為名科擾侵盜巡按御史劉士元按之勳逃至行在因嬖幸譖士元聞駕至令民間盡嫁其女藏匿婦人遂命祼縳士元而訊之野次無杖取生栁杖四十幾死因繫于車馳入京下錦衣獄至是梓宮發京師帝戌服從至陵飲帳殿及升祔帝至暮乃入廟雷雨大作燭盡滅言官上疏請修省不報質實毛思義陽信人劉士元彭縣人秋七月帝復如宣府帝從江彬言將遍遊塞上託言邉關多警特命總督軍務威武大將軍總兵官朱夀統六師往征令內閣草敕閣臣不可帝復集百官左順門靣諭衆皆泣諫而帝意不可回竟不聽遂復北幸由東安門出羣臣知而送者五十二人尋駐驛宣府已又駐驛大同凡車駕所至近侍先掠良家女以充幸御至數十車在道日有死者左右不敢聞且令有司餼廩之别具女衣首飾為賞賚費逺近騷動所經多逃亡帝不知也彬復導帝自大同渡黃河次榆林至綏德州幸總兵官戴欽第納其女還由西安厯偏頭關抵太原大徴女樂晉府樂工楊騰妻劉氏善謳帝悅之載以俱歸大見寵幸左右或觸帝怒隂求之輒一笑而解彬與諸近幸皆毋事之稱劉娘娘云質實大同黃河水道提綱黃河自舊束勝州稍折而東南至湖灘河朔渡口遂南流百里入山西平魯縣邉界案平魯於明為衛在大同府西二百五十里府志云西界黃河以此地本朝雍正三年改平魯衛為縣又於明大同右衛置朔平府以領之故今大同府西距朔平不復以河為界王守仁平江西賊守仁既至贛州知左右多賊耳目呼老𨽻詰之𨽻不敢隱因貰其罪令絅賊賊動靜無弗知于是檄福建廣東會兵先討大帽山賊詹師富督副使胡璉等分道進指揮覃桓縣丞紀鏞薄賊于險戰死守仁親率鋭卒屯上杭佯退師出不意搗之連破四十餘寨俘斬七千有竒指揮王鎧等禽師富疏言權輕無以令將士請給旗牌提督軍務得便宜從事尚書王瓊奏從其請乃更兵制二十五人為伍伍有小甲二伍為隊隊有總甲四甲為哨哨有長協哨二佐之二哨為營營有官參謀二佐之三營為陳陳有偏將二陳為軍軍有副將皆臨事委不命于朝副將以下得遞相罰治部署既定乃進兵大庾討陳曰能而橫水賊謝志山乘間急攻南安知府季斆擊敗之副使楊璉等亦生縶曰能以歸時十二年九月也遂于冬十月討橫水左溪令都指揮許凊贛州知府邢珣等各一軍㑹橫水斆及守備郟丈等各一軍會左溪又令吉安知府伍文定等遏其奔軼守仁自駐南康去橫水三十里先遣四百人伏賊巢左右進軍逼之賊方迎戰兩山舉幟賊大驚謂官軍已盡犁其巢遂潰乘勝克橫水志山及其黨蕭貴模等皆走桶岡左溪亦破守仁以桶岡險固移營近地諭以禍福賊首藍廷鳯等方震恐見使至大喜期仲冬朔降而珣文定已冒雨奪險入賊阻水陳珣直前摶戰文定等自右出賊倉卒敗走諸軍遂破桶岡志山貴模廷鳯靣縳降凡破巢八十有四俘斬六千有竒時湖廣巡撫秦金亦破龔福全其黨千人突至諸將禽斬之乃設崇義縣于橫水控諸猺還至贛州議討浰頭賊初守仁之平師富也龍川賊盧珂鄭志高陳英咸請降及征橫水浰頭賊將黃金巢亦以五百人降獨池仲容未下橫水破仲容始遣弟仲安來歸而嚴為戰守備詭言珂志高讐也將襲我故為備守仁佯杖繫珂等而隂使珂弟集兵待遂下令散兵嵗首大張燈樂仲容信且疑守仁賜以節物誘入謝仲容率九十三人營教埸而自以數人入謁守仁呵之曰若皆吾民屯于外疑我乎悉引入厚飲食之賊大喜過望益自安守仁留仲容觀燈樂正月三日大享伏甲士于門諸賊入以次悉擒戮之自將抵賊巢連破上中下三浰斬馘二千有竒餘賊奔九連山山橫亘數百里陡絶不可攻乃簡壯士百人衣賊衣奔崖下賊招之上官軍進攻內外合擊禽斬無遺乃于下浰立和平縣置戍而歸自是境內大定初朝議賊勢强發廣東湖廣兵合勦守仁上疏止之不及桶岡既滅湖廣兵始至及平浰頭廣東尚未承檄守仁所將皆文吏及偏禆小校平數十年巨冦逺近驚為神質實南安唐䖍州地宋淳化中置南安軍元為路明改府崇義本上猶縣橫水地明正德十二年置縣屬南安府龍川秦縣南漢為循州治明洪武初州廢以縣屬惠州府今皆因之九連山在江西龍南縣南廣東連平州東高二千餘丈周五六里東連龍川河源南連博羅增城龍門從化西連翁源英德北連龍南環通九縣因名和平本龍川縣之和平峝地是年置縣屬惠州府今皆因之胡璉沐陽人季斆瑞安人楊璉洛陽人邢珣當塗人秦金字國聲無錫人九月帝自加鎮國公帝欲自矜武功先嘗令兵部議加公爵敕曰總督軍務威武大將軍總兵官朱夀親統六師掃除邉患神功聖武宜加顯爵以報其勞楊廷和等言陛下躬膺天命所居者祖宗之位則所行者當遵祖宗之法以上順天意下慰人心今奉前㫖傳之四方必將羣聚而議曰所謂威武大將軍者果何時官制所謂總兵官某者果何人姓名且親統六師之說惟陛下自任之何為又舉而歸之總兵官為總兵官者豈可曰統六師乎至于神功聖武之一言乃臣下褒頌君上之詞今以之施于大將軍至欲加以公爵公爵雖尊亦人臣而已豈可以當神聖之名乎事之不經名之不正言之不順一至于此自古及今未之有也不知陛下何為而樂此乎邇者陛下久不親政天下人心危疑憂懼若復聞此其為疑懼又當何如萬一宗藩之中或有援引祖訓指此為言不知陛下將何以應之或又以朝無正臣內有奸惡為名不知陛下之左右及臣等代言之臣又將何以自解臣等僇身亡家固不足恤但恐朝廷之上禍亂將從此始耳伏望追寢前㫖庶幾可釋天下之疑弭未萌之禍不報至是帝在大同遂復降敕特加封鎮國公嵗支祿五千石令吏部如敕行會楊廷和蔣冕皆在告梁儲毛紀聞之馳疏諌曰陛下謬自貶損既封國公則將授以告券追封三代祖宗在天之靈亦肯如陛下貶損否況鐵券必有免死之文陛下夀福無疆何甘自菲薄䝉此不祥之辭臣等斷不敢阿意苟從取他日戮身亡家之禍也廷臣皆相繼極諫亦不報封右都督江彬左都督許泰為伯彬泰善伺帝意既誘帝巡邉與敵遇幸不覆沒帝自以為功欲張大之乃先後叙䕃升賞者五萬餘人至是又假重二人親為定爵名給事中劉濟御史張景賜等言彬無所俘馘泰足跡未至應州賞不當功乞愛惜名器收回成命不納質實劉清藍田人張景暘浙江山隂人己卯十四年春正月帝在太原改卜郊初郊祀卜于是月甲辰而帝逺遊邉塞將改嵗未有還期禮部尚書毛澄等馳疏諌曰去嵗正月以來鑾與數駕不遑寧居今兹之行又已半嵗宗廟社稷享祀之禮並係攝行萬夀正旦冬至朝賀之儀悉從簡略臘朔省牲闕而不行遂二年矣嵗律將周郊禋已卜皇祖之訓曰凡祀大地精誠則感格怠慢則禍生今六龍遐騁旋軫無日萬一氷雪阻違道途梗塞元正上日不及躬執玉帛于上帝前陛下何以自安且邉地荒寒隆冬尤甚臣等處重城食厚祿仰思聖體勞頓根本空虛遙望清塵憂心如醉伏祈趣駕速還躬親祼享宗社臣民幸甚不報至是竟改卜郊質實毛澄字憲清崑山人二月帝還京師帝遊幸邉塞逺厯數千里乘馬腰弓矢涉險阻冒風雪從者道多病帝無倦容至是自宣府還京師羣臣奉迎如前儀京師地震是月丁丑大祀天地于南郊帝擁百餘騎馳入郊壇既郊獵南海子如故于時地震風霾翌日戊寅帝夜還宫風霾乃止帝自加太師敕諭巡行祈福三月郎中黃鞏修撰舒芬等百四十六人先後疏諌悉杖之死者十一人帝降手敕諭吏部曰鎮國公朱夀宜加太師乂諭禮部曰威武大將軍太師鎮國公朱夀今往兩畿山東祀神祈福復諭工部急修黃馬快船備用閣臣及科道官皆切諫不報兵部郎中黃鞏乃抗章進言陛下即位以來紀綱法度一壞于劉瑾冉壞于佞幸又冉壞于邉帥蓋蕩然無餘矣亂本已生禍變將起因陳最急者六事一崇正學二通言路三正名號四戒逰幸五去小人六建儲二語甚剴摯時員外郎陸震草疏將諌見鞏疏稱歎因毁已槀與鞏連署以進修撰舒芬亦邀其同官崔桐等七人上疏極諌曰古帝王所以巡狩者協律度同量衡訪遺老問疾苦黜陟幽明式序在位是以諸侯畏焉百姓安焉若陛下之出不過如秦皇漢武侈心為樂而已非能行巡狩之禮者也博浪柏谷其禍亦可鍳矣近者西北冉巡六師不攝四民告病哀痛之聲上徹蒼昊傳播四方人心震動故一聞南幸詔書皆鳥驚獸散而有司方以迎奉為名微發嚴急江淮之間蕭然煩實萬一不逞之徒乘勢倡亂為禍非細且陛下以鎮國公自命苟至親王國境或據勛臣禮以待陛下循名責實深求悖謬之端則左右寵幸無死所矣尚有事堪痛哭不忍言者宗藩蓄劉濞之釁大臣懷馮道之心以祿位為故物以朝署為市㕓以陛下為奕棋以革除年間為故事特左右寵幸智術短淺無能以此言告陛下使陛下得開此言雖禁門之外亦將警蹕而出尚敢輕騎慢遊哉疏入陸完迎謂曰上聞有諌者輒恚欲自引決諸君且休芬等不應而出吏部員外郎夏艮勝及禮部主事萬朝太常博士陳九川復連疏入于是吏部郎中張衍瑞等十四人刑部郎中陸俸等五十三人繼之禮部郎中姜龍等十六人兵部郎中孫鳯等十六人又繼之而醫士徐鏊亦以其術諌帝與諸幸臣皆大怒下鞏震良勝潮九川鏊詔獄芬等百有七人罰跪午門外五日已而大理寺正周叙等十人行人司副余延瓚等二十人工部主事林大輅等三人連名疏又相繼上帝益怒並下詔獄俄令與鞏震等俱跪闕下五日加梏拲焉至晚繫嶽諸臣晨入暮出纍纍若重囚凡道旁觀者無不太息泣下廷臣自內閣及尚書石玠疏救外莫有言者諸嬖幸楊楊得意士民憤恨伺諸大臣出入爭擲瓦礫詬詈之諸大臣皆恐入朝不敢待辨色請下詔禁言事者通政司遂格不受疏是時天連曀盡晦南海子水涌四尺餘金吾衛指揮僉事張英曰此變徵也乃肉柦㦸刃于胸時疏諫當蹕道跪哭即自刺其胸血流滿地衛士奪其刃縳送詔獄詔杖之八十遂死諸臣跪既畢仍杖之于廷陸震余廷瓚及工部主事何遵刑部主事劉校照磨劉珏大理評事林公黼行人李紹賢孟陽詹軾劉槩李惠等十一人皆死鏊戍邉餘除名貶黜有差而車駕亦不復出矣質實黃馬快船亦謂之快馬船明世宗立楊廷和以其非制降遺㫖停造博浪城在開封府陽武縣東南五里一名博浪沙亭秦始皇二十九年東遊至此韓人張良令力士操鐵椎狙擊始皇誤中副車始皇驚求弗得令天下大索三日柏谷塢名在汝南府永寧縣界漢武帝建元三年嘗夜至柏谷逆旅主人疑為姦盜聚少年欲攻之主人嫗竒帝狀貌止其翁不聽飲翁以酒醉而縳翁少年皆散走黃鞏字伯固莆田人舒芬字國棠進賢人陸震字汝享蘭溪人崔桐字來鳯揚州人夏良勝字于中南城人萬潮字汝信進賢人陳九川字惟濬臨川人張衍瑞字元承汲縣人陸俸吳縣人姜龍字夢賔太倉人孫鳯洛陽人徐鏊嘉定人本高氏子少依舅京師冒其姓周叙九溪衛人余廷瓚鄱陽人林大輅莆田人何遵字孟循江寧人劉校郾城人劉珏汲縣人林公黼長樂人李紹賢盱貽人孟陽澤州人詹軾玉山人劉槩安樂人李惠祥符人時與舒芬崔桐上疏者庶吉士江暉王廷陳汪應軫馬汝驥曹嘉又有工部主事蔣山卿行人陶滋巴思明李錫顧可久鄧顯麒王翰熊榮楊秦王懋黃國用李儼潘鋭劉黼張嶽寺正金罍寺副孟廷柯張士鎬郝鳯升傅尚文郭五常評事姚汝臯蔡時者俱被杖謫云夏六月寧王宸濠反巡撫江西副都御史孫燧按察司副使許逵死之宸濠久蓄異志交通肘腋因帝遊幸不時人情危懼遂日夕覬覦與致仕都御史李士實舉人劉養正等圖不軓周儀閻順知其謀間行詣闕上變嬖人錢寧臧賢庇之不問宸濠疑出承奉周儀所指使殺儀家及典仗查武等數百人孫燧疏上其事中道為所邀不得達燧念左右悉宸濠耳目隂察副使許逵忠勇可屬大事與之謀乃托禦他盜預為備先城進賢次城南康瑞州請復饒撫二州兵備不得復則請敕湖東分巡兼理之九江當湖衝最要害請重兵備道權兼攝南康寧州武寧瑞昌興國及湖廣通城以便控制廣信橫峯諸黨地險人悍則請通判駐弋陽兼督旁縣兵又恐宸濠劫兵器假討賊名盡出之他所宸濠􅗎燧圖已使人賄近幸欲去燧而遺燧棗梨薑芥以示意燧笑却之逵勸燧先發後聞燧曰奈何豫賊以名且需之㑹江西大水宸濠素所蓄賊凌十一吳十三閔念四等出沒鄱陽湖燧與逵謀捕之三賊走匿宸濠祖暮間燧于是密疏白其狀具言宸濠必反章七上皆為所邀阻然宸濠反狀雖著猶以帝無儲二冀其子入嗣可得大統又不受悖逆名故蓄謀不發重賂錢寧求取中㫖召其子司香太廟寧言于帝用異色龍箋加金報賜異色龍箋者故事所賜監國書箋也宸濠大喜列仗受賀復脅鎮巡官及諸生父老奏闕下稱其孝且勤時江彬與太監張忠欲傾寧賢乘間為帝言寧賢盛稱寧王陛下以為何如帝曰薦文武百執事可任使也薦藩王何為者忠曰賢稱寧王孝譏陛下不孝稱寧王勤譏陛下不勤耳帝曰然下詔逐王府人毋留闕下宸濠益與士實養正謀遣奸人盧孔章等分布水陸孔道萬里傳報浹旬往返縱跡大露諸權姦多得宸濠金錢匿不以聞南昌人熊浹官給事中草奏盡列其狀授御史蕭淮上之疏下內閣楊廷和請如宣宗處趙府故事遣勳戚大臣宣諭帝乃命駙馬崔元都御史顔頤夀等持諭往收其護衛宸濠閣元等且至遂決計反月之十三日為宸濠生辰宴諸守王官詰旦皆入謝宸濠命甲士環之大言曰孝宗為李廣所誤抱民間子祖宗不血食者十四年今太后有詔令我起兵討賊亦知之乎衆相顧愕眙燧直前曰安得此言請出詔示我宸濠曰毋多言我往南京汝當扈駕燧大怒曰汝速死耳天無二日吾豈從汝為逆哉宸濠怒叱燧燧益怒急起不得出宸濠入內殿易戎服出麾兵縳燧逵奮曰汝曹安得辱天子大臣因以身蔽燧賊并縳逵二人且縳且罵不絶口賊擊燧折左臂與逵同曵出逵謂燧曰我勸公先發者知有今日故也燧逵同遇害惠民門外巡按御史王金主事馬思聰金山參議黃宏許效廉布政使胡濂參政程杲劉棐僉事賴鳯指揮許清白昻等並執下獄思聰宏不屈死布政使梁宸參政王綸李斆僉事潘鵬師夔按察使楊璋副使唐錦皆從逆宸濠遂以士實養正為左右丞相王綸為兵部尚書他各署僞職有差改元順德集兵號十萬釋獄因收庫藏馳檄指斥朝廷首邉其黨婁伯徇進賢為知縣劉源清所斬詔廣信窯賊賊畏守吏不敢發而其承奉涂欽與羣盜閔念四等略九江南康皆陷賊勢洶洶且將順長江東下江左右皆震動質實孫燧許逵同遇害明史忠義傳燧生有異質兩目爍爍夜有光死之日天忽隂慘烈風驟起凡數日城中民夫恐走收燧逵兩人尸尸未變黑雲蔽之蠅蚋無近者守臣上其事于朝未報世宗即位贈燧禮部尚書諡忠烈逵副都御史諡忠節並祀南昌賜其名旌忠嘉靖元年改贈逵為禮部尚書初逵以文天祥集貽其友給事中張漢卿而無書漢卿語人曰寧邸必反汝登其為文山乎逵父家居聞江西有變殺都御史反副使即為位易服哭人怪問故曰副使必吾兒也寧州元縣武寧唐縣明屬南昌府瑞昌南唐置明屬九江府興國宋置明屬贛州府通城唐通城鎮宋升縣明屬武昌府今皆因之橫峯在興安縣治北縣之鎮山也諸山環匝周三十里有巖洞泉石之勝居民取土為陶冶因以名窯惠民門南昌府七門之一方輿紀要明太祖定洪都命都督朱文正改築城西去江三十步建七門東曰永和東南曰順化南曰進賢又南曰惠民西南曰廣潤西曰章江北曰德勝閻順周儀查武史俱不詳其里貫順為寧王典寶副宸濠將反與典膳正陳宣內史劉良微言不可為典寶正涂欽所譖三人懼誅潛詣京師上變羣小庇宸濠下之獄搒掠備至宸濠聞三人赴都慮事泄誣奏其罪且嗾羣小必殺之會已遣戍孝陵乃免世宗立復官按明史諸王傳以順為典儀與忠義傳作典寶副者互異馬思聰字懋聞莆田人繫獄不屈絶食六日死黃宏字德裕鄞人被執憤怒以手梏向柱擊項死賊義而棺斂之子紹文奔赴求得其棺以僞命治斂非父志亟易之扶歸思聰贈光祿少卿宏贈太常少卿並配享旌忠祠忠義傳又稱宸濠之變江西士民受害者有萬木鄭山俱新建人集鄉人結寨自固賊黨謝重一馳入村二人執之積葦張睢陽廟前縳人馬生焚之賊黨不敢犯二人飲江上為盜凌十一所逼趣見宸濠烙而椎之皆罵賊死趙楠南昌諸屈生兄模嘗捐粟佐振宸濠捕模索金楠代往脅之不被掠死同邑幸增見迫抗節不從一家百口皆死諸生劉世倫儒士陳經官義士李廣源皆被掠不屈死葉景恩者以俠聞族居吳城宸濠將作雞捕景思脅降之不從死獄中宸濠兵過吳城景恩弟景允以三百人邀擊賊賊分兵焚劫景允家其族景集景修等四十九人皆死熊浹字悅之蕭淮桂林中衛人崔元代州人尚憲宗女永康公主顔頥夀字天和巴陵人王金臨穎人明史諸王傳謂金下獄孫燧傳謂金從逆稽首呼萬嵗考王守仁集處置從逆官員疏云參政王綸脅受贊理僉事潘鵬師夔被脅招降無民情罪尤重知府鄭巘已經别案問結外參照布政梁宸𠫭政劉棐程杲參議許效亷副使賀說僉事賴鳯都指揮王玘或行咨撫守或盤庫放糧勢雖由于迫脅事已涉于順從鎮守太監王宏御史王金主事金山布政胡濓按察使楊璋副使唐錦僉事王疇都指揮馬驥許清白昻郟文或被拘于城內或脅隨于舟中事雖涉于順從勢實由于迫脅則金固始下獄而後脅從者也又胡濂程杲許清明史諸王傳作胡廉陳杲許金誤金山光澤人許效亷梁宸里貫無考胡濓定安人程杲祁門人劉棐安福人賴鳯晉江人王綸陜西咸寧人潘鵬懷寧人師䕫長安人唐錦上海人劉源清字汝澄東平人巡撫南贛都御史王守仁起兵討宸濠秋七月復南昌守仁方奉命勘福建叛軍行至豐城而宸濠反遂急趨吉安與知府伍文定徴調兵食治器械舟楫傳檄暴宸濠罪俾守令各率吏士勤王因集衆議曰賊若出長江順流東下南都不保吾欲以計僥之少遲旬日無患矣乃多遣間諜檄府縣言都督許泰郤永將邉兵劉暉桂勇將京兵各四萬南贛王守仁湖廣秦金兩廣楊旦各率所部合十六萬直搗南昌所至有司缺供者以軍法論又為蠟書遺僞相李士實劉養正叙其歸國之誠令慫恿早發兵東下而縱諜泄之宸濠果疑與士實養正謀則皆勸之疾趨南京即大位宸濠益大疑十餘日詗知中外兵不至乃悟守仁紿之七月壬辰朔留宜春王拱樤守城而劫其衆六萬人出大江攻安慶都督僉事楊鋭與知府張文錦指揮崔文等禦之江上已收兵入城被圍鋭晝夜拒戰守禦甚固百計攻之終不能克宸濠慚憤謂其下曰安慶且不克安望金陵哉守仁聞賊兵盡鋭東下南昌兵少則大喜趨樟樹鎮臨江知府載德孺袁州知府徐璉贛州知府邢珣等各以兵來會合八萬人或請救安慶守仁曰不然今九江南康已為賊守我趨南昌與相持江上二郡兵絶我後是腹背受敵也不如直搗南昌賊守備虛我軍新集氣鋭攻必破賊聞南昌破必解圍自救逆擊之湖中蔑不勝矣泉曰善己酉次豐城以文定為前鋒庚戌夜半兵抵廣潤門守兵駭𣪚辛亥黎明諸軍梯絙登城縳拱樤等宫人多焚死軍士頗殺掠守仁戮犯令者十餘人宥脅從安士民慰諭宗室人心大悅質實豐城三國吳析南昌縣地置富城晉改豐城元升為富州明洪武初復為豐城屬南昌府今因之樟樹鎮方輿紀要在臨江府東北三十里又東北至豐城縣七十里本名清江鎮亦謂之鹿渚即故新淦縣址也臨江宋置臨江軍元路明府今因之楊思字晉初建安人宜春王拱樤案明史諸王表寧獻王第三子盤烑宣德三年封宜春王拱樤其五世孫也正德二年襲封楊鋭字進之蕭縣人張文錦安邱人戴德孺臨海人徐璉朝邑人王守仁敗宸濠于樵舍擒之守仁既下南昌居二日遣伍文定邢珣徐璉載德孺各將精兵分道進而使瑞州通判胡堯元等設伏以待宸濠果解安慶圍崔文出城襲擊破之宸濠恚甚殺知府宋以方祭江還救南昌遇于黃家渡文定當其前鋒佯北賊趨利前珣繞出賊背貫其中文定及都指揮余恩乘之璉德孺張兩翼分賊勢堯元等伏發賊大潰退保八字腦宸濠懼盡發南康九江兵復戰官軍却守仁斬先却者諸軍殊死戰賊復大敗退保樵舍聨舟為方陳盡出金實犒士明日宸濠方晨朝其羣臣官軍奄至以小舟載薪乘風縱火焚其副舟妃婁氏以下皆技水死宸濠舟膠淺倉卒易舟遁萬安知縣王冕所部兵追執之士實養正及降賊按察使楊璋等皆就擒南康九江亦下凡三十五日而賊平質實方輿紀要樵舍驛在南昌府西北六十里黃家渡在南昌府三十里八字腦在饒州府西三十里宋以方字義卿靖州人瑞州知府瑞故無城郭以方慮宸濠必叛築城繕守具募兵三千日夕訓練宸濠深忌之有徵索又不應遂迫鎮守劾繫南昌獻宸濠反出以方脅之降不可械舟中至安慶兵敗問地何名舟子云黃石磯江西人音則王失機也宸濠以為不祥斬以方祭江後賊平其子崇學求遺骸不得斂衣冠歸葬嘉靖六年巡撫陳洪謨上其事詔贈光祿卿立祠瑞州妃婁氏上饒人婁諒之女宸濠謀逆婁氏嘗泣諌及敗歎曰紂以用婦言亡吾以不用婦言亡悔何及秋八月帝自將擊宸濠初宸濠反狀聞邉將在豹房者各獻擒宸濠之䇿帝亦欲假親征南遊遂傳㫖稱宸濠悖逆天道謀為不法即令總督軍務威武大將軍鎮國公朱夀統各鎮兵征勦所下璽書改稱軍門檄江彬等皆隨征楊廷和等諌不聽至是駕發京師梁儲蔣冕扈征次涿州王守仁捷奏至留之不下帝至保定宴于府堂與都御史伍符為藏闥戲符探得􅍐帝不悅飲符至醉乃大笑方帝之南發也劉姫疾不從約以玉簪召帝過蘆溝橋馳馬失簪索之不得及至臨清遣使召姬姬以無信約不肯行帝乘單舸晨夜疾行至張家灣載與俱南內外從官無知者質實伍符字朝信安福人命太監張忠安邉伯許泰率禁軍往江西王守仁初上宸濠反書因請黜姦諛諸嬖幸皆恨宸濠既平相與媢功且懼發其罪競言守仁先與通謀慮事不成乃起兵又欲令縱宸濠湖中待帝自擒守仁秉忠泰未至先俘宸濠發南昌忠泰以威武大將軍檄邀之守仁不與間道趨玉山上書請獻俘止帝南征帝不許至錢塘遇太監張永永提督軍務在忠泰上而故與楊一清除劉瑾天下稱之守仁夜見永頌其賢因極言江西困敝不堪六師之擾永深然之曰永此來為調護聖躬非邀功也公大勛永知之但不可徑情耳守仁乃以宸濠付永而身至京口欲朝行在㑹帝命守仁巡撫江西守仁乃返南昌忠泰已先至恨失宸濠執伍文定縳之文定罵曰吾不恤九族為國家平大賊何罪汝天子腹心屈辱忠義為逆賊報讐法當斬忠益怒椎文定仆地文定求解任不報時忠泰必欲誣守仁與宸濠通詰責宸濠左右皆言無有嚴詰不已曰獨嘗遣弟子冀元亨詣宸濠論學忠等大喜搒元亨加以炮烙終不承械送京師詔獻比守仁至故縱京軍犯之或呼名嫚罵守仁不為動撫之愈厚病豫藥死豫棺遭喪于道必停車慰問京軍謂王都堂愛我無復犯者忠泰言寧府富厚甲天下今所蓄安在守仁曰宸濠異時盡以翰京師要人約內應籍可考也忠泰故納宸濠賄者氣懾不敢復言已輕守仁文士强之射徐起三發三中京軍皆歡呼忠泰益沮會冬至守仁命居民巷祭已上冢哭時新喪亂悲號震野京軍離家久聞之無不泣下思歸張永後至復促忠泰偕還乃不得已班師質實京口今鎮江府治城因京峴山為壘俯臨江津故曰京口冀元亨字惟乾武陵人篤信守仁學從于贛州守仁屬以敕子宸濠懷不軌初外務名高貽書守仁問學守仁使元亨往講西銘反覆君臣義甚悉宸濠亦服厚贈遣之元亨反其贈于官既繫詔獄二年世宗嗣位言者交白其寃出獄五日卒按王守仁之平宸濠不特張忠許泰忌功排陷明武宗實録亦力加誣詆謂守仁勘事福建以宸濠生日將届趨道南昌賀之豐城知縣顧佖以變告守仁大駭小艇遁還贛伍文定迓于峽江請留封賊守仁初不許又謂守仁將兵無紀律縱殺居民往往死于牀簀有闔門無噍類者至其叙劉養正始未則云守仁尤重之以為道學友守仁在南贛為宸豪所慕餽遣相屬子遒逆濠既拜養正為軍師日夕望守仁至實不虞守仁之見圖也養正既擒後守仁畏其口逼令引決蓋實録前後所載如此王世貞弇山堂别集辨之甚悉今采録其略云逆濠以文成在上流擁精兵建大勛有才術甘言結納或有之文成亦據撫臣往還之常禮為報耳使預其謀何以徑歸吉安伍公雖進言起義兵亦須文成有以自決夫進兵攻南昌不能無少殺掠而軍令下則已定矣其後如鄭端簡曉薛應旗諸公皆履其地得其詳始為之暴白而未有摘抉一時握管之心者蓋實録之始任總裁者楊文忠廷和繼之者費文憲宏而以副總裁專任者董文簡玘也楊公與王恭襄瓊郤甚著然恭襄雖隂譎能識文成面獨任之以故于前後平賊及擒逆濠之疏皆歸德兵部以為發蹤指示之力而一字不及內閣其為楊公輩切齒非旦夕矣許泰張忠輩既耻大功為文成所先必肆加羅織之語而忌功之輩從而附和之文憲在文成撫綏之地中外屢薦起之而文成未有一疏相及費公亦不釋然也董公最名忮毒既內忌文成之功而外欲以媚楊費作此誣史將誰欺乎冬十二月帝如南京自帝發京師江彬在途矯旨輒縳長吏至楊州即民居為提督府遍索寡婦處女導帝漁獵以劉姫諌稍止及是至南京又欲導帝幸蘇州下浙江抵湖湘諸臣極諌㑹其黨亦勸沮乃止彬率邉兵數萬跋扈甚成國公朱輔見彬即長跪魏圍公徐鵬舉及公卿大臣皆側足事之惟參贊尚書喬宇應天府丞寇天叙挺身與抗彬氣遂稍折質實朱輔成國公能曾孫徐鵬舉中山王達七世孫喬宇字希大山西樂平人寇天叙字子榆次人庚辰十五年春正月帝在南京改卜郊帝令羣臣議欲于南京行郊禮大學士梁儲蔣冕計此議行則回鑾益無日極陳不可疏三上始得請儲又因郊期改卜乞還乘輿而帝殊無還意日挾劉姬縱游嘗幸牛首山至夜不返左右忽失帝所在大擾諸衛軍皆驚久之乃定傳者或謂江彬欲為逆云質實牛首山在江寧府南三十里一名仙窟山以山後有石窟也本名牛頭山有二峯東西相對晉元帝初作宫殿王導指雙峯曰此天闕也故亦名天闕山周四十七里高百二十七丈夏四月淮揚大饑民相食敕所司賑之秋閏八月受江西俘初王守仁既以宸濠付太監張永永復械之至江西留數旬促張忠許泰同歸忠泰見帝百端讒毁守仁獨永時左右之忠泰屢矯㫖召守仁守仁不赴忠揚言帝前曰守仁必反試召之必不至永遣急足先告守仁召者至守仁不退食即與偕行忠泰計沮不令見帝守仁乃入九華山日晏生僧寺帝覘知之曰守仁學道人聞召即至何謂反遺還鎮令更上捷音守仁遂易前奏言奉威武大將軍方略討平叛亂而盡入諸嬖幸名于是帝乃以為捷命設廉場戎服樹大纛環以諸軍釋所俘宸濠等去桎梏伐鼓鳴金而擒之然後置械受俘質實九華山在池州府青陽縣西南四十里舊名九子山山有九峯如蓮華唐李白遊此易令名高千仭周百八十里發明人臣敵王所愾必歸美于廟謨帝王創建殊勳雖秉自睿謀亦必曰將帥之力蓋以專閫之寄出自朝廷臣下之功即天子之功也武宗間王守仁平宸濠之捷欲令縱之湖中候駕至擒獲幾若索俘獻馘必待天子親執疆場而後謂之奏凱者逮守仁更上捷音歸功方略又盡入諸佞幸名庶幾如其所欲猶復令釋桎梏伐鼓樅金而後擒之受俘之典幾同游戲武宗素有童心深以是役之不出於已為歉而忠泰輩遂得乘機而慫恿之使非守仁先機達變委曲仰承其不至縱冦遺患者羲希矣帝發南京先是梁儲蔣冕乞還乘輿疏八九上帝不省是秋有物若豕首墮帝前色碧又帝所御婦人室中滿壁纍纍若懸人首狀人情益驚儲冕手疏跪泣行宫門外厯未至酉帝遣人取疏入諭之起叩頭言未奉諭旨不敢起帝許不日還京乃出會宸濠繫江上舟中民間訛言將為變帝心疑欲歸乃下詔班師丁酉發南京日夕祭龍江䮃蹕儀真次日至瓜洲避雨民家遂自瓜洲濟江登金山復南渡幸大學士楊一清第製詩十章腸之還至掦州太監邱得索賄不得以鐵絙繫知府蔣瑶窘辱備至數日乃得釋質實金山在鎮江府西北七里大江中風濤環澆勢欲飛動一名浮玊山蔣瑶字粹卿歸安人方武宗駐蹕揚州江彬欲奪富民居為威武副將軍府瑶執不可彬閉瑶空舍挫辱之脅以帝所賜銅爪不為懾㑹帝漁獲一巨魚戲言直五百金彬即界瑶責其直瑶懷其妻簪珥袿服以進曰庫無錢臣所有惟此帝笑而遣之府故有瓊花觀詔取瓊花瑶言自宋徽欽北狩此花已絶今無以獻又傳㫖微異物瑶其對非掦産帝曰苧白布亦非楊産耶瑶不得已為獻五百匹時權幸以掦素饒要求無所不至微瑶民且重困九月漁于積水池遂有疾帝至清江浦幸太監張掦第踰三日自泛小舟漁于積水池舟覆溺焉左右挾帝出自是遂不豫質實積水池在山陽縣西冬十月至通州帝之北還每令宸濠舟與御舟衛尾而行意甚防之及抵通州謂左右曰吾必決此獄乃入召勳戚大臣議宸濠獄時帝久駐于外京師洶洶人情危懼大學士楊廷和毛紀等請帝還大內然後獻俘誅宸濠不納羣臣請如先年處置髙煦置鐇例祭告天地宗廟仍敕天下諸王議罪乃明正以法亦不聽于是詔治交通宸濠者罪執吏部尚書陸完至通州嬖人錢寧及太監畢真劉琅劉璟都指揮廖鵬齊佐王凖都督同知王瓛等皆先完就執方宸濠反書至京帝已心疑寧寧懼白帝收宸濠所遣盧孔章而歸罪臧賢謫戍邉使校尉殺之途以滅口又致孔章庾死冀得自全然卒中江彬計使董皇店役彬在道盡白其通逆狀帝曰黠奴我固疑之乃羈之臨清馳收其妻子家屬下獄真先鎮守江西與宸濠親厚宸濠為出資夤緣改浙江真至即大賞諸衛官軍費以萬計亦宸濠資之也及叛密遣人馳報真真即倡言寧世子來取浙矣浙中大震會進聖夀節表三司及府衛諸官當集于鎮守署前夕收城門鑰令官軍夜半皆甲以入將為亂衆官懼不起且嚴木備真不得發琅守備南京欲自託于宸濠隂遣弟璋事之宸濠以為南京有琅浙江有真下之如反掌耳琅聞宸濠舉逆聚家丁百餘攜火藥軍器出城欲為宸濠應事泄乃已佐凖皆宸濠壻璟瓛鵬皆與通賄賂既敗分遣官校收捕之至是張永發完罪因命逮赴行在帝以完大臣寧素所信任顧反負恩通逆尤恨此二人欲置之極典質實按明史諸王傳帝聞宸濠反逮尚書陸完嬖人錢寧等籍其家江彬張忠慫恿帝親征據此則完寧皆被收于親征之前然考明武宗實録正德十四年八月癸未帝發京師傳㫖令錢寧量帶官校從行十月辛未至臨清留寧董皇店役十一月丁巳江彬發寧逆謀命羈管于臨清十五年十一月庚申始執陸完至通州行在蓋寧之被逮實在親征後十日又後一年而完始敗質之錢寧陸完本傳皆合諸王傳繫之親征前者乃承憲章録之誤十二月誅宸濠還京師時江彬欲治宸濠獻竣勸帝復幸宣府乃上言臣奉鎮國公朱夀指示方略擒捕宸濠及其逆黨十五人乞速典刑殛之帝下詔褒賜鎮國公嵗加彬祿米百石廕一子錦衣千户趣召廷和等至通州受事賜宸濠自盡仍焚棄其尸將遂北幸會帝體憊甚左右力請還朝越三日乃返京師大櫂軍容俘諸逆者及家屬數千人陳輦道東西陸完錢寧亦皆祼體反接揭白幟標其姓名死者梟于竿凡數里不絶帝戎服乘馬立正陽門下閲視良久乃入後完竟得减死遣戍質實陸完減死遣戍明史陸完傳完列凱旋前部以入將置極刑值武宗崩世宗立法司覆奏完交外藩而遺金不却處護衛而執奏不堅當斬完復乞哀下廷臣覆讞以平賊功在八議之列遂得减死戌福建靖海衛毋年九十餘竟死獄中初完嘗夢至戍山曰大武及抵戍所有山如其名歎曰吾戌已久定何所逃乎卒于戍所辛已十六年春三月癸丑朔日有食之帝崩于豹房先是帝以凱旋祀南郊嘔血不能成禮與疾歸及是益甚謂太監陳敬蘇進曰朕疾殆不可為可以朕意達皇太后天下事與內閣輔臣議處之前此事皆由朕誤非汝輩所能預也丙寅遂崩于豹房太監谷大用張永等以皇太后命移殯大內皇太后以遺詔遣官迎興世子厚熜入嗣皇帝位方帝大漸司禮中官魏彬等以帝與皇嗣至閣言國醫力竭矣請捐萬金購之草澤楊延和心知所謂不應而微以倫序之說諷之彬等唯唯及帝崩谷大用張永至閣議所當立廷和出祖訓于袖中示之曰兄終弟及誰能瀆焉興獻王長子憲宗之孫孝宗之從子大行皇帝之從弟序當立梁儲蔣冕毛紀咸贊之乃令中官入啓皇太后廷和等候左順門下吏部尚書王瓊率九卿入左掖門厲聲曰此豈小事我九卿長顧不與邪衆不答頃之中官奉遺詔及太后懿㫖宣諭羣臣一如廷和請乃議遣官奉迎故事當以內閣一人與中貴勳戚禮官偕往廷和恐蔣冕去則已益孤而梁儲老矣或憚往乃佯惜儲憊阻其行儲奮曰事孰有大于迎天子者乎敢以憊辭遂與定國公徐光祚等奉遺詔以行質實與世子厚熜獻王祐杬子時獻王薨厚熜以世子理國事罷威武團營先是帝不豫江彬猶矯㫖改西官㕔為戚武團營自提督軍務至是楊廷和請于皇太后傳遺㫖罷之各邉軍俱重賚散歸鎮革京城內外皇店縱遣豹房畨僧少林僧及教坊司樂人又以遺詔放還四方進獻女子停京師不急工務收宣府行宫珠寶歸之內庫中外大悅江彬等有罪下獄彬知天下惡已又見罷遣邉兵益內疑其黨都督僉事李琮勸彬速反不勝則北走塞外彬猶豫未決詭稱疾不出隂布腹心衷甲觀變令許泰詣內閣探意廷和慰以溫言彬稍安乃出成服廷和遂密與蔣冕毛紀及太監溫祥魏彬張永合謀捕之魏彬入白太后會坤寧宫安獸吻即命江彬與工部尚書李鐩入祭彬禮服入家人不得從祭畢張永留彬飯故緩之俄而太后下詔收彬彬覺亟走西安門門閉尋走北安門門者曰有㫖留提督彬曰今日安所得㫖門者擁之遂被執拔其鬚且盡有頃神周李琮亦縛至琮罵彬曰奴早聽我豈為人擒遂並下錦衣衛獄籍彬家黃金七十匱白金二千二百匱他珍寶不可勝計彬既敗張忠許泰等以次下獄夏四月興世子至京師入即位世子自興邸至京師止于郊外有議用天子禮奉迎者禮部尚書毛澄曰今即如此後何以加豈勸進辭讓之禮當遂廢乎乃具儀請如皇太子即位禮王世子顧長史袁宗臯曰遺詔以我嗣皇帝位非皇子也楊廷和請如禮臣所具儀由東安門入居文華殿擇日登極不允㑹皇太后趣羣臣上箋勸進乃即郊外受箋是日日中入自大明門御奉天殿即位詔草言奉皇兄遺命入奉宗祧帝遲回久之始報可質實袁宗臯字仲德石首人詔赦天下除一切弊政以明年為嘉靖元年大赦帝之未至京師也楊廷和總朝政者三十七日中外倚以為安及帝即位廷和草登極詔恤録正德中言事罪廢諸臣賜天下明年田租之半自正德十五年以前通賦盡免之凡先朝蠧政釐抉且盡所革錦衣內監旗校工後凡十餘萬減漕糧百五十三萬二千餘石其中貴義子傳升乞升一切恩幸得官者大半皆斥去朝野皆稱新天子神聖且頌廷和功而諸失職之徒銜廷和刺骨廷和入朝有挾白創伺輿傍者事聞詔以營卒百人衛出入遣使迎母妃蔣氏于安陸質實母妃蔣氏天興人𢎞治五年冊為興王妃父斆嘉靖元年追封玉田伯召費宏入內閣宸濠既敗言事者爭請召宏于是起宏為少保入輔政並復其弟寀編修詔議崇奉興獻王典禮時帝即位甫六日即詔議興獻王主祀及尊稱禮部尚書毛澄請于楊廷和廷和出漢定陶王宋濮王事授之曰是足為據澄乃大會文武羣臣上議曰考漢成帝立定陶王為皇太子立楚孝皇孫景為定陶王奉共王祀共王者皇太子本生父也時大司空師丹以為恩義備至今陛下入承大統宜如定陶王故事以益王第二子崇仁王厚炫主後興國又考宋英宗以濮安懿王之子入繼仁宗司馬光謂濮王宜尊以高官大爵稱王伯而不名范鎮亦言陛下既考仁宗若復以濮王為考于義未當乃立濮王圍廟以宗朴喬濮國公奉濮王祀程頤之言曰為人後者謂所後為父母而謂所生為伯叔父母此生人之大倫也然所生之義至尊至大宜别立殊稱曰皇伯叔父某國大王則正統既明而所生亦尊崇極矣今興獻王于孝宗為弟于陛下為本生父與濮安懿王事正相等陛下宜稱孝宗為皇考改稱興獻王為皇叔父興獻大王妃為皇叔母興獻王妃凡祭告興獻王及上箋于妃俱自稱姪皇帝某則正統私親恩禮兼盡可以為萬世法議上帝大愠曰父母可更易若是邪命冉議是月二十四日乙亥澄復會廷臣上議曰禮為人後者為之子自天子至庶人一也興獻王子惟陛下一人既入繼大統奉祀宗廟是以臣等前議欲令崇仁王厚炫主興獻王祀至於稱號陛下宜稱為皇叔父興獻大王自稱姪皇帝名以宋程頤之說為可據也本朝之制皇帝于宗藩尊行止稱伯父叔父自稱皇帝而不名今稱興獻王為皇叔父大王又自稱名尊崇之典已至臣等不敢後有所議因録程頤代彭思永議濮王禮疏進覽帝不從命博考前代典禮再議以聞澄乃復會廷臣上議曰臣等㑹議者再請改稱興獻王叔父者明大統之尊無二也然加皇字于叔父之上則凡為陛下伯叔諸父皆莫能與之齊矣加大字子王之上則天下諸王皆莫得而與之並矣興獻王稱號既定則王妃稱號亦隨之天下王妃亦無以同其尊矣况陛下養以天下所以樂其心不違其志豈一家一國之養可同日語哉此孔子所謂事之以禮者其他推尊之說稱親之議似為非禮推尊之非莫詳于魏明帝之詔稱親之非莫詳于宋程頤之議至當之禮要不出此并録上魏明帝詔書時廷和蔣冕毛紀復上言三代以前聖莫如舜未聞追崇所生父瞽瞍三代以後賢莫若漢光武亦未聞追崇所生父南頓君惟陛下取法二君疏皆留中不下質實按程子濮議略見宋史彭思永傳曰濮王生陛下而仁宗以陛下為嗣是仁宗為皇考而濮王于屬為伯此天下大義生人大倫如乾坤定位不可得而變也陛下為仁廟子曰考曰親乃仁廟也若更施於濮王則二親矣使王與諸父等夷無有殊别則于大孝之心亦為難安臣以為當尊為濮國大王祭告之辭則曰姪嗣皇帝書名昭告于皇伯父大王則極尊崇而于仁廟亦無所嫌矣此萬世之法也疏入英宗感其切至埀欲施行而中書持之甚力卒不果魏明帝之詔見太和三年曰禮王后無嗣擇支子以繼大宗則當纂正統而奉公議何得復顧私親哉漢宣繼昭帝後加悼考以皇號哀帝以外藩援立而董宏等以邪說惑誤朝議遂尊恭皇立廟京師僭差無禮人神弗祐罪師丹忠正之諫致丁傅焚如之禍自是之後相踵行之其令公卿有司深以前世為戒後嗣萬一有由諸侯入奉大統則當明為人後之義敢為邪佞導諛君上妄建非正之號謂考為皇稱妣為后則股肱大臣誅之無赦其書之金䇿藏之宗廟五月梁儲罷王瓊以罪戍邉給事中張九叙劾儲結納權奸持祿固寵儲三疏求去賜敕馳傳歸瓊在兵部厚事錢寧江彬等所誅賞多取中㫖不關白內閻楊廷和弗能堪至是言官交章劾瓊繫都察院瓊疑出廷和指力訐廷和帝愈不直瓊下廷臣雜議坐交結近侍律論死瓊疏辨乃減死戍邉質實張九叙商河人以袁宗臯為禮部尚書兼文淵閣大學士預機務宗臯由進士授興府長史帝即位擢吏部侍郎尋入閣自是藩邸舊臣俱以扈從功不次録用宗臯以疾辭不允未幾卒六月江彬伏誅與李琮神周錢寧等俱磔于市時京師久旱彬誅遂大雨舍音和珊尋亦伏誅惟張忠許泰夤緣貴近得減死徙邉秋七月進士張璁上疏請尊崇所生立興獻王廟于京師璁時以進士觀政見廷議追崇興獻王禮三上三却璁揣知帝意乃遂丄疏曰陛下嗣登大寶即議追尊聖考以正其號奉迎聖母以致其養誠大孝也廷議執漢定陶王宋濮王故事欲考孝宗叔興獻王夫漢哀帝宋英宗皆預養宫中立為儲嗣其為人後之義甚明今陛下以倫序當立循繼統之義非為孝宗後也且迎養聖母稱皇叔母則當以君臣禮見子可以臣母乎長子不得為人後興獻王子惟陛下一人利天下而為人後將母自絶其父母乎故謂陛下入繼祖統則可謂為人後而自絶其親則不可蓋統與嗣不同非必奪此父子之親建彼父子之號然後謂之繼統令宜别立聖考廟于京師以隆尊親之孝且使母以子貴尊與父同則聖考不失其為父聖母不失其為母矣帝方扼廷議得璁疏大喜曰此論出吾父子獲全矣遂手詔楊廷和蔣冕毛紀欲尊父為興獻皇帝母為興獻皇后祖母為夀安皇太后廷和等持不可封還手詔于是給事中朱鴻湯史于光御史王溱盧瓊交章劾璁帝不聽質實張璁字秉用永嘉人初璁以舉人八上會試始得第有胡鐸者與璁同舉于鄉先璁舉進士及大禮議起鐸已官湖廣𠫭政在京師意亦主考興獻王與璁合璁要之同署鐸曰主上天性固不可違天下人情亦不可拂考獻王不已則宗宗不已則入廟入廟則當有祧以藩封虛號之帝而奪君臨治世之宗義固不可也入廟則有位將位武宗上乎武宗下乎生為之臣死不得躋于君然魯嘗躋僖公矣恐異日不乏夏父之徒也不肯署璁疏遂獨上其後諸臣爭以議禮干進稱宗入廟果如鐸言王溱直𨽻開州人盧瓊字獻卿浮梁人胡鐸宇時振餘姚人寧津盜起德平知縣龔諒死之盜轉掠至德平諒率吏民禦之力屈被殺贈濟南通判恤其家質實寧津金置明屬河間府今因之龔諒明史忠義傳不詳其里貫九月葬康陵諡曰承天達道英肅睿哲昭德顯功𢎞文思孝毅皇帝廟號武宗質實康陵在昌平州金嶺山東北明史贊曰毅皇手除逆瑾躬禦邉寇奮然欲以武功自雄然耽樂嬉遊昵近羣小至自署名號冠履之分蕩然矣猶幸用人之柄躬自操持而乘鈞諸臣補苴匡救其不底于危亡者藉以比夫冬十月追尊父興獻帝祖母憲宗貴妃邵氏為皇太后母妃蔣氏為興獻后帝屢諭閣臣早定大禮㑹母妃至通州聞朝議考孝宗恚曰安得以我子為他人子止通州不入帝聞而泣啓慈夀太后願避位歸藩羣臣惶懼毛澄乃謀于內閣請稱興獻王為興獻帝王妃蔣氏為興獻后而以皇太后懿㫖行之帝不得已乃報可并尊憲宗貴妃邵氏為皇太后張璁知帝意嚮已又聞母妃止通州益大喜著大禮或問以上且曰非天子不議禮願奮獨斷揭父子大倫明告中外章下禮部見者皆目為邪說惟兵部主事霍韜給事中熊浹揣璁言必用附和之未幾浹外轉僉事璁出為南京刑部主事韜自知為衆諭所齕引疾歸質實邵太后憲宗妃興獻王母也興王之藩妃不得從世宗入繼大統妃已老目盲矣喜孫為皇帝摸世宗身自頂以至踵至是尊為皇太后霍韜字渭先南海人興獻后至京師先是禮官具儀后由正陽左門入大明東門帝不可乃自定議由中門入以太后儀謁奉先奉慈二殿不廟見十一月録平宸濠功封王守仁新建伯帝在興邸深知守仁平逆功甫即位趣召入朝受封而楊廷和與王瓊不相能守仁前後平賊率歸功瓊廷和不喜大臣亦多忌其功㑹有言國哀未畢不宜舉宴行賞者因拜守仁南京兵部尚書守仁以親老請歸省至是論功封特進光祿大夫柱國新建伯世襲嵗祿一千石然不豫鐵券嵗祿亦不給諸同事有功者惟吉安知府伍文定當上賞其他皆名示遷而隂絀之廢斥無存者守仁憤甚時以丁父憂屢疏辭爵乞録諸臣之功咸報寢發明宸濠之變江西全省宸動王守仁出竒制勝三十五日而奏蕩平厥功偉矣張忠許泰輩忌功媒孽猶曰宵小伎倆之常獨怪楊廷和稱為一時名臣因與王瓊不相能而并扼守仁之封大臣公忠體國固如是耶王瓊時為兵部尚書使當日本兵故為齟齬事皆中制守仁又豈能迅奏膚公其歸功于瓊期于成事而已廷和不是之諒而輒存芥蒂至使同事諸臣隂遭廢斥其何以鼓戎行勸將士哉世宗趣召受封而于其請録請臣亦皆報寢則所謂深知守仁平逆功者又安在歟御定資治通鑑綱目三編卷十九
