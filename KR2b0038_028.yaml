body:
  text: 起甲辰明世宗嘉靖二十三年盡壬子明世宗嘉靖三十二年凡九年甲辰二十三年秋七月諳達犯大同總兵官周尚文敗之是春諳達犯黃崖口又犯大氷谷龍門所及是犯大同總兵官周尚文戰于黑山敗之質實黃崖山在撫寧縣東北五十里大水谷關在懷柔縣東北三州里有城龍門守禦千户所本元雲州之東莊地明宣德六年築城建所于此黑山在乎羅縣北三百里賀蘭山之尾也八月翟鑾罷嚴嵩入閣鑾以資地居其上嵩惡之㑹鑾子汝儉汝孝與其師崔竒勛所親焦清同舉進士嵩遂屬給事中王交等劾其有弊帝怒下吏部都察院鑾疏辨帝益怒曰鑾被劾待勘敢先瀆擾耶二子縱有才何至與其師並進勒鑾父子竒勛清及分考官等皆為民質實王交慈溪人振江南災户部言江南災甚請以應天等十一府州今年各項續收事例銀兩與本處贓罰解邊餘銀俱糴穀備振并議應天巡撫丁汝夔所條振荒事宜皆報可時户部又議言天下災傷過半而太倉積貯糧米有餘請將今年糧米四百萬石徵本色七分折色三分以蘇民困其被災之地行令撫按官動支贖罪銀給振從之詔户部預發明年年例銀六萬兩于大同鎮以嵗災支用不給故也質實丁汝夔所條振荒事宜一應天諸府災民饑甚請今有司委官于鄰省平糶所過毋得阻遏鈔關免納鈔及南京三十六倉見貯厫米量糴五萬石以濟災民且免耗浥米價仍照前例買補一被災州縣境內富民願出穀百石備振者請給與義官冠服百五十石者隂陽醫官二百石者正九品三百石者正八品四百石者正七品俱散官免本身雜差出穀千五百石銀五百兩以上者除給冠服仍建坊表其門一各府州縣起運先年南京户部未完錢糧折銀錢解每米一石除折銀五錢外其多餘之銀糴穀振貸及量補災免糧石九月以吏部尚書許讚兼文淵閣大學士禮部尚書張璧兼東閣大學士並預機務時大權一歸嚴嵩讚璧不得預票擬讚常歎曰何奪我吏部使我旁睨人因屢乞休振湖廣災時湖廣旱甚户部請留雲南借用支剩等項銀共九萬七千八百餘兩與預備倉穀相兼備振如不足則量准兑軍糧米十萬石擬照兑支運事例折銀詔從之冬十月諳達入侵諳逹自萬全右衛毀墻入掠蔚州直抵完縣京師戒嚴命兵部議防守事宜總督宣大兵部尚書翟鵬時在朔州聞警夜半至馬邑調兵食復趨渾源遣諸將遏敵御史楊本深等劾鵬逗遛致震畿輔遂遣官械鵬而以兵部侍郎張漢代之巡撫薊鎮都御史朱方以建議撤諸路防秋兵致敵乘間入犯亦命逮繫鵬坐永戍方杖死至十一月庚子京師乃解嚴質實諳達明史本紀作小王子翟鵬傳作諳達今依鵬傳完縣本漢曲逆縣金置完州明洪武二年改縣屬保定府渾源縣省入明屬大固府今並因之朱方字子大泗州人十一月加方士陶仲文少師帝自遭宫婢之變移居西內日求長生郊朝不親朝講盡廢君臣不相接獨陶仲文得時見見輒賜坐稱之為師而不名于是小人顧可學盛端明朱隆禧輩皆緣以進陶仲文者初由吏貟需次京師故與邵元節善元節年老宫中黑眚見治不效因薦仲文以符水噀劍絶宫中妖被寵幸尋授少保禮部尚書未幾加少傅至是大同獲間諜帝歸功上元加仲文少師仍兼傅保質實顧可學無錫人盛端明饒平人朱隆禧崑山人乙巳二十四年春二月詔撫流民令天下有司招撫流民復業給與牛具種子俟年底徴還有能開墾閒田者蠲賦十年從巡按山東御史劉廷儀請也質實劉廷儀慈溪人振順天永平饑順天永平府屬饑發通州倉粳米萬七百石太倉銀二千兩往振至三月保定諸府皆告饑復發臨清廣積倉銀一千兩振之已而應天等十一府州相繼告饑敕有司以南京諸司及庫貯銀錢振濟帝諭户工二部曰今嵗以來天時少順若有旱火之慮所應振恤諸務亟行撫按及各鎮總兵官加意幹理又詔曰近來水旱災傷皆由官不得人甚或貪殘殃民致干和氣如有貪酷害民者撫按官具奏處治夏五月壬戌朔日有食之六月重建太廟成先是以舊廟基隘命相度規制議三上不報久之仍命復周堂異室之舊廟制始定太祖居中左四序成宣憲睿右四序仁英孝武其後為祧廟以藏祧主謹身殿大學士毛紀卒紀厯仕四朝守正不阿家居二十年卒贈太保諡文簡秋八月張璧卒璧在位無所表見是年七月加太子太保尋病瘧不能視事遂卒年七十有一九月召夏言復入閣帝微覺嚴嵩貪橫復召用言至復盛氣陵嵩出其上凡所批答略不顧嵩噤不敢吐一語其所引用私人言多斥之亦不敢救銜次骨而言以廢棄久務張權所譴逐亦不盡當御史陳其學以鹽法事劾崔元及錦衣都督陸炳言擬㫖令陳狀皆造言請死炳行三千金求解不得長跪泣謝罪乃以二人與嵩比而搆言言不悟質實陳其學宣城人楚世子英耀殺其父顯榕伏誅英耀楚王顯榕長子性淫惡蒸楚王宫人又使卒劉金納妓别館王欲罪金金遂勸英耀謀逆㑹元夕張燈置酒饗王别宴武岡王顯槐于西室酒半金等從座後以銅瓜擊王腦立斃顯槐驚救被傷得免英耀徙王尸宫中以中風報王從者抉門出告變撫按官以聞帝命駙馬都尉鄥景和等往鞫得實及是詔逮入京告太廟磔于市焚尸揚灰逆黨悉伏誅質實顯槐顯榕之弟鄥景和崑山人尚宗女永福公主冬十一月許讚罷讚求去帝責其忘君愛身落職閒住後三年讚卒丙午二十五年春正月謫御史周冕為通海縣典史時太子生十一年尚未出閣講學冕極言豫教不可緩帝怒謫之質實通海縣元置明屬雲南臨安府今因之周冕資州人三月四川白草畨亂遣何卿充總兵討平之卿初鎮松潘十七年威望素著㑹以北警召卿入衛至是畨人亂復命卿往討卿至將士咸喜乃㑹巡撫張時徹討擒賊渠俘斬于計克四十餘寨毀其碉房獲馬牛器械無算至明年四月賊盡平于是松潘威茂間行旅往來無剽奪患邊境安堵質實白草寨名明史四川土司傳云東路生羌白草最强何卿成都衛人張時徹字惟靜鄞人夏四月以兵部侍郎曽銑總督陜西三邊軍務是秋諳達以十萬騎西入延安慶陽銑率兵數千駐塞門而遣前參將李珍搗巢于馬梁山後敵始退質實塞門寨名在延安府安塞縣北馬梁山在榆林府北李珍陜西人坐事奪宮銑復加録用之秋七月以醴泉出承華殿停諸司封奏癸酉諭禮部今年夏末秋初醴泉出于承華雖不可恃以自怠亦不可不敬謝其自二十五日至于八月望諸司停常封奏事嗣後慶賀齊祀悉停封奏質實承華殿在西苑金海橋北發明禮言地出醴泉疏謂德至淵泉則醴泉湧明嘉靖之時何時乎郊廟不親朝講盡廢又任用權奸誅貶忠直三殿九廟災異疊見乃復矯飾殊祥肆為慶賀度不過如白鹿仙桃附㑹長生之說而已且即使鎮獲上瑞亦更宜勤政恤民荷承嘉貺應天以實不以文固當如是乃不此之務而轉盡停諸司封奏至于兩旬之久其間豈無民瘼國計旦夕不可緩者遽因符瑞之陳致滋曠隔有是理乎尤可異者自後慶賀齊祀悉停封奏遂若著為成例而尚云不可恃以自怠豈竟以齊醮為凝承昭受之實耶八月天鼓鳴冬十月故建昌侯張延齡棄市初延齡下獄後奸人劉東山發其手書內有君道賞罰不明之語因復以延齡訕上罪長繫如故至是竟坐斬西市丁未二十六年夏四月諳達求貢拒之自龍大有誘執其使後諳達速嵗犯邊不已及是奉印信畨文詣邊陳欵總督侍郎翁萬達以聞時萬達方修築邊墻因再疏言自冬涉春敵使屢至其詞益恭似宜允許况今版築方興正當羈縻使無侵擾帝責其罔瀆不聽萬達在邊帝深倚任所奏無不聽納嘗議撤山西內關兵併力守禦大同外邊巡撫孫繼魯力陳不可帝納萬達言遂逯繼魯下獄死獨議諳達貢事再被責讓蓋是時曾銑建言復套夏言主之故力絀貢議云銑素喜功名㑹敵居河套久為中國患銑上言敵據河套侵擾邊鄙今將百年出套則侵宣大三關以震據畿輔入套則侵延寧甘固以擾關中深山大川勢固在彼而不在我臣枕戈汗馬切齒痛心竊嘗計之秋髙馬肥弓徑矢利彼聚而攻我散而守則彼勝冬深水枯馬無宿藁春寒隂雨壤無燥土彼勢漸弱我乘其弊則中國勝臣請以鋭卒六萬益以山東鎗手二千每嵗春夏交攜五十日餉水陸並進直搗其巢材官騶發炮火雷擊如是三舉則彼不能支此一勞永逸之策也遂條八議以進帝壯其言命諸邊臣議之俱以為難而萬達尤以橫桃强敵為非計帝方嚮銑議上不省質實內關雁門寧武偏頭諸關也三關中為寧武雁門在東偏頭居西西鄰黃河逼近河套曽銑條上八議一曰定廟謨二曰立綱紀三曰審機宜四曰選將材五曰任賢能六曰足芻餉七曰明賞罰八曰修長技下兵部議行其十二月銑偕巡撫謝蘭張問行等奏延綏密與套敵為鄰自定邊營至黃甫川連年入侵率由是道所當急為修繕分地定工次第修舉起自定邊東至龍川堡計長四百四十餘里為西段所當先築自龍川堡東至雙山堡計長四百九十餘里為中段自雙山堡東至黃甫川計長五百九十餘里為下段嵗修一段期以三年竣事乞發帑銀如宣大山西故事疏下部議銑又言套敵不除中國之禍未可量也今曰之計宜嵗嵗乘其無備每出益勵彼勢必折將遁而出套之恐後矣俟其逺出然後因祖宗之故疆并河為塞修築墩隍建置衛所處分戍卒講求屯政以省全陕之轉輸壯中國之形勢此中興之大烈也夫臣方議築邊又議復套者以築邊不過數十年計耳復套則驅斥凶殘臨河作陳乃國家萬年久逺之計疏下兵部議謂築邊復套兩俱不易相較則復套又難夫欲率數萬之衆賫五十日之糧深入險逺艱阻之域以驅數十年盤據之兵談何容易故不若修墻築邊為計完而成功可期也但延綏一帶地勢延漫土雜沙鹻居民隔逺最為荒凉若欲以一千五百里之地而責成于三年之功恐未易集縱使能成亦難為守宜仍行銑等計議以聞帝曰敵據河套為中國患久矣連嵗關隘橫被荼毒朕宵旰念之而邊臣無分憂者今銑能倡復套之謀甚見壯猷本部乃久之始覆迄無定見何也其令銑更與諸邊臣悉心圖議務求長算若邊境千里沙漠與宣大地異但可就要害修築兵部其發銀三千萬兩與銑聽其修邊餉兵造器便宜調度支用備明年防禦計至二十六年夏五月總督曽銑出塞龍套部勝之初春時銑督兵出塞掩擊敗還不以聞至是復襲之敵覺銑搜選鋭卒督之戰馘斬二十六人生擒一人斃死于矢石者甚衆獲馬牛槖駝九百有五十械器八百五十三以捷聞敵移帳漸北間以輕騎出掠銑復督諸軍驅之遂逺遁不敢近塞銑既以捷聞更列上諸臣功罪帝以套敵連年深入如蹈無人之境大損國威銑能率兵出塞擒斬有功命增俸賜白金紵弊有差十一月銑蘭暨延綏巡撫楊守謙寧夏巡撫王邦瑞及三鎮總兵議復套方略乃條列十八事曰恢復河套修築邊墻選擇將材選練士卒買補馬騾進兵機宜轉運糧餉申明賞罰兼備舟車多置火器招降用閫審度時勢防守河套營田儲蓄及明職事息訛言寬文法廣孳畜又上營陳八圖曰立營總圖及遇敵駐戰選鋒車戰騎兵迎戰步兵搏戰行營進攻變營長驅獲功收兵各圖帝覽而嘉之奏下兵部尚書王以旗㑹廷臣集議言曾銑先後章疏俱可施行帝以銑前後所上方略命廷臣定䇿以聞翁萬達字仁夫揭陽人孫繼魯字道甫雲南右衛人繼魯先知淮安府以忤中官被逮夏言救免之繼魯不謝言怒及是言不為地遂死獄中秋九月河決曺縣水入城二尺漫金鄉魚臺定陶城武衝穀亭總河都御史詹瀚請于趙皮寨諸口穿支河以分水勢從之質實定陶秦縣明屬曺州府今因之城武本漢成武縣為城武縣屬兗州府今屬曺州府穀亭鎮名在魚臺縣東時為漕運往來要地隆慶後運河東徙鎮遂廢趙皮寨在開封府蘭陽縣北一名張録口詹瀚玉山人冬十一月大內火釋楊爵等于獄初爵既下獄工部員外郎劉魁給事周怡並以言事同繫三人屢瀕死講誦不輟爵于獄中著周易辨說中庸解忘其困歷五年不釋久之有神降于乩帝感其言立出三人未踰月尚書熊浹疏言乩仙之妄帝怒命東厰追執爵等復同繫鎮撫獄桎梏加嚴飲食屢絶至是大髙元殿災帝禱于露臺空中若有聞遂傳詔釋之爵歸後二年卒隆慶初贈光祿卿諡忠介質實周怡字順之寧國太平人以劾嚴嵩廷杖錮獄發明爵等抗言下獄既已頻年乃以乩仙之言而立出諸獄復以熊浹之言追執之而其釋歸也仍以空中神語傳云國將興聽于人將亡聽于神扶鸞之術已為癡邪熒惑之端憲宗時李孜省曽假其說以推薦鄉人固為誣罔若空中神語尤屬怪誕不經人君操賞罰之大權進退平反悉由乾斷乃托諸虛無杳渺之說以行其黜陟耶且妖由人興嘉靖惑于祈禳念釋在兹遂致鬼物憑依言如在耳天聽民聽其謂之何哉皇后方氏崩諡孝烈皇后戊申二十七年春正月夏言罷言素慷慨以經濟自許㑹曾銑議復河套欲倚以成大功因密薦銑謂羣臣無加銑忠者銑鳩兵繕塞輒破敵帝亦頗嚮之今言擬㫖優奬者再銑喜益鋭志出師條上方略廷議一如銑言已而帝意中變謂輔臣曰今征遂河套不知出師果有名否兵食果有餘成功可必否一銑何足言如生民荼毒何嚴嵩知帝意遂極言河套必不可復廷臣亦盡反前議如嵩說嵩乃力攻言謂向擬㫖褒銑臣皆不與聞言始大懼謝罪且云嵩初未嘗異議今胡乃盡諉于臣帝已入嵩譖怒不可解盡奪言官階令言致仕初言與嵩同直西苑帝數使小內豎詣言所言負氣岸奴視之其詣嵩嵩必延坐親納金錢袖中以故曰譽嵩而短言言進陳詞取具而已往往失帝㫖嵩愈精治其事由是嵩益被寵而言眷漸移及套議起嵩復從中隂詆之以激帝怒言遂敗振陕西饑陜西鞏昌漢中二府大饑鳯翔府汧陽縣為水所沒巡撫謝蘭以聞詔發太倉銀五萬兩于鞏昌漢中二府充振徙汧陽縣治于城東三里外而割麟逰縣界白雪里屬之且蠲衝決地租三年質實沂陽漢隃麋縣後周置汧陽郡及縣以在汧水之陽得名明鳯鳯翔府今因之汧陽故城在今縣西十八里本西魏馬牢城也麟遊漢杜陽縣隋義寧元年置麟逰縣明屬鳯翔府今因之謝蘭字與德代州人三月殺總督侍郎曾銑兵部侍郎范鏓等劾銑罔上貪功擅開邊釁逮下獄出兵部尚書王以旗代之先是咸寧侯仇鸞鎮甘肅以貪縱為銑所劾遂逯問嚴嵩雅親鸞至是代鸞獄中草奏誣夏言納銑金蘇綱者言繼妻父也與銑同邑相善方銑建議復套時綱亟稱之言益信銑為可辦固力主其議故嵩代鸞誣奏銑剋餉巨萬屬綱賂言交關為奸利決司承帝㫖坐銑交結近待律斬西市妻子流二千里並逯言下吏出鸞于獄銑有瞻略長于用兵性特廉既沒家無餘資隆慶初贈尚書諡曰襄愍質實范鏓字平甫江西樂平人遷陽仇鸞鉞之子夏五月葬孝烈皇后于永陵詔曰皇后比救朕危奉天濟難其以元后禮葬預名葬地曰永陵質實永陵在昌平州陽翠嶺秋七月京師地震順天保定二府各州縣俱震八月京師復震及遼東廣寧衛山東登州府同日皆震論羣臣修省九月京師復地震有聲十月殺前華蓋殿大學士夏言言抵通州聞曾銑所坐大驚墮車曰噫吾死矣上疏訟寃言鸞方就逮上降諭不兩日鸞何以知蓋嚴嵩與崔元輩詐為鸞疏以傾臣嵩靜言庸違似共工謙恭下士似王莽姦巧弄權父子専政似司馬懿臣生死係嵩掌握惟聖慈曲賜保全帝不省獄成論死法司援議貴議能條以上帝怒切責之猶及言前不戴香冠事㑹諳達侵居庸嵩謂夏言等議收河套故報復至此遂棄言市妻蘇氏流廣西從子主事克承從孫尚寶丞朝慶皆削籍與言豪邁有俊才縱橫辨博人莫能屈初被特眷日議禮諸貴人抗及居政府與嵩共事嵩懷奸黷賄言獨能裁抑之以是天下多稱言然自大用後日蹇傲寖為帝所厭裁決機務頗専恣物議亦不悉協特因其為嵩誣陷以死人方惡嵩故于言益深惜之隆慶初復官諡文愍己酉二十八年春二月以張治為禮部尚書兼文淵閣大學士李本為少詹事兼翰林院學士入內閣並預機務自夏言得罪後嚴嵩獨相且年餘矣至是治本以疏逺入閣益不敢預可否默默而已質實張治字文邦荼陵州人李本餘姚人治時為南京吏部尚書本時為國子監祭酒諳達侵宣府大同總兵官周尚文擊敗之敵犯宣府滴水崖把總江瀚指揮董暘戰死全軍覆遂犯永寧尚文力戰敗之斬其魁尚文清約愛士善用間知敵中曲折故戰輒有功初尚文僉後府嚴嵩子世蕃為府都事驕蹇不法將劾之嵩謝得免以故嵩父子憾尚文謀傾陷之帝方藉以抗强敵故讒不得入未幾卒嵩格恤典不豫給事中沈束以為言嵩激帝怒錮之詔獄質實滴水崖在宣化府赤城縣東南石崖滴水隆冬不凍崖之北有堡為戍守處沈束字宗安㑹稽人上疏言尚文為將忠義自許邇者敵騎深入聞命疾趨奮勇先登多所殺獲此亦一時竒功也宜贈封爵延子孫又如董晹江瀚膺北敵之衝遏南奔之勢援兵不至繼之以死雖已廟祀宜賜祭以彰死事今當事之臣任意豫奪冒濫者或幸䝉忠勤者反捐棄何以鼓士氣激軍心疏入下束獄束繫久衣食屢絶維日讀周易凡繫獄十八年其妻張氏上書言臣夫家有老親八十有九衰病侵奪朝不計夕往臣因束無子為置妾潘氏比至京師束已繫獄潘矢志不他適乃相與寄居旅舍紡績以供夫衣食嵗月積深悽楚萬狀欲歸奉舅則夫之饘粥無資欲留養夫則舅又旦暮待盡臣願代夫繫獄令夫得送父終年仍還赴繫法司亦為請帝終不許帝深嫉言官長繫以困之而曰令獄卒奏其語言食息謂之監帖或無所得雖諧語亦以聞一日鵲噪于還前束漫曰豈有喜及罪人耶卒以奏帝心動釋束還家其父已前死矣隆慶初起故官不赴尚文追贈太傅諡武襄三月辛未朔日有食之皇太子載壑卒諡曰莊敬秋七月倭冦浙東倭自永樂末貢使不至宣德中命琉球國王轉諭之使復至倭性黠時載方物戎器出沒海濱得間則張戎器而肆攻掠不得則陳方物而稱朝貢是以倭雖通貢而瀕海州縣數被侵掠然利中國互市每貢所攜私物逾貢數十倍舊制于浙江設市舶提舉司駐寧波海舶至則平其直制馭之權在官及帝初年廢市舶不設濱海奸人遂闌出中國財物與倭交易居寧波之雙嶼為之主屢負倭直倭使互市者往往留海濱不去內地諸奸民復為之囊槖巡按御史髙節請嚴禁奸豪交通詔允行之自是嚴通畨之禁遂移之貴官勢家負直愈甚倭糧匱不得返大怨恨奸民勾之遂煽為亂朝議設重臣巡撫浙江兼統福建沿海諸府以都御史朱紈為之紈至嚴為申禁獲交通者不俟命輒以便宜斬之由是浙閩大姓素為倭內主者失利而怨紈又數騰疏于朝顯言大姓通倭狀閩浙人咸惡之而閩尤甚巡按御史周亮閩人也上疏詆紈請改巡撫為巡視以殺其權其黨在朝者左右之竟如其請御史陳九德復劾紈擅殺遣官按問罷紈職紈仰藥死自是海禁復弛亂益滋甚時海上承平日久民不知兵聞倭至竄走一空終帝之世迄無寧嵗矣質實雙嶼浙江通志寧波府海防設中營外洋汛轄洋面六有雙嶼山雙嶼港朱紈字子純長洲人髙節大興左衛官籍永清人陳九德藥城人命户部核出納是時邊供繁費加以土木禱祠之役月無虛日帑藏匱竭司農百計生財甚至變賣寺田收贖軍罪猶不能給乃遣部使者括逋賦百姓嗷嗷海內騷動給事中張秉壺以為言于是户部覆議天下財賦每年實徵起存之例夏稅秋糧馬草屯田地租食鹽錢鈔稅課鹽課門攤之類各有定數成化以前各邊寧謐百費省約一嵗出入沛然有餘今則不然京通倉糧嵗入三百七十萬石嘉靖十年以前每嵗軍匠支米二百八十萬石廪中常餘八九年之積十年以後嵗支加至五百三十七萬石抵今所儲僅餘四年太倉銀庫嵗入二百萬兩先年各邊額用一年大約所出一百三十三萬常餘六十七萬嘉靖八年以前內庫積有四百餘萬外庫積有一百餘萬近年來除進用修邊給賞賑灾諸項外一年大約所出三百四十七萬視之嵗入常多一百四十七萬及今不為之所年復一年將至不可措手矣且今生財之道既極計惟節用請勑中外諸臣就職論事専意清理務求節財助邊仍令兩京户部并工部太僕光祿及各直省司府衛所以及遼薊宣大陜西諸邊每嵗終將一年出納錢穀修咸㑹計録分為四目一曰嵗徴如府庫監局倉場額𣲖錢穀幾何一曰嵗收如收過本年先年額徵錢糧完缺幾何一曰嵗支如本年用過各項錢糧于嵗𣲖額數增減相多幾何一曰嵗儲如本年支剩存積錢糧幾何務令簡明以為通融撙節之計從之質實張秉壺莆田人庚戌二十九年春正月山東地震山東蓋州等衛地震有聲如雷二月乃止質實蓋州衛秦漢時為蓋牟城屬遼東郡唐置蓋州明洪武九年廢州置衛今為蓋平縣屬奉天府秋八月封方士陶仲文為恭誠伯時帝以災異咨于仲文對言慮有寃獄得雨方解已而法司上胡纘宗等爰書悉從輕典果得雨乃以平獄功封仲文恭誠伯嵗祿千二百石質實胡纘宗等爰書初帝幸承天河南巡撫胡纘宗嘗以事笞陽武知縣王聨聮尋為巡按御史陶欽夔劾罷聨素凶狡嘗歐其父良論死久之以良請出獄復坐殺人求解不得知帝喜告訐乃托纘宗迎駕詩穆王八駿語為謗詛長至日令其子詐為常朝官闌入關門訟寃凡所不得若副都御史劉隅給事中鮑道明御史胡植馮章張洽參議朱鴻漸知府項喬賈應春等百十人悉搆入之帝大怒立遣官捕纘宗等下獄已而刑部尚書劉訒㑹法司訊得其誣罔狀乃坐聨死發明仲文起管庫由邵元節薦代司醮事不二嵗以少師兼少傅少保一人而領三孤終明之世惟仲文而已兹解寃得雨平獄有驗封恭誠伯五等崇階無故而加之方士實史冊所罕見不惟濫行褒賞其篾祖名器亦至矣嘉靖自移居西內日求長生臣僚罕有接見者獨仲文得時時召對稱為師而不名是時四方奸人如段朝用龔可佩藍田玉之屬皆以燒煉符呪相繼寵任然不久皆敗惟仲文恩眷日隆久而弗替豈小人之炫惑君心固别有深結主知者乎諳達犯京師先是夏六月諳逹犯大同潰牆入悉精兵伏溝壑中而以老弱百騎往來為餌偵騎信之報總兵張達達意輕之兵未合遽率麾下馳擊之伏發圍達數匝馬蹶遂見殺副帥林椿聞逹被圍不介馬而馳救達不克亦死之達椿皆驍勇善戰諳達得二將首輒引去事聞遽總督侍郎郭宗臯巡撫都御史陳耀下獄起復翁萬達為總督趙錦為巡撫以仇鸞為宣大總兵萬達家居未至命侍郎蘇祐攝其事祐抵鎮即上疏請益兵食未報而諳達復擁衆窺大同初仇鸞坐廢居京師以賄嚴世蕃得總兵宣大既受命惶懼無策其厮飬時義侯榮者說鸞曰勿憂吾為主解之乃為鸞持重賂賂諳達令移逼他塞勿大同諳達受貨幣遣之箭纛以為信而與之犯盟遂東去謀者復白敵中語欲襲宣府東遼左西警兵部尚書丁汝夔謂帝厭警報不悉以聞已而報日甚乃發諸邉兵萬二千騎京營兵二萬四千騎分布宣薊諸關隘邊兵取符驗期㑹未即至而京兵悉市井傭保子識者知其必敗矣至是諳達帥部下至古北口以數千騎攻牆都御史王汝孝悉衆出火炮矢石下攻之諳達乃陽督兵綴薊師而别遣精騎從問道潰牆出師後汝孝師潰遂大掠懷栗圍順義長驅入內巡按順天御史王忬聞報度兵弱無能禦者夜草疏言潮河川有徑道一日夜可達通州敵兵剽悍若風雨而古北口距京師僅七舍浸衍無衛戍瞭望神京陵寢萬一蕩搖事繫非小請速集廷臣議戰守策而身出駐通州召吏民給兵仗聽約束收漕舟艤潞河西勿使為敵用甫畢而夜半敵兵果至通州營白河東二十里分兵剽昌平犯諸陵殺掠不可勝紀京師戒嚴詔大同總兵官仇鸞及河東山東兵入援分遣文武大臣各九人守京城九門急集諸營兵僅四五萬是時禁軍冊籍皆虛數又半役內外提督大臣家不歸伍在伍者半皆老弱涕泣不敢前從武庫索甲仗主庫閹人勒常例不時發久之不能軍詔城中居民及四方入應武舉者悉登陴守命都御史商大節率五城御史統之發帑金五千兩便宜募壯士時冦已自通州渡河而西前鋒七百騎駐安定門外教場遂薄都城㑹大同總兵官仇鸞巡撫保定都御史楊守謙各以兵至帝拜鸞為平虜大將軍節制諸路兵馬守謙為兵部侍郎提督軍務時勤王兵先後五六萬人皆聞變即赴未齎糗糧制下犒師牛酒諸費皆不知所出户部文移往復越二三日軍士始得數餅餌開庾發粟釡甑皆虛故士卒饑疲不任戰帝久不視朝軍事無由面白廷臣多以為言不許禮部尚書徐階復固請乃許之羣臣昧爽入至日晡帝始御奉天殿不發一詞但命皆奉敕諭切責百官而趣諸將戰甚急兵部尚書丁汝驤以咨嚴嵩嵩曰塞上敗可掩也失利輦下上無不知誰執其咎寇飽自揚去耳汝夔因不敢主戰且承嵩意戒諸將勿輕舉守謙以孤軍薄諳達營而陳無後繼亦不敢戰于是皆堅壁不發一矢輒以汝夔及守謙為辭寇遂燬城外廬舍火光燭天亦莫能救城西北隅內臣園宅在焉環泣帝前曰將帥為文臣制故寇得至此帝怒守謙益甚寇縱橫內地凡八日本無意攻城且所掠已過望乃整輜重將趨白羊口而去至昌平北猝與仇鸞兵遇鸞出不意倉卒幾不能軍敵縱騎蹂陳而入殺傷千餘人幾獲鸞敵騎遂長驅至天夀山總兵官趙國忠列陳紅門前不敢入奪道循潮河川由古北口故道出京師解嚴至九月辛卯朔敵悉衆出塞諸將不敢逼徐尾其後至石匣城及張家古北等口外而還既而諸將收斬遺尸八十餘級以捷聞帝優詔慰鸞加太保賜金幣汝夔守謙棄市初帝將大行諫以懲後汝夔窘求救於嵩嵩曰我在必不令公死及見帝帝怒甚竟不敢言汝夔臨死始知為嵩所賣守謙性遲重客有勸之戰者應曰周亞夫何人乎客曰公誤矣今日何得比漢法守謙不納競得罪方寇薄通州時詔副都御史王儀以兵二千往守遇按王忬奏其虐大同軍大同軍者仇鸞兵也及寇退帝立命逮儀斥為民而擢忬僉都御史代之於是仇鸞請駐師宣大間整飭兵甲俟冬月大舉以紓國力乃班師入衛以備秋防帝嘉之已而鸞帥諸鎮兵出宣大聲言搗巢厯久不擊乃稍出近塞夜襲敵營斬老弱數級而還鸞自劾無功帝不問乃復請廣集兵糧以明年大舉北征命户部遣使盡括南都及各省布政司貯積且督厯年逋賦時鸞恃寵作威福所上疏既自內批行之不下兵部議㑹禮部尚書徐階極言北事難以成功且後患有不可測議乃為稍寢質實順義唐為順州明置順義縣屬昌平州今因之潞河在通州東石匣在密雲縣東北六十里有石如匣因名𢎞治十七年築城周四里有竒自是增兵置守為要地張家口在萬全右衛東三十五里郭宗臯字君弼福山人陳輝靜海人趙錦字元朴餘姚人王忬字民應太倉人商大節徐州人楊守謙字允享徐州人徐階字子升華亭人王儀字克敬文安人議諳達求貢事時諳達大舉薄都城縱所虜內官楊增持書入城求貢帝召大學士嚴嵩李本禮部尚書徐階于西苑帝曰今事勢如此奈何嵩對曰此搶食技耳不足患階曰今兵在城下殺人放火豈可言是搶食正須議所以禦之之䇿帝顧階曰卿言是因問彼之求貢書安在嵩出褚袖中帝曰此事當何以應之嵩曰此禮部事階曰事雖在部然關繫國體重大須皇上主張帝作色曰事須大家商量何得専推與朕階曰今敵駐兵近郊而我戰守之備一無所有此事宜權許以欵敵第恐將來要求無厭耳帝曰苟利社稷皮幣珠玉非所愛階曰止于皮幣珠玉則可矣萬一有不能從者則奈何帝悚然曰卿可謂逺慮然則當如何階請以計欵之言其書皆漢文朝廷疑而不信且無臨城脅貢之理可退出大邊外别遣使齎番文書因大同守臣為奏事乃可從如此往還之間四方援兵皆至我戰守有備矣帝曰卿言是還出與百官議之于是徐階集廷臣上諳達求貢議略言敵犯我郊畿蹂躪土地䖍劉人民揆之大義所當必誅今雖稱臣求貢然信使不入表文不具且其文書皆漢字真僞不可知臣等以為求貢不可必許且遣通事齎勑諭之如果悔罪求貢則當斂兵出境具表欵塞聽朝廷處分如駐兵境內要求逺賞則惟有勵將集兵以大義致討必使匹馬不返以泄神人之怒從之發明自嘉靖二十一年後諳達無嵗不求貢市朝廷既無定䇿以應之又不修明戰守之實至於戎馬環郊乃詔廷臣集議不幾于城下之盟貽國大辱哉時嵩實秉國釣浸無區盡朝堂召對但云搶食技耳不足患是何異秦越人之視肥瘠況身為元輔當軍書危急之時竟徒委其事於禮部則將焉用彼相矣階請以計疑之雖得一時權宜之術然敵騎既退亦無善後良䇿卒至仇鸞開馬市以壞邉而所謂振威雪恥之舉君若臣曽不繫于念慮焉廟謨若此國欲無侮得乎謫諭德趙貞吉為荔波典史方諳達薄都城以謾書求貢詔百官集議國子監司業趙貞吉奮䄂大言曰城下之盟春秋恥之既許貢則必入城儻要索無已奈何徐階曰君必有良䇿貞吉請追録周尚文功以勵邉帥出沈束于獄以開言路輕損軍之令重賞功之格遣官諭諸將力戰退敵時帝遣中使瞰廷臣日中莫有發一語者獨聞貞吉言心壯之召入左順門令手疏便宜立擢左諭德兼監察御史奉勑宣諭諸軍給白金五萬兩聽隨宜勞賞嚴嵩心惡之㑹撰敕不令督戰以輕其權且不豫一卒護行時敵騎充斥貞吉馳入諸將營散金犒士宣諭德意明日即復命帝怒謂貞吉漫無區畫徒為周尚文沈束遊說下獄廷杖謫荔波典史質實趙貞吉字孟靜內江人九月以仇鸞總督京營戎政吏部侍郎王邦瑞攝兵部事以營政久弛上言國初京營徑旅不減七八十萬自三大營變為十二團營又變為兩官廰雖寖不如初然額軍尚三十八萬有竒今武備積弛見籍至十四萬而操練者不過五六萬支糧則有調遣則無比敵騎深入戰守俱困此其弊不在逃亡而在占役不在軍士而在將領蓋提督以下諸官多世胄紈袴平時占役營軍以空名支餉臨操則集市人呼舞博笑而已乞遣官精核帝是其言於是悉罷團營兩官廳復三大營舊制設戎政府以仇鸞統之邦瑞協理鸞方貴幸請選各邉兵更番入衛分𨽻京營塞上有警主將不得徵集由是邉事日壞質實王邦瑞字為賢宜陽人時以兵部左侍郎督營務復條上興革六事言宦官典兵古今大患請盡撤提督監槍者帝報從之邦瑞又條上安邉十二事仇鸞搆邦瑞於帝帝眷漸移㑹鸞奏革薊州總兵官李鳯鳴大同總兵官徐珏任而薦京營副將成勳代鳯鳴密雲副將徐仁代珏邦瑞言朝廷易置將帥必採之公卿斷自宸𠂻所以慎防杜漸示臣下不敢專也且京營大將與列鎮不相統攝何緣京營乃黜陟各鎮今曲徇仇鸞請臣恐九邉將帥悉奔走托附非國之福也帝不悅下詔讓鸞鸞又欲節制邉將罷築薊鎮邉垣邦瑞皆以為不可鸞大憾益肆讒㑹邦瑞復陳安邊大計遂被㫖落職鸞死踰十年始復官廢鄭王厚烷為庶人帝修齊醮諸王爭遣使進香厚烷獨上居敬窮理克已存誠四針演連珠十章以神仙土木為戒帝怒下其使者于獄已而故盟津王見濍子祐橏訐厚烷謀不軌遣官往訊無左驗帝下詔敷厚烷驕慢無禮廢為庶人幽之鳯陽厚烷世子載堉篤學有至性痛父非罪見繫築土室宫門外席藁獨處者十九年隆慶初厚烷復爵載堉始入室質實厚烷懿王祐檡子見濍祐檡之叔初見濍以罪革為庶人至是祐橏求復郡王爵怨厚烷不為奏遂承帝怒撫厚烷四十罪以叛逆告冬十月張治卒入閣凡二十一月而卒年六十有三削刑部郎中徐學詩籍諳達既退詔廷臣陳制敵之䇿諸臣多掇細事以應學詩憤然曰大奸柄國亂之本也亂本不除能制外患哉即疏劾嚴嵩略曰制外之要在于內治內治之要在于端本今大學士嵩輔政十載奸貪日甚內結勳貴外比羣下文武遷除悉要厚賄致此輩掊克軍民釀成邉患國事至此猶復敢謬引佳兵不祥之說以謾清問近因都城有警密輸財賄南還大車數十乘樓船十餘艘水陸載道駭人耳目又納奪職總兵官李鳯鳴二千金使鎮薊州受老廢總兵官郭琮三千金使督漕運舉朝莫不歎憤而無一人敢言之者誠以內外盤結上下比周積久勢成而其子世蕃又凶狡成性擅執父權凡諸司章奏必先關白然後上聞掩罪飾非乘機搆隙故凡論之者雖不能顯禍之于正言直指之時莫不假事因人隂禍之于遷除考察之際天下痛心視為鬼蜮伏願陛下罷嵩父子别簡忠良則內治既清外患自寧矣帝覽疏頗感動方士陶仲文密言嵩孤立盡忠學詩特為所私修隙耳帝於是發怒下學詩詔獄削其籍又都給事中厲汝進劾世蕃窮弄父權嗜賄張焰嵩上疏自理且求援中官以激帝廷杖汝進謫典史明年嵩假考察奪其職質實徐學詩字以言上虞人先劾嵩者葉經謝瑜陳紹與學詩皆同里時稱上虞四諫厲汝進字子條濼州人發明蔡京之回邪林靈素奉為左元仙伯嚴嵩之奸惡陶仲文稱其孤立盡忠古今方士游詞如出一轍而弄權竊位者必交結佞幸以內固亦前後若一人焉獨怪嘉靖覽學詩之疏亦既為之感動矣而一言熒聽遽爾轉移俾得以脫罪戾而肆其報復史稱嘉靖英察自信何至黑白變亂是非顛倒竟墮其術而不知耶至嵩之求援中官誣陷憾已則又小人患失之常無所不至矣十一月祧仁宗祔孝烈皇后于太廟初睿宗入廟帝恐後世議桃遂欲當已世預祧仁宗以孝烈祔廟自為一世下禮部議尚書徐階抗言女后無先入廟者帝大怒階惶恐不敢守前議遂祧仁宗升祔孝烈皇后辛亥三十年春正月戍錦衣衛經歷沈鍊于邊初趙貞吉請勿許諳達求貢廷臣無敢是貞吉者鍊獨大言以為是吏部尚書夏邦謨目之曰若何官鍊曰錦衣經歷沈鍊也大臣不言故小吏言之鍊憤國無人致敵猖獗請以萬騎護陵寢萬騎護通州軍儲合勤王師十餘萬擊其惰歸可大得志帝不省時嚴嵩用事邉臣爭致賄遺及失事懼罪益輦金賄嵩鍊時時扼腕一日從尚寶丞張遜業飲酒半及嵩因慷慨詈罵流涕交頥遂上疏曰昨嵗諳達犯順陛下欲乘時北伐此文武羣臣所共當勠力者也然制乘必先廟算廟算必先為天下除奸邪然後外患可平今大學士嵩當主憂臣辱之時不聞延訪賢豪咨詢方略惟與子世蕃規圖自便忠謀則多方沮之諂諛則曲意引之要賄鬻官沽恩給客朝廷賞一人曰由我賞之罰一人曰由我罰之人皆伺嚴氏之愛惡而不知朝廷之恩威尚忍言哉姑舉其罪之大者言之納將帥之賄以啓邉陲之釁一也受諸王餽遺每事隂為之地二也攬御史之權雖州縣小吏亦皆貨取致官方大壞三也索撫按之嵗例致有司遞相承奉而閭閻之財日削四也隂制諫官俾不敢直言五也妬賢嫉能一忤其意必致之死六也縱子受財斂怨天下七也運財還家月無虛日致道途驛騷八也久居政府擅寵害政九也不能協謀天討上貽君父憂十也因併論邦謨諂諛黷貨狀請均罷斥以謝天下帝大怒搒之數十謫佃保安鍊既被謫中外懾嵩威益箝口南京御史王宗茂拜官甫三月即劾嵩負國十罪疏至通政司趙文華密以示嵩留數日始上由是嵩得預為地遂以宗荗誣詆大臣謫平陽縣丞質實平陽五季吳越縣明屬溫州府今因之沈鍊字純甫㑹稽人夏邦謨涪州人王宗荗字時育京山人宗荗疏曰嵩本邪諂之徒寡亷鮮耻久持國柄作福作威薄海內外罔不怨恨如吏兵二部每選請屬二十人人索賄數百金任自擇善地至文武捋吏盡出其門此嵩負國之罪一也任私人萬宷為功考郎凡外官遷擢不察其行能不計其資歷唯賄自問致端方之士不得為國家用此嵩負國之罪二也往嵗遭人論劾潛輸家資南返輦載珍寶不可數計金銀人物多髙二三尺者下至溺器亦金銀為之不知陛下宫中亦有此器否耶此嵩負國之罪三也廣市良田遍于江西數郡又於府第之後積石為大坎實以金銀珍玩為子孫百世計而國計民瘼漫不措懷此嵩負國之罪四也畜家奴五百餘人往來京邸所至騷擾驛傳虐害居民長吏皆怨怒而不敢言此嵩負國之罪五也陛下所食大官之饌不數品而嵩則窮極珍錯殊方異産莫不睪致是九州萬國之待嵩有甚於陛下此嵩負國之罪六也往嵗敵迫京幾正上下憂懼之日而嵩貪肆益甚致民俗歌謡遍于京師達於沙漠海內百姓莫不祝天以冀其早亡嵩尚恬不知止此嵩負國之罪七也募朝士為乾兒義子至三十餘輩若尹耕梁紹儒早已敗露此輩實衣冠之盜而皆為之瓜牙助其虐焰致朝廷恩威不出於陛下此嵩負國之罪八也夫天下之所恃以為安者財也兵也不才之文吏以賂而出其門則必剝民之財民奈何不困不才之武將以賂而出其門則必剋軍之餉兵奈何不疲邇者四方地震其占為臣下專權試問今日之專權者寧有出于嵩右乎陛下之帑藏不足支諸邉一年之費而嵩所畜積可贍儲數年與其開賣官鬻爵之令以助邉盍去此蠧國害民之賊籍其家以紓患也三月開馬市于大同宣府謫兵部主事楊繼盛為狄道典史仇鸞駑怯畏敵密遣人持貨幣結諳達義子托克托使貢馬互市諳達許之投譯書于宣大總督蘇祐祐以聞鸞與嚴嵩定議每嵗春秋兩市命侍郎史道領其事兵部車駕司署員外郎主事楊繼盛以讐耻未雪示弱辱國乃奏言十不可五謬其略曰互市者和親之别名也諳達蹂躪我陵寢䖍劉我赤子大讐也今不惟不能聲罪致討而反與之為和議之事此忘天下之大讐一不可也下詔北伐日夜征繕兵食乃翻然有開馬市之議則平日所以選將練兵者為何此失天下之信義二不可也堂堂中國而為此市易之事此損國家之重威三不可也海內豪傑磨礪待試今馬市一開忘赤子之讐厭兵甲之用異日復欲號召誰肯興起此隳豪傑效用之志四不可也使邊鎮將帥日弛封疆之防益滋偷安之氣廢弛既久一旦有急何以整頓此懈天下修武之心五不可也邉卒私通境外例率裁禁今馬市一開則彼之交通者乃王法所不禁將來勾引之禍可勝言乎此開邉方私通之漸六不可也盜賊伏莽畏國家之威而不敢動也今馬市一開則彼皆以為天下兵威已弱睥睨之變必開此起百姓不靖之漸七不可也諳達往嵗深入乘我無備故也今備之一嵗以互市終彼謂國有人乎此長敵人輕中國之心八不可也或諳達負約不至至矣或隂謀伏兵突入或今日市明日復寇或以下馬索上直是我不能羈縻乎彼而彼反得愚弄夫我以此墮諳達狡詐之計九不可也以馬與銀數計之每年市馬約數十萬匹四五年間須得馬數百萬匹每年約用銀數百萬兩四五年間須費銀數千萬年永久之計將安在乎此財與馬兩難相繼十不可也議者曰吾外為市以羈縻之而內修我甲兵此一謬也夫敵欲無厭其以釁終明甚苟內修武備安事羈縻又曰吾因市以益吾馬此二謬也夫和則不戰馬將安用且彼安肯以自乘之良馬而市於我乎不過瘦弱不堪之物不服水草將不日俱斃而已又曰市不已彼且入貢此三謬也夫貢之賞不資是名美而實大損也市馬則獲小利而無名開貢則雖有名而費大市馬固不可許貢亦豈可哉又曰諳達利我市必無失信此四謬也吾之市能盡給其衆乎能信不給者之無入掠乎縱使少有羈縻不過暫保一二年無事耳不知二三年之後將何如處之哉又曰佳兵不祥此五謬也敵加已而應之何佳也人身四支皆癰疽毒日內攻而憚藥石可乎此蓋必有為陛下主其事者故公卿大夫知而莫為一言宜奮獨斷悉按諸言互市者疏入帝頗感動下鸞等㑹議鸞攘臂詈曰豎子目不睹敵宜其易之諸大臣遂言遣官已行勢難中止帝尚猶豫鸞復進密疏乃下繼盛錦衣獄敲拶一百貶狄道縣典史質實楊繼盛字仲芳容城人史道涿州人秋九月京師地震乙未京師地震有聲壬子三十一年春二月振宣大饑宣大二鎮大饑人相食兵部請量借軍餉銀振之帝切責本鎮守臣不先入告令各自陳狀命督餉侍郎馬坤馳往經理振濟事宜仍發庫錢二十萬給之坤臨行奏請增給錢十萬從之三月置內府營置于內教場以練諸內侍質實內教場在延景門西發明明之末造營務盡領于中官而宿衛禁軍之制漸就隳廢史稱內臣之勢惟嘉靖時為少殺乃忽創為內府營以練諸內侍寶則懲于庚戌之變京兵不足禦敵而為此苟且之計夫兵之怯弱由于將帥非人改弦而更張之豈無良法區區內侍即使簡練有方又豈足以厚拱衛而備邊警徒使閹侍習兵貽患來世厥後魏忠賢遂有內操之事蓋實托昉于此作法于凉斃將若之何以禮部尚書徐階兼東閣大學士預機務初階由夏言薦嚴嵩忌之階恐被中傷乃精治齊詞迎帝意左右亦多為地者遂入閣秋七月以王忬巡撫浙江備倭自朱紈死浙江不設巡撫者四年中外不敢復言海禁事奸民汪直徐海陳束麻葉輩悉逸海島為主謀倭悉聽其指揮遂誘之入冦而海中巨盜皆襲倭服飾旗號分艘掠內地無不大利由是倭患日劇廷議復設巡撫以王忬任之然賊已蔓延不可撲滅初沿海要地建衛所設戰船董以都司等官控制周密逮承平久船敝伍虛及遇警乃募漁船以資哨守兵非素練船非専業見寇舶至輒望風逃匿以故賊帆所指至是時無不殘破明年春直勾諸倭大舉入寇連船數百蔽海而至浙東西江南北瀕海數千里同時告警破昌國衛陷上海城流劫乍浦金山太倉崇明常熟嘉定又明年掠蘇州松江復趨江北薄通泰尋陷嘉善崇明入崇德縣掠嘉興還屯柘林縱橫往來忬不能禦乃移忬巡撫大同以李天寵代之質實昌國衛明置今裁故城在浙江寧波府象山縣西南乍浦鎮名在嘉興府平湖縣東南海口要地金山明衛今為縣屬松江府太倉明初立衛𢎞治中置州屬蘇州府本朝因之今升直𨽻州嘉善明縣宣德中置屬嘉興府今因之崇德五季吳越置縣明屬嘉與府今改名石門屬嘉興府柘林鎮名在松江府華亭縣東南有城李天寵孟津人八月仇鸞死詔戮其尸馬市既開諸邉日苦侵暴帝命鸞出鎮大同鸞不得已出鎮川堡遇伏敗還至是病疽猶戀大將軍印不肯上徐階密疏發鸞罪兵部尚書趙錦亦言强敵壓境而鸞病不能軍萬一敵衆長驅貽害君父不小帝命罷鸞以侍郎蔣應奎暫字戎政鸞大恚恨疽益劇遂死始鸞與嵩約為父子已而相惡嵩密疏毁鸞鸞亦陳嵩世蕃貪橫狀帝少疏嵩嵩因結錦衣都督陸炳共圖鸞鸞既死炳盡發其通敵納賄狀帝大怒下詔暴鸞罪追戮之傳首九邉質實鎮川堡在大同府東北五十里蔣應奎大同人九月河决徐州運道淤阻五十里總河都御史曽鈞言劉伶臺至赤晏廟凡八十里乃黃河下流疏濬宜先次則草灣老黃河口亦當更築長堤併增築髙家堰長隄繕新莊等舊閘以遏橫流從之質實劉伶臺在淮安府山陽縣東北淮水岸傍赤晏廟在安東縣草灣在山陽縣西北髙家壓隄在山陽縣西南洪澤湖東後漢陳登建明陳瑄重築新莊插在清河縣濟祠東明初建後廢曽鈞字廷和進賢人罷馬市諳達以羸馬索厚值弗于輒大譁大同市則掠宣府宣府市則冦大同甚者朝市暮冦併羸馬掠去帝惡之詔罷馬市十二月殺光祿寺少卿馬從謙中官杜泰提督光祿寺乾沒內幣嵗巨萬從謙奏發其罪並及宫中齊醮事命下詔獄杖殺之質實馬從謙字益之漂陽人隆慶初恤先朝建言杖死諸臣中官追恨從謙沮之給事中王治御史龎尚鵬力爭終不許御定資治通鑑綱目三編卷二十三
