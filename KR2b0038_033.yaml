body:
  text: 起壬辰明神宗萬厯二十年盡辛丑明神宗萬厯二十九年凡十年壬辰二十年春正月杖給事中孟養浩除其名時禮科都給事中李獻可偕六科諸臣疏請豫教言元子年十有一矣豫教之典當及首春舉行倘謂內庭足可誦讀近侍亦堪輔導則禁闥幽間豈若外朝之清肅內臣忠敬何如師保之尊嚴疏入帝大怒摘疏中誤書𢎞治年號責以違旨侮君貶一秩調外餘奪俸半嵗于是六科給事中鍾羽正舒宏緒陳尚象丁懋遜張棟吳之佳楊其休葉初春及御史鄒德泳各具疏救俱譴責有差而養浩疏有五不可之語帝愈怒謂養浩疑君惑衆命錦衣衛杖之百削籍為民是時斥諫官十一人朝士莫不駭歎然言者卒未已禮部員外郎董嗣成御史賈名儒陳禹謨給事中李周䇿等先後論諫咸被譴責質實孟養浩疏曰獻可甫躋禮垣驟議巨典一字之誤本屬無心乃遽蒙顯斥臣愚以為有五不可元子天下本豫教之請實為宗社計陛下不惟不聽且從而罰之是坐忍元子失學而敝帚宗社也不可者一長幼定序明旨森嚴天下臣民既曉然諒陛下之無他矣然豫教册立本非兩事今日既遲回于豫教安知來嵗不遊移于册立是重啓天下之疑不可者二父子之恩根于天性豫教之請有益元子明甚而陛下罪之非所以示慈愛不可者三古者引裾折檻之事中主能容之陛下壘侔天地奈何言及宗社大計反震怒而摧折之天下萬世謂陛下何如主不可者四獻可等所論非二三言官之私言實天下臣民之公言也今加罪獻可是所罪者一人而實失天下人之心不可者五祈陛下收還成命亟行豫教孟養浩字義甫湖廣咸寧人李獻可字堯俞同安人鍾羽正字叔廉益都人舒洪緒通山人陳尚相都勻人張棟字伯任崑山人吳之佳長洲人楊其休青城人葉初春吳縣人鄒德泳字汝聖安福人董嗣成烏城人賈名儒真定人陳禹謨仁和人李周䇿吳江人三月布拜據寧夏反布拜西布人嘉靖中得罪其酋長父兄皆見殺布拜伏水草中得免來降屢立戰功厯升都指揮至帝即位之十七年布拜老加副總兵致仕子承恩襲十九年洮河告警帝遣科臣巡九邉尚寶丞周宏禴以御史往寧夏舉成恩及指揮土文秀併布拜義子布延等布拜雖告老居恆多蓄蒼頭軍聲稱報國會經略鄭洛檄夏鎮調發巡撫黨馨奉檄遣文秀率千騎西援布拜驚曰文秀雖經戰陳恐不能獨將乃詣洛轅門願以所部三千人與子承恩從征洛壯而許之馨惡其自薦馬羸者不與易有餘馬亦不給布拜怏怏去至金城見諸鎮兵皆出其下賊平馳還取徑塞外寇騎遇之皆辟易遂有輕中外心恣睢驕橫黨馨每裁抑之且欲核布拜冒糧罪而以承恩強娶民女為妾箠之二十布延文秀又以升授事怨馨會鎮戍請冬衣布花月糧久勿給坐營江廷輔請給銀以安衆心馨曰此有挾而求漸不可長彼不畏族乎軍鋒劉東暘拔撫署前鹿角作忿狀布拜嗾之曰若輩任為之遂羣哄不可制東暘者靖虜衛人素梟桀有異志于是紏黨晨入帥府白事總兵張維忠素鮮威望為衆所輕見衆驚懾不能彈壓衆露刃執副使石繼芳擁入軍門黨馨急匿水洞索得劫至書院同繼芳戮之遂縱火焚公署收符印釋囚掠城中劫張維忠以侵糧激變報殺逰擊梁琦守備馬承光維忠自縊死東暘遂自稱總兵聽布拜主謀據城刑牲而盟授承恩許朝左右副總兵土文秀布延左右參將挾慶王代請貫罪承恩乃勒兵分遣王虎何安等據城堡會總督尚書魏學曾行部花馬池聞變遣標下張雲郜寵諭降東暘曰必欲我降依我所自署授官世守寧夏不者與套騎馳潼關也承恩徇玉泉營逰擊傳垣拒守千户陳繼武執垣降徇中衛及廣武參將熊國臣棄城匿河西望風靡惟土文秀徇平虜參將蕭如薰堅守不下賊率兵渡河欲取靈州又齎金帛誘套部珠爾嗣等許以花馬池一帶聽其駐牧勢甚猖獗全陜震動質實寧夏中衛明洪武三十二年置隸陜西都司靖虜衛明正統二年置隸陜西都司後改隸固原鎮平虜千户所在寧夏衛北百六十里明洪武中置所城周四里有竒今平羅縣屬寧夏府廣武營在寧夏衛西南百七十里與中衛接界周宏禴字元孚麻城人黨馨益都人慶王帥鋅憲王伸域子時憲王妃方氏匿帥鋅地窖中妃自經死府中人皆被殺賊平方氏建祠旌表魏學曾字惟貫涇陽人蕭如薰字季馨延安衛人如薰妻楊氏總督尚書兆之女也謂如熏曰若為忠臣妾何難為忠臣婦盡出簪珥勞軍士妻帥之守城賊攻圍數月竟不能破布拜舊作哱拜布延舊作哱雲珠爾圖舊作著力兔今並改王家屏罷李獻可之謫家屏封還御批力諌帝怒家屏引疾乞罷帝責家屏希名託疾家屏復奏言名非臣所敢棄臣所希者陛下為堯舜之君臣為堯舜之臣則名埀千載沒有餘名若使臣不希名將身處高官家享厚祿主愆莫正政亂莫匡國家奚賴焉更使臣棄名不顧逢迎為悅阿諛取容許敬宗李林甫之姦侫無不可為矣帝益不悅遣內侍至其邸責之于是求去益力詔馳傳歸家屏柄政止半載以戇直去國朝野惜焉夏四月總督河道尚書潘季馴罷季馴四任治河前後二十七年習知地形水勢以借水衝沙築隄束水為河漕兼利之䇿下至木石樁掃綜理纎悉以勞疾纍疏乞休不允至是泗州大水與撫按議濬治不合得請歸後三年卒質實泗州大水時城中水三尺患及陵寢議者或欲開傅寧湖至六合入江或欲濬施家溝周家橋入高寶諸湖或欲開夀州瓦埠河以分淮水上流或欲弛張福隄以廣泄淮之口季馴謂祖陵王氣不宜輕泄而巡撫周宷陳于陛巡按高舉謂周家橋在祖陵後百里可疏濬議不合都給事中楊其休請允季馴去因得請歸季馴于嘉靖四十四年總理河道與朱衡共開新河隆慶四年河決邳州睢寧再理河道塞決口萬厯六年河決崔鎮復命季馴代吳桂芳治之十六年復起總理河道凡四任治河五月倭陷朝鮮倭酋平秀吉起人奴初隨倭關白信長為信長畫䇿奪二十餘州會信長為其下所弒秀吉遂統其兵自號關白劫降六十餘州窺朝鮮無備分遣行長清正等率舟師從對馬島逼釜山鎮時朝鮮兵久不習戰其王李昖又湎酒廢弛島夷猝至望風皆潰棄王城奔平壤令次子琿攝國事已復走義州七月倭遂入王京劫王子陪臣掠府庫八道幾盡沒旦暮渡鴨緑江請援之使絡繹于道廷議以朝鮮為國藩蔽所在必爭遣行人諭昖以興復大義揚言大兵且至而倭業抵平壤逰擊史儒等率師至戰死副總兵祖承訓援之僅以身免中朝震動乃詔兵部右侍郎宋應昌經略備倭軍務以救之八月倭入豐德等郡兵部尚書石星計無所出議遣人偵之于是嘉興人沈惟敬應募惟敬者市中無賴也是時平秀吉次對馬島分其將行長等守要害惟敬至平壤執禮甚卑行長紿曰天朝幸按兵不動我亦不久當還當以大同江為界平壤以西盡歸朝鮮耳惟敬以聞廷議以倭詐難信趣應昌進兵而石星頗惑其言假惟敬逰擊赴軍前且請金行問質實關白倭國官名猶言丞相對馬島方輿紀要日本國海曲部冇伊岐對馬多藝三島為北境盡處釜山在朝鮮東萊縣南濱大海與日本對馬島相望義州在平壤西北濱鴨緑江八道京畿江原黃海全羅慶尚忠清咸鏡平安豐德郡在朝鮮國城南屬京畿道大同江在平壤城東亦名大通江平秀吉薩摩州人宋應昌字桐岡仁和人秋七月免陜西逋賦時以寧夏賊未滅防患當預全陜錢糧自十四年至十八年一切舊欠帶徵盡行蠲免八月詔天下督撫舉將材令各省督撫官招選將材不必拘數務得真才濟用無以虛文塞責仍嚴舉主賞罰之令九月寧夏賊平先是三月副總兵李昫奉魏學曾檄攝總兵進𠞰統戰逰擊吳顯趨靈州别遣逰擊趙武張竒扼賊南渡轉獲賊于正等八人舟十八艘賊鋒少挫昫乃分兵渡河先後收復營堡四十七惟寧夏鎮城猶為賊據會套部齊里克圖等控弦三干騎至賊益掠城中子女媚之奉以河東西地圖套人聲言已與布拜為一家布拜文秀並易服合兵攻玉泉急布彥引齊里克圖攻平虜堡蕭如薰伏兵南關佯敗誘之入伏兵射布彥死套部遁出塞昫督六路兵抵鎮城下賊東北二門各出精騎二千搏戰步卒列火車為營官軍衝鋒奪火車百餘輛追奔入河賊溺死者無算四月調麻貴為副總兵帝復用石星言賜學曾尚方劍督戰御史梅國楨薦李如松忠勇可任遂令如松總寧夏兵國楨為監軍又詔寧夏巡撫朱正色甘肅巡撫葉夢熊協力赴之正色渡河督戰葉夢熊從甘州攜神炮火器四百車至更約法益徵苗兵會浙江巡撫常居敬募浙兵千人自辦糗糧詔嘉其忠調赴寧夏于是分為五軍董一奎攻其南牛秉忠攻其東李昫攻其西劉承嗣攻其北而麻貴率逰兵策應並逼城下布拜自北門出戰意欲自往勾套部麻貴率參將馬孔英先登赴敵逐布拜入城擒斬百十七人先是布拜與套部深相結日夜從齊里克圖帳中商計調度至是入城不得出套部不得布拜亦不敢復渡河深入國楨如松統遼東宣大山西兵麕集軍聲大振賊嬰城自守國楨樹受降旗于城南然賊勢無降意六月癸丑官軍用布袋三萬盛土填集登城為炮石擊却都司李如樟夜半以雲梯上南城翼日逰擊龔子敬提苗兵攻南關如松乘勢欲擁入城皆為炮箭擊却是夜指揮趙承光葛臣戚欽武生張遐齡百户姚欽約為內間夜半四靣烽火並舉城下兵趨上而譙樓火蚤發南火弗起城中果鼓譟大呼殺賊欽使遐齡縋城召外兵行未中道欽復亟跳城下呼救而賊早覺已盡縛趙承光戚欽等殱之然自是城中糧且盡鋭氣益喪矣七月給事中許子偉劾總督尚書魏學曾惑于招撫罷秩被逮葉夢熊代之賜劍如故遂定議水攻寧夏城西北卑下且與金波三塔諸湖之水相近東南逼觀音湖新渠紅花渠形如釜底遂繞城築隄長千七百丈決河以灌先是布拜遣養子克哷該出求援于齊里克圖松詗知狀追斬之并其從騎二十九級獲符令箭已而套部仗圖賴與巴什圖合部落三萬先犯定邉小鹽池别遣宰桑以萬騎從花馬池西沙湃口入為布拜聲援麻貴等分擊之逰擊龔子敬力戰死然套部竟解散去賦援絶官軍乃決大壩水八月朔城外水深八九尺東東西崩百餘丈賊數出兵來擾多被斬獲城中飢民擁賊求招安九月己未參將楊文將浙兵至苗兵莊浪兵俱至後五日水浸北關城崩南關薛永夀等約內應官軍陽調舟筏擊北關承恩許朝果趨北關鏖戰李如松蕭如薰潛以鋭卒掩南關總兵牛秉忠年七十賈勇先登遂畢登夢熊入城勞苦百姓承恩等見南關下氣盡奪乃急縋張傑下城懇貸死夢熊陽許諾益治攻具先遣王機密以蠟書行間時承恩雖求撫猶據其大城墐門斷墅守益固有賣油李登者跛而眇負罌歌于市曰癰之不決而狃于痏危巢不覆而令梟止監軍梅國槇聞之曰是可使也召登授三劄縳木渡東門見承恩曰監軍以布拜有安塞功今與鼠輩駢首并誅深用惜之軍中非乏所使以登殘民不駭視有密計授將軍將軍幸有意聽登則殺劉許自贖即不聽願死麾下承恩猶豫許之登趨而出間道詣東暘朝亦各致劄曰將軍奈何與人嬰禍且鎮卒幾何能當都督軍此無異驅乳雀而鬬羣鶻所恃不過套援不記演武臺上彼目中豈有將軍哉所為貴智者以能審時度勢轉禍為福也東暘朝亦心動自此互相猜疑官軍圍愈迫東暘朝遂誘殺承恩黨土文秀承恩亦與其黨周國柱誘東暘朝殺之開門降于是李如松楊文先登蕭如薰麻貴劉承嗣繼之一城遂定北樓火起李如樟馳往搜獲寧夏巡撫關防并征西將軍印承恩方馳南門謁監軍梅國楨出參將楊文執之李如松急提兵圍布拜家布拜方與牛秉忠飯聞承恩擒秉忠趨出衆欲拒敵如松給箭令卸甲布拜倉皇縊闔室自焚李如樟部卒何世恩從火中斬布拜首生得布拜中子承寵等總督葉夢熊巡撫朱正色御史梅國楨隨入城問慰宗室士庶寧夏平俘承恩等至京師磔于市學曾被逮不一月而賊平敘勞復其官致仕葉夢熊朱正色梅國楨各豫世廕李如松蕭如薰等加恩有差先是學曾欲招劉東暘許朝使殺布拜父子贖罪遣卒葉得新往學曾留固原十日以俟之得新旋被害帝責學曾玩冦時李昫渡河又稍遲官軍再失利學曾前上疏請令監軍無與兵事帝為飭國楨如其言國槇頗憾之及國槇至軍劾諸將觀望而頗以玩冦為學曾罪又言北冦數萬斷我糧道殺戮無算學曾匿不以聞帝遂怒逮學曾至京學曾逮而水決城壞諸將畢登上捷奏夢熊正色國楨各廕世官如松功第一學曾任事勞勩灌城招降之策本其所謀及宣捷大學士趙志皋張位力為學曾解國楨亦上疏言學曾應變稍緩臣請責諸將以振士氣而逮學曾之命發自臣疏竊自悔恨學曾不早雪臣將受萬世譏如松亦言學曾被逮時三軍雨泣夢熊亦推功學曾帝不聽既而復官居家數年卒蕭如薰時以功授世廕妻楊氏亦被旌如薰為將持重後更厯七鎮所在見稱自隆慶後款市既成烽燧少警輦下視鎮帥為外府山人雜流乞朝士尺牘往者無不饜所欲薊鎮戚繼光有能詩名尤好延文士傾資結納取足軍府如薰亦能詩士趨之若鶩賓座常滿妻楊氏繼妻南氏皆貴家女至脫簪珥供客猶不給軍中悉苦之如薰莫能却也一時風會所尚諸邉物力為耗識者歎焉質實金波湖在寧夏府北三塔湖在寧夏府東北三十里觀音湖在寧夏府西北九十三里紅花泄在寧夏府南五里沙湃口在寧夏府西北李剛堡在寧夏府平羅縣南麻貴大同右衛人梅國楨字克生麻城人李如松字子茂成梁子朱正色南和人葉夢熊字男兆歸善人許許子偉瓊山人今克哷該舊作克力蓋改冬十月以李如松提督薊遼保定山東軍務充防海禦倭總兵官救朝鮮如松弟如柏如梅並率師援𠞰以十二月至軍會沈惟敬自倭歸復伸封貢之請如松叱惟敬憸邪欲斬之參謀李應試曰藉惟敬紿倭封而陰襲之竒計也如松以為然乃置惟敬于營誓師渡江明年正月次肅寧館行長以為封使至遣牙將來迎進次平壤行長猶未覺佇風月樓以待如松分布諸軍抵平壤城諸將逡巡未入形大露倭悉登陴拒守如松令諸軍圍之以倭素輕朝鮮軍令祖承訓詭為其裝伏西南令逰擊吳惟忠攻迤北牡丹峰而如松親提大軍攻其東南軍少却如松斬先退者以徇募死士援鈎梯直上倭方輕南靣軍承訓等匆卸裝露甲倭大驚急分兵捍拒如松如柏等已分道並入如松馬斃于炮易馬躍塹而上麾兵益進遂克其城行長渡大同江遁已而如柏復開城所失四道並復官軍既連勝有輕敵心朝鮮人有以敵已棄王京遁告者如松信之將輕騎趨碧蹄館猝遇倭圍之數重如松幾不免官軍喪失甚多乃退駐開城如松令諸將分據要害聞倭積粟數十萬在龍山乃密遣死士焚之倭遂乏食然如松既敗衄氣大索應昌亦即欲休息于是沈惟敬封貢之議復行其年四月倭以糧盡棄王京如松與應昌入城將遣兵尾擊之而倭步步為營官軍不敢擊倭結營釜山為久留計時兵部尚書石星力主款議獨留劉綎拒守如松乃班師質實肅寧館在平壤西北開城屬朝鮮京畿道碧蹄館在朝鮮國城西龍山在朝鮮國城東南李如柏字子貞如梅字子清皆成梁子癸巳二十一年春正月召王錫爵復入閣錫爵至密請建儲以踐大信帝手詔欲待嫡子令元子與兩弟且並封為王錫爵懼失上指立奉詔擬旨進又外慮公論因言漢明帝馬后唐明皇王后宋真宗劉后皆養諸妃子為子請令皇后撫育元子而生母不必崇位號以上壓皇貴妃亦擬旨進帝竟下前諭令有司具儀于是舉朝大譁禮部尚書羅萬化給事中史孟麟等詣錫爵力爭廷臣諌者章日數上錫爵偕趙志皋張位請追還前詔帝不從既而諌者益衆嶽元聲顧允成等十餘人遮錫爵于朝面爭之錫爵請下廷議不許請面對亦不報因自劾求罷帝亦迫公議追寢前命命少俟二三年舉行質實兩弟謂神宗第三子常洵鄭貴妃生第五子常浩周端妃生羅萬化字一甫會稽人史孟麟字際明宜興人兵元聲字之初嘉興人顧允成字季時無錫人夏六月詔天下每嵗夏月録囚減釋輕繫刑部奏犯法愚民何處不有而寃民亦何處不有請子巡按每嵗審録外再立澄清囹圄之法師兩京會審之規為撫按會疏之例方春時和每嵗聼兩直𨽻十三省各撫按官會行所屬問刑衙問各審部內輕重囚犯按察司居省會即審省會之囚守巡道有分土即審各道之囚皆親身巡行不得調審州縣為諸囚纍不得委審守令除情真罪當照舊監候其中有死罪矜疑軍徒杖笞情可原宥者許各詳撫按撫按會疏以請疏期勿過夏月輕罪徑自發落重罪聼部覆務使嵗嵗力行處處清審庶天下郡縣無一不結之囚從之秋七月吏部尚書孫鑨罷初張居正當國吏部權漸輕及宋纁陸光祖相繼為建尚書稍自振飭至鑨守益堅閣臣張位等欲奪其權議大僚缺九卿各舉一人類奏以聽上裁鑨爭之不能得自是吏部權又漸散之九卿矣會大計京朝官鑨與考功郎中趙南星力杜請謁員外郎吕允昌鑨甥也首斥之南星亦斥其姻給事中王三餘一時公論所不豫者貶斥殆盡而大學士趙志皋弟預焉王錫爵以首輔還朝欲有所庇比至而察疏已上庇者皆在黜中由是閣臣皆憾會言官論劾員外郎虞淳熙郎中楊于庭主事袁黃鑨議留淳熙于庭給事中劉道隆遂劾南星専權植黨貶南星三秩鑨亦奪俸遂連疏乞休去左都御史李世達以己同掌察上疏為南星訟不聽于是僉都御史王汝訓右通政魏允貞等交章論救而員外郎陳泰來言尤切帝怒斥南星為民泰來等皆被謫質實孫鑨字文仲燧之孫趙南星字夢白高邑人吕允昌餘姚人虞淳熙杭州右衛人楊于庭全椒人袁黃嘉善人劉道隆潛江人李世達字子成涇陽人王汝訓字古師聊城人魏允貞字懋忠南樂人陳泰來字伯符平湖人彗星見紫微七月三日乙卯彗星見東井二十三日乙亥逆行入紫微垣犯華蓋星大學士王錫爵密奏臣連夜仰觀乾象見彗星已入紫微垣臣聞古帝王禳彗之法或改張新政或更用新人一切以除穢布新為義若彗入紫微垣王者之宫則其咎乃在君身必非區區用人行政之間所能消弭竊惟天子之象曰帝星太子之象曰前星臣以為方今禳彗之第一義無過早行册立之典冬十一月召見王錫爵于暖閣皇太后生辰帝御門受賀畢獨召錫爵暖閣勞之曰卿扶母來京誠忠孝兩全錫爵叩頭對曰臣今日正恐忠孝兩虧因力請早定國本帝曰中宫有出奈何對曰此説在十年前猶可今元子己十三尚何待况自古至今豈有子弟十三嵗猶不讀書者帝頗感悟錫爵因復言外廷以固寵陰謀歸之皇貴妃恐鄭氏舉族不安惟陛下深省帝心益動未幾遂有出閣之命甲午二十二年春二月皇長子常洛出閣講學時已十四嵗帝手諭閣臣令議出閣講學禮儀免御門受賀用輔臣侍班詞臣六人侍講讀俱如東宫儀大學士王錫爵言皇長子出閣輔臣每日一員侍班此雖隆慶年新例但天顔尚不得時覲而于皇長子進見頻數似涉嫌疑請自初講二日以後間十日輪侍從之錫爵又請帝時御講筵俾皇長子隨嚴父之後型範益親啓沃自效矣不報遣使賑河南飢先是河南大雨五榖不升給事中楊東明繪飢民圖以進帝覽之驚惶憂懼傳諭閣臣至是從部議蠲是嵗田租并發銀八萬兩令光祿寺丞鍾化民兼河南道御史前往賑濟其山東江北災傷重處分賑停徵有差質實楊東明虞城人鍾化民字維新仁和人吏部郎中顧憲成削籍先是羣臣爭建儲惟王家屏與言者意合申時行王錫爵皆宛轉調護亦頗以言者為多事並封命下憲成上疏力爭又遺書錫爵反覆辨論議遂寢孫鑨趙南星主考察憲成實左右之既遷郎中所推多與政府抵牾至是王錫爵將謝政會推閣臣憲成舉家屏忤帝意削籍歸憲成既廢家居里故有東林書院為宋楊時講道處憲成與弟允成倡修之偕同志高攀龍錢一本薛敷教史孟麟于孔兼諸人講學其中海內聞風景附憲成嘗言官輦轂志不在君父官封疆志不在民生居水邉林下志不在世道君子無取故其講習之餘往往諷議時政裁量人物朝士慕之亦遙相應和由是東林名大著其後孫丕楊鄒元標趙南星等相繼講學自負氣節與政府相抗是為東林黨議之始質實東林書院在無錫縣常州知府歐陽東鳯無錫知縣林宰為之營搆顧憲成字叔時無錫人高攀龍字存之無錫人錢一本字國瑞武進人薛敷教字以身武進人于孔兼字元時金壇人歐陽東鳯字千仞潛江人林宰字德衡漳浦人三月詔修國史先是禮部尚書陳于陛請纂輯本朝正史下所司議至是勑大學士王錫爵等充總裁官編輯質實陳于陛字元忠以勤子總裁纂修官是時總裁官大學士王錫爵張位禮部尚書陳于陛南京禮部尚書沈一貫詹事劉虞夔少詹事馮琦副總裁官禮部尚書羅萬化吏部右侍郎盛訥禮部左侍郎范謙右侍郎孫繼皋少詹事曾朝節祭酒陸可教纂修官左庶子余繼登右諭德蕭良有洗馬李廷機右中允劉應秋修撰唐文獻焦竑編修鄭德溥郭正域黃汝良全天敘吳道南黃輝莊天合董其昌檢討王圖蕭雲舉區大相周如砥林堯俞夏四月己酉朔日有食之五月以禮部尚書陳于陛南京禮部尚書沈一貫兼東閣大學士預機務時王錫爵將謝政召二人同入閣質實沈一貫字肩吾鄞人王錫爵罷錫爵在閣時嘗請罷江南織造停江西陶器減雲南貢金力爭不宜用廷杖為世所稱特以阿並封旨被物議既而趙南星斥趙用賢放歸論救者咸被譴責衆指錫爵為之因連章自明且申救人卒莫能諒也錫爵遂屢疏引疾乞休帝不欲其去為出內帑錢建醮祈愈錫爵力辭疏八上乃允之命改吏部尚書進建極殿大學士賜道里費乘傳行人護歸六月西華門災己酉大雷雨火災西華門樓秋八月以孫丕揚為吏部尚書丕揚掌吏部清正不撓百僚無敢干以私者獨患中官請竭乃創為掣籖法大選急選悉聽選人自掣請寄無所容銓政自是一變一時宫禁相傳以為至公下逮閭巷莫不翕然稱頌而議者謂其人材不分高下地方不論繁簡而一憑籖注無異于掩鏡索照或至作竹籖傳畿之然自其法既行卒莫能改質實大選急選凡聽選及考定升降者歸于雙月謂之大選凡改授改降丁憂侯補歸于單月謂之急選竹籖傳常熟顧大韶作冬十月綽哈犯遼東總兵官董一元擊敗之初博斯呼為官軍所殺其弟綽哈子巴圖魯益結土默特東西相倚數侵邉一元遣部將孫守廉馳右屯禦西部而自將大軍匿鎮武外為空營以待敵騎深入官軍奮擊破之逐北七十餘里巴圖魯中矢走西部亦解去一元復以嵗宴敵不設備率健卒踏兵渡河疾馳四百里抵寇巢斬二百餘級獲牛馬甲仗無算巴圖魯旋死諸部悉逺遁質實鎮武堡在廣寧衛東百五十里董一元宣府前衛人乙未二十三年春正月詔宗室得就試鄭世子載堉請宗室皆得儒服就試毋諭中外職中式者視才器使從之許奉國中尉以下入試輔國中尉以上爵尊不得與其後禮臣李廷機言封爵科目原自兩途彼既願從科目入仕應照士子出身資格銓除何拘原爵亦從之惟不得除京朝官質實載堉鄭王厚烷子厚烷卒載堉讓封乃以世子祿終其身嘗上厯算嵗差之法及樂律考辨詳確識者稱之李廷機字爾張晉江人夏五月京師地震秋九月青海酋永什卜犯甘肅參將逹雲擊敗之永什卜者順義王諳達從子也部衆強盛先嘗授都督同知再進龍虎將軍自以貢市在宣化守臣遇已厚不可逞乃隨諳達西迎活佛留據青海嵗為邉患嘗誘殺副將李魁邉將不能報遂有輕中國心至是九月九日度將士必燕飲擁徑騎直入南川屬番偵告總督三邉李汶徼西寧參將達雲逰擊白澤設兵要害令番人繞出口外潛扼其背而雲自提精卒二千夾擊大敗之雲手馘其帥一人斬首六百八十餘級其走峽外者又為番人所殱獲駝馬戎器無算為西陲戰功第一雲既勝度寇必復至厚集以待踰月冦果結浩爾齊諸部先圍番寨以誘官軍番不能支合于寇寇遂入犯西寧西寧軍堅不可破寇始遁追奔數十里而還雲乃招集番人初與冦合者七十餘户皆復其業尋進雲總兵官鎮甘肅明年春季汶以徑兵三道出塞襲布色圖營斬四百餘級獲馬畜器械數千浩爾齊部衆復窺伺洮州汶遣參捋周國柱等擊之斬首三十六級質實李汶字宗齊任邱人逹雲涼州衛人永什卜舊作永什布布色圖舊作巴什圖今並改復建文年號初禮部尚書沈鯉力贊司業王祖嫡之請帝不從至是禮科給事中楊天民復以為言始詔復建文年號附事迹于太祖實録之末未幾南京太常卿沈子木疏言建文帝御字五年顧不得一杯麥飯下同齊民于誼未忍請附食于懿文太子之側章下部議果不行質實沈鯉字仲化歸德人楊天民字正甫山西太平人沈子木歸安人淮水溢浸泗州祖陵總河楊一魁請分殺黃流以縱淮别疏海口以導黃蓋以淮壅由于河身日髙河髙由于海口不深若上流既分則下流日減清河之口淮無黃遇則泗之積水自消而祖陵永保無虞議者以江北嵗災祲民力不堪大役欲先泄淮而徐議分黃工部謂導淮分黃勢實相須不容偏廢宜將導淮分黃疏澽海口等處工程命河臣逐一舉行其一應工費酌議動支事完分别勸懲報可可質實楊一魁安邑人冬十月湖廣飢湖廣巡按徐兆魁以地方災傷具四事上請一議改折一議緩徴一議蠲振一議振濟户部議緩徴徒貽小民他日之纍不若勘被災輕重量為蠲振詔如部議丙申二十四年春三月乾清坤寧兩宮災三月八日乙亥戌刻火發坤寧宫延及乾清宫一時俱燼夏福建飢福建諸府所屬被災人民分别振恤六月彗星見見東北方芒西南指秋七月吏部尚書孫丕揚請發推補官員章疏不報丕揚上言數月以來廷推閣矣行取停矣年例廢矣諸臣中或以功高優敘或以資深量遷或服闋而除補或覆題而注授其生平素履原不在擯棄之列者乞體因政設官之意念國步多事之時將近日推補官員章疏簡發間有注擬未當亦乞明示别推酌補疏入不報是時地方官亦多缺不補御史王以時奏言地方缺官之害藩司臬司等官職掌各有攸司每遇員缺則撫按必擇近便者一人使之攝理職錢穀而攝軍屯職兵戎而攝鹽馬夙昔未能嫻習旦夕豈能旁通顛末未暇究心略刲難于刋發聰明少有未遍寧免乘邊才力稍有不同輒形愆謬舞文者乘此弄其機械玩法者藉以恣其侵漁文移之往來獄訟之聽斷近者數十里遠者數百里又遠者千有餘里道路奔走嵗月牽纒費用不支勞苦勿恤或鬻賣其妻子而事尚未完或轉死于溝洫而寃莫可訴司道缺官廢事病民其為害既如此至于郡縣守令最為親民民之倚命于守令不啻赤子于其乳母使郡縣而可缺官則是赤子而可斷乳也使守令而可使常署攝則是赤子而可終嵗寄養也蓋専官如柙匱之典守故任怨勞而不辭攝職若傳舍之經過誰肯竭心力以從事乞行推補不報仁聖皇太后陳氏崩遣中官開礦初畿輔姦民慫恿中官多言礦利大學士申時行力持不可至是承寧更朝鮮用兵之後國用大匱營建兩宫計臣束手府庫前衛副千户仲春請間礦助大工帝允之自是獻礦洞者踵至首開畿內命中官領之嗣後則河南山西南京湖廣浙江陜西四川遼東廣東廣西江西福建雲南無地不開中使四出皆給以關防併偕原奏官往礦脈微細無所得勒民償之而姦人假開採之名乘勢橫索民財有司稍忤意輒劾其阻撓逮治富家巨族則誣以盜礦良田美宅則指為下有礦脈卒役圍捕辱及婦女其橫暴如此羣臣屢諌帝皆不聽其後又增設各省稅使如天津店租廣州珠監兩淮餘鹽浙江福建廣東布舶成都茶鹽重慶名木湖口長江船稅荆州店稅實坻魚葦及門攤商稅等都邑關津中使碁布水陸行數十里即樹旗建厰所至納姦民為爪牙肆行殺奪又立土商名目窮鄉僻塢米鹽雞豚皆令輸稅中人之家大半皆破由是民不聊生變亂蜂起仍是年七月開礦汝南八月開礦夏邑并青沂等處編富民為礦頭費縣文登沂水蒙隂臨朐諸礦同時開採二十六年六月命內監李敬採珠廣東七月命內監李道督稅湖口魯保經理淮鹽俱許節制有司十月于雲南大理採石二十七年正月分遣內監𣙜京口儀真二月命內監劉成𣙜稅浙江李鳳採珠廣州兼徵市舶司稅課設福建市舶司又命內監楊榮開採雲南陳奉徴荆州店稅陳增徵山東店稅孫隆徵蘇杭等處稅課魯坤徵河南孫朝徵山西又命內監邱秉雲徵稅四川兼礦務梁永徵稅陜西各以原奏千户翟應泰樂綱等往御馬監潘相督理江西瓷厰輔臣沈一貫言中使衙門皆創設並無舊緒可因大抵中使一員其從可百人分遣官不下十人此十人又各須百人則千人矣此千人每家十口為率則萬人矣萬人日給千金嵗須四十餘萬及所得才數萬徒斂怨耳今分遣二十處歲糜八百萬聖思偶未之及也乞盡撤之不報尋諸省皆併稅于礦使其年三月內監王忠徵稅密雲馬徵臨清陳增徵東昌十月南京守偹大監郝隆劉朝用採寧國池州八月內監陳奉採興國州礦洞丹砂二十八年二月內監暨祿徵鳯陽安慶徽廬常鎮稅邢隆稅沿江州田魯坤間彰德衛輝懷慶等礦洞又以錦衣百户王體仁奏命徴長江船稅又以廣洋衛鎮撫戴君恩奏命徴廣東遺鹽及絨錦珠寶等土産八月內監邱秉雲徵成都鹽茶重慶名木十二月開礦穀城閏八月乙丑朔日有食之九月葬孝安皇后梓宫發引帝託疾不送遣官代行吏部侍郎孫繼臯員外郎王就學抗疏諌帝怒抵繼臯疏于地而置就學疏不省已而詔吏部甄别郎官斥就學為民繼臯亦罷去質實孫繼臯字以德無錫人王就學字所敬無錫人河決單縣時徐泗淮揚間無嵗不苦水患總河楊一魁既議分疏黃淮于是後夫二十萬開桃源黃河壩新河起黃家嘴至安東五港灌口長三百餘里分泄黃水入海闢清口沙七里建武家墩高良澗周家橋石閘泄淮水三道入海且引其支流入江于是泗陵水患平而淮楊得無患然一魁専力桃源淮泗間而上流單縣黃堌口之決如故後以黃堌口不塞致衝祖陵斥一魁為民質實黃家嘴在桃源縣東北五港灌口在安東縣東北髙良澗在山陽縣西南由清河澗沙阜橋西入于淮周家橋在山陽縣西南髙堰上黃堌口在曹州府單縣南冬十月陳于陛卒于陛在閣與趙志臯張位沈一貫皆同年生遇事無齟齬而帝拒諫益甚上下否隔于陛憂形於色以不能補救在直廬數太息視日影至是以兩宫災請靣對下報乞罷亦不許以積憂成疾卒贈少保諡文憲丁酉二十五年春三月以楊鎬為僉都御史經略朝鮮軍務征倭軍既撤詔以顧養謙為經略養謙亦主欵奏言鬬白宜封為日本王二十二年冬倭遣小西飛入朝定封貢議命都指揮楊方亨等充貢使同沈惟敬往養謙薦侍郎孫礦自代乞身去二十四年九月方亨等至日本關白怒朝鮮王子不來謝不肯撤兵所進表文又謾無臣禮是年二月方亨歸委罪惟敬并呈石星前後手書帝怒逮星惟敬按問下獄諭死以尚書邢玠總督薊遼改麻貴為備倭大將軍而以鎬為經略未至先呈奏十事請今朝鮮官民輸粟得贈秩授官贖罪及鄉里丁夫等免役又以朝鮮君臣隱藏儲蓄不餉軍劾奏其罪由是朝鮮多怨當是時倭將行長清正等據南原全州犯全羅慶尚逼王京會沈惟敬就逮嚮道乃絶九月鎬抵王京倭已退屯蔚山十二月鎬會邢玠麻貴議進取分為三協合攻蔚山賊出戰大敗奔據島山結三柵以自固遊擊陳寅連破其二第三柵已垂拔而鎬素與李如梅善以如梅未至不欲寅功出如梅上邃鳴金收軍再攻不克明年正月行長救至鎬狼狽先奔諸軍繼之賊前擊官兵死者無算輜重多喪失是役也傾海內全力合朝鮮通國之衆委棄于一旦舉朝嗟恨鎬既奔還王京與總督玠詭以捷聞贊畫主事丁應泰聞敗詣鎬鎬揚揚自詡功代應泰憤抗疏盡列敗狀乃罷鎬今聽勘而以萬世德代之邢玠以前後無水兵故敗乃益募江南水兵謀海運為持久計分四路進兵麻貴為伏兵所敗中路將董一元亦潰迄無成功質實南原在朝鮮國城東南與全州相犄角為朝鮮要害全州在國城南全羅即朝鮮全羅道治全州其地南濱大海東接慶尚為朝鮮門户慶尚即朝鮮慶尚道治慶州在國城東南濱海與日本相對為朝鮮屏蔽蔚山即朝鮮蔚山郡在慶州西北島山在蔚山郡城南楊鎬商邱人顧養謙字益鄉江南通州人孫礦字文融鑨之弟邢玠青州益都人丁應泰武昌左衛人萬世德山西偏頭所人發明命將出師必先量敵憲勝成竹在胸而後可以刻期奏捷前此李如松等師出無功已有明驗乃當撤兵之後復命征倭而所任者一庸懦無能之楊鎬不量其事之能濟與否輕率前驅知彼知己之謂何觀鎬所陳奏事皆苟且覓若助兵供餉全有恃于朝鮮者以中國而征一倭必借助于外蒲之衆即使克捷已傷國體况朝鮮兵不習戰素為倭所輕島山一敗師旅盡喪而兹役也以救朝鮮為名而實則驅朝鮮之衆盡化為沙蟲猿鶴耳失機辱國莫此為甚至于加募江南水軍為分路搗冦之計而卒以無成亦同歸于謀國之不減廟堂既無長策擇帥又非其人而欲憺威海嶠何可得耶夏六月三殿災六月十九日戊寅火起歸極門延至皇極中極建極三殿文昭武成二閣周圍廊房一時俱燼時帝鋭意聚財多假殿工為名言者謂天以民困之故災三殿以示警奈何復因天災以困民帝不納屢徵木于川廣今輸京師費數百萬卒被中官冒沒終帝世三殿實未嘗復建也至熹宗朝魏忠賢始成之罷修國史從大學士張位等請也以皇極門左右兩廊被災停止正史纂修事務秋七月赦以三殿災故也質實詔曰朕仰荷天庥恭膺寶命二十有五載于兹追惟嗣服之初飬亦無時豫怠第緣嵗積頗恃政成兼以多病相侵猶須深宮居攝郊廟闕躬承之禮朝講希臨御之時喜怒猶失其平用舍未歸于當章奏每滯官曹半虛忠言寡聞民隱莫達方隅多故兵食之徵調日繁營造又興開採之徵求四出加之旱乾水溢析民室家汚吏貪官朘民膏血叢此人怨屢干天和乃于二十五年六月十九日皇極等殿皇極等門文昭武成二閣內外周回廊房一時被火夫寢宫煨燼曾幾何時正殿崇嚴又復罹此震驚烈聖憂戚慈闈蹐地局天靡所容措况一人統御之地萬國衣冠所歸天意若斯朕實不德兹已虔申籲禱痛加艾懲祓志改圖誓從今始嚴敕庶位各獻忠猷惟天視聽在民惟民歸依在德爰稽典制特布詔條庶藉有衆之歡以回皇穹之眷消咎徵于已往迓福祉于將來播州宣慰使楊應龍叛初應龍數從征伐恃功驕蹇帝十八年貴州巡撫葉夢熊巡按陳效並疏應龍凶惡諸罪四川巡按李化龍以時方調播州兵防禦松潘請暫免勘問由是川貴撫案議不合應龍性猜狠阻兵嗜殺所轄五司七姓悉叛離其妻叔張時照與所部何恩等上變告應龍反夢熊疏請發兵勦之而蜀中士大夫率謂蜀三面鄰播屬裔以十百數皆其彈壓且兵驍勇數赴征調有功剪除未為長策以故蜀撫按並主撫朝議行兩省會勘應龍願赴蜀不赴黔二十年十二月逮應龍詣重慶對簿繫論法當斬請以二萬金贖會倭大入朝鮮羽檄徵天下兵應龍願自將五千兵征倭報效詔釋之兵已啓行尋報罷巡撫都御史王繼光至嚴提勘結遂抗不復出而張時照等復議奏闕下繼光乃一意主勦二十一年春繼光馳至重慶與總兵劉承嗣參將郭成等議分三軍各道並進時軍至婁山等關屯白石口應龍陽令其黨穆照等約降而統苗兵據闕衝殺都司王之翰軍覆殺傷大半會繼光論罷即撤兵委棄輜重略盡黔師協勦亦無功以談希思為四川巡撫與總兵劉承嗣會同貴州橅鎮相機征勦時繼光既罷御史薛繼茂乃旋主撫應龍亦上書自白御史吳禮嘉劾郭成等失律令戴罪立功尋承嗣以疾乞骸骨兩省議久不決應龍遣其黨攜金入京行間執原奏何思詣纂江縣二十二年以兵部侍郎邢玠總督貴州車駕郎中張國璽主事劉一相贊畫軍前二十三年正月玠至蜀察永寧酉陽等土司皆應龍姻媾而黃平白泥諸司久為仇讐計先剪其枝黨以檄曉譬應龍謂應龍來當待以不死不者國家懸萬金購而頭若早為計吾不而欺也當是時七姓惟恐應龍出得除罪而四方亡命竄匿其間又幸龍反因以為利院道文移輒從中阻四月重慶知府王士琦奉玠檄詣纂江縣趣應龍聼勘士琦屬纂江令前往宣諭應龍使弟兆龍治郵傳儲糧郊迎叩頭致鋪資餼牽如禮曰應龍久縳渠魁待罪然不敢自來使君幸枉車騎臨貺敬布腹心纂江令具言于士琦士琦即以五月八日單騎往應龍果面縳道旁泣請死罪膝行南前叩頭流血請治公館執罪人及罰金士琦因為請玠以遣國璽一相及道府詣之應龍囚服蒲伏郊迎縳獻黃元阿羔阿苗等十二人案驗遂抵應龍斬論贖輸四萬金助採木仍革職子朝棟以土舍受事次子可棟羈府追贖黃元等梟斬重慶市是時倭氛未靖兵部欲緩應龍専事東方帝亦以應龍向有積勞許之加邢玠右都御史還朝以王士琦以川東兵備使彈治之然應龍益怙終不悛而次子可棟尋死于重慶應龍促取尸棺以勘報未完不肯發趣其完贖應龍大言曰吾子活銀即至矣擁兵驅千餘僧招魂而去分遣土目置關據險立巡警搜戮軍民劫剠屯堡殆無虛日厚撫諸苗用以摧鋒名曰硬手州人稍殷富者沒其家以養苗由是諸苗人願為之出死力矣二十四年七月應龍掠劫餘慶草塘二司遍及興隆都勻各衛又遣其弟兆龍引兵圍黃平戮重安司長官張熹家及是應龍遂劫江津縣及南川尋至合江索其讐袁子升縋城下臠割之益統苗兵大掠貴州已又侵及湖廣屯站阻塞驛路詗原奏讐民宋世臣父鑾及羅承恩等大索城中得鑾承恩及子女慘戮以狗掘墓焚尸灰飛蔽天勢遂大熾質實五司謂黃平草塘二安撫司白泥餘慶重安三長官司也黃平司洪武八年置萬厯二十八年改為州今屬貴州平越府草塘司在遵義府東洪武中置今廢餘八慶司元置州洪武中分置餘慶白泥二司萬厯二十年改置縣今屬平越府重安司在今黃平州西洪武八年置萬厯二十七年廢婁山關今名太平關在遵義府北百里大婁山上白石口在婁山關南西陽漢縣宋為酉陽州洪武五年置州八年改為宣撫司今酉陽州為直𨽻州陳效成都井研人李化龍字于田長垣人王繼光登州人薛繼茂山西芮城藉雲南永昌衛人吳禮嘉鄞縣人王士琦臨海人發明楊應龍一土司耳其驕恣凶暴已非一日使地方大吏早能善為制馭俾不至于蹺梁何有蠢然騷動之患若果罪惡昭著法所不容亦當明正其罪以威示逺人而申明國典乃黔撫方劾奏罪狀蜀撫即請免勘問紛紛持議兩省自相矛盾及既已問罪興師彼且抗拒顔行則更無有旋議主撫之理薛繼茂輩畏慈無城但希苟且一時不顧養癰貽患謀之不藏其罪實無可逭至于擕金行間而遂執原奏者以泄賊憤此復成何政體逮其後名曰請降而實則仍肆侵掠所謂主撫者適以長其輕傲之心又焉怪其後之愈滋不靖乎且擕金行間內臣必有為之主者以逺方土司而潛與朝寧相結其為害于家國者甚大又豈特邊吏之失策已哉八月京師地震遼陽開原廣寧等衛俱震地裂湧水三日乃止宣撫薊鎮等處俱震次日復震蒲州池塘無風生波湧溢三四尺山東濰縣昌邑樂安即墨皆震臨淄縣不雨濠水忽漲南北相向而鬬又夏莊大灣忽見潮起隨聚隨開聚則文餘開則見底樂安小清河水逆湧流臨清磚板二閘無風起大浪質實昌邑宋建隆三年置縣明屬萊州府樂安金縣明屬青州府今皆因之冬十月以黎惟潭為安南都統使初莫登庸請封制下而登庸已死遂使其孫福海襲福海卒子宏瀷嗣宏瀷不能攝衆為黎寧臣鄭檢所逐寧死再傳至惟潭漸強盛遂舉兵攻殺宏瀷子茂洽復據安南􅍁關求貢總督陳大科上言莫之篡黎其事逆黎之復讐其名正宜許其來歸詔以惟潭為都統使自是安南復為黎氏所有而莫氏惟據高平一郡宗黨多竄處海隅時出侵軼為邉患質實陳大科北直通州人戊戌二十六年夏四月土默特犯遼東總兵官李如松出塞遇伏死初如松棄倭班師言路交章詆其和親辱國帝置不問會遼東總兵董一元罷廷推如松代之如松感帝知氣益奮綽哈紏土默特諸部連冦遼東殺掠無算如松率輕騎出塞搗巢遇伏兵力戰死詔以其弟如梅代之踰年坐擁兵畏敵劾罷京師旱以禱雨黑龍潭加封黑龍潭龍王廟號勒碑紀之六月張位罷日本封事壞位力薦楊鎬才請付以朝鮮軍務鎬遭父喪又請奪情視事帝皆從之會贊畫主事丁應泰劾鎬喪師言位與鎬密書往來朋黨欺國鎬拔擢由賄位得之帝怒下廷議位惶恐奏辨給事中趙完璧徐觀瀾復交章論之位窘亟奏羣言交攻孤忠可憫臣心無纖毫愧惟上矜察帝怒曰鎬由卿密揭屢薦故奪哀授任今乃朋欺隱慝辱國損威猶云無愧遂奪職間住質實趙完璧陜西人徐觀瀾澤州人秋八月京師地震丁丑夜四更地震冬十一月倭遁去官軍分道追擊敗之朝鮮平初官軍分道擊倭不利會平秀吉死羣倭俱有歸志其渠帥清正發舟先走總兵官麻貴遂入島山西浦都督陳璘遣副將鄧子龍督水軍千人駕三巨艦為前鋒邀之釜山南海戰殁會副將陳蠶季金等軍至邀擊之倭無鬬意官軍焚其舟賊大敗其得脫登岸者又為陸兵所殱焚溺者萬計時總兵劉綎方攻行長奪曵橋寨璘以舟師夾擊復焚其舟百餘行長黨石蔓子引舟師來救璘邀之半洋擊殺之于是諸倭揚帆盡去自倭亂朝鮮七載喪師數十萬糜餉數百萬中國與朝鮮迄無勝算至秀吉死禍始息是年六月命萬世德代楊鎬經略朝鮮軍務畏倭不敢前比聞倭退會同總督邢玠奏捷贊畫主事丁應泰等劾諸臣賄倭賣國帝以將士久勞苦仍發金十萬兩犒師敘東征功首陳璘次劉綎擢都督同知又次麻貴加右都督邢玠萬世德各豫世廕董一元楊鎬俱復原職質實曵橋寨在朝鮮慶州西南順天城外陳璘字朝爵翁源人鄧子龍豐城人素慷慨初起廣東把總厯麻陽永城參將擢總兵官所在立戰功時年踰七十意氣彌厲欲得首功急攜壯士三百人躍上朝鮮舟直前奮擊賊死傷無算他舟誤擲火器入子龍舟舟中火起賊乘之子龍死贈都尉僉事廟祀朝鮮發明以中國全力救朝鮮厯七年之久迄無勝算豈真倭之強不可勝哉始則石星惑封貢之議繼則楊鎬挾忌功之私徒使老師海上糜餉中原向非倭酋自斃則朝鮮之事正未可知當時在事僨轅之輩併為一談幸有贊畫丁應泰者紏劾諸臣之賄倭賣國正可因以分别工罪申明國憲乃徒以將士久勞意存姑息専事懋敘行賞而畏縮不進之萬世德亦得冒功豫廕挾私敗績之楊鎬并得原情復職刑章廢弛軍紀蕩然是時邉事日繁中國坐耗元氣銷鑠之餘又苦􅏓盩就使師出以律猶慮得不償失况復否臧之凶乎以劉東星為工部侍郎總理河漕初潘季馴議開黃河上流循商邱虞城而下厯丁家道口出徐州小浮橋即元賈魯所浚故道也朝廷以費巨不果東星即其地開濬起曲里鋪至三仙臺抵小浮橋又濬漕渠自徐邳至宿遷凡五閲月工竣明年濬邵伯界首二湖又明年開泇河南通淮海引漕甚便質實丁家道口在歸德府商邱縣北小浮橋今名雲集橋在銅山縣舊城東北隅曲里鋪在蕭縣西三仙臺山名在蕭縣北邵伯湖在揚州府北四十五里界首在高郵州北六十里劉東星字子明沁水人總督李汶襲浩爾齊于松山走之復其地齊里克已東歸而套冦浩爾齊巴什圖等頻年抄掠如故據三大巢曰河套曰海西曰松山聲息交倚松在河西為羌番襟要地垂二千里總督三邉李汶內聫四鎮外招番人襲破冦于松山復其地築邉垣四百里以蔽莊涼蘭靖為內地而盡撤舊戍汶督陜凡四考進秩至少師李汶疏云兵動萬餘師勞旬日收幅員千里之封疆剪腹心數百年之巨害葉向高志汶大小百餘戰斬馘萬九千有竒降萬二千有竒遂空松幕云己亥二十七年春三月以李化龍總督川湖貴州軍務討楊應龍先是貴州巡撫江東之令都司楊國柱指揮李廷棟率部兵三千剿應龍應龍遣子朝棟弟兆龍何漢良等迎敵于飛練堡賊佯走天邦囤誘官軍盡殱之國柱罵賊不屈與經厯潘汝資等皆死東之罷以郭子章代而命化龍兼兵部侍郎節制川湖貴三省軍事調東征諸將劉綎麻貴陳璘董一元南征六月應龍乘大兵未集遂勒兵犯綦江城中新募兵不滿三千賊兵八萬奄至圍綦江城數匝參將房嘉寵誤爇火磚反傷城上兵賊乘勢登城嘉寵率師巷戰蜀兵爭譟走水上嘉寵乃殺其妻與逰擊張良賢俱死之應龍因劫縣令縱囚焚掠出綦江庫犒師依倉就食盡取資財子女去老弱者殺之投尸蔽江而下水為赤尋退屯三溪以綦江之三溪毋渡南川之東鄉壩立石為播界號宣慰官莊聲言江津合江皆播故土益結九股生苗及紅黑腳等苗負險弄兵為助是時賊猶未敢鼓行深入止言爭界給葬并索姦民而化龍等以授師未集蜀人畏賊如虎時時移文詰責示無遽絶意計以緩賊賊果具文求撫不復西向時郭子章日夜徵調各漢土兵分守南川合江等處軍聲漸震應龍偽軍師孫時泰請應龍直取重慶搗成都劫蜀王為質而應龍遷延不進尚冀曲省化龍至成都亦謬為好語糜之已而帝聞綦江破追褫兩省巡撫談希思江東之各為民賜化龍劍假便宜討賊調各路兵大舉十月化龍移駐重慶調度川貴湖廣兵總兵官劉綖軍亦至綎素有威名其家丁良馬皆可決勝然夙與應龍昵人皆疑之于是化龍延綎入卧內輸心腹且以危言激之引其父顯九絲功為比綎大慟願誓死報效化龍騰書于朝遂委綎専制軍事益有次第矣已而應龍屯官壩聲言窺蜀已遂焚東坡爛橋出掠興隆鎮逺化龍議置徑兵萬餘據守要害通楚黔道益調諸路兵以俟大舉質實飛練堡在平越府甕安縣東廢草塘司北十里天邦囤在廢草塘司西北三溪唐置縣宋廢故城在今重慶府綦江縣南東鄉壩在南川縣西南官壩在遵義府城西北東坡在平越府黃平州東爛橋在鎮逺府施秉縣南郭子章字相奎泰和人夏旱自去冬至是亢旱為災河井乾竭二麥枯稿閠四月遣中官核天下積儲以諸皇子婚詔取太倉銀二千四百萬兩户部告匱乃命中官嚴核各省積儲由是外帑日耗秋八月陜西山崩狄道縣有山長二百餘丈聲如雷者十數夜遂陷為池山南平地湧山五高者二十餘丈冬十月加四川湖廣田賦以播州用兵故十一月賑畿輔飢發天津德州臨清倉共三十萬石以十萬賑貸而以二十萬平糶是月蠲免河南鳯陽各府州縣被災處免徵改折有差十二月武昌漢陽民變擊傷稅使陳奉奉在湖廣恣行威虐慘毒備至興國州姦民漆有光訐居民徐鼐等掘唐相李林甫妻楊氏墓得黃金巨萬奉奏之帝命奉括進內庫奉因毒拷責償且悉發境內諸墓巡按御史王立賢言所掘墓乃元吕文得妻非林甫妻姦人訐奏語多不實請罪不治而停他處開掘不報時巡撫支可大以下事奉唯諾惟謹獨分巡僉事馮應京以法裁之至是有武昌漢陽諸生妻被辱訴上官市民從者萬餘哭聲動地蜂擁入奉廨爭投瓦石擊奉奉被傷諸司馳救之乃免應京捕治其爪牙奉怒陽餉食而置金其中應京復暴之益慚恨尋置酒邀諸司以甲士千人自衛遂舉火箭焚民居民羣擁奉門奉遣人擊之多死碎其尸擲諸途可大噤不敢出聲應京獨抗疏列其九大罪奉亦誣應京撓命凌敕使帝怒命貶應京邉方雜職給事中田大益御史李以唐等交章劾奉乞宥應京帝益怒除應京召是時襄陽通判邸宅推官何棟如棗陽知縣王之翰亦忤奉被劾詔宅之翰為民棟如遣逮俄以都給事中楊應文論救遂併逮應京宅之翰三人頃之奉又誣劾武昌同知卞孔時抗拒孔時亦被逮緹騎抵武昌民知應京獲重譴相率痛哭奉乃大書應京名列其罪榜之通衢士民益憤聚數萬人圍奉廨誓必殺奉奉逃匿楚王府衆乃投奉黨十六人于江并傷緹騎以可大助虐焚其轅門可大不敢出日已晡猶紛亂應京囚服坐檻車曉以大義乃稍稍解散奉匿楚府逾月不敢出亟請還京大學沈一貫因極言奉罪請立代還言官亦爭以為請帝未許會江西湖口稅使李道奏奉水阻商舟陸截販賈剝民病國帝乃召奉還𨽻其事於承天守備杜茂頃之東厰奏緹騎有死者帝怒甚手詔內閣欲究主謀一貫言民心宜靜請急遣重臣代可大拊循因薦侍郎趙可懷帝乃褫可大官令可懷馳往未至可大已遣兵護奉行舟車相銜數里不絶可懷入境亦遣使護之奉得迤遷去應京之就逮也士民擁檻車號哭車不得行既去則家為位祀之父老相率詣闕訴寃帝不省繫應京等詔獄栲訊久之至三十二年九月以星變修省廷臣多請釋繫囚于是應京及宅棟如獲釋之翰先瘐死而孔時繫獄如故至四十一年始釋歸荆奉至湖廣二年武昌凡再變繼之漢口黃州荆州門襄陽寶應德安湘潭諸處變經十起幾成大亂而是時山東臨清民亦譟而逐稅監馬堂縱火焚堂署斃其黨三十七人皆黥背諸偷也詔捕首惡株連甚衆有王朝佐者素伏義慨然曰首難者我也勿纍無辜臨刑神色不變臨清民立祠以祀未幾蘇州亦民變殺稅監孫隆黨六人有司捕亂者民葛誠獨承論死遇赦得釋自礦稅興中使暴橫所至跆藉有司謗書一聞駕帖立下二十四年則遼東參將梁心二十五年則山東福山知縣韋國賢二十六年則山東益都知縣吳宗堯二十七年則江西南康府知府吳實秀墨子知縣吳一元山東臨清守備王煬湖廣荆州府推官華鈺經厯車任重二十八年則廣東新會在籍通判吳應鴻舉人勞養魁鍾聲朝梁斗輝雲南尋甸知府蔡如川趙州知州甘學書陜西富平知縣王正志二十九年則應京宅棟如之翰及武昌同知卞孔時江西饒州通判陳竒可三十年則鳯陽臨淮知縣林錡三十四年則陜西咸陽知縣陳時濟三十五年則陜西咸寧知縣滿朝薦三十七年則遼東海防同知王邦才參將李獲陽皆幽繫詔獄久者至十餘年煬應鴻志學獲陽俱斃獄中其他削籍貶官者甚衆至士民囚繫死亡者尤不可勝紀質實支可大崑山人馮應京字可大旴𣅿人田大益四川定逺人邸宅人姓名氏族志邸氏望出中山何棟如南京左衛籍無錫人王之翰綘州人吳宗堯字仁叔歙縣人華鈺字德夫丹徒人王志正祥符人滿朝薦字震東麻城人發明礦稅為神宗時極弊之政乃復以姦民訐告敕使括金遂至悉發境內諸墓暴及枯骨因以凌辱士民之妻甚至舉火焚燬民居碎尸擲諸途路明代任用內寺其弊百出誤國喪師何所蔑有然未有橫虐恣毒若此之無道者蓋由神宗濟以好貨之私若輩乃敢肆其劫掠之術在武昌漢陽之民擁入奉廨爭投瓦石憤馮應京之被逮聚哭者至萬餘人又復焚巡撫轅門民氣可謂不靖以尋常無事時論之則當立懲首惡嚴究姦民以止其亂若此之剝民病國是所謂壅而必決者陳奉實有以致之豈盡民之無良哉應京抗疏劾奉可謂直言而轉檻車繫訊閣臣臺臣亦交章聲言奉罪神宗僅僅召奉還京無一譴訶之語賞罰之不明不幾拂人之性耶庚子二十八年春二月京師地震戊寅午時地動起自東北往西南連動二次夏六月李化龍帥師平播州楊應龍勒兵數萬五道并出攻破龍泉司土官安民志率步卒五百拒守死之時化龍徵兵大集大會文武于重慶登壇誓師分八路進兵川師分四路總兵劉綎由綦江入總兵官馬孔英由南川入總兵官吳廣由合江入副將曹希彬受廣節制由永寧入黔師分三路總兵官童元鎮由烏江入參將朱鶴齡受元鎮節制統宣慰使安疆臣由沙溪入總兵官李應橋祥由興隆入楚師一路分兩翼總兵官陳璘由偏入總兵官陳良玭受璘節制由龍泉入每路兵三萬官兵三之土兵七之巡撫郭子章駐貴陽湖廣巡撫支可大移沅州化龍自將中軍䇿應部署既定化龍戒諸將以抵婁山等關為期且曰關外且戰且招降多不可勝誅也關內急戰勿受降師不可久老賊詐不可信也先是蜀玉壘山忽裂僉謂昔年平九絲地數動殆播平先兆云劉綎進兵綦江連戰破三洞綦江自東溪入播並峻嶺密箐楠木山羊簡臺三洞索號竒險賊首穆照等盤據綎力戰克之楊朝棟統苗兵數萬分道迎敵鋒甚鋭官軍夾擊綎身自陷陳苗大驚曰劉大刀至矣棟潰圍走幾被獲賊膽落益為守禦計諸軍分道並捷南川則酉陽石砫二司兵先登遂連克桑木烏江河渡三關陳璘至副將陳寅擊四牌賊各披靡遂奪天都三百落諸囤賊連敗乃乘隙出竒兵突犯烏江詐稱水西龍澄會哨永順兵斷橋溺死官軍無算參將楊顯守備陳雲龍阮士竒白明逵指揮楊續芝等死之事聞逮總兵童元鎮下于理時有蜚語水西佐賊者化龍檄詰之水西不自安會賊殺其頭目澄大眼復修好賄澄澄戮其使擊斬偽將楊惟棟等安疆臣亦執賊二十餘人以示不背時劉綎戰九盤入婁山關關為賊前門萬峯插天中通一線官軍從間道攀藤魚貫毁柵而入四月朔屯白石應龍率諸苗決死戰陰令楊珠等抄後山奪關四面合圍都司王芬中流矢死劉綎親勒騎衝堅以逰擊周敦吉守備周以德分兩翼夾擊敗之與南川永寧路合連破其龍爪海雲諸險囤壓海龍囤而壘海龍囤者賊所倚天險飛鳥騰猿不能踰者時偏沅巡撫都御史江鐸已抵任視師陳璘帥師急攻破其青蛇囤安疆臣亦奪其落蒙關至大水田焚桃溪莊賊見勢急父子相抱哭上囤死守每路投降文以緩官軍化龍以賊詭降檄令斬使焚書毋為所紿又虞綎與應龍有舊檄令無通賊綎械其人自明而吳廣入崖門關營水牛塘與賊力戰三日却之賊詭令婦人于囤上拜表痛哭云田氏且降復詐為應龍仰藥死以報廣已而覘知田氏詐降以緩攻而所云應龍死乃川兵攻囤以火炮擊死所謂楊珠也珠驍勇善戰既死賊痛如失左右手廣覺詐益厲兵協攻絶賊樵汲八路大集海龍囤下遂築長圍更番迭攻賊大囤會化龍聞父喪詔以墨縗視師化龍跣而草檄益治軍念賊前險不能越令馬孔英勒兵攻其後時天久雨將士馳泥淖中苦戰六月四日天忽開霽明日劉綎身先士卒進克土城應龍益迫𣪚數千金募死士拒戰諸苗皆駭散無應者起提刀自巡壘見四面火光燭天倣徨長歎泣謂其妻子曰吾不能復顧若矣詰朝官軍遂登囤破其大城入應龍倉皇同愛妾二闔室縊且自焚吳廣獲其子朝棟及兆龍等百餘人播賊平計出師至滅賊百十有四日化龍露布以聞劉綎為軍功冠詔磔應龍尸戮朝棟兆龍等于市以其地置遵義平越二府分屬四川貴州質實龍泉本龍泉坪長官司元為思州安撫司治明神宗二十九年改為龍泉縣屬貴州石阡府今因之烏江在遵義府南境上有關明洪武中置沙溪在遵義府城南偏橋明初置長官司今屬鎮逺府玉壘在成都府灌縣西北三十里巖石上有鐫玉壘字桑木關在遵義府綏陽縣東河渡關在烏江關東水西宣慰司在貴陽府西北三百里海龍囤在遵義府城北為應龍穴壘青蛇關在遵義府城東落蒙關在遵義府城西崖門關在遵義府西北遵義平越二府今皆屬貴州吳廣廣東人童元鎮桂林右衛人江鐸仁和人田氏即七姓之一秋七月旱工科給事中王德完以祈禱雨澤奏言致旱有由縱其所以毒民者是也弭災有法衛其所以保民者是也今出柙中之虎兕以吞饜羣黎逸圈內之豺狼以搏噬百姓怨憤無處得伸鬱結無時可解霖雨以天怒而屯肥􅖆緣人妖而出如之何不旱亟改前弦將各省黷貨之使一旦撤回則修省以實不以文何旱災之不禳哉疏入不報質實王德完字子醇廣安人冬十月下給事中王德完于獄廷杖除名時鄭貴妃日有寵而王皇后多疾左右咸竊意后崩貴妃即正中宫位其子為太子中允黃輝皇長子講官也從內侍微窺得其狀謂德完曰此國家大事旦夕不測書之史册謂朝廷無人德完乃屬具草及是上之疏入帝震怒立下詔獄拷訊尚書李戴御史周盤等連疏論救忤旨切責御史奪俸有差閣臣沈一貫方在告力疾草奏為德完解帝亦不懌命杖德完百除其名復傳諭廷臣諸臣為皇長子耶為德完也如為皇長子慎無瀆擾必欲為德完則再遲册立一嵗廷臣乃不復言質實黃輝字平倩南充人李戴字仁夫延津人周盤澤州人兩畿盜起頻年災旱又苦礦稅兵民多起為盜浙人趙一平以妖術倡亂竄徐州與其黨孟化鯨等招集亡命自稱宋後署偽官期明年二月諸方並起事覺伏誅時鳯陽巡撫李三才再疏陳礦稅之害言陛下愛珠玉民亦慕溫飽陛下愛子孫民亦戀妻孥奈何崇聚財賄而使小民無朝夕之安又言近日奏章凡及礦稅悉置不省此宗社存亡所關一旦衆畔土崩小民皆為敵國陛下即黃金盈箱明珠填屋誰為守之皆不報質實趙一平妖術倡亂明實録趙一平浙之山陰人素習邪術俶詭喜亂會麗水妖婦王氏假稱佛號與義鳥姦吏陳天寵傳香淫聚煽惑浙東其夫死一平夤緣妻之造指南經妖書令其黨分投兩都省署同日布散簧鼓人心黨獲懼誅改姓名曰古元逃竄徐州結納無賴猖狂大言已而流寓杭城誦經聚衆拒捕殺人變姓名亡命滄瀛間至寶坻為千户劉文所擒械京師即訊獄具一平王氏天寵皆戮西市梟首狗衆餘黨各論斬枷示遣戌有差李三才字道南順天通州人辛丑二十九年春二月賑大同宣府飢蠲免二府本年應徵錢糧夏五月罷山西巡撫魏允貞中官張忠孫朝先後領山西礦稅誅求百方允貞每事裁抑疏暴其罪朝怒劾允貞抗命阻撓帝留允貞疏不下而下朝疏于部院將加譴責吏部尚書李戴都御史溫純力爭允貞賢請下允貞疏平議帝並留中山西軍民數千人詣闕為允貞訟寃言官亦連章論救帝置不問允貞父年九十餘乃乞歸侍養廷議以稅使害民非允貞不能制固留之允貞請益力聽歸旱畿輔山東河南赤地數千里吏部尚書李戴等條上旱災封事言自去年六月不雨至今三輔嗷嗷民不聊主草木既盡剝及樹皮夜竊成羣兼以晝劫道殣相望村空無煙據巡撫汪應蛟揭稱坐而待賑者十八萬人過此以往夏麥已枯秋種未布使百姓坐而待死更何忍言使百姓不肯坐而待死又何忍言加以頻值外警連興傾國之師車殆馬煩行齎居送按丁增調踐畝加租此時賦稅之役比二十年以前不啻倍矣而礦稅之議煩興貂璫之使四出不論地有與無有包礦包稅之苦不論民願與否有派礦派稅之苦指其屋而挾之曰彼冇礦則家立破矣彼漏稅則槖立傾矣以無可查稽之數用無所顧畏之人行無天理王法之事大略以十分為率入于內帑者一尅于中使者二瓜分于參隨者三指騙于土棍者四而地方之供應嵗時之餽遺驛遞之騷擾與夫不才官吏指以為市者不與焉陛下但知利源易開中貴易信豈知彼剝害小民至于如此亦豈知今日苦礦苦稅之民即是前日被災被兵之民重纍疊困咨嗟愁怨至于如此不報六月法司請熱審不報嗣後數年每請皆不報獄囚久繫多死秋八月復以李成梁鎮遼東成梁去遼十年之間更易八帥邉備益弛會總兵馬林獲罪沈一貫言成梁雖老尚堪將兵乃命再鎮遼東年已七十六矣時土默特察罕及巴圖已死冦掠漸稀而開原廣寧復設馬木二市諸部耽市賞利爭就欵以故成梁再鎮八年遼左少事質實復設馬木二市先是泰寧朵顔福餘諸部屢犯邉後朵顔小岱青悔禍欵塞請開木市于義州帝之二十三年遼東巡撫李化龍疏言其利廷議從之未幾遂罷并罷馬市小岱青復為冦至是成梁力請復之後以為常察罕舊作長昻巴圖舊作把吐小岱青舊作小歹青今並改九月河決開封歸德開封歸德二府大水商邱等處黃河水發衝決蕭家口一百餘丈全河皆南注原行河身頃刻變為平沙商賈舟不暇解維盡涸平沙之上商邱虞城夏邑多被淹沒趙志皋卒志皋為首輔年七十餘耄矣柔弱為朝士所輕日本封貢議起石星力主之志皋亦冀無事相與應和及封事敗劾星者必及志皋志皋每被言輒疏辨求退然志皋才氣不如沈一貫張位而醇謹過之時帝益怠荒章疏沈閣官僚曠闕志皋亦頗論諌特以石星之故物議叢焉其乞休疏凡八十餘上俱不許在告四年至是卒于邸舍賑貴州飢貴州巡撫郭子章言六月十八日貴陽府定番地震自酉至戍有聲如雷黔東諸府衛及黃平五司自正月不雨至于六月思南府大雨婺川縣大雨氷雹交作城內水深數尺去年苦兵今年苦飢黔東憂旱黔南憂水軍民重困議將湖廣四川二省協濟拖欠錢糧如數徵解以賑全黔户部如議請報可質實定番州明成化中置程番府神宗時置州屬貴陽府今因之如是以前禮部尚書沈鯉朱賡並兼東閣大學士預機務鯉素鯁亮前在禮部持典禮多所建白申時行銜鯉不附已深忌之一日鯉請告時行遽擬旨放歸帝曰沈尚書好官奈何使去傳旨諭留帝有意大用鯉微言沈尚書不曉人意內豎密告鯉鯉拒之曰禁中語非所敢聞卒引疾歸賡充講官時宫中方興土木治苑囿賡因講宋史極言花石綱之害帝為悚然纍遷禮部尚書遭繼母喪去至是趙志皋卒沈一貫請增置閣臣帝素慮大臣植黨欲用林居及久廢者遂詔鯉與賡以原官入閣參預機務冬十月立子常洛為皇太子時太子年二十羣臣屢請册立冠婚並行沈一貫草敕請下禮官具儀而廷議有欲先冠婚後册立者一貫不可曰不正名而苟成事是降儲君為諸王也帝意亦悟命即日舉行既而復令改期一貫封還諭旨力爭乃立常洛為皇太子同日封諸子常洵福王常浩瑞王常潤惠王常瀛桂王初儲位未定鄭貴妃要帝至大高元殿謁神設密誓立其子為太子帝因書一紙緘玉合中賜妃為符契後廷臣爭之強慈聖太后復堅持立長而妃又忽失歡于是皇長子遂得立為太子帝遣人取玉合封識宛然發合蟲蝕書盡矣質實福王後之藩洛陽瑞王後之藩漢中惠王後之藩荆州桂王後之藩衢州常潤常瀛並李貴妃生御定資治通鑑綱目三編卷二十八
