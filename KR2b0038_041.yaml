body:
  text: 起甲戌明莊烈崇禎七年盡兩子明莊烈崇禎九年凡三年甲戌七年春正月以陳竒瑜總督河南山陜川湖軍務討流賊初流賊既自秦入晉掠河北畿南關中寇患少紓竒瑜時為延綏巡撫復分遣文武將吏擒斬賊渠截山虎等百七十七人他賊多解散獨鑽天哨開山斧據永寧關前阻山險下臨黃河貟固數年不下竒瑜謂是不可以力取乃隂簡鋭士陽言總制機檄發兵令賀人龍將之而西身為後徑直抵延川俄策馬東曰視吾馬首所向潛師疾走入山賊不虞大兵至驚潰焚其巢斬首千六百有竒二賊俱馘分兵擊斬賊首一座城等獲首級五百五十延水羣盜盡平竒瑜威名著關陜至是賊南渡河躙湖廣窺四川廷議諸鎮撫事權不一宜設大臣統之多推薦洪承疇以承疇方督三邊不可易乃擢竒瑜兵部侍郎兼右僉都御史總督五省軍務專辦流賊質實永寧關即延水關注見前陳竒瑜字玉鉉保德州人賊自鄖陽渡漢遂入四川二月陷夔州先是賊既渡河張應昌追敗之靈寶湯九州李卑又敗之嵩縣內鄉及入湖廣卑又敗之光化賊聞官軍至輒以老弱委之而精鋭多前走故諸將動稱捷報功賊勢彌熾鄖陽諸屬邑皆先後陷房縣知縣貢從貴保康知縣方國儒竹溪訓導王紹正死之賊遂自鄖陽渡漢薄穀城犯襄陽羣賊畢㑹分陷紫陽平利而擁衆南攻興山破其城殺知縣劉定國縱掠歸州巴東夷陵突入四川攻夔州城中倉猝無備通判推官悉遁同知何承光攝府事率吏民固守力竭城陷承光整衣冠危坐賊入殺之投尸于江又陷大寧殺知縣髙日臨訓導髙錫巡檢陳國俊其他部連陷巫山通江巡檢郭纘化指揮王永年力戰死自賊起陜西轉寇山西畿輔河南北及湖廣四川陷州縣以數十計未有破大郡者夔州地稱天險及是失守逺近震動會秦良玉自石砫赴援川北副將張令復以兵扼諸要害賊不敢進乃析其黨為二一走還楚一自通江走廣元冲百丈關殺守備郭震展指揮田實由七盤陽平關入秦以抵鞏昌總督洪承疇禦之秦州賊遂越兩當襲破鳯縣主簿吉永昌教諭李之蔚鄉官魏炳皆遇害賊又析其黨為二一由鳯縣奔實維汧陽一向漢中取間道犯城固洋縣東下石泉漢險投鄉官楊呈秀會于漢中興安以窺商雒商州防守閻調化勦賊于雒被執不屈死而張獻忠亦自應山西奔商雒以十三營流入漢南質實光化宋析穀城縣地置乾德尋改光化穀城隋置明並屬襄陽府今因之紫陽明正德八年于金川地立紫陽堡尋升縣屬興安州以𨽻于漢中府今升興安為直隸州縣仍屬馬歸州唐置明洪武元年廢尋復置以秭歸縣省入隸荆州府東本朝雍正六年升直隸州十三年改屬宜昌府巴隋置明初屬夷陵州隆慶四年改屬歸州今屬宜昌府夷陵漢縣北周為硤州隋唐宋為夷陵郡治元為硤州路治明初為硤州府治洪武九年降夷陵州屬荆州府關本朝雍正十三年改設東湖縣為宜昌府治七盤在廣元縣北一百六十里七盤嶺上兩當後魏置明屬徽州以隸于鞏昌府本朝雍正七年改屬秦州鳯縣西魏鳯州明降縣屬漢中府今因之城固漢縣洋縣唐洋州明降縣與城固並屬漢中府今因之石泉西魏置元省明復置並屬興安州以隸于漢中府今屬興安直隸州貢從貴元城人方國儒字道醇歙人事母以孝聞賊大入湖廣將吏率望風先奔保康邑小素無兵賊至國儒率鄉兵出禦力不支城陷被執罵賊中七刃死何承光鎮遠人死事後贈夔州知府髙日臨字儼若鄱陽人賊攻大寧見勢弱不能禦齧指書牒乞援上官率衆捍賊北門兵敗被執大罵不屈賊碎其體焚之高錫之妻女陳國俊之妻亦皆遇害吉永祚揮縣人為鳯縣主簿謝事將歸會賊至知縣棄城遁永祚倡義拒守城破北面再拜曰臣雖小吏嘗食祿于朝不敢以謝事逃責子士樞士模皆死事聞贈漢中府經歷同死難之李芝蔚魏炳贈恤有差楊呈秀官順慶知府大計罷歸賊至佐有司守禦力戰被執大罵賊磔之其弟呈芳單騎入賊營斬賊數十重創死閻調化商州人以武進士署商州防守事六年冬奉檄入雒剿賊至是殉節本朝乾隆四十一年追諡方國儒吉永祚髙日臨王永年郭震辰田實楊呈秀烈愍貢從貴何承光閻調化節愍王紹正等並入祠三月丁亥朔日有食之夏四月山西陜西大饑山西赤地數千里大饑人相食給事中吳甘來疏請發粟以賑且言山西總兵張應昌等多殺難民冒功中州諸郡畏官軍甚于賊陛下生之而不能武臣殺之而不顧臣實痛之又言賞罰者將將大機權也陛下加意邊陲賞無延格乃閩海獻捷黔蜀爭功待勘纍年急則用其死綏緩則東以文法況封疆之罰武與文二內與外二士卒與將帥二受命建牙或逮或逐而跋扈將帥罪狀已暴止于戴罪偏禆不能令士卒將帥不能令偏禆督撫不能令將帥將聽賊自來自去誰為陛下翦其凶逆者疏入詔發帑賑饑而軍政無章如故五月大旱帝因旱求言給事中黃紹傑乃疏論溫體仁略言漢世災異策免三公宰執亦因罪以求罷今者久旱陛下修明政治納讜言可謂應天以實矣而雨譯不降何哉天有所甚怒而不解也次輔溫體仁者秉政數載上干天和無嵗不旱䁧無日不風霾無處不盜賊無人不愁怨秉政既久窺􅗎益工中外趨承益巧一人當用則曰體仁意未遽爾也一事當行則曰體仁聞恐不樂也覆一疏建一議又曰慮體仁有他屬不然則體仁忌諱無攖其凶鋒也凡此召變之尤願陛下罷體仁以回天意體仁罷而甘霖不降殺臣以正欺君之罪帝方眷體仁貶紹傑一秩體仁疏辨且訐其别有指授紹傑言廷臣言事指及乘輿猶荷優容一字涉體仁必遭貶黜誰不自愛為人指授耶因列其罪狀且曰臣所仰祝聖明洞燭體仁奸欺者其說則有兩端下惟朋黨一語可以箝言官之口挑善類之禍上惟票擬一語可以激聖明之怒蓋僨悮之愆體仁猶辨且以明黨為言紹傑遂言體仁受銅商王誠金體仁長子儼受巡撫沈棨及兩淮巡鹽髙欽順等金皆萬計體仁用門客王治東南之利皆其轉輸體仁私邸兩被盜失黃金寶玉無算匿不敢言帝怒調為上林苑署丞遷行人司副六月陳竒瑜圍賊于車箱峽賊僞降竒瑜縱遣之賊遂叛陷所過州縣先是竒瑜檄諸將會兵陜州圖進勦而廷議以鄖陽屬邑皆陷逮撫治將元儀擢大名副使盧象升代之助竒瑜勦賊㑹賊之自蜀還楚者張應昌擊之五嶺山敗績身中一矢退還賊遂大入又分其黨為三一犯均州往河南一犯鄖陽往淅川一渡河犯商南竒瑜乃馳至均州檄陜西巡撫練國事駐商南遏其西北河南巡撫元默駐盧氏遏其東北湖廣巡撫唐暉駐南漳遏其東南竒瑜偕象升由竹溪至平利之烏林關十餘戰大破之總兵官鄧玘及别將楊化麟楊世恩周任鳯楊正芳等分道擊賊復連勝副將劉遷等搜竹溪平利賊先後斬馘三千有竒擒其魁十餘人參將賀人龍等逐賊八晝夜至紫陽賊死者萬餘人竒瑜以湖廣賊多鼓行而西謂賊不足平乃遣遊擊唐通防漢中以護藩封參將賀人龍劉遷夏鎬扼略陽沔縣防賊西遁副將楊正芳余世任扼褒城防賊北遁自督副將楊化麟栁國鎮等駐洋縣防賊東遁又檄練國事盧象升元默各守要害截賊奔逸賊見官軍四集大懼悉遁興安之車箱峽諸渠魁髙迎祥李自成張獻忠等咸在焉峽四面巉立中亘四十里易入難出賊誤入其中山上居民下石擊或投以炬火且纍石塞其口路絶無所得食困甚又大雨二旬弓矢盡脫馬乏芻死者過半自成窘甚用其黨顧君恩謀以重寶賂竒瑜左右及將帥僞請降竒瑜意輕賊有驕色遽許之悉籍其名勞遣歸農每百人以一安撫官護之檄所過州縣具糗糧傳送諸將無邀擊以撓撫事賊既出棧道即大譟叛盡殺安撫五十餘人屠所過七州縣署麟遊知縣董時和死之而賊之屯漢興者亦自略陽來㑹關中大震竒瑜悔失計因委罪他人以自解賊初叛猝至鳯翔誘開城守者知其詐紿以縋城上殺其先登者三十六人餘噪而去其犯寶雞者亦為知縣李嘉彥所挫竒瑜遂劾嘉彥又鳯翔鄉官孫鵬等撓撫局帝怒遣嘉彥鵬及士民五十三人竒瑜又委罪練國事國事上言漢南賊盡入棧道竒瑜檄止兵臣未知所撫實數及見竒瑜疏八大王部萬三千餘人蠍子塊部萬五伯餘人張妙手部九千一百餘人八大王又一部八千三百餘人臣不覺仰天長歎夫一月內撫强寇四萬餘盡從棧道入內地食飲何自出安得無剽掠且官軍防護一大帥止將三千人而一賊魁反擁萬餘衆安能受紀律耶賊皆藉口歸藉然延安州縣驟增四萬餘人安集何所合諸征勦兵不滿二萬而降賊踰四萬豈內地兵力所能支宜其連陷名城而不可救也若咎臣不堵勦則先有止兵檄矣若云賊已受撫因誤殺使人致然則未誤殺之先何為破麟遊永夀為今之計惟急調大將致討若仍以願回原籍禁兵勿勦三秦之楇安所終極哉疏入事已不可為遂逮國事下獄質實車箱峽在興安州界五嶺山在均州界均州戰國時為均陵隋置均州明屬襄陽府今因之淅州後魏置後周省入中鄉縣五代梁復置浙水金省入內鄉明成化時復置屬鄧州以隸于南陽府今徑屬南陽府烏林關在平利縣東南二百七十里一名武陵關襄城漢褒中隋改褒城明屬漢中府今因之永夀唐析新平縣地置明屬乾州以隸于西安府今升乾州為直隸州縣仍屬焉唐暉歙人董時和陽武人以扶風縣丞署麟逰縣事城陷遇害時麟遊生員趙應璧隨母避賊賊至母投崖死應璧從之本朝乾隆四十一年追諡時和節愍應璧入祠發明車箱峽之役實為流賊殄滅之一機時李自成張獻忠同困峽中進退不可芻糧俱盡已成束手待斃之勢而陳竒瑜遣將分防截其遁逸於兵法亦握勝算一旦舉而殱之易如反掌積年巨冦得以掃蕩芟夷天時地利未有若斯之宜者何乃為左右所愚尋楊鶴之覆轍而縱之使逝至令困獸出柙反噬益甚厥後盜氛日張毒流海宇延禍無窮史稱流賊之肆毒始于楊鶴而成于陳竒瑜信矣莊烈不早燭受降之失計至連陷名城猶聽其飾詞卸過轉逮禦冦之孫鵬李嘉彥以為流賊報仇及練國事之疏叙竒瑜失策之罪極為透悉復以事不可為而逮國事下獄政刑顛倒坐失事機明之亡豈盡天為之哉秋七月我大清兵入上方堡至宣府京師戒嚴大先是宣府巡撫沈棨遣使乞和于衛塞桑等刑白馬清與我阿什違爾漢達雅齊龍什大烏牛定議尋二哨卒出邊被獲私入邊者斬一人界清以約既定即遣還之有三人大上鞭二人百貫其耳還所取物于邊吏我兵征察哈爾道出宣府邊城多頽壞我太宗文皇帝諭軍士無或蹂躙而廷議責棨専擅尚書熊明遇曲為棨解帝不悅逮棨下吏明遇亦為言官劾罷于是遼東諸將間出邊擾我屬部戕害二十餘人張家口守臣復多匿逋逃大清屢諭責之怙不悛及察哈爾既下林丹汗走死其宰桑巴圖魯噶爾馬濟農等率衆降獨卜內額爾等攜察哈爾汗之二妻一妹及其部衆奔榆林西宣大寧錦諸邊吏欲冒為功爭招納之大清兵由察哈爾凱旋因入邊問罪四路並進自宣府趨應州略大同下得勝堡參將李全自縊進攻保安知州閻生斗集吏民拒守城破被執死之守備徐國泰判官李師聖吏目王本立訓導張文魁生員姚時中張師載亦同死旋入靈邱知縣蔣秉采募兵堅守力屈衆潰投繯死合門殉之守備于世竒把總陳彥武馬如豸典史張標教諭路登甫並戰死又守備張修身常汝忠亦先後殉節死沿邊城堡多失守逺近震懾特詔總兵陳洪範守居庸保定巡撫丁魁楚守紫荆雁門總兵尤世威吳襄等援邊而以宣大總督張宗衡節制各鎮援兵宗衡暨總兵曹文詔張全昌等皆不敢戰代王母楊太妃命宗衡等求和我六清亦布告以申討之意既下萬全左衛遂班師宗衡文詔全昌及巡撫胡沾恩等並遣戍山西巡撫吳甡請留文詔全昌勦晉賊自贖帝可之兵部議令文詔馳勦河南賊甡復抗疏爭請先平晉賊後入豫帝不許而文詔以甡有恩意取道太原為甡所留時山西降盜王剛王之臣通天柱等已為前巡撫戴君恩所斬獨賀宗漢劉浩然王加計猶擁衆自恣剽掠城邑垣曲典史秦宗恩黎城布衣李養裕先後以督鄉勇捍賊死甡陽為招撫密令參將猛如虎虎大威劉光祚等圖之山西盜盡平明年鳯陽告陷文詔遂整兵南質實得勝堡在大同縣北八十里東至邊牆三里北至邊牆三里明嘉靖十八年築城今日得勝路靈邱漢縣明屬蔚州以隸于大同府今徑屬大同府垣曲漢垣縣宋改垣曲明屬絳州以隸于平陽府今升絳州為直隸州縣仍屬焉閻生斗汾西人徐國泰上虞人妻薛氏妾王氏闔門十三人皆殉節李師聖隆谷人薛秉采全州人秦忠文武陽人斗本朝乾隆四十一年追諡徐國泰烈愍李全閻生蔣秉采于世竒張修身常汝忠節愍李師勝秦宗文李養裕等並入祠丁魁椘永城人代王傳㸄代簡王桂十一世孫崇禎間襲封冬十一月陳竒瑜有罪下獄以洪承疇代之給事中顧國寶御史傅永淳交章劾竒瑜受賄縱賊詔錦衣官逮訊而以洪承疇代時賊已蔓延不可撲滅大學士溫體仁謂山西巡撫吳甡曰流賊癬疥疾不足憂也竒瑜罪當死有庇之者未幾謫戍邊質實顧國寶南通州人傅永淳靈夀人賊自陜西出犯河南賊既軼出車箱峽大掠所過州縣擁衆而西陷澄城圍郃陽比洪承疇兵至解圍去轉冦平凉邠州進攻隆德破其城殺知縣費彥芳鄉官楊秦初生員楊泰運皆殉節死遂薄靜海州固原參政陸夢龍率遊擊賀竒勳都司石崇德禦之賊初不滿千已而大熾夢龍所將止三百餘人被圍數重賊矢石如雨突圍不得出二將抱夢龍泣夢龍揮之曰何作此婦孺態大呼奮擊手馘數人與二將俱戰死未幾復圍隴州賀人龍馳救之賊悉衆環攻李自成以人龍同里閈遣其將髙傑遺書招之令反人龍不報固守兩月左光先救至圍始解廷議以賊聚陜西詔河南兵入潼華湖廣兵入商雒四川兵由興漢山西兵出蒲州韓城共討賊而湖廣一軍尋覆于雒南副總兵楊正芳及禆將張上達皆死之當是時賊二十餘萬往來關中連營輒百餘里别賊萬餘屯雒南閿鄉蹂躙郡邑數十諸將先後以死事著者有總兵殷體信遊擊丁孔應指揮孝學牧守備史大勳昌平鎮將凌元機胡良翰花馬池營千總蔡應昌而甘泉知縣蒲來舉崇信知縣龎瑜山陽知縣董三謨珍州知州婁琇麟遊知縣吕鳴世則皆以長吏殉城死其士民仗義者涇陽布衣王祚以捍賊死耀州生員宋緒湯以詈賊死賊氛方日熾聞承疇將合諸路兵進勦賊渠髙迎祥李自成遂竄入終南㑹西寧兵變殺將領承疇還軍定亂賊又出終南分陷關隴及承疇自甘肅引兵而東賊乃悉衆東奔陷陳州靈寶汜水滎陽河南復震賊每營數萬兵更畨進皆因糧宿飽官軍寡備饋餉或不繼賊介馬馳一日夜數百里官軍步多騎少行數十里輒疲乏以故多畏賊時左良玉扼新安澠池陳治邦駐汝州陳永福扼南陽皆坐甲自保良玉前在懷慶與督撫議不合因是生心緩追養寇多收降者以自重督撫檄調不時應命漸有跋扈端實無意殺賊而賊傳良玉且至移壁梅山溱水間質實邠州西魏置豳州唐改豳曰邠明屬西安府龍本朝雍正三年直隸陜西省隆德金升德順州之德寨為縣明屬靜寧州以隸于平凉府今徑屬平凉府崇信唐于原州地築崇信城宋始置縣涇州唐置明並屬平凉府今因之梅山在鄭州西南三十五里與新鄭縣接界費彥芳崇德人按崇德明屬嘉興府本朝康熙元年改石門楊泰初官松江通判方里居賊陷城與子生員善俱赴井死楊泰運為賊所執罵不絶口斷舌死陸夢龍浙江山隂人贈太僕卿殷體信朔州人戰殁于陳丁孔寧夏人被執不屈遇害李學牧亦寧夏人陷賊中與王風木等謀舉義事泄北面再拜受創史大勳長安人率兵逐賊馬蹶被執為所殺凌元機胡良翰皆湯九州部將賊屯閿鄉九州遣元機良翰搜山敗殁蔡應昌寧夏中衛人赴勦血戰死蒲來舉蓬溪人賊犯甘泉守備孫守發擁兵不救城陷來舉手刃數賊死之贈光祿少卿龎瑜字堅白公安人崇信故無城遭兵荒縣止貧户百餘瑜知賊必至集士民築土垣以守流涕誓死職㑹天大雨土垣盡圯賊大至瑜急解印遣家人齎送上官端坐堂上賊捽令跪瑜罵曰賊奴敢辱官長拔刀脅之罵益厲賊掠城中無所有執至野外剖心裂腹而死贈固原知州董三謨黎平人與父嗣成弟三元俱殉難妻李氏亦攜子女偕死贈光祿丞婁琇湘隂人知涇州城陷死贈太傼少卿吕鳴世福建人麟遊屢被賊鳴世撫居民有恩城陷賊不忍加害自絶食六日卒按湖廣通志有知府簡而可者遂安人亦于是年殉節死竒本朝乾隆四十一年追諡陸夢龍忠烈費彥芳賀勳石崇德楊正芳張上達殷體信蒲來舉龎瑜婁琇烈愍楊泰初凌元機胡良翰丁孔應李學牧吏大勳董三謨吕鳴世簡而可節愍楊泰運蔡應昌等並入祠乙亥八年春正月詔洪承疇出潼關討賊帝以河南賊熾命承疇出潼關與山東巡撫朱大典協勦時賊方屯梅山溱水乘間陷上蔡固始諸縣聞承疇將出關遂大會羣賊于滎陽老回回曹操革裏眼左金王改世王射塌天橫天王混十萬過天星九條龍順天王及髙迎祥張獻忠共十三家七十二營議敵官軍未決李自成進曰匹夫猶奮况十萬衆乎官兵無能為也宜分定所向利鈍聽之天皆曰善乃議革裏眼左金王當川湖兵橫天王混十萬當陜兵過天星扼河上綴河南兵迎祥獻忠及自成略東方老回回九條龍往來策應陜兵鋭益以射塌天改世王所破城邑子女玉帛惟均衆如自成言始迎祥與獻忠並起比肩而自成乃迎祥支黨不敢與獻忠偶及是遂相頡頏與俱東掠自固夀扺霍邱陷其城縣丞張有俊教諭倪可大訓導何炳若鄉官戴廷對田既庭舉人王育貞張燦恆死焉遂燔夀州攻潁州知州尹夢鼇通判趙士寬方謁上官于鳯陽驟聞賊至立馳還賊已抵城下率民壯固守城北有髙樓可瞰城中諸生劉廷傳請先據之夢鼇以為然而廷傳所統皆市人不可用賊遂據樓以攻且鑿城頽數丈城上人皆走止之不可夢鼇持大刀獨當城壤處殺賊十餘人身被數刃賊衆畢登遂投城下烏龍潭死城既陷士寬率衆巷戰力竭亦赴水死潁川衛左州治西北隅賊分攻衛指揮李從師王廷俊千户孫升檀田三震百户羅元慶田得民王之麟前所百户汪俱乘城戰死衛經歷胡士定及廷傳以罵賊死致仕尚書張鶴鳴暨其弟參政鶴騰子大同闔門皆遇害中書舍人田之潁光祿寺署正李生白署丞李元白黃岩知縣劉道逺會寧知縣楊南同殉節死其他官紳士庶死難者共一百三人城中婦人殉節者二十七人烈女八人一時忠烈稱獨盛城破後亦無一人向賊乞憐者賊怒遂屠之質實霍邱隋置明屬夀州以隸于鳯陽府本朝雍正二年改屬穎州十三年升潁州為府縣仍屬焉潁州衛明洪武初置隸河南都司以屬于右軍都督府今廢倪可大儀徵人賊犯霍邱知縣逸去可大督民壯逆戰以竒策斬賊首數百分守城中賊以炮攻陷南門被執齧指血噴賊被磔死妻女皆自縊僕倪表亦死何炳若河南人戴廷對官福州通判田既庭官淮安教授尹夢鼇雲南太和人弟姪七人皆從死趙士官字汝良掖縣人官鳯陽通判駐潁州妻李氏攜三女登樓自焚僕王丹亦罵賊死胡士定廣濟人劉廷傳故布政使九光從子九光子廷石分守西城中賊刃未殊口授友人方略令繕書上當事旋卒張鶴騰官雲南參政行誼醇篤譽過其兄鶴鳴賊執鶴鳴兄弟倒懸鶴鳴于樹皆罵不絶口死後給事中林正亨録上其狀贈夢鼇光祿少卿士寬光祿丞餘贈恤有差本朝乾隆四十一年追諡尹夢鼇忠節倪可大張鶴騰烈愍戴廷對趙士寬李從師王廷俊田之穎李生白李元白劉道逺楊南節愍胡炳若孫升胡士定劉廷傳廷石等及死難官紳士庶各見史乘者為夔州府訓導丁嘉遇侯選經歷汪邦弼舉人白精忠郭三杰貢生李茂叢楊得坤寧儉生員韓光祖檀之槐李維紀王致志張維黃劉大濟田大生聞于階弟于邦王國泰亓鳯翔卞文斗王乾亨丁嘉運劉栻姚克智丁崇先郭之英姚同寅尚日暄陳純李孕生王致和申華郭之豪田之萃郭瑋馬負圖錢人瑋盧元貞馬宷國馬柱國韓仲佐楊于世王啓昌邢元錫熊協夢王維新李汝珽盧傳世喻天錫楊士貞郭之産郭獬賀嘉貞聞慎言監生王文煥田之蔚田之茂田之尹武舉尚日躋李承訓醫官張濟民禮生孔道隆儒士田之蕙于振先布衣鹿徑亓中元嚴克長王尚亷元旋祁標王公枋張肅範王之幹趙謙祁瀛潘守仁汪茂椿張思明王國王九成王印王聘汝陳繼信並入祠韓光祖母李氏妻武氏偕一妹二女赴井死妾李氏方有娠被剖腹死次子定策孫日曦皆罵賊死檀之槐護母柩不去被磔死李維紀妻趙氏及子女十八人投井死王致志妻唐氏同殉節賊陷鳯陽留守朱國相等死之先是南京兵部尚書吕維祺懼賊南下請防護鳯陽陵寢不報給事中孫晉亦以為憂言于兵部尚書張鳯翼鳯翼曰賊起西北不食稻米賊馬不飼江南草公南人何憂賊遂不設備賊漸逼江北鳯翼乃請敇漕運都御史楊一鵬移鎮鳯陽溫體仁格其議鳯翼亦不能再請事益急給事中許譽卿請速調五千人守鳯陽而賊已自夀州分部來犯鳯陽故無城國相率指揮袁瑞徵吕承䕃郭希聖張鵬翼周時望李郁嶽光祚千户陳宏祖陳其忠金龍化等以兵三千逆戰上窑頗有斬獲頃之賊數萬至矢集如蝟官軍敗國相自刎死餘皆陳殁一鵬在淮安逺不及敕賊遂燔皇陵大肆殺掠千户陳永齡百户盛可學衛經歷胡尚綵府照磨蕭懋烈等四十餘人推官萬文英子元亨及舉人蔣思宸布衣陳自修等六十餘人皆殉節死公私邸舍被焚者二萬餘問光燭百里賊渠張幟自稱古元真龍皇帝合樂大飲自成從獻忠求皇陵小閹善鼓吹者獻忠不與自成怒偕迎祥西趨歸德復謀入關獻忠獨東攻盧州州民乘墉捍賊有張四哲者偕弟四美四竒奮力迎戰敗死州城堅賊百計攻不克去攻舒城知縣章可試塞三門開西門誘賊入陷于坑奔潰死者千人遂走圍盧江士民具財張帛求免賊僞許之俄襲陷其城里居參政盧謙舉人受畢伊周死之連陷無為巢潛山太湖宿松屠其城太和霍山六安亳州悉被殘破其别部復分陷羅田徐州及虞城商邱汝寧真陽新蔡是時諸州邑殉難死者無為則知州張化樞巢縣則知縣嚴覺潛山則知縣趙士彥太和則知縣金應元守備趙䕃趙繼春訓導扈永寧宿松則生員劉之暄袁師率萬民望柴維煥布衣陳昌言夏時行石思行太和則生員秦培篤秦思允霍山則教諭龔元祥訓導姚允恭六安州生員梅國秀亳州則布衣李心惟李如龍李猶龍羅田則知縣梁志仁教諭吳鳯來訓導羅大受典史單思仁徐州則知州陳桂棟商邱則舉人賈遂李明開武舉史懋明虞城則生員宋鼎延真陽則知縣王信汝寧則江陵生員劉楷賊既蹂躙江北流擾蘄黃汝寧歸德之間圍桐城者數月應天巡撫張國維率副將許自强東西奔擊解桐城圍遣守備朱士允趨潛山把總張其威趨太湖士允戰死自强遇賊宿松殺傷相當安慶山民磔石以投賊賊多死乃越英霍走麻城以去變聞于朝帝以皇陵毀素服避殿逮一鳴下獄棄市以朱大典代之譽卿等憤體仁鳯翼玩寇速禍疏言流冦發難已久樞臣因東南震鄰始有淮撫操江移鎮之請識者已恨淇晚而閣臣票擬則曰不必移鎮臣觀各地稍有兵力賊即不敢輕犯鳯陽何地使巡撫早移豈有今日今樞臣以曾請移鎮藉口撫臣以不必移鎮為詞則輔臣欲辭玩冦之罪其可得哉帝以譽卿苛論妄言切責之質實上窑鎮在懷逺縣南五十里宋史李榖傳周顯德三年榖敗吳軍數千于來逺又破千餘人于山口鎮進攻上窑即此盧江漢初置舒縣文帝十六年建廬江國治此後為廬江郡治隋廢郡改縣曰廬江明屬廬州府今因之巢縣夏商時南巢地漢置居巢縣唐改巢縣明屬無為州以隸于廬州府今徑屬廬州府潛山元析懷寧縣置太湖漢皖縣地劉宋以豫部蠻民立太湖縣明並屬安慶府今因之商邱漢睢陽明洪武初省嘉靖中置商邱為歸德府治真陽漢慎陽隋真陽明屬汝寧府今改縣曰正陽仍屬汝寧府鳯陽衛在鳯陽縣東南十三里今廢英山春秋時英氏地宋初為蘄州羅田縣地咸淳時分置英山縣明屬六安州以隸于廬州府今屬六安直隸州麻城隋置明屬黃州府今因之朱國相榆林衛人吕維祺字介孺新安人孫晉桐城人楊一鵬臨湘人胡尚綵淳安人賊犯鳯陽衛城獨擊却之後賊復至被執不屈死蕭懋十歸化人萬文英南昌人方卧病賊索之子元亨年六泣語父曰兒不得復事親矣出門呼曰若索官何為我即官也賊縶之極口大罵斷脛死文英獲免蔣思宸投繯死陳自修繞父柩哀鳴被害靈謙字吉甫官山西右參政引疾歸廬江陷謙服命服危坐中門賊至欲屈之罵曰吾朝廷憲臣肯為賊屈邪鼠輩滅在即安敢無禮賊怒殺之投尸于池池水盡赤張化樞雲南永平人嚴覺歸安人一門皆盡節金應元會稽人流賊至據城東大濠奸人導賊渡濠為所執斫未殊自經死趙䕃吳江人賊襲營被執不屈死趙繼春與獻賊戰于洪家嶺無援死之扈永寧霍邱人劉之暄代父死賊釋其父萬民望代母死賊釋其母袁師臯見賊欲殺其母力與相持受數刃死柴維煥與三子同遇害秦培篤與妻王氏俱死秦思允被賊執挾之攻城呼告城上曰賊以牛皮冒車避矢石所懼惟火耳賊殺之城上投薪焚賊車城得全龔元祥長洲人賊犯霍山知縣先遁元祥督民固守城破與子炳衡俱被殺事聞贈國子助教建祠曰忠孝以其子配之姚允恭盱眙人李心維李猶龍皆以守親柩遇害心維子果從死如龍猶龍從弟賊執其母奮刀擊賊為所殺梁志仁南京人保定侯銘之裔也羅田界湖廣江北之交志仁日夕警備羅汝才以其長者不忍加兵會邑豪江猶龍與賊通志仁捕下獄猶龍知必死潛遣人導汝才别校來攻城陷志仁持長矛巷戰殺六賊力屈被縶罵賊支解死妻唐氏亦被殺典史單思仁等並死汝才在英山聞之馳至以擅害長者斬其别校吳鳯東福建人盧大受寶慶人詔贈志仁知州思仁主簿鳯來助教大受學録陳桂棟鄰水人王信陜西寧州人出撫土冦會流賊猝至被執脅之賺城信大罵不從斷頭剖腹而死贈光祿卿建祠奉祀時又有一王信官新蔡知縣亦于是年殉節劉楷江陵人常率義勇解荆州圍賊犯汝寧從參將王某以三千人赴援戰死張國維字玉笥東陽人魯王時殉節王本朝乾隆四十一年追諡張國維忠敏真陽知縣信忠烈朱國相袁瑞徵吕承蔭郭希聖張鵬翼周時望李郁嶽光祚陳永齡盧謙嚴覺趙士彥金應元龔元祥梁志仁新蔡知縣王信朱士允烈愍陳桂棟張化樞趙䕃趙繼春節愍陳宏祖等並入祠發明是時寇賊蔓延所在充斥乘勢南下事所必有鳯陽陵寢重地自宜預為防護張鳯翼身任本兵不知早為籌畫乃以賊起西北不食稻米賊馬不飼南草竟不設備此與兒童之見何異謬妄甚矣及賊逼江北始請淮推操江移鎮已為援不及時而溫體仁復格阻之至使祖陵燔毁原廟震驚二臣之罪上通于天矣莊烈倚任奸輔轉以許譽卿為苛論妄言然則玩冦速禍誰實致之淪胥以亡有由來矣夏五月吳宗達罷溫體仁専政宗違能為之下在閣六年交歡無間至是以衰老乞歸六月賊復走陜西總兵官曹文詔勦賊于真寧死之初洪承疇出關至信陽諸將畢會賊見河南兵賊復分路奔還陜西張獻忠亦由麻城入陜以㑹髙迎祥李自成承疇偵賊盡入關中議還顧根本乃㑹師汝州命鄧玘尤翟文張應昌許成名戍樊城防漢江左良玉湯九州控吳村瓦屋尤世威陳永福徐來朝分駐永寧盧氏山中以扼雒南朱陽之險親統大軍俟曹文詔至偕入關進勦時文詔擊賊隨州未至也鄧玘抵樊城其部將王允成以剋餉鼓噪殺其二僕玘懼登樓越牆墮地死承疇聞變急檄秦羽明代統玘軍以奏限六月平賊期且迫遂率賀人龍張全昌等西行約文詔會商州比次靈寶文詔至承疇以賊黨屯商雒聞官兵大集必先走漢中而大軍由潼關入反在其後乃令文詔由閿鄉取山路至雒南商州直搗賊巢復從山陽鎮安洵陽馳入漢中遏其奔軼曰此行也道路回逺將軍甚勞苦吾集關中兵以待將軍拊其背而遣之文詔躍馬去既至商州賊去城三十里而營文詔夜半率從子變蛟等擊敗賊深林中賊退據險以千騎逆戰變蛟大呼陷陳諸軍並進賊敗走已而迎祥獻忠諸賊犯鳯翔趨汧陽隴州文詔自漢中馳赴賊盡向靜寧泰安清水秦州間衆且二十萬承疇以文詔所部合張全昌張外嘉軍止六千衆寡不敵告急于朝未得命而官軍遇賊亂馬川前鋒劉鴻烈被執死之俄副將艾萬年栁國鎮等戰殁于襄樂文詔聞之瞋目大罵急詣承疇請行承疇喜曰非將軍不能滅此賊顧吾兵已分無可策應者將軍行吾將由涇陽趨淳化為後徑文詔乃以三千人自寧州進遇賊真寧之湫頭鎮從子變蛟先登斬首五百追三十里交詔率步兵擊之賊伏數萬騎合圍矢蝟集賊不知為文詔也有小卒縳急大呼曰將軍救我賊中叛卒識之惎賊曰此曹總兵也賊喜圍益急文詔左右跳蕩手擊殺數十人轉鬬數里力不支拔刃自刎死遊擊平安以下死者二十餘人賊乘勝掠地火照西安城中承疇力遮之涇陽三原間賊不得過文詔忠勇冠時稱良將第一其死也賊中為之相慶質實樊城在襄陽縣北南臨漢水與襄陽城對峙吳村一統志作胡村在淅川縣西北九十里瓦屋在內鄉縣西南春秋時諸侯參盟于瓦屋即此永寧後周始置熊耳縣隋改曰永寧明屬河南府今因之朱陽關在盧氏縣西南五十里隨州漢隨縣唐為隨州治明洪武初降縣尋復置州以隨縣省入屬德安府今因之襄樂城在慶陽府寧州東六十里漢曰襄洛縣後漢廢後魏置縣曰襄洛元廢真寧唐置明屬寧州以隸于慶陽府今改曰正寧徑屬慶陽府湫頭鎮一名顯聖鎮在真寧州東文詔死節後莊烈帝聞之震悼賜祭葬世廕指揮僉事有司建祠春秋致祭本朝乾隆四十一年追諡文詔忠果艾萬年忠烈栁國鎮平安烈愍劉鴻烈節愍秋七月以文震孟張至發並為禮部侍郎兼東閣大學士預機務震孟在講筵每因事規諌帝數逮繫大臣震孟講魯論君使臣以禮反復陳說帝為出尚書喬允升侍郎胡世賞于獄帝嘗足加于膝適講五子之歌至為人上者奈何不敬以目視帝足帝即袖掩之徐為引下賊焚鳯陽陵寢震孟歷陳致亂之源謂當事諸臣不能憂國奉公一統之朝強分畛域又言陛下宜行撫綏實政先收人心以遏冦盜徐議濬財之源母徒竭澤而漁語多切中時弊至是帝將增置閣臣以翰林不習時務思用他官參之召廷臣數十人各授一疏令票擬震孟引疾不與至發所擬獨當帝意特命至發與震孟並入閣至發以縣令起家纍擢居政府蓋異數也越二年至發代體仁為首輔一切守其所為而才智機變稍不及時人比之傳衣鉢云賊復東犯總兵官尤世威敗績賊為洪承疇所遮張獻忠將由藍田走盧氏復扼于世威仍入商雒山中參將徐來朝所部三千人不肯入山大譟賊至來朝逃一軍盡疫世威軍暴露久大疫與賊戰失利敗走賊遂哭出朱陽關殺禆將徐來臣分十三營東犯惟髙迎祥李自成留陜西質實藍田秦縣故城在縣西後周移治于此明屬西安府今因之徐來臣朱陽關守將本朝乾隆四十一年追諡烈愍八月以盧象升總理江北河南湖廣四川軍務討流賊廷議以賊勢益張洪承疇一人不能顧乃擢象并總理承疇督關中兵辦西北象升督關外兵辦東南尋進象升兵部侍郎加總督山西陜西賜尚方劔九月洪承疇破賊于渭南時迎祥自成在關中分道出犯迎祥略武功扶風以西自成略富平三原以東承疇遣將追自成小捷至醴泉賊將髙傑通于自成妻邢氏懼事泄被害挾之來降承疇復身追自成大戰渭南臨潼自成大敗東走迎祥亦屢敗東逾華隂南原絶嶺偕自成出朱陽關與獻忠合質實武功漢縣明屬乾州以隸于西安府今升乾州為直隸州縣仍屬焉王應熊罷應熊為楊一鵬所取士初一鵬奏鳯陽失事應熊恐帝震怒留其疏未上及報恢復同奏之遂擬㫖令一鵬戴罪而帝以皇陵遭毁非尋常失事乃逮一鵬論死于是給事中范淑泰等爭刻應熊朋比誤國言一鵬恢復疏以正月二十七日核察失事情形疏以正月二十八日天下有未失事先恢復者哉應熊改填日月欺誑之罪難辭且劾其他受賄事帝眷應熊厚不聽應熊亦屢疏辨謂座主門生誼不容薄不敢辭朋比之名票擬實臣起草不敢辭誤國之罪言官益憤給事中何楷屢疏糾之最後復疏言故事奏章非發鈔外人無由聞非奉㫖邸報不許鈔傳臣疏六月初十日上十四日始奉明㫖應熊乃于十三日奏辨㫖尚未下應熊何由知臣不解者一且㫖下必由六科鈔發臣疏十四日下而百户趙光修先送錦衣堂上官則疏可不由科鈔矣臣不解者二應熊始懼具疏引罪帝下其家人及直日中書于獄獄具家人戍邊中書貶二秩應熊乃屢疏乞休去乘傳賜道里費行人護行帝亦知應熊不協人望特已所拔擢不欲以人言去也質實何楷字元子漳州鎮海衛人總兵官張全昌敗績于沈邱被執先是全昌從洪承疇西入關與祖大弼賀人龍屢敗賊未幾都司田應龍張應龍戰死而艾萬年曹文詔已相繼殁官軍益衰賊盡趨西安承疇急檄全昌曹變蛟先赴渭華格其前親督軍尾其後擊却之賊奔南承疇又命全昌及趙光逺率兵三千截潼關大谷部卒大譁闌入滎澤劫殺人河南巡撫元默請急救盧氏不聽光逺擅歸關中全昌迤邐至潁州至是追蝎子塊於沈邱戰敗被執賊挾之攻靳黃全昌因代賊求撫總理盧象升不許責全昌喪師辱國曰賊果欲降可滅其黨示信賊不聽命久之全昌脫歸質實大谷關在閿鄉縣西南秦山谷張應龍與田應龍禦賊清水縣之張家川中伏戰死本朝乾隆四十一年並追諡忠烈冬十月賊陷陜州攻洛陽賊擁衆三十餘萬自潼關出犯閿鄉靈寶塵埃漲天絡繹百里左良玉祖寬禦之不能支賊遂分部薄陜州知州史記言募敢死士出擊之斬數十級生擒三十餘人老回回憤率數萬人攻城不克乘雪夜來襲所募士方調他郡城遂破記言縱火自焚或掖之出曰死此何以自明乃越女牆下賊追獲之令降叱曰有死知州無降知州也遂被殺指揮李君賜殺數賊而死訓導王誠心里居教諭張敏行姚良弼指揮楊道泰阮我疆鎮撫陳三元百户明完璧亦不屈死陜州既陷賊乃進攻洛陽巡撫陳必謙率良玉寬赴援獻忠走嵩縣迎祥自成走偃師良玉寬分逐之迎祥等由鞏縣略魯山葉縣陷光州㑹盧象升自湖廣帥師至合寬等擊敗之于確山賊南奔復流入江北圍滁州再陷巢縣乘勢掠含山襲和州知州黎鴻業與鄉官馬如蛟麾壯士出擊兩戰皆捷賊將奔適風雪大作不辨人色守者皆潰賊遂入城如蛟急下令能擊賊者豫百金須臾得百餘人巷戰賊多傷力屈遂戰死鴻業繫印于肘跪告其母李氏曰兒不肖貪微官以纍母奈何母泣諭曰汝勿以我為意事至此有死而已遂自縊妻楊氏妾李氏及女四人繼之鴻業北而痛哭再拜自刎未殊濡頸血大書曰為臣盡忠為子盡孝何惜一死賊入傷數刃而死州判錢大用偕妻妾子婦俱死吏目景一髙被創死學正康正諌偕妻汪氏子婦章氏赴水死訓導趙世選不屈死如蛟兄如蚪如虹家屬十四人亦死鄉官魯一惠張元禎貢生魯一璠生員陶應陶廖趙世光魯可為張宏門姚承夀王鼐臣王夢陽雷鄉祚布衣王良翰楊鳯墀宋齡成建中李寅陽郝萬秋馬文舉王之節唐美皆遇害是年賊自江北而楚而豫而秦又自秦突出關迤邐而南以至江北蔓延幾半天下其死難之可紀者陜西則隴州知州胡爾純永夀知縣薄匡宇咸陽知縣趙躋昌延長知縣萬代芳教諭談恩驛丞羅文魁扶風知縣王國訓主簿夏尚忠典史陳紹南教諭張宏綱訓導陳繻生員王守祥守德澄城主簿李可受鄉官王廷賔階州學正孫仲嗣鄉官趙明盛孟宗孔寧羌衛鎮撫曹雲梯鳯翔生員屈學曾臨潼生員張國楨韓城生員梁民泰河南則盧氏知縣白楹濟源知縣楊于階滎陽典史周崇禮湖廣則鄖西知縣曹同署上津知縣龔懋澤廣濟教諭曾發祥黃岡生員業道暹江北則臨淮都司陳保山而四川總兵楊玉振以赴雒勦賊兵潰遇害質實魯山漢魯陽劉宋省隋復置魯縣唐曰魯山明屬汝州確山宋置明屬汝寧府含山唐置明屬和州延長西魏析膚施縣置明屬延安府今並因之寧羌衛在寧羌州治北本沔陽縣地名羊鹿坪明洪武二十九年羌民田九成作亂討平之三十年于此置寧羌衛成化二十二年巡撫鄭時以地僻山險流民聚集奏設州治于衛治南本朝順治十六年裁衛史記言字司直當塗人贈光祿少卿黎鴻業字孟擴順德人贈太僕少卿馬如蛟原官浙江山隂縣知縣贈太僕少卿康正諫祁門人贈國子監丞趙世選贈國子監學録馬如科候選鹽司判官馬如虯州學生員魯一惠原官把總與妻王氏赴水死張元楨原官鴻臚寺序班陶應陶廖同母兄弟母魯氏九十一齡聞難赴水死應廖從之趙世光姚承夀亦從母赴水死承夀家人死者十餘人陳問世以身衛母被殺魯可為一忠子張宏門元楨子王良翰罵賊死妻魯氏弟婦耿氏及妹女四媳皆自焚死楊鳯墀闔門自焚死胡爾純山東人賊犯隴州固守五十餘日城陷自縊死趙躋昌解州人萬代芳遼東人妻劉氏妾梁氏俱從死王國訓解州人賊犯扶風捍賊兩月餘援絶城破罵賊死王廷賓官永城知縣有治行里居城陷不屈死孫仲嗣膚施人當事委以城守賊至悉力禦守比陷與妻子十餘人同死趙明盛原官太原府照磨孟宗孔原官漢陽教諭屈學曾督鄉勇殺賊陷陳死白楹莘縣人已被劾將去官賊陷城率民巷戰力竭自刎楊于階保德人周崇禮浙江山隂人賊犯滎陽守小西門比陷巷戰被執罵賊死曹同巢縣人城破賊索印大罵不與賊擊之骨肉糜爛以死龔懋澤閩縣人以湖廣都司經歷署上津州事極力禦賊以死魯發祥鍾祥人易道暹好學著書尚氣節賊至被執遇害子為璉殉之為瑚于崇禎十六年奉母避賊被執罵賊死陳保山與賊戰于隆平寺敗殁如本朝乾隆四十一年追諡史記言忠烈黎鴻業馬蛟忠節李君賜楊道泰阮我疆陳保山烈愍胡爾純薄匡宇趙躋昌萬代芳王國訓王廷賓楊于階曹同龔懋澤楊玉振節愍錢大用等並入祠十一月罷大學士何吾騶文震孟震孟既入閣體仁每擬㫖必商之有所改必從喜謂人曰溫公虛懷何云奸也吾騶曰此人機深詎可輕信未幾體仁窺其疏所擬不當己意輒令改不從則徑抹去震孟大愠以諸疏擲體仁前體仁亦不顧給事中許譽卿者故劾忠賢有聲震孟及吾騶欲用為南京太常卿體仁忌譽卿伉直諷其私人誣劾譽卿為福建布政使申紹芳營求美官體仁擬以貶謫度帝欲重擬必發改已而果然遂擬斥譽卿為民紹芳提問震孟爭之不得咈然曰科道被誣見斥是天下極榮事賴公玉成也體仁遽以聞帝果怒責吾騶震孟徇私撓亂吾騶罷震孟落職間住震孟剛方貞介有古大臣風惜三月而斥未竟其用質實申紹芳大學士時行之孫下庶吉士鄭鄤于獄初鄤忤魏忠賢削籍帝即位起故官丁內外艱未赴服除應召溫體仁重鄤名見于朝從容問曰君自南來聞濟議謂何鄤曰謂有君無臣耳體仁鄂然日天下事已不可為咎豈在吾輩鄤曰推賢任能練兵選將何為不可體仁怫然起曰君與湛持任此吾久欲歸矣湛持大學士文震孟字也體仁方欲傾震孟而鄤與震孟同年友善又面訐體仁過體仁憾甚震孟既罷去憾未釋托鄤事無所得遂誣劾鄤假乩仙判詞通父振先杖母言出其從母舅舊輔吳宗逹時宗達謝政歸已七閲月矣帝震怒下鄤刑部獄部臣言蔑倫大罪不可以風聞坐乞飭鄤同鄉官覆奏帝責其瞻徇移鄤詔獄事迄無左證久不决體仁乃募諸生許曦證之曰汝證成鄤獄以中書舍人報汝曦因附會杖母事雜以帷薄褻語編書布中外謂之放鄭小史而騰章極論鄤願與鄤共對簿曰此實鄤二十五年前事鄤詰曦曰爾年幾何曰年二十四鄤大呼曰寃乎奈何以二十四嵗人而證二十五年前事乎曦語塞獄亦未竟而曦果擢舍人鄤從父振元上揭訟寃侍郎劉宗周諭德黃道周先後論救錦衣吳孟明覆讞抗疏申辨之帝深入體仁言皆不聽竟磔鄤西市質實鄭鄤字謙止武進人發明鄭鄤杖母之獄法司不敢承錦衣不敢决而徒以風聞一語邃定爰書是何信體仁之深也夫體仁之據以劾鄤者謂其言出吳宗逹耳立召宗達而面質之尚恐其依阿槯輔首鼠兩端乃并置宗達于不問而轉任年不及事之人挺身對簿荒誕為已甚矣書曰惟察惟法其審克之莊烈偏聽生奸雖治蔑倫大獄猶不察不審如此則其時庶戮之不辜者可勝道哉丙子九年春正月盧象升敗賊于滁州賊既襲陷和州益分部南犯巡撫張國維遣遊擊陳于王守六合守備蔣若來守江浦賊方攻江浦浦口守禦姚九疇陷闈死若來急入城與知縣李維樾固守賊登城若來拒却之縋下擊賊矢著其頰左臂傷裏血還戰賊乃退六合無城若來與于王特角捍賊賊亦尋解去合部衆數十萬西犯滁州環山為營包絡原隰知州劉太鞏南京太僕寺卿李覺斯登陴固守賊雲梯衝輣百道環攻城上火輪巨炮相續發出賊不意投火燔其雲梯縱死士出擊賊賊衄者衆斂兵稍退夜復進攻掘為支河泄濠以涸之薄城益急而象升自鳯陽㑹諸路師來援總兵官祖寬將邉軍為前鋒遊擊羅岱以火器三營為後徑躬率麾下三百騎居中督戰昧爽扺城下賊空營出攻城麾起大軍至賊不虞也祖寬躍馬進奮擊大呼諸軍無不一當百戰至晡羅岱陳斬賊渠搖天動奪其駿馬連營皆潰自城東五里橋逐北三十里至朱龍橋積尸填委滁水為之不流象升初受命時官軍屢敗諸將率畏懼不前象升每慷慨灑泣激以忠義軍中嘗絶三日餉象升亦水漿不入口以故得將士心戰輒有功方其會師鳯陽以前此議兵籌餉多未得機要乃上疏曰賊橫而後調兵賊多而後增兵是為後局兵至而後議餉兵集而後請兵是為危形况請餉未敷兵將從賊為冦是八年前所請之兵皆賊黨所用之餉皆盜糧也又言總督總理宜有専兵専餉請調咸寧甘固之兵屬總督薊遼關寧之兵屬總理又言各直省撫臣俱有封疆重任毋得一有賊警即求援求調不應則秦越也分應之何以支持又言臺諫者臣不問難易不顧死生専一求全貴備雖有長材從何展布臣與督臣有勦法無堵法有戰法無守法其言皆切中時宜而朝廷不能盡用也質實六合漢尉氏縣隋改六合明洪武三年屬揚州府十一年改屬應天府今屬江寧府朱龍橋一統志作朱龍橋鎮在滁州西北三十里滁水自廬州府合肥縣界東流入經全椒縣三十里又東北經州東南六十里又東入江寧府六合縣界亦名天河陳于王字丹衷吳縣人姚九疇江寧人本朝乾隆四十一年入祠以前禮部侍郎林釬兼東閣大學士預機務初釬以忤魏忠賢去忠賢誅起官至禮部侍郎謝病歸至是與劉宗周同召見帝問人才兵食及流冦狀宗周言陛下求治太急用法太嚴布令太煩進退天下士太輕故有人而無人之用又問兵事宗周言禦外以治內為本願陛下以堯舜之心行堯舜之政則天下自平矣帝迂其言命釬以原官入閣二月山西饑人相食時河南南陽亦饑有母烹其女者唐王聿鍵聞于朝乃命賑南陽饑蠲山西被災州縣新舊二餉質實聿鍵唐定王桱八世孫崇禎五年嗣封前副總兵官湯九州擊賊于嵩縣敗績死之先是滁州潰賊北趨鳯陽漕臣朱大典遣總兵官楊御蕃以重兵禦之賊不敢犯轉攻夀州故御史方震孺督鄉勇堅守乃走潁霍陷蕭縣生員梁宏道戴奮翼縱四通朱道光郭復性郭復初李荷春布衣王基貞任如龍郝維聰死之復突碭山靈璧虹窺曹單總兵劉澤清拒于河賊掠考城儀封而西其東奔者為别將劉良佐所扼西走池河取間道出南岡守禦劉光輝以五百人格鬪力竭赴水死一軍盡殁賊襲其甲幟渡河守者不覺也既畢渡奪路走總兵杜宏域自浦口馳追之不及遂折入歸德祖大樂邀擊之賊乃北向開封陳永夀敗之朱仙鎮賊走登封與伊嵩賊合湯九州期左良玉夾剿良玉半道歸九州以孤軍千二百人由嵩縣深入賊屢敗窮追四十餘里悮入深崖遇賊數萬據險攻圍九州勢不敵夜移營為賊所乘遂戰殁靈象升開九州軍覆賊已分趨裕州南陽乃合祖寬祖大樂羅岱兵馳擊賊于七頂山殱李自成精騎殆盡次師南陽令大樂備汝寧寬備鄧州而躬率諸軍蹙賊遣使告湖廣巡撫王夢尹鄖陽撫治宋祖舜曰賊疲矣東西邀擊前阻漢江可一戰殱也兩人竟不能禦賊遂自光化潛渡漢入鄖象升遣總兵秦翼明副將雷時聲由南漳穀城入山擊賊寬等騎軍不利阻隘副將王進忠軍譁羅岱劉肇基兵多逃追之則彎弓內嚮象升乃調川兵搜捕圴州賊是時椘豫賊及迎祥等俱在秦楚蜀之交萬山中象升自南陽趨襄陽進兵賊多兵少而河南大饑餉乏適兵益洶洶洪承疇及象升議關中平曠利騎兵移祖寬兵入陜而襄陽均州宜城穀城上津南漳環山皆賊象升渡浙河而南追賊至鄖西賊分竄山谷迄不能平質實碭山秦碭縣後漢碭山明屬徐州西本朝雍正十一年升徐州為府縣仍屬池河在貴池縣西五里一名貴池亦曰杜塢河北流過鎮山入江登封唐改嵩陽縣置明屬河南府今因之七頂山亦曰七峯山在裕州北宜城漢縣明屬襄陽府今因之湯九州官昌平副總兵崇禎八年春被劾褫官從軍自效既戰歿從孫文瓊伏闕三上書請恤不報劉肇基字鼎維遼東籍贑榆人本朝乾隆四十一年追諡九州忠烈梁宏道等並入祠寧夏兵亂殺巡撫王楫寧夏兵苦飢楫不能措餉兵譟而殺之副使丁啓睿捕斬首惡六人亂乃定質實王楫泰安人丁啓睿永城人以武舉陳啓新為給事中啓新上書言天下有三大病士子作文髙談孝弟仁義及服官恣行奸慝此科目之病也國初典史授都御史秀才授尚書嘉靖時猶三途並用今惟一途一舉進士橫行放誕此資格之病也舊制給事御史教官得為之今惟用進士知縣監司郡守承奉不暇此行取考選之病也請停科目罷行取考選以除積弊蠲災傷田賦以蘇民困専拜大將以便宜行事帝大恱擢吏科給事中朝士深惡之紛然諭劾帝皆不聽後啓新以受贓匿喪削籍下撫按追贓竟逃去質實陳啓新淮安人三月延綏總兵官俞冲霄擊李自成于安定敗績死之賊既潛渡漢江留其黨屯鄖襄山谷間而髙迎祥李自成分道再入陜迎祥趨興安漢中自成突商雒走延綏犯鞏昌北境諸將左光先曹變蛟破之自成奔還縣未幾官軍敗于羅家山盡亡士馬器仗賊南出安定俞冲霄縱兵擊之戰竟日斬獲多乘勝逐北賊伏起冲霄持矛衝哭賊來益衆圍之數重援兵絶遂殘于陳自成勢復振進圍綏德欲東渡河山西兵遏之復西掠米脂呼知縣邊大綬曰此吾故鄉也勿虐我父老將襲榆林為賀人龍所敗河水驟長賊淹死甚衆乃改道從韓城而西質實羅家山在慶陽府正寧縣東羅川水出焉隋時名縣曰羅川以此俞冲霄靖邊衛人邊大綬任邱人本朝乾隆四十一年追諡冲霄忠烈夏四月我太宗文皇帝建國號曰大清改元崇德元年太宗文我帝纘承丕緒勵精圖治規模宏逺伐叛撫降人心皇向附于是諸貝勒大臣外藩䝉古貝勒台吉及滿洲蒙古漢人文武各官捧表上皇上承應運而興愛育羣黎輯寧諸國逆者以兵威之順者天眷佑以德撫之征服朝鮮混一䝉古更獲玉璽符命昭然請上尊號曰寬溫仁聖皇帝臣工固請再三始太宗初未允從俞所請乃于是月十一日祭告天地太廟築壇于德盛門外淸改元為崇德元年時制度大備營即皇帝位建國號曰大天壇建太廟悉如典禮復定宫殿名正殿為崇政殿後為淸寧宫東為翔鳯樓西為飛鳯閣大殿為篤恭殿建製壯麗百司官舍以次備列質實元代傳國璽初元順帝北遷攜璽至應昌尋失之越二百餘年有牧羊于山岡下者見一山羊三日不齧草時以蹄觸地牧者發之遂得璽歸于元裔博碩克圖汗後復歸于林丹汗及林丹汗西奔圖白忒其子孔果爾額哲自托里圖來降額哲母乃以璽獻璠璵為質交龍為鈕文曰制詰之寶蓋漢篆也德盛門盛盛京城周九里三百三十二步門八南之左曰德南之右曰天裕北之東曰福勝北之西曰地載東之南曰撫近東之北曰內治西之南曰懷逺西之北曰外攘天壇在德盛門外四周一百一十丈南面三門東西北三面各一門太廟在撫近門外門南向東西廣三十五丈南北袤四十寢丈大門三楹東西角門二前殿三楹正殿五楹後六楹罷大學士錢士升削御史詹爾選籍時體仁以刻核導帝上下囂然士升因撰四針以獻大指謂寬以御衆簡以臨下虛以宅心平以出政其言深中時病帝優㫖報聞而意不懌有武生李璡者請括江南富户令報名輸官行首實籍沒之法士升惡之擬㫖下刑部逮問帝不許體仁遂改輕擬士升曰此亂本也當以去就爭之乃疏言自陳啓新言事擢置省闔比來借端幸進者實繁有徒然未有誕肆如璡者也其曰縉紳豪右之家大者千百萬中者百十萬以萬計者不能枚舉臣不知其所指何也就江南論之富者數畝以對百計者什六七千計者什三四萬計者千百中一二耳江南如此何况他省且郡邑有富家固貧民衣食之源也地方水旱有司令出錢粟均糶濟飢一遇冦警令助城保守禦富家未嘗無益于國周禮荒政十二保富居一今秦晋楚豫已無寧宇獨江南數郡稍安此議一倡無賴亡命相率而與富家為難不驅天下之民胥為流冦不止報曰即欲沽名前疏已足致之毋庸汲汲前疏謂四針也士升惶懼引罪乞休帝即許之于是御史詹爾選上疏曰輔臣因咎求黜邃奉回籍之諭夫人臣所以不肯言者其源在不肯去爾輔臣肯言肯去臣實榮之獨不能不為朝廷惜此一舉也璡以非法導主上其端一開大亂將至輔臣憂心如焚忽奉改擬之命遂爾執奏陛下方嘉許不暇顧以沽名責之人主不以名譽鼓天下使其臣尸位保寵亦非必國家利况今日所行一切皆苟且之政當局者或拊心愧恨旁觀或對衆欷歔輔臣不過偶因一事代天下發憤耳而竟鬱鬱以去恐後之大臣無復有敢言者矣大臣不敢言而小臣愈難望其言矣所日與陛下言者惟苛細刻薄不識大體之徒似忠似直如狂如癡售則挺身招搖敗則潛形逋竄駭心志而爚耳目毁成法而釀𨼆憂天下事尚忍言哉疏入帝震怒召見武英殿詰之曰輔臣之去前㫖甚明汝安得為此言對曰陛下大開言路輔臣乃以言去國恐後來大臣以言為戒非求言意帝曰建言乃諫官事大臣何建言對曰大臣雖在格心然非言亦無由格大臣止言其大者决無不言之理大臣不言誰當言者帝曰汝言一切苟且之政何者為苟且對曰加派帝曰加派因賊未平賊平何難停汝尚有言乎對曰搜括抽扣亦是帝曰此供軍國之用非輸之內帑汝更何言對曰即捐助亦是帝曰本令碩捐者聽何嘗强人時帝聲色俱厲左右皆震懾而爾選詞氣不撓帝命錦衣提下爾選叩頭曰臣死不足惜陛下聽臣事尚可為即不聽亦可留為他日思帝愈怒罪且不測諸大臣力救乃命繫于直廬下都察院議罪止論停俸復令吏部同議請鐫五級以雜職用復不許乃削籍歸自後言者屢薦皆不聽質實詹爾選字思吉撫安人六月林釬卒以孔貞運賀逢聖黃士俊並為禮部尚書兼東閣大學士預機務逢聖性亷靜初官翰林湖廣建魏忠賢生祠或傳上梁文出逢聖手忠賢詣謝逢聖曰無之借銜陋習耳翌日遂削籍帝即位召還至是與貞運士俊俱入閣三人皆不能有所匡益質實孔貞運句容人至聖六十三代孫也賀逢聖字克繇江夏人黃士俊廣東順德人秋七月大清兵入塞大清兵入喜峯口巡關御史王肇坤拒戰敗還保昌平與總兵官巢丕昌户部主事王一桂趙悅攝知州事保定通判王禹佐分門守城破肇坤被四矢兩刃而死丕昌出降一桂悅禹佐及判官胡惟忠吏目郭永學正解懷亮訓導常時光守備咸貞吉皆死之禹佐佐子亦從父死一挂妻妾子女暨家衆二十七人悉大赴井死未幾知縣上官藎與遊擊冶國器都指揮蘇清兵攻順義時雨等拒守城既下藎自經國器時雨及訓導陳所藴皆死尋下寶坻知縣趙國鼎主簿樊樞典史張六師訓導趙士秀皆死下定興教諭熊嘉志在籍太常少卿鹿善繼知州薛一鶚殉節死下安肅知縣鄭延任與妻同殉教諭耿三麟亦死之下大城知縣武維周中流矢死下雄縣安州知州崔維嵂巷戰觸階死妻牟氏子婦陳氏自縊雄縣布衣唐中頴依八旬父弗去亦死時都城戒嚴詔徵諸鎮入援給事中王家彥以陵寢震驚劾兵部尚書張鳯翼坐視鳯翼懼自請督師命與中官羅維寧宣大總督梁廷棟相犄角然皆不敢戰言官交章論鳯翼廷棟兩人益懼度解嚴後必罹重譴日服大黃藥祈死而已質實定興金析范陽黃村地置安州宋順安軍金置葛城縣為安州治明洪武初省縣入州尋改州為縣十四年復為州與定興並屬保定府今因之王肇坤字亦資蘭溪人贈大理卿王一桂黃岡人與趙悅並贈太僕少卿王禹佐蕭山人胡維忠徽州人上官藎曲沃人治縣亷執有聲趙國鼎山西樂平人熊嘉志灤州人鹿善繼字百順家于定興縣之江村父正苦節自礪逺近稱鹿太公善繼入捍城以死家人奔告太公太公曰吾兒素以身許國今果然何憾事聞贈大理卿諡忠節敕有司建祠薛一鶚字百當原官蘭州知州鄭延任臨清人耿三麟靈夀人武維周太谷人崔維嵂平度州人本朝乾隆四十一年追諡王肇坤王一桂忠烈趙悅王禹佐咸貞吉上官藎冶國器蘇時雨趙國鼎薛一鶚鄭延任武維周崔維嵂節愍胡維忠等並入祠陜西巡撫孫傅庭擊髙迎祥于盩厔擒之送京師伏誅先是關中賊過天星九條龍等屢為總兵官栁紹宗左光先所敗窮蹙乞降陜西巡撫甘學濶受之置其衆數萬人于延安尋出劫掠如故秦之士大夫譁于朝乃推邊才用傅庭以是年三月受代傅庭沈毅多籌略既蒞秦嚴微發期會一從軍興法賊首整齊王據商雒諸將不敢攻檄副將羅尚文擊斬之以迎祥于賊中最强躬督賀人龍等勦之盩厔大破其衆于黑水峪迎祥就擒并縳其僞領哨黃龍總管劉哲等獻俘闕下磔死關中賊稍懾而賊黨之竄鄖襄者常乘間突入豫犯滎陽殺知縣王恆言總兵官解進忠撫之浙川被殺然亦屢挫衄及羅象升既北去苗胙土巡撫湖廣不習兵張獻忠乃約馬守應諸賊以二十萬衆自均州新安唐縣分道犯襄陽總兵秦翼明兵寡不能禦賊部四出剽掠而應城旋告陷方賊之攻應城也知縣張紹登及教諭李之經訓導張國勛鄉官饒可久徐晤可悉力禦之國勛曰賊不一創城不易守率壯士出擊力戰一日夜斬獲甚衆賊去邑有侍郎王珹子權結怨于族黨怨家潛導賊復來攻國鄖佐紹登力守乞援于上官副將鄧祖禹赴救守西南國勛守東北紹登往來策應會賊射書索權權懼斬北關以出賊乘間登南城紹登還署端坐堂上賊至奮拳擊之羣賊大至被殺縱火焚文廟投國勛烈焰中祖禹之經可久晤可皆不屈死侍郎瑊亦被磔是時湖廣震動獻忠欲乘勢窺儀淮遂合守應等沿江南下而關中賊復推李自成為闖王連犯階徽汧隴鳯翔于是自成獻忠分冦西南各相雄長矣質實黑水峪一名芒谷在盩厔縣東南應城劉宋析安陸縣置明洪武初省入雲夢尋復置屬德安府今因之孫傅庭字伯雅代州振武衛人王恆言慈溪人治邑有惠政賊逼境城守援絶脅降不屈死張紹登字振夫南城人贈尚寶少卿李之經永興人張國勛黃陂人贈國子監學正饒可久初知大興縣後歷知府艱歸賊入語妻程氏曰臣死忠婦死節分也妻女相對自經可久被執不屈死徐晤可官錦衣百户鄧祖禹蘄水人瑊本朝乾隆四十一年追諡鄧祖禹忠烈張紹登王烈愍解進忠王恆言饒可久節愍李之經等及固始布衣朱曜麟遊貢生楊世謙生員楊四可入祠曜率鄉勇殺賊手馘數十人陷伏被執罵賊死四謙四可以父被賊執兄弟爭代死皆遇害事並在是年諭廷臣助餉未幾又括勛戚文武諸臣馬開銀鐵銅鉛諸礦八月唐王聿鍵起兵勤王廢為庶人錮之先是流賊起王蠲金築南陽城又援潞藩例乞增兵三千人不許至是京師戒嚴王倡義勤王將抵開封諸大吏惴恐集議曰留之不聽行守上者且得罪杞縣知縣申佳允曰惟周王可留之衆稱善用其議聿鍵乃止不行尋下詔切責勒還國事定下部議廢為庶人幽之鳯陽質實周王恭㮙定王橚十世孫萬厯十七年封世子既而襲封申佳允字孔嘉永年人發明明制親藩不掌兵士卒蒞王府者不過備護衛而已然此謂國家無事之日若京師戒嚴倡義勤王正與國同休戚之義特恐蕞爾之區兵力微弱無益于事耳顧大吏惟以守土者得罪為恐宛轉議留悉出私意朝廷復下詔切責勒使歸國率下部議且以舉兵為罪廢黜幽繫舉措不幾倒置乎揆厥所由大抵鑑宗藩擅兵慮其乘間為非耳夫既分封世土欲其屏藩王室而一舉動間防間備至雖以勤王為國而猶必加之罪然則封建之無益于人國信矣夫我大清兵東歸九月以盧象升總督宣大山西軍務象升舉詔入衛至已解嚴㑹梁廷楝卒命代為總督宣大素苦缺餉象升乃大興屯利行二年積穀至二十萬帝諭九邊奉以為式冬十月削前工部侍郎劉宗周籍宗周既還朝擢工部右侍郎上痛憤時艱疏略言陛下鋭意求治而二帝三王治天下之道未暇講求施為次第猶多未得要領者首屬意于邊功既而袁崇煥遂以五年恢復之說進是為禍胎己巳之役謀國無良朝廷始積輕士大夫之心自此耳目參于近侍腹心寄于干城治術尚刑名政體歸叢脞天下事日壞而不可救厰衛司譏察而告訐之風熾詔獄及士紳而堂亷之等夷人人救過不給而欺岡之習轉甚事事仲成獨斷而諂諛之風日長三尺法不伸于司冦而犯者日衆詔㫖雜治五刑嵗躬斷獄以數千而好生之德意泯刀筆治絲綸而王言褻誅求及瑣屑而政體傷參罰在錢穀而官愈貪吏愈橫賦愈逋敲撲繁而民生瘁嚴刑重斂交困而盜賊日起總理任而臣下之功能薄監視遣而封疆之責任輕督撫無權而將日懦武辨廢法而兵日驕將懦兵驕而威令并窮于督撫朝廷勒限平賊而行間日殺良民報功生靈益塗炭一旦天牖聖衷撤總監之任重守令之選下弓旌之招收酷吏之威布維新之化方與二三臣工洗心滌慮以聫泰交而不意君臣相遇之難也得一文震孟而以單辭報罷使大臣失和衷之誼得一陳子壯而以過戅坐辜使朝寧無吁咈之風此關于國體人心非淺陛下必體上天生物之心以敬天而不徒倚風雷必念祖宗鑑古之制以率祖而不輕改作以簡要出政令以寬大養人才以忠厚培國脈發政施仁收天下泮渙之人心而且還內廷掃除之役正懦帥失律之誅慎天潢改授之途遣廷臣齎內帑巡行州縣為招撫使赦其無罪而流亡者陳師險阻以珠賊梁則冦患可消天下幸甚疏入帝怒甚諭閣臣擬嚴㫖再四每擬上帝輒手其疏復閲起行數周已而音解降㫖詰問謂大臣論事冝體國度時不當效小臣歸過朝廷為名髙且奬其清直焉時太僕缺馬價有詔願捐者聽體仁等皆有捐助又議罷明年朝覲宗周以輸資免覲為大辱國帝雖不悅心善其忠益欲大用體仁患之募山隂人許瑚疏論之謂宗周道學有餘才諝不足帝以瑚同邑知之冝真遂已不用宗周三疏請告去至天津聞畿輔被兵遂留養疾事稍定乃上疏曰自己巳之變小人以門户修怨異己者槩坐以袁崇煥黨日造蜚語次第去之于是小人進而君子退中官用事而外廷浸疏文法日繁欺罔日甚朝制日隳邊防日壞今日之禍實己巳以來釀成之也且以張鳯翼溺職中樞也而俾之専征何以服王洽之死以丁魁椘等之失事于邊也而僅責之戴罪何以服劉策之死諸鎮勤王之師爭先入衛者幾人不聞以逗遛䝉詰責何以服耿如杞之死廷臣之纍纍若若可幸無罪者亦何以謝韓爌李邦華諸臣之或戍或去豈昔為異己驅除今不難以同己相容𨼆乎臣以是知小人之禍人國無已時也昔唐德宗謂羣臣曰人言廬杞奸邪朕殊不覺羣臣對曰此乃杞之所以為奸邪也臣每三覆斯言為萬世辨奸之要故曰大奸似忠大佞似信頻年以來陛下惡私交而臣下多以告訐進陛下録清節而臣下多以曲謹容陛下崇勵精而臣下奔走承順以為恭陛下尚綜核而臣下瑣屑吹求以示察凡若此者正似忠似信之類究其用心無往不出于身家利祿陛下不察而用之則聚天下之小人立于朝有所不免矣天下即乏才何至盡出中官下而陛下每當緩急必委以大任三協有遣通津臨德有遣又重其體統等之總督置總督于何地總督無權置撫按于何地是以封疆嘗試也且小人每比周小人以相引重君子獨岸然自異故自古有用小人之君子終無黨比小人之君子陛下誠欲進君子退小人决理亂消長之機猶復用中官參制之此明示以左右袒也有明治理者起而爭之陛下即不用其言何至并逐其人而御史金光辰竟以此逐若惟恐傷中官心者尤非所以示天下也至今日刑政之最舛者成德介吏也而以贓戍何以肅懲貪之令申紹芳十餘年監司也而以莫須有之鑽刺戌何以昭抑競之典鄭鄤之獄或以誣告坐何以示敦倫之化此數事者皆為故輔文震孟引繩枇根即向日驅除異己之故智而廷臣無敢言陛下亦無從知之也八年之間誰秉國成而至于是臣不能為首揆溫體仁解矣語曰誰生厲階至今為梗體仁之謂也疏奏帝大怒體仁又上章力詆遂斥為民質實陳子莊字集生南海人纍官禮部侍郎莊烈帝以海內多故思廣羅賢才下詔援祖訓郡王子孫文武堪任用者得考驗授職子壯慮為民患極言不可會唐王聿健上疏歷引前代故事詆子壯遂除名下獄坐贖徒歸明永明王由榔立于肇慶授子壯東閣大學士兼兵部尚書大兵下髙明子壯被執受戮死明永明王贈子壯畨禺侯諡文忠本朝乾隆四十一年追諡忠簡金光辰字居垣全椒人時莊烈帝遣中官總監通津臨德等處兵馬糧餉而意頗諱言之光辰疏請罷遣帝怒召對平臺風雨驟至侍臣立雨中至以袖障霤帝責光辰光辰對曰皇上以文武諸臣無實心任事委任內臣臣愚以任內臣諸臣益弛卸不任帝大怒聲色俱厲將重譴光辰而迅雷直震御座風雨聲大作光辰因言臣往在河南見皇上撤內臣而喜語未終帝沈吟即云汝言毋復爾然意亦稍解翼日詔光辰鐫三級調外人謂光辰有天幸云成德字允升霍州人以進士除滋陽知縣性剛介清操絶俗疾惡若讐嘗語刺溫體仁體仁聞而恨之兖州知府增餉額德固爭又嘗捕治其牙瓜吏知府怒讒于御史禹好善好善體仁客也誣德貪虐逮入京滋陽民詣闕訟寃閣臣文震孟亦為之稱枉德道中具疏極論體仁罪而震孟已被體仁排擠去好善再劾德言其疏出震孟手帝不之究德母張氏伺體仁長安街繞輿大罵拾瓦礫擲之體仁恚疏聞于朝詔五城御史驅逐移德鎮撫獄掠治杖六十午門外戍邊坐賊六千有奇而給體仁校尉五十人以護出入發明溫體仁當國既久劾者章不勝計而劉宗周之疏尤為深切著明莊烈素知宗周清直前此痛憤時艱一疏雖怒甚旋即竟解何以一劾體仁即至立豫削藉體仁素患宗周之見用急欲使之去位而宗周復屢以戅直見忤于是乘上之怒而媒孽之觀其甫被宗周之劾而即上章力詆蓋惟恐其君之一悟而去之不速也小人嫉賢以自固其寵何所不至獨惜莊烈憂勤治理慨然思得非常之材而舉措聽熒貞邪易位有一宗周而不能用任一體仁而不知悟轉移顛倒以抵于亡其果誰之咎歟御定資治通鑑綱目三編卷三十六
