body:
  text: 起癸未明莊烈帝崇禎十六年盡甲申明莊烈帝崇禎十七年凡二年癸未十六年春正月李自成陷承天前巡撫僉都御史宋六鶴等死之一鶴既趍承天與前留守沈夀崇鍾祥知縣蕭漢登陴禦守五晝夜聞賊燔獻陵漢突圍出救賊騎環之漢太呼鋰祥今在誰敢驚陵寢者賊挾之去不殺説降不聴城中人有通於賊者開門延之入城遂陷一鶴掌及鄉官從所尚皆死分巡副使張鳳翥走入山中賊枸漢僧寺謹視之求死不得乗守者懈乃自剄賊分兵旁掠潛江京山雲夢黄陂孝感等縣皆陷雲夢知縣諶吉臣署黄陂知縣夏統春潜江鄉官歐陽燧孝感鄉官程道夀死之賊前鋒逼漢陽轉攻鄖陽按察使髙斗樞逰擊王光恩力守乃解去自成遂據承天自號奉天倡義大元帥號羅汝才代天撫民威徳大將軍分其衆曰標營領兵百隊曰先後左古營各領兵三十餘隊五營以序直晝夜次第休息巡徼嚴宻逃者謂之落草磔之收男子十五以上四十以下者為兵凡精兵一人従以主芻掌械執爨者十人軍令不得蔵白金過城邑不得室處妻子外不得攜他婦人寢與悉用單布幕綿甲厚百層矢礟不能入一兵倅馬三四匹冬則以茵褥籍其蹄剖人腹為馬槽以飼馬馬見人輒鋸牙思噬若虎豹軍止即出較騎射曰站隊夜四鼓蓐食以聴令所過崇岡峻坂騰馬直上水惟憚黄河若淮泗涇渭則萬衆翹足馬背或抱鬛縁尾呼風而渡馬蹄所壅閼水為不流臨陣陣列馬三萬名三堵墻前者反顧後者殺之戰久不勝馬兵佯敗誘官兵步卒長鎗三萬撃刺如飛馬兵囘擊無不大勝攻城迎降者不殺守一日殺十之三二日殺十之七三日屠之凡殺人東屍為燎謂之打亮城陷步兵萬人環堞下馬兵巡徼無一人倖得免張獻忠雖至殘忍不逮也諸營較所獲馬驘者上賞弓矢鉛銃者次之幣帛又次之珠玉為下自成不好酒色脱栗粗糲與其下共甘苦汝才妻妾數十被服紈綺帳下女樂數部厚自奉養自成嘗嗤鄙之汝才衆數十萬用山西舉人吉珪為謀主自成善攻汝才善戰兩人相須若左右手自成下宛葉克梁宋兵強衆附有専制心顧獨忌汝才乃召汝才所善賀一龍飲縛而殺之晨以十二騎斬汝才于帳中悉兼其衆自成在中州所掠城輙焚燬之及渡漢江謀以荆襄為根本改襄陽曰襄京修襄王宫殿居之改禹州曰均平府承天府曰揚武州他府縣多所更易又以牛金星言設官爵名號以田見秀劉宗敏為權將軍李嵓賀錦劉希堯等為制將軍張鼐黨守素等為威武將軍谷可成任維榮等為果毅將軍置五營二十二將上相左輔右弼六政府侍郎郎中従事等官要地設防禦使府曰尹州曰牧縣曰令封崇王由樻及郡王被執者俱為伯官吏降者並受偽職偽侍郎喻上猷薦所知李開先陳萬䇿賢可用具書幣徵之開先觸墻死萬䇿自經自成既殺汝才一龍尋又襲殺藺養成奪馬守應兵于是十三家七十二營諸大賊降死殆盡而自成獻忠獨存質實雲夢西魏析安陸縣置明属徳安府今因之孝感後唐置明属徳安府今改属漢陽府黄陂髙齊置明属黄州府今改属漢陽府宋一鶴先以襄陽陷奪職戴罪一鶴連疏引疾下所司核實許解官候代未行及于難沈夀崇宣城人都督有容子忤巡按劾罷亦未行蕭漢字雲濤南昌人従所尚鍾祥人官刑部主事與子士默士熊皆不屈死諶吉臣南昌人夏統春桐城人為黄陂縣丞攝縣事遷麻城縣知縣未赴賊攻城督衆拒守凡十五晝夜賊怱解去統春度賊必至而衆已度甚休于家閲五日賊果突至城遂陷統春巷戰力竭被執欲屈之統春指賊魁大罵賊怒㫁其右手復以左手指賊罵又㫁之罵不已乃割其舌目怒視皆欲裂又剜其目猶以頭觸賊遂支解之歐陽璲官盱眙知縣歸里賊陷潛江被執與妻廖氏同殉節程道夀嘗為來安知縣賊陷孝感置掌旅守之道夀結里中壯士擊殺掌旅賊復至杖之繫獄令為書招程良籌道夀曰我不能助良籌滅汝肻助汝耶遂見殺程良籌字持卿孝感人工部尚書註子也與同邑參政夏時亨築壘于縣境之白雲山以禦賊賊使説降良籌毁其書賊怒設長圍攻之相持四十餘日觧去既而漢陽武昌為張獻忠所陷四面皆賊獨白雲孤處其間賊頗患之良籌復號召左右諸寨與官兵掎角進兵恢復孝感雲夢進薄徳安兵收退保白蓮寨寨中人素通賊為内應良籌遂被執説降不屈羈之密室尋左良玉遣將攻徳安賊懼擁良籌令止外兵不従逼良籌偕行又不従遂被殺崇王由樻脅授偽職為襄陽伯令諭降州縣之未陷者不従殺之于泌陽城喻上猷石首人嘗為御史李開先陳萬䇿皆陵舉人諶本朝乾隆四十一年追諡蕭漢忠烈宋一鶴沈夀崇吉臣夏統春烈愍従所尚歐陽璲程道夀程良籌節愍李開先陳萬䇿入祠其時紳士遇賊被害者又有汝寧照磨張大道雲夢生員袁啟觀安樂生廖應元並予入祠張大道宜都人家居流賊據宜都大道團練義兵二千餘人攻城為賊所襲父子五人俱力戰死袁啟觀廖應元皆結寨禦賊賊攻破之應元以罵賊射死啟觀磔死二月乙丑朔日有食之賊陷武岡州殺岷王企􅀈賊黨馬守應陷澧州窺常徳土㓂甘明揚等應之攻破武岡州縦掠岷邸岷王企􅀈遂遇害生員袁承孟率子夢麟督鄉兵𠞰之為賊所蹙投潭水死夢麟戰歿先是湖南土㓂有飛天王江長子洪老殻者横行湘鄉安化益陽寧鄉間犯湘潭長沙總兵尹先民合兵𠞰之戰桃花江陣斬飛天王俘江長子洪老殻溺死賊悉定而臨武劉新宇監山李荆楚復大熾謂之臨藍賊據山寨納亾命同出犯常徳衡州圍桂陽州先民率裨將貢王猷土師譚仰庭來援圍始解尋以二百餘艘由衡湘犯長沙攻十餘日不克乃引去轉攻袁州直逼永州將由東安水道䦨入廣西于是合湖廣廣東廣西福建兵㑹𠞰沅撫陳睿謨檄先民將主客兵萬五千人討劉新宇敗賊銅梁橋用計縛新宇誅之餘賊推新宇弟秀宇為主嬰險阻以拒官軍官軍四路奪隘入直抵其巢擒秀宇廣東廣西福建兵分道入藍山藤本轇轕不得進遂縱火焚之乗烟而上先後殺賊首曽戒奴郭子奴等李荆楚就縳臨藍賊平而諸盗時窃發患不得息及是竟陷岷藩勢張甚巡按御史劉熙祚馳擊甘明掦于常徳破其衆斬明掦方還兵長沙而張献忠已臨江欲渡湖南大震矣是時流賊㺯兵十五六年蹂躙半天下獨浙江江西福建廣東廣而未罹其患顧常患土冦江西有九連山賊攻掠贛州之龍南定南恵州之和平潮州之平逺廣東有羅岡賊張惟元流擾程鄉及福建之上杭武平清流僭號永興稱為王而浙江則有許都之亂許都者東陽諸生副使達道之孫家富任俠好施隂以兵法部勒賔客于弟思得一官紹興推官陳子龍常薦諸上官不用㑹有義烏奸人假中官名招兵者都無與也束陽知縣姚遜木利都所有文致都求賂不應都葬母山中㑹者萬人遜木告監司曰都反矣遣役收捕之送塟者大噪遂裏帛反號白頭兵旬日間聚衆數萬連陷束陽義烏浦江遂逼金華既而引去巡按御史左光先命子龍為監軍往討稍有俘獲都退屯山中官軍仰攻不能下監司欲撫之語子龍曰賊聚糧據險非曠日不克我兵萬人止五日糧柰何子龍曰都舊識也請往察之乃單騎入都營賁數其罪諭令歸降待以不死遂挾都走山中散遣其衆而以二百人降光先乃斬都等六十餘人于江滸自是一二年間浙東土冦蠭起皆稱白頭兵蓋自都始質實湘鄉東漢圻湘南縣地置安化宋析益陽縣地置寧鄉宋析長沙縣地置明並属長沙府湘潭秦湘南蕭梁改湘潭元升州明復為縣亦属長沙府今悉因之桃花江在益陽縣西南六十里源出梓梁巖西北流逕浮邱山北又北流四十里入資江臨武漢縣五代晉省入平陽宋復置藍山縣漢南平隋改藍山明並属桂陽州以隸于衡州府今逕属桂陽州桂陽唐置宋升為軍元改路明降州属衡州府安本朝雍正十年升直隸州東安宋以零陵縣之東塲置明属永州府今因之銅梁橋在嘉禾縣東南三十里藍山在桂陽州西百里按臨武藍山二縣界薈萃蒼翠浮空如藍定南明隆慶二年析能南安逺信豐三縣地置属贛州府今因之平逺明嘉靖四十三年析興寧程鄉二縣地置属潮州府今改属嘉應州羅岡山在興寧縣北八十里清流宋析長汀寧化二縣地置明属汀州府東陽唐析義烏縣地置明属金華府今皆因之岷王企􅀈莊王楩九世孫劉熙祚字仲緝武進人陳子龍字卧子松江華亭人左光先桐城人光斗弟也本朝乾隆四十一年袁承孟及子夢麟並入祠三月左良玉軍作亂南京戒嚴良玉既縦掠武昌居二十餘日李自成前鋒逼漢陽乃避之東去居人登蛇山以望呌呼更生曰左兵過矣良玉所部多降兵叛卒桀悍不馴禆將王允成為亂首攤兵十餘萬自九江而下破建徳刧池陽去蕪湖四十里泊舟三山荻港漕艘鹽舶盡奪以載兵聲言餉乏欲寄孥于南京文武大吏相顧諤眙陳師江上為守禦士民一夕數徙商旅不行都御史李邦華被召道湖口嘆曰中原安静土東南一角耳身為大臣忍坐視決裂袖手而去耶草檄告良玉以危詞動之艮玉氣乃沮邦華用便宜發九江庫銀十五萬餉之而身入其軍開誠慰勞一軍稍安邦華入見帝論良玉潰兵之罪請歸罪于王允成帝乃令良玉誅允成而奬其能定變良玉卒留允成于軍中不誅也良玉以賊萃湖北不敢嬰其鋒遂留安慶久之徐溯九江而上當是時官軍所至輒肆攻剽鳳陽總督馬士英遣使者李章玉徴貴州兵討賊于道掠江西為樂平吏民所拒擊比抵徽州境復大掠民遂以為賊羣起破走之章玉諱言激變謂徽民抗拒官軍實在籍御史金聲及推官吳翔鳳所主使士英以聞聲兩疏陳辨帝察其無罪不問質實蛇山在武昌府城内東隅一名髙冠山即黄鵠山支阜建徳漢石城縣地唐初為秋浦縣地至徳二載始分置至徳縣五代楊行密改建徳明属池州府今因之池陽謂貴池青陽也貴池隋秋浦縣楊行密改貴池明為池州府治今因之三山在繁昌縣東北三十五里山之東為三山磯荻港在繁昌縣西五十里吳鳳翔大興籍南昌人發眀左良玉驍勇善戰屢殱巨盜一時威名出諸將右乃以驕亢生心緩追養冦督師檄調而不前將士敗亾而不救跋扈極矣甚且縦兵淫掠破邑攻城致令居人畏左軍甚于畏盜兵是平盜者又増一盗矣潰兵之變向使無邦華之檄告權宜戢亂其勢必有不可言者朝議但歸罪于偏裨而轉奬其能定變可謂舍豺狼而問狐貍而良玉乃覔匿允成而不誅此其意中寧復有朝廷哉而當時尚欲倚以辦賊是但知其材任攻戰而不知其行已同于盜賊矣夏四月我大清兵北還大清兵自山東還至近畿諸路援軍亦随而北終未敢一戰給事中熊汝霖因言兵入墻子嶺以來南北往返諸軍謹随于後如厮隸之于貴官負弩前驅望塵靡及何名為將何名為督師帝深然之汝霖復言外縣難民紛紛入都不云被兵而云避援軍兵破霸州未嘗殺僇百姓援軍繼至遂無孑遺朝廷嵗費數百萬金錢以養兵豈欲毒我赤子帝􅁖其語激謫為福建按察使照磨而近畿峰火日亟帝憂甚大學士吳甡方奉命辦流宼周延儒不得已自請視師帝大喜降手勅奬以召虎裴度賜章服白金文綺上駟給金帛賞軍延儒駐通州亦不敢戰惟與幕下客飲酒娛樂而日騰章奏㨗及大清兵北旋至懐柔趙光抃合唐通白廣恩等八鎮兵邀戰于螺山皆漬總兵張登科和應薦敗歿延儒偵大清兵已還乃言兵退請下兵部議將吏功罪遂歸京師時援軍多畏縮觀望其以死事聞者有大同參將大吳希稷守備張爾墊與登科等先後戰死是冬寕逺清兵攻寕逺前屯縂兵李輔明馳救歿于陣而總兵王定宸及别將李鳴鳳羅文耀陶宗儀楊倫皆與城殉質實螺山在懐柔縣北吳希稷連城人張爾墊大同人王定宸李鳴鳳羅文耀楊倫皆遼東人陶宗儀密雲人本朝乾隆四十一年追諡張登科和應薦吳希稷張爾墊李輔明楊倫烈愍王定宸李鳴鳳羅文耀陶宗儀節愍五月以魏藻徳為少詹事兼東閣大學士預機務藻徳以十三年舉進士既殿試帝恩得異才復召四十八人于文華殿問方畧藻徳口才㨗給自叙十一年佐有司守通州功帝善之擢置第一授修撰及都城戒嚴疏陳兵事又召對稱㫖帝意其有抱負擢禮部右侍郎兼東閣大學士入閣輔政藻徳力辭部銜乃改少詹事正統末年兵事孔棘彭時以殿試第一人踰年即入閣然以原官預機務未有超拜大學士者陳演見帝遇之厚曲相比附八月補行㑹試引為副總裁越蔣徳璟黄景昉而用之藻徳居位一年無所建白但偶議令百官捐助而已質實魏藻徳順天通州人吳甡罷帝以襄陽荆州承天連陷召對廷臣隕涕謂甡曰卿向歴巖疆可往督湖廣師甡其疏請得精兵三萬自金陵趍武昌扼賊南下帝方念湖北覽疏不悦留中甡請面對帝以所需兵多猝難集南京隔逺不必退守甡奏言左良玉跋扈甚前督師楊嗣昌九檄徴兵一旅不發臣不如嗣昌而良玉踞江漢甚于曩時臣節制不行徒損威重南京従襄陽順流而下窺伺甚易宜兼顧非退守也大學士陳演言督師出則督撫兵皆其兵甡言臣請兵正謂督撫無兵耳使臣束手待賊事機一失有不忍言者帝乃令兵部速議發兵尚書張國維請以總兵唐通馬科及京營兵共一萬界甡又言此兵方北行俟撤備後始可調帝命姑俟之甡屢請帝曰徐之撤備則兵自集卿獨往何益踰月周延儒出督師朝受命夕啟行蔣徳璟謂倪元璐曰上欲吳公速往緩言相慰者試之耳觀首輔疾趍可見甡卒遲回不官行部所撥唐通兵演又以闗門不可無備請留之甡不得已以是月辭朝先一日出勞従騎帝猶命中官賜銀牌給賞越宿忽下詔責其逗遛命輙行入直甡惶恐兩疏引罪遂許致仕既行演與錦衣駱養牲交搆之帝益怒及周延儒以賄敗帝作色曰兩輔臣負朕朕待延儒厚乃納賄行私罔知國法命甡督師百方延緩為委卸地延儒被糾甡何獨無既而曰朕雖言終必無糾者錦衣衞可宣甡候㫖甡入都敕法司議罪遣戍金齒南京兵部尚書史可法馳疏救不従周延儒罷延儒自通州還朝繳上督師敕帝即令蔵貯以識勲勞論功加太師廕于中書舍人賜銀幣蟒服延儒辭太師許之居數日掌錦衣衞事駱養性及中官盡發所刺軍中事帝乃大怒責延儒䝉蔽推諉下廷臣察議陳演等公偈救之延儒席藳待罪自請戊邊帝猶降温㫖言卿報國盡忱終始勿替許馳驛歸賜路費百金以彰保全優禮之意及廷臣議上帝復諭延儒功多過少令免議延儒遂歸以倪元璐為户部尚書祖制浙人不得官户部元璐辭不許帝眷元璐甚五日三賜對元璐言陛下誠用臣臣請得參兵部謀帝曰已諭樞臣令與卿協計時馮元飇為兵部尚書與元璐同志鈎考兵食中外想望治平惟帝亦以用兩人晚元璐以新制遣科臣出督四方租賦徒優民無益督餉侍郎憂為盜刧逺避之長沙衡州餉終不克辦並乞罷之仍責成督撫按臣無煩朝使自軍興以來正供之外有邊餉有新餉有練餉欵目繁多黠吏為奸當合為一帝皆報可而時事益不可為左支右絀災傷捐免頗多漕運時為土冦所泣于是言國計者紛起崇明人沈延掦献海運䇿元璐請以海艘六試行之月餘運已至帝大喜遂命漕運與海運兼行未㡬有蔣臣者請行鈔法帝即擢為户部司務元璐亦力賛之終不可行而止帝又嘗以御史王燮言收銷舊錢但行新錢新錢彌惡簿雜鉛沙大半椊擲破碎百不盈寸而古錢銷燬頓盡益自隋世盡銷古錢至是凡再見尋又敕鑄當五錢不及鑄而國亾質實蔣臣桐城人王燮商邱人張獻忠陷武昌沉楚王華奎于江前大學士賀逢聖等死之先是左良玉避自成東下盡撤湖廣兵自従献忠聞之乗虚襲陷黄梅廣濟生員張開熈李化龍孫仍盧如鼎殉焉進薄蘄州知州許文岐擢督糧參政當行歎曰吾為天子守孤城三載矣分當死封疆雖危急奈何棄之檄參將毛文富出屯近郊為固守計文富刧闗廂颺去荆王府將校郝承忠者潛通獻忠導其衆悉力来攻文岐發礟斃賊頗多夜將半雪盈尺賊破西門入文岐巷戰雪愈甚礟不得發與指揮岳璧用被執献忠欲脅兩人降璧属聲曰我世臣也城亾與亾豈降賊賊乃殺璧而羈文岐于後營盡屠州民夘官饒京張邦翼李樹初李梃李新量一化皆死文岐與舉人奚鼎鉉等數十人同繫文岐密謂曰觀賊老營多烏合凡此數萬賊皆被掠良民若告以大義同心協力賊可殱也隂相結尅期舉事謀洩遇害賊大衆入黄州同知朱統鎙禦之歿于陣黄民有棄家逃乃驅婦女剷城尋殺之以填塹黄岡知縣孫自一縣丞吳文爕衛指揮郭以重鄉官樊維城舉人於斯行武舉王子監生員馮雲路史之見汪廷陛義民余秀負曹上謨曹大震不屈死賊分兵攻黄陂麻城黄陂知縣趙元有主簿薛聞禮生員傅可知俱先後死難湖南將馬人龍援麻城戰歿有大姓奴湯志者殺諸生六十人以城降置縣事教諭蕭頌聖死之献忠乃改麻城為州是時黄州属邑皆陷蘄水縣丞吳文奕教諭孫瑋訓導童天申羅田守將郭金城生員王邦衡與子鯉並殉莭献忠引兵西犯漢陽武昌震懼前巡撫宋一鶴既死代者久不至武昌知府江夏知縣並以朝覲行楚府左長史徐學顔攝縣事急修守具然武昌素不宿重兵城空虛或議撤江上兵以守參將崔文榮曰守城不如守江江中鴨蛋諸洲淺不及馬腹縦之飛渡而坐守孤城非䇿也當事不従賊已渡江陷武昌縣殺知縣鄒逢吉縣無人賊出營樊口文華軍洪山寺扼之既斂兵入城以他將代守賊全軍由鴨蛋洲軍渡抵洪山守將亦退入城文榮偕逢聖固守賊攻之不能下監軍叅政王掦基時已擢右僉都御史巡撫承天徳安二郡未聞命尚駐武昌見勢急與推官傅上瑞詭言有事漢陽開門遁去人情益洶洶先是逢聖詣楚府乞發帑募士楚王出太祖所分金裹交椅一于庭曰惟此可作軍需耳他何有逢聖哭而出及㓂警日急始出貲募兵應募者率蘄黄潰卒及賊間諜反閒門納賊文榮方出門還闔城扉不及躍馬大呼殺三人賊攢槊刺之洞胸死學顔格門㫁左臂大罵不屈為賊支解死逢聖被執叱曰我朝廷大臣若曹敢無禮賊麾使去投水死武昌通判李毓英教諭王㑹篇衛經歴汪文熈江夏巡檢戴良瑄鄉官吴思温舒顯應貢其志保舉知縣傅如珪張鳴錦舉人謝淳培貢生何應軫生員熊霄明睿皆不屈死都司徐至美守黄鶴樓重創死賊乃縛楚王華奎籠而沉諸江盡殺楚宗室録男子二十以下十五以上為兵餘皆殺之由鸚鵡洲至道士洑浮胔武被江月餘人脂厚累寸魚鼈不可食献忠遂僣號改昌曰天授府江夏曰上江縣據楚王第鑄西王之寳偽設尚書都督巡撫等官開科取士下令發楚邸金振飢民蘄黄等二十二州縣悉附質實鴨蛋洲一作鴨彈洲在江夏縣東北江中樊口在武昌縣西北五里洪山寺一名寶通寺在江夏縣東十五里洪山下黄鶴樓在江夏縣西鸚鵡洲在江夏縣西南二里道士洑在大冶縣東九十里古名士洑鎮賀逢聖當城陷時載家人以䑦􅑳出墩子湖鑿其􅯕艡妻危氏子覲明光明子婦曽氏陳氏孫三人皆溺死初賊連陷蘄黄逼江夏有大冶人尹如翁逢聖門生也走三百里持一僧帽一袈裟来貽逢聖逢聖反其衣曰子第去無夏我如翁去賊陷大冶死之逢聖既殉節越百有七十日屍出浮水上面如生以冬十一月壬子殮大吏塟之江夏縣之南紙坊許文岐字我西仁和人岳璧蘄州人世為衛指揮饒京官監察御史張邦翼官江西布政使李樹初官山西按察副使李梴官遵化兵備副使李新官陜西僉事舉家被執賊欲屈之新叱曰我昔官秦中爾輩方為厮養今日肻屈膝厮養耶賊怒新抱父屍就刃董一化官印江知縣朱統鎙新建人孫自一光州人吴文燮閩人郭以重黄州人世為衞指揮聞城陷自他所来赴難其妻欲止之叱曰朝家畀我十三葉金紫不能易一死哉吾將光殺汝妻乃不敢言既至遇賊欲脅之去堅不従露刃懾之乃好謂賊曰従汝非難但抱呱呱兒者吾妻也汝為我殺之吾無累矣賊如其言以重即奪賊刀擊斬一賊羣賊擁至遂投水死樊維城官福建兵備副使趙元有晉江人守城戰死馮雲路字漸卿従賀逢聖講學賊將渡江雲路貽書逢聖曰在内以寧湖為止水在外以漢江為汨羅寧湖者雲路談經處也城既陷乗桴入寧湖賊遣使来聘投湖死薛聞禮武進人嵗歉民逋漕粟聞禮貸于所知得千金以代民逋賊陷黄陂愛其才挾與俱去暮即亾歸殺賊所置偽官令士民逺避梃身任之遂被殺傳可知以孝稱賊執之憐其年既老不殺令飼馬罵賊被害馬人龍鎮筸人蕭頌聖定逺人童天申施州人徐學顔字君復永康人一家二十餘人皆殉莭崔文榮海寕衞人傅上瑞武定人李毓英固安人王㑹篇漢陽人吳思温官廣西市政使舒顯應官鳳翔知府貢其志官霍山知縣傅如珪保舉知縣未任張鳴錦官指揮千户謝淳培何應軫皆江夏人熊霄字渭公黄岡人移居武昌喜邵子皇極書頗言未来事城破前一日貽書其友人曰明日當覔我基樹下及期行樹傍賊追至躍入河池以死明睿江夏人城破賊獨不入其門睿慨然曰安有父母之邦淪覆而偷生苟活者歟妻及二子二女諸婢以次投井死時人號為明井徐至美上虞人有朱士鼎者為廵江都司城陷被執賊喜其勇敢欲大用之㦸手大罵賊斷其右手乃以左手染血灑賊賊又斷之不死賊退令人縛筆于臂能作楷字招集舊卒訓練如常新本朝乾隆四十一年追諡賀逢聖忠慤許文岐李崔文榮忠莭岳璧郭以重樊維城薛聞禮徐學顔徐至美烈愍饒京張邦翼李樹初李梴董一化朱統鎙孫自一趙元有馬人龍蕭頌聖郭金城李毓英吴思温舒顯應貢其志傅如珪張鳴錦莭愍張聞熙等及尹如翁並入祠六月范志完有罪下獄先是志完為督師逗遛不進次山東縦兵淫掠為兵備僉事雷縯祚所劾帝令縯祚再陳志完者首輔周延儒門生也縯祚意有所忌久不奏及延儒下廷議縯祚乃奏言志完兩載僉事驟陟督師非有大黨何以至是方徳州被攻不下轉攻臨清又五日志完始至聞後部破景州則大懼欲避入徳州城漏三下邀臣議臣告以督師非入城官薊州失事由援兵内潰志完不懌而去若夫座主當朝㒺利曲庇隻手有燎原之埶片語操生死之權稱功頌徳徧于班聨臣不忍見陛下以周召待大臣而大臣以嚴嵩薛國觀自待也臣外藩小吏乙榜孤蹤不言不敢盡言不敢感陛下虛懐俯納故不避首輔延儒與舉國媚附時局畧進一言帝益心動下志完獄召縯祚入對親鞫志完于中左門質其逗遛淫掠狀皆實帝問縯祚稱功頌徳者誰對曰延儒捛椎納賄如起廢清獄蠲租皆自居為功考選臺諫盡收門下凡求總兵巡撫者必先賄幕客董廷獻帝怒逮廷献論志完死已又日志完與趙光抃皆逗遛河間獨罪志完詎服其心乎遂并逮光抃光抃嘗薦總兵白廣恩廣恩抗不赴召帝以是益􅁖光抃卒與志完同日斬西市質實雷縯祚太湖人雷震奉先殿遣官告太廟敕羣臣修省秋七月京師大疫自二月至是月死者無算詔發帑療治瘞五城暴骸且命釋輕繫八月張獻忠陷湖南諸府獻忠既僭號武昌李自成在承天聞之忌且怒貽之書曰老回回已降曹操輩誅死行及汝矣左良玉兵復西上偽官吏多被擒殺献忠懼悉衆趣湖南岳州大震承天巡撫王楊基率所部千人自岳州奔長沙推官蔡道憲請還駐岳州曰岳與長沙唇齒也并力守岳則長沙可保而衡永亦與虞揚基曰岳非我属也道憲曰棄北守南猶不失為楚地若南北俱棄所属地安在掦基語塞乃赴岳州及賊入蒲圻揚基即遁去湖廣巡撫王聚奎逺駐袁州憚賊不敢進道憲亦請移岳州聚奎不得已至岳數日即徙長沙道憲曰賊去岳逺可繕城以守彼犯岳猶憚長沙援若棄岳長沙安能獨全聚奎不従賊果逼岳州沅撫李乾徳摠兵孔希貴禦賊于城陵磯三戰三克殱其前部献忠怒百道並進乾徳䓁不支皆走岳州陷献忠欲渡洞庭湖卜于神不吉投珓而訽將渡風大作献忠聨巨舟千艘載婦女焚之火光燭水夜如晝遂易騎以犯長沙巡按御史劉熈祚先令道憲募壯丁五千與總兵官尹先民等扼羅塘河聚奎聞賊至大惧急撤兵還城自衞道憲曰去長沙六十里有險可柵以守毋使賊踰此又不従賊薄城士民盡竄聚奎詭出戰遽率所部走湘潭㑹恵王避地至長沙與吉王謀出奔熈祚奉以奔衡州獨道憲登陴禦守賊遶城呼曰軍中久知蔡推官名速降無自苦道憲命守卒射之斃尋先民出戰敗還賊奪門入先民降道憲被軌賊唱以官嚼齒大罵賊曰汝不降將盡殺百姓道憲大哭曰願速殺我毋害百姓時有健卒林國俊李師孔陳賢劉士鳳等隨道憲不去賊令説道憲降國俊曰吾主畏死去矣不至今日賊曰爾主不降爾輩亦不得活同俊曰我輩畏死亦去矣不至今日賊知道憲終不可奪磔之其心血直濺賊面賊將并殺國俊䓁四人四人憤然曰願瘞主屍而死賊許之乃解衣裹道憲骸瘞之南郊醴陵坡皆自刎賊乃以給事中史可鏡為偽巡撫俾守長沙引兵進薄衡州聚奎兵自湘潭先至衡大焚掠桂王及吉恵二王登舟避亂熈祚單騎赴永州為城守計聚奎復避賊走祁陽衡州又陷献忠拆桂府材載至長沙造偽殿而自率兵追三王三王奔至永州聚奎率所部相繼至刼庫金去永州士民空城逃熈祚乃令其中軍䕶王王走廣西已留永州死守城陷見殺又陷寳慶常徳發故督師楊嗣昌祖墓斬其屍見血攻道州守備沈至緒戰歿其女再戰奪父屍還城獲全當是時岳州長沙常徳衡永寳慶郴州之属多為獻忠所破而自成竊據承天遣其黨髙一功馮雄據襄陽任繼光據荆州藺養成牛萬才據夷陵白旺據安陸蕭雲據荆門謝應龍據漢川賊偽官徧諸郡縣諸郡縣將吏之殉于城守及鄉官士庶不屈死者湖北則援勦都司張應禮均州知州胡承熈布衣李友竹嘉魚知縣王良鑑蒲圻知縣曽栻安陸知縣濮有容江陵知縣袁問科諸生謝劭安隨州吏日沈元鑑歸州千户吕調元京山典史張自新諸生李哲夷陵卿官李雲應山舉人劉申錫沔陽諸生朱日薦鍾祥諸生劉振孫雲夢諸生栁宗旦張用晦施爾竒栁列奎李善昌左璞李聨孝感諸生熊延祚湖南則衡州知府張任寳慶知府李振珽通判何三傑常徳同知朱國治長沙通判周二南岳州通判劉璧臨湘知縣林不息湘隂知縣楊開諸生黄鳯徳醴陵知縣萬賴擢諸生文昌拱寧鄉知縣莫可及安化知縣袁繼登衡陽知縣張鵬翼衡山知縣董我前教諭彭允中桂東知縣毋崇正瀏陽大圍山守備王元封署武陵縣衡州教授時道亨鄉官楊鷺諸生周笏栁之彦益陽教諭賴大雅鄉官陸有光諸生易應逺巴陵教諭歐陽顯宇邵陽教諭王紱諸生劉源澄曽士選劉飬生布衣劉人儼陳邦基長沙縣丞共士義武生蕭鍵善化舉人馮一第諸生李有斐東安舉人唐徳明湘潭諸生譚景悦蕭贊黄文炳子甲譚孔昭譚思猷子清逺耒陽諸生謝如珂皆死賊難于是湖南北十五府䧟者十三辰州以土司塞辰龍闗鄖陽以按察使髙名衡逰擊王光恩百計捍禦獨得存然鄖陽四面皆賊中朝謂其已䧟不復設撫治是年夏斗樞上請兵疏始知鄖存衆議即任斗樞為撫治陳演與之有隙乃擢知府徐啟元右僉都御史任之加斗樞太僕少卿路阻亦不能達也而武昌諸生程天一孝感布衣易道三集鄉勇討賊監軍道王瓆沔陽知州章曠起兵應之蘄黄漢陽三府旋反正良玉亦入武昌立軍府駐其師聞献忠已入江西遣副將吳學禮往㧞巡撫郭都賢􅁖其淫掠㯙歸之自募土人戍守未幾吉安袁州建昌撫州俱告陷吉安通判邵夢河安福舉人王之爵諸生周國柱分宜貢生張兆蘭峽江諸生胡若坦吉水布衣徐士驤並以殉莭著廣東南韶大震属城盡逃副使王孫蘭請救不應連城守將先據城叛憤而自絰兵部侍郎吕大器方代侯恂為摠督無兵不能救良玉以恂解任中道逮下獄知其為已心怏怏與大器齟齬亦不援其部將馬進忠馬士秀連復岳州袁州已而進忠與賊戰嘉魚再失利良玉軍遂不振顧献忠終憚良玉不敢南行有献計取吳越者謝不用決䇿入川中質實蒲圻晉置舊在嘉魚西南隋移今治明属武昌府今因之城陵磯在巴陵縣北十五里蜀江西来洞庭南注合流于此為一郡水口羅塘河在長沙縣北醴陵坡在善化縣東南祁陽三國吳析泉陵縣置舊治在縣東唐移今治明属永州府漢川唐析漢陽縣地置汉川縣宋改義川尋曰漢川明属漢陽府嘉魚隋于沙羡縣地置鮎瀆鎮唐改嘉魚縣明属武昌府醴陵東漢置元升州明復為縣属長沙府桂東宋析桂陽縣地置明属郴州瀏陽三國吳析長沙縣地置明属長沙府今悉因之大圍山在瀏陽東北一百五十里一名首裨山東接江西瑞州府新昌縣界北接冮西南昌府寧州界邵陽漢昭陵縣晉改邵陵隋改邵陽明為寳慶府治耒陽漢縣元升州明復為縣属衡州府今並因之辰龍闕在沅陵縣東安福漢安城唐改安福元升州明復為縣属吉安府今因之蔡道憲字元白晉江人王聚奎郿縣人李乾徳西充人吉王慈煃簡王見浚八世孫史可鏡長沙人以丁艱歸降賊賊入四川李乾徳覆還長沙執可鏡搒掠械送南京伏法張應禮遂寧人胡承熈歙人遷刑部員外郎未行賊陷均州與子爾英俱殉莭王良鑑霍山人曽栻臨川人濮有容分水人一門十九人皆死難袁問科珙縣人賊陷城避之鎮雄賊索得闔家遇害沈元鑑金壇人吕調元歸川人賊至招降不屈率義勇戰死張自新分宜人統民兵𠞰賊戰死于羅漢嶺李雲官穎州知州有恵政謝歸城陷被執至江陵絶粒死張任三水籍三原人與賊戰舟中合家被害李振珽鄞人城陷赴湘水死弟振珽僕李六鳯周科徐彩俱殉何三傑定州人朱國治雲南臨安人周二南字汝為雲南人與蔡道憲深相得道憲死二南力請于上官獲奏聞贈䘏尋擢岳州知府士民固留仍視長沙通判李自成遣其黨自興國間道入境二南督兵出禦于瀏陽之官渡歿于陣劉璧確山人擢漢陽知府未行奮力堅守糧盡城陷不屈死子泰時年十四又死之林不息莆田人莫可及宜興人為長沙照磨攝寧鄉縣事于若鼎若鈺俱殉莭袁繼登長垣人擢刑部主事未行城陷被焚死張鵬翼西充人賊脅使降不屈縛而投諸江妻子赴水死董我前富順人彭元中分宜人母崇正四川人王元封建徳人賊犯境單騎入賊營酣戰馬仆猶步門殺數人而死時道亨永明人楊鷺官上林苑監正賴大雅贑州人陸有光嘗為推官以艱歸賊陷長沙母被執不得已至賊營釋其母扼吭死歐陽顯宇桂陽州人罵賊支解死王紱貴州人吳士義歸安人賊陷城舉刀相向百姓號哭為請命士義罵賊不絶口死之馮一第走湘鄉乞師賊執其母與兄招之至長沙就縳罵賊死母兄獲免徐啟元遼東人郭都賢益陽人邵夢河電白人以吉安通判署安福縣事城陷死王孫蘭字畹仲無錫人吕大器字儼若遂寧人良本朝乾隆四十一年追諡蔡道憲劉熈祚忠烈王鑑曽栻濮有容袁問科張任李振珽林不息王元封時道亨歐陽顯宇烈愍張應禮胡承熈李雲何三傑朱國冶周二南劉璧莫可及袁維登張鵬翼董叔前母崇正楊鷺陸有元吴士義邵夢河王孫蘭烈愍林國俊等並入祠九月黄景昉罷操江故有文武二臣帝欲裁去文臣専任誠意伯劉孔昭召恵世揚為副都御史久不至帝命削其籍景昉上疏爭帝不懌遂引歸冬十月李自成冦潼闗督師孫傳庭死之自成既據承天僭號新順王集牛金星等議兵所向金星請先取河北直走京師楊永裕請下金陵断燕都糧道従事顧君恩曰金陵居下流事雖濟失之緩直走京師不勝退安所歸失之急闗中山河百二宜先取之建立基業然後旁畧三邊資其兵力攻取山西後向京師庻幾進戰退守萬全無失自成従之初傳庭之敗于柿闗而歸陜也力主固守潼闗控扼上游益募勇士使白廣㤙髙傑將之間屯田繕器積粟三家出壯丁一製火車三萬輛俟賊間而擊之㑹開中頻嵗飢苦征繕秦之士大夫以傳庭用法嚴不樂其在秦相與譁于朝曰秦督玩冦矣咸上章催戰獨兵部馮元飇持議與傳庭合謂官軍新募未經行陣宜致賊而不宜致于賊乃于帝前争之曰請先下臣獄俟一戰而勝斬臣謝之人貽書傳庭戒毋輕戰白髙兩將不可任而廷議趣戰益急帝加傳庭督師命速出闗傳庭頓足嘆曰柰何乎吾固知往而不返也然大丈夫豈能再對獄吏乎不得已遂再議出師以摠兵牛成乕將前鋒髙傑將中軍王定官撫民將延寧兵為後勁白廣恩統火軍營自新安来㑹檄左艮玉赴汝寧夾擊陳永福將河南兵秦翼明將川兵為掎角是時自成已自楚至豫盡發荆襄兵令于汜水滎澤伐竹結筏人佩三葫蘆將謀渡河傳庭分兵防禦以八月十日率師出潼闗師次汝州偽都尉四天王李養純降養純言賊虛實諸賊老營在唐縣偽將吏屯寳豐自成精鋭盡聚于襄城遂破賊寳豐斬偽州牧陳可新等進擣唐縣破之殺賊家口殆盡賊滿營哭轉戰至郟縣擒偽果殺將軍謝君友斫賊坐纛尾自成幾獲賊奔襄城大軍遂進逼襄城賊懼謀降自成曰無畏我殺王焚陵罪大矣姑決一死戰不勝則殺我而降未晚也而官軍時皆露宿與賊持久雨道濘糧車不能前士飢攻郟破之獲馬驘噉之立盡雨七日夜不止後軍譁于汝州不得已退軍迎糧留陳永福為後拒前軍既移後軍亂永福斬之不能止賊追及之南陽傳庭令反轡還戰賊陣五重飢民處外次步卒次馬軍人次驍騎老營家口處内官軍力鬬破其三重傳庭復麾之進賊驍騎殊死戰官軍陣稍動廣恩軍將火車者呼曰師敗矣脱輓輅而奔車傾塞道馬絓于衡不得前賊鉄騎凌而騰之步賊手白棓遮撃中者首兠鑿俱碎叅將趙希魁戰歿廣恩走汝州傑随傳庭走河北自成空璧追躡一日夜官兵狂奔四百里至于孟津死者四萬餘失亾兵器輜重數十萬方傳庭退兵迎糧偽侍郎邱之陶者大學士瑜子也以蠟九書貽傳庭曰督師當還兵戰吾詭言左鎮兵大至揺其心彼必返顧督師撃其後吾従中起賊可滅也傳庭大喜報書如其言為賊邏者所得之陶被害傳庭恃内應連營前進遂至敗傳庭由山西渡河轉趍潼闗廣恩已先至傑欲棄潼闗徑入西安憑堅城固守傳庭曰賊一入闗則全秦糜沸秦人尚為我用乎已而自成攻闗廣恩力戰傑以寳豐之敗廣恩先走不救已銜之人憾傳庭不用其言擁衆不肻救廣恩戰敗傳庭登陴固守賊分兵従山後遶出其背關城遂陷傳庭躍馬揮刀大呼衝入賊陣與監軍副使喬遷髙同戰死衛指揮張爾猷盛視之李繼祖千户袁化龍潼闗教授許嗣復皆殉莭帝聞潼閒陷召問諸大臣大學士陳演言賊入闗中必戀子女玉帛猶虎入陷穽兵部侍郎余應桂曰壯士健馬咸出闗西賊得之必長驅横行大臣安得面謾演股栗失色帝旋命應桂總督三邊收邊兵勦賊應桂以無兵無餉入見帝而泣帝但遣京軍千人䕶行時賊已充斥闗中應桂亦不能進也質實孫傳庭出師時自分必死顧語妻張氏曰爾若何曰丈夫報國耳母憂我後西安破張氏率二女三妾沉于井揮其八嵗兒世寧亟避賊去之兒踰牆墮民舍中一老翁收養之長子世瑞聞之自代州重趼入秦得夫人屍井中面如生老翁歸其弟世寧相扶擕還道路見者知與不知皆泣下傳庭死不得其屍或有言傳庭未死者竟不予贈廕邱之陶宜賊人賊陷宜城其祖民忠罵賊死之陶被執陷賊中欲得間以殺賊謀洩賊怒其為孫傳庭内應支解之趙希魁渭南人喬遷髙定㐮人妻史氏子象觀聞變縊死張爾猷盛昶之李繼祖袁化龍並潼闗衞人許嗣復井陘人分守闗城之上南門城陷被執罵賊死妻女殉之本朝乾隆四十一年追諡孫傳庭忠靖趙希魁喬遷髙張爾猷烈愍盛昶之李繼祖節愍邱之陶袁化龍許嗣復並入祠李自成陷西安巡撫右僉都御史馮師孔等死之秦王存樞降于賊自成長驅入關中遂連陷華州渭南臨潼分遣右營十萬人従南陽攻陷商州華州鄉官郭宗振李承燦薛國蕙渭南知縣楊暄教諭張馥訓導蔡其城鄉官南企仲南居益南居業鄭君愛臨潼鄉官王佩珂商雒道參議黄世清商州諸生邵公坤雷堂李本健吕元聲孫纉文布衣楊名道周揚實等並殉難賊遂進攻西安師孔厲兵禦守裨將王根子潛通賊城陷副將劉光先戰不支沉河死師孔及按察使黄絅長安知縣吳従義秦府長史章尚絅指揮崔爾達苑馬寺監正㳺之雲按察經厯揚于邦鄉官祝萬齡陶爾徳周培忠竇光儀徐芳聲徐方敬徐應魁舉人朱誼眔席増光貢生孫孕奉弟孕芳諸生李光信王召俊陳瑞布衣朱恩等死之自成執秦王存樞以為權將軍水夀王存朶為制將軍布政使陸之祺里居吏部郎中宋企郊提學僉事鞏焴等俱降自成大掠三日改西安曰長安稱西京賜顧君恩女樂一日實入闞䇿也大發民修長安城開馳道自成每三日親赴教塲校射百姓望見黄龍纛咸伏地呼萬嵗諸將白廣恩髙汝利左光先梁甫先後降陳永福以先射中自成目保山顛不敢下自成析箭為誓招之亦降獨髙傑以竊自成妻走延安為李過所追折而東渡宜川絶蒲津以守自成兵所至無不克西安諸属城及延安所部州縣多望風降賊官吏以守死者惟蒲城知縣朱一統延安副將解文英縣丞姚啟崇白水知縣朱迴滼教諭魏嵗典史劉進中部知縣朱新鍱數人而盩厔鄉官袁養和髙陵鄉官李喬昆富平鄉官田時震朱崇徳三原鄉官焦源清焦源溥常道立喬巍隂鄉官陳嗣虞蒲城鄉官王道純魏國柱耀州鄉官宋師襄同州諸生劉長庚鄜州諸生齊大成膚施諸生掦繡徴並以不屈死自成既盡有西安延安之地乃詣米脂祭墓向為官軍所發焚棄遺骴築土封之求其宗人贈金封爵以去改延安府曰天保府米脂曰天保縣清澗曰天波府復以五百騎西掠鳳翔守將誘而殱之自成怒火發兵往攻典史董尚質間門迎賊知府唐時明被執至興平乘間自縊死属州縣亦叛降自隴州同知薛應珍實雞知縣唐夢鯤逰撃曽榮耀裨將陳竒傑袁明岐山鄉官牛養傑之外無死事者于是賊益恣甚且欽以偽檄定諸邊矣初自成剽掠十餘年未嘗有大志及席捲湖廣河南始萌窃據之意然地四達皆戰塲所得郡縣官軍旋復之至是既入秦秦藩富甲天下府庫貲千萬皆為所取又據河山百二之險遂不可制質實臨潼秦櫟陽縣漢為新豐唐為昭應宋改臨潼盩厔髙陵皆漢縣明並属西安府今因之華隂秦為秦寕縣漢改華隂明属華州以隸于西安府今改属同州府膚施漢縣三國魏廢隋復置明為延安府治岐山隋置明属鳳朔府今並因之秦王存樞愍王樉十一世孫存樞既降賊其妃劉氏死之馮師孔字景魯原武人郭宗振官四川恤刑郎中有政聲李承燦官山海闕逰撃薛國兼官寕夏守備偕弟諸生國華同撃賊死楊暄髙平人擢兵部主事未行賊至誓死守舉人王命誥間門迎賊暄被執索印不與罵賊死張馥夀光人蔡其城與楊暄分陴固守城陷死南企仲官南京吏部尚書致仕居益企仲族子官工部尚書削職歸居業企仲子官禮部祠祭司主事賊陷渭南責南氏餉百六十萬企仲年八十三矣遇害誘降居益居業皆不従遣兵擁之去加炮烙二人終不屈絶食七日死鄭君愛官衡州推官王佩珂官商邱教諭黄世清字澄海膝縣人賊至世清憑城守有奸民投賊至城下説降世清佯與語發礟斃之懸其首城上曰懐二心者視此士民皆效死礟矢盡繼以石石盡婦人掘街砌繼之城陷世清坐堂上麾其僕朱化鳳去化鳳願同死一家十三人皆遇害邵公坤與弟公巽公佐公齊公量同死一家死者十八人李本健與弟本深及本深之子同死吕元聲與母妻同死劉光先榆林人妻王氏投井死一家死難者五十餘人黄絅字季侯光州人崇禎七年賊陷光州子彞如督家僮巷戰罵賊死絅時以淮海兵備副使丁憂歸里方省墓獲免至是絅與妻王氏皆赴井死吳従義浙江山陰人章尚絅㑹稽人㳺之雲廣濟人楊于印保安州人祝萬齡咸寕人官河南右參政陶爾徳咸寧人官川北道參議周培忠咸寧人官隰州知州一門殉莭竇光儀長安人官懐慶通判徐芳聲咸寧人官芮城知縣徐芳敬長安人官儀封知縣徐應魁長安人為秦府右䕶衞旗官朱誼眔明宗室席増光南鄭人孫啟泰李光信王召俊陳瑞皆咸寕人光信妻熊氏召俊妻雷氏並殉莭瑞率二女孫沈紫潭湖死朱恩長安人與弟斗環姪語投井死承夀王存桑懐簡王尚灴十世孫也尚灴乃秦愍王樉第五子永樂初分封永夀陸之祺平湖人宋企郊乾州人鞏焴真寧人解文英寧夏人朱一統平定人由舉人為蒲城知縣賊至以死自誓或言他州縣甲榜者皆已納欵一統曰此事寧論資格即尋衙兵叛奪印趣迎降一統赴井死朱迴滼明瀋王支属由宗貢生為白水知縣賊潛入城猶乎弓射賊魏嵗沁州人朱新鍱明宗室賊使人持偽檄招降新鍱碎之歎曰城小無兵不能守計惟自靖耳令妻妾子女盡縊乃投繯死袁養和官雲南知縣李喬崑官霸州道參政田時震官山西參政朱崇徳字淳菴山東巡撫國棟父也贈右副都御史焦源清字湛一官宣府巡撫焦源溥源清従弟字涵一官大同巡撫常道立官河南巡撫喬巍官冀寧道參政與外弟王伯達僕王崇徳同死陳嗣虞官髙郵知州王道純官巡按山東御史魏國柱官睢州知州宋師襄官太常卿唐時明字爾極固始人薛應珍武進人時攝州事勒兵守城城陷詈賊死唐夢鯤畨禺人曽榮耀陳竒傑袁明與賊戰寳雞之賈村歿于陣本朝乾隆四十一年追諡南居益黄世清焦源漙忠烈馮師孔南企仲祝萬齡田時震焦源清常道立王道純忠莭薛國蕙楊暄南居業劉光先周培忠解文英朱一統朱迥滼烈愍郭宗振李承燦鄭君愛黄絅吳従義章尚絅崔爾達陶爾徳竇光儀徐号聲徐方敬朱新鍱袁養和李喬崑喬巍陳嗣虞魏國柱莭愍張馥等並入祠發眀明季諸藩擁貲自殖不以佐國計而以齎盜糧一旦冦至束手就戮者何可勝道至于由樻存樞廿汚偽職而宗社之辱為已極矣然由樻卒死泌陽其天良猶有未盡冺者特恨偷息須臾死非其所耳而存樞靦然人面且與晉王求桂従賊北行及其縋城欲上王家彦沮之曰二王降賊即賊也賊安得上夫豈非明太祖之支流苗裔而家彦顧叱之為賊亦可謂一字之誅嚴于斧鉞哉十一月李自成陷榆林兵備副使都任前總兵官尤世威等死之先是總兵王定従孫傳庭出闗大敗奔還榆林逺近遁震恐自成傳偽檄招降定懼詭言討套部率麾下兵去巡撫張鳳翼甫受命未至城中士馬單弱人心洶洶任亟集督餉員外郎王家録副將恵顯參將劉廷傑等與里居將帥尤世威等議城守衆推世威為主帥與延安綏徳相繼陷復遣使説降廷傑大呼曰長安雖破三邊如故賊皆中州子弟殺其父光而驅之戰必非所願榆林天下勁兵一戰奪其氣然後約寕夏固原為三師迭進賊可平也衆然其言乃歃血誓師簡卒乗繕甲伏各出私財佐軍守具未備賊將李過已引兵十萬抵城下廷傑募死士乞師套部師將至賊分兵劫之攻城甚力官軍力戰殺賊無算賊益衆来攻起飛樓逼城中矢石交至世威等戰益厲守七晝夜賊乃穴城置大礟轟之城遂破世威等猶督衆巷戰婦人豎子亦發屋瓦擊賊屍相枕藉既而力不支任家録死之故總兵侯世禄侯拱極王學書董學書及副摠兵潘國俊参將王榮不屈死一時同死者鄉官張雲鶚栁芳彭卿趙彬亦不屈死指揮崔重觀自焚死傅佑與妻杜氏自縊死中軍劉光祐罵賊死材官李耀善射矢盡自刎死李光裕趣家人死亦自刎張天敘焚其積貯自縊死千户賀世魁偕妻栁氏自縊死參將馬鳴莭聚妻子室中自焚死尤岱自殺于水西門李淮令妻女自縊率子殺賊自刎指揮鍾茂先殺妻子而自殺其以力戰死者里居則摠兵楊明副摠兵張發尤翟文王永祚參將李應孝在官則逰擊傅徳潘國臣李國竒晏維新陳二典劉芳馨文侯國都司吳繼武中軍楊正韡栁永年馬應舉守備尤勉惠漸賀大雷楊以偉指揮李文焜李文燦黄廷政千户黄廷困百户黄廷弼裨將文經國而副將常懐李登龍逰撃孫責尤養鯤守備白慎衡李宗叙亦以守材堡遇害諸生陳義昌沈濬沈演白拱極白含章罵賊死張連元連㨗李可柱胡一奎李廕祥自縊死賊怒廷傑勾套部磔之至死罵不絶口世威反故摠兵王世欽王世國李昌齡並被執縛至西安自成坐秦王府欲降之四人不屈自成曰諸公貲名將助我平天下取封侯可乎衆罵曰汝驛卒敢大言侮我自成笑前解其縛世欽唾曰驛卒母近前汚將軍衣自成怒皆殺之世威弟世祿亦死恵顯及都司郭遇吉同被執遇吉罵賊死賊惜顯勇繫至神本服毒死一賊之中婦人死義者數千人井中屍滿賊遂屠其城榆林為天下雄鎮兵最精將才最多然其地最瘠餉又最乏士常不宿飽乃慕義殉忠志不少挫無一屈身賊庭其忠烈又為天下最事聞帝嗟悼將大行褒恤國亾不果質實都任字宏若祥符人尤世威以崇禎八年與賊戰盧氏失利解任尋赴盧象昇軍自效象昇戰歿自免歸十五年以廷臣薦命與弟世祿赴京候調召對中左門復告歸世祿前任寧夏摠兵官張鳳翼堂邑人王家録黄岡人擢闗南僉事未行恵顯清澗人劉廷傑綏徳州人弟廷夔收兄殘骸瘞之亦自投閣死侯世祿以崇禎二年勤王兵潰坐遣戍後率子弟従軍敘功免戍還籍侯拱極世祿子前任山海摠兵官王學書前任天津防海摠兵官董學書都督一元子前任宣州摠兵官王榮前任彰徳參將子師易亦殉難張雲鶚前任户部主事栁芳前任隰州知州彭卿前任真安知縣趙彬前任湖廣監紀馬鳴莭前任安邊參將尤岱前任山海鐵騎營參將李淮前任西安參將鍾茂先官綏徳衛指揮楊明前任山海闗總兵官張發雲鶚子前任定邊副總兵尤翟文世成從弟前任靖邊副摠兵王永祚前任孤山副總兵李應孝前任西安參將妻女皆自縊死陳二典官榆林左營逰擊劉芳馨官右營逰擊吴繼武稷山人楊正韡官竒兵營逰擊為橅標中軍栁永年官榆林兵備副使中軍馬應舉官靖邊指揮與劉光祐栁永年同理副使中軍事恵漸清澗人官撫邊守備黄廷政世襲榆林衞指揮中礟死廷用廷弼其弟也文經國西寧人掌旗鼓督清街道王世欽前任山海左部總兵官王世國前任宣府栁溝總兵官李昌齡字玉川鎮畨衞人為延綏總兵官數有功以剛直罷徙居榆林郭遇吉官大器營都司劉本朝乾隆四十一年追諡尤世威忠剛都任恵顯廷傑侯世祿王世欽李昌齡忠烈董學書忠莭侯拱極王學書王榮馬鳴莭尤岱李淮鍾茂先楊明張發尤翟文王永祚李應孝傅徳潘國臣李國竒晏維新陳二典劉芳馨文侯間吴繼武楊正韡馬應舉尤勉恵漸賀大雷楊以偉李文鯤李文燦黄廷政常懐李登龍孫貴尢養焜白慎衡李宗敘王世國尤世祿郭遇吉烈愍王家録潘國俊張雲鶚栁芳彭卿趙彬崔重觀傅佑莭愍劉光裕等並入祠以吏部侍郎李建泰副都御史方岳貢並兼東閣大學士預機務建秦先官祭酒頗著輩望尋擢吏部侍郎及是命與岳貢以本官入直岳貢厯郡守監司並以亷能稱召對稱㫖超擢副都御史未幾有是命故事閣臣無冠都御史銜者岳貢一人而已質實李建秦曲沃人方岳貢字四長穀城人十二月周延儒有罪賜死延儒當國時薦用侯恂范志完督師皆債事又任文選郎中吳昌時交通内侍把持朝局延儒既去山東僉事雷縯祚糾范志完御史蔣拱宸劾吳昌時賊私鉅萬詞皆連延儒而中言昌時通中官李端王裕民洩漏機宻重賄入手輒預擬温㫖告人事頗有迹帝怒甚御中左門親鞫昌時折其脛無所承怒不解拱宸面訐其通内帝察之皆實乃下獄論死始有意誅延儒初薛國觀賜死人皆謂昌時致之其門人魏藻徳新入闇有寵恨昌時甚因與陳演共排延儒錦衣駱養性復騰蜚語帝遂命盡削延儒職遣緹騎逮入京師時舊輔王應熊被召延儒知帝怒甚宿留道中俟應熊先入冀為請帝知之應熊既抵京命之歸延儒至安置正陽門外古廟上疏乞哀不許法司以戍請同官申救皆不許及是昌時棄市勒延儒自盡籍其家質實蔣拱宸井徒人李自成陷甘州巡撫僉都御史林日瑞總兵馬爌等死之先是賊據西安分兵四出寧夏鎮兵遂戰殺賊數千賊乃去平涼甫聞警韓王及監司以下謀遁去知府簡仁瑞謁韓王曰殿下輕棄三百年宗社欲何之縱賊壓境甘涼諸鎮軍足相援必不能支同死社稷亦不辱二祖列宗王不従一夕其䕶衞卒大譟挾王及諸郡王宗室斬闗出脅仁瑞行仁瑞曰吾平涼守也吾去誰與守韓王遂奔慶陽官吏皆走未幾賊掠城下士民數人革降書乞僉名署印仁瑞怒叱責之正衣冠自經堂上義民朱傑軒孟尚池仰藥死平涼既陷属城皆降獨華亭教諭鄒邦榮訓導何相劉率諸生共守城城陷死莭時自成已大發兵攻陷榆林憤寧夏之敗悉鋭薄其城總兵官官撫民以城降中後衛城悉陷鄉官雍締闔家自焚死指揮彭凌雲百户鄧徳寧與義民王風木糾衆討賊謀泄死賊東勝犯慶陽圍數匝參議骰復興集衆守發礟石殺賊積屍滿濠久之勢不支拜辭其母聚妻妾子女于樓寘薪其上復乗城督戰城陷趣歸火其樓母亦投火死乃持鉄鞭走北門擊殺數賊遂自刎同時死難者推官靳聖居安化知縣袁繼發都司周家彦鄉官麻僖諸生石瑄李彞其属城則寧州知州董琬環縣鄉官朱國禎張宏逺亦殉難韓王亶塉被執以去將趍漢中扼于官軍不得入覆其所属城固縣知縣司五教訓導竇汝器鄉官張鳳翮方振寰貢生岳中衡遇害遂遣前鋒渡河入山西而其黨賀錦田見秀等徧掠三秦郡縣鞏昌之安定㑹寧秦安皆先後陷殺其知縣應昌士王垣朱呈瓘郷官劉躍龍貢生張國紞載天諸生王保民唐維新李洲楊毓秀陳周瑞楊中葵劉翹名楊九儀王璽薛三戒楊道泰髙朝鳳張大才監生陳周鼎張大韶移兵逼蘭州蘭州人開門迎賊賊結渡河涼州莊浪二衛降即進犯甘州日瑞聞賊至急西𦍑嚴兵以待而自率副將郭天吉等扼諸河干適嚴冬河冰合賊踏冰過直抵甘州城下日瑞入城戰且守大雪深丈許樹盡介角幹折手足皸瘃守者咸怨賊乗夜坎雪而登城陷執日瑞誘以官不従磔于市天吉及摠兵官馬爌副摠兵張舉歐陽衮劉國棟逰擊楊威趙宗禮萬峘撫標中軍哈維新都司姚世儒姜宏基髙登科監紀同知藍臺里居總兵官羅國傑趙宦逰擊李如璋指揮趙宗祝李棲鵾姚天寵張洪勲王嘉官趙寀知縣段自宏教諭童志道千總劉燦貢生張之衡保献書諸生張名禮張聖翼康國新童士楷丁倫康萬秋祁士英醫士費圉興吏員梁進法義民朱文選馬騰錦郭世潔並死之居民猶洶洶欲殺賊賊乃闔城扉殺其民四萬七千人三邊皆陷列城望風降惟西寧衞固守不克留賊將賀錦圍之賊已無復後顧憂竟長驅而東質實秦安宋納甲城金置秦安縣明属秦州以隸于鞏昌府今升秦州為直隸州縣仍属焉林日瑞字浴元詔安人馬爌蔚州人簡仁瑞字季麟榮縣人韓王亶塉憲王松十二世孫朱傑軒孟尚池皆平涼縣人傑軒閣門殉莭時有平涼馬夫者佚其姓名隨驛使殺賊被執寸磔死何相劉乾州人鄒邦榮援曽子居武城義欲避去相劉曰吾輩委質為臣安可以賔師自待邦榮乃與相劉同死雍締寕夏中衞人官懐仁知縣在籍彭凌雲鄧徳寧王風木皆寧夏衞人段復興字仲方陽穀人靳聖居字淑化長垣人擢刑部主事未行袁繼登應天人周家彦靖邊衞人率衆巷戰殺賊數百人自刎死麻僖慶陽衞人官太常少卿在籍石瑄李彞安化人董琬開州人朱國楨官照磨張宏逺官武邑典史並在籍司五教内黄人斬諸生為賊内應者以誓死守城陷為賊所磔竇汝器富平人張鳳翮官江西巡撫方振寰官福山知縣並在籍應昌士仙居人賊陷安定不屈死妻周氏亦遇害王垣四川人以安定知縣攝㑹寧縣事為賊所執脅令説後任令應昌士降及登垣朂以死守被害劉躍龍安定人官開封同知在籍張國紞戴天王保民康維新李洲楊毓秀陳周瑞楊中葵劉翹名楊九儀王璽薛三戒楊道泰髙朝鳳張大才陳周鼎張大韶皆安化人保民尤保泰弟保貞従孫宏毅周瑞弟周哲亦以捍賊被殺郭天吉榆林衞人張舉安邱人力戰死一家俱殉歐陽衮劉國棟楊威趙宗禮萬峘姜宏基髙登科皆廿州衛人衮焚其妻子巷戰死國棟闔門自焚死威為賊㫁侯絶脛死宗禮將火其家僕負其子金剛保以逃宗禮手刃之家無一人脱者峘従林日瑞殺賊為賊所執磔死藍臺光州人羅俊傑副總兵一貫子弟俊士亦殉莭李如璋同子起鳳祥鳳集鳳射賊皆被殺趙宗祝與子寀自刎妻妾亦投繯死李栖鵾張洪勲王嘉官皆巷戰力竭自刎姚天寵迎戰被殺家人皆自焚死段自宏官太湖知縣在籍捐貲餉士城陷自刎童志道官靖逺衞教諭在籍劉燦副摠兵國棟子天本朝乾隆四十一年追諡林日瑞馬爌段復興郭吉忠烈雍締彭凌雲靳聖居周家彦司五教劉躍龍張攀歐陽衮劉國棟楊咸趙宗禮萬峘哈維新姚世儒姜宏基髙登科羅俊傑趙宦趙宗祝李棲鵾姚天寵張洪勲王嘉官叚自宏烈愍簡仁瑞袁繼登董琬方振寰應昌士王垣藍臺李如墇莭愍朱傑軒等及平涼馬夫並入祠甲申崇禎十七年是年三月流賊陷京師五月福王由崧稱帝于南京我大清世祖章皇帝順治元年臣等謹按前代史家書法體例攸殊每於厯朝嬗代之際各存私見意有偏向轉至失實如續綱目於元順帝至正二十七年即分注明年元主北奔而繫以元亾去二十八年為洪武元年且順帝十五年明祖起兵後于元之政事即别書元以表異欽惟我皇上折衷至義悉凖大公於編纂通鑑輯覽時持平權特諭館臣以進退予奪闗繫萬世公論必斟酌衡始協明崇禎十七年明統猶存仍當大書紀嵗即福王偏立江左尚可比于宋代建炎之例年號仍従分注而提綱則書明字以别之直至蕪湖被執始大書明亾仰見聖人筆削必辨統存實祛史家之私議揭持世之閎綱以視春秋謹嚴古今一揆兹臣等奉命訂綱目三編敬遵我御㫖排纂義例昭然皇上垂法萬世之微意信可懸諸日月而不朽矣春正月朔李自成僭號于西安自成久覬尊號懼張獻忠為患既入秦通好獻忠獻忠厚幣遜詞以報之自成喜遂僭稱王改名自晟國號大順改元永昌追尊其曽祖以下加諡號以李繼遷為太祖設天佑殿大學士以牛金星為之増置六政府尚書等偽官以宋企郊為吏政尚書陸之祺為户政尚書鞏焴為禮政尚書張嶙然為兵政尚書復五等爵大封功臣侯劉宗敏以下九人伯劉體純以下七十三人子三十人男五十五人定軍制有一馬儳行列者斬之馬騰入田苗者斬之籍步兵四十萬馬兵六十萬令宏文館學士李化鱗等草檄馳諭逺近指斥乗輿有云君非甚暗孤立而焬竈恒多臣盡行私比黨而公忠絶少又云獄囚纍纍士無報禮之心征敘重重民有偕亾之痛見者無不扼腕是日大雨霾黄霧四塞有邱従周者都司吏也長不滿三尺素懐義憤伺自成出乗醉直至其前㦸手罵曰若一貧賤細民今妄據王府僭稱偽號逆天背理吾見汝屍之萬段也自成大怒立斫殺之質實張嶙然歸安人李化鱗韓城人李建泰自請督師𠞰賊許之自成初逼山西建泰慮郷邦被禍家富于貲可籍佐軍毅然有滅賊志常與同官言之㑹帝聞自成僭號大驚且嘆曰朕非亡國之君事事皆亾國之象祖宗櫛風沐雨之天下一朝失之何面目見于地下朕願督師親決一戰身死沙塲無恨但死不瞑目耳語畢痛哭陳演蔣徳璟諸輔臣請代俱不許建泰頓首曰臣家曲沃願出私財餉軍不煩官帑請提師以西帝大喜慰勞再三曰卿若行朕當仿古推轂禮遂加建泰兵部尚書賜尚方劒便宜従事行遣將禮以特牲告太廟帝御正陽門樓衞士東西列自午門扺城外旌旗甲仗甚盛内閣五府六部都察院掌印官及京營文武大臣俱侍立鴻臚賛禮御史糾儀賜之宴御席居中諸臣陪侍酒七行帝手金巵親酌建泰者三乃出手勅曰代朕親征建泰頓首謝且辭行帝目送之行數里所乗肩輿忽折衆以為不祥建泰以宰輔督師兵食並絀所擕止五百人甫出都聞曲沃已破家貲盡沒驚悸稱病日行三十里士卒多道亾至定興城門閉不納留三日攻破之笞其長吏抵保定賊鋒已逼知府何復同知邵宗元方守城建泰叩城求入宗元等不許建泰以尚方劒恐之或曰金御史毓峒監軍亟推出視信乃納之遂屯城中質實何復字見元平度人邵宗元字景康碭山人金毓峒保定衛人邵本朝乾隆四十一年何復追諡烈愍宗元金毓峒俱追諡忠烈南京地震是月庚寅鳳陽地震至是乙夘南京地又震以工部尚書范景文禮部侍郎邱瑜並兼東閣大學士預機務先是景文擢兵部添注左侍郎練兵通州通鎮初設兵皆召募景文綜覈有法治軍精嚴嘗請有司實行一條鞭法徭役歸之官民稍助其費供應平買不立官價名帝令永著為例繼拜兵部尚書以事削籍後起用改工部至是李建泰出督師景文遂以本官與瑜同入閣輔政帝曰朕知卿久今急而用卿恨晚卿尚勉之景文請釋繫獄張國維等帝立従其言李自成漸逼京師有請帝南幸者命集議閣中景文言固結人心堅守待援而已此外非臣所知帝是其言質實請釋繫獄張國維等崇禎十六年我大清兵入幾輔張國維檄趙光抃拒墿山八總兵之師皆潰言者詆國維乃觧職下獄至是范景父請釋之張獻忠入四川獻忠自荆州趍蜀陷夔州石柱土官秦良玉馳援兵寡敗歸献忠至萬州水漲留屯三月已破涪州進陷佛圗闗時四川巡撫陳士竒已謝事駐重慶或勸之去士竒不可與副使陳纁知府王行儉知縣王錫等竭力拒守賊扺城下撃以滚礟賊死者無數黑夜宻雲四布賊穴地轟城城遂陷士竒等皆被執士竒大罵賊縛于教塲時瑞王常浩避闖賊自漢申来奔亦與焉指揮顧景泣告獻忠曰寧殺吾無害帝子賊怒遂害王并殺景天忽無雲而雷者三賊有震者献忠仰天訴曰我殺人何與天事用大礟向天叢擊俄晴霽遂肆慘僇士竒等罵不絶口而死質實按秦良玉夔州敗歸慷慨語其衆曰吾兄弟二人皆死王事吾以一孱婦人蒙國恩二十年今不幸至此其敢以餘生事逆賊哉悉召所部將曰有従賊者族無赦乃分兵守四境後賊招土司獨無敢至石柱者瑞王常浩神宗第五子天啟七年之藩漢中及冦逼將吏不能救乞師于蜀遂奔重慶隴西士大夫俱挈家以平從張獻忠䧟重慶被執遇害従死者甚衆陳士竒字人漳浦人陳纁鍾祥人王行儉字質行宜興人王錫新建人顧景里系無考本朝乾隆四十一年追諡陳士竒王行儉王錫忠烈陳纁莭愍顧景烈愍二月李自成陷太原别遣將犯畿南陷真定自成渡河連破蒲州汾州知府侯君捛知汾陽縣劉必達俱死之遂攻太原先是蔡懋徳出師平陽以疲兵三千當百萬狂冦而太原洶洶晉王又手檄趣懋徳還省懋徳于十六年十二月十八日遂去平陽二十日賊抵河津副將陳尚智失守奔還平陽二十二日賊拔平陽尚智出走二十八日懋徳還太原至是山西巡按御史汪宗友上言曰晉河二千里平陽居其半撫臣懋徳不待春融冰泮遽爾平陽返斾賊即于明日報渡矣隨行馬步千人即宜倍道西向召集陳尚志叛卒移檄各路防兵援𠞰乃不發一矢終嵗至省匝月餘郡皆失是誰之過歟有詔奪官候勘時陳尚志叛降于賊于是懋徳誓師于太原官吏軍民咸在懋徳哭衆皆哭罷官命適至或請出城候代懋徳不可曰吾已辨一死遂調兵堅守賊薄城下遣部將牛勇朱孔訓王永魁等出戰死之懋徳草遺表調部將張雄守大南門雄已縋城降賊語其黨曰城東南角樓火器火藥皆在我下即焚樓夜中火起風轉烈守者皆散賊遂登城懋徳北面再拜出遺表付人間道達京師即自刎麾下持之時中軍副摠兵應時盛請下城巷戰顧懋徳曰上馬懋徳上馬時盛持矛突殺賊數十人既而賊騎充斥時盛呼曰出西門懋徳遽下馬曰我當死封疆諸君自去衆復擁懋徳至水西門懋徳叱曰欲陷我不忠耶復下馬據地坐時盛已出城殺妻子還顧不見復斫門入語懋徳曰請與公俱死懋徳就縊未絶時盛釋甲加其肩乃絶時盛取弓絃自經死其同時自刎者為牛勇朱孔訓王永魁等其餘官吏則有布政使趙建極罵賊死副使毛文炳被執不屈死其妻趙氏妾李氏陳氏俱投井死參議藺剛中僉事畢拱辰知府孫康周同知李一清長史范志泰副將恵光祚俱不屈死都同張宏業自縊死其妻趙氏子凝秀俱殉死指揮韓似雍千户王徳新晉府典仗官樊子英等皆城陷殉莭死賊入城脅晉王求桂執之遂連陷黎城臨晉潞安執瀋世子進攻代州總兵周遇吉力拒食盡退守寧武賊遂抵故闗分兵趍真定檄總督徐標降標斬其使率衆拒守真定知府邱茂華與中軍謝加福害之以城降賊賊乃攻彰徳趙王常㳛亦降質實臨晉晉桑泉地隋置桑泉縣唐分置温泉縣後改臨晉縣宋金仍舊元以虞鄉縣省入明属平陽府今属蒲州府故闗在井陘縣西界接山西平定州晉王求桂晉㳟王棡十世孫賊脅入北京後不知所終瀋世子瀋簡王模後簡王封潞故瀋府在潞安趙王常㳛趙王髙燧後萬厯時穆王常清薨世子由松前卒弟夀光王由桂子慈􅀈嗣薨無子又以穆王弟常㳛嗣侯君招商州人劉必達陜西山陽人蔡懋徳字公虞崑山人應時盛遼東人牛勇朱孔訓王永魁里系無考趙建極河南永寧人毛文炳鄭州人藺簡中字坦生陵州人畢拱辰字星伯掖州人孫康周字晉侯安邱人范志泰虞城人張宏業忻州人徐標字凖明濟寧州人烈本朝乾隆四十一年追諡蔡懋徳忠恪應時盛忠劉必達趙建極畢拱辰孫康周等俱烈愍侯君招毛文炳藺剛中范志泰張宏業韓似雍等俱節愍徐標忠莭牛勇朱孔訓王永魁王徳新樊子英等俱入祠下詔罪已詔畧曰朕嗣守鴻緒十有七年深念上帝陟降之威祖宗付託之重宵旦兢惕㒺敢怠荒乃者災害頻仍流氛日熾赦之益驕撫而輒叛甚有受其煽惑頓忌敵愾者朕為民父母不得卵翼之民萬朕赤子不得懐保之罪非朕躬誰任其責所以使民罹鋒鏑蹈水火殣量以壑骸積成邱者皆朕之過也使民輸芻輓粟居送行齎加賊多無藝之征預支有稱貸之苦耇又朕之過也使民室如懸磬田卒汚萊望烟火而無門號冷風而絶命者又朕之過也使民日月告凶旱潦薦至師旅所處疫癘為殃上干天地之和下叢室家之怨者又朕之過也至于用大臣而不法用小臣而不廉言官植黨而清議不聞武將驕懦而軍功不奏皆由朕撫馭失道誠感未孚中夜此心跼蹐無地朕自今痛加創艾深省夙愆要在惜人才以培元氣守舊制以息煩囂行不忍之政以收人心蠲額外之科以養民力其罪廢諸臣有公忠正直亷潔幹才尚堪用者不拘文武吏兵二部確覈推用草澤豪傑之士有恢復一郡一邑者授官世襲即陷没脇従之流能舍逆反正率衆来歸許赦罪立功能擒闖献二賊仍予封侯之賞忠君愛國人有同心雪恥除凶誰無公憤尚懐祖宗之厚凙助成厎定之大勲思克厥愆厯告朕意于是發帑金五千治守具左都御史李邦華宻請南遷及太子撫軍江南皆不報邦華又請定永二王分封太平寧國二府拱䕶兩京帝得疏意動繞殿行且讀且嘆將行其言㑹帝召對羣臣中允李明睿疏言南遷便給事中光時亨以倡言泄宻糾之帝曰國君死社稷正也朕志定矣遂罷邦華䇿不議及賊勢急復遣内臣髙起潛杜勲等分監邊鎮及畿輔要害質實李明睿南昌人光時亨桐城人發明明事至此存亾在于呼吸矣而猶遣内臣監邊鎮守畿輔一切要地昇之宵小于是若輩専守城事百官皆不敢問雖有忠義之士且為掣肘而莫可如何卒之賣國售奸如杜勲杜之秩等即以所守闗城降賊而曹化淳旋復開門迎賊觀勲勸求禪位及我輩富貴固在之言可勝痛恨哉夫有明蠹政莫甚于信用内臣監軍鎮守覆轍纍纍莊烈際危急之秋尚不惜躬蹈其敗可謂至死不悟者矣歐陽修五代史傳諭有云自古宦者之禍深矣明者未形而知懼暗者患及而猶安焉至於亂亾而不可悔也信夫陳演罷演與魏藻徳排去周延儒演遂為首輔帝倚信演臺省附延儒者盡趍演門當是時國家累卵中外舉知其不支演庸才寡學一無籌畫顧以賄聞及李自成陷陜西逼山西廷議撤寧逺總兵吳三桂兵入守山海闗䇿應京師帝意亦然之演持不可後帝決計行之三桂始用海船渡遼民入闗往返者再而自成已陷宣大矣演懼不自安引疾求罷詔許之賜道里費五十金彩幣四表裏乗傳行演既謝事薊遼總督王永吉上疏力抵其罪請置之典刑演入辭自言佐理無狀帝怒曰汝一死不足蔽辜叱之去演貲多不能遽行遂留京師李自成陷寧武闗總兵官周遇吉力戰死之初遇吉駐代州憑城固守而潛出兵擊賊連數日殺賊無算㑹食盡援絶退保寧武賊亦踵至大呼五日不降者屠其城遇吉四面發大礟殺賊萬人火藥且盡外圍轉急或請甘言紿之遇吉怒曰若輩何怯耶今能勝一軍皆忠義即不支縛我予賊于是設伏城内出弱卒誘賊入城急下閘殺數千人賊用礟攻城圯復完者再傷其四驍將自成懼欲退其將曰我衆百倍于彼但用十攻一更畨進蔑不勝矣自成従之前隊死後復繼官軍力盡城遂陷遇吉巷戰馬蹶徒步跳盪尚格殺數十人身被矢如蝟竟為賊執大罵不屈賊懸之髙竿叢射殺之遇吉妻劉氏素勇健率婦女數十人據山巔公廨登屋而射每一矢斃一賊賊不敢逼縱火焚之闔家盡死城中士女無降者自成集衆計曰此去厯大同陽和宣府居庸皆有重兵倘盡如寧武柰何不如且還俟再舉而大同總兵姜瓖宣府總兵王承允降表相繼至自成大喜遂長驅而東質實周遇吉年本朝乾隆四十一追諡忠武三月大同總兵官姜瓖宣府監視太監杜勲俱降于李自成自成至大同巡撫衞景瑗不知瓖已降賊歃血要與共守瓖布訛言謂衞巡撫秦人將應賊代王果疑之不見景瑗㑹景瑗有足疾不時出兵事瓖主之瓖兄瑄故昌平總兵也勸瓖降賊瓖慮其下不従人犒之銀言勵守城將士代王信之諸郡王分門守瓖每門遣卒二百人助守至三月朔賊抵城下瓖即開門迎賊入紿景瑗計事景瑗乗馬出始知其變也自墜馬下賊執之見自成自成欲官之景瑗據地坐大呼皇帝而哭賊義之曰忠臣也不殺景瑗猝起以頭觸階石血淋漓賊引出顧見瓖罵曰反賊與我盟而叛神其赦汝耶賊使景瑗母勸之降景瑗曰母年八十餘矣當自為計兒國大臣不可以不死母出景瑗謂人曰我不罵賊者以全母也自縊于僧寺賊嘆曰忠臣移其妻子空舍戒毋犯殺代王傳㸄及其宗室殆盡分巡副使朱家仕盡驅妻妾子女入井而已従之死者十有六人督儲郎中徐有聲山隂知縣李倬亦死之諸生李若蔡亦自經死賊至宣府巡撫朱之馮集將吏于城樓歃血誓死守懸賞格勵將士而人心已散監視中官杜勲且與總兵王承允争先納欵矣見之馮請以城下賊之馮大罵曰勲爾帝所倚信特遣爾以封疆属爾爾至即通賊何面目見帝勲不答笑而去俄賊且至勲蟒袍鳴騶郊迎三十里外將士皆散之馮登城太息見大礟語左右為我發之黙無應者自起爇火則礟孔丁塞或従後掣其肘之馮撫膺歎曰不意人心至此仰天大哭賊至城下承允開門納之訛言賊不殺人且免徭賊則舉城譁然皆喜結彩焚香以迎左右欲擁之馮出走之馮叱之乃南向叩頭草遺表勸帝收人心厲士莭自縊而死賊棄屍濠中濠旁犬日食人屍獨之馮無損也同日死者督糧通判朱敏泰諸生姚時中副將寗龍及繫獄總兵官董用文副將劉九卿及里居知縣申以孝其他婦女死義者又十餘人質實代王傳㸄簡王桂十世孫衞景瑗字仲玉韓城人朱家仕河州人徐有聲金壇人李倬陜西人李若蔡山隂人朱之馮字樂三大興人朱敏泰太原人姚時中保安人寗龍董用文劉九卿里系無考申以孝宣府人本朝乾隆四十一年追諡衞景瑗朱之馮忠莭徐有聲烈愍朱家仕李倬李敏秦寗龍董用文劉九卿申以孝俱莭愍李若蔡姚時中入祠蔣徳璟罷延儒為相各樹門户徳璟無所比性頗直黄道周召用劉宗周免罪徳璟之力居多開封久被圍自請馳督諸將戰優詔不允嘗進御覽備邊冊凡九邊十六鎮新舊兵食之數及屯鹽引運漕糧馬價悉志焉已進諸邊撫賞冊及御覽簡明冊帝深嘉之諸邊士馬報户部者浮兵部過半耗糧居多而屯田鹽引民運每鎮至數十百萬一聴之邊臣天津海道輸薊遼嵗豆米三百萬惟倉場督臣及天津撫臣出入部中皆不稽覈徳璟語部臣合部運津運各邊民運屯鹽通為計盡餉額可足而加𣲖之餉可裁因復條十事以責部臣然卒不能盡釐也一日召對帝語及練兵徳璟曰㑹典髙皇帝教練軍士一以弓弩刀鎗行賞罰此練軍法衞所總小旗補役以鎗勝負為升降凡武弁比試必騎射精嫻方准襲替此練將法豈至今方設兵帝為悚然又言祖制各邊養軍止屯鹽民運三者原無京運銀自正統時始有數萬迄萬厯末亦止三百餘萬今則遼餉練餉并舊餉計二千餘萬而兵反少于往時耗蠹乃如此又言文皇帝設京衞七十二計軍四十萬畿内八府軍二十八萬又有中部大寧山東河南班軍十六萬春秋入京操演深得居重馭輕之勢今皆虚冒且自来征討皆用衞所官軍嘉靖末始募兵遂置軍不用至加派日増軍民兩困願憲章二祖修復舊制帝是之而不果行户部主事蔣臣請行鈔法言嵗造三千萬貫一貫價一兩嵗可得銀三千萬兩帝特設内寳鈔局晝夜督造募商發賣無一人應者徳璟言百姓雖愚誰肻以一金買一紙帝不聴又因局官言貴取桑穰二百萬斤于畿輔山東河南浙江徳璟力争獲免先以軍儲不足嵗僉畿輔山東河南富戸給值令買米豆輸天津多至百萬民大擾徳璟因召對面陳其害帝即令擬諭罷之至是賊埶漸逼李建泰自保定疏請南遷帝召廷臣于平臺諭曰國君死社稷朕將焉往徳璟與少詹事項煜請命太子往江南帝不答給事中光時亨追論練餉之害徳璟擬㫖向來聚斂小人倡為練餉致民窮禍結誤國良深帝不悦詰曰聚斂小人為誰且曰朕非聚斂但欲練兵耳徳璟曰陛下豈肻聚斂然既有舊餉五百萬新餉九百餘萬復増練餉七百三十六萬臣部實難辭責且所練兵馬安在薊督練四萬五千今止二萬五千保督練三萬今止二千五百保鎮一萬今止二百若山永兵七萬八千薊宻兵十萬昌平兵四萬宣大山西及陜西三邊各二十餘萬一經抽練原額兵馬俱不問并所抽亦未練徒増餉七百餘萬為民累耳帝曰今已并三餉為一何必多言徳璟曰户部雖并為一州縣追比仍是三餉帝震怒責以朋比徳璟力辯諸輔臣為申救尚書倪元璐以鈔餉乃户部職自引咎帝意稍解明日徳璟具疏引罷帝雖旋罷練餉而徳璟竟去位徳璟聞山西陷未敢泰行辭朝復即移寓外城無何都城陷得逸去而李建在保定賊亦尋至其部下為賊内應城遂陷知府何復同知邵宗元御史金毓峒及中官方正化鄉官張羅俊等皆不屈死建泰竟降賊質實張羅俊字子仲清苑人愍本朝前乾隆四十一年追諡烈餘見封總兵官吳三桂唐通左良玉黄得功俱為伯詔封三桂平西伯通定西伯良玉寧南伯得功靖南伯並徴諸鎮兵俱入援李自成犯居庸守將唐通太監杜之秩以闗降通先以兵入衞命與杜之秩同守居庸已而自成至通與之秩俱降賊遂入闗陷昌平焚十二陵總兵官李守鑅力戰死始自成欲知京師虚實往往遣其徒輦重貲賈販都市又令充部院掾吏探刺機宻朝廷有謀議千里立馳報及是昌平已陷兵部發騎偵探輒被勾去無一還者賊逰騎至平則門都人猶未知也帝召問羣臣莫對有泣者頃之賊還攻九門門外先設三大營賊至悉降守陴者寥寥益以内侍内侍専守城事百司皆不敢問十八日丙午自成設座彰義門外降賊太監杜勲侍呼城上人請入城見帝監視太監曹化淳等縋之入内勲盛稱賊勢請帝自為計帝怒叱之出手書親征詔召駙馬都尉鞏永固以家丁䕶太子南行永固叩頭曰親臣不蔵甲臣安知有家丁相向涕泣而已質實平則門輟耕録元京師城十一門其正西曰和義西之右曰肅清西之左曰平則按明猶稱阜成門為平則門仍元舊也九門明正統十年定九門南曰正陽南之左曰崇文右曰宣武北之東曰安定西曰徳勝東之北曰東直南曰朝陽西之北曰西直南曰阜成彰義門金之正西門新城築于明嘉靖中其西門曰廣寧而都人至今以彰義呼之李守鑅里系無考本朝乾隆四十一年追諡烈愍京師陷帝崩杜勲既叱出曹化淳等復縋之下城勲顧謂曰吾輩富貴固在也及日晡化淳遂啟彰義門賊盡入帝出宫登煤山望見烽火徹天嘆息曰苦我民耳徘徊久之還宫命分永太子永定二王于周奎田宏遇第以劒斫長平公主嘆曰汝何故生我家趣皇后自盡后即承㫖自經又斫殺妃嬪數人十九日丁未昧爽内城亦陷鳴鐘集百官無至者帝乃復登煤山書衣襟為遺詔曰朕涼徳藐躬上干天咎致逆賊直逼京師皆諸臣誤朕朕死無面目見祖宗自去冠冕以髪覆面任賊分裂無傷百姓一人以帛自縊于山亭遂崩太監王承恩縊于側李自成氊笠縹衣乗烏駁馬入承天門偽太學士牛金星偽尚書宋企郊等騎而従登皇極殿下令大索帝后期百官三日朝見已知帝后崩自成命以宫扉載出盛栁棺置東華門外百姓遇者皆掩泣尋遷殯昌平州州之士民率出錢募夫塟之田妃墓内斬蓬藋而封之一切簡率時臨危殉難者文武諸臣則有大學士范景文尚書倪元璐左都御史李邦華協理京營兵部右侍郎王家彦刑部右侍郎孟兆祥右副都御史施邦曜大理寺卿凌義渠太常少卿吳麟徴右庶子周鳳翔左諭徳馬世竒左中允劉理極檢討汪偉太常寺丞中佳允給事中吳甘來御史王章陳良謨兵部郎中成徳吏部員外郎許直兵部員外郎金鉉御史趙譔以及指揮同知劉宗嗣都督僉事賀讃工部員外郎王鍾彦鎮撫司僉事李若璉削籍吏部尚書李遇知兵部侍郎王家禎家居按察副使顧國縉工部尚書何應瑞都指揮僉事魏師貞參將髙鍟工科給事中尹洗郎中周之茂通判張維綱守備楊儒秀張大同萊州推官張力指揮同知許達允順天通判張疑和御史俞志虞陳純徳員外郎甯承烈范方中書宋天顯光祿寺署丞于騰雲都督方履泰千户李國禄指揮同知李若珪濮州知州馬象乾大同總兵朱三樂密雲副總兵吕應蛟保定左衞指揮文運昌劉洪恩戴世爵劉元靖吕九璋李一照李一廣光禄寺少卿張羅彦邠州知州韓東明南宫知縣彭士宏中書王永隆指揮使蕭偲郎中菖凝秀冦可教主事楊㑹英沈邱知縣李昌齡太醫院吏目楊元真定督標逰擊陳三㨗虎賁左衞叅軍李正光右都督劉繼祖指揮馬國城郎中張檉芳員外張三傑指揮張養所髙甲虎賁右衞指揮使劉一松張國維主事陳貞達都指揮梁徳宏榮陽知縣徐兆任樂亭知縣施溥博樂知縣徐有度平涼同知郭寅兵馬司指揮姚成等共八十餘人布衣殉難者湯文瓊最著而慕義蹈死不下百餘人勲戚則宣城伯衛時春恵安伯張慶臻彰武伯楊崇猷寧逺伯李尊祖彭城伯張光祖定逺侯鄧文明鎮逺侯顧肇迹西寧侯宋裕徳清平侯吴遵周陽武侯薛濓恭順侯吳汝徴新城侯王國興新樂侯劉文炳駙馬都尉鞏永固左都督劉岱皆同時死又宫人魏氏費氏亦殉難死賊既入城汙殿庭越三日己酉昧爽成國公朱純臣大學士魏藻徳陳演率文武百官入賀皆素服坐殿前自成不出羣賊争戲侮為椎背脱帽或舉足加頸上相笑樂百官懾伏不敢動陳演勸進不許封太子為宋王放刑部錦衣衛繫囚自成自居西安時建置官吏至是益盡改官制六部曰六政府同官曰從事六科曰諫議十三道曰直指使翰林院曰宏文館太僕寺曰驗馬寺巡撫曰節度使兵備曰防禦使知府州縣曰尹曰牧曰令召見朝官自成南向坐金星宗敏企郊等左右雜坐以次呼名分三等授職自四品以下少詹事梁紹陽楊觀光等無不汚偽命三品以上獨用故侍郎侯恂其餘勲戚文武諸臣奎純臣演藻徳等共八百餘人送宗敏等營中拷掠責賕賂至灼肉折脛備諸慘毒藻徳遇馬世竒家人泣曰吾不能為若主今求死不得賊又編排甲令五家養一賊大縱滛掠民不勝毒縊死相望徴諸勲戚大臣金金足輒殺之焚太廟神主時賊黨䧟保定李建泰降畿内府縣悉附山東河南編設官吏所至無違者自成謂真得天命金星率賊衆三表勸進乃從之令撰登極儀諏吉日及自成升御座忽見神人長數丈手劒怒視座下龍爪鬛俱動自成恐亟下鑄金璽及永昌錢皆不就聞山海闗縂兵吳三桂起兵乃謀歸陜西質實臣等謹按明史李自成傳有遷明太祖神主于帝王崩一事考自成于甲申三月入京大縱剽掠即焚明太廟神主肄為毒虐安知有遷主之禮四月我大清兵至山海闗自成出拒敗潰奔還京師始僣號次日即西走更無暇及此是特稗野所載明史採用之世祖章不足据信且恭查我王定燕京六月遣大學士馮銓皇帝實録五月睿親祭故明太祖及諸帝且為文祭告以明太祖神牌入帝王廟是移主之事至睿親王定燕京後乃行之仰聖朝見我勝國雖屋社之餘猶念其曾有天下特遣官優禮祀告移置以禮俾得崇祀千秋如天之度超軼前代而傳聞之不足信亦于此可見矣煤山北上門之南曰夀皇殿殿之東曰永夀殿曰觀徳殿殿之南則萬嵗山俗所云煤山也田宏遇陜西人田貴妃父貴妃先卒塟于鹿馬山長平公主年十六帝選周顯尚主將婚以冦警暫停及城陷帝入夀寧宫主牽帝衣哭帝曰汝何故生我家以劍揮斫之㫁左臂又所昭仁公主于昭仁殿越五日長平主復甦本朝順治二年上書詔言九死臣妾跼蹐髙天願髠緇空王稍申㒺極有加不許令顯復尚故主土田邸第金錢車馬錫予主涕泣踰年卒范景文當城陷趍至宫門知駕出就道旁廟草遺疏復大書曰身為大臣不能滅賊雪恥死有餘恨遂至演象所拜辭闕墓赴㕠塔寺旁古井死景文死時猶謂帝南幸也其妾聞之即自經死福王時贈太傅元本朝順治九年追諡文忠倪元璐字玉汝上虞人璐聞難整衣冠拜闕大書几上曰南都尚可為死吾分也勿以衣衾殮暴我屍聊志吾痛遂南向坐取帛自縊而死一門殉莭者十三人福王時贈少保吏部尚書城本朝順治九年追諡文正李邦華時率諸御史登羣奄拒之不得上外城陷走宿文信國祠及内城復陷乃揖信國曰邦華死國難請従先生于九京作絶命詞投繯而死福王時贈太保吏部尚書時本朝順治九年追諡忠肅王家彦字開美莆田人廷臣分門守家彦守安定門帝手勅兵部尚書張縉彦登城察視家彦従中官固拒示之手勅問杜勲安在曰去矣秦晉二王欲上城家彦曰二王降賊即賊也賊安得上頓足哭偕縉彦詣宫門請見不得入黎明城陷家彦投城下不死自縊于民舍遭賊焚殘一臂僕收其餘體焉福王時贈太子太保兵部尚書本朝順治九年追諡忠毅孟兆祥字允吉交河人兆祥奉命分守正陽門城陷兆祥曰社稷已覆吾將安之自經門下子章明字綱宜甫成進士兆祥揮之曰我死汝可去對曰君亾父死我何生為乃投繯于父側兆祥妻吕氏章明妻王氏同日並縊福王時贈兆祥刑部尚書章明河南道御史賊本朝順治九年追諡兆祥忠靖章明貞孝施邦曜當薄近郊邦曜語兵部尚書張縉彦檄天下兵勤王弗省邦曜太息去城陷趍長安門聞帝崩慟哭曰君殉社稷臣子可偷生哉即解帶自經僕救之復蘇恨曰是兒誤我賊滿衢巷不得還邸舍望門求縊輒為居民所麾乃命僕市信石雜燒酒即途中服之血迸裂而卒福王時贈太子少保左都御史本朝順治九年追諡忠愍凌義渠得帝崩問負牆哀號以首觸柱流血被面門生勸無死義渠厲聲曰當以道義相朂何姑息為揮使去據几端坐乃取平生所好書盡焚之曰無被賊手汚也服緋正笏向闕拜復南向稽首作書辭父自繫奮身絶吭而死福王時贈刑部尚書麟本朝順治九年追諡忠介吳麟徴字聖生海鹽人徴奉命守西直門門當賊衝賊詐為勤王兵求入中官欲納麟徴不可以土石塞其門募死士縋城襲擊多斬獲及城陷入道旁祠作書訣家人令殮用角巾青衫覆以單衾以志哀痛自經死方賊陷山西時薊遼總督王永吉請撤寧逺吳三桂兵守闗門即京師警旦夕可援天子下其議麟徴深以為然獨疏奏數百言不省及烽火徹大内帝始悔不用麟徴言城破時八門齊啟獨西直門堅塞不能通後發掘乃開福王時贈兵部右侍郎都本朝順治九年追諡貞肅周鳳翔字儀伯山隂人城陷或有傳帝南幸者鳳翔趍入朝見魏藻徳陳演等羣入而自成方據御座鳳翔至殿前大哭急従左掖門出賊亦不問歸至邸作書辭二親題詩壁間自經死福王時贈禮部右侍郎本朝順治九年追諡文忠馬世竒當城陷世竒方早食投箸起問帝安在東宮二王安在或言帝已出城或言崩或又言東宫二王被執世竒曰吾不死安之其僕曰如太夫人何世竒曰正恐辱太夫人耳作書别母肅衣冠捧所署司經局印望闕再拜自經妾李氏朱氏並先縊死福王時贈禮部右侍郎畿本朝順治九年追諡文肅劉理順字復禮杞縣人輔告警理順疏陳作士氣矜窮民簡良吏定師期信賞罰招脅従六事及賊犯京師急守卒缺餉理順詣朝房語諸執政急請帑衆唯唯理順太息歸捐家貲犒守城卒僚友問進退正色曰存亾視國尚須商酌耶城陷理順與妻萬氏妾李氏子孝廉并婢僕數人闔門縊死羣盜多中州人聞其死入唁曰此吾鄉之劉狀元也居鄉多厚徳何􅃍死羅拜號泣而去福王時贈詹事本朝順治九年追諡文烈汪偉字叔度休寧人城陷偉語繼妻耿氏善撫幼子耿泣曰我獨不能従公死乎因以幼子属其弟衣新衣上下縫引刀自刎不殊復投繯而死偉欣然曰是成吾志移其屍于堂援筆書于壁曰日講官翰林院檢討汪偉同繼妻耿氏死莭處乃自經福王時贈少詹事佳本朝順治九年追諡文毅申佳允字孔嘉永年人允出近畿閲馬聞李自成破居庸闗流涕曰京師必不守矣貽子涵光書曰吾受國恩當以死報城陷冠帶辭母䇿馬至王恭厰將投井従者持之下馬旁見灌畦巨井急躍入僕呼號欲出之佳允亦呼曰告太夫人有子作忠臣勿遇傷也遂死福王時贈太僕少卿昌本朝順治九年追諡端愍吳甘来字受和江西新人帝嘗詰户部餉額甘来曰臣科與户曹表裏餉可按籍稽也臣所慮者兵聞賊而逃民見賊而喜恐非無餉之患而無民之患宜急輕賊税收人心帝頷之及聞變疾走皇城不得入返作絶命詞盡取疏草焚之曰賊冦縦横徒揚議論無益毫末留之罪彌大正衣冠北向拜投繯死福王時贈太當卿本朝順治九年追諡莊介王章字漢臣武進人章與給事中光時亨守阜成門賊入城時亨要章走章厲聲曰事至此猶惜死耶時亨曰死此與士卒何别入朝訪上所在不獲則死死未晩也章従之與時亨並馬行俄賊哭至疾呼下馬時亨倉皇下跪乞降章掦鞭不顧叱曰吾視軍御史也誰敢犯賊刺章股墮章罵賊不絶口賊怒攅槊刺殺章而去抵暮其僕覔屍猶一手據地坐張口怒目如叱賊狀福王時贈大理寺卿本朝順治九年追諡莭愍陳良謨字士亮鄞人良謨母老己未有子而妾時氏方娠乃謂之曰吾且死汝幸妊身急歸父母家時泣曰公殉國妾不當殉公耶倘不幸有他不如無子良謨曰能如是乎時乃先就縊時京師人年十八侍良謨才百三日耳時既死良謨望闕拜亦自縊福王時贈太僕卿本朝順治九年追諡恭潔成徳字元升霍州人城破不知帝所在旁皇㕔事既超至午門見兵部尚書張縉彦自賊所出徳以頭觸縉彦胷且詈之俄間帝崩痛哭持雞酒奔奠梓宫前觸地流血賊露刃脅之不為動奠畢歸家有妹年方二十餘因家難未嫁徳顧之曰我死汝何依妹請先死徳稱善哭而視其縊繼室霍氏請繼之徳痛不及視入别其母哭盡哀出而自縊母見子女及子婦皆死亦投繯死闔門死難福王時贈光祿卿本朝順治九年追諡介愍許直字魯若如臯人賊薄都城約同官出貲饗士為死守計及城陷傳帝南狩直將往従見賊騎塞道輒返曰四方兵戈駕將焉往已知帝崩一慟幾絶客以七十老父為解直曰不死辱及所生乃作書寄父賦絶命詩六章闔户自經死福王時贈太僕卿本朝順治九年追諡忠愍金鉉字伯玉武進人鉉初聞大同陷疏曰宣大京師北門大同陷則宣府危宣府危則大事去請急撤回中官杜勲専任巡撫朱之馮勲二心偵事而馮忠懇可属大事不報及京城破慟哭急趍入朝見宫人狂奔出知帝已崩解牙牌北向四拜投金水河従者力挽之鉉怒奮臂躍入死母章妻王弟錝並殉難死福王時贈太僕少卿府本朝順治九年追諡忠潔衞時春頡六世孫掌後京師陷懐鐵卷闔門十七人皆赴井死府本朝順治九年追諡忠穆張慶臻騏之後掌都督京師陷召親黨盡散貲財闔家自焚死本朝順治九年追諡忠毅鞏永固字洪圖宛平人尚樂安公主都城陷時公主已斃未塟永固以黄繩縛子女五人繫柩旁曰此帝甥不可汚賊手舉劒自刎闔家焚死本朝順治九年追諡忠烈劉文炳字洪筠宛平人以孝純皇太后弟子嗣封侯太后帝生母也文炳素與太學生申湛然布衣黄尼麓講明忠義賊攻西直門勢益急尼麓踉蹌告文炳宜自為計時太后母瀛國太夫人尚在文炳與其母杜氏計太夫人篤老不可俱燼請匿之湛然家杜氏曰太夫人得所我與若妻妹俱死耳外城陷文炳馳至崇之門殺賊數十人馳歸第母妻及其妹已俱縊死家人共焚樓火烈不得入至後園與叔繼祖俱投井死弟文耀守外城城破奔還覔文炳死所大書版井旁曰左都督劉文耀同兄文炳畢命報國處亦投井死闔門死者四十二人而湛然以匿瀛國太夫人為賊拷掠終不言體糜爛以死本朝順治九年追諡文炳忠恪乾隆四十一年追諡文耀烈愍黄尼麓申湛然亦俱宛平人趙譔雲南人巡視中城城陷罵賊被殺本朝乾隆四年追諡忠愍劉宗嗣清苑人分守東城力不支先縊殺妻毛氏媳王氏及妹女城陷被執罵賊奪刀殺二賊為賊支解死虎本朝乾隆四十一年追諡忠烈賀讃保定人總兵臣子賊薄京城迎撃為亂箭射死王鍾彦華亭人賊至守廣寧門守將開門納賊被執不屈死李若璉新城人分守崇文門城陷自縊死李遇知洋縣人城陷方自縊被賊執不屈死王家禎長垣人解職居家城陷賊兵據長垣家自經死子元玠従死顧國縉上海人間城陷不食死何應瑞曹州人聞城陷不食死本朝乾隆四十一年俱追諡忠莭魏師貞魏縣人城陷服命服拜闕自焚死髙鍟榆林人城陷闔門焚死尹洗安肅人守西城罵賊死周之茂字如松麻城人需次都下賊搜得之迫使跪不屈折其臂而死張維綱清苑人守保定城及陷被執不屈死楊儒秀里系無考守城力戰死妻杜氏投水死張大同里系無考守城力戰死子之垣同死張力東明人里居聞城陷偕邑人殺所遣偽官為賊將所執不屈罵賊死本朝乾隆四十一年俱追諡烈愍許達允靈寳人尚書進五代孫城陷罵賊不屈死張凝和忻州人賊薄城分守北門及陷死莭俞志虞新昌人城陷不食坐露地梓宫出東華門志虞往哭自縊于新昌㑹館陳純徳零陵人巡撫山西力陳抽練弊城陷慟哭自經死甯承烈字養純大興人管太倉銀庫城陷自經于官廨范方同安人城陷被繫不屈死宋天顯華亭人城陷為賊所執逼書偽詔罵賊觸階死于騰雲大興人賊至語其妻曰我為朝臣汝亦命婦不可賊汚並服命服自縊死方履泰全椒人南和伯一元子城陷自刎死李國祿豐城人城陷自縊李若珪順天人作絶命詞自經死馬象乾順天人罷居里城陷率妻及子女五人死朱三樂賊陷大同死之吕應蛟保定右衞人守保定城城陷殺賊死文運昌劉洪恩戴世爵劉元靖吕九章吕一照俱保定人李一廣嶧縣人皆守保定城戰死張羅彦清苑人隨邵宗元守城城陷縊死韓東明安肅人守保定城城陷投井死彭士宏廬陵人城陷罵賊死王永隆遇變不食死蕭偲延安人以父䕃襲指揮職城陷死莭葛疑秀平定人城陷北向哭投繯死冦可教應城人罵賊死楊㑹英寧鄉人城陷被執引頸就刃死李昌齡咸寧人被誣下獄賊入城日釋之不食死楊元大興人城陷興妻同縊死陳三㨗臨清人賊逼真定徐標被害三㨗投繯死李正光龍㳺人城陷闔門盡莭劉繼祖海州人文炳之叔分守東安門城陷投井死馬國城靈夀人城陷殉莭張檉芳通州人城陷不屈死張三傑魏縣人被執不屈死張養所定興人世襲順天衞官城陷不屈死髙甲順天人城陷同妻許氏媳王氏女髙氏弟婦劉氏姪女髙氏同縊死劉一松宛平人城陷與妻王氏自經死張國維湖口人被執不屈死陳貞達宜興人城陷罵賊死梁清宏順天人城陷不屈死徐兆任大興居家城陷與妻張氏及幼子同縊死施溥華亭人由順天經厯升任未行城陷仰藥死徐有度平湖人城陷罵賊遇害郭寅同安人城陷不屈與二子皆死本朝乾隆四十一年俱追諡莭愍姚成字孝成餘姚人城陷自縊妻袁氏子逢元俱殉死本朝乾隆四十一年追予入祠湯文瓊字兆鰲石埭人聞變慟哭自殺書衣帶曰位非文丞相之位心則文丞相之心賊徒見者皆歎其忠後自成將其衣帶語以責陳演斬陳演于市其布衣盡莭者又有范箴聴楊鉉李夢禧張世禧以下共一百四十餘人福王時贈文瓊中書舍人猷本朝乾隆四十一年追予文瓊等俱入祠楊崇六合人信之後城陷自縊死成本朝乾隆四十一年追諡忠莭李尊祖鐵嶺衞人梁之孫城陷遇難張光祖永城人麟十四世孫城陷殉莭鄧文明虹縣人寧河王愈十一世孫城陷殉莭顧肇迹江都人夏國公成十一世孫城陷殉莭宋裕徳定逺人鄆國公瑛九世孫城陷殉莭吳遵周遼陽人梁國公成八世孫城陷殉莭薛濂膠州人鄞國公禄九世孫城陷死莭吳汝徴涼州人邠國公允成七世孫城陷自縊本朝乾隆四十一年俱追諡莭愍王國興東平人熹宗母孝和太后弟昇之子本朝乾隆四十一年追諡忠莭劉岱陜州人以外戚世襲左都督城陷全家焚死御本朝乾隆四十一年追諡烈愍宫人魏氏城陷臨河大呼曰有志者當自為計遂投河死頃刻間従死者一二百人宫人費氏自投眢井中賊鈎出見其容争奪之費紿曰我長公主也羣賊不敢逼擁見自成自成命中官審視非是以賞部將羅某費復紿羅曰我實天潢義難苟合將軍宜擇吉成禮羅喜置酒極歡費懐利刃俟羅醉㫁其喉立死因自呼曰我一弱女子段一賊帥亦足矣遂自刎自成聞大驚命收塟之發明明末甲申之變臨危授命捐軀殉難者實不乏人載在明史列傳及忠義傳彰彰可考其時迎降闖賊之徒賊且以其委蛇誤國用者少而不用者多非予囚縶即加榜掠而諸君子成仁取義視死如歸即喪莭者亦羨其得所福王時従逆以六等治罪而文武臣殉難亦間與諡入祠然而去取未公進退失實未足以風厲臣莭如當時給事中顧鋐彭琯御史馮垣登兵部員外郎鄭逢蘭行人謝于宣等皆為賊拷掠死或逼令縊死乃一例贈官而垣登于宣且至諡以忠莭既以南北阻世祖章絶無由核實而荒殘苟且轉致淆混忠貞惟我及皇帝定鼎之初于大學士范景文以下二十人恩錫衞時春張慶臻鞏永固劉文炳等俱邀諡軫恤遺忠實為亙古矌典我皇上紹述前徽廣揚義烈凡闖献禍延甲申社覆俱核實甄録即我朝天戈燮伐抗我顔行者亦憫其忠于所事概許褒旌恭讀太御製薩爾滸書事一篇我祖髙皇帝太宗文皇帝統勁旅數千破明兵二十萬明將如劉綎杜松等亦憫其陷陣之孤忠至夫明室將傾如蔡懋徳周遇吉衞景瑗朱之馮等俱嘉其奮身殉難致命慷慨特命儒臣按事覈真分别定論卿尹光易名之典士庶邀爼豆之馨示彰癉于勝朝植綱常于萬古褒莭昭忠為従来所未有謹于莊烈帝死社稷之目類書殉莭諸人庶知當時靦顔降附者徒貽詬無窮聖人而惟此義烈可嘉且邀闡揚于身後益以欽也褒貶之大公所以昭衮鉞于天下萬世者逺夏四月我大清兵破李自成于山海闗自成奔還京師僭帝號遂奔山西初吳三桂奉詔入援至山海闗聞京師陷猶豫不進自成執其父襄令作書招之三桂欲降至灤州聞愛姬陳沅被劉宗敏掠去憤甚疾歸山海襲破賊將自成怒親部賊十餘萬執吳襄于軍東攻山海闗以别大將従一片石越闗外三桂懼乞降于我曰三桂以蚊清求共討賊遣將致書我睿親王其畧負之身荷遼東重任今以寧逺右偏孤立之故令三桂棄寧逺而鎮山海思欲堅守東陲而鞏固京師也不意流宼逆天犯闗以彼狗偷烏合何能成事但京師人心不固奸黨開門納欵先帝不幸九廟灰燼今賊首僭稱尊號擄掠婦女財物罪惡已極天人共憤三桂受國厚恩欲興師問罪以慰人心柰京東地小兵力未集特泣血求助乞念亾國孤臣之言速選精兵三桂自率所部合兵以抵都門滅流冦于宫廷示大義于中國乞王轉奏時睿親王統兵次翁後得三桂書即遣使報之大畧言聞流宼攻陷京師明主慘亾不勝髪指用是率仁義之師沉舟破釡誓不返旌期必滅賊出民水火伯遣使致書深為喜悦遂統兵前進伯雖向守遼東與我為敵今亦毋因前故尚復懐疑若率衆来歸必封以故土晉為藩王國仇可報身家可保三桂復請速進兵遂疾馳至沙河三桂報賊已出邊立寨栅大軍迎擊之敗賊將唐通于一片石至山海闗三桂開闗出迎我大清令三桂兵繫白布為識使之先驅遂入闗時賊兵二十萬皆多厯戰陣殊剽悍陣于闗内自北山亘海大軍布陣不能横及海岸乃令軍士鱗次布列對賊陣尾伺其氣衰奮擊之且戒勿越伍躁進違莭制陣既列三桂居右翼之末先悉其衆搏戰圍開復合戰良久大軍従三桂陣右突出衝賊中堅萬馬奔騰飛矢雨墮天大風沙石飛走擊賊如電自成方登髙岡觀戰知大為兵急榮馬下岡走賊衆大潰自相殘踏死者無算清大僵屍遍野溝水盡赤自成奔永平吳襄走還京師時軍追之三桂先驅至永平自成殺偽大學士牛金星為賊守京城諸降人往謁執門生禮甚恭金星曰訛言方起諸君宜簡出由是降者始懼多竄伏矣自成至悉鎔所拷索金及宫中帑蔵器皿鑄為餅每餅千金約數萬餅騾車載歸西安二十九日丙戌自成僭帝號于武英殿追尊七代皆為帝后立妻髙氏為皇后自成被冠冕列仗受朝金星代行郊天禮是夕焚宫殿及九門城樓詰旦挾太子二王西走而使偽將軍左光先谷可成為後衞自成勒諸璫悉取其金玉珠寳及出宫令羣賊各執守城白楊杖逐之不分貴賤皆號泣徒跣敗面流血走出京城門外質實一片石在永平府撫寕縣東北山海闗北七十里有闗城城東為九門水口有水分九道南下合為一流因名沙河在永平府遷安縣東三十五里即古小沮水五月我大清兵定京師大自成既西奔我亂安民共享太平之意百姓竄匿山軍所至諭以定谷者悉還鄉里迎降恐後睿親王遂整兵入京師故明諸臣迎于五里外下令安輯百姓民間安堵如故命以禮改塟崇禎帝后建碑亭殿廡悉如典制並塟帝妃袁氏及公主並熹宗后張氏神宗妃劉氏皆如禮令民服喪三日尋議加諡曰莊烈愍皇帝陵曰思陵質實思陵在田貴妃寢園内莊烈帝與后同塟公主一即長平公主一為昭仁公主帝斫死于昭仁殿熹宗后張氏祥符人莊烈帝上號曰懿安皇后至是自縊神宗妃劉氏初封昭妃天啟崇禎時嘗居慈寧宫掌太后璽莊烈帝事之如大母先薨明史賛曰帝承神熹之後慨然有為即位之初沈機獨㫁刈除奸逆天下想望治平惜乎大勢已傾積習難挽在廷則門户糾紛疆埸則將驕卒惰兵荒四告流冦蔓延遂至潰爛而莫可救可謂不幸也已然在位十有七年不邇聲色憂勤惕厲殫心治理臨朝浩歎慨然思得非常之材而用匪其人益以僨事乃復信任宦官布列要地舉措失當制置乖方祚訖運移身罹禍變豈非氣數使然哉迨至大命有歸妖氛盡掃而帝得加諡建陵典禮優厚是則聖朝盛徳度越千古亦可以知帝之䝉難而不辱其身為亾國之義烈矣御定資治通鑑綱目三編卷三十九
