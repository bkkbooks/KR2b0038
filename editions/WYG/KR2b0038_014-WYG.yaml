  - {type: page-break, offset: 0, content: '', id: KR2b0038_WYG_014-1a, image: WYG0340/WYG0340-0164c.png}
body:
  text: 起壬子明宣宗宣徳七年盡癸亥明英宗正統八年凡十二年壬子七年春正月辛酉朔日有食之勅羣臣謹天戒免朝賀賜中官金英范洪免死詔賜英及洪免死詔辭極褒美三月復下詔寛䘏帝召楊士奇諭曰䘏民詔下已乆今更有可䘏者乎士奇固請撫流民减税課察貪吏薦賢能京官三品以上及布按二司各舉所知備方靣郡守選軍民中有文學勇略者羣臣察舉以聞極刑家子孫皆得化進帝從之謝部臣曰朕以官田賦重十减其三乃開異時蠲租詔下户部皆不行甚者約有司不得已詔書為辭是廢格詔令使澤不下究也自今令在必行毋有所過乃出减租詩示之夏四月免山西逋賦山西旱免逋賦二百四十萬石有奇六月修天下府州縣倉巡撫湖廣御史朱鑑言洪武年間府州縣四鄉皆置倉指穀多者萬餘石少者四五千石倉設老人監之富民守之遇水旱以貸貧民今皆廢毀宜遵舊制俾旱潦有資從之質實朱鑑字用明青江人作官箴戒百官帝諭曰朕撫兆民實頼中外文武羣臣同心同力興起治功逺臣既不得數見而人諭之近臣雖朝夕相接亦不得數以言諭因取古人箴儆之義凡中外諸司各著一篇使揭諸㕔事朝夕覽觀庶幾有儆然古之君臣有交儆之道凡在位君子有以嘉謨告朕者尤朕所樂聞也箴凡三十五篇質實官箴三十五篇都督府史部户部禮部兵部刑部工部都察院太常寺大理寺通政司詹事府翰林院左右春坊司經局六科光禄寺鴻牋寺太僕寺國子監欽天監京府行人司錦衣衛中都留守司各都指揮司内外諸衛布政司按察司各府各州各縣王府鹽運司各儒學秋七月揭豳風圖于殿壁帝閲内庫書畫得元趙孟頫所繪豳風圖賦詩一章命侍臣書于圖右而揭諸便殿之壁嘗夏日午朝退詠聶夷中鋤禾日當午句謂侍􅒳曰吾毎誦此未嘗不念農人帝又嘗以所賦織婦詞示侍臣以見蠶事之勞苦八月宥誹謗者罪有男子大呼西華門外語涉訕誹守門者執至帝前呼仍不已羣臣請下法司帝曰聖人之世設誹謗木以耒諫者此人寧可罪耶其釋之諭京官三品以上舉賢才吏部都察院黜方靣冇司不職者帝曰近惟少傅士奇薦舉交趾南靈州知州黎恬等諸臣曠旬積月無一人焉巖藪窟穴豈皆産哉吏部即㑹三品以上官推擇才行文學之士方靣有司昬懦貪暴者共與都察院奏黜之質實黎恬清江人以進士擢御史與同列上章力詆大臣因薦知南靈州黎利反恬北歸至是以薦入翰林官至右春坊右諭徳正統初卒士奇嘗稱恬在内為良御史在外為良郡守云置蘓州府濟農倉故時公侯祿未軍官月俸皆支于南户部蘓松民轉輸南京者石加費六斗周忱奏請就給蘓松止與船償米一斗所餘五斗通計米四十萬石有奇并官鈔平糴米共得七十五萬石有奇置倉貯之又毎嵗民糧起運羡餘存貯在倉者曰餘米皆書諸册而官掌之貧民借貸及綱運風漂盗奪者皆資給焉秋成抵數還官其修圩築岸間河清湘所支口糧不責償耕者借貸必驗中下事力及田多寡給之秋與糧並賦凶嵗再振其奸頑不償者後不復給忱與况鍾定為條約以聞帝悉允行名其倉為濟農乆之嵗有餘羡貧民不能償者多不追取忱在任二十年百姓不知凶荒兩税木嘗逋負後之巡撫江西者莫及焉質實官鈔平糴宣徳七年江南大稔詔今諸府縣以官鈔平糴備振貸免兩畿及嘉興湖州水災税糧癸丑八年春二月録囚帝親閲三法司所上繫囚罪狀命從寛典宥免五千餘人三月賜進士宴于禮部寧晋曹鼐初由卿舉授訓導願就别職改太和縣典史七年督工匠至京師䟽乞入試復中順天鄉試及是舉進士一甲第一賜宴禮部進士宴禮部自鼐始質實曹鼐字萬鐘寜晋人論内外官優䘏軍士違者風憲官察奏罪之兩京河南山東山西旱遣使振䘏各守臣皆奏民因災傷缺食乞發官倉糧振濟從之夏四月下詔寛䘏以旱災詔蠲京省被災逋租雜課免今年夏税賜復一年軍民乏食者所在官司驗口給糧如無官糧勸有糧大户借貸待豐熟時抵十償之勅直𨽻巡撫御史在外按察使理寃獄减殊死以下赦軍匠在逃者罪有司各舉賢良方正一人巡按御史按察使糾貪酷史及使臣生事者五月總兵官蕭授討平貴州烏羅蠻永樂中授以右軍都督僉事充總兵官鎮貴州至是烏羅蠻呉不爾等叛討平之械送賊首等至京師命繫錦衣衛獄授在鎮二十餘年威信大行諸蠻慴服質實烏羅在銅仁府西二百里元置烏羅等處長官司永樂十一年改置烏羅府後廢府仍置長官司屬銅仁今因之蕭授華容人山雲討平宜山蠻廣西自韓觀卒後諸蠻漸横雲先後討平之及是禽殺宜山蠻㓂蘓公夏等餘賊悉解散質實宜山唐龍水縣宋改宜山縣以縣有宜山故名明屬慶逺府今因之六月帝作閔旱詩示羣臣禱雨不應作閔旱詩詔中外疏決罪囚復振兩京河南山東山西湖廣饑免税糧秋七月免江西水災税糧江西自六月初旬以後天而不止凡瀕江諸府大水漂流居民淹没田稻帝特命户部察視有災處詔悉蠲其租八月汰冗官載行在户兵工三部大理光禄鴻臚行太傼寺及順天府官七十七員閠月西域貢麒麟禮官請表賀不許西域來貢麒麟諸物帝受之行在禮部尚書胡濙以麒麟瑞物率羣臣稱賀帝曰逺方之物朕非有愛但念其盡誠逺來故受之不足賀也質實胡濙字源深武進人景星見禮官請賀不許發明國家以時和嵗稔為上瑞麒麟貢自異域不足言祥景星之見人事邇而天道逺兩皆請賀不許宣宗可謂知本務矣胡濙以累朝舊臣不忠崇實政以襄郅治而乃侈言祥瑞屢表稱賀皆首署名當時謂其性善承迎不虗也九月遣使鞫天下重囚帝曰朕體好生風夜念刑三法司所決重囚憑案牘耳安得察顔色其遣亷明者分臨覿囚審復不厭其心者奏讞之母輕率枉死人甲寅九年春二月振鳯陽淮安揚徐饑三月山雲討平思恩蠻廣西思恩蠻覃公砦等累年作亂至是討平之斬賊首一千五百餘級仍督官軍搜捕餘黨質實思恩古百粤地唐置羈縻思恩州明為思恩府今因之夏四月黎利死子麟來告喪命麟權署安南國事利受枚命居國稱帝僭位六年私諡太祖子麟繼麟一名龍匄是其君皆有二名以一名奏天朝麟遣使告訃命麟權署國事秋八月振湖廣饑敕兩京湖廣江西河南三司官行視災傷蠲秋糧十之四罷工部採辦衛拉特托歡襲殺韃靼阿嚕台于穆納山阿嚕台為托克托布哈所襲妻子死孽畜畧盡獨與其子碩尼堪等徙居穆納山未㡬衛拉特托歡襲殺阿嚕台及碩尼堪托歡遣使来告且獻玉璽帝賜敕曰王殺阿嚕台見王克復世仇甚善顧王言玉璽傳世乆逺殊不在此王得之王用之可也賜遣之阿嚕台子諤博爾濟延及其孫妻蘓黙徳斯等喪敗無依來乞内附帝憐而撫之質實穆納山在今烏烏特旗西作穆納山舊作母納山烏拉特舊呉喇忒托克托布哈舊作脱脱不花碩尼堪舊作失控干諤傳爾濟延舊作阿卜只俺蘓黙徳斯舊作蘓木答思今俱改九月帝巡邊至洗馬林還諸將言衛拉持獵所去洗馬林不逺襲之可大克也帝曰朕此來飭邊備耳非來捕冦夜召問楊榮榮對曰陛下屢遣人招諭命其近邊獵牧故感恩而來若擊之是前敕誘之矣且彼聞上至必先遁雖擊何益徒失戒心耳乃决意止將士勿擊冬十月松潘畨叛都督僉事方政討平之六年松潘諸族及空郎龍溪諸案叛總兵官陳懷討平之八年御史及按察使奏懷僭侈踰分且日荒于酒不飭邊備帝怒召懐還命方政代擢參將蔣貴以副之至是諸畨復叛政諭以禍福多聼命惟任昌等寨梗化政等分道進勦以次平三十餘寨㨗聞進政都督同知明年政移鎮大同而以貴代政為總兵官鎮守松潘質實松潘諸族明史土司傳十三族長官司曰勒都曰阿昔洞曰北定曰牟力給曰蛒匝曰祈命曰山洞曰麥匝曰者多曰占藏先結口包藏先結曰班班曰白馬路其後復𨽻松畨者長官司四曰阿思曰思囊兒曰阿用曰潘幹賽安撫司四曰八郎曰阿角寨曰麻兒匝曰芒兒者後又以思囊日安撫司附焉空郎龍其諸寨方輿紀要松潘衛南歸化闗左右冇龍溪諸番寨振兩畿浙江湖廣江西饑冬十一月免四川被災税糧四川奏早潦不一所種無收帝命户部復視之蠲其租十二月帝不豫帝不豫衛王瞻珽攝李太廟免明年正旦賀禮命百官朝皇太子于文華殿乙卯十年春正月帝崩太子祁鎮即位帝崩于乾清宫年三十有八遺詔國家重事白皇太后行時太子方九齡外廷傳言太后取金符入内欲召立襄王楊士奇楊榮率百官入臨請見太子太后即至乾清宫携太子泣曰此新天子也士奇等伏謁呼萬嵗浮議乃息質實乾清宫皇極殿後曰雲臺門東曰後左門西曰後右門又東則景運門西則隆宗門中則乾清門上則乾清宫罷金銀硃砂銅鐵坑冶免其課减税鈔悉如洪武舊額少師兼吏部尚書蹇義卒義歴事六朝凡五十年帝即位齊宿得疾遣醫往視問所欲言對曰陛下初嗣大寳望敬守祖宗成憲始終不渝耳卒年七十三贈太師謚忠定罷十三布政司鎮守中官其守備南京鎮守諸邊收糧徐州臨淸巡鹽淮浙者如故加户部尚書黄福少保參贊南京機務留都文臣參機務自福始時襄城伯李隆守備南京福以參贊嘗生隆側然隆待福禮甚恭公退即推福上坐福亦不辭福遇事先籌定付隆隆敬信悉從之及視事皆隆處分福不出一語或以為言曰體當如是且守備何嘗一事錯由是政肅民安逺近悦服二月尊皇太后為太皇太后左右有請垂簾聼政者太后曰毋瓌我祖宗法第罷不急務斥宫中玩好之物時時朂帝嚮學而已朝廷大政羣臣白太后太后令悉送内開俟楊士奇等議决然後行太后兄彭城伯㫤都督昇惟令朝朔望毋得與聞國政昇素賢士奇等請加委任太后終不許質實彭城伯杲都督昇皆彭城伯張驥之子昭皇后之兄也㫤從成祖起兵取大寧戰鄭村壩俱有功授義勇中衛指揮同知永樂初累官錦衣衛指揮使仁宗立擢左都督封彭城伯予世襲昇字叔暉成祖起兵以舍人守北平有功授千户歴官府軍衛指揮僉事仁宗即位拜都督同知宣徳初進左都督正統五年封忠安伯予世襲發明英宗方九齡太皇太后悉以朝廷大政委之楊士奇等可謂得人為大臣者正宜以道為閉預防其漸始為不負寄託士奇等乃以太后闗預朝政遂有委任張昇之請未免意存迎合幸而太后不許昇固素賢事亦遂寢然三楊實秉國鈞而委蛇瞻顧乃心王室者宜若是乎律以春秋責備之義當亦無可置喙云尊皇后為皇太后封弟祁鈺為郕王封平陽王美圭為晉王晋自濟熿廢後不立王者已八年至是以美圭紹封三月放教坊司樂工几三千八百餘人江西盗作亂僉事彭森等討平之先是江西連年水旱人民艱窘有司不能振䘏大盤山賊曽子良等為亂衆至三萬屢撫不服森與吉安知府陳本深率官軍民壯討之本深以計擒斬子良餘衆潰散質實大盤山在撫州府樂安縣西北山延袤數十里誇新淦永豐二縣界吉安唐吉州元置吉安路明改府今因之詔死罪必三覆奏諭三法司死罪臨决三覆奏然後加刑其後太監王振擅權忤㫖者輒加誅戮不俟覆奏矣發明古者用刑明辟必以三刺唐臣徐堅上書云令有三覆請如令覆奏要以人命至重慮其失倩故於勘問得實之後仍不惮再三審慎此即求其生而不得之心也仁宗五奏未免過滋煩冗英宗始有死罪必三覆奏之詔可謂慎讞良法惜行之未乆而即為閹䜿擅作威福竟不待覆奏而已加誅則兹欽恤之詔亦屬空文耳夏四月以元儒呉澄從祀孔子廟庭從慈利教諭蔣明之請也質實慈利隋縣元升州明復為縣屬澧州今因之五月詔自今初任者不得除風憲官六月塟景陵諡曰憲天崇道英明神聖欽文昭武寛仁純孝章皇帝廟號宣宗質實景陵在昌平州天壽山東峯下距長陵東少北一里許明史贊曰仁宗為太子失愛于成祖其危而復安太孫葢有力焉即位以後吏稱其職政得其平紀綱修明倉庾充羡閣閻樂業嵗不能災蓋明興至是歴年六十民氣漸舒蒸然有治平之象矣若乃強藩猝起旋即削平掃蕩邊塵狡冦振懾帝之英姿睿畧庻幾克繩祖武者歟秋七月太白經天八月减光禄寺膳夫凡四千七百餘人九月詔四方毋進祥瑞龍州宣撫司以瑞麥獻有一莖六穗七穗者詔曰今旱蝗相望獨一方稱瑞如天下饑民何自今有若此類者母獻釋御史陳祁主事郭循于獄復其官宣徳間祁請講大學衍義帝怒曰祁以朕為未讀大學耶薄朕至此不可不誅命籍其家逮其親屬同下錦衣獄婦女發浣衣局時拓西内皇誠修離宫别館循為刑部主事極諫帝怒命裹以氊至大内親詰之循對不屈帝益怒手射之亦下錦衣獄至是皆赦復職質實陳祁字永鍚呉人郭循字循初廬陵人以王振掌司禮監振少選入内書堂侍帝于東宫為局郎及帝立年少振狡黠得帝歡遂越金英等數人掌司禮監導帝用重與御下防大臣歟弊于是大臣下獄者不絶而振得因以市權然是時太皇太后賢方委政内閣閣臣楊士奇楊榮楊溥皆累朝元老振心憚之未敢逞太后嘗遣振至問問事士奇擬議未下振輒施可否士奇愠三日不出太后問故榮以實對太后怒鞭振仍令至士奇所謝罪且曰再爾必殺無赦自是問數日太后必遣使至閣問連日曽有何事來議如何施行令具帖以聞質實王振蔚州人冬十月詔天下衛所皆立學十一月戊辰朔日有食之命楊士奇楊榮楊溥議臣民章奏太皇太后委任三人三人同心輔政士奇有學行通逹國體榮謀而能斷溥有雅操淳謹小心毎議事士奇引古義榮出一言决之諸大臣争可否或有違言溥舍已從人畧無繫吝時論賢之號三楊質實三楊以居第日士奇曰西楊榮曰東楊溥嘗自書郡望曰南郡因目為南楊阿爾台冦甘肅總兵官陳懋擊敗之阿嚕台既死其故所立阿爾台王子及所部多爾齊巴勒等復為托克托布哈所窘竄居額齊訥路外為納欵而數入冦甘凉至是陳懋連擊敗之追至蘓武山而還質實蘓武山在凉州府鎮番州東南三十里相傳漢蘓武牧羝處山右有蘓武廟因名爾阿爾台王子舊作阿台王子多爾濟巴勒舊作朶只伯今俱改丙辰英宗睿皇帝正統元年春正月發京軍屯田畿輔楊士奇言國家嵗用糧儲皆自東南轉運軍民勞苦今京軍操練外餘卒尚多宜令于北京八府屯田可省南方轉運之費帝命户部兵部議行之于是撥京軍三萬就近地下屯又言先因巡邊調選大寧都司及南北直𨽻衛所官軍更番赴京操備今天下已靖請不必赴京俱令下屯既省轉輸之勞又養精鋭之氣帝善其䇿俟從容行之質實北京八府謂順天保定河間真定順徳廣平大名永平也三月始御經筵楊士奇楊榮楊溥請開經筵并擇老成重厚識逹大體者數人以供侍講之職太皇太后然之命士奇榮溥及侍讀學士王直等為經筵官每十日㑹講文華殿餘日仍令講讀官四人入講經史宣徳以前儒臣進講無定日亦無定所至是定於文華殿以月之初二十二二十二共三日為定期夏五月始置提督學校官南京户部尚書黄福言比來生員學藝疎淺宜令布政按察二司遍歴考試庻得真才于是雨畿及十三布政司各置提督學校官一員兩畿以御史十三布政司以按察司僉事著為令秋七月復聖賢後裔令有司訪求南宋衍聖公孔端友及宋儒周敦頤程顥程頤司馬光朱熹後裔蠲其徭役祠墓傾圮者修之兩畿山東河南陜西湖廣廣東大水八月以右都督蔣貴充總兵官都督同知趙安副之帥師討阿爾台多爾濟巴勒貴自松潘召還為右都督㑹阿爾台多爾濟巴勒數犯甘凉邊將告急乃命貴及安往討未出師敵又犯莊浪都指揮江源戰死亡士卒百四十八鎮守甘肅侍郎徐晞上章劾貴廷議以貴方選軍甘州勢不相及而荘浪正晞所統責晞委罪置貴不問明年春諜報敵駐賀蘭山後詔貴等出塞遂之貴至魚兒海子都指揮安敬言前途無水革遂引軍還質實莊浪元路尋降州明改縣屬静寧州今屬平凉府魚兒海子在今凉州府鎮番縣東北即白亭海古林屠澤也趙安狄道人徐晞江隂人始徵金花銀入内承運庫初州縣嵗賦有折銀者俱送南京供武臣俸禄及北京既建各衛官支俸南京道逺費多所餘無幾副都御史周鈺請於直省不通舟楫之州縣折收白金布絹赴京充俸巡撫江西侍郎趙新尚書黄福亦為言帝問尚書胡濙濙言太祖時嘗行於陜西浙江民以為便乃仿洪武制米一石折銀二錢五分麥亦如之南畿及浙江江西湖廣福建廣東廣西共折銀百萬餘兩不送南京盡解内承運庫謂之金花銀除給放武臣俸餘專供内用其後概行於天下自起運兑運外糧四石折銀一兩解京以為永例由是諸方賦入折銀者幾半而倉廩之積漸少矣質實嵗賦折銀明史食貨志洪武九年天下税糧許民以銀鈔代輸于是謂米麥為本色諸折鈔者謂之折色内承運庫在東下馬門周銓懷逺人九月遣侍郎何文淵王佐副都御史朱與言督兩淮長蘆浙江鹽課勅曰命爾等與内臣提督務俾鹽丁得所商販無滯國課不虧奸弊殄絶有不便于民者具實以聞其阻撓鹽法倩犯重者械送京師欽差廵鹽自此始質實王佐海豐人朱與言字一鶚萬安人發明明太祖初起即立鹽法以官領之洪武時諸産鹽地次第説都轉鹽運使各省皆有鹽課而兩淮兩浙長蘆為首重英宗既遣侍郎副都御史巡鹽已足釐整奸弊而又令其與内臣提督其信用閹䜿如此迨憲宗以後諸璫竊勢甚至奏討淮浙鹽無筭且買充正課之外復奏聞殘鹽夾帯影射諸患百出鹽臣希承風㫖更列零鹽所鹽之目于是鹽法日益壊矣明季信任宦官諸事皆然豈獨一鹽政哉封黎利子麟為安南國王初利死以其子麟權知國事麟遣使入貢謝恩至是年四月以宣宗赴遣使進香又以帝即位及尊上太皇太后皇太后位號各遣使表賀貢方物閏六月復貢帝以陳氏宗支既絶麟事朝廷甚㳟欲使麟正位下廷議咸以為宜乃遣兵部侍郎李郁等齎勅印往封之質實李郁洛陽人冬十一月詔廷臣舉堪任御史知縣者各一人詔京官三品以上舉堪任御史者四品及侍從言官舉堪任知縣者各一人十二月下兵部尚書王驥于獄尋釋之王振初用事欲令朝臣畏已㑹驥議邊事五日未奏振教帝召驥而貴之曰卿等欺朕年㓜耶遂執驥及右侍郎鄺埜下獄尋釋之未幾右都御史陳智劾張輔囘奏稽廷并劾科道不舉奏帝釋輔不問杖御史給事中各二十自是言官承振風㫖屢摭大臣過自公侯駙馬伯及尚書都御史以下無不被劾或下獄或荷校至譴謫殆無虚嵗質實王驥字尚徳束虎人鄺埜字孟質宜章人陳智湖廣咸寕人丁巳二年春正月太皇太后召見大臣于便殿太皇太后御便殿帝西面立后傍召張輔楊士奇楊榮楊溥胡濙入見五人東面稍下立太皇太后諭曰卿等老臣嗣君㓜幸同心共安社稷又召溥前曰先帝念卿忠屢形愁歎不意今復得見卿溥泣太皇太后亦泣左右皆悲愴始仁宗為太子居守時以讒故官僚多下獄溥及黄准一繫十年瀕死者數矣仁宗每于宫中言及東宫時事慘然不樂以故太皇太后言之太皇太后又顧帝曰此五臣先帝簡任俾輔後人皇帝萬畿宜與五臣共計有頃宣王振至太皇太后頓怒曰汝侍皇帝起居多不律今當賜汝死時女官雜佩刀劍侍遂以刄加振頸帝跪為振誚五臣皆跪太皇太后曰皇帝年㓜豈知此輩自古誤人家國我聽帝暨諸大臣留振此後不得令干國事也振故心憚太皇太后自此稍斂戢已而太皇太后病遂跋扈不可制矣夏五月免河南被災田糧五月遣王驥經理甘肅邊務蔣貴趙安帥師出塞既無功而侍郎柴車徐晞都御史曹翼相繼整飭邊備皆不能禦敵帝命驥往許便宜行事驥疾馳至軍大㑹諸將問將校往時追敵魚兒海先退者誰僉曰安敬驥先承宻㫖戮敬遂縛斬軍門并責貴曰汝大將亦當死姑貸汝立功自贖諸將皆股慄莫敢仰視于是校閲將士分兵畫地使各自防禦邊境肅然尋還報命㑹阿爾台復入冦帝命驥帥都督仕禮及貴安繋之驥遣貴為前鋒而自與禮統大軍繼進戒貴曰不㨗無相見也貴繋敵石城走之驥及禮復敗之胡桐林安等又及之多喇窮追至黒泉而還是役官軍出漠千餘里諸將左右夾繋殱敵幾盡先後獲其部長百五十人阿爾台多爾濟巴勒皆逺遁尋為托克托布哈所殺質實石城在今甘州府邊外故居延城北胡桐林多喇黒泉俱在額齊訥路按胡桐木名漢書西域傳注胡桐似桐蟲食其葉而沫出下流者俗名胡桐淚可以汙金銀即此舊誤作梧桐林非是曹翼蘄州人任禮字尚義臨漳人多喇舊作刁力今改免陜西平凉六府旱災夏税命户部遣官勘實蠲之詔旌出榖振荒者為義民復其家時義民十人各出稻千石有奇佐官振濟詔暢璽書旌勞復其家質實十人胡冇初謝子寛吉安府人范孔孫浮梁縣人于敏榆次縣人鞏得海邳州人張雷石州人梁璧李成俞勝徐成俱淮安府人六月以宋儒胡安國蔡沈真德秀從祀孔子廟庭肇慶知府王瑩等以安國作春秋傳沈作書傳徳秀作大學衍義有功于聖門請從祀孔廟下禮部議奏稱瑩等言是故有是命質實王瑩鄞人振江北河南饑南直𨽻之鳯陽淮安揚州諸府徐和滁諸州河南之開封諸府奏四月至五月雨河淮泛溢民居漂没將流徙乃命副都御史賈諒工部右侍郎鄭辰往振之質實賈諒字子信嶧縣人鄭辰字文樞浙冮西安人秋九月以指揮僉事楊洪守備獨石洪初副李謙守備寺城獨石謙老而怯與洪不相能洪嘗勵將士殺敵謙笑曰徒殺吾人耳敵可盡乎御史張鵬劾罷謙遂以洪代洪紀律嚴明烽堠修飭與烏梁海戰斬其渠威名聞嶺北稱楊王質實楊洪字宗道六合人戊午三年春三月京師地震己亥夜四更地震五鼔復震庚子夜又震甲辰畫震至暮又震振陜西饑夏四月設大同馬市刑部尚書魏源等以衛拉特貢馬援遼東開原例以六事開曰置馬市選貢馬輸貢具嚴禁約擇通市設牙行帝以馬市勞軍民不必置待逺人宜後馬不必選供具取給公帑勿擾民餘如議巡撫大同僉都御史盧睿復言大同宜立馬市復從之質實魏源字文淵建昌縣人盧睿字仲愚東陽人秋七月下禮部尚書胡濙等户部尚書劉中敷等于獄尋俱釋之禮部失印命逮濙等下錦衣衘獄獄具而盗得先是軍官俸糧于通州支給中敷等令于京舍支給中官諷給事中御史劾奏故有是命尋皆釋之質實劉中敷大興人八月振陜西饑令雜犯死罪以下輸銀贖罪送邊吏易米振之九月蠲兩畿逋賦凡免糧六十四萬石以正院元年二年連被災傷故也冬十一月逮天下逋逃工匠四千餘人宣徳間儆天下軍民工匠多所興造帝即位悉罷之未幾建宫殿修九門改五府六部諸司公署又建京城内外諸佛寺工役繁興匠多逃者二年二月以後已逮六千餘人至是又逮四千二百餘人後又逮萬人逮至者皆桎梏赴工六年夏以盛署始脱桎梏發明國家大工大役原有當舉但役之有道董之有方何至役而逃逃而被逮至千萬餘人并令桎梏赴工豈復成政體乎英宗即位初既懲宣徳興土木罷徵軍民工匠曽未㡬時乃繁興而加之厲其於初政何不克有終若是乎十二月下刑部尚書魏源等于獄先是巡撫湖廣侍郎呉政等奏遼王貴給諸不法事而匿其黷倫罪詔逮政等命三法司鞫之源等論政罪不當遂逮源等及都寨院右都御史陳智等下獄命張輔等㑹同遼獄論呉政等規避不奏當斬明年間二月釋源智等復其官并宥棄交阯王通馬騏罪及弋謙俱罷為民質實貴烚簡王植子己未四年眷二月總兵官蕭授平貴州叛苖貴州計沙賊苗金蟲苗總牌等糾洪江生苖作亂偽立統千侯統萬俟號授督兵分攻大破之都督同知呉亮追斬苖總牌等生苗盡降授諭遣之而命千户尹勝誘苖金蟲斬以狥質實計沙苗多以苗為姓其所居曰苖沙洞在黎平府城南三郎司西洪江即洪州工在黎平府城東洪州司北呉亮來安人三月大赦以春和下寛䘏詔殊死以下罪無大小咸赦除之蠲通税遼王貴烚有罪廢為庶人初府僚乞加王禄不許及貴烚杖殺長史笞荆州知府為撫按官所劾帝以聞其内亂召訊具服廢為庻人俾守簡王園已封其弟貴煖為遼王夏五月京師大雨水溢壊官廨民居三千三百餘區貧民露宿長安街皆滿以京㡬水災祭告天地諭羣臣修省下詔寛䘏求直言六月彗星見長丈餘五十四日乃􅌍京師地震八月又震秋七月免兩畿山東江西河南被災税糧凡免秋糧二十一萬三千餘石冬十二月都督同知李安僉都御史王翺討松潘祈命族叛番松潘指揮趙得奏祈命族番冦桑巴作亂官軍捕禽之其弟小桑巴復聚浦江新塘等闗據險刼掠帝命李安充徳兵官王翶叅贊軍務調官軍土兵二萬討之已翶知指揮趙諒誘執國師桑巴掠其財與同官趙得誣以叛至則出桑巴于獄遣人招其弟撫定餘黨而誅諒戍得復桑巴國師松潘遂平質實浦江闗在松潘衛南一百二十里今名鎮江闗新塘闗在松潘衛南七十里亦名新鎮闗桑巴舊作啇巴今改庚中五年春正月少保南京户部尚書黄福卒福歴事六朝多所建白公正睿恕素孚于人當官無赫赫名事㣲細無不謹憂國忘家老而彌篤安南貢使入朝或指福問曰識此大人否對曰南交草木亦知公名安得不識其卒也賜諡不及士論惜之至成化初始贈太保諡忠宣二月以翰林院侍講學士馬愉侍講曹鼐入内閣預機務王振至内間語楊士奇楊榮曰朝廷事乆勞公等公等皆髙年倦矣當若何士奇曰老臣盡瘁報國死而後已榮曰不然吾軰衰殘無以効力當釋後生可任者報聖恩耳振喜而退士奇咎榮榮曰彼厭吾輩矣一旦内中出片紙令某人入閣且奈何及此時進一二賢者同心輔政尚可為也士奇以為然翌口列愉鼐及侍講學士苗衷侍講髙穀名以進倫務遂先彼擢用質實馬愉字性和臨胊人苗表字秉彝定逺人髙榖字世用揚州興化人同曹鼐共四人皆帝初御經筵士奇等所薦三月建北京宫殿永樂中宫闕未備奉天華益謹身三殿成而復災以奉天門為正朝至是重建三殿並修繕乾清坤寜二宫役工匠官軍七萬人質實坤寧宫乾清宮中則交㤗殿上則坤寧宫夏四月免山西旱災逋税六月兩畿山東河南浙江江西大水江河皆溢陜西大雨雹深尺餘度僧道二萬餘人王振喜釋道毎嵗必一度之是年五月以前已度二冠萬一千人至是又度前後共二萬二千三百餘人黄緇衣布滿街市僧道之多莫逾於此發明王振擅權以後窮極奢侈既建第皇城束又建智化寺繁興土木滋害軍民乃又嵗度釋道前後至二萬餘人之多緇黄滿街濫費無度徒以謟佛奉道卒至蠧國擾民敗壞天下其害可勝言哉秋七月遣刑部侍郎何文淵等分行天下修荒政從楊士奇請也時太皇太后專以養民為務每四方水旱振濟動億萬計蠲免灾糧或數百萬石閭閭安樂雖灾不為害迨王振用事悉反初政惟蠲租振荒尚仍之不改云少師謹身殿大學士楊榮卒先是正統三年榮與士奇俱進少師至是春乞師省墓比還至杭州卒年七十贈太師諡文敏授世襲都指揮使入榮歴官五朝謀而能㫁成祖初與解縉等七人同閣榮年少最警敏一日寧夏報被圍成祖示以奏榮曰寧夏城堅人皆習戰奏上已十餘日圍解矣夜半奏至圍果解成祖與諸大臣議事未决或至發怒榮至輒霽威事亦隨决李時勉夏原吉皆以榮言得無死嘗語人曰事君有體進諫有方以悻直取禍吾不為也故其恩遇亦始終無間性喜賓客雖貴盛無稍崖岸士多歸心或謂榮處國家大事隨機應變不媿唐姚崇而不不拘小節亦頗類之冬十一月河南僧楊行祥詐稱建文帝下錦衣衛獄尋死有僧年九十餘由雲南至廣西自稱建文帝命其徒清進詣思恩府土官知府岑瑛執送總兵官栁溥械至京㑹官鞫之僧乃言其姓名為楊行祥河南鈞州白沙里人洪武十七年度為僧歴遊兩京雲南貴州至廣西帝令錦衣衛錮禁之四踰月死從者十二人皆戊邊質實明史牛景先傳有金川門啟帝亦為僧出亡莫知所終之語然旁采見聞未嘗据以為實而楊行祥一事見明正統實録當時紀載家毎多附㑹傳訛有以楊行祥作楊應能而建文托其姓名以逃之見憲章録謂思恩州岑瑛遇一老僧于道從者呵之不避請其度牒檢之乃楊應能遂自言曰此非吾姓名乃托此而逃也自金川失守大内起火吾遂由地道出自湖湘入蜀至雲南最後入廣西至横州南門壽佛寺居焉居十五年歸者口衆吾復往南寧陳步江一寺而歸者如之乃去南寧雲逰四方以度嵗月迤邐至此老朽待盡願送骸骨歸瑛大駭聞于巡按御史奏之驛送赴京號老佛及至京朝廷未審何人以尚膳太監呉亮建文時内使使審視老佛見亮曰汝非呉亮耶亮曰不是曰我昔御便殿棄片肉于地汝伏地餂食之何為不是遂取老佛入西内居之有以建文居寺一日自稱建文帝為僧白官府者見遜國記謂建文出自滇南呼寺僧曰我建文皇帝也僧大懼白官府迎至藩堂南而跌足坐地白稱朱允炆曰胡濙訪張儠傝實為我衆悚然聞于朝乗傳至京有司皆以王禮見入居大内以夀終塟西山不封不樹有以楊行祥作應祥為建文同寓僧迨繫僧而并及帝者見明史紀事本末謂建文喜為詩廣西同寓僧竊帝詩自請建文帝詣思恩知州岑瑛瑛聞之藩司因繫僧及帝蜚章以聞至京御史鞫之便稱年九十餘且死思塟祖父陵旁耳御史言建文君生洪武十年距正統五年當六十四嵗何得九十嵗亷其狀僧實楊應祥僧論死帝適有歸思白其實御史宻以聞于是迎入西内宫中呼為老佛以夀終塟西山傳聞異詞往往失實皆不可信也鈞州金置明神宗時避諱改禹州屬開封府今因之白沙里即白沙鎮在禹州城西北六十里栁懷寧人升之子辛酉六年春正月己亥朔欽天監言日食不應禮官請表賀不許以蔣貴為平蠻將軍王驥總督軍務討麓川蠻洪武中麓川平緬宣慰司思倫發為其頭目刁幹孟所逐赴京陳訴太祖仍命為宣慰囘居麓川成祖時分其地設府三曰孟養木邦孟定長官司四曰潞江千崖大候灣甸尋又陞孟養木邦為宣慰司乆之孟養木邦與緬甸相仇殺時思倫發已前死子行發任發相繼襲職任發性桀黠喜兵遂欲乗機侵奪盡復其故地稱兵援南甸突千崖進陷騰衝屢詔撫諭不受命黔國公沐晟請發兵進勦帝命都督方政㑹晟及其弟昂共討之任發佯言遣使修貢冀緩師晟遽信其降無渡江意任發乃遣衆萬餘奪潞江沿江造船三百餘欲取雲龍帝以賊勢日盛賁晟等玩冦養患㑹政亦至軍欲出戰晟不可造舟欲濟師晟又不許政不勝憤乃獨率麾下擊賊破其大寨又追敗之高黎共山下斬首三千餘級乗勝突入逼任發于上江上江賊重地政逺攻疲甚求援于晟晟怒不遣既以少兵往至夾象石又不進政不得已渡江賊知其孤軍無援也遂出象陣衝擊全軍皆没事聞朝廷切責晟晟懼罪暴卒勅昂代統其軍乆亦無功思任發由是愈横既乃遣其頭目以象馬金銀來修貢且請罪帝用楊士奇言降敕許赦其罪侍郎何文淵亦請罷兵遣官詔諭命下廷臣議皆如文淵言而王振方用事欲示威四夷先已召還甘肅總兵官蔣貴等使待命尚書王驥揣知振意力主用兵振大悦遂出廷議以貴為平蠻將軍都督用知李安僉事劉聚為副驥總督軍務大發東南諸道兵十五萬人往討麓川侍講劉球上疏誎不聽質實按沐晟之死記載家謂飲欒死明史作晟懼罪暴卒大事記獨謂上江賊重地不可易視前軍輕銳中軍當自持重勢不相及以自敗没未可以是尤晟得疾而卒非由懼罪然考明史土司傳晟初無渡江意遂致思任發奪潞江取雲龍勢益曰甚英宗責晟等玩冦養患時政欲出戰晟屢不許及擊敗賊又不肯援是縱賊于前坐視于後僨轅之咎實無可逃其為懼罪暴卒明史當可據潞江長官司蠻名怒江甸元置柔逺路明㓋武十五年改府後廢屬麓川平緬司永樂元年析置路江長官司十六年升安撫司今司屬永昌府干崖長官司蠻名干頼晱又麓渠瀾晱元置鎮西路明洪武十五年改府後廢屬川平緬司永樂元年析置干崖長官司正統九年升宣撫司今司𨽻勝越州大候長官司蠻名孟祐元屬麓川路洪武二十四年置大候長官司後廢屬麓川平緬司永樂元年復置宣徳三年升州萬歴二十五年更名雲州屬順寧府今因之灣甸長官司蠻名細晱元屬鎮康路明洪武十七年置灣甸州後廢屬麓川平緬司永樂元年拆置灣甸長官司尋復改為州今仍為土州𨽻永昌府緬甸古朱波地在永昌府西南雲龍唐初為匡州西境䝉昏雲龍甸叚氏因之元置雲龍甸軍民府明洪武十七年改州屬大理府今因之上江即龍川江源出騰越州徼外流經麓川為麓川江下流入大盈江蠻人以江在麓川者為上江近騰越者為下冮夾象石在騰越州東龍川江東岸渡江而西即高黎共山麓也劉聚大監劉永誠從子劉球字廷振安福人三月下巡撫侍郎王謙于獄既而釋之謙巡撫山西河南十二年威惠大行毎入京師無私謁王振銜之謙以在外乆乞召入薦叅政王來孫原貞自代右通政李鍚阿振指劾謙以乆任不遷怨望擅舉人自代㑹謙來朝遂下法司論死繫獄三月得釋左遷大理寺少卿山西河南吏民伏闕上書請留謙者以千數乃命復原官時山東陜西流民就食河南者二十餘萬謙請以河南懷慶二府積粟振之今布政司撫集其衆授田給牛耕種流民以安質實王來字原之慈谿人孫原貞名瑀以字行德興人夏五月太白經天遣使録囚先是以災異遣使省天下疑獄至是復遣刑部侍郎何文淵等録在京刑獄巡撫侍郎周忱等録南京刑獄秋七月振浙江湖廣饑九月奉天華蓋謹身三殿乾清坤寧二宫成宫殿成宴百官故事中官不奭外廷宴是日帝遣使問王先生何為王先生謂王振也帝在宫中呼振先生而不名使至振方大怒曰周公輔成王我獨不可一坐耶使復命帝蹙然命開東華中門召振至百官候拜于門外振始恱發明振以宦侍耳始以狡黠得幸繼以䟦扈弄權英宗乃領心聽之褒之以賜敕且稱之以先生與漢靈帝張父趙母之稱先後一轍無怪當日公侯勛戚羣呼翁父尚書侍郎下且有稱兒屈膝者朝廷上下恬不知恥振罪固大英宗亦何迷謬若是哉冬十月下戸部尚書劉中敷等于獄中敷與侍郎吳璽陳瑺以京城草束不足請供御牛馬分牧民間言官劾其變亂成法並下獄論斬詔荷校長安門外凡十六日而釋闰十一月衛拉特入貢詔問馬駝芻菽數中敷等不能對王振言于帝復下獄論斬踰年釋中敷為民璽瑺戍邊質實呉璽邵武人陳瑺孝感人免畿内被災税糧進蘓州知府况鍾吉安知府陳本深秩正三品鍾起刀筆然重學校禮文儒剛正亷潔孜孜愛民前後守蘓者莫能及鍾先丁母愛當去郡民詣闕乞留詔起復任及秩滿請再任者至二萬餘人走訴巡按御史詔進正三品仍視府事及卒于官吏民聚哭為立祠本深為政大猾殱除府中無事問有訟者呼至槢前析曲直遣之乆之民恥争訟秩滿當遷郡人乞留一如况之在蘓詔亦進正三品視府事前後守吉安十八年政化大行一日升堂聞鼓樂聲問知廨前民嫁女本深笑曰我來時乳下兇也今且嫁我尚留此耶遂請老既去郡人肖像祀之十一月大赦以宫殿成大赦定都北京文武諸司不稱行在免河南山東及鳯陽等府被災税糧凡免四十四萬三千三百餘石十二月王驥等克麓川思任發走孟養驥瀕行賜驥與蔣貴金兠牟細鎧蟒繡緋衣朱弓矢驥請得以便宜從事馳傳至雲南將抵金齒賊酋守鎮康者遣人乞降驥受之宻部署諸將分三路進取右叅將冉保由東路攻昔刺寨趨孟定驥與貴由中路趨上江副總兵劉聚右叅將宫聚自下江夾象石合攻賊立寨堅守銃弩飛石交下如雨攻五日不下㑹大風官軍縱火焚栅斬首五萬餘級遂㧞其寨由夾相石渡下江通高黎共山道至騰衝由羅卜思莊長驅抵杉木籠山賊乗髙據險築七壘相救驥遣將分左右翼縁嶺而上自將中軍奮擊賊大潰連破之乗勝至馬鞍山進搗賊巢山􅈝絶深塹環之東南面江壁立不可上賊更從問道潛師出大軍從驥戒軍中無動而令都指揮方瑛以六千人突入賊寨瑛直前左右擊斬數百人躪死者無算又誘敗其象陣㑹冉保亦由束路破諸蠻寨以兵來集驥令截守西峩渡防賊軼乃分督諸將四面環攻西風大作復縱火焚死者不可勝計溺江死者又數萬人思任發攜其二子走孟飬犁其穴獲其虎符金牌及印章三十有奇驥留兵守之而還捷聞進貴爵定西侯驥封寧逺伯餘遷賞有差惟副總兵李安以攻餘賊敗績下獄論死質實鎮康蠻名石睒元立鎮康路明改府尋改州今為土州屬永昌府昔刺寨在鎮康州南羅卜思莊在南旬司南七十里杉木籠山在南甸司南一百馬鞍山在隴川司北石罅中流温泉成河熱如沸西峩渡在芒市司南路通木邦方瑛政之子初襲指揮使已論政死事功遷都指揮同知壬戌七年春二月帝如天夀山二月庚申如天壽山謁長陵獻陵景陵三月甲子還宫夏四月兩畿山東山西河南陜西旱蝗先命吏部左侍郎魏驥等分往南北畿及各郡捕蝗至是振陜西饑免山東山西河南被灾税糧質實魏驥字仲房蕭山人由訓導召修永樂大典五月立皇后錢氏后族單微帝欲封后父貴為侯后輒遜謝故后家獨無封質實皇后錢氏海州人六月遣户部侍郎焦宏備倭倭屢入冦至是陷大嵩所殺官牢百人掠三百人糧四千四百餘石軍器無算乃命宏整飭浙江備倭事兼理蘓松福建質實大嵩守衛千户所洪武二十年建在寧波府定海縣東南二百三十里冬十月太皇太后張氏崩大皇太后大漸命中官問楊士奇楊溥國家尚有何大事未舉士奇舉三事其一言建文君雖亡曾臨御四年當修實録仍用建文年號其二言太宗詔冇收方孝孺諸臣遺書者死宜弛其禁其三未及上而太皇太后已崩遺詔勉大臣佐帝惇行仁政語甚諄篤諡曰誠孝昭皇后王振自太后有疾數年間已縱恣及太皇太后崩遂益無忌憚矣十一月衛拉特遣使入貢先是四年托歡死子額森嗣稱太師淮王于是北部皆服屬托克托布哈具空名不復相制嵗入貢主臣並使朝廷亦兩敕答之稱托克托布哈曰達達可汗額森曰太師賜賚甚厚並及其妻子部長故事衛拉特使止三十餘人其後利朝廷賞賚所遣動以千計大同供應費至三十餘萬巡撫盧睿俱以供饋有缺至下獄是年春帝亦以貢使太多限三百人入間其秋至大同者復二千餘人旬日又百餘人帝悉納之使人以馬易弓藏于衣筐不可勝計巡撫羅亨信請于居庸闗詰撿之帝不許鎮守太監郭敬嵗造箭簇數十覽遺其使帝亦不問十二月塟誠孝皇后合塟獻陵祔太廟癸亥八年春正月以王直為吏部尚書先是以災異罷大臣不職者郭璡等自陳帝切責而宥之及璡致仕遂以王直為吏部尚書直子為南京國子監博士考滿至京選司欲改北學以侍直直色曰亂法自我始矣固止之直遇王振未當少降辭振毎坐直前居其右曰太監四品吾尚書二品也振無如之何更加禮貌焉質實郭璡字時用新安人初名進仁宗更名璡夏五月復命王驥蔣貴帥師討麓川蠻思任發二走孟養也詔能擒穫者即以麓川地與之既而思任發自木邦竄緬甸緬人執之挾以求地而其子思機發復帥餘衆據者藍奏乞入朝謝罪廷議欲因而撫之王振不可七年八月復命驥總督雲南軍務未至而思機發遣弟招寨入貢不納且敕驥圖緬甸驥因請濟師至是復命蔣貴為平蠻將軍與驥合兵再討麓川發卒轉餉凡五十萬人驥至金齒檄緬人獻思任發緬人佯諾不遣及大軍逼境緬人以樓船來覘官軍而潛以他舟載思任發遁驥分軍為五進薄之緬人堅執前詔必與地始出思任發驥知緬人資木邦水利為唇齒且慮思機發將以獻其父故仇之故終不肯獻思任發驟乃趨者藍捣思機發巢破之思機發遁去俘其妻子部衆立隴川宣撫司而還後二年緬人始出思任發獻雲南思任發垂死千户王政斬之函首歸京師質實者藍麓川别寨地通孟養隴川宣慰司地舊名隴把司在隴川城北距省布政司六十六䄇雷震奉天殿震殿鴟吻帝輟朝祭告敕修省求直言大赦六月太監王振殺翰林院侍講劉球球應詔言事畧曰自古帝王政自己出則權不下移太祖太宗曰視三朝進大臣于便殿裁決庻政故權總于上陛下臨御今已九年願守二聖之成規復親决之故事使政本歸一古之擇大臣者必詢諸左右大夫國人及其有犯雖至大辟亦不加刑第賜之死今用大臣未嘗皆出公論及有小失輒桎梏箠楚之未幾又復其職甚非所以敬大臣也今之太常即古之秩宗今卿貳皆缺宜選習禮儒臣使領其職京師營作已五六年曰不煩民而役軍軍獨非國家亦子乎今營築多完宜罷工以蘓人力麓川用兵死者十七八軍資爵賞不可勝計今又遣將逺征緬甸責獻思任發假使得冦以歸不遏獻諸廷梟諸市而已然彼挾以為功必求與木邦分地不與則致怨與之則兩蠻並大是滅一麓川生二麓川也設有蹉跌兵事無已死者必多衛拉特貢使日増包藏禍心誠所難測宜分遣給事御史督視官軍及時訓練毋使借工各厰服役私家仍公武舉之選以求良將定招募之法以求武勇庾屯田公鹽法以厚蓄儲庻武備無缺而外患有防疏入下廷議惟擇太常官宜從令吏部推舉修撰董璘遂乞改官太常奉享祀事初球言麓川事振固已銜之欽天監正彭徳清球鄉人也倚振為奸公卿多趨謁球絶不與通徳淸恨甚遂摘疏中攬權語謂振曰此指公耳振益大怒㑹璘疏上振遂指球同謀並下錦衣衛獄囑指揮馬順殺球順遂夜攜一小校持刀至球所球方卧起立大呼太祖太宗校前斷其首血流被體猶植立支解之瘞户户下至景㤗初贈球翰林學士諡忠愍質實董璘字徳文高郵人有孝行明史劉球傳馬順殺球璘從旁竊血裙遺球家後球子鉞求得一臂裹裙以殮順有子病乆忽起捽順髪拳且蹴之曰老賊令爾他日禍逾我我劉球也順驚悸俄而子死小校亦死璘獄解遂歸不復出下大理少卿蒒瑄于獄既而釋之瑄有學行人稱為薛夫子初為山東提學僉事王振問楊士奇吾郷有可為京卿者乎士奇以瑄對召為大理少卿瑄至士奇使謁振瑄曰拜爵公朝謝恩私室吾不為也一旦㑹議束閣公卿見振皆趨拜瑄獨屹立振知為瑄也先揖之自是銜瑄㑹指揮某死振從子山欲強娶其妾誣指揮妻毒殺夫處極刑瑄辨其寃三却之都御史王文承振指劾瑄故出人罪振復諷言官誣奏瑄受賄下獄論死將行刑振蒼頭忽泣于㸑下問故曰聞薛夫子特刑也振感動㑹兵部郎中王偉亦申救乃免質實薛瑄字徳温可津人王文字千之初名強宣徳時賜今名束鹿人王偉字士英攸縣人秋七月祭酒李時勉荷校于國子監門三日釋之時勉與南京祭酒陳敬宗並以師道著聞時稱南陳北李時勉請改建國子監帝命王振往視時勉待振無加禮振銜之亷其短無所得時勉嘗芟􅃔倫堂樹旁枝振遂言時勉擅代官樹坐枷署門㫖下時時勉方坐束堂閲課士卷徐呼諸生品第髙下顧僚屬定甲乙揭榜乃行方盛署枷三日不解監生李責等三千餘人詣闕乞貸有石大用者上章願以身代諸生圜集蚏門呼聲徹殿廷振聞諸生不平恐教變及通政司奏大用章振内慙適㑹昌侯孫忠生日公卿皆為壽忠太后父也助教李繼因公卿請于忠太后使至忠家忠言今嵗生辰殊不樂以公卿皆集獨李先生荷校不至耳使復奏太后言于帝帝始知振所為即釋之質實陳敬宗字光世慈谿人李貴鳯陽人石大用豈潤人樸魯初不為六舘所知及是名動京師李繼史不詳其里系時勉傳云繼不拘檢柙時勉嘗規切之繼不能盡用然心感時勉言至是竟得其助冬十二月免山東復業民税糧二年御定資治通鑑綱目三編巻九
