body:
  text: 起癸丑明世宗嘉靖三十二年盡壬戊明世宗嘉靖四十一年凡十年癸丑三十二年春正月戊寅朔日有食之隂雲不見日食不見有頃大雪百官表賀因奏謝郊廟發明史書日食隂雲不見者多矣日食有常度而隂雲遮蔽止于一方所謂不見者獨京師不見耳宋紹興三十一年正月朔太史奏日當食不食然當時猶以日食免朝讀史者韙焉嘉靖惑于瑞應惟以粉飾治象為心一時諸臣迎合意㫖紛紛諱飾具表稱賀導諛貢媚相習成風㡬不可勝責至因表賀之故奏謝郊廟則是愚人而并以愚神其誰欺欺天乎遣侍郎呉鵬振淮徐水災徐邳等十七州縣連被水患飢民甚衆剽刼吏不能禁乃命河道都御史曽鈞等濬劉伶臺至赤晏廟八十里築草灣老黄河口増髙家堰長隄繕新荘等舊牐命發淮徐倉米麥四萬石運司餘鹽銀五萬两遣刑部左侍郎呉鵬振之質實吴鵬字萬里秀水人鈞等䟽畧曰劉伶臺至赤晏廟凡八十里乃黄河下流頃為淤沙壅塞以致奔潰此其䟽濬所最先者次則草灣老黄河口衝決淹沒安東一縣亦當急築既成之後宜築長隄磯嘴以偹衝擊又三里溝新河口比舊口水高六尺若開舊口雖有沙淤之患而為害稍輕若開新口未免淹沒之虞而漕舟頗便宜將新口暫閉建置牐座及將髙家堰増築長堤原建新荘等牐加石修砌以遏横流鵬等䟽畧曰比年淮徐水患議者謂海口積沙壅閼下流所致今臣親歴其地販鬻之舟往来無滯乃知積沙之説出自傳聞惟草灣老黄河口劉伶臺宜挑濬築塞使水復故道不致横潰三里溝新開河口迎納泗水清流可以避黄河之衝宜建牐以時啓閉至六月南京科道祁清徐栻各奏言邇因山東徐邳嵗荒特遣重臣振恤第今天下被災之地不獨徐邳為然若南畿山西陜西暨北直順徳等府及湖廣江浙所在凶歉或經嵗恒暘赤地千里或大水騰溢畎畝草根木皮掘剥無餘子女充飱道殣相望其歸徳滕沂諸處盗賊公行道途梗塞大江以南蘓松濵海諸䖏則倭㓂狂噬井邑為墟飢饉師旅交興㳫至非破格蠲振不足以甦民困而延國脉也乃京師之帑蔵既虚各省之搜括已竭額外之征求未已軍興之供億日煩司農懍懍朝不給夕百方謀畫求所以生財者不得也則蠲振將安所取乎臣謂當汰冗費省繁文乞下所司議尋户部議言各處災傷自奉命振貸外更勅撫按官多方振䘏至于軍國調度今京營正備兵及旂守等三衛新軍及官校勇士數萬皆仰給官食其他無用之兵無事之官無名之支無益之費不可勝紀總太倉賦課入少出多無可抵補而近來繕邉撫敵修城濬河衣裝賞賜皆出嵗額㑹計之外又安有餘裕以佐百姓急宜如清等議通行两京及各省撫按官令各條上冗費以緩征求庶民困可甦從之兵部貟外郎楊繼盛上疏劾嚴嵩下詔獄帝既誅仇鸞罷馬市乃思繼盛言自典史四遷至兵部貟外郎時嚴嵩方用事恨鸞初凌已善繼盛首攻鸞欲驟貴之復改兵部武選司而繼盛惡嵩甚于鸞且念起謫藉思所以報國抵任甫一月即草奏劾嵩齋三日乃上奏曰臣孤直罪臣䝉天地恩超擢不次夙夜祇懼思圖報稱盖未有急于請誅賊臣者也請以嚴嵩十大罪為陛下陳之祖宗罷丞相設閣臣偹顧問視制草而已嵩乃儼然以丞相自居百官奔走請命直房如市無丞相名而有丞相權是壊祖宗之成法大罪一陛下用一人嵩曰我薦也斥一人曰此非我所親陛下宥一人嵩曰我救也罰一人曰此得罪于我伺陛下喜怒以恣威福是竊君上之大權大罪二陛下有善政嵩必令子世蕃告人曰主上不及此我議而成之欲天下以陛下之善盡歸于嵩是掩君上之治功大罪三陛下令嵩票擬盖其職也嵩何取而令世蕃代之題疏方上天語已傳故京師有大丞相小丞相之謡是縱姦子之僣竊大罪四嚴效忠嚴鵠乳臭子耳未嘗一渉行伍皆以軍功官錦衣两廣將帥俱以私黨躐府部是冒朝廷之軍功大罪五逆鸞下獄賄世蕃三千金嵩即薦為大將已知陛下疑鸞乃互相排詆以泯前迹是引悖逆之奸臣大罪六諳逹深入擊其惰歸大機也嵩戒丁汝夔勿戰是誤國家之軍機大罪七郎中徐學詩給事中厲汝進俱以劾嵩削籍内外之臣中傷者何可勝計是専黜陟之大柄大罪八文武遷擢但論金之多寡將弁惟賄嵩不得不朘削士卒有司惟賄嵩不得不掊克百姓毒流海内患起域中是失天下之人心大罪九自嵩用事風俗大變賄賂者薦及盗跖踈拙者黜逮夷齊守法度者為迂滯巧彌縫者為才能是敝天下之風俗大罪十嵩有是十罪而又濟之以五奸以左右侍從之能察意㫖也厚賄結納得備聞宫中言動是陛下之左右皆賊嵩之間諜以通政司之主出納也以趙文華為使凡有䟽至必先送嵩閲竟然後入御是陛下之喉舌乃賊嵩之鷹犬畏厰衛之緝訪也即令子世蕃結為婚姻是陛下之爪牙皆賊嵩之𤓰葛畏科道之多言也非其私屬不得與臺諫有所愛憎即授之論刺是陛下之耳目皆賊嵩之奴𨽻懼部寺之猶有人也擇有才望者羅致門下聫絡盤結深根固蔕是陛下之臣工皆賊嵩之心膂陛下柰何愛一賊臣而使百萬蒼生䧟于塗炭哉願陛下聴臣之言察嵩之奸或召問二王或詢諸閣臣重則置之憲典以正國法輕則諭令致仕以全國體疏入帝已怒嵩見召問二王語喜謂可指此為罪宻搆于帝帝益大怒下繼盛詔獄詰何故引二王繼盛曰非二王誰不懾嵩者獄上杖之百移刑部定罪侍郎王學益嵩黨也欲坐繼盛詐傳親王令㫖絞郎中史朝賔持之嵩謫之外于是尚書何鰲竟如嵩指成獄時繼盛下獄將杖或遺之蚺蛇膽却之曰椒山自有膽何蚺蛇為椒山繼盛别號也及入獄創甚夜半而蘓碎甆盌手割腐肉肉盡筋掛膜復手截去獄卒執燈顫欲墜繼盛意氣自若質實嚴效忠嚴鵠俱世蕃子是年二月工部尚書歐陽必進奏辨楊繼盛所論嚴效忠冒功事詔兵部核覆子是武選司署郎中周冕言臣奉詔檢嘉靖二十七年通政司状嚴效忠時年十六因武㑹試未第咨送两廣軍門聴用未及年餘總兵官陳圭都御史歐陽必進奏黎賊平遣效忠報㨗授錦衣衛試所鎮撫未踰月嚴鵠言兄效忠曽斬首七級并功加賞應得署副千户今效忠身抱痼疾鵠請代職臣心疑其偽方將覈實以聞嵩子世蕃乃自創一稿屬臣依違題覆臣觀其稿率誕謾舛戾如效忠曽中武舉何初無本籍起送文牒今又稱民人而不言武舉如效忠果鵠之兄世蕃之子則世蕃数子俱㓜未有名效忠者如效忠果斬首七級則當時状稱年止十六豈能赴戰何軍門諸將俱未聞斬獲功獨宰相一孫乃驍勇冠三軍如曰效忠對敵脛臂受創計臨陣及差委相去未一月何以萬里軍情即能馳報如曰效忠到京以創甚疾故何以鵠代職之日止告不能受職如曰效忠鎮撫當代則奏㨗功止及身例無傳襲如曰效忠功當并論例先奏請何止用通狀而逼令司官奉行臣悉心亷訪初未有名效忠者赴軍門聴用鵠亦非效忠親弟其姓名乃詭設首級亦要買非有纎毫實跡必進既嵩鄉曲圭又世蕃姻親依阿朋比共為欺罔且累朝以来未聞有宰相之子孫送軍門報效者乞特賜究正使天下曉然知朝廷有不可倖之功不可犯之法䟽入下冕詔獄拷訊斥為民至三月廵按雲南貴州御史趙錦䟽言臣伏見曰食元旦變異非常又山東徐淮仍嵗大水四方頻地震災不虚生昔太祖髙皇帝罷丞相散其權于諸司為後世慮至深逺今之内閣無宰相名而有其實非髙皇帝本意今嚴嵩怙寵張威竊權縱欲事無巨細罔不自専又有違忤必中以禍百司望風惕息天下事未聞朝廷先以聞政府白事之官班候于其門請求之賂輻輳于其室銓司黜陟本兵用舍莫不承其意㫖邉臣失事率朘削軍資納賕嵩所無功可以受賞有罪可以逭誅至宗藩勲戚之襲封文武大臣之贈謚其遲速予奪一視賂之厚薄以至希寵干進之徒妄自貶損稱號不倫亷耻掃地有不忍言者自庚戍之後陛下嘗募天下武勇以足兵竭天下財力以給餉搜天下遺逸以任將而封疆之臣卒未有為陛下寛宵旰憂者盖縁權臣行私將吏風靡以掊克為務以營競為能致朝廷之上用者不賢賢者不用賞不當功罰不當罪財用已竭而外患未見底寧民困已極而内變又虞將作願陛下立斥罷嵩以應天變㑹周冕以争冒功事下獄而錦䟽適至帝震怒謂錦欺天謗君遣使逮錦下詔獄拷訊榜四十斥為民隆慶初起冕太僕少卿未任卒擢錦太常少卿廵撫貴州終刑部尚書始錦以忤嚴嵩得禍及之官貴州道出嵩里見嵩葬路旁惻然憫之属有司䕶視人以是稱錦長者二王謂裕王載垕即穆宗及景王載圳也玉學益安福人史朝賔晉江人何鰲山隂人三月振陜西山東饑發陜西布政司倉庫錢榖振濟陕西發臨清倉粟及㤗山香錢振恤山東閏三月築京師外城以邊警故築外城一十五里閲九月訖工質實京師内城九門築自明初至嘉靖二十一年時邉報日至都御史毛伯温等言古者有城必有郭宜築外城下户工二部議以匱乏停止至是給事中朱伯辰復言髙皇帝定鼎金陵于時即築外城聖慮宏逺盖為萬年之計文皇帝移都北平宻邇邉塞顧有城無郭者則締造方始未暇盡制耳臣竊見城外居民繁夥無慮數十萬户且四方萬國商旅貨賄所集不宜無以圉之矧今邉報屢警不可不及時圖之臣嘗履行四郊咸有土城故址環繞周規可百二十餘里若仍其舊貫増卑培薄補缺續斷即可事半而功倍矣疏入命相度外城舊址周圍共計七十餘里以閏三月十九日興工築正南一面轉抱東西角樓長二十八里凡七門正南曰永定南之左曰左安南之右曰右安東曰廣渠東之北曰東便西曰廣寕西之北曰西便倭㓂浙江海賊汪直糾羣盗勾集各島倭人大舉入㓂連艦百餘艘蔽海而至自台寧嘉湖以及蘓松至于淮北濵海数千里同時告警賊屯據浙江昌國衛凡五日叅將俞大猷以舟師攻之始去廵視浙江都御史王忬條上海防八事并以倭冦出境浮海東遁奏聞倭自閏三月登岸至六月留内地凡三月餘若太倉海鹽嘉定長洲諸縣金山鎮海諸衛所皆被焚掠上海縣昌國衛南滙吴淞江乍浦諸所皆為所攻䧟崇明華亭青浦象山嘉興平湖海寧臨海黄巖慈谿山隂㑹稽餘姚諸縣鄉鎮焚蕩畧盡質實海鹽古武原鄉秦置縣元為海鹽州明洪武中復為縣属嘉興府長洲本呉之長洲漢為吴縣唐置長洲縣明属蘓州府今皆因之金山衛在松江府東南七十二里洪武二十年建以山而名衛南瀕海與金山對峙有城周十二里南滙守禦千户所在上海縣東南八十里洪武二十年建所城周九里有竒吴淞江守禦千户所在嘉定縣東南四十里吴淞江北岸明洪武十九年建有城當吴淞江入海之口乍浦在嘉興府平湖縣東南二十里與海鹽縣接界明洪武中築城以為備禦華亭漢婁縣地三國時吴封陸遜為華亭侯即此唐天寳中置華亭縣明属松江府青浦明置縣属松江府平湖明置縣属嘉興府今皆因之海寧漢海鹽縣元改曰海寧縣明屬杭州府今為海寧州仍属杭州府黄巖隋臨海縣地唐天授中改黄巖縣明属台州府慈谿古句章縣地唐開元中置慈谿縣明属寧波府今皆因之王忬條上海防八事一禁近海豪民通倭以絶禍本二照各邉例惟以奮勇血戰為功不以損傷為罪三選調閩浙兵相兼操習以資防禦四通行两廣直𨽻廵撫操江官逺行哨探分布兵船彼此夾攻五两省守廵兵備官照原定地方駐劄以専責成六寛禁令以開自新如脅從賊犯准令投首積年渠魁亦聴歸降七閩浙漁船量議収税及查理鹽課事宜以助軍餉八濵海頑民接濟外㓂及洩漏消息者䖏之極刑全家發邉充軍部議俱從之忬後復請築嘉善崇徳桐鄉徳清慈谿奉化象山諸縣城而恤被冦諸府秋七月諳逹大舉入侵初叛人趙全邱富等以罪亡入敵招集亡命居豐州築城自衛墾水田搆宫殿號曰板升板升華言屋也諳逹毎入侵必置酒全所問計全等教以製鈎杆攻城堡之法諳逹信用之是嵗春两犯宣府至是復大舉深入下渾源靈邱廣昌急攻插箭浮圖等峪逰擊陳鳯朱玉力戰郤之敵分兵東犯蔚而掠代繁畤已駐鄜延二十日屠掠延慶諸城㡬遍㑹久雨乃去未㡬復以萬騎侵大同廵撫趙時春禦之遇伏敗績總兵官李涞戰死全軍皆沒明年春復犯宣大攻薊鎮墻百道並進警報日數十至京師戒嚴薊遼總督楊博悉力拒守募死士夜斫其營敵驚擾乃遁質實插箭峪在今直𨽻易州廣昌縣東南浮圖峪在廣昌縣東路出紫荆闗繁畤漢縣東魏改郡金為堅州明洪武二年復為縣属代州延慶州秦属上谷郡元属奉聖州延祐三年改置龍慶州明隆慶初改延慶州今皆因之楊博字惟約蒲州人金星晝見自戊辰至辛未四日乃㐲九月柘城盗師尚詔作亂官軍討平之尚詔本鹽徒以私販作奸剽掠逺近官府不能制廵撫謝存儒苟幸無事假以總保長令總諸鎮民捕盗尚詔肆為威虐守臣欲誅之遂反結劇盗數千薄歸徳城其黨啓門納之乃刼獄囚掠帑蔵去官軍分道擊賊遇之鄢陵與戰敗績復擊之于霍山賊團官軍無敢進者副使曺邦輔斬最後者士卒競進賊大潰擒斬六百餘人已而追獲尚詔于山東莘縣詔即所在斬之賊起四十餘日破府一州二縣八屠戮十餘萬人三省皆震質實柘城隋縣明属睢州今属歸徳府霍山漢灊縣地隋為霍山縣明属六安州莘縣漢陽平縣隋為莘縣明属東昌府今皆因之謝存儒蒲州人曺邦輔字子忠定陶人冬十月振河南山東饑户部言河南山東嵗饑盗起請發臨清倉米七萬石以三萬石自衛河逹衛輝振河南以四萬石振山東仍敕撫按官出官銀数萬两于隣近州縣糴粟振民及立均糴之法以平時值從之㑹吏部侍郎程文徳上言今直𨽻河南山東徐邳淮揚等處方數千里水災異常民不聊生流離載道言官陳振䘏未見旦夕亟行臣聞救荒莫便乎近其人莫不便乎拘以常格請于两直𨽻二省各遣行人齎詔諭宣布徳意慰拊顛贖令各州縣自為振給聼其便宜䖏置凡官帑官廩贖納勸借苟有以濟民者一不限制又近日户部申明開納事例亦暫許本地上納随其所有粟黍麥菽之積可救饑者皆得輸官計直視其合例者官為請部劄而授之自撫按以下凡諸常事悉暫停輟一意振䘏督責諸守令夙夜從事仍令造冊登計全活之數定為等則以課殿最䟽入下部議行甲寅三十三年春正月朔以賀表違式杖六科給事中于廷先是三十二年春正月朔以賀表語乖文體逮禮科給事中楊思忠于午門外杖之百罷為民六科官各奪俸一月以思忠初議孝烈皇后不祔廟帝心銜之也至是以賀表中失擡萬夀字詔錦衣衛逮六科給事中張思静等各廷杖四十夏五月命張經總督軍務討倭南京兵部尚書張經等言洪武間以倭冦不靖遣信國公湯和經畧海防凡閩浙濵海之區陸有城守水有戰船故百餘年冦不能為害其後法弛弊生軍士有納料放班之弊强富者散遣老弱者哨守戰船損壊亦棄不修以致冦得而入請行各䖏廵撫嚴督所属預集兵船以守要害追捕納料軍士以寔行伍清理積嵗料銀以造戰船従之朝議因以倭冦猖獗宜設總督大臣命經不觧部務督江南北浙江山東福建湖廣諸軍便宜行事已而改經右都御史兼兵部侍郎専辦討賊時倭二萬餘據柘林川沙窪抄掠四出經至選將練兵為搗巢計以江浙山東兵屢敗乃大徴两廣狼土兵協力進勦質實柘林川沙窪在松江府上海縣東南地連柘山嘉靖三十六年以廵撫趙忻等奏置川沙堡築城周四里屯設官兵以偹倭㓂遂為巨鎮海防考云堡南五十里為川沙滙秋七月詔勲戚大臣入直西内帝崇奉道教益篤特命駙馬都尉鄢景和安平伯方承裕尚書李黙王用賔左都督陸炳入直西内侍郎程文徳閔如霖郭朴吴山供撰青詞景和以不諳元理辭帝不悦罷其入直已而賚在直諸臣景和與焉景和辭免且言臣願洗心滌慮效馬革裹尸之報帝怒其怨謗熙為民質實方承裕鋭之子李黙字時言甌寧人王用賔字元興咸寧人陸炳平湖人以軍籍𨽻錦衣衛閔如霖字師望烏程人郭朴字質大安陽人吴山字曰静髙安人乙夘三十四年春二月遣趙文華督視海防文華謟事嚴嵩結為父子自通政使進工部侍郎東南倭患棘文華言七事首請遣官望祭海神帝用嵩言即命文華往兼督察軍情文華恃寵恣睢百司震懼公私財賂填集江南為之困敝又牽制兵機顛倒功罪雖徵兵半天下而倭勢愈熾掩時文華條陳偹倭便宜七事首祭海神次令有司骼輕徭次増募水軍次蘓松常鎮民田一夫過百畝者重科其賦且預徴官田税三年次募富人輸財力自效事寧論功次遣重臣督師次招通番舊黨並海塩徒易以忠義之名令偵伺賊情因以為閫兵部尚書聶豹議行其五事惟增田賦遣重臣二事不行帝怒奪豹官質實聶豹字文蔚吉安永豐人夏五月張經敗倭于王江涇詔逮經下獄趙文華頤指大吏是時張經方徵四方及狼土兵議大舉經自以位在文華上獨心輕之文華不悦與廵按御史胡宗憲比屢趣經進兵時諸路狼兵已集惟永順保靖兵未至經欲待其至而後戰文華再三言經守便宜且慮文華輕淺洩師期竟不以告文華怒䟽劾經養寇失機䟽方上而永保兵已至時柘林倭合新倭四千餘人突犯嘉興經分遣叅將盧鏜等督狼土兵水陸撃之保靖宣慰使彭藎臣與賊遇于石塘灣大戰敗之賊遂北走平望副總兵俞大猷以永順宣慰司兵邀擊之賊奔回王江涇保靖兵復急擊其後賊遂大敗諸軍共擒斬首功一千九百八十有竒溺水及走死者甚衆餘賊不及數百奔歸柘林自有倭患以来東南用兵未有得志者此為軍興戰功第一文華攘之以奏謂已與宗憲督師所致帝問嚴嵩嵩對如文華指且言狼兵初至經不許戰至文華宗憲致㨗遂冒以為功帝深入其言即下詔逮經經至䟽言臣任總督半載前後俘斬五千乞賜原省不納遂與廵撫李天寵俱論死繫獄舉朝知其寃莫敢奏質實石塘灣在今浙江嘉興府石門縣東北二十里亦曰石門塘出吴江之徑道也平望鎮名在江南蘓州府吴江縣南四十五里為控接嘉湖之要道嘉靖中倭㓂嘗屢犯此保靖宣慰使司明洪武中置永順宣慰使司洪武二年為州六年置司皆属湖廣行省王江涇在嘉興府秀水縣北相傳以王江二姓居此而名今有鎮為南北要衝胡宗憲字汝貞績溪人俞大猷字志輔晉江人李天寵以文華謗除名至是復為宗憲所劾被逮時給事中李用敬閻望雲等言今獲首功以千計正倭奪氣之時宜乗勢捣柘林川沙窪之巢以殱醜類若復易帥恐惧機㑹帝大怒謂用敬等黨奸阻法乃命錦衣逮用敬等各廷杖五十黜為民秋八月曺邦輔殱倭㓂于滸墅關初倭自宜興奔蘓州㑹柘林洋賊遭風壞三舟餘賊三百有竒登岸至陶宅鎮據之邦輔時廵撫應天慮二賊合為患也乃親督副使王崇古㑹集各部兵扼其東路四面蹙之時僉事董邦政把總婁宇督兵守陶宅邦輔計陶宅賊據險且衆未可進兵乃召邦政宇助勦合戰斬首十九級賊始懼欲潜走太湖官軍進及之盡殱其衆副將何卿師潰邦輔援之以火器破賊舟前後俘斬六百餘人侍郎趙文華欲攘其功邦輔㨗書先奏文華大恨既而與浙江廵按御史胡宗憲㑹邦輔攻陶宅賊諸營皆潰師退邦輔進攻之復敗坐奪俸文華奏邦輔避難擊易致師後期總督楊宜亦奏邦輔故違節制給事中夏栻孫濬争之得無罪文華奏言賊易滅以督撫非人致敗乃逮繫邦輔謫戍朔州質實陶宅鎮在松江府華亭縣青村所城東奉賢縣之西北王崇古字學甫蒲州人冬十月殺張經李天寵遂及兵部貟外郎楊繼盛繼盛繫獄三載帝猶無意殺之已而有為營救于嵩者其黨胡植鄢懋卿怵之曰公不覩養虎者邪将自貽患嵩頷之㑹張經李天寵坐大辟嵩揣帝意必殺二人比秋審因附繼盛名並奏得報繼盛妻張氏伏闕上書請代夫死嵩屏不奏繼盛遂與經天寵並棄西市楊繼盛繫獄毎當朝審時觀者塞衢見繼盛囊三木輙憤嘆曰柰何不以囊嵩而囊若耶或至泣下繼盛臨刑賦詩曰浩氣還太虚丹心照千古平生未報恩留作忠魂補天下涕泣傳誦之隆慶初恤直官諫諸臣以繼盛為首贈太常卿謚忠愍張經亦復謚襄愍質實胡植南昌人鄢懋卿豐城人繼盛妻張氏上書言臣夫繼盛誤聞市井之言尚狃書生之見遂發狂論聖明不即加戮俾従吏議两經奏讞俱荷寛恩今忽闌入張經䟽尾奉㫖䖏决臣仰惟聖徳昆虫草木皆欲得所豈惜一廻宸顧下垂覆盆倘䝉末减不勝大幸若以罪重必不可赦願即斬臣妾首以代夫誅夫雖逺竄邉隅必能效死疆場以報君父嵩不以聞十一月壬辰朔日有食之十二月山西陕西河南地震三省同時地震聲如雷雞犬鳴吠陕西渭南華州朝邑三原及山西蒲州諸䖏尤甚或地裂泉湧中有魚物或城郭庭舍䧟入地中或平地突成山阜河渭溢華岳終南山鳴河清數日官吏軍民死者八十三萬有竒質實渭南漢新豐縣苻秦析置渭南縣明属西安府今因之華州鄭始封邑復属晉後魏為華山郡太和十一年兼置華州明属西安府今属同州府渭水在西安府北三十里華岳在華隂縣南十里終南山在西安府南五十里丙辰三十五年春正月彗星見長尺許西南指漸長至三尺餘掃太微垣東北行入紫㣲垣犯天牀至四月始滅二月振平陽延安災以地震發銀四萬两振山西平陽府陕西延安府諸属縣并蠲免秋糧有差時山西河南同日地震遣官祭告山川河洛并所在帝王寢廟以胡宗憲總督軍務討倭初張經被逮易以周珫未㡬又以楊宜代之自經逮後狼土兵皆憤恨無鬬志宜節制不行而趙文華威出宜上宜惟曲意奉之而已時倭聚柘林其黨自紹興竄轉掠杭嚴徽寧國太平直犯南京出秣陵關刼溧陽宜興扺無錫趨滸墅轉鬬數千里殺傷㡬四千人厯八十餘日㑹文華欲奪應天廵撫曺邦輔之功而邦輔㨗書已奏文華乃大集浙直兵與宗憲親将之進營甎橋倭悉鋭来衝大敗文華奪氣乃定計招撫㑹川兵破賊周浦總兵俞大猷破賊海洋文華遂言水陸成功江南清晏請還朝許之比至言餘倭無㡬盛毁楊宜而薦宗憲遂奪宜職而擢宗憲為兵部侍郎督諸軍討倭質實秣陵關在江寧縣南今有鎮周浦在奉賢縣東南一名杜浦周珫應城人楊宜衡水人三月以趙文華為工部尚書文華歸後東南敗報踵至帝疑文華妄數詰嚴嵩嵩曲為觧帝終不釋㑹吏部尚書李黙發䇿試選文中言漢武事征討而海内虛耗唐宗攻淮蔡而晚業不終文華劾其誹謗黙坐死帝以是謂文華忠進尚書加太子太保己初黙為吏部尚書時嚴嵩柄政擅黜陟權黙毎持意嵩銜之及大計羣吏黙戒門下謝賔客嵩甚恨趙文華視師還黙氣折之至是廵按御史周如斗以倭事敗状聞文華謀所以自觧稔帝喜告訐遂劾黙誹謗隆慶中復黙官萬厯中諡文愍夏四月振陕西災以陜西甘肅諸䖏地震詔發太倉銀三萬两于延綏一萬两于寧夏五千两于甘肅一萬两于固原恊濟民屯軍餉仍令所司亟覈被災重者停免夏税并將先發帑銀及備振贓罰事例茶馬折穀銀救貧民五月復遣趙文華視師倭警遝至部議再遣大臣督師已命兵部侍郎沈良才矣嵩令文華自請行且言江南人矯首望文華帝信之命兼右副都御史提督軍務文華再出胡宗憲欲藉以通嵩謟奉無不至文華素不知兵亦倚宗憲两人交甚固已而宗憲俘陳東平徐海文華以大㨗間歸功上元帝大喜加文華少保宗憲右都御史質實俘陳東平徐海時宗憲遣指揮夏正䓁要海降且曰陳東已有約所慮獨公耳海因疑東而東知海營冇宗憲使者亦大驚由是有隙宗憲因諭海縳陳東麻葉許以世爵海果縳葉以獻宗憲觧其縳令以書致東圖海而隂泄其書于海海怒海妾受宗憲賂亦説海于是海復行計縳東来獻刻日請降忽率百餘人先期猝至文華懼欲弗許宗憲強之海叩首伏罪宗憲慰之海自擇沈荘屯其衆沈荘者東西各一以河為塹宗憲居海東荘以西荘䖏東黨令東致書其黨曰督府檄海夕擒若属矣東黨懼乗夜攻海海走間道官軍圍之投水死海之未降也倭萬餘趨浙江皂林等䖏將軍宗禮帥兵九百禦之于崇徳三里橋三戰皆㨗斬首三百餘級海等辟易稱為神兵㑹橋䧟軍潰禮與鎮撫侯槐何衡忠義官霍貫道俱死之禮驍勇敢戰所部箭手三十人皆壮士論者謂是役自興兵以来用寡敵衆血戰第一功云禮雖䧟敗然海等亦病創奪氣未㡬遂降採薊州礦銀薊州玉旺峪進紫礦砂一百五十斤先是有詔採薊州礦銀禮部議遣司官一貟往既行及是帝以天地之寳不可不重命追還原遣官更遣制勅房辦事左通政王槐錦衣衛千户仝天爵同内使一人採礦銀于玉旺峪尋户部主事張芹進山東寳山諸礦砂二百十七两礦銀二百两有竒帝以為少命從寔開取及嚴禁官民隐匿侵盗者其未取之所仍令奏聞取之夏五月冀州等䖏地震兾州高邑新河栢鄉隆平廣平等䖏一日三震聲如雷質實高邑漢房子縣北齊置高邑縣明属趙州今因之秋九月徽王載埨有罪廢為庶人自殺初載埨父厚爝善方士陶仲文仲文奏其忠敬奉道帝喜封為真人予金印及載埨嗣益以奉道媚帝命綰其父真人印南陽人梁高輔者自言能導引服食載埨用其術和藥命高輔因仲文以進高輔被上寵不復親載埨載埨銜之已而高輔為帝取藥不得求載埨舊所蓄者載埨不與而與仲文高輔大恨乗間言載埨過失帝疑之奪真人印仲文知釁已成不敢言㑹有民耿安告載埨奪其女下按治有司因發其諸不法事詔廢為庶人錮髙墻載埨自縊死妻妾皆從之質實厚爝徽恭王見沛之孫發明載埨一宗藩也而忽有真人世及之封已足駭聴伊誰所為方士仲文之力也俄而奪真人印而廢為庶人伊誰所為方士高輔之力也載埨信有罪矣懲之以法亦復何枉奈何以取藥不與為高輔所中傷遂致抵隙以申其罰使當日載埨悉以所蓄方藥出付髙輔則雖有告訐亦藥中寝其事矣明法勅罰者固如是乎冬十月丙戍朔日有食之金星晝見凡四日十一月陕西地震陕西山丹衛地一日三震聲如雷關城多壊丁巳三十六年春三月山東大雨雹山東沂州雨雹大者如盂小者如雞卯平地厚尺餘徑八十里傷人畜無筭質實沂州後周置隋曰琅邪郡唐復曰沂州明属兖州府今為沂州府夏四月奉天華盖謹身三殿災奉天殿災延燒華盖謹身二殿及文武二樓奉天左順右順及午門并午門外左右廊盡燬越日乃熄帝下詔引咎修齋五日止諸司封事停刑五月秋九月趙文華有罪免其子懌思戍邉三殿既災帝急欲建正朝門樓文華猝不能辦帝不懌且聞其視師江南黷貨要功状思逐之嚴嵩言文華因觸署南征疾尚未愈随令上章稱疾帝手批令回籍休養制下舉朝稱賀嵩獨不怡者累日帝怒無所洩㑹其子錦衣千户懌思以齎祀停封章日請假送父回籍帝大怒黜文華為民戍懌思邉衛文華故病蠱及遭譴卧舟中意悒悒不自聊一夕手捫其腹腹裂臟腑出遂死殺前錦衣衛經歴沈鍊鍊既至保安未有館舍賈人某詢知其得罪故空家舍授之里長老亦日致薪米遣子弟就學鍊語以忠義大節皆大喜塞外人素戅直又稔知嚴嵩惡争詈嵩以快鍊且縳草為人象李林甫秦檜及嵩醉則聚子弟攅射之或踔騎居庸關口南向㦸手詈嵩痛哭而歸語稍稍聞京師嵩大恨其黨路楷廵按宣府世蕃属與總督楊順合圖之两人日夜謀中鍊㑹蔚州獲妖人閻浩詞所連甚衆順喜謂楷曰是足以報嚴公子矣竄鍊名其中上之遂斬宣府市戍子襄極邉予順一子錦衣千户楷待銓五品卿寺順曰嚴公薄我賞意豈未惬乎并取鍊子衮褒杖殺之路鍊隆慶初贈光禄少卿任一子官子襄乃上書言楷楊順殺人媚奸状給事中魏時亮陳纉亦相繼論之遂下順楷吏論死天啓初鍊謚忠愍質實路楷汶上人楊順徳州人冬十一月諳達子錫林阿圍大同右衛錫林阿有妾曰托斯齊私部目懼罪来降楊順自詡為竒功致之京師錫林阿来索不得寇應朔二州毁七十餘堡縦掠大同圍右衛数匝順懼乃詭言敵欲以叛人趙全等来易托斯齊兵部尚書許論以為便乃遣托斯齊逸出塞紿之西走隂告錫林阿錫林阿執而戮之狎知順無能圍右衛益急更分兵犯宣薊西鄙震動嚴嵩意欲棄右衛帝不聽詔諸臣分兵措餉而以兵部侍郎江東代順時故將尚表以餽餉入圍城悉力捍禦時出兵突戰獲諳逹孫及婿與其部將各一人㑹江東及廵撫楊選總兵張承勲等各嚴兵進圍乃解質實大同右衛在大同府西二百里明初置萬厯三年増修城周九里今改右玉縣為朔平府治許論字廷議進少子江東山東朝城人楊選字以公章邱人錫林阿舊作辛愛托斯齊舊作桃松塞今並改胡宗憲誘降海盗汪直誅之直據海島挾倭為雄紏衆三千餘入寧波大掠朝廷懸賞購之迄不能致既而内地有偹倭亦多被勦戮有全島無一人歸者往往怨直直不自安宗憲與直同鄉里欲招致之釋直母妻于獄舘之杭州資給甚厚遣寧波諸生蔣洲齎其家書往招直直知家属固無恙顧心動及是遂率賊目數十人来貢市泊舟山之岑港將吏以為入㓂陳兵偹直遣其養子王激入見宗憲曰我以好来何故陳兵相待宗憲解諭百方要一貴官為質宗憲立遣指揮夏正往直疑解乃来謁宗憲慰之甚至令謁巡按御史王本固于杭州本固下直于獄以聞宗憲䟽請曲貸直以繫番人心本固争之遂斬直其黨大恨支觧夏正焚舟登山阻岑港而守已移之柯梅造新舟以遁宗憲利其去不追賊遂揚帆而南流刼閩廣質實舟山在寧波府定海縣治東明設千户所于此今改名定海山岑港在定海縣西北舊為戍守要地柯梅嶺名在定海縣海中過此即為外洋王本固邢臺人發明胡宗憲之計招汪直其本意未必非欲収島倭烏合之衆以殺其勢顧直之煽誘倭人肆其焚掠與陳東徐海厥罪維均誅之良是也王本固遽執下獄又何䟽請曲貸為至誅直之後其黨焚舟而遁是時宗憲兵力非不足以躡踪追勦乃聴其去而且利之是誠何心傳稱宗憲以趙文華為黨援文華既敗宗憲失所倚庇更借白鹿等物侈陳符瑞而且多其擒直之功足以固寵自立倭雖遁至他䖏若與已無傷者卒至蔓延数省荼毒海隅所謂以鄰國為壑又豈人臣為國禦侮之道哉十二月金星晝見戊午三十七年春三月總督宣大侍郎楊順以罪逮下獄方錫林阿圍大同殺掠吏民無筭順懼為路楷所奏賄以七千金楷悉為掩覆及是給事中吴時来抗章劾順罪且發楷受金状帝方怒順召禍立命逮順及楷下獄嚴嵩不能救乃言楷受金當勘而令其黨給事中鄭茂往茂還事事為順辨復言楷受金無左騐順楷俱薄譴于是時来即劾嵩朋黨罔上㑹主事張翀董傳䇿亦于是日劾嵩翀與時来皆徐階門生傳䇿則楷邑子時来先又官松江嵩疑階主使乃宻奏三人同日搆䧟必有人主之帝下三人詔獄鞫訊久之無所得三人皆譴戍然自是帝亦稍厭嵩矣質實吴時来字惟修仙居人張翀字子儀栁州人董傳䇿字原漢松江華亭人夏四月振遼東饑遼東大饑先已發銀五萬餘兩振之至是再發户兵工三部庫銀一萬兩命御史吉澄往振未㡬又以廵按御史周斯盛之奏復發銀二萬兩趣澄疾馳至振給之質實吉澄直𨽻開州人周斯盛陕西寧州人秋八月㓂圍甘州濟農犯永昌凉州進圍甘州十四日始退土蠻亦数㓂遼東質實濟農舊作吉能即前濟農子濟農係䝉古王號故父子並襲其稱舊分作吉囊吉能音譯岐今俱改正冬十月禮部進瑞芝先是帝于秘殿扶乩言服芝可延年乃詔有司採芝五岳及諸名山至是禮部進一千八百六十本詔廣求徑尺以上者民帝詔有司採諸名山五岳仍訪之民間㑹宛平縣張巨佑得芝五本獻之賚銀幣于是四方来獻者接踵而至總督胡宗憲廵撫阮鶚御史路楷等相繼上者不可勝計其芝皆積苑中内侍竊出市人復進之以邀賞凡得芝萬本聚為一山號萬嵗芝山己未三十八年春二月錫林阿襲灤河錫林阿與婁巴圖爾諸部謀大舉入邊屯㑹川聲言東下薊遼總兵王忬不能察遽引兵而東號令数易敵乗間入潘家口渡灤河而西大掠遵化遷安薊州玉田駐内地五日京師大震御史王漸方輅交章劾忬遂逮忬下詔獄論死數初王忬以才器見重所請無不從及為總督邉將以敗聞漸失寵嚴嵩夙不悦忬而忬子世貞復以口語為嵩子世蕃所憾楊繼盛之死世貞又經紀其䘮嵩父子亦大恨灤河變聞遂得行其計隆慶初世貞伏闕訟寃復忬官予恤質實潘家口在遵化州東北四十里灤河臣等御製恭讀濡水源考灤河源出獨石口外東北一百餘里灤河已延屯圖古爾山經西屯庫爾竒勒河自北來滙之自此遂名灤河至石家地灤分支折而西南流至新橋口入于海玉田秦無終縣唐萬嵗通天二年改為玉田縣明屬薊州今屬遵化州婁已圖爾舊作老把都今改夏五月廵撫都御史李遂平江北倭倭數百艘㓂海門遂令副使劉景韶㳺撃邱陞扼如臯而身馳㤗州當其衝賊知如臯有偹將犯㤗州遂急檄景韶陞遏賊連戰皆捷先是遂語諸將曰賊若由㤗州出鳯泗則陵寢驚若由黄橋逼𤓰儀則運道梗若沿海而至廟灣則絶地及是賊果沿海東掠遂喜曰賊無能為矣令景韶尾其後而致之廟灣復慮賊突淮安乃夜半馳入城賊尋至遂督叅將曺克新等禦之姚家蕩㑹通政唐順之副總兵劉顯来援賊大敗走保廟灣景韶亦敗賊印莊廟灣賊據險不出攻之月餘不克順之顯馳救三沙遂令景韶填塹夷木壑壘而陳以火焚其舟賊乗夜潜遁追奔至蝦子港江北倭悉平帝璽書奬遂遷南京兵部侍郎以順之代為廵撫順之尋卒質實如臯漢海陵縣地唐為如臯鎮南唐復為縣明属㤗州今属江蘓通州黄橋鎮名在通州㤗興縣北廟灣在淮安府山陽縣東北射陽湖㑹諸水由此入海有城今設同知駐此為濵海衝要䖏亦曰廟灣場姚家蕩在淮安府塩城縣西北商賈輻輳為濵海巨鎭印荘鎮名在㤗興縣東蝦子港在姚家蕩東南有蛤蜊蝦子等港李遂字邦良豐城人劉景韶湖廣崇陽人唐順之字應徳武進人初舉進士第一改庶吉士尋調主事遂引疾歸讀書陽羡山中凡天文樂律地理兵法弧矢勾股壬竒禽乙英不究極原委㑹趙文華視師特䟽薦順之順之高出䖏于羅洪先洪先曰向已𨽻名仕籍此身非我有安得侔䖏士順之遂出然順之聞望頗由文華之薦而損劉顯南昌人秋七月南京地震八月振遼東饑廵撫遼東侯汝諒言遼左濵海水陸險阻往時雖罹災害或止数城或僅数月未有全鎮被災三嵗不登如今日者臣春初被命入境見其巷無炊烟野多暴骨蕭條惨楚問之則云去年凶饉斗米至銀八錢母棄生兒父食死子父老相傳咸謂百年来未有之災于時布種入土遺民盻盻方望有秋乃夏秋之交滛雨田蟲交作今西成在候斗米猶至七錢冬春不至作何状矣乞大出内帑金錢以拯阽危䟽入詔户部即發太倉銀六萬两差御史一貟即往召糴設法輸運務濟百姓之急嵗終仍給發牛具銀五萬两以備来春布種庚申三十九年春二月南京兵亂殺總督糧儲侍郎黄懋官先是南京設振武營募健兒禦倭素驕悍懋官稍裁抑之舊制南軍有妻者月粮米一石無者減其四春秋二仲米石折銀五錢馬坤掌南京户部奏減折色之一懋官又奏革募補者妻糧諸軍以嵗饑求復折色故額懋官不可給餉又復逾期諸軍大怒遂以都肄日殺懋官裸尸于市守偹太監何綬等遣吏持黄紙許給賞萬金卒輙碎之許犒十萬金乃稍定侍郎李遂託病閉閣給免死劵以慰安之而宻捕首惡二十五人繫獄事聞追禠懋官官止誅叛卒三人而三人已前死兵自此益驕質實振武營南京兵部尚書張鰲以海警創設初議選各營精鋭不足乃益以四方趫健然京卒怯脆中選者十不及一二多團集㳺手惡少充之故致此變黄懋官莆田人馬坤字順卿南通州人三月以鄢懋卿總理鹽政舊制無一人總理四運司者至是懋卿以嚴嵩力總两浙两淮長蘆河東塩政驟増塩課四十餘萬两所至市權納賄勢燄薰灼其按部常與妻偕行製五綵與令十二女子舁之道路傾駭淳安知縣海瑞供帳簡薄抗言貧邑不能容軒車慈谿知縣霍與瑕亦清鯁不屈懋卿嗾廵塩御史袁淳劾之俱削籍質實淳安漢丹陽郡歙邑地唐改還淳縣宋改淳安縣明属嚴州府今因之鄢懋卿時為左副都御史户部以西浙两淮長蘆河東塩政不舉請遣大臣一人總理嵩遂用懋卿兩淮餘塩嵗徵銀六十萬两及懋卿增至一百萬两懋卿去廵塩御史徐爌極言其害乃復六十萬之舊嵩敗懋卿以贜戊邉海瑞字汝賢瓊山人霍與瑕韜之子秋七月大同總兵官劉漢襲諳逹于豐州破之先是敵聚衆喜峯口規犯薊鎮漢乗其虚𢷬其帳于灰河至是漢復與叅将王孟夏等分道出𢷬豐州擒斬百五十人焚板升畧盡時邱富已隨敵帳他徙趙全亦遁免質實灰河在山西寧武府西下流至馬邑縣入桑乾河當大同右衛邉外由玉林舊城而經黒河二灰河一歴三百餘里即豐州之地劉漢大同人八月胡宗憲獻白龜芝草自趙文華得罪宗憲失内援又見倭患方未已思自媚于上乃于一嵗中再獲白鹿以獻帝喜天瑞頻降告謝元極寳殿及太廟百官稱賀晋宗憲秩兵部尚書兼節制廵撫及操江都御史如三邉故事至是復獻白龜二五色芝五帝益大悦賜名龜曰玉龜芝曰仙芝告謝如前賚宗憲加等質實宗憲獻白鹿在三十七年宗憲性喜賔客東南才學士茅坤徐渭沈明臣軰皆招致幕府用是名日起其獻白鹿也令渭草表帝稱善宗憲以是益重渭渭知兵好竒計宗憲擒徐海誘汪直皆預謀焉後宗憲敗渭佯狂自廢茅坤字順甫歸安人徐渭字文長山隂人沈明臣字嘉則鄞人辛酉四十年春二月辛夘朔日有食之景王載圳之國初荘敬太子薨廷臣言裕王次當立不報帝晚年信方士二王皆不得見載圳年少既與二王同出邸居䖏衣服無别左右頗懐覬覦至是之國徳安居四年薨無子國除三月金星晝見丙子畫見歴二十四日而沒秋九月己丑朔日有食之九月振南畿災時蘓松常鎮杭嘉湖七府大水平地深数尺累月不退因命停徵是嵗秋糧仍改折起運改兑米有差七府事例贜罰銀俱留充振又以災傷免直𨽻揚州淮安鳯陽廬州等府所属州縣及兩淮運司等官入覲冬十一月以袁煒為户部尚書兼武英殿大學士預機務先是二月朔日食微隂欽天監言日食不見即同不食嚴嵩以為天眷趣禮部急上賀煒亦以為言尚書吴山仰首視天曰日方虧将誰欺耶仍救䕶如常儀帝怒山引罪去遂以煒代山及七月朔又日食欽天監言食止一分五杪例免救䕶煒乃阿帝意上言陛下以父事天以兄事日是以太陽晶明氛祲銷鑠食止一分與不食等臣等不勝忻忭䟽入帝大喜及是遂入閣煒本以青詞進與李春芳嚴訥郭朴並號青詞宰相質實袁煒字懋中慈谿人李春芳字子寔揚州興化人嚴訥字敏卿常熟人永夀宫災永夀宫在西苑成祖舊宫也帝自二十一年宫婢之變即徙居此是夜火作禁衛不及救乗輿服御及先世寳物盡燬乃暫御玉熈宫時公卿大臣皆欲帝歸大内而不敢請徐階因請以三殿大工之餘木趣治永夀宫百日而工就帝即日徙居之命曰萬夀宫質實玉熈宫近西華門孔道列屋二層發明嘉靖不御大内公卿大臣皆知其非是意欲請而不敢言適當所居永夀火災之後正可藉辭請歸大内此嚴嵩與徐階同為職所當言之事也乃嵩既以徙居南城為對已為希合不居大内之指階復以三殿大工餘材趣治尤属巧于逢迎盖是時嵩已為階所中故事事欲與相反以自表其才識即為争權邀寵之圖于此已見一班矣史謂階雖任智數要為不失其正此概論其生平耳若以此一事觀之豈惟智數是尚又寕得謂不詭于正哉壬戌四十一年春三月増設南贛副總兵官從總督浙江福建江西尚書胡宗憲請也於南贛設副總兵官以吉安守偹属之于建昌撫州設叅將以鉛山守偹属之復設逰擊于南昌而以鄱陽守偹改為叅將令専練舟師控制九江質實南贛謂南安贛州二府九江秦九江郡隋置江州大業初改為九江郡明為九江府今因之増設甘州茶馬司從廵撫都御史鮑承廕請也于甘州適中之地設茶馬司令招商茶易番馬仍以四川保寕茶課全徴本色助之質實明史職官志茶馬司大使一人正九品副使一人從九品掌市馬之事鮑承廕山西長治人夏五月嚴嵩以罪免其子世蕃下獄帝居西苑大臣希得進見惟嵩獨承頋問御札一日或數下雖同列不獲聞以故嵩得逞志徧引私人居要地士大夫奔走輻輳皆惴惴事嵩然攬權既久帝亦寝厭之而漸親徐階初帝所下手詔語多不可曉惟世蕃一覽了然答語無不中世蕃頗通國典曉暢時務嘗自負為天下才嵩既耄昏且旦夕直西内諸司白事輙曰以質東樓東樓者世蕃别號也及嵩妻歐陽氏死世蕃居䘮不得入直所代票擬嵩受詔多不能答毎遣人持問世蕃值其方縱滛樂不以時答中使相繼促嵩嵩不得已自為之往往失指所進青詞又多假他人手不能工以此積失帝歡㑹萬夀宫災嵩請徙南城離宫南城英宗為太上皇時所居也帝不悦而階營萬夀宫甚稱㫖由是帝益向階頋問多不及嵩即及嵩祠祀而已未㡬方士藍道行以扶乩得幸故惡嵩帝問天下何以不治道行詐為乩語具道嵩父子弄權狀帝問上仙何不殛之答曰留待皇帝自殛帝心動欲逐嵩御史鄒應龍避雨内侍家偵知之因抗䟽極論嵩父子不法帝遂罷嵩下世蕃詔獄嵩為世蕃求釋不聴法司奏論世蕃及其子錦衣鵠鴻客羅龍文俱戍邉詔從之特宥鴻為民使侍嵩而錮其奴嚴年于獄擢應龍通政司叅議侍郎魏謙吉等皆坐奸黨黜謫有差質實鄒應龍字雲卿長安人應龍將具䟽劾嵩夜夢出獵見一髙山射之不中東有培塿其下甚壮一注天拉然覺而悟曰此小兒束楼之兆也遂専劾世蕃慿藉父勢専利無厭私擅爵貴廣致賄遺毎一開選則視官之髙下而低昂其值及遇陞遷則視缺之美惡而上下其價以致選法大壊市道公行羣醜競趨索價轉鉅如刑部主事項治元以萬二千金而轉吏部舉人潘鴻業以二千二百金而得知州至于交通贓賄為之關節者不下百十餘人而伊子錦衣衛嚴鵠中書嚴鴻家奴嚴年中書羅龍文為甚即數人之中嚴年尤為㸃狡世蕃委以腹心諸所鬻官賣爵自世蕃所者年率十取其一不才士夫竟為媚奉呼曰鶴山先生不敢名也遇嵩生日年輙獻萬金為夀嵩父子原籍江西袁州乃廣致良田宅于南京揚州等䖏無慮數十所而以惡僕嚴冬主之抑勒侵奪怙勢肆害所在民怨入骨尤有異者往嵗世蕃適母䘮陛下以嵩年老特留侍養令其子鵠代為扶襯南旋世蕃名雖居憂寔喜得計狎客曲晏擁侍姬妾屢舞髙歌日以繼夕至于鵠本豚䑕無知習聞贓賄視祖母䘮有同竒貨騷擾道路百計需索其往返所經諸司悉望風奉承郡邑為空今天下水旱頻仍南北多警民窮財盡莫可措手者正由世蕃父子貪婪無度掊克日棘政以賄成官以賂授凡四方小吏莫不竭民脂膏償已買官之費如此則民安得不貧國安得不竭天人災警安得不迭至臣請斬世蕃首以示為人臣不忠不孝者戒其父嵩受國厚恩不思報而溺愛惡子弄權黷貨亦宜亟令休退以清政本如臣言不寔乞斬臣首以謝嵩世蕃䟽入帝乃罷嵩下世蕃于理時坐嵩世蕃黨黜謫者前兵部右侍郎栢鄉魏謙吉工部左侍郎南昌劉伯躍刑部右侍郎徳安何遷右副都御史信陽董威僉都御史萬安張雨應天府尹祥符孟淮南京光禄卿南昌胡植南京光禄少卿武進白啟常右諭徳蘭谿唐汝楫南京太常卿字國子監事新城王材太僕丞新喻張春及嵩婿廣西副使袁應樞等數十人土黙特攻遼東總兵官黒春戰死土黙特入撫順復攻鳯凰城春與把總田耕等力戰三日夜死之事聞詔贈春都督同知廕子千户質實土黙特即韃靼小王子後嘉靖初徙幕東方撫順城名在奉天府承徳縣東與盛興京接界鳯凰城在奉天府東南鴨緑江經此入朝鮮國土黙特舊作土蠻今改秋八月加户部尚書髙燿太子太保初大内災宦官有宻収龍涎香者至是帝索之急燿從禁中購得八两用聖夀建熙日獻之大稱㫖賜銀幣尋加太子太保燿初賄嚴世蕃躐户部尚書以貪穢著及世蕃敗知不為公論所容乃要結為固位計質實髙燿清苑人發明古未患得患失之夫其于夤縁倖進巧售計術盖無所不至而必有左右進倖之人為之導引而宻示其機乃得以施其伎倆高燿之以龍涎進也何由而知大内之無此又何由而知索此之甚急即使知慶節建醮在所必需又何由而知宦寺中有宻蔵此者物以類感憸邪之聲氣自有黙黙相通者燿仍以其結世蕃之術結宦官故遂以其躐司農之伎躐少保而嘉靖適顛倒于其局中而懵然罔覺耳九月三殿成更奉天殿曰皇極華盖殿曰中極謹身殿曰建極文樓曰文昭閣武樓曰武成閣左順門曰㑹極右順門曰歸極奉天門曰皇極東角門曰𢎞政西角門曰宣治復改乾清宫右小閣曰道心旁左門曰仁蕩右門曰義平質實文樓是時文樓蔵永樂大典其帙甚鉅帝初年好古禮文之事時取探討凡有疑郤悉按韻索覽几案問毎有一二帙在焉及三殿災帝聞變命左右趣登文樓出大典甲夜中傳諭再三是書遂得不燬帝因欲重録其副貯之他所以備不虞至是諭大學士徐階曰昨計重録永樂大典兹秋凉可理乃選各色善楷書人禮部儒士程南道等百餘人就史舘分録命禮部左侍郎高拱右春坊右中允管國子監司業事張居正各觧原務入舘校録拱仍以侍郎兼翰林院學士同左春坊左諭徳兼侍讀瞿景淳充總校官居正仍以中允兼翰林院編修同修撰林燫丁士美徐時編修吕旻王希烈張四維陶大臨檢討吴可行馬自强充分校官冬十一月分遣御史求方書帝晚年求方術益急時江西豐城縣方士熊顯進法書六十六冊詔留覽賜顯冠帶銀幣是時陶仲文已死乃命御史姜儆王大任分行天下訪求方士及符籙秘書閲二年還朝上所得法秘數千冊薦方士唐秩劉文彬等数人儆大任俱擢侍講學士秩等賜第京師時嚴嵩既罷藍道行亦被遣宫中数見妖孽帝春秋高意邑邑不樂中官因設詐以娱之當夜坐庭中獲一桃御幄後左右言自空中下帝喜曰天賜也修迎恩醮五日明日復穫一桃是夜白兎生二子帝益喜謝元告廟未㡬夀鹿亦生二子廷臣表賀帝以奇祥三錫天眷非常手詔褒荅事在四十三年質實姜儆南昌人王大任陕西保安人御定資治通鑑綱目三編巻二十四
