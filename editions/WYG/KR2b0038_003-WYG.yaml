front:
  text: 御製明史綱目書成有述并序
  hash: sha256:c00ff497c94391e65d4523a0b7340d5fd78d2d3a0a678e8644fd8c08f8ce2ce3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0038_WYG_003-1a, image: WYG0340/WYG0340-0004a.png}
body:
  text: 明史綱目之書不可不亟成之而又不敢率就之盖明史已出於百年以後綱目若復遲待咎将誰諉而取裁義例校閲諸臣一一請示既以身任其事則不得徒博欽定名目已也將天下後世之公論於是乎在書成既親序以冠簡端復為此詩以見意并識有明三百年興亡之概焉直道惟憑信史留斯民三代理無偷學探司馬治平要書慕文公體例優亦曰此心無予奪敢云我志在春秋編摩端識權衡在魚魯何妨付校讐蛇分星聚瑞符覃崛起原從皇覺菴燕國帝車遥指北金陵王氣遂昌南一時開創經猷集奕世風聲莭義談若論興王自東土比湯慙徳更無慙昔人謂三代以下開創之主要當以漢髙祖元世祖明太祖為正然漢明雖起布衣究其宇内之臣也元雖非宋臣猶嫌取自其手惟我朝平李自成之亂而有天下於明為有恩比元尤為盡善云金川門外血波横大義奚稱旦輔成難諱齊黄疎計畧尚憐氣節在公卿緇衣不辨真兮偽斗粟從来弟與兄獨笑吉安胡侍講一豬不忍太癡情慢言此輩弱而愚甫節魚童何代無不少英明偏授柄端因威福遂専樞善窺更自依房闥妙術惟應𨗳宴娯屋社當年縁底事厲階屢肇自宫徒持盈保㤗信惟囏往復平陂理轉環拜疏省僚羣自去垂衣宫禁尚躭閒蜩螗三案紛轇轕門户東林激變患獨有思陵殉宗社故宜矜惜動龍顔明之亡實亡於萬厯之惰於為政及天啟之闇不盡崇禎之罪也故我世祖以禮葬於思陵加謚建碑較古獨厚云賞罰當時猶貴信况於萬世信無刋二語本方孝孺史論意從来舊史傳三述亦越新編切五難義利纎毫無或爽勸懲一字必期安試觀三百年間事已意曽無愛惡干從来為史者於本朝多諱詞於勝國必過語此春秋以後所以少信史也朕每引為深戒故於明史綱目亦唯善者善之惡者惡之因物付物不敢以己意好惡為褒貶後之觀是書者其必有以諒吾矣
  hash: sha256:6c8ab3d13efd99a5f2039027cae630bb99b2bf96389988378c80285b7500c60f
