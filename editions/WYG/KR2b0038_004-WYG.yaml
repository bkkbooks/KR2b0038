front:
  text: 欽定四庫全書史部二御定資治通鑑綱目三編編年類
  hash: sha256:cfb9c9a50f1c77b73fcbb46b0c6ea6a0a2c945fd3639fec8aa89b670fe245a61
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0038_WYG_004-1a, image: WYG0340/WYG0340-0005a.png}
body:
  text: 提要臣等謹案御定資治通鑑綱目三編四十卷乾隆四十年奉勅撰初大學士張廷玉等奉勅採明一代事迹撰通鑑綱目三編以續朱子商輅之書然廷玉等惟以筆削褒貶求書法之謹嚴於事迹多所挂漏又邊外諸部於人名地名多沿襲舊聞無所考正尤不免於舛訛夫朱子剏例之初原以綱仿春秋目仿左傳春秋大義數十炳若日星然不詳核左傳之事迹於聖人予奪之㫖尚終不可明况史籍編年僅標梗概於大書而不具始末於細注其是非得失又何自而知即聖諭所指福藩田土一條其他條之疎漏可以例推至譯語惟取對音原無意義而宋人妄生穿鑿乖謬不經如趙元昊自稱兀卒即烏珠之轉音而宋人訛為吾祖遂以為元昊見侮又如蕭鷓巴亦非漢名而宋人以對曽純甫借鶉脯之音以為惡謔沿及明代此習未除如聖諭所指朶顔青海諸人名書圗為兎之類亦往往而有鄙倍荒唐尤不可不亟為釐正是編仰稟睿裁於大書體例皆遵御批通鑑輯覽而細注則詳核史傳補遺糾謬使端委秩然復各附發明以闡衮鉞之義各増質實以資考證之功而譯語之誕妄者亦皆遵欽定遼金元國語觧一一改正以傳信訂訛較張廷玉等初編之本實倍為精宻聖人制事以至善為期義有未安不以已成之局而憚於改作此亦可仰窺萬一矣乾隆五十年二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:10dc2f5250ee9ecf9c7b1d101eaa07ddf2879f1aadc07a52d8437976f91d75b4
