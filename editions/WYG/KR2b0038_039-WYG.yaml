body:
  text: 起戊辰明莊烈崇禎元年盡庚午明莊烈崇禎三年凡三年戊辰莊烈帝崇禎元午春正月詔中官非奉命不得出禁門帝懲魏忠賢禍乃有是詔尋又申廷臣交結内侍之禁頒諭諄戒之尊熹宗皇后為懿安皇后三月𦵏徳陵謚曰堯天闡道敦孝篤友章文襄武靖穆莊勤悊皇帝廟號熹宗質實徳陵在昌平州䨇鎖山擅子峪西南距永陵一里廢明史贊曰明自嘉靖而後綱紀日已陵夷神宗末壊極矣雖有剛明英武之君已難復振而重以帝之昬庸婦寺竊柄濫賞淫刑忠良慘禍億兆離心雖欲不亡何可得哉天赤如血是月辛巳昧爽也占者云是主大旱且兵徵施鳯來張瑞圖罷鳯來素無節概以和柔自媚於世瑞圖務迎合魏忠賢會試發策言古之用人者初不設君子小人之名分别起於孔子其謬妄如此忠賢生祠碑文多出其手書詔㫖褒美忠賢詞極駢麗皆瑞圖筆也至是御史羅元賔疏劾鳯來等畧論給綍之重任總歸閹宦之權衡欲尚公則尚公欲封爵則封爵欲建祠則建祠欲誅殺削奪則誅殺削奪情面多而擔當少爵祿重而謀國輕遂使黄扉為置郵之所輔臣若執簿之官悮國徇私莫此為甚帝是其言鳯来瑞圖遂俱乞罷質實羅元賔㑹稽人贈䘏寃陷諸臣諸忤忠賢致死若楊漣左光斗魏大中周朝瑞袁化中顧大章周起元繆昌期周順昌周宗建黄尊素李應昇萬燝皆贈官錄一子王之宷復官丁乾學吴裕中劉鐸吴懐賢蘇繼歐張汶亦獲贈䘏詔死禍尤烈者并予諡而是時姚希孟以詞臣持物論雅不善光斗宗建力尼之遂多不獲諡給事中瞿式耜訟諸臣寃稱漣大中順昌為清中之清忠中之忠乃諡漣忠烈大中忠節順昌忠介既而趙南星鄒元標髙攀龍馮従吉並贈官賜諡質實楊漣贈太子太保兵部尚書左光斗贈右都御史魏大忠周順昌贈太常卿周朝瑞贈大理卿周起元贈兵部右侍郎繆昌期贈詹事兼侍讀學士袁化中顧大章周宗建黄尊素李應昇贈太僕卿萬燝贈光祿卿福王時追諡光斗朝瑞宗建應昇忠毅化中忠愍大章裕愍起元忠恵昌期文貞尊素忠端燝忠貞丁乾學贈侍讀學士劉繹贈太僕少卿吴懐賢贈工部主事蘇繼歐贈太常卿吴裕中張汶贈䘏有差趙南星贈太子太保諡忠毅鄒元標贈太子大保吏部尚書諡忠介髙攀龍贈太子少保兵部尚書諡忠憲馮従吾贈太子太保謚㳟定瞿式耜字起由常熟人明挂王時殉節本朝乾隆四十一年追諡忠宣夏四月以袁崇煥督師薊遼初崇煥以忤忠賢去忠賢既伏誅廷臣争請召崇煥至是進兵部尚書督師薊遼兼督登莱天津軍務所司敦廹上道比至都帝召見平臺咨以方畧對曰臣受陛下特眷願假便宜計五年全遼可復帝退少憇時廷臣咸在給事中許譽卿叩以五年之畧崇煥言聖心焦勞聊以相慰耳譽卿曰上英明安可漫對異日按期接效奈何崇煥撫然自失頃之帝出即奏言東事本不易竣陛下既委臣臣安敢辭難但五年内户部轉軍餉工部給噐械史部用人兵部調兵選将須中外事事相應方克有濟帝為飭四部臣如其言崇煥又言以臣之力守金遼有餘調衆口不足一出國門便成萬里忌能妬功夫豈無人即不以權力掣臣肘亦能以意見亂臣謀帝起立傾聴諭之曰卿勿疑慮朕自有主持大學士劉鴻訓等復請賜崇煥尚方劍假之便宜帝悉従之崇煥又以前此熊廷弼孫承宗皆為人所排搆不得竟其志乃上言恢復之計不外臣昔年以遼人守遼土以遼土養遼人守為止著戰為竒著和為旁著之説法在漸不在驟在實不在虚此臣與諸臣所能為至用人之人與為人用之人皆至尊司其鑰何以任而勿貳信而勿疑葢馭邊臣與廷臣異軍中可驚可疑者殊多但當論成敗之大局不必摘一言一行之微瑕事任既重為怨實多諸有利于封疆者皆不利于此身者也是以為邊臣甚難臣非過慮但中有所危不得不告帝優詔答之質實許譽卿字公實松江華亭人五月李國􅕠罷國􅕠與魏忠賢同鄉然每持正論劉志選梁夢環劾張國紀以撼中宫賴國􅕠調䕶之國紀得免罪王化貞之棄廣寧列城皆走惟廵按御史方震孺保前屯無動而忠賢素衘震鑐嗾其黨誣劾之坐贓擬絞尋揚州知府劉繹呪詛之獄起又誣震孺與交通坐大辟繫獄國􅕠力為保全帝初即位以登極恩進左柱國少師兼太子太師吏部尚書中極殿大學士國子監生胡煥猷以劾國􅕠等禠衣冠國􅕠薦復之時人稱為長者至是乞歸薦韓爌孫承宗自代卒於家贈太保謚文敏毁三朝要典魏忠賢既誅其黨楊維垣等䕶持舊局上疏力詆東林與崔魏並信為邪黨編修倪元璐再疏攻駁柄國者兩解之元璐尋上言請毁三朝要典畧曰挺擊紅丸移宫三義閧於清流而三朝要典一書成於逆䜿其議可兼行其書必當連毁葢當時起事興議盈廷互訟主挺擊者力䕶東宫争挺擊者計安神祖主紅丸者伏義之言争紅丸者原情之論主移宫者弭變於機先争移宫者持平於事後數者各有其是不可偏非總在逆璫未用之先雖甚水火不害塤箎此一局也既而楊漣二十四罪之疏發魏廣微此輩門户之説興於是逆璫殺人則借三案羣小求富貴則借三案經此二借而三案面目全非矣故凡推辭歸孝于先皇正其頌徳稱功于義父此又一局也網自宻而猶疑有遺鱗勢已成而或憂其翻局崔魏諸奸始創立私編標題要典以之批根今日則衆正之黨碑以之免死他年即上公之鐵券又一局也由此觀之三案者天下之公議要典者魏氏之私書三案是三案要典自要典今為金石不刋之論者誠未深思臣謂翻即紛囂改亦多事唯有毁之而已夫以閹䜿之權而役史臣之筆亘古未聞當毁一未易代而有編年不直書而加論斷若曰彷彿明倫規模大典則是魏忠賢欲與肅皇帝争聖崔呈秀可與張孚敬比賢悖逆非倫當毁二矯誣先帝偽撰宸篇既不可比司馬光資治通鑑之書亦不得援宋神宗手製序文之例假竊誣妄當毁三况史局将開館抄具備七載非難稽之世實録冇本等之書何事留此駢枝供人唾詈當毁四疏上帝從之遂焚其書侍講孫之獬忠賢黨也聞之詣閣大哭天下笑之質實倪元璐字玉汝上虞人孫之獬淄川人六月來宗道楊景辰罷宗道代李國􅕠為首輔事多詭随編修倪元璐屢言時事宗道笑曰渠何事多言詞林故事止香茗耳時謂宗道為清客宰相景辰先與宗道為要典副總裁一徇奸黨指及朝局已變乃請毁要典言官交章劾之遂與宗道同罷秋七月浙江海溢是月壬午杭嘉紹三府海嘯壞民居數萬間溺數萬人海寧蕭山尤甚海寇鄭芝龍降芝龍少與弟芝虎従海盜顔振泉為寇振泉死衆盜無所統約共禱於神植劍米斛中遞拜之劍動者推為長芝龍預藏磁石袖間甫拱手劍躍出遂雄長海上以已泉人不寇泉令其黨劉香寇之泉州官史招芝龍降芝龍来受命芝虎不従噪而去猖獗如故然芝龍長敗官軍不追獲将士釋不殺當事知芝龍終可撫復遣使諭之竟偕芝虎降而其黨李魁竒鍾斌旋叛去與香仍為盜熊文燦廵撫福建善遇芝龍頗得其力魁竒屢抗官軍守備莫兆燫戰殁芝龍擊擒之又敗斌於泉州斌投海死香連犯閩廣沿海邑廣州都司許當辰勦香殁于陣文燦議招撫賊佯許之文燦遽遣参政洪雲蒸等入賊舟宣諭被執文燦懼委罪雲蒸言官劾之帝勅文燦戴罪自効乃令芝龍以逰擊為先鋒合廣東兵擊香海上大敗之香脅雲蒸止兵雲蒸大呼曰賊窮矣急擊勿失遂遇害香自焚其舟以死按明史施邦曜傳盜劉香李魁竒横海上邦曜縶香母誘之香就擒魁竒援鄭芝龍事請撫邦曜言於廵撫鄒維璉討平之與熊文燦傳所載互殊葢傳聞異辭也質實鄭芝龍泉州南安人熊文燦貴州永人寧衛人莫兆燫同安人許當辰餘杭洪雲蒸長沙人蒸本朝乾隆四十一年追諡兆燫雲烈愍當辰節愍革廣寧及薊鎮塞外諸部嵗賞故事廣寧塞外兆哈諾穆圖固英及薊鎮喀爾沁三十六家嵗授撫賞至是盡革去之㑹嵗饑諸部請粟大復不許遂歸誠于我清寧夏兵變四川湖廣兵戎寧逺者以缺餉四月大譟餘十三營起應之縳廵撫畢自肅總兵官朱梅通判張世榮推官蘇涵淳于樵樓上兵備副使郭廣初至括二萬金以散不厭貸商民足五萬乃解自肅疏引罪走中左所自經死袁崇煥以八月抵闗聞變馳與廣密謀謀宥首惡張正朝張思順令捕十五人戮之市斬知中軍吴國琦責参将彭簪古黜都司左良玉等四人發正朝思順前鋒立功世榮㴠淳以貪虐致變亦斥之獨都司程大樂一營不従變特為奨勵一方乃靖先是闗外止設總兵官一人崔呈秀欲用其私黨増設三四人故權勢相衡臂指不運尋定設二人而掣肘如故朱梅将解任崇煥請合寧錦為一鎮仍以總兵官祖大夀駐錦州加中軍副将何可綱都督僉事代梅駐寧逺而移薊鎮趙率教于闗門闗内外止設二大將因極稱三人才謂臣自期五年専藉此三人當與臣相終始届期不效臣手戮三人而身歸死于司敗帝可之崇煥遂留鎮寧逺又請罷寧逺及登莱巡撫不設帝亦報可時度支大絀錦州薊鎮兵相繼譁户部尚書畢自嚴言一嵗之出浮于所入一百一十三萬冇竒而内供召買不與焉帝命廷臣各陳所見自嚴擇其可者列上増鹽引議鼔鑄括雜税覈隐田税寺産諸事皆琑屑權宜之計民以重困質實畢自肅自嚴皆淄川人自嚴字景曽左良玉字崑山臨清人祖大夀何可綱皆遼東人九月京師地震冬十月大學士劉鴻訓免尋遣戍先是忠賢雖敗其黨猶滿朝滿路新進者羣抨擊之諸執政嘗與忠賢共事不敢顯為别白鴻訓至閣毅然主持斥楊維垣李恒茂楊所修由景新孫之獬阮大鋮徐紹吉張納李舊賈繼春霍維華等人情大快而御史袁鴻勛史􅒇髙捷本由維垣輩進思合謀攻去鴻訓則黨人可安也鴻鄖乃言所修繼春維垣夹攻表裏之奸有功無罪而誅鋤自三臣始又詆鴻訓使朝鮮滿載貂参而歸錦衣僉事張道濬亦奸攻鴻訓鴻訓奏辯給事中顔繼祖言鴻訓朝鮮之役舟敗僅以身免乞諭鴻訓入直共籌安攘之策至鴻勛之借題傾人道濬之出位亂政非重創未有己也帝是之給事中鄧英乃盡發鴻勛贓私且言鴻勛以千金贄維垣得御史帝怒落鴻勛職候勘已而髙捷上疏言鴻訓斥擊奸之維垣所修繼春大鋮而不納孫之獬流涕忠言謬主焚毁要典以便私黨孫慎行進用帝責以㤀言停其俸史􅒇復佐捷攻之言路多不直兩人兩人遂罷去時帝數召見廷臣鴻訓應對獨敏謂民困由吏失職請帝久任責成以尚書畢自嚴善治賦王在晉善治兵請帝加倚信帝初甚向之闗内兵以缺向鼓譟帝意責户部而鴻訓請發帑三十萬示不測思由是失帝指未㡬而有改敇書之事舊例督京營者不轄廵軍恵安伯張慶餘總督京營敕内有兼轄捕營語提督鄭其心以侵職論之命覈中書行賄改之故下舍人田嘉璧獄給事中李覺斯言藁其兵部送輔臣裁定乃令中書繕寫寫訖復審視進呈兵部及輔臣皆當問帝心疑其事乃御便殿問諸閣臣皆謝不知帝怒給事中張鼎延御史王道直咸言慶臻行賄有跡不知誰主使御史吴玉言主使者鴻訓也慶臻曰改敕乃中書事臣實不預知且増轄捕卒取利㡬何乃行重賄帝叱之閲兵部掲有鴻訓批西司房語嘉璧亦誣伏受鴻恩指事遂不可解而侍郎張鳯翔詆之尤力閣臣李標錢龍錫言鴻訓不能有此請更察訪帝曰事已大著何更訪為促令擬㫖標等逡巡未上禮部尚書何如寵為鴻訓立辯帝意卒不可回乃擬㫖鴻訓慶臻並革職候勘無何御史田時震劾鴻訓用田仰廵撫四川納賄二千金給事中閻可陞劾副都御史賈毓祥由賄鴻訓擢用鴻訓數被劾連章力辯因言都中神奸狄姓者詭誆慶臻千金致臣無辜受禍帝不聴下廷臣議罪明年正月議吏部尚書王永光等言鴻訓慶臻罪無可辭而律有貴條請寛貸兵部尚書王在晉職方郎中苗思順贓証未確難懸坐帝不許鴻訓謫戍代州在晉思順並削籍慶臻以世臣停祿三年覺斯鼎延道直玉時震以直言増秩一級鴻訓居政府鋭意枉事帝有所不可退而曰主上畢竟是冲主帝聞深銜之欲置之死賴諸大臣力救乃得稍寛後鴻訓竟卒戍所福王時復官質實劉鴻訓使朝鮮按鴻訓傳神光二宗相繼崩鴻訓方官編修充使頒詔朝鮮甫入境遼陽失守朝鮮為造二洋舶従海道還沿途收難民舶重而壞跳淺入小舟飄泊三日夜僅達登州報命徐紹吉四川保寧人袁鴻勛慈溪人史􅒇清苑人髙捷寧晉人張道濬沁水人廵按遼東御史銓之子顔繼祖龍溪人鄧英安福人王左晉字明初太倉人張慶臻恵安伯偉曽孫李覺斯東莞人張鼎延河南永寧人王道直漢川人吴玉夀陽人張鳯翔堂邑人何如寵字康侯桐城人田時震富平人田仰廬陵人閻可陞韓城人賈毓祥平度人苖時順寧陵人發明劉鴻訓力斥閹黨為諸黨人所嫉袁鴻勛等思合謀攻去之以安其黨莊烈既已知其曲直為之罪鴻勛罷史􅒇髙捷矣乃未㡬而以改敕之事懸坐鴻訓加之遣戍夫敕書之改寫閣臣固不得諉以不知然毫無佐證遽憑詆訐之言定為主使斷以行賄在鴻訓退有冲主之言豈得云無咎而莊烈以此深銜必欲置之死地且未久而袁鴻勛等皆仍以言官倚任不㡬于代黨人為報復耶鴻訓之才雖非卓犖其鋭意任事亦有足取當國事艱難之際人材既不易得而又舉措聴熒何怪十七年中閣臣至至五十人之多哉十一月召對廷臣于文華殿禮部侍郎錢謙益以罪削職都給事中章允儒等降有差詔㑹推閣臣廷臣列吏部侍郎成基命及謙益等名以上時同推者鄭以偉李騰芳孫慎行何如寵薛三省盛以宏羅喻義王永光曹于汴凡十一人禮部尚書温體仁侍郎周延儒以無素望不與延儒性警敏善伺意指方錦州兵譁袁崇煥請給餉帝召問諸大臣皆請發内帑延儒獨進曰闗門昔防敵今且防兵寧逺譁餉之錦州譁復餉之各邊效尤帑将安給帝曰卿謂如何延儒曰事迫不得不發但當求經久之策帝悦曰卿言是也降㫖責羣臣越數日復召問延儒曰餉莫如粟山海積粟不缺也缺銀耳何故譁安知非驕升構煽以脅崇煥邪帝方疑邊将要挟聞延儒言復悦曰卿言是由此屬意延儒而㑹推弗及體仁揣帝意必疑遂上疏訐謙益為考官時闗節受賄不當與閣臣選先是謙益典試浙江有奸人金保元徐時敏偽作闗節用俚俗詩一朝平步上青天句分置七義結尾授舉子錢千秋遂中式千秋本能文同考官薦擬第二謙益改置第四千秋知為保元時敏所賣與之閧事傳京師為給事中顧其仁所發謙益大駭即具疏劾二奸及千秋俱下吏論戍謙益亦奪俸二奸尋斃千秋遇赦釋還事已七年矣至是體仁復理其事帝果心動次日召對閣部科道諸臣于文華殿命體仁謙益皆至謙益不虞體仁之劾已也辭頗屈而體仁盛氣詆謙益言如泉湧因進曰臣職非言官不可言㑹推不與宜避嫌不言但枚卜大典宗社安危所係謙益結黨受賄舉朝無一人言者臣不忍見陛下孤立于上是以不得不言帝久疑廷臣植黨聞體仁言輒稱善而執政皆言謙益無罪吏部都給事中章允儒争尤力且言體仁熱中觖望如謙益當糾何俟今日體仁曰前此謙益皆閒曹今者糾之正為朝廷慎用人耳如允儒言乃真黨也允儒曰黨之説小人以陷君子天啟朝可鑒帝怒命禮部進千秋卷責謙益謙益引罪帝歎曰朕㡬悮遂叱允儒下詔獄并切責諸大臣時大臣無助體仁者獨延儒奏曰會推名雖公主持之止一二人餘皆不敢言即言徒取禍耳且千秋自有成案不必復問諸臣帝乃即日罷謙益官命議罪坐杖論贖允儒及給事中瞿式耜御史房可壯等皆坐謙益黨降謫有差千秋復被逮荷校死質實錢謙益字受之常熟人章允儒南昌人成基命字靖之大名人鄭以偉字子器上饒人薛三省字魯叔定海人羅喻義字湘中益陽人温體仁字長卿烏程人周延儒字玉繩宜興人顧其仁華陽人房可壯益都人十二月韓爌復入閣帝登極後言者争請召爌為逆黨楊維垣所扼但賜敕存問是年五月始遣行人召之及是還朝㑹帝以錢謙益事悉署廷臣推者不用遂命爌復為首輔帝文華後殿閲章奏召爌等諭以擬㫖務消異同開誠和衷期於至當爌等頓首謝退言所諭甚善而宻勿政機諸臣参互議擬不必顯言分合至臣等晨夕入直勢不能報謝賔客商政事者宜相見于朝房而一切禁私邸交際帝即諭百寮遵行劉鴻訓方被重譴爌至即具疏申救不聽㑹御史毛九華劾温體仁居家時以抑買商人木為商人所訴賂崔呈秀以免又因杭州建逆祠作詩頌魏忠賢帝下浙江巡撫覈實未報御史任贊化復劾體仁娶娼受金奪人産諸不法事體仁揣已為清議所斥因力求去以要帝且言臣以奸罷錢謙益故其黨排訐臣者百出而無一人左袒臣臣孤立可見再召内閣九卿質之體仁與九華贊化詰辯良久言二人皆謙益死黨帝心以為然秉燭召爌等于内殿謂進言者不憂國而植黨自名東林於國事何補當重繩以法爌請寛言官以安體仁既退具揭言人臣不可以黨事君人君亦不可以黨疑臣但當論其才品臧否職業修廢而黜陟之若戈矛妄起於朝堂畛域横分於官府非國之福也不納質實毛九華掖縣人任賛化間喜人陕西饑流賊大起先是閹黨喬應甲廵撫陕西朱童蒙廵撫延綏皆貪黷虐民民多起為盜有刼官吏署者應甲置盗不問反脅官吏責重賄盜乃日横而被盜者莫敢告至是連嵗大祲有司不恤下白水王二者鳩衆墨其面突入澄城殺知縣張耀采由是府谷賊王嘉允宜川賊王左掛等一時並起遂攻城堡殺官吏安塞賊髙迎祥與饑民王大梁復聚衆應之迎祥自稱闖王大梁自稱大梁王尋固原兵以無餉譁亦叛去為盜大吏惡聞賊曰此饑氓徐自定耳明年帝從給事中劉懋議裁驛站冗卒山陕游民仰驛糈者無所得食皆従賊質實白水漢栗邑晉廢後魏復置白水縣澄城後魏置明並屬同州以𨽻于西安府今升同州為府二縣仍屬焉府谷五代後唐置明屬葭州以𨽻于延安府今属榆林府宜川西魏義川宋改宜川安塞宋堡元升縣明並屬延安府今因之劉懋臨潼人發明釁薪不沃而火潦于原門莠不除而蔓延于野方朱童蒙喬應甲之時草竊奸宄漸起萑蒲捕而僇之一長吏力也失此不治馴至宜川白水嘯聚為羣然弄兵潢池特烏合之衆耳陕西分建五鎮宿将勁兵雄於天下使乗竊發之初厚集官軍尅期進勦俘厥渠魁翦其枝黨不數日間定矣而乃藉口饑氓曲為盜諱遂使疥癬之疾釀毒成癰狐䑕之羣假威作虎掲竿響應蹂躪中原而國随以亡滅是果誰之咎哉己巳二年春正月周道登罷道登嘗召對帝問宰相須用讀書人何解對曰容臣至閣中檢閲回奏帝有愠色又問章奏内多有情靣二字何也對曰情靣者情之謂左右皆匿笑道登前在禮部頗有所争執及柄政後排正人庇私交屢為言路所劾帝悉下其章廷議尚書王永兆等言所劾俱有實跡遂放歸定逆案詔定魏忠賢逆案閣臣韓爌等不欲廣搜樹怨僅以四五十人上帝少之令再議又以數十人上帝不懌令以贊道擁戴頌美諂附為目因曰忠賢一内䜿耳苟非外廷助虐何遽至此且内廷同惡者亦當入爌等以不知内侍為對帝曰豈皆不知特畏任怨耳閱曰召入便殿案有布囊盛章奏甚夥指之曰此皆奸黨頌疏可案名悉入爌等知帝意不可回乃曰臣等職在調㫖三尺法非所習帝召吏部尚書王永光問之以不習刑名為對乃詔刑部尚書喬允升左都御史曺于汴同畨定案所羅列㡬無脱遺至是上之帝親加裁定自魏忠賢客氏依謀反大逆律磔死外以六等定罪曰首逆同謀崔呈秀及魏良卿侯國興太監李永貞李朝欽劉若遇六人俱立斬曰交結近侍劉志選梁夢環倪文煥田吉劉詔薛貞吴淳夫李夔龍曹欽程許志吉孫如洌陸萬齡李承祚田爾耕崔應元楊環孫雲鶴許顯純張體乾十九人俱斬秋後處决曰交結近侍次等魏廣微周應秋閻鳴秦霍維華徐大化潘汝禎李魯生楊維垣張納郭欽李之才十一人及逆孽魏志徳等三十五人俱充軍曰交結近侍又次等顧秉謙馮銓張瑞圖来宗道王沼徽等一百二十九人俱坐徒三年贖為民曰交結近侍減等黄立極等四十四人俱革職間住又于諸人姓名下各注所犯刋布中外知之方案初定張瑞圖来宗道及賈繼春皆不與帝召見閣臣及允升于汴于平臺詰之閣臣等以瑞圖宗道無實狀對帝曰瑞圖善書為忠賢所愛宗道為崔呈秀父請䘏典中有在天之靈語非實狀耶又問繼春對曰繼春雖反覆然持論亦有可取帝曰唯反覆故為真小人三人遂俱論徒三月以楊鶴總督三邊軍務捕流賊鶴初官僉都御史忤忠賢罷去帝即位復官進左副都御史鶴見帝求治太急乃上言圖治之要在培元氣自大兵大疫加𣲖頻仍小民之元氣傷遼左黔蜀喪師失律封疆之元氣傷縉紳構黨彼此相傾逆閹乗之誅鋤善類士大夫之元氣傷譬如重病初起百脈未調風邪易入急當培養而陛下事事勵精臨軒靣質或問之而未必盡知事下六曹或呼之而未必立應致于聖怒數取譴訶竊以為遇矣今一切民生國計吏治邊防宜取祖宗成法委任責成嚴為之程寛為之地圖之以漸鎮之以静何慮不臻太平哉疏入報聞尋三邊總督武之望卒官而是時闗中寇熾廷臣莫肯往羣推鶴帝召鶴問方畧對曰清慎自持撫恤將卒而已遂拜鶴兵部右侍郎代之望總督軍務討賊先是流宼王大梁由畧陽逼漢中餘賊望洛川淳化三水等十餘州縣逰擊髙従龍戰没固原逃兵周大旺等復掠涇陽富平勢甚張及鶴至叅政劉應遇已先擊斬王二于白水追殱大梁于漢南副将賀虎臣亦捕斬大旺等賊渠畧盡而繼起者益衆延安榆林間所在皆賊鶴素有清望然不知兵廟堂遽用之竟莫能勦賊後遂一意主撫以致敗質實淳化宋以雲陽縣之黎國鎮置明屬邠州以𨽻于西安府三木漢縣元廢明正統中復置亦屬邠州以𨽻于西安府鶴本朝雍正三年升邠州為直𨽻州二縣仍屬南陽字修齡武陵人武之望臨潼人賀虎臣保定人夏五月乙酉朔日有食之先是大統厯推食三分二十四杪回回厯推食五分五十二杪禮部侍郎徐光啟依西法預推順天府食二分有竒厯天食六分有竒瓊州食既大寧以北不食至是光啟法騐大統回回厯皆疏帝切責監官于是五官正戈豐年等言大統乃洪武時所定實即郭守敬授時厯也自至元十年造厯越十八年為大徳三年八月已當食不食六年六月又食而夫推是時守敬方知院事已不能無乖錯况斤斤守法者哉今若循舊向後不能無差光啟亦言嵗差環轉嵗實参差天有緯度地有經度列宿有本行月五星有本輪月有真㑹視㑹皆古所未聞惟西法有之宜取以参互考訂與大統法㑹同歸一尋上厯法修正十事因薦太僕少卿李之藻西洋人龍華民鄧玉函善推步報可遂開厯局以光啟為監督未㡬華民卒更徵西洋人湯若望羅雅谷譯書演算光啟加本部尚書仍督修厯法西法之行自此始初西法與回回厯相同周天三百六十度度六十分分六十杪一日十二時時八刻刻十五分有閏日無閏月迨入中國又通融中法始復置閏月窮推詳測益加精宻而授時大統之説漸絀質實大統厯吳元年十一月乙未冬太史院使劉基率其屬髙翼上戊申大統厯洪武十七年漏刻博士元統以大統積分猶踵授時之數非所以重始敬正乃擢統為監令取授時法去其嵗實消長之説析其條例得四卷以洪武十七年甲子為厯元命曰大統厯法通軌二十六年監副李徳芳言當復用消長之法自是大統厯元以洪武甲子而推筭仍依時法云回回厯出西域元置回回司天臺與授時法並行明洪武三年設科𨽻欽天監亦参用之厯法修正十事其一議嵗差每嵗東行漸長漸短之數以正古来百年五十年六十年多寡互異之説其二議嵗實小餘昔多今少漸次改易及日景長短嵗嵗不同之因以定冬至以正氣朔其三每日測驗日行經度以定盈縮加減真率東西南北髙下之差以步日躔其四夜測月行經緯度數以定交轉遲疾真率東西南北髙下之差以定月離其五宻測列宿經六緯行度以定七政盈縮遲疾順逆違離逺近之數其宻測五星經緯行度以定小輪行度遲疾留逆伏見之數東西南北髙下之差以推步凌犯其七推算黄道赤道廣挟度數宻測二道距度及月五星各道與黄道相距之度以定交轉其八議日月去交逺近及真㑹視㑹之因以定距午時差之真率以正交食其九測日行考知二極出入地度數以定周天緯度以齊七正因月食考知東西相距地輪經度以定交食時刻其十依唐元法随地測騐二極出入地度數地輪經緯以求晝夜晨昬承短以正交食有無先後多寡之數西法明神宗萬厯中有大西洋人利瑪竇者進貢土物與其國人龎廸峩熊三㧞及龍華民鄧玉函湯若望等先後至俱精究天文攜有彼國厯書多中國典籍所未備者于時徐光啟李之藻皆宗之是為西法徐光啟字子先上海人六月袁崇煥殺總兵官毛文龍于䨇島文龍鎮東江嵗糜餉無算所徃輒敗衂詭稱捷冐功又縦下恣淫掠驕蹇不樂受莭制崇煥始受事即欲誅文龍大學士錢龍錫以崇煥召對時有五年復遼語因造寓詢方畧崇煥曰恢復當自東江始文龍可用則用之不可用則處之易易耳比崇煥莅鎮疏請遣部臣理東江餉文龍惡文臣監制抗疏駁之崇煥不悦尋文龍来謁接以賓禮文龍不譲崇煥謀益決至是以閲兵為名泛海抵䨇島文龍来㑹崇煥與相燕飲每至夜分文龍不覺也崇煥易更營制設監司文龍怫然崇煥以歸郷動之文龍曰向有此意但惟我知東事東事畢朝鮮衰弱可襲而有也崇煥滋不懌遂以六月五日邀文龍觀將士射先設幄山上令叅將謝尚政等伏甲士幄外文龍至其部卒不得入崇煥曰予詰朝行公當海外重寄受予一拜交拜畢登山因詰文龍違令數事文龍抗辯崇煥厲聲叱之命去冠帶縶縳文龍猶倔强崇煥曰爾有十二斬罪知之乎祖制大將在外必命文臣監爾専制一方軍馬錢糧不受核一當斬人臣之罪莫大欺君爾奏報盡欺君殺瀕海難民冐功二當斬人臣無將將則必誅爾奏稱牧馬登州取南京如反掌大逆不道三當斬每嵗餉銀數十萬不以給兵月止散米三斗有半侵盜軍餉四當斬擅開馬市于皮島私通海外諸國五當斬部將數千人悉冒己姓副將以下濫給劄付千走卒輿夫盡金緋六當斬自寧逺剽掠商船自為盜賊七當斬强取民間子女不知紀極部下效尤人不安室八當斬驅難民逺竊人参不従則幽之島上僵餓死者白骨如莾九當斬輦金京師拜魏忠賢為父塑冕旒象于島中十當斬鐵山之敗喪軍無算掩敗為功十一當斬開鎮八年擁兵觀望不能恢復免寸土十二當斬數畢文龍噤不能置辯但叩頭乞崇煥召諭其從官曰文龍罪重當斬否皆惶怖唯唯中有稱文龍數年勞苦者崇煥叱退之乃頓首請㫖出尚方劔斬文龍于帳前然後出諭其部卒曰誅止文龍餘無罪皆不敢動分其兵為四協以文龍子承祚及副將陳繼盛等領之犒軍士檄撫諸島盡除文龍虐政還鎮以其狀上聞末言文龍大將非臣得擅誅謹席藁待罪帝驟聞意殊駭既念文龍已死方任崇煥乃優㫖褒答崇煥又上言文龍一匹夫不法至此以海外易為亂也其衆合老稚四萬七千妄稱十萬且民多兵不能二萬妄設将領千今不宜更置帥即以副將繼威攝之于計便又慮部下為變請増餉餉至十八萬帝皆報可時文龍専閫海外有䟦扈聲崇煥一旦除之自謂可弭後患然東江屹然臣鎮文龍死勢日衰弱且島弁失主帥心漸攜益不可用其後致有判去者質實䨇島在今奉天府寜海縣西南海中陳繼盛遼東人秋八月總督雲南川湖廣西軍務朱燮元平水西蠻先是燮元督五路師討永寧奢崇明及水西安邦彦以計賂賊黨殺崇明子寅寅既死崇明年老無能為邦彦勢孤因乞撫燮元聞于朝許之乃遣参將楊明輝徃撫變元旋以父喪歸偏沅廵撫閔夢得来代夢得策用兵當自永寧始疏陳方畧未報尋召還代以尚書張鶴鳴議遂寢鶴鳴未至明輝奉制書僅招撫邦彦兄子位不云赦邦彦邦彦怒殺明輝撫議由此絶鶴鳴視師年餘未嘗一戰賊得養其鋭崇禎元年六月復起燮元故官兼廵撫貴州遂用夢得前議檄雲南兵下烏撒四川兵出永寜下畢節而親率大軍駐陸廣逼大方總兵官許成名参政鄭朝棟由永寧復赤水時邦彦自稱四裔大長老號崇明大梁王勢張甚聞官軍四路並進乃分其部衆據守陸廣鴨池三岔諸要害别以一軍取遵義自以兵十餘萬先犯赤水燮元授計成名令誘賊至永寧而潛遣總兵官林兆鼎従三岔入副將王國禎従陸廣入劉義鯤従遵義入合傾其巢邦彦與成名戰于赤水成名佯北邦彦悉力進㑹四川總兵官侯良柱副師劉可訓方出永寧與賊遇遂接戰小却成名還師来援賊乃據五峯山桃紅壩官軍仰攻不得上越數月良柱偵賊不備與副將鄧玘等侵早霧廹之成名聞山上呼噪聲亦出助戰賊奔鵝頸嶺徑長而惬人馬不能容良柱玘乘勝逐之賊復敗尋又敗之紅土川死者數萬人邦彦崇明皆授首捷聞帝大喜以成名與良柱争功賞久不行而烏撒土司安效良者邦彦黨也效良前為滇撫閔洪學所破既敗死其妻招故霑益土酋安逺弟邊為夫負固不服燮元乗兵威脅走邊遂復烏撒燮元以境内賊畧盡不欲窮兵乃檄招安位位不決燮元集將吏議曰水師地險多箐篁蠻烟燹雨莫辨晝夜深入難出今當扼其要害四靣迭攻賊乏食將自斃于是攻之百餘日斬級萬餘義鯤復遣人入大方燒其室廬位大恐明年春遣使乞降燮元受之積年巨宼皆平方崇明邦彦之授首也川中諸将功為多而黔將争之燮元頗右黔將屢奏于朝為四川廵撫御史馬如蛟所劾燮元力求罷帝慰留之燮元以巨㓂雖平而雲貴諸苗猶出没為患檄副使朱家名與成名等討平定番鎮寧諸苗乃通威清等上六衛及平越清平偏橋鎮逺四衛道路凡千六百餘里繕亭障設游徼勦平洪邊土官宋嗣殷就其地置開州復置故施秉縣招流民實之尋又撫定阿迷土司普名聲之亂苗患乃漸息初官軍討邦彦久無功御史毛羽健言賊巢在大方黔其前門蜀遵永其後户由黔進兵必渡陸廣竒險七晝夜抵大方一夫當闗千人自廢此官軍所以屢敗也遵義距大方三日程而畢節止百餘里道平衍従此進兵何患不克因畫上足兵措餉方畧并薦燮元可任及是平賊皆如其議云質實普名聲之亂名聲者阿迷州土官普維藩子初以従征有功授土知州崇禎五年御史趙洪範按部名聲不境迎及出戈甲旗幟列數里洪範大怒謀之廵撫王伉請討之官軍進圍州城名聲恐使人約降而隂以重賄求援于元謀土官吾必奎必奎奉調従征與名聲戰兵始合佯敗走官軍望見遂大潰布政使周士昌副總兵秦拱明通判由大勲戰死僉事王信逰擊范應華同知楊于陛被執皆罵賊死朝廷以起釁罪伉建治而名聲旋亦就撫廵撫偏沅地方贊禮軍務一員明萬厯二十七年以征播暫設尋罷天啟二年後或置或罷崇禎二年定設赤水九永寧路地明洪武二十二年始分永寧置衛距四川布政司六百二十里縣本朝康熈二十六年省入畢節縣鴨池河在清鎮西北一百里與水西為界五峯山桃紅壩鵝頸嶺並在四川叙州㕔東南與貴州畢節縣為界紅土川畢節縣廢赤水衛西鎮寧漢唐宋為牂柯羅甸地元始置鎮寕州明洪武十四年屬普定府尋改屬四川普定衛正統三年改屬貴州布政司嘉靖十二年遷州治于安莊衛城萬厯三十年改屬安順府今因之威清上六衛葢威清安荘平壩安南畢節赤水六衛也明洪武中以元貴州宣慰司及普安永寧鎮寧地置本朝康熈十一年改安莊衛為鎮寧州治二十六年改威清衛為清鎮縣治壩衛為安平縣治畢節衛為畢節縣治安南衛為安南縣治省赤水衛入畢節縣平越清平偏橋鎮逺四圍明洪武十四年以元平月長官司地置平越衛年本朝康熈十一年改縣為平治府治明洪武十四以元麻峽縣地置清平堡尋改衛𢎞治八年于衛城增署清平縣衛本朝康熈七年省縣入麻哈州十一年復置縣以省入屬都匀府偏橋注見前鎮逺廢衛在鎮逺府城西南㵲水西岸五老山之􅅢明洪武二十二年置湖廣鎮逺衛指揮使司本朝康熈二十二年割屬貴州尋併入鎮逺縣施秉元為施秉前江等處蠻夷軍民長官司明洪武五年改為施秉蠻夷長官司正統九年改縣天啟元年省崇禎四年復置屬鎮逺府阿迷漢益州地元初為阿寗萬户府阿甯古蠻名後譌為阿迷明洪武十五年改為阿迷州屬雲南臨安府今皆因之閔夢得烏程人林兆鼎福建人侯良柱字朝石永寧衛人劉可訓澧州人鄧玘四川人閔鴻學烏程人馬如蛟字騰仲和州人朱家名曲靖人毛羽健公安人趙洪範嘉定人秦拱明忠州人遊大勲婺源人王信宜賔人范應華建水州人楊于陛劔州人大本朝乾隆四十一年追謚秦栱明烈愍周士昌游勲王信范應華楊于陛節愍冬十一月我大清兵下遵化遂薄燕京太宗文我帝以七大恨未雪乃于是年十月皇親統大軍進討次老河分兵三路蒙古兵攻大安口阿巴㤗命濟爾哈朗等率右四旗及右翼太宗親等率左四旗及左翼䝉古兵攻龍井闗我鄉導攻洪督大軍以蒙古哈喇沁台吉布爾噶都為口克之至是抵遵化兩翼兵来㑹距城五里而營山海闗總兵官趙率教聞我大軍入近畿疾馳三晝夜赴援抵三屯營總兵官朱國彦不令入率教遂策馬而西與大兵遇悉力拒戰中流矢陣亡一軍盡殁我圖先登大兵四靣樹雲梯攻城正白旗小卒薩木哈大軍相繼上守陴兵潰参將李檟遊擊彭文炳戰死廵撫王元雅及保定推官李獻明永平推官何天球知太宗嘉縣徐澤前知縣武起潛皆死之元雅忠命賜棺殮親酌金巵勞薩木哈圖並予優錄而三屯營及馬蘭鎮亦為我别將所下副總兵張拱微戰殁國彦具衣冠西靣大稽首偕妻張氏投繯死于是我義城大同總兵官滿清兵越薊州而西徇三河臨順桂宣府總兵官侯世祿各率所部勤王戰于城下俱敗奔京師城遂降進至通州渡河駐營城北我太宗傳諭各城曰爾國庇葉赫而戕害我大恨有七我知終不相容告天興師國賜我河東地我天直我太祖皇帝猶願和好爾國不従和而爾主頻加欺凌故今日天又賜我河西地我復屢次願興師而来順者撫逆者誅天運循環得天者興人豈能為非我恃强逞兵也諭既徧薄京城營于城北土城闗之東男女之逃竄者縦之太宗率諸貝勒及䕶軍環閲燕京城招入城乃進兵距闗廂二里而營時桂世祿俱屯徳勝門大兵至世祿軍潰桂獨進戰協理戎政尚書李邦華督兵守城令城上發大礟佐桂誤傷桂軍桂亦負傷帝遣中官勞以羊酒令入休甕城旋與廷臣及督師袁崇煥等召見平臺桂解衣示創帝深嘉歎咨廷臣方畧侍郎周延儒言本兵備禦疎忽調度乖張檢討項煜繼之且曰世宗斬一丁汝夔將士震悚强敵宥遁帝頷之遂下兵部尚書王洽獄邦華亦以誤傷桂軍為言官劾罷時大清兵駐郊圻久城中洶洶獄囚劉仲金等百七十人破械出欲踰城被獲帝震怒下刑部尚書喬允升侍郎胡世賞提牢主事教繼榮于獄坐允升絞以年老減死與繼榮俱戍邊世賞贖罪為民質實老河在哈喇沁右翼南一百九十里源出明安山東北流㑹諸小水經敖漢北翁牛特左翼南又經奈曼哈爾哈二部之北流五百里許與潢河合大安口在遵化州西北三十里鮎魚闗東龍津井闗在遷安縣西北一百九十里西接遵化之洪山口陡峙邊外洪山口在遵化州北少東五十里白棗峪東三屯營在遵化州東六十里馬蘭闗在遵化州西北七十里有堡城在闗南十里甕城明嘉靖四十一年添築永定等七門甕城至四十三年六月城始成趙率教與滿桂為時良將莊烈帝聞其敗殁賜䘏典立祠奉祀本朝乾隆四十一年追謚忠烈同時戰殁之千户蔡國勲入祠張拱微神木人李檟大同人彭文炳吉水人王元雅大原人李獻明字思皇壽光人以察核官庫至遵化或謂君官保定此邑非所轄去無罪獻明正色曰莫非王土敢見危辟難請守東門城破死何日球増城人徐澤字兊若㐮陽人莅任甫七日死武起潛字用潛進賢人罣誤解官候代遂同殉節後孫承宗請䘏死事諸臣乃贈獻明天球光祿少卿澤光祿丞俱廕一子元雅以大吏失城贈䘏不及乾隆四十一年追謚張拱微李檟烈愍王元雅李獻明何天球徐澤武起潛朱國彦彭文炳節愍侯世祿綏徳州人項煜字水心吳縣人王洽臨邑人雅負時望而應變非所長帝方惡廷臣玩愒故于洽不少貸未㡬瘦死以成基命為禮部尚書兼東閣大學士預機務召孫承宗復為兵部尚書兼中極殿大學士視師通州先是遵化失守帝聞報召見廷臣于平臺基命請召還故輔承宗任以兵事帝然之乃命基命入閣而立召承宗至入對具陳方畧帝稱善曰卿不須往通州其為朕總督京城内外守御事務仍参帷幄趣首輔韓爌草敕下所司鑄闗防承宗出漏下二十刻矣即周閲都城五鼓而畢復出閲重城明日夜半忽傳㫖仍守通州時烽火徧近郊承宗従二十七騎出東便門道亡其三疾馳抵通州門者㡬不納既入城與保定廵撫解經傳御史方大任總兵楊國棟登陣固守旋聞大清兵已薄都城乃急遣遊擊尤岱以騎卒三千赴援復遣副將劉國柱督軍三千與岱合而發宻雲兵三千營東直門保定兵五千營廣寧門以其間遣將復馬蘭三屯二城質實東便門在外城之東北隅北向解經傳韓城人方大任桐城人楊國棟山海衛人尤岱榆林人十二月下督師袁崇煥于獄總兵官祖大夀擁兵奔錦州大初崇煥建議請和欲籍此緩師以修理故疆我東討清方有事朝鮮亦欲假是以阻其兵因得一意乃遣使以書相往来已而崇煥聞于朝奉㫖戒諭言路亦以為非計崇煥復以書詢錢龍錫龍錫亦阻之大事尋止及井闗諸隘口崇煥聞即督祖大夀何可綱清兵入龍等率師入衛以十一月十日辛丑抵薊州所遇撫寧永平遷安豐潤玉田諸城皆留兵以守帝聞其至甚喜大温㫖褒勉發帑金犒將士令盡統諸道援軍俄聞師清兵下遵化越薊州而西崇煥懼即引兵入䕶京與滿桂等同召見慰勞偹至諮以戰守策賜御饌及貂裘崇煥以士馬疲敝請入休城中不許請屯兵外大城亦不許隘口乃薊遼總理劉策所轄而崇煥未奉清兵所入勤王詔即千里赴援自謂有功無罪然都人驟遭兵怨謗紛起謂崇煥擁兵坐視朝士因前和議誣其招兵脅和將為城下之盟帝頗聞之不能無惑崇煥營廣梁門外伏兵隘口我大軍分道夾擊敗之崇煥復移營城東南隅豎立柵木大軍列陣逼之而營太宗文皇帝率諸貝勒輕騎往視曰此敗殘之餘何足勞我軍遂不戰還先是授宻大軍獲宦官二人令副將髙鴻中等守之因兵乃計鴻中等于二宦官前故作耳語云今日撤上計傾見敵有二人来見有宻約事可立就矣時楊太監者上語良久乃去意袁巡撫佯卧竊聞其言縦之歸以所聞告于帝帝遂信之不疑再召見崇煥及大夀于平臺詰崇煥以殺毛文龍之故責其援兵逗遛縳付詔獄成基命叩頭請慎重者再帝曰慎重即因循何益基命復叩頭曰兵臨城下非他時比帝不省大夀在旁股慄懼并誅即出與何可綱擁衆東走毁山海闗出逺近大震大夀先嘗有罪孫承宗欲殺之愛其才宻令崇煥救解故大夀徳崇煥基命知之言于帝就獄中取崇煥手書急遣都司賈登科齎諭大夀孫承宗亦令逰擊石柱國馳撫諸軍大夀見登科言麾下卒赴援冀効勞績而城上人羣詈為賊投石擊死數人所遣邏卒指為間諜而殺之勞而見罪是以奔還柱國追及諸軍其將士持弓相向皆垂涕言督師既下獄又將以大礟擊斃我軍故至此柱國復前追大夀去已逺乃返承宗奏言大夀危疑已甚又不肯受滿桂節制因譌言激衆東奔非部下盡欲叛也當大開生路曲收衆心遼將多馬世龍舊部曲臣謹用便宜遣世龍馳諭其將士必解甲歸大夀不足慮也帝喜從之承宗密札諭大夀急上章自列且立功贖督師罪已當代為剖白大夀諾之具列東奔之故悉如將士言帝優詔報之命承宗移鎮闗門諸將聞承宗世龍至多自㧞來歸者大壽妻左氏亦以大義責其夫大壽乃歛兵待命質實撫寧唐始分盧龍縣置明屬永平府今因之豐潤金始分玉田縣置明屬薊州以𨽻于順天府今屬遵化州廣渠外城七門之東門也劉策字範重武定人明年正月論死棄市發明袁崇煥在邊臣中尚有膽畧其率兵勤王實屬有功無罪莊烈始則甚喜其至倚若長城一聞楊大監之言不審虚實即下崇煥于獄尋至紿磔死是直不知用間愚敵為兵家作用古今來被而僨厥事者指不勝屈未有若莊愍此舉之甚者至祖大夀擁衆東走追而不返且出怨言甚至將士以弓刀相向此其叛迹顯然向非孫承宗調度有方豈能歛兵待命而轉以優詔報之崇煥非叛而坐以大逆大夀實叛而褒以璽書刑章顛倒國法何存豈惟不知將將之道抑亦大失御下之方矣武經畧滿桂帥師出戰敗績桂及前總兵官孫祖夀等死之大我兵既圍燕京諸貝勒大臣等咸請進攻清太宗文皇帝曰攻城固可必得倘堅城之下失我一二良將雖得百城亦不足喜乃止弗攻屢遣使齎書議和遂自得勝門移營循海子而南且獵且行趨良鄊克其城知縣党還醇與教諭安上達訓導李廷表典史史大之棟驛丞楊其禮皆死焉還軍至盧溝橋副縂兵申兵復分道攻固安亦下之甫者故僧也好談兵私製戰車火噐庶吉士金聲薦之帝立召見取其車入覽即擢副總兵給資令募新軍改聲御史監之甫倉猝募數千人皆市井逰手大學士成基命閲其軍極言不可用帝不聴甫所需軍裝戒器又不能時給出城戰輒敗及是結車營于盧溝橋以拒大清兵遶出其後御車者皆惶懼不能轉殱戮殆盡甫亦陣亡遂南薄永定門時以袁崇煥下獄特設文武兩經畧以尚書梁廷棟及滿桂為之屯西直安定兩門帝趣桂出師桂言衆寡勢殊未可輕戰中使趣之急不得已乃督孫祖夀黒雲龍麻登雲等移營永定門外二里許列柵以待明昧爽大清兵以精騎四面蹙之諸將不能支桂祖壽及㕘將周鎮戰死雲龍登雲被執帝聞震悼遣禮部侍郎徐光啟致祭贈桂少師世廕錦衣僉事襲陞三級賜祭葬有司建祠尋追諡毅愍祖壽亦贈恤如制帝以諸路兵皆敗憂甚不視朝傳㫖辦布囊八百中官競獻馬騾又令百官進馬順天府尹劉宗周曰是必有以遷幸動上者乃䟽言國勢强弱視人心安危迄延見百僚諭以固守外無他計俯伏待報自晨迄暮得請乃退羣議由此息質實孫祖壽字必之昌平人歴官薊鎮總兵既罷官家居散家財招舊部曲赴援遂歿于陣党還醇字于貞三原人大清兵薄城督吏乗城拒守或言縣小無兵盍避去還醇毅然曰吾守土吏也去將安之救兵不至力屈城破死事定父老覔還醇屍得之革間赤身靣縳體被數鎗羣哭而殮之安上達貴州安順人闔門死難事聞贈還醇光祿卿于祭𦵏有司建祠官其一子上達等亦贈恤給驛歸其喪已而吏科上言還醇城亡與亡之死靡貳猶曰有守土責也安上達史之棟等微員末職亦能致命遂志有死無隕宜破格褒崇以為世勸朝廷必不惜今日之虚名作將来之忠義乃僅贈國學教職良鄉主簿于聖主優恤之典謂何帝感其言下部更議乃贈上達廷表五經博士與史之棟楊其禮及千户蕭如龍何秉忠百户李蔭皆配祀還醇祠同時殉節武舉陳蠡測諸生梅支松等十五人烈婦朱氏等十七人並建坊旌表順天府尹劉宗周以上達得死難之正請贈翰苑宮坊不報申甫雲南人金聲字正希休寜人明唐王時殉節周鎮遵義人愍本朝乾隆四十一年追諡祖壽忠烈還醇甫鎮烈聲忠節上達廷表之棟其禮等與同時殉節之千户蕭如龍何秉忠百户李廕武舉陳蠡測生員山隂人梅友松並入祠梁廷棟鄢陵人劉宗周字起浙江罷大學士錢龍錫御史高捷史􅒇本閹黨王永光引用之頗為龍錫所扼兩人因是大恨方袁崇煥之段毛文龍也報疏有輔臣龍錫為此一事低徊過臣寓語而崇煥欲成和議又嘗以書商于龍錫反是崇煥已下獄㨗􅒇遂上言議和殺將皆龍錫發踪指示宜與崇煥並罪帝以龍錫忠慎戒無過求龍錫抗章申辨㨗􅒇再疏力攻詞益危切帝意頗動龍錫再辨引疾乃放歸時兵事方棘未暇竟也山西援兵潰于良鄉先是宣大總督及宣府保定河南山東山西巡撫聞京師戒嚴皆奏請帥師入衛並詔徵應天鳳陽陜西浙江各巡撫及撫治鄖陽都御史統部卒勤王至是山西巡撫耿如杞偕總兵官張鴻功以勍卒五千人赴援軍令卒至之明日汛地既定而後給餉如杞兵既至兵部令守通州明日調昌平又明日調良鄉汛地累更軍三日不得餉乃譟而大掠帝聞之震怒逮如杞鴻功下獄時四方援兵先後集以缺餉故多肆剽掠獨河南巡撫范景文馭軍有紀律所將八千人餉皆自齎秋毫無所犯移駐東門再駐昌平逺近恃以少安明年春陜西諸路總兵官吳自勉率師勤王所部延綏兵亦潰巡撫張夢鯨恚死而甘肅巡撫梅之煥奉詔入衛將行西路乘虚入犯之煥止留遣兵伏賀蘭山後邀其歸路再戰再敗之乃引軍東俄悍卒王進才殺叅將孫懐忠等以叛走蘭州之煥西定其變復整軍東比抵京師以後時矣遂落職罷去耿如杞既下獄論死後二年斬西市如杞初為職方郎與主事鹿善繼黨張鶴鳴排熊廷弼而庇王化貞封疆由是大壊議者罪之質實范景文字夢章吳橋人張夢鯨絳縣人梅之煥字彬文麻城人發明明代軍律不嚴將驕卒惰承平之日索餉而譁者已不可更僕數而况赴援逺渉顧可三日無糧耶且夫將士千里勤王分守要地尤當預為部署使屯駐有一定之所乃今日通州明日良鄉檄調紛更漫無定策誰秉中樞誤國若此卒之鎮巡就逮駢首服刑而本兵置之不問即亂卒之潰而西者亦未嘗設法捕禦竟聽其出飛狐越井陘悍然無忌以合于賊宜延綏甘肅之相繼而潰也以周延儒何如寵錢象坤並為禮部尚書兼東閣大學士預機務延儒性機警善伺意㫖以㑹推不預與温體仁比數為言者所劾帝不聴特命入誾時都人桀黠者請以私財聚衆助官軍如寵力言其叵測㑹帝得偵事者報與如寵言合由是受知象坤奉命守城祁寒不懈帝覘知之遂並命入閣質實錢象坤字宏栽㑹稽人庚午三年春正月韓爌罷中書舍人原抱竒以爌為袁崇煥座主遂劾爌主和誤國宜與錢龍錫並罷帝重去爌貶抱竒秩無何庶子丁進以遷擢愆期怨爌亦劾之而工部主事李逢申劾疏復繼上爌三疏引疾歸爌先後作相老成慎重引正人抑邪黨天下稱其賢初熊廷弼既死傳首九邊屍不得歸葬後其子詣闕疏請爌言于帝曰廷弼之死由逆閹欲殺楊漣左光斗誣以行賄因盡殺漣等復懸坐廷弼贓銀刑及妻孥此寃之甚者帝乃許收葬爌遇事持平多類此質實原抱竒由輸貲進里貫未詳丁進上虞人李逢申海人皆爌主㑹試所舉士爌罷後十四年李自成陷蒲州迫爌出見不従賊執其孫以脅爌爌止一孫乃出見孫得釋爌歸憤鬰而卒年八十矣兵部侍郎劉之綸帥師戰于遵化敗績死之初金聲之薦申甫也并薦之綸知兵可大任帝即召之奏對稱㫖遂自庶吉士起擢兵部右侍郎副尚書閔夢得協理京營戎政之綸未受任時與申甫兩人皆好談兵私貸金製單輪火車偏廂車獸車刳木為西洋大小礟鋭欲以軍績自效既貳樞部意氣感激以甫與滿桂等相継敗歿殺然請行乞京營兵為己部不許乞闗外川兵又不許乃召募萬人勒為八營以副總兵八人分將之廷臣見之綸驟貴受命視師皆不允中允文震孟使人諷之綸謂當辭侍郎而易科銜以行不聴聴雨雷誓師行至通州守者拒不納天大雨雷宿右廟中言官劾其逗遛之綸憤上疏曰小人意忌有事則委缷無事則議論止従一侍郎起大見耳乞削臣今官賜骸骨不許遂越通州而東申㧞清兵亦已由通州而渡克香河以月之四日甲永平戊子㧞遷安下滦州越十三日庚子駐三屯營分兵守濮兒莊方起行而之綸遂出薊州遣别將吳應龍等従問道規取羅文峪闗自率八營兵抵遵化列屯城外我守城兵出擊之破其二營之綸軍猶不大退我報乃自三屯營整兵而西麾精騎三萬突陣礟軍聞矢並發之綸軍大潰獲其禆將一人訊之曰營娘娘廟山者之綸也太宗文皇帝諭我軍曰可生縳之綸来于是大貝勒代善以兵圍山招之降不従縦兵擊之綸發礟礟炸軍營自亂左右請結陣徐退之綸叱曰毋多言吾受國重恩吾死耳嚴皷再戰流矢四集之綸解所佩印付家人令持歸報朝廷走遁入石巖中我總兵官楞額禮子穆成格射殺之八營兵前後覆其七一軍夜遁去益是月二十二日壬寅也敗書聞帝嘉之綸忠従優恤贈兵部尚書震孟止之曰死綸分也侍郎非不尊遂不予贈賜一祭半葬仕一子先是之綸次薊州與總兵官馬世龍吳自勉令由薊趨永平拒我大軍世龍自勉不赴約獨之綸前進已敗吳應龍亦敗于羅文峪副總兵金日觀駐馬蘭聞應龍敗遣將馳大援皆敗没進攻馬蘭城甚急日觀堅守親燃大礮焚清兵乗勝頭目手足意氣不裒乞援于世龍世龍令㕘將王世選等赴救兵乃退已復以二千騎來攻日觀偕世選等死守不下時京東列城多失守守城將吏死事者香河則知縣任光裕永平則副使鄭國昌知府張鳯竒推官盧成功盧龍教諭趙允殖副總兵焦延慶㕘將吕鳴雲指揮張國翰守備程應琦城守中軍房應祥千總石可玩梁壯威胡承祚卜小峯張學閔仇耀先牛星耀把總楊開泰百户楊廷棟里居中書舍人廖汝欽武舉唐之俊諸生韓洞原周祚新馮維京弟聨京胡起鳴胡登龍子光奎羅世傑弟埈埰圻李光春丁應掄李文燦劉可廷田種玉子福元姪士㒞張汝恭王元輔武生張鴻鸞義民李應陽張俊郭重光張宗仁張禮李大敬張尚義傅守望等灤州則知州楊濓漢兒莊則副總兵葉應武而山海北路副總兵大官惟賢亦以襲遵化敗死方撫寧向山海離闗三十清兵下灤州之明日分兵自大里列三營惟賢與㕘將陳維翰等設兩營以拒維翰清兵乃還攻撫寧昌黎既而惟賢奉世龍檄率及逰擊張竒化等往襲遵化至城西波羅灣城中兵出擊先鋒殊死戰大清兵收入城後隊乗勢進攻城上矢石如雨尋復遣兵出戰惟賢陷陣中箭死士卒殺傷者三百餘人竒化亦敗歿質實昌黎遼廣寧縣金改曰昌黎明屬永平府今因之羅文峪闗在遵化州北十八里山寨堡東馬蘭峪東第十四闗口也娘娘廟山在遵化州西八里波羅灣亦在州城西劉之綸字元誠宜賔人既敗死屍還矢飲于顱不可抜金聲以齒嚙之出以授其家人之綸母老二子幼貧不能返柩靖于朝給驛還乆之贈尚書金日觀浦江人任光裕霍州人鄭國昌邠州人以按察副使治兵永平遷山西右布政使上官奏留之城破與守備程應琦自縊死應琦妻奔告國昌妻與之偕死應琦山隂人張鳯竒陽曲人國昌鳳竒闔門並殉節盧成功髙要人趙允殖遼陽人焦延慶盧龍人官三屯營副總兵罷歸分守南門陣亡吕鳴雲山海衛人張國翰東勝衛人楊燫銅仁人胡光奎父登龍馮維京弟聨京田種玉子福元姪士儁俱死事聞贈國昌太常卿鳳竒光祿卿光裕光祿丞燫光祿少卿並賜祭葬廕一子成功等贈䘏有差葉應武龍㳺人按甘肅通志有寧夏人鄭感民者時官督師軍前監紀永平推官亦闔門殉節本朝乾隆四十一年追謚劉之綸忠烈鄭國昌張鳳竒楊燫官維賢張竒化烈愍任光裕盧成功焦延慶吕鳴雲張國翰程應琦廖汝欽葉應武鄭感民節愍趙允殖等並入祠發明明末國是日非其亡懸于呼吸雖百之綸亦無益然慷慨誓師誠心為國而衆忌其驟貴而撓之乞兵不與致自募馴至于敗及臨陣捐軀莊烈欲優䘏以勵其餘宜也文震孟又從而沮之惟任私意而罔顧公義天良澌滅盡矣震孟立朝風節在當日頗有可觀而亦復出此殆不免為習氣之所移耶二月立子慈烺為皇太子慈烺以二年二月生至是立為太子質實慈烺莊烈帝第一子周皇后生三月李標罷初與標相者六人來宗道楊景辰以附璫斥劉鴻訓以增勅戌周道登錢龍錫被攻去獨標在閣稍久頗能隨事匡益然時方争門户帝亦深疑廷臣有黨遂連疏乞休去夏五月我大清兵東歸大先是次燕京我清兵太宗文皇帝欲息兵安民六致書議和皆未報永平遷安灤太宗曰彼以城下之盟為恥耳遂引兵東既下州京師道梗總理馬世龍統四方援兵壁于薊門督師孫承宗鎮山海闗東西相隔絶承宗募死士沿海逹京師始知闗城尚無恙闗西南三縣曰撫寧昌黎樂亭西北三城曰石門臺頭燕河六城東䕶闗門西繞永平皆近闗要地承宗飭諸城嚴備禦而遣將戌開平守建昌聲援始接我上天大清復遺書議和極言師旅頻興生民罹禍道冷口而好生之徳我兩國當共體之至是遂旋師取歸承宗先後復灤州遷安永平遵化四城質實石門路在撫寧縣東北九十里山海闗西北四十里亦曰石門砦臺頭營在撫寧縣北三十里燕河路在盧龍縣東北五十里建昌路在遷安縣東北四十里冷口闗在遷安縣東北七十里六月流賊陷府谷是年春流賊王左掛等攻宜川為知縣成材所却轉攻韓城總督楊鶴命㕘政洪承疇禦之俘斬三百餘人圍解賊走清澗鶴以陜西五鎮勁兵皆入援闗中無帥連疏請遣諸將還鎮不果起前總兵官杜文煥督延綏固原兵而以承疇代張夢鯨為巡撫便宜討賊會延安知府張輦都司艾穆蹙賊延川降其魁王子順張述聖姬三兒于是王左掛及其黨苗順等亦乞降獨王嘉允不受撫肆掠延安慶陽鶴匿不以聞是時秦地加派之賦曰新餉曰均輸曰問架其目目增吏因縁為奸民大困多往従賊而山西甘肅延綏勤王兵之潰而西者復走與賊合賊愈不可究詰有别賊横天一字王者自神木渡河陷山西之蒲縣分道東犯趙城洪洞汾霍西掠石樓永和吉隰全晉震動鶴辦賊闗中恇怯莫知為計力持撫議遣官持牌四出招賊賊渠王虎小紅狼一丈青掠地虎混江龍等皆給以免死牒安置延綏和曲問賊滛掠如故有司不敢問而嘉允已襲破黄甫川清水木𤓰三堡遂于是月癸丑攻陷府谷米脂賊張獻忠起應之勢甚熾張獻忠者延安衛栁樹澗人也初𨽻延綏鎮為軍犯法當斬主將陳洪範竒其狀貌為請于總兵官王威釋之乃逃去後叛兵神一元領紅旗為先鋒及是㨿有米脂諸寨自號八大王與嘉允互為聲援總兵官尢世禄怯不能禦承疇文煥聞之馳救府谷擊敗嘉允嘉允佯乞降仍奪路走黄甫川勾西人入犯承疇文煥大破之賊奔潰軍還擊張獻忠于清澗大破之盖是年十月丙寅也降賊王左掛謀以綏徳叛承疇與巡按李應期計誅左掛等亂乃定承疇有幹畧足辦賊顧流賊所在蜂起神一元不沾泥可天飛郝臨庵紅軍支㸃燈子混天猴獨行狼等或西掠秦或東入晉屠陷城堡官軍東西奔擊旋滅旋熾迄莫能盡也張獻忠敗于清澗之月嘉允復擁衆陷清水營殺逰擊李顯宗府谷再陷其黨李老柴又嘯衆三千人攻合水鶴檄寧夏總兵官賀虎臣往勦俘馘六百有竒㨗方報制府而山西總兵官王國梁追嘉允于河曲敗績賊入據其城廷議設大將兼統山陜軍協討仍詔文煥為提督偕延綏副總兵曹文詔馳至河曲絶餉道以困之未幾神一元攻陷寧塞栁樹澗等城文煥家寧寨遂令西還援勦而留文詔討河曲賊質實延川隋改文安縣置明屬延安府今因之蒲縣漢蒲子縣地後周改置蒲縣金升州元仍降縣明屬平陽府今屬隰州洪洞趙城汾西皆隋置明並屬平陽府今悉因之永和後周臨河隋改永和明屬隰州以𨽻于平陽府甫本朝雍正二年升隰州為直𨽻州永和仍屬焉黄川堡在府谷縣東北七十里清水堡在府谷縣東北六十里木𤓰堡在府谷縣北五十里栁樹澗在定邉縣東一百四十里寧寨堡在靖邊縣西四十里洪承疇泉州南安人尤世禄府谷人曹文詔大同人李顯宗籍貫無考本朝乾隆四十一年追諡烈愍以禮部尚書温體仁吳宗達並兼東閣大學士預機務體仁為人外曲謹而中猛鷙機深刺骨言官屢劾其奸邪帝謂體仁孤立益嚮之周延儒復刀為之援遂與吳宗達並入閣體仁既得輔政勢益張宗達徒充位而已踰年吏部尚書王永光罷體仁以其鄉人閔洪學代凡異己者率以部議論罷而體仁隂主持之又用御史史􅒇髙捷等為腹心日以傾正人庇宵小為事所欲推薦隂使人發端已承其後欲排陷故為寛解中上所忌激使自怒帝往往為之移初未甞有迹于是職方員外郎華允誠憤體仁等亂政疏陳三大可惜四大可憂畧言當事借陛下剛嚴而佐以舞文擊斷之術倚陛下綜核而騁其訟逋握算之能遂使和恒之世競尚刑名清明之躬寢成叢脞以聖主圖治之盛心為諸臣鬬智之捷徑可惜一率屬大僚驚魂于回奏認罪封駁衆臣奔命于接本守科遂使直指風裁徒徵事件長吏考課惟問錢糧以多士靖共之精神為案牘鈞校之能事可惜二廟堂不以人心為憂政府不以人才為重四方漸成土崩瓦解之形諸臣但有角户分門之念意見互觭議論滋擾遂使勦撫等于築舍用舍有若舉碁以興邦啟聖之歳時為即聾従昧之舉動可惜三人主所以總一天下者法令也王化貞楊鎬之喪師誤國厥罪惟均陛下申明三尺肆鎬市朝以懲封疆大吏化貞恃有奥援獨稽顯戮遂使刑罰不中鈇鉞無威一可憂也國家所恃以為元氣者公論也直言敢諫之士一鳴輒斥指佞薦賢之章目為奸黨不惟不用其言并錮其人又加之罪遂使喑黙求容是非共蔽二可憂也國家所賴以防維者亷恥也近者中使一遣妄自尊大羣僚趨走惟恐後時陛下不以近臣可倚而不知倖竇已開以操縦惟吾而不知屈辱士大夫已甚遂使阿諛成風羞惡盡喪三可憂也國家所藉以進賢退不肖者銓衡也我朝罷丞相以用人之權歸之吏部閣臣不得侵焉今次輔體仁與冡臣洪學同邑朋比惟異己之驅除閣臣兼操吏部之權吏部惟阿閣臣之意造門請命夜以為常黜陟大柄祗供報復之私甚至庇同鄉則逆黨公然保舉而白簡及為罪案排正類則講官借題遇逐而薦剡遂作爰書欺莫大于此矣擅英専于此矣黨莫固于此矣遂使威福下移舉措倒置四可憂也疏入帝詰其别有指使允誠而列上洪學徇私數事且曰體仁生平紾臂塗顔亷隅掃地陛下排衆議而用之以其倖直寡諧豈知包藏禍心隂肆其毒又冇如洪學者為之羽冀遍植私人戕盡善類無一人敢犯其鋒者臣復受何人指使帝以體仁純忠亮節摘疏中語再令陳狀允誠復上言二人朋比舉朝共知温育仁不識一丁而得首拔羅喻義進講章以左右非人一語而部議削職此非事之彰明較著者乎帝亦悟兩人同里有私乃奪允誠俸半年而洪學亦旋罷去質實吳宗達武進人中行従子華允誠字汝立無錫人温育仁烏程人體仁弟也楊鎬以崇禎二年棄市六年王化貞始伏誅秋八月殺前督師尚書袁崇煥逮前文淵閣大學士錢龍錫下獄尋遣戍史􅒇疏言龍錫主張崇煥斬帥致兵倡為和議以信五年成功之説賣國欺君莫此為甚其出都時以崇煥所畀重賄數萬轉寄婣家巧為營幹致國法不伸帝怒敕刑官五日内具獄讞上帝召諸臣于平臺論崇煥謀叛當寘極典責龍錫私結邊臣蒙隐不舉令廷臣議罪是日羣議於府中謂斬帥雖龍錫啟端而兩書有處置慎重語意不在擅殺至議和倡自崇煥龍錫亦未之許然軍國大事私有商度不抗疏發奸何所逃罪遂遣使逮龍錫而磔崇煥于市兄弟妻子流三十里籍其家無餘貲天下寃之十二月龍錫逮至下獄復疏辯悉封上崇煥原書及所答書帝不省時羣小麗名逆案者方日為翻案計􅒇等以龍錫為東林所推欲借崇煥以及龍錫因龍錫以及諸異己者指崇煥為逸首龍錫等為逆黨更立一逆案于前案相抵謀既定温體仁王永光主之欲發自兵部尚書梁國棟惲帝英明不敢任而止乃議龍錫大辟決不待時且用夏言故事設厰西市以待帝以龍錫無逆謀令長繫明年中允黄道周復上疏申救忤㫖貶秩調外而帝意寖解尋詔所司再讞減死戍定海衛龍錫在戍十二年兩赦不原其子請輸粟贖罪㑹周延儒再當國尼不行福王時復龍錫官歸里未㡬卒質實定海五代時吴越析鄮縣地置望海時宋改定海明屬寧波府于縣置衛屬浙江都司以𨽻于左軍都督府本朝康熈二十六年别置定海縣于舟山改故定海縣為鎮海縣仍屬寧波府衛廢黄道周字幼平漳浦人唐王時殉節本朝乾隆四十一年追謚忠烈冬十二月増田賦户部尚書畢身嚴既以度支大絀奏行増塩引諸事已又列十二事曰増闗税捐公費鬻生祠酌市税汰沉役核虚冐加抵贖班軍折銀吏胥納班括河濱灘蕩之租覈京東水田之賦開殿工官帯之例帝悉允行而兵食猶不足至是兵部尚書梁廷棟復言今日閭左雖窮然不窮于遼餉一嵗之中隂為加𣲖者不知其數如朝覲考滿行取推陞少者費五六千金合漢内計之國家選一畨守令天下加𣲖數百萬巡撫查盤緝訪餽遺謝薦多者至二三萬金合海内計之國家遣一畨廵方天下加𣲖百餘萬而曰民窮于遼餉何也臣考九邊額設兵餉兵不過五十餘萬餉不過千五百三十餘萬何憂不足故今口民窮之故惟在官貪使貪風一息即再加𣲖民亦懽然帝俞其言下户部協議自嚴阿廷棟意即言今月之策無踰加賦請畝加九釐之外再増三釐于是増百六十五萬有竒合舊所増凡六百八十餘萬天下益耗矣御定資治通鑑綱目三編卷三十四
