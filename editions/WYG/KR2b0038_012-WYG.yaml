  - {type: page-break, offset: 0, content: '', id: KR2b0038_WYG_012-1a, image: WYG0340/WYG0340-0131a.png}
body:
  text: 起庚子明成祖永樂十八年盡乙巳明仁宗洪熙元年凡六年庚子十八年春二月蒲臺妖婦唐賽兒作亂討平之賽兒蒲臺縣民林三妻自稱佛母以幻術聚衆據益都卸石栅寨為亂指揮髙鳳領兵捕之敗殁勢遂熾其黨董彦昇等攻下莒即墨圍安邱詔安逺侯栁升與都指揮劉忠将京軍徃勦升至圍賊寨賊遣人詭乞降云寨中食盡且無水東門舊有汲道議趨此宵遁升自以大将意輕賊信之即徃據汲道賊夜襲官軍軍亂忠力戰中流矢死賽兒遁去比明升始覺追不及别賊賔鴻等攻安邱益急知縣張􅒅縣烝馬撝集民夫八百餘人以死拒戰賊復合莒即墨衆併力攻之聲言屠城都指揮僉事衛青備倭海上聞圍急帥千騎晝夜馳抵城下奮擊敗之賊収餘衆再戰又大敗之斬馘六千餘人時城中旦夕不能支使青救稍遲城必陷比三日升始至青迎謁升怒其不待已捽出之鰲山指揮王真亦殱賊諸城賊遂平而賽兒卒不獲帝賜書勞青切責升刑部尚書吳中劾奏升征勦妖賊失機冒功賊徒慿髙無水且乏資糧當坐困之升全不留心及臨賊境又不設備致賊夜斫營殺傷軍士劉忠身先士卒升不救援衛青解安邱圍反忌青功而摧辱之請治其罪遂下升獄擢青山東都指揮使真都指揮同知旟撝左右參議已乃釋升帝以賽兒乆不獲慮削髪為尼或混處女道士中遂命法司凡北京山東境内尼及女道士悉逮至京詰之所在多擾既擢刑部郎中段民為山東左參政民至力為矜宥人情始安質實蒲臺漢濕沃縣地隋置蒲臺縣宋省入渤海縣金復置屬濵州元屬般陽路明仍屬賔州今屬山東武定府益都漢侯國三國魏置益都縣金益都府元益都路明仍置縣屬青州府今因之卸石柵在益都縣西南即墨齊邑漢縣為膠東國治北齊廢隋復于不其故城東北置即墨縣元屬膠州明屬萊州府今因之安邱春秋莒渠邱父封邑漢置安邱縣屬北海郡與琅邪之安邱異隋復置安邱縣宋金元仍舊明屬青州府今因之鰲山衛名在即墨縣東四十里洪武二十一年建今裁諸城漢諸縣北齊省入東武縣隋改諸城唐置密州治此明改縣屬青州府今因之髙鳳張旟馬撝里系未詳衛青字明徳松江華亭人王真里系未詳吳中字思正武城人段民字時舉武進人夏六月北京地震秋八月丁酉朔日有食之九月召皇太子北京宫殿將成欽天監言明年正月朔日上吉宜御新殿遂遣夏原吉齎勅召皇太子尋又勅皇孫從行期十二月終至北京詔自明年改京師為南京北京為京師命行在禮部明年正月朔以北京為京師去行在稱取南京各印信給京師諸衙門南京衙門别鑄加南京二字冬十一月以遷都詔天下詔曰朕皇考髙皇帝建都江左肇造邦基肆朕纉承惟懷永圖眷茲北京實為都㑹天意所屬卜筮攸同乃仿古制徇輿情立兩京置郊社宗廟創建宫室上以紹先志下以詒子孫營建以來天下軍民樂于趨事天人協贊景貺駢臻今工告成以明年正朔御奉天殿朝百官振青萊饑凡十五萬三千七百餘户皇太子過鄒縣見民草食下馬入民舍皆衣不掩體歎曰民隠不上聞若此乎山東布政使石執中來迎詰之對已奏請停今年秋稅太子曰民餓且死尚及徴稅耶速督郡縣勘饑民口數近地約三日逺五日悉發官粟振之執中請人給三斗曰與六斗汝毋懼吾自奏上也及至京以聞帝是之曰昔范仲淹子猶能舉麥周濟其父之故舊况百姓吾赤子乎質實鄒縣漢置騶縣晉改鄒明屬兖州府今因之十二月北京郊廟宫殿成初營建北京凡廟社郊祀壇塲宫殿門闕規制悉如南京而髙厰壮麗過之復于皇城東南建皇太孫宫東安門外建十王邸通為屋八千三百五十楹自永樂十五年六月興工至是乃成質實東安門皇城周十八里有竒東曰東安門置東厰帝七年已令中官刺事及北京初建尤鋭意防奸令錦衣官校專司輯訪復慮外官瞻徇乃立東厰于東安門北以内監掌之由是中官之勢口重訖于明亡不可復制發明明太祖初制内侍不許讀書惟置監局而不兼文武銜不侵外廷政備掖廷供灑掃而已建文御内侍嚴多逃入燕軍洩朝廷事成祖徳之即位後頗加委任監軍出使将兵分鎮徃徃用之乃至立東厰刺外事寄以心腹勢敵錦衣後憲宗信用汪直更有西厰之設羅織益横倍于東厰泊末季乘時竊柄日擅威福元氣削而天下用是危矣此東厰為濫觴而成祖實階之厲也辛丑十九年春正月遷都北京赦正月甲子朔上躬詣太廟奉安五廟神主命皇太子詣天地壇奉安昊天上帝后土皇地祗神主皇太孫詣社稷壇奉安太社太稷神主黔國公沐晟詣山川壇奉安山川諸神主御奉天殿受朝賀甲戌大祀天地于南郊戊寅大赦天下質實太廟五廟明㑹典國初于闕左建四廟徳祖廟居中懿祖居東第一廟熈祖居西第一廟仁祖居東第二廟廟與主皆南向三祖合食于徳祖廟徳祖南向三祖以次東西向洪武九年改建太廟其制為正殿前後為寝殿俱翼以兩廡寢殿九間以一間為一室中一室奉安徳祖神主懿祖居東第一室熈祖居西第一室仁祖居東第二室主皆南向及時享于正殿徳祖居中南向懿祖列于左西向熙祖列于右東向仁祖列于懿祖之次西向洪武三十一年以後奉安髙廟神主于寝殿西第二室居熙祖之次此南京太廟之制及遷都北京建廟與南京同天壇在正陽門外南郊地壇在安定門外北郊社稷壇明㑹典國初太社太稷異壇同壝祭太社以后土勾龍氏配祭太稷以后稷氏配洪武十年改建社稷壇于午門外之右同壇同壝臨祭時太社居東太稷居西俱北向奉仁祖配西向至是始罷勾龍后稷洪武三十一年後更奉太祖配永樂中北京社稷壇成與南京舊制同山川壇明㑹典國初建山川壇于天地壇之西正殿七間祭太嵗風雲雷雨五嶽五鎮四海四賣鍾山之神東西廡各十五間分祭京畿山川壇西有先農壇壇東有旗纛廟壇南有藉田一所京師山川壇俱與南京舊制同惟正殿鍾山之右添祭天夀山之神夏四月奉天謹身華蓋三殿災詔羣臣直言闕失詔曰朕仿古建二京乃三殿同災朕心惶懼意者敬天事神禮有怠歟祖法戾政務乖歟小人在位賢士隱遯歟刑獄寃濫歟讒慝交作歟掊克及田里歟蠧財妄費用無度歟祖稅太重徭役不均歟軍旅未息征調無方饋餉乏歟工作過度民力敝歟奸人附勢羣吏弄法有司闒茸不治歟爾文武羣臣條陳無隱于是詔罷不便于民及不急諸務蠲十七年以前逋賦及十八年被災田租質實華蓋殿在奉天殿北再北曰謹身殿命蹇義等分巡天下安撫軍民以三殿災勅廷臣二十六人分巡天下問軍民疾苦文武長吏擾民者奏黜之殺主事蕭儀左庶子兼侍講鄒緝應詔上言畧曰陛下肇建北京工鉅費繁調度甚廣農民終嵗供役猶且伐桑棗以供薪剥桑皮以為楮加之官吏横征日甚一日非其土産動科千百小民轉購他所其值倍蓰及至進納多不中程徃復輾轉重為民累又自營建以來工匠假托威勢驅民移徙號令一出屋宇立摧奥突粗完又復重徙有三四遷而不能定居者此陛下所不知而民人疾怨者也貪官汚吏徧布内外朝廷毎遣一人虐取苛求初無限量有司承奉唯恐不及剝下媚上有同交易小民所積㡬何而誅求若此今山東河南山西陕西水旱相仍民至剥樹皮掘草根為食而京師聚僧道萬餘人日耗廩米此奪民食以養無用也朝廷歳賫錢幣市馬外蕃所出數十萬而所取不能一二散馬民間馬死輒令賠補不知人民耗矣多馬奚裨漠北降人皆懷窺覘非真逺慕王化乃使羣居輦轂盛供帳厚賞賚以優之此豈足明廣大耶夫奉天殿陛下正朝也災首及焉自非省躬責已改革政化疏滌天下窮困之人不能上囘天怒願陛下還都南京保養聖躬散遣工匠停止征派毋聽小人重勞天下將災沴不作太平可致矣疏入不省時帝方以定都詔天下忽罹火災頗懼而言事者僉云遷都不便帝不懌義言尤峻切帝于是發怒殺儀而緝竟得無罪質實蕭儀樂安人五月出給事柯暹御史鄭維桓等為知州柯暹鄭維桓等言事訐直俱謫知文阯質實柯暹字啓暉池州建徳人鄭維桓慈谿人秋八月辛夘朔日有食之冬十一月遣使覈天下庫藏分遣内官監察御史查勘两京及天下庫藏逓年出納之數下户部尚書夏原吉等于獄兵部尚書方賓自殺帝將大舉北征詔原吉賓及刑部尚書吳中等議皆以為兵不當出帝召賓賓力言軍興費絀帝不懌召原吉問邊儲多寡對曰比年師出無功軍儲十䘮八九災眚迭作内外俱疲乞遣将徃征勿勞車駕立命原吉出視開平糧儲而吳中入對如賓言帝益怒下原吉及中子獄賓懼自經死遂命侍郎張本等分徃山東山西河南及應天順天諸府督造糧車發丁夫輓運期以明年二月集宣府下侍讀李時勉于獄先是時勉應求言詔條上時務十五事極言北京營建之非及逺國入貢人不宜使羣居輦下忤帝意已觀其他説多中時病抵之地復取視者再率多施行㑹大臣希㫖詆言者謗訕至是遂下獄壬寅二十年春正月己未朔日有食之罷朝㑹詔羣臣修省三月詔有司遇災先振後聞户部奏直𨽻開州等州縣民饑帝歎曰有司必至饑民嗷嗷始達于朝又必待命下乃振之餒死者已不逮矣其令自後遇饑即騐實發倉振之而後聞質實開州金置明屬大名府今因之帝自將征阿嚕台命皇太子監國阿嚕台初為衛拉特所敗窮蹙南竄帝納而封之數年生聚繁富浸桀驁拘留朝使其貢使歸多行刦掠又時出没塞下為冦至是大入興和殺都指揮王煥帝于是決䇿親征夏六月雨水傷稼南北畿山東數十州縣霪雨傷稼秋七月帝至沙琿原阿嚕台遁遂征烏梁海大軍至開平諜報阿嚕台攻萬全諸將請分兵還擊帝曰詐也彼慮吾搗巢欲以此牽制我知大軍北行必已䘮膽况敢攻城哉疾驅之攻萬全者果遁去大軍次沙琿原阿嚕台大懼母妻皆詈之于是與其家屬直北走盡棄輜重於庫楞海側乃命發兵焚之收其牲畜而還帝謂諸将曰阿嚕台敢悖逆恃烏梁海為羽翼也當移師剪之遂簡歩騎二萬五道並進諭曰軍至㓂且西走邀之必獲至竒拉爾河其衆數萬果驅牛馬車輛西走遇大軍倉卒迎戰帝麾騎夾擊自率前鋒衝之斬首數百級餘走散其地背河面左皆山大軍依山而軍帝乘髙望之見其衆稍聚乃麾兵繞出其右分兵渡河㫁其後衆突至盡獲之又麾兵繞出其左先伏神機弩於深林中又命嚴陣山下以待已而其衆盡棄輜重走左帝麾騎與山下兵馳追之及林間伏發遂大潰追奔三十里斬部長數十人别以兵狥河西斬獲甚衆烏梁海餘黨老弱皆詣軍門降質實沙琿原在興和北竒拉爾河方輿紀要在朶顔境内竒拉爾河舊作屈裂兒今改免南北畿山東河南州縣糧芻七十萬南北畿山東河南各州縣水災糧三十三萬八千有竒芻三十八萬有竒皇太子皆免之八月詔班師諸將分道捕擊者亦以次獻㨗乃下詔班師九月帝還京師壬戌帝乘法駕入京城躬告天地宗廟社稷御奉天門朝百官受賀下左春坊大學士楊士竒吏部尚書兼詹事蹇義于獄尋釋之太子屢遭讒搆帝以士竒輔導有闕下錦衣獄禮部尚書吕震壻張鶴朝參失儀太子宥之帝怒義不匡正命與震並下獄尋皆釋之質實張鶴時官户部主事冬十月遣使覈天下倉儲分遣中官及朝臣八十人覈天下倉糧出納之數閏十二月乾清宫灾戊寅夜乾清宫灾質實乾清宫在乾清門内癸夘二十一年春三月御史王愈等决囚誤殺無罪四人坐棄市監察御史王愈及刑部錦衣衛官四人㑹决重囚誤殺無罪四人事聞帝命法司執愈等償死即日皆棄市質實王愈修武人夏五月免開封南陽衛輝鳳陽等府水灾田租去年夏秋霪雨黄河汎溢傷田稼帝命遣人按視蠲其租税質實南陽秦郡元明為府今因之趙䕶衛指揮孟賢等謀逆伏誅先是髙燧與髙煦謀奪嫡時時譖太子凡太子宮僚多得罪既而帝聞其不法事大怒誅其長史顧晟褫髙燧冠服以太子力解得免至是帝有疾䕶衛指揮孟賢等結欽天監官王射成及内侍楊慶養子造偽詔謀進毒于帝俟晏駕詔從中下廢太子立趙王時縂旂王瑜姻家髙以正者為賢等畫謀謀定告瑜瑜上變帝曰豈應有此立捕賢等得所為偽詔帝顧髙燧曰爾為之耶髙燧大懼不能言太子又力為之解曰此下人所為髙燧必不與知乃得免賢等悉伏誅質實總旂明史兵志凡千百户所各設總旂二小旂十王瑜字廷墨山陽人仕至右軍督都府僉事六月庚戌朔日有食之秋七月釋李時勉于獄復其官帝復自將征阿嚕台命皇太子監國邊將言阿嚕台将率衆南犯帝曰去秋㓂犯興和朕率師搗其巢穴復勦其黨烏梁海其窮甚矣今以朕既得志必不復出朕當率兵先駐塞外以待之彼不虞吾兵已出而輕肆妄動我因其勞而擊之破之必矣于是部分諸軍以寕陽侯陳懋為前鋒馳攻之八月免两京山東郡縣水灾田租皇太子諭户部曰今年南北直𨽻并山東郡縣水旱之處糧芻皆無出而有司徴索不已甚為朝廷歛怨其悉蠲之冬十月帝至上荘堡蒙古額森托噶來降詔班師大軍至西陽河聞阿嚕台為衛拉特所敗部落潰散遂駐師前鋒陳懋追㓂至宿嵬山不見敵遇王子額森托噶率妻子部屬來歸遣人馳奏命偕來入見帝大喜封為忠勇王賜姓名曰金忠賞賚甚厚遂班師質實上荘堡在萬全右衛北其地有上荘堡膳房堡新開口堡新河口堡俱永樂以後置今宣化府萬全縣北境西陽河即西洋河在宣化府懐安縣西北自山西天鎮縣流入經西陽河堡下流與東洋河合宿嵬山方輿紀要在興和北亦曰宿嵬口度漠處也額森托噶元太保布哈六世孫額森托噶舊作也先土干布哈舊作不花今並改十一月帝還京師駕至京師陳鹵簿帝乗御輦入告天地宗廟社稷御奉天門朝羣臣時諸番貢使咸集闕下羣臣上表稱賀甲辰二十二年春正月復詔北征金忠數請擊阿嚕台願為前鋒自効帝初不許㑹開平守將言阿嚕台犯邊羣臣勸帝如忠言帝意遂决敕邊將整兵俟命徴山西山東河南陜西遼東五都司及西寕鞏昌洮岷各衛兵期三月㑹北京及宣府質實西寧秦為西羗所居湟中地漢置破羗縣隋改湟水縣為鄯州治唐吐番據之曰青唐城宋復置鄯州又改西寧州明為衛今升府岷州西魏置明為衛今復為州屬鞏昌府夏四月帝發京師命皇太子監國大學士楊榮金幼孜從楊士竒等留京師輔太子大軍至開平獲諜者知阿嚕台遁帝意亦厭兵乃下詔暴阿嚕台罪而宥其來降者諭諸將曰武有七徳禁暴除亂是其首也又謂止戈為武今罪人阿嚕台耳脅從之衆有歸降者宜悉意撫綏非持兵器向我師縱勿殺時比年用兵白骨被野帝命瘞諸道旁親製文祭之至應昌宴羣臣命中官歌太祖御製詞五章曰此先帝所戒後嗣也雖軍旅不敢忘帝亦自製詞五章述奉天法祖勤政恤民意亦命中官歌之六月至達蘭納穆爾河詔班師前鋒至達蘭納穆爾河不見敵命張輔等窮搜山谷三百餘里無一馬跡帝進駐河上命陳懋等前覘懋至白邙山無所遇以糧盡引還質實達蘭納穆爾河方輿紀要在和林東北或謂即庫庫諾爾元太祖初㑹集部落之地白邙山方輿紀要在漠外濶達蘭納穆爾舊作答蘭納木兒庫庫諾爾舊作濶納浯兒今並改南京地震秋七月帝有疾至榆木川崩帝還至清水源命楊榮金幼孜刻崖石為銘遣呂震以旋師諭皇太子詔告天下帝已不豫次倉崖戍疾甚顧左右歎曰夏原吉愛我至榆木川疾大漸遺詔傳位皇太子喪禮一如髙皇帝遺制遂崩年六十有五楊榮金幼孜等議以六師在外祕不發喪鎔鍚為椑以歛載以龍轝所至朝夕上膳如常儀榮及御馬少監海夀馳赴太子太子遣太孫奉迎鵰鶚谷太孫至于軍中始發喪将及郊迎入仁智殿加殮納梓宮質實榆木川在故開平城西北清水源在漠北永樂八年春帝北征過此甘泉溢出名之曰神應鵰鶚谷在宣府城東北二百七十里元雲州鵰窠站洪武四年于此置浩嶺驛宣徳六年改置堡今屬宣化府龍門縣東境仁智殿在武英殿後發明成祖雄才逺畧世稱英主然以藩封簒立慙徳實多革除之際慘行屠戮季年屢北征雖威震沙漠而躬涖戎行亦云疲矣榆木川之變當時傳聞異辭如明輯畧明書等編謂成祖夜感異夢召問近臣且軍多訛言衆心惶惑及秘不發喪召匠鎔鍚製椑以歛且殺匠滅口軍人莫測于是傅㑹者遂有不得善終之説稗官野史固未可據為傳信或由成祖前此之多行不義殘刻濫誅怨讟之于人所致耶八月太子髙熾即位大赦天下以明年為洪熙元年釋夏原吉黄淮等于獄復其官時原吉及吳中楊勉黄淮楊溥金問皆久繫獄中遺詔至京師太子即釋之咨原吉以時事原吉對以振饑省賦役罷西洋取寳及雲南交阯採辦悉從之既即位復原吉等官復置三公三孤官洪武初置三公官以李善長等為之三孤無兼領者建文永樂間罷公孤官至是復設以公侯伯尚書兼之加楊榮金幼孜楊士竒黄淮等官領内閣事如故初解縉等入文淵閣皆編檢講讀之官不得專制諸司諸司奏事亦不得相關白帝即位以榮士竒等皆東宫舊臣乃進榮為太常卿幼孜為户部右侍郎兼文淵閣大學如故士竒為禮部左侍郎兼華蓋殿大學士黄淮為通政使兼武英殿大學士俱掌内制已復置謹身殿大學士改榮為之未㡬榮士竒皆遷尚書閣職漸崇汰冗官帝以古者官不必備今設官太冗亷汙無别則亷者之心或怠賢否並處則小人之勢常勝其令中外亷察不稱者罷之九月召黄福于交阯以兵部尚書陳洽代之福在交阯十九年編氓籍定賦税興學校置官師數召父老宣諭徳意戒屬吏無苛擾一切鎮之以静上下帖然帝以福久勞于外召還命兼詹事輔太子以兵部尚書陳洽代掌布按二司事福還之日交人扶携走送號泣不忍别福既還交阯賊遂劇訖不能靖質實陳洽字叔逺武進人河溢開封免今年田租命右都御史王彰徃撫恤之質實王彰字文明鄭州人詔自今官用物悉于所産地市之詔工部曰古者任土作貢不强所無比年如丹漆石青之類所司不究物産之地槩徴郡縣科派病民自今官所用物必于所産地計直市之違者罪不宥羣臣請公除不許易月制滿禮部尚書吕震請即吉侍郎楊士竒不可尚書蹇義兼取二説進帝曰梓宫在殯易服豈臣子忍言士竒執是也帝乃素冠麻衣絰而視朝時羣臣皆已吉服惟士竒及英國公張輔服如常帝歎曰輔武臣也而知禮過六卿由是益見親重増諸王嵗祿先是召漢王高煦赴京比至與趙王高燧並厚賜之復賜諸王金幣有差帝曰諸叔在者無㡬諸兄弟唯趙王居京師他皆守藩于外朕旦夕念焉户部其各益祿米差次之始置南京守備以襄城伯李隆為之兼領中軍都督府事為南京要職質實此置南京守備之始李隆字彦平和州人濬之子鎮守交阯中官山夀請授黎利清化知府從之初利未叛時與夀相善及利逃老撾益深匿李彬奏言利竄老撾老撾請官軍毋入當盡發所部兵捕利今乆不遣其情叵測朝廷疑老撾匿賊令彬送其使臣至京詰問老撾乃逐利已而率衆求撫仍匿俄樂不出帝踐阼後尋㓂茶籠敗鎮守叅将方政兵殺指揮伍雲㑹夀入朝力言利與已相信今徃諭之必來歸帝曰此賊狡詐若為所紿則其勢益熾不昜制也夀叩頭言如臣徃諭而利不來臣當萬死帝頷之遣夀齋敕授利清化知府慰諭甚至敕甫降利己犯清化殺指揮陳忠利得敕無降意佯言俟秋凉赴官而㓂掠不已質實茶籠交阯舊州屬乂安府方政全椒人伍雲定逺人陳忠臨淮人散畿内民所養官馬于諸衛所諭兵部曰今太僕馬増數倍而畿民一夫或畜三匹四匹畢力于此耕桑盡廢其散馬給諸衛所及臨邊戍卒養習之質實明㑹典在京在外衛所俱有孳牧馬匹以給官軍騎操之用在京及南北直𨽻衛所屬两京太僕寺在外屬各該行太僕寺苑馬寺及都司皆委官提督毎衛委指揮一員所千百户一員專管孳牧其搭配科駒起解比較等項悉照民間事例賜少傅兼吏部尚書蹇義等銀章義進少傅楊士竒進少保楊榮進太子少傅金幼孜進太子少保賜銀章各一曰繩愆糾繆諭以協心贊務或政事有闕或羣臣言而未從者用此章宻疏以聞既而進户部尚書夏原吉少保賜原吉銀章諭勉如義士竒等冬十月復魏國公徐欽爵初輝祖以忤成祖奪爵及卒復封其子欽十九年來朝不辭徑去成祖怒罷為民至是復故爵詔有司奏雨澤者即以聞通政司請彚四方雨澤章奏送給事中収貯帝曰祖宗令天下奏雨澤欲前知水旱以施恤民之政積之通政司已失之矣今又令収貯是欲上之人終不知也自今奏至即以聞立皇后張氏后始為帝妃操婦道至謹稚得成祖及仁孝皇后懽帝數為漢趙二王所間體肥碩不能騎射成祖恚至减太子宫膳瀕昜者屢矣卒以后故得不廢及帝立册為皇后質實皇后張氏永城人兵馬副指揮張騏之女騏追封彭城伯后于洪武十六年封燕世子妃永樂二年封皇太子妃立子瞻基為皇太子封子八人為王封子瞻埈為鄭王瞻墉越王瞻墡襄王瞻堈荆王瞻墺淮王瞻塏滕王瞻垍梁王瞻埏衛王質實鄭靖王瞻埈帝第二子就藩鳳翔後遷懷慶越靖王瞻墉帝第三子封衢州未之藩卒襄獻王瞻墡帝第五子就藩長沙後遷襄陽荆憲王瞻堈帝第六子就藩建昌後遷靳州淮靖王瞻墺帝第七子就藩韶州後遷饒州滕懐王瞻塏帝第八子封雲南未之藩卒梁荘王瞻垍帝第九子就藩安陸衛恭王瞻埏帝第十子封懷慶未之藩卒其第四子為蘄獻王瞻垠初封静樂王永樂十九年卒帝即位追封無後詔舉賢才令在京七品在外五品以上官及知縣于五品以下官及軍民中訪薦徳行惇篤才能出衆文學優長者量才擢用舉後犯贓則連坐舉者命大學士㑹法司錄囚帝性仁恕諭楊士竒楊榮金幼孜曰比年法司之濫朕所深知所擬大逆不道徃徃出於文致自今審决重囚卿三人必徃同讞有寃抑者雖細故必以聞十一月宥建文諸臣家屬詔禮部建文諸臣家屬在教坊司錦衣衛浣衣局及習匠功臣家為奴者悉宥為民還其田土言事謫戍者亦如之發明成祖革除之際為忠義所不容于是肆其毒虐倒行而逆施建文諸臣備遭惨酷而并取其家屬悉發教坊錦衣浣衣及與功臣為奴又并及其外戚全家戍邊怨毒之流古所未有仁宗心識其寃即位之初首宥諸臣家屬旋復放還外戚之戍邊者可謂寛大之政易稱幹父之蠱仁宗有焉阿嚕台來貢馬阿嚕台遣使貢馬賜賚有差降敕宥其前過許令通好詔羣臣極言得失帝曰朕承大統君臨億兆亦惟頼文武賢臣共圖康濟矧屬亮隂之際尤切倚毗之心嗣位初首詔直言而渉月累旬言者無㡬夫京師首善地民困於下而不得聞弊膠于習而不知革卿等無慮後譴相與至誠必有嘉謨嘉猷輔朕不逮赦烏梁海罪帝遣使敕諭烏梁海官民曰朕承大統凡四方萬國罪無大小悉已赦宥若烏梁海官民敬順天道許令改過自新仍前朝貢聼徃來生理諭侍臣曰彼有過而不宥之既無所容将來必為邊患吾不吝屈己以安百姓也遣御史巡察邊衛遣御史巡覈縁邊諸衛稽部曲申號令遣御史分巡天下考察官吏帝曰國以民為本民安則國安比年牧守官不體朝廷恤民之意侵削擾害民不聊生今分行考察然才器不同當明白具實以聞無惑于小人無屈于勢要無私于親故詢之于衆斷之以公可也又御史朕之耳目勉副朕心必先自治乃可治八若棄亷耻違禮法朕亦不貸徃勉之禁所司擅役屯田軍士帝曰古者寓兵于農而不奪其時民無轉輸之勞而兵食足後世莫善于漢之屯田先帝立屯種法用心甚至所司數以征徭擾之既失其時遂無其效其令天下衛所凡屯田軍士不許擅差違者處重法命都督方政同榮昌伯陳智鎮交阯命政與智協同鎮守智暗懦素無將畧憚戰因借撫以愚中朝且與政忤遂頓兵不進而山夀一意主撫專進止以故賊益猖獗官軍不能制十二月宥建文諸臣外戚全家戍邊者留一人餘悉放還建文中齊黄諸臣外戚全家謫邊者令家存一丁于戌所餘放為民書天下三司官姓名于奉天門西序帝曰庶官賢否軍民休戚所係唐太宗書刺史名于屏朝夕省覽聞有善政則各疏于下故當時皆思奮勵致治效斗米三錢外户不閉皇考亦嘗書中外官姓名于武英殿南廊今五府六部朝夕接見得詢察賢否若三司官朕既不識又不悉姓名雖或聞其賢否邪正既久不能不忘有善上忘誰肯自勵有不善上忘亦誰肯自戒如此何以望治具書三司官姓名揭諸西序朕得觀之以考察行事而黜陟焉𦵏長陵謚曰體天宏道髙明廣運聖武神功純仁至孝文皇帝廟號太宗𦵏長陵嘉靖中更廟號曰成祖質實長陵在昌平州天夀山中峯之下明史贊曰成祖少長習兵據幽燕形勝之地乘建文孱弱長驅内向即位以後躬行節儉水旱朝告夕賑無有壅蔽知人善任表裏洞達雄武之畧同符髙祖六師屢出漠北塵清季年威徳遐被四方賓服受命入貢者殆三十國幅􅊷之廣逺邁漢唐成功駿烈卓乎盛矣然革除之際倒行逆施慙徳又曷可掩哉乙巳仁宗昭皇帝洪熙元年春正月壬寅朔御奉天門受朝不舉樂帝御奉天門朝羣臣命禮部鴻臚寺不作樂羣臣止行五拜三叩禮先是禮部尚書呂震請受賀作樂如大朝儀帝不從震固請乃止受朝不舉樂勅内外臣修舉職業諭曰朕祗紹洪圖仰惟祖宗創業守成之難夙夜惓惓體天為治嗣位初蠲逋負赦有罪不急之務一切停罷選任賢良共圖維新之治期天下安於太平今天下庶事未盡理生民未盡安斯朕之責亦爾文武羣臣之責尚思勉之建𢎞文閣建𢎞文閣于思善門詔選諸臣有學行者入直楊士竒薦侍講王進儒士陳繼蹇義薦學錄楊敬訓導何澄詔以繼為博士敬為編修澄為給事中日直閣中命學士揚溥掌閣事進佐之帝親授溥閣印曰朕用卿左右非止助益學問亦欲廣知民事為治道輔有所建白封識以進質實𢎞文閣殿閣詞林記仁宗即位建𢎞文舘扵思善門外駕常臨幸講論經史但作舘不稱閣又考明典故紀聞仁宗作𢎞文閣於思善門外作印章命翰林學士楊溥掌閣事据此應是閣思善門蕪史思善門外橋西為武英殿陳繼字嗣初吳人幼孤母吳氏躬織以資誦讀比長貫穿經學人呼為陳五經奉母至孝府州交薦以母老不就母卒哀毀過人仁宗幸𢎞文閣問今山林亦有名士乎楊士竒以繼對召為國子博士尋改翰林五經博士宣宗初遷檢討引疾歸卒二月命太監鄭和守備南京命鄭和領下番官軍守南京於内則與内官王景宏等協同管事遇外有事則與襄城伯李隆等商議施行帝耕耤田帝躬祭先農耕耤田南京地震凡十有六震四月又三震五月復震三月以權謹為文華殿大學士謹奉母至孝初為光祿署丞以省侍歸母年九十終廬墓三年致泉湧兔馴之異有司以聞帝命馳驛赴闕出其事状令侍臣廷誦之即拜文華殿大學士謹辭帝曰朕擢卿以風天下為子者質實權謹字仲常徐州人永樂四年薦授樂安知縣遷光祿署丞至是拜大學士尋扈從皇太子監國南京宣宗嗣位以疾乞歸改通政司右參議賜白金文綺致仕詔求直言初大理寺少卿弋謙言事過激帝不懌尚書吕震吴中等劾謙誣㒺帝召士竒等言之士竒對曰謙不諳大體然心感超擢恩欲圖報耳主聖則臣直惟陛下優容之帝乃不罪謙然毎見謙詞色甚厲士竒從容言陛下詔求直言謙言不當觸怒外廷悚愓以言為戒今四方朝覲者集闕下見謙如此將謂陛下不能容直言帝曰此固朕不能容亦吕震軰迎合以益朕過今當置之免謙朝參令專視司事未㡬言者益少復召士竒就榻前書敕引過曰朕即位以來臣民上章以數百計未嘗不欣然聼納間者弋謙所言多非實事羣臣交章奏其賣直請置諸法朕但免謙朝參自是言者益少去冬無雪春亦少雨隂陽愆伏必有其咎豈無可言而為臣者懐自全計退而黙黙何以為忠朕于謙一時不能含容未嘗不自愧咎爾羣臣勿以前事戒扵國家利弊政令未當者直言勿諱謙朝參如故尋擢為右副都御史質實弋謙代州人發明弋謙以言事過激呂震吳中等輙劾其誣㒺迨士竒進言仁宗已知震等之迎合且為下敕引過而扵震中軰不聞冇所踈斥史稱呂震佞諛傾險吳中為時論所鄙皆一時宵小之流仁宗為明辟既察其奸而優容如故豈所謂英㫁不足者歟振隆平饑隆平縣饑時栢鄉縣多貯官麥有司請以貸之帝曰饑即振之何貸為質實隆平漢廣阿唐招慶宋改隆平明因之今縣屬趙州柏鄉漢鄗縣隋柏鄉宋省為鎮後復置縣明因之今縣屬之趙州詔法司慎刑詔曰刑者所以禁暴止邪導民于善非務誅殺也吏或深文傅㑹以致寃濫朕深憫之自今其悉依律擬罪若朕過于嫉惡法外用刑法司奏執五奏不允同三公大臣執奏必允乃已諸司不得鞭囚背及加人宫刑有自宮者以不孝論人之為非父子不相謀是以舜罰不嗣文罪不孥自今非謀反勿連坐親屬古之盛時采聴民言用資戒儆今奸人徃徃摭拾誣為誹謗法吏刻深鍛鍊成獄刑之不中民則無措其除誹謗禁有告者一切勿治以陽武侯薛祿為鎮朔大將軍率師巡開平大同敕命陽武侯薛祿佩鎮朔大將軍印充總兵官率官軍自開平至大同縁邊巡哨遇㓂相機勦捕質實薛祿膠人行六軍中呼曰薛六後貴更名祿命安平伯李安與榮昌伯陳智同鎮交阯帝改元後鑄将軍印分頒邊將智得征夷副将軍印至是命安平伯李安徃佐之質實李安懐逺人莒國公逺之子詔北京諸司復稱行在將遷都南京詔北京諸司悉稱行在復北京行部及行後軍都督府發明成祖建都北京為久逺計仁宗欲復都南京乃復建北京行部及行後軍都督府其時南北两京官吏互為徴調且諭内監王景宏等修治南京宫殿意甚决矣仁宗即位初鋭意求治多善政獨此欲遷都一事深違成祖定制時南北困于供億咸以都南京為便不知成祖排羣議而都北京實據天下全勢而籌立國大計豈可輕議遷移者乃士竒軰無一言諫及何哉夏四月免山東淮徐今年租税之半帝聞山東及淮徐民乏食有司徴夏税方急乃御西角門召士竒草詔免今年夏税及秋糧之半士竒言上恩至矣但湏户工二部預聞帝曰有司慮國用不足必持不决救民之困當如救災拯溺不可遲也趨命中官具楮筆令士竒就門樓書詔帝覽畢即用璽付外行之顧士竒曰今可語部臣矣命皇太子居守南京命皇太子謁孝陵徃居守振河南及大名饑河南監察御史行在户部俱奏請發所在倉粟振濟從之五月左遷李時勉羅汝敬為監察御史尋下獄侍讀李時勉抗疏言事帝怒召至便殿對不屈命武士撲以金山脇折者三曵出㡬死明日改交阯道御史命日慮一囚言一事章三上乃下錦衣衛獄時侍講羅汝敬亦言事改御史俱下獄質實羅汝敬名簡以行字吉水人帝不豫遣使召皇太子召蹇義楊士竒黄淮楊榮至思善門命士竒書敕遣中官海夀馳召皇太子于南京帝崩年四十有八遺詔皇太子即位六月太子瞻基至自南京即位太子方謁孝陵海夀至太子即日就道時南京頗傳凶聞又傳漢王髙煦謀伏兵于道邀太子羣臣請整兵衛或請從間道行太子不可曰君父在上誰敢干之驛道馳還至良鄉内監楊瑛尚書夏原吉呂震捧遺詔至宣訖太子哭盡哀入宫發喪越十日即位大赦以明年為宣徳元年質實良鄉燕中都地漢良鄉縣明屬順天府今因之尊皇后為皇太后立皇后胡氏后于永樂十五年選為皇太孫妃已為皇太子妃及是立為皇后質實后名善祥濟寧人光祿寺卿胡榮之女秋閏七月以翰林學士楊溥入内閣罷𢎞文閣召溥入内閣與楊士竒等共典㡬務王進等以原職𨽻翰林院帝謂溥曰古君臣更相戒飭用致太平卿将何以輔朕對曰臣受國厚恩安敢㤀報帝曰直箴朕過報朕多矣溥曰直言非難能受直言為難陛下既以命臣臣敢不盡忠以告八月始置廵撫官以大理寺卿胡概參政葉春廵撫南畿浙江設廵撫始此自是遇災荒盗賊輙遣大臣徃廵撫事已召還成化以後遂成定員而三司之任漸輕質實胡概字元節豐城人本姓熊隨母適胡氏因胡姓葉春海鹽人九月塟獻陵謚曰敬天體道純誠至徳𢎞文欽武章聖達孝昭皇帝廟號仁宗質實獻陵在昌平州天夀山西峯下明史贊曰當燕兵起仁宗以世子居守全城濟師其後成祖乘輿嵗出北征東宫監國朝無廢事然中遘媒孽瀕于危疑者屢矣而終以誠敬獲全善乎其告人曰吾知盡子職而已不知有讒人也是可為萬世子臣之法矣在位一載用人行政善不勝書使天假之年涵濡休養徳化之盛豈不與文景比隆哉更定科舉法初制鄉試取士雖有定額自洪武十七年詔從實充貢毋以額限嗣後遂多寡不一仁宗時楊士竒請定其額並言禮闌士試當分地而取仁宗以為然乃議鄉試取士南京國子監及南𨽻共八十人北京國子監及北直𨽻共五十人江西如之其次浙江福建又次湖廣廣東又次河南四川又次陜西山西山東皆自五而殺廣西二十人雲南交阯各十人貴州有應舉者就試湖廣㑹試取士不過百人南人十六北人十四議既定未及行帝即位遂詔行之質實明初鄉試定額按明史選舉志洪武三年詔京師行省各舉鄉試直𨽻貢額百人河南山東山西陜西北平福建江西浙江湖廣皆四十人廣東廣西皆二十五人御定資治通鑑綱目三編卷七
