body:
  text: 起壬午明神宗萬厯十年盡辛卯明神宗萬厯十九年凡十年壬午十年春正月免天下逋賦張居正言百姓財力有限即年歲豐收一年所入僅足以供當年之數不幸荒歉則見年尚不能辦豈復有餘力完累嵗之積逋乎有司規避罪責往往將見年所徵那作帶徵名為完舊欠實則減新收也今嵗之所減即為明年之拖欠見在之所欠又是將來之帶徵誅求無已民何以堪況頭緒繁多年分混雜小民竭脂膏胥吏飽谿壑甚者不肖有司因而漁獵與其脧民以實奸貪之槖孰若盡減以施曠蕩之恩今戸部自隆慶元年至萬厯七年各省未完帶徵錢糧一百餘萬而江南蘇松兩府至七十餘萬葢以彼處税糧原重故逋負獨多昨應天巡按孫光祐具奏請蠲户部以干係國計未敢擅議竊謂徳恵當出朝廷若今地方官請而得之則恩歸於下怨歸於上矣乞諭戸部覈萬厯七年以前積負悉行蠲免帝從之凡免一百餘萬有奇而是時帑藏充盈國最完富太倉之粟可以支十年三月杭州兵亂以兵部侍郎張佳允巡撫浙江討定之初杭州東西二大營兵每名月給餉銀九錢巡撫都御史吴善言奉詔議減三之一各兵稍有怨言至是營兵馬文英劉廷用等搆其黨擁訴於巡按御史張文熙且言春汛届期例應防海若搭銅錢不便攜帶文熙好慰遣之善言遽出示曰餉減已定不願者聴其歸農次日兵遂大噪三司官往諭因圍繞不放行文熙傳諭始釋而擁入撫廨縳善言以出痛敺之文熙率三司官吴憲及巡鹽御史孫旬等多方戒諭始解散歸善言文熙因劾善言撫馭乖方自貽慼辱至于營卒應嚴懲首惡以定人心時朝議以佳允才令代善言為巡撫佳允甫入境而杭民以行保甲故亦亂佳允問告者曰亂兵與亂民合乎曰未也佳允喜曰速驅之尚可離而二也既至民剽益甚佳允從數卒佯問民所苦下令除之衆益張夜掠富室火光獨天佳允召逰擊徐景星諭二營兵令討亂民自贖擒百五十人斬其三之一乃佯召文英廷用予以冠帶而密囑景星捕七人并文英廷用斬之二亂悉定帝優詔褒美質實張佳允字肖甫銅梁人初知滑縣劇盜髙章者詐為緹騎直入官署刼佳允索帑金佳允色不變偽書劵貸金悉署游徼名召入立擒賊由此知名由户部主事累遷宣大巡撫時青巴圖已服其弟蒙固岱猶桀驁所部巴哩掠塞外總兵官麻錦擒之佳允命錦縳巴哩將斬而身馳赦之巴哩叩頭誓不敢犯邊因與總督鄭洛以計服蒙固岱入為兵部右侍郎張居正以為才故今代善言善言成安人張文熈臨桂人孫旬萊陽人發明善言減餉激變辦理固屬未善然兵丁敢于鼓噪入廨縳敺巡撫則叛逆當誅此而不立示重懲國法安在張文熙身為巡按御史僅以多方勸諭解散營卒曲示調停並未聞擒獲一人置之重典轉先糾劾巡撫神宗亦遂以此罷黜善言是適足以長亂兵之智矣杭民之亂未必非效尤而起設其時亂兵與亂民相合其患將不可收拾佳允權宜定變雖首惡伏誅而標兵習見巡撫之可以撼揺卒伍漸以縦驕民情因之不靖何怪乎亂萌之日長也博斯呼寇義州李成梁擊斬之泰寧部博斯呼與弟綽哈子布延圖入犯義州成梁設伏鎮夷堡參將李平胡射中博斯呼脅墜馬斬之寇大奔追馘百餘級兆哈等慟哭去自是敵數入成梁等數敗之輒斬其魁又時襲擊之于塞外敵少戢質實鎮夷堡在錦州府義州東北其東南有盤嶺可以按伏夏四月京師旱疫是月戊子朔詔諭禮部今民及時農桑母事游惰及庚子以旱祈雨敕羣臣修省五日復以疫癘盛行死者甚衆勅太醫院官廣施藥餌出太倉銀振䘏寧夏土軍作亂旋討平之寧夏靈州土軍馬景等作亂殺參將許汝繼屠其家巡撫都御史晉應槐討誅之時禮科給事中石應岳上言浙江既標兵敺辱撫臣靈州復士卒屠戮參將四月末旬彗星出于五車雨澤愆期風霾蔽日人民疫死農務無依天異人變疊見可謂警戒矣惟陛下抑左右之専恣斥侍從之諛佞損燕私過度之樂罷營繕不急之工疏入詔臣工修省質實石應岳龍巖人彗星見丙辰彗星見西北形如匹練尾指五車歴二十餘日始滅夏五月免先儒後裔丁糧從福建巡撫勞堪請也免先師孔子及宋儒朱熹李侗羅從彦蔡沈胡安國游酢真徳秀劉子翬故大學士楊榮後裔各丁糧有差賑畿内饑户科給事中顧問言順天等八府自萬歴八年雨暘愆期收成寡薄至九年十年恒暘禾稼枯槁是以民有菜色元氣重傷生者逃移死者枕藉真定大名一帶尤甚宜特加振䘏并蠲免田租從之質實顧問湖廣徳化人六月丁亥朔日有食之賑太原平陽潞安饑三郡大饑發庫貯及商税銀并倉榖相兼賑濟加張居正太師以前禮部尚書潘晟兼武英殿大學士吏部侍郎余有丁兼文淵閣大學士並預機務晟尋罷先是三月居正有疾求私宅票擬許之帝頻頒敷諭問疾出金帛為醫藥資至是四閲月不愈百官並齋醮為之祈禱南都秦晉楚豫諸大吏無不建醮帝命張四維等理閣中細務大事即家令居正平章居正始自力後憊甚不能徧閲然尚不令四維等參之及病革乞歸上復優詔慰留會遼東奏捷加居正太師初居正以十二載滿加太傅明世文臣無真拜三公者有之自居正始已而居正自度不起乃薦晟及有丁自代晟素貪鄙不厭清議馮保素從受書彊居正薦之時居正已昏甚不能自主矣命下甫五日晟為言者交章劾罷質實潘晟新昌人余有丁字丙仲鄞人張居正卒帝愴悼輟朝諭祭九壇視國公兼師傅者贈上柱國命四品京卿錦衣堂上官司禮太監䕶喪歸葬諡文忠典居正性深沈機警多智數為史官時嘗潛求國家故時務之切要者剖晰之遇人多所諮詢及攬大政登首輔務尊主權譯吏職信賞罰一號令帝亦悉心聴納用李成梁戚繼光委以邊事南蠻累世負固者次第遣將削平之力籌富國清郵傳核地畝故神宗初政起衰振隳綱紀修明海内殷阜居正之力也然其褊多忌剛愎自用初入政府即以私憾廢遼王好諛成風六朝之長咸唯唯聴命至章疏不敢斥名第稱元輔士大夫始譽以伊周漸進以五臣繼竟擬之舜禹居正亦恬然居之居正卒餘威尚在言官奏事尚稱先太師方奪情時威權震主帝雖虚己以聴而内顧不堪身死未㡬遂遭削奪子孫並致禍敗初帝在講筵讀論語色勃如也誤讀為背居正遽厲聲曰當讀作勃帝悚然驚起同列皆失色由此帝益心憚居正時比之霍氏驂乗云秋七月賑陜西饑陜西平涼慶陽延安三府屬被災最重臨洮鞏昌二府被災次重命以全陜積貯倉糧委官分賑八月皇子常洛生恭妃王氏出也帝御殿受賀頒詔大赦妃初為慈寧宫宫人年長矣帝過慈寧私幸之有身故事宫中承寵必有賞賚文書房内閹即記年月及所賜以為驗時帝諱之故左右無一言者一日侍慈聖宴語及之帝不應慈聖命取内起居注示帝且好語曰吾老矣猶未有孫果男者宗社福也母以子貴寧分差等耶是年四月封恭妃及是遂生皇長子即光宗也冬十月賑蘇松諸府災蘇州松江諸府大水衝壊民居以千萬計漂流田禾十餘萬頃死者二萬人故有是賑并蠲免錢糧有差十二月太監馮保以罪謫為奉御安置南京初保内倚太后外倚張居正専擅威福帝有所賞罰非出保口無敢行者帝積不能堪然迫于太后居正不能去也及太后歸政居正又卒保失所倚然猶肆横如故潘晟既罷保方病起詬曰我小恙遽無我邪皇長子生保欲封伯爵張四維以無故事難之擬廕弟姪一人都督僉事保怒曰爾由誰得今日爾負我御史郭惟賢請召用吴中行等保責其黨䕶謫之吏部尚書王國光罷保輒用其鄉人梁夢龍代之其私人錦衣指揮徐爵内官張大受等竊權如故然是時帝已積怒保東宫舊閹張鯨素害保寵謀去之其同事張誠向為保所惡斥于外至是復入兩人乃伺間陳保過惡並發其與張居正交結狀請今保聞住帝猶畏之曰若大伴上殿來朕奈何鯨曰既有㫖安敢復入㑹御史江東之首劾保黨徐爵帝下爵獄論死御史李植遂列保十二大罪帝震怒遂謫保奉御南京安置籍其家金銀百餘萬珠寳瑰異稱是保之發南京也太后問故帝曰老奴為張居正所惑無他過行且召還時潞王將婚所需珠寶未備太后閒以為言帝曰年來無恥臣僚盡貨以獻張馮二家其價驟貴也江東之并糾吏部尚書梁夢龍賂徐爵得官工部尚書曽省吾吏部侍郎王篆皆被論得罪去于是彈擊居正者紛起矣質實郭維賢字哲卿晉江人王國光字汝觀陽城人梁夢龍字乾吉真定人季植字汝培江都人曽起吾彭澤人王篆夷陵州人復建言諸臣職御史孫繼先言人君欲建久安長治之功必重直言敢諌之士前日編修吳中行檢討趙用賢員外艾穆主事沈思孝進士鄒元標各以張居正奪情一事建言得罪至廷杖遣戍陛下豈不知諸臣無罪但以為不如是不足以安居正之心頃因御史李植言斥馮保則諸臣賜環不可稽遲矣至于忤觸居正如余懋學趙應元傅應禎朱鴻模孟一脈王用汲等亦當一體復用以開言路從之因併復郭維賢職質實孫繼先字廕甫孟縣人趙應元三原人孟一脈東阿人王用汲字明受晉江人以嚴清為吏部尚書清素著清望張居正當國清任刑部尚書不附麗居正及籍馮保家得廷臣餽遺録獨無清名帝深重之㑹梁夢龍罷即以清代清日計故實辨官材自丞佐以下皆親署無一倖進者中外師其廉儉書問幾絶甫半歲得疾歸質實嚴清字公直雲南後衛人改薊鎮總兵官戚繼光于廣東繼光在薊鎮十六年當國大臣徐階髙拱張居正先後倚任之居正尤事與商𣙜動無掣肘故繼光益發舒及是居正殁甫半嵗給事中張鼎思言繼光不宜於北閣臣擬㫖遽調之廣東繼光悒悒不得志赴粤踰年即謝病歸居三年卒繼光更歴南北並著聲在南方戰功持盛北則専主守邊防修舉繼之者踵其成法數十年得無事所著紀效新書練兵實紀談兵家遵用焉質實張鼎思長洲人明史藝文志戚繼光紀效新書十四卷練兵實紀九卷癸未十一年春正月飭嚴邊備京師風霾靈臺奏主邊兵因飭兵部令各邊將慎加防備閏二月帝如天壽山謁陵免所過田租是秋九月復如天夀山謁陵三月追奪張居正官階馮保既得罪新進者益務攻居正詔奪上柱國太師耳奪謚斥其子錦衣衛指揮張簡修為民居正諸所引用者斥削殆盡吳中行趙用賢等遷官有差夏四月張四維罷初四維曲事張居正然心不善其所為居正卒四維始當國政知中外積苦居正欲大收人心因上疏言事請蕩滌煩苛宏敷恵澤帝納其言朝政為之稍變四維復引居正所沈抑者稍稍登用時望頗屬至是以父喪歸先是居正餘黨欲逐四維擁中時行為首輔四維愠語時行客曰夫首相者若天行有春必有夏何相迫為時行得疾在告及起不敢謝過黙黙而已四維乃與門生在言路者謀攻時行疏具將上會四維父訃至乃已四維歸後服將闋而卒以許國為禮部尚書兼東閣大學士預機務張四維既去申時行為首輔國素與時行善由是政府無間質實許國字維禎歙縣人致仕武英殿大學士徐階卒階里居後為髙拱所厄及拱罷始得安帝之元年階年已八十詔遣行又存問賜璽書金幣至是卒贈太師諡文貞階以恭勤結主知立朝有相度保全善類嘉隆之政多所匡救間有委蛇亦不失大節方嚴嵩初罷階以三語榜于直廬曰以威福還主上以政務還諸司以用舍刑賞還公論由是票擬公之同列言路亦益發舒當時翕然稱階為名相五月我太祖高皇帝起兵征尼堪外蘭克圗倫城初長白山之東有布庫哩山山下有池曰布勒瑚哩相傳有天女三長曰恩古倫次曰正古倫季曰佛庫倫浴于池有神鵲銜朱果置季女衣取而吞之遂有身尋産一男生而能言體貌竒異及長母告以故命以愛新覺羅為姓名曰布庫哩雍順以小舫乘之令順流而下至河步登岸端生其地有三姓方搆兵或汲于河見而異之歸語衆人往觀詢知所由來皆驚曰此天生聖人也遂迎舁至家三姓者議曰我等盍息爭推此人為主以女百里妻之奉為貝勒其亂乃定于是布庫哩雍順居長白山東鄂謨輝之野鄂多朝理城國號曰滿洲實為我察者以國人弗靖遁于荒開基之始數傳後有名樊野追者將及之有神鵲止其首追者疑為枯木遂得免後傳至肇祖原皇帝興祖直皇帝景祖翼皇帝相繼嗣興威服諸部顯祖宣皇帝景祖居赫圗阿拉地兄弟六人築城分居號寧古塔貝勒時有望氣者言滿洲將有聖人出戡定衆亂統一諸國顯祖嫡繼而塔喇氏以明嘉靖三十八年己未歲誕生妃喜太祖高皇帝天表非常勇畧盖世號為聰睿貝勒時諸部爭奪不已太祖恩威並用漸次削平會蘇克素䕶河部圖倫城有尼堪外蘭者隂搆明總兵李成梁引兵攻古哷城主阿泰景祖長章京阿泰妻乃之女子禮敦巴圖魯景祖聞警恐女孫被陷偕城中守禦甚堅成梁不能克尼堪顯祖往救先後入古哷城外蘭詭往招撫城中人信其言殺阿泰以降成梁盡屠之遂并害景祖顯祖太祖聞之赫然震怒往詰責明邊吏明人尋歸二祖喪至是太祖年二十有五思復祖父讐乃顯祖遺甲十三副起兵征尼堪外蘭于圖倫城尼堪外蘭遁于甲版遂克其城而歸既而復進征甲版城尼堪外太祖尋蘭乃逃于鄂勒歡地築城以居入邊復進克鄂勒歡城尼堪外蘭遁太祖遣齋薩率四十人索之邊吏執以畀齋薩遂斬之而歸自此歲輸銀幣通和好焉質實長白山在吉林烏拉城東南山高二百餘里横亘千餘里山之上有潭曰闥門周八十里源深流廣鴨緑混同愛滹三江之水出焉東自寧古塔西至奉天府諸山皆發脈于此尼堪外蘭築鄂勒歡城在是年八月執斬尼堪外蘭在丙戌年發明臣等伏覩史牒所載自古帝王莫不以開創艱難勤勞締搆而承皇穹付畀奄受萬方仁義兼施徳威並濟得天下之正從未有盛於我天造朝者也洪惟有邦龍興東夏靈源肇誕朱果開祥於是長白營居曼珠錫號神竒剏蹟實與生民元鳥同昭瑞應之符嗣世徳重光遵時篤慶于我皇天眷顧始集大命太祖高皇帝聰明智勇遐邇景從值明政不綱釁生疆吏因釋憾於阿泰章京狡焉潛逞太祖高皇帝赫然震怒以一旅徂征罪人斯得而明人不思輸平尋約尚復包藏禍心太祖高皇帝爰仗義執詞底明之罪以七大恨告於上帝天助有徳師克在和明人四路出兵掃如隕籜遂戡遼定瀋光宅大東乃聖度同天猶不欲究我兵威貽書講好以冀其悔悟迨我太宗文皇帝纘承鴻緒以明人㒺有悛心親御六軍觀兵畿甸前戈所指堅壘咸摧明人僅保都城勢同纍卵然且垂成弗取抑鋭班師是則我之有造於明者甚大洎明社既屋禍起潢池復因吴三桂迎請世祖大兵入闗掃清京輦剪戮鯨鯢為之報讐雪恥禮於章皇帝乃定鼎燕京追崇諡號守䕶陵園其加聖朝創勝國者至優極厚正大允為夐絶前古而圖倫一業凡舉動之光明興王之役義問昭宣實開億萬年筆恭載自後祚謹依通鑑輯覽之例特隆猷與明紀相涉者無不次第備書用以闡繹顯烈神謨昭垂奕禩是不獨非漢唐以來所克比擬萬一即殷周嬗代慙徳猶滋者又豈可相提而並論哉六月賑湖廣災湖廣承天漢陽鄖陽襄陽四府各罹水患因命巡按御史等動支布政使司庫錢糧并撥隣近府縣所貯銀與倉榖相兼分行賑䘏冬十月賑河南災河南商水等四十四州縣水災分别賑䘏有差十一月己夘朔日有食之十二月慈寧宫災慈寧宫火太后移居於乾清宫命百官修省三日給事中萬象春言保身節用二事御史丁此吕言慎舉動宏聴納正典刑去倖位訓近侍五事俱報聞質實萬象春字仁甫無錫人丁此吕字右武新建人甲申十二年春二月京師地震丁卯京師地震有聲至五月京師復地震釋建文諸臣外親之謫戍者御史屠叔方疏言成祖有練子寧若在朕猶當用之之語今既褒表忠魂建祠致祭其墳墓苗裔厚加恤録而姻黨猶蔽覆盆如江西胡潤一族赤矣内親盡矣猶抄解外甥分戍若此者不一而足乞查前項姻戚有在戍者並宥還鄉部議願回者放回不願回者給與免帖詔自齊秦黄子澄外其坐方孝孺等連及者俱免之於是浙江江西福建四川廣東得免者凡三千餘人至光宗時併泰于澄戚屬後裔亦俱放還質實屠叔方秀水籍平湖人夏四月籍張居正家御史羊可立復追論居正搆陷遼王王妃因上疏訟寃言居正强占欽賜田産遼邸金寳萬計悉入居正家帝命司禮監張誠及侍郎邱橓等往荆州籍居正家守今先期録人口錮其門子女餓死者十餘輩誠等盡發其諸子兄弟藏得黄金可一萬白金十餘萬長子禮部主事敬修不勝拷掠自縊死事聞申時行等與六卿大臣合疏請少緩之刑部尚書潘季馴復特疏言居正母年逾八旬旦暮莫必其命語尤激楚於是詔留空宅一所田十頃贍其母而盡削居正官奪璽書詔命以罪狀示天下謂當剖棺戮屍而姑免之其弟都指揮居易子編修嗣修俱戍極邊諸以忤居正罷黜者俱召還初言路為居正所抑至是爭礪鋒鋭搏擊當路可立與李植江東之並荷帝寵三人更相結亦頗引吴中行趙用賢沈思孝為重執政惡之未㡬御史丁此吕劾侍郎高啟愚主南京試以舜亦以命禹為題為居正勸進帝手疏示申時行時行言此吕以曖昩陷人大逆恐讒言踵至非清明之朝所宜有尚書楊巍因請出此吕于外植東之交章劾時行巍蔽塞言路帝為罪啟愚留此吕時行巍求去余有丁言大臣國體所繫今以羣言留此吕恐無以安時行巍心帝乃聴巍出此吕于外許國尤不勝憤専疏求去言昔之専恣在權貴今乃在下僚昔顛倒是非在小人今乃在君子意氣感激偶成一二事遂自負不世之節號召浮薄喜事之人黨同伐異罔上行私其風漸不可長意葢指中行用賢等也自是言官與政府日相水火矣質實羊可立汝陽人高啟愚銅梁人楊巍海豐人騰衝遊擊劉綎討平隴川賊初緬酋莽瑞體以兵服諸蠻遣人招隴川宣撫多士寧士寧不從而記室岳鳳方用事欲降緬遂誘士寧而酖之并殺其妻子奪金牌印符受瑞體偽命代士寧為宣撫既而瑞體死子應襄嗣鳳導之入寇窺騰越永昌諸處已陷順寧指揮吴繼登等戰死事聞詔以綎為騰衝遊擊鄧子龍為永昌㕘將提兵往討當是時迤西諸部皆叛以兵助緬進逼姚闗勢甚盛會綎子龍兵至諸土兵亦大集綎與子龍大破之攀枝花地乗勝追擊先後斬首萬餘鳳大懼乃令妻子及部曲來降綎責令獻金牌符印及蠻莫孟密地而分兵趨沙木籠山先據其險自領大兵馳入隴川鳳度無可脱遂詣軍門降時諸部蠻視鳯為向背緬亦依鳯為心腹鳯既降諸部俱殺緬使來歸綎率兵進緬直抵阿瓦應裏退走阿瓦酋猛匀詣綎降猛勺應裏從父也遂班師獻俘于朝鳳伏誅莽緬甸在雲南西南嘉靖中孟養木邦酋攻殺緬酋紀嵗分有其地紀歲子瑞體奔匿洞吾母家既長遂有其地洞吾之南有大古喇濱海與佛郎機隣古喇酋兄弟爭立瑞體和解之因徳瑞體爭割地為獻受其約束瑞體乃舉衆絶古喇糧道殺其兄弟盡奪其地諸蠻皆畏服之遂復入緬陷鳯密併孟養勢益彊於是木邦蠻莫諸部皆叛附之岳鳯者江西人行賈隴川驍傑多智多士寧妻以妹使為記室鳯媚士寧而奪其權至是遂誘殺之鳯亦伏誅未㡬緬復熾進據孟養蠻莫官軍戰却之巡撫陳用賓築八闗于騰衝列兵戍守募人至暹羅約夾攻緬久之緬為暹羅所困勢頓衰然近緬諸部仍服屬之終明世不能復質實騰衝衛在騰越州城南本騰衝軍民指揮使司明嘉靖二年改置騰衝衛順寧本蒲蠻地元置府明仍為府以寳通等州縣省入今因之姚闗在甸灣土州北接順寧界攀枝花地名在姚闗南阿瓦城名為緬中五城之一冬十月余有丁卒有丁自七月以疾在告十月再以病乞休不允遂卒十二月以王錫爵為禮部尚書兼文淵閣大學士王家屏為吏部侍郎兼東閣大學士並預機務錫爵因救論奪情諸臣積忤張居正以禮部侍郎家居五年不出至是即家起之家屏前為日講官敷奏剴摰帝斂客受之稱為端士及是遂以吏部侍郎入閣去史官僅二年先是李植江東之與申時行相搆以錫爵負時望且素惡居正當與時行貳故力推之比錫爵至乃與時行合弗善植等植由是大恨質實王家屏字忠伯大同山隂人以陳獻章胡居仁王守仁從祀孔廟申時行等言守仁言致知出大學良知出孟子陳獻章言主靜沿宋儒周敦頤程顥且孝悌出處如獻章文章功業如守仁純心篤行如胡居仁並宜從祀從之終明世從祀文廟者薛瑄與守仁等四人先是隆慶元年都御史徐栻等言王守仁陳獻章宜從祀給事中趙思誠等言二人不宜從祀其後御史詹事講上言明興二百年來諸儒聿興直肩斯道若薛瑄王守仁陳獻章其最著者也今瑄已入祀而守仁獻章格于議而不得與夫守仁之功烈文章獻章之出處大節雖其言良知言主靜若近于偏枯顧言知而未始廢行言靜而未嘗離動合一之功與宋大儒之論同歸一致宜以守仁獻章並從祀于是申時行等議上以居仁亦宜並祀詔以三人並從祀孔廟列于薛瑄之次質實胡居仁字叔心餘干人居仁聞吴與弼講學崇仁往從之游絶意仕進其學以主忠信為先求放心為要闇修自守布衣終其身乙酉十三年春二月旱大雩京師自去年八月不雨至于是月庚午大雩三月甲申復大雩三月山西地震先是二月南京地震至是山西山隂縣地震旬有五日乃止李成梁襲巴圖爾綽哈大破之巴圖爾欲報父博斯呼之怨偕從父綽哈姑壻呼達糾西部伊勒敦等以數萬騎入掠瀋陽既退駐牧遼河欲犯開原鐵嶺成梁與巡撫李松潛為浮橋濟師踰塞百五十里疾掩其帳寇已先覺整衆迎戰成梁為疊陣親督前障擊而松以後陣繼之斬首八百有竒五月敵犯瀋陽伏積騎塞下誘官軍遊擊韓元功追襲之敗死至秋諸部長復犯蒲河而西部伊勒敦亦窺遼瀋成梁命部將李平胡出塞三百五十里捣破伊勒敦營斬首一百八級諸部長聞之始引去質實鐵嶺遼銀州明置鐵嶺衛今為鐵嶺縣屬奉天府蒲河在奉天府承徳縣西北明置千戸所于此今廢李松大城人巴圖爾舊作巴土兒呼達舊作花大伊勒敦舊作以兒鄧又作銀燈今並改以尚寶少卿徐貞明領墾田使督治京畿水田初貞明為給事中嘗請興西北水利言神京雄據上游兵食宜取之畿内今皆仰給東南豈西北古稱富彊地而不足以實廪而練卒乎夫賦税所出括民脂膏而軍船夫役之費常以數石致一石東南之力竭矣乂河流多變運道多梗竊有隐憂聞陜西河南故渠廢堰在在有之山東諸泉引之率可成田而畿輔諸郡或支河所經或潤泉自出皆足以資灌溉北人未習水利惟若水害不知水害未除正由水利未興也葢水聚之則為害散之則為利今順天真定河間諸郡桑麻之區丰為沮洳由上流諸河之水惟泄于貓兒灣欲其不汎濫而壅塞勢不能也今誠于上流疏渠濬溝引之灌田以殺水勢下流多開支河以泄横流其淀之最下者留以瀦水稍高者皆如南人築圩之制則水利興水患亦除矣至于永平灤州抵滄州慶雲地皆萑葦土實膏腴元虞集欲于京都濱海地築塘捍水以成稻田若倣集意招徠南人俾之耕藝北起遼海南濱青濟皆良田也宜特簡憲臣假以事權毋阻浮議需以嵗月不取近功或撫窮民而給其牛種或任富室而緩其科征或選擇健卒分建屯營或招徠南人許其占籍俟有成績次及河南山東陜西庻東南轉漕可減西北儲蓄常充國計永無絀矣疏入時以財匱不能舉會御史傅應禎建言廷杖下獄貞明入獄視之坐貶太平府知事被謫南行次潞河著潞水客談一書論水利當興者十四事兵部尚書譚綸見之謂其必可行于是貞明召還為尚寳丞矣工科給事中王敬民薦之會巡撫張國彦等方開水利于薊州永平間有效遂加貞明尚寳司少卿兼監察御史領墾田使令遍厯郊闗與撫按等官講求疏濬瀦蓄之法貞明先詣永平募南人為倡及明年二月已墾三萬九千餘畝又遍歴諸河周覽水利分合將大行疏濬而閹人勛戚之占田者爭言不便乃罷質實貓兒灣在雄縣東灤州隋屬平州遼分置灤州明亦曰灤州屬永平府今因之慶雲隋無棣縣明永樂初避諱改曰慶雲縣屬河間府之滄州今屬天津府徐貞明字孺東貴溪人潞水客談畧曰西北之地旱則赤地千里澇則洪流萬頃惟雨暘時若庶㡬樂嵗無饑此可常恃哉惟水利興而後旱澇有備利一也中人治生必有常稔之田以國家之全盛獨待哺于東南豈計之得哉水利興則餘糧棲畝皆倉庾之積利二也東南轉輸其費數倍若西北有一石之入則東南省數石之輸久則蠲租之詔可下東南民力庶㡬稍甦利三也西北無溝洫故河水横流而民居多沒修復水田則可分河流殺水患利四也西北地平曠寇騎得以長驅若溝洫盡舉則田野皆金湯利五也游民輕去鄉土易于為亂水利興則農業者依田里而游民有所歸利六也招南人以耕西北之田則民均而田亦均利七也東南多漏役之民西北罹重徭之苦以南賦繁而役簡北賦省而徭重也使田墾而民聚則賦増而北徭可減利八也沿邊諸鎮有積貯轉輸不煩利九也天下浮户依富家為佃客者何限募之為農而簡之為兵屯政無不舉矣利十也塞上之卒土著者少屯政舉則兵自足可以省逺募之費甦班戌之勞停勾攝之苦利十一也宗祿浩繁勢將難繼今自中尉以下量禄之田使自食其土為長子孫計則宗禄可減利十二也修復水利則倣古井田可限民名田而自昔養民之政漸可舉行利十三也民與地均可倣古比閭族黨之制而教化漸興風俗自美利十四也時户科給事中蕭彦疏言水田之利其不可不成者有四而不可不審議者亦有四國家定鼎燕京轉漕東南水利既興昔取諸東南今取諸堂奥之外也不可不成者一也西北有水利則東南可以息肩而漕輓之費所省又多不可不成者二也敵利于騎不利于步溝洫有制是不牆而堵不兵而衛也不可不成者三也昔也曠莽今也蕃育生聚教訓安邊長利不可不成者四也然西北之不諳水田也舊矣驅而為之緩之則無濟于事急之則有戾於民是人情之議也不可不審者一也墾田之夫毎邑不下千人派之民邪以為厲矣徵之江南邪千里齋糧逺赴田作有望而走耳是墾田之夫之議也不可不審者二也臣彦往閲邊於寧夏古稱塞北江南也又素有水田藉漢唐二渠不煩㣲力然往往就荒驅之領田如赴湯大又嘗閲邊於甘肅有先撫臣楊錦者為墾田之議而軍不願種乃分派各堡另墾卒無成功此邊人之習也墾田百萬法當給五萬人若曰自領之而自墾之脱無領者將不墾之乎是領田之户之議也不可不審者三也沿邊無種曠土軍民利而私種之久矣墾而為田勢必起科能欣然就邪至于廣野有沙壓之虞水濱有泛溢之慮但一相度可知己是起科之議也不可不審者四也王敬民河南西華籍應天句容人張國彦邯鄲人夏四月京師旱大雩帝步禱于南郊面諭大學士等曰天旱雖由朕不徳亦天下有司貪婪剥害小民以致上干天和今後宜慎選有司乃詔中外理寃抑免天下被災田租一歲先是李植等疏劾尚書潘季馴朋奸罔上詔削季馴籍擢植太僕少卿江東之光禄少卿羊可立尚寳少卿至是御史蔡系周以旱上疏劾植且言陛下欲雪枉而刑部尚書之枉先不得雪今日之旱葢實由植所稱尚書謂季馴也于是東之抗疏求罷可立復代為植辯給事御史齊世臣吳定等交章劾之帝報曰朕方憂旱諸臣何得紛爭乃己質實蔡系周華容人齊世臣南昌人吴定安陽人秋七月雷震郊壇震郊壇廣利門及齊宮門傷獸吻詔羣臣修省八月京師地震九月彗星見彗星出羽林傍形如彈九尾長尺許指東北毎夕移東行芒漸小閏九月賑鳳陽淮安災漕折銀例不准留至是以二府重地留漕賑濟帝詣大峪山閲夀宫先是十一年帝謁山陵用禮部尚書徐學謨言將卜夀宫于大峪時李植以巡按御史扈行閲視謂其地未善欲與江東之疏爭不果既而帝于十二年再往臨視遂作宫於是年八月既興役矣植以夀宫有石申時行與學謨姻故主之可用是罪也乃與東之羊可立合疏上言地果吉則不宜有石有石則宜奏請改圖乃學謨以私意主其議時行以親故贊其成非大臣謀國之忠時行奏辯曰車駕初閲時植東之不言今已二年忽創此議其借事傾臣明甚帝責三人奪俸半嵗未幾復以王錫爵言貶三人官然猶以植言夀宫有石恐寳座將置于石上至是復親詣閲之終謂大峪吉遂調三人于外質實徐學謨字叔明蘇州府嘉定人冬十一月禮科給事中王三餘請帝親郊不從三餘疏言郊祀必躬親載之會典乃者秋七月雷震郊壇恭繹徳音宣示臣工共圖修省今歲似宜親郊以答天戒代攝之舉未可以為常疏入帝以其奏請丕早詰責之仍遣官代質實王三餘安平人丙戌十四年春二月冊鄭氏為皇貴妃質實鄭氏大典人帝初年入宫封貴妃至是進為皇貴妃三月禁部曹言事鄭貴妃有殊寵生子常洵遂進封而王恭妃生皇長子已五歲不益封中外藉藉疑帝將立愛户科給事中姜應麟言欲别嫌明微莫若冊立元嗣為東宫以定天下之本帝怒貶應麟廣昌典史吏部驗封司員外郎沈璟亦疏請立儲謫行人司司正大學士申時行率同列再請建儲不聴時帝以旱霾下詔求直言郎官劉復初李懋檜等顯侵貴妃時行請帝下詔令諸曹建言止及所司職掌聴其長擇而獻之不得専達帝甚悦之于是言者蠭起皆指斥宫闈攻擊執政帝概置不問門户之禍大起質實姜應麟字泰符慈谿人沈璟吴江人劉復初高陵人李懋檜字克蒼安溪人夏四月京師地震癸酉寅刻震有聲申時行等奏曰恒暘不雨陽亢也地震弗寧隂縱也願祇天戒恤民艱慎起居修政事報聞六月松茂番平松茂諸番列砦四十八歲為吏民患王廷瞻撫蜀時嘗遣將擊破丢骨人荒没舌三砦諸酋乃降故事諸番嵗有賞賚番要索無已其所索例有新班錢熱衣錢架梁錢躧革錢放狗錢掛綵錢斷酒錢等名廷瞻一切除之西陲稍靖僅六七年勢復猖獗十三年夏楊栁番入犯金瓶堡殺守將巡撫雒遵遣總兵官李應祥討定之番恃强剽如故會徐元泰代遵撫蜀使使檄諭番不應是年春復攻蒲江闗守將出擊賊稍解東南路始通元泰决計大征遣遊擊周于徳邊之垣總兵郭成參將朱文達等將諸路兵進計命應祥居中節制應祥令軍中各樹赤白幟一良民陷賊者徒手立赤幟下熟番不附賊者徒手立白幟下即免罪番雖多遇急不能相救官軍連破河東河西諸賊巢擒賊渠三十餘人焚碉房千六百有竒俘馘以千餘計至是班師明年又計破建昌諸番及邛部屬夷以其地置屏山縣蜀中劇寇盡平應祥由是威名甚著盡是役也將士三路夾攻諸軍得所積稞粟留十日焚其砦自是羣番震驚不敢為患邊人樹碑紀績嘉靖初邊之垣祖輪以指揮討茹兒賊被殺漆其頭為飲噐及是六十年之垣乃得之以還葬焉質實松茂諸畨惟丢骨人荒沒舌三砦最强金瓶堡在四川龍安府松潘㕔南蒲江關亦在松潘㕔南今曰鎮江闗卭部漢越巂郡地後周置卭部郡元為卭部州明廢州置衛𨽻行都司今寧逺府越巂㕔屏山蜀漢置馬湖縣明為馬湖府治萬厯十七年置屏山縣屬馬湖府今屬叙州府王廷曕字稚表黄岡人雒遵字道行涇陽人李應祥湖廣九谿衛人徐元泰宣城人秋七月飭嚴保甲是夏振直𨽻河南陜西及廣西潯栁平樂廣東瓊山等十二縣饑是月賑江西災時山西盜起河南淇縣賊王安聚衆流刼尋勦平之勅户兵二部令各撫按官查災重地方蠲賑招撫并申嚴保甲緝捕盜賊質實平樂漢茘浦縣三國吴置平樂明屬廣西平樂府瓊山唐置縣屬瓊州府淇縣漢朝歌縣元置臨淇縣至元三年省臨淇縣為淇州明改曰淇縣屬衛輝府今並因之九月王家屏罷家屏遭繼母憂詔賜銀幣馳傳歸冬十月杖禮部主事盧洪春於廷削其籍帝累詔稱疾郊祀廟享多弗躬親禮部主事盧洪春上言陛下連日以疾免朝享廟遣官恭代若真疾邪則當以宗社為重母務為豫樂以基禍若非疾也則當以詔㫖為重母務為矯飾以起疑疏入帝大怒傳諭内閣數百言貴洪春悖妄命擬㫖治罪閣臣擬奪官不從廷杖六十斥為民給事御史先後申救奪俸有差質實盧洪春字思仁東陽人十一月祀南郊還御皇極殿受賀丁亥十五年春正月賑宗室宗室懐仁王府奉國將軍充􅀈奏各宗貧窘可憫狀帝因命發帑賑給户部因請陜西河南山東山西歳大凶照懐仁府一體賑給質實明太祖第十三子桂封代桂第八子分封懐仁六傳至充􅀈三月詔徹哩克襲封順義王初諳達死徹辰汗襲至是徹辰汗死子徹哩克襲其妻三娘子即諳達所奪之外孫女而為婦者也歴配三王主兵柄為中國守邊保塞諸部畏服之帝嘉其功封忠順夫人質實徹哩克舊作愴力克徹辰汗即歡台吉改名舊作乞慶哈今並改夏四月旱命百官祈雨京師地震是夏五月代州振武衛雁門所太原陽曲徐溝交城同日俱地震質實振武衛在代州治東南明洪武中置在代州北四十里雁門守禦千戸所在雁門闗明洪武七年置屬振武衛今屬代州治在州西二十里六月京師大雨京師災荒疊見氷雹横擊大雨如注官民牆屋所在傾頽溺壓死者無算命順天府賑䘏秋七月江南水江北蝗山西陜西河南山東旱時所在告災河北尤甚山西陜西河南山東並旱蠲賑有差户部右侍郎孫丕揚上言黄河以北饑民食草木陜西富平蒲城同官諸縣至于食石石出三縣山中臣得自目見謹取二斤伏候聖覽今海内困加派宜寛賊節用損上益下以培蒼生大命帝感其言頗有所減罷質實同官後周置縣明屬耀州今屬西安府孫丕楊字叔孝富平人河決開封河南開封等府陜州靈寳等州縣七月初十等日霪雨黄河泛漲衝決隄防漂没人畜工科給事中常居敬請敕河南山東凡有河道地方各令巡道督理捲埽築壩補隙塞決明立賞罰晝夜併工務俾安瀾母貽漕患從之質實常居敬江夏人八月敕撫按官懲貪吏理寃獄以災沴頻仍有司貪墨刑獄多寛命各撫按官舉察所屬官吏九月丁亥朔日有食之隂雲不見山西地震蒲州安邑解州同日地震聲如雷質實解州五代漢乾祐初置明屬平陽府今為直𨽻州南京都察院右都御史海瑞卒初瑞自應天巡撫謝病歸高拱張居正相繼當國俱憚瑞峭直中外交薦卒不召及居正卒吏部始擬用累遷南京右都御史瑞力矯偷惰百司惴恐屢疏乞休不允至是卒僉都御史王用汲入視之葛幃敝籯有寒士所不能堪者因泣下醵金為斂小民罷市喪出江上白衣冠送者夾岸酹而哭者百里不絶贈太子太保諡忠介識瑞平生為學以剛為主自號剛峯天下與不識咸稱剛峯先生戊子十六年春三月詔改景泰實録去郕戾王號國子監司業王祖嫡言建文之革除未復景泰之附錄未正今宜復建文位號修輯四年事蹟盡廢野史不經之説其景泰宜自為一錄削郕戻舊名疏下羣臣議於是申時行奏言建文年號因成祖靖難之日詔今年仍以洪武三十五年為紀其建文年號相傳以為革除及考靖難事蹟亦稱少主稱元年二年三年四年則是未嘗革除也但不稱建文耳英宗實錄修于成化初年在景皇帝位號未復之先故仍稱郕戾王而景泰七年事遂附英宗實錄之内今景皇帝位號已復不過於實錄内改正其理順而事亦易於是乃詔改正景泰實錄然是時上下偷惰詔敕多不奉行景㤗實錄終明世未嘗改也質實王祖嫡徳州人南畿浙江山西陜西河南大饑疫起前尚書潘季馴為右都御史總督河道季馴前為李植所劾落職為民御史李棟上疏訟之曰隆慶間河決崔鎮為運道梗數年以來民居既奠河水安流咸曰此潘尚書功也昔先臣宋禮治㑹通河至于今是賴季馴功不在禮下乃當身存之日使與編户齒寧不隳諸臣任事之心失朝廷報功之典其後論薦者不已遂起季馴右都御史總督河道自吴桂芳後河漕皆總理至是復設専官尋加季馴工部尚書質實李棟磁州渉縣人夏四月賑大名開封諸府饑北直𨽻大名河南開封等府水旱相仍餓殍載道發歸徳米價銀暨直隸存留銀賑之又截留漕糧二萬石發給鳳陽淮安揚州滁州四府州平糶賑饑五月以軍儲倉火詔修省諭禮部雷火燒倉厫軍糧草束乃國之至要者今天下災傷重大民窮時艱上天示警宜痛加修省是時山陜河南江浙南直諸處並告災困諸司撫輯賑救之疏日上而訖無竒策故有是命發明神宗之朝災異疊見史不勝紀而修省之詔亦時時屢下兹十六年各省災傷之見於志傳者不一書非苐以軍儲倉火已也其因天警而飭修省亦未為非是苐側身修行之㫖徒託諸空文㡬若尺一既頒而應天之事已旱至諸司撫輯賑救之疏交章以陳君若臣漫無良䇿惟恃此一詔以共鑒白於中外臣民則此意已足以致災尚何修省之有六月京師地震秋八月壬午朔日有食之冬十二月杖給事中李沂于廷斥為民中官張鯨掌東厰横肆無憚御史何出光劾鯨専擅威福并及其黨錦衣都督劉守有序班邢尚智尚智論死守有除名鯨被切讓而任職如故御史馬象乾復劾鯨詆執政甚力帝下象乾詔獄申時行等力救且封還御批不報許國王錫爵復各申救乃寢前命而鯨竟不罪外議謂鯨以金寶獻帝獲免沂拜官甫一月上疏曰陛下往年罪馮保近日逐宋坤鯨惡百保而萬坤奈何獨濡忍不去若謂其侍奉多年則壞法亦多年謂痛加省改猶足供事則未聞可馴虎狼使守門戸也流傳鯨廣獻金寳多方請乞陛下猶豫未忍斷決中外臣民初未肯信以為陛下富有四海豈愛金寳威如雷霆豈狗請乞及見明㫖許鯨策勵供事外議藉藉遂謂為真虧損聖徳夫豈淺尠且鯨奸謀既遂而國家之禍將從此始臣所大懼也是日給事中唐堯欽亦具疏諌帝獨手沂疏震怒謂沂欲為馮保張居正報讐立下詔獄嚴鞫時行乞宥不從讞上詔廷杖六十斥為民御批至内閣時行等欲留御批中使不可持去帝特遣司禮張誠出監杖時行等上疏俱詣會極門候進止帝言沂置貪吏不言而獨謂朕貪謗誣君父罪不可宥太常卿李尚智給事中薛三才等抗章論救俱不報國錫爵以言不見用引罪乞歸錫爵言廷杖非正刑祖宗雖間一行之亦未有詔獄廷杖并加于一人者故事惟盜賊大逆則有打問之㫖今豈可加之言官帝優詔慰錫爵卒不聴其言初馮保獲罪實鯨為之故帝云然或謂張誠與鯨交惡授意言者攻之其時周宏禴潘士藻皆以忤鯨得罪而沂禍為烈家居十八年未召而卒光宗嗣位贈光祿少卿質實李沂字景魯嘉魚人何出光扶溝人馬象乾廣東連州籍江西泰和人唐堯欽福建長泰人薛三才浙江定海人周宏禴字元孚麻城人官順天府通判以劾張鯨謫代州判官潘士藻字去華婺源人由推官擢御史上言今天下之患莫大於君臣之意不通宜倣祖制及近時平臺暖閣召對故事面議所當施罷撤大工以俟豐歲蠲織造以昭儉徳免金花額外征以佐軍食且時召講讀諸臣問以經史張鯨激帝怒謫為廣東布政司照磨己丑十七年春正月己酉朔日有食之以日食免元旦朝賀嗣後每元旦皆不視朝矣三月免陞授官面謝自是臨御遂簡夏四月召王家屏復入閣先是家屏輔政秉正持法至是母憂服甫闗詔進禮部尚書遣行人召還扺京師三月未得見家屏以為言帝遣中官慰家屏奬以忠愛家屏疏謝請帝視朝居數日帝為一御門延見自是益深居不出矣五月西寧衛地震是月辛亥西寧衛天鼔鳴地震越七日地復震質實西寧衛元西寧州屬甘肅行省明置衛今為甘肅西寧府六月廬州鎮江地震賑南畿浙江饑南畿久旱太湖水涸浙江大風海溢既而亦旱發帑金八十萬賑之秋七月福建浙江地震福建福州興化二府浙江杭州紹興温州三府地皆震庚寅十八年春正月召見申時行等于毓徳宫斥大理評事雒于仁為民于仁疏上酒色財氣四箴直攻帝失疏言臣備官歲餘僅朝見陛下者三此外惟聞聖體違和一切傳免郊祀廟享遣官代行政事不親講筵久輟臣知陛下之疾所以致之者有由也臣聞嗜酒則腐腸戀色則伐性貪財則喪志尚氣則戕生陛下八珍在御觴酌是耽卜晝不足繼以長夜此其病在嗜酒也寵十俊以啟倖門溺鄭妃靡言不聴忠謀擯斥儲位久虚此其病在戀色也傳索帑金括取幣帛甚且掠問宦官有獻則已無則譴怒李沂之瘡痍未平而張鯨之貲賄復入此其病在貪財也今日榜宫女明日抶中官罪狀未明立斃杖下又宿怨藏怒于直臣如范儁姜應麟孫如法軰皆一絀不申賜環無日此其病在尚氣也四者之病膠繞身心豈藥石所能治臣今敢以四箴獻陛下肯用臣言即立誅臣身臣雖死猶生也疏入帝震怒將加嚴譴會歲暮留其疏十日及是元旦召見申時行等分析之時行請毋下其章而諷令于仁自引去遂斥為民自此章奏留中遂成故事是日帝宣皇長子出見時行請早定大計帝猶豫久之乃曰朕不喜激聒近閲諸臣所奏惡其離間父子故槩置之若諸臣不復奏擾當以後年冊立否則俟皇長子十五歲舉行時行因戒廷臣母凟擾質實雒于仁字少經涇陽人十俊時有十小閹被寵謂之十俊范儁字國士高安人以疏陳時政被斥孫如法字世行餘姚人以諫鄭貴妃進封貶官二月罷日講帝每遇講期多傳免申時行請免講日仍進講章以備觀覽自後講筵遂永罷順徳地震直隸順徳府地震星隕如火隠隠如鼓聲三月以宋纁為吏部尚書纁前為户部五年值四方多災酌盈虚籌緩急上下賴之及移吏部絶請託奬㢘抑貪痛懲黠吏于政府一無所闗白屢乞休不允卒于官諡忠敬用初石星代纁為户部語纁曰某郡有羨餘可濟國纁曰朝廷錢穀寧積久不用勿使搜括無餘主上知物力充羨則侈心生矣星憮然或有言漕糧宜改折者纁曰太倉之儲寧紅腐不可匱絀一旦不繼何所措手乎中外陳奏帝多不省或直言指斥輒曰此沽名耳亦不加罪于慎行稱帝寛大纁愀然曰言官極論得失要使人主動心縱罪及言官上意猶有所儆省槩置勿問則如痿痺不可療矣直𨽻山東河南風霾直𨽻大名府諸處狂風自西北起白晝晦㝠天色忽赤忽黒山東兖州府諸處黒風揚沙壊城樓廨宇廬舍傷男婦五人河南開封彰徳衛輝歸徳等處風霾亦自西北起拔木傷稼天氣黒赤刀鎗上俱起火光壊城郭廬舍壓溺死者三百六十餘人代州星隕乙夘夜初更一星墜聲如雨光如燭有頃天鼓聲如雷庚申有火星自東南帶火流于西北夏六月青海酋浩爾齊犯邊自諳達西掠諸番番人不支輸欵焉諳達遂數入番中至是套部章圖哩等據水塘布色圖浩爾齊等據莽拉聶恭兩川而浩爾齊尤黠桀數犯甘涼岷洮西寧間已而進圍舊洮州副將李聨芳戰歿未㡬復大掠河州臨洮渭源官軍禦之敗績西陲大震時徹哩克勢衰亦為布色圖等所誘西行逺邊帝惡之詔停市賞質實水塘青海地名莽拉聶恭皆洮水支流隨地易名舊洮州即古洮陽城在洮州衛西南城臨洮水李聨芳洵陽人舊浩爾齊舊作火落赤章圖哩舊作莊秃賴布色圖作卜失土莽拉舊作莽剌聶恭舊作揑工今並改秋七月庚子朔日有食之命兵部尚書鄭雒經畧邊防雒前督宣大軍撫順義王及忠順夫人有恩故用之雒以洮河之難由縦敵入青海所致乃馳詣甘肅下令曰北部自青海歸巢者聴假道自巢入青海者即勒兵拒之未㡬巴什圖欲趨青海雒設伏掩擊之巴什圖僅以身免章圖哩後至聞之亦退去于是大布招畨之令歸附者日衆乃進兵青海逐浩爾齊諸部而諭齊里克縳獻首叛踰二年齊里克以史二等來獻命復其市賞質實鄭雒字禹秀安肅人撫順義王及忠順夫人有恩初三娘子佐諳達主貢市諸部皆受其約束及上海襲封年老且病欲妻三娘子三娘子不從率衆西走上海自追之貢市久不至雒計三娘子别屬則上海雖王無益乃使人語之曰夫人能歸王不失恩寵否則塞上一婦人耳三娘子聴命上海更名車臣汗貢市惟謹雒以功加兵部尚書兼右副都御史十四年車臣汗死子齊里克當襲三娘子以年長自練兵萬人築城别居雒恐貢市無主復諭齊里克曰夫人三世歸順汝能與之匹則王不然封别有屬也齊里克盡逐諸妾復妻三娘子遂以明年嗣封並奏封三娘子忠順夫人雒乃上疏請定馬數宣府不得踰三萬大同萬四千山西六千而申飭將吏嚴備以防盜竊且無輕遏其部落馳獵帝嘉納之青海初諳達建寺青海奏于朝賜名仰華至是齊里克以赴仰華為名西至青海諸部皆挾以為重史二中國叛人冬十月賑臨洮軍民以臨洮被兵賑之辛卯十九年春三月彗星見見于西北長尺餘歴胃室壁長二尺至閏三月入婁夏四月朔享太廟是後廟祀皆遣代六月山西地震太原府五臺交城縣並地震質實五臺漢慮虒縣隋大業初改曰五臺因山以名明屬太原府代州今屬代州直隸州王錫爵罷錫爵初還朝申時行為首輔許國錫爵次之三人皆南畿人錫爵又與時行同郡且同舉進士政府相得甚然時行柔和而錫爵性剛負氣十六年子衡舉順天試第一郎官高桂饒伸論之錫爵連章辯訐語過忿桂伸皆得罪以是積與廷臣忤時羣臣請建儲者衆帝皆不聴十八年錫爵疏請豫教元子録用言官姜應麟等不報遂因旱災自陳乞罷帝優詔留之及浩爾齊犯邊議者爭請用兵錫爵與申時行主欵失帝意未㡬又偕同列請建儲不得尋以母老連疏乞歸許之質實饒伸字仰之進賢人論王衡舉順天試第一時庶子黄洪憲典順天鄉試時行壻李鴻亦預選桂􅎥可疑者八人并及衡請俱覆試禮部侍郎于慎行列甲乙以上閣臣調旨盡留之衡字辰玉少有文名為舉首才自稱因被論遂不復㑹試至二十九年錫爵罷官已久始舉㑹試第二人廷試亦第二授編修黄洪憲字懋忠嘉興人秋畿内蝗七月甘肅廣西地震西寧星隕西寧衛等處星隕天鼓鳴松江颶松江太倉等處颶風大作海嘯壊屋害人九月申時行許國罷先是廷臣爭請建儲得㫖于二十年春舉行至是工部主事張有徳預以儀注請帝怒奪有徳俸時申時行方在告許國與王家屏慮事中變欲因而就之引前㫖爭首列時行名時行聞帝怒密疏言臣方在告實不與知給事中羅大紘劾時行陽附廷臣請立之議隂為自交宫掖之謀歙人黄正賓者以貲為中書舍人思立竒節自附清流見大紘疏亦抗章詆時行帝怒斥大紘正賓為民時行力求罷而國與家屏又以建儲請帝責大臣不當與小臣比遂罷國未㡬時行亦罷國素與時行無嫌然性木强遇事輒發力詆言事諸臣士論頗不附浩爾齊犯邊時行主欵國獨謂寇渝盟犯順宜一大創之帝心然國言以時行方柄政不能奪㑹時行門生給事中任讓論國庸鄙而國門生萬國欽又論時行以圖報復至是國與時行並罷論者謂國之去以爭執差勝于時行之以被劾去也初張居正卒時行與張四維相繼當國時行欲以寛大收人心召用老臣布列庶位朝論多稱之然政令務承帝㫖不能有所匡正又罷居正所行考成法一切務為簡易由是上下恬熙法紀漸不振國在閣九年廉慎自守故累遭攻擊不能被以汙名質實張有徳祥符人羅大紘字公廓吉水人萬國欽字二愚新建人以趙志臯為禮部尚書張位為吏部侍郎並兼東閣大學士預機務申時行既謝政密薦志臯位自代遂用之吏部尚書陸光祖言舊制閣臣必由廷推若令一人密薦恐開植黨之門志臯位因疏辭帝不允發明申時行以被劾乞歸或恐有媒蘖其後者因薦所知趙志臯張位自代考志臯與位既入閣後亦無卓然表見之勲業時行之密為引進固不無植黨樹援之意然謂必由廷推亦非確論明代用人特重此典部臣邊將率皆由此擢選繼乃輔贊機務亦皆附之公舉以附于枚卜合同之義而伐異黨同從此樹立門户甚至各挾私人忿爭朝宁弼諧亮功之謂何曷思進退人才當一秉諸乾斷庶太阿之柄不至下移密薦廷推二者皆不能無流弊耳冬十一月遼東總兵官李成梁罷十七年以後土黙特結西部數入寇將弁多戰歿成梁又潛兵出塞襲敵遇伏死者千餘人仍報首功増爵廕敵再入海州成梁不敢撃縱掠數日而去是年閏三月成梁乗給事中侯先春閲邊謀邀搗巢功遣副將李寧襲破板升還師遇敵死者又數千為巡按御史胡克儉所劾及先春還朝尤力詆之遂罷成梁官以寧逺伯奉朝請質實侯先春無錫人胡克儉光山人御定資治通鑑綱目三編卷二十七
