body:
  text: 起丙寅明武宗正德元年盡癸酉明武宗正德八年凡八年丙寅武宗毅皇帝正德元年春二月大學士劉健等乞罷不許吏戶兵三部及都察院各有疏言事為宦官所撓傳示帝意令閣臣調㫖健等不奉命别擬以奏帝不聽健等力諫謂奸商壞亂鹽政武臣負罪玩法北征將士無功授官御用監書篆濫用匪人皆宜痛抑今陛下不信大臣而信羣小欲以一二人私恩壞百年舊制臣等豈敢苟從所擬四疏謹以原擬封進不報居數日又言比為鹽法賞功諸事極陳利害拱俟數日未奉玉音若以臣等言是宜賜施行所言非邪亦當明加斥責乃留中不報視之若無政出多門咎歸臣等宋儒朱喜有言一日立乎其位則一日業乎其官一日不得乎其官則一日不敢居乎其位伏乞聖明矜察特賜退休帝優㫖慰留之疏仍不下又數日厯數政令十失指斥貴戚近幸尤切因再申前請帝不得已始下前疏今所司詳議健等知志終不行各上章乞骸骨帝不許既而所司議上一如健等指帝勉從之由是諸失利者咸切齒夏四月罷吏部尚書馬文升以焦芳代之初文升承遺詔請汰傳奉官七百六十三人命留太僕卿李綸等十七人餘盡汰之既而中官王瑞復請用新汰者七人文升持不可給事中安奎剌得瑞納賄狀劾之瑞恚誣文升抗㫖更下廷議皆是文升帝終不聽文升因乞歸不許是時朝政已移于中官文升日懷去志㑹兩廣缺總督推兵部侍郎熊繡可任繡不欲出外頗怏怏其同鄉御史何天衢劾文升徇私文升連疏乞休去芳粗鄙無學識好嫚罵劉健謝遷諸正人皆惡之芳既積忤廷臣乃深結閹宦以干進帝初即位廷議以國用不足勸上莭儉芳知左右有竊聽者大言曰庶民家尚須用度何况縣官諺云無錢揀故紙今天下多逋租匿稅不是檢索而但云損上何也帝聞大喜㑹文升去遂代為尚書質實焦芳泌陽人安奎趙州人熊繡字汝明道川人五月兵部尚書劉大夏罷先是孝宗遺命撤鎮守中官非額設者大夏議撤二十四人又奏減皇城京城守視中官皆不納頃之列上傳奉武臣當汰者六百八十二人報可大漢將軍薛福敬等四十八人亦當奪官福敬故不入侍以激帝怒帝遽命復之而責兵部對狀欲加罪中官寧瑾頓首曰此先帝意陛下列之登極詔書不宜罪帝意乃解已復言鎮守中官如江西董讓薊州劉琅陜西劉雲山東朱雲貪殘尤甚乞按治帝不悅大夏自知言不見用遂連疏乞歸許之給事中王珝張禬上章請留大夏吏部亦請如珝禬言不報質實明兵志府軍前衛及旗手等十二衛各有帶刀官錦衣所𨽻將軍初名天武後改稱大漠將軍凡干五百人王珝永平人張襘平谷人六月大風雨壞郊壇獸瓦帝諭羣臣修省劉健李東陽謝遷上言比來免朝太多奏事漸晚遊戲漸廣經筵日講直命停止不知陛下宫中復有何事急于此者夫濫賞妄費非所以崇儉德彈射釣獵非所以養仁心鷹犬狐免不可育于朝廷弓矢甲胃不可施于宫禁今聖學久曠正人不親直言不聞下情不達而此數者雜交于前臣不勝憂懼疏入報聞秋七月彗星見是月二十三日庚子夜也前十一日己丑夜有星見紫徵西蕃外如彈丸色蒼白越數日有微芒見參井間漸長二尺如帚西北至文昌至是彗星亦見光流東南長三尺越三日長五尺許掃下台入太微垣時八黨竊柄朝政日非而災異迭見于是南京御史陸崑偕同官上疏極諌曰自古宦豎欲擅主權必先蠱其心志如趙高勸二世嚴刑肆志以極耳目之娛仇士良教其黨以奢靡𨗳君勿使親近儒生知前代興亡之故其君惑之卒皆受禍陛下嗣位以來天下顒然望治乃未幾寵幸閹寺顛覆典刑太監馬永成魏彬劉漢傳興羅祥谷大用輩共為䝉蔽日事宴遊上干天和災祲數告廷臣屢諫未䝉省納若輩必謂宫中行樂何關治亂此正奸人蒙君之故術也陛下廣殿細旃豈知小民窮簷蔀屋風雨之不庇錦衣玉食豈知小民祁寒暑雨凍餒之弗堪馳騁宴樂豈知小民疾首蹙額赴訴之無路日者雷震郊壇彗出紫徵夏秋亢旱江南米價翔貴京城賊盜橫行可恣情縱欲不一顧念乎伏望側身修行屏求成輩以絶亂源委任大臣務學親政以還至治疏入帝不省質實紫徵西蕃紫宫垣十五星其西蕃七東蕃八參井西方參十星主斬刈又為天獄主殺伐又主權衡所以平理也南方東井八星天之南門黃道所經天之亭候主水衡事法令所取平也下台三台六星兩兩而居起文昌列抵太徵西近文昌二星曰上台次二星曰中台東二星曰下台太微天子廷也五帝之座也十二諸侯府也具見晉書天文志陸崑字如玉歸安人八月立皇后夏氏初帝將大婚詔取太倉銀四十萬御史趙佑言左右以婚禮為名將肆無厭之欲計臣懼禍而不敢阻閣臣避怨而不敢爭用如泥沙坐致耗國不幸興師遘饑饉將何以為計哉後户部尚書韓文亦以為言乃得減四之一質實武宗孝靜皇后夏氏上元人趙佑字汝翼雙流人九月命太監崔杲王瓚監南京織造杲等乞鹽萬二千引所司執奏給事中陶諧御史杜旻邵清楊儀等先後諫健等亦言不可帝召健等至暖閣面議頗有所詰問健等皆以正對帝不能難最後正色曰天下事豈皆內官所壞朝臣壞事者十常六七先生輩亦知之因命鹽引悉如杲請健等退再上章言不可帝自愧失言乃俞健等所奏于是中外咸悅謂帝庶幾改過矣質實陶諧字世和㑹稽人杜旻山陽人邵清字士連江寧人楊儀永夀人冬十月以劉瑾掌司禮監罷華蓋殿大學士劉健武英殿大學士謝遷瑾以內官監兼督團營帝漸信用日與馬永成等進鷹犬歌舞角觗之戲𨗳帝佚遊又勸帝令鎮守內臣各進萬金奏置皇莊增至二百餘所畿內大擾健等謀去瑾永成諸人㑹給事中陶諧御史趙佑等交章論劾章下閣議健等持之甚力欽天監五官監侯楊源亦因星變陳言乞親元老斥寵幸帝意頗動而不能斷也先是户部尚書韓文以八黨用事每朝退與僚屬言輒泣下郎中李夢陽進曰公泣何為比諫官疏劾諸閹執政符甚力公誠乃此時率大臣固爭去八人易易耳文毅然改容曰善縱事弗濟吾年足死矣不死不足報國即令夢陽草疏既具文讀而刪之遂率諸大臣狀關以上略曰伏覩近日朝政益非號令失當中外皆言太監馬永成谷大用張永羅祥魏彬邱聚劉瑾髙鳯等造作巧僞淫蕩上心擊毬走馬放鷹逐犬俳優雜劇錯陳于前至導萬乘輿外人交易押昵媟褻無復禮體日遊不足夜以繼之勞耗精神虧損志德此輩細人惟知蠱惑君上以便己私而不思皇天春命祖宗大業皆在陛下一身萬一遊宴損神起居失節雖虀粉若輩何補于事竊觀前古閹宦誤國為禍尤烈漢十常侍唐甘露之變其明驗也令永成等罪惡既著若縱不治將來益無忌憚必患在社稷伏望陛下奮乾剛割私愛上告兩宫下諭百僚明正典刑潜銷禍亂之階永保靈長之祚疏入帝驚泣不食乃遣司禮中官李榮王嶽等至閣議一日三反欲安置之南京遷欲逆誅之以為處之未盡健推案哭曰先帝臨崩執老臣手付以大事今陵土未乾使若輩敗壞至此臣死何面目見先帝健遷聲色俱厲惟李東陽語少綏王嶽者素剛直嫉邪慨然曰閣議是具以健等言白帝明日忽有㫖召諸大臣入至左順門健迎謂曰事垂濟公等第堅持尚書許進曰過激恐生變健不應有頃李榮手諸大臣疏曰有㫖問諸先生諸先生言良是第奴儕事上久不忍即置理幸少寬之上自處耳衆相顧莫言韓文乃抗聲數八人罪侍郎王鏊助之曰八人不去亂本不除榮曰上非不知苐欲少寬之耳鏊直言曰設上不處奈何榮曰榮頸有鐵裏耳敢壞國事遂退健約文及諸九卿詰朝伏闕西爭王嶽從中應之因誅瑾等焦芳聞之馳告瑾瑾乃率永成等夜伏帝前環泣以首觸地曰微上恩奴儕磔餧狗矣帝色動瑾進曰害奴儕者王嶽也帝曰何故瑾曰嶽結閣臣欲制上出入故先去所忌耳且鷹犬何損萬幾若司禮監得人左班官安敢如此帝大怒立收嶽命瑾掌司禮監永成大用掌東西厰各分據要地及旦諸臣入朝將伏闕知事已中變于是健東陽遷俱上章求去瑾矯㫖聼健遷歸而獨留東陽嶽充南京净軍追殺之于途于是中外大權悉歸于瑾矣健遷瀕行東陽祖餞泣下健正色曰何哭為使當日多出一語與我輩同去矣東陽哩然質實王鏊字濟之吳縣人以焦芳為文淵閣大學士吏部左侍郎王鏊兼翰林學士入內閣預機務初許進輩以年資推芳入吏部劉健不悅曰老夫不久歸田此座即焦有恐諸公俱受其害耳及是果附劉瑾謀炳政而廷議獨推鏊瑾迫公論令鏊與芳同入閣芳在閣裁閣章奏一阿瑾意鏊雖持正不能與抗事有不可與李東陽彌縫其間多所補救東陽雖為首輔嘗委蛇避禍芳嫉其位在已上日夕搆之于瑾㑹通鑑纂要成瑾以謄寫不謹欲因是為東陽罪東陽大窘芳為解乃止除謄録官數人名東陽得無事質實厯代通鑑纂要凡九十二卷是書修于孝宗時芳未嘗為總裁官至是命文華殿改謄芳遂列名其間及進呈書辦官張駿等皆擢秩裝潢匠役亦悉授官給事中劉􅉅吕翀請留劉健謝遷不報尋杖􅉅翀及南京給事中戴銑御史薄彥徽等于廷並斥之健遷既去位蒞翀抗章請留言二臣不可聼去者有五孔子稱孟莊子之孝以不改父之臣為難二臣皆先帝所簡以遺陛下今陵土未乾無故罷遣何以慰在天之靈不可一也二臣雖以老疾辭實由言違計沮不得其職而去陛下聽之亦以不善將順非實有意優老也在二臣得去就之義在陛下有棄老成之嫌不可二也今民窮財殫府藏虛罄水旱盜賊星象草木之變迭見雜出萬一禍生不測國無老成誰與共事不可三也自古剛正者難容柔順者易合二臣既去則柔順之人必進將一聽陛下所為非國家之福不可四也書曰無遺壽耉健等諳練有素非新進可侔今同日去國天下後世將謂陛下喜新進而厭舊人不可五也帝不聽先是給事中艾洪劾中官髙鳯姪得林營掌錦衣衛諸疏傳至南京為協同守偹武靖伯趙承慶所得應天尹陸珩録以示諸僚兵部尚書林瀚聞而太息于是銑彥徽率諸科道官合疏言元老不可去宦豎不可任劉瑾等激帝怒盡逮之并菃翀洪俱豫杖削籍詞連承慶瀚珩亦皆得譴兵部主事王守仁論救銑等廷杖四十謫龍場驛丞時南京御史蔣欽與銑等同被罪出獄甫三日欽獨具疏劾瑾言劉瑾小豎子耳陛下親以腹心寄以耳目待以股肱殊不知瑾為悖逆之徒蠧國之賊竊柄弄權萬民失望愁嘆之聲動徹天地幸聽臣言急誅瑾以謝天下然後殺臣以謝瑾疏入再杖三十繫獄越三日復具疏請殺瑾且言陛下不殺此賊當先殺臣使臣得與龍逄比干同遊地下臣誠不願與此賊並生言尤激切既入復杖三十質實龍場驛在貴陽府修文縣治今廢劉􅉅字惟馨涪人吕翀江西永豐人戴銑字寶之婺源人薄彥徽陽曲人艾洪濵州人陸珩歸安人王守仁字伯安餘姚人蔣欽字子修常熱人欽屬草時燈下微聞鬼聲欽念疏上必掇異禍此必先人之靈欲寢此奏因正衣冠立曰果先人盍厲聲以告言未已聲出壁間益悽愴欽歎曰業已委身義不得緘默負國為先人羞遂奮筆曰死即死此槀不可易也聲遂止杖後三日卒于獄十一月削戶部尚書韓文職劉瑾恨文甚日令人伺文遇不得及是有以僞銀輸內庫者遂以為文罪詔降一級致仕給事中徐昻疏救中㫖責其黨護遂落文職并除昻名文出都門乘一騾宿野店而去瑾又憾李夢陽代文草疏矯㫖謫山西布政司經歷勒致仕既而瑾復據他事下夢陽獄將殺之賴康海救得免質實徐昻泰興人康海字德涵武功人與李夢陽素以詩文相倡和夢陽在獄書片紙出曰對山救我對山者海别號也海與瑾同鄉瑾前招致之海不肯往因夢陽故遂謁瑾瑾大喜為倒屣逆海因詭詞說之夢陽遂得釋後瑾敗海坐黨落職而夢陽起為江西提學副使復以與巡按御史江萬實相訐奏罷官久之乃卒夢陽才思雄鷙言文必秦漢詩必盛唐與海及何景明徐禎卿邊貢王九思王廷相號七才子皆以詩名當世逮嘉靖朝李攀龍王世貞出復奉以為宗天下推李何王李為四大家無不爭效其體云江萬實大竹人何景明字仲默信陽人徐禎卿字昌穀吳縣人邊貢字廷實歷城人王九思字敬夫鄠人王廷相字子衡儀封人李攀龍字于鱗歷城人王世貞字元美太倉人十二月除曲阜孔氏田賦罷工部尚書楊守隨左都御史張敷華韓文等既逐守隨憤甚乃上章極論之曰陛下嗣位以來左右近臣不能祗承德意盡取先朝良法而更張之盡誣先朝碩輔而剗汰之天下嗷嗷莫措手足內臣劉瑾等八人奸險佞巧誣罔恣肆而瑾尤甚日以荒縱𨗳陛下禁內鼓鉦震于逺邇宫中火炮聲徹書夜淆雜尊卑陵夷貴賤引車騎而供執鞭之役列市肆而親商賈之為致陛下日高未朝漏盡不寢此數人者方且竊攬威權詐傳詔㫖放逐大臣刑誅臺諫邀阻封章廣納貨賂傳奉冗員多至千百招募武勇收及孩童紫綬金貂盡豫爪牙之士蟒衣玉帶濫授心腹之人附已者進官忤意者禠職內外臣僚但知畏瑾不知畏陛下夫太阿之柄不可授人今陛下于兵刑財賦之區機務根本之地悉以委之或掌團營或主兩厰或典司禮或督倉場大權在手彼復何憚于是大行殺戮廣肆誅求府庫竭于上財力殫于下武勇疲于邊上下胥讒神人共憤伏望大奮乾剛立置此曹重典逺鍳延熹之失毋使臣蹈蕃武已覆之轍疏入瑾憾甚至除夕朝罷忽傳㫖與張敷華俱致仕敷華當廷臣請去瑾等時獨抗疏論列語尤切至故瑾亦深銜之質實張敷華字公實安福人丁卯二年春正月乙亥朔日有食之二月下御史王良臣王時中于獄良臣奉命清軍江西聞戴銑等彼逮馳疏救逮下鎮撫司獄杖三十斥為民時中出按宣大所黜貪汙者甚衆瑾聞之怒亦逮下獄荷重校于都察院門時中病甚其妻往者遇都御史劉字哭且詬宇不得已言于瑾釋之謪戍鐵嶺衛質實玉良臣陳州人王時中字道夫黃縣人初時中為鄢陵知縣最有聲嘗出郊旋風擁馬首時中曰寃氣也跡得尸眢井乃婦與所私者殺之遂伏辜劉宇字至大釣州人也三月太監劉瑾矯詔榜奸黨于朝堂劉健謝遷雖去瑾憾不已矯詔列健遷及尚書韓文揚守隨林瀚都御史張敷華郎中李夢陽主事王守仁王綸孫磐黃昭檢討劉瑞給事中湯禮敬陳霆徐昻陶諧劉􅉅艾洪吕翀任惠李光翰戴銑徐蕃牧相徐暹張良弼葛嵩趙士賢御史陳琳貢安甫史良佐曺閔王宏任諾李熙王蕃葛浩陸崑張鳴鳯蕭乾元姚學禮黃昭道蔣欽薄彥徽潘鏜王良臣趙佑何天衢徐珏楊璋熊卓朱廷聲劉玉等五十三人為奸黨榜示朝堂召羣臣跪金水橋南宣戒之先是鞫獄時獨任諾王蕃抵不與知雖仍列五十三人之數識者耻道其名質實王綸開州人黃昭江隂人劉瑞內江人湯禮敬字仁甫丹徒人陳霆德清人任惠灤州人李光翰新鄉人徐蕃泰州人牧相餘姚人徐暹張良弼皆歷城人葛嵩字鍾甫無錫人趙士賢石首人陳琳字玉疇甫田人貢安甫字充仁史良佐字禹臣皆江隂人曹閔上海人王宏六合人任諾史未詳其里籍明實録作任訥李熙上元人王蕃灤州人葛浩字天洪上虞人張鳴鳯清平人蕭乾元萬安人姚學禮巴縣人家京師黃昭道平江人潘鏜字宗節六合人何天衢道州人徐玨字用礪江夏人楊璋孝感人熊卓豐城人朱廷聲字克諧進賢人劉玉字咸栗萬安人敕各鎮守太監預刑名政事後劉瑾誅從兵部言乃令繳敕悉如舊制發明紀綱法度自天子出百僚庶尹奉職宣化而已何預之可云而况乎中官且以內臣出而鎮守即無詔諭亦斷無不干預刑名政事者此漏巵濫觹必至之勢也今復寵之綸綧重以責成若輩更何所顧忌耶依古以來閹寺擅權亂政之事史不絶書然欲明目張膽盡許其攬與朝政而仍得藉口奉敕以恣行其私臆則未有至於此極者說者謂是時中㫖皆出自劉瑾疑即瑾之欲其同類分擅天下之柄而乃有是敕武宗幾若罔聞知者洵若是也亦可慨矣夫夏五月度僧道四萬人復寧王宸濠護衛初寧靖王奠培以私獻惠二王官人逼內宫熊壁自盡華護衛再傳至宸濠輕佻無威儀而善以文行自飾術士李自然李日芳妄言其有異表又謂城東南有天子氣宸濠喜時時詗朝中事聞謗言輒喜或言帝明聖朝廷治即怒至是賄劉瑾請復所奪護衛竟許之質實宸濠寧獻王權五世孫惠王盤烒曾孫六月逮前總制三邊都御史楊一清下獄尋釋之先是一清巡撫陜西以秦紘後總制罷不設三邉有警不相援患無所統攝請遣大臣兼領之劉大夏以一清才即奏任為總制一清乃建議修邊言花馬池至靈州地勢平衍冦每從此毁墻入則固原慶陽平涼鞏昌皆受忠成化時寧夏巡撫徐廷璋築邊牆綿亘二百餘里在延綏者余子俊修之甚固後邉傋踈牆塹日夷𢎞治末總制秦絃治塹七百里謂可無患不一二年冦復深入是紘所修不足捍敵臣以為防邊之䇿大要有四修濬牆塹以固邉防增設衛所以壯邉兵經理靈夏以安內附整飾韋州以遏外侵因條其便宜以延綏安邊營石潦池至定邊營百六十三里平衍宜牆者百三十一里險崖峻阜可剷削者三十二里宜為墩臺連接橫城以北黃河南岸有墩三十六宜修復帝可其議為特發帑金數十萬工方興而瑾憾一清不附已一清遂引疾歸其成者僅四十里至是瑾誣一清破冒邊費逮下錦衣獄大學士李東陽王鏊論救乃得釋已而瑾托言邊倉芻粟多朽腐矯㫖逮各省巡撫及管糧郎中下獄一清復坐是先後罰米六百石質實石潦池在今榆林衛西定邉營在今榆林府西六百六十里橫城堡在清水營西北八十里榆林志黃河自橫城堡西折而北徑三受降城南至廢東勝州西折而南入府谷縣界楊一清字應寧安寧州人徙居丹徒秋八月作豹房帝為羣閹蠱惑乃于西莘門别構院籞築宫殿而造密室于兩廂勾速櫛列謂之豹房初帝令內侍仿設㕓肆身衣估人衣與貿易持簿算喧詬不相下更令作市正調和之擁至廊下家廊下家者中官于永巷所張酒肆也坐當壚婦其中帝至雜出牽衣螽簇而入醉即宿其處楊守隨疏所謂親商賈之為者以此至是既作豹房朝夕處其中稱之日新宅日召教坊樂工入新宅承應義之樂工訴言樂户在外府多有今獨居京師者承應不均遂敕禮部檄取河間諸府樂戶精技業者遣送教坊人日以百計于時羣小見幸者皆集于豹房矣冬十月太監劉瑾矯㫖杖戍欽天監五官監候楊源道死源以霾霧時作言此衆邪之氣隂冒于陽臣欺其君小人擅權下將叛上引譬甚切劉瑾怒矯㫖杖三十釋之源又言占得火星入太徵垣帝座前或東或西往來不一乞收攬政柄思患豫防蓋專指瑾也瑾大怒召而叱之曰若何官亦學為忠臣源厲聲曰官大小異忠一也矯㫖又杕六十謫戍肅州在道以創卒初源父宣在天順初以忠諫名天下及是源以小臣抗節尤為士論所重云質實楊源字本清豐城人以楊廷和為户部尚書兼文淵閣大學士預機務廷和先為詹事附經義指斥近幸劉瑾惡之傳㫖改南京吏部侍郎尋遷南京户部尚書及是帝問楊學士何在瑾以南京户部對乃召入閣質實楊廷和字介夫新都人戊辰三年春正月大計外吏太監劉瑾以中㫖黜翰林學士吳儼御史楊南金儼家多資瑾遣人求金啖以美官儼峻拒瑾怒南京素清鯁都御史劉宇惡其不阿已笞辱之南金憤甚告疾去宇讒于瑾瑾亦怒之時方考察朝覲官瑾忽批奏尾勒儼致仕黜南金為民初瑾每奏事必伺帝為戲弄時帝厭之即揮去曰吾用若何事乃溷我自此大小事瑾皆專决不復白帝及是奏出中外莫不駭異瑾不學批答章奏皆持歸私第與妹壻禮部司務孫總松江市儈張文冕相參决聰文冕不能文辭率鄙冗焦芳為潤色之已而瑾威權日甚內外章奏先具紅揭投瑾號紅本然後上通政司號白本皆稱劉太監而不名都察院奏讞誤名瑾瑾怒甚屠滽率屬跪謝乃已公侯勳戚以下莫敢鈞禮每私謁相率跪拜其熏灼如此質實吳儼字克溫宜興人楊南金鄧川人夏四月前太子太保吏部尚書王恕卒恕揚厯中外五十餘年剛正清嚴始終一致所引薦耿裕彭韶何喬新周經李敏張悅倪嶽劉大夏戴珊張懋等皆一時名臣他賢才久廢草澤者拔擢之恐後𢎞治十八年間衆正盈朝職業修理號為極盛者恕力也帝嗣位遣行人齎敕存問賚羊酒益廪𨽻且諭以讜論無隱恕陳國家數事帝優詔報之至是卒年九十三訃聞輟朝贈特進左柱國太師諡端毅六月太監劉瑾執朝官三百餘人下獄午朝退有遣匿名書于御道數瑾罪者瑾矯㫖召百官跪奉天門下頃之令堂上官起瑾出立門左翰林跪白于瑾亦令起御史寧杲訴曰某等素知法度豈敢為此此或新進士所為瑾曰與新進士何預繇若輩壞朝廷事吾整治之遂懷怨望若輩豈未聞太祖法耶是日酷暑太監李榮乘瑾入以氷瓜啖羣臣曰君等且起比瑾出榮曰來矣速就跪瑾瞥見之怒太監黃偉憤甚謂諸臣曰書所言皆為國為民事挺身自承雖死不失為好男子奈何枉纍他人瑾怒曰匿名書罪已當死况置之御道是何好男子耶即日逐偉南京勒榮閒住及日暮盡收下錦衣獄凡三百餘人明日大學士李東陽等力救瑾亦亷知其同類所為衆獲免而主事何釴等三人已暍死時瑾恣行凶暴嘗以尚寶司卿崔璿副使姚祥郎中張瑋違制乘肩輿荷重校幾死亦賴東陽等申敕始釋而戍之其他庶官以荷校死者甚衆質實寧杲蓬萊人崔璿里貫無考按雷禮列卿記璿于正德元年任尚尚寶司卿姚祥歸善人張瑋字嘉玉蘇州衛人發明瑾因匿名書數已罪敢于矯旨召百官長跪甚至有署甚暍死者瑾之橫至此極矣向非亷知其同類所為則此下獄之三百餘人遭其慘毒當更有不可言者觀其書不出于外人而即出于其儕黨益信衆怨所歸人心不昧雖若輩亦知其為法所不容而武宗乃恣其所為而不之覺可謂好惡與人殊矣至翰林官怵于凶焰竟至跪白乞憐而寧杲身為御史脂韋其辭以訴且欲嫁禍于新進士尤為可鄙轉不若黃偉數言猶能抗直何士氣之委靡一至于此哉秋八月立內厰時東西厰緝事人四出江西南康民吳登顯等端午競渡造龍舟捕之籍其家偏州下邑因見華衣怒馬作京師語者輒相驚告官司密賂之以求免禍道路惶懼人不貼席劉瑾意猶未逞復立內厰自領之尤酷烈中人以徽法無得全者凡所逮捕一家犯鄰里皆坐或瞰河居者以河外居民坐之屢起大獄寃號相屬矯㫖悉逐京師客傭命寡婦盡嫁喪不葬者焚之于是輦下且􅍅洶矣太監劉瑾創罰米法瑾憾前尚書韓文甚捃托萬端㑹戶部偶遺故籍欲以為文罪屬尚書顧佐上其事委咎于文佐不可奪佐俸三月聽致仕去而逮文及侍郎張縉下錦衣獄數月始釋詗知文亷家素貧因創罰米法以困之罰文千石輸大同縉五百石輸宣府尋又假他故罰罰文米再家業蕩然自是朝官忤瑾者悉誣以舊事米輸邊刻期完納稍緩輒罪之時雍泰自操江擢南京户部尚書瑾怒泰與已同鄉不通問擢任甫四日即令致仕謂吏部尚書許進私泰削其籍追斥前尚書馬文升劉大夏及給事中趙士賢御史張津等為民其他罰米者五十餘人皆嘗薦泰者瑾日以朘削為事索巡鹽官賄不當意責令補償商課追論及前任者御史彭程嘗于孝宗時巡兩浙鹽久物故家止遺一孫女罄産不足償則並女鬻之行道皆為流涕質實雍泰字世隆陜西咸寧人張津字廣漢博羅人九月逮前兵部尚書劉大夏下獄戍肅州初孝宗時大夏在兵部劉宇為大同巡撫宇私市善焉賂遺權要大夏于宴見時為孝宗言之宇聞深憾大夏及是與焦芳譖于劉瑾曰籍大夏家可當邊費十二遂假田州土官岑猛事逮繫錦衣獄岑猛于孝宗時與思恩土官岑濬相仇殺濬尋伏誅大夏議以思恩田州俱設流官猛世濟凶惡宜降千户徙之福建而猛逗遛不肯行及是納賄于瑾求復故地瑾許之遂興是獄欲坐大夏激變論死閣臣王鏊曰岑氏未叛何名激變都御史屠滽亦言劉尚書無死法瑾謾罵曰即不死可無戍耶瑾亦詗大夏家實貧乃坐戍極邊初擬廣西芳曰是送之歸也遂改肅州大夏年已七十三徒步荷戈至大明門下叩首而去觀者嘆息泣下大夏至戍所遇團操輒就伍所司固辭大夏曰軍固當役也瑾猶托事罰米輸塞下者再後遇赦歸及瑾誅復原官致仕冬十月振湖廣河南饑遣南京工部右侍郎畢亨兼僉都御史往監振事是年南京鳯陽府皆饑亦命振之己巳四年春二月黜前大學士劉健謝遷為民初健遷在內閣時詔天下舉懷才抱德之士至是浙江大吏以餘姚周禮徐子元許龍上虞徐文彪四人應詔劉瑾焦芳方日偵察健遷過無所得遂以禮等皆遷同鄉而草詔由健欲用此為二人罪矯㫖為天下至大豈無應詔者何餘姚處士之多耶乃下禮等鎮撫司獄屬主者周內入健遷欲遂逮二人籍其家東陽力解芳從旁厲聲曰縱輕貸亦當除名㫖下果如芳言禮等咸戍邊尚書劉宇復劾兩司以下訪舉失實皆罰米輸塞下且榜禁餘姚人不得選京官是年十二月都給事中李憲復請奪健遷及尚書馬文升劉大夏韓文許進署誥命詔并追還所賜玉帶服物同時奪誥命者六百七十五人希瑾芳之㫖也時芳附瑾勢日逞私憾芳先以尹旻黨被謫疑出彭華意銜江西人次骨尋有滿剌加使臣亞劉夲者故江西萬安人本姓蕭名明舉逃罪至海外依滿剌加與其國人端亞智等來朝既而謀入浡泥國索寶物且殺亞智等事聞方下所司劾奏芳即署其尾曰江西土俗故多玩法如李孜省彭華尹直等素被物議宜裁減解額十五名通籍者勿選京職著為令且言王安石禍宋吳澄仕元宜榜其罪使他日毋得濫用江西人楊廷和解之曰以一奸民波及一方既裁解額矣宋元人物亦欲併案耶乃止芳深惡南人雖論古人亦必詆南譽北嘗作南人不可為相圖進瑾其總裁孝宗實録若何喬新彭韶謝遷皆肆誣詆自喜曰今朝廷之上誰如我直者芳欲自私其鄉人以劉瑾乃陜西人諷給事中趙鐸奏言鄉試額不均遂票㫖增陜西額為百以媚瑾增其鄉河南為九十五並及山東西俱增至九十其徇私變法類如此瑾芳敗皆復舊制質實徐姚秦縣元升州明復為縣上虞秦縣隋廢唐復置明與餘姚並屬紹興府萬安宋縣明屬吉安府今俱因之浡泥在西南海中自占城四十日可至初屬爪哇後屬暹羅周禮字德恭著有續綱目發明李憲岐山人趙鐸曲沃人命給事中張禬等勾稽天下錢糧先是諸司官朝覲至京畏瑾虐焰恐罹禍各斂金賂瑾每省至二萬餘往往貸于京師富豪復任後倍償之名曰京債上下交征恬不為異瑾私人張練見瑾急賄天下怨刺骨因乘間說曰公亦知賄入所自乎非盜官帑即剝小民彼借公名自厚入公者未十一而怨悉歸公何以謝天下瑾大然之乃分遣襘等十四人盤察南北直𨽻各行省錢糧蓋欲掩其跡也而下御史胡節按山東還猶循故事厚遺瑾瑾發之捕節獄少監李宣侍郎張鬻指揮同知張良醵白金二萬為餽瑾納金于官按三人罪其他因賄得罪者甚衆方瑾急賄時出使官皆索重賄給事中周鑰勘事淮安與知府趙俊善俊許貸千金既而不與鑰計無所出舟行至桃源自刎從者救之已不能言取紙書趙知府誤我遂卒事聞繫俊至京責鑰死狀竟坐俊罪至是索賄之風少衰然禬等四出率務誅求有司爭厚斂以補帑所在騷然已而遣使核各邊屯田希瑾意者詭增田數搜括慘毒户部侍郎韓福尤峻急遼卒不能堪脅衆為亂守臣發帑撫慰之乃定給事中徐仁等劾福奉行過當瑾迫公議勒福致仕時瑾專事苛刻先後出使盤察者或不知迎合輒得譴給事中安奎潘希曾御史張彧劉子厲以無重劾下獄奎或荷校頻死大學士李東陽疏救始釋為民希曽子厲亦皆杖斥于是競為摶擊給事中髙淓劾滄州地所劾治六十一人淓父銓嘗為巡撫保定滄州其所𨽻也淓至誣劾其父以媚瑾士論鄙之質實桃源金以宿遷縣之桃園鎮地置准濵縣後省元復置桃園縣後訛園為源明屬淮安府今因之張緑安定人胡節零陵人周鑰海陽人趙俊內江人韓福西安前衛人徐仁慈溪人潘希曽金華人張彧元氏人劉子厲安福人高淓江都人發明朝覲官斂金賂瑾假貸京師富豪獲倍稱之息遂有京債之名又何異前代之稱債帥者乎顧瑾惟知黷貨而心計殊疏自張綵善為進說其取愈盈其術愈巧而孰知欲蓋彌張烏能掩其惡哉至盤察之使四出核邊之舉日聞誅求搜括假釐剔之名濟溪壑之欲然且饋遺得罪納金入官務使人主深信其公忠而後得行其私計小人之工子固結主知如此觀瑾得罪時武宗往籍其家親見金銀珠王無算而後為之大恕則其平日之以術自衛者亦張綵之力居多耳夏四月罷大學士王鏊時中外大權悉歸劉瑾鏊初開誠與言間聽納而焦芳專事媕阿瑾橫彌甚鏊不能救力求去疏三上許之家居十四年廷臣交薦竟不起一鏊博學有識鑒文章爾雅議論明暢晚著性善論篇王守仁見之曰王公深造世未盡知也少善制舉義後數典試程文冠一時取士尚經術險詭者一切屏去文體為一變明代舉子業最擅名者前則鏊與唐順之後則歸有光胡友信也質實唐順之字應德武進人歸有光字熙甫崑山人胡友信字成之德清人五月改翰林官吳一鵬等于兩京六部時孝宗實録成內閣援㑹典故事請序遷編纂諸臣劉瑾矯㫖以劉健等前纂修㑹典多糜費皆追奪陛職大學士李東陽亦與馬居數日乃以實録功復東陽職因附批調侍講吳一鵬于南京刑部侍讀徐穆于南京禮部編修顧清于南京兵部汪俊于南京工部皆員外郎編修賈諫李廷相于兵部溫仁和于户部劉龍于禮部翟鑾董玘于刑部崔銑于南京吏部陸深于南京禮部檢討王九思于吏部汪偉穆孔暉于南京禮部易舒誥于南京户部皆主事始瑾惡翰林官不下已欲盡出之外為張綵勸沮及是又持前議綵復力沮而焦芳父子與檢討假炅輩謂可乘此以擠所不悅者乃疏名上之瑾慫恿成之謂之擴充政事然王九思實瑾黨既改部甫踰年擢至郎中瑾敗謫夀州同知尋復被劾致仕質實孝宗實祿二百二十四卷正德元年劉健謝遷等奉詔修健遷去位李東陽焦芳等續修吳一鵬字南夫長洲人徐穆吉水人顧清字士亷華亭人汪俊字抑之弋陽人賈誺字鳴和臨穎人李廷相濮州人溫仁和華陽人劉龍襄垣人翟鑾字仲鳴諸城人董圯㑹稽人崔銑字子鐘安陽人陸深字子淵上海人汪偉字器之俊弟也穆孔暉堂邑人易舒誥攸縣人假炅陽曲人六月以吏部尚書劉宇兼文淵閣大學士預機務以張綵為吏部尚書宇旋罷初宇介焦芳以結瑾自宣大總督入為左都御史瑾好摧折臺諌宇輒以小過笞御史瑾以為賢瑾始通賄望不過數百金宇首以萬金贄瑾大喜曰劉先生何厚我遂轉兵部尚書加太子太傅字子仁應殿試求一甲不得厚賄瑾內批授庶吉士踰年授編修時許進為吏部尚書宇讒于瑾遂代其位宇在兵部時賄賂狼籍及為吏部綵方仕選郎權勢出宇上文吏贈遺又不若武辨嘗悒悒歎曰兵部自佳何必吏部也至是瑾欲用綵代宇乃令宇入閣宇宴瑾閣中極歡明日將入閣任事瑾曰爾真欲相耶此地豈容再入宇不得已乞省墓去綵議論便利善伺權貴指初矯飾徼聲譽尚書馬文升等皆愛之給事中劉瑾嘗劾其顛倒選法數事文升悉為辨析綵即五疏移疾歸及瑾用事焦芳以綵與瑾同鄉力薦于瑾瑾欲致之因著令病過期不赴者斥為民綵乃就道既見瑾髙冠鮮衣貌白晳修偉詞辨泉湧瑾大敬愛執手移時曰子神人也我何以得遇子綵自是一意事瑾由郎署三遷遽長六卿每瑾出休沐公卿往候自辰至晡未得見綵故徐徐來直入瑾小閣歡飲而出始揖衆人衆以是益畏綵見綵如瑾禮綵與朝臣言呼瑾為老耆凡所言瑾無不從綵恣意變亂舊格賄賂肆行海內金帛竒貨相望塗巷間性尤漁色撫州知府劉介其鄉人也娶妾美綵特擢介太常少卿盛服往賀曰子何以報我介惶恐謝曰一身外皆公物綵曰命之矣即使人直入內牽其妾輿載而去又聞平陽府知府張恕妾美索之不得令御史張禴按致其罪擬戍恕獻妾始得論減其橫如此質實劉介清澗人張恕霸州人張禴平谷人秋閏九月小王子寇延綏圍總兵官吳江于隴州城尋解去復入犯花馬池總制尚書才寬率師禦之頗有斬獲狃勝深入敵伏兵突出寬中流矢死總兵官曺雄擁兵不救佯引罪乞解兵柄令子謐齎奏詣京師瑾異謐貌妻以從女優詔褒雄令居職如故糾者反被責既而遣給事中郗䕫核延綏戰功瀕行瑾有所屬䕫念從之則達國典不從則得禍竟自經死顒時瑾毒虐搢紳廷臣自經死者又有馮顒許天錫以事忤瑾為瑾所誣因自經天錫于前年春使安南還見朝事大變敢言者皆貶斥而瑾肆虐加甚天錫大憤奉命請核內庫得瑾侵匿數十事知奏必罹禍乃夜具登聞鼓狀將以尸諫令家僮于身後上之逆自經僮匿其狀而遁或曰瑾偵知天鍚將發其罪夜令人縊殺之莫能明也㑹有㫖令錦衣衛㸃閲六科給事中不至者劾之錦衣帥劾天鍚三日不至訊之死矣聞者哀之質實才寬字汝栗遷安人曹雄西安左衛人郗䕫平定人湖廣江西四川盜起時連歲饑饉四方盜賊並起湖廣則沔陽賊楊清邱仁等出沒湖湘間江西則東鄉賊王鈺五徐仰三等姚源賊汪澄二王浩八等華林賊羅光權陳福一等各據山寨而贛州大帽山賊何積欽等復蔓延福建廣東之境四川則保寧賊藍廷瑞自稱順天王鄢本恕自稱刮地王廖惠自稱掃地王各擁衆至數萬官軍討之不能克羣盜遂日熾質實東鄉本臨川金溪及進賢餘千安仁之遂鄙明正德八年置縣屬撫州府今因之姚源洞在萬年縣東里許深可十五里華林山在瑞州府西北七十五里山周百里大帽山在長寧縣南二百里山綿亘數百里界江西及福建廣東三省之交庚午五年春二月以曹元為吏部尚書兼文淵閣大學士預機務元柔佞滑稽不修士行與劉瑾有連自瑾侍東宫即與相結及瑾得志遂夤緣躐位至兵部尚書兼督團營加太子少保將校遷除皆惟瑾命元所入亦不資至是遂代劉字入閣瑣瑣無能在閣終日飲酒諧謔道里巷鄙語而已質實曹元字以貞大寧前衛人三月以刑部尚書洪鐘總制川陜河南鄖陽軍務沔陽賊楊清邱仁等圍嶽州陷臨湘鐘檄布政使陳鎬副使蔣升及都指揮潘勳柴奎擊破之湖湘成寧鐘遂移師入蜀蜀自眉州賊劉烈倡亂敗而逃諸不逞假其名剽掠巡撫林俊繪形捕莫能得藍廷瑞鄢本恕廖惠等繼起勢益張衆十萬餘僞暑四十八總管延蔓陜西湖廣之境廷瑞與惠謀據保寧本恕謀據漢中取鄖陽由荆襄東下俊方謀遏通江而惠已至攻陷其城殺參議黃瓚適官軍自他郡還賊疑援兵至遁去俊發土兵蹴之龍灘河賊墜崖溺水死者無算逆擒惠廷瑞本恕奔陜西西鄉越漢中至大巴山官軍追及復大破之㑹鐘至蜀與俊議不合軍機牽制而瀘州賊曹甫糾衆寇川南攻破江津僉事吳景典史張俊死之林俊聞亂自率兵馳救廷瑞等因乘間招集散亡遂于明年正月陷營山殺僉事王源勢復熾鐘乃檄陜西湖廣河南兵分道進勦而林俊以元日夜半掩擊甫營俘斬二千有竒甫衆潰解還兵與鐘㑹未幾湖廣兵敗賊于陜西之石泉廷端走漢中都指揮金冕圍之陜西巡撫藍章方駐漢中廷瑞遣其黨何虎詣章乞還川就撫章以廷瑞本川賊恐急之必致死陜且受患遂令冕護之出境廷瑞既入川求降鐘令至東鄉聽撫賊意在緩師遷延纍月依山結營要求營山縣地屯其衆且必欲得質方出見鐘竟以漢中通判羅賢為質本恕廷瑞乃先後來謁約既定剽如故旋以官軍殺其樵採為辭害羅賢欲遂脫走官軍為七壘守之不得逸廷瑞乃以所掠女子詐為已女結婚于求順土舍彭世麟冀得間逸去世麟密白鐘鐘授方略使圖之及期廷瑞本恕暨其黨王金珠等二十八人咸來㑹伏發悉就擒惟廖麻子得脫其衆聞變驚漬渡河鐘遣兵追擊俘斬七百餘人既而廖麻子與曹甫合掠營山蓬州甫黨方四陷南川綦江等縣攻江津薄重慶僉事馬昊以土兵擊四四敗奔婺川忽與甫不合自相攻衆遂散四變姓名走為他將所獲昊被奬進副使尋昊偕總兵官楊宏副使張敏何珊等擊甫大敗之賊勢日蹙時林俊數與鐘抵牾已乞休去鐘乃議招撫甫方約降而廖麻子忿甫背已殺之并其衆轉掠川東官軍不敢擊潛躡賊後馘良民為功土兵虐尢甚民間為之謡曰賊如梳軍如篦土兵如髳論者咸咎鐘之不能戢下云是時川陜皆苦兵州縣殘破守土官吏死賊者自吳景等外有扶風知縣孫璽劍州判官羅明梁山主簿時植營山典史鄧俊俊與王源同禦賊被殺璽奉藍章檄往城略陽工未畢賊至縣令嚴順欲去璽拔刀斫坐几曰欲去者視此乃率寮屬堅守數日城陷璽被執大罵不屈賊臠殺之順逃去誣璽俱逃謂溺于江以他人尸斂璽子啓視非是訟之朝勘得死節狀贈光祿少卿賜祭豫廕抵順罪明以吏起家鄢本恕逼其城與子介拒守城陷父子皆罵賊死植死方四之難妻賈聞變即自縊女九嵗赴火死明植皆贈恤如制植妻女表為貞烈又有士民冒死殺賊為趙趣徐敬之袁璋之屬趣梁山諸生賊攻城同友人黃甲李鳳何璟蕭鋭徐宣楊茂寬趙采誓死拒守城陷皆死林俊嘉其義立祠祀之敬之亦梁山人衆推為部長以拒賊陷陳死璋江南人素以勇俠聞林俊委之勦賊所在有功後為賊執其子襲挺身敕之連殺七賊亦被執俱死襲死三日兩目猶瞪視其父林俊表其門曰父子忠節質實臨湘宋縣明屬嶽州府通江漢宕梁縣地西魏分置渃水縣唐改縣曰通江明屬保寧府今並因之龍灘河在昭化縣南二里嘉陵江之所經也大巴山在四川南江縣北二百里陜西漢中府西南一百九十里其山延綿深廣南接小巴山瀘州渠置元隸重慶路明直𨽻四川布政司江津漢江州地西魏改江陽縣隋改江津明屬重慶府今皆因之營山唐折相如縣地置朗池縣宋改營山明屬蓬州今徑屬順慶府石泉梁永樂縣西魏改石泉明屬興安州東鄉梁縣元廢明正德九年復置屬逹州蓬州後周置明屬順慶府今皆因之南川唐置綦江元置綦江長官司明玉珍據蜀置縣明與南川並屬重慶府今因之婺川隋置務縣唐改務川縣為務州治元曰婺川明屬思南府今屬思州府劍州唐改始州置明初省入梓潼尋復置屬保寧府今因之梁山西魏置元升州明復為縣屬夔州府今改屬忠州陳鎬㑹稽人蔣升祁陽人黃瓚儀其人吳景南陵人王源五臺人藍章即墨人羅賢清源人彭世麟永順宣慰使世麒之弟馬昊本姓鄒字宗大宣夏人張敏祁門人何珊六安入孫璽字廷信代州人時植字良材通許人給事中屈銓請頒行劉瑾新例為令銓請以六部為序編集成書頒布中外俾世為遵守詔下廷臣議行時瑾所創新例變亂成憲擅作威福天下側目重足朝不謀夕而銓乃承望風㫖助瑾為虐廷臣鄙之共欲緩其事國子祭酒王雲鳯復以為請將刋行而瑾敗質實屈銓蒲城人發明瑾以私智擅威福之權紊典章之舊其所施行一時已為側目又豈可埀諸久逺貽毒將來且令者人君所自撡渙大號而昭示中外海宇共之子孫守之尤非閹宦所得假竊者屈銓恬不知恥請將瑾所創例編集頒行以獻媚于逆璫可謂小人之尤者矣乃武宗亦竟詔下廷議廷臣雖明知其不可而亦竟議行但欲姑緩其事向令逆瑾不敗則其事能終緩乎武宗之深信不疑若是諸臣之依違遷就又若是何怪乎王雲鳯之復請乎雲鳯在孝宗時嘗以劾宦官得罪而一旦易節盡反所為憸人矯飾一時末節盡露良足哂矣夏四月安化王置鐇反遊擊將軍仇銊討平之置鐇素枉誕術者言其當大貴遂覬覦非分與其黨指揮周昻千户何錦丁廣衛學生孫景文輩潛蓄逆謀適大理寺少卿周東度寧夏屯田以五十畝為一頃又畝斂銀為瑾賄敲撲慘酷戍將衛卒皆憤怨而巡撫安惟學素殘虐將士銜刺骨置鐇知衆怒令景文飲諸武臣酒以言激之多願從置鐇者㑹有邊警銊與副總兵楊英率兵出防禦總兵官姜漢簡鋭卒六十人為牙兵令周昻領之昻遂與何錦為置鐇定計設宴抬鎮巡官飲于第惟學東不至錦昻率牙兵直入殺姜漢及太監李增鄧廣于坐分遣丁廣等殺惟學東于公署遂焚官府釋囚繫撤黃河渡船于西岸以絶渡者即使人招楊英仇鉞降英衆潰單騎奔靈州鉞時駐玉泉營佯許之引兵入城置鐇奪其軍分𨽻羣賊出金帛犒將士僞署昻等官有差令孫景文作檄以討劉瑾為名檄至諸鎮皆畏瑾不敢以聞延綏巡撫黃珂封上之因陳便宜八事急令副總兵侯勛參將時源分兵扼河東陜西總兵官曹雄聞變遣指揮黃正駐靈州檄楊英督靈州兵防黃河而指揮韓斌亦以兵來㑹雄更遣靈州守備史鏞浮渡奪西岸船營河東焚大小二壩草賊大懼賊既奪鉞軍銊歸卧家稱疾賊以鉞解兵柄信無他時時就聞計鉞亦謬輸心腹而隂結壯士伺問圖之㑹史鏞潛通鉞書約為內應鉞因紿錦廣宜急出兵守渡口遏東岸官軍勿使渡河錦廣杲傾營出獨留昻守城置鐇以禡牙召鉞鉞稱病亟昻來視鉞方堅卧呻吟伏卒猝起捶殺昻鉞乃被甲橫刀提其首躍馬大呼壯士皆集徑馳詣置鐇第縳之傳置鐇令召錦廣還而密諭其部曲以擒置鐇狀衆遂大潰鉞啓城迎官軍入錦廣走賀蘭山為邏卒所獲賊平蓋置鐇叛十有九日而敗先是中朝聞變議以右都御史楊一清總制軍務太監張永督軍神英為總兵官鉞為副俄傳鉞降賊欲追敕還大學士楊廷和曰鉞必不從賊令知朝廷擢用志當益堅不然棄良將資敵人耳乃不追事果定已而一清永至寧夏檻送置鐇京師賜死黨皆誅鉞論功封咸寧伯丁廣之殺惟學也都指揮僉事楊忠在側罵曰賊狗敢犯上邪廣怒殺之迄死罵益厲忠同官李睿聞亂馳至置鐇所門閉不得入大罵為賊所殺百戶張欽不從逆走至雷福堡亦被殺皆贈官豫廕表忠睿曰忠烈之門欽曰忠節之門質實黃河在寧夏東南四十里自中衛縣流入界過峽口而東至靈州北又折而東北出府界玉泉營在寧夏府西百三十里雷福堡在楊顯堡西北楊顯堡在府西南三十里置鐇慶靖王第四子安化王秩炵之孫仇鉞字廷威鎮原人周東阜城人安惟學臨汾人姜漢榆林衛人黃珂字鳴玉遂寧人楊忠寧夏人神英夀州人官右都督賂劉瑾封涇陽伯五月焦芳罷芳居內閣五年凡劉瑾濁亂朝政荼毒搢紳流惡海內皆芳導之每過瑾言必稱千歲自稱曰門下凡所可否與瑾出一口四方賂瑾者率先賂芳子黃中亦傲狠不學廷試必欲得第一李東陽王鏊為置二甲首芳不悅言于瑾徑授檢討俄進編修芳以黃中故時時詈東陽瑾聞之曰黃中昨在我家試石榴詩甚拙顧恨李耶始芳薦張綵以悅瑾覬其為奸利比綵為尚書芳父子鬻爵薦人無虛日綵頗厭之遂有隙而段炅見瑾昵綵芳勢稍衰轉附綵盡發芳隂事于瑾瑾大怒數于衆中斥責芳芳不得已乃乞歸黃中丐誾廕以侍讀隨父還瑾敗言官交劾削其官黜黃中為民久之芳使黃中齊金寶遺權貴上章求湔雪復官為吏科所駁于是吏部覆奏請下黃中法司以彰天討黃中狼狽遁走芳居第宏麗治作勞數郡大盜趙鐩入泌陽火之發窖多得其藏金乃盡拙其先廷人冢墓雜燒以牛羊骨求芳父子不得取芳衣冠被樹拔樹斫其首使羣盜糜之六月前吏部尚書馬文升卒文升歸後瑾既以其嘗薦雍泰坐朋黨除名及是卒年八十五未幾瑾誅復官贈特進光祿大夫太傅諡端肅之文升有文武才朝端大議往往待决功在邊鎮外國皆聞其名帝自稱大慶法王帝于佛經梵語無不通曉自稱大慶法王西天覺道圓明自在大定慧佛命所司鑄印以進番僧因乞因百頃為法王下院中㫖下禮部稱大慶法王與聖㫖並尚書傅圭佯不知執奏孰為大慶法王敢與至尊並書大不敬詔勿問田亦竟止質實傅圭字邦瑞清苑人發明梁武篤信釋教設無遮大㑹捨身同泰寺貽譏史冊為世非笑猶未嘗以佛自名也武宗昵宵小事遊佚本非潛心釋典者其稱大慶法王亦不過習見元明以來番僧封號心焉自喜遂不恤屈萬乘之至尊襲緇流之崇奉其視天位直等之兒戲其視天下事無不可恣意為之者希名禪覺示現梵王猶其小焉者也秋八月太監劉瑾伏誅初瑾于八黨中尤狡猾為七人所推及專政七人有所請瑾俱不應咸怨之又嘗欲逐張永南京永知之直趨帝前訴瑾陷已帝召瑾與質方爭辨永輒奮拳毆瑾帝令谷大用等置酒為解由是二人益不合永督軍西征帝戎服送之東華門寵遇甚盛瑾愈忌之而帝方嚮永不能間也既至寧夏一清與永結納相得甚歡知永與瑾有隙乘間扼腕言曰賴公力定反側然此易除也如國家內患何遂促席畫掌作瑾字永難之一清慷慨曰公亦上信臣討賊不付他人而付公意可知今功成奏捷請問論軍事因發瑾奸極陳海內愁怨恐變生心腹上英武必聼公誅瑾瑾誅公益柄用悉矯弊政安天下心吕強張承業暨公千載三人耳永曰脫不濟奈何一清曰言出于公必濟萬一不信公頓首據地泣請死上前剖心以明不妄上必為公動苟得請即行事毋須臾緩永勃然起曰老奴何惜餘年不以報主哉意遂决時瑾信術士俞曰明言謂其從孫二漢當大貴遂謀不軌㑹瑾兄都督同知景祥死將以八月十五日俟百官送葬因作亂及永捷疏至請以是日獻俘瑾使緩其期欲事成並摛永或馳告永永先期入獻俘畢帝置酒勞永瑾等皆侍及夜瑾退永密白瑾反狀且出䄂中奏數其不法十七事帝已被酒俯首曰奴負我永曰此不可緩緩則奴輩當虀粉陛下安所歸乎馬永成等亦助之乃命執瑾夜啓東華門繫瑾菜厰復分遣官校封瑾內外私第明日出永奏示內閣謫瑾奉御鳯陽聞住帝猶未欲誅之已親籍其家得金銀數百萬珠玉寶玩無數及衮衣玊帶甲仗弓弩諸違禁物又所常持扇內藏利匕首二帝大怒曰奴果反趣付獄於是給事中謝納御史賀泰等請亟賜誅戮帝是之命百官㑹鞫午門外瑾私人都給事中李憲至是亦劾瑾瑾聞之笑曰憲亦劾我耶鞫之日刑部尚書劉璟猶噤不敢發聲瑾大言曰公卿多出我門誰敢問我者皆稍稍郤避駙馬都尉蔡震曰我國戚得問汝即使人批瑾頰曰公卿皆朝廷用云何繇汝抑汝何藏甲也曰以衛上震曰何藏之私室瑾語塞獄具詔毋覆奏磔之市三日怨家爭購其肉生噉之二漢及張文冕等俱伏誅張綵獄斃磔其尸二漢臨刑曰吾死固當第吾家所為皆焦芳與張綵耳我處極刑綵銼尸而芳獨宴然豈非寃哉芳後竟良死質實謝訥襄陽人賀泰字志同吳縣人劉璟鄢陵人蔡震尚英宗女淳安公主史稱震行醇謹以鞫瑾獄知名曹元以罪免劉瑾敗元即日上疏請罪詞極哀詔許致仕言官交劾黜為民於是諸附瑾者前戶部侍郎韓福戍固原前閣臣焦芳劉宇及户部尚書劉璣等六十餘人黜降有差凡忤瑾謫戍諸臣皆釋還福前奉使理湖廣軍餉饋瑾白金數十萬兩比籍瑾家猶封識宛然故論戍九月以吏部尚書劉忠梁儲並兼文淵閣大學士預機務忠先與楊廷和同侍經筵為劉瑾所嫉出為南京禮部左侍郎尋進尚書就改吏部焦芳薦之召還瑾見忠頗負氣岸甚悔乃傳㫖以吏部尚書兼翰林學士專典誥敕儲為學士時嘗與修㑹典及為吏部尚書瑾摘㑹典小疵降左侍郎復尚書調南京吏部至是瑾敗二人遂同召入閣質實劉忠字司直陳留人梁儲字叔厚廣東順德人封太監張永谷大用馬永成魏彬兄弟及義子指揮同知朱德皆為伯帝以永敉寧中外兩建竒功賞止其身于典未稱下兵部議尚書王敞請封其兄弟乃以永兄富為泰安伯弟容為定安伯越十五日又封義子德為永壽伯大用兄大寬為高平伯永成兄山為平京伯彬弟英為鎮安伯鉞已而谷大用陸誾冒平流賊功乞蔭其弟姪視仇平置鐇例封伯下兵部議部臣以仇鉞獨出竒謀削平僭亂故得封拜今羣賊殄滅非一人功不可以鉞比况平賊諸將若劉暉郤永輩馳驅戰陳出萬死一生叙功不遇都督等官兩中官子弟承廕反居諸將右無以服衆心帝不從令再議兵部請視錢寧例擢右都督又不從集廷臣議之皆請如兵部後議帝曰門庭凶寇纍征不捷賴大用誾相總討平其封大亮永清伯永鎮平伯質實明恩澤侯表永夀伯朱德與泰安伯張富等並正德十六年革爵明實録德不知其所出初為裴監厮養冒裴姓能造西域食餌賜姓朱英非彬弟冒魏姓王敞字漢英應天人發明張永督軍西征實成仇鉞已成之功其去劉瑾亦貪于楊一清所云瑾去公必柄用之一語有何竒勳而以為賞止其身于典未稱乎前此宦官子弟封爵惟曹吉祥嗣子欽一人未幾而即以謀反誅矣永兄弟並封其視吉祥尤為過之至谷大用輩既無軍旅之勞而義子朱德且賜國姓一例推恩名器之濫一至于是其後谷大用陸誾並援寧夏之例請封弟姪雖以部臣執奏而猶盛稱其功必封之而始快讀恩澤侯表武宗之視五等之庸真若無足重輕者也冬十月霸州盜起霸州文安人劉六名寵其弟七名宸並驍悍善騎射先是畿輔多盜馳馬鳴箭號曰響馬有司患之召寵宸及其黨楊虎齊彥名等協捕頻有功㑹劉瑾家人梁洪徵賄于寵等不得誣為盜令捕之乃投大盜張茂茂素招納亡命為逋逃主家與太監張忠鄰結為兄弟夤緣馬永成谷大用輩出入豹房侍帝蹴踘而乘間為盜如故後數為河間參將袁彪所敗茂窘求救于忠忠置酒私第招茂彪東西坐酒酣舉觴屬彪字茂曰彥實吾弟也自今毋相厄又舉觴屬茂曰袁公善爾爾慎毋犯河間彪畏忠唯唯而已既而茂為御史寧杲所擒斬寵等相率詣京師謀自首忠與永成為請于帝且曰必獻萬金乃赦寵宸不能應逃去及瑾誅有詔許自首寵等乃出詣官兵部奏赦之令捕他盜自效寵等憚要束未幾復出劫掠部檄下有司緝捕安肅知縣獲齊彥名繫之獄寵等率衆劫去遂叛旬日間號召至數千畿南大擾有趙風子鐩者故文安諸生寵等亂起鐩挈家匿渚中賊驅之登陸將汚其妻女鐩素驍健有膂力手格殺二賊賊聚執之遂入其黨為渠魁明年賊勢益橫詔以惠安伯張偉右都御史馬中錫帥京營軍討賊初出師間有斬獲然賊方熾諸將率畏懦莫敢當其鋒或反與之結參將桑玉嘗遇賊文安村中寵宸窘蹙跳民家樓上欲自剄而玉素受賊賂故緩之有頃齊彥名持大刀至殺傷數十人大呼抵樓下寵宸知救至出射殺數人玊大敗去參將宋振禦賊棗强不發一矢城遂陷死者七千人是時賊分其衆為二寵宸等自畿輔犯山東河南南下湖廣抵江西復自南而北直窺霸州楊虎等由河北入山西復東抵文安與寵等合縱橫數千里殘破州縣以百數所過若無人中鍚書生不習兵事偉亦統袴子見賊强諸將怯度不能破賊乃議招撫謂盜夲良民由中官貪黷所激若推誠待之可不戰降遂下令賊所在勿捕過勿邀擊饑渴則食飲之降者待以不死賊聞欲就撫相戒毋焚掠猶豫未定尋朝議以京軍弱徴調宣府延綏兵中錫欲戰則兵朱集欲無則賊時反覆終不得要領既建議主撫不能變㑹寵等聞邊兵且至退屯德州桑園中錫輿入其營與酒食開誠慰諭之衆拜且泣送馬為夀寵慷慨請降宸乃仰天咨嗟曰騎虎不得下今奄臣柄國馬都堂能自主乎遂罷㑹徑去復焚掠獨至故城戒毋犯馬都堂家由是言官交劾中錫謂其以家故縱賊下詔切責中錫猶持招撫之說以請兵部尚書何鑑謂賊誠解甲則貫死即不然毋為所誑而寵等終不降質實安肅漢為北新城縣宋置安肅軍兼置縣金改州明仍為縣屬保定府棗強漢縣明屬冀州今皆因之德州桑園方輿紀要桑兒園在德州北七十里良店水驛置于此馬中錫字天祿故城人張偉惠安伯升之曽孫𢎞治七年襲爵辛未六年春二月起左都御史陳金總制江西軍務江西盜起連年官軍屢失利金丁毋憂在籍詔起復原官總制軍務南畿浙江福建廣東湖廣文武將吏俱𨽻焉都指揮以下不用命者專刑戮是時東鄉姚源華林大帽山諸賊方熾金以屬郡兵不足用奏調廣西狼土兵久之兵至乃于明年二月先勦東鄉賊遣參議徐蕃等分屯要害令副總兵張勇土官岑猛等各統官兵土兵進擊屢敗之擒徐仰三馘王鈺五等俘斬萬計餘賊悉就撫旋移師姚源令參政董朴吳廷舉分營餘千安仁貴溪鄱陽樂平過賊親統軍搗其巢殷勇十重創死㑹張勇以土兵至毒弩射殺洪瑞七等俘斬五千餘人賊大窘而南贛巡撫周南既平大帽山賊亦以兵來㑹先是南徵集江西福建廣東三省兵于金勦東鄉之前一月督副使楊璋僉事凌相指揮孫堂義民林富等分道進討金亦遣副使王秩等助之于是江西兵從安逺入克其巢七擒斬賊渠何積欽羅得清王璘廣東兵從程鄉入克其巢九擒斬賊渠李四仔張番壇黃鏞張玊黃櫪保福建兵從武平入克其巢八擒斬賊渠謝得珠劉隆鍾章諸道斬獲賊黨無算大帽山平遂與金共搗姚源賊渠王浩八乞降金許之金初檄副使周憲討華林賊憲連破仙女雞公嶺諸寨先後斬獲千餘人乘勝進攻北門三戰賊稍郤與子幹先登逼之賊下木石如雨憲中槍幹前救力戰墮崖死憲創重被執罵不絶口賊支解之憲軍大潰南昌知府李承勛單騎入憲營衆乃復集金即檄承勛討之賊黨王竒聽撫搜其哀刃釋之置麾下竒感激誓死承勛遣竒密入寨說降其黨約期為內應至期勛率鋭卒五百人夜銜枚登山令竒前導歷重險抵賊壘羣賊方酣寢竒拔柵率衆入五百人大呼奮擊內應者起夾攻賊倉卒不知所為四奔山谷尋斬賊渠羅光權等華林亦平事在明年九月自金山兵勦東鄉甫八閲月破劇賦幾盡因即東鄉立縣並立萬年縣招降人居之然金雖屢破賊而所用土兵貪殘嗜殺剽掠甚于賊有巨族數百口闔門罹害者所獲婦女率指為賊屬載數千艘去民間謡曰土賊猶可土兵殺我金亦知民患之方倚其力不為禁又不能持亷軍資頗私入士民皆深怨焉質實餘千漢為餘汗縣汗讀若干劉宋改為餘干元升州明仍為縣安仁晉析餘汗縣地置晉興陳改安仁明與餘干並屬饒州府貴溪唐析弋陽縣地置明屬廣信府鄱陽秦為畨縣吳芮為番令稱番君是也漢置御陽縣明為撫州府治武平唐武平鎮閩改為場宋升縣明屬汀州府今皆因之仙女雞公嶺方與紀要云華林山有李八百洞諸蹟正德中陳福一作亂結寨山中周憲攻賊于仙女寨拔之又克雞公嶺進薄華林深入敗沒萬年明正德七年析鄱陽餘干樂平貴溪四縣地置屬饒州府今因之董䃼麻城人吳廷舉字獻臣其先嘉魚人祖戍梧州遂家焉周南字文化縉雲人凌相南通州人林富莆田人王秩崑山人李承勛字立卿嘉魚人夏四月罷大學士劉忠劉瑾既誅張永魏彬輩猶用事永嘗遣廖鵬謁忠忠僕𨽻遇之又郤其餽永大恨是年忠典㑹試帝摘試録中舛誤示李東陽忠知中官所齮乞省墓歸忠抵家再上章乞致仕報許秋八月以兵部侍郎陸完督邉兵討賊先是參將桑玉屢敗僉事許承芳乞濟師尚書何鑑奏遣都督同知張俊為副總兵與參將王琮統京軍千人助討往來近畿亦不能破賊而馬中錫駐德州張偉駐齊東久無功至是宣府延綏徴兵將集鑑乃請以完統之督邉將許泰卻求馮禎等勦賊是月二日己卯也越八日丙戌召偉中鍚還下獄論死抵桑玉受賄縱賊罪完師行至涿州忽傳賊犯固安且逼京師帝御左順門召閣臣及鑑諭曰賊在東師乃西出恐緩不及事因命鑑召完入衛完遂還趨固安檄泰永等擊賊霸州敗之賊南走京師解嚴指揮賀勇等再敗賊于信安副總兵馮禎復大敗之阜城分兵進擊賊東走圍滄州賊渠劉宸中流矢乃解而南陷山東縣二十楊虎兵亦北犯威縣新河完頻請濟師益發遼東山西兵逐賊賊南圍濟寧焚運舟轉寇曹州禎泰永斬二千餘人獲其魅朱諒捷聞中官谷大用張忠意賊旦暮平乃自請督師詔以大用總督軍務伏羌伯毛鋭充總兵官忠監神鎗統京軍五千人往與完㑹勦比出師知賊方熾駐臨清不敢進時劉寵等縱橫沂莒間而楊虎陷宿遷執淮安知府劉祥靈璧知縣陳伯安連陷虹永城虞城夏邑及歸德州邉兵追及賊逼至小黃河渡口百户夏時設伏蹙之虎溺死餘賊奔河南推劉惠為首大敗副總兵白玉軍攻陷沈邱殺都指揮王保執都指揮潘翀北陷鹿邑有陳翰者與寧龍謀奉惠為奉天征討大元師趙鐩副之翰自為侍謀軍國重務兀帥府長史與龍立東西二厰治事分其軍為二十八營以應列宿各置都督聚衆至十三萬欲共出以牽制官軍于是惠鐩擾河南劉寵兄弟及齊彥名等擾山東黨分為二已而寵復轉而北永敗之濰縣還走霸州㑹明年正月帝將有事南郊賊遂謀以十二月朔伺帝省牲乘間犯駕鑑立奏聞急召完赴援即夜嚴設守備厥明帝召問鑑鑑請早出安人心遂成禮退賊知有備西掠保定諸州縣以去完擊破之文安賊南至湯隂完又督諸將追敗之先後俘斬千人是時賊黨雖衆然多脅從者精鋭不過千餘人自兵部下首功令官軍追賊賊輒驅良民當之急則棄所掠逸去官軍所殺皆良民故捷書屢奏而賊勢不衰賊所過州縣率閉城守或棄城遁或遺之芻粟弓馬乞賊毋攻樂陵知縣許逵慨然為戰守計縣初無城督民版築不踰月城成令民屋外築牆牆高踰簷啓圭竇才容人家選一壯者執刃伺竇內餘皆入隊伍日視旗為號違者軍法從事又募死士伏巷中泂開城門賊果至旗舉伏發竇中人皆出賊大驚擾斬獲無遺後數犯數郤之遂相戒不敢近事聞進秩二等達之外知縣能抗賊者益都則牛鸞郯城則唐龍汶上則左經濬則陳滯然所當賊少而逵屢禦大賊有功遂與鸞俱超擢兵備僉事逵駐武定州州城圮濠平不能限牛馬逵築城鑿池設樓櫓置巡卒尋楊虎妻崔氏曰楊寡婦者以千騎犯利津濰縣指揮喬剛禦之賊少郤逵追敗之髙苑令指揮張勛邀之滄州先後俘斬二百七十餘人未幾賊别部掠德平逵盡殱之威名大著質實齊東本鄒平縣地宋于縣之趙岩口置齊東鎮元改縣明屬濟南府固安漢方城縣地隋改置固安縣元升州明復為縣屬順天府今皆因之信安方輿紀要信安灣在天津西此即潛河曲拆處明正德中賀勇遏劉六等于此阜城漢縣明屬河間府威縣漢廣平國斥章縣地元自升陘縣移威州治此明改縣屬廣平府虹縣漢夏邱縣地唐置虹縣明屬鳯陽府虞城漢虞縣隋改虞城明屬歸德府今皆因之沈邱唐析項城縣地置明洪武初廢孝宗十年復置屬陳州今屬陳州府小黃河渡口在宿遷縣東南十里睢水合于黃河謂之睢口今亦曰小河渡口鹿邑漢鄲縣地隋置鹿邑縣明屬歸德府今因之濰縣漢密縣地