屬徐州府應山隋縣明洪武初省尋復置屬隨州今屬德安府丁村集在項城縣東三十里彭澤字濟物蘭州人神周夀州人涇陽伯英之子鄧璋字禮方涿州人崇王明史諸王傳崇簡王見澤子靖王祐樒正德六年卒子恭王厚耀嗣秋八月陸完追賊于狼山平之完既專討畿輔山東賊賊南犯滕縣副總兵劉暉大敗之賊遂奔登萊海套完師次平度檄郤永白玉與游擊溫恭三道進攻命副總兵張俊李鋐及許泰劉暉分軍邀其奔逸賊走連戰皆大敗之賊乃變服昜馬走先後禽斬二千六百餘人賊止三百人北走沿途招聚勢復張剽香河寶坻玉田轉攻武清游擊王杲敗殁畿輔復震動而賊轉南至冠縣暉襲敗之指揮張勛又敗之平原賊南奔邳州渡河抵固始走湖廣奪舟夏口遇副都御史馬炳然殺之復登陸焚漢口為指揮滿弼等追及劉六中流矢與子仲淮赴水死劉七齊彥名率五百人舟行自黃州順流抵鎮江南京告急完疾趨而南時河南賊已平帝命彭澤仇鉞㑹完軍進勦大兵盡集江南北賊猶乘潮上下肆掠操江武靖伯趙洪澤都御史陳世良遇之敗績死者無算既而賊治舟孟瀆完等至鎮江留鉞防守令溫恭以騎兵駐江北完親督諸將以舟師分道扼之賊懼奔通州颶風大作棄舟走保狼山完命同知羅瑋夜導軍蹙之山南彥名中槍死七中矢亦赴水死餘賊盡平賊作亂凡二年中原郡邑多殘破所在殺官吏其死難最著者畿內則棗强知縣假豸大城知縣張汝舟主簿李銓河南則陳亡指揮景瑞等三十三人守城被害為鹽運使同知徐天英封御史朱紀西平知縣王佐縣丞毛繡上蔡知縣霍恩典史梁逵葉縣知縣唐天恩永城知縣王鼎裕州同知郁采都指揮詹濟御史任賢固始丞曽基夏邑丞安宣沈邱丞杜斌息縣主簿邢祥睢寧主簿金聲邱紳西華知縣李景教諭孔環山東則萊蕪知縣無驂主簿韓瑭萊州衛指揮蔡顯南畿則靈壁主簿蔣賢指揮同知梁文皆抗節死事聞贈官賜祭豫廕立祠如制質實狼山方輿紀要在通州南十五里與塔山軍山馬鞍山力刃山相連屬亦謂之狼五山相傳有白狼居此或曰山形如狼髙五十三丈周三百四十六丈勝槩甲于江北滕縣周時滕薛小邾三國地漢置蕃縣隋改滕縣明初屬濟寧府洪武十八年改屬兖州府平度漢縣後漢改置膠東後齊改置長廣隋曰膠水明洪武二十一年置平度州屬萊州府香河遼置寶抵金置明並屬順天府今皆因之玉田唐置明屬薊州今改屬遵化州冠縣隋冠氏縣元升冠州明降縣屬東昌府今因之平原秦縣明屬德州令屬濟南府夏口春秋時為夏汭又曰夏州後漢末始謂之夏口建安十四年吳孫權築城于此今武昌府西南為沙羡城夏口城在其南漢口在漢陽府城北二里漢水自沔陽州景陵縣東流入府境經漢川縣西流至此又東與江㑹于大别山因名漢口孟瀆在常州府治西三十里奔牛鎮東南滙運河北流六十里入楊子江唐刺史孟簡所開因名大城漢為東平舒縣五代唐改置大城縣明屬霸州今屬順天俯萊州衛在萊州府治南明洪武三年建本朝順治十六年裁裕州金置明屬南陽府今因之萊蕪漢縣明屬泰安州今屬泰安府假豸字世高澤州人由兵科給事中謫棗强知縣賊至連戰却之及城陷中四矢一槍瞋目大呼殺賊而死賊屠其城張汝舟官大城時與主簿李銓迎戰皆被殺王佐字汝弼潞州人授西平知縣手殺賊數十人矢斃其渠帥賊忿急攻三日佐力屈被執罵不絶口賊懸諸竿殺而支解之霍思字天錫易州人歷知上蔡縣與梁逵共守當賊至時語妻劉曰脫有急汝若何劉願同死乃築臺廨後約曰見我下城即賊入矣及城陷恩拔刀下城劉臺上見之即縊未絶以簪刺心死恩被執賊脅之跪罵曰吾此膝肯為賊屈乎賊日殺人以懾之罵益厲賊以刀抉其口支解之梁逵自經死唐天恩知葉縣與父政等七人俱死王鼎知永城城陷繫印于肘端坐待賊不屈死郁采字亮之浙江山隂人由主事謫教諭歷遷裕州同知與詹濟在賢共堅守斬獲多城破被執悉罵不輟賊碎其輔頰而死濟亦不屈死賢嘗為御史毋喪里居招邑子三千人拒守罵賊死一家死者十三人曽基為固安丞被執使馭馬不從被害安宣授夏邑丞賊楊虎逼其境或勸毋往宣兼程進抵任七日賊大至拒守有功城陷死之邢詳已致仕城陷罵賊死金聲邱紳與義士朱用之迎戰死孔環南宫人由嵗貢生授來安知縣為劉瑾黨所陷左遷西華教諭被執賊曰呼我王即釋汝厲聲曰我不得碎汝萬假肯還求活耶遂被殺熊驂固始人為賊所執與主簿韓瑭俱不屈死瑭太谷人蔡顯與三子淇英順俱禦賊力戰死汝舟天恩鼎基諸人里貫無考馬炳然內江人趙洪澤武靖侯輔之孫陳世良臨海人九月召洪鐘還以彭澤代之時蜀盜鄢夲恕藍廷瑞廖惠方四曹甫雖已平而廖麻子猖獗如故連陷州縣又賊麻六兒者越百丈關以窺川東殺副使馮傑勢甚張鐘不能制巡按御史王綸紀功御史汪景芳劾鐘乃召鐘還以澤往代澤未至巡撫高崇熙恇怯主招撫麻子等陽受約崇熙遽請罷諸軍令副使張敏徙臨江市民空其地處之許給復三年為請于朝副使馬昊力爭謂臨江市上逹重叙下連湖湘地土饒衍奈何棄以資賊自遺患崇熙不從昊乃益治兵防變已而賊果執敏叛詔逮崇熙擢吳右僉都御史代之賊圍中江將趨成都㑹澤已至先擊平麻六兒遂與昊及總兵官時源連敗廖麻子遣游擊閻勳追斬之劍州餘衆走推其黨喻思俸為王總兵官陳珣逐之急賊僞降因北渡江襲殺都指揮姚震轉入巴山故巢珣不敢前陜西兵與賊戰潰賊遂越寧羌犯略陽珣軍鼓譟賊夜走越廣元為官軍所遏還趨通巴招餘黨諸將率稱病不擊賊詔逮珣且讓昊昊乃與澤督諸師獲思俸西鄉山中澤遂移軍漢中請班師未報而內江榮昌賊駱松祥范藻等復熾澤旋師討平羣盜悉靖詔澤暫留保寧鎮撫初廖麻子攻破綿竹等縣西安衛指揮僉事毅輔戰死麻六兒之衝百丈關嘉定州人雷應通父子七人倡義禦賊被執皆死之質實百丈關方輿紀要在廣元縣東百六十里關傍有河深百丈亦曰百大關渡道出巴州臨江市一名臨江鎮在忠州西一里有巡司戍守重叙謂重慶叙州也叙州漢犍為郡地梁置戍州宋改叙州元路明府今因之中江漢郪縣地三國漢析置伍城縣隋改元武宋改中江明屬潼川州今屬潼川府寧羌明洪武分沔縣地置寧羌衛成化二十二年升州屬漢中府廣元秦葭萌縣地三國漢曰漢夀縣晉改晉夀尋析置興安縣隋改綿谷為利州治元為廣元路治明洪武七年改府是年降州十四年降縣屬保寧府通巴謂通江縣巴州也巴州梁置明洪武中降縣正德九年復升為州屬保寧府今並因之內江漢資中縣地後周置中江隋改內江明屬成都府今屬賢州榮昌唐析內江縣地置昌元縣元省明洪武六年復置營昌屬重慶府今因之西安衛明洪武中置𨽻陜西都司嘉定州後周置峩眉縣為平羌郡治隋初郡廢縣屬嘉州尋改縣曰青衣又改龍遊為眉山郡治唐為嘉州治南宋改嘉定州元路明洪武四年改府九年降州直𨽻四川布政司今升府馮傑見明史忠義傳未詳其里貫傑追擊麻六兒于蒼溪俘斬頗衆日晡移營鐡山關賊乘夜衝突傑死之贈按察使諡恪愍髙崇熙石州人賜義子一百二十七人國姓帝所悅中官奴卒輒收為義子亡虜亦與馬並賜姓朱氏御史賀泰抗諌諸近幸激帝怒謫衢州推官冬十一月留宣府大同遼東兵于京營先是七月中兵部尚書何鑑以羣盜未盡請留邊將劉暉戍山東時源戍河南郤永戍畿輔李鋐戍淮陽各假總兵之職俟事寧始罷仇鉞言邊軍久勞風土不習人馬俱病今賊已漸平請留三之一討賊餘悉遣還廷議二人言俱是請四將各千人鎮壓他將許泰神周金輔溫恭等俱統所部還鎮帝許之命延綏軍徑還遼東宣府大同軍過關勞賜帝方好弄兵時有江彬者以大同游擊𨽻總兵官張俊赴調過薊州殺一家二十餘人誣為賊得賞嘗與賊戰淮上被三矢其一著面鏃出于耳拔之再戰帝聞而壯之及還軍過京師彬因錢寧得召見帝見其矢痕曰彬健乃爾邪彬狡黠強狠貌魁碩有力善騎射談兵帝前帝大悅遂與宣府守將皆留不遣擢彬都督僉事出入豹房同卧起寵在寧上寧心忌之彬知寧不相容顧左右皆寧黨欲藉邊兵自固因盛稱邊軍驍悍勝京軍請五調操練言官交章諫大學士李東陽疏稱十不便皆不聼于是邊軍入衛立東西兩官㕔禁中視團營東以太監張忠領之西以許泰領之已而神周坐罪謫夤緣得八豹房復官未幾劉暉亦召侍設勇士營俾周暉分領與彬泰同賜國姓為義兒名四鎮兵又名外四家兵以彬兼統帝别領羣閹善騎射者為一營號中軍晨夕馳逐甲光照宫苑呼噪聲達九門帝時臨閲謂之過錦質實江彬宣府人錢寧不知所出或曰鎮安人幼鬻太監錢能家為奴能嬖之冒錢姓十二月李東陽罷東陽以老病乞休前後章數上至是始許賜敕給廪𨽻如故事東陽立朝五十年清節不渝以文章領袖縉紳朝廷大著作多出于其手奬成後進推挽才彥學士大夫出其門者率粲然有所成就初與劉健謝遷請誅劉瑾及健遷去而東陽獨留氣節之士多非之侍郎羅圯上書勸其早退至請削門生籍東陽得書俯首長嘆而已然方逆瑾肆虐時潛移默奪保全善類天下亦陰受其庇云致仕四年卒癸酉八年春正月召陳金還以俞諫代之初陳金擊破東鄉賊土兵縱弩射趫捷若飛賊大窘土兵邀賞千金金靳不豫乃縱賊使逸桀黠者多不死尚數千人金急欲成功遂下令招撫及破姚源金喜謂功在旦夕與將吏置酒髙㑹賊覘諸要害無守者乃悉所有賂土兵乘間遁去賊絶㸑已三日自分必死沿途棄稚弱散婦女抵貴溪始得一飽食遂轉掠衢徽間金知失策亦下令招降賊首王浩八等故僞降以緩官兵攻剽如故卒不能盡賊紀功給事中黎奭及兩京言官交章劾金乃召金還以俞諫代督江西浙江福建諸軍討之時浩八衆萬餘流劫弋陽上饒等州縣尋掠婺源休寧屯浙江開化諫擊嘉興同知伍文定與參將李隆都指揮江洪僉事儲珊擊賊軍華埠都指揮白宏與湖州知府黃襄别營馬金賊黨劉昌三被執宏官軍大挫浩八突華埠洪文定擊敗之隆珊追至池淮破其巢而洪以奇共深入中賊誘與指揮張琳等皆被執文定等殿後得還賊亦遁歸江西德興以所執宏洪等為質求撫于按察使王秩秩受之為傳送姚源浩八奔據貴溪裴源山餘衆復集連營十里諫令秩與副使胡世寧參政吳廷舉列屯要斷其歸路躬與都督李鈜乘夜冒雨潛進大破之俘斬數千人遂擒浩八其黨潰走玉山諫與南贛巡撫周南江西巡撫任漢復擊斬七百餘人餘賊奔姚源有賊渠胡浩三者降復叛廷舉往諭為所問留居三月盡得其要領誘其黨使自携二廷舉遂得還浩三果殺其兄浩二內亂諫督官兵乘之擒浩三諫懲金失一意用兵而任漢巽懦先為布政使嘗贊金主撫雖亟上首功追賊緩餘黨復起先是金所撫束卿賊艾茹七等二百人𨽻世寧麾下號新兵率以擊浩八所過縱掠執安仁官氏二女欲汙之赴水死奭奏其事乃下令散遣尋懼罪復叛衆至二千餘諌遣參將桂勇等分道討擒之萬年雖立縣賊尚衆吏胥多賊黨官府動息必知副使李情治峻急衆欲叛畏鋐在餘干不敢發㑹鋐卒王埀七胡念二等遂作亂殺情及饒州通判陳逹秦碧指揮邢世臣等焚廨舍諫發兵擒之亂乃定言官劾諫及漢南兵部請召漢還命諫兼領巡撫已復擊臨川賊斬其魁陳玖談懿昌等而遣李隆擊新淦賊賊踞萬山中僣稱王且八年隆等深入悉就擒俘斬千七百餘人録功進諫右副都御史巡撫如故劇賊徐九齡者嘯聚幾三十年出沒江湖黃州德安九江安慶池州太平咸被其害諫討斬之羣盜悉平質實弋陽三國吳置葛陽縣隋改弋陽明屬廣信府上鐃漢鄱陽地三國吳析置上饒縣明為廣信府治婺源唐縣元升州明復為縣休寧三國吳置休陽後改海陽晉曰海寧隋改休寧明與婺源俱屬徽州府開化宋縣明屬衢州府今皆因之華埠鎮在開化縣南三十里馬金鎮在開化縣北三十五里以馬金嶺而名池淮溪名有二源一出歇嶺一出明化縣西百里大榕嶺合流至縣西三十里滕巖下之池淮畈曰池淮溪德興唐德興場南唐升縣明屬饒州府今因之裴源方輿紀要水名在萬年縣界按明實録俞諌破賊于貴溪之裴源萬年縣東南至貴溪百五十里本貴溪之逺鄙也臨川後漢置臨汝縣隋改臨川明為撫州府治今因之俞諫字良佐桐廬人黎奭京山人伍文定字時泰松滋人儲珊穎州人胡世寧字永清仁和人李鋐大同右衛人任漢溫江人李情靈寶人黃衷南海人陳逹閩縣人按明史忠義傳有萬琛者字廷顯宣城人慷慨負氣節舉于鄉知瑞金縣孝宗十八年正月劇盜大至縣人洶洶逃竄或勸琛急去琛斥之率民兵數十人迎敵殺賊二十餘人相持至明日力屈被執罵不絶口賊攢刺之乃死贈光祿少卿賜祭葬子廕考明武宗實録琛之死賊乃是年八月明史系之孝宗十八年正月者蓋傳聞之異夏六月河決黃陵岡先是河自北徙至沛縣飛雲橋俱入漕河南河故道淤塞水惟趨單豐之閒河窄水溢遂連年决黃陵岡入賈魯河汛溢橫流直扺豐沛御史林茂逹以北决安平鎮為虞請濬儀封考城上流引河南流以分其勢然後塞决口築故隄工部侍郎崔巖奉命修理久之無功以侍郎李堂代巖堂謂河流故道堙者不可復疏請築隄以障河北徙工未竣而河南盜起召堂還京隄役由此罷至是河復决黃陵岡部議以其地界大名山東河南守土官事權不一請專遣重臣乃命管河副都御史劉愷兼理其事愷奏率衆祭告河神越二日河已南徙尚書李鐩因請祭河且賜愷羊酒愷于治河束手無䇿特歸功于神曹單問被害日甚質實飛雲橋在沛縣城南汜水經其下入泗水為往來津要單縣魯單父邑漢為單父縣唐光啓中置單州于此明洪武元年省縣入州二年改州為縣屬兖州府今屬曹州府豐縣秦沛縣之豐邑漢置縣明屬徐州今屬徐州府曹縣漢定陶縣地隋析置濟陰縣為曹州治金徙州治乘氏故縣明初徒安陵鎮尋徙盤石鎮改州為縣屬濟寧府正統十一年復置曹州以縣屬焉今屬曹州府林茂逹莆田人省巖字民瞻郴州人李堂字時升鄞縣人劉愷直𨽻新安人秋八月土爾番據哈密初許進既復哈密阿哈瑪特悔過送還善巴尋以王越言復善巴舊封自是哈密得安土爾番亦通貢如故有思克保喇者哈商弟也與善巴不相既當事患之令善巴娶哈商女與之結好善巴嗜酒掊克失衆心部下阿爾保喇等咸怨隂搆于土爾番阿哈瑪特之幼子曰展特穆爾亦哈商女所出遂迎之主哈密善巴懼潔家走苦峪時恩克保喇與回回都督舍音和珊在肅州邉臣以二人為番衆所服令還輔善巴與百户董傑偕行傑有膽略扺哈密阿爾保喇與其黨五人約夜以兵來劫傑知之與恩克保喇等計事立斬之其下遂不敢叛乃令善巴還哈密展特穆爾還土爾番㑹阿哈瑪特死莾蘇爾嗣為蘇勤坦與弟相仇毅展特穆爾懼不敢歸以恩克保喇乃其毋黨願留哈密依之邉臣慮與善巴有隙居之甘州蓋孝宗十七年也既而莾蘇爾遣使求展特穆爾廷議持不可以甘州守臣言送之還即輸邉情于莾蘇爾莾蘇爾桀黠變詐踰于父素有吞哈密之志又得其弟合謀而阿哈瑪特殁之明年善巴亦率子巴牙濟襲忠順王昏愚淫虐不得于其屬部心怵部人害已莽蘇爾因數以甘言誘之至是巴牙濟競棄其國奔土爾番莽蘇爾奪其印遂遣和卓塔實鼎據守哈密質實恩克保喇舊作奄克孛剌阿爾保喇舊作阿孛剌展持穆爾舊作真帖木兒舍音和珊舊作寫亦虎仙莽蘇爾舊作滿速兒巴雅濟舊作拜牙即和卓塔實鼎舊作火者他只丁今改冬十二月江西饑遣南京刑部侍郎鄧璋往振之御定資治通鑑綱目卷十八
