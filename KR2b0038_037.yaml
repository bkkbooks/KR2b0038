body:
  text: 欽定四庫全書御定資治通鑑綱目三編卷三十二起辛酉明熹宗天啓元年盡癸亥明熹宗天啓三年凡三年熹宗哲皇帝天啓元年春二月遼陽有數日並出甲午日日交暈左右有珥白虹彌天閏二月孫如游罷如游入閣言者詆其不由廷推交章論列如游亦屢乞去帝輒勉留及是復上疏言祖宗任用閣臣多由特蕳逺者無論在世廟則有張璁桂萼方獻夫夏言徐階袁煒嚴訥李春芳在穆宗則有陳以勤張居正趙貞吉在神廟則有許國趙志皋張位即皇考之用朱國祚亦特簡也今陛下沖齡臣材品又非諸臣比有纍至尊知人之明乞速賜骸骨歸田里十四疏乃加太子太保文淵閣大學士遣護歸三月我大清兵取瀋陽總兵賀世賢尤世功等死之大袁應泰議三路出師復清河撫順未行分兵乘城清兵已簿瀋陽總兵賀世賢尤世功等大兵營城東七里世賢等于城外鑿掘壕塹樹柵築牆環列鎗炮以拒復登埤堅守大兵進攻繞城掩擊世賢出戰且却抵西門身被十四矢城中聞世賢敗各鳥獸竄或勸世賢走違陽曰吾為大將不能存城何面目見袁經略乎揮鐡鞭馳突圍中中矢墜馬而死世功引兵援亦戰死城外兵七萬人皆潰參將夏國卿知州段展同知陳柏皆死于陳遂樹雲梯拔瀋陽城時總兵陳策統四川步兵二大萬營黃山渡渾河來援兵分路以進太祖髙皇帝復敕後軍往助衝擊策兵大敗追擊至渾河兵盡溺策及參將張名世死之總兵李秉城朱萬良姜太祖命弼領騎兵三萬來援偵援兵進雅遜退援兵遙躡雅遜率護軍二百往太祖聞其後欲自往擊之怒太宗文皇帝請行領軍疾馳迎戰援兵之躡雅遜者潰奔掩擊至白塔鋪遇秉城等方布陳太宗不待後軍至即率百騎追擊秉誠萬良弼驚遁大貝勒代善台吉嶽托軍亦至同追擊四十里斬首三千級太祖復而還河以南步兵破其營副將董仲貴等戰死衆盡擊渾殲游擊周敦吉副將戚金參將吳文傑都司袁見龍鄧起龍守備雷安民雲南都司張名世石砫都司秦邦屏等皆死質實白塔鋪在承德縣南二十里有河源出老堂峪西流入灘河賀世賢榆林衛人戰殁後或疑其叛降故恤典不及官本朝乾隆四十一年追諡忠烈尤世功榆林衛人左都督贈少保世廕三級再廕指揮僉事世襲賜祭葬建祠曰愍忠乾隆四十一年追諡烈愍夏國卿陳柏里系無考段展涇陽人乾隆四十二年俱追諡節愍張名世山隂人陳策李秉誠朱萬良姜弼里系無考乾隆四十一年俱追諡烈愍董仲貴一作仲揆南京人萬厯末擢副總兵督川兵援遼及瀋陽戰死贈都督同知世廕三級祠祭乾隆四十一年追諡烈愍周敦吉戚金吳文傑袁見龍鄧起龍雷安民里系無考秦邦屏忠州人乾隆四十一年俱追諡烈愍大清兵取遼陽經略袁應泰巡按御史張銓等死之太祖髙時我既得瀋陽集貝勒諸臣議以瀋陽已拔宜乘勢皇帝長驅遂進兵規取遼陽袁應泰方撤奉集威寧諸軍并力守禦開太子河引水注濠沿濠列火器四面守大禦甚嚴總兵李懷信等率兵五萬出城五里結營兵至城太祖命左四旗兵擊其左兵于城傍覘視而自引軍衝擊其太宗文皇帝請留二紅旗太宗乘營會左四旗兵亦至夾攻之懷信兵大亂奔潰留後勝追擊六十里方接戰時遼陽兵自西關出援之二紅旗兵見而邀擊驅令奔回遼陽兵爭入出蹂踐死者枕籍翌日太祖大兵掘城西閘以泄濠水分兵塞城東進水口步騎三親率右翼兵布楯車堵列城隅以衛衆軍遼陽萬出東門列營相拒右翼諸將遣人馳告曰掘插口不若奪橋易也太祖即諭令往奪果得之會雍遏水口將涸右四旗前隊軍渡壕大呼掩擊東門外營方鏖戰大兵紅甲二百白旗兵千並進遼陽騎兵遂敗各貝勒部下白甲精鋭護軍復大呼奮射而入遼陽步兵亦大敗望城奔竄至東門外遼陽兵死者濠塹皆滿水盡兵乘勝縱擊赤時左四旗兵奪武靖門橋分擊守濠者城上下發火器抵拒大兵奮勇衝突樹梯登城遂奪西城城中驚擾大亂日將夕左四旗大兵已登城是夜城中舉火列炬拒戰達旦守城官牛維臞髙出等及衆軍民多乘亂縋城而遁翌日復立大楯火戰義敗又四旗總兵朱萬良副將梁仲善參將兵復登城遂克遼陽王豸房承勳游擊李尚義張繩武都司徐國全王宗盛守偹李廷幹等皆戰死先是攻城時袁應泰居城北鎮逺樓知事不濟嘆息謂巡按御史張銓曰吾當死於此公無守城責冝急去退保河西圖後舉銓曰不可應泰遂佩劍印自縊死婦弟姚居秀從之僕唐世明憑尸大慟縱火焚樓死銓被執不肯降太祖命賜死以遂其志數四終不可奪不得已縊而葬之分大宗惜銓欲生之婉諭守道何廷魁懷印綬率其妾髙氏金氏投井死婢僕從者六人僉事崔儒修戎服自經于都司署太祖入遼陽城百姓皆呼萬歲吉寨桑古八大臣率引兵太祖命皇子台吉德格類姪台千人安撫居民至海州城中官吏及富殷之家張鼓樂肩輿迎二台吉攬轡傳令禁軍士擾害不得奪民財物二台吉宿公廨中軍士俱屯城上禁勿入民家遼陽既下遼東之三河等五十寨及河東大小七十餘城盡望風降質實太子河在遼陽州北十五里即古大梁水又名東梁河源出薩穆禪山自葦子峪東入西南流至州西北合渾河又西至海城縣西北入遼河河西時以遼河之東為河東遼河之西為河西袁應泰出本朝乾隆四十一年追諡忠節牛維曜商州人髙萊陽人梁仲善里系無考乾隆四十一年追諡烈愍王豸房承勳李尚義王宗盛李廷幹里系無考張繩武本姓陳一作神武新建人乾隆四十一年追諡烈愍徐國全里系無考何廷魁字汝謙大同人崔儒秀字警初陜州人乾隆四十一年追諡節愍援遼都司毛文龍集兵皮島時沿海居民以河東失事皆航海走山東不能達者棲止各島間文龍率援師至皮島島在登萊大海謂之江東地廣衍有險可恃文龍乃招集逃民為兵分布哨船聨接登州為犄角計朝議是之授文龍參將質實毛文龍仁和人夏四月延綏孤山城陷是月癸丑城陷三十五丈入地二丈七尺賈繼春削籍御史賈繼春初以移宫事具揭奉㫖切責復上言自明劾忠規勤之意吏部尚書周嘉模及九卿科道等懇請優容帝意不回遂削籍去五月壬申朔日有食之以王化貞巡撫廣寧化貞前以參議守廣寧朱童蒙勘事還極言化貞得西部心勿輕調化貞亦言遼事將壤惟發帑金百萬亟欵西部會瀋陽相繼失廷議將起廷弼御史方震儒請加化貞秩便宜從事令與薛國用同守河西乃進化貞右僉都御史巡撫廣寧廣寧城在山隈登山可俯瞰城內恃三岔河為阻又水淺可涉廣寧止孱卒千化貞招集散亡復得萬餘人激勵士民聨結西部人心稍安中朝謂其才足悖悉以河西事付之化貞又以登萊天津兵可不設諸鎮入衛兵可止當事益信其才所奏請輒報可時金復衛軍民及東山礦徒多結寨自固以待官軍其逃入朝鮮者亦不下二萬化貞請鼓舞諸人優以爵祿俾自奮於功名並請招諭朝鮮帝從之質實金復衛金州衛在明遼東都司城南六百里今寧海縣境復州衛在明遼東都司城南四百二十里今復州界俱屬奉天府薛國用洛陽人厯官山東右參政分守遼海道以右僉都御史代應泰巡撫遼東應泰死代為經略立皇后張氏后祥符人時大學士劉一燝及御史畢佐周劉蘭請遣客氏出外帝戀不忍捨曰皇后幼賴媪保護俟皇祖大葬後議之又以大婚禮成廕魏忠賢姪二人給事中程沆周之綱奏祖制非軍功不襲國典不當滋豫不聽太監魏忠賢矯詔殺司禮太監王安帝命安掌司禮監安以故事辭客氏勸帝從其請與忠賢謀殺之忠賢猶豫未忍客氏曰爾我孰若西李而欲遺患耶忠賢意乃決嗾給事中霍維華論安降充南海子净軍而以劉朝為南海子提督使殺安朝故李選侍私閹以移宫盜庫下獄宥出者既至絶之安飲食取籬落中蘆蔔啖之三日猶不死乃撲殺質實王安于莊烈帝時賜祠額曰昭忠霍維華東光人魏忠賢閲章奏忠賢不知書頗強記猜忍隂毒好諛帝深任信用司禮監王體乾及李永貞石元雅凃文輔等為腹心凡章奏永貞等先閲視鈐識欵要白忠賢議可否然後行帝性機巧好親斧鋸椎鑿髹泰之事每引繩削墨忠賢輒奏事帝厭之謬曰朕已悉矣汝輩好為之忠賢因得擅威福六月廣東地出血庚寅日啓慶王民骸積家中庭噴血如跑突泉起熊廷弼經略遼東初廷弼雖龍帝念其守遼功仍議起用瀋陽破廷臣復思廷弼給事中郭鞏力詆之及遼陽繼失河西軍民盡奔自塔山至閭陽二百餘里烟大斷絶京師大震劉一燝曰使廷弼在遼當不至此御史江秉謙追言廷弼守遼功且以排擠勞臣為鞏罪帝乃治前劾廷弼者貶馬三元張修德魏應嘉郭鞏等秩除姚宗文名御史劉廷寅救之亦被斥乃詔起廷弼于家及是廷弼入朝酋請免言官貶謫帝不可乃建三方布置策廣寧用馬步兵列疊三岔河上天津登萊各置舟師設登萊巡撫如天津而山海特設經略節制三方以一事權遂命廷弼以兵部尚書兼右副都御史駐山海關經略遼東軍務賜上方劍請調兵二十餘萬以兵馬芻糗器械之屬資成户兵工三部廷弼因奏請復監軍道髙出胡嘉棟督餉郎中傳國等官令其任事又議用遼人故贊畫主事劉國縉為登萊招練副使夔州同知佟卜年為登萊監軍僉事故臨洮推官共敷教為職方王事軍前贊畫收拾遼人心並報允七月廷弼因特陽麒麟服一彩幣四宴之郊外令文武大臣陪餞異數也先是袁應泰死薛國用代為經略病不任事化貞乃部署諸將沿河設六營營置參將一守偹二分守諸要害各設戍防議既上廷弼疏言河窄難恃堡小難容今日但冝固守廣寧若駐兵河上兵分則力弱倘輕騎前渡直攻一營力必不支一營潰則諸營俱潰西平諸戍不能守河上止宜置游擊兵更畨出入示以不測不宜屯聚一處為人所乘自河抵廣寧止冝多置烽堠西平諸處止冝稍置戊兵為傳烽哨探之用而大兵悉聚廣寧于城外犄角立營深壘髙柵以俟蓋遼陽去廣寧三百六十里非飛騎一日所能到有聲息我必豫知斷不宜分兵防河充為自弱之計疏入優㫖褒答會御史方震儒亦言防河不足恃議乃寢化貞以計不行愠甚盡委軍事于廷弼廷弼請申諭化貞不得藉口節制坐失事機先是四方援遼之師化貞忠改為平遼遼人多不恱廷弼言遼人未叛乞改平遼名以安其心自是化貞與廷弼有隙而經撫不和質實塔山在承德縣東南四十里山上有城閭陽城名在錦州府廣寧縣西南五十里里今為驛江秉謙字兆豫欽人郭鞏遷安人方震儒字孩未桐城人髙出萊陽人胡嘉棟西華人以張鶴鳴為兵部尚書初鶴鳴巡撫貴州威名甚著遷兵部右侍郎總督陜西三邊軍務尋轉左侍郎佐理部事時兵事亟兵部增設二侍郎而鶴鳴與祁伯裕王在晉並卧家園不赴及是右侍郎張繼世督援師出關部中遂無侍郎言官請趣鶴鳴章數十上乃剋期令兵部馬上督催始履任至則論前平苗功進本部尚書視侍郎事尚書出象乾出督薊遼軍務遂代其位給事中韋蕃請留象乾出鶴鳴督師忤㫖謫外鶴鳴與經略熊定弼相失論事多齟齬獨喜巡撫王化貞化貞本庸才好大言鶴鳴主之所奏請無不從令無受廷弼節度中外皆知經撫不和必誤封疆而鶴鳴信化貞愈篤卒致疆事大壤秋七月順天蝗八月以毛文龍為總兵官駐師鎮江城時廷弼奏言三方建置須聨絡朝鮮請遣使往勞俾盡發兵漣營冮上助我聲勢再詔恤遼人之避難朝鮮者招集團練别為一軍與朝鮮軍合藝使臣即權駐義州控制聨絡與登萊聲息相通更發銀六萬兩分犒朝鮮及遼人乞給空名劄付百道東山礦徒能結聚千人者即署都司五百人者署守偹一二萬徑兵可立致也因薦監軍副使梁之垣充命使帝從之方與所司議兵餉而毛文龍適以島山兵襲取鎮江大時我江守將陳良䇿潛通于文龍故文龍引兵取其兵鎮城王化貞遽以大捷奏舉朝皆喜化貞遂請授文龍總兵官設軍鎮皮島廷議亟發天津登萊水師二萬授文龍化貞督廣寧軍四萬進據河上合諸䝉古軍乘機進取張鶴鳴以為然奏言時不可失促進師廷弼言三方兵力未集文龍發之太早亂三方並進之謀誤屬國聨絡之計時朝士方以鎮江為竒捷聞其言多不服廷弼又顯詆鶴鳴謂臣既任經略四方援兵宜聼臣調遣乃鶴鳴竟自發戍不令臣知臣洛部問調軍之數亦不答臣有經略名而無其實遼左事惟樞臣撫臣共為之鶴鳴益恨化貞又言西部兵四十萬且至請速濟師廷弼言撫臣恃西部欲以不戰為戰計臣未敢以為可也臣初三方布置必兵馬器械舟車芻茭無一不備而後尅期齊舉進足戰退亦足守令臨事中亂雖樞臣主謀于中撫臣決䇿于外而臣猶有萬一不必為之慮也質實義州在錦州府北九十里遼置宜州崇義軍金改置義州屬北京路元屬大寧明置義州衛屬遼東都指人揮使司今為義州屬錦州府梁之垣登州王化貞渡河進師無功而還化貞既渡河廷弼不得已出關次右屯而馳奏海州取易守難不冝輕舉化貞為人騃而愎素不習兵妄意降將李永芳為內應又信西部言謂助兵四十萬遂欲以不戰取全勝一切士馬甲仗糗糧營壘俱置不問務為大言以圖中朝謂仲秋之月可髙枕而聽捷音尚書鶴鳴深信之以故廷弼不得行其志及是大西部兵不至化貞亦不敢進後十月河氷合廣寧人謂清兵必渡競謀竄逸化貞乃與震孺計訃分兵守鎮武西平閭陽鎮寧諸城堡而以重師守廣寧鶴鳴亦以廣寧可慮請勑廷弼出關䇿應廷弼上言樞臣第知經略一出足鎮人心不知徒手之經略一出其動搖人心更甚且臣駐廣寧化貞駐何地鶴鳴責經撫協心同力而樞臣與經臣獨不當協心同力乎為今日計惟樞部俯同于臣臣始得為陛下任東方事也既而廷弼復出關至右屯議以廣寧內護廣寧外扼鎮武閭陽乃令劉渠以二萬人守鎮武祈秉忠以萬人守閭陽羅一貫以三千人守西平部署甫定化貞又信牒者言遽發兵襲海州旋亦引還質實西平堡名在廣寧縣之東劉渠保定人祁秉忠西寧世襲土司羅一貫甘州衛人本朝乾隆四十一年追諡烈愍九月葬慶陵諡曰崇天契道英睿恭純憲文景武淵仁懿孝貞皇帝廟號光宗質實慶陵在昌平州天壽山西峯之右明史贊曰光宗潛德久彰海內屬望而天不假年措施未展三案爭搆黨禍益熾可哀也夫賜客氏香火田帝以客氏保護功命户部擇田二十頃以為香火之用魏忠賢以陵工告成録叙御史王心一疏言梓宫末殯先規客氏之香火陵工既成強入忠賢之勤勞于禮為不順于事為失宜忠臣愛君必防其斬帝怒責之質實王一心吳縣人四川永寧土司奢崇明反永寧奢氏猓種也洪武中歸附世為宣撫司傳至奢崇周無子崇明以疏屬襲外恭內隂鷙其子寅尤驍傑好亂時朝廷方遣官募川兵援遼崇明父子請行先遣土目樊龍張彤等以兵詣重慶巡撫徐可求議汰其老弱發餉餉復弗繼龍等遂鼓衆反殺可求及道府總兵等官二十餘人時土兵數干列江岸相應遂據重慶分兵攻合江納溪破瀘州陷遵義時遵義道臣李仙品參將萬金督兵援遼俱赴重慶城中守偹空虛通判袁任先期委城遁賊攻合州江軍知州翁登彥知縣周禮嘉悉力捍禦不能破賊陷興文知縣張振德不屈率妻子赴火死崇明統所部與徼外諸蠻凡數萬播州遺孽及諸亡命奸人蜂起附全川震動崇明乘勢向成都官兵出拒者多敗冬十月崇明進圍成都僞號大梁設丞相以下官時城中僅鎮逺營兵七百餘人左布政使朱燮元將入覲蜀王以亂留治軍事燮元急趨近道兵赴援偕右布政使周著按察使林宰等分埤固守賊薄城燮元屢以火器却之至幕賊擁鈎梯千數攀城欲上燮元戒士卒第放炮礌石毋譁遲明賊積死滿城下時濠水方個賊率降民持篾束薪載濠石壘如山下架蓬輩以避鐃石伏弩仰射城中燮元夜縋壯士持芻塗膏殺守者縱火火舉山隤賊大阻燮元又遣人决都冮堰水至濠濠滿城因治橋得少息尋斬入城為內應者二百人懸首埤上賊又于城四而立望樓髙與城齊燮元曰賊設瞭望必四出摽掠其中虛遂命死士五百人突出擊之賊果無備斬三賊帥焚其樓賊少懾已而援兵漸集石砫女土官秦良王先遣其弟民屏發兵四千倍道潛度重慶自統精兵鼓行而西復新都他路援兵亦連勝賊然賊亦日增相持百餘日有俘民脫歸者宫賊造旱船决勝負一日賊數千自林中大噪出視之有物如舟髙丈餘長五百只樓數重簟茀左右板如平地一人披髮仗劍上載羽旗中數百人各挾機弩毒矢牛數百頭運石轂竹旁翼兩雲樓如左右廣俯視城中城中人皆哭燮元曰此吕公車也破之非炮石不可乃用巨木為機關轉索發炮飛千釣石擊之又以大炮擊牛牛返走賊大敗去會禆將劉養鯤言有諸生范祖文鄒尉陷賊中遣孔之談來約賊將羅乾象欲自拔效用燮元即遣之談復往至則與乾象俱來燮元方卧戍樓呼與飲乾象裹甲佩刀燮元不之疑就榻呼同卧酣寢違且乾象感激誓以死報許之縋而出後賊營舉動悉知踰數日乾象誘崇明至城下伏起崇明跳免乾象縱火焚營賊兵亂崇明父子倉皇走瀘州乾象以衆來歸成都圍解時二年正月也事聞以燮元為四川建撫帥師追崇明乘藝復州縣衛所四十餘惟樊龍扼重慶不下燮元督良玉等奪二郎關據其險佛圖關亦為總兵杜文焕所破諸將逼重慶而軍城中乏食燮元以計擒樊龍殺之張彤亦為亂兵所戮遂復重慶瀘州尋亦復按當時重慶被害者道臣孫好古駱日升李繼周知府章文炳同知王世科熊嗣先推官王三宅知縣假髙選總兵黃守魁王守忠參將萬金王髙爵其入城殺賊遇伏死者原任鞏昌同知董盡倫賊薄成都時陷陳死者有指揮冉世法雷安世瞿英其遇賊不戰降者有指揮周邦泰遇賊走免者有指揮張愷焉質實合州隋涪州宋屬潼川府元屬重慶路明屬重慶府今因之二郎關在重慶府巴縣西北六十里佛圖關在巴縣西十里即李殿欲鑿通汶涪二江處為重慶要津津上有石佛寺故名徐可求衢州西安人張振德字季修崑山人朱燮元字懋和浙江山隂人周著南昌人林宰漳浦人謫給事中侯震暘于外初客氏已出宫復召入震暘奏曰皇上于客氏始而俳徊眷注稍遂其出猶可言也出而再入不可言也奸璫羣小睥睨其側內外鈎連借叢煬竃有不忍言者公麼里婦何堪數昵至尊哉上怒責之時倪思輝朱欽相王心一相繼疏劾皆降謫吏部尚書周嘉謨貝疏論救亦不報質實侯震暘字得一嘉定人倪思輝祁門人朱欽相臨川人十二月罷吏部尚書周嘉謨神宗末齊楚浙三黨為政黜陟之權吏部不能舉及嘉謨為尚書大起廢籍向稱三黨之魁者漸自引去惡霍維華傾狡出之外魏忠賢怒嗾給事中孫杰劾嘉謨受劉一燝屬為王安報仇嘉謨遂罷歸質實孫杰錢塘人壬戍二年春正月我大清兵取西平堡副將羅一貫死之先是化貞凡五出師輒引還李永芳不應西部亦不至廷弼乞敕化貞慎重舉止化貞上言願請兵六萬一舉蕩平因請便冝行事時葉向髙當國化貞座主也頗右之廷臣惟太僕少卿何喬逺御史江秉謙周宗建等與廷弼合餘皆右化貞令毋受廷弼節制廷弼抗疏言臣以東西南北所欲殺之人適遘事機難處之㑹諸臣能為封疆容則容之不能為門户容則去之何必內借閣臣外借撫道以相困又言經撫不和恃有言官言官交攻恃有樞部樞部佐鬬恃有閣臣今無望矣帝令羣臣議兩人去留時中外俱知經撫不和必誤封疆大事而張鶴鳴篤信化貞請撤廷弼他用帝不從責再議議未上而太祖大清已渡渡遼河時我髙皇帝命兵守遼陽親率貝勒大臣及衆兵進攻由東昌堡遂渡遼河防河兵率見大清兵勢不可當俱遁走里外遂至西平堡全軍繼至大軍前隊精鋭追擊二十闈攻之招副將羅一貫降不從布貫梯楯攻城四而兵皆潰克之新一質實東昌西平兩堡俱遼河上在廣寧縣東王化貞棄廣寧與熊廷弼走入關化貞遣遊擊孫得功參將祖大壽合總兵祈秉忠赴援廷弼亦檄總兵劉渠㑹師前進與大清兵遇乘樴急戰馳突入奮射衛擊所向披靡得功大兵不暇布陳即飛大呼曰兵敗矣遂與參將鮑承先等先奪橋祁秉忠及兵乘勝追擊五十里斬殺無算至平陽副將劉徵參將黑雲鶴等皆死之全軍盡沒大壽走覺華島得功請降得功素為化貞心腹及是欲生縛大化貞以為功時進得功揚言兵已薄城居民驚竄參清兵屯沙嶺未政髙邦佐葉之不能止化貞方闔署理軍書不知也參將江朝棟排闥入大呼曰事急矣請公速去化貞莫知所為朝棟掖之出上馬僕二人徒步從遂棄廣寧跟搶西走得功偕守偹黃進千總郎紹貞陛國志大等降于我十餘城守禦官皆率屬降先是廷弼離右清逺近四屯次閭陽驛聞敗參議邢慎言請馳救為僉事韓初命所阻遂退還及化貞棄城走廷弼遇之大凌河化貞哭廷弼微笑曰六萬衆一舉蕩平竟如何貞慙議守寧逺及前屯廷弼曰嘻已晚惟護難民入闔可耳乃以己所將五千人授化貞為殿盡焚積聚與副使我髙出胡嘉棟等先後入關獨邦佐至杏山驛自經死太宗大軍至錦州駐營大貝勒與還敗聞至京師鶴鳴懼文皇帝引兵至義州克之而罪因自請視師給事中侯震暘少卿馮從吾董麃舉請並逮化貞廷弼以申國法獄具二人並論死鶴鳴尋亦罷歸質實覺華島在明寧逺衛東南二十里海中島上有海雲龍宫二寺沙嶺在廣寧縣東右明都司都西五百四十里前屯明都司城西九百六十里洪武時以元瑞州置廣寧前屯衛今屯俱廢故城在寧逺州西南大凌河源出大寧經廣寧界入海杏山驛在錦縣西南四十里劉徵黑雲鶴里系無考本朝乾隆四十一年俱追諡烈愍髙邦佐字以道襄陽人邢慎言益都人馮從吉字仲好長長人董應舉字崇相閩人二月貴州水西土目安邦彥反邦彥水西宣慰使安堯臣族子堯臣死妻奢社輝撫幼子安位襲職邦彥挾之反社輝即崇明女弟也嘗與崇明豫寅爭地相僥而邦彥素素異志與崇明合及崇明反或傳其已陷成都邦彥遂挾位以叛為崇明聲援自稱羅甸大王率兵首襲畢節陷之時諸部頭目安邦俊安若山陳其愚陳萬典等蜂起為助乃分兵西破安順霑益東下甕安偏橋而邦彥自紀水西軍渡陸廣河直趨貴陽百計攻城當是時永寧未平水西乂起貴陽城中藩臬守令咸入覲巡撫李橒方受代聞變與巡按御史史永安提學僉事劉錫元悉力拒守學官及諸塵亦督民兵分堞以守賊不能陷時烏撒衛已破指揮管良相死之鎮將張永芳將兵二萬赴援隔龍里不得進諸將馬一龍白身強皆戰沒外援遂絶城中糧盡先食糠枇草木敗革遂食死人肉後乃食塵人至親屬相噉里居參政潘潤民一女被食知縣周思稷自殺以饗軍其存者卒誓死守不遺餘力中朝方亟遼事不能顧久之新撫王三善大㑹將士議曰省城不能待矣外援不至吾輩死法死敵等死耳尚何俟邪遂分兵三路進銜枚疾走進不許退前部斬賊首一人賊衆披靡遂奪龍里城乘藝急擊安邦俊被銃死邦彥駭走遂直抵貴陽下先以五騎傳呼曰新撫至矣舉城歡呼更生貴陽陂圍十餘月城中戶十餘萬至是僅存二百人而貴城卒全皆橒及永安錫元功也時議與朱燮元之守城都並稱焉質實安順元州明為府今因之甕安明縣今屬貴州平越府陸廣河在貴陽府修文縣境其上源出安順府曰滴澄河下流入遵義府為烏江烏撒衛舊烏蠻地明洪武十五年建衛𨽻烏撒衛民府東距貴州界二百五十里李橒字長孺鄞人史永安武定人劉錫元長洲人王三善字彭伯永城人以孫承宗為兵部尚書兼東閣大學士預機務初廷臣以承宗知兵推為兵部添設侍郎主東事帝不欲承宗離講筵不許既擢禮部右侍郎協理詹事府㑹廣寧既失東事益急遂拜承宗為兵部尚書兼東閣大學士又從御史左光斗請命承宗以閣臣理部事承宗上疏曰邇年兵多不練餉多不覆以將用兵而以文官招練以將臨陳而以文官指發以武略備邊而日增置文官于幕以邊任經撫而日問戰守于朝此極弊也今天下當重將權擇沉雄有氣略者授之節鉞得自辟置偏禆以下勿使文吏用小見沾沾凌其上邊事小勝小敗皆不足問要使守關無關入而徐為恢復計因列上撫西部恤邊民减京軍增永平大將隆薊鎮亭障開衷京屯田數䇿帝嘉納焉承宗又請下廷弼于理與化貞並讞用正朝士黨護又請逮給事中明時舉御史李達以懲四川之招兵致寇者又請詰責遼東巡按方震孺登萊將軍梁之垣以警在位之骩骳者諸人以次穫譴朝右亦聳然側目矣質實孫承宗字雅繩髙陽人明時舉南充人李達安居人三月劉一燝罷初陵工成忠賢欲以為功一燝援故事內臣非司禮掌印及提督陵工不得濫蔭止擬加恩諸言官論客氏被謫者一燝皆疏救有請出客氏于外及言官交章論沈㴶㴶疑一燝主之與忠賢比而齮一燝一燝持大體不徇言路魏客用事一燝藝孤既而霍維華外轉其同官孫杰疑一燝屬周嘉謨為之上疏力攻一燝一燝疏辨求罷忠賢從中搆之帝始慰留既允其去業向髙言客氏既出復入一燝顧命大臣乃不得比保姆致使人揣摩于填窔不可知之地其漸當防不聽舉內操魏忠賢勸帝選武閹錬火器又日引帝為倡優聲伎狗馬射獵給事中惠世揚周朝瑞御史江秉謙等劾沈㴶交通閹人弄兵大內中㫖切責侯震暘黃尊素等先後疏諌皆不聽逮後內操增至萬人衷甲出入鉦炮喧震內外質實黃尊素字真長餘姚人夏四月禮部尚書孫慎行追論前輔方從哲進紅丸罪初光宗大漸鴻臚寺丞李可灼以紅鉛丸藥進俄帝崩羣臣交章劾之大學士方從哲擬㫖令引疾歸賚以金幣至是慎行以召還朝即追劾紅丸事斥從哲為弒逆上疏曰先帝驟崩雖云夙疾實緣醫人用藥不審閲邸報知李可灼紅丸乃首輔方從哲所進夫可灼官非太醫紅丸不知何藥乃敢突然以進昔許悼公飲世子藥而卒世子即自殺春秋猶書之為弒然則從哲宜何居速引劍自裁以謝先帝義之上也合門席藁以待司寇義之次也乃悍然不顧至舉朝共攻可灼僅令回籍豈以己實薦之恐與同罪歟臣以為從哲縱無弒之心却有弒之事欲辭弒之名難免弒之實百口不龍為天下萬世解也後此則有選侍垂簾聽政事劉遜李進忠么麼小竪何遂大瞻揚言說者二豎早以金寶輪從哲家若非九卿臺諌力請移宫選侍一日得志陛下幾無駐足聞爾時從哲濡遲不進科臣保之則云遲數日無害任婦寺之縱橫忍君父之杌􅑾為大臣者宜爾乎陛下宜急討此賊雪不共之仇毋詢近習近習皆從哲所攀援也毋拘忌諱忌諱即從哲所布置也并請即誅可灼以泄神人之憤時朝野方惡從哲慎行論雖過刻皆爭韙其言顧近習多為從哲地帝乃報曰舊輔素慎事係傳聞下廷臣集議都御史鄒元標主慎行疏從哲奏辨自請削官階投四裔帝慰論之給事中魏大中以九卿議久稽趣之時議者一百十有餘人紛紛俱罪從哲刑部尚書黃克纘及給事中汪慶百等等數人右之希內廷意也慎行揚疏折之且言克纘之謬于是大學士韓爌述進藥始末尚書張問違等合奏言慎行論可灼進紅丸事可灼先見內閣臣等未知及先帝召見乾清宫輔臣與臣等俱慎重未聽决及宣臣等入宫先帝問可灼安在可灼至進紅丸少頃復進一丸先帝服藥微汗身溫熱就寢臣等所共見聞輔臣視先帝疾急迫倉皇弒逆二字何忍言但可灼非醫官且非知醫脉者以藥嘗試先帝龍馭即上升非但從哲未能止臣等亦未能止均有罪焉乃從哲反賚可灼及御史王安舜有言先止罰俸織令養疾失之太輕何以慰皇考服中外宜如從哲請削其官階為法任咎至可灼罪不容誅而崔文升當皇考哀感時妄進大黃涼藥罪又在可灼上法皆冝顯戮以泄公憤議上可灼遣戍文升放南京而從哲置不問質實魏大中字孔時嘉善人黃克纘字紹夫晉江人大雨雹纍月不雨隂風怒號雹如雞子大著屋瓦磧俱碎草木禾稼毁折不可勝紀御史周宗建謂隂盛陽衰之徵疏陳四事一攻大學士沈㴶一請寬建言廢黜諸臣一言熊廷弼已有成獄不當因此羅織朝士一専詆魏忠賢言忠賢目不識丁隂賊險狠陛下用人行呚一切墮于其術恐離間之漸將起於蠅營讒搆之釁必生于長舌忠賢見疏恨刺骨五月日中月星並見孫慎行以為大異上疏請修省山東白蓮賊徐鴻儒作亂初薊州人王森嘗敕一妖狐狐斷尾令藏之招人人聞異香多歸附遂倡白蓮教自稱聞香教主其徒有大小傳頭及會主諸號蔓延畿輔山東山西河南及陜西四川後森為有司所攝斃于獄其子好賢與武邑于宏志巨野徐鴻儒輩踵其教徒黨益衆躪擾山東幾二十年至是好賢見遼東盡失四方奸民思逞與鴻儒等約是年中秋並起兵㑹謀泄鴻儒先反自號中興福烈帝稱大成興勝元年用紅巾為識遂陷鄆城曹濮騷動四川妖賊又助之俄復陷鄒滕嶧三縣鄒縣五經博士孟承光被執不屈死滕縣知縣姬文允視事莆三日城破登堂自絰死以印畀小吏魏顯照及家僮李守務賊掠顯照索印顯照潛授其父而與守務並罵賊死時山東郡縣無守偹亦不置重兵巡撫趙彥練民兵增諸要地請留京操班軍及廣東援遼兵以偹征調薦起故大同總兵官楊肇基統山東軍計賊賊乘肇基未至襲兖州為滋陽知縣楊柄及都司楊國棟所敗已而犯夏鎮韓莊劫掠漕艘官軍連破之軍道始進賊又攻曲阜領馬步萬餘擁至城下知縣孔聞禮率民兵力禦賊不能克引去時賊精鋭聚鄒滕間彥欲攻鄒縣副使徐從治曰攻鄒滕難下不如搗其中堅兩城可圖也彥乃與肇基令游兵綴賊鄒城而以大軍擊賊精鋭蹙而殪之嶧山遂圍鄒大小數十戰城未下乃令天津僉事來斯行及國棟乘間復滕縣國棟又大破賊于沙河乃築長圍困之賊食盡其黨皆出降鴻儒單騎走擒之送京師磔于市鴻儒臨刑歎曰我與王好賢父子經營二十年徒黨不下二百萬事不成天也鴻儒舉事凡七月而滅方鴻儒之未滅也于宏志亦起兵武邑應之殺人祭旗聲言取景州焚掠四十餘里官兵鄒捕于宏志立馬仗弓飛舞而迎官兵斬之于馬下餘賊遂凹散王好賢見鴻儒敗挈家南走至揚州事露就擒時論平賊功趙彥加兵部尚書餘進秩有差復以言官請修復孟廟命官致祭且恤孟氏子孫質實孟承光字永觀亞聖裔姬文允字士昌華州人趙彥膚施人徐從治字仲華海鹽人來斯行蕭山人發明徐鴻儒等以邪教聚衆作亂至僭號改元攻破州縣此非尋常盜賊竊發者可比觀鴻儒自稱經營二十年徒黨不下二百萬豈當時文臣武臣皆毫無所聞見而養癰貽患至此即鴻儒被報之後餘黨正多當時磔鴻儒而外不聞搜捕根治使餘孽盡除而惟以寬縱了事夫平民從賊問有出于劫脅者然其中豈無為賊腹心爪牙之人乃以其黨出降悉置不問獨不念攻城破邑害官殺民荼毒之罪有不容輕宥者乎平時既浸無覺察事起則又一于玩弛此賊盜所以日盛而肆無畏忌馴至流賊熾而猶以議撫為事涓涓不息將成江河姑息之為害不其甚歟六月以毛文龍為平遼總兵官先是文龍襲取鎮江報巡撫王化貞而不及經略熊廷弼兩人隙始開時用事者方主化貞遂授文龍總兵官加至左都督掛將軍印賜尚方劍設軍鎮皮島如內地皮島亦謂之東江在登萊大海中綿亘八十大里不生草木逺南岸近北岸北岸海靣八十里即抵清界其東北海則朝鮮也島上兵本河東民自天啓元年河東失民多逃島中文龍籠絡其民為兵分布哨船聨接登州以為犄角計中朝是之顧文龍所居東江形勢雖足牽制其人本無大略往往衄敗歲糜餉無算且惟務廣招商賈販易禁物無事則鬻參販布為業有事亦罕得其用焉秋七月沈㴶罷刑部尚書王紀初因劾主事徐大化語隱及㴶至是再疏直攻㴶比之蔡京㴶亦劾紀庇熊廷弼獄詔兩解之未幾紀削籍去業向髙言紀㴶交攻俱失大臣體獨斥紀如公論何㴶不自安乃引去自㴶首進募兵之策結交閹寺遂開內操朝議惡之及是罷歸後逾年卒質實沈㴶劾王紀庇熊廷弼獄事按廷弼薦遼陽佟卜年為監軍僉事張鶴鳴行邊以卜年嘗通李永芳謀叛欲以甚廷弼罪鎮撫司獄其移刑部紀與員外郎顧大章辨其誣改輕比故㴶劾之王紀字維理苪城人顧大章字伯欽常熟人八月以孫承宗經略薊遼初王化貞既失廣寧關外五城七十二堡悉為喀喇沁諸部所據聲言助邊實懷窺伺經略王在晉與薊遼總督王象乾請給月糧嵗費百萬又請築重關于八里鋪設守兵四萬人寧前兵偹僉事袁崇煥以為非策白之葉向髙向髙不能决承宗請身往定之乃詣關門相度還奏築重城不若築寧逺要害與覺華島相犄角因言在晉不足任自請督師帝許之賜尚方劍御門臨遣以寵其行承宗既至關定軍制申明職守以馬世龍為總兵官令逰擊祖大夀等守覺華島副將趙率教守前屯前後築城堡數十練兵十一大萬造鎧仗數百萬開屯田五千頃我敗衄軍聲頗振清兵不深入而承宗防守嚴亦不致方承宗之督師也辟職方主事鹿善繼為贊畫薦監軍副使閻鳴奏為遼東巡撫帝皆從之及至關命善繼治軍儲而以鳴泰無實略軍事多不預議鳴泰怏怏求去承宗旋亦引疾帝乃罷鳴泰論留承宗以張鳯翼為巡撫鳯翼怯力主守關議承宗不可乃復出關抵寧遠集將吏議所守衆多如鳯翼指獨崇煥善繼請守寧逺承宗然之義乃定命大壽興工崇煥及滿桂守之承宗將圖大舉請餉二十四萬帝即命所司給之兵工二部相與謀曰餉足渠即妄為故用文移往復緩之師竟不果出質實八里鋪在山海關外袁崇煥字元素東莞人馬世龍字蒼元寧夏人趙率教陜西人本朝乾隆四十一年追諡忠烈鹿善繼定興人滿桂䝉古人喀喇沁舊作哈喇慎今改九月增田賦時增州縣兵御史馮英請計畝加餉從之質實馮英趙州寧晉人封弟由檢為信王即莊烈帝上諭册封信王于二十三日皇極門外東廡百官行禮給事中甄淑疏請文武一例殿試疏言武舉中式一百六十人以本等巾服謝恩職方會同科道查明年貌勇力伎藝才德注本人名下十月上旬過堂令各陳所能先期演試十月望日皇上名臨軒策問閣臣與兵部尚書侍班皇上欽定一甲三授都司僉事二甲三十名授守偹三甲百餘名以次各授出身職方司遇缺便補定限三年內選完質實按成化中太監汪直請武舉設科鄉試會試殿試人悉如進士例不果行至是甄淑疏請之甄淑黃岡地震先是二月濟南東昌河南海寧地震三月濟南東昌屬縣八連震三日至是平凉隆德諸縣及諸堡所地震如翻壤城垣七千九百餘文屋宇萬一千八百餘區壓死男婦萬二千餘口後十一月陜西又震冬十月左都御史鄒元標副都御史馮從吾罷初神宗時元標從吾以建言削籍里居講學垂數十年泰昌初兩人始召用已而同官都察院乃共建首善書院于京師御史周宗建董其事大學士葉向髙為之記朝暇與同事髙攀龍等講學其中名望日重而諸不附東林者咸忌之會明年當京察給事中朱童䝉郭允厚郭興治慮為元標所黜童䝉乃首劾之以講學為門戶元標疏辨求去帝已慰留允厚復繼劾語尤妄誕而魏忠賢方竊政傳㫖謂宋室之亡由于講學將加嚴譴從吾言宋之不競以禁講學故非以講學故也葉向髙亦力為解且乞同去乃得溫㫖而興治復力攻比元標于山東妖賊元標從吾遂並引歸先是書院方建御史黃遵素謂元標曰都門非講學地徐文貞已叢議于前矣謂徐階也元標不能用至是尊素言果驗元標從吾既歸羣小擊碎其碑暴于門外先師木主委棄路隅經史典籍盡被焚湯而院獨存後崇禎中禮部尚書徐光啓率西洋人若望等借院修厯署曰厯局質實郭允修曹州人郭興治東光人徐光啓字子先上海人癸亥三年春正月以顧秉謙朱延禧朱國禎魏廣微並為尚書兼東閣大學士預機務廷推閣臣首列孫慎行盛以宏皆不用時魏忠賢用事因言官周宗建等首劾之忠賢于是謀結外廷諸臣秉謙廣微率先諂附霍維華孫杰之徒從而和之忠賢乃援秉謙廣微偕延禧國禎入閣時閣中已有業向髙韓爌何宗彥朱國祚史繼偕又驟增四人直房幾不容坐秉謙廣微庸劣無恥忠賢得為羽翼勢益張而二人曲奉忠賢儼如奴役質實顧秉謙崑山人朱延禧聊城人朱國禎字文寧烏程人魏廣徹南樂人允貞子紅毛番據澎湖紅毛番即和蘭地近佛郎機在西南海中其人深目長鼻髮眉鬚皆赤足長尺有二寸頎偉倍常萬厯中福建啇人嵗給引往販吕宋諸國和蘭人就而轉販未敢窺中國也自佛郎機市香山據吕宋和蘭甚慕之二十九年駕大艦擕巨炮直薄吕宋吕宋人力拒之則轉薄香山澳澳中人詰問言欲通市貢不敢為冦當事難之召其酋入城逰處一月不敢聞于朝乃遣還有海澄人李錦及奸商潘秀郭震販久與和蘭人習語及中國事錦曰若欲通貢市無若漳州者漳南有澎湖嶼去海逺誠奪而守之貢市不難成也錦乃代為書移守臣即俾秀震齎書當事大駭繫秀于獄震不敢入初秀與酋約有成議乃聞而酋不及待即駕艦抵澎湖錦往偵被獲亦下獄已而議遣二人諭其酋還國且拘震與俱酋觀望不肯去時稅使髙寀者嗜賄甚隱遣心腹周之範詣酋說以三萬金餽寀即許貢市酋喜盟有日矣會總兵施養政令都司沈有容將兵往諭有容負膽智大聲諭說酋心折乃悔悟令之範還所贈金止有哆囉嗹玻璃器及番刀番酒餽寀乞代奏通市寀不敢應而撫按嚴禁奸民下海犯者必誅由是接濟路窮番人乏食始揚帆去然是時佛郎機橫海上紅毛與爭雄復泛舟東來侵奪臺灣地築室耕田久留不去已又出據澎湖築城設守漸為求市計守臣懼禍說以毁城徙去即許互市至是果毁其城然據臺灣自若及互市不成復築澎湖尋犯厦門官軍却之濵海郡邑為之戒嚴既而巡撫南居益請于朝發兵出擊持數月冦又不退乃大發兵諸軍齊進冦勢窘運米入舟而去獨渠帥髙文偉等十二人據髙樓自守諸將破擒之澎河之警始息其據臺灣者如故質實和蘭明史外國傳和蘭本國去中國絶逺茟人未嘗至其所恃惟巨舟大炮舟長三十丈廣六丈厚二尺餘樹五桅後為三層樓旁設小窗置銅炮桅下盟二丈巨鐵炮發之可洞裂石城震數十里世稱紅夷炮即其制也柁後置照海鏡大徑數尺能照數百里云佛郎機近滿喇加正德中據其地逐其王遣使臣貢方物請封始知名吕宋在南海中去漳州甚近澎湖島名在今泉州府東海中與金門所相對宋史泉州東有海島曰澎湖烟火相望即其地也臺灣在福建泉州南海中古曰東番今為府屬福建布政使厦門在泉州府同安縣西南海中嘉禾嶼有城今設提督總兵官駐之分巡道及府同知亦駐此沈有容字士宏宣城人南居益字思受渭南人後闖賊入關不屈死本朝乾隆四十一年追諡忠烈發明和蘭僻在海島素不知名並非佛即機吕宋諸國可比其薄香山澳求通貢市當事既已難之則當秦聞于朝嚴拒其實乃招其酋入城遊處匝月使彼得窺中國所有益生艷戀而不肯去而奸商輩遂得肆其邪謀為之導誘皆始謀不臧䝉蔽飬奸有以致之也至髙寀貪黷嗜賄通問始交令番酋生心輕視中國澎湖臺灣之警厯時不熄則尤此事罪魁時錦秀等諭死戍邊而獨不聞治髙寀黷賄之罪是朝廷于致患之由固未周知亦不欲深究失刑漏網又豈獨髙寀一人已哉遣中官刺邊事帝好察邊情常遣中官詣闕門具事狀奏報名曰較事及魏忠賢竊柄遣其黨劉朝等四十五人齎甲仗弓矢白金文綺先俊至山海關頒賚將士實覘軍也孫承宗疏言中使觀兵自古有戒當水旱荒疲之後將領罷邊籌而事違迎士卒釋戈甲而供使役俱屬未便且山海關城知中使將出將吏憂懼即令命使已行無容追議恐後此創為事例不可不慎也帝不省三月太白晝見二月丙戌晝見至是月丁巳又見夏四月京師地震震日庚申朔也十月乙亥復震朱國祚罷國祚在閣素行謹慎事持大體十三疏乞休遂許之未幾史繼偕亦致仕先是刑部尚書王紀為魏忠賢所逐國祚疏救復具揭爭之紀為禮部侍郎嘗以事忤國祚者也人以是稱國祚長者五月四川總督朱燮元克永寧奢崇明走龍場先是川兵既克重慶貴州兵亦復遵義已而遵義再為賊所陷推官馬鳯雛被殺朝議加燮元兵部侍郎為四川總督討賊至是燮元謀直取永寧集將佐曰我久不得志于賊者我以分賊以合也乃盡撤諸軍會長寧連破賊寨與秦良玉合兵搏戰賊大敗遂入青岡平抵城下拔之降賊二萬副總兵秦衍祚等亦克遵義崇明父子逃入舊蘭州城尋為參將羅乾象所攻克賊勢益蹙乃率餘衆走水西龍場借兵安邦彥邦彥遣二軍窺遵義永寧燮元又敗走之諸將乘勝鏖入龍埸生擒崇明妻宋氏及其弟崇揮斬獲萬計崇明父子竄深箐得免時燮元以永寧既拔蜀中已靖遂不窮追而貴州巡撫王三善以崇明竄入水西會師六萬進討屢戰皆捷遂渡渭河直抵大方入居安位第位與其毋社輝走火灼安邦彥匿織金皆不敢出三善既連破賊有輕敵心謂賊不足平駐大方久之會糧盡不得已退師乃焚大方廬舍而東賊躡之副總兵秦民屏參將王建中戰殁三善遂為降賊陳其愚所害其愚者賊腹心先詐降三善信之令隨行遇賊其愚衝三善墮馬三善知有變急解印綬付家人欲拔刀自刎羣賊擁之去罵不屈遂遇害監軍付使嶽具仰同知梁思泰主事田景猷等四十人皆死之于是賊勢又熾質實龍場在四川叙永㕔永寧縣東南與貴州大定府畢節縣接界今為營有守偹駐此考此又一龍場非王守仁所謫之龍場驛也長寧隨盧州地唐長寧州宋為軍明縣今因之青岡坪在叙永廳西亦曰青岡關蘭州城唐置州宋廢故城在今叙永㕔東渭河在大定府黔西北州據東南流㑹于陸廣河大方即今大定府治舊為安氏為巢穴火灼城名在黔西州北織金亦城名在黔西州西北地最深阻王三善崇禎初贈兵部尚書世廕錦衣僉事後又贈太子太保嶽具仰延安人贈光祿卿田景猷貴州思南人贈大常卿並録其一子客氏魏忠賢殺光宗選侍趙氏幽裕妃張氏于别宫殺之客魏肆惡慮妃嬪白其罪矯㫖賜趙選侍自盡選侍出光宗賜物列于庭西向禮佛痛哭自經幽裕妃别宫絶其飲食天兩妃匍匐承擔溜飲之而死皇后張氏素精明客魏憚之后又數于帝前刺客魏過失是年后有娠客氏密布心腹宫人以計隋之帝用此乏嗣又于帝郊祀日掩殺帝所罷馮貴妃左右無敢言者范慧妃以讒失寵李成妃為之乞憐客魏知之亦幽成妃别宫成妃故鑒裕妃飢死預備食物壁間半月不死斥為宫人發明從來閹寺擅權必結宫闈以自固其間有害及宫闈者亦必藉寵盛之宫闈以肆其毒至客魏肆惡已稔慮妃嬪白其罪竟敢矯㫖殺先朝選侍浸假而幽裕妃浸假而墮后胎殺貴妃幽成妃宫中生殺惟所欲為并不必有所憑藉此實前代所希聞者熹宗雖童駿至于不能保有妃嬪且不能保其子而不之覺殊出情理之外奸璫之懷朝政而害忠良莫甚于有明一代而若此之恣害宫闈作威擅殺即明季亦所未有楊漣一疏所為擢髮數之而痛哭流涕者此也冬十月以趙南星為吏部尚書先是南星為左都御史慨然以整齊天下為己任與吏部尚書張問達掌京察故給事中亓詩教趙興邦官應震吳亮嗣先朝結黨亂政議黜之吏科都給事中魏應嘉力持不可南星特著四凶論卒澄汰之天下快甚乂巡方者有提薦人材之例南星已奏止之而踵竹如故南星復劾奏巡方者始知畏法至是問達罷南星代為吏部鋭意澄清獨行己志政府及中貴憚其剛嚴不敢有所干請魏忠賢雅重南星名遣其甥傳應星謁見拒不納遇忠賢于朝正色語曰主上冲齡我輩內外臣子宜各努力為善忠賢默然怒形于色大學士魏廣微南星友允貞子也素以通家子畜之廣微入內聞三至南星門謝弗見又嘗歎曰見泉無子見泉允貞别號也廣微恨刺骨與忠賢比而齕南星然當是時東林藝盛葉向髙韓壙方輔政南星掌銓李騰芳陳于廷佐之高攀龍楊漣左光斗秉憲魏大中袁化中掌科道鄭三俊李邦華孫居相饒伸王之寀輩悉居卿二而郎官鄒維璉夏嘉遇張光前任國祥劉廷諌等亦皆民譽衆正盈廷激揚風議忠賢頗憚之子外事未敢大肆質實李騰芳字子實相潭人陳于廷字孟諤宜興人袁化中字民諧武定人鄭三俊字用章池州建德人鄒維璉字德耀瑞州新昌人張光前字爾荷澤州人程國祥字仲若上元人劉廷諌順天通州人十二月封李倧為朝鮮國王先是朝鮮國王李昖奏立其次子琿為嗣禮部執立長之議不許萬厯三十六年昖卒琿自稱署國事遣陪臣來訃且請諡帝惡其擅不允三十七年十月始封琿為國王從其臣民之請也諡昖曰昭敬天啓三年四月國人廢琿而立其姪倧陽言倧以昭敬王妃之命權國事移文督撫轉奏毛文龍為之揭報登州巡撫袁可立上言琿果不道宜聽太妃具奏以待中俞國更立疏留中八月皇妃疏請封倧禮部尚書林堯請遣信臣會同文龍公集臣民詢訪勘辨十二月文龍申送到彼國公結乞令倧統理國事再遣重臣往正封興至是遂封倧為國王地震兩京鳯陽蘇松淮揚泗滁同日俱震魏忠賢提督東厰初神宗末刑罰弛縱而厰衛緝事亦漸稀簡詔獄至生青草及是忠賢以司禮秉筆領東厰事車馬儀衛僭擬乘輿已而任用田爾耕掌衛事許顯純為鎮撫理刑羅織無遼煆錬殘酷厰衛之毒于斯而極矣質實田爾耕任邱人許顯純定興人括天下庫藏輸京師葉向髙言郡邑庫藏已竭藩庫稍餘倘盡括之猝有如山東白蓮教之亂將何以應帝不納御定資治通鑑綱目三編卷三十二
