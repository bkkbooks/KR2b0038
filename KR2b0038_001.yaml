body:
  text: 乾隆四十年五月十五日內閣奉上諭前曽命倣朱子通鑑綱目體例纂為明紀綱目刋行已久兹披閲葉向髙集見其論福藩田土疏所敘向日旨意云養贍地土原給四萬頃卿等屢奏地土難以湊處王亦見辭今減去二萬頃云云則福王當日所得之田僅二萬頃今綱目載福王常洵之國條云賜莊田四萬頃中州腴土不足取山東湖廣田益之與向髙有不合又所載青海朵顔等人名對音沿用鄙字與今所定同文韻統音字及改正遼金元國語解未為畫一是張廷玉等原辦綱目惟務書法謹嚴而未暇考核精當尚不足以昭傳信著交軍機大臣即于方略館將原書改纂以次進呈候朕親閲鑒定其原書著查繳欽此乾隆四十年五月十八日內閣奉上諭昨因明紀綱目考核未為精當命軍機大臣將原書另行改輯候朕鑒定因思綱目三編雖亦曽經披覽但從前所進呈之書朕鑒閲尚不及近時之詳審若通鑑輯覽一書其中體例書法皆朕親加折衷一本大公至正為可法則此次改編綱目自當倣照辦理又明史內於元時人地名對音訛舛譯字鄙俚尚沿舊時陋習如啚作為兔之類既於字義無當而垂之史册殊不雅馴今遼金元史已命軍機大臣改正另刋明史乃本朝撰定之書豈轉可聼其訛謬現在改辦明紀綱目著將明史一併查改以昭傳信朕非于此等音譯字面有所偏袒蓋各國語音不同本難意存牽合即如滿洲蒙古文譯為漢文此音彼字兩不相涉乃見小無識之徒欲以音義之優劣強為分别軒輊實不值一噱朕每見法司爰書有以犯名書作惡劣字者輒令改寫而前此書回部者每加犬作􅉰亦令將犬旁削去誠以此等無關褒貶而適形鄙俚實無足取况當海宇同文之世又豈可不務為公溥乎將此通諭知之所有原頒明史及綱目三編俟改正時並著查繳欽此
