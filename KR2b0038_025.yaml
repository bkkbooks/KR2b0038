body:
  text: 起壬午明世宗嘉靖元年盡戊子明世宗嘉靖七年凡七年壬午世宗肅皇帝嘉靖元年春正月清寧宫後殿災定皇考聖母本生父母稱號先是尊崇興獻帝后議既定詔告天下越數日帝復手敕加興獻帝后以皇號楊廷和等上言漢宣帝繼孝昭後追諡史皇孫王夫人曰悼考悼后而已光武上繼元帝巨鹿君以上立廟章陵而已今與獻加稱帝后較之前代已極尊崇若加皇字與孝廟慈夀並是忘所後而重本生任私恩而棄大義臣等不得辭其責願罷歸尚書喬字亦言正統大義惟賴皇字以明若加于本生之親則正統混而無别非所以重宗廟正名分也帝曰慈夀皇太后懿旨朕不敢違廷和等復偕禮官執奏廷臣諍者百餘人皆言稱皇非是請斥張璁邪説俱不報及是清寧宫後三小殿災廷和等因言興獻帝后加稱列聖神靈容有未安今火災示戒昭然可見給事中鄧繼曾亦言天有五行火實主禮人有五事火實主言名不正則言不順言不順則禮不興今之火災廢禮失言之效也帝勉從衆議乃稱孝宗曰皇考慈夀皇太后曰聖母興獻帝后止稱本生不稱皇質實鄧繼曾字士魯資縣人甘州軍亂殺巡撫都御史許銘甘肅總兵李隆與銘不相能會支月糧嗾部卒請增值銘不許遂圍公廨毆殺銘焚其尸五衛軍大亂詔擢陳九疇為僉都御史巡撫甘肅未至巡按御史喻茂隆按驗銘事以聞乃誅隆及亂卒首事者九疇抵鎮以甘肅軍政廢弛疏言額軍七萬餘存者不及半且多老弱請令召募從之質實五衛謂甘州左右中前後衛也並明洪武中置屬陜西行都司許銘字德新宛平籍莫縣人三月上慈壽皇太后尊號曰昭聖慈壽皇太后武宗皇后曰莊肅皇后皇太后邵氏曰壽安皇太后興獻后曰興國太后是月丁巳以上昭聖慈夀皇太后莊肅皇后尊號遣定國公徐光祚武定侯郭勛惠安伯張偉祭告天地宗廟社稷戊午上夀安皇太后興國太后尊號仍命尤祚等祭告壬戌帝御奉天殿頒詔天下秋九月立皇后陳氏昭聖張太后為帝選婚臺官言大名有佳氣求得后迎入宫册為皇后質實皇后陳民元城人冬十月振南畿湖廣江西廣西災先是南畿及各布政司多以旱災告者帝詔撫按官講求荒政至是命所司祭倉給振免稅糧有差時應天滁州飢尤甚南京兵部侍郎席書奉命振江北令州縣十里一厰煮糜哺之全活無算質實席書字文同遂安人十一月壽安皇太后邵氏崩諡曰孝忠皇太后别祀奉慈殿七年七月改稱太皇太后癸未二年春二月提督軍務都御史俞諌討河南山東賊平之青州礦盜王堂等起顔神鎮流劫東昌兖州濟南都指揮楊紀及指揮楊浩等擊之浩戰死紀僅以身免詔責山東將吏于是諸臣分道逐賊賊不復屯聚往來金鄉魚臺間突至曹州欲渡河不得轉掠考城循河而西至東明長垣河南及保定守臣咸告急賊黨王友賢等流入祥符封邱南抵徐州廷議以諸道巡撫各顧其土事權不一請設總制大臣乃命諌與都督魯綱提督兩畿山東河南軍務以便宜節制諸道兵討之賊復流至考城官軍欲擊而河南降賊張進引三百騎馳至中都留守顧愷與俱前方戰進忽三麾其旗先却賊乘之官軍大潰將士死者八百餘人諌等連營進賊始滅時有司多誣良民助賊諌審擇之皆感泣而去質實顔神鎮即今青州府博山縣地以齊孝婦顔文薑居此故名本朝雍正十二年始置縣金鄉東漢縣明屬兖州府今因之東明漢冤句宋宛亭金改東明明洪武初省入開州孝宗四年復置屬開州今屬大名府葬孝惠皇太后于茂陵先是太后崩帝欲祔葬茂陵數下廷議禮官不敢固爭楊廷和等言祖陵不宜數興工作驚動神靈帝不從及是卒祔葬焉禮部尚書毛澄罷帝欲推尊所生嘗遣中官諭意至長跪稽首澄駭愕急扶之起其人曰上意也上言人孰無父母奈何使我不獲伸必祈公易議因出囊金畀澄澄奮然曰老臣悖耄不能隳典禮獨有一去不與議已耳抗疏引疾至五六上帝輒慰留不允及是疾甚復力請乃許之舟至興濟而卒帝深悼惜之贈少傳諡文簡澄端亮有學行論事侃侃不撓帝雅敬澄雖數忤旨恩禮不哀質實興濟宋縣明屬河間府今省為鎮隸屬滄州歲星太白同晝見夏四月旱兩畿山東河南湖廣江西及嘉興大同成都皆旱赤地千里殍殣載道帝以災異敕羣臣修省以宋儒朱熹裔孫墅為五經博士正德間給事中戴銑汪元錫御史王宛等相繼言朱子繼孔子者也孔子之後有曲阜西安朱子之後亦有建安婺源今建安已置博士其子孫在婺源者宜如衢州孔廟例官其嫡長一人以奉祀詔從之至是授墅翰林院五經博士尋以西安學訓導席端言令其世襲質實孔子之後有西安宋建炎中衍聖公端友扈蹕南渡因家衢州髙宗命以州學為家廟賜田五頃以奉祭祀五傳至洙元至元間命歸曲阜襲封洙讓爵曲阜之弟治明孝宗十八年衢州知府沈杰奏言衢州聖廟自孔洙讓爵之後衣冠禮儀猥同氓庶今訪得洙之六世孫彥繩請授以官俾主祀事報可正德元年授彥繩翰林院五經博士子孫世襲時以在曲阜者為孔氏北宗在西安者為南宗云西安唐縣明為衢州府治建安三國吳析東侯官縣地置明為建寧府治今皆因之朱墅朱子十一世孫汪元錫休寧人王完遂寧人詔舉堪任府縣者命兩京三品以上及撫按官各舉所知以聞閏四月帝始修醮于宫中帝用太監崔文言建醮宫中日夜不絶楊廷和力言不可引梁武宋徽為喻優旨報納然修醮如故給事中劉最復上章極諫且劾文耗帑金狀而帝從文言命最自核侵耗數最言帑金屬內府雖計臣不得稽贏縮文乃欲假難行事逃已罪制言官疏入忤旨出為廣德州判官廷臣論救不納文憾不已嗾其黨芮景賢奏最在途仍故銜乘巨舫取夫役巡鹽御史黃國用復遣牌送之帝怒逮二人下詔獄國用謫極邉雜職最戍邵武其後帝益好長生齋醮無虛日命夏言為監禮使顧鼎臣等充導引官鼎臣進步虛詞七章且列上壇中應行事帝優詔襲答之自此詞臣多以青詞干進矣質實邵武晉縣宋即縣為邵武軍治元路明府今因之劉最字振廷崇仁人黃國用廬陵人夏言字公謹貴溪人顧鼎臣字九和崑山人發明史稱嘉靖嗣統之初能革除弊政其沖齡英敏似可有為乃蒞政未幾即惑於神仙之説寄心方外日事禱祈甚至道號自稱端居攝養若天位無所事事者雖秦皇漢武亦不至是而推原其始不過一猥鄙之宦豎為之發端實則由君心僻好於長生而蠱惑乃得夤緣而入所謂物先腐而後蟲生也若鼎臣以清華之選大雅著作雍容榆楊自可以結文章特達之知何遽承風希旨托拾羽士遊談以為供奉遂致詞臣踵以青詞為拜獻先資要津捷徑作俑之咎可勝責哉六月免嘉靖元年天下稅糧之半以災傷也是年遼東河南畿復命發粟脤之秋七月南畿大水江淮河水大溢漂沒田廬人畜無算吏部侍郎何孟春奏恤災八事曰禁奢靡曰慎賞罰曰減百官俸薪皂隸曰革冗費曰廣聽納曰安撫江淮百姓曰鄰近州縣不許遏糴曰免來嵗被災州縣稅糧帝命文武官俸如故餘悉從之刑部尚書林俊罷帝即位以俊耆德宿望詔起工部尚書改刑部時俊年已七十引疾力辭不許即扺京師會署月輟講舉祖宗勤學故事以諌數為帝言勤聖學辨異端節財用朝有大政必侃侃陳論中外想望其風采中官葛景等姦利事覺為言官所紏詔下司禮監察訊俊言內臣犯法法司不得訊是宫府異體也乞下法司公訊以昭平明之治都督劉暉下獄俊當以交結朋黨律言與許泰同罪請斬以謝天下廖鵬廖鎧齊佐王瓛論死屢詔緩刑俊乞亟行誅又劾谷大用占民田萬餘頃皆不聽中官崔文家人李陽鳯索匠師宋玨賄不獲嗾文杖之幾死下刑部治未決而中旨移鎮撫司俊留不遣力爭不納明日又奏帝怒責陳狀俊言祖宗以刑獄付法司以緝獲姦盜付鎮撫訊鞠既得猶必付法司擬罪未有奪取未定之囚反付推問者文本先朝漏姦罪不容誅兹復干內降臣不忍朝廷百五十年紀綱為若輩壞亂至此也俊每以持正屢見格遂乞致仕詔加太子太保給驛歸及大禮議定得罪者或杖死俊聞之從病中上書言古者鞭朴之刑辱之而已非欲糜爛其體膚而致之死也又非所加于士大夫也咸化時廷杖率容厚棉底衣重氊疊裹然且沈卧久乃得痊正德朝逆瑾竊權始令去衣致末年多杖死臣又見化治時惟叛逆妖言劫盜下詔獄始命打問他犯但言送問而已今一槩打問亦非故事自去嵗舊臣斥逐殆盡朝署為空乞聖明留念既去者禮致未去者慰留碩德重望如羅欽順王守仁吕柟魯鐸輩宜列置左右臣衰病待盡無復他望敢效古人遺表之意敬布犬馬之心帝但下所司而已質實吕柟字仲稱髙陵人八月封張鶴齡為昌國公時並封后父陳萬言為秦和伯吏部尚書喬宇言纍朝太后戚屬無生封公者張巒亦歿後贈今奈何以父贈為子封萬言封伯視巒更驟非制願陛下守典章以垂萬世不聽質實陳萬言肅皇后父也起家諸生甲申三年春正月地震兩畿河南山東陜西同時皆震南京刑部主事桂蕚請改稱孝宗皇伯考詔下廷臣議孝宗興獻帝稱號定已久尊崇議且寢蕚在南京與張璁同官日夜私詆朝議而南京兵部侍郎席書員外郎方獻夫初以大禮未定各草疏請追崇所生意與璁合疏具聞中朝競詆璁為邪説懼不敢上皆為蕚所見蕚揣帝雖勉從廷臣意終未慊遂上疏請改稱號并録書獻夫二疏以聞略言禮官失考典章納陛下于與為人後之非而滅武宗之統奪獻帝之宗且使興國太后壓于慈夀太后禮莫之盡三綱頓廢非常之變也乃自張璁等獻議論者指為干進逆箝人口致達禮者不敢駁議竊念陛下侍興國后慨興獻帝弗祀已三年矣拊心出涕不知其幾願速發明詔稱孝宗曰皇伯考興獻帝曰皇考别立廟大內正興國太后之禮定稱聖母庶協事天事地之道至廷臣所執不遇宋濮議耳按范純仁告英宗曰陛下受神宗詔為之子封爵悉用皇子故事與入繼之主不同則宋臣之論亦自有别今陛下奉祖訓入繼大統未賞受孝宗詔為之子則陛下非為人後而為入繼之主也明甚考興獻帝母興國太后又何疑臣久欲以請乃者復得席書方獻夫二疏伏望奮然裁斷將臣與二臣疏並付禮官令臣等面質帝得疏心動手詔下廷臣集議于是禮部尚書汪俊會廷臣七十有三人議曰祖訓兄終弟及指同産言今陛下為武宗親弟自宜考孝宗孰謂與為人後而滅武宗之統也儀禮傳曰為人後者孰後後大宗也漢宣起民間猶嗣孝昭光武中興猶考孝元孰謂入繼之主與為人後者異也宋范純仁所言蓋言恩意尤篤益當不顧私親非以生前為子者乃為人後身後入繼者不為人後也蕚言禮官執者不過前宋濮議臣等愚昧實不出此蓋程頥之議曰雖當專意於正統豈得盡絶于私恩故所繼主于大義所生存乎至情至于名稱統緒所係若其無别斯亂大倫殆為今日發也議上留中而特旨召璁蕚及書于南京俊不得已乃及羣臣請加皇字以全徽稱帝亦留十餘日始報可質實席書方獻夫二疏見明史本傳書疏略曰宋英宗入嗣在衮衣臨御之時今上入繼在宫車晏駕立之後議者以陛下繼統武宗仍為興獻帝之子别廟祀張璁霍韜之議未為非也然尊無二帝陛下于武宗親則兄弟分則君臣既奉孝宗為宗廟可復有他稱乎宜稱曰皇考興獻王此萬世不刋之典禮官三四執奏未為失也然禮本人情陛下尊為天子慈聖設無尊稱可乎故尊所生曰帝后上慰慈闈此情之不能已也為今日議宜定號曰皇考興獻帝别立廟大內歲時祀太廟畢仍祭以天子之禮似或一道也蓋别廟祀則大統正而昭穆不紊隆以殊稱則至愛篤而本支不淪尊尊親親並行不悖至慈聖宜稱皇母某后不可以興獻加之獻諡也豈宜加于今日哉獻夫疏略曰先王制禮本緣人情君子論事當究名實竊見近日禮官所議有未合乎人情未當乎名實一則守禮經之言一則循宋儒之説也臣獨以為不然據禮經喪服傳曰何如而可以為人後支子可也又曰為人後者孰後後大宗也大宗者尊之統也不可以絶故族人以支子後大宗也適子不得後大宗為是禮者蓋謂有支子而後可以為人後未有絶人之後以為人後者也今興獻帝止生陛下一人别無支庶乃使絶其後而後孝宗豈人情哉且為人後者父嘗立之為子子嘗事之為父故卒而服其服今孝宗嘗有武宗矣未嘗以陛下為子陛下于孝宗未嘗服三年之服是實未嘗後孝宗而強稱之為考豈名實哉為是議者未見其合于禮經之言也又按程頥濮議謂英宗既以仁宗為父不當以濮王為親此非宋儒之説不善實今日之事不同蓋仁宗嘗育英宗于宫中其不同者一孝宗有武宗為子也仁宗未嘗有子也其不同者二濮王别有子可以不絶興獻帝無别子也其不同者三豈得以濮王之事比今日之事哉為是議者未見其善述宋儒之説也若謂孝宗不可無後故必欲陛下為子此尤不達于大道者也推孝宗之心所以必欲有後者在不絶祖宗之祀不失天下社稷之重而已豈必拘拘父子之稱而後為有後哉孝宗有武宗武宗有陛下是不絶祖宗之祀不失天下社稷之重矣是實為有後也且武宗君天下十有六年不忍孝宗之無後獨忍武宗之無後乎此尤不通之説也夫興獻帝當父也而不得父孝宗不當父也而強稱為父武宗當繼也而不得繼是一舉而三失焉臣未見其可也且天下未有無父之國也瞽瞍殺人舜竊負而逃今使陛下舍其父而有天下陛下何以為心哉臣知陛下純孝之心寧不有天下決不忍不父其父也説者以為興獻帝不當稱帝此尤不達于大道者也孟子曰孝子之至莫大乎尊親周公追王太王王季子思以為達孝豈有子為天子父不得稱帝者乎今日之事臣嘗為之説曰陛下之繼二宗當繼統而不繼嗣興獻之異羣廟在稱帝而不稱宗夫帝王之體與士庶不同繼統者天下之公三王之道也繼嗣者一人之私後世之事也興獻之得稱帝者以陛下為天子也不得稱宗者以實未嘗在位也伏乞宣示朝廷復稱孝宗曰皇伯稱興獻帝曰皇考别立廟祀之夫然後合于人情當乎名實非惟得先王制禮之義抑亦遂陛下純孝之心矣桂蕚字子實安仁人方獻夫字叔賢南海人二月罷華蓋殿大學士楊廷和自帝即位廷和以帝雖沖年性英敏自信可輔太平事事有所持諍及議大禮先後封還御批者四執奏幾三十疏帝常匆忽有所恨左右因乘問言廷和専恣無人臣禮帝意遂內移會帝遣內官提督蘇杭織造工部及給事中御史皆以江左比嵗不登請母遣不聽趣內閻撰教廷和因極言蘇杭諸府旱潦相繼淮楊徐邳田廬漂沒幼稚計斤而鬻母子赴水而死更重以繼造恐激他變敕書必不敢革帝趣愈急戒母瀆擾執拗廷和力爭言臣等舉朝大臣言官言之不聽顧二三邪佞之言是聽陛下能獨與二三邪佞共治祖宗天下哉且陛下以織造為纍朝舊例不知洪武以來何嘗有之創自化治耳憲宗孝宗愛民節財美政非一陛下不取法獨法其不美者何也即位一詔中官之幸路絀塞殆盡天下方傳誦聖德今忽有此何以取信帝為謝不審俾飭所遣中官毋縱肆而已不能止也于是廷和纍疏乞休及更議大禮不合疏語露不平帝遂聽之去言官交章請留不報廷和既去乃議稱孝宗為皇伯考矣三月罷禮部尚書汪俊以席書代之帝諭建室奉先殿側祀獻帝主俊上書爭曰陛下入奉大宗不得祭小宗亦猶小宗之不得祭大宗也昔興獻帝奉藩安陸則不得祭憲宗今陛下入繼大統亦不得祭興獻帝是皆以禮抑情者也然興獻帝不得迎養夀安皇太后于藩邸陛下得迎興國太后于大內受天下之養而尊祀興獻帝以天子之禮樂則人子之情獲自盡矣乃今聖心無窮臣等敢不將順但于正統無嫌乃為合禮帝嚴旨切責趣立廟益急俊曰立廟大內有干正統臣實愚昧不敢奉詔帝令集廷臣大議俊等復上議曰謹按先朝奉慈别殿蓋孝宗皇帝為孝穆皇太后祔葬初卑神主無薦享之所而設也當時議者皆據周制特祀薑嫄而言至為本生立廟大內則從古未聞惟漢哀帝為定陶恭王立廟京師師丹以為不可哀帝不聽卒遺後世之譏陛下有可以為堯舜之資臣不敢導以衰世之事請于安陸特建獻帝百世不遷之廟他日襲封興王子孫世世薦享陛下嵗時遣官持節奉祀亦足伸陛下無窮至情矣帝不納仍命遵前旨再議俊再疏乞休帝怒責以肆慢允其去召席書代之書未至令侍郎吳一鵬署部事一鵬持議如俊言并請下璁蕚等法司按治帝報曰朕起親藩奉宗祀豈敢違越但本生皇考寢園逺在安陸於爾等安乎命下再四爾等欺朕沖歲黨同執違敗父子之情傷君臣之義往且勿問其奉先殿西室可亟修葺盡朕嵗時追逺之情遂趣成之名曰觀德殿而命一鵬偕京山侯崔元等迎主安陸一鵬等復上言厯考前史並無自寢圍迎主入大內者且安陸為獻帝啓封之疆神靈所戀伏乞俯納羣言改題神主奉安故宫為百世不遷之廟其觀德殿中宜别設神位香几以慰孝思奏入不納一鵬乃行及秋迎主至奉安于觀德殿質實觀德殿在奉先殿西嘉靖六年三月移建于左改稱崇先殿賑淮揚飢時淮揚諸郡大飢父子相食道殣相望臭彌千里巡按御史朱衣勘其狀以聞乃命發帑截漕賑之是月河南亦以災告並命給賑質實朱衣武昌人兩廣賊平先是廣西上思州賊黃鏐糾洞兵作亂既就捕繫潯州獄鏐黨偽為軍門檄取以歸遂復叛攻劫州縣總督都御史張鼎討禽之而廣東賊蔡猛三等又起聚新寧恩平諸賊僣名號肆剽掠衆至數萬嵿合兵三萬餘人分二哨進擊破巢二百禽斬一萬四千餘人俘賊屬五千九百餘人猛三等皆授首尋程鄉賊梁八尺等與福建上杭賊相應都指揮李皋等會福建官軍夾擊俘斬五百餘人歸善李文積聚姦宄流劫鄉村官吏討捕久不克嵿遣參政徐度勦之俘斬千餘人境內恐平質實上思州唐置宋屬雍州遷隆寨元屬思明路明屬南寧府新寧明孝宗十一年始析新會縣置屬廣州府恩平唐縣宋廢明成化二年始析陽江及新興新會三縣地復置屬肇慶府今皆因之張嵿字時俊蕭山人徐度江隂縣人夏四月追尊興獻帝曰本生皇考恭穆獻皇帝上興國太后尊號曰本生皇母章聖皇太后擇日祭告郊廟大赦天下時編修鄒守益疏言陛下推崇本生業已尊為帝后今復加稱皇考去其始封之號直與正統無别不可以示後世又言厯觀前史如冷褒段猶之徒當時所謂忠愛後世所斥為邪媚也師丹司馬光之徒當時所謂欺慢後世所仰為正直也臣恐後之視今猶今之視昔帝得疏大怒下詔獄拷掠謫廣德州判官已而修撰吕柟亦言大禮未正御史段續陳相請正席書桂蕚罪吏部員外郎薛蕙上為人後解鴻臚寺少卿胡侍言張璁等議禮之失俱下獄謫官奪俸有差質實鄒守益字謙之安福人薛蕙字君采亳州人段續陽曲人陳相洛陽人胡侍寧夏人五月罷謹身殿大學士蔣冕以石珤為吏部尚書兼文淵閣大學士預機務自楊廷和罷冕以首輔當國帝愈欲尊崇所生逐禮部尚書汪俊以怵冕而用席書代之且召張總桂蕚物情甚沸冕乃抗疏極諌曰陛下嗣承丕基固因倫序素定然非聖母昭聖皇太后懿旨與武宗皇帝遺詔則將無所受命今既受命于武宗自當為武宗之後特兄弟之名不容紊故兄武宗考孝宗母昭聖而于孝廟武廟皆稱嗣皇帝稱臣稱御名以示繼統承祀之義今乃欲為本生父母立廟奉先殿側臣雖至愚斷斷知其不可夫情既偏重于所生義必不専于所後將孝武二廟之靈安所托乎邇者復允汪俊之去趣張璁桂蕚之來人心益駭方廷臣議建廟之日天本晴明忽變隂晦至暮風雷大作天意如此陛下可不思變計哉因力求去帝得疏不悅猶以大臣故優詔答之冕再疏請罷建廟之議且乞休復以天變為言帝益不悅遂令馳傳歸珤初為吏部尚書剛方謝請託時望大孚而楊廷和有所不悅遂改掌詹事典誥敕以奪其權帝知珤不附廷和欲引以贊大禮乃命珤代冕而珤據禮力爭大失帝意質實石珤字邦彥藁城人六月以張璁桂蕚為翰林學士方獻夫為侍講學士是年春蕚疏既上廷臣方具議璁復言今日之禮不在皇與不皇而在考與不考蕚又具第二疏如璁指且言陛下承祖宗大統執政乃無故任已私為不道使陛下終身為無父人逆倫悖義若此猶可使與斯議哉二人疏同上帝大喜立召赴京初議禮諸臣無力詆執政者至蕚遂斥為不道且欲不使輿議其言恣肆無忌朝士無疾之既而獻帝已追尊本生皇考閣臣請停召命帝不得已從之二人已在道意大沮喪乃復合疏請與禮官而質且云本生對所後而言若不亟去此二字則雖稱皇考實與皇叔無異疏入帝復召二人比至都衆洶洶欲倣先朝馬順故事斃之于廷蕚懼不敢出璁越數日始朝恐有伺者出東華門走匿武定侯郭勛家勛大喜納為內助時給事中張翀等連劾璁蕚及方獻夫席書諸人章下所司翀彚送刑部尚書趙鑑即列璁等罪狀上請私相語曰倘得俞旨便􅡼殺之帝亷知之特命璁蕚為學士獻夫為侍讀學士切責翀鑑學士豐熙修撰舒芬楊慎張衍慶編修王思等皆不願與璁蕚同列乞罷歸帝怒俱奪俸璁蕚以議禮驟貴于是間罷失職武夫小吏皆望風希旨抗論廟謨矣質實郭勛武定侯英六世孫張翀字習之潼川人豐熙字原學鄞人楊慎字用修廷和子張衍慶汲縣人秋七月罷吏部尚書喬字帝即位初求治甚鋭以宇為選郎時有人倫鑒召之長吏部復起林俊于刑部彭澤于兵部孫交于户部皆海內重望四人者持正不阿遇事有不可輒諌帝初亦嘉納之然帝性剛好自用俊既以爭李陽鳳獄不合去會御史史道補外疑出執政指遂誣訐楊廷和宇與澤劾道挾私澤詆斥道尤力于是言官交章攻澤澤不自安乞罷而交年已七十亦纍疏請老兩人同月致仕獨宇在位所執漸不見聽復纍爭大禮積忤帝及是張璁桂蕚並為學士宇言內降恩澤先朝率施于佞幸小人士大夫一預其間即不為清議所齒況學士最清華而俾蕚等居之誰復肯與同列哉帝怒切責宇遂乞休許之質實孫交字大同安陸人為人清慎恬慤素為興獻王所重嘗割邸中陽春臺東偏地益其宅後中官言孫尚書侵地世宗曰此先皇所賜吾敢奪耶詔章聖皇太后尊號去本生羣臣伏闕諌戍學士豐熙等于邊杖員外郎馬理等于廷帝召見羣臣于左順門示以手敕言章聖皇太后命去本生字羣臣駭愕而張璁桂蕚復列上禮官欺罔十三事且斥為朋黨于是九卿詹事翰林給事御史六部大理行人諸司各上章爭之皆留中不下尚書金獻民少卿徐文華倡言曰諸疏留中必改稱孝宗為伯考矣吏部右侍郎何孟春曰憲宗朝議慈懿太后葬禮姚夔率百官伏哭文華門此我朝事也楊慎曰國家養士百五十年仗節死義正在今日編修王元正給事中張翀曰萬世瞻仰在此一舉有不力爭者擊之于是九卿二十三人翰林二十三人六部二十一人御史三十人諸司郎官吏部十二人户部三十六人禮部十二人兵部二十人刑部二十七人工部十五人大理寺屬十一人跪伏左順門有大呼髙不皇帝孝宗皇帝者帝方齊居文華殿命中官諭之退不聽帝怒遣錦衣先執為首者豐熙張翀及御史余翺郎中余寬黃侍顯陶滋相世芳大理寺正毋德純八人下獄楊慎等乃撼門大哭衆皆哭聲震闕廷帝益怒命盡録諸臣姓名時有不在列者其親故以不預義舉為嫌多為代書遂繫馬理等一百九十人于獄孟春等待罪越數日為首者戍邊四品以上奪奉五品以下豫杖編修王相等十有七人杖死自是衣冠喪氣璁蕚等勢益張質實張璁列上十三事一曰三代以前無立後之禮二曰祖訓不言立後三曰孔子射于矍相之國斥與為人後者四曰遺詔不言繼嗣五曰禮輕本生父母六曰伯叔父名分有定七曰漢宣帝光武俱為父立皇考廟八曰朱子嘗言定陶事為壞禮九曰古者遷國載主十曰祖訓皇后治內凡外事無得干預不宜假昭聖懿旨十一曰皇上于大行夀安太后不得率天下終三年喪十二曰新頒詔宜改正十三曰臺諫連名章疏勢有所迫禮官欺妄罪不可逭馬理字伯循三原人金獻民字舜舉綿州人王元正字舜卿盩厔人余翺定遠人余寬浙江寧海人黃待顯莆田人陶滋絳州人相世芳安邑人毋德純南充人王相字懋卿鄞人案明史何孟春傳九卿二十三人尚書金獻民秦金趙鑑趙璜俞琳侍郎何孟春朱希周劉玉都御史王時中張潤寺卿汪舉潘希曽張九斂吳祺通政張瓉陳霑少卿徐文華張縉蘇民金瓉府丞張仲賢通政參議葛會寺丞袁宗儒翰林二十三人則掌詹事府侍郎賈詠學士豐熙侍講張壁修撰舒芬楊維聰姚淶楊慎張衍慶編修王元正許成名劉棟張潮崔桐葉桂章王三錫余承勳陸釴王相應良王思檢討金皋林時給事中二十一人則張翀劉濟安磐張漢卿張原謝貴毛玉曹懷張嵩鄭一鵬王瑄張廷羽黃重李錫趙漢陳時明鄭自璧襲紹宗韓楷黃臣胡納御史三十人則王時柯余翺葉竒鄭本公楊樞劉潁祁杲杜民表楊瑞張英劉謙亨許中陳克宅談纘劉翀張録郭希俞蕭一中張恂倪宗嶽王璜沈教鍾卿密胡瓊張濂何鰲張曰韜藍田張鵬翰林有孚吏部十二人則郎中余寬黨承志劉天民員外郎馬理徐一鳴劉勳主事應大猷李舜臣馬冕彭澤張鵾司務洪伊户部三十六人則郎中黃待顯唐升賈繼之楊易楊淮胡宗明栗登黨以平何巖馬朝卿員外郎申良鄭漳顧可久婁志德主事徐嵩張庠髙奎安璽王尚志朱藻黃一道陳儒陳騰鸞髙登程旦尹嗣忠郭日休李録周詔戴亢繆宗周邱其仁俎琚張希尹司務金中夫檢校丁律禮部十二人則郎中余才汪必東張總張懷員外郎翁磐李文中張深主事張鏜豐坊仵瑜丁汝蘷臧應奎兵部二十人則郎中陶滋賀縉姚汝臯劉淑相萬潮員外郎劉漳楊儀王德明主事汪溱黃嘉賓李春芳盧襄華鑰鄭曉劉一正郭持平余禎陳賞司務李可登劉從學刑部二十七人則郎中相世芳張峩詹潮胡璉范樣陳力張大輪葉應驄白轍許路員外郎戴欽張儉劉士竒主事祁敕趙廷松熊宇何鰲楊濓劉仕瀟樟顧鐸王國光汪嘉會殷承敘陸銓錢鐸方一蘭工部十五人則郎中趙儒葉寬張子衷汪登劉璣江珊員外郎金廷瑞范總龎淳主事伍餘福張鳳來張羽車純蔣洪鄭騮大理寺十一人則寺正毋德純蔣同仁寺副王暐劉道評事陳大綱鍾雲瑞王光濟張徽王天民鄭重杜鸞廷臣受杖死者明時世宗本紀明實録以為十六人何孟春傳以為十八人王思傳以為十七人蓋思與王相張原毛玉裴紹宗張曰韜胡瓊楊淮胡璉申良張澯安璽仵瑜臧應奎余禎殷承敘李可登也按明實録不載張原故止十六人然考明史原傳云原再被杖創重卒則王思傳稱十七人者為得其實云罷武英殿大學士毛紀紀請宥伏闕諸臣帝怒傳旨責紀要結朋姦背君報私紀乃上言曰曩蒙聖諭國家政事啇榷可否然後施行此誠內閣職業也臣愚不能仰副明命邇者大禮之議平臺召對司禮傳諭不知其幾似乎啇榷矣而皆斷自聖心不蒙允納何可否之有至於笞罰廷臣動至數百乃祖宗來所未有者亦皆出自中旨臣等不得與聞宣召徒勤扞格如故慰留雖切詰責隨加臣雖有體國之心不能自盡夫要結朋姦背君報私正臣平日所痛憤而深疾者有一于此罪何止罷黜今陛下以之疑臣尚可一日靦靣朝寧間哉乞賜骸骨歸鄉里以全終始尤望陛下法祖典學任賢納諌審是非辨忠邪以養和平之福帝銜紀亢直允其去八月大同軍亂殺巡撫都御史張文錦初文錦以拒宸濠得重名既擢巡撫鋭意慗飭邊政大同北四望平衍寇至無可禦乃議于城北九十里外增築五堡參將賈鑑督役嚴卒巳怨及堡成欲徙鎮二千五百家戍之衆憚行請募新丁僚吏咸以為言文錦怒曰如此則令不行矣鎮親兵先往孰敢後親兵素遊惰有室聞當發大恐文錦嚴趣之行鑑承風杖其隊長諸邊卒自甘州五衛殺巡撫許銘朝廷處之輕頗無忌至是卒郭鑑栁忠等乘衆憤遂倡亂殺賈鑑裂其尸走屯塞外文錦恐與外寇連令副將時陳等招之入城即索治首亂者郭鑑等大懼復聚為亂焚大同府門入行都司縱獄囚又焚都御史府門文錦踰垣走匿博野王府第亂卒欲燔王宫王懼出文錦郭錦等殺之亦裂其尸遂焚鎮守總兵署出故總兵朱振于獄脅為帥事聞帝命侍郎李昆往曲赦亂卒擢蔡天祐為僉都御史巡撫大同天祐從數騎馳入城諭軍士獻首惡衆心稍定會尚書金獻民總兵官杭雄出師甘肅道大同亂卒疑見討復鼓譟天祐懼急請再赦兵部言元惡不除無以警後請特遣大臣總督宣大軍務以制其變乃命户部侍郎胡瓉偕都督魯綱統京軍三千人以往瓉等未發而進士李枝齎餉銀至亂卒曰此承密詔盡殺大同人為軍犒也夜中火起圍枝館出牒示之乃解尋復殺知縣王文昌圍代王府脅王奏乞赦王急攜二郡王走宣府巡按御史王官言亂卒方囂大帥兵壓境是趣之叛也請亟止禁軍容臣密圖乃命瓉駐兵宣府頃之天祐奏總兵官桂勇已捕五十四人請止京軍勿遣帝責以阻撓令必獲首惡郭鑑等既而瓉次陽和勇天祐令千户苖登擒斬鑑等十一人函首送瓉請班師甫二日鑑父郭疤子復糾徐氊兒等夜殺勇家人又燉苗登家瓉言非盡殱不可帝乃切讓天祐召勇還京以故總兵朱振代之敕瓉仍駐宣府居無何天祐捕戮徐氊兒等瓉等遂班師明年正月李昆等上章言疤子潛逃塞外必為後患帝將遣使勘會瓉還京言逃卒無足患帝乃罷勘官勿遣疤子復潛入城夜焚振第明旦天祐閉城大索獲疤子及其其黨三十四人悉斬以殉盡宥脅從衆乃大定質實五堡曰水口宣寧只河栁溝樺溝地在今大同府北博野王景泰五年代隱王第三子成鐭始封傳至其孫俊櫕孝宗十二年襲封二十八年薨無子除代王蓋懿王俊杖也孝宗十二襲封嘉靖六年薨蔡天祐字成之睢州人胡瓉字伯珩永平人李枝扶溝人王官寧夏左屯衛人發明張文錦以邊政廢弛鋭意慗飭不可謂非是惟御之無素持之太急且以二千五百家之鎮卒倉猝逺徙戍堡以致驕兵悍卒煽衆為亂耳然邊卒之敢于倡亂實狃于甘州之變朝廷所以處五衛者太輕自非痛加懲創蔓實難圖乃事聞于朝仍以曲赦為弭亂之䇿無怪乎反側之徒益無所顧忌一再撫之而亂猶未定幾與唐代藩鎮之禍無異雖其後首惡就誅人心稍戢曽不數年總兵官李瑾督役浚渠竟為役卒所殺而撫順廣寧縳指揮囚辱巡撫者相繼而起姑息養姦之害一至此歟以賈詠為禮部尚書兼文淵閣大學士預機務帝即位詠為禮部侍郎奉命詣承天上獻皇帝尊號賜白金文綺尋改吏部掌詹事典誥敕及是晉禮部尚書入閣詠為人長者在政府無所建白充位而已九月更定大禮稱孝宗為皇伯考昭聖皇太后為皇伯母獻皇帝為皇考章聖皇太后為聖母尊稱由是遂定大學士石珤復諫曰大禮一事已奉宸斷無可言矣但臣反覆思之終有不安于心者心所不安而不以言言恐觸忤而不敢盡則陛下將焉用臣臣亦何以仰報君父哉夫孝宗皇帝與昭聖皇太后乃陛下骨肉至親今使疏賤讒伎小人輒行離間但知希合取寵不復為陛下體察兹孟冬時享在邇陛下登獻對越如親見之寧不少動于中乎夫事亡如事存陛下承列聖之統以總百神臨萬方焉得不加慎重顧聽細人之説干不易之與哉帝得奏不悅戒勿復言土爾番寇肅州命尚書金獻民都督杭雄往禦之土爾番比嵗通貢朝廷待之如故亦不問巴雅濟事至是莽肅爾忽以三萬騎圍肅州巡撫都御史陳九疇聞之即自甘州晝夜馳入城守禦而告警于朝帝命獻民總制軍務充總兵官帥師西討比至蘭州九疇已擊破賊斬塔濟迪分掠甘州者亦為總兵官薑奭所敗賊遁走獻民遂再上捷引還焉質實杭雄字世成世為綏德衛總旗遂為綏德人冬十二月起楊一清為兵部尚書總制三邉故相行邉自一淸始一清自是凡三為總制溫詔褒美比之郭子儀遼東賊作亂主事王冕死之冕初為萬安知縣與王守仁平宸濠守仁封新建伯冕未及敘坐他事落職既而録前功擢兵部主事巡視山海關會遼東妖賊陸雄李真等作亂突入關侍吏欲扶冕趨避冕不可曰吾奉命巡視且有親在急趨母所執兵以衛賊至母被傷冕奮前救之被執脅以刃大罵遂見害詔贈光祿少卿有司祠祀質實王冕字服周洛陽人乙酉四年春三月仁夀宫災昭聖太后宫也是年秋方命修建以嵗災民困欲止其役大學士費宏等言昭聖太后久處别殿意或不安以漸修復庶足彰陛下之孝帝曰皇伯母孝奉不可缺小民亦當受念未幾召採木侍郎王軏還京工竟罷質實王軏江都人夏五月復傳奉官帝即位盡斥先朝傳奉官已太監邱福潘傑等死詔官其弟姪錦衣司禮太監張欽死以其家人李賢承廕兵部尚書金獻民先後執奏帝皆不聽然間有傳奉猶不至纍數十人錦衣千戶王邦竒者初在武宗潮夤緣得官挾勢搆害甚衆既以冒濫汏去至是與其黨孝全等詭詞奏辨下兵部議獻民言全邦竒等足不履行陳而坐論首功身不隸公家而躐躋顯秩陛下登極汰去者三百餘人人心稱快萬一幸端再啓則前詔皆虛將來奏擾有何紀極帝竟授全等試百户獻民復奏曰令出惟行弗惟反今以小人奏辨一旦復官九十餘人徇左右私壞祖宗法竊為陛下惜之望仍斥全邦竒等以息人言卒不聽作世廟初國子生何淵首請建世室廷臣惡之出為平涼主簿屢被上官搒笞求內改帝擢為光祿寺署丞于是復申前議請崇祀獻皇帝太廟章下廷議席書率羣臣言天子七廟周文武並有功德故立文武世室于三昭三穆之上獻皇帝追稱帝號未為天子淵妄為諛詞乞寢其奏敕令再議書等言將置主于武宗上則武宗君也以臣先君分不可僣置武宗下則獻皇叔也以叔後姪神終未安在廷諸臣于稱考稱伯異同相半今祔廟之舉無一人以為可者時張璁亦言孝子之心無窮分則有限别立禰廟禮之得為者也臣昧死勸陛下為之入于太廟禮之不得為者也臣昧死勸陛下勿為書復密疏勸止帝遣中官諭書曰朕紹膺大統即以皇考為百世之室何不可卿乃怯衆飾姦邪書知帝意不可回遂請于皇城內别立一廟前後寢如文華殿制出入不與太廟同門座位不與太廟相並祭用次日廟欲稍逺庶以成禰廟獨尊之體避兩廟一統之嫌詔可親定名曰世廟而世室之議乃寢秋八月南畿地震是嵗天下地震凡六十有三田州指揮岑猛叛詔都御史姚鏌討誅之田州自洪武以來岑氏世為土知府孝宗時猛與思恩岑濬搆兵濬攻陷田州猛遁走總督潘蕃討誅濬朝議田州思恩但改設流官降猛千户徙福建正德初猛賂劉瑾以同知攝府事撫輯遺衆覬復祖職後從都御史陳金征江西流賊所至剽掠為民害尋以賊平論功進指揮同知非猛本意頗怨望又自恃兵力數侵奪鄰境上思州之役總督張嵿徵其兵不至以狀聞于是巡撫盛應期巡按謝汝儀調官軍討猛詔報可會應期以他事去命鏌往代汝儀與鏌郤乃誣鏌之子淶納猛萬金力勸其父議撫且詭為淶家書獻之鏌惶恐遂剋期進勦鏌知猛婦翁歸順知州岑璋以女失愛憾猛因令都指揮沈希儀結璋為內應大發永順保靖兵以希儀及别將張經李璋張佑程鑒統之分道並入猛聞大兵至令其下母文兵裂帛書寃狀自明不及陳軍門乞憐察鏌不聽督戰益急身與總兵官朱麟等連破其數寨猛子邦彥徑兵守險璋佯以兵千助邦彥比官軍攻千人匆自潰大呼曰兵敗矣邦彥兵亦潰官軍大破之斬邦彥猛奔歸順璋誘而鴆殺之以其首獻田州平質實歸順元州明初廢為歸順洞孝宗九年復置土州屬鎮安府嘉靖初改直𨽻州府本朝初屬思恩府雍正七年改設流官仍屬鎮安姚鏌字英之慈溪人子淶字維東沈希儀字唐佐貴縣人冬十二月大禮集議成頒示天下先是帝命席書輯大禮集議書言近題請刋布多係建言于三年以前若臣書及璁蕚獻夫韜所正取者不過五人禮科右給事中熊浹南京刑部郎中黃宗明都察院經厯黃綰通政司經厯金述監生陳雲章儒士張少連及楚王棗陽王二宗室外所附取者不過六人有同時建議若監生何淵主事王國光同知馬時中巡檢房濬言或未純義多未正亦在不取其他罷職投間之夫建言于璁蕚等召用後者皆望風希旨有所覬覦亦一切不録其錦衣百户聶能遷昌平致仕教諭王價建言三年二三月未經採入今二臣奏乞附名應如其請帝從之及是書成進書太子太保以璁蕚為詹事獻夫韜為少詹事諸與議者皆進秩因詔大禮已定自今有假言陳奏者必罪不宥質實楚王榮㳦楚昭王五世孫正德七年襲封棗陽王祁鉦襄憲王第三子正統八年始封再傳為滎肅王祐楒孝宗十六年襲封黃宗明字誠甫鄞人黃綰字宗賢黃巖人閏十二月乙卯朔日有食之丙戌五年春二月賑京師飢命發郡縣倉庾及太倉錢穀賑之是年八月賑湖廣飢十月賑南畿浙江災免稅糧物料山西四川被災稅糧亦並蠲免三月定有司久任法吏部尚書廖紀言邇者守令遷轉太頻政多苟且宜遵舊制俟九年考溝有政績者乃遷從之質實廖紀字時陳東光人夏五月召楊一清復入閣初大禮議起一清方家居見張璁疏寓書門人喬宇曰張生此議聖人不能易也乃勸席書早赴召以定大議故璁等皆喜一清而帝為世子時獻王嘗稱劉大夏李東陽及一清為楚之三傑心識之既即位以邊陲事重起一清為總制春未已也及書璁蕚用事書弟檢討春故由御史改用武宗實録成大學士費宏議出春為僉事書遂與宏有隙璁蕚驟貴至詹事舉朝惡其人宏每示裁抑璁蕚大怨亦力排宏御史吉棠因請召還一清以消朋比帝以議禮故欲藉一清箝衆口遂命一清為吏部尚書武英殿大學士既入見加少師仍兼太子太傅恩禮甚渥質實明史席書傳弟春由庶吉士授御史以兄為都御史改翰林檢討吉棠丹陽人秋九月章聖皇太后有事于太廟世廟世廟既成章聖太后欲謁見帝詢張璁桂蕚俱援廟見禮言宜先見太廟次謁世廟費宏楊一清等及禮部侍郎劉龍爭之不得石珤復上疏極諌言我朝家法后妃入宫未有無故復出者太廟尊嚴非時享祫祭天子亦不輕入況后妃乎璁蕚輩所引廟見禮今奉先殿是也聖祖神宗行之百五十年已為定制中間納后納妃不知凡幾未有敢議及者何至今日忽倡此議且隂陽有定位不可侵越陛下為天下百神之主致母后無故入太廟坤行乾事隂侵陽位不可之大者也帝不聽質實劉龍襄垣人丁亥六年春二月小王子寇宣府韃靼自榆林入寇後嵗犯邊然不敢大入前二年春其别部駐西海者以前騎寇甘肅總兵薑奭禦之斬其魁乃引去至是兩寇宣府參將王經開山先後戰死及秋又以數萬騎犯寧夏塞尚書王憲督總兵官鄭卿等敗之斬三百餘級明年復三犯邊時小王子控弦十餘萬多蓄貨貝富強特雄于諸部矣質實王憲字維綱東平人罷大學士費宏石珤張璁桂蕚既與宏有隙日毁宏于帝宏上書乞休言璁蕚挾私怨臣屢矣不與經筵講官則怨不與修獻皇實録則怨不為兩京鄉試考官則怨不為教習則又怨璁蕚疑內閣事屬臣操縱抑知臣下采物望上稟聖裁非可専擅璁蕚日攘袂扼腕覬覦臣位臣安能與小人相齕齮祈賜骸骨不允及璁居兵部宏欲用新寧伯談綸掌奮武營璁遂劾宏劫制府部宏連疏乞休帝雖優詔慰留然終不以譴璁蕚璁蕚益恣日夜求逞私憾于是姦人承璁蕚指搆大臣錦衣百户王邦竒遂上書言邊事初邦竒以遺詔裁革傳升官削千户怨楊廷和既復職為彭澤所抑則又怨澤乃言哈密失國土爾番內侵由澤賂番求和廷和殺舍音和珊所致請誅此兩人廉哈密可復邊境無虞下兵部勘狀未報邦竒復言宏石珤俱廷和姦黨嘗夜遇楊一清所欲為彌縫而廷和子兵部主事惇藏匿故牘令前後奏辭皆不得驗又澤弟沖與廷和壻修撰余承勛鄉人侍讀葉桂章交關請囑並當逮治奏入璁蕚欲藉此興大獄復內訌于帝帝信之斥廷和澤為民畫置惇等于理給事中楊言抗章曰故輔廷和有社稷之勳閣臣宏珤乃百僚之表邦奇心懷怨望文飾姦言詬辱大臣熒惑聖聽若窮治不已株連益多臣竊為國家大體惜也帝得疏怒言為大臣遊説并收繫言親鞫于午門備極五毒率無撓詞既罷下五府九卿議鎮遠侯顧仕隆等覆奏邦竒言皆虛妄帝切責之然獄亦由是解而宏珤憤為姦人誣衊求去益力帝許宏馳驛歸銜珤素鯁直責其歸怨朝廷失大臣誼一切恩典皆不子歸裝襆被車一輛而已都人歎異謂自來宰臣去國無若珤者自珤及楊廷和蔣冕毛紀相繼以強諌罷政迄嘉靖季密勿大臣無進逆耳之言者矣質實談綸新寧伯忠之曾孫嘉靖田年襲封余承勛青神人葉桂章名山人楊言字帷化鄞人顧仕隆鎮逺伯成五世孫孝宗十七年襲封召謝遷復入閣費宏舉遷自代楊一清見張璁日恣心弗善也不欲與之共事亦力舉遷帝遣行人齋手敕即家起之命撫按官敦促上道遷不得已拜命三月前少保謹身殿大學士劉健卒健自劉瑾誅後復原官致仕聞武宗數事巡遊輒涕泗不食曰吾負先帝帝登極屢賜存問比之司馬光文彥博至是卒年九十有四贈太師諡文靖健器局峻整學問深逺在閣時同列李東陽以詩文引後進海內士皆抵掌談文健若不聞獨教人治經窮理其事業光明俊偉明也輔臣鮮有比者以翟鑾為吏部侍郎兼翰林學士入內閣預機務帝意欲相張璁命廷臣舉素有才望者再推而璁不與會中官多譽鑾遂用之楊一清以鑾望輕請用羅欽順吳一鵬不聽夏五月丁丑朔日有食之以羅欽順為吏部尚書辭不拜時張璁桂蕚以議禮驟貴營私植黨屏逐正人欽順耻與同列屢召不起欽順家居杜門潛心格物致知之學力排釋氏謂釋氏之明心見性與吾儒之盡心知性相似而實不同釋氏之學大抵有見于心無見于性今人明心之説混于禪學不知有千里毫釐之謬因著困知記六卷總制兩廣軍務王守仁撫降田州蠻姚鏌既誅岑猛平田州乃請改設流官留參議汪必東僉事申惠參將張經以兵萬人鎮其地而以知府王熊兆署府事會必東皆移疾他駐惟經熊兆在府兵勢分防守稍懈于是猛黨盧蘇王受等乃為偽印誑言猛不死且借交址兵二十萬以圖興復蠻民信之聚衆薄府城經出擊兵少不敵欲引還而城中隂為內應呼噪四出官軍腹背受攻力戰不支突圍渡江走賊逼其後爭舟溺死者甚衆賊沿江置闌索伏藥弩夾岸並起官軍且戰且行失士卒三四百人賊遂入據府城燒倉粟以萬計巡按御史石金上其事劾鏌失䇿罔上並論前撫盛應期生事召釁而給事中鄭自壁因請仍檄湖廣永順保靖兵并力勦賊帝以四方兵數萬方歸休豈可復調命鏌再計機宜以聞時盧蘇雖據府叛猶聲言就撫遣人迎署府事王熊兆而其黨王受糾衆萬餘攻據思恩城執知府指揮等官已而釋之亦投牒上官佯聽撫鏌以兵未集姑受之以緩其謀遣諜者檄諸土官勒兵自效且責失事守巡參將等官立功自贖復疏調湖廣永順保靖及江西贛州福建汀州兵具會于南寧并力進勦帝以蠻亂日久鎮巡官受命大征未及殄絶輒奏捷散兵使餘孽復滋罪不容逭姑赦前過益圖新功乃起兵部尚書王守仁總督軍務同鏌討之鏌以守仁才足辦賊當専其事權自乞休去時蘇受既入思恩封府庫以賊兵守之自率衆攻武緣守巡官率兵至思恩思恩千夫長韋貴徐伍遣壯士由間道入城為內應夜引官兵奪門殺賊二十餘人收府印及庫藏因招撫城中未下者而蘇受方攻武緣甚急參將張經堅壁拒守鎮守頭目許用與戰斬其渠帥一人賊見援兵大集始遁去守仁至南寧道中見受等勢盛度亦未可猝滅上疏極陳用兵之非且言田州鄰交址深山絶谷悉猺獞盤據必仍設土官可藉其兵力為屏蔽若改土為流則邉鄙之患我自當之後必有悔章下兵部與守仁議不合令再定計尋守仁抵潯州與石金及藩臬諸將領會議皆云撫之便乃悉散遣諸軍留永順保靖土兵數千解甲休息蘇受初求撫不得比聞守仁至益懼至是則大喜遂遣使乞降守仁令詣軍門二人竊議曰王公素多詐恐紿我陳兵入見守仁數二人罪杖而釋之親入營撫其衆七萬因上言岑氏世效邊功宜存其祀請割田州地别立一州以岑猛次子邦相為吏目署州事分設巡檢司以蘇受等任之並受約束於流官報可田州以安質實汪必東崇陽人申惠吳江人石金黃梅人鄭自璧字采東祥符人六月詔科道官互相糾劾時京察拾遺桂蕚為御史所論乃上言楊廷和私黨猶在言路昔憲宗初年命科道于拾遺後互相糾劾請舉行如制吏部侍郎孟春言憲宗無此詔蕚被論圖報復不可信帝終用蕚言趣速舉孟春以御史儲良材等四人名上帝獨黜良材而特旨斥鄭自璧等數人自壁素敢言權幸側目或中以蜚語故被斥已而良材辨疏力詆廷和指孟春為姦黨蕚即奏復其官質實孟春澤州人儲良材馬平人秋八月下刑部尚書顔頤夀等四十六人于獄賈詠罷初崞縣人李福達坐妖賊王良李鉞黨戍山丹衛逃還更名午為清軍御史所勾再戍山海衛復逃居洛川以彌勒教誘愚民邵進祿等為亂事覺進祿伏誅福達先還家得免更姓名曰張寅挾重資往來徐溝間輸粟得太原衛指揮用黃白術干武定侯郭勛大信幸其仇薛良訟于巡按御史馬録録問得實檄洛川父老雜辨之益信勛為移書祈免録不從偕巡撫江潮具獄以間且劾勛庇姦亂法章下都察院覆如録奏詔責勛對狀勛懼乞恩因為福達代辨帝置不問會給事中王科鄭一鵬程輅常泰劉琦鄭自壁趙廷瑞沈漢秦祐張逵陳臯謨御史程啓充盧瓊邵豳髙世魁任淳南京御史姚鳴鳯潘壯戚雄王獻評事杜鸞刑部郎中劉仕主事唐樞交章劾勛謂罪當連坐勛再自訴以議禮觸衆怒為言帝心動勛復乞張璁桂蕚為援璁蕚素惡廷臣攻已亦欲借是舒宿憤乃合謀騰蜚語曰諸臣內外交結借端陷勛將漸及諸議禮者帝深入其言而外廷不知攻勛益急帝愈疑命取福達等至京師下三法司訊既又命文武大臣更訊之皆無異詞帝大怒將親訊以楊一清言而止仍下廷鞫頤夀等不敢自堅改妖言律帝猶怒命法司俱戴罪辨事遣官往械録潮及前問官布政使孝璋按察使李玨僉事章綸都指揮馬豸等時璋玨已遷都御史璋巡撫寧夏玨巡撫甘肅皆下獄廷訊乃反前獄抵良誣告罪帝以罪不及録怒甚命蕚署刑部璁署都察院獻夫署大理寺覆獄之乃盡下尚書頤夀侍郎劉玉王啓左都御史聶賢副都御史劉文莊僉都御張潤大理卿湯沐少卿徐文華顧佖寺丞汪淵獄嚴刑推問遂挾録篋得大學士賈詠都御史張仲賢工部侍郎閩楷御史張英及寺亟淵慰問書帝責詠詠引罪致仕去仲賢等亦下獄蕚等上言給事中琦泰郎中仕聲勢相倚挾勢彈事佐録殺人給事中科一鵬祐漢輅評事鸞御史鳴鳯壯雄扶同妄奏助成姦惡給事中逵御史世魁方幸寅就死得誣勛謀逆黨附連名同聲嫁禍郎中司馬相妄引事例誣上行私請大奮乾斷以彰國法帝納其言并下諸人獄先是廷臣會訊太僕卿汪元錫光祿少卿余才偶語曰此獄已得情何再鞫偵者告蕚以聞亦逮問蕚等遂肆榜掠録不勝刑自誣故入人罪璁蕚等乃定爰書言寅非福達録等恨勛搆成寃獄因列上諸臣罪名帝悉從其言謫戍極邊遇赦不宥者五人璋珏綸豸前山西副使少卿文革謫戍邊衛者七人琦逵泰瓊啓充仕及知州胡偉為民者十一人賢科一鵬祐漢輅世魁淳鳴鳳相鸞革職間住者十七人頤夀玉啓潮文莊沐佖淵元錫才偕仲賢潤壯雄及前大理丞毛伯溫其他下巡按逮問者副使周宣等五人録以故入人死未決當徒帝必欲置重辟獻夫曰張寅未死而録代之死恐天下不服楊一清復力爭乃減死永戍煙瘴地緣及子孫過赦不宥薛良抵死衆證皆戍張寅還職帝以璁蕚等平反有功賜二品服俸給三代誥命遂編欽明大獄録頒示天下方璁蕚反福逹之獄舉朝雖不直璁蕚而以寅福達姓名錯互亦或疑之至四十五年正月四川大盜蔡伯貫就擒自言學妖術于山西李同所司檄山西捕同下獄同供李午之孫其父曰大禮世習白蓮教惑衆倡亂與大獄録姓名無異由是福達獄始明質實崞漢縣屬代州今因之山丹衛元山丹州明洪武中置衛屬陜西行都司今為山丹縣屬甘州府山海衛明因臨榆故城改置今為臨榆縣屬永平府洛川姚泰置明屬鄜州徐溝金置明屬太原府今皆因之太原衛明洪武中置屬山西都司馬録字君卿信陽人江潮貴溪人王科字進卿涉縣人鄭一鵬字九萬莆田人程輅績溪人常泰徐溝人劉琦字廷珍洛陽人趙廷瑞直𨽻開州人沈漢字宗海吳江人秦祐臨清人張逵字茂登餘姚人陳臯謨代州人邵豳東陽人髙世魁閩縣人任淳堂邑人姚鳴鳯莆田人潘壯浙江山隂人成雄金華人王獻咸陽人杜鸞字羽文陜西咸寧人劉仕中部人唐樞字惟中歸安人李璋景寧人李玨直𨽻開州人章綸嘉興人劉玉字咸栗萬安人王啓字景昭黃巖人聶賢字承之長夀人劉文莊華隂人張潤字汝霖臨汾人湯沐字新之江隂人顧佖吳縣人汪淵上饒人張仲賢陽曲人閔楷任邱人張英三河人司馬相會稽人汪元錫字天啓婺源人余才內江人胡偉京山人毛伯溫字汝厲吉水人周宣莆田人案是獄成凡前後所爭福達事者悉被株連惟鄭自璧趙廷瑞陳臯謨邵豳王獻唐樞六人不與王科等同罪蓋桂蕚等指名劾言官十四人及郎中司馬相未及自壁等故不入爰書且考明史自璧及唐樞傳時自壁因科道共劾中旨降二級外調已謫江隂丞去而樞于上疏時即觸怒帝斥為民樞疏最得是獄要領略曰李福達之獄陛下駁勘再三誠古帝王欽恤盛心而諸臣負陛下欺蔽者肆其讒諂諛者溷其説固位者緘其口畏威者變其詞訪緝者淆其真故陛下惑滋甚而是非卒不能明于是哀矜而至于辟矣臣竊惟陛下之疑有六謂謀反罪重不宜輕加于所疑一也謂天下貌有相似二也謂薛良言弗可聽三也謂李玨初牒已明四也謂臣下立黨傾郭勛五也謂崞洛證佐皆讐人六也臣請一一辨之福達之出也始而王良李􅀈從之其意何為繼而惠慶邵進祿等師之其傳何事李鐵漢十月下旬之約其行何求我有天分數語其情何謀太上元天垂文祕書其辭何指劫庫攻城張旗拜爵雖成于進祿等其原何自鉞伏誅于前進祿敗露于後反狀甚明故陜西之人曰可殺山西之人曰可殺京畿中無一人不曰可殺惟左右之人曰可不則不得而知也此不必疑一也且福達之刑最易辨議或取驗頭秃或證辨鄉音如李二李俊李三是其族識之矣始認於杜文柱是其姻識之矣質證于韓良相李景全是其友識之矣一言于髙尚節王宗美是鄜州主人識之矣再言于邵繼美宗自成是洛川主人識之矣三言于石文舉等是山陜道路人皆識之矣此不必疑二也薛良怙惡誠非善人至所言張寅即福達即李午實有明據不得以人廢言況福達蹤迹譎密黠慧過人人咸墮其術中非良狡猾亦不能發彼隂私從來發摘告姦之事原不必出之敦良原朴之人此不當疑三也李玨因見薛良非善人又見李福達無龍虎形硃砂字又見五臺縣張子真户內實有張寅父子又見崞縣左廂都無李伏答李午名遂苟且定案輕縱元凶殊不知五臺自夀靖元年黃册始收寅父子忽從何來納栗拜官其為素封必非一日之積前此何以隱漏崞縣在城坊既有李伏答乃于左左廂都追察又以李午為真名求其貫址何可得耶則軍籍之無考何足據也況福達既有妖術則龍虎形硃砂字安知非前此假之以惑衆後此去之以避罪亦不可盡謂薛良之誣矣此不當疑四也京師自四方來者不止一福達既改名張寅郭勛從而信之亦事所有其為妖賊餘黨固意料所不能及勛自有可居之過在陛下既宏議貴之恩諸臣縱有傾勛之心亦安能加之罪乎此不用疑五也鞫獄者曰誣必言所誣何因曰讐必言所讐何事若曰薛良讐也則一切證佐非讐也曰韓良相等讐也則髙尚節石文舉非讐也曰魏泰劉永振讐也則今布按府縣官非讐也曰山陜人讐也則京師道路之人非讐也此不用疑六也望陛下六疑盡釋明正福達之罪庶羣姦屏迹宗社幸甚其後定斂明大獄録惡樞辭辨晰刪之不載云發明李福達之獄衆證確鑿本無可疑郭勛以畏罪而庇姦嘉靖亦未始不悉其故乃以議禮觸衆怒一言中其所忌遂改命璁蕚獻夫署三法司覆讞則不待爰書之定而早知是獄之必顛倒而反覆矣璁蕚輩藉端報復煆鋉株牽小人變亂黑白何所不至乃以君臨天下者緣議禮積憾臣工借福達之獄而使璁蕚得伸其志雖姦人漏綱衆正負寃皆所不恤默且賞平反之功領欽明之録必欲箝衆口而獨行其是易曰訟元吉王弼謂處得尊位用其尊正以斷枉直故訟元吉也中正之不用訟何由吉哉九月以桂蕚為禮部尚書兼翰林學士故事尚書無兼學士者特自蕚始甫踰月遷吏部賜銀章二曰忠誠靜慎曰繩愆匡達令密封言事輿輔臣埒蕚既得志日以報怨為事廷臣莫不畏其凶威下刑部郎中葉應聰等于獄先是給事中陳沋素無賴家居與知縣宋元翰不相能令其子柱訐托元翰謫戍元翰托洸罪及帷薄事刋布之名辨寃録洸由是不齒于清議尚書喬宇出之為湖廣僉事洸恚甚見張璁桂蕚輩議禮驟顯洸乃以舊官上疏言璁等議是宜急去本生之稱因詆宇及文選郎夏良勝銓法不平帝即還洸職謫良勝于外洸恃議禮合帝旨輒遍劾大臣凡已所不悅者悉指為邪黨璁蕚大悅遂引以擊異已于是御史張曰韜戴金藍田特疏劾洸且封上元翰辨寃録都御史王時中靖罷洸聽勘洸奏羣姦恨臣抗議大禮將令撫按殺臣請遣一錦衣往洸意錦衣可利誘也得旨遣應驄及錦衣千户李經應驄與焚香誓天乃往會御史熊蘭塗相等雜治具上洸罪狀至百七十二條除赦前及曖昧者勿論當論十三條罪惡極宜斬婁離異子桂絞洸懼亡詣闕申訴帝持應驄奏不下尚書趙鑑副都御史張潤給事中解一貫御史鄭本公等連章執奏帝不得已始命覆核郎中黃綰力持應驄議席書蕚為居間不能得邀璁共奏謂洸議禮臣為法官所中帝入其言命免罪為民大理卿湯沐及鑑一貫更爭之不聽未幾大禮書成并原洸妻子應驄尋遷吉安知府母喪歸至是璁蕚益用事而蕚方掌刑部廷臣馬録等以劾郭勛下獄洸謂乘此故案可反也上書訐應驄等蕚因訟洸寃遂逮應驄等于獄詞連四百人九卿及錦衣衛廷訊應驄對曰某所持者王章耳必欲直洸惟諸公命刑部尚書胡世寧等心知洸罪重而懲前大獄不敢執會是日黃霧四塞獄弗竟次日又大風拔木詔停刑乃當應驄按事不實律斥為民洸復冠帶猶憾應驄不已越數年又令人誣奏應驄勘獄時酷殺無辜二十餘人按驗無實帝特謫應驄戍遼東是獄始終八年凡攻洸及治洸獄者無不得罪逮捕至數百人天下益惡璁蕚輩恣橫羞言議禮臣矣質實葉應驄字肅卿鄞人陳洸潮陽人張曰韜字席珍莆田人戴金漢陽人藍田即墨人熊蘭塗相皆南昌人解一貫字曾唯交城人鄭本公肅州衛人黃綰息人按同時有兩黃綰一為黃巖人侍郎孔昭之孫厯官禮部尚書初附張璁論大禮晚背璁附夏言人以傾狡目之一即息人力持葉應驄議者是也正德中為刑部主事諌南巡受杖厯郎中出知紹興府有惠政被徵時士民哭震野爭致贐止取二錢至京下詔獄瘐死降慶初贈太常少卿張祐上蔡人冬十月以張璁為禮部尚書兼文淵閣大學士入內閣預機務璁自釋褐至入閣僅六年時楊一清為首輔翟鑾亦在閣帝持之不如璁嘗諭璁朕有密諭毋泄朕與卿帖悉親書璁因引仁宗賜楊士竒等銀章事帝賜二章曰忠良貞一曰繩愆弼違因并及一清等璁初為學士諸翰林耻之不與並列璁深恨之會侍讀汪佃講洪範不稱旨璁請自講讀以下量材外補于是改官及被黜者二十餘人并罷選庶吉士翰苑為空質實汪佃弋陽人戊子七年春正月逮前御史陳九疇于獄謫戍極邊削奪前尚書金獻民彭澤職初正德中土爾番謀取肅州遣所親信者充貢使入關為內應九疇時為副使詗知之捶殺其使者和卓繖哲爾械舍音和珊送京師番人知事泄斂兵去肅州得安帝即位楊廷和奏誅舍音和珊而用九疇為甘肅巡撫三年秋番人入冦九疇擊斬塔濟迪音冦敗遁都指揮王輔言莽肅爾伊蘭俱死炮下九疇喜元凶殄滅遂以聞尋二人上表求貢帝怪且疑獻民至蘭州冦已退再奏捷帝頗知其冒九疇功然皆未發也及王邦竒憾楊廷和彭澤假哈密事訐兩人誤國帝遣給事中錦衣至邊勘狀未還報而獄解會番酋伊蘭復來求貢且騰蜚語謂九疇寃殺和卓繖哲爾等故犯邉報怨吏部尚書桂蕚以前獄未竟不得殺廷和澤知帝方疑邊臣虛妄計可因九疇復興大獄乃脅禮兵二部同上議曰番人上書者四輩皆委咎前吏雖詞多矯飾亦事發有因宜嚴覆九疇等激變狀大學士楊一清以事既前決請無追論帝不聽下手詔數百言切責九疇而戒一清勿黨庇遂遣官逮九疇獻民及侍郎李昆以下坐纍者四十餘人至是九疇逮至下獄蕚必欲殺之并株連廷和澤刑部尚書胡世寧言于朝曰世寧司刑而殺忠臣寧殺世寧乃上疏為九疇訟寃言番人變詐妄騰謗讟以誣害我謀臣夫其蓄謀內冦為日已久一旦擁兵深入諸番約為內應非九疇先幾奮僇使彼敗謀而退則肅州孤城豈能復保臣以為文臣有勇知兵忘身殉國者無如九疇宜番人深忌而欲殺也惟聽部將妄報以莽肅爾等為己死則其罪有不免耳疏入帝意稍解乃減死戍極邊獻民澤等皆落職廷和得免二月起王瓊為兵部尚書總制三邊瓊在戍久桂蕚等言瓊前攻楊廷和故羣臣爭起排之今邊陲急人廷臣才實出瓊下帝乃復瓊官代王憲總制三邊三月大學士謝遷罷遷之赴召年已七十有九居位數月即求去帝待之愈厚天寒免朝參除夕賜詩及以病在告則遣醫賜藥餌光祿致灑餼使者相望于道而邊乞歸益力乃允其致仕夏四月甘露降告于郊廟南贛巡撫汪鋐奏所部有甘露降為帝仁孝之感帝喜遂告郊廟是年春靈寶人言黃河清者五十里遣太常往祭告御史周相疏諫帝震怒下之獄于是告祥瑞者踵至矣質實靈寶唐縣明屬陕州今因之靈寶黃河自陕西華隂界潼關折而東流徑河南陜州閿鄉縣北又東徑靈寶縣北又東徑陜州城西北三里又東入河南府澠池縣界汪鋐字宣之婺源人周相鄞人六月頒明倫大典于天下削前華蓋殿大學士楊廷和等籍初大禮集議成張璁請彚為全書桂蕚請備書大臣進退百官譴謫志陛下之明斷既得請璁復引疾求退以要帝言臣與舉朝抗四五年舉朝攻臣至百十疏今修大禮全書元惡寒心羣姦側目故要略方進讒謗繁興使全書告成將誣陷益甚帝優詔慰留之及是書成名曰明倫大典帝自製序辨其首命璁為後序刋布天下敘功加璁少傳蕚少保霍韜方獻夫等皆進官而追論前議禮諸臣罪削廷和籍蔣冕毛紀毛登汪俊喬宇林俊皆奪職斥何孟春夏良勝為民雲南叛蠻平初尋甸土知府安晟死兄弟爭襲遂改置流官土舍安銓失職因作亂巡撫傅習檄守巡官討之大敗尋甸嵩明皆陷知府馬性善棄城走銓勢方張而鳯朝文復起朝文武定土舍也時武定土知府鳯詔母子坐事留雲南朝文給其衆言詔已戮官軍將滅其部黨諸蠻信之悉從為乳殺同知以下官舉兵與銓合滇中大擾朝議以歐陽重代習既又命伍文定為兵部尚書提督雲南四川貴州湖廣軍討之適芒部土酋普奴亦叛并以屬文定未至重督兵擊敗賊而遣詔母于還故地蠻民相顧錯愕咸投詔降朝文計窮敗奔東川為追兵所及磔死銓衆猶盛遁據尋甸故巢列寨數十官兵分哨夾攻之諸寨先後破乃併力攻拔其老巢銓竄入芒部為土舍祿慶所執賊平是役也生禽渠賊千餘人斬首二千九百餘級俘獲男婦千二百餘撫散蠻黨二萬有竒奪器械牛馬無算捷書既奏而文定至乃移師征普奴會有言芒部不當用兵者遂召還尋四川巡按御史戴金復上言叛酋稱亂之初勢尚可撫文定決意用兵一無顧惜飛芻挽糧糜數十萬及有詔罷師尚不肯已臣愚以為文定可罪也尚書才獻書李承勛因詆文定好大喜功傷財動衆乃令致仕文定忠義自許遇事敢為不與時俯仰芒部之役憤小醜數亂欲為國伸威為議者旁撓以故功不克就質實尋甸古滇園地獛剌蠻居之號仲劄溢源部後為烏蠻裔斯丁所奪號斯丁部蒙氏為尋甸至段氏改仁德部元初置仁德萬户府後改府明為尋甸軍民府今為尋甸州屬曲靖府武定唐羈縻宋州地後沒于蠻元初內附置武定路明洪武中為武定軍民府今改武定州直隸雲南省傅習進賢人歐陽重字子重廬陵人秋七月王守仁平斷藤峽猺自韓雍去兩廣斷藤峽猺復熾上連八寨下通仙臺花相諸洞盤亘三百餘里郡縣罹害者數十年守仁平田州還兩江父老遮道言狀盧蘇王受亦請立功自贖守仁乃留南寧罷遣諸兵示不再用伺賊不備潛軍突進連破牛腸六寺等寨循橫石江而下攻克仙臺花相諸賊復令布政使林富率蘇受搗平八寨于是藤峽復平始帝以蘇受之撫遣行人奉璽書奬諭及奏斷藤峽捷則以手詔問閣臣楊一清等謂守仁自誇大且訾及其生平學術一清等不知所對守仁之起由璁蕚薦蕚故不善守仁以璁強之後蕚長吏部璁入內閣積不相下蕚暴貴喜功名風守仁取交址守仁辭不應一清雅知守仁而黃綰嘗上疏欲令守仁入輔毀一清一清亦不能無遷怒蕚遂顯詆守仁征撫交失賞格不行獻夫及霍韜不平上疏爭之言諸猺為患積年初嘗用兵數十萬僅得一田州旋復召冦守仁片言馳諭思田稽首至八寨斷藤峽賊阻深巖絶岡國初以來未有輕議勦者今一舉蕩平若拉枯朽議者乃言守仁受命征思田不受命征八寨夫大夫出疆有可以安國家利社稷專之可也况守仁固承詔得便宜從事者乎守仁討平叛藩忌者誣以初同賊謀又誣其輦載金帛當時大臣楊廷和喬宇飾成其事至今未白夫忠如守仁有功如守仁一屈于江西再屈于兩廣臣恐勞臣灰心將士解體後此強圍有事誰復為陛下任之帝報聞而已質實八寨思吉周安古卯古蓬古鉢都者羅黑剎丁後又益龍哈咘咳為十寨今廣西思恩府上林縣北有周安鎮明時為八寨之一帝仙臺花相諸洞在潯州平南縣北回環相屬兩江謂左右江也牛腸六寺等寨在藤峽迤西橫石江亦曰橫水江在潯州武宣縣東南栁州右江上源諸水至此合流而東即大藤峽林富莆田人冬十月皇后陳氏崩諡悼靈皇后後改諡孝潔十一月立妃張氏為皇后初封順妃至是册為皇后質實皇后張氏史不詳其地望毛竒齡彤史拾遺記后父輯錦衣衛指揮僉事土爾番寇肅州王瓊請令入貢詔許之遂棄哈密初陳九疇在甘肅力言土爾番不可撫宣閉關絶貢專固邊防帝可之因拘繫其前後使者數十輩及九疇得罪瓊督三邊悉遣還所繫且許通貢議已定番酋伊蘭者本曲先人幼為番掠去長而黠使阿爾以妹妻之握兵用事久為西陲患是年夏以獲罪其主率所部二千人降邊臣處之內地莽肅爾怒遂引衛拉特犯肅州為遊擊彭濬所敗乃遁走復因赤斤使人持番文求貢願以哈密城易伊蘭詞多悖謾瓊希張璁桂蕚等指必欲議撫因言番人且悔宜原情赦罪以罷兵息民章下部議時胡世寧改掌兵部上言番前變詐多瑞方許之朝貢而寇騎已至河西幾危此開關與通貢利害較然今瓊等既言寇薄我城堡縳我士卒聲言大舉以恐嚇天朝而又言番方懼悔宜仍許通貢何自相抵牾願無墮其術中弛我邊備斯可矣伊蘭本我屬番為彼掠去束身來歸事屬反正宜即撫而用之招彼攜二益我藩籬至哈密三立三絶今其王已為番酋所困民盡流亡借使更立他族彼強則入寇弱則從番難保為不侵不叛之臣臣謂立之無益適令番酋挾為姦利耳乞賜瓊璽書令詰莽肅爾入寇狀如果事出衛拉特則縳其人以自贖否則羈其使臣發兵往討庶威信並行寇知斂戢更敕瓊為國忠謀無狃于通番入貢當以足食固圉為長久計封強幸甚帝深善其言命瓊熟計詳處瓊再疏申前請張璁等皆主瓊議遂從之而獨留伊蘭不遣自是土爾番通貢如故哈密城印及巴雅濟存亡遂置不問莽肅爾桀傲愈甚朝廷不能罪然自伊蘭既降其勢漸孤河西稍獲休息哈密後為沙布塔子穆爾瑪哈穆特所有服屬土爾番比嵗一貢迄隆萬朝不絶然非忠順王苗裔矣質實曲先衛古西戎漢西羌唐吐番元設曲先答林元帥府明洪武中置曲先衛地在今肅州西南今穆爾瑪哈穆特舊作米兒馬黑木改御定資治通鑑綱目三編卷二十
