body:
  text: 起丙申明世宗嘉靖十五年盡癸卯明世宗嘉靖二十二年凡八年丙申十五年春正月以劉天和為兵部左侍郎總制三邉先是濟農居套中西抵賀蘭山限以黃河不得渡用牛皮為渾脫渡入山後諳逹亦自豐州入套相率為邊患總制唐龍用總兵官王效粲震數敗敵然蹂躪迄無寧嵗及是召龍入為刑部尚書以天和為兵部左侍郎總制陜西三邉軍務天和赴鎮修戰具飭邊格築增城堡時兵車皆雙輪用二十人遇險即因又行遲不適於用天和倣前總兵秦紘隻輪車丄置炮槍弩㦸前樹猣抌牌左右虎盾連二車蔽三四十人一人挽之推且翼者各二人戰則護騎士其中敵逺則施大器稍近發弓弩又近乃出短兵敵敗則騎兵追復製隨兵小帳令士不露宿又毒弩矢修邊牆濠塹以為禦敵之備濟農十萬衆屯賀蘭山復遣别部寇涼州副將王輔逐奪其纛寇莊浪總兵官姜奭屢敗之進天和右都御史寇復大集兵將入犯天和策寇瞰西有偹必東密檄延綏副將白爵宵行與參將吳瑛合寇果東至黑河墩遇伏大創而去既又入蒺䔧川爵尾擊之寇多死尋又為爵瑛所敗其分犯寧夏者亦為王效所破捷聞進天和左都御史已而濟農犯河西大和復禦却之進天和兵部尚書質實黑河即古黑水在榆林府北晉書載記赫連勃於黑水之南營都城即此蒺䔧川在陜西榆林府葭州北三十里王效延綏人梁震新野人二月振湖廣災發湖廣省事例銀兩及預偹倉銀榖相兼振濟三月帝奉章聖皇太后詣天夀山謁陵免昌平今年稅糧三之二賜髙年粟帛帝至沙河見居民蕭偹顧謂大學士李將等曰七陵在此宜加守護時對曰昔邱濬建議京師當設四輔以臨清為南昌平為北薊州保定為東西各屯兵一二萬今若於昌平增一總兵可南衛京師北護陵寢帝乃下廷臣勘議於沙河築鞏華城為置戍馬質實鞏華城在昌平州東南二十里地本名沙河店今有同知及都司駐此夏五月燬禁中佛殿禁中大善佛殿元時所造藏金銀諸佛像及器物至是悉命燬之金銀佛像凡一百六十九座金銀函物凡萬三千餘斤以其地置太后宫冬十月地震京師及順天承平保定所屬州縣萬全都司各衛所地震有聲如雷詔修省更定世廟為獻皇帝廟先是帝諭禮部尚書夏言曰前以皇考廟比世之義名曰世廟今分建宗廟惟太宗世祭不遷而世之一字來世或用加宗號今加於考廟又不得世宗之稱徒擁虛名不如别議可㑹議以聞言等議未上帝復諭曰皇考廟名如題曰獻皇帝廟庶别宗稱且見推尊之意於是吉等議廟以諡名既合周典又與列聖廟號同符請敕所司擇言題額宣付史館從之十一月設宣大總督時宣大延寧皆有警以御史徐九臯胡鰲言設宣大總制官更名為總督陜西三邉總制亦更名總督質實徐九臯餘姚人胡鰲沅陵人十二月以道士郡元節為禮部尚書元節自嘉靖三年居入京師於便殿大加寵信俾專司禱祠封真人總領道教班二品贈其父太常丞並官其孫及曾豫至是以皇儲叠生嘉其禱祠功拜尚書賜一品服發明皇祠叠生何興祈禳乃歸功元節數晉階品遂掌秩宗夫寅清贊治典重明種豈黃冠羽流所得厠乎其列無論若輩得志清假而干政營私乃勢所必至即儼然居尚書位復一品服更成何政體宋徽宗時林靈素有敕賜通真逹靈之號網目猶且書之視此為何如耶閏月以禮部尚書夏言兼武英殿大學士預機務言既以開敏結帝知又折節下士以是甚得公卿間聲譽常制作禮樂多言為尚書時所議帝敏作詩輒賜言悉酬和勒石以進帝益喜奏對應制倚待立辨數召見咨政事善窺帝㫖有所附㑹張孚敬方獻夫在政府知帝眷言厚亦不敢與較言由是氣遂驕言興南京禮部尚書霍韜以事相攻許韜竟不勝郎中張雲孝李遂與小忤即奏謫之皇子生帝賜言甚渥初加太子太保進少保兼太子太傅至是遂入參機務言入閣李時雖為首輔政多自言出馬質實張元孝汝陽人李遂豐城人丁酉十六年春正月詔右都御史毛伯溫討安南先是正德中安南社堂燒香官陳皓詭稱前王陳氏後殺國王黎明而自立晭臣莫登庸初附皓後於黎氏大臣阮宏裕等起兵討嵩嵩敗走死立晭兄子譓為王登庸偓兵柄潜蓄異志黎氏舊臣鄭綏以譓徒擁虗位别立其族子酉榜登庸破綏捕殺酉榜益恃功驕恣旋逐譓譓奔清華登庸立庶弟懬已復殺懬篡其位不通朝貢者二十餘年至是以皇子生當頒詔安南禮官夏言言黎譓黎懬均非黎晭庶立之嫡莫登庸陳嵩俱彼國篡逆之臣宜暫停使命而遣官按問求罪人主名帝以安南極逆昭然命言㑹兵部議征討户部侍郎唐胄上疏力陳用兵七不可下兵部議㑹黎譓卒子寧遣使告難迄興問罪師夏言等請剋期徂征詔起伯溫于家命參軍務以都督僉事江禋牛桓督軍計之兵部侍郎潘珍言安南不足置郡縣其叛服無與中國用兵無計廣東巡按御史余光亦言莫之篡黎猶黎之篡陳不足深校但當罪其不庭責以稱臣修貢不必逺征以庭中國帝怒祗珍職奪光俸已而伯溫至京奏上方略而帝意忽中變命暫緩師㑹雲南巡撫汪文盛招納黎民舊臣得其進兵地圖并獲登庸間諜及所撰僞大誥上之命仍遵前詔征討至明年春文盛復以登庸降表至請宥罪許貢下廷議僉言不可許乃趣伯溫啓行制甫下兩廣總督侍郎張經以用兵方略上具言須兵共三十萬餉百六十萬石欽州知州林希元則極言登庸易取狀請即日出師兵部尚書張瓚不敢决復請廷議議上無成䇿帝不懌讓瓚師復止初帝以用兵事重本無必討意持欲威服之故命下而罷者再至十八年登庸屢表乞降意亦不欲因撫之再下廷臣議勒撫之宜瓚及廷臣請仍命伯溫南征如登庸束手歸命無異心則待以不死從之質實毛伯溫字吉屬吉水人陳皓安南前後有兩陳嵩一在宣德時黎利僞奉以降一即此黎晭一名瀅自黎利後九傳而至晭多行不義遂及於疑唐胄字平侯瓊山人時上疏曰今日之事若欲其修貢而已兵不必用官亦無容遣若欲討之則有不可者七安南不征著在祖訓一也太宗既滅黎季犛求陳氏後不得始郡縣之後兵連不解仁廟每以為悵章皇帝成先志棄而不守今日當率循二也外國分爭中國之福安南自五代至元更八姓迭興迭廢而嶺南外警遂希今分爭正不當問奈何殃赤子以威小醜割心腹以補四肢無益有害三也若謂中國近境宜乘亂取之臣考馬援南征深厯浪泊士卒死亡幾半所立銅柱為漢極界乃近在今思明府耳先朝雖嘗平之然屢服屢叛中國士馬物故者以數十萬計竭二十餘年之財力僅得數十郡縣之虛名而止况又有征之不克如宋大宗神宗元憲宗世祖朝故事耳此可為殷鑒四也外邦入貢乃彼之利一則奉正朔以威其鄰一則通貿易以足其國故今雖兵亂尚系絫奉表箋其方物欵闕求入守臣以姓名不符却之是彼欲貢不得非抗不貢也以此責詞不順五也興師則需餉今四川有採木之役責州有凱口之師而兩廣積儲數十萬萬率耗於田州岑猛之役又大工頻興所在軍儲悉輸將作興師數十萬何以給之六也然臣所憂又不止此唐之衰也自明皇南詔之役宋之衰也自神宗伐遼之役今北敵强據我何套邉卒屢叛毁我藩籬北顧方殷更啓南征之議脫有不則誰任其咎七也錦衣武人開於大體儻稍枉是非之實致彼不服反足損威即令按問得情伐之不可不伐不可進退無據何以為謀且今嚴兵待發之詔初下而征求騷擾之害已形是憂不在外而在邦域中請停遣勘官罷一切征調疏入下兵部議請從之詔待勘官還更議珍字玉卿楘源人余光江寧人汪文盛字希周宗陽人張經字是彛侯官人初冒蔡姓久之乃復夏五月雷震謹身殿雷震謹身殿鴟吻帝諭輔臣曰修省之宜如何於是禮部奏言謹身殿即古露寢天子肅容之所也上天示變於此為戒甚明請求刑政之所以失者而改之以為消弭之實詔修省如例秋八月遣官振湖廣災民掌唐事府事禮部尚書顧鼎臣言今嵗夏秋多而京城內外房舍傾圮軍民多壓死者又聞南北直𨽻山東河南陜西江浙各被水災而湖廣尤甚衝沒城邑人多湮溺幸而存者家産蕩盡勢必聚而為盜請敇行優恤湖廣災沴重大仍冝遣大臣遍杞山川循行郡縣振救安戢分遣有司掩帢埋眥詔從之尋詔順天府亦命有司振濟至是年冬巡撫順天都御史党以平等言順天永平二府災重已動太倉銀二萬兩及通倉米二萬石振濟户部議如所請從之質實党以平鈞州人冬十一月故昌國公張鶴齡下獄死奸人班朔于雲告張延齡兄弟挾左通咒詛逮鶴齡下詔獄太后衣蔽襦席藁為請不得鶴齡瘦死獄中戊戌十七年夏四月振京城內外饑民六月詔議明堂大饗禮下户部侍郎唐胄于獄初獻皇帝廟止舉時祀不祀太廟至是前揚州府周知豐坊上言孝莫大于嚴父嚴父莫大于配天宜建明堂尊皇考為宗以配上天又天下郡邑宜各立明堂嵗時祝拜君上以尊朝廷勿寄位釋宫䙝體統下禮部議尚書嚴嵩上言諸儒論禮不一臣惟明堂圜丘皆以事天地今大祀殿在圜丘之北正應古之方位明堂秋饗之禮即此可行不必更進至于值饗之禮傳以為萬物成形於秋故秋祀明堂以父配之自漢武逮唐宋諸君莫不皆然主親親也至于錢公輔司馬光孫抃程朱諸賢所論主祖宗之功德今以功德則宜配文皇以親則宜配獻皇帝揆以嚴父之㫖以皇考而不得配陛下庸有弗寧矣至于稱宗之禮則未有稱宗而不附太廟者臣不敢妄奏惟聖明裁擇帝以示夏言言不敢議帝曰明堂秋饗宜於奉天殿行之其配享皇考稱宗不為過情何在為不宜也復命集議户部侍郎唐胄疏爭之曰三代之禮莫備於周孝經曰郊祀后稷以配天宗祀文王於明堂以配上帝又曰嚴父莫大乎配天則周公其人也說者謂周公有聖人德制作禮樂而文王適為其父故引以證聖人之孝答曽子之問而已非謂有天下者皆必以父配天然後為孝即周公歸政之後未聞成王以嚴父之故廢文王配天之祭而移于武王也及康繼成亦未聞以嚴父之故廢文王配天之祭而移於成王也後世祀明堂皆以配天此乃誤識孝絰之意而違先王之禮故有問於宋儒朱熹者日周公之後當以文王配耶當以時王之父配耶熹曰祗當以文王為配又問繼周者如何熹曰祗以有功之祖配之後來第為嚴父說所惑耳由此觀之明堂之配不専於父明矣皇上嗣統之初廷臣執為人後之說於是力正大倫惟張孚敬席書衍諸臣及何淵有建廟之議陛下嘉答之臣亦云朕奉天法祖豈敢有干太廟今日乃惑於豐坊之說乎臣謂明堂之禮誠不可廢惟當奉太宗配於禮為宜若獻皇帝得聖人為之子不得稱宗議配而専廟之享百世不遷矣疏入上大怒下胄錦衣獄黜為民尚書嵩乃上言考秋饗成物之㫖嚴父配天之文皇考侑饗允合周道帝嘉納之質實豐坊字存禮鄞人學士熙之子性狂誕熙既卒家居貧乏思效張桂等以片言取通顯待命久之無所進擢歸家悒悒以死人咸惡其畔父云秋七月開河南雲南銀礦命開採雲南大理等府河南宜陽等縣礦銀質實宜陽漢縣後魏置宜陽郡金復改宜陽縣今因之八月以禮部尚書顧鼎臣兼文淵閣大學士預機務時李時為首輔夏言次之鼎臣又次之而言倚帝眷専甚鼎臣素柔媚不敢與抗惟充位而已九月尊獻皇帝廟號曰睿宗祔於太廟先是帝命議稱宗祔廟之禮集文武大臣於東閣嚴嵩與羣臣議沮之帝大不悅著明堂或問難嵩嵩惶恐盡改前說條盡禮樂甚備且言古者父子異昭穆兄弟同世次故殷有四君一世而同廟宋大祖太宗同居昭位前事可據今皇考與孝宗當同一廟奏上羣臣無敢異議至是帝諭禮臣曰文皇帝與髙帝同創大業宜同稱祖號獻皇帝躬備大德延及朕躬宜薦宗稱乃改太宗廟號為成祖尊獻皇帝廟號為睿宗遂附睿宗主祔太廟躋武宗上復配享上帝於元極寶殿至隆慶初禮科給事中王治上言獻皇帝雖貴為天子之父實未嘗南臨天下而今乃與諸宗並列雖親為武宗之叔父然嘗北靣事武宗而今乃設位於武宗之右揆之古典終為未合故先帝於獻皇帝祔廟之後世廟之享猶不忘設是先帝之心亦有不自安者臣以為獻皇帝祔太廟千萬嵗後不免遞遷若専祀世廟則億世不改矣乞下廷臣議至求當以安獻皇帝之靈章下所司格不行質實王治欣州人發明春秋書躋僖公左氏曰逆祀也胡氏傳申之曰兄弟之不先君臣禮也二傳詞異而義同以臣躋君大逆之道也然僖嘗君臨魯邦矣若嘉靖以藩封繼統而本生考追號稱宗祔于太廟躋諸武宗之右則是以藩臣而加于天子之上悖亂不經又豈僅左氏所稱逆祀而已乎嵩㑥明堂問難之威阿諛附㑹以成其謬徒使王治空言於隆慶之初吁亦可慨矣冬十一月上皇天上帝大號先是嚴嵩奏慶雲見請受羣臣朝賀又為慶雲賦及大禮告成頌上之帝悅命附史館至是帝以獻皇帝既稱宗配帝乃躬詣南郊上皇天上帝大號恭進冊表禮成還詣太廟加上髙皇帝髙皇后尊號是日皇后助行亞獻禮文武官命婦陪祀發明易傳曰帝者天之主宰蓋其尊不可以名號求也自宋徽宗政和六年上玉帝徽號說者譏其不經何嘉靖復蹈其轍哉且天即理也人君苟勵精出治憲天勤民則精誠上格何假崇飾徽稱而嘉靖不務實政惟事虛無此崇號之舉徒以供其青詞焚拜之為而非敬天之實意也振武昌灾戶部言湖廣武昌府屬災傷請將京庫折銀停徵而以夲年京庫折米銀及太和山香錢荆州胄分料銀倉庫銀穀相兼振濟從之十二月章聖皇太后蔣氏崩諡曰慈孝皇后先是帝營夀陵於太峪山及是太后崩捋奉獻皇帝改葬焉命駙馬都尉崔元尚書張瓚等為奉迎禮儀使己帝親詣大峪相視復今議奉大后南詣合莽嚴嵩等言靈駕北來慈宫南詣共一舉耳如初議使帝意終未夬因止元等毋行而令指揮趙俊南往啓視幽宫子是親幸承天之議起質實大峪山在昌平州西北李時卒自張孚敬謝政後時遂獨相性素寬平比居首揆益鎮以安靜雖無大匡枚而議論恆本忠厚㑹夏言入輔時不與抗每事推讓言言亦安之帝待時不如孚敬言然頗少責辱恩禮亦始終不替及是卒贈太傅諡文康己亥十八年春二月立子載壡為皇太子封載垕為裕王載圳為景王質實載壡帝第二子載垕帝第三子即穆宗載圳帝第四子後之藩安陸振遼東饑遼東饑戶部請以本鎮採買銀一萬二千二百餘兩及舊振餘銀一萬六千三百餘兩振之報可并詔東遼等衛官賜給衣服各折銀有差起翟鑾為兵部尚書行邊先是鑾以憂歸闋久不召夏言顧鼎臣皆居政府鑾與謀召已及是帝將南巡慮塞上有警議遣重臣巡視言等因薦鑾充行邊使改兵部尚書兼右都御史拊循九邊文武將吏咸受節制齎帑金五十萬犒邊軍以曽子裔孫質粹為世襲五經博士顧鼎臣言孝宗時曽録顔孟子孫各一人為五經博士以奉祀事惟曽孫之後闕焉疏下禮部議訪得質粹授為世襲翰林院五經博士質實質粹字好古吉安永豐人曽子六十世孫其逺祖據者曽子十四世孫也當新莽時不受僞命自武城徙廬陵吉陽鄉質粹其裔孫也張孚敬卒孚敬剛明果敢不避嫌怨既遇主知亦時進讜言如張延齡之獄以孚敬力諍終昭聖太后世延齡得長繫暨清勳戚莊田罷天下鎮守內城先後殆盡皆其力也持身特亷痛惡贓吏一時苞苴路絶而性狠愎報復相尋不護善類欲力破人臣私黨而已先為黨魁天禮大獄叢詬沒世罷政凡五年乃卒帝如承天謁顯陵夏四月還京師趙俊自承天還言顯陵不吉帝欲親詣承天周閲卜兆九卿大臣許瓚吕柟等諫帝曰朕豈空行哉為吾母耳乃命宣城伯衛錞遂安伯陳鏸及顧鼎臣等輔太子居守遂如承天夏言嚴嵩等扈從三月至承天謁顯陵命作新宫曰待合葬也越三日享上帝於龍飛殿奉睿宗配秋於國社國稷遍羣祀又三日御龍飛殿受賀詔赦天下給復承天三年免湖廣明年田賦之之二畿內河南三之一歸過堯母墓從臣請致祭帝曰帝堯父母異陵可徵合葬非古既至京復入大峪審視曰大峪不如純德卒定南祔之議光是帝行次衛輝夜四鼓行宫火從官倉猝不知帝所在陸炳排闥負帝出帝自是愛幸炳炳母帝乳媪也及謁陵畢嚴嵩請表賀夏言請俟還京報罷帝大不懌嵩知帝指固以請帝乃曰禮樂自天子出可也令表賀帝自是不悅言質實堯母墓在望都縣城南望都漢置縣明曰慶都今仍改望都屬保定府純德本松林山在鍾祥縣東北以顯陵所在故改名許瓚字廷美靈寶人進之子衛錞華亭人穎之孫陳鏸巴人志三世孫也山西地震山西聞喜安邑平陸猗氏夏縣各地震有聲如雷越二日復震質實聞喜春秋時晉曲沃地漢武帝經此聞破南粵因置聞喜縣明屬解州今屬絳州平陸春秋時虞國地後為晉地後周置河北縣唐天寶初因開漕瀆得古刀篆文曰干陸遂改今名明屬解州今因之夏縣後周置縣明屬蒲州今屬蒲州府彗星見芒長三尺許光指東南掃軒轅北地八星旬日始出五月夏言罷尋諭留之翊國公郭勛得幸害言寵嚴嵩亦心妬言遂相與搆之㑹帝自承天還復幸太峪山言進居守敕稍遲帝大怒責言怠慢不恭命還前賜銀章并纍所降手敕言惶懼謝罪免追銀章手敕為子孫百世榮其詞甚哀帝怒不已疑言毁損令禮部追取削言勳階令致仕言乃以手敕四百餘并銀章上之居數日帝怒解命止行復諭入直言疏謝帝悅諭令勵初忠秉公持正免衆怨言心知所云衆怨者勛輩也再疏謂自處不敢後他人一志孤立為衆所忌帝復不悅詰責之惶恐謝乃己未幾以所追銀章手敕還之質實命還前賜銀章削勳階按明史夏言傳先是帝賜夏言祗銀章一俾密封言事文曰學博才優及是追還之言以薦皇天上帝冊表加少師特進光祿大夫上柱國明世人臣無有加上柱國者言所自擬也至是追削之也復以梁材為户部尚書材初長户部力袪宿弊以忤權貴失帝謄以右侍郎間住及尚書李廷相罷帝念材亷廷臣亦多薦之者召復原官材三掌國計砥節守公如一日帝眷亦甚厚是秋考察京官特命監之又命兼掌刑部事帝嘗曰尚書得如材者十二人無憂天下矣質實梁材字大用南京金吾右衛人六月雷震奉先殿雷震奉先殿左吻及東室門槅同時皇城北鼓樓燬詔諸司修省廷臣條時政得失都御史王廷相應詔自陳曰人事得而後天道順大臣法而後小臣廉今亷隅不飭賄賂公行大小效尤內外征利每遇一官有缺必有數人競爭要路權門終日十至且都御史職在糾察百僚振肅風紀臣叨兹任不能正身格物使弊絶風清復不能抗疏論列乞賜罷黜以警有位廷相疏意蓋斤嚴嵩張瓉輩也帝但諭留而已秋閏七月葬慈孝皇后于顯陵河南饑命户部侍郎王杲振之時河南災甚巡撫胡纘宗奏乞遣大臣賫帑往振帝白地方災重亟推素有才識者往彼設法振之乃命杲往杲上言救荒當如救焚今河南災甚奏報死亡已十萬有餘其存者旦夕冀得开合以延殘喘彼處倉庫所貯錢穀未必足用待其查勘請發文移往返動淹纍旬未免坐視民斃乞先發內帑銀十萬㑹同撫按官分行振濟章下戶部議而户科給事中郭鋆等亦已為言詔發臨凊倉糧價銀五萬兩賫往杲至河南復奏言河南民饑甚所賫去銀僅可支兩月之用來春青黃未接勢難坐視必復得銀十五萬兩有竒乃可户部發德州倉銀五萬二千七百餘兩及河南布政司庫解京銀并開封府河道賊罰銀八萬兩與之詔從之質實王杲字景和汶上人胡纘宗陜西恭安人郭鋆山西髙平人庚子十九年春正月翟鑾還京復入閣鑾之行邊也諸邉文武大吏俱櫜鞬郊迎惟恐不得當鑾意饋遺不資既事竣歸裝千輛用遺貴近遂命以原官入閣二月振河南湖廣災督理顯陵工程工部右侍郎顧璘言河南湖廣旱災㑹顯陵興工饑民皆赴工就食至是工畢民失所不振將有嘯聚之患請量留二省無災府縣兑運正糧濟之户部議覆查所司貯庫銀兩易本色以偹振恤其兌運正糧許量折每石七錢湖廣清軍御史姚虞因上流民圖言承天工所流民宜振恤詔璘民㑹同撫按等官設法振濟務使流亡復業質實顧璘字華玉吳縣人姚虐蒲田人夏五月詔勳戚子弟入監肄業司業王同祖言世祿之家鮮克由禮失教故也請敕兩京公侯伯子弟几未仕者悉入成均俟學有可觀奏請叙䕃不率者糾治從之尋命已任事者亦送監𨽻業于是少年勳戚爭以入學為榮矣質實王同祖字繩武崑山人六月增設鎮守江淮總兵官先是江洋盜發夏言為兵科給事中奏請専設鎮守江淮總兵官督兵勦捕未幾賊平兵部奏革以其重任仍歸操江武臣如故凡浙江糧運自蘇州常州裹河取道者由鎮江京口閘抵儀真其閘土疏易淤府縣必嵗時修治然糧運無阻是年京口閘淤阻漕運咸多撥民船多為海口所掠甚至執戮官吏南京兵科給事中楊雷以其事聞下兵部以設官本末查覆因請設總兵官給以旗牌敕符俾駐劄鎮江提督沿江上下兵防西自九江安慶東及淮揚蘇常諸郡凡備倭守備衛所及有司巡捕官悉受節制從之已而金山儀真守備官各加以將領之號分令江南江北地方凡衛所掌印巡捕諸官悉令服屬質實楊雷吳縣人秋七月振江西災江西南昌等府水災詔以新建等縣兑運正米內量改折色十一萬石併留𣲖剩南糧四萬石以備振濟八月殺太僕楊最時帝好神仙給事中顧存仁髙金王納言皆以直諫得罪㑹方士段朝用以所煉白金器百餘因部勛以進云以盛飲食物供齊醮即神仙可致也帝立召與語大悅朝用言帝深居無與外人接則黃金可成不死藥可得帝益悅諭廷臣今太子監國朕少暇一二年親政如初舉朝愕不敢言最抗疏諫曰陛下春秋方北乃聖諭及此不過欲服食求神仙耳大神仙乃山棲溧銖者所為豈有髙居黃屋紫闥衮衣玉食而能白日翀舉者臣雖至愚不敢奉詔帝大怒立下詔獄杖殺之監國議亦罷明年朝用伏誅隆慶中贈最副都御史諡忠節質實楊最字殿之射洪人顧存仁字伯納太倉人髙金石州人王納言信陽人九月劉天和敗濟農於黑水苑斬其子錫沙王濟農連年入冦邊將禦之屢被殺傷是年七月冦萬全右衛總兵官白爵逆戰再敗之至是復入固原剽掠且壓㑹淫潦弓矢盡膠無鬪志而諸捋多畏縮天和斬指揮二人召故總兵官周尚文激今立功㑹陜西總兵官魏時督兵分道邀之至黑水苑尚文盡鋭奮擊之自己至申凡三勝負戰未决濟農子錫沙王驍果而輕率其徑卒三十餘人馳衝營中堅尚文擊斬之冦遁走寧夏巡撫楊守禮總兵任傑等復邀擊于鐵柱泉敗之進天和南京户部尚書以守禮總督軍務尚文復都督同知質實萬全右衛洪武二十六年置與左衛同城屬山西行都司固原州本固原守禦千户所𢎞治十五年置州屬平凉府黑水苑在固原州西鐵柱泉在靈州花馬池西南有泉百步明嘉靖十五年劉天和改築舊堡設兵戍守周尚文字顔章西安後衛人楊守禮字秉節蒲州人冬十月顧鼎臣卒鼎臣居政府謹事夏言不能有為及是卒辛丑二十年春二月下監察御史楊爵于獄時帝經年不視朝日事齊醮工作煩興嵗頻旱元日徼雪夏言嚴嵩作頌稱賀爵撫膺太息上疏曰今天下大勢如人衰病已極腹心百骸莫不受患即欲拯之無措手地方且奔競成俗賕賂公行遇灾變而不憂非祥瑞而稱賀讒諂面諛流為欺罔士風人心頽壞極矣諍臣拂士日益逺而快情恣意之事無敢齟齬于其間此天下大憂也去年自夏入秋恆暘不雨畿輔千里而無秋禾既而一冬無雪元日微雪即止民失所望憂旱之心逺近相同此正撤樂减膳憂懼不寧之時而輔臣言等方以為符瑞而稱頌之欺天欺人不已甚乎翊國公勛中外皆知為大奸大蠧陛下寵之使稔惡肆毒羣狡趨附善類退處此任用匪人足以失人心而致危亂者一也臣巡視南城一月中凍餒死八十人五城共計未知有幾孰非陛下赤子欲延須臾之生而不能而土木之功十年未止工部屬官增設至數十員又遣官逺修雷壇以一方士之故朘民膏血而不知恤是豈不可以已乎况今頻年災沴上下交空尚可勞民糜費結怨天下哉此無作不已足以失人心而致危亂者二也陛下即位之初勵精有為嘗以敬一針頌示天下矣乃數年以來朝御希簡經筵曠廢大小臣庶朝參辭謝未得一睹聖容敷凍復逆未得一聆天語恐人心日益怠偷中外日益渙散非隆古君臣都俞吁咈協恭圖治之氣象也此朝講不親足以失人心而致危亂者三也左道惑衆聖王必誅今異言異服列于朝苑金紫赤紱賞及方外夫保傅之職坐而論道今舉而卑之竒邪之徒流品之亂莫以加矣陛下誠與公卿賢士曰論治道則心正身修天地鬼神莫不祐享安用此妖誕邪妄之術列諸清禁為聖躬纍也臣聞上之所好下必有甚近者妖盜繁興誅之不息風聲所及人起異議貽四方之笑取百世之讒非細故也此信用方術足以失人心而致危亂者四也陛下臨御之礿延訪忠謀虛懷納諫一時臣工言過激切多有獲罪自此以來臣下震於天威懷危慮禍未聞復有犯顔直諫以為沃心助者往嵗太僕卿楊最出言而身殞近日贊善羅洪先等皆以言罷斥國體冶道所損甚多臣為最等惜也古今有國家者未有不以任德而興拒諫而亡忠藎杜口則讒諛交進安危休戚無由得聞此阻隘言路足以失人心而致危亂者五也望陛下念祖宗創業之艱難思今日守成為不易覽臣所奏賜之施行宗杜幸甚帝震怒立下詔獄搒掠血肉狼籍關以五木死一夕後蘇所司讀送去司問罪帝不許命嚴錮之獄卒以帝意不測屏其家人不納飲食屢濱於死處之泰然既而主事周天佐御史浦鋐俱以救爵先後箠死獄中自是無敢救者質實楊爵字伯珍富平人周天佐字子弼晉江人時上疏言國家置言官以言為職爵繫獄數月聖怒彌甚一則曰小人二則曰罪人夫以盡言直諫為小人則為緘默逢迎之君子不難以秉直納忠為罪人又執不能為容悅捋順之功臣哉爵身非木石命且不測萬一溘先朝露使諍士飲恨直士寒心損聖德不細帝覽奏大怒杖之六十詔下獄天佐與爵無生平交入獄時第隔扉相訊而已比三日天佐不勝楚遂死尸出獄大興民有祭而哭之慟者或問之曰吾哀其忠之至而死之酷也蒲鋐字汝器文登人時出按陜西上疏曰天下治亂在言路通塞言路通則忠諫進而化理成言路塞則奸諛恣而治道舉御史爵以言事下獄幽囚已久臣行部富平皆言爵慤誠孚鄉里孝友式風俗且爵本以論郭勛獲罪令勛奸大露陛下業致之理則爵前言非妄望賜矜檡疏入帝大怒趣才騎逮之秦氏逺近奔送舍車下者常萬人皆號哭曰願還我使君鋐赴徴業已病既至下詔獄榜掠偹至除日後枝之百錮以鐵柙爵迎哭之鋐息已絶徐張日曰此吾職也子無然後數日卒隆䖍初天佐贈光祿卿鋐贈光祿少卿夏四月置安南都統使司先是咸寧候仇鸞兵部尚書毛伯溫奉命議討安南至廣西徵集兩廣福建湖廣狼士官兵并檄雲南守臣及諸司集議分正兵為三哨分竒兵為二哨分鳥雷山等處兵為海哨又將雲南别集之兵分三哨與黔國公沐朝輔安逺侯栁旬提督軍務侍郎張經巡撫都御史汪文盛等部暑已定乃馳檄安南臣民論以朝廷興滅繼純意討罪止于莫登庸父子有能舉舉郡縣來降者即以其郡縣授之擒斬莫登庸父子來降者賞二萬金官顯秩申告再三又論登庸父子果能束身歸罪盡籍其土地人民納欵聼命亦待以不死伯溫等駐師近邉登庸聞之懼遣使詣軍門乞降詞頗卑切伯溫等承制許之時登庸子方瀛已死乃留孫福海守國登庸與姪文明并酉首阮如桂等四十餘人又鎮南關各尺組繫頸徒跣匍匐稽首上降表復詣軍門再拜盡籍國中土地軍民職官悉聼處分于是伯溫等宣論朝廷威德暫令歸國候命伯溫乃與諸守臣㑹疏言安南畏威束身歸罪其黎寧自稱黎氏之後譜系不詳無以為據乞宥納登庸削故爵量授新秋疏聞帝大喜詔改安南國為安南都統使司授登庸都統使秩從二品銀印舊所僣擬制度悉除去改其十三道為十三宣撫司各設宣撫同知副使僉事聼都統黜陟仍三嵗一貢以為常并令核黎寧真僞如果黎氏後劃所據四府俾奉其祀事否則己之伯溫受命嵗餘不發一矢而安南定質實鳥雷山在廣東欽州西南大海中為入安南要道唐置鳥雷縣以山得名鎮南關在廣西太平府慿祥州西南左右石山高插雲表設關建城為安南入貢之道沭朝輔西平侯英七世孫栁甸安逺侯景之子九廟灾辛酉薄暮雨雹風霆大作入夜大從仁宗廟起延燒成祖廟及太廟羣廟一時俱燼惟睿宗廟獨存成祖仁宗二廟帝后神主俱燬五月以兵部侍郎王以旗總理河漕時黃河南徙决野雞岡由渦河經亳州入淮舊决口俱塞徐吕二洪竭漕舟膠總河郭持平久治不效乃命以旗督理以旗至上言國初漕河惟通諸泉及汶泗黃河勢猛水濁遷徙不常故徐州貞白吊劉大夏力排之不資以濟運也今幸黃河南徙諸閘復舊宜濬山東諸泉入野雞岡新開河道以濟徐吕而築長堤沛縣以南聚水如閘河制務利漕運而已明年春持平請濬孫繼口等處使東由蕭碭入徐濟運其秋從以旗言于孫繼口外别開一渠泄水以濟徐吕几八月三口工成以旗持平皆被奬遂召以旗還質實野雞岡在歸德府睢州北孫繼口在河南睢州考成縣嘉靖十八年正月河道都御史胡纘宗疏言新口孫繼口孫祿口各黃河支流一以分殺上源歸睢二處水患一以淮下流徐吕二洪以濟官漕請于孫繼口至孫祿口另築長堤可免衝决散漫之虞而黃河安流二洪順受運道可無患矣從之碭山秦碭縣後漢碭山明屬徐州今屬徐州府王以旗字士招江寧人郭恃平字守衡萬安人振遼東饑以遼東饑詔發太倉庫銀五萬兩往振六月振畿內山西饑以順天用所屬州縣災傷詔免棁糧有差仍發太倉銀二萬兩通倉未二萬石及各州縣預偹倉糧銀相兼振濟復出太倉米一萬石减價發糧以平米價又以永平大饑發太倉庫銀六千兩通倉米六千石振之是時山西撫按官亦奏災傷重大請發本省預偹倉糧并貯庫銀錢振濟仍乞蠲免夏稅如例俱從之秋七月振山東災以山東災傷免濟南等六府所屬州縣稅糧有差復留德州臨清二麥小麥各二萬石于山東布政使及動支倉庫錢糧相兼振濟八月昭聖皇太后張氏崩諡孝康皇后夏言罷九月郭勛以罪下獄冬十月言復入閣言勛交惡日甚九廟災言方以疾在告自陳乞罪不允昭聖太后崩詔問太子服制言報疏有訛字帝切責言言謝過且乞還家治疾帝益怒令致仕及將出都詣而苑齊宫叩首謝帝憐之俾還私第治疾俟後命時勛以給事中戚賢等劾其擅作威福網利虐民亦引疾狂告京山侯崔元新有寵直內苑忘勛容從容問元言勛皆朕股肱相妬何也元不對帝問言歸時曰俟聖誕後乃敢請又問勛何􅔂曰勛無疾言歸即出耳帝頷之言官知帝春言惡勛因共劾勛先是帝給勛敕與兵部尚書王廷相等同清軍役勛久不領言官劾之勛疏辨有何必更勞賜敕語帝怒責勛悖謾無人臣禮給事中髙時因盡發勛貪縱不法之十數事遂下勛錦衣獄復詔言入直方言在告時閣事多取裁决及治勛獄排根批柢悉其指授朝士方惡勛不以咎言也勛下獄後帝念其曽贊大禮諭鎮撫司勿加刑訊奏上勛罪斬决帝以奏當不明令法司復勘法司更當勛不軌罪斬沒入妻孥田宅奏上留中不下帝意本欲寬勛屢示意指而廷臣惡勛謬為不喻指者更坐重辟久之勛竟死獄中質實戚賢字秀夫全椒人髙時臨安人賑山西災以山西連被虜患詔復徭役二年仍發帑銀六萬兩遣户部侍郎張漢往賑之質實張漢鍾祥人十一月葬孝康皇后壬寅二十一年夏六月諳達冦山西先是諳達遣使欵大同詔却之諳達與濟農遂分道入犯及是復遣使求貢大同巡撫龍大有誘縳之詭言用計擒獲詔磔于市敵怒入掠朔州抵廣武由太原南下欲犯平陽澤潞山西撫按官請發京兵赴援帝以京兵未可輕動下部議部言既下平陽則省城固已解嚴各路阻隔官兵亦隨至矣請將見在主客官兵摘發二枝専守省城以固根本至于賊入平陽蓋有三路中由靈石冷泉口趨霍州以入東由介休趨沁州經嶽陽浮山以入西由石州趨隰吉石棲等處以入竊計靈石天險勢難突至其中郭家溝韓信嶺四三百里險甚分兵伺之虜可圖也或由澤潞衝突太行越入懷慶北去臨凊真定僅數百里宜令諸路守臣伏兵堵截使虜不得過太行乃為與虞蓋潞安黎城等處與河南武安接境一下武安則地曠難守河南山東北直𨽻一帝俱為可慮也或知有備不至又捋由隰州入石州趨偏頭寧武亦宜備之諸賞格宜各榜諭以㔧人心㑹廷綏巡撫都御史萬潮奏奏頃得降者言虜謀不獨冦山西直欲趨盧溝橋以窺京師兵部言都城備豫久矣倘盧溝橋有警不得不調援宣薊帝命宣薊兵馬除復援别鎮外餘即整搠以待兵部言虜見在山西勢甚猖獗各鎮守營官軍因無總督大臣調度未免各分彼此不肯戮力往年遼東兩廣河套有變俱用總督専征戎事有賴近雖奉㫖裁革但今日邊事方殷事權不一乞敕吏部㑹同府部九卿科道推舉在廷大臣忠誠有將略者復令為總督則節制歸一而虜患可無虞矣帝乃命翟鴛復任巡撫已而敵冦潞安大掠沁汾襄坦長子祈縣等處參將張世忠等戰死敵遂從欣崞而北出雁門故道而去未幾濟農死其子朗台吉等散處河西勢分諳達獨盛嵗數擾邊質實廣武秦雁門郡明為代州屬太原府今代州為直𨽻州靈石漢介休縣地隋開皇中置靈石縣明屬霍州今因之泠泉鎮名在縣北四十里有泉北流入汾霍州春秋時霍國隋置霍山郡今置霍州明初以州治霍邑縣省入屬平陽府今為直𨽻州沁州秦漢皆上黨郡地唐為沁州明為直𨽻州嶽陽漢彘縣隋為嶽陽縣明屬平陽府浮山唐置縣明屬平陽府石州戰國時趙離石邑後周改為石州明洪武中以州治離石縣省入仍曰石州屬太原府萬厯二十三年改為永寧州屬汾州府今並因之隰州古蒲城隋置隰州明屬平陽府今直𨽻吉州自古屈邑宋元祐初置吉鄉軍金改吉州明屬平陽府石使漢西河郡地名隋置石樓縣明屬汾州府今並因之郭家溝在靈石縣南二十五里而山髙峙中界深溝霍州志靈石與霍隔百里中有關曰天險即此韓信嶺亦名髙壁嶺在靈石縣東南二十五里此與雀鼠谷接最為險固黎城古黎侯國隋置黎城縣明屬潞安府武安漢縣明屬彰德府今並因之寧漢樓煩縣地唐末置寧武軍後廢明景泰元年置寧武關孝宗十六年置寧府本朝雍正三年年升縣為寧武府治襄垣奉縣明屬潞安府長子古長子邑漢置縣明屬潞安府祁縣春秋時晉大夫祁奚邑漢置祁縣明屬太原府今並因之龍大有茶陵州人翟鵬字志南撫寧衛人郎台吉舊作狼台吉今改秋七月己酉朔日有食之夏言罷八月以禮部尚書嚴嵩兼武英殿大學士預機務言與嵩同鄉科第後于嵩稱晚進以議禮驟貴嵩謹事務言不為下及言入閣援嵩白代以門客畜之嵩恨甚常置酒邀言躬諸其第言辭不見嵩布席展所具啓跽讀言謂嵩實下已不疑也言既失帝意歡斥呼嵩與謀嵩已潛造陶仲文第謀齮言代其位言知甚愠囑所善者劫嵩時帝己心愛嵩攻益力帝憐之不聽也兩人遂大隙嵩因燕見蝢首兩泣訴言見凌狀帝息使陳言罪嵩因振暴其短帝大怒手敕禮部歷數言罪且曰郭勛已下獄猶千羅百織言官為朝廷耳目專聽言主使朕不早朝言亦不入閣軍國重事取裁私家王言要祕視為戲玩言官不一言徒欺謗君上致神鬼怒雨甚傷禾言大懼請罪居十餘日乞骸骨語極哀疏留八日㑹七月朔日食既下手詔曰食過分正坐下慢上之咎其落言職開往先是言再罷宰相帝雖優禮然恩眷已不及初帝在西苑齊居許入直諸貴人得乘馬言獨用小腰與以乘帝怪之禾言會帝以奉道不御翼善冠而御香業冠命尚方倣之製沈水香為五冠以賜言及嵩等言以非人臣法服不奉詔帝怒甚嵩于召對曰故冠香葉而籠輕紗子外令上見之帝蓋內親嵩而欲去言嵩因傾之言既去醮祀青詞非嵩無當帝意者遂代言入閣嵩時年六十有餘不異少壯朝夕直西苑板房未嘗一歸洗沐帝謂其勤益信之嵩無他才略惟一意媚上竊權罔利帝英察自信果刑戮頗護己短嵩以故得因事激帝怒戕害人以成其私誅斥者不可勝計云質實陶仲文方士初名典真黃岡人明史輿服志皇帝常服冠以烏紗冒之折角向上名翼善冠九月作雷壇錮工部員外郎劉魁于獄帝用陶仲文言建雷壇于太液池西所司希帝意務宏侈程工峻急魁欲諫度必得重禍先命家人鬻棺以侍遂上章頃營大享殿大髙元殿諸工尚未告峻內帑所積幾何嵗入幾何一投之費動至億萬土木衣文繡匠作班朱紫道流所居擬于宫禁國用已耗民力已竭而復為不經之事非所以示天下此後世帝震怒杖于廷錮之詔獄質實劉魁字煥吾泰和人冬十月宫婢楊金英等謀逆伏誅殺端妃曹氏帝宿端妃曹氏宫宫婢楊金英等伺帝熟寢以組縊帝項誤為死結得不絶有張金蓮者知事不就走告皇后后馳至解組帝得蘇后命內監張佐等捕宫人雜治言王寧嬪實首謀又言端妃亦與知時帝病悖不能言后傳㫖收端妃寧嬪及金英等同謀者不分首從悉于于市仍銼尸梟示并收斬其族屬十人餘給付功臣家為奴時諸婢為謀已久帝幾危中外震惶次日午始知帝無恙羣心乃定久之帝始知端妃寃癸卯二十二年春正月丙午朔日有食之夏四月福建福州興化泉州漳州四府地震六月議冗員吏部以奉詔裁革冗員奏言各衙門官原係額設及隨事添設各有職掌者俱應存留其添設官獨户工二部欽天監太醫院為多但今疆陲多事廟工甫興戶工二部難裁韋欽天監太醫院當咨行禮部考選去留南京併在外應裁官員行南京吏部及各省撫按官㑹議具奏詔從之仍令查各衙門添注官現在員數以聞已而吏部查戶工二部太常太僕鴻臚寺尚實寺中書科順天府上林苑監制誥敕房文華殿武英殿辦事各添注官員具名數疏以進帝曰各官既有添注每遇實缺仍乃不行填補却往往别推以致冗食者多自今內外官遇有實缺即以添注者補之違者即時糾舉秋九月逮巡按山東御史葉經杖殺之嚴嵩與經有宿憾及是經按山東監鄉試試録上嵩指發䇿語為誹謗激帝怒下禮部參論尚書張壁等阿㫖請逮考試官周鍠等調布政使陳儒及經等并治嵩密言試事盡由御史帝乃降㫖斥文中語為狂悸經杖八十為民創重卒鎮儒等謫官嵩借事殺異己者自經始也先是嵩相甫踰月御史謝瑜即劾之比之四凶請急誅斥帝雖譙讓瑜然未深罪嵩亦以得政未敢顯為擠陷故瑜得居職如故及經杖死嵩益肆志報復其後以大計嵩囑主者黜瑜遂除名于是給事中王協沈良材陳璮御史俞時陳祐及山西巡撫童漢臣福建巡按何維柏等相繼得罪皆並瑜劾嵩者也質實葉經字叔明上虞人由常州推官擢為御又嵩官禮部時以秦晋二藩宗人襲封事受重賄經指其事劾嵩嵩懼甚力彌縫得免故恨經報復為隆慶初贈經光祿少卿張璧字崇象石首人陳儒崑山人謝瑜字如卿上虞人王協字韜孟金壇人沈良材泰州人陳􅀈餘姚人喻時光山人陳紹上虞人童漢臣錢塘人何維柏字喬仲南海人發明初經以秦晉二蒲賄事劾嵩嵩疏辨遂付襲爵事于廷議而置嵩不問朝廷固已失刑矣越二年嵩遂得抉宿憾害經其為報復情跡顯然乃嘉靖不知致嵩由此得以盡鋤其異己之人殘毒忠良實由經始姤之初六曰羸豕孚蹢躅程傳謂羸弱之豕其中心在乎蹢躅雖隂微在下而有漸盛害陽之象焉嵩之殺經殆將嘗試其蹢躅之技乎冬十月朵顔入冦攻圍慕田峪殺守備陳舜副總兵王繼祖等往援乃退質實慕田峪在昌平州北有闕口十一月以嚴寒賑貧民御史何贊言京師苦寒小民凍餒枕藉乞多方賑救併行江北諸郡加惠以廣德意帝曰今嵗嚴寒困窮可憫亟行一體振之質實何贊黃嚴人御定資治通鑑綱目三編卷二十二
