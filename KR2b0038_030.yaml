body:
  text: 起癸亥明世宗嘉靖四十二年盡壬申明穆宗隆慶六年凡十年癸亥四十二年夏四月總兵官俞大猷副總倭于福建破之自倭去柯梅浙東江北漸寧而患盡移于福建泊泉州之浯嶼掠回安恵安攻福寧寧徳進圍福州經月不解蔓延興化奔突漳州迄無寧日閩人在朝者爭劾胡宗憲嫁禍帝不問既而宗憲以罪被逮倭尋䧟興化府焚掠一空移據平海衛不去自倭躪東南破州縣衛所以百数未有及府城者興化故名郡最繁富既䧟逺近震動詔急徵大猷充總兵官繼光為副合兵往討時劉顯自廣東赴援以兵少壁城下不敢戰大猷至亦不欲攻俟大軍之集乃與顯别邀賊于長樂殱之繼光先已破倭于横嶼還浙江矣至是繼光以浙江兵來㑹巡撫譚綸令繼光將中軍顯左大猷右合攻賊于平海繼光先登左右軍繼之斬級二千二百有竒還被掠者三千人倭遁去遂復興化其侵犯他州縣者亦為諸將所破閩患少熜自倭起以來二十餘載攻破城邑殺傷官吏軍民不可勝紀轉漕増餉天下騷然至是大創而去其後繼光大猷復連敗之東南始得安枕矣質實浯嶼即金門在泉州府同安縣東南海中廣袤數十里同安五季閩縣恵安宋縣明俱屬泉州府今因之平海衛明置今栽故城在興化府莆田縣東長樂唐縣明屬福州府今因之横嶼在寧徳縣東南海中胡宗憲以罪被逮宗憲初因趙文華結歡嚴嵩父子文華死又因羅龍文以進賂及嵩敗南京給事中陸鳳儀劾其黨嚴嵩及奸欺貪滛十大罪有詔逮問及憲宗至帝曰宗憲非嵩黨朕㧞用十九年人無言者自累獻祥瑞為羣邪所疾今若加罪後誰為我任事者釋令閒住乆之以萬壽節獻秘術十四帝大悦將復用矣㑹御史汪汝正籍羅龍文家上宗憲手書乃被劾時自擬㫖授龍文以逹世蕃者遂逮下獄宗憲自叙平賊功以獻瑞得罪言官且許汝正受贓事帝終憐之並下汝正獄宗憲竟庾死汝正得釋戚繼光字元敬世襲登州衛指揮僉事譚綸字子理宜黄人金星晝見四月始伏冬十月錫林阿巴圖爾入㓂京師戒嚴虜數犯遼塞總督陽選囚縶三衛長托干令其子更迭為質托干者錫林阿妻父也冀以牽制錫林阿三衛皆怨至是錫林阿巴圖爾等潰牆子嶺入大掠順義三河諸將趙溱孫臏戰死京師戒嚴詔諸路兵入援虜駐内地八日大同總兵官姜應熊敗之于密雲乃退詔誅選初㓂之入帝方祠釐兵部尚書楊博不敢奏謀之徐階檄宣府總兵官馬芳等入援㑹帝見東城火光知㓂已逼大驚諭徐階議逐㓂而芳兵已至階請亟償之令専䕶京師及㓂退帝怒博不早聞欲與楊選同論罪階力為救觧乃誅選而不罪博質實牆子嶺闗名在密雲縣東北七十五里古北口之東南城周一里有竒三河唐置縣明屬通州今屬順天府孫臏時官總兵趙溱官遊擊馬芳字徳馨蔚州人巴圖爾舊作把都兒托干舊作通罕今並改甲子四十三年春二月伊王典楧有罪廢為庶人國除典楧貪而愎多持官吏短長不如指必搆之去既去復折辱之御史行部過者楧要笞之縉紳徃來率紆途取他境經郭外者府中人輒追挽其車詈其不朝入朝者復辱以非禮府墻壞請更築乃奪取民舎以廣其宫郎中陳大壯與邸鄰索其居不與使數十人從大壯卧起奪其飲食竟餒死所為宫崇臺連城擬帝闕有錦衣官校之陜者經洛陽典楧忽召官屬迎詔鼓吹擁錦衣入捧一黄卷入宫衆請開讀曰宻詔也遂起錦衣去錦衣謂王厚待之不知所以其夜大張樂至曙府中人皆呼千嵗詐謂天子特親我也閉河南府城大選民間子女七百餘留其姝麗者九十人不中選者以金贖都御史張永明等上言狀再遣使往勘革祿三之二令壊所僭造宫城歸民間女執羣小付有司典楧不奉詔部牒促之布政使侍牒入見楧曰牒何為者可用障櫺耳撫按官以聞詔禮部㑹三法司議僉謂典楧滛暴無藩臣禮宜禁錮髙墻削除世封從之質實伊王典楧伊厲王㰘之元孫㰘太祖之第二十五子也封國于洛陽張永明字鍾誠烏程人倭犯仙遊總兵官戚繼光大敗之福建倭平時閩中舊倭畧平餘黨復糾新倭萬餘攻仙遊縣城圍之三日繼光引兵馳赴之大戰城下賊敗趨同安繼光麾兵追之斬首數百級墜崖谷死者無莫餘者尚數千奔漳浦繼光分其兵為五哨身自持短兵徒跣縁崖披荆棘而上迫賊壘賊伏發繼光氣愈厲督各哨兵入賊巢殊死戰又俘斬數百人于是閩患悉平質實仙遊縣本莆田縣地唐析置清源縣屬泉州天寳初改仙遊縣明屬興化府漳浦唐置縣明屬漳州府今皆因之夏五月壬辰朔日有食之乙丑四十四年春三月袁煒免煒疾篤上疏乞歸道卒煒貴倨鮮腆故出徐階門直以氣凌階館閣士出門下者斥辱尤不堪人皆畏而惡之嚴世蕃伏誅世蕃論戍雷州未至而歸初嵩歸至南昌值萬夀節使道士藍田玉為帝建醮鐡柱宫田玉善召鶴嵩取其符籙并已祈鶴文上之因乞移世蕃近地以便就養詞甚哀帝不許而世蕃遽返羅龍文一詣戍所即逃還徽州數往來江西與世蕃計事世蕃大治園亭勢燄不少衰其監工奴見袁州推官郭諫臣不為起㑹南京御史林潤按視江防因與諫臣謀馳疏盡發其罪疏言臣巡視上江備訪江洋羣盗悉竄入逃軍羅龍文嚴世蕃家龍文卜築深山乘軒衣蟒隂有不臣之心而世蕃曰夜與龍文誹謗時政揺惑人心近假名治第招集勇士至四千餘人道路洶洶咸謂變且不測乞早正刑章以絶禍本帝得疏大怒即詔潤逮捕之世蕃子紹庭官錦衣聞命急報世蕃使詣戍所方二日潤已馳至世蕃猝不及赴乃械以行龍文亦捕得于梧州既至京潤因復上書數嵩世蕃罪畧曰世蕃罪惡積非一日任彭孔為主謀羅龍文為羽翼惡子嚴鵠嚴珍為爪牙占㑹城厫倉吞宗藩府第奪平民房而又改釐祝之宫以為家祠鑿穿城之池以象西海直欄横檻峻宇雕墻巍然朝堂之規模也袁城之中列為五府南府居鵠西府居鴻東府居紹慶中府居紹庠而嵩與世蕃則居相府招四方之亡命為䕶衛之壯丁森然分封之儀度也總天下之貨寳盡入其家世蕃已踰天府諸子各官東南雖豪僕嚴年謀客彭孔家資亦稱億萬民窮盗起職此之由甚者畜養厮徒招納叛卒數十百人明稱官舎出没江廣刧掠士民其家人夀二銀一等隂養刺客昏夜殺人奪人子女金錢半嵗之間事發二十有七而且包藏禍心隂結典楧在朝則為寧賢居鄉則為宸濠以一人之身而總羣奸之惡雖赤其族猶有餘辜嚴嵩不顧子未赴伍朦朧請移近衛既奉明㫖居然藏匿以國法為不足遵以公議為不足恤世蕃稔惡有司受詞數千盡送父嵩嵩閲其詞而處分之尚可諉于不知乎既知之又縦之又曲庇之此臣謂嵩不能無罪也疏入帝怒詔下法司訊狀世蕃猶抵掌曰任他燎原火自有倒海水已而聚其黨竊議自謂賄字自不可掩然非上所深惡惟聚衆通倭之說得諷言官使削去而故填楊沈下獄為詞則上必激而怒上怒乃可脱也謀既定乃令其黨揚言之刑部尚書黄光昇等亦以為然如其言具稿詣徐階議之階固已豫知姑問稿安在吏出懐中以進閲畢曰法家斷案良佳延入内屏左右語曰諸君子謂嚴公子當死乎生乎曰死不足贖曰然則此案將殺之乎生之乎曰用楊沈正欲抵死徐階曰别自有說楊沈事誠犯天下公惡然以計中上所諱取特㫖沈暗入招中取泛㫖上豈肯自引為過一入覧疑法司借嚴氏歸過於上必震怒在事者皆不免嚴公子騎欵叚出都門矣衆愕然請更議曰稍遲事且洩從中敗事者必多事且變今當以原疏為主而闡發聚衆本謀乃出一稿于䄂中獨按羅龍文與汪直交通賄世蕃求官世蕃用日者言以南昌倉地有王氣取以治第制擬王者又結宗人典模隂伺非常多聚亡命南通倭北通虜共相響應即呼寫本吏入扃户令疾書即用印封識而世蕃不知也竊自喜計行謂龍文曰諸人欲以爾我償楊沈命奈何龍文不應執其手耳語曰且暢飲不十日釋縲絏善歸上因此念吾父别有恩命未可知雖然先取徐階首當無今日吾父養惡故至此今且歸用前計未晚誰謂阿儂智者龍文喜問故曰第俟之已而階改疏上帝覧疏命法司鞫訊具實以聞階因速具疏言事已勘實具有顯證請亟正典刑帝從之命斬世蕃龍文于市二人聞相抱哭家人請寫遺書謝其父不能成一字都人聞之大快各相約持酒至西市看行刑籍其家黄金可三萬餘兩白金三百餘萬兩他珍寳服玩所值又數百萬嵩及諸孫皆為民後二年嵩老病寄食基舎以死質實鐡柱宫在南昌城内中有鐡柱相傳許遜所鑄以鎮蛟螭之害明嘉靖改名妙濟萬夀宫郭諫臣長州人林潤字若兩莆田人黄光昇晉江人夏四月以吏部尚書嚴訥禮部尚書李春芳並兼武英殿大學士預機務袁煒去後徐階當國屢請増䦒臣故有是命帝眷侍直諸臣厚凡遷除皆出特㫖春芳自學士至柄國凡六遷未嘗一由廷推六月建玉芝宫睿宗原廟前殿東柱産金色芝一本帝大悦告于太廟百官表賀因建玉芝宫十一月奉安獻皇帝后神主于玉芝宫冬十一月嚴訥罷訥仍掌吏部晨理部事暮直西苑供奉青詞積勞成疾遂罷歸訥既歸里父母皆在晨夕備物孝養人以為榮訥嘗語人曰銓臣與輔臣必同心乃有濟吾秉銓二年適華亭當國諸事無阻且所任選郎賢舉無失人華亭謂徐階選郎謂陸光祖也質實陸光祖字與繩平湖人丙辰四十五年春正月福建地震福州興化泉州三府同日地震二月下户部主事海瑞于獄帝乆不視朝深居西苑専意齋醮督撫大吏争上符瑞禮官輒表賀廷臣自楊最楊爵得罪後無敢言時政者至是瑞獨上疏日陛下即位初年敬一筬心冠履分辨天下欣然望治未乆而妄念牽之謂遐舉可得一意修真竭民脂膏濫興土木二十餘年不視朝法紀弛矣數年推廣捐納事例名器濫矣二王不相見人以為薄於父子以猜嫌誹謗戮辱臣下人以為薄於君臣樂西苑而不返人以為薄於夫婦吏貪官横民不聊生水旱無時盗賊滋熾陛下試思今日天下為何如乎古者人君有過賴臣工匡弼今于修齋建醮相率進香仙桃天藥同辭表賀建宫築室則將作竭力經營購香市寳則度支差求四出陛下誤舉之而諸臣誤順之無一人肯為陛下正言者諛之甚也且陛下之誤多矣其大端在於齋醮齋醮所以求長生也自古聖賢垂訓修身立命曰順受其正矣未聞有所謂長生之說陛下受術於陶仲文以師稱之仲文則既死矣彼不長生而陛下何獨求之至於仙桃天藥怪妄尤甚苦宋真宗得天書于乾祐山孫奭日天何言哉豈有書也桃必採而後得藥必製而後成今無故獲此二物是有足而行耶曰天賜者有手執而付之耶此左右奸人造為妄誕以欺陛下誤信之以為實然過矣陛下又將謂懸刑賞以督責臣下則分理有人天下無不可治而修真為無害己乎太甲日有言逆于汝心必求諸道有言遜于汝志必求諸非道用人而必欲其唯言莫違此陛下之計左也即觀嚴嵩有一不順陛下者乎昔為同心今為戮首矣梁材守道守官陛下以為逆者也厯任有聲官户部者至今首稱之然諸臣寧為嵩之順不為材之逆得非有以窺陛下之㣲而潛為趨赴乎即陛下亦何利於是陛下誠知齋醮無益一旦翻然悔悟日御正朝與宰相侍從講求天下利害洗數十年之積誤使諸臣亦得自洗數十年阿君之耻天下何憂不治萬事何憂不理此在陛下一振作間而已釋此不為而切切於輕舉度世敝精勞神以求之於繫風捕影茫然不可知之域臣見勞苦終身而無成也帝得疏大怒抵之地顧左右曰趣執之無使得遁宦官黄錦在劍曰此人素有癡名聞其上疏時自知觸忤當死市一棺訣妻子待罪於朝僮僕亦奔散無留者是不遁也帝黙然少頃復取讀之為感動太息留中者數月嘗曰此人可方比干第朕非紂耳㑹帝有疾煩懣不樂召徐階議内禪因曰海瑞言俱是朕今病乆安能視事又曰朕不自謹惜致有此疾困使朕能御便殿豈受此人詬詈耶遂逮瑞下詔獄究主使者尋移刑部論死獄上階力救奏遂留中發明嘉靖朝諸大臣多以青詞干進謟諛成風從未有以齋醮為非者海瑞疏陳痛切其忠君愛國之忱自然溢於楮墨視明代掠浮詞而抗疏者大相逕庭矣乃嘉靖始聞之而怒繼取讀之感動太息且留中數月深然其言引咎愧悔以此切諭輔臣然終逮瑞下獄豈䕶疾忌醫根于素性抑由當時臣工阿順為習乆未聞此逆耳之言也瑞疏云使諸臣亦得洗數十年阿君之耻置身于臯夔伊傅之列天下安得不治是瑞亦乆見于此矣三月以吏部尚書郭朴兼武英殿大學士禮部尚書髙拱兼文淵閣大學士並預機務朴拱皆由徐階薦召入直廬至是同入閣質實髙拱字肅卿新鄭人夏四月壬戌朔日有食之六月旱戊寅以乆旱帝親禱雨於凝道雷軒越三日雨羣臣表賀秋七月㓂犯萬全右衛總兵官馬芳擊敗之錫林阿以十萬騎入西路芳迎之馬蓮堡堡圮衆請塞之不可請登臺亦不可開堡四門偃鼔寂若無人比暮野燒燭天囂呼逹旦芳卧日中不起敵騎窺者相屬莫測所為明日芳蹶然起乘城指示衆曰彼軍多反顧且走勒兵追擊大破之冬十月振淮徐饑淮徐告饑命巡鹽御史以修河銀一萬二千兩振之閏十月諳逹冦大同㕘將崔世榮戰死時諳達屢犯東西諸塞及冬犯固原總兵官郭江敗死又犯偏頭闗及大同世榮禦之與其子大朝大賔俱力戰死十一月帝有疾先是帝以乆病忽欲南幸興都取藥徐階力諫乃止既而服方士王金等所獻丹藥病遂甚時方士至者日衆帝知其妄無殊錫王金思所以動帝乃偽造諸品仙方與所製金石藥同進其方詭秘藥性燥非服食所宜帝御之稍稍火發病遂不能愈十二月帝崩庚子帝大漸自西苑還乾清宫是日崩除階草遺詔召用建言得罪諸臣死者䘏録方士付法司論罪一切齋醮工作及政令不便者悉罷之詔下朝野號慟感激時髙拱郭朴以階不與共謀不樂朴曰徐公謗先帝可斬也兩人遂與階有隙發明大臣秉與國事當虚已和𠂻惟求其是所謂功不必自已出名不必自已成乃為得之此猶言其無事時也若當草寫遺詔于哀痛呼搶之餘商家國根本之務此何時也而可以嫌疑生分别者耶觀徐階所草詔猶能切中當時弊政為髙拱郭朴者自當賛助其成何至以己未與之故而遂生忌嫉造謗媒蘖竟欲各分門户甚至數年後拱専國政一切盡反階之所為而啟其釁者實惟郭朴一言朴安得無罪哉裕王載垕即位是為穆宗以明年為隆慶元年赦天下免明年天下田賦之半及嘉靖四十三年以前逋賦釋海瑞于獄先是瑞在獄猶未聞大行狀提牢主事先知之以瑞且見用設酒饌欵之瑞自疑當赴西市恣飲噉不顧主事因附耳語宫車適晏駕先生今即出大用矣瑞曰信然乎即大慟盡嘔出所飲食隕絶于地終夜哭不絶聲及是既釋復故官俄再遷大理丞丁夘穆宗莊皇帝隆慶元年春正月罷睿宗明堂配享時禮部奉詔㑹議郊社諸典禮及祔塟祔享諸制尚書髙儀上言先帝肇祀明堂奉睿宗配享今陛下踐祚睿宗已為皇祖若仍配享上帝似非周人宗祀文王之義請罷大享禮從之質實髙儀字子象錢塘人増設江浙巡漕御史時漕政廢弛有司怠緩軍衛遷延重以運官科求旗甲侵費弊端百出以致漕運失期舊制江北糧米當十二月以内過淮逺者不過次年之三月時有遲至次年六七月者山東糧米當四月運完逺者不過七月時有遲至十一月者至是户科給事中何起鳴請於南直𨽻浙江杭嘉湖増設御史一員令専理漕運其濟寧以南河道舊屬兩淮巡鹽御史帶管者并亦委之監兌時則巡厯淮安以南水盛時則巡厯徐州以北庶河道漕運可兼攝而並舉從之質實何起鳴内江人追尊母杜氏為孝恪皇太后二月立皇后陳氏后通州人以陳以勤為禮部尚書兼文淵閣大學士張居正為吏部侍郎兼東閣大學士並預機務以勤居正俱侍裕邸講讀至是並參大政時徐階以宿老居首輔與李春芳皆折節下士居正最後入獨引相體倨見六卿無所延納間出一語輒中肯人以是嚴憚之重於他相質實陳以勤字逸甫南充人張居正字叔大江陵人發明徐階以耆宿老成乆居政府猶持謙牧之懐居正甫參大政輒爾倨見六卿妄自尊大宜為衆所訾議也盖居正自恃幹濟之才出諸臣右又以潛邸舊恩欲自異于他相因而㒺恤人言倨傲日甚厥後秉政之専竟致威權震主百僚側目驕吝之氣蓋己中於入閣之初雖云才羙不足觀已三月塟永陵謚曰飲天履道英毅聖神宣文廣武洪仁大孝肅皇帝孝潔肅皇后孝恪皇太后同祔質實孝潔皇后陳氏世宗元配孝恪杜太后穆宗生母明史賛曰世宗御極之初力除一切弊政天下翕然稱治顧迭議大禮輿論沸騰倖臣假托尋興大獄夫天性至情君親大義追尊立廟禮亦宜之然升祔太廟而躋于武宗之上不已過乎若其時紛紜多故將疲于邊賊訌于内而崇尚道教享祀弗經營建繁興府藏告匱百餘年富庶治平之業因以漸替雖剪剔權奸威柄在御要亦中材之主也矣夏四月御經筵徐階等言自古帝王莫不以講學為首務兹山陵事畢祔廟禮成經筵日講正惟其時請特舉行從之五月夏鎮新河成初嘉靖七年河溢阻運總河都御史盛應期請于昭陽湖東别鑿新渠以通漕開濬百四十餘里尅期六月工未成㑹應期罷役中止至四十四年河大決沛縣飛雲橋分為十數股潰入昭陽運道淤塞百餘里督理河漕尚書朱衡循行應期舊亦請開南陽留城上下築堤吕孟湖以防潰決總河都御史潘季馴以為濬舊渠便議與衡不合衡言是河直秦溝有所束隘伏秋黄河盛昭陽受之不為壑也乃決計開濬身自督工重懲不用命者至是河成西去舊河三十里舊河自留城以北經穀亭而至南陽新河亦自留城而北經夏鎮而至南陽與舊河合謂之夏鎮河凡百四十里有竒又引鮎魚諸泉及薛河沙河注之築馬家橋隄遏黄水入秦溝使不東侵運道乃大通方工未成㑹河復決論者紛然謂衡故興難成之役以倖功及工峻羣議乃息未㡬山水驟溢新河決壤漕艘數百給事中吳時来言新河受東兖以南費嶧鄒滕之水以一堤捍羣流豈能不潰宜分之以殺其勢衡乃開支河四洩其水入赤山湖質實夏鎮在徐州府沛縣東北四十里南去留城四十四里昭陽湖在沛縣東北八里有大小二湖相連南屬沛北屬山東滕縣亦名山陽湖南陽鎮名在兖州府魚䑓縣東北留城在沛縣東南五十里故宋地秦置縣漢張良封留候即此地吕孟湖在沛縣東南四十里秦溝在徐州府銅山縣東北鮎魚泉在滕縣凡三十四泉薛河在滕縣源出寳峯山匯諸泉而為淵西經薛山因名薛河沙河有二俱在滕縣在縣北者曰北沙河源出鄒縣嶧山在縣南者曰南沙河即古漷水源出縣之述山下流俱入運河馬家橋在沛縣赤山湖在滕縣西南與㣲山韓莊諸湖相連盛應期字思徵吳江人朱衡字士南萬安人潘季馴字時良烏程人吳時來是時以遺詔復故官髙拱罷初徐階甚親拱引入直及拱驟貴負氣頗忤階世宗居西苑閣臣直廬在苑中拱未有子移家近直廬時竊出一日帝不豫誤傳非常拱遽移直廬器用於其家給事中胡應嘉階鄉人也瞷階方與拱隙遂劾拱不守直廬移器用于外世宗病亟勿省也拱疑應嘉受階指大憾之及帝即位階雖為首輔而拱自以帝舊臣數與之抗郭朴復助之階漸不能堪是時應嘉掌吏科佐部院考察事將竣忽有所論救帝責其牴牾下閣臣議罰朴奮然曰應嘉無人臣禮當編氓階旁睨拱見拱方怒勉從之言路謂拱以私怨逐應嘉交章劾之給事中歐陽一敬劾拱尤力階於拱辯疏擬㫖慰留而不甚譴言者拱益怒相與忿詆閣中御史齊康為拱劾階康坐黜於是言路論拱者無虚日拱不自安乞罷歸質實胡應嘉沐陽人歐陽一敬字司直彭澤人齊康永平人六月霪雨傷稼帝素服修省避殿御皇極門視事秋七月遣使招撫山東河南被灾流民従刑科給事中王之垣請也流民失業者給復五年其糧長稱收火耗夫馬折乾廩給扣送諸弊一切釐革質實王之垣濟南新城人八月帝視國子監朝鮮國貢臣乞留京師觀禮許之是日帝行釋奠禮畢御彛倫堂宣諭祭酒司業及諸生等仍賜衍聖公孔尚賢及三氏子孫并祭酒司業等宴于禮部九月諳逹冦山西時邱富已死趙全在虜益用事尊諳逹為帝治宫殿期日上棟忽大風棟墜傷數人諳逹懼不敢居全乃為諳逹言大同兵弱亭障稀可以逞因屢入犯山西至是復率衆數萬分道入井坪朔州偏頭闗老營諸處邊將不能禦遂長驅破石州殺知州王亮采大掠孝義介休平遥文水交城太谷隰州間男女死者數萬而三衛勾土黙特同時入冦薊鎮昌黎撫寧樂亭盧龍皆被蹂躪遊騎至灤河京師震動三日乃引去諸將追之敵出義院口㑹大霧迷失道墮崖中人馬枕藉死者甚衆質實井坪在朔平府平魯縣南朔州西北明成化中建置守禦千户所老營堡名在寧武府偏闗縣東亦成化中建孝義後魏置永安縣唐改曰孝義明屬汾州府文水漢大陵縣隋改日文水明屬太原府交城隋置縣明屬太原府太谷漢陽邑縣隋改曰太谷明屬太原府今皆因之樂亭唐石城縣金大定末置樂亭縣明屬灤州今屬永平府義院口在撫寧縣東北有闗郭朴罷初言官劾髙拱者多及朴拱歸朴亦求去帝固留之御史龎尚鵬凌儒等攻不止遂乞歸朴輔政凡二年至是以尚鵬等攻之三疏乞歸家居二十餘年卒贈太傅謚文簡質實龎尚鵬字可南南海人凌儒泰州人總兵官李世忠與土黙特戰于撫寧京師戒嚴先是土黙特冦薊鎮命總督劉燾總兵李世忠等率兵禦之至是世忠引兵東援永平與敵遇於撫寧縣南斬首五十級時諳逹兵尚留石州間出精騎抄掠交汾等處山西騒動總督王之誥請増兵赴援詔發宣府遊兵及保定廵撫曹亨河南廵撫劉應節延綏總兵趙岢各引兵分道救石州之誥馬芳仍留本鎮東防京師戒嚴詔五城御史詰察非常漕糧集河下者令巡倉御史督䕶入城敕羣臣條議京城防守事宜自是月乙亥至十月丙戌㓂始退京師觧嚴冬十月以王崇古總督三邊時濟農據河套為西郵諸部長别部併圖駐牧大小松山南擾河湟畨族環四鎮皆㓂乃擢崇古兵部侍郎兼右僉都御史總督陜西延寧甘肅軍務崇古奏給四鎮旗牌撫臣得用軍法督戰又指畫地圖分授諸大將趙岢雷龍等數有功崇古在陜七年先後獲首功甚多質實大松山在凉州府平畨縣東北接蘭州界小松山在其北為邊郵要地併圖舊作賔土今改戊辰二年春正月杖給事中石星于廷黜為民吏科給事中石星言天下之治不日進則日退人君之心不日強則日偷臣竊見陛下入春以來為鼇山之樂縦長夜之飲極聲色之娛朝講乆廢章奏遏抑一二内臣威福自恣肆無忌憚天下將不可救矣用是條上六事一曰飬聖躬二曰講聖學三曰勤視朝四曰速俞允五曰廣聼納六曰察讒譖疏入上怒以為惡言訕上命廷杖六十黜為民時中官滕祥者以造作竒巧得幸㑹監杖星大詬之詳怒予重杖星絶而復甦其妻鄭誤聞星已死遽觸柱死聞者哀之質實石星字拱辰東明人二月命廷臣舉邊才户部尚書馬森等給事中王治御史王友賢等各奏薦邊才現任大理寺卿鄒應龍等四十五人聼用僉都御史王輪等十八人凡六十三人吏部上其議因言五方之氣雖篤於因材百中之能難拘於器使如徃者輔臣楊一清以南人用之陜西尚書王驥以北人用之雲南俱有聲績宜勿論南北資格斟酌推用務俾各當其才帝然之帝耕耤田以禮部言増上中下三等農夫各十人于耆老之後如𢎞治中例三月立子翊鈞為皇太子帝之第三子即神宗也時方六嵗是日詔赦天下京師地震永平府樂亭縣遼東寧逺衛遵化順義等縣及山東登州府同日地震寧逺城崩禮部尚書髙儀等請令百官修省夏五月以都督同知戚繼光鎮薊州繼光與俞大猷均稱名將而繼光屢摧大㓂平浙閩倭又平江西賊名更出大猷上給事中吳時來以薊門多警請召大猷繼光專訓邉卒部議獨用繼光乃命以都督同知總理薊州昌平保定三鎮練兵事總兵官以下悉受節制尋以薊州既有總兵官又設總理事權不一乃召還總兵官郭琥而以繼光為總兵官鎮守薊州永平山海諸處自嘉靖以來邉墻雖修墩臺未建繼光巡行塞上議建敵臺畧言薊鎮邉垣延袤二千里一瑕則百堅皆瑕比來嵗修嵗圮徒費無益請跨牆為臺睥睨四逹臺髙五丈虚中為三層臺宿百人鎧伏糗糧具備令戍卒畫地受工先建千二百座然邊卒木彊律以軍法將不堪請募浙人為一軍用倡勇敢督撫上其議計之浙兵三千至陳郊外天大雨自朝至日昃植立不動邊軍大駭自是始知軍令至五年秋臺功成精堅雄壯二千里聲勢聨接繼光乃議立車營每車一輛用四人推輓戰則結方陣而馬歩軍處其中又製拒馬器排列㓂騎衝突㓂至火器先發稍近則歩軍持拒馬器以遏而前間以長鎗筤筅㓂奔則騎軍逐北又置輜重營隨其後而以南兵為選鋒入衛兵主䇿應本鎮兵専戍守節制精明器械犀利薊門軍容遂為諸邉冠質實筤筅兵器名一作狼筅筅蘇典切筅帚也戚繼光武藝篇狼筅用大毛竹上截連旁附枝節枒杈粗二尺長一丈六尺利刄在頂長一尺用為行伍籓籬秋七月徐階罷帝即位以來階所持諍多宫禁事伸者十八九中官多側目㑹階乞休而給事中張齊以私怨劾階階因請歸帝意亦漸移許之賜馳驛舉朝疏留報聞至萬厯初階年八十卒時帝欲命中官分督團營階力陳不可而止羣小璫毆御史于午門左都御史王庭將糾之階曰不得主名劾何益且慮彼先誣我乃使人以好語誘大璫先録其主名庭疏上乃分别逮治有差質實張齊以私怨劾階齊長安人前奉命犒軍宣大納鹽商金因疏請恤邊商革餘鹽為階所格至是因上疏攻階已而左都御史王庭遂發張齊受賂事下齊鎮撫司獄王庭字子正南充人冬十月振淮徐饑江南北皆亢旱淮徐間洪水泛溢以都御史龎尚鵬言煑粥以食饑民又留起解之金以備緩急又以災免鳳陽淮安揚州徐州滁州秋糧子粒有差仍准存留啇税備振遼王憲㸅有罪廢為庶人國除憲㸅在嘉靖時以奉道被寵賜真人號至是巡按御史郜光劾其滛虐僭擬諸罪狀遣侍郎洪朝選等往勘得實削爵為庶人禁錮髙牆國除初張居正家荆州與憲㸅有隙及朝選往勘諷令坐以謀反朝選不從居正怒屬巡撫勞堪羅織朝選死獄中質實明洪武中遼簡王植始封於遼東永樂中改封荆州簡王子貴燰嗣六傳至憲㸅莊王致格子也郜光山西長治人洪朝選字舜臣同安人勞堪江西徳化人十一月宣府總兵官馬芳襲諳逹于長水海子又敗之鞍子山先是或為錫林阿謀以五萬騎犯蔚州誘芳出而以五萬騎襲宣府城可得志芳豫伐木環城冦至不可上遂觧去頃之率叅將劉譚等出獨石塞外二百里襲其帳于長水海子還至塞追者及鞍子山芳迎戰又大敗之芳有膽智諳敵情所至先士卒一嵗數出師搗巢或躬督戰或遣禆將家畜健兒得其死力甞命三十人出塞四百里多所斬獲㓂大震芳乃帥師至大松林頓舊興和衛登髙四望耀兵而還質實長水海子一曰白海子在開平衛西南即察罕諾爾鞍子山亦曰馬鞍山在獨石口東北十二月限勲戚莊田户部議裁勲戚胃濫莊田勲臣傳派五世者限田百頃至七十頃宗支已絶及失爵者奪之奸民影射者徵租入官廵按直𨽻御史劉世曾查奏田頃數目復下部㑹同屯田御史議定應減應留規則以聞詔如擬己巳三年夏四月以海瑞為僉都御史廵撫應天諸府瑞威望素著屬吏聞其至墨者多自免去有勢家朱丹其門恐瑞見即黝之中人監織造者為減輿從瑞鋭意興革請濬吳淞白苑通流入海民賴其利素疾大户兼并力摧豪彊撫窮弱貧民田入於富室者率奪還之下令飈發凌厲所司惴惴奉行富家巨室或竄他郡以避瑞撫吳甫半嵗再為言路所論遂改督南京糧儲民間瑞當去號泣載道家繪像祀之質實嘗熟白苑港吳中諸水由此入江歸海嘉靖間日益淤塞故瑞濬之秋七月振沿河州縣災河決沛縣自考城虞城曹單豐沛抵徐州俱罹其害漂没田廬不可勝數漕舟二千餘皆阻邳州不得進總理河道都御史翁大立以聞户部議請以淮揚啇稅及撫按贓贖備振倉糧振䘏貧民仍敕河道諸臣疏濬支渠従之又發太倉銀三萬兩選差司官徃災重處亟行振濟其餘被災地方仍查災傷分數酌量蠲免詔時大立又請漕艘後至者眝粟徐州倉平價出糶許以三萬石賚民大立以民困之狀帝未能周知乃繪圖十二以獻是時黄河既決淮水復漲湖堤徃徃崩壊人民多溺死大立奔走經營至四年六月疏濬河淮諸工乃次第告成質實單縣古單父邑漢為單父縣明改單縣屬兖州府今因之翁大立餘姚人八月廣東海賊曽一本伏誅一本初與大盗黄平聚衆數萬剽掠恵潮間與倭相猗角已而總兵官俞大猷以次殱倭略盡平為副將湯克寛所敗逺竄去一本降而復叛突犯雷州執叅將繆印又犯廣州殺知縣劉師顔尋復䧟碣石衛禆將周雲翔叅將耿宗先叛附于賊勢益熾時大猷已改鎮廣西詔止勿赴今與廣東福建總兵官李錫郭成同討一本錫出海與大猷遇擊賊三戰皆㨗㑹成亦敗賊執周雲翔率叅將王詔等以師來㑹分三哨進一本駕大舟力戰諸將連破之燬其舟詔生擒一本及其妻斬首七百餘死水火者萬計時廣閩隨在皆盗而一本最彊既平患漸息質實碣石衛在恵州府海豐縣東南明洪武中置今裁湯克寛邳州衛人李錫歙人郭成四川叙南衛人以禮部尚書趙貞吉兼文淵閣大學士預機務貞吉在嘉靖時由謫籍屢擢户部侍郎罷歸帝即位復起禮部帝幸太學㑹祭酒胡杰論罷貞吉以禮部侍郎攝事講大禹謨稱㫖命充日講官貞吉年逾六十而議論侃直進止有儀帝深注意及是遂以尚書叅機務貞吉入謝奏言朝綱邊務一切廢弛臣欲捐軀任事惟陛下主之帝益大喜振南畿浙江山東災南畿浙江山東皆被水災户科給事中劉繼文請發帑遣官分振并發臨徳二倉粟米振濟禮科給事中黄才敏亦請發徳州倉見積米二萬石以振饑民户部議従之質實劉繼文靈壁人黄才敏晉江人九月大閱帝戎服登壇分别將領及侯伯錦衣衛官中射等第賞罰有差百官稱賀冬十一月京師地震地震有聲詔百官修省三日時山西亦震十二月命厰衛刺部院事帝以災異頻仍由部院政事不平所致令厰衛宻訪以聞于是尚書毛愷侍郎萬士和等皆自劾求去帝慰留給事中舒化等上言祖宗設厰衛令捕盗詰奸非以察百官也制馭百官乃天子之權而奏核諸司責在臺諫今陛下委之厰衛厰衛必托之畨校此輩貧殘恐開羅織之門不可不慎帝不従已而事竟寢質實毛愷字逹和江山人萬士和字思節宜興人舒化字汝徳臨川人發明嘉靖時弊政極多而於宦官獨無所假借數十年中稍為歛戢何以穆宗繼體復欲用厰衛刺事耶部院政事不平詎無考核整飭之道乃以稽察之權寄之一二内豎豈部院不足信而厰衛轉足信乎厰衛之所恃者畨校耳此輩皆無賴之徒稍假之顔色委以事權則必倚勢作威甚且譸張為幻厰衛一經偏聼則將曲為左袒撫拾遷就以証其捕風捉影之為英憲覆轍非遥顧復蹈之哉召髙拱復入閣兼掌吏部拱性彊直自遂頗快恩怨及再入閣盡反徐階所為凡先朝得罪諸臣以遺詔錄用贈恤者一切報罷且言明倫大典頒示已乆今褒顯議禮諸臣將使獻皇在廟之靈何以為享先帝在天之靈何以為心而陛下嵗時入廟何以對越二聖帝深然之法司坐方士王金等子殺父律拱復言人君不得正終名至不羙今謂先帝為王金所害誣以不得正終天下後世視先帝為何如主乞下法司改議帝復然其言命减戍拱之再出専與階修隙所論皆欲以中階重其罪賴帝仁柔弗之竟也階子弟頗横鄉里拱以前知府蔡國熙為監司錄其諸子皆編戍盡奪其田所以扼階者無不至逮拱去位乃得觧拱練習政體負經濟才其在吏部欲遍識人才授諸司以籍使署賢否誌爵里姓氏月要而嵗㑹之倉卒舉用皆得其人又以時方憂邊事請置兵部侍郎以儲總督之選由侍郎兵而總督由總督而本兵中外更畨以裕邊材又以者専門之學當自兵部司屬始宜慎選司屬多得智謀才力曉暢軍旅者乆而任之勿遷他曹又奏請科貢與進士並用不循資格拱所經畫多類此杖尚寳司丞鄭履淳下獄履淳上言頃年以來萬民失業四方多故天鳴地震災害洊臻正陛下宵旰憂勤時也今最急莫如用賢陛下御極三年矣曽召問一大臣面質一講官賞納一諫士以共畫思患豫防之䇿乎髙亢暌孤乾坤否隔忠言重折檻之罰儒臣虚納牖之巧宫闈違脫珥之規朝陛拂同舟之義回奏䝉譴補牘奚従内批徑出封還何自紀綱因循風俗玩愒功罪罔核文案徒繁閽寺潛為厲階善士漸以短氣言渉宫府肆撓多端梗在私門堅持不破萬衆惶惶皆謂羣小侮常明良疏隔自開闢以來未有若是而永安者伏願奮英斷以决大計勿為小故之所淆宏濬哲以任君子勿為嬖昵之所惑移羙色竒珍之玩而保瘡痍分昭陽細務之勤而和庶政㧞用陸樹聲石星之流嘉納殷士儋翁大立諸疏經史講筵日親無倦臣民章奏與所司靣相可否萬㡬之裁理漸熟人才之邪正自知察變謹微回天開㤗計無踰此疏入帝大怒杖之百繫刑部獄數月刑科給事中舒化等以為言乃釋為民履淳父曉通經術明習故典為都御史禦倭有功遷刑部尚書與嚴嵩不合罷歸卒嵩敗履淳訟于朝帝即位曉賜謚贈官至神宗初履淳復起光祿少卿尋卒質實鄭履淳字叔初海鹽人陸樹聲字興吉松江華亭人殷士儋字正甫厯城人庚午四年春正月己巳朔日有食之以正旦日食罷元㑹帝避殿减膳是月月復食總事中陳吾徳疏言嵗首日月並食天之災大陛下宜屏斥一切玩好應天以實報聞質實陳吾徳字懋修歸善人罷京營總督分設三大將領之趙貞吉言舊制内外衛兵分𨽻五府永樂末年因聚府兵北伐旋師之後遂結營團操乃以三千神機二營附之因號為三大營其實皆五府之兵也夫五府之兵因調發而聚之為營既歸即當散還各府矣所以乆聚團操而不散者以當時常有戒嚴征伐之事故不暇耳然猶以五軍名營實未變五府之舊制也沿至正統末年變為十團營矣𢎞治間又加為十二團營矣正徳間又増置東西官㕔矣然舊營之中尚存老甲軍之籍則五營之號未泯而五府之意猶存也至嘉靖庚戌嚴嵩建議于五府之外特設戎政府括内外兵籍鑄總督戎政之印而授之仇鸞于是祖制大壊而賊臣得肆覬覦之心向使鸞遲于伏誅則時事之危未可測也鸞誅而以鎮逺侯顧寰代之寰惟知退讓自守以保勲名而營制則日弱矣臣竊謂分府設將之制未易卒復而分營統兵之法猶可遵行盖將才難得以一人統十萬之衆非韓白不能以十萬衆分委之數人則稱職易耳請將見操官軍分為左右中前後五營各擇一將以分統之責令訓練而以文臣廵覈之加賞罰焉收戎政府印歸之内府有事則領勅掛印而命將于閫外事完則繳勅納印而歸將于營中如是則太阿之柄獨持于上而輦轂之下常有數萬精兵可戰可守隨所用而無不宜矣疏入詔下廷臣議尚書霍冀與貞吉不恊不然其言廷臣亦多言彊兵在擇將不在變法冀等乃上議三大營宜如故惟以一人為總督權太重宜三營各設一大將而罷總督以文臣為總理報可于是三大營各設總兵一副將二其叅佐等官互有増損各均為十人而五軍營兵均配其營以侯伯充總兵官尋改提督又用三文臣亦稱提督自設文武六提督後各持意見過事旬月不决給事中温純言其弊乃罷仍設總理協理二臣貞吉不能爭質實温純字景文三原人夏四月京師地震秋七月禁章奏浮詞髙拱言比宋章奏鋪綴連牘言多意晦端緒難尋反可竄匿事情支調假飾是非人臣奏對之體請嚴加禁約従之發明臣下入告之體貴乎覈切情事而不以繁稱博引為工明代奏牘徃徃陳義引古反覆不窮而其實于事情所繫者不過數言而已拱奏請禁止浮詞是矣然其後終明之世奏章仍多摭拾陳言者盖明人章疏多挾名求勝之心至于自炫鬻而牽引不休竟有累牘連篇皆不切之陳言者政體士風之壊由來非一日矣陳以勤罷初以勤入閣徐階為首輔而髙拱方嚮用朝士各有所附交相攻以勤中正無所比及拱再入與趙貞吉相軋張居正復中搆之以勤與拱舊僚貞吉其鄉人而居正則所舉士也度不能解引疾乞休去以勤歸六年卒贈太保謚文端八月宣大告警敕邊備時李春芳雖為首輔而政皆自髙拱出邊警猝至拱請命侍郎曹邦輔王遴督師列陳以待以都御史栗永祿守昌平䕶陵寢起劉燾于天津守通州儲命總督王崇古譚綸主進剿機宜戴才理糧餉邉境得無事質實曹邦輔于帝即位初起謫籍屢進兵部侍郎王遴字繼津覇州人罷户部尚書劉體乾時内供寖多數下户部取太倉銀又趣市珍珠黄緑玉諸物先是御史詹仰庇諫市珠寳言寳石珠璣多藏中貴家何必求之於外已而仰庇廵視十庫疏請嚴覈内官監出納嵗數并節省一切無益浮費疏中有再照人主句内官摘出激帝怒以為大不敬杖之百斥為民并罷科道之廵視庫藏者給事中陳吾徳李己復上疏言比買玉市珠傳帖數下人情惶惑内官崔敏等獻謟營私罪不可宥乞即斥譴以清左右帝震怒杖一百錮刑部獄斥吾徳為民已乆之始得釋至是體乾復屢疏爭之積忤帝意遂罷質實劉體乾字子元東安人詹仰庇字汝欽安溪人陳吾徳字懋修歸善人李己字子復磁州人九月振陜西災以陜西大水命州縣發倉廩振濟并蠲税有差免臨鞏二府各州縣正官朝覲河決邳州初新河既成南北諸支河悉併流秦溝河勢益大漲三年七月決沛縣漕艘不得進至是復決邳州自睢寜白浪淺至宿遷小河口淤百八十里漕道復阻河道侍郎翁大立言邇來河患不在豐沛而在徐邳臣以為權宜之計在棄故道而就新衝經乆之䇿在開泇河以避洪水帝命大立躬自相度條利害以聞已而大立以誤漕削籍復以朱衡經理河道遂罷泇河議専事徐邳築長堤自徐州至宿遷小河口三百七十里并繕豐沛大黄隄正河安流運道乃通質實白浪淺在睢寕縣北黄河南岸小河口在宿遷縣東南睢水至此合于黄河謂之貽口亦曰睢清口泇河有東西二泇東泇出沂州府西北箕山西泇出嶧縣東北抱犢山東南流至三合村與東泇合又南入泗謂之泇口以李成梁為遼東總兵官錫林阿入遼東總兵王治道戰死擢成梁暑都督僉事代之時諳逹諸部屢窺塞下十年之間大將死者數人成梁乃大修戎備甄㧞將校收召健兒給以厚餼用為選鋒軍聲始振質實李成梁字汝契世鐡嶺衛指揮僉事冬十月諳逹孫巴噶柰濟内附詔授指揮使尋遣歸已噶柰濟者諳逹第三子替克貝台吉子也幼孤育于諳逹妻伊克哈屯所既長娶必濟不相得復自聘鄂爾多斯女號三娘子即諳逹外孫女也諳逹見其美奪之巴噶柰濟恚率屬十餘人來歸大同廵撫方違時告總督王崇古曰機不可失也率五百騎徃受之崇古上言巴噶柰濟來歸非擁衆内附者比宜給官爵豐館餼飾輿馬以示諳逹諳逹急則令縳送板升諸叛人不聼即脅誅巴噶柰濟牽沮之又不然因而撫納如漢置屬國居烏桓故事使招其故部徙近塞諳逹老且死鴻台吉立令巴噶柰濟還以衆與台吉抗拒我按兵助之此安邊之良䇿也奏至朝議紛然髙拱張居正力主崇古議詔授巴噶柰濟指揮使諳逹方西掠土畨聞之急引還約諸部入㓂崇古檄諸道嚴兵禦之敵不得利伊克哈屯思其孫日夜哭諳逹患之使來請命逢時遣譯者鮑崇徳徃令縳送板升諸叛人以易巴噶柰濟崇徳入其營諳逹勝氣待之崇徳曰朝廷待而孫甚厚今稱兵是速之死也諳逹疑巴噶柰濟已死聞言心動使使詗之崇古令巴噶柰濟緋袍金帶見使者諳逹喜過望崇徳因說之曰趙全等旦至巴噶柰濟夕歸諳逹因屏人語曰我不為亂亂由全等天子若封我為王長北方諸部孰敢為患即死吾孫當襲封彼衣食中國忍背徳乎遂遣使致書逢時而全方慫惥用兵諳逹又惑之全嘗投書逢時欲歸中國逢時以示諳逹始有執全意錫林阿奄至大同逢時以巴噶柰濟箭示之錫林阿執箭泣曰此吾弟替克貝台吉故物也我來求巴噶柰濟巴噶柰濟既受官當更計之㑹諳逹召錫林阿還錫林阿引去諳逹遂遣使與崇徳來乞封請互市隨執趙全等九人來獻詔磔于市崇古亦以帝命遣巴噶柰濟歸質實方逢時字行之嘉魚人王崇古于是年正月改督山西宣大巴噶柰濟舊作把漢那吉替克貝台吉舊作鐡背台吉伊克哈屯舊作一克哈屯必濟舊作比吉鄂爾多斯舊作襖兒都司鴻台吉舊作黄台吉今並改十一月趙貞吉罷高拱掌吏部貞吉亦掌都察院拱以私憾考察科道欲去貞吉所厚者貞吉亦持拱所厚以解于是斥者二十七人而拱所惡者咸與拱猶以為憾嗾門生給事中韓楫劾貞吉庸横貞吉疏辯言臣掌風憲目賭拱壊亂選法噤口不能一言有負任使真庸臣也若拱者斯可謂横也已臣放歸之後幸仍還拱内閣毋令乆専吏部權廣樹衆黨疏入帝竟允貞吉去而拱掌吏部如故貞吉好剛使氣動與物忤人多怨之歸十餘年卒贈少保謚文肅以禮部尚書殷士儋兼文淵閣大學士預機務士儋本裕邸舊僚髙拱惡其不親已不為援士儋遂藉太監陳洪力取中㫖入閣辛未五年春二月命廷臣及朝覲官謁皇太子于文華左門李春芳言先朝故事東宫未出閣時閣臣以朔望次日行謁見禮即今春和乞舉行如例以慰天下臣民之心帝許之命二月二日謁見封皇子翊鏐為潞王帝第四子也後之藩衛輝三月封諳逹為順義王巴噶柰濟既歸諳逹及其妻撫之泣遣使報謝誓不犯大同王崇古上言朝廷許諳逹封貢諸邊有數年之安可乘時修備設敵背盟吾以數年蓄養之力從事戰守愈於終嵗奔命自救不暇者矣復條封貢八事以請詔下廷臣議議各不同㑹帝御經筵閣臣靣請外示覊縻内修守備乃封諳逹順義王名所居城曰歸化昆都楞錫林阿等皆授都督同知等官有差封巴噶柰濟昭勇將軍指揮如故已而套部濟農亦如約請命詔授官如昆都楞由是西塞諸部嵗來貢市自宣大至甘肅邊郵晏然不用兵革者二十餘載質實毘都楞即婁巴噶諳逹弟也王崇古條上八事一議錫封號一定貢額一議貢期一議立互市一議撫賞之費一議懸招賞之例一審經權一戒狡飾經權者謂各鎮練兵設險積餉之務仍宜預圖狡飾者謂防敵人隂懐異志也䟽入兵部議以崇古八議刋示廷臣㑹議已而兵部集府部科道諸臣廷議之或以為封貢便互市不便或謂俟一二年不犯邊徐議封爵或謂互市宜請令今嵗暫一開市以觀事機帝因令兵部更議於是兵部議言請如崇古議授諳逹王號餘各授職銜今嵗貢期已過二月聼於三四月後一行從之昆都楞舊作昆都力婁巴噶舊作老巴都今並改夏五月李春芳罷初春芳代徐階為首輔務以安靜稱帝意同列陳以勤故端謹張居正恃才凌物視春芳蔑如也方階罷春芳歎曰徐公尚爾我安能乆容旦夕乞身耳居正遽曰如此庶保令名春芳愕然三疏乞休不允既而趙貞吉入代以勤剛而負氣及髙拱再入直凌春芳出其上春芳不能與爭自飭而已㑹拱逐貞吉勢益張修階故怨春芳常從容為階觧拱益不悦言官希拱意疏詆春芳乃罷歸六月京師地震辛邜朔地震者三詔百官修省三日發明天道變於上人事應於下古者君臣側修以禳天災此理之可信者若祥桑枯熒惑退史傳之所載不過欲後之人遇災而懼設誠而致行之意耳夫禨祲之故既昭著於上天下地乃欲責報于刻期揆之於理已為難信將欲虚詞文飾則天豈可欺將謂有感必通何其效之神速若此且百官果以三日修省而效則三日之外其戯渝懈怠所以召灾而致異者更不知當何如矣亦何異一暴而十寒耶冬十月河南山東水以河南山東大水命工部飭管河官經理上流河防以備衝決十一月殷士儋罷御史趙應龍劾士儋進由内侍不堪大任給事中韓楫復揚言脅之質實趙應龍涇陽人壬申六年春閏三月帝有疾帝御皇極門疾作遽還宫夏四月以禮部尚書髙儀兼文淵閣大學士預機務初儀掌禮部秉禮循法居職甚稱為言路所劾遂引疾歸已用髙拱薦以故官侍東宫講讀掌詹事府及是遂入閣五月帝崩帝疾稍平將視朝登陛怱眩㡬仆亟召髙拱張居正至帝執拱手欵語備至居正在旁帝弗顧也帝令拱扶掖還宫尋命宿乾清門拱與居正同止焉未㡬帝大漸召拱居正及髙儀同受顧命遂崩六月乙邜朔日有食之太子翊鈞即位是為神宗以明年為萬厯元年詔赦天下詔祀建文朝盡節諸臣于鄉有苖裔者䘏録詔褒建文朝忠臣建表忠祠于南京以徐輝祖為首方孝孺次之罷中極殿大學士髙拱始拱與張居正友善既而内離猜防日甚太監馮保次當掌司禮監拱薦陳洪及孟沖保以是怨拱而居正與保深相結穆宗疾再作居正處分十餘事使小吏投保拱知而跡之吏已入拱恚甚面詰居正曰宻封謂何天下事不以屬我曹而屬之内豎何也居正面發赤乾笑而已穆宗崩保矯遺詔與閣臣同受顧命及帝登極保升立御座旁不下舉朝大駭保遂掌司禮監又督東厰總兼内外勢益張拱以主上幼沖懲中官専政疏請詘司禮權又屬言官合疏攻保而已從中擬㫖逐之使人報居正居正陽諾之而私以語保保訴于太后謂拱擅權不可容太后頷之明日召廷臣入宣兩宫及帝詔拱意必逐保也急趨入比宣詔則數拱罪而逐之拱伏地不能起居正掖之出拱急僦騾車出宣武門居正乃與髙儀請留拱弗許請得乗傳許之拱既去居正遂為首輔質實馮保深州人發明髙拱之負氣凌人固有取斥之道即其他事亦多猜忌若此之裁抑馮保面詰居正則不可謂出於不正乃居正始則與保相結至為宻封處事及拱欲逐保以告居正猶為直道而居正即以語保轉與相謀逐拱此其立心之曖昧用術之巧詐致拱墮其計中而不覺而且為之請留為之請乘傳欲以委過于保以掩飾一時之耳目此豈端人正士所為者而不知其隂謀委折肺肝早已如見也居正當國其幹濟非無可稱然其得為首輔實由於結保而逐拱及其禍發身後亦因保事牽連得固於斯失亦于斯能不憬然悟耶髙儀卒儀性簡靜寡嗜好入閣兩月卒貧無以殮謚文端以禮部尚書吕調陽兼文淵閣大學士預機務髙儀既卒張居正以調陽弱薦代之居正専決調陽不敢有所持諍然内不甚附之質實吕調陽字和卿廣西臨桂人秋七月尊皇后為仁聖皇太后貴妃李氏為慈聖皇太后舊制天子立尊皇后為皇太后若有生母稱太后者則加徽號以别之是時馮保欲媚帝生母李貴妃風張居正以並尊居正不能違也慈聖移居乾清宫撫視帝内任保而大柄悉以委居正焉質實李氏漷縣人帝生母帝御文華殿講讀張居正請定三六九日視朝餘日御文華殿講讀九月葬穆宗莊皇帝于昭陵謚曰契天隆道淵懿寛仁顯文光武純徳𢎞孝肅皇帝質實昭陵在昌平州大峪山東北明史贊曰穆宗在位六載端拱寡營躬行儉約尚食嵗省巨萬許俺答封貢減賦息民邊郵寧謚繼體守文可稱令主矣苐柄臣相軋門户漸開而帝未能振肅乾綱矯除積習盖亦寛恕有餘而剛眀不足者與冬十月彗星見東北方至二年四月乃滅十二月振榆林延綏饑御定資治通鑑綱目三編巻二十五
