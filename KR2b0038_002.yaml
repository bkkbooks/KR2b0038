body:
  text: 御定通鑑綱目三編原序編年之書奚啻數十百家而必以朱子通鑑綱目為凖通鑑綱目蓋祖述春秋之義雖取裁於司馬氏之書而明天統正人心昭監戒者幾微得春秋大居正之意雖司馬氏有不能窺其藩籬者其他蓋不必指數矣嘗謂讀書立言之士論世為難非如朱子具格致誠正之功明治亂興衰之故其於筆削鮮有不任豫奪之私失褒貶之公者自綱目成而義指正大條理精密後儒有所依據踵而續之由宋迄元釐然方策至明代君臣事迹編輯之難更倍于諸書蓋明史已成於百年之後而世變風漓記載失實若復遲待將何以繼續編而示來許爰亟命儒臣法朱子通鑑綱目義例增損編摩大書以提要分注以備言每一卷成呈覽朕於幾暇亦時御丹鉛為之參定雖於天人一貫之精微未之能盡而惟是謹嚴之義守而弗失簡正之旨志而必勉書既成羣臣舉唐太宗之事為言勉從其請而為之序云乾隆十一年夏四月朔御製
