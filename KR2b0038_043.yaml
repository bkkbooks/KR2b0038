body:
  text: 起庚辰明莊烈崇禎十三年盡壬午明莊烈崇禎十五年凡三年庚辰十三年春二月官軍大敗張獻忠于太平時李自成潛伏陜右賀一龍賀錦等跳梁漢東勢差緩羅汝才雖敗楊世恩羅安邦兵聞官軍大集懼討與其黨整十萬黑雲祥混世王武自彊小秦王白貴關索王承恩遣使乞撫楊嗣昌欲專勦獻忠佯許之獻忠屢敗于興安其黨托天王常國安金翅鵬劉希原來降即令國安隨左良玉進勦良玉大合諸軍擊賊于枸平關獻宗敗走良玉請從漢陽西鄉入蜀追之嗣昌謀以陜督鄭崇儉率賀人龍李國竒從西鄉入蜀而令良玉駐興安平利别遣偏將追勦良玉不從嗣昌檄良玉曰賊勢必不能入川仍當走死秦界耳將軍從漢陽西鄉入蜀萬一賊從舊路疾趨平利仍入竹房將何以禦否則走寧昌入歸巫與羅汝才合我以大將尾追促賊反楚非莫也良玉報曰蜀地肥衍賊渡險任其奔軼後難制且賊入川則有糧可因返鄖則無地可掠其不復竄楚境明矣夫兵合則強分則弱今已留劉國能李萬慶守鄖若再分三千人入蜀即駐興平兵力已薄賊來能遏之乎今當出其不意疾攻之一大創自然瓦解縱折回房竹間人跡斷絶彼從何得食况鄖兵扼之于前秦撫在紫興扼之于右勢必不得逞若寧昌歸巫險且逺汝才獻忠不相下倘窮而歸汝才必內相吞其亡立見良王已于二月朔入蜀界矣嗣昌得報不能奪比玉良駐漁溪渡崇儉旋引兵來㑹獻忠營太平縣之大竹河方移軍九滚坪見瑪瑙山峻險據之良玉抵山下賊已踞山巔乘髙鼓噪良玉下馬周覽者久之曰吾知所以破賊矣分所進道為三已當其二秦兵當其一令曰聞鼓聲而上兩軍夾擊賊陳堅不可動鏖戰久之賊大潰墜崖澗者無算俘馘渠十六人斬首千三百餘級獻忠妻妾皆被穫湖廣將張應元汪之鳯追之數十里復敗之獻忠收餘衆南走扼于川將張令方國安又大敗令時年七十餘馬上用五石弩中必洞胸軍中號神弩將獻忠轉入深箐入險結營壘令分其軍為五鼓勇薄賊而國安自他道逸去令獨深入被圍居絶坂屢射賊應弦斃者甚衆水逺士渴賴天雨以濟圍終不解襄陽監軍僉事張克儉言于崇儉曰張令健將奈何棄之急令人龍應元之鳯分道往援應元等先至令方與賊鬬呼聲動容應元等應之內外夾擊賊敗去人龍亦至復與國竒等逐獻忠連奏捷先後斬首千五百級敗渠順天王一條龍一隻龍皆降當是時獻忠竄走興歸山中秦楚師俱集諸將協心窮搜千餘殘冦可盡殱而崇儉以年衰乞骸骨詔令還關中留人龍國竒偕良玉討賊良玉等連營百里憚山險圍而不攻獻忠因得與山民市鹽芻米酪收潰散以自保質實竹房謂竹山房縣寧昌謂大寧大昌歸巫謂歸州巫山並注見前枸平關亦曰東南關在興安州西南四百里漁溪渡在西鄉縣東南三百六十里接四川界大竹河亦曰大竹渡在太平縣北八十里九滚坪瑪瑙山並在太平縣北張克儉字禹型屯留人三月大風霾帝布服齊居禱之不正給事中左懋第言去秋星變朝停刑而夕即滅今者不然豈陛下有其文未修其實乎臣伏忍練餉之加原非得已乃明㫖减兵以省餉天下共知之而徴餉者猶未省請自今因兵微餉預使天下知應加之數官吏無所逞其奸以信陛下之明詔而審决刑獄則以睿慮之疑信定諸因之生死凡疑于心與疑信者冝悉從輕典豈停刑可止彗解網不可以返風乎且陛下屢沛大恩四方死者猶枕藉盜賊未見衰止何也由蠲停者止一二存留之逋賦有司迫考成催徴未敢緩是以莫救于凶荒請于極荒州縣下詔速停有司息訟専以敕荒為務帝曰然于是上災七十五州縣新舊練三餉並停中災六十八州縣止徴練餉下災二十八州縣俟秋成督徴質實左懋第字蘿石萊陽人夏四月逮江西巡撫解學龍及黃道周下獄尋遣戍道周既貶江西按察司照磨學龍薦所部官推奬道周偹至故事但下所司帝不覆閲大學士魏照乘者惡道周擬旨責學龍濫薦帝遂發怒立削二人籍逮之下刑部獄責以黨邪亂政並廷杖八十究黨與欲置死詞連編修黃文煥吏部主事陳大定工部司務董飬河中書舍人文震亨並繫獄監生凃仲吉上書訟救之通政使施邦曜不為封進而大署其副封曰書不必上論不可不存仲吉劾邦曜以副封上帝見其署語怒下仲吉獄而奪邦曜官尚書李覺斯以學龍道周無大罪豫輕比嚴㫖切責冉擬謫戍烟瘴帝猶以為失出除覺斯名移獄鎮撫掠治者四乃復還刑部逾年尚書劉澤深等言二人罪至永戍止矣過此則論死論死非封疆則貪酷未有以建言者道周無封疆貪酷之罪而有建言蒙戮之名于道周得矣非我聖主覆載之量也夫陛一下所疑者黨耳黨者見諸謂行事道周抗疏祗託空言二知交相從罷斥鳥睹所黨而煩朝廷大法乎且陛下豈有積恨于道周萬一聖意轉圜而臣已定論悔之何及仍以原擬請乃謫戍廣西質實解學龍字正帆揚州興化人黃文煥永福人陳大定龍溪人董飬河閩縣人文震亨吳縣人涂仲吉漳浦人施邦曜字爾韜餘姚人劉澤深扶溝人以謝升為禮部尚書陳演為禮部左侍郎並兼東閣大學士預機務升以十二年秋冉召為吏部尚書甫半載改禮部與演同入閣演庸才寡學工結納初入館即與內侍通帝簡命閣臣每親發䇿觀所條對覘能否中官探得帝所欲問數事密授演條對獨稱㫖遂自禮部右侍郎轉左擢居政府五月石砫女土司秦良玉敗羅汝才于䕫州初羅汝才惠登相求撫未决遂自南漳逺安走大寧大昌官軍扼于巫山復轉犯夔州良玉馳救賊解去合官軍邀擊連敗之斬千餘級奪汝才大纛擒其渠東山虎副塌天等汝才走大寧督師楊嗣昌本楚人意欲甌賊入蜀使楚地無賊乃創議以楚地廣衍賊難制蜀險阻賊不得逞蹙之可全勝又慮蜀重兵扼險賊將毒楚調蜀精鋭為己用蜀中卒自是益罷弱不足支巡撫邵節春憤曰令甲失一城巡撫坐令以蜀委賊是督師殺我也爭之不能得于是賊皆窺蜀捷春駐重慶部下兵二萬皆嬴弱不可用所倚惟良玉張令二軍遂檄良玉令退保重慶良玉每對人嘆息曰邵公不知兵吾一婦人受國恩誼應死獨恨與邵公同死耳督師以蜀為壑無愚智知之邵公不以此時爭山奪隘令賊無敢即我而坐以設防移我與令自近去所駐重慶僅數十里殊失地利賊據歸巫巔俯瞰我營鐵騎建瓴下張令營當其衝必先破令破及我我敗尚能救重慶急乎聞者深然之發明楊嗣昌督師勦賊當張獻忠羅汝才屢衄之時不思遏其奔軼大㑹諸軍而殄滅之而反驅之入蜀夫蜀號稱天險賊入則險且為賊據烏在其能逐賊乎論者為嗣昌楚人欲紓楚患而因以蜀為壑其設心尚可問乎秦良玉一溪崓婦人顧能感激恩義提兵裹糧﨑嶇轉鬬使邵捷春果從其爭山奪隘之計巫峽夔門重關足恃何竟昧于地利坐以設防遂使賊騎建翎下而莫之能制嗣昌之罪固不客誅若捷春者亦愧于婦人多矣姚明恭罷明恭出趙興邦之門公論素不豫柄用後鄉人詣闕訟之明恭不自安請告歸遂罷六月蔡國用卒國用入閣三載碌碌無所見是月庚午卒于官遣行人陳際泰護其喪歸質實陳際泰字大士臨川人與同邑章世純羅萬藻東鄉艾南英以時文名天下其為文敏甚一日可二三十首先後所作至萬首經生舉業之富無若際泰者崇禎七年成進士年六十八矣又三年除行人至是護國用喪南行卒于道薛國觀以罪免國觀柄致一踵體仁所為導帝以深刻而才智彌不及操守亦弗如帝始頗信嚮之嘗燕見國觀語及朝士貪婪國觀對曰使厰衛得人安敢如是東厰太監王德化方侍側汗流沾背于是專察其隂私而國觀匿史􅒇金事乃發史􅒇者為御史無行善結納中官巡按淮揚嘗攝巡鹽事先後乾沒贓罰銀及鹽課三十餘萬既擢少卿家居而侵盜迹頗露檢討楊士聰劾之得㫖令􅒇自陳遂訐士聰誣已請敕淮揚監督中官楊顯名核奏尋給事中張焜芳復劾􅒇侵盜事實又嘗勒富人于承祖萬金事發後遣家人齎重資謀于揚州黠吏睢承吾改竄舊籍帝乃怒褫􅒇職急攜數萬金入都至國觀邸求解出疏攻焜芳謂已嘗劾劉鴻訓錢龍錫其遺黨日謀報遂相搆陷又言焜芳弟炳芳官內閣中書向來詔㫖漏泄皆炳芳為之閣臣多徇􅒇擬嚴㫖帝不聽止奪焜芳官候訊及顯名核奏上力為􅒇解而不能諱者六萬金􅒇下獄㑹有兵事獄久不結瘦死􅒇所攜資盡入國觀槖為􅒇家人所首告事大著國觀請借助言在外羣僚臣等任之在內戚畹非獨斷不可因以武清侯李國瑞為言國瑞者孝定太后兄孫帝曽祖母家也國瑞薄庶兄國臣國臣憤詭言父資四十萬臣當得其半今請助國為軍資帝始未允因國觀言欲盡借所言四十萬者不應則勒期嚴追或教國瑞匿資勿獻折毁居第陳什器通衢鬻之示無所有嘉定伯周奎與有連代為請帝怒奪國瑞爵國瑞悸死有司追不已戚畹皆自危因皇五子病交通宦官宫妾詭云孝定太后已為九蓮菩薩降神言帝簿外家諸皇子盡當夭俄皇五子卒帝大怒急封國瑞七歲兒存善為侯盡還所納金而追恨國觀待隙而發國觀素惡行人吳昌時及考選昌時虞國觀抑已因其門人以求見國觀僞與交歡擬第一當得吏科逮命下乃得禮部主事昌時大恨以為賣己與所善東厰理刑吳道正謀發丁憂侍郎葵奕琛行賄國觀事帝聞之益疑至是督師楊嗣昌有所陳奏帝令擬諭國觀乃擬㫖以進帝遂大怒下五府九卿科道議奏頗從輕議帝度科道必言之獨給事中袁愷㑹議不署名且疏論吏部尚書傳永淳徇私庇國觀而微詆國觀藐肆妒嫉帝不懌扺疏于地曰成何紏疏遂奪國觀職放之歸怒猶未已國觀出都重車纍纍偵事者復以聞而東厰所遣伺國觀邸者值中書舍人王陛彥至執之陛彥夙與國觀交通為奸利一鞫盡得其狀詞所連及甚衆永淳奕琛皆與焉命下陛彥詔獄窮治愷再疏盡發國觀納賄諸事國觀連疏力辨詆愷受昌時指使帝不納至十月陛彥獄未成帝以行賄有據即命棄市而遣使逮國觀國觀遷延久不赴明年七月入都令待命外邸不以屬吏國觀自揣必不死八月初八日夕監刑者至門猶鼾睡及聞詔使皆緋衣蹶然曰吾死矣倉皇覔小帽不得取蒼頭帽覆之宣詔畢頓首不能出聲但言吳昌時殺我乃就縊質實楊士聰濟寧人張焜芳會稽人李國瑞漷縣人周奎蘇州人莊烈帝周皇后父也吳昌時吳江人蔡奕琛德清人傳永淳靈夀人袁愷聊城人王陛彥上海人昌時甥也秋七月總兵官孫應元等大破羅汝才于興山汝才走巫山與張獻忠合先是汝才在大寧前阻江為蜀將劉等所扼不得渡而獻忠既敗于瑪瑙山竄走興歸山中左良玉追且及獻忠遣其黨馬元利操重寶啖良玉曰公所部多殺掠楊閣部猜且専無獻忠即公滅不久矣良玉心動縱之去乃潛走白羊山由汝才入寧昌故道折而西與汝才合獻忠雖纍敗氣益盛立馬江岸有不前者轍斬之賊殊死鬬貴等戰皆却賊畢渡屯萬頃山歸巫大震督師楊嗣昌乃上夷陵而檄蜀撫郡捷春扼夔門蜀大寧大昌界楚竹溪房縣有三十二隘口嗣昌欲厚集兵力專守夔棄寧昌噉賊捷春曰棄隘口不守是延賊入户也乃遣楊茂選覃思岱等出關分守二將不相得思岱譖殺茂選捷春令兼統其衆其衆相率去之降賊入隘守者潰賊夜斬夔關將士皆驚走新寧大竹旋陷而汝才及惠登相越巴霧河攻開縣為參將賀人龍等所破登相竄開縣西汝才乃與小秦王混世王東奔人龍李國竒追之汝才等遁還興山應元與副將王允成王之綸監軍僉事孔貞㑹擊之豐邑坪大破之斬首二千三百生擒五百有奇㑹嗣昌下招降令小秦王混世王皆降時稱荆楚第一功惟汝才率其衆逸去仍與獻忠合于是二賊渠復萃蜀中質實白羊山在興山縣西八十里萬頃山在達州太平縣東萬頃池之西南接大寧界夔圍在夔州府城南大竹唐分宕渠縣東界置宋景祐三年廢入流江縣紹興二年復置元至元中移治鄰山縣明屬廣安州以𨽻于順慶府今徑屬順慶府巴霧河在開縣西豐邑坪在興山縣西北九月李自成走鄖均遂入河南初自成潛伏關中聞張獻忠反穀城大喜將大集其衆以應獻忠陜督鄭崇儉團之令曰圍師必缺自成乃乘間走往依獻忠獻忠欲殺之為羅汝才所解與自成嬴五十焉五十婦人十令去自成謝曰以身相依足矣安用是也旋遁去收殘衆稍稍自保時督師楊嗣昌駐夷陵檄令降自成出謾語官軍圍之魚復山中自成大困欲自裁以養子雙喜勸而止賊將多出降劉宗敏者藍田煆工也最驍勇亦欲降自成知之興步入叢祠顧而嘆曰人言我當成大事盍卜之神不吉若斷我頭以降宗敏諾三卜三吉宗敏還殺其兩妻謂自成曰吾死從若矣賊黨散去者聞之亦多殺妻子歸自成自成乃盡焚輜重輕騎由鄖均走河南河南大旱斛穀萬錢饑民從自成者數萬遂自南陽出攻宜陽殺知縣唐啓泰轉犯永寧知縣武大烈興里居四川巡撫張論協力捍禦論末子吏部郎中鼎延及從父治中讚繼之有獄囚勾賊入都司馬有義棄城走大烈鼎延等固守三日賊夜半登城執大烈自成以同鄉欲活之大烈不屈索印不與乃燔灼以死鼎延匿眢井免讚及子國學祚延死之主簿魏死國輔教論任維清守備王正已百户孫世英並不屈萬安王采􅀈亦被害賊移攻偃師一日而陷知縣徐日泰大罵不屈為賊臠割死諸生張育粹武同芳劉芳名劉芳世藺之粹喬于昆藺完馪王光顯喬國屏王邦紀藺相裔張一鷺張一鵬牛一元皆抗節死既又陷寶豐知縣朱由緘死之陷密縣知縣朱育汀及里居太朴鄉魏持衡舉人馬體健死之敏汀妾張氏及一女一孫臧獲數人俱殉焉自成性猜忍日殺人斫足剖心為戲所過民皆保塢堡不下杞縣人李信者故尚書李精白子也信以父麗名逆案思湔其醜嘗出粟千石活饑民饑民德之稱李公子㑹繩妓紅娘子反虜信去强委身焉信乘間逃歸首于官官囚之紅娘子來救饑民之德信者同時起曰李公子活我今有急乃其劫獄殺知縣反挾信歸自成因改其名曰巖而盧氏牛金星者亦舉人也以磨勘被斥介醫生尚網見自成喜其辨與謀議帳中潛歸自泄坐斬已得末減仍往奔自成遂薦所善卜者宋獻策長三尺上䜟記曰十八子主神器自成大悅巖因說曰取天下以人心為本請勿殺人收天下心自成從之屠戮稍減散所掠財物餉饑民民受餉者不辨巖自成雜呼曰李公子活我巖復造謠詞曰迎闖王不納糧使兒童歌之以相煽動民方被勦餉練餉之害從自成者日衆矣質實魚復漢縣故城在奉節縣東北因山為城周回七里一百四十步東高二百丈西北高一千丈南基連白帝山蓋公孫述所造以城倚赤岬山亦謂之赤岬城唐啓秦掖縣人武大烈臨潼人任維清絳縣人采􅀈伊王支屬襲封萬安郡王居永寧徐日泰金溪人朱由緘益府鎮國將軍常徹子敏汀亦明宗室張育粹二子佐知縣徐日泰固守城陷大罵俱被殺妻藺氏與三女二孫赴井死武同芳見賊殺母噴血大罵支解死劉芳名妻張氏藺完馪妻張氏王邦紀妻髙氏並從死張一鷺之父亦罵賊死本朝乾隆四十一年追諡武大烈忠烈徐日泰朱由緘朱敏汀烈愍唐啓泰張讚王正已魏持持節愍魏國輔任維淸孫世英馬體健等並皆入祠張獻忠犯大昌總兵官張令死之遂陷四川諸州縣賊渠混天王等既就撫惠登相王光恩及整十萬亦相繼降督師楊嗣昌以湖廣賊且盡而獻忠在四川勢漸熾遂以八月帥師而西時監軍評事萬元吉先入蜀令蜀將守巴巫諸隘秦將賀人龍李國竒楚將張應元汪之鳯張奏凱專任追擊及應元軍擊賊于夔州據土地嶺而營人龍逗留不㑹師獻忠偵應元部卒多新募悉衆乘攻應元之鳯力戰應元突圍出之鳯敗走山中道渴飲斗水卧血凝臆死獻忠勢益張聞督師將自東至與汝才急趨觀音巖守將邵仲光不能禦遂陷大昌張令急扼之竹菌坪賊大至令力戰中流矢死令為蜀中名將既敗殁諸軍皆奪氣秦良玉與令相犄角趨敕不及轉鬬復敗所部三萬人略盡軍騎見蜀撫邵捷春曰事急矣盡發吾溪峒卒可得二萬我自廩其半半餼之官猶足辦賊捷春以倉無見糧謝其計不用良玉嘆息歸而捷春聞賊且至通江率兵守梁山賊以梁山河深不能渡自開縣西走達州捷春退保縣州扼涪江賊疾走陷劍州趨保寧將由間道入漢中秦將趙光逺賀人龍扼之陽平百丈關賊不得過復突巴州應元諸軍邀擊之梓潼戰小利既而衄蜀將曹志耀等力戰却之降將張一州張載福陷陳死涪江師遂潰賊方綿州成都告警捷春已為嗣昌所劾就逺去抵重慶賊方攻羅江不克走綿州轉掠至漢州去中江百里守將方國安避之去賊縱掠什邡縣竹安縣殺仁夀知縣劉三策蹂躙德陽金堂間所至空城而遁全蜀大震賊循水道以犯簡州資陽嗣昌由順慶至果州徵諸將合擊皆退縮徵左良玉兵使者九往返不至遂陷榮昌永川尋陷瀘州分巡川南副使黃諫卿知州蘇瓊衛指揮王萬春鄉官韓洪鼎被執皆不屈死自成再入川諸將無一邀擊者嗣昌雖屢檄令不行其在重慶也下今赦汝才罪降則授官惟獻忠不赦擒斬者賚萬金爵侯翌日自堂皇至庖湢遍題斬督師獻者賚白金三錢嗣昌駴愕疑左右皆賊勒三日進兵㑹雨雪道斷復戒期三檄人龍亦不至初嗣昌惡良玉驕亢私許人龍代為平賊將軍既而良玉有瑪瑙山之奏捷嗣昌難之顧為賀將軍需後命人龍愠以情告良玉良玉亦愠于是兩人俱跋扈不肯盡力嗣昌雖有才然好自用躬親簿書過于繁碎軍行必自裁進止千里待報坐失機㑹鄖撫王鰲永諫之不納乃上長書于朝曰嗣昌用師經年蕩平未奏此非謀慮之不正由操心之太苦天下事總挈大綱則易獨周萬目則難况賊情瞬息更變今舉數千里征伐機宜盡出嗣昌一人文牒往返動踰旬月號令與事機相左無怪乎撓敗之屢聞也一年以來所矜為竒捷者惟瑪瑙一役若株守督師節制左良玉當退保興安無此捷矣然良玉不用命而反奏竒功則諸將必且有積輕督師之心所繫于軍政甚大臣以為嗣昌之馭諸將不必人人授以機宜但覆其機宜之當否執要以御繁决竒以制勝何至久延嵗月老師縻餉哉帝令中樞申飭嗣昌亦不能從也質實土地嶺在巫山縣大昌故城西大昌之上中下馬渡水淺地平以觀音巖為第一隘竹菌坪在巫山縣北涪江在綿州東自龍安府彰明縣流入又東南入潼川府界亦謂之內水羅江本漢涪縣晉置萬安縣唐改羅江明屬綿州以𨽻于成都府仍本朝順治十六年併入德陽縣雍正五年復置尋省什邡漢縣明屬漢州以𨽻于成都府今徑屬成都府仁夀西魏祈武陽縣西城戍地置普寧縣隋改仁夀明屬成都府本朝雍正五年升資縣為州以縣屬之德陽唐置明屬漢州以𨽻于成都府本朝改屬綿州雍正五年升綿州為直𨽻州縣仍屬焉簡州漢牛䩵縣西魏改陽安隋于縣置簡州元省陽安入州明洪武六年降縣正德八年復升州屬成都府今因之資陽漢資中縣後周改資陽元省入簡州明成化二年復置屬簡州以𨽻于成都府璧本朝初徑屬成都府雍正五年改屬資州永川唐析山縣地置元省入大足縣明洪武初復置屬重慶府今因之萬元吉字吉人南昌人劉三䇿鄱陽人誓死守城比陷巷戰被執罵賊支解死黃諫卿莆田人蘇瓊石埭人賊攻城悉力守禦城陷正衣冠向闕拜泣坐堂上賊至被害闔署多殉節瓊死既久無斂者楊嗣昌軍割其首以充級聞者益切齒嗣昌韓通洪鼎官彰州知州致仕家居父子罵賊死字按四川志有綿州貢生楊可賢者為賊所執其子國柱方糾衆守州城賊因挾可賢誘降可賢臨城呼其子曰汝慎固守毋念我賊殺之其後國柱亦戰死又瀘州生員方旭方伯元曽薦祚皆罵賊不屈死僧晞容者居瀘州之七寶寺賊攻豹子峒晞容率鄉勇殺賊千餘相持久卒戰死本朝乾隆四十一年追諡張令蘇瓊忠烈劉三䇿黃諫卿王萬春烈愍汪之鳯韓洪鼎節愍楊可賢子國柱及方旭方伯元曽薦祚僧晞容並入祠冬十月彗星見十二月秋彗星見參分至星復見熊文燦伏誅先是文燦懼誅猶嘵嘵自辨以𠞰餉六十萬不至為辭帝貶督餉侍郎張伯鯨秩卒置文燦于法議者謂李自成之出車箱峽張獻忠之反穀城皆坐失事機以致亡國而陳竒瑜與文燦主撫縱賊實罪首也然帝雖誅文燦頗不謂撫議誤方楊嗣昌出督師御史張肯堂言從古戡亂之法初起則解散勢成則翦除未有専任撫者今輔臣膺新命而出賊必仍用故技搖尾乞憐而失事諸臣冀掩從前敗局必多方熒惑仍進撫議請特申一令専務勦除有進招撫說者立置重典帝以偏執臆見責之于是嗣昌至軍不數月復下招撫令為輸帖萬紙散賊中諸將益無鬬志遂蹈文燦覆徹云質實張肯堂字載寧松江華亭人十一月南京地震十二月兩畿山東河南山西陜西饑人相食是年帝嘗發帑振京畿山東江北饑免河北三府逋賦又以畿內蝗發帑振被蝗州縣並敕兩畿山東河南山陜所在有司設法振濟招徠流徙撫按躬行州縣定殿最以聞而災荒仍告勦餉之徵如故致饑民皆瀕于死所練兵又不足用山西巡按御史陳純德請恤部民凍餒因極陳抽練之弊言兵抽則人失故居無父母妻子之依田園邱壠之戀思歸則逃逢敵則潰抽餘者既以餉簿而安于無用抽去者又以逺調而不樂為用伍虛而餉仍在不歸主帥則歸偏禪樂其逃而利其餉凡籍以營求遷秩皆是物也精神不以束伍而以侵餉厚餉不以養士而以求官伍虛則無人安望其練餉縻則愈缺安望其充此今日行間大弊也意欲諷帝除練餉蘇民困帝不能用質實陳純德字靜生零陵人增天下關稅崇禎初關稅銀每兩增安錢通崇文門河西務臨清九江滸墅揚州北新淮八關增五萬兩未幾復增二錢惟臨清僅半而崇文門河西務俱如舊户部尚書畢自嚴議增南京宣課司稅額一萬為三萬南京戶部尚書鄭三俊以宣課所收落地稅無幾請稅蕪湖以當增數自嚴遂議稅蕪湖三萬兩而宣課仍增一萬三俊悔疏爭不能已及是以度支日絀增關稅二十萬兩而商民益困矣辛巳十四年春正月官軍敗績于開縣張獻忠復東走先以監軍評事萬元吉大饗將士于保寧以諸軍進止不一言于督師楊嗣昌攫前總兵官猛如虎為正總統張應元副之率軍趨綿州分遣諸將屯要害而元吉自間道走射洪振蓬溪以待賊賊分屯安嶽界偵官軍且至宵遁抵內江如虎簡騎驍追之元吉應元營安嶽城下以扼其歸路及張獻忠既陷瀘州其地三面阻江惟立石站可北走元吉以賊居絶地將遣大兵南搗其營而伏兵玉蟾山蹙賊北竄永川逆而擊之可盡殄永川知縣已先遁城中止丞簿一二人如虎覔嚮道不可得夜宿西關空舍及抵立石賊已先渡南溪返走秦將賀人龍軍隔水不擊賊遂越成都走漢川德陽綿州劔州昭化至廣元又走巴州嗣昌親統舟師下雲陽令諸將陸追賊諸將皆疲敝惟如虎躡其後所將止六百騎餘皆良玉部兵驕悍不可制所過肆焚掠從良玉時多優閒不戰改𨽻如虎馳逐山谷風雪中咸怨望謡曰想殺我左鎮跑殺我猛鎮時人龍兵已大譟西歸所恃止如虎元吉深憂之賊自巴州轉入開縣官軍追之遇諸黃陵城日晡雨作諸將請詰朝戰參將劉士杰者素勇敢善戰獨前奮曰四旬逐賊今始及之舍弗擊我不能也執戈先如虎檄諸軍繼之士杰所當輒摧陷獻忠登高望官軍見無後繼密抽壯騎潛行箐谷中乘高大呼馳下良玉部兵先潰士杰及遊擊郭開如虎子先捷並戰死如虎率親兵力戰部將挾上馬潰圍出旗纛軍符等盡失乃收殘卒往從嗣昌軍方賊之竄南溪也元吉知賊必東犯請從間道出梓潼扼賊歸路嗣昌不聽檄諸軍躡賊疾追不得距賊逺令他逸諸將力盡從瀘州逐賊後塵賊折而東返歸路盡空不可復遏嗣昌倉猝莫知為計頓足曰悔不用萬監軍言而賊已疾捲出夔門抵興山攻當陽犯荆門嗣昌至夷陵檄良玉兵使十九返良玉撤興房兵趨漢中若相避然賊所至燒驛舍殺塘卒東西消息中斷質實射淇漢郪縣及廣漢縣地西魏置射洪縣周改射洪蓬溪唐析方義縣地置唐興尋改蓬溪明並屬潼川州安本朝雍正十二年升潼川為府射淇蓬溪仍屬焉嶽後周置明屬潼川州本朝康熙元年省入遂寧縣十年改入樂至縣雍正七年復置屬潼川州十二年屬潼川府立石站在瀘州治北明置立市驛于此玉蟾山在瀘州治北六十里南溪即澄溪在瀘州南門外源自寶山下入大江雲陽漢朐忍縣後周改安元升雲陽州明洪武七年降縣屬于夔州府今因之黃陵城在開縣東五里當陽漢縣明洪武初屬荆州府嘉靖中改屬荆門州以𨽻于承天府人本朝改承天府為安陸府以縣屬之猛先捷榆林本朝乾隆四十一年追諡先捷及劉士杰郭開烈愍李自成陷河南殺福王常洵初河南大旱蝗人相食民間籍籍謂先帝耗天下以肥王洛陽冨于大內援兵過洛者喧言王府金錢山積而令吾輩枵腹死賊手南京兵部尚書吕維祺方僑居洛陽聞之懼以利害告常洵力勸其散財餉士不從維祺乃盡出私財設局振濟及李自成連陷永寧宜陽參政王䕃昌率衆至洛陽警備總兵王紹禹副將劉見義羅泰各引兵至而賊已抵城下常洵始出千金募勇士出城擊賊賊稍却夜半紹禹親軍從城上呼賊相笑語尋作亂縳䕃昌紹禹馳諭之不聽揮刀殺守堞者燒城樓開北門納賊維祺方分守北城遂被執有識之者曰子非振饑吕尚書乎我能活爾維祺不應乃反接之去常洵絶城出匿迎恩寺賊跡而執之遇維祺于道維祺呼曰王綱常至重等死耳毋屈膝于賊常洵瞪不語見賊渠于周公廟按維祺項使跪不屈延頸就刃死賊殺常洵勺其血雜鹿肉以食曰福祿酒兩承奉伏常洵尸哭賊捽之去承奉呼曰王死某不願生乞一棺收王骨虀粉無所恨矣賊義而許之桐棺一寸載以斷車兩人即其旁自縊死䕃昌及知府亢孟檜鄉官劉芳奕常克念郭顯星韓金聲王明揚萃舉人來秉衡荀良翰皆抗節死通判白守文墮城死諸生黃調鼎負世子由嵩以逃王妃鄒氏亦得脫俱走懷慶賊發王邸金振濟民火其宫三日不絶事聞帝震悼輟朝三日令河南有司改殯福王賜諡曰恭逮紹禹至京磔之賊乘勝圍開封巡撫李仙風方在河北巡撫御史高名衡集衆登陴周王恭枵發庫金百萬兩募死士殺賊蒸米屑執㸑以餉軍凡七晝夜仙風馳逐開封副將陳永福背城而戰斬首二千遊擊高謙夾擊復斬首七百賊去屑密縣時保定總督楊文嶽遣總兵虎大威副將張德昌先率五千人救開封比渡河圍已解乃㑹仙風于偃師以兵少未敢擊賊待文嶽軍至與賊戰鳴臯鎮大破之賊東走尋攻南陽劇賊百餘人冒雨薄城知府顔日愈擊殺之幾盡餘賊乃退城獲全日愈手中一矢頭項被二刃死城上賊既不得志去遂縱掠旁近州縣㑹羅汝才不合于張獻忠走內鄉淅川與自成合擁其衆犯鄧州文嶽率大威擊之戰三捷斬首七百餘級馘其渠二人賊遁去質實迎恩寺在河南府城西周公廟在河南府城西關鳴臯鎮在嵩縣東北六十里吕維祺殉節時年五十有五贈太子少保祭葬廕子如制維祺家子新安在河南府西七十里十六年新安陷家亦破弟樂平知縣維祮字泰孺解職家居亦抗節死贈接察僉事王䕃昌吳橋人亢孟檜臨汾人劉芳奕慷慨負智略為昌樂知縣解官歸歲大歉人相食傾橐濟之賊漸逼河南集為千城社佐有司保障及城陷縊死西城戍樓當此常克念為平陽推官有政聲郭顯星官翰林待詔韓金聲官邯戰知縣王明官行人楊萃官辰州知府來秉衡荀良翰皆未仕秉衡為賊將劉宗敏所執令易服欲官之不可羈南郊民舍顧見其友謂之曰賊勒我以官我義不受辱恨母老子幼死不暝目爾賊聞燒鐵索加其頸終不從遂被殺并其母劉氏妾吳氏及幼子俱殺之黃調鼎字鹽梅由嵩元妃黃氏其姊也調鼎護由嵩匿安國寺夜半乘間奪門出賊追之倉皇伏民家豖牢中偵賊遇乃出由嵩體肥碩不能行調鼎負之北走抵苖家溝賊追且及調鼎方力憊不及忽聞馬嘶聲趨視之則由嵩素所乘也遂扶掖上馬疾趨渡河以免李仙風高陵人周王恭枵定王橚十世孫楊文嶽字斗望南充人顔日愈字華陽上虞人烈本朝乾隆四十一年追諡吕維祺忠敬顔日愈忠王䕃昌亢孟檜劉芳奕常克念韓金聲王明楊萃吕維祮白守文節愍郭顯星來秉衡並入祠發明常洵當危亡急遽之際金錢山積尚不從散財餉士之言坐令援兵怨詈城陷身亡其愚昧固不足責惟是明代分封遍天下始未嘗不欲多建宗支屏藩王室及乎擾攘之時初不聞有捍禦一方為國效臂指之助徒使盜賊臨城慘遭屠戮一時諸王不惟不能裨于國且致不能庇其身封建之不足恃非其彰明大著者哉至福王分藩神宗耗天下之力以恣其請方謂帶礪山河長享冨厚而豈知益以結怨人民為盜賊所藉口愛之適以害之其流毒至于此極耶二月張獻忠陷襄陽殺襄王翊銘楊嗣昌以襄陽為軍府貯餉金甲器各數十萬仞深溝方洫而三環之造飛梁設橫枑陳利兵而饑訶出入必以符驗然是時河南北大饑流民就食襄漢者日數萬又所招降諸賊既得免死牌莫肯散自擇便地連營數百里監軍僉事張克斂深憂之上書嗣昌曰襄陽自古要區今管鑰獻陵視昔尤重近兩河饑民雲集及新舊降丁逼處其間一夫呌呼即足致亂忠嗣昌恃城壕之固不以為意報曰監軍何怯耶及獻出川鄖撫袁繼威統所部邀擊獻忠不得逞乃留羅汝才綴鄖兵自率輕騎一日夜馳三百里殺督師使者于道取軍符夜叩襄陽城門克儉不能辨賊二十八騎遂入夜半從中起焚襄王府居民皇見火以為滿城皆賊奪門出城潰克儉倉皇奔救為賊所執大罵死推官鄺曰廣攝縣事李大覺遊擊黎民安死焉初獻忠敗于瑪瑙山其妻妾敖氏高氏被獲他將搜山又獲其軍師潘獨鰲皆繫襄陽獄知府王承曽年少而佻每夕托問賊中情形與二氏相笑語獄吏又多納賊金禁防盡弛獨鰲脫桎梏恣飲嗣昌移牒戒之承曽笑曰賊豈能飛至耶至是賊爭毁狴户挈二氏與獨鰲出承曽秉夜走遲明賊大至索知府不得執襄王翊銘于南城樓屬巵酒曰吾欲借王頭使嗣昌以陷藩伏法王其努力盡此酒遂與貴陽王常法同遇害火城樓焚其尸賊去僅拾顱骨數寸妃妾輩死者四十三人福清王常澄進賢王常淦走免事聞帝震悼命所司備襄王喪禮諡曰忠賊既陷襄陽連陷樊城當陽破郟縣殺知縣邵可灼諸生王敬臣佐有司殺賊力竭赴井死子裔昌從之賊復招汝才東下合兵入光州攻商城知縣盛以恆與鄉官楊所修淇允衡馬剛中段增輝乘墉固守適雨雪守者凍餒不能戰以恆督家衆射賊十七人墜馬賊怒并力攻矢中以恆右額猶裹創禦賊賊破北門入家衆巷戰死且盡乃被執罵賊不屈為賊支解其孫覺殉之典史吕維顯教諭曹維政及所修允衡剛中增輝諸生盧紹德黃焯陳廷對陳廷璋鄭光啓劉澤長楊澤長皆死賊遂疾馳犯信陽城陷知縣高孝志訓導李逢旭程所聞里居靜海知縣張映宿布衣張士傑等死之又陷光山典史魏光亦死之于時羅山息縣固始皆殘破賊復分兵犯茶山應城隨州隨嘗被賊居民索然知州徐世淳預知賊必復至集士民誓以死守㑹歲大祲士多就食粥厰嘆曰可使士以綏失禮乎分粟振之潰兵過隨索餉世淳單騎入見軍帥曰軍食不供有司罪也殺我足矣請械我以見督師帥不能奪斂衆去比賊來犯世淳寢食南城醮樓曉夜固守告急于巡撫宋一鶴一鶴遣兵來援為監司承天者邀去守月餘援絶力窮賊急攻南城而潛兵墮北城以入世淳命子肇梁埋印廨後勒馬巷戰矢貫頤耳鼻橫斷墜馬亂刃所死肇梁奔赴且哭且罵賊將殺之呼州人告以埋印所乃死既而賊僞張左良玉幟入泌陽知縣王自昌罵賊死再攻應山不克去攻鄖陽按察使高斗樞遣逰擊王光恩及弟光興分扼之戰頻捷賊不敢犯光恩者均州降渠小秦王也斗樞察其誠招入郡共城守斗樞善謀光恩善戰鄖城危而復全質實郟縣漢置後省北魏復置龍山縣隋改郟城元復為郟縣明屬汝州今因之襄王翊館襄憲王贍善六世孫張克儉長治人是年正月河南陷巡撫李仙風與巡按高名衡互相許廷議逮治仙風擢克儉代之未開命及于南鄺曰廣番禺人妻子女俱遇害死李大覺字覺之金溪人知穀城縣兼署襄陽縣聞變繫印于肘縊死堂上黎民安大覺同縣人城中火起率所部千餘人搏戰矢盡被縳大罵死王承曾憂邑人貴陽王常法蘭陽王翊鎬第三子福清王常澄襄王翊銘第二子進賢王常淦蘭陽王翊鎬第四子邵可灼建德人盛以恆潼關衛人遷開封同知將行商城士民聞賊且至留之守禦遂殉節楊所修故魏忠賢黨也厯左副都御史入逆案贖徒為民至是罵賊死淇允衡官陽和兵備副使分守商城北門力戰死馬剛中字九如除大同知縣行取授檢討乞假歸賊入大罵被磔死段增輝字含素為諸生以學行稱朝廷下保舉令被薦不樂為吏擬除教授未謁選歸遇變罵賊死高孝志江都人張士傑年十八賊欲殺其父求以身代賊殺之而舍其父徐世淳字中明嘉興人南京兵部侍郎必達子妾趙氏王氏及臧獲十八人皆從死王自昌南寧人高斗樞字象先鄞縣人本朝乾隆四十一年追諡馬剛中忠烈張克儉忠節盛以恆鄺曰廣黎民安洪允衡高孝志徐世淳王自昌烈愍邵可灼李大覺張映宿節愍王敬臣王裔昌段增輝吕維顯曹維政盧紹德黃焯陳廷對陳廷璋鄭光啓劉澤長楊士琦李逢旭程所聞張士傑魏光遠並入祠三月楊嗣昌有罪自殺嗣昌在夷陵聞襄陵陷警悸上疏請死至荆州朝于惠王謝不見謁者傳語曰先生惠顧寡人願先之襄陽謂襄陽之破罪在嗣昌也嗣昌慙且恚復聞洛陽已于正月被陷福王遇害益憂懼遂不食以卒時御史張肯堂以嗣昌督師無狀上言流寇隳城破邑往來縱橫如入無人之境此嗣昌受事前所未有目前大計在釋嗣昌之權疏入而嗣昌已死矣河南巡撫袁繼咸巡按高名衡以自裁聞帝甚傷悼之顧以廷臣方交章論列不得已下九鄉議罪侍郎蔣德璟曰嗣昌倡聚斂之議加剿餉練餉致天下民窮財盡胥走為盜又匿失事飾首功宜按仇鸞事追正其罪乃㑹諸大臣上議請坐失陷城寨律斬當戮尸帝傳制曰故輔嗣昌奉命督勦無城守專責以陷城罪督輔非通論且臨戎二載屢奏捷功盡瘁殞身勤勞難泯特命昭雪嗣昌罪賜祭歸其喪于夷陵給事中熊汝霖疏爭之言楊嗣昌不罪盧象升未褒殊挫忠義氣且言為嗣昌畫䇿練餉驅中原萬姓為盜者給事中沈迅也為嗣昌運籌以三千人駐襄陽城破輒走者監紀主事余爵也為嗣昌援引遭襄藩之陷重賂陳新甲嫁禍鄖撫袁繼咸者今解任候代之宋一鶴也皆誤國之臣宜罪不聽帝始終眷嗣昌因憾前陜西總督鄭崇儉勦賊四川甫奉還關中詔即撤兵不與嗣昌犄角平賊逮至立棄市而以丁啓睿為督師啓睿者嗣昌所薦為陜西總督代崇儉者也本庸才不知兵為督撫時奉督師期㑹無功過及督師任重即莫知為計受命出潼關將由承天赴荆州湖廣巡按汪承詔言大寇俱集河南荆襄幸息警無煩大軍盡匿漢津船啓睿至五日不得渡折而向鄧州州人閉門詬過內鄉長吏懼其擾亦不納軍行荒山間割焉嬴燎以野草士啖不飽啓睿聞李自成方圍開封有衆七十萬憚不敢援張獻忠在光山固始間少弱乃謀于諸將曰上命我𠞰豫賊此亦豫賊也遂檄左良玉破之於麻城斬首千三百開封日告急則曰我方有事于獻忠不赴矣質實惠王常潤明神宗第六子天啓七年就藩荆州熊汝霖字雨殷餘姚人沈迅萊陽人余爵禹州人丁啓睿永城人汪承詔寧國人發明李自成張獻忠屢經大敗盜衆散亡而脫身一呼從者即至數萬是流賊之不可滅由于饑民從賊朝夕可以嘯聚而饑民之從賊實由於民窮財盡胥徒為盜耳蔣德璟歸罪于勦餉練餉之議可謂探本之論楊嗣昌懼罪自裁得逃顯戮莊烈即不與仇鸞同論亦何至詔㫖昭雪賜祭以寵榮之耶且謂督師無城守責其說尤不經若陷城失地均非其罪則督師之任竟何事哉鄭崇儉當瑪瑙山之役軍威方振不以此時協力殄賊而遽告年衰欲圖委卸洵不得為無罪然當時既不深斥其乞罷之非翻令帥師歸陜洎乎一年之後失地陷藩相隨屬乃始追憾撤兵移嗣昌之罪以誅崇儉藉以塞言者之口且自文其始終眷許嗣昌之意亦可謂拂人之性也已我大清兵圍錦州大十三年秋我克其城西九臺小凌河西岸二臺乃勒清兵攻錦州兵為兩翼逼城而營城中兵謀龍我鑲藍旗營偵卒以告貝子羅託公吞齊等擊敗之總兵祖大夀益困守不敢出未幾總督洪承疇率總兵曹變蛟左光先馬科吳三桂劉肇基以馬步兵五萬馳援我軍迎擊于大黃土臺及松山杏山承疇大敗遁去科兵新挫衄遣清兵遂還屯義州承疇以變蛟光先入關休飬留三桂肇基兵駐關外請解肇基任代以王廷臣遣光先西歸代以白廣恩部議咸從之承疇又請調旁近邉軍合關內外見卒十五萬人偹戰守且言師行糧從必芻糧足支一歲然後可議益兵帝然之敕所司速措給徵宣府總兵楊國柱大同總兵王朴各揀徑卒赴承疇軍調用及是睿郡王多爾衮肅郡王豪格復率兵圍錦州毁塹填濠聲援斷絶有卒逸出傳大夀語乞援戒援兵毋輕戰結車營以拒承疇乃偕變蛟科廣恩朴通先後出關合三桂廷臣凡八大將兵十三萬馬四萬並駐寧逺仰轉餉未發帝憂之召兵部尚書陳新甲及閣臣問䇿持議兩端莫敢决乃遣職方郎中張若麒就承疇行營計議質實張若麒膠州人夏五月范復粹罷薛國觀既罷復粹代為首輔帝召見廷臣語及福王泣下復粹曰此乃天數帝曰雖氣數亦賴人事挽回復粹不能對尋致仕去六月兩畿山東河南浙江湖廣旱蝗山東盜起兩幾及各直省連歲告炎土賊蜂起給事中詹兆恆言燕齊二千里間寇盜縱橫行旅阻絶四方餉金滯中途者至數百萬請急發京兵𠞰滅楚豫之疆盡青燐白骨新徵舊迶斷無從出乞多方蠲貸帝並采納給事中左懋第督催漕運道中馳疏言臣自靜海扺臨清見人民饑死者三疫死者三為盜者四米石銀二十四兩人死取以食臣自漁臺至南陽流冦殺戮村市為墟其他疾疫死者尸積水涯河為不流振救安可不速臣有事河干一載每進父老問疾苦皆言練餉之害三年來農怨于野商嘆于途如此重𣲖所練何兵其效安在奈何使衆心瓦解一至此極乎又言臣抵宿遷見督漕臣史可法言及所在穀直翔貴河南石米至百五十兩漕儲多逋朝議不收折色需本色今淮鳯間麥大熟如收兩地折色易麥轉輸于漕運大使帝即命議行而是時山東盜李青山方熾運道為梗乃改總河張國維為兵部侍郎兼督淮徐臨通四鎮兵護漕運李青山者本屠猪兒擁衆數萬據梁山濼遣其黨分扼韓莊等八鍤尋舊輔周延儒赴京青山謁之言率衆護漕非亂也延儒許言于朝授以職而青山竟截漕舟大焚掠迫臨清國維統所部兵擊之㑹京營總兵官黃得功副將周遇吉破賊鳯陽旋師遇山東合擊之于夀張追至東平瀐滅幾盡青山遂降獻俘于朝磔諸市質實梁山濼在夀張縣東南梁山下即古大野澤之下流汶水自東北來與濟水會于梁山之東北回合而成濼宋時決河滙入其中其水益大故政和中劇賊宋江結寨于此其後河徙而南濼亦漸淤逮元開㑹通河引汶絶濟明築載村壩遏汶南流歲久填淤遂成乎陸今州境積水諸湖即其餘流也韓莊閘在嶧縣東南運河上自沛縣界之夏鎮閘而南七十里為韓莊閘又二十里為德勝閘又二十里為張莊鍤又八里為萬年閘又十里為丁廟閘又六里為頓閘又二十里為侯遷閘又八里為臺莊鍤此嶧縣境內之八鍤為衛漕要地詹兆恆字月如廣信永豐人秋七月洪承疇援錦州次于松山大我兵圍錦州久環城列炮城中屢出兵皆敗還洪承清疇集八大將之師駐于寧逺未敢進尚書陳新甲請分四道進兵承疇以兵分力弱意主持重帝以為然而新甲堅執前議及職方郎中張若麒至軍素狂躁見諸軍大集謂圍可立解密奏上聞新甲復貽書趣承疇承疇激于新甲言又奉密敕不敢持前議若麒益趣戰承疇乃偕遼東巡撫邱民仰東協總兵曹變蛟等統兵敕錦州是月二十八日壬寅次松山越三日甲辰宣府總兵楊國柱先進大清兵四靣呼降國柱太息語其下曰此吾兄子振昔年殉難處也吾獨為降將軍乎奮勇格鬬中矢卒承疇以山西總兵李輔明代之令與山海關總兵馬科等分營松山東西北三靣變蛟營松山之北乳峰山之西間列七營環以長濠而自率兵據松山城為久拒計睿郡王多爾衮肅郡王豪格以聞太宗文皇帝即之時親統大軍往征太宗患鼻衄因行急衄益甚三日方止諸王貝勒奏請徐行諭曰行軍制勝利在神速朕恐承疇等聞朕親至將潛遁如不逃破之如縱犬逐獸易于拾取何可徐行于是晝夜遄程自也盛京疾馳而進六日抵松山蓋八月二十日壬戌遂陳師于松山杏山之間諭衆曰如承疇兵來犯近則擊之倘尚逺而先往迎戰致纍于衆與敗陳無異變蛟等見我太宗環松山而營大懼欲戰則力不支欲守則餉道已絶謀突圍走翌日癸亥變蛟等八大將率兵犯我前鋒汛我軍擊敗之乘勝追至塔山而還獲其筆架山積粟遂濬濠斷松山杏山路是夜變蛟撤其七營近松山城而營甲子馬科等犯我鑲紅旗汛我軍擊却之既還營科等分兵擊我後太宗復令轉戰張黃等率數人往來指揮科等兵望見皆披靡太宗諭諸將曰今夜科等兵必遁護軍列于右翼汛地右翼命護軍統領鰲拜等率左翼四旗四旗護軍及騎兵前鋒䝉古兵鱗次布列抵于海濱見科等兵遁者百人則以百人追之千人則以千人命䝉古追之如遁者衆多則躡後追擊直抵塔山又睿郡王固山額直庫魯克達爾罕阿海等設伏杏山多爾衮等兵往錦州至塔山大路橫擊之是夜大同總兵王朴先遁科輔明及寧逺總兵吳三桂密雲總兵唐通遼東總兵白廣恩相繼走科等兵大潰我軍壘出邀擊翌日乙丑我太宗命鎮國將軍巴布海等往截塔山路武英郡王阿濟格亦往塔山截擊之倘潰卒欲越塔山即率衆自寧逺命貝子直抵連山追擊寨保固山額真談泰駐師小凌河直博囉扼桑噶爾抵海濱絶其歸路䝉古固山額真伊拜等屯杏山城四面擊敗兵之奔入城者副都統多濟里䝉古固山額真恩格圖等分擊諸路潰卒都察院承政阿什克逹爾等往杏山相視駐營形勢察核俘馘多寡巴布命以次海等既受兵方窮竄為我軍所邀激橫尸遍山野朴進發科等三桂引殘卒奔據杏山變蛟及王廷臣聞敗馳至松山與承疇固守尋太宗移營松山濬濠圍之變蛟乘夜屢突圍不得出遂敗入城太宗知朴三桂必竄竄必由髙橋及桑噶爾塞堡二百五命內大臣錫罕等及四子部落都爾本各率精兵十伏其地朴三桂部卒千人果自杏山遁出遇錫罕等伏兵敗之多所斬獲比還太宗率親軍至髙橋東指示貝勒多托令設伏以待朴三桂敗奔至髙橋伏四起盡殱其衆朴三桂僅以身免是役也承疇所統士卒十三萬先後斬馘五萬三千七百餘人自杏山迤南至塔山赴海死者無算我軍傷止八人餘無挫衄者自是錦州圍益急而松山被圍應援俱絶矣質實乳峰山在錦州東南十六里筆架山有二小筆架山在錦縣西南五十五里峙海中狀如筆架潮退有石如橋廣三尺長里許上有廣元寺大筆架山在錦縣西南五十八里與小筆山山俱峙海中潮退有石如橋廣八丈長四里許桑噶爾塞堡即大興堡也在錦縣西南五十里以桑噶爾塞嘗居此故名髙橋在錦縣西五十里邱民仰字長白渭南人楊國柱死事狀聞贈恤如制國柱二子俱歿妻何氏以所遺甲胄弓矢及戰馬五十匹獻于朝莊烈帝深嘉歎命授一品夫人有司月給米石餼之終身本朝乾隆四十一年追諡國柱烈愍臨清運河涸京師大疫帝命設局給醫藥以遼病者時運道自棗林插溯師家莊頻年患淤淺遭嵗大旱東平平陰肥城諸泉漸塞南望湖淤臨清河遂涸總督侍郎張國維言南旺水本地脊惟藉泰安新泰萊蕪寧陽汶上東平平陰肥城八州縣泉源由汶入運故運河得通今東平平陰肥城淤沙中斷請亟濬之報可質實棗林閘在魚臺縣東北四十里師家莊濟寧州天井閘東南五十四里為魯橋閘師家莊閘在魯橋北八里平陰隋析盧縣地置榆山縣尋改平陰明屬東平州以𨽻于兖州府本朝雍正十三年改屬泰安府新泰三國魏置明屬泰安州本朝雍正十三年升泰安為府縣仍屬焉八月左良玉敗張獻忠于信陽獻忠既克鄖陽不克去拔鄖西羣盜附者萬計遂東肆掠獻忠自瑪瑙山之敗心畏良玉及是屢破郡縣雖小挫于麻城未衄遂有驕色再攻信陽良玉躡及之大戰斬其渠沙甲奪馬萬餘匹降賊數萬獻忠傷股乘夜東奔良玉急追之㑹大雨五晝夜江溢道絶官軍不能追獻忠走免已復出商城將向英山又為副將王允成所破衆散且盡所從止數十萬時羅汝才已先與自成合獻忠遂投自成自成欲以部遇之獻忠不從自成欲殺之汝才曰不如留之使擾漢南分官軍兵力陰與獻忠五百騎曰急東走此非若所當留也因遁去道糾土賊斗穀瓦罐子等勢復盛九月陕西總督傅宗龍潰于新蔡死之先是楊嗣昌死尚書陳新甲薦宗龍才帝未有以應也良久曰朴忠吾以夙負用之宜盡死力遂釋之出獄以兵部右侍郎兼右僉都御史代丁啓睿總督陜西三邊軍務是時啓睿督師討賊方畏避李自成不敢擊聞宗龍為秦督遂乞改敕書令宗龍專𠞰自成宗龍既至陜與陜撫汪喬年議括關中兵餉以出然屬郡旱蝗已不能應宗龍握喬年手欷歔而别以是月四日率川陜兵二萬出關次新蔡與保督楊文嶽㑹賀人龍李國奇將秦兵虎大威將保兵共結浮橋東渡汝合兵趨項城自成羅汝才亦結浮橋于上流將趨汝寧硯兩督兵至盡伏精鋭于林中陽驅諸賊自浮橋西渡人龍使後騎覘賊還報曰賊向汝矣結浮橋將渡矣宗龍文嶽㑹諸將並進中道一騎馳而告曰賊畢渡矣復進一馳騎而告曰賊半渡矣三分渡其二分矣宗龍文兵曰驅之走三十里至孟家莊人龍大威曰馬力乏矣詰朝而戰止兵為營諸軍弛馬甲植戈錞散行壚落求芻牧賊覘之塵起于林中伏甲並出搏官軍人龍有馬千騎不出國奇麾下兵迎擊之不勝秦兵保兵俱潰人龍大威奔沈邱國竒從之三帥師潰宗龍文嶽合兵聚糧屯火燒店賊以步兵攻其營諸軍燃大炮震死賊百餘賊引去宗龍軍西北文嶽軍東南盡塹而守文嶽兵霄潰其部將挾又嶽騎而馳夜駐項城旋又奔陳州宗龍復分秦兵立營于東南諸將分壁當賊壘尋檄人龍國奇還兵救二帥不應宗龍曰彼避死宜不來吾豈避死哉語其麾下曰宗龍老矣今日陷賊中當與諸軍決一死戰不能效他人捲甲走也召禆校李本實穿塹築壘以拒賊賊亦穿濠二重以圍之未幾食盡宗龍殺馬騾以餉軍馬騾盡殺賊取其尸分噉之守八日矢石俱盡宗龍簡士卒夷傷之餘有衆六千夜半潛勒諸軍突賊營殺千餘人潰圍出諸軍星散宗龍徒步率諸軍戰且走未至項城八里賊追及之執宗龍呼于門曰啓門納秦督宗龍大呼曰我秦督也不幸墮賊手左右皆賊耳賊唾宗龍宗龍罵賊曰我大臣也殺則殺耳豈能為賊賺城以緩死哉賊抽刀擊宗龍中其腦而仆斫其耳鼻死城下人龍國奇兵潰歸陜賊遂屠項城分兵屠商水挾溝遂攻葉縣副將劉國能方守葉國能為盜時與自成汝才等約為兄弟及國能歸正自成等深恨之圍其城四面力攻國能不能支城遂陷被執賊猶好謂之曰若我故人也何不降國能瞋目罵曰我初與若為賊今則王臣也何故降賊遂殺之知縣張我翼亦死帝聞項城葉諸縣相繼陷宗龍敗殁嘆曰若宗龍可謂朴忠矣豫諡忠壯贈兵部尚書加太子太保廕子錦衣世百户賜祭葬國能亦贈恤如制而擢喬年兵部右侍郎代宗龍總督部檄踵至趣出關討賊關中精鋭盡殁于項城矣喬年曰兵疲餉乏方張之冦我出如以肉餧虎耳然不可不一出以持中原心乃收散亡調邊卒得馬步三萬人率人龍等出關質實孟家莊在新蔡縣火燒店在項城縣南汪喬年字歲星遂安人張我翼涇陽人能本朝乾隆四十一年追諡劉國烈愍張我翼節愍封子慈炯為王先是帝諭禮臣曰朕第三子慈炯年已十齡敬遵祖制宜加王號但既受冊封必具冕服而㑹典開載年十二十五始行冠禮十齡受封加冠二禮可並行乎于是禮臣歷考典故參稽經傳以奏乃冊封為定王選新進士為檢討國子助教等官為待詔充講讀官以中書舍人充侍書至十二歲行官禮明年三月封第四子慈照為永王又二年流賊陷京師二王皆不知所終質實慈炯周皇后生慈照田貴妃生召周延儒賀逢聖復入閣初延儒里居頗從東林遊善姚希孟羅喻義既陷錢謙益遂讐東林及主會議所取士張溥馬世奇等又皆東林也歸後失勢心內慙而體仁益橫比體仁去後張至發薛國觀相繼當國與楊嗣昌等並以媢嫉稱一時正人若劉宗周鄭三俊黃道周等皆得罪溥等憂之說延儒曰公若再相易前轍可重得賢聲延儒以為然溥友吳昌時為交關近侍逆案中舊輔馮銓復助為謀㑹帝亦頗思舊臣而國觀適敗因與賀逢聖復召入閣溥等要以數事延儒慨然曰吾當鋭意行之以謝諸公既入朝悉反體仁輩弊政首請釋漕糧白糟缺户蠲民間積逋凡遭兵荒諸州縣減見年兩稅蘇松常嘉湖諸府大水許以明年夏麥代漕糧召還言事遷謫諸臣李清等帝皆欣然從其請尊禮之特重明年歲旦朝㑹帝進延儒等而揖之曰朕以天下聽先生然延儒實庸駑無材略且性貪門下客盛順董廷獻因緣為奸利給事中章正宸因言陛下隆禮閣臣願閣臣積誠以格君心毋緣中官毋修恩怨毋以寵利居成功毋以爵祿私親昵語皆風刺延儒不悅質實馬世奇字君常無錫人李清字映碧大學士春芳五世孫冬十月癸卯朔日有食之十一月李自成陷南陽殺唐王聿鏌總兵官猛如虎死之初如虎隨楊嗣昌下荆州詔移駐南陽南陽于二月中嘗被賊為參議艾育初知府顔日愈所却至是自成用宋獻䇿訃欲取南陽以圖關中復率大衆來冦敏初如虎等堅守賊攻入南門㑹總督楊文嶽援軍至賊引退文嶽去賊復攻之如虎憑城戰殺賊數千食盡援絶城乃陷如虎猶短兵大呼衝擊血盈袍袖北面叩頭謝自稱力竭遂遇害唐王聿鏌被殺育初題語城樓自縊死知縣姚運熙主簿門迎恩教諭李獻吉訓導楊氣開亦死之賊遂縱兵覆所屬州縣攻陷鄧州知州劉振世吏目李國璽千户涂承廕李錫鎮平知縣董其碩典史杜日泰南召知縣尚用光內鄉知縣龔新新野知縣韓醇主簿江朝瀛典史惠永貞泌陽知縣姚昌祚主簿熊天倫典史雷晉暹武職王衍范錢繼功海成舞陽知縣潘宏俱死難其諸生死者者有鄧州丁一統張五美王鐘王子章海寬傳彥唐縣許曰琮內鄉許宣及二弟寀宫舞陽諸生陳預抱及二弟豫養豫懷為最著賊乘勝將復窺開封連陷其所屬許州禹州陳留通許尉氏洧川鄢陵臨潁長葛新鄭汜水十餘城于是許州知州王應翼都司張守正舉人魏完真諸生李光閭李文鵬王應鵬陳留典史邵大濟訓導楊道升鄉官劉文耀通許知縣費曽謀尉氏知縣楊一鵬洧川知縣柴薦禋鄢陵知劉振之典史杜邦舉臨潁千總賈蔭序長葛教諭歐陽植典史杜復春舉人𨽻千緒諸生張範孔新鄭知縣劉孔輝汜水舉人張治載馬德茂等亦死難禹州故有徽王府嘉靖時王載埨冇罪爵絶其支屬延津郡王等皆在禹僉事李乘雲分駐馬乘雲誓死捍賊賊多斃于炮俄以十萬衆攀堞登執乘雲使跽乘雲怒叱賊賊梓而杖之大罵不絶聲縳諸樹攢射之罵不已斷其舌亂刃交下而死延津郡王等同被害而商水至是再陷前後知縣王化行姚文衡鄉官張質皆死之巡撫高名衡總兵陳永福駐兵開封不能救開封周邸圖書文物之盛甲他藩士大夫殷富蓄積充牣自成必欲得而甘心焉乃大集其衆再圍開封名衡等力拒之永福射自成中目炮殪其渠數人一自成益怒自成每攻城不用古梯衝法専取翎甋得甎即歸營卧後者必斬取甎已即穿穴穴成初僕容一人漸至百十人次第傳土以出過三五步留一土柱擊以巨絙穿畢萬人曵絙一呼而柱折城崩矣名衡于城上鑿橫道聽其下有聲用毒穢灌之多死賊乃即城壞處用火攻法實藥甕中火燃藥發當者輒糜碎名曰放迸攻久之城半圮賊用放迸法以攻鐵騎數千馳譟伺城頽即擁入城城故宋汴都金南遷時所重築也厚數丈土堅火外擊賊騎多殱自成駭而去當是時自成蹂躙河南張獻忠自四川突湖廣尋亦擾河南窮竄而之江北江北賊賀一龍左金王等據英霍二山暑入秋出以為常河南北土賊李際遇袁時中陜西土賊竇開逺等亦復大熾所在官民被害者甚衆其可紀者應天則援剿副將戴國柱參將張寶山古道行英山知縣高在崙潛山知縣李孕嘉典史沈所安徐州鄉官滕九萇沛縣布衣張鳯世霍山布衣宋貞及吳時道張大翼胡懷信時際順河南則汝州知州錢祚徵指揮錢繼美吏目朱任卿百户梁翰成諸生王暘布衣朱續川魯山舉人袁象斗陳州指揮孫紹武登封知縣鄙廷誨靈寶知縣朱挺指揮許佳允伊陽訓導任中蛟陜西則淳化諸生葛竹溪環縣諸生曹天心四川則巴州同知張連曜德陽知縣龔之安墊江知縣荆偉成都鄉官周敏中等湖廣則隨州判官余塙興山典史張逹益陽貢生潘若洙弟若鴻諸生溫昆來鍾鳴謙等並先後殉節而總兵賀人龍子大明擊賊靈寶山中石阡推官余士泰上計次襄陽亦皆死于賊質實鎮平漢安衆縣後廢為穰縣北鄉元置鎮平縣明屬南陽府今因之新野漢縣唐省入穰縣元復置明屬鄧州以𨽻于南陽府今徑屬南陽府洧川金析尉氏縣置明屬開封府今因之長葛隋析長社縣置明屬許州以𨽻于開封府今升許州為直𨽻州縣仍屬焉墊江西魏析臨江縣地置明屬忠州以𨽻于重處府今升忠州為直𨽻州縣仍屬焉益陽漢縣元升州明洪武初復為縣屬長沙府石阡蠻地元置石阡長官司明永樂十一年置石阡府隸貴州省今皆因之聿鏌唐王聿鍵弟艾育初來脂人門迎恩遼州人李獻吉寶豐人楊氣開虞城人劉振世豐潤人李國璽豐縣人鍾其碩成縣人尚用光平慶州人龔新南昌人韓醇四川人江懷瀛歙縣人惠永貞朝邑人姚昌祚臨晉人前令王自昌為賊所害昌祚代之城再陷手斬數賊力不支死子在紳兄子在鈞同殉節熊天倫順天人被執不屈全家死雷晉暹與知縣姚昌祚同戰死潘宏字若稚淮安山陽人賊將攻舞陽宏諭士民共守諸生慮賊屠城請委曲紓禍宏叱之去賊薄城發炮擊之多斃有小校善射屢却賊諸生潛遣人約降賊復至宏作告先聖文自誓諸生潛開門縳宏以獻賊索印宏不豫且脅降怒罵不屈乃支解之子澄潤痛憤大哭赴井死許曰琮早喪父母歿廬墓三年城破遁居南山賊徴之不出脅以死鐫其背曰誓不從賊遂嘔血而死許宣及二弟寀宫慷慨好義賊陷鄧州宣兄弟約里中壯士直入其城擒僞官家于內鄉之野結許家寨以禦賊賊怒攻破之寀從母常氏先投井死宣宫皆詈賊被殺宫妻鍾氏寀妻陳氏並自經其妹亦罵賊被殺時稱許氏七烈陳豫抱母段氏早寡撫豫抱及其弟豫養豫懷皆為請生力田好學善承母志賊陷舞陽母先赴井三子從之豫抱妻黃氏攜其子默通豫養妻馬氏攜默恆默言俱從之三世九人同一井死王應翼京山人子國同死節邵大濟陜西人楊道升安陽人劉文耀由寶豐訓導擢鞏縣教諭未仕以事赴開封道于陳留遂還家遇賊罵不屈死子福頴從之費曽謀鉛山人少師宏裔孫知通許甫四旬賊猝至抱印投井死楊一鵬河津人知尉氏數月政聲四起城破罵賊死柴薦禋江山人劉振之字而强慈溪人有奸人素通賊倡言鄢陵城小宜速降振之怒遂叱退之典史杜拜舉曰城存與存亡與亡人臣大義公言是振之乃與集吏民共守賊大至城陷振之秉笏坐堂上賊索印不與縛置雪中三日夜罵不絶口亂刃交下乃死杜邦舉富平人士民守者或遁走邦舉捕得斬以徇及城陷自成欲降之邦舉罵曰朝廷臣子豈為賊用賊抉其舌含血噴之遂遇害歐陽植襄城人劉孔暉邵陽人載埨徽莊王見沛曽孫嘉靖三十五年有民耿安者奏載埨奪其女下所司按治獄成降為庶人錮髙牆載埨自縊死延津郡王徽恭王原爝第九子載塤嘉靖三十三年始封至常餐為賊所害李乘雲髙陽人王化行河西人姚文衡鍾祥人戴國柱慈溪人率兵援淮徐與賊戰于徐州力不支死張寶山四川人守桐城戰輒有功擊賊于魯珙山陷伏死古道行江都人擊袁時中于于睢寧之雙溝沒于陳髙在崙成都人賊襲英山冒矢石殺賊賊來益衆被執不屈死李孕嘉沈邱人滕九萇官順天京衛經厯家居遇寇死錢祚徴掖縣人朱任卿徽州人孫紹武陳州衛人奉檄守沈邱與子璉俱死鄢廷誨永福人任中蛟洛陽人張連曜建德人龔之安澧州人荆偉丹陽人周敏中官清流知縣家居為賊所執不屈死佘塙銅陵人知州徐世淳殉節死塙攝州事城再陷罵賊死余士泰昆明人本朝乾隆四十一年追諡猛如虎潘宏劉振之李乘雲忠烈艾育初忠節鍾其碩柴薦禋杜邦舉劉孔暉戴國柱張寶山古道行髙在崙李孕嘉烈愍姚運熙劉振世尚用光龔新韓醇姚昌祚王應翼張守正費曽謀楊一鵬王化行姚文衡張質龔之安荆偉周敏中錢祚徴錢繼美孫紹武鄢廷誨朱挺許佳允佘塙余士秦節愍門迎恩等並入祠壬午十五年春二月陜西總督汪喬年軍潰于襄城死之先是保定總督楊文嶽馳援開封賊已解圍去攻陷襄城殺知縣曹思正訓導張信典史趙鳯豸寄輜重焉復攻西華知縣劉伯驂登陴死守賊驅其下為十覆迭攻之城陷伯驂懷印投井死㑹賊遣其黨據臨潁總兵左良玉破而屠之自成怒轉攻良玉良玉退保郾城賊圍之文嶽㑹督師丁啓睿及總兵虎大威之師往救相持十晝夜未決而喬年率總兵賀人龍鄭家梀牛成虎出潼關與諸將議所向曰郾城危在旦夕吾趨郾城賊方鋭難與爭鋒襄城距郾四舍賊老寨咸在吾舍郾而以精鋭攻其必應賊必還兵救則偃城解矣諸將皆曰善乃留步兵火器于洛陽簡精騎萬人兼程進次郟縣襄城諸生張永祺等導喬年入城賊聞之即解郾城圍以數十萬衆來攻喬年亟勒兵駐城外人龍等三師未陳而奔副將馬名廉戰歿軍大潰喬年歎曰此吾死所也率步卒千餘入城守賊穴城實火藥轟城城裂喬年穿阱隨賊所鑿以長矛刺之賊死甚衆閲五晝夜守具皆盡望良玉來援竟不至賊炮擊喬年坐纛雉堞盡碎左右環泣請避之喬年怒以足蹴其首曰汝畏死我不畏死也守益固及城陷巷戰手刃三賊自剄不殊為賊所執大罵賊割其舌磔殺之襄城人建祠以祀副將張國欽張一貫黨威李萬慶及監紀西安同知孫兆祿材官李可從皆從喬年死自成怒永祺開城迎喬年索之不得屠其族劓刖諸生劉漢臣等百九十人初喬年撫陜西屬米脂知縣邊大綬發自成先冢大綬詗得其族人為縣吏者榜治之言去縣二百里為李氏村在亂山中十六冢環而葬中其始祖也相傳壙中有鐵燈檠鐵燈不滅李氏興如其言發之螻蟻數石火光熒熒然斫棺骨青黑黃毛被體腦後一穴大如錢中盤赤蛇長三四寸有角見日而飛高丈許咋咋吞日光者六七反而伏喬年函顱骨臘蛇以聞焚其餘雜以穢棄之自成聞之囓齒大恨曰吾必致死于喬年至是既殺喬年由西華攻陳州僉事關永傑與知州侯君擢鄉官崔泌之舉人王受爵率士民分堞守賊遣使說降斬其頭懸之城上賊怒攻破之永傑格鬬不支中亂刃死君擢泌之受爵及守備張鷹揚皆殉難有龔作梅者年十七父母俱亡殯于舍賊火民居作梅跪柩前焚死賊遂自陳州分部犯睢州州缺正官通政使李夢辰方家居即乘城禦賊無何賊從他門入擁夢辰見羅汝才汝才問所欲曰我大臣但欲死爾汝才遣其客說降且進之酒夢辰覆杯于地大息起扼吭而卒妻王氏方病間之不食死里居太平知府杜時髦亦死尋太康寧陵考城皆陷太康知縣魏令望里居僉都御史張維世富平知縣馮正吉死之賊乃悉衆攻歸德推官王世琇遷工部主事將行僚屬邀共守慨然曰久官于此臨難而去之非誼也遂與副使蔡鳯僉事吳汝琦同知顔則孔經厯徐一源商邱知縣梁以樟教諭夏世英里居尚書周士朴誓衆堅守賊攻圍七日總督侯恂家商邱其子方夏率家衆斬關出傷守者衆遂亂賊乘之入鳯汝琦世琇則孔及指揮賈之琯並遇害則孔女聞之即自縊一源分守北門殺賊多城陷巷戰死之以樟中賊刃久而復蘇妻張氏及子女僕從皆死以樟竟獲免世英持刀罵賊死于明倫堂妻石氏亦自刎尚書士朴及工部郎中沈試主事朱國慶中書侯欣光祿署丞侯執中廣西知府沈仔威縣知縣張儒及舉人徐作霖吳伯允周士美官生沈泌侯晙貢生侯恆沈誠周士貴國學生侯悰沈倜諸生吳伯裔張渭劉伯愚等皆死是時賊縱兵四出有自亳州南走流擾霍邱靈壁盱眙者亳州知州何變霍邱知縣左相申巡檢吳某靈壁知縣唐良鋭盱眙主簿胡淵皆殉節勢且蔓江北江北賊又方熾連陷含山和州南京戒嚴而自成精鋭聚河南隳名城不勝計河南凡八郡三在河北自六年蹂躙後患少紓其南五郡十一州七十三縣屢嵗被賊靡不殘破有再破三破者城郭邱墟人民百不存一朝廷亦不復設官間有設官者不敢至其地遙寄治他所其殉于治所者南陽則知府邱懋素鄭州則知州魯世任新安則知縣陳顯元登封則知縣劉禋鹿邑則知縣紀懋勛虞城則署縣事主簿孔亮上蔡則知縣許永禧西平則知縣髙斗垣遂平則知縣劉英魯山則知縣楊呈季郟縣則知縣李貞佐及汝州吏目顧王家教諭當振楊寶豐則知縣張人龍署縣事洛陽丞周之德伊陽則知縣孔貞璞而陜州鄉官梁可棟范大成趙良棟息縣鄉官王多福西平鄉官楊士英郟縣鄉官陳心學周卜厯南陽舉人張鳯翷王明物洛陽舉人張民表永城舉人夏云醇商城舉人余容善光州舉人王者琯光山舉人胡植嵩縣舉人王翼明寶豐舉人李得笥亦皆死難質實郾城漢郾縣隋郾城明屬許州以𨽻于開封府今升許州為直𨽻州縣仍屬焉太康秦陽夏隋太康明屬開封府今改屬陳州府寧陵漢縣明屬歸德府今因之曹思正岷州衛人劉伯驂河間人張信輝縣人趙鳯豸絳縣人馬名廉榆林衛人黨威神木人李萬慶即降將射塌天也孫兆祿鹽山人李可從盩厔人關永傑字人孟鞏昌衛人侯君擢字際明成安人崔泌之鹿邑人張鷹楊曲周人杜時髦字觀生馮正吉與妻任氏投井死子昌辰亦殉之魏令望武鄉人張維世纍官僉都御史代陳新甲巡撫宣府視事旬日坐失防削籍遣戍已而釋還城陷抗節死妻李氏子正誼孫昱俱殉節王世琇字昆良清苑人蔡鳯武進人吳汝琦徐州人顔則孔欣州人妻女皆殉之賈之琯汝寧人妻許氏抱二女投井死徐一源海鹽人夏世英祥符人沈試大學士鯉之孫徐作霖吳伯允伯裔張渭劉伯愚皆郡中名士何變晉江人居民逃竄城空不能守為賊執欲降之不屈斷足剖胸而死懸首市上三日耳目猶動左相申夷陵人唐良鋭全州人胡淵永年人邱懋素貴州新添衛人賊再陷南陽全家被害魯世任安邑人賊薄城竭力捍禦戰敗被執自刎死陳顯元蘄縣人城經摧頺率民人保關門寨守月餘力竭罵賊支解死劉禋中部人紀懋勛膠州人孔亮興平人許永禧曲沃人髙斗垣繁峙人劉英貴州人楊呈秀山海衛人李貞佐字無欲安邑人以學行著訓民有方練鄉勇守城城陷罵賊斷舌支解死母喬氏亦死顧王家㑹稽人子國亦以擊賊被害雷振揚山西人貞佐遇難後振揚攝縣事城再陷死之張人龍遵化人周之德山東陵縣人張人龍遇難後之德攝縣事城再陷死之孔貞璞曲阜人悉力守城賊不能克既去以事至汝州道遇害梁可棟官平定州知州萬大成官淮安同知趙良棟官蓬萊教諭王多福官項城訓導楊士英官懷仁知縣子婦王氏亦罵賊為所殺陳心學授知縣不謁選而歸賊欲官之不從被殺周卜厯官內黃知縣以父喪歸賊迫使執郟縣令以代其死罵賊被害令本朝乾隆四十一年追諡汪喬年黨威關永傑魏望陳顯元李貞佐忠烈李夢辰張維世周士朴魯世任忠節馬名廉張國欽張一貫李萬慶孫兆祿侯君擢崔泌之馮正吉徐一源何變胡淵邱懋素許永禧劉英顧王家梁可棟楊士英周卜厯烈愍曹思正劉伯驂張鷹揚杜時髦蔡鳯吳汝琦王世琇顔則孔賈之琯沈試朱國慶侯欣侯執中沈仔張儒左相申唐良鋭劉禋紀懋勛孔亮髙斗垣楊呈秀張人龍萬大成陳心學節愍張信等並入祠我大清兵克松山巡撫邱民仰等死洪承疇降遂下錦州松山圍既久帝命楊繩武督師救承疇繼又代以范志完皆斂兵不敢出副將焦埏赴援甫出山海關即敗沒轉餉路俱絶圍城食盡副將夏成德因遣子為質約日獻城大清兵如期攻之城遂下民仰及總兵曹變蛟王廷臣兵備道張斗姚恭王之禎副將江翥饒勳朱文德等死之承疇祖大樂就執職方郎中張若麒逃從海上蕩漁舟而還寧逺關門徑旅盡喪錦州城中糧亦盡人相食祖大夀戰守計窮又聞松山已失乃遣人至鄭親王濟爾哈郎睿郡王多爾衮軍門乞降二王據以入告越數日大夀復遣人至軍門求盟誓二王怒曰爾欲降即降不降則已此城可旦夕拔尚與爾盟誓乎大夀懼遂率所部以城降杏山塔山皆下敗書聞或傳承疇已死帝驚悼甚設壇都城賜承疇祭十六民仰六尋命建祠都城外承疇民仰並列將親臨祭聞承疇降乃止以王朴先逃下法司㑹鞫朴罪而吳三桂加提督銜鎮山海如故御史郝晉言六鎮罪同皆宜死三桂實遼左主將不戰而逃奈何反加提督兵部尚書陳新甲覆議請獨斬逃勒馬科軍令狀再失機即斬決三桂失地應斬念守寧逺功與李輔明白廣恩唐通貶秩充為事官時諸將多擁厚資賂權要故朴以外皆獲宥質實楊繩武雲南彌勒人崇禎十一年冬用楊嗣昌薦召見吐言如流莊烈帝偉之遂自御史超擢右僉都御史巡撫順天十四年擢薊遼總督尋以范志完代之而令繩武總督遼東寧逺諸軍出關救松杏加銜督師未幾卒遂進志完兵部左侍郎督師出關如繩武焦埏大同後衛人朱文德義州衛人本朝乾隆四十一年追諡曹變蛟忠烈邱民仰王廷臣忠節焦埏朱文德烈愍張斗姚恭王之禎江翥饒勳節愍三月魏照乘罷照乘在內閣四年庸碌無所見御史徐殿臣劾其昵妾棄妻縱壻為奸諸醜迹照乘力辨之御史劉之勃謂大臣不當爭辨帝責其妄議然照乘內不自安遂引疾去質實徐殿臣鄞人劉之勃字安侯鳯翔人夏四月謝升罷太宗文初我屢遺書議和兵部尚書陳新甲以國內困敝亦皇帝請主和以紓患私言于傅宗龍出都以語升語升升後見疆事大壞述宗龍之言于帝帝召新甲詰責新甲叩頭謝罪升進曰倘肯議和和亦可恃帝默然尋諭新甲密圖之乃遣職方郎中馬紹愈等奉書乞和太宗宴我有加禮仍報書曰大清國勞皇帝致書于明國皇帝豫纘承䝉皇考太祖皇帝之業嗣位以來天眷佑逺通臣服諸王等合辭勸進乃昭告軍每入爾境輒天地受號稱尊國號大清改元崇德通來我克城陷陳乘勝長驅若圖進取亦復何難然豫仍願和好者特為億兆生靈計耳蓋嗜殺者殃好生者祥感應之理昭然不爽若兩國各能審度禍福矜全億兆而誠心和好則自兹以後宿怨盡釋彼此不必復言矣至我兩國尊卑之分又何必較哉古云情通則明情蔽則暗若爾國使臣來豫令面見豫國使往爾亦令面見如此則情不蔽而和事可久若使臣不得面見情詞無由通達則和事終敗徒貽國家之憂矣夫豈扼絶使臣進見遂足以示尊耶至兩國有吉凶大事則當遣使交相慶弔每嵗貴國饋兼金萬兩白金百萬我國饋人參十斤貂皮千張若我國滿洲䝉古漢人及朝鮮人等有逃至貴國者當遣還我國貴國人有逃叛至我國者亦遣還貴國以寧逺雙樹堡中間土嶺為貴國界以塔山為我國界以連山為適中之地兩國俱于此互市自寧逺雙樹堡土嶺界北至寧逺北臺直抵山海關長城一帶若我國人有越入及貴國人有越出者俱加稽察按律處死或兩國人有乘船捕魚海中往來者爾國自寧逺雙樹堡中間土嶺沿海至黃城島以西為界我國于黃城島以東為界若兩國有越境妄行亦俱察出處死倘願如天地或書中所言以成和好則我兩人或親誓來豫亦遣使大臣代誓爾速遣使齎和書及誓書以齎和書及誓書以往若不願和好再勿遣使致書其億兆死亡之孽于豫無與矣于是以書授紹愈遣人護送抵連山紹愈未至而升昌言于朝房謂給事中方士亮倪仁禎等曰議和事諸君不必言上祈籖奉先殿意已決又言人主以不用聰明為高上太用聰明致天下盡壞士亮等退謂升詐謗君父泄禁中語仁禎及同官廖國遴等交章論之斥升大不道無人臣禮士亮復繼言之疏數十上帝大怒削升籍質實雙樹堡在寧逺州東十八里方士亮歙人倪仁禎浦江人廖國遴長沙人五月張獻忠陷廬州起馬士英總督廬鳳軍務先是賀一龍賀錦諸賊在江北欲西合獻忠以湖廣官兵沮不得達及開封圍急督師丁啓睿及左良玉奉詔往援皆移軍駐開封旁近地獻忠得乘間走英霍山中與一龍等相見皆大喜遂以是年三月攻舒城舒城令以憂去鄉官胡守恆與逰擊孔廷訓督兵民共守廷訓縱所部淫掠士民乃叛降賊城將降悍卒殺守恆被數十創以死獻忠遂入舒城改為得勝州據之遣其黨分掠旁邑逰騎直抵廬州城下知府鄭履祥通判趙興基經厯鄭元綬合肥知縣潘登貴指揮同知趙之璞里居參政程楷分門守監司蔡如衡貪戾民不附賊諜滿城中不能知㑹提學御史徐之垣以試士至獻忠遣其徒僞為諸生襲儒冠以入夜舉炮城中大擾之垣如蘅履祥登貴並縋城走興基時守水西門聞變挺刃下戌樓與鬬斬數人被創死元綬楷守南薰門並殉難之璞守東門巷戰死賊乘勢連陷含山巢縣廬江無為六安拒臣艦數百習水師將窺南京太監盧九德以京營兵往𠞰京營將孫應元黃得功者素善戰是年春應元追賊羅山已敗殁得功乃與别將劉良佐擊獻忠于峽山再戰敗績得功退屯定逺江南大震詔逮鳯陽總督髙斗光起馬士英代之士英初巡撫宣府取公帑饋朝貴坐遣戍尋流寓南京與逆案光祿卿阮大鋮相結甚歡周延儒之再召也大鋮輩金錢要之維揚求湔濯延儒曰吾此行謬為東林所推子名在逆案可乎大鋮沈吟久之曰瑤草何如瑶草士英别字延儒許諾至是禮部侍郎王錫衮薦士英知兵延儒力贊之竟得起用士英未至軍賊勢張甚悉衆攻桐城挾營將廖應登至城下誘降得功良佐合兵擊之于鮑家嶺賊敗遁退至潛山擒斬賊將闖世王馬武三鷂子王興國三鷂子者獻忠養子號驍勇者也得功箭傷面愈自奮與賊轉戰十餘日所殺傷獨多賊大衄于是一龍等棄獻忠去北投自成而河南賊袁時中方寇頴州官軍聞警即移兵𠞰時中獻忠收餘衆襲陷太湖參將邱壯猷戰死知縣楊春芳典史陳之訓教諭沈鴻起訓導婁懋履並死馬獻忠勢復振質實南薰門廬州府城千七百有六丈門七跨金斗河立水關二後漢末建元未重修南董門其南門也峽山在桐城縣北四十里即古夾石鮑家嶺在桐城縣西馬士英貴陽人胡守恆官編修贈少詹事諡文節趙興基雲南太和人鄭元綬浙江人趙之璞程楷皆合肥人楷初為平湖知縣有政聲歷官雲南參政致養歸徐之垣鄞人高斗光繁峙人王錫衮祿豐人邱壯猷六安人楊春芳靖州人按一統志太湖知縣死於賊者又有榆林李盛英賊掠境與守備徐際相禦之許家寨力戰死之本朝乾隆四十一年追諡孫應元忠烈趙興基趙璞程楷邱壯猷李盛英徐際相烈愍楊春芳節愍鄭元綬等並入祠六月賀逢聖張四知罷逢聖與周延儒再召帝待之不如延儒及是月戊申豫告歸宴餞便殿逢聖感激大哭伏地不能起帝亦汍瀾動容焉越六日張四知亦致仕去以蔣德璟黃景昉吳甡並為禮部尚書兼東閣大學士預機務先是帝命㑹推閣臣吏部尚書李日宣等以德璟景昉倪元璐劉宗周及甡諸人名上帝令再推數人而副都御史房可壯工部右侍郎宋玫大理寺卿張三謨與焉大僚不獲推者為流言入內帝深惑之召日宣及與推諸臣入中左門偕輔臣賜食已出御中極殿召諸臣奏對玫陳九邊形勢甚辨帝惡其干進叱之乃命德璟景昉甡入閣甡之柄用周延儒與有力焉延儒再相逆案輔臣馮銓頗助為謀延儒許復其冠帶銓果以捐資振饑屬撫按題叙延儒擬優㫖下户部公議大沸延儒患之兵部侍郎馮元飇與甡善因說延儒援甡共為銓地甡既入閣延儒語銓事甡唯唯退召户部主議者告以逆案不可翻寢其疏不覆延儒始悟為甡紿兩人遂有隙質實李日宣字晦伯吉水人宋玫字文玉萊陽人張三謨大原人下吏部尚書李日宣等于獄帝以㑹推不當責日宣等回奏奏上帝怒不解復御中左門召日宣對狀次召吏科都給事中章正宸河南道御史張煊及房可壯宋玫張三謨帝詰日宣曰汝嘗言秉公執法今何事不私正宸奏日宣多游移臣等當劾之㑹推事實無所徇日宣復為玫等三人解帝命錦衣官逮下日宣等六人並褫冠帶就執時日宣所舉蔣德璟等多採人望中外翕然稱公然周延儒頗有所參預玫之得與再推延儒實主之延儒客盛順者嘗為浙江巡撫熊奮渭營內召果推南京户部侍郎玫父繼登官浙江右參政知其事遂深信順順為玫營推舉于延儒甚力而日宣不知也帝入蜚語惡日宣特甚詰責聲甚厲侍臣皆股栗失色德璟與黃景昉叩頭辭新命言臣等並在㑹推中若諸臣有罪臣等豈能安延儒亦乞帝優容之皆不許遂下刑部獄廷臣交章申救不納帝疑日宣未就獄責刑部臣剋期三日定讞侍郎惠世揚徐石麒擬豫輕比帝大怒革世揚職鐫石麒二秩郎中以下罪有差御史王漢言枚卜一案日宣等無私陛下欲重其罪刑部莫知所執不聽獄上日宣正宸煊戍邊可壯玫三謨等削籍質實張煊介休人熊奮渭商城大人惠世揚清澗人徐石麒字寶摩嘉興人後家居朝兵下嘉興石麒自縊死王漢字子房掖縣人本乾隆四十一年追諡石麒忠懿秋七月左良玉兵潰于朱仙鎮諸鎮皆潰是年夏四月李自成再圍開封良玉以兵往救戰不利監軍主事余爵被執良玉遂引兵去開封圍久不解廷議以良玉軍無鬬志故尚書侯恂嘗遇良玉有恩乃詔釋恂子獄代楊文嶽為總督合督師丁啓睿之兵馳援開封發帑金十五萬犒良玉營以激厲之並飭山西軍刻期渡河㑹恂等急擊而總兵許定國以山西軍次沁水一夕潰去寧武兵亦潰于懷慶竟不赴㑹文嶽未受代仍統所部㑹啓睿于朱仙鎮良玉及虎大威楊德政方國安四鎮軍畢集良玉見賊勢盛欲拔營遁乘夜縱其軍突諸營諸營驚潰良玉軍掠諸營馬騾以去于是諸營悉奔啓睿文嶽走汝寧獨副將姜名武一軍堅壁不動侵晨自成擁衆大至名武督麾下血戰殺數百人力竭被執大罵為賊磔死賊乃往追良玉軍自成戒其衆毋疾追繞出良玉前傍溪谷穿塹深廣各二尋環百里以阻良玉良玉幸追者緩整衆以前行八十里扼于塹不得進方下馬欲渡賊追者噪而至良玉兵大亂自相蹂踐仆溪谷者無算棄馬騾萬匹監軍僉事任棟歿于陳良玉走襄陽帝聞援軍屢潰怒甚褫啓睿文嶽職逮治定國誅德政詔恂拒河圖賊而令良玉以兵㑹恂良玉畏自成遷延不至帝終不能罪良玉也質實姜名武字我揚保德州人任棟永夀人余爵被執罵賊死姪敦華同遇害烈本朝乾隆四十一年追諡姜名武忠任棟余爵烈愍發明六鎮兵潰于松山而誅止王朴四鎮兵潰于朱仙鎮而誅止楊德政軍律之失平甚矣方吳三桂諸人之幸而獲宥猶可解曰朴先潰也良玉則豈非先潰者而竟置罪魁于不問特以其强悍不易制耳夫賀人龍强悍不減良玉孫傳庭一旦入關中縛之麾下數其罪而戮之三軍皆灑然動色誰謂跋扈之將不可以威制哉厥後良玉出樊城奔武昌縱兵大掠火光照江中而漫無顧忌其亦姑息之政有以釀成之也八月陳新甲下獄尋棄市先是松山錦州相繼失職方郎中張若麒自寧逺遁還言官劾若麒者悉及新甲新甲屢乞罷皆不從新甲雅有才曉邊事然不能持廉所用多債帥深結中貴為援與司禮王德化尤昵故言路攻之不能入當是時闖賊蹂躙河南開封屢被圍他郡縣失亡相踵總督傅宗龍汪喬年出關討賊先後陷殁賊勢愈張言官劾新甲者章至數十新甲請罪章亦十餘上輒慰留之至是帝特惡其泄機事乃下之獄帝初以和議委新甲手詔往返者數十皆戒以勿泄外廷漸知之故屢疏爭然不得左驗一日所遣職方郎中馬紹愈以密語報新甲㑹新甲視事去置其書几上家僮誤以為塘報也付之鈔傳于是言路譁然給事中方士亮首論之帝愠甚留疏不下已降嚴㫖切責令新甲自陳新甲不引罪反自詡其功帝益怒言官復相繼劾之遂逮付刑部獄而和議亦中罷新甲從獄中上書乞宥不許新甲知不免遍行金內外給事中廖國遴等營救于刑部侍郎徐石麒拒不聽大學士周延儒陳演亦于帝前力救且曰國法兵不薄城不殺大司馬帝曰他且勿論戮辱我親藩不甚于薄城耶遂斬新甲于市新甲為楊嗣昌引用其才品心術相似軍書旁午裁答無滯帝頗倚之後給事中沈迅力詆其失帝曰令爾作新甲恐更不如迅慚而退九月李自成決河灌開封城陷諸援軍既潰于朱仙鎮帝乃詔山東總兵官劉澤清救開封時城中食盡巡撫髙名衡總兵陳永福等守益固澤清兵抵河北朱家寨將士不敢進澤清曰我以兵五千南渡依河而營引水環之以次結八營直連大堤築甬道輸河北之粟以餉城中賊兵已老可一戰走也皆曰善乃分兵先渡立營賊攻之戰三晝夜後軍無繼者甬道不就澤清拔營去賊圍開封者三所損傷多積憤誓必拔之圍半年師老糧匱欲引黃河水灌之以城中子女貨寶猶豫不決聞秦督孫傅庭已率兵出關恐諸鎮兵夾擊欲變計㑹有獻計請決河以灌賊者名衡以為然周王枵募民築羊馬牆堅厚如髙岸賊營直傳大堤河決賊可盡城中無虞方鑿朱家寨口賊已知之移營髙阜具艨艟巨筏亦驅掠民夫數萬決河灌城㑹天大雨連旬黃流驟漲口遂決丁夫荷鍤者隨堤漂沒十數萬賊亦沈萬人河入自北門貫東南門以出奔聲如雷名衡永福乘小舟至城頭周王率其宫眷及寧陽諸郡王避水棲城樓坐雨絶食者七日後得舟乃從城上泛舟出同知蘇茂灼通判彭士奇久餓不能起並溺死賊浮艦入城遺民俱盡拔營而西城初圍時百萬户後饑疫死者十二三汴梁佳麗甲中州羣盜心艷之至是盡沒于水得脫者不及二萬人帝聞痛悼猶念諸臣拒守勞命叙功加名衡兵部右侍郎名衡辭以疾即擢監軍御史王漢為右僉都御史以代名衡質實朱家寨口在開封府城西北十七里寧陽郡王恭檥周端王肅溱第九子萬厯四十九年封蘇茂灼晉江人彭士奇髙要人士本朝乾隆四十一年追諡茂灼奇節愍冬十月孫傅庭敗績于郟縣是年春兵部尚書陳新甲薦傅庭知兵遂釋傅庭于獄以為兵部右侍郎帝御文華殿問勦賊安民之䇿傅庭侃侃言帝嗟嘆久之宴勞賞賚甚渥尋總兵賀人龍軍潰秦督汪喬年敗沒于襄城帝即命傅庭往代且授意誅人龍傅庭以人龍家米脂其宗族多在賊中未可輕發在道佯上疏曰人龍臣舊將願貰其罪俾從臣自效帝亦佯許之及至陜大集諸將出不意縛人龍坐之麾下數而斬之謂其開封噪歸猛如虎以孤軍失利而張獻忠羅汝才出于柙也又謂其遇敵先潰新蔡襄城連喪二督也諸將莫不灑然動色傅庭既已誅人龍威讋三邊日夜治軍為平賊計而賊遂已再圍開封屢詔趣傅庭出關傅庭上言兵新募不堪用帝不聽傅庭不得已出師抵潼關大雨連旬自成決河灌開封開封已陷傅庭趨南陽自成西行逆秦師傅庭設三覆以待賊牛成虎將前軍左勷將左鄭嘉棟將右髙傑將中軍成虎陽北以誘賊賊奔入伏中成虎還兵而鬬髙傑等突起翼之左勷鄭家棟左右橫擊之賊潰東走斬首千餘級追三十里至郟縣賊棄甲伏軍資于道秦兵趨利賊覘官兵囂反兵乘之兵大潰副將孫枝秀躍馬以追賊擊殺數十騎賊因圍之馳突不得出馬蹶被執植立不撓以刃臨之瞪目不答一人曰此孫副將也遂殺之參將黑尚仁亦被執不屈見殺覆軍數千材官小將之歿者張映奎李棲鳯任光裕戴友仁以下七十有八人傅庭走鞏縣退入關是役也天大雨糧不至士卒採青柿以食凍且餒故大敗豫人所謂柿園之敗也質實左勷總兵官光先之子愍本朝乾隆四十一年追諡孫枝秀黑尚仁烈張映奎等並入祠十一月總兵官劉超據永城反超初以偏禆從貴撫王三善討安邦彥積勞遷四川遵義總兵練國事丁魁楚丁啓睿為督撫皆嘗檄超赴軍前討賊超忽上書陳功簿意頗鞅鞅遂坐怨望奪職數求復官不得李自成圍開封超請招降土寇協擊之起超保定總兵令率兵赴救超憚不敢行同縣御史魏景琦方家居見超日與土寇相往來未嘗與自成一戰詆超為通賊超怒訴之舉人喬明楷明楷復誚之超乃大憤殺景琦一家三十餘人并殺明楷而反巡撫王漢謀執超揚言招撫分兵伏城下而獨與軍將數琦入超先發殺漢參將陳治邦逰擊連光耀父子鬬格死有馬魁者負漢尸奪路以出聞于朝命鳯督馬士英太監盧九德總兵陳永福討之超據永城守時永城以禦賊故先屯糧積芻制火炮盡為超有官軍連戰賊屢挫築長圍困之超官貴州時與士英相識緣舊好貽書士英曰今文臣軫結成勢錮不可拔為守令則驅民反為督撫則驅兵反為臺省則驅將反天下反者何一非公等驅之超非侗愚豈願棄功名捐首踵蒙不韙之名蹈汙敗之行為天下笑哉勢激之使然也士英得書因勸之降超出見不肯去佩刀士英笑曰若既歸朝安用此已潛去其親信獻俘于朝磔死質實劉超山西人其父為永城估遂家永城王漢初為內鄉知縣屢建破賊功降㫖優叙是年春行取入都以試御史監軍與督臣侯恂南援汴尋詔漢巡撫河南賊灌開封漢自柳園夜半渡河逐賊戰小却守備李日舒歿于陳諸軍殊死鬬敗追至朱仙鎮連戰皆捷遂代髙名衡撫河南陳治邦臨漳人李日舒棲霞人耀本朝乾隆四十一年追諡王漢陳治邦連光李日舒烈愍我大清兵入薊州連下畿南山東州縣魯王以派自殺時關內外並建二督又分設二督于昌平保定千里之內有四督臣又有寧逺永平順天密雲天津保定六巡撫寧逺山海中協西協昌平通州天津保定八總兵星羅基置無地不防而事權反不一薊督張福臻尤昏庸給事中方士亮劾之因言移督師關內則薊督可裁福臻可罷于是召還臻令遼督范志完兼制關內移駐關門志完辭不許求去不許上疏言不能兼薊請仍設薊督始以趙光抃任之而大清兵已自墻子嶺入薊州分道南嚮乃急徵諸鎮入援援軍至者甚衆皆觀望志完光抃畏怯不敢戰河大間以南多失守下臨清諸州縣攻兖州知府鄧藩錫兵乘勝抵山東走告魯王以派曰郡有吏國有王猶同舟也列城失守皆由貴家惜金錢而令窶人餓夫列陴捍禦夫城郭者我之命也財賄者人之命也我不能畀彼以命而望彼畀我以命乎王誠散儲財以鼓士氣城猶可存不然大事一去悔無及矣以派不能從藩錫與監軍參議王維新同知談絲曽文蔚通判閻鼎推官李昌期滋陽知縣郝芳聲副將丁文明長史俞起蛟給事中范淑泰等分門死守力不支城破文明戰死維新猶奮力格鬬被二十一創乃死以派自縊樂陵陽信東原安邱諸郡王皆死藩錫絲文蔚鼎昌期芳聲大起蛟淑泰舉人羅于寧並殉節時十二月八日也我清兵遂長驅南下直抵海州贑榆沭陽豐沛凡克府州縣城八十八所至將吏多望風遁或獻金帛迎降其死于戰守及紳士之殉節者畿輔則薊州兵備僉事張世管薊鎮糧儲户部主事馬嗣烋霸州兵備副使趙輝知州丁師羲里居參政李時茪河間參議趙珽督守給事中周而淳知府顔孕紹同知姚汝明知縣陳三接里居襄陽知縣賈太初訓導馮運隆順德知府吉孔嘉里居台州知府傅梅中書舍人孟魯鉢張鳯鳴定州知州唐炫趙州知州王端冕教諭陳廣心訓導王一統永清知縣髙維岱典史李自正教諭邸養性鄉官劉維蕙阜城知縣吕大成武邑知縣鄭集命沙河知縣項易任縣守備牛文科深州訓導劉名言吏目熊國俊平鄉教諭潘希明訓導李愈芬閻慎行清豐教諭曹一貞訓導董調元里居吏部郎李其紀黃州推官似鶴舉富陽知縣杜斗愚永平里居山東副使申為憲新河里居淮安通判劉文蔚韓城縣趙懋誠生員宗文麗南樂監生鄭獻書山東則山東兵備僉事樊吉人登萊兵備僉事邢國璽兖西兵備僉事李恪臨清總兵官劉源清參將柳育融𣙜關主事陳興言同知路如瀛判官徐應芳吏目陳翔龍里居兵部侍郎張宗衡太常少卿張振秀户部員外郎邢泰吉臨汾知縣尹任濵州知州王道隆莒州知州景淑範貢生何燧鄒平知縣朱迥添萊蕪知縣馮守禮陽信知縣張豫卿滕縣知縣吳良能前知縣瞿騫里居車駕郎中劉鴻緒東阿知縣吳汝宗武城知縣任萬民生員商醇儒商大儒徐行泗徐士雅王國俊吳文光臨淄知縣文昌時訓導申周輔高苑知縣周啓元夀光知縣李耿里居桐柏縣知縣丁茂桂萊陽知縣陳顯際里居工部侍郎宋玫稽勳郎中宋應亨中書舍人趙士驥齊東教諭張日新沂州里居河南巡撫髙名衡夀張里居太僕少卿王大年曹州里居户部主事楚煙長清里居訓導張肇祚昌邑舉人李治躬宋明佐生員宋奇英宋奇士諸城舉人丁大轂新城武舉馬驥貢生王與朋生員王與斌王與玖王與才王與藎王與獻王與璧王與纓王與滿王士駒王士奇王士贍畢申畢卓耿廷梓張嗣說徐淳如張炅然張炳然張熒然張冲然泰安州生員張遇留平度州生員竇啓光武城生員劉珣堂邑生員孫發祖夏津生員劉以秸戴章甫朝城生員嶽爾髙即墨生員王基招逺生員單經翰應天則豐縣知縣劉光先生員王道充與子賔布衣皇甫世民沐陽知縣劉士璟等而南京給事中張焜芳天津參將賀秉鉞寧波生員馬之騆馬之駉道出臨清職方主事劉大年道出厯城亦皆殉節死質實贛榆漢縣東魏于縣西别置懷仁縣髙齊廢贛榆縣金大定七年改懷仁曰贛榆明屬海州以隸于淮安府東本朝雍正二年升海州為直隸州縣仍屬焉沭陽魏建沭陽郡兼置懷文縣後周改縣曰沭陽明屬淮安府明本朝雍正二年改屬海州南樂五代唐改昌樂置亦屬大明府今因之濵州五代周就渤海縣置州明洪武初省縣入州屬濟南府本朝雍正二年升直隸州十二年升武定州為府以州屬之臨淄夀光皆漢縣明並屬青州府萊陽漢昌陽五代唐改萊陽明屬登州府今悉因之魯王以派荒王檀十世孫趙光抃字彥清九江德化人鄧藩錫字晉伯金壇人王維新廣宗人曾文蔚泗州人閻鼎臨汾人李昌期永年人郝芳聲欣州人丁文明義烏人俞起蛟錢塘人范淑泰典浙江試事竣還家遂與藩錫等同死樂陵魯靖王肇輝第五子泰舉于宣德二年始封樂陵郡王至是為泰舉八世孫以泛陽信魯莊王陽鑄第七子當㳻于成化十四年封陽信郡王至是為當渚七世孫宏福東原魯端王觀􅟼第二子頤埨于嘉靖三十六年始封東原郡王至是為頤埨曽孫以源安邱魯靖王肇輝第四子泰坾于宣德十年始封安邱郡王至是為泰坾九世孫宏檟張名世馬邑人子啓元同死馬嗣烋同州人母薛氏同死趙輝字黃如河津人子琬同死丁師羲字象先楚雄人趙珽慈溪人一門十四人同死周而淳掖縣人顔孕紹字賡明曲阜人復聖六十五代孫也闔室自焚死姚汝明夏縣人妾任氏同死陳三接文水人巷戰死妻武氏殉之吉孔嘉洋縣人妻張氏長子惠迪次子婦王氏同死傅梅邢臺人唐鉉字節玉睢州人王端冕字服先江陵人陳廣心元城人王一統成安人髙維岱昌邑人邸養性東勝衛人吕大成萊蕪人鄭集命延長人項易禹州人牛文科任縣人劉名言唐縣人曹一貞宛平人董調元安肅人樊吉人元城人邢國璽長葛人李恪安邑人劉源清濟寧人澤清弟栁育融博興人陳興言漳浦人路如瀛陵川人徐應芳臨川人陳翔龍蕭山人張宗衡以兵部侍郎為宣大總督罷歸佐有司守城援不至城破死王道隆江都人景淑範蒲州人朱迥添瀋陽王支屬由宗學貢生為知縣馮守禮猗氏人與二子攄抱攄奇並自殺張豫卿武進人吳良能遼東蓋州人城將破盡殺家屬拜母出力戰死瞿騫上海人解任未行與良能協守城破亦死吳汝宗寧洋籍龍巖人任萬民曲陽人文昌時全州人闔門自焚死申周輔屯留人周啓元黃罔人李耿江隂人陳顯際真定人宋應亨侍郎玫族叔也應亨以城北庳薄出千金建甕城浹旬而畢玫及邑人趙士驥亦出資治具與顯際固守二月餘城破皆死之張日新浙江建德人招降土寇安守夏共登陴拒守力不支與子光裔及守夏皆死妻方氏自刎髙名衡以巡撫守開封既陷以病歸夫婦同死節王大年厯官御史加太僕少卿以附魏忠賢掛名逆案至是亦死楚煙與子鳯苞妻趙氏俱死劉光先廣東人劉士璟復州人張焜芳紏太僕少卿史􅒇贓私為所訐罷官歸㑹稽以事北上與劉之騆之駉俱就執遂死其妻妾聞之赴井死賀秉鉞泰寧左衛人以扶父柩至臨清巷戰終日力盡就執死劉大年廣昌人使南京還朝過厯城適城破遂死本朝乾隆四十一年追諡范淑泰顔孕紹吳良能忠烈鄧藩錫吉孔嘉宋玫高名衡張焜芳忠節王維新丁文明張名世趙珽陳三接高維岱牛文科李其紀樊吉人栁育融陳興言文昌時賀秉鉞烈愍談絲曽文蔚李昌期郝彥聲俞起蛟馬嗣烋趙輝丁師羲李時茪周而淳姚汝明賈太初傅梅孟魯鉢張鳳鳴唐鉉王端冕吕大成鄭集命項易侣鶴舉杜斗愚申為憲劉文蔚邢國璽李恪劉源清張宗衡張振秀邢泰吉尹任王道隆景淑範朱回添馮守禮張豫卿瞿騫劉鴻緒吳汝宗任萬民周啓元李耿丁茂桂陳顯際宋應亨趙士驥楚煙劉光先劉士璟劉大年節愍羅于寧等並入祠閏十一月李自成陷汝寧前保定總督楊文嶽死之文嶽與虎大威等既自朱仙鎮奔汝寧詔褫文嶽官候勘以寇患方棘猶治軍事未行至是賊以數萬衆來犯汝寧老回回馬守應革裏眼賀一龍左金王賀錦爭世王劉希光亂世王藺養成時已歸自成引兵畢㑹壓城五里而軍監軍僉事孔貞㑹以川兵屯城東文嶽以保兵屯城西賊兵進攻相持一晝夜川兵潰殺傷數百賊奪其馬嬴悉衆攻文嶽軍文嶽部將甄竒傑者稱驍勇前從擊賊已戰死所恃惟大威俄大威中炮死守備蔡浩父子指揮熊應吕梅振英張鴻光俱歿于陳文嶽益不支僉事王世琮知府傅汝為通判朱國寶縋將士入城副將賈悌參將馮名聖亦掖文嶽貞會登城賊四面環攻戴扉以障矢石雲梯堵墻而立城上矢炮擂石雨集賊死傷山積而攻不休一鼓百道並登執文嶽及世宗國寶悌名聖殺汝陽知縣文師頤于城上遊擊朱崇祖指揮張國正千户劉懋勳楊紹祖袁永基同子世廕百户葉榮䕃張承德李衍夀閻宗國奮力巷戰死汝為聞變投水死嵗貢士林景暘國學生趙得庚楊道臨等諸生趙重明費明棟楊應禎李士諤等皆死賊擁文嶽見自成大罵賊怒縛之城南三里鋪大炮擊之洞胸糜骨死士民屠戮數萬焚公私廨舍殆盡貞㑹執去不知所終崇王由積崇世子諸郡王皆虜以行賊遂走確山信陽泌陽遣其黨賀一龍掠地上蔡知縣官篆出禦之與鄉勇馬天祥李和中王維新曽耀俱陷陳死質實崇王由積簡王見澤七世孫王琮世字仲發達州人先為汝寧推官討土冦流矢貫耳不為動時號王鐵耳者也傅汝為字于宣江陵人朱國寶成都人文師頤全州人蒞任甫三日朱崇祖汝陽人妻孫氏自焚死張國正六安人袁永基妻王氏亦殉節官篆膠州人本朝乾隆四十一年追諡楊文嶽虎大盛王世琮忠烈甄竒傑蔡浩熊應吕梅振英張鴻光賈悌馮名聖文師頤朱崇祖張國正烈愍傅汝為朱國寶官篆節愍劉懋勳等並入祠下給事中姜埰行人司副熊開元于錦衣衛獄尋遣戍周延儒之再相也頗力矯其前所為廣引清流于是鄭三俊長吏部劉宗周掌都察院范景文長工部倪元璐佐兵部多起自廢籍其他李邦華張國維徐石麒等皆布滿九列又請釋黃道周于戍所復其官言路亦得發舒論事忌者乃造二十四氣之說以指朝士二十四人直達御前帝適下詔戒諭百官責言路尤至埰疑帝已入其說乃上言陛下視言官重故責之嚴如聖諭云代人規卸為人出缺者臣敢謂盡無其事然陛下何所見而云然倘如二十四氣蜚語騰播清禁此必大奸巨憝恐言者不利已而思以中之激至尊之怒箝言官之口人皆喑然緘默誰與陛下言天下事者是時帝方憂勞天下默告上帝戴罪省愆所頒戒諭詞㫖哀痛讀者感傷埰顧反覆詰難深疑于帝者帝遂大怒曰埰敢詰問詔㫖藐玩特甚立下詔獄考訊掌鎮撫梁清宏以獄詞上帝曰埰情罪特重且二十四氣之說類匿名文書見即當毁何故屢騰奏牘其速按實以聞而同時有熊開元者亦奉詔下錦衣衛獄開元初以給事中左降淹久不遷頗觖望詣延儒訴已困頓狀延儒適以他事輒命駕出開元大愠㑹京師戒嚴帝下詔求言凡官民陳事者即日召對開元欲論延儒屢請召對及入見延儒在不敢言一日帝御德政殿秉燭生開元從輔臣入奏言易稱君不密則失臣臣不密則失身請輔臣暫退延儒等引退者再帝不許開元遂言陛下求治十五年天下日以亂必有其故帝曰其故安在對曰今所謀畫惟兵食賊冦不揣其本而末是圖雖終日夜不寢食求天下治無益也陛下臨御以來輔臣數十人皆庸人相繼為奸人禍天殃迄無衰止逮言官發其罪狀誅之斥之已敗壞不可復救矣帝與詰問久之疑開元有所為曰爾有人欲用乎開元辨無有且奏且頻目延儒延儒跪謝帝曰天下不治皆朕過于卿何與開元言陛下令大小臣工不時面奏而輔臣在左右誰敢為異同之論以速禍且昔日輔臣繁刑厚斂屏棄忠良賢人君子攻之今輔臣奉行德意釋纍囚蠲逋賦起廢籍賢人君子皆其所引用偶有不平私慨歎而已帝責開元有私開元辨延儒等亦前為辨解帝命之退延儒等請令補牘從之開元本欲盡發延儒罪以其在側不敢言而延儒慮其補牘隂令吳昌時等沮之及奏上止述奏辭不更及延儒他事帝大怒令錦衣逮治衛帥駱養性開元鄉人也素怨延儒令盡發延儒之隱以聞帝益怒密旨下養性令潛斃埰及開元于獄養性懼以語同官同官曰不見田爾耕許顯純事乎養性乃不敢奉命已而語泄有奏之帝者請並誅養性養性大懼帝亦不欲殺諫臣疏竟留中會鎮撫再上埰獄言掠􅏺者再供無異詞養性亦封還密旨乃命移刑官定罪尚書徐石麒等擬埰戍開元贖徒帝責以徇情骫法令對狀奪石麒官而逮埰開元至午門並杖一百埰已死弟垓口溺灌之乃復蘇仍繫刑部獄已皆遣戍質實姜埰字如農萊陽人熊開元字魚山嘉平人十二月削左都御史劉宗周籍宗周甫起廢籍為左都御史既至官召見文華殿帝問都察院職掌何在對曰在正已以正百寮必存諸中者上可見君父下可質天下士大夫而後百寮則而象之大臣法小臣廉紀綱振肅職掌在是而責成巡方其首務也巡方得人則吏治清民遂帝曰卿力行以副朕望宗周以敗書屢聞請旌事盧象升追戮誤國奸臣楊嗣昌逮跋扈總兵左良玉俾督師大帥皆知懲勸帝不能從閏月晦日召見廷臣于中左門時姜埰熊開元以言事下詔獄宗周約九卿共救入朝聞密旨置二人死宗周愕然謂衆曰今日當空署爭必改發刑部始已及對有薦西洋人湯若望乃善火器者請召試宗周曰邊臣不講戰守屯戍之法專恃火器近來陷城破邑豈無火器然我用之制人人得之亦可制我不見河間反為火器所破乎國家大計以法紀為主大帥跋扈援師逗遛奈何反姑息為此紛紛無益之舉耶因議督撫去留則請先去督師范志成且日十五年以來陛下處分未當致有今日敗局不追禍始更絃易轍欲以一旦苟且之政補目前罅漏非長治之道也帝變色曰前不可追善後安在宗周日在陛下開誠布公公天下為好惡合國人為用舍進賢才開言路次第與天下更始帝曰目下烽火逼畿甸且國家敗壞已極當如何宗周曰武備必先練兵練兵必先選將選將必先擇賢督撫擇賢督撫必先吏兵二部得人宋臣曰文官不愛錢武官不惜死則天下太平斯言今日針砭也論者但論才望不問操守未有操守不謹而遇事敢前軍士畏威者若徒以議論捷給舉動恢張稱曰才望取爵位則有餘責事功則不足何益成敗哉帝曰濟變之時先才後守宗周曰前人敗壞皆由貪縱使然故以濟變言愈當兼重操守帝曰大帥别有才局非徒操守可望成功宗周曰他不具論如范志完操守不謹大將偏禆無不由賄進所以三軍解體由此觀之操守為重帝色解曰朕已知之命宗周起于是宗周出奏曰陛下方下詔求賢姜埰熊開元二臣遽以言得罪下錦衣獄陛下度量卓越妄如臣宗周戅直如臣黃道周尚蒙使過之典二臣何不幸不邀法外恩帝曰道周有學有守非二臣比宗周曰二臣誠不及道周然朝廷待言官有體言可用用之不可置之即有應得之罪亦當付法司今遽下錦衣獄終於國體有傷帝怒甚曰法司錦衣皆刑官何公何私且罪一二言官何遽傷國體有如貪贓壞法欺君罔上皆不可問乎宗周曰錦衣膏梁子弟何知禮義聽寺人役使即陛下問貪贓壞法欺君罔上之臣亦不可不付法司也帝大怒曰如此偏黨豈堪憲職有間曰開元此疏必有主使疑即宗周金光辰爭之帝叱光辰并命議處翌日光辰貶三秩調用宗周革職下刑部議罪閣臣特不發捧原㫖御前懇救乃免斥為民李自成犯襄陽遂犯荆州焚獻陵自成由汝寧引兵而西謀拔襄陽為根本時左良玉壁樊城大造戰艦驅襄陽一郡人以實軍諸降賊附之有衆二十萬然親軍愛將太半死而降人不奉約束良玉亦漸衰多病不復能與自成角自成乘勝攻良玉良玉退兵南岸結水寨相持以萬人扼淺洲賊兵十萬爭渡不能遏良玉乃宵遁引其舟帥左步右騎而下至武昌從楚王乞二十萬餉曰我為王保境王不應縱兵大掠火光照江中宗室士室奔竄至山谷多為土寇所害驛傳道副使王揚基奪門出良玉兵掠其資并及其子女人畏良玉兵甚于賊賊既得渡長驅犯襄陽官吏皆先遁賊入城鄉官蔡思繩宋大勛殉節死賊分兵冠宜城知縣陳美固守八晝夜城陷抗罵不已為賊磔死訓𨗳田世福亦死之寇棗陽知縣郭裕發炮石擊傷多賊憤攻益力城陷身被數槊大罵賊支解之闔門遇害寇光化甫簿城知縣萬敬宗遂自盡賊義之城獲全鄉官韓應龍自縊死寇穀城知縣周建中亦殉節寇均州知州胡承熙被執不屈與其子爾英俱死承熙有能聲遷刑部員外郎未行遇難寇鄖陽同知劉璇死之寇保康知縣萬惟壇與妻李氏死之寇荆門攝州事承天府同知盧學古誓死守學正張郊芳訓𨗳程之竒亦盟諸生亍大成殿佐城守賊環攻四日無援城陷學古罵賊不絶口剖腹而死郊芳之竒亦不屈死州同知沈方一門十八人皆遇害賊既陷荆門遂合兵向荆州巡撫陳睿謨急渡江入城奉惠王常潤南奔監司以下皆奔士民遂開門迎賊湘陰王儼鏟遇害訓𨗳撖君錫正衣冠坐明倫堂賊至欲屈之詬罵死賊大索縉紳故相張居正子尚寶丞允修不食死户部員外郎李友蘭不屈死諸生王維藩率妻朱氏及二女避難為賊所掠令妻女赴井死遂見殺諸生王圖南被執罵死夷陵鄉官李雲以城陷不屈執至江陵乃絶食死歸州千户吕調元率部卒格鬬陷重圍中招之降大罵亂刃下賊勢大熾所至輒摧破前巡撫宋一鶴乃急趨承天護獻陵柵木為城賊忽大至積薪燒之烟罩純德山城穿一鼓而登盡毀禋殿守陵巡按御史李振聲總兵官錢中選皆降自成欲發獻陵陵中有聲振山谷懼而止質實王揚基潜山人蔡思純官羅平知縣宋大勛官福建通判陳美字在中新建人田世福陽城人郭裕清江人萬敬宗南昌人韓應龍官長蘆鹽運使周建中秦州人胡承熙歙縣人劉璇永平人萬惟壇曹縣人盧學古夏縣人張郊芳黃縣人程之竒黃岡人沈方桐鄉人陳睿謨武進人湘陰王儼鏟遼簡王植第十一子貴焨于永樂二十二年始封湘隂儼鏟其八世孫也撖君錫字賔王絳縣人李雲官潁州知州有惠政州人建祠祀之謝事歸大書名義至重鬼神難欺二語于牖以自警竟殉節如其志蔡本朝乾隆四十一年追諡陳美忠烈盧學古烈愍思繩宋大勳萬敬宗韓應龍周宗建胡承熙劉璇萬惟壇沈方張允修李友蘭李雲節愍田世福等並入祠御定資治通鑑綱目三編卷三十八
