body:
  text: 起癸酉明神宗萬厯元年盡辛巳明神宗萬厯九年凡九年癸酉神宗顯皇帝元年春正月男子王大臣入乾清宫尋伏誅大臣浙中傭奴以浮蕩入都僞為內侍服與宫中小竪交昵竊其牌帽巾服入乾清宫為守者所執詔下東厰究問馮保欲緣此以陷高拱令家人辛儒飲食之納刃其袖中俾言拱怨望與太監陳洪謀大逆遂發縱騎馳械高氏奴圍拱里第張居正亦請詰主使舉朝洶洶謂且逮拱吏部尚書楊博左都御史葛守禮詣居正力解居正憤曰二公意我甘心高公耶奮入內取厰中揭帖投博曰是何與我揭帖有居正竄改四字曰厯厯有據守禮識居正手跡笑納諸䄂居相正覺曰彼法理不請我為易數字耳守禮曰回天非公不能居正奏緩其獄博陰囑錦衣怵大臣吐實又以拱僕雜稱人中令大臣識别茫然莫辨也㑹帝命守禮偕錦衣都督朱希孝㑹鞫大臣疾呼曰許我富貴乃搒掠我耶且我何處識高閣老馮家僕教我希孝不敢鞫而罷保懼以生漆酒瘖大臣移付法司坐斬拱獲免由是舉朝皆惡保而不肖者多因之以進矣臣時上疏言深逺之慮當謹于微九重邃深而王大厯門抵宫寂無簡察此豈細故其內宦及守衛員投應從究治報可質實葛守禮字與立德平人朱希孝成國公朱能五世孫二月御經筵從張居正等請也一日講畢帝問建文果出亡否居正曰國史不載但故老相傳披緇雲逰題詩于田州有流落江湖四十秋句帝太息命録詩進居正曰此亡國之事不足觀也請録皇陵碑及高祖御製集以上見創業之艱聖謨之盛發明建文出亡之事本屬疑信相參金川門之變闔宫自焚明實録謂中使出其尸于火越七日備禮葬之而永樂時遣使四出以訪張三丰為名踪跡建文則是成祖亦疑其或有出亡之事也至正統五年僧楊行祥詭稱建文按問致罪而野史紛紜猶有老佛取入西內之說蓋由成祖篡取大位致令建文失國亡身而又革除年號慘戮忠良人心不能無憾而宫中火起又不能實指其所終于是世俗相傳遂謂披緇雲遊題詩所在是特不忍建文之亡國而不知其說之無据也惟是革除之事在成祖本屬逆施後嗣自應更定神宗間流落江湖之句即為太息命録詩以進慨焉有動于中居正或即可因此為之表白幽潜續封加諡禮亦宜之且與恤録建文時死節諸臣之舉正相承接乃僅以泛常規勉之詞申保治思艱之大旨而姑置建文逸事于不答雖有王祖嫡等請復年號之虛文而一杯麥飯莫由下等齊民致使終明之世廟諡缺焉豈不大可惜哉三月詔舉將才張居正進講帝鑑圗說至漢文帝勞軍細栁事因奏曰古人言天下雖安忘戰必危今承平日久武備廢弛文吏箝制辨員不啻奴𨽻夫平日既不能養其鋒鋭之氣臨敵何以責其折衝之勇嗣後將帥忠勇可任者宜假以事權俾得展布庶幾臨敵號令嚴整士卒用命于是乃詔內外官各舉將才質實帝鑑圖說自堯舜以來有天下之居擇其善可為法者八十一事惡可為戒者三十六事每事各繪一圖後録傳記本文附直解于後取唐太宗以古為鑑之義名曰帝鑑圖說隆慶六年十二月張居正吕調陽所撰進也夏四月旱諭有官修省釋重囚六月振淮安災淮安大水發米六萬石振之秋九月振荆州承天及濟南災以湖廣荆州承天二府水災異常山東濟南府旱荒各行蠲折振濟以方逢時總督宣大軍務始逢時與王崇古共決貢市之議及崇古入理京營張居正薦逢時代之遂起逢時故官以兵部右侍郎總督宣大山西等處軍務至則申明約信邊境以安四川都掌蠻平成化初都掌蠻亂尚書程信襄城伯李瑾討平之隆慶末復亂其酋阿大阿二方三等據九絲山僭稱王剽逺近其山修廣而四隅峭反東北則雞冠嶺都都寨凌霄峯鼎峙相連峻壁皆數千仞有阿苟者居凌霄城為賊耳目威儀出入如王者時總兵官劉顯被劾巡撫曽省吾奏留之屬以軍事又起故將郭成安大朝為之佐調諸土兵合官軍凡十四萬人往討官軍集叙州誘執阿苟攻拔凌霄進逼都都寨三酋遣其黨阿墨固守官軍頓匝月鑿灘以通漕餉擊斬阿墨拔其寨阿大自守雞冠寨顯令人誘以官而分兵為五哨盡壁九絲城下乘無備夜半腰絙上斬關入遲明諸將畢至阿二方三走保牡豬寨郭成破雞冠獲阿大諸軍攻牡豬禽方三阿二走追獲于貴州凡克寨六十餘獲賊魁三十六俘斬四千六百級拓地四百餘里録功進顯都督同知已而勦餘孽復俘斬千五百有竒顯復擊西川番斬其首惡撫餘衆而還西陲以寧質實九絲山在叙州府興文縣東南山箐峻深周圍三十餘里上有九岡四水極廣可以播種下惟一徑鳥道可通自宋元以來常為都掌蠻依阻之地至是據為巢穴賊既平遂改九絲城為平蠻城置官兵戍守其相近有雞冠寨又有石頭大寨牡豬寨都都寨諸處都都寨地袤廣為九絲左臂凌霄峰最高險有城為九絲門戶賊平改凌霄曰拱極雞冠日金雞曽省吾鍾祥人郭成四川叙南衛人先以被劾罷歸至是起用充為事官冬十一月立章奏考成法初諸司章奏部院覆行撫按勘者常稽不報至是張居正言近年來章奏繁多各衙門題覆無虛日然敷奏雖勤而實效蓋鮮請申成憲先酌量道里逺近事情緩急定程限立文簿月終注銷撫按稽遲者部舉之部院容隱欺蔽者六科舉之六科容隱欺蔽者閣臣舉之月有考嵗有稽則名必中實事可責成從之自是政體為肅十二月振遼東災以遼東廣寧錦州義州海州諸處旱災米價騰貴發太倉銀三萬兩振濟軍士朵顔察克圖犯塞總兵官戚繼光擊擒之自諳逹欵塞西鄙烽火寂然獨土默特徙居察罕地控弦十餘萬常為薊門憂泰寧朵顔諸部皆與交通時叛時服是年春朵顔部長董呼哩及兄子長安人犯喜峯口繼光擊敗之董呼哩乃欵關請貢至是董呼哩之弟察克圖復入冦繼光擒之于是董呼哩長安率部長親族三百人叩關請死董呼哩服素衣叩頭乞赦察克圖繼光遣將受降皆羅拜獻還所掠邊人攢刀設誓乃釋察克圖許通貢如故繼光在鎮十六年邊備修飭薊門守甚固敵無由入盡轉而之遼故李成梁獨擅戰功質實察罕今察哈爾明時曰察罕在遼東口外官本朝移其部衆于宣大近地分為八旗設佐領等管轄察克圖舊作長秃察罕舊作插漢董呼哩舊作董狐狸長安舊作長昻今並改甲戌二年春正月召見朝覲亷能官于皇極門張居正言太祖時每遇外官來京奏事常召見賜食訪民間疾苦雖佐二雜職有亷能愛民者亦特差行人齎敕奬諭或封內醪金幣以賚之逮宣順成𢎞間亦間舉宴賞之典兹當考察之初宜敕禮部倣舊典具儀注以上于是帝乃御皇極門引見朝覲亷能官浙江左布政使謝鵬舉等二十員面加奬勵並賜銀幣酒饌質實謝鵬舉蒲圻人二月振四川被冦諸縣巡撫曽省吾言高長筠珙諸縣被都掌蠻荼毒最深請蠲免錢糧仍動支軍前支剩米豆四萬振濟從之質實高縣本夜郎地唐置高州明改縣長寧漢犍為郡漢陽江陽二縣地隋置瀘川縣唐置長寧州宋政和中為長寧軍明為縣筠連唐置筠連州明為縣珙縣唐置鞏州明玉珍時改為珙州明為縣四縣明並屬叙州府今皆因之福建地震長汀縣夜地震至三更地裂成坑陷沒民屋四十餘間質實長汀晉新羅縣唐開元中析置長汀縣宋治平中始遷于今縣治明汀州府治今因之夏四月詔內外官行久任法吏科給事中張楚城言請諸司行久任法知縣厯俸六年乃升取知府知州厯俸六年乃升遷間有才不宜于官官不宜于地者聽撫按官量行更易其藩臬二司參政參議等官陛遷約以三年在京科道部曹升司寺約以六年下吏部議張居正善而行之由是藩臬守令皆得自展質實張楚城江陵人秋七月淫雨昭陵地陷八月振山西災山西應州朔州山陰馬邑大同等縣安東中屯山陰陽和髙山等衛各報災歉命蠲振有差質實大同遼置縣明大同府治今因之安東中屯衛在應州東北山陰守禦千户所在山陰縣東陽和衛在大同府東北高山衛在大同府西淮揚徐河海並溢兩淮運司所屬吕四等場大旱之後惡風暴雨江海驟漲人畜淹沒廬舍傾圮廩鹽漂蕩流離饑饉徐州揚州等處積雨海嘯河溢各蠲振有差質實吕四場在高郵州東百二十里俗傳以吕仙四至此而名其通海處曰新河亦曰新港冬十月决囚嘉靖季年崇奉元修又好祥瑞遇事輒停刑至是審録重囚至四百餘人張居正言縱釋有罪無以懲惡請如祖宗舊制每嵗一决囚從之時承平久羣盜蝟起至入城市劫府庫有司恆諱之居正嚴其禁匿弗舉者雖循吏必黜得盜即斬决有司莫敢飾情盜賊為衰止乙亥三年春正月徙遼東六堡遼陽鎮東二百餘里舊有六堡其地不毛與遼陽聲援不接李成梁請移建孤山堡于章齊哈剌甸險山堡于寬甸沿江新安等四堡于長甸長嶺諸處仍以孤山險山二參將戍之其地並據膏腴扼要害可拓境七八百里益收耕牧之利廷議從之于是撫順以北清河以南皆遵約束質實孤山堡在遼東都指揮使司之東南險山堡亦在司東南並嘉靖二十五年置沿江堡在險山堡之南新安堡亦在司之東南皆設險處長甸亦在司東南有堡長嶺在蓋平縣東南章齊哈喇甸在遼陽東南亦曰新甸寬甸亦在遼陽東南長甸長嶺又俱在寬甸南章齊哈喇舊作張其哈喇今改二月詔南京官不必備諭吏部南京職務清簡官不必備先朝有人兼掌六部者以後員缺不係緊要不必一一推補發明周書稱官不必備者蓋以三公論道非其人莫能屬非謂百司庶職皆可虛設名位而不必備其官也明之南京諸職事固為簡約然既有部司之設即不可一日無官使果職無所掌官多冗濫廩祿既有虛糜則當量裁原額缺有其人俾足經理庶司斯可矣今概云不必一一推補則致設其官復虛其缺是將懸好爵以炫聽聞矣豈核實官吏之道耶神宗初政已苟且如是宜其末年內外官吏或懸缺經時或人兼數職朝常闕略政務廢弛識者謂此詔實有以啓之耳始命日講官記起居注翰林院編修張位言前代皆有起居注而本朝獨無臣備員纂修竊見先朝政事自非出于詔令形諸章疏悉湮沒無考鴻猷茂烈鬱而未章徒使野史流傳以僞亂真今史官充位無以自效宜日分數人入直凡詔旨起居朝端政務皆據見聞書之為他年實録之助于是大學士張居正議曰國初設起居注官日侍左右紀録言動實古者左史記事右史記言之制逮後定官制乃設翰林院修撰編修檢討等官蓋以記載事重故設官加詳原非有所罷廢但自職名更定之後遂失朝夕記注之規以致纍朝以來史文闕略邇者纂修實録臣等祗事總裁凡所編輯不過總集諸司章奏稍加刪潤櫽括成編至于伏前柱下之語章疏所不及者即有見聞無憑增入與夫稗官野史之書海內所流傅者欲事采録又恐失真是以嘉謨嘉猷實多所未備凡此皆由史臣之職廢而不講之所致也今宜申明史職以復舊制令日講官日輪一員専記注起居兼録聖諭詔敕册文等項及內閣題稿其朝廷政事見于諸事章奏者俱選年深學優之史官六員専管纂修事分六曹以吏戶禮兵刑工為次每人専纂一曹俱在館供職不得别有差遣凡遇常朝御皇極門即輪記事官侍班居文武第一班之後近上便于觀聽即古螭頭載筆之意也從之質實張位字明臣新建人夏四月己巳朔日有食之既帝感日食之變于宫中製牙牌手書十二事鋟其上曰謹天戒任賢能親賢臣逺嬖佞明賞罰謹出入慎起居節飲食收放心存敬畏納忠言節材用所至即懸座古以自警張居正因奏此數言者雖因天變自警其實修身治天下之道畢具于此終身行之可也因逐句發明其義且曰知之非艱行之惟艱自今上所行與所書有未合者許令左右得執牌以諫帝嘉納之發明感日食之變製牙牌書十二事以自警神宗是時年甫十三耳所書皆帝王修身為政當法當戒之事其于古人書屏銘座義豈有殊即居正因事納牖且許令左右執牌以諫未始非將順之道及考其初年委任居正中晚以後庶務日以隳廢堂亷日以暌隔黨援門户之習囂然不靖明代綱紀之弛未有過于神宗朝者則是與牌書條件一一背馳幾若反其道而用之將前之手書懸置座右者徒為粉飾務名之舉矣又安知鋟牌一事非居正當日條列以進俾博虛譽而美觀聽固宜其不克終也歟五月淮揚大水詔察有司貪酷老疾者先是元年二年間徐州淮揚等處數被水灾撫按官俱以蠲振請戶部議令撫按官選委賢能官從公踏勘分别輕重以慿酌處又言淮揚等處蠲振所費錢糧總計應徵并發去者無慮五六十萬國家經制各有正項非専一方雖緩急之勢當知而無已之求難繼且救荒無竒䇿求其䇿之善者全賴有司先之以儉靜不擾次之以就地設法故有富弼則青州不為災有蘇軾則杭州不能困若無先事之備而徒仰給于內帑不惟緩不及事以天下之大盡內帑亦不足給矣帝乃下詔曰近來淮揚地方無嵗不奏報災傷無歲不蠲免振濟若地方官平時著實經理民事加意撙節多方設備即有災荒豈至束手無措今為官者本無實心愛民只虛文了事一遇水旱即委責于上事過依舊因循不理豈朝廷任官養民之意因令吏部查兩府被災地方有司有貪酷害民及衰老無為者黜之六月浙江海溢杭州嘉興寧波紹興四府海潮沸溢湧高數丈人畜淹沒大小戰船擊壞漂散者無算秋八月以張四維為禮部尚書兼東閣大學士預機務張居正當國四維嵗時饋問居正不絶居正請增置閣臣引薦四維遂入贊機務故事入內閣者曰同某人等辦事至是詔曰隨元輔等入閣辦事隨元輔三字帝親批也于是四維恂恂若屬吏然不敢以同僚自處隨居正後拜賜進官而已質實張四維字子維蒲州人河決碭山南畿大水河決碭山而北淮決高家堰而東高郵洞亦決清水潭口淮城幾沒徐邳山陽南北漂蕩千里河道淤淺阻漕者數年初孝宗時漕臣白昻以運舟經甓社湖觸岸輒壞乃開復河于高郵隄東以避其險長四十里名曰康濟河至是湖水決漕臣吳桂芳改桃康濟越河修復老隄河成名曰宏濟遂為永利質實山陽漢射陽縣地晉置縣以境內有山陽津而名明屬淮安府今因之高郵湖在髙郵州西北天長以東之水俱滙此逹于運河清水潭口在高郵州北三十里老隄洪武九年所築湖隄即西隄也其康濟河即故東隄孝宗時白昻于隄東越民田三里鑿康濟河通餉避湖謂之東隄其捍隔民田者為中隄至是修復老隄改挑越河于是廢東隄築中隄以便牽挽云吳桂芳字子實新建人九月禮部尚書萬士和罷士和初官庶吉士以忤嚴嵩改部曹纍任按察布政使並著清節及官尚書多所條奏時張居正欲越例贈朱希忠王爵馮保為方士求官士和俱力持不可又給事中余懋學以言事得罪士和言直臣不當斥由是積忤居正給事中朱南雍承風劾之遂謝病歸至居正沒起南京禮部尚書引年不赴卒諡文恭質實余懋學字行之婺源人言事得罪張居正進白燕白蓮頌懋學以帝方憂旱下詔罪已與百官圖修禳而居正顧獻瑞非大臣誼抗疏論之已而復陳崇惇大親謇諤慎名器戒紛更防佞諛五事時居正方務綜核以為風已遂斥為民居正死起懋學故官朱南雍浙江山陰人冬十月京師地震先是九月京師地震至是再震丙子四年春正月下巡按遼東御史劉臺于獄除名為民時御史在外每凌巡撫張居正欲痛抑之事小不合詰貴隨下又飭其長加考察以故言路多不平㑹臺奏遼東大捷居正以巡按不得報軍功劾臺違制妄奏引故事繩督之臺遂抗章劾居正専擅威福如逐大學士高拱私贈成國公朱希忠王爵引用張瀚張四維為黨斥逐言官余懋學傅應禎等岡上行私橫黷無厭居正怒甚具疏辭政入見帝言言者謂臣擅威福而臣所行正威福也將巽順以恱下邪則誤國將竭忠以事上邪則無以逃専擅之譏因俯伏泣不能起帝為下御座以手掖居正曰先生起吾逮臺竟其事遂下臺詔獄命廷杖百逺戍之居正陽具疏救乃除名為民久之復用他事戍潯州未幾飲于戍主所歸而暴卒為臺巡按遼東時與巡撫張學顔不相得至是學顔户部誣臺私贖鍰居正屬御史于應昌巡按遼東核之而令王宗載巡撫江西亷臺里中事應昌宗載希居正意實其事以聞遂戌之後御史江東之頌臺寃詔復官天啓初追諡毅思質實劉臺字子畏安福人引用張瀚瀚字子文仁和人先是吏部尚書楊博罷時廷推葛守禮次朱衡次瀚居正惡守禮戅厭衡驕乃拔用瀚瀚資望淺忽見櫂舉朝益趨事居正而瀚進退大臣率奉居正指輿論多民不協黜逐傅應禎禎字公善安福人疏陳重君德蘇困開言路三事言邇者雷震端門獸吻京師及四方地震叠告曽未聞發詔修省豈真以天變不足畏邪真定抽分中使本非舊典正統間嘗暫行之先帝納李芳言已詔罷遣而陛下顧欲行失德之事豈真以祖宗不足法邪給事中朱東光奏陳保治初非折檻解衣者比乃竟留中不報豈真以人言不足恤邪此三不足者王安石以之誤宋不可不深戒也陛下即位初自隆慶改元以前逋租悉賜蠲除四年以前免三徵七恩至渥也乃上軫恤已至而下延玩自如小民一嵗之入僅足給一嵗無遺力以償負也近乃定輸不及額者撫按聽糾郡縣聽調諸臣畏譴督趣倍嚴致流離接踵怨咨愁歎上徹于天是豈陛下所樂聞者哉請下明詔自非官吏乾沒並曠然除之民困既蘇則災沴自弭陛下登極初召用直臣石星李己臣工無不慶幸近則趙參魯糾中涓而謫為典史余懋學陳時政而錮之終身他如胡致禮裴應章候於趙趙煥等封事纍上一切置之如初政何臣請擢參魯京職還懋學故官為人臣進言者勸疏入居正以疏中王安石語侵己大怒調旨切責下獄杖戌未幾召還張學顔字子愚肥鄉人江東之字長信歙人二月開草灣河督漕侍郎吳桂芳上言淮揚洪潦奔衝緣海汊港久湮入海止雲梯關一徑致海擁橫沙河流泛濫而鹽安髙寶屢成巨浸國家轉運惟知急漕而不暇急民故朝廷設官亦主治河而不知治海今黃河衝決駸駸欲奪安東以入海請于草灣低窪之地挑新口以迎大溜安東衆流滙圍其勢垂陷不知委之以拯全淮廷議安東未可棄而命開草灣閲六月工竣水患稍平是時開草灣河至秋七月辛亥工竣其後通塞不時至十七年大河復由此分流奪正流十分之七凡六十里至安東縣南赤晏廟仍合正河質實雲梯關在山陽縣東北二百里大河北岸鹽安高實謂鹽城安東高郵寶應也夏五月命司禮太監馮保同法司録囚帝諭保曰兹當五年差官録囚恐輕重或有寃抑其㑹同三法司堂上官審録保于是㑹同尚書王崇古等以情可矜疑者減釋有差秋七月詔户部明年漕糧折收十之三從張居正請也先是漕舟以河決不時至已而漕運通居正以嵗賦逾春發水橫濫非决即涸乃采漕臣議督艘卒以孟春兊運及嵗初畢發少罹水患行之久太倉粟充盈可支十年八月帝視國子監以雨免進講賜張居正等扇銀葉各有差河決崔鎮是年二月以後江北旱河水斷流至是徐豐沛睢寧金鄉魚臺單曹八州縣河又大決田廬漂沒無算河流齧宿遷城吳桂芳請遣縣治築土城以避之明年復決而北清口淤墊全淮南徙瀰漫山陽高寶間㑹河向桃源三義鎮入老黃河故道淮水乘虛入清口老黃河復塞質實崔鎮在桃源縣西北三義鎮在桃源縣東舊名三汊鎮明史河渠志黃河自桃源三義鎮厯清河縣北至大河口㑹淮入海是為老黃河至嘉靖初三義鎮口淤而黃河改趨清河縣南與淮㑹于是大河口故道遂廢冬十月振徐州災從巡撫吳桂芳請也以河決徐州及豐沛睢寧金鄉魚臺單曹七縣皆被災蠲免漕米并動庫銀振之丁丑五年春正月詔鳯陽淮安營田鳯陽淮安二府土廣人稀加以水災民半逃亡二千里皆成灌莽巡撫御史邵升條上營田九事以為勞來安定之計從之質實邵升餘姚人營田九事一曰處財用欲于淮北淮南嵗掣鹽引每引帶鹽十斤納銀五分增淮安諸關處所擁稅二曰防欺隱謂開墾之弊百出在官預圖卸責有揑未荒為久荒未逃為久逃者在民巧為干澤有拋熟以為荒暫避以為逃者甚或以民地為官以甲産為乙必先逐里逐戶彼此交質將空閒官地人荒近荒民地見在人户久逃近逃人户分為六則俟流民之來歸者按籍授田既佃之後原主不得告訐則奸弊無所容矣三曰廣招徠謂凡因水旱迫而逃者一切許其歸附原籍給以居室地土而官府之逋缺糧里之包賠債主之責償仇家之訐告槩置不問四曰開溝洫謂鳯陽淮安之民慵惰相習耕犂欹斜無復畛界撒種其中不幸水旱有束手枵腹而已須相度其地孰為水勢入河之所而疏之以使其不積孰為衆水趨淮之區而瀦之以浸其下流大都百畝之地割為一區周遭為渠內開小溝而皆通于澤以入于河潦則委百畝之水于衆溝旱則運衆溝之水于百畝所謂天時不能使之害者此也五曰給牛種一夫授田五十畝兩家給一犍牛一家給一牸若㹀有生息責令報官以給後之招徠者種子每田一畝給粟一斗麥半之六曰備接濟凡來歸者皆令輸力于官官豫之食并量給其妻子至麥熟住支七曰緩征役凡招徠之民一年稔止取原種再稔乃還濟糧四稔乃征稅額五稔乃賦戶徭而又定為新集之制另立招復一籍科派俱各從輕詞訟量議寬貸候其生理漸興而後鄉社禮法次第可舉八曰勵司牧凡招墾有司嵗終舉劾六年被薦多破格超遷三年內經薦劾者非贓罪不革職成功一體升擢九曰均責成僉事駐劄兩郡之中不時巡行將招墾事蹟逐日登記年終繳查又擇鄉民之有心計者為農師以分理其事疏入詔撫按官督營田僉事著實舉行三年之後遣官閲實以行賞罰二月振廣西饑廣西饑命留上年事例銀振濟廣東羅旁叛猺平羅旁在德慶州上下江界東西兩山間延袤七百里成化中韓雍經略西山頗安輯惟東山猺阻深箐剽掠有司嵗發卒戍守兩廣總督殷正茂建議大征㑹遷去侍郎凌雲翼代至是雲翼乃大集兵令總兵官張元勳李錫將之四閲月克巢五百六十俘斬招降四萬二千八百有竒鄰境猺獞皆懼求撫雲翼奏改瀧水縣為羅定州設監司參將積患頓平質實羅旁梁置瀧州隋開皇十八年改瀧水縣明初亦曰瀧水縣其南有廢瀧水鎮舊為羅旁地猺人盤據于此至是乃改為直𨽻羅定州又設東安西寧二縣今皆因之上下江者上江謂西江下江謂南江西江即鬱水南江即瀧水也瀧水在羅定州西飛瀑驚湍最為險厄東西兩山者東山在肇慶府封川縣東西山在羅定州東安縣西南殷正茂字養實歙人凌雲翼字洋山太倉州人張元勳字世臣浙江太平人夏四月兵部尚書談綸卒綸沈毅知兵初守台州禦倭有功纍擢巡撫朝廷倚以辨賊遇警輒調居官無寧嵗後督師薊遼集兵三萬更徴浙兵三千専屬戚繼光訓練相度邊隘衝緩道里逺近分薊鎮為十二路路置一將互為掎角邊備大飭敵不敢入犯帝即位初進兵部尚書三疏乞歸不允至是卒贈太子太保諡襄敏綸先撫福建次撫四川進撫兩廣前後積首功二萬一千有竒嘗戰酣刃血潰腕纍沃乃脫綸終始兵事垂三十年與戚繼光共事齊名稱談戚秋閏八月乙酉朔日有食之陰雲不見九月張居正以父喪起復冬十月杖編修吳中行等謫戍有差居正父卒帝以手諭宣慰視粥止哭絡繹道路又與三宫賻贈甚厚然亦無意留之而居正自以握權久恐一旦去他人且謀已會所善同年戶部侍郎李幼孜欲媚居正首倡奪情議居正惑之馮保亦不欲居正去中旨令吏部尚書張瀚諭留居正居正乃陽上疏請守制而陰以牘風瀚覆旨瀚謬為不喻謂政府奔喪宜豫殊典禮部事也何關吏部居正復令容說之不為動乃傳旨責瀚久不奉詔無人臣禮勒致仕于是御史曾士楚吏科都給事中陳三謨倡疏請留和者相繼編修吳中行獨憤適彗出詔百官修省中行首上疏曰居正父子異地分暌音容不接者十有九年一旦長棄數千里外陛下不使匍匐星奔慿棺一慟必欲其違心抑情銜哀茹痛于廟堂之上而責以訐謨逺猷調元熙載豈情也哉即云起復有故事亦未有一日不出國門而遽起視事者祖宗之制何如也事繫萬古綱常四方視聽銷變之道無踰此者疏既上以副封白居正居正愕然曰疏進耶中行曰未進不敢白也明日檢討趙用賢疏入已而員外郎父穆主事沈思孝亦合疏言居正貪位忘親居正大怒謀于馮保欲廷杖之尚書馬自强曲為營解居正跪而以一手撫鬚曰公饒我公饒我學士王錫爵造居正喪次為之解居正曰聖怒不可測錫爵曰即聖怒亦為公語未訖居正勃窣下拜索刀作刎頸狀曰爾殺我爾殺我徑入不顧錫爵大慚趨出侍講于慎行田一俊張位趙志皋修撰習孔教沈懋學皆疏救格不入遂杖中行等四人謫戍進士鄒元標復上疏爭亦坐杖戍五人者直聲震天下南京御史朱鴻模馳疏救中行等五人并斥為民于是錫爵慎行一俊懋學先後移病歸詔遣居正子編修嗣修與司禮太監魏朝馳傳往代司喪禮部主事唐誥治祭工部主事徐應聘治喪居正請無造朝以青衣素服角帶入閣治事許之質實吳中行字子道武進人隆慶五年進士居正其座主也李幼孜應城人張瀚先附居正得掌吏部見非於世至是忤之去士論乃皆重瀚趙用賢字汝師常熟人中行同年進士艾穆字和父平江人沈思孝字純父嘉興人王錫爵字元馭太倉人于慎行字無姤東阿人田一俊字德萬大田人趙志臯字汝邁蘭溪人習孔教廬陵人沈懋學字君興宣城人是時中行等四人同日受杖畢校尉以布曳出長安門舁以板扉中行氣息已絶中書舍人秦柱挾醫至投藥一匕乃蘇刲去腐肉數十臠大者盈掌深至寸一肘遂空用賢體素肥肉潰落如掌其妻臘而藏之中行用賢即日驅出國門人不敢侯視穆思孝復加鐐鑽且禁獄越三日始僉解發戍許國方以庶子充曰講鐫玉杯一曰斑斑者何卞生淚英一英者何藺生氣追之琢之永成器以贈中行鐫犀杯曰文羊一角其理沉黝不惜剖心寧辭碎首黃流在中為君子夀以贈用賢鄒元標字爾瞻吉水人時觀政刑部憤甚視四人杖畢而疏上越三日受杖謫戍貴州都勻衛朱鴻模字文甫益都人居正死曽士楚當按蘇松憮然曰吾何面目見吳趙二公遂引疾去陳三謨擢太常少卿尋與士楚俱被劾削籍彗星見從東南方起長亘天人情洶洶指目張居正至懸謗書通衢帝詔諭羣臣冉及者誅無赦謗乃巳兵部尚書王崇古罷初諳逹諸部嘗越甘肅掠西番既通欵其從孫微辰台吉連嵗盜番不得志求諳逹西援崇古每作書止之是年諳逹請赴西海迎佛崇古上言西行非諳逹意且以迎佛為名不可沮宜飭邊鎮嚴守備而陰泄其謀於蕃族以示恩於是給事中劉鉉尹瑾等交章劾崇古弛防徇敵崇古奏辨因乞休去崇古身厯七鎮勳著邊陲封貢之初廷議紛呶有為危言以憾帝者閣臣力持之乃得成功自順義歸欵後二十年崇古乃殁諡讓毅質實劉鉉鄱陽人尹瑾東莞人改徹辰台吉舊作切盡台吉今十一月考察百官以星變命四品以上京堂官自陳庶官聽部院考察張居正自奪情後知天下不與已思以威權劫之時因考察百官趙志臯張位習孔教相繼遷謫南京僉都御史張嶽請令居正奪喪坐考察自陳貶秩禮部尚書何維柏亦以自陳免尚維柏于嘉靖時以劾嚴嵩得罪隆慶初復官纍遷書先是奪情議起詔吏部諭留尚書張瀚叩維柏維柏曰天經地義何可廢也瀚從之而止居正怒取旨停維柏俸至是罷之質實張嶽字汝宗餘姚人戊寅六年春二月以潘季馴總理河漕先是總河傅希摯欲塞決口吳桂芳主開老黃河故道議未決有言宜多濬海口以分水勢者㑹桂芳卒以季馴代之季馴乃上兩河經略疏曰水性就下以海為壑向因海壅河髙以致決隄四溢運道民生胥受其病故今談河患者皆以濬海為上䇿第海有潮汐茫無著足不得已而議他闢豈知海口視昔雖壅然自雲梯關四套以下濶七八里至十餘里深皆三四丈不等縱使欲另開鑿必須深濶相類乃便注放則工力艱巨必不能成矧未至海口乾地猶可施功及將入海之處則潮汐往來亦與舊口等耳且舊口積沙人力雖不可濬水力自能衝刷乃若新闢之地則土壤堅實不特人力難措而水力亦不能衝故海無可濬之理惟當導河以歸之海則以水治水即濬海之䇿也然河又非可以人力導也欲順其性先懼其溢惟當繕治隄防俾無旁決則水由地中沙隨水去即導河之䇿也顧頻年以來無日不以繕隄為事亦無日不以決隄為患何哉卑薄而不能支迫近而不能容雜以浮沙而不能久隄之制未備耳是以黃決崔鎮等口而水多北潰為無隄也淮決高家堰黃浦等口而水多東潰隄弗固也乃議者不咎制之未備而咎築隄為下䇿豈得為通論哉又有所未盡者上流既潰隄旁決至於下流復或岐而分之其趨於雲梯關正海口者譬猶强弩之末耳蓋徒知分流以殺其怒而不知水勢益分則其力益弱水力既弱又安望其能導積沙以注海乎故今日濬海之急務必先塞決以導河尤當固隄以杜決而欲隄之不決者必真土而勿雜浮沙高厚而勿惜巨費讓逺而勿與爭地斯堤可固也如徐邳桃清沿河各隄固矣崔鎮等口塞矣則黃不旁決而衝漕力専高家堰築矣朱家口塞矣則淮不旁決而㑹黃力専淮黃既合自有控海之勢又懼其分之則力弱也則必暫塞清江浦河而嚴司啓閉以防其內奔姑置草灣河而専復雲梯以還其故道仍接築淮安新城長隄以防其末流盡合黃淮全河之力涓滴悉趨於海則力强且専下流之積沙自去下流既順上流之淤墊自通海不濬自開河不挑而深此所謂固隄即所以導河導河即所以濬海也治河者必先求河水自然之性而後可施其疏築之功必先求古人已試之效而後可倣其平成之業黃水來自崑崙入徐濟運厯邳宿桃清至清口㑹河而東入於海此兩河之故道即河水自然之性也昔元嵗漕江南之粟由揚州直北出廟灣入海至永樂年間平江伯陳璌始隄管家諸湖通淮河為運道然慮淮水漲溢東侵淮郡也故築高家堰隄以捍之起武家墩經小大澗至阜寧湖而淮水無東侵之患矣又慮黃河漲溢南侵淮郡也故隄新城之北以捍之起清江浦沿鉢池山栁浦灣迤東而黃水無南侵之患矣尤慮河水自􅀈衝入不免泥淤故嚴啓閉之禁止許漕艘由閘出入匙鑰掌之都漕五日發籌一放是以淮郡晏然漕渠永賴而陳平江之功至今未泯也後因剝蝕既久隄岸漸傾水從高家堰決入一郡遂為魚鱉而當事者未考其故乃謂海口壅塞遂穿支渠以泄之蓋欲急拯淮民之溺多方為疏導之計詎知旁支暫開水勢陡趨正河遂至淤阻而新開支河濶僅二十餘丈深僅丈許較之故道不及三十分之一耳豈能容受全河之水下流既壅上流自潰此崔鎮諸口所由決也今新河尋復淤塞故河漸已通流雖深濶未及原河十分之一而兩河全下沙隨水刷欲其全後河身不難也河身既復靣濶者七八里狹者亦不下三四百丈滔滔東下何水不容若猶以為不足而欲另尋他所别開一渠恐人力不至於此也以臣等度之非惟不必另鑿一口即草灣亦須置之勿濬矣故為今之計惟有修復平江伯之故業高築南北兩隄以斷兩河之內灌而淮揚昏墊之苦可免堅塞桃源以下崔鎮口諸決而全河之水可歸故道淮黃二河並驅入海則沙隨水刷海口自復而桃清淺阻又不足言矣此以水治水之法也若夫扒撈桃濬之說僅可施之於他河耳黃河河身廣濶橯濬何期悍潡湍流器具難下前人屢試無功徒費工料徐州以南之工如此而已因條上六議曰塞決口以挽正河曰築隄防以杜潰決曰復閘壩以防外河曰創滚水壩以固隄岸曰止濬海工程以省縻費曰寢開老黃河之議以仍利涉帝悉從其請乃塞崔鎮等決口百三十丈築高家堰隄六十餘里歸仁集隄四十餘里栁蒲灣隄東西七十餘里自徐沛至淮揚間遙隄滚水減水壩閘無不修築逾年工成自後數年河道乃無大患質實武家墩在山陽縣西南鉢池山在山陽縣北歸仁集在徐州府宿遷縣南傅希摯衡水人立皇后王氏先是帝大婚届期慈聖太后將歸慈寧宫諭張居正曰吾不能視皇帝朝夕師保之責専恃先生尋以居正充納采問名副使吉服從事給事中李淶言大婚重典而使居正變服從吉於觀聼不宜乞别簡用不聼質實后餘姚人時以英國公張容充正使持節而居正捧制李淶字源甫雩都人以忤居正出為僉事三月以禮部尚書馬自强兼文淵閣大學士吏部侍郎申時行兼東閣大學士並預機務張居正請增置閣臣令居正推擇居正以自强有人望而時行又其所厚遂薦用之自强負抗直名素忤居正不自意得之頗德居正既入閣守位而已深時居正將歸葬父念閣臣在鄉里者高拱與已有隙殷士儋多援或乘問以出惟徐階老易與擬薦之自代已遣使報階既念階前輩巳還當位其下乃請增置閣臣質實馬自强字體乾同州人申時行字汝默長洲人張居正葬父歸夏六月還朝帝大婚後居正乞歸葬父許之召見于平臺居正奏言大婚之後宜撙節愛養留心萬幾因伏地而哭帝亦為哽咽墮淚乃賜帝賚忠良銀章如楊士竒張孚敬例得密封言事帝及兩宫賜賚慰諭有加禮遣司禮太監張宏供張餞郊外百僚班送敕吕調陽等有有大事勿専決馳驛之荆州聼居正處分㑹遼東報大捷帝復歸功居正使使馳諭俾定爵賞居正為條列以聞既畢葬且還朝居正上言母老不能冒災署請俟秋涼就道帝遣錦衣指揮翟汝敬馳傳往趣之而令中官護其母以秋日由水道行居正所過守臣率長跪撫按大吏越界迎送身為前驅道經襄陽王出候要居正宴故事雖公侯謁王執臣禮居正具賓主而出過南陽唐王亦如之及還京抵郊外詔遣司禮太監何進宴勞兩宫亦各遣大璫御賜八寶金釘川扇御膳餅果醪醴百僚復班迎入朝帝慰勞懇篤豫假十日而後入閣因引見兩宫及秋中官奉居正母行儀從烜赫觀者如堵比至帝與兩宫復賜賚加等慰諭居正母子幾用家人禮秋七月吕調陽罷調陽寰數寢疾不出小事四維代擬大事則馳報居正於江陵調陽內慚纍疏乞休及居正還遂致仕詔選內豎三千五百人命司禮監差官會同禮部揀選內豎三千五百七十名應用於是禮科給事中李天植上疏言陛下纘服初年允收馬安等三千二百五十人部覆永不為例今六載之中兩收數千幸門日啓覬澤者多儻得收回成命散此黨與上也不然裁取其半次也疏入報聞質實李天植廣德州人冬十二月高拱卒復其官拱家居數年及是卒張居正請復其官與祭葬如例馮保憾未釋中旨給半葬祭文仍寓貶詞初諳逹封貢拱力主王崇古議邊陲得以休息卒後久之廷議論拱功乃贈太師諡文襄封李成梁寧逺伯土默特與從父哈斯坦弟大小韋徵從弟諾木圖恭圖子布延臺珠爾從子歡臺吉及泰寧部長博斯呼綽哈等頻年入犯成梁屢擊却之論功世廕恩賚稠叠至是博斯呼綽哈糾土默特歡臺吉等以三萬餘騎壁遼河攻東昌堡深入耀州成梁遣諸將分屯要害以遏之而親提鋭卒出塞二百餘里斬其長九人餘首級八百四十捷聞帝告謝郊廟封成梁寧逺伯質實東昌堡在海州衛東南海州衛即今奉天府海城縣耀州遼置今廢故城在海城縣西南暖哈斯坦舊作黑石炭韋徵舊作委政諾木圖舊作土恭圖舊作拱土布延台殊爾舊作卜言台周博斯呼舊作把速亥綽哈舊作炒花今並改户部奏是嵗天下户口之數戶一千六十二萬一千四百三十六口六千六十九萬二千八百五十六明食貨志明代戶口之數增減不一其可考者洪武二十六年𢎞治四年及是年而已明初兵燹之後戶口顧極盛其後承平日久反不及焉所以減者周忱所謂或投倚於豪門或冒匠竄兩京或冒引賈四方舉家舟居莫可蹤跡也故宣宗嘗與羣臣論厯代戶口以為其盛也本於休養生息其衰也由土木兵戎云己邜七年春正月毁天下書院原任常州知府施觀民以科斂民財私創書院坐罪革職閒住是時士大夫競講學張居正特惡之盡改各省書院為公廨凡先後毁應天等府書院六十四處二月遣使分閲邊防分遣科道等官往各省察地方官有科斂及侈費者劾之夏四月張居正上雍肅殿針帝漸備六宫多宣索太倉銀購珠寶居正乃因戶部進御覽數目陳言謂每歲入額則減於舊所出則浮於前請量入為出罷節浮費因進雍肅殿針帝嘉納焉帝令工部鑄錢給用居正以利不勝費止之言官請停修武英殿工及裁外戚遷官恩數帝多曲從之一日帝御文華殿居正侍講讀畢以給事中所上災傷疏聞因請振濟復奏曰上愛民如子而在外諸司營私背公剝民罔上宜痛鉗以法而上亦當加意撙節於宮中一切用度服御賞賚布施裁省禁止帝首肯之質實雍肅殿針時帝以雍肅殿圍屏命輔臣撰詞居正因撰進雍肅殿針針曰北宸紫宫惟皇宅中身為民表心與天通斯須不和則乖戾起斯須不敬則傲慢叢念常生於所忽禍乃基于無窮是以聖人事心天命是敕欽厥止日謹萬幾處深宫心周八極不以嗜欲滑和不以逸豫滅德無作好無作惡藹藹熙熙如春時煦無荒色無荒禽競競惕惕如淵斯臨勿謂燕閒人莫子觀一喜一怒作人燠寒絃急者絶氣平者安優優和衷為君實難勿謂宥密人莫子弼一動一言恆為度律危懼則存驕泰則失昭昭神明相在爾室在昔成周宇內太和繇雍雍其在宫發琴瑟而不頗亦曰懿恭小民懷保繇肅肅其在廟克對揚于祖考我皇濬哲是謂智臨匪高明之不足貴育德于靜深我皇撫運是謂開泰匪豐亨之未臻懼此心之或汰藥以平其情雖鍾簴不設而若聞希聲然後心和氣和而天下平禮以飭其志雖升降未施而若持重器斯謂無逸乃逸而天下治故曰沖和者養威淡泊者養祿危厲者養安留勞者養樂以古為師于何不儀平平周道惟皇所之以心為鑑于何不見穆穆文王惟皇所憲朽索在手勿謂無傷覆車在疆睫奈何弗防和不見流敬不可忘慎終如始萬壽無秋七月振蘇州災蘇州水災撫按官請先行賑濟隨賜蠲免從之京師地震一日凡冉震八月減均徭加派明初役法有里甲均徭雜泛三等以户計曰甲役以丁計曰徭役上命非時曰雜役皆有力役有雇役府州縣驗冊丁口多寡事産厚薄以均適其力自嘉靖以來行一條鞭法一條鞭者總括一州縣之賦役量地計丁丁糧畢翰于官一嵗之役官為僉募力差則計其工食之費量為增減銀差則計其交納之費加以增耗凡額辦派辦京庫嵗需與存留供億諸費以及土貢方物悉併為一條皆計畝徵銀折辦于官故謂之一條鞭其法無他科擾而民力亦不大絀顧稱簡便然諸役冗費名罷實存有司追徵如故百姓苦之至是詔減銀一百三十萬有竒庚辰八年春二月辛未朔日有食之帝耕藉田以耕藉禮成賜公卿等銀幣有差三月帝奉兩宫太后謁陵天夀山行春祭禮也張居正等扈行賜銀幣有差免所遏田租張居正乞罷詔慰留之居正扈帝謁陵歸具疏乞休中云拜手稽首歸政凡再上帝慰留懇切最後手書稱慈聖口諭先生親受先帝付託豈忍言去俟輔爾嵗至三十而後商處先生母復興此念居正乃出時帝顧居正益重賜札稱元輔或稱先生或又稱元輔張少師先生待以師禮而居正奏謝亦儼然自負為帝者師初居正子敬修嗣修懋修先後領鄉薦帝改元之二年敬修㑹試不第居正怒因停是科館選至五年嗣修遂以第二人及第至是年復届㑹試懋修敬修皆中式㑹居正方乞休遂特擢懋修第一人及第是時輔臣吕調陽張四維申時行之子亦皆先後成進士御史魏允貞疏陳時弊請自今輔臣子弟中式俟致政之後始許廷對庶幸門稍杜允貞因是謫官于外然自是輔臣居位其子無復登第者矣夏四月迤東都督王兀堂冦邊李成梁擊敗之兀堂通市寬甸怨邊將强抑市價數遣騎冦邊犯靉陽及黃岡嶺指揮王宗義戰死遂入永甸堡成梁擊走之追出塞斬首八百餘級盡毁其營壘至秋復犯寬甸副將姚大節又破之兀堂由是不振質實靉陽堡在遼東都指揮司東南鳯凰城北永甸堡在鳯凰城東振兩淮災以兩淮各竈場饑命撫按官賑濟又以江北等處連次告饑命支銀田營并各倉貯粟賑之户部言有司積榖賑荒先年立法俱止於州縣不知各府為州縣表率亦當照例存積以備賑濟從之六月南畿大水先是鳯陽等處雨潦淮溢水薄泗城且至祖陵墀中淮御史陳用賓以聞給事中王道成因疏言黃河未漲泗之間霖雨偶集而清河口已不能容泄宜令河臣設法疏導堵塞從之質實王道成巴縣人秋七月後軍都督府僉事俞大猷卒先是大猷以平古田獞功進世廕已為巡按御史所劾回籍聽調久之復以都督僉事起僉書後府事領車營訓諫三疏乞歸卒贈左都督賜祭葬諡武襄武平崖州饒平皆為立祠大猷少好易嘗以易推衍兵家竒正虛實之權謂兵家之數起五猶一人之身有五體雖將百萬可使合為一人也初為汀漳守備涖武平作讀易軒與諸生為文㑹一日教武士擊劒及為大將持身亷馭下有恩揚厯東南大小百十餘戰所向無不勦滅威名震南服其用兵先計後戰不貪近功忠誠許圉老而彌篤談綸嘗與書曰節制精明公不如綸信賞必罰公不如戚精悍馳騁公不如劉然此皆小知而公則堪大受戚謂戚繼光劉謂劉顯也其為綸所推重如此質實饒平明成化十四年置縣屬潮州府今因之冬十月汰冗官協理京營兵部尚書楊兆以有詔令本部侍郎帶管疏辭協理帝命其供職候裁仍敕吏部核兩京大小九卿及各屬有冗濫者裁之並核各省徭賦及諸司冒濫冗費皆從張居正請也已而吏部核議各部員外郎主事以下應裁者歸併兼管令在任候裁戶部核議鳯陽營田僉事各員應裁者歸併所轄州縣後議裁革北直𨽻保定等府同知通判以下官五十五員應天福建倉大使等四十六員浙江布政使司都事等官二十員江西陜西延綏鄖陽等處司府州縣佐二雜職等官三十員南贛貴州司府縣驛等官十員南京中左二府錦衣衛各僉書大教埸等營把總八員振蘇松常鎮四府饑四郡並災命將漕糧倉糧屯糧各酌量改折常熟吳江長洲崑山四縣被災尤甚以餘剩兵餉并發贓罰銀分振之十一月度民田初建昌知府許孚逺始為歸戶册以田從人法簡而密後張居正議天下田畝通行丈量遂用開方法以徑圍乘除畸零截補於是豪猾不得欺隱里甲免賠纍而小民無虛糧總計田七百一萬三千九百七十六頃視孝宗時嬴三百萬頃居正頗以溢額為功有司短縮步弓以求田多或掊克見田以充虛額後遂按溢額增賦失時戶部議丈量田條為八欵一明清丈之例謂額者丈全則免一議應委之官以各右布政使總領之分守兵備分領之府州縣官則専管本境一復坐派之額謂田有官民屯數等糧有上中下數則宜逐一查勘使不得詭混一復本徵之糧如民種屯地者即納屯糧軍種民地者即納民糧一嚴欺隱之律有自首厯年詭占及開懇未報者免罪首報不實者連坐豪右隱占者發遣重處一定清丈之期一行丈量磨算之法一處紙劄供億之費俱從之質實許孚逺字孟中德清人發明丈量田畝俾豪猾之欺隱者無以行其奸里甲綜代輸者不至滋其纍未常非除弊之善政顧一有溢額為功之心則除弊者適以滋弊以居正之綜核豈不知天下田畝自冇定數何至自孝宗以來上下未百年問贏餘竟至三百萬頃之多是由居正務以溢額為心遂至不問其額之何以溢為有司者亦惟知迎合意旨而不及丈溢一時賦加永久之為纍至有短縮步弓暗增浮額以快其多功之心者上下相䝉良法専為弊政昔王成僞增民戶史傳猶且譏之一郡且然况以遍于天下夫使田畝徒益虛名而民生致被實害又豈大臣為國之誼哉詔內官並自陳斥逐有差帝即位初慈聖太后遇帝嚴太監馮保倚太后勢數挾持帝帝甚畏之時與小內監戲見保入輒正襟危坐曰大伴來矣所昵孫海客用為乾清宫管事牌子屢誘帝夜遊别宫小衣窄袖走馬持刀又數進竒巧之物帝深寵幸保白太后召帝切責帝長跪受教惶懼甚保屬居正草帝罪已手詔頒示閣臣詞過抑損帝年已十八覽之內慙然迫于太后不得不下居正乃上疏切諫又緣保意劾去司禮巨璫孫德秀溫泰等而令諸內侍俱自陳凡保所不悅者斥退殆盡帝由是漸惡保并亦嫌居正矣保竊權肆橫間亦時引大體內閣産白蓮翰林院有雙白燕居正以為瑞進之保使使語居正曰主上冲年不可以異物啓其玩好保又頗能約束其子弟不敢肆惡人亦以是稱之然保性貪其私人錦衣指揮徐爵內官張大受恃勢招權利居正使蒼頭遊七興爵結為兄弟交關語言凡有所謀皆緣以達焉先是上夜宴宫中為近侍孫海客用所惑杖二內使幾斃慈聖皇太后聞之不樂訓戒甚切上悔悟即諭內臣曰孫海客用凡事引誘朕無所不為令安置南京以後但有此等小人即同舉名來奏仍命文書房官宣示閣臣張居正等謂降黜未盡其辜宜發充淨軍上從之次日居正等回奏曰自聖上臨御以來講學勤政聖德日新乃數月之間仰窺聖意所向稍不如前微聞宫中起居頗失常度但臣等身隔外庭未敢輕信而朝廷庶政未見有缺故不敢妄有所言然前者恭侍日講亦曽舉益者三樂損者三樂益者三友損者三友兩章書語云樹德務滋除惡務盡其各監等官俱令自陳老成亷慎者存之諂佞放恣者汰之且近日皇穹埀象彗芒掃宦者四星冝大行掃除以應天變臣又聞漢臣諸葛亮云宫中府中俱為一體陟罰臧否不宜異同臣等待罪輔弼宫中之事皆冝與聞此後不敢以外臣自限凡皇上起居與宫壺內侍但有所聞即竭忠敷奏及左右近習有奸佞不忠者亦不避嫌怨必舉祖宗之法奏請處治皇上亦宜痛自改悔戒飲宴以重起居奪精神以廣嗣續節賞賚以省浮費却玩好以定心志親萬幾以明庶政勤講學以資治理而已司禮監太監馮保自叙先朝知遇與受顧命之隆及今廕錫之厚欲以老病乞身不允發明懲創內官其名甚美苐所劾逐之璫寺不過取馮保所不悅者而汰去之則此舉適以阿保之好惡而已而其事皆贊成于居正尤可駭聽居正身為首輔必與保相固結事事曲為迎合又使蒼頭與保私人結為兄弟以聨聲勢作威竊柄罔恤人至一至如此况自陳之典本屬具文大臣或偶循例避賢引退乃以行之宦豎而復濟以私心為實為名義安所取觀居正疏諫之語且謂不敢以外臣自限此正欲統擅內外之權以挾制其主然神宗亦因是見嗛而內官之心終無以服所謂懲創者亦復何益徒使積怨流毒遺患後來大臣懷私以事其上其凶于而家害于而國可勝道哉辛巳九年春正月敕邊臣備警以新嵗五日狂霾蔽天敕邉臣加意警備御史范鳴謙言邊防固宜飭內治尤當修加刑罰未當冝敕有司不許混擬久監贓罰貪墨未息宜敕新選官不許借貸豪門致赴任責收無措橫肆誅求荒蕪未墾宜敕淮安鳯陽二府官員留心農事盜賊未殄宜敕有司不許欺蔽而大要尤在居心之修省起居以時嗜欲以節講筵毋憚祥問大臣面賜咨詢端好尚禁奢靡庶災異潜消分徵協應疏入報聞質實范鳴謙江陰人命翰林官分番入直張居正言人主一心乃萬化從出之原亦衆欲交攻之會必使常有所繫然後縱欲之念不萌而引誘之奸不入竊見前代好文之主皆有文學之臣奉侍清燕或承詔登答或應制賡酬皆寓風勸針規之益翰林撰述討論為其職務如日講諸臣皆文學優瞻其餘翰林亦皆需次待用宜其分番入直每日輪四員同日講諸臣在館祗候萬幾之暇如披閲古文有所采録或鍳賞名筆有所題詠即屬諸臣具草或不時面賜質問以觀其才品高下從之二月命儒臣編實録分類成書時張居正請命翰林諸臣將纍朝實録摘其切于君德治道者分類纂修成書名曰訓録類編以日講之期如先年進講帝鑑圖說故事講解一二條以稗治政質實訓録類編合寶訓及實録分類編輯凡四十類曰創業艱難曰勵精圖治曰勤學曰敬天曰法租曰保民曰謹祭祀曰崇孝敬曰端好尚曰慎起居曰戒遊佚曰正宫闈曰教儲二曰睦宗藩曰親賢臣曰去奸邪曰納諫曰理財曰守法曰敬戒曰務實曰正紀綱曰審官曰久任曰重守令曰馭近習曰待外戚曰重農桑曰興教化曰明賞罰曰信詔令曰謹名分曰却貢獻曰慎賞賚曰敦節儉曰慎刑獄曰褒功德曰屏異端曰飭武備曰禦冦盜三月大閲準隆慶三年事例行飭兵工二部重造盔甲限每年造千副五年通完夏四月戎政尚書方逄時罷逄時才略明練處置邉事悉協機宜至是以老病乞休去其功名與王崇古相亞世稱方王逢時自萬厯五年以宣大總督召理戎政時議者爭言貢市利害逢時疏言數年以來九邊生齒日繁守備日固田野日闢商賈日通邉民始知有生之樂北部輸誠效貢莫敢渝約嵗時請求隨宜興之輒稽首歡笑有掠人要賞者告諳逹討治即俯首聽命而異議者或曰敵使充斥為害或曰日益耗費彼欲終不可足或曰與冦益狎隱憂叵測此皆未觀事機之論也夫使者之入多者八九人少者二三人朝至夕去守貢之使賞至即歸何有充斥財貨之賄有市本有撫賞計三鎮嵗費二十七萬較之鄉時户部客餉七十餘萬太僕馬價十餘萬十才二三耳而民間耕穫之入市賈之利不與焉所省甚多何有耗費乃若所憂則有之然非隱也方庚午以前三軍暴骨萬姓流離城郭邱壚芻糧耗竭邊臣首領不保朝廷為之旰食七八年來幸無此事矣若使臣等處置乖方吝小費而虧大信使一旦肆行侵掠則前日之憂立見何隱之有哉所不可知者諳逹老矣誠恐數年之後此人既死諸部無所統一其中狡黠互相爭搆假託異辭遂行侵擾此則時變之或然而不可預料者在我處之亦惟罷貢絶市閉關固壘以待仍禁邊將毋得輕舉使曲常在彼而直常在我因機處置顧後人方略何如耳夫封疆之事無定形亦無定機惟朝廷任用得人處置適宜何必拘拘焉貢市非而戰守是哉因復奏上欵貢圖尋代王崇古為尚書纍疏致仕歸帝書盡忠字賜之二十四年卒土默特犯遼陽副總兵曹簠敗績先是土默特以二萬餘騎入攻錦州參將熊朝臣固守而遣步將出戰皆殁敵乃分掠小凌河松山杏山㑹李成梁馳援始出境已而土默特復與諸酋聚兵塞下謀入廣寧成梁率輕騎從大寧堡出塞四百餘里擊之敵大敗走至是復入遼陽簠出禦之遇伏失千總陳鵬以下三百十七人馬死者四百六十匹土默特遂大掠人畜而去質實小凌河在錦州府錦縣東亦名錦川松山在錦縣南杏山在錦縣西南大寧堡在錦州府義州東北京師旱南畿饑張居正上言淮安鳯陽蘇州松江四府連被災傷徐州宿州間至以樹皮充饑或聚為盜昔元末之亂亦起于此當破格振之陛下宜搏節宫中耗費嘉靖間用最造繁內庫尚有餘積今已增額猶稱缺乏有限之財安能供無窮之用帝嘉納之居正以江南富豪怙勢及諸奸猾吏民善逋賦乃選大吏精悍者嚴行督責賦以時輸國藏乃充裕山西地震蔚州地震有聲如雷屋宇震裂同時大同鎮堡各州縣俱地震有聲五月盡賣民間種馬明初馬有官牧有民牧官牧給邊鎮民牧給京軍皆有孳生駒給草場以資芻牧後専牧于民視丁田授馬始曰户馬既曰種馬按嵗徴駒種馬死孳生不及數輒賠補自豪右莊田占草場馬户漸多逃竄穆宗從太僕少卿武金議賣種馬之半至是以互市饒馬盡賣之上馬八兩下至五兩又折徵草場地租銀以供團營買馬及各邊之請逮帝末年師役繁興往往借支太僕銀久之銀與馬兩竭冏政大壞質實武金疏一種馬之設専為孳生備用備用馬既别買則種馬可省今備用馬既足三萬冝令每馬折銀三十兩解太僕種馬盡賣輸兵部一馬十兩則直𨽻山東河南十二萬匹可得銀百二十萬且收草豆銀二十四萬御史謝廷傑謂祖制所定關軍機不可廢兵部是廷傑言而是時內帑乏竭方分使括天下逋賦穆宗遂可金奏下部議請養賣各半從之秋八月遼東大雨雹遼東定遼等衛雨雹如雞卵秋禾盡傷凡百餘里質實定遼衛凡中左右前後五衛皆在遼東都指揮使司附郭揚州大水揚州泰興海門如臯等處狂風大作屋瓦如飛驟雨如注陂塘墟埂盡決漂沒官民屋舍凡數千間男婦死者無算質實泰興唐置縣明屬揚州府之通州今屬通州直𨽻州海門在通州東四十里後周置海門縣明為海門鄉屬通州今為㕔仍屬通州冬十一月振真定順德廣平災三府風災從巡按御史范鳴謙之情分别蠲振夏稅全徵者于秋糧抵免之御定資治通鑑綱目三編卷二十六
