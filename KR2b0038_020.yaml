  - {type: page-break, offset: 0, content: '', id: KR2b0038_WYG_020-1a, image: WYG0340/WYG0340-0269a.png}
body:
  text: 起己亥明憲宗成化十五年盡丁未明憲宗成化二十三年几九年己亥十五年春二月修開國功臣墓南京禮部言勳臣李文忠等十三人墳墓俱在南京城外文忠曾孫李萼等以嵗久頺壞為言請命工修治帝可其奏且令無後者置守冢一人質實按明實録勳臣十三人為常遇春李文忠鄧愈湯和馮國用吳復俞通海康荗才趙德勝丁德興張德勝吳禎吳良明年復命南京工部修耿再成墓從其曾孫俊之請也夏四月以方士李孜省為太常寺丞孜省初為江西布政司吏骩法受贓既厯京考得冠帶而贓事發當禠為民匿不歸時帝好方術孜省乃學五雷法厚結中官梁芳錢義以符籙得幸中㫖授太常寺丞御史楊守隨言祖宗官人之制必考素行是以奸利衰止流品不清李孜省故犯贓之吏其資格則刀筆也其情罪則胥靡也太常職司祭祀厥選尤重奈何用此贓穢罪人以瀆事天地宗廟給事中李俊亦以為言帝不得巳為改上林苑監副然寵幸曰甚賜以印章二曰忠貞和直曰妙悟通微許密封奏請孜省因與梁芳表裏為奸干亂政事質實李俊字子英岐山人李孜省南昌人五月下兵部右侍郎馬文升于錦衣衛獄謫戍文升既撫定遼東還賚以牢醴理部事如故而陳鉞終欲徼功飾罪復激變失事為言官所劾遣汪直偕定西侯蔣琬尚書林聰往勘之㑹兵部亦以激變劾鉞鉞疑出文升意傾之益急直故惡文升而庇鉞欲缷其罪因奏文升行事乖方禁互市農器故致邉患然文升實禁市軍器非農器也琬聰畏直勢不敢異奏皆如直言遂逮文升下錦衣衛獄謫戍重慶衛并詰責言官容隱不劾奏廷杖李俊等五十六人鉞既傾文升遂諷直請于帝大發兵樹邉功是年冬以撫寧侯朱永充總兵官直監軍鉞贊軍務帥師出遼東塞遇貢使六十人掩殺之更發墓斫髑髏以張級數捷聞封永保國公增直嵗祿升賞者二千六百餘人鉞亦論功晉右都御史尋代楊鼎為户部尚書質實重慶衛在重慶府西洪武六年置𨽻四川都司蔣琬江都人定西侯貴之孫秋七月太監汪直行大同宣府邉宣大鎮巡官屢報冦將擾邉兵部患們都埓伽嘉色淩盡鋭南侵請敕重臣往視邉備然是時伽嘉色淩已為其族弟伊斯瑪音所謀殺部下方內亂實無意南侵鎮巡官言邉警冀虗張守禦功以覬賞也而兵部未知伽嘉色淩死遽信邉臣言乃有是請帝竟命直往所至飾厨傳供張百里外都御史服櫜鞬偕其屬伏道左泥首迎謁須過乃敢起至館易服請見膝行起居叱之出乃唯唯退左右索賂不資各傾帑以給之邉儲為之空九月播州諸蠻作亂先是播州宣慰使楊輝欲立庶長子友為嗣長官張淵阿順之安撫宋韜等諫乃止輝致仕帝命輝適子受嗣輝以友不得襲職謀割地豫之問計于淵淵勸輝取生苖所據天壩干灣溪等寨授友長官韓瑄以苖不為亂諫母征取輝怒與淵計執瑄杖殺之而以苗亂聞于朝乞令湖廣貴州㑹兵進討廷議以輝難獨任宜敕四川巡撫張瓚督其軍瓚至播州與輝攻敗諸苗請于灣溪設安寧宣撫司即以友為之時成化十二年也夭壩干等寨雖舊𨽻播州以僻阻棄不問生苗耕其地居之與鄰壞諸蠻安韓日久既立宣撫爛土蠻惡其逼遂煽諸蠻作亂攻圍安寧愛友力弗支求援于川貴二鎮兵部乃奏起輝統兵以勦敕川貴兵助之已而夭壩干賊首齎果復糾合九姓豐寧及荔波賊萬人攻剽愈亟帝責諸守臣玩冦命鎮守太監張成總兵吳經相機勦撫迄莫能靖也質實灣溪蠻寨名地在今平越府黃平州廢重安司境天壩干亦蠻寨名地在今遵義府廢播州司境爛土長官司明洪武十六年置地今在獨山州東一百十里豐寧長官司明洪武二十年置地在今獨山州南一百十里荔波宋羈縻州元屬南丹安撫司明洪武元年併入思恩縣十七年析置荔波縣𨽻廣西慶逺府正統十二年改屬南丹州孝宗十七年改屬河池州𨽻本朝雍正十年改貴州都勻府庚子十六年春二月逮河間府知府滕佐等罪之中官陳喜以事出河間㑹嵗饑知府滕佐偕其屬分振所部失迎謁郵傳倉卒治供張又不當喜意喜怒歸白于帝乃命逮佐等至京罪謫有差質實滕佐字輔臣臨洮人王越襲韃靼于威寧海子破之初越紅鹽池之捷自謂當得封爵尚書白圭持之叙不踰常格心憾甚既而汪直用事越于西征識其黨韋瑛遂破名檢因瑛以交直屢嗾直立邉功固寵直之搆釁遼東越私于朱永諷其薦已督師為陳鉞所阻鉞驟竉心益艷之㑹延綏守臣有言敵騎將渡河犯邉者越喜甚乃說直請出師詔以永為將軍直監軍越提督軍務越偵知敵無犯延綏意河氷泮方移帳威寧而惡遼東之役永不援已與偕也乃以計給直奏令永帥師由南路已與直將輕騎循塞垣而西俱㑹榆林越至大同告直以敵帳所在盡選宣大兩鎮兵二萬出孤店分數道進值大風雨雪晦冥潛行至威寧海子時伊斯瑪音等不為邉患不虞師之猝至相顧驚愕壯者倉卒秉馬避因殺其老弱報首功四百三十餘級獲馬駝牛羊六千師不至榆林而還永至榆林不見敵無功由是增直嵗祿越封威寧伯提督團營領都察院事如故質實一統志威寧海子在今正黃旗察哈爾南其西南舊有威寧城金時故縣也孤店關名在大同縣東北三月詔減光祿寺供奉時京畿山東洊饑諭禮部曰比嵗以來順天北直𨽻山東府縣旱潦相仍朕甚憂之書曰民惟邦夲夲固邦寧朕重賴吾民供奉玉食于上而吾民有不飽半菽者日當典膳進御興念及此為之輟食其令被災府縣應徵入光祿寺供用量為減省自今有可恤吾民者具悉以聞夏六月巡按遼東御史強珍劾陳鉞罪不問初御史王崇之巡按遼東劾巡撫陳鉞啓釁召敵鉞大恐謀之汪直以崇之受都指揮庭參不為禮坐違制下錦衣衛獄輸贖調延安推官及直鉞用兵方論功而敵大入鉞與鎮守中官韋朗等匿不以聞鉞既召入為户部尚書朗始入告珍往巡按得其狀請正鉞等欺罔罪事下兵部尚書余子俊覆奏如珍言帝乃命停鉞等嵗祿都給事中吳原御史許進言鉞罰不蔽罪恐自此邉將效尤疆事日壤語甚剴切帝是之而卒置鉞等不問質實強珍字廷貴滄州人王崇之臨海人吳原字道本漳浦人許進字季升靈寶人秋八月申存恤孤老之令户部言大興宛平嵗廩孤老七千四百九十餘人凡贍糧二萬六千九百餘石布如人數近有司疏于稽察董其事者日肆侵牟無告之民不濡實德宜敕府尹月再巡視俾惠澤下流毋負朝廷恫癏至意帝俞其請且詔天下有司殫心存恤所在巡按御史亷其怠者奏聞治罪質實大興金以折津縣改置宛平遼以幽都縣改置明並為順天府治今因之太監汪直逮治御史強珍于御馬監以中㫖謫戍之直方自矜遼東功聞珍指為啓釁劾鉞罪怒之㑹直閲邉還鉞郊迎五十里訴珍誣已直益怒奏珍所劾皆妄遣錦衣千户蕭聚往勘械赴京比至直繫治珍于御馬監榜掠備至然後奏聞命法司廷鞫皆不敢忤直意坐以奏事不實當輸贖直心未慊降中㫖罪珍欺罔謫戍遼東而免鉞等所停嵗祿責兵部言官先嘗劾鉞者各停祿三月發明御馬監非鞫獄之地也借使珍有罪豈無朝廷三尺法在直顧擅執而私榜掠之其辨髦紀綱甚矣陳鉞啓釁邉陲敢于隱飾停祿之懲已為軼罰而直甫還朝遽寢前命反移邉臣欺罔之罪以罪言官詔令發施若操其手太阿之柄果安在哉冬十二月韃靼犯大同伊斯瑪音自威逺衛入犯報威寧海子之役也大同鎮守官告警復命朱永汪直王越率京軍禦之明年三月捷還加直嵗祿三百石永世襲爵進越太子太傳明制文臣不得封公侯越從勳臣例改掌前軍都督府自是真為武人且望侯矣辛丑十七年春正月以方士顧玒為太常寺少卿玒以扶鸞術得幸屢繇傳奉為太常丞至是晉少卿逾月喪母乞祭誥故事四品官未三載無給誥賜祭者帝特豫之未幾進本寺卿時李孜省用事玒與趙玉芝浚中倚以為奸玉芝亦善方術因中官高諒進中善書給事文華殿三人者皆纍擢至太常卿權勢稍亞于孜省而廷臣艷其寵頗諂附之玒之為母乞祭誥也尚書尹旻欲獻媚于玒因請並給誥贈其父其二子經綸尋亦以中㫖授官帝方崇信左道故玒等致榮顯如此質實顧玒大興人大德顯靈宫廟祝也趙玉芝番禺人凌中史未詳二月南京地震是月十日甲寅也鳯陽淮安揚州和州及山東河南州縣同日皆震禮部言考之傳記春動者饑二月動者水今地動踰千里況鳯陽南京宗廟社稷所在關擊尤重乞敕有司恤寃矜寡施德澤以弭災異廣儲蓄以備嵗凶修渠堰以防水患從之夏四月旱風霾敕羣臣修省命司禮監同法司録囚時遣太監懷恩同三法司録囚自是丙辛之嵗內臣審録以為常謂之大審南京則命內守備太監行之初成祖定熱審例决遣輕罪仁宗命閣臣㑹審重囚英宗又命三法司同公侯伯㑹審謂之朝審至帝罷閣臣預審之制而內臣大審所矜疑放遣常倍于熱審質實按明史刑法志成化時㑹有弟助兄鬬因毆殺人者太監黃賜欲從末減尚書陸瑜持不可賜曰同室鬬者尚被髮纓冠救之况其兄乎瑜不能難卒為屈法考瑜于成化八年致仕賜于十三年以汪直譖被斥則憲宗之遣內官㑹審不自是年始矣特是年始定為大審之例耳五月韃靼犯宣府命汪直監督軍務王越為將軍充總兵官禦之比至敵亦退因留屯其地詔所在鎮巡官聼直越節制至冬請班師而其時直已為尚銘所間寵漸衰請之再不許尚銘者東厰中官也始因直進附于直直之還自威寧㑹有盜西內物者帝命厰校索之急而東厰捕得盜銘以聞帝大喜賚銘甚厚直惡其自以為功也曰銘敢負我銘聞之慮將傾已謀發直事以先之直初與王越甚昵時或泄禁中語于越後直主陳鉞議用兵遼東言官多以啓釁劾鉞鉞方領都察院事不能制也而鉞譖于直謂皆越所嗾者直怒而窘辱越越挾前所泄語以抵之直乃沮尋兩人意釋交如初顧所泄語頗聞于人銘亷得之乘直監軍于外白諸帝帝于是始疑直不欲直還而陳鉞未之知也時鉞以余子俊憂去方代長兵部遂復為直請班師帝切責鉞直越乃大懼六月雨雪是月十九日癸亥也秋七月雷震郊壇是月二十五日己亥也前十三日丙戌南京大風雨社稷及太廟殿宇皆摧十一月丁酉南京復大雷雨雪八月以方士李孜省為右通政命寄俸于通政司仍掌上林苑事同官王昶惡其奸邪亂政過之無加禮孜省銜昶譖于帝左遷太僕少卿故事寄俸官不預郊壇分獻帝特以命孜省大臣懲昶事無執奏者居二年進左通政質實王昶靈璧人發明甚矣憲宗之遂過也前二年命孜省為太常卿以楊守隨之諌而改官上林是憲宗既知孜省為贓穢罪人不可以典祭祀矣而竟復用為右通政俾預郊壇分獻則明知其不可而故蹈之也夫孜省之得幸于憲宗以善方術耳左道亂政法所必誅乃憲宗且崇之信之羣邪蔓引相倚為奸二十一年星變求言始勉從廷臣之議復貶孜省上林丞而旋貶旋擢甫及再期遽二秩宗甚至劉敷李裕援之而進馬文升楊守隨擠之而退威福恣行朝野側目亂政之極一至是哉厥後嘉靖時邵元節陶仲文之徒弊如出一轍者傳曰作法于凉憲宗之謂已冬十月以道士鄧常恩為太常寺卿常恩因中官陳喜進日𨗳帝祀淫詞帝曲聽之是時嶽鎮海瀆諸祠並置石函周以符篆中藏金書道經一卷雜貯金銀錢寶石及五榖為厭勝皆常思所為也後孝宗即位從都御史馬文升言乃毀之質實鄧常恩臨江人壬寅十八年春二月太監郭文殺沛縣民詔逮知縣馬時中于獄謫之文自南京還過沛怒時中治供張不時榜椋時中子不勝楚溺于河時中赴救之起呼寃之益怒禠時中衣縶以行縣民憤甚繞船大呼厲叱之不退文使家人待兵擊之殺二人時中訟于朝而帝先入文訴命錦衣衛械時中至京謫降廣西慶逺府經厯未幾有尚膳監中官齎薦新莭物道出南旺湖辟行舟或避之綏縳其人懸于檣笞之死管河右通政楊恭以聞命刑部郎朱守孚往勘守孚古中官請治恭等巡河不能禁約之罪帝皆不問質實楊恭岐山人朱守孚桂陽人三月振南直𨽻山西饑先是淮陽巡撫張瓚以鳯陽淮安饑入告發兩淮鹽直五萬振之至是南京給事中劉璣復告南直𨽻諸府州災命以淮安常盈倉糧三萬石振鳯陽以蘇松常鎮四府嵗儲餘米徐州廣運倉糧一萬石各振其地之民以南京常平倉糧三萬石賑應天滁州以掦州鈔關及稅課司夏季應征之鈔凖貫納米賑淮安掦州敕瓚與蘇松巡撫王恕董其事時山西大同亦饑户部主事汪洪奉命往微邉儲知其狀疏請緩微并乞命山西巡撫何喬新大同巡撫郭鏜檄所屬賑恤從之既而畿內山東饑復遣使分賑質實何喬新字廷秀冮西廣昌人劉璣臨清人汪洪大興人罷西厰先是有小中官阿丑者工俳優一日于帝前為醉者嫚罵狀人言駕至嫚如故言汪太監至則避走曰今日但如汪太監也又為直狀操兩鉞趨帝前曰吾將兵仗此兩鉞耳問何鉞曰王鉞陳鉞也帝聽然而笑稍稍悟然廷臣猶未敢攻直也自尚銘既發直越交通狀命留鎮宣大不許其班師旋又召還京營將士改直越專鎮大同寵日替言者始交章請罷西厰未報可閣臣萬安知銘日譖直於帝帝雖未俞言官請意固欲罷之乃上章極言東厰法制之善人易遵循西厰事出權宜當革從之安以西厰既罷直與已不兩立而王越多智數恐其𨗳直謀復入尋請調越延綏以離之於是直勢益衰陳鉞有罪免右軍都督馬儀言鉞撫遼東時侵牟帑金交結近侍以希擢用私役軍官入京詗事擅殺貢使乾沒其方物與汪直誣陷侍郎馬文升御史强珍謫戍其子澍胃功授錦衣千户亦倚勢為奸利事下都察院請遣官按之時帝已知鉞為直黨儀所劾鉞罪皆實然馬文升諸人之謫雖由鉞等所搆實帝命也頗惡儀言及之不欲究其事乃令鉞致仕去調澍于永平衛右所而儀亦南京閒住質實明史兵志永平衛𨽻後軍都督府夏四月哈商復哈密城哈商寄居苦峪十年至是幸所部兵八千六百人糾罕東赤斤二衛衣襲哈密城破之伊蘭遁乘勢連復八城遂居故土總兵官王璽巡撫王朝逺奏其事帝喜賜敕嘉奬朝逺因請封哈商為王廷議不從乃進左都督質實王朝逺名漢以字行進賢人以鉛山縣知縣張昺為監察御史昺性亷明善治獄所雪寃獄至多政聲逹于朝故有是命時與昺相先後以治行稱者有陳鋼丁積皆能興民利而除所疾若所在民懷之然二人竟終郡縣史質實鉛山唐置場南唐升縣元升州明洪武初復為縣屬廣信府今因之張昺字仲明其先慈溪人後徙於鄞其令鉛山時邑有嫁女者及壻門而失女訟于前令不能决昺至行縣界見大樹妨稼欲伐之民言樹有神巢其顚不聽率衆往伐有衣冠三人拜道在昺叱之忽不見比伐樹血流出樹間衆懼欲止昺手斧之卒仆其樹則二婦人墮焉一即前所失女也有巫以隱形術宣淫邑中昺執巫痛杖之無所苦已並巫失去昺馳縳歸印巫背鞭之立死乃盡毁諸淫祠嫠婦子為虎所噬其母訴于昺昺齊戒城隍神期五日必驅虎至縣庭聽訟及期二虎伏庭下昺叱曰孰傷吾民法當死無罪者去一虎起斂尾去一虎伏不動昺射殺之以㫒嫠婦曰虎抵而子死矣陳鋼字堅逺應天人黔陽知縣縣城當沅湘合流數决壞廬舍鋼募人採石甃隄千餘文水不為害南山崖官道數里徑仄甚行者多隨崖死鋼積薪燒山沃以醘拓徑文許行者便之鋼病民爭籲神願滅已算益鋼壽遷長沙通判及卒黔陽長沙並祠祀之丁積字彥誠寧都人新㑹知縣宦者梁芳邑人也時方用事其弟長橫于鄉官吏莫敢誰何積捕之繫獄由是權豪屏迹令甲民出錢輸官供役曰均平錢其後吏貪復使甲首出錢供用曰當月錢貧者至鬻子女積一切杜絶嵗大旱築壇以禱昕夕伏壇下者八日雨大澍而積遂得疾以卒士民聚哭于途一嫗哭極哀或問之曰來嵗當甲長丁公死無以聊生矣六月韃靼寇延綏擊敗之伊斯瑪音冦延綏都指揮劉寧敗之于塔爾山巡撫何喬新指揮同知支玊敗之于天窊梁中嘴千户白道山敗之于木瓜園總兵官許寧敗之于三里塔參將周璽遊擊董升等敗之于黑石崕時寇扼于邉墻不得出遂大衄質實一統志塔爾山在葭州西北上有小塔因名天窊梁中觜在山西保德州河曲縣北木瓜園在葭州府谷縣北三里塔在榆林縣北黑石崕在保德州西南下臨黃河劉寧字世安山陽人支玊聞喜人周璽字廷玉遷安人秋八月大水衛漳滹沱並溢河南霪雨自六月至于是月漂損廬舍三十一萬四千二百餘間淹死居民一萬一千八百餘人質實明史河渠志漳水出山西長子曰濁漳樂平曰清漳俱東經河南臨漳由直𨽻真定河間趨天津入海其分流至館陶與衛河合閏八月逮中都留守指揮郭玊下吏王上言守備中官狥奴𨽻之言掣諸司之肘决獄惟貨多不以情請罷勿設便帝以臨濠乃祖宗根本地特命中官往鎮寄以守備之權循祖制也玊何敢議罷革下巡按御史逮問妄奏之罪詔天下刑官母滯訟山西巡撫何喬新劾按察僉事尚敬劉源視獄多淹滯乃下詔曰刑獄重事也周書曰要囚服念五六日至于旬時蓋言愼也今有司乃或瘝厥職推鞫不以時凡罪囚應省釋者亦梏拲而久囹圄之若一旦瘐死則是有司殺之矣喬新言是其即治敬源贖官罪自後有司滯訟半年以上者所在巡按御史奏聞逮治令天下刑官勤決讞以副朕意質實尚敬臨潁人劉源宛平人冬十二月文華殿大訓成以教太子也書凡二十八卷列綱四曰進學曰養德曰厚倫曰明治帝親製文辨其首命詹事彭華中允周經等進講于太子太子每起立拱聽萬安以為勞謂講官宜跪請坐聽華與經不從竟得如禮質實周經字伯常陽曲人按明憲宗實録書既成帝親序之復題其後曰朕臨馭以來兢業圖治十有九年于兹蓋嘗因早郊禱惕于星變肆赦海內葺郊壇以奉大祀增籩豆樂舞以禮先師廣進士之額重老臣之歸加養濟窮民之廩開武學儒生之貢減糶出賑以濟民饑恤刑審録以清訟獄修文究武飭內攘外朕宵旰靡遑慮功業之未荗也夫為治之道舉綱必挈其要張目必該其凡是編所述庶幾盡之爾尚究心副朕豫教之意念之哉癸卯十九年春二月録故大理寺丞鍾同子為通政司知事同景泰中御史以疏請復儲杖斃錦衣衛獄英宗復辟追贈大理寺丞録其長子起為國子生至是帝念同死于忠義雖已䕃一子未足酬之詔賜越一命給同妻羅氏月廩越同次子也尋賜同諡恭愍從祀吉安忠節祠同少時嘗過祠下見所祠毆陽修楊邦乂諸人歎曰死不入此非丈夫也竟如其初志云三月禁太監中鹽牟利自成化二年太監李棠始聞中遼東鹽萬引既而梁芳有寵假市珍玩名侵盜庫金以數十萬計不足則給以鹽前後賜芳兩淮餘鹽存積鹽不下數十萬引怙帝寵所請乞無不允諸內臣相率效之尋戚畹家人亦有希恩妄乞者帝皆曲從其請計臣不能執爭凡所乞中鹽至無算啇引壅不行邉儲日匱至是中官王鈿復請支河東鹽二萬四千引帝始厭其擾曰祖制內臣無私産矧敢牟利中鹽乃命户部榜諭禁之質實明史食貨志洪武定額兩淮嵗辦大引鹽三十五萬二千餘引𢎞治時改辦小引鹽倍之所輸邉甘肅延綏寧夏宣府大同遼東固原山西神池諸堡嵗入太倉餘鹽銀六十萬兩浙崴辦大引鹽二十二萬四百餘引𢎞治時改辦小引倍之所輸邉甘肅延綏宣府大同薊州崴入太倉餘鹽銀十四萬長蘆崴辦大引鹽六萬三千一百餘引𢎞治時改辦小引十八萬八百有竒所輸邉宣府大同薊州嵗入太倉餘鹽餘十二萬河東嵗辦小引鹽三十萬四千引𢎞冶時增八萬引崴輸寧夏延綏固原餉銀三萬六千餘兩凡大引四百斤小引二百斤餘鹽者竈戶正課外所餘鹽也存積鹽者正統時從巡撫周忱議以淮浙長蘆鹽十分為率八分給守支啇曰常股二分收貯于官遇邉警始召啇中納謂之存積夏五月詔罷京軍雜役時汪直報大同冦警請調京軍赴援兵部尚書張鵬以邉兵四萬已足守禦奏止勿遣因言京軍所以控敵近年工役頻繁未遑訓練猝有徴發恐不足用乞罷遣歸營以蓄鋭氣時盧溝隄岸及京倉通州倉諸役一時並興是年春又命襄城侯李瑾督軍萬人修大慈恩寺凡團營見軍九萬三千四百有竒更畨赴工者至五萬二千人故鵬言及之㑹保固公朱永復以為言帝乃詔罷京倉之役餘令趣工速竣即休舍之然于時團營弊日滋營帥中官習以軍士供私役謂之應役市井遊販之徒以賂竄名軍籍憚營操征調率賄將辨祈免謂之買開而提督守營諸官又詭以空名支餉缺伍輒以萬計尋定西侯蔣琬奏其狀帝命懷恩偕戶部尚書余子俊閲實之弊迄莫能革也質實明一繞志大慈恩寺在順天府西海子上舊名海印寺秋七月韃靼寇大同官軍敗績延綏總兵官許寧既與王越易鎮至大同以爭坐不協于汪直巡撫郭鏜以聞調直御馬監别暹中官蔡新代鎮守時諜者屢告邉警鏜問戰守計于寧寧皆不應小王子驟率兵三萬大入連營五十里寧既未有備禦猝見敵至勢方盛不敢攖其鋒乃欲示以持重伺其情邀擊之因斂兵城守而令别將劉寧董升軍西山周璽屯懷仁相犄角敵偵知寧無能為遂縱兵大掠焚代王别墅王趣戰使衆哭于轅門寧猶不聽適有人自京師至者服佩頗異守門卒報云行事校尉來矣寧不得已與新等將中軍營城外冦以十餘人為誘新部騎馳擊寧將士爭赴之遇伏大敗死者千餘人劉寧董升聞中軍失利督衆自守敵圍之數重幾陷發炮擊敵圍乃解璽自懷仁還兵援之道遇敵乘勝前鋭甚璽厲將士曰今日有進無退大呼陷陳敵少却久之短兵接臂中流矢援鏃戰益急與子鵬及麾下將士擊殺數十人㑹劉寧兵至中軍潰卒亦稍集敵乃退而寧竟掩敗以捷聞敵既得利長驅入順聖川宣府巡撫秦紘總兵周玉力戰却之已而巡按御史程春震發寧敗狀寧與鏜新俱下住獄鏜降六官新以初任降三官寧降指揮同知閉質實西山亦名雷公山方輿紀要云在大同府西北十五里後唐清泰末雲州軍亂節度使沙彥珣走西山據雷公口即此懷仁遼縣明屬大同府今因之順聖川在今宣化府西寧縣東代王代簡王桂曽孫惠王成鍊也成化二年襲封秦絃字世纓單縣人程春震雲夢人八月太監汪直以罪貶王越免言官劾直八罪一負恩欺罔二冒功濫叙三虧盜帑金四誣善奬奸五擅作威福六招納無籍七朋邪亂正八妄開邉釁詔從末減貶直南京奉御王越以黨直奪誥劵編管安陸州二子以功䕃得官者皆削籍戴縉吳綬並斥為民韋瑛前已調萬全衛陳越亦先致仕皆不問明年瑛欲邀功希復用誣報衛人劉德興謀不軌覆驗之妄惡其稔惡誅之直後竟得良死九月妖人王臣伏誅中官王敬抉千户王臣等採藥江南臣以妖術為敬所信倚敬勢矯㫖括民間珍玩因奪室女縱淫所至騷然長吏多被辱至蘇州召諸生寫妖書辭不赴即令有司捕繫至驛中亂箠之諸生大譁敬奏其抗命下巡按御史逮問巡撫王恕亟疏論敬等罪敬亦誣奏恕并及常州知府孫仁遂械仁至京恕抗章申救三疏劾敬㑹中官尚銘訴敬諸不法狀乃下敬等獄戍其黨十九人棄臣市傳首江南仁得釋歸諸生從輕擬輸贖質實孫仁新塗人發明汪直王敬之橫恣甚矣憲宗一旦譴斥時共快之然商輅發直之奸甫踰月而直復用王恕論敬之罪至三疏而敬自如時以尚銘一言譖訴乃始貶直而下敬于獄則憲宗之譴斥宦官者仍以信任宦官直敬貶而尚銘用事銘固直敬之類也厥後梁芳之廢以蔣琮劉瑾之誅以張永亦皆其類之自相傾軋而非在上者果能察其亂政務決去之此明世宦官之禍所以蔓延而不可圖也召陳獻章為翰林院檢討尋乞歸獻章舉正統中御試再上禮部不第從吳與弼講學居半載讀書窮日夜不輟築陽春臺靜坐其中數年無户外跡久之復游太學祭酒邢讓重之揚言于朝以為楊龜山復出由是名藉甚京師尋復歸四方來學者日進廣東布政使彭韶總督朱英交章薦召至京令就試屢亂疾不赴疏乞放歸田里就醫奉母乃授檢討歸質實邢讓字遜之襄陵人按王世貞弇山堂别集云尹直瑣綴録謂邱濬修憲宗實録以陳獻章作十絶句媚梁芳自是為世所鄙而薛應旗憲章録因之謂出張元禎筆考實録謂獻章貌謹厚詩文亦有可取者然于理學未究也一時好事妄加推尊形諸薦奏雖其鄉里前輩以德行文章自負者亦疑之及授官歸沿途擁騶從列仗槊揚揚得志而去其詆獻章亦甚矣第不載十絶句媚梁芳事而所謂鄉里前輩者蓋謂濬也若出濬筆不當隱然以前輩自謂元禎庶幾為近又云張元禎貽書誚與弼有豈容先生久竊虗名語事亦與其纂修實録甚詆獻章相類瑣綴録固誣妄不足信而元禎以譽望自負于獻章之躬行心得者不可同日語忮心誣詆所謂蚍蜉之撼大樹多見其不知量也旌表僧繼曉母朱氏繼曉以祕術因梁芳進封國師其母朱氏本娼家女也繼曉日陳乞旌詔不必勘核遽旌其門質實繼曉江夏人冬十二月都給事中王瑞御史張稷等請罷傳奉官帝即位之二月始命內臣傳㫖授官左右近習如梁芳輩遂立門戶引進私人至是傳奉益溢瑞因倡同官上言爵賞天下公器自非公德才能雍以弋獲近年幸竇如逵騖榮若市恩綸內降始忝竊于藝術之人今則更及無庸胥吏矣武階廕叙始冒濫于內使之家今則更及外方白丁矣下至厮養賤夫市井童稚並得夤緣除授玷列朝班名器之䙝于兹已甚乞悉行革絶稷等亦言傳奉各官至有逃軍逋囚贓官貪吏易姓名匿罪狀而冒進者帝覽奏頗悟命自今瀆請希恩者罪不宥于是降李孜省二秩他貶黜者又十二人朝野稱快明年八月罷閒贓吏周璡以善星命干梁芳得召遂傳奉如故而孜省亦復遷左通政矣質實王瑞字良璧望江人張稷實應人周璡廬陵人發明明之有傳奉官蓋即漢所謂西邸之爵唐所謂斜封之官宋所謂內批之降也憲宗時宦官方士相倚為奸匪人因之而進然猶曰為羣小所䝉耳今一旦因瑞稷之言大為感悟自無復再誤之虞禁令方中尋即召用即知之而復蹈之則洵乎痿痺之疾不可藥也甲辰二十年春正月京師地震是月二日庚寅也永平諸府及宣府大同遼東皆同日地震敕諭羣臣曰朕仰惟祖宗丕緒夙夜惕兢圖惟政理然治效未著地震京師天戒至矣齊心滌慮省愆修德爾文武羣臣與朕共天職者得無有竊位苟祿以召致災咎者乎自今宜痛自懲艾以毗朕志于時御史徐鏞向珖請暫免慶成宴以法古者減膳徹懸之意帝以其妄議變制下錦衣衛獄訊之已並謫知縣質實徐鏞興國州人何珖順德縣人太監尚銘有罪銘既傾汪直益擅權勢鬻爵市官恣為奸利聞京師有富室輒以事羅織得重賄乃已帝尋覺之謫充南京净軍籍其家輦送內府數日不盡初銘以附直得領東厰後其黨李榮蕭敬援之入司禮監銘既貶而榮敬猶用事于是都給事中王瑞上言李榮蕭敬昔黨汪直壞事于前繼黨尚銘壞事于後祖宗大業豈容小人屢壞之京師之人皆曰直開西厰兆以黑眚之變銘入司禮監應以地震之災若非宸衷內斷早見而勇去之後日壞事或不止此然銘等雖以罪譴而榮敬尚在竊恐汪直尚銘之患未己也乞并加貶斥以絶其根株則宗社生民幸甚疏入帝置榮敬不問而以太監陳凖代銘督東厰凖為人謹願既蒞事誡諸校尉曰有大逆告我非此則有司之事若勿預也由是都人安之質實陳凖順德縣人三月以盛顒巡撫山東山東自牟俸後不設巡撫者十年至是嵗旱饑盜起廷議復遣大臣往撫之顒逐自南京刑部侍郎拜是命既下車雨禱大澍槁木復蘇條荒政數十事下所司修舉之根粟以充逮畢振餘粟尚百餘石顒益默暴除苛推行九則法于諸府盜不禁而戢質實盛顒字時望無錫人九則法者顒令束鹿時所創法也天順中顒以御史偕同官劾石亨曹吉祥得罪貶束鹿知縣縣故多豪家徭役苦不均顒為立九則法以均之豪家皆斂手奉法曰是嘗劾石將軍者不可犯也毋憂去服除民相率詣闕乞還顒再任益不用鞭朴訟者諭之輒叩首不復辨治行上聞擢知邵武府復以任治劇調延平纍遷陜西布政使所至皆有聲而其令束鹿時鄰邑訟不决者亦赴顒訴狀片言折之各心服去郊外有隙地爭來築室爭居之遂成市號清官店云處士胡居仁卒居仁性行淳篤聞吳與弼講學崇仁往從之遊其學以主忠信為先求放心為要操而勿失莫大乎敬遂以敬名其齊端莊凝重對妻子如嚴賔手置一冊詳書得失用自程考鶉衣簞食宴如也築室山中四方來學者甚衆皆告之曰學以為已勿求人知曰吾道相似莫如禪學後之學者誤認存心多流于禪或欲屏絶思慮以求靜不知聖賢惟戒愼恐懼自無邪思不求靜未嘗不靜也騖于空虛與溺于功利者均失其患有二一在所見不真一在工夫間斷承學之士皆佩之為篤論居仁暗修自守布衣終其身人以為薛瑄之後粹然一出于正居仁一人而已卒年五十一神宗十三年追諡丈敬質實崇仁隋置明屬撫州府今因之胡居仁字叔心餘干人夏六月以思柄為孟密安撫使孟密雲南土司木邦所轄部也其部長曰思外法娶木邦宣慰使罕揲法之女曰曩罕弄已而罕揲法死傳襲至其孫罕落法時曩罕弄方以夫死代領所部自分尊屬不樂受節制遂叛木邦嗾罕氏族人與落法搆難逐出之孟都蓋景泰四年也其後孟密兵力日強益攻罕落法侵掠鄰境隴川孟養曩罕弄自稱天娘子其子思柄自稱宣慰使黔國公沐琮奏委三司官往撫曩罕㺯驕蹇不服且欲外結交趾兵逼脅木邦八百諸部琮等復以聞兵部尚書張鵬主用兵詔延臣集議皆以孟密與木邦仇殺未犯邉境宜撫乃遣副都御史程宗馳傳與譯者序班蘇詮往於時為成化十八年初曩罕弄二于木邦畏鄰境不平潛使人從間道至京獻寶石黃金且重賂閣臣萬安請别立孟密安撫司開設治所直𨽻布政司下內閣議安欲許之劉珝劉吉曰孟密故屬木邦今叛而請命于朝若許之是周天子命三晉大夫為諸侯也土官誰不解體安曰不從則當代之往日麓川之敗不可不戒珝對曰何以伐為但命守臣嚴邉備而敕鄰境土官合兵蹙之彼奚能為事遂寢及宗率詮往撫諭詮受思柄金𨗳宗迎安風㫖示意曩罕弄復遣人入貢如前請㑹雲南巡撫吳誠卒官即令宗代下其事于宗議可否宗遂言曩罕弄與木邦仇殺已久勢難再合别立安撫司使因命思柄為安撫使蓋孟密地有實井曩罕弄擅其利恣行賄遺而木邦為孟密所侵兵力積弱不能報雖屢奏訴竟不得直思柄恃有朝命益肆意侵奪先後占據木邦地凡二十七所自是諸部擾欀中國用兵且數十年質實明史土司傳孟都蠻地近隴川方輿紀要寶井在孟密西南由隴川十日至孟密又二日至寶井程宗字源伊常熟人吳誠錢塘人大旱京畿山東湖廣陜西河南山西俱大旱山西陜尤劇赤地千里道殣相望尋從巡撫葉淇請發帑金三萬振山西未幾預度天下僧道六萬人令輸粟給牒濟山陜饑質實葉淇字本清山陽人秋八月太白嵗星同晝見九月乙酉朔日有食之冬十月下刑部員外郎林俊及都督府經厯張黻于錦衣衛獄尋釋之並謫官時嵗大饑僧繼曉方以祕術擅寵先後賜美妹十餘人金寶不可勝紀又請建大永昌寺于西市逼徙居民數百家縻國帑數十萬于是俊上言今年以來災異迭臻京師地震陵寢動搖日月繼蝕監戒之昭莫此為甚陜西山西河南頻年饑饉人民流離道殣相望振濟無從可為流涕而僧繼曉以妖言熒聽竭有用之財供無益之費工役不息人怨日興臣謂當斬繼曉以謝天下然縱繼曉之惡者梁芳也芳傾覆隂狠引用邪侫棑斥忠良數年之間假名乾沒祖宗百年餘之府藏殆盡家資山積尚銘不足多所在風擾汪直莫能過今內而朝臣外而市井之徒皆痛心饑民之死莫不欲食芳繼曉之肉而卒不敢以此言進者所惜者官所畏者死耳臣何忍畏罪不言以誤陛下疏入帝大怒下俊錦衣衛獄拷訊後府經厯張黻救之並下獄帝欲誅二人司禮監懷恩力爭帝怒投以硯曰若助俊訕我恩免冠伏地號哭帝叱出恩遣人告鎮撫司曰汝曺諂芳傾俊俊死汝曹何以生遂稱疾不起帝怒亦漸解各杖三十謫俊雲南姚州判官黻師宗知州時言路久塞兩人直聲震都下為之語曰御史在刑曹黃門出後府明年以星變復二人官改南京質實大永昌寺按明憲宗實録寺先建于西市已有成緒繼曉以星變譴隨廢梁芳請更擇地建之得故廣平侯袁瑄宅又市其旁民居數十家大興工役視舊加廣蓋二十二年冬十二月也武宗實録正德五年大永昌寺改建為倉賜名曰太平六年以太平倉賜永夀伯朱德為私第八年改為鎮國府又按兩京求舊録鎮國府嘉靖初仍改太平倉都人至今呼西帥府胡也姚州唐置後入于南詔元時蠻部內附復置州明屬姚安軍民府今屬楚雄府師宗州元因蠻部名置州明屬澄江府今改縣屬廣西州林俊字待用莆田人張黻吉水人乙巳二十一年春正月甲申朔星隕有聲詔羣臣言闕失是日申刻有光自中天墜化白氣曲折上騰踰時復有赤星如碗自中天西行轟然如雷震帝頗懼詔羣臣陳闕失于是吏部尚書尹旻等論傳奉官過多吏科給事中李俊率科臣上疏曰今之弊政最大且急曰近幸干紀也大臣不職也爵賞太濫也工役過煩也進獻無厭也流亡未復也天變之來率由于此夫內侍之設國初皆有定制今或一監而叢十餘人一事而參六七輩分布藩郡總領邉疆援引憸邪投獻竒巧司錢榖則法外取財貢方物則多方責賄兵民坐困官吏䝉殃殺人者見原僨事者逃罪如梁芳韋興陳喜輩不可枚舉惟陛下大施剛斷無令干紀奉使于外者悉為召還用事于內者嚴加省汰則近幸戢而天意可回矣今之大臣非夤緣內臣則不得進非依倚內臣則不得安此以財貿官彼以官鬻財無怪其賂受四方而計營三窟也如尚書殷謙張鵬侍郎艾福杜銘南京尚書李本侍郎劉俊皆老而懦尚書張鎣大理卿田景暘南京尚書張瑄侍郎尹直皆清論不愜惟陛下大加黜罰勿為姑息則大臣知警而天意可回矣爵以待有德賞以待有功今或無故而爵一庸流或無功而賞一貴幸方士獻煉服之書伶人奏曼延之戲掾吏胥徒皆叨官祿俳優僧道亦玷班資一嵗而傳奉或至千人數嵗而數千人矣數千人之祿嵗以數十萬計是皆國之租稅民之脂膏不以養賢才乃以飽奸蠧誠可惜也如李孜省鄧常恩輩尤為誕妄此招天變之甚者乞盡罷傳奉官母令汚玷朝列則爵賞不濫而天意可回矣都城佛剎迄無寧工京營將士不復遺力如國師繼曉假術濟私糜耗特甚中外切齒願陛下內惜資財外惜民力不急之役姑賜停罷則工役不順而天意可回矣近規利之徒率假進奉為名或録一方書市一玩器購畫圖製簮珥所費不多獲利十倍願陛下留府庫之財為軍國之備則進獻息而天意可回矣陜西河南山西赤地千里尸骸枕籍流亡日多萑苻可慮願陛下體天心之仁愛憫生民之困窮追録貴幸鹽課暫假造寺資財移振飢民俾苟存活則流亡復而天意可回矣疏入帝優詔答之降左通政李孜省上林丞太常卿鄧常恩本寺丞繼曉革國師為民斥罷傳奉官五百餘人中外大悅時兩京諸臣爭應詔陳言給事中盧瑀秦升童柷御史汪奎員外郎崔升彭綱主事張吉蘇章周軫李旦等言尤剴直帝以方修省不罪然心忌之密諭尹旻出瑀等且書六十人姓名于屏俟奏遷則貶逺惡地于是瑀等相繼貶斥俊亦尋調外升章應遷而部臣故遲之不奏僅得免奎以糾失儀稍緩杖之于廷居數月復出為䕫州通判而孜省常思等仍復官有寵愈甚質實艾福字天錫襄陽人杜銘字敬修金堂人李本字立之富順人劉後新鄉人張鎣字廷器華亭人田景晹高陽人張瑄字廷璽江浦人盧瑀鄞人秦升南昌人童柷蘭溪人汪奎字文燦婺源人崔升字廷進其先樂安人後為彰德人彭綱字性仁清冮人張吉蘇章皆餘千人周軫莆田人李旦字啓東獻縣人大赦詔曰往者災沴迭興天時亢旱嵗竟不登河南山東畿內率多饑饉陜西山西尤劇至有棄恆産家室不顧者元元何辜罹此危厄博採羣議發內帑倉儲敕所司多方振濟期此矜人咸歸樂土不意嵗首星變有聲朕愈兢惕載敕廷臣備陳時改得失采納而行下方春時和祗承資始之仁誕敷寬恤之典其大數天振陜西山西河南饑遣侍郎李衍何喬新賈俊以帑金二十五萬往振未幾又轉漕四十萬石振陜西是年兩京皆饑並發粟分振質實賈俊束鹿人三月泰山震太監梁芳韋興糜帑藏為竒技淫巧結萬貴妃歡纍朝金七害俱盡帝一日視內藏誥芳及興芳曰建顯靈官及諸祠廟為陛下祈萬年福耳帝曰吾不汝瑕疵後之人將罪汝矣芳大懼逐說貴妃勸帝廢太子而立興王司禮大監懷思固爭帝不懌斥居鳯陽㑹泰山連震占者謂應在東宫帝心懼寢其事質實顯靈宫春明夢餘録在皇城西永樂時建成化中更拓其制又建彌羅閣嘉靖中復建昊極通明殿東輔薩君殿曰昭德西弼玉帥殿曰保真興王名祐杬憲宗第四子邵太后生即世宗父興獻帝也二十三年七月受封時未封稱興王者史家追叙之辭夏四月以康永韶為禮部右侍郎永韶故為御史有直聲謫知縣繼有薦其知天文者中㫖召還進太常少卿掌欽天監時陕西大饑永韶言今春星變當有大咎賴秦民饑死足當之誠國家無疆福帝悅擢禮部右侍郎明年坐厯多訛字落職歸五月京師地震是月十三日壬戌夜也十一月丙寅復震六月罷汰冒濫軍職廷臣條時政闕失多以官爵太濫為辭詔下兩京部臣察實澄汰至是南京兵部核武職之胃濫者具名以聞中率多內臣厮養乃寢前詔令任事如故秋八月己邜朔日有食之以萬通家人徐逹為指揮僉事豫世襲萬通貴妃弟也少業資既驟貴益貪黷無厭日命其家人牟利四方徐逹以善居竒為通所喜因得官百戶通殁帝春通不已庶子方二嵗養子方四嵗俱授官而逹亦得擢至指揮僉事秩正四品許傳襲不替逹嘗奏請兩淮鹽引三萬時帝己漸惡乞鹽之擾猶命立豫之其荷思寵如此初通父貴姓醇謹見子姓皆得官每憂形于色曰吾家德不勝福何以堪也諸子或屑越賜物輒或曰縣官所賜皆著籍他日復宣索汝曹將重得罪諸子竊笑以為迂自貴卒後通與其兄喜弟逹等逐日驕橫其家慿倚恩春聲勢烜赫矣質實萬通諸城人錦衣指揮貴之子九月劉珝罷萬安與南人相黨附珝及尹旻王越又與北人為黨顧珝性疏直自以宫僚舊臣遇事無所曰護刑部員外郎林俊以劾梁芳繼曉下獄珝于帝前解之李孜省輩左道亂政欲動搖東宮珝密疏諫帝皆不悅珝又素薄安嘗斥安負國無恥安忿日夜思中珝汪直寵衰安偵知西厰可罷邀珝同奏珝懲商輅前事且見言官方交章請罷皆不允以為直寵固無恙也因辭不與安逐獨奏之隂使人訐珝與直有連帝疑未發安又使人為劉公子曲增飾穢語雜教坊院本奏之劉公子謂珝子鎡也帝怒遣中官持手封書一函詣閣乃人訐珝書安與劉吉佯驚敕言當令乞休去以全始終翌日珝具疏乞休詔允之其實排珝使去者安吉兩人謀也冬十一月召馬文升為兵部尚書汪直敗之嵗文升復官致仕其明年起為左副都御史巡撫遼東文升凡三至遼軍民聞其來皆鼓舞益禁益中官總兵使不得朘削衆益大喜逾年進右都御史總督漕運㑹淮安及徐和二州饑移江南糧十萬石鹽價銀五萬兩振之尋即有是命時李孜省方怙寵文升既入朝頗惡其為人有所言孜省亦深嫉文升矣十二月以彭華為吏部左侍郎兼翰林學士入內閣預機務華深刻多計數善伺人短與萬安李孜省相結得入閣素嫉尹旻與安等伺得旻子侍講龍諸隂事下龍詔獄執訊午門多所株連旻致仕去龍除名由是人皆畏華而惡之踰年以風疾罷質實按尹龍之獄事載憲宗實録旻鄉人有武選郎鄒襲者以司吏樊忠韓錫盜敕事發坐防範不謹調外襲素與旻子龍及侍讀焦芳交善因謀為指揮張旺等一百二十三人保留襲疏上之既下吏部議旻復奏曰此公論也乞復襲官帝已疑旻私襲曰爾何繇知為公論然尚勉從旻議不深責旻也未幾東厰緝事者發襲等交通狀旻自服罪帝責其徇情妄奏落旻太子太傳為太子少保時二十二年四月也甫踰月而厰校又發龍納賄事給事中張雄劉清劉升御史陳孜等交章劾龍并及旻帝宥旻而下龍錦衣衛獄令法司㑹鞫于午門通判王範經厯張璲並以賂龍得官逮訊詞連郎中劉紳員外郎董寧同知朱紳副使謝顯王錦馮蘭六人獄上命旻以尚書致仕龍削籍範等謫有差侍郎耿裕黎淳以阿默停祿三月而焦芳坐為襲莗保留疏謫同知于是御史吕璋等復劾侍郎侣鍾秦紘大理寺丞劉瓛寺副蘇泰大僕寺卿張海順天府丞黃傑洗馬羅景給事中馬龍御史劉璧于壁高輔張鼐編修王敕員外郎楊棨袁弼皆以山東人坐旻黨調降龍獻之本末如此丙午二十二年秋七月前少保謹身殿大學士商輅卒輅再入閣前後預機務二十一年家居十年卒年七十三贈太傅諡文毅輅平粹簡重寬厚有容臨大事决大議毅然莫能奪既謝政劉吉過訪邸第見其子孫林立歎曰吉與公同事厯年未嘗見公筆下妄殺一人宜天之報公厚輅曰正不敢使朝廷妄殺一人耳八月謫江西巡撫閔圭為廣西按察使陜西巡撫鄭時為貴州左參政江西南贑諸郡多盜率獻資強宗投為僕事發輒相倚庇拒有司不就捕圭請連坐其主以清盜藪法司議從之而泰和尹直新建謝一䕫皆怒圭竟謫官廣西命下一䕫喜謂人曰圭之謬也非吾孜省密啓于帝吾鄉縉紳尚得高枕乎人乃知圭之左降李孜省力也鄭時自十九年撫陜西頻嵗大餞人相食請于朝發帑金十萬轉漕四十石躬督屬吏給振銖粒皆有籍無敢漁者所全活甚衆㑹孜省以災異貶頃之復用事與梁芳亂政如故時聞之歎曰如此則災未有已也吾安可以外吏循默遂條上五事曰盡誠敬以回天意明義理以杜妖妄減供奉以蘇民困重名器以待有功罷傳奉以抑僥幸蓋為芳孜省發也疏入尋有貴州參政之貶陜民哭送之至遮道不得行帝聞頗悔為斥傳奉官十人繫六人獻詔自今中㫖授官者俱覆奏然不罪芳孜省也時有御史姜昂者亦憤孜省等亂政倡同官疏劾其罪帝怒昂妄言杖午門外質實泰和隋改西昌縣置太和元升州明改太和縣屬吉安府新建宋析南昌縣地置明屬南昌府今並因之閔圭字朝瑛烏程人鄭時字宗良舒城人姜昂字恆俯太倉州人謝一䕫字大韶新建人初冒姓王後改九月罷南京兵部尚書王恕出馬文升代之前二年恕自應天巡撫改南京兵部尚書林俊以劾梁芳繼曉下獄恕疏爭俊不當罪帝不懌恕侃侃論列無所避先後應詔陳言者二十一建白者三十九皆力阻權幸天下傾心慕之過朝事有不可必曰王公胡不言也或又曰公疏且至矣已恕疏果至時為謡曰兩京十二部獨有一王恕于是貴近皆側目帝亦頗厭苦之是年起用傳奉官恕諌尤切帝愈不恱㑹南京兵部侍郎馬顯乞罷匆附批曰王恕老劣矣亦令致仕而文升為李孜省所譖遂出以代怒一舉而閒廢兩名臣朝野大駭工部主事王純疏請留恕命杖之貶二秩外調質實馬顯字文明廣平人王純仙居人逮廣東布政使陳選道卒選于天順中巡按江西盡斥貪殘吏成化初督學河南汪直出巡都御史以下皆拜謁選獨長揖久之進按察使决遣輕繫數百人重囚多所平反囹圄為空治尚簡易獨于贓吏無所假厯廣東左右布政時詔減省貢獻而市舶中官韋眷肆橫奏乞均徭户六十人添辦方物選持詔書爭帝命與其半春由是怒選畨人馬力麻詭稱蘇門答剌使臣欲入貢私市易眷利其厚賂將許之選聞立逐之畨禺令高瑶發眷通畨事沒其資巨萬入官都御史宋旻不敢結選移檄奬之且聞于朝春恨選益甚逐誣選瑶朋比為貪墨遣刑部郎中李行及巡按御史徐同愛勘之眷賄選所黜吏張褧令誣證褧堅不從拷掠無異辭行等畏眷竟以誣獄上與瑶俱被逮士民數萬號泣遮留使者辟除乃得出至南昌疾作行阻其醫藥竟卒張褧聞選死哀悼乃上書曰竊見故罪人選孑處羣邪之中獨立衆憎之地太監韋眷通畨敗露知縣瑶按法持之選移文奬勸以激貪懦固賢監司事也都御史宋旻及同愛怯勢養奸致眷橫行胸臆穢衊清流勘官李行頤指煆煉竟無左證臣本小吏詿誤觸法被選黜罷實臣自取眷謂臣憾選厚賂噉臣臣雖胥役敢昧素心行等逮臣致理拷掠百端臣忍死籲天終無異口行等乃文致其罪選故剛直不堪屈辱憤悶旬日身嬰重疾行等幸其殞身阻其醫療訖命之日密走報眷小人侫毒一至于此臣擯黜罪人秉耒田野百無所圖誠痛忠良銜屈而為聖朝纍也不報質實陳選字士賢臨海人後家于鄞案明史選傳𢎞治初主事林沂疏雪選寃詔復官禮葬正德中追贈光祿卿諡忠愍宋旻字宏澤淳安人李行新喻人徐同愛常山人遣刑部左侍郎何喬新勘播州土司訟初巡撫張瓚之奏設安寧宣撫也受播州致仕宣慰掦輝屬因請任輝庶長子友為使而友忮其弟愛嗣輝職雖授宣撫使意未慊輝沒友與長官張淵謀刺愛不果遂誣奏愛居處器用僭擬朝廷又通唐府密書往來私習兵法天文謀不軌事乃遣喬新住勘將行請曰楊氏主播州五百餘年諸蠻服從久矣厯代寬以文法蓋治之以不治也今但宜二人面質真僞無令驚疑帝是之喬新至盡得其始末白愛誣奪友官遷保寧羈管斬張淵播州遂安質實唐府謂定王桱孫莊王芝址也成化十二年襲封以尹直為戶部左侍郎兼翰林學士入內閣預機務直明敏博學練習朝章而躁于進取性矜忌不自檢飭前為侍讀學士覬擢禮部侍郎而尚書尹旻不欲薦直直竟以中㫖得之翼日遇旻于朝舉笏謝旻曰公所謂簡在帝心者由是兩人交惡直尋以憂去服除起南京吏部侍郎就改禮部凡在南部八年鬱鬱不得志屬其黨萬安謀內召旻輒持不可諸朝臣亦皆畏直幸其在南卒倚安及李孜省力召為兵部侍郎益比孜省與彭華共傾旻以泄怨至是復由中㫖入閣物論鄙之丁未二十三年春正月皇貴妃萬氏卒妃服用器物窮極僭擬中官侫幸錢能覃勤汪直梁芳韋興輩皆假貢獻苛斂民財傾竭府庫以結妃歡四方進奉異物皆歸之父兄弟姪皆授都督指揮千百戶等官性嫉妬掖庭御幸有身飲藥傷墜者無數至是卒帝震悼輟朝七日諡曰恭肅端愼榮靖皇貴妃命南京右都御史屠滽諭護占城王古來歸國初安南黎灝據占城復發兵執王弟盤羅茶悅王孫齊亞麻弗菴與弟古來走佛靈山避難中朝屢諭灝返侵地灝率詭辭對其後乃訪齊亞麻弗菴立之畀以國南邉地而占城故壤凡二十七所四府一州二十二縣里計三千五百有竒割畀才十之二餘為灝據如故王孫既新立遣使請封給事中馮義行人張瑾齎印冊在行而聞王孫死慮空還失利亟抵其國封提婆苔為王獲厚賂而返提婆苔者灝僞敕所封占城畔人也義返至海洋病死瑾自廣東上其事詭言王孫為弟古來所弒不得已封其國所欲立者而古來貢使已前至方告齊亞麻弗菴之喪請嗣封且乞宣諭安南悉還故壤猶不知提婆苔之據其國也于是禮官劾瑾妄下錦衣獄訊之伏罪論斬尋敕古來撫諭提婆苔令上國王印提婆苔不受命乃遣給事中李孟暘行人葉應冊封古來為國王孟暘以提婆苔方竊據憚行請傳諭古來詣廣東受封古來乃自老撾挈家赴崖州封事竣欲躬詣闕廷奏安南之罪總督宋旻以聞廷議遣大臣經理其事因以命滽至廣東即傳檄安南宣示禍福募健卒二千人駕海舟二十艘護古來還國安南以滽大臣奉特遣不敢抗古來乃得人質實屠滽字朝宗鄞縣人馮義韓城人張瑾吳縣人李孟暘睢州人葉應歸善人二月以李孜省為禮部右侍郎孜省既貶復用益作威福假扶鸞術言江西人赤心兵報國于是致仕副都御史劉敷禮部郎中黃景南京部侍郎尹直工部尚書李裕禮部侍郎謝一䕫皆因之以進執政大臣萬安劉吉從而附麗之所喜者則援之通顯所怒者則搆之貶斥憾應天府丞楊守隨嘗劾已譖于帝謫南寧知府去他所排擠甚衆朝野側目前年冬擢通政使至是進禮部侍郎掌通政司如故一時侫幸竊權寵者無與侔比矣質實黃景上高人李裕字咨德豐城人由南京都御史召為工部尚書尋改吏部與閣臣彭華並以賄孜省得擢時人為之謡曰八百憲臺升李裕三千館閣薦彭華孝宗實録于華之卒載其語云發明明季門户之習為一代深錮之患然當成化以前末有顯然援結芘其鄉里連及闔省者也自李孜省擅寵薦引鄉人彭華入閣復假邪術言江西人赤心報國而同省大臣皆因之以進厥後孜省既敗焦芳用事銜孜省輩之黜已遂減江西解額且榜禁之使不得選朝官譽北故南相尋報復黨禍之結自此始矣夫人臣植黨樹援未有不害于而國者然多以學術意氣私相矜許久之乃成角立之𫝑若孜省者一佞幸小人習五雷道法迎合憲宗意㫖與奸僧繼曉竊取尊顯偶假扶鸞仙鬼之伎遂開朋黨比附之門使朝局為之一變可不愼歟秋七月封子五人為王祐杬興王祐棆岐王祐檳益王祐楎衡王祐橒雍王質實明史諸王傳岐王憲宗第五子後之藩德安益王第六子後之藩建昌衡王第七子後之藩青州雍王第八子後之藩衡州岐王永王皆邵太后生益王衡王皆張德妃生八月帝崩是月庚辰帝不豫甲申命皇太子視朝于文華殿戊子大漸己丑崩九月太子祐樘即位赦是為孝宗以明年為𢎞治元年太監梁芳方士李孜省等及外戚萬喜以罪謫戍有差言官劾孜省及其黨鄧常恩趙玉芝交結太監芳外戚喜等諸不法事論死上以宅憂謫芳南京少監喜指揮使孜省常恩玊芝等戍陜西邉芳等既謫戍遇赦當還印綬監太監蔣琮言芳等罪大不當赦復逮下獄孜省不勝搒掠死常恩玊芝尋復遇赦仍徙邉方廢死冬十月罷傳奉官奪僧道封號帝用科道言降黜傳奉官通政任傑侍郎蒯鋼指揮僉事王榮等二千餘人罷遣禪師真人等二百四十餘人法王佛子國師等七百八十餘人並追誥敕印仗遣歸本土質實任傑王榮皆不知何許人尊皇太后為太皇太后皇后為皇太后立皇后張氏先是孝穆太后薨外廷藉藉指萬貴妃帝即位魚臺丞徐頊疏請上母妃尊諡遷葬並追究薨故廷臣議建萬氏戚屬下錦衣鞫治萬安懼不知所出曰我久與萬家不往來劉吉亦有運自危與尹直共擬㫖寢之帝仁厚恐傷先帝意不問安吉得無事質實皇后張氏興濟人萬安罷安草登極詔書禁言官風聞言事中外譁然安尋亦悔之及上兩宫尊號遂詔陳天下利弊御史湯鼐詣閣安從容曰此非裏面意吾輩維持君等耳鼐即以其語聞謂安歸過于君無人臣禮于是庶吉士鄒智御史文貴姜洪等交章列其罪狀先是歙人倪進賢者粗涉書史無行諂事安日與講房中術安昵之因令就試得進士授為庶吉士除御史帝一日于宫中得疏一小篋皆論房中術者末署曰臣安進帝令懷恩特至閣曰此大臣所為邪安愧汗伏地不能出聲及諸臣彈章入復令思就安讀之安數跪起求哀無去志思直前摘其牙牌曰可去矣始惶懼歸第乞休安去時年七十餘在道猶望三台星冀復用居一年卒在政府二十年每遇試必其門生為考官子孫甥壻多登第者子翼南京禮部侍郎孫𢎞璧翰林緺修安死無幾翼𢎞璧相繼死安遂絶質實湯鼐字用之夀州人鄒智字汝愚合州人文貴湘鄉人姜洪字希範廣德人追諡母紀氏為孝穆皇太后帝悲念太后遣人求太后家先是太后在宫中嘗自言家賀縣姓紀幼不能知親族也于是有妄冒太后戚畹以希寵貴者十數輩後事露皆謫戍而太后家終不可得其後禮臣上言可倣太祖封徐王故事定擬太后父母封號立祠桂林致祭帝詔曰孝穆太后早棄朕躬每一思念惄焉如割初謂宗親尚可旁求寧受百欺冀獲一是卿等謂嵗久無從物色請加封立廟以慰聖母之心皇祖既有故事朕心雖不忍又奚敢違逐封后父慶元伯后母伯夫人立廟桂林府有司嵗時祀焉大學士尹直撰冊文有云覩漢家堯母之門增宋室仁宗之慟帝燕聞念誦輒欷歔泣下也質實賀縣漢臨賀縣唐為賀州治明洪武初以臨賀省入賀州尋降州為縣屬桂林府今因之以吏部左侍郎徐溥兼翰林學士入內閣預機務尋進禮部尚書兼文淵閣大學士已劉吉罷去遂為首輔漙承吉恣睢之後鎮以安靜務守成法嘗曰祖宗法度所以惠元元者至矣患不能守耳時人比之漢丙吉云質實徐漙字時用宜興人十一月召王恕為吏部尚書以馬文升為左都御史時恕致仕家居言官論安者輒薦恕司禮監懷恩亦素重之力勸帝故即家起用之而文升亦以時望得內召尹直罷以劉健為禮部右侍郎兼翰林學士入內閣預機務給事中宋琮御史許斌言直自為侍郎以至入閣夤緣攀附皆取中㫖帝于是薄其為人令致仕健學問深粹以身任天下之重先為少詹事充東宫講官受知于帝帝立乃有是命于時羣邪漸黜衆正並升海內欣然望治矣質實劉健字希賢洛陽人宋琮隴西人許斌陽曲人禮部左侍郎邱濬進大學衍義補濬以真德秀大學衍義止述修身齊家事而治國平天下闕焉乃博採羣書以補之至是表上于朝帝稱善進濬尚書賚金幣詔刋行其書既而濬以書中所載皆可見之行事請摘其要者下內閣議行之帝報可質實大學衍義補六十一卷誠意正心之要曰審幾微治國平天下之要曰正朝廷曰正百官曰固邦本曰制國用曰明禮樂曰秩祭祀曰崇教化曰備規制曰愼刑憲曰嚴武備曰固封圉曰成功化十二月葬荗陵諡曰繼天凝道誠明仁敬崇文肅武宏德聖孝純皇帝廟號憲宗質實荗陵在昌平州聚寶山東少南明史贊曰憲宗早正儲位中更多故而踐阼之後上景帝尊號恤于謙之寃抑黎淳而召商輅恢恢有人君之度矣時際休明朝多耆彥帝能篤于任人謹于天戒蠲賦省刑閭里日益充足仁宣之治于斯復見顧以任用汪直西厰橫恣盜竊威柄稔惡弄兵夫明斷如帝而為所蔽惑久而後覺婦寺之禍固可畏哉御定資治通鑑綱目三編卷十五
