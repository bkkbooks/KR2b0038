  text: 欽定四庫全書御定資治通鑑綱目三編卷三
  hash: sha256:b43e09407713235d7350341df90ca59424f0f593967f77678283a89897d7dc58
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0038_WYG_008-1a, image: WYG0340/WYG0340-0064c.png}
body:
  text: 起丁卯明太祖洪武二十年盡戊寅明太祖洪武三十一年凡十二年丁卯二十年春正月以馮勝為征虜大將軍率師征納克楚元太尉納克楚擁衆數十萬屯金山數侵遼東帝以勝為大將軍傅友德藍玉為副帥師二十萬征之諭曰彼情詭詐爾等且駐師通州遣人覘其出沒元兵若在慶州宜以輕騎掩其不備若克慶州全師竟搗金山納克楚不意吾師之至必成擒矣復遣前所獲元將鼐喇固北還以書諭納克楚等軍次通州聞元兵有屯慶州者藍玉乘大雪帥輕輢襲破之斬平章郭勒禽其子布喇竒勝出松亭關分築大寧寬和會州冨峪四城駐兵大寧質實金山在今開原縣西北慶州在今巴林西北東西相距約二千里方輿紀要自喜峯口而北一百二十里有故松亭關遼金時戍守處也其相近者曰寬河城自是而東北曰會州城由會州城東曰富峪城又東北為大寧新城俱洪武時築鼐喇固舊作乃剌吾郭勒舊作果來布喇竒舊作不蘭奚今並改焚錦衣衛刑具時天下重罪逮至京者多收繫錦衣衛斷治適有富民繫衛獄用事者非法凌虐帝聞之怒曰訊鞫法司事也或令錦衣衛審之欲先得其情耳豈令其鍛鍊耶執用事者治之悉焚其刑具以囚送刑部二十六年復申明其禁詔內外獄毋得上錦衣衛大小咸經三法司夏六月馮勝至金山納克楚降勝自大寧帥師趨金山遣使送鼐喇固還至松花河納克楚見之大驚相勞問鼐喇固述帝恩德納克楚心動遣其左丞劉特默齊等來獻馬勝受之而引兵徑踰金山降金國公和通進壓納克楚營而軍初納克楚分兵為三營一曰榆林深處一曰養鵝莊一曰龍安伊圖河畜牧蕃盛及是為大軍所逼又已先入鼐喇固言意猶豫不決因遣使陽為請降以覘兵勢勝遣藍玉往受之納克楚所遣使亦還報極言大將軍兵盛納克楚乃仰天歎曰天弗使吾有此衆矣遂率數百騎詣玉玉大喜飲以酒納克楚酌酒酬玉玉解衣衣之納克楚不肯服王亦不飲爭讓久之納克楚取酒澆地顧其下咄咄語鄭國公常茂在坐其麾下趙指揮解蒙古語密告茂納克楚將遁矣茂直前縳之納克楚驚起欲就焉茂拔刀斫傷其臂不得騎都督耿忠擁以見勝勝重禮之使忠與同寢食納克楚將士妻子十餘萬衆在松花河北聞納克楚傷驚潰有欲來追者勝遣和通諭降之先後凡二十餘萬王九國公郡王四太尉國公五行省丞相一司徒平章十三右丞左丞三十一凡官屬將校三千三百餘人所獲輜璽馬蓄亘百餘里還次金山伊瑪河復收其殘卒三萬初帝聞捷即馳諭勝留兵五萬於大寧防後患散處降衆瀋陽崖頭間與遼東兵參住耕牧而勝以常茂驚潰敝衆懼不測乃盡俘其衆內徙大寧兵亦悉拔歸都督濮英以三千兵殿後時納充楚潰卒散匿者尚數萬聞之設伏于途謀竄取大軍過不敢發英役至猝為所乘馬踣被執英絶食不言乘間引佩刀刺腹死三千人殱焉勝之趨金山也臨江侯陳鏞失道戰殁事聞詔追封英金山侯諡忠襄以米帛給鏞家納克楚至京帝召見慰勞甚至封海西侯鼐喇固授千户賜金帛質實松花河即松花江一名混同江在吉林烏拉城東南源出長白山北流會嫩江黑龍等江入海即古粟末水也龍安即金隆安府元開元路明三萬衛今開原縣伊圖河在龍安城東下流入松花江瀋陽遼金庸州元瀋陽路明瀋陽衛今赤盛京陳鏞濠人陳德子舊劉特默齊舊作劉探馬和通舊作觀童伊圖河作一秃河伊瑪河舊作亦迷河今並改秋七月太白三辰晝見八月召馮勝還以副將軍藍玉領其軍勝奏常茂激變狀械至闕茂勝之壻也勝每於衆中卑折之茂不遜勝怒及納克楚衆潰勝歸罪於茂會有言勝多匿良馬使閽者行酒於納克楚妻求大珠異寶王子死二日強娶其女失降附心而茂亦許勝遇帝怒收勝大將軍印召還以藍玉攝之尋命勝就第鳯陽奉朝請而安置茂於龍州質實龍州宋置元為萬户府明仍為州土官趙氏世襲今改下龍上龍二司屬廣西太平府九月置大寧都指揮使司司治大寧乂至大寧中左右及會州等衛皆𨽻焉明年改為北平行都司質實會州城在大寧衛西南二百四十里詔商稅毋定額户部言天下稅課視舊有虧宜以洪武十八年所收為定額帝曰商稅多寡歲有不同限以定額豈不病民不從以藍玉為大將軍帥師北伐帝以故元特古斯特穆爾尚在終為邊患乃即軍中拜玉為大將軍延安侯唐勝宗武定侯郭英副之都督耿忠孫恪為左右參將率師十五萬往征之是冬元將托克托降於玉質實孫恪興祖之子參將明初設無品級無定員多以勳戚充之其後秩在副總兵下遊擊次之托克托舊作脫脫今改冬十一月命湯和築瀕海城備倭先是帝以倭患命和巡視浙江福建沿海諸城又命江夏侯周德興於福建濱海福漳泉興化四郡築城練兵以備之德興相視形勢築城十有六民户三丁取一以充戍卒是時和已請老會倭冦上海帝召和謂曰卿雖老強為朕一行和請與方鳴謙俱鳴謙國珍從子也習海事帝訪以禦倭策鳴謙曰倭海上來則海上禦之耳請量地逺近置衛所陸聚步兵水具戰艦寨壘錯置其間則倭不得入入亦不得傅岸其兵則藉近海民四丁取一以充無煩客兵也帝以為然命和芾具事和乃度地浙東西置衛所並海築城五十有九選丁壯三萬五千人盡發州縣錢及籍罪人資給役役夫往往過望而民不能無擾浙人頗苦之或謂和曰民讟矣奈何和曰成逮算者不恤近怨任大事者不顧細謹國無備及干戈鋋井里將壚餘何有焉復有讟者齒吾劒踰年而城成選丁壯五萬八千餘人戍之海防大飭其後嘉靖間東南苦倭患和所築城堅緻久而不圮民賴以相保咸歌思之請于朝立廟祀焉質實上海宋鎮元縣明屬松江府今因之十二月振濟南東昌東平登萊飢振濟南三府飢民凡六萬三千八百餘户又遣刑部尚書唐鐸運鈔百餘萬錠振登萊飢質實登州唐置明初屬萊州府九年升府今因之戊辰二十一年春正月詔治有司匿災者罪青州飢有司匿不以聞詔逮治之且著為令于是遣人馳驛往振户凡二十一萬四千六百鈔五百三十六萬錠有奇三月沐英討思倫發破走之先是思倫發誘羣蠻冦馬龍他郎甸之摩沙勒寨沐英遣都督同知寧正擊破之至是思倫發悉舉其衆冦定邊號三十萬英選騎三萬馳救以輕騎三百挑之百夷以萬人驅三十餘象酋長跨巨象直前指揮張因率騎卒五十餘人為前鋒注矢中象左滕及脅象仆射殺酋長大呼突陳衆逆却英曰賊無能為也乃置火炮徑弩為三行蠻驅百象被甲翼以標槍鋭甚英分軍為三都督馮誠居前同知寧正友湯昭右英與將士約有功者實退切者斬因乘風縱火炮弩並發象皆反走賊有昔刺者殊死鬬左軍少却英登髙望之取佩刀命左右斬帥首來左帥見一人握刀馳下恐奮呼突陳大軍乘之無不一當百蠻大敗斬馘四萬餘生獲象三十七賊帥各被百餘矢伏象背死思倫發遁去明年遣使入貢麓川平緬遂平質實馬龍他郎甸今雲南元江州新平縣西北有故新化州嶲為馬龍他郎二甸地明升為州今裁摩沙勒寨在故新化州東南其地羣山夾江險隘如峽定邊明縣屬楚雄府今併入蒙化廳置巡司於此夏四月藍玉襲破元特古斯特穆爾于捕魚兒海獲其子迪保努玉以大軍出大寧至慶州聞特古斯特穆爾在捕魚兒海間道馳進次紐琿南道無水軍士渴甚路傍小山忽湧四泉士馬得不困乏至百眼井去捕魚兒海四十餘里不見敵玉欲還定逺侯王弼曰吾等提十萬衆深入至此無所得何以後命玉曰然令軍士穴地而爨毋見煙火乘夜馳至捕魚兒海黎明東北去敵營八十餘里時大風揚沙晝晦軍行無知者敵不設備弼為前鋒大破之斬太尉曼濟等降其衆特古斯特穆爾以其太子添保努等數十騎遁獲其次子迪保努及妃主以下百餘人追獲吳王代王等官屬三千男女七萬七千餘人並寶璽符敕金牌金銀印等物馬駝牛羊十五萬車三千奏捷京師帝大悅遣使齎敕勞玉比之衛青李靖玉又破哈喇章營獲人馬六萬師還進涼國公迪保努及妃主進京帝命有司給第宅廩餼既有言玉私元主妃事帝怒玉無禮切責玉妃聞而自縊迪保努由是有怨言帝聞之曰朕嘗與儒臣議欲封之以盡待亡國之禮迪保努乃若是豈可使復居內地于是遣使送往琉球仍厚資遣之時元四大王久匿山中其下逃散略盡四大王窮蹙詣晉王府降帝命徙之雲南是年納克楚亦卒以其子察罕為潘陽侯後坐藍玉黨卯質實捕魚兒海在慶州西北今克什克騰西北周數十里紐琿南道及小山泉方輿紀要云在慶州西境濟迪保努舊作地保奴紐琿南道舊作遊魂南道曼舊作蠻子今並改髙麗李成桂囚其王禑而立禑之子昌禑欲冦遼東使其軍都相往瑩李成桂繕兵成桂遣千户陳景屯艾州以糧不繼而退禑怒殺成桂之子成極還兵攻之逼禑遜位于其子昌陳景來降成桂又以禑本幸肫子禑之子亦不可為王氏後明年乃廢昌别求王氏疏屬定昌國院君瑶立之質實艾州一統志作憂州𨽻黃海道在朝鮮國城西南五月甲戌朔日有食之六月信國公湯和歸鳯陽帝春秋寢髙不欲諸將久典兵未有以發也和以間從容乞骸骨帝大悅賜鈔治第鳯陽並為諸公侯治第至是第成和築城海上還率妻子陛辭帝褒諭之賜賚甚厚秋七月以解縉為監察御史縉舉是年進士授中書庶吉士甚見愛重一日帝在大庖西室諭縉曰朕與爾義則君臣恩猶父子當知無不言縉即日上封事萬言略曰臣聞令數改則民疑刑太繁則民玩國初至今將三十載無幾時不變之法無一日無過之人臣聞陛下鋤根剪蔓誅其姦逆矣未聞褒一大善賞延于世始終勿替者也或朝賞而暮戮或忽罪而匆赦陛下每多自悔之時輒有無及之歎此由存養之功少加密耳若夫祀天冝復掃地之規尊祖冝復七廟之制奉天不冝為筵宴之所文淵猶未備館閣之隆太常非俗樂可肄官妓非人道所為禁絶倡優易置寺閹執戟墀陛皆用俊良勿興土木之工勿貪四裔之地減紐縣省冗官痛懲法外威刑永革京城工役婦女非帷簿不修毋令逮繫大臣有過惡當誅不冝加辱近歲臺綱不肅以刑名輕重為能事以問囚多寡為勳勞御史糾彈皆承密旨每聞上有赦宥則必過以執持意謂如此則上思愈重此皆小人趨媚效勞之細術陛下何不肝膽而鏡照之哉陛下進人不擇賢否授職不量輕重椎理嚚悍之夫閻茸下愚之革朝捐刀鑷暮擁冠裳左棄筐篋右綰組符雖曰立賢無方亦盍忱詢有德古者善惡鄉鄰必記今互知之法雖嚴而訓誥之方未備臣欲求古人治家睦鄰之法若古藍田吕氏鄉約今義門鄭氏家範布之天下世臣大族率先以勸將見作新於變至于比屋可封不難矣臣聞地有盛衰物有盈虛而商稅之徵率皆定額既稅於所産之地又稅於所過之津何奪民之利如此密也且多貧下之家逃亡轉徙無前日之生植有前日之稅糧或膏腴而稅反輕瘠鹵而稅反重此胥里之弊也欲拯困而革弊莫若行投田均田之法兼常平義倉之舉積之以漸至於九年之食無難者夫連坐起於秦法孥戮本於偽書今為善者妻子未必蒙榮有過者里胥已陷其罪况律以人倫為重而有給配婦女之條聽之于不義則又何取夫節義哉同寅協恭相倡以禮今內外百司捶楚屬官甚於奴𨽻是使柔儒之徒蕩無廉恥甚非所以勵風節也臣但知罄竭愚衷急於陳獻所奏略興次序惟陛下垂鑒書奏帝稱其才縉嘗入兵部堂索皂𨽻語嫚尚書沈溍以聞帝曰縉以冗散自恣耶遂命為御史既而縉復代郎中王國用草疏為李善長申雪又嘗為同官夏長文草疏劾都御史袁泰於是大臣皆惡之會有詔近臣父皆得入覲縉父聞至帝召謂曰大器晚成若以而子歸益令進學後十年來用未晚也遂罷歸質實解縉字大紳吉水人沈溍字尚賢錢塘人發明縉年二十成進士負才頴敏受特達之春縱言無諱自以為賈鼂不過也數上封事言分封勢重萬一不幸必有厲長吳濞之虞深中時弊然敷陳繁傳或不盡切於事理即如授田均田之疾實泥古而不可行且疏放自恣露才揚已其後不能殉建文之難卒被髙煦之讒僵死紀綱之手惜哉九月勑天下衛所屯田更定屯田法凡衛係衝要都會及王府護衛以十之五屯田係衛所以五之四歲得糧五百餘萬石越州蠻叛命沐英傅友德討之越州土酋阿資故知州龍海子也沐英南征時駐兵其地諭降龍海奏以為知州未幾即叛英以計禽之徙遼東阿資襲父職益桀鷔至是反帝命英友德會兵討之友德道過平彛以其山險峻留兵千人守之進擊阿資於普安大破之蠻衆攀岸緣壁墜死者不可勝數阿資遁還越州阿資之叛也掦言曰我地有萬山之險豈能盡滅英乃請置越州馬龍三衛扼其險要又分兵勦捕阿資窮蹙遂請降僉都御史黃政從征雲南還次普安遇冦與其子琬力戰死之質實越州本苦麻蠻部元時內屬置越州明改衛今裁故城在曲靖府南寧縣平彛明衛今改縣屬曲靖府馬龍元州明屬曲靖府今因之按苦麻元史地理志作普麼今作明史曲靖土司傳黃政碭山人以卓敬為户科給事中敬鯁直無所避時制度未備諸王服乘擬太子敬乘間言京師天下視效陛下於諸王不早辨等威而使服飾與太子埒嫡庶相亂尊卑無度何以令天下帝笑曰爾言是朕未慮及此益器重之他日敬與同官進見適八十一人帝命改官為元士尋以六科為政事本原又改曰源士已復稱給事中質實卓敬字惟恭端平人冬十月元伊遜岱爾弒其主特古斯特穆爾特古斯特穆爾既遁將依丞相耀珠于和林行至圖拉河為其下伊遜岱爾所襲衆遂散獨與知院訥克林等十六騎俱耀珠來迎欲共往依庫庫特穆爾會大雪不得發伊遜岱爾兵猝至以弓弦縊殺之並殺其太子添保努訥克林等遂來降自是五傳至坤特穆爾皆被弒不復紀年有郭勒齊者篡立稱汗去國號遂稱韃靼云質實耀珠舊作咬住訥克林舊作揑怯來庫庫特穆爾舊作濶闊帖木兒别一人非王保保也今並改十二月安南黎季犛廢其王煒尋殺之陳叔明立三歲傳其弟煓煓死弟煒代立其相黎季犛竊柄廢煒弒之立叔明子日焜立國事己巳二十二年春正月改大宗正院為宗人府府設令一人左右宗正宗人各一人以秦王樉為宗人令晉王棡為左宗正燕王棣為右宗正周王橚為左宗人楚王楨為右宗人其後以勳戚大臣攝府事不備官質實大宗正院洪武初設二月禁武臣預民事時廣西都指揮耿良造譙樓發民丁青州等衛造軍器科民財於是詔申明其禁凡有造作逹五軍都督府奏準方行湖廣千户夏得忠作亂靖寧侯葉升討之得忠伏誅安福千户夏得忠誘九溪洞蠻為冦升同胡海等討之駐兵賊境升獨潛兵出賊後掩擊禽得忠送京師斬之置九溪永定二衛改大庸衛為千户所質實安福千户所在澧州慈利縣西北今改安福縣屬澧州九溪即九渡溪慈利縣西三十里有九渡山上冇仙樓下有九溪水水經注九渡水南出九渡山山下有溪又以九渡為名九溪故衛在今安福縣北永定衛在慈利縣西南今改永定縣屬澧州大庸所在永定西南葉升合肥人夏四月賜江西山東湖廣貧民鈔帝諭户部九江黃州漢陽武昌嶽州諸郡多貧民其遣人運鈔往振之又賜山東流民居京師者鈔振萊州兖州飢又振常德長沙辰州靖州衡州永州寶慶彬州德安沔陽安陸襄陽貧民凡鈔二百六十四萬餘錠户部請造小鈔自一十文至五十文以便民用從之遣御史按山東官匿災者御史許圭巡按河南言自開封永城至彰德旱請減夏稅左都御史詹徽以其希旨要譽請罪之帝曰御史能恤民隱逹下情何罪耶即命振貸蠲其稅質實漢陽元郡元明府兖州隋置明府長沙秦郡明府衡州梁置明府德安劉宋郡宋元明府今皆因之安陸元府明降州嘉靖中升承天府今仍安陸府永城縣隋置明屬歸德府今因之詹徽字資善同之子五月置泰寧朵顔福餘三衛三衛地本烏梁海所居在黑龍江南元大寧路北地元遼王阿爾察錫喇及惠寧王朵顔元帥內附帝即其地置三衛曰泰寧以阿爾察錫喇為指揮使塔本特穆爾為指揮同知曰朵顔以托羅海徹爾為指揮同知曰福餘以哈克三納逹齊為指揮同知各領所部以安畜牧獨朵顔地險而強初三衛分地延袤共千餘里在潢水北及後斬徙潢南自全寧抵喜峯口近宣府皆屬朵顔自錦義厯廣寧至遼河皆屬泰寧自黃泥窪東逾潘陽鐵嶺至開原皆屬福餘東西亘三千里質實三衡按今土默特阿嚕科爾沁等部為泰寧衛故地喀爾沁敖漢奈曼翁牛特巴林等部及熱河五廳為朵顔衛故地科爾沁郭爾羅斯杜爾伯特札贊特等部為福餘衛故地黑龍江上源曰諤諾河自西北流六千餘里經薩哈連烏拉城東南與混同江合方輿紀要云僥樂水或謂之烏龍江大寧在烏龍江南漁陽塞北即饒樂水矣潢水在臨潢城南一曰黃巖水即西喇穆楞河也源出古北口北五百餘里蒙古克什克騰界內之伯爾克和爾特克東流經口外諸蒙古駐牧地又東南至開原縣西北會赫爾蘇河入邊為遼河喜峯口在遵化州東北七十里義州金置明義州衛今義州屬錦州府廣寧金府元路明廣寧衛今廣寧縣屬錦州府遼河在奉天府西一百里廣寧縣東北二百三十里有東西二源自邊外合流而南經開原鐵嶺二縣西又南經承德遼陽海城之西又南入海黃泥窪方輿紀要云廣寧衛東南七十里為三坌兒堡近堡有黃泥窪鐵嶺衛故城在今鐵嶺縣東南五百里洪武二十六年徙置今縣地開原元開元路明改開原置三萬衛今開原縣塔烏梁海舊作兀良哈阿爾察錫喇舊作阿札失里本特穆爾舊作塔賓帖木兒托羅海徹爾舊作脫魯忽察兒哈克三納逹齊舊作海撒男答奚今並改秋九月丙寅朔日有食之十一月擢海州同知陳龔福為太僕寺少卿陳龔福故元御史大夫福夀之子也坐事當戍邊帝念其父死節特宥而擢之冬十二月遷周王橚於雲南尋止之橚擅棄其國來居鳯陽帝怒命遷之雲南尋止勿徙使居京師二十五年復敕歸籓庚午二十三年春正月命晉王棡燕王棣帥師北伐命傳友德等以北平兵從燕王王弼等以山西兵從晉王征耀珠及鼐爾布哈二月河決歸德決歸德東南鳯池口徑夏邑永城諸縣發興武等十衛士卒輿歸德屬縣民併力築之一月成及秋又決開封西華諸縣災遣使振萬五千七百餘户質實歸德黃河自開封府儀封縣流入境東經睢州考城商邱虞城夏邑縣北又東入江南碭山縣界歸德唐軍金府明降州嘉靖中復為府夏邑縣本下邑明改夏邑屬歸德府今皆因之三月燕王棣至伊都元太尉鼐爾布哈等降棣出古北口偵知鼐爾布哈營伊都胃大雪馳進去敵一磧先遣指揮和通往和通故善鼐爾布哈至則相持泣頃之大軍壓其營鼐爾布哈等驚欲遁和通止之引見棣賜酒食慰諭遣還鼐爾布哈喜過望遂偕耀珠等來降二十五年命元降軍赴北平聽燕王調用棣兵自此益強質實伊都方輿紀要云明初王師擒鼐爾布哈於興和西北則伊都當在興和城西北伊都舊作迤都今改夏四月潭王梓自焚死梓聰明好學嘗會府僚設醴賦詩品其髙下而賚豫之妃於氏都督顯女也顯與子琥坐胡惟庸黨誅梓不自安帝遣使召之大懼與其妃自焚死無子國除閏四月詔百官期服毋奔喪初百官聞祖父母伯叔兄弟喪俱奔赴吏部言一人或連遭五六期服或道路數千則居官日少更易繁數曠官廢事請自今期年服不許奔喪從之五月以楊靖為刑部尚書時詔在京官三年皆遷調著為令靖以户部尚書改刑部帝諭曰愚民犯法如啖飲食嗜之不知止設法防之犯益衆惟推恕行仁或能感化靖承旨治嶽明察而不事深文在部多所平反嘗鞫一武辨門卒檢其身得大珠僚屬驚異靖徐曰偽也安有珠大如此者立碎之帝聞歎曰靖此舉有四善焉不獻朕以求容悅一也不究其所投獻息大獄二也不奬門卒杜小人僥幸三也千金之珠猝然至前斥以為偽而辟之有過人之智應變之才四也質實楊靖山陽人賜韓國公李善長死先是善長弟存義免死安置崇明善長不謝帝銜之至是善長年七十七耄不檢下嘗欲營第從信國公湯和假衛卒三百人和以聞四月京民坐罪應徙邊者善長數請免其私親丁斌等帝怒按斌斌故給事胡惟庸家因言存義等往時交通惟庸狀命逮存義父子鞫之詞連善長或告善長云將軍藍玉至捕魚兒海獲惟庸通沙漠使者封績善長匿不以聞於是御史交章劾善長而善長奴盧仲謙等復告善長與惟庸通賂遺交私語吉安侯陛仲亨家奴彭特穆爾等亦告仲亨及延安平涼南雄侯等皆與惟庸結黨獄具坐以大逆會星變言者謂其占當移大臣遂賜善長死并殺其家屬七十餘人子祺尚臨安公主免死徙江浦祺子芳茂以公主恩得不坐吉安侯陸仲亨延安侯唐勝宗平涼侯費聚南雄侯趙庸河南侯陸聚宜春侯黃彬豫章侯胡美榮陽侯鄭遇春等皆同時坐惟庸黨死帝條列其罪作姦黨録布告天下明年虞部郎中王國用上言善長與陛下同心出萬死以取天下勳臣第一生封公死封王男尚公主親戚拜官人臣之分極矣藉令欲自圖不軌尚未可知而今謂其欲位胡惟庸使善長佐惟庸事成不過勳臣第一而已寧復有加於今日且善長豈不知天下之不可幸取當元之季欲為此者何限莫不身為齏粉覆宗絶祀善長胡乃以衰倦之年身蹈之也凡為此者必有深讎急變人不得已或至相挾以求脫禍今善長子祺托陛下骨肉親無纖芥嫌何苦而忽為此若謂天象告變大臣當災殺之以應天象則尤不可臣恐天下聞之謂功臣如善長且如此四方因之解體也臣亦知善長已死言之無益願陛下作戒將來耳帝覽之亦不罪也改彭特穆爾舊作封帖木今秋七月崇明海門海溢詔遣官振之發民二十五萬築堤八月詔毋以隸卒充選舉詔凡選舉毋録𨽻卒之徒質實按明洪武實録明史本紀俱作吏卒考選舉志進士為一途舉貢等為一途又有吏員氶差知印諸雜流為一途所謂三途並進也不得云凡選舉毋録吏矣按朱國楨大政記作𨽻卒合之選舉志所云倡優之家不許入試者正相比附𨽻為人役訛作吏今從大政記作𨽻振河南山東北平水災給鈔七十萬錠又振湖廣災凡鈔二十二萬餘錠九月庚寅朔日有食之冬十二月罷天下歲織文綺詔工部罷天下歲織假匹凡賞賚皆給絹帛如或匱乏就京織造工部尚書秦逵言造弓箭亦擾民帝命俱於京師後湖置局造之質實後湖一名元武湖在上元縣北秦逵字文用宣城人辛未二十四年春正月免山東登萊青兖濟南水災田租二月振髙密棲霞莒州被水民萬五千九百餘户質實髙密秦縣明屬膠州今屬萊州府棲霞縣金天會中劉豫析蓬萊縣置明屬登州府今因之莒州隋置明屬青州府今屬沂州府三月戊子朔日有食之夏四月河決原武河水暴溢決原武黑洋山東經開封城北又東南由陳州項城太和潁州潁上東至夀州正陽鎮全入于淮而賈魯河故道遂於又由曹州鄆城漫東平之安山元會通河故道亦淤遣官振之質實黑洋山在原武縣北二十里與陽武縣接界項城隋縣明屬陳州今屬陳州府太和宋置泰和縣明改泰為太屬潁州今屬潁州府潁上隋縣明屬潁州今屬潁州府正陽鎮亦名東正陽在夀州西六十里與潁上縣之西正陽鎮夾準相對賈魯河故道元順帝至正十一年以賈魯為總治河防使自儀封縣東北之黃陵岡南逹曹縣之白茅村攽于單縣之黃固歸德之哈只等口又自黃陵西至曹縣楊青村凡疏鑿二百八十里有竒河復故道曹州周曹國後周置州明屬兖州府今升府鄆城隋縣明屬濟寧州今屬曹州府安山東平州西南三十五里有安山一曰安民山志云漕河西岸有安民山山下為安山湖湖瀠泂百餘里流入小洞庭湖仍合汶水亦名積水湖元會通河故道元世祖至元二十六年間會通河起安山西南山壽張西北至東昌又西北至臨清引汶水以逹御河長二百五十餘里建插三十一以時蓄泄即今山東運河也賈魯字友恆河東髙平人封子十人為王栴為慶王權寧王楩岷王橞谷王松韓王模藩王楹安王桱唐王棟郢王伊王質實栴帝第十六子爾妃生封寧夏權第十七子楊妃生封大寧楩第十八子周妃生封岷州尋徙雲南橞第十九子郭惠妃生封宣府松第二十子周妃生封開原模第二十一子趙妃生封潞州楹第二十二子母未詳封平涼桱第二十三子李賢妃生封南陽棟第二十四子劉惠妃生封安陛第二十五子葛麗妃生封洛陽秋八月命皇太子巡撫陜西帝念天下形勢在西北欲徙都關中先遣大子相宅故冇是命秦王樉聞帝欲徙都有怨言帝怒召至京錮之及太子還為之解明年令歸籓九月倭冦雷州倭冦雷州遂溪縣雷州衛百户李玉鎮撫陶鼎戰死事開皆官其子質實雷州唐置明府遂溪縣唐置明屬雷州府今皆因之冬十月以馮堅為僉都御史堅南豐縣典史上書言九事一曰養聖躬清心省事以為民社之福二曰擇老成輔導諸王使正心直言以圖匡救三曰務農講武屯戍邊圉以備不虞四曰精選有司旌别屬吏使人勇於自治五曰褒祀典俾末俗有所興勸六曰省宦寺以防內權七曰調易邊將以防外患八曰採亷能以懲貪墨九曰會關防以革姦弊書奏帝嘉之稱其知時務逹事變又謂侍臣曰堅言調易邊將則未然邊將數易則兵力勇怯敵情出沒山川形勢無以備知倘得趙充國斑超者又何以數易為哉乃棹堅僉都御史堅在院頗持大體尋卒于官質實南豐三國吳置明屬建昌府今因之十一月皇太子還京師太子還上陕西地圖遂病病中猶上言經略建都事壬申二十五年春正月河決陽武旁浸陳州中牟原武封邱祥符蘭陽陳留通許太康扶溝杞十一州縣詔免其租振貧民七萬四千餘口發民丁及安吉等十七衛軍士修築會冬大寒役遂罷質實通許宋鎮金縣太康隋縣扶溝漢縣明俱屬開封府今因之安吉衛屬河南都司後為通州衛親軍發明上年河決原武全入于淮而賈魯河及會通河故道皆淤至是再決漫州縣十餘為患大矣未聞講求濬復之䇿冬寒罷役而明春不復修舉非禦災勤民之道也至永樂九年會通河開而故道乃復前軍都督僉事何福討都勻畢節諸蠻平之先是二十二年福平都勻蠻俘斬萬計收降寨洞一百五十二處二十四年拜平羌將軍討越州叛蠻阿資破降之至是平都勻所部九名九姓及畢節諸蠻畢節復叛大掠屯堡百户宋禮曲通皆戰死福檄後軍都督僉事茅鼎等搗其巢禽叛酋戮之分兵捕諸蠻建堡設戍質實都勻本都雲蠻元置都雲軍民府明改都勻衛𢎞治二年置府今因之九名九姓苖種元獨山州長官司明改九名九姓獨山州長官司𢎞治八年升為州屬都勻府今因之何福鳯陽人宥死囚輸粟北邊見繫死囚貸之令還鄉里備資輸粟北邊贖罪於是重囚得宥死者四百四十八人夏四月皇太子標卒帝御束角門召對羣臣慟哭曰太子不幸至此古云國有長君社稷之福朕意欲立燕王何如學士劉三吾進曰皇孫世嫡承統禮也即立燕王置泰晉二王於何地帝立孫之意遂決八月祔葬孝陵東諡懿文太子初師事宋濂通經史大義帝命裁決庶務寬仁平敏于刑獄多所減省天性友愛秦周諸王數有過輒調護之使歸國或告晉王有異謀帝大怒太子巡陜西還偕之至京為涕泣以請帝意解王亦更以恭慎聞質實劉三吾名如孫以字行茶陵人建昌衛指揮使伊嚕特穆爾叛命藍玉討誅之伊嚕特穆爾合德昌會川迷易柏興卭部諸畨攻建昌轉攻蘇州玉遣指揮瞿能討之至雙狼寨擒其將賊衆大潰伊嚕特穆爾遁能督兵追捕進至打沖河又敗之伊嚕特穆爾走柏興州玉遣百户毛海誘縳其父子送京師誅之盡降其衆會川土官知府王春作亂千户劉成戰死指揮僉事俞輔擊降之質實德昌元路明千户所在建昌衛南一百四十里今置巡檢𨽻西昌縣會川元路明改衛今為會理州屬寧逺府迷易明千户所屬建昌衛後屬會川衛在衛西北八十里今置巡檢𨽻會理州柏興元柏興府明初因之尋改為州後改鹽井衛今鹽源縣屬寧逺府卭部後周置郡南詔為卭部州元州𨽻建昌路明改越嶲衛今越嶲廳屬寧逺府蘇州本漢蘇示縣地元置蘇州明改衛今為冕寧縣屬寧逺府雙狼寨一作雙浪寨在西昌縣水寨關西北打沖河在寧逺府西源出吐蕃蠻名黑惠江又名納夷江下流至會理州合金沙江瞿能合肥人今伊嚕特穆爾舊作月魯帖木兒改六月西平侯沐英卒英沉毅寡言笑好賢禮士撫卒伍有恩未嘗妄殺在滇百務具舉簡守令課農桑墾屯田百餘萬畝滇池溢浚而廣之通鹽井之利以來商旅疏節濶目民以便安帝嘗曰使我髙枕無南顧憂者英之功也及是卒年四十八逺夷皆為流涕追封黔寧王諡昭靖秋七月髙麗李成桂逐其君瑶而自立成桂在國威權日盛瑶雖為所立慮禍必將及已與近臣圖之事泄成桂遂逐瑶而自立瑶出居原州王氏自五代後唐時得國傳四百數十年至是絶成桂尋以國人表請命帝以髙麗僻在海隅非中國所治詔聽之既又請更國號帝命仍古號曰朝鮮質實原州𨽻江原道在朝鮮國城東面改詹事院為府先是東宫官多以大臣兼領十五年更定左右春坊官各置庶子諭德中允贊善司直郎又各設大學士尋定司經局官設先馬校書正字二十二年以官聨無統始置詹事院至是改院為府設詹事及少詹事等官質實詹事一員正三品少詹事二員正四品左右春坊大學士庶子俱正五品諭德洗馬從五品中允正六品贊善從六品校書正九品二十九年增設清紀郎司諫通事舍人竄岢嵐州學正吳從權山隂縣教諭張恆于逺方從權恆給由至京帝召問氏間疾苦從權恆皆言職在課士民事無所知帝曰宋胡瑗教授蘇湖設經義治事二齋兵農水利無不兼之當時得人稱盛爾二人既不通世務罔識民情則平口所教何事生徒中縱有人材亦為爾輩所壞矣命竄之逺方且榜示天下學校以為鑒戒質實山隂縣金置明屬應州今屬大同府給由明史職官志凡內外官給由吏部考功司掌之三年初考六年再考並引請九年通考奏請綜其稱職平常不稱職而陟黜之八月給公侯歲祿初帝賜勳臣公侯丞相以下莊田多者百頃乂賜諸武臣公田以其租入充祿勳臣莊佃多倚威干集帝每召諸臣戒諭之至是給歲祿歸賜田于官九月立孫允炆為皇太孫允炆太子第二子也既立為太孫帝命裁決庶務寬厚如太子緣其意而有加焉中外頌德帝嘗大怒有所誅譴退朝太孫進曰如得其情哀矜勿喜是或一道也帝意解邏者獲盜七太孫目之言于帝曰六人者盜其一非是訊之果然帝問何以知之對曰周禮聽獄色聽為先此人眸子瞭然顧視端詳必非盜也帝喜曰治獄貴通經信然詔求精曉厯數之士其數往知來試無不驗者爵封侯山東國子生周敬心上言臣聞國祚修短在德厚簿不在厯數陛下但當修德皇祚自傳萬世何必問諸小技之人又言陛下連年北征臣民皆以為欲得傳國寶臣聞傳國寶出自楚平王秦始皇名之曰璽石敬瑭亂潞王携以自焚則秦璽固已燬矣敬瑭更以玉製昔王入遼遼亡遺於桑乾河元世祖時扎拉爾者漁而得之今元人所挾石氏璽耳易曰聖人之大寶曰位何以守位曰仁是仁乃人君之寶玉璽非寶也昔者三代聖王不知有璽天下治安享國長久秦始制璽不旋踵而亡陛下奈何匆大璽而求小璽耶又言方今户口雖多而勞民者衆倉廩雖實而民窮者多教化傳而民不悅法度嚴而民不從昔汲黯言於漢武帝曰陛下內多欲而外施仁義奈何欲效唐虞之治乎今國則願冨兵則願強土地刖願廣人民則願衆于是多取軍卒廣積稅糧征伐不休營造無極如之何其可治也又言洪武十二年欽録天下官吏十三年連坐胡黨十九年逮官吏積年為民害者二十三年大戮京民妄立罪名不分臧否豈無善良偶入詿誤之中者昔漢時誤殺一孝婦東海枯旱三年方今四海水旱未臻大稔未必不由殺戮無辜感傷和氣之所致也疏入報聞質實札拉爾元穆呼里氏也穆呼里曽孫碩迪已死而貧其妻出玉璽一鬻之或以告御史中丞崔或或召祕書監丞楊桓辨其文曰受命于天既夀永昌傳國璽也獻之故太子妃鴻吉哩氏時世祖方晏駕妃手以授于成宗桑乾河源出山西馬邑縣北山下東流經山陰縣應州大同府陽髙縣天鎮縣界又東經直𨽻西寧縣南蔚州北又東經宣化縣南界又東經保安州南與洋河會又東南入宛平縣界為永定河即古濕河也札拉爾舊作札剌爾碩迪舊作碩德鴻吉里舊作𢎞吉烈今並改發明天難諶命靡常豈術數之學所能窺測哉眭孟京房於漢何補唐太宗得祕讖書言唐中弱有女武代王遂以武衛將軍李君茨小字五娘疑而殺之不知才人武氏早已入宫故李淳風以為多殺無辜不能違也明祖過舉聞敬心謙言可以悟矣以方孝孺為漢中教授孝孺少好學恆以明王道致太平為己任十五年以吳沈薦召見帝喜其舉止端整謂太子曰此莊士當老其才禮遣還至是又以薦召至帝曰今非用方孝孺時除漢中教授蜀王椿聞其賢聘為世子師名其讀書之廬曰正學質實方孝孺字希直一字希古寧海人克勤之子冬十二月徴安陸知州余彥誠下吏尋釋之彥誠以徴稅愆期逮州民楊么等伏闕乞留帝賜晏遣還么等亦賜宴時帝操重典繩羣下守令坐小過輒逮繫其部民走闕下乞留旋遣還且加賞賚有因以超擢者質實余彥誠德興人癸酉二十六年春二月涼國公藍玉以罪誅玉有勇略敷總大軍多立功帝遇之厚寖驕蹇自恣多蓄莊奴假子乘勢漁獵嘗占東昌民田御史按問玉捶逐御史北征還夜叩喜峯關閟吏不即納玉縱兵燬關入帝聞之不樂又有言其私元主妃者鐫其過于券玉猶不悛及西征歸以玉兼太子太傅而馮勝傳友德俱兼太子太師玉攘袂大言曰我固不當為太師耶比奏事多不聽益怏怏語所親曰上疑我矣至是錦衣衛指揮蔣瓛告玉謀反廷鞫之獄詞云玉與鶴慶侯張翼普定侯陳桓景川侯曹震舳艫侯朱夀東莞伯何榮及吏部尚書詹徽户部侍郎傳友文等謀為變將伺帝出籍田舉事獄具族誅之列侯以下坐黨夷滅者萬五千人於是元功宿將相繼盡矣初玉常遇春妻弟懿文太子元妃常氏遇春女也玉征納充楚還言於太子曰臣觀燕王在國隂有不臣心又聞望氣者言燕有天子氣殿下冝審之燕王聞而銜之及太子卒燕王來朝帝問曰民問近謂朕若何對曰諸公侯縱恣無度不誅將有尾大不掉憂帝由此愈疑忌功臣王歸不數月而玉禍作質實張翼臨淮人陳桓濠人何滎真之子詹徽資險刻李善長死有力焉從懿文太子録囚太子多所舍徽必入之以語上上怒太子坐病悸曰死我者詹徽及從太孫録玉玉不服徽叱曰速吐實毋徒株連人玉大呼徽即臣黨捽徽下斷手足戮之見臣林記發明燕王請誅功臣以逞私志適當帝猜忌之時故其言易入藍玉之罪雖由自取而蔓延之誅未免太甚其後燕師起而元功宿將盡矣李九江輩何能為役哉三月命晉王棡燕王棣節制山西北平軍事詔二王軍中事大者方以聞宋國公馬勝潁國公傳友德並受節制夏四月詔有司振飢毋俟報諭户部曰戚荒民飢必候奏請道途往返逺者動經數月民之飢死者多矣凡遇歲飢慰以奏旱詔羣臣言事理獄囚帝以雨澤愆期命禮部令天下郡縣以雨澤之數聞秋七月甲辰朔日有食之九月以鄭齊為左庶子王勤為右庶子初東宫官屬缺命廷臣舉孝義篤行之士工部尚書嚴震直以浦江鄭氏對帝曰朕素知鄭更聞其里王氏力行鄭氏家法可用以勵天下乃徴兩家子弟年三十以上者詣闕令自推舉鄭氏舉濟王氏舉勤遂並拜官質實浦江唐析義烏蘭溪冨陽三縣地置浦陽縣吳越改浦江明屬金華府今因之鄭濟濓之弟王澄浦江人慕義門鄭氏風將終集子孫誨之曰汝曹能合食同居如鄭氏吾月瞑矣子孫拜受教澄之子子覺子麟子偉承父志子覺生應為鄭濟所舉授參議子偉生勤義門王氏之名遂埒鄭氏嚴震直字子敏烏程人冬十二月户部奏是歲天下户口之數户一千六百五萬二千八百六十口六千五十四萬五千八百十二甲戌二十七年春正月發天下預備倉穀貸貧民先是命户部遣耆民於各郡縣糴榖置倉儲之民間委冨民守視以備荒歉議省以粟藏久致腐冝貸於民而收其新者於是遣使給貸之三月命工部藏兵甲帝以四方底定命工部收兵甲裹而藏之示勿復用秋八月遣使修天下水利帝諭工部湖堰坡塘可蓄泄以備旱潦者皆因地勢修治之乃分遣國子生遍詣天下督修水利凡開塘堰四萬九百八十七處九月命禮部定旌表例日照縣民江伯兒母病割脅肉以療不愈禱岱嶽祠誓殺子祀神已而母病愈竟殺其三嵗子山東守臣以聞帝怒曰父子天性小民無知滅倫害理亟冝治罪遂逮伯兒杖之百遣戍海南因下禮官定旌表孝行例尚書任亨泰議曰卧氷割股事非恆經割股不已至于割肝割肝不已至于殺子違道傷生莫此為甚墮宗絶祀不孝之大冝嚴行戒諭倘愚民遇父母有疾醫治弗愈無所控訴不得已而割股卧氷亦聽其所為不在旌表之例詔曰可質實日照縣金置明屬青州府今屬沂州府任亨泰襄陽人修寰宇通衢書成帝命儒臣以天下道里之數編類為書其方隅之目有八東距遼東都司東北至三萬衛西極四川松潘衛西南距雲南金齒南踰廣東崖州東南至福建漳州府北暨太平大寧衛西北至陜西甘肅縱一萬九百里橫一萬一千七百五十里四裔之驛不與焉冬十一月賜潁國公傅友德死友德身冒百死自偏禆至大將每戰必先士卒以故所至立功二十五年友德請懷逺田千畝帝不悅曰祿賜不薄矣復侵民利何居爾不聞公儀休事乎及是竟賜死久德與藍玉先後同統兵有功王誅友德內懼定逺侯王弼謂曰上春秋髙旦夕且盡我輩奈何帝聞之未幾弼亦賜死質實懷逺宋置軍元改縣明縣屬鳯陽府今因之乙亥二十八年春正月西平侯沐春討越州蠻平之越州蠻阿資恃險屢叛春與都督何福率師營越州城北伏精兵道左以羸卒諉賊賊悉衆出伏起大敗之阿資亡山谷中春詗知所在樹壘斷其糧道已出不意搗其巢遂禽阿資斬之得具黨越州平二月賜宋國公馮勝死勝自金山歸不復將大兵二十五年命與傅友德練軍山西帝春秋髙多猜忌勝功最多數以細故失帝意藍玉誅之月與友德自山西召還勝嘗築稻場瘞甔其下以碌碡碾之取其鞺鞳聲走馬其旁以為樂有樊父者勝兄國用妻家也有所干索於勝勝不豫樊父遂告勝家居不法場下悉瘞兵器帝召勝賜之酒是夕暴卒諸子皆不得嗣質實甔小罌也秋八月命都督楊文等討龍州奉議諸蠻龍州土司也洪武初其酋趙帖堅歸附詔以為知州許世襲二十一年帖堅死無子從子宗夀當嗣會常茂以罪戍州帖堅妻黃以愛女豫茂為小妻擅州事茂病死黃與宗夀相告訐帝以逺人釋不問宗夀卒得嗣已而或搆蜚語言茂匿龍州實不死宗夀知狀帝怒命宗夀捕茂并諭都督府檄宗夀詣闕宗夀懼遷延不敢出廣西守臣奏宗夀抗命且言奉議諸蠻皆梗化乃以文為征南將軍指揮使韓觀都督僉事宋晟為副發江西湖廣諸衛兵討之復命致仕尚書唐鐸往諭宗夀文等師未至鐸還奏茂實死宗夀亦伏罪請朝乃罷征龍州令文等移師討奉議諸蠻平之質實奉議州宋置明改衛今仍為州屬廣西鎮安府韓觀字彥賔虹縣人宋晟字景陽定逺人唐鐸鳯陽人信國公湯和卒和前有酒過守常州時請事不得醉出怨言曰吾鎮此城如據屋脊坐左顧則左右顧則右帝聞而銜之鐫其過於鐵劵晚年益為恭慎入聞國諭一語不敢外泄當時公侯諸宿將先後麗法稀得免者和獨享夀考以功名終卒年七十追封東甌王諡襄武九月免山東秋糧以供給遼東山西北平軍需詔蠲其租又免應天等五府秋糧頒皇明祖訓初帝命儒臣編祖訓録其目十有三曰針戒持守嚴祭祀謹出入慎國政禮儀法律內令內官職制兵衛營繕供用六年書成帝自為之序命大書揭於右順門內西南鄉下諦覽損益至是更定名曰皇明祖訓頒示內外諸司諭曰後世有敢言更制者以姦臣論毋赦丙子二十九年春二月命燕王棣帥師巡邊寧王權言近者騎兵巡塞見有脫輻遺於道上恐有邊警帝乃命燕王棣選精騎巡大寧全寧沿河南北蹤迹所在掩擊之三月敗元兵於察察爾山又追敗之於烏梁海圖城而還棣至察察爾山遇元兵大敗之禽其將布琳特穆爾等數十人追至烏梁海圖城遇哈拉固乂戰敗之遂旋師質實察察爾山方輿紀要云在大寧衛北作察察爾山舊作徹徹兒山布琳特穆爾舊李林帖木兒圖城舊作禿城哈拉固舊作哈剌兀今並改定孔子廟從祀帝以行人司副楊砥言去楊雄進董仲舒質實楊砥字大用澤州人秋八月免應天五府田租詔免應天太平寧國廣德鎮冮五府租以酬民勞殺監察御史王朴朴性鯾直數與帝辨是非帝怒命戮之及市召還諭曰汝其改乎對曰陛下不以臣為不肖擢官御史奈何摧辱至此使臣無罪安得戮之有罪又安用生之臣今日願速死耳帝大怒趣命行刑過史館大呼曰學士劉三吾志之某年月日皇帝殺無罪御史朴也竟戮死質實王朴同州人本名權帝為改焉九月大賚致仕武臣凡二千五百人悉召入朝大賚之各晉秩一級丁丑三十年春二月白虹亘天貫日三月熒惑入太微八十日刑部請加反逆法不許刑部署尚書夏恕都察院署左僉都御史司中等奏請加反逆法以漢法反者夷三族宜改大明律依漢法不分異姓同居三族皆坐帝曰古者父子兄弟罪不相及漢用秦法故謀反逆者皆夷三族其法太重明刑定律務在公平加之於人雖死不怨傳之後世必不能有所變更恕等固請帝不允但令如律質實夏恕洛陽人夏五月壬子朔日有食之命楚王楨湘王柏帥師討古州叛蠻先是古州蠻林寬作亂攻陷龍里守將千户吳得鎮撫井孚殺賊數十人戰死事聞詔贈得指揮僉事孚正千户以湖廣都指揮使齊讓為平羌將軍討之既而寬犯新化攻平茶千户紀逹突陳手殺數人流矢中臂拔之復戰賊大驚曰是平茶紀蒙耶蠻呼官為蒙乃遁帝命楚王楨帥師湘王柏副之由黔陽辰溪進勦二王不臨軍而請餉三十萬帝屢詰責之以讓逗遛不進命都督楊文充總兵官往代文未至讓俘寬以獻帝卒誅讓命文討寬餘黨悉平之時貴州水西土酋居宗必登等亦叛帝命顧成會何福等討之成擊斬數千人以計禽其黨卜刺贊射殺阿火者居宗必登覆絶逺遁水西平質實龍里元寨明置蠻夷長官司今司屬貴州黎平府新化明初置長官司永樂中設府宣德中府廢仍為長官司今司屬黎平府平黎明守禦所今廢故城在黎平府東黔陽宋縣明屬沅州今屬沅州府辰溪隋縣明屬辰州府今因之吳得全椒人並孚盱眙人六月䇿試禮部下第舉人初制禮闈取士不分南北是春考官學士劉三吾紀善白信蹈榜發宋琮等五十二人皆南士廷試棹陳䢿第一諸生上言考官南人私其鄉帝怒命侍讀張信等覆閲下第卷得六十一人以進不稱旨或又言三吾信陷囑信等故以陋卷呈帝益怒自閲卷取任伯安等六十一人皆北士廷試擢武城人韓克忠第一信蹈及信等論死三吾以老戍邊時謂之南比榜又曰春夏榜云質實武城本漢縣隋改清河縣别置武城於古夏城宋大觀中河決移今治西至清河縣六十里明屬髙唐州今屬東昌府宋琮泰和人善易學授檢討語人曰翰苑有厄吾其竄乎既而考官禍作琮亦遣戍復起刑部檢校鄉人楊士竒輩貴顯琮無所攀援宣德中猶以檢討掌助教事卒官陳䢿閩縣人張信定海人任伯安題名録作伏伯安歸德人秋八月河決開封城三面受水詔改作倉庫於滎陽髙阜以備不虞冬蔡河徙陳州先是河決由開封北東行至是下流淤又決而之南質實蔡河一曰沙河在開封城東南自汴河分流至鹿邑縣合潁水其在陳州東曰百尺溝是年大河南決擁蔡水入陳州而蔡河之流漸絶沔縣吏髙福興作亂命征西將軍耿炳文討誅之先是正月福興及縣民田九成僧李普治謀為亂教諭王朴知之言於漢中衛衛發兵捕普治獲之次陽平關之土門賊大集逆戰官軍敗賊遂入略陽殺知縣吕昌焚徽州殺學正顔敘彬陜蜀畨民皆響應炳文時練兵陕西帝命移兵討之㶧文駐文縣遣將分道追勦至是福興就禽並獲其黨悉誅之宥脅從者為軍凡四千餘人質實陽平闔在寧羌州東北九十里九月平緬蠻刀斡孟遂其宣慰使思倫發詔沐春討之平緬俗不好佛會有僧自雲南至思倫發尊信之又有金齒戍卒逃入其境思倫發喜其技能俾繫金帶與僧俱位部長上部長刀幹孟怒遂叛攻騰衝思倫發走雲南沐春送至京師帝憫之命春與何福等討幹孟遣思倫發還諭春先以兵送之金齒檄幹孟來迎不應明年遣何福等將兵五千踰髙良公山直搗南甸大破之斬其酋刀名孟回軍擊景罕寨賊憑髙堅守官兵糧且盡福告急春帥五百騎救之乘夜渡潞江破之乘勝擊破崆洞寨幹孟乞降帝不許質實騰衝唐白蠻所居號騰衝府元改騰越府明洪武末改騰衝守禦千户所嘉靖二年改騰越州屬永昌府今因之髙良公山亦曰髙黎共山一名崑崙岡在騰越州東北一百二十里蒙氏僣封西嶽南甸元路明改府又改州正統時為宣撫司今屬永昌府景罕寨在永昌府潞江安撫司西南路江在潞江安撫司東北五十里亦曰怒江以波濤洶湧故名源出吐蕃南流又東經永昌府界下流至緬甸入南海蒙氏僣封四瀆之一崆洞寨方輿紀要云在潞江安撫司境戊寅三十一年春二月倭冦山東浙江倭冦山東寧海州百户何福戰死殺鎮撫盧智寧海衛指揮陶鐸擊敗之浙江都指揮言倭賊二千餘入冦海澳寨楚門千户王斌鎮撫袁潤等皆戰死詔發兵出海追捕質實寧海州金天會中劉豫置寧海軍大定中升州明屬登州府今因之寧海衛在州西海嶴鎮在寧海縣南一百里舊作鐵場於此楚門台州府太平縣西南有靈山與玉環山相接其峽如門名楚門港海舶由此出入楚門千户所明置在太平縣西南六十里何福與前軍都督同姓名夏五月帝不豫臨朝決事如平時命都督楊文從燕王棣武定侯郭英從遼王植備邊開平俱聽燕王節制敕楊文總北平都司行都司并燕谷寧三府護衛隨燕王郭英總遼東都司并遼府護衛隨遼王駐開平防邊俱聽燕王節制發明考明太祖實録是年四月乙酉敕燕王防秋五月甲寅帝不豫戊午敕楊文郭英乙亥再敕燕王節制諸軍又云遣中使持符召燕王還京至淮安用事者矯詔却還成祖實録云太祖不豫遣中官召上已至淮安太孫與齊泰等謀詐令人齎敕符令上歸國云云所謂敕符即此敕也按太祖實録重修於永樂中凡所云帝欲立燕王者已不可盡信而成祖實録則於建水之間更多誣辭不足為信史也洪武二十八年秦王樉卒是年三月晉王棡卒燕雖勢居寵逼然節制之命豈足以為易儲之據哉閏五月帝崩乙酉帝崩於西宫年七十有一遺詔皇太孫允炆仁明孝友天下歸心冝登大位諸王臨國中毋至京師天下臣民臨三日皆釋服無妨嫁娶質實按明太祖實録閏五月丙子朔乙酉十日也太孫允炆即位以明年為建文元年詔行三年喪羣臣請以日易月帝曰朕非效古人亮隂不言也朝則麻冕裳退則齊衰杖經食則饘粥郊社宗廟如常禮遂命定儀以進葬孝陵辛卯葬孝陵距崩七日遵遺詔也諡曰開天行道肇祀立極大聖至神仁文義武俊德成功髙皇帝廟號太祖時諸王尚未聞喪遂投遺詔止毋會葬明史贊曰太祖以聰明神武之資抱濟世安民之志乘時應運豪傑景從戡亂摧強十五載而成帝業崛起布衣奄莫海宇西漢以後所木有也懲元政廢弛治尚嚴峻而能禮致者儒考禮定樂昭揭經義尊崇正學加恩勝國澄清吏治修人紀崇風教正後宫名義內冶肅清禁宦豎不得干政五府六部官職相維置衛屯田兵食俱足武定禍亂文致太平太祖實身兼之至於雅尚志節聽蔡子英北歸晚歲憂民益切嘗以一歲間攴河暨塘堰數萬以利農桑備旱潦用此子孫承業二百餘年士重名義閭閻充實至今苖裔蒙澤尚如東樓白馬世承先祀有以哉詔文臣五品以上及州縣正官各舉所知非其人者坐之六月省并州縣汰冗員質實建文初所汰冗員見於革除編年者有革都察院司獄四員革天下隂陽醫學革建昌府盱江遞運所南城縣藍田巡檢司又革鳯陽開封懷慶平陽等肝屬遞運所凡數十處省左右布政司一員革五軍都督府斷事官革夔州府大昌縣省衛輝府胙城縣訓導二員省永州府江華縣縣丞主薄各一員革各府照磨所檢校司獄省廣州府連山縣以其地入連州等甚詳憲章録載有革略陽縣革南丹衛附慶逺省興濟縣入青縣省翁源縣入英德省保昌縣省欣城縣入東蘭省沔縣入褒城省兩當縣入徽州省恭城縣户部侍郎卓敬請徙封燕王棣於南昌不聼敬密疏言燕王智慮絶人酷類先帝北平形勝地士馬精強金元所由興也冝徙封南昌萬一有變亦易控制奏入翌日帝召謂敬曰燕王朕骨月至親卿何得及此敬叩頭曰臣所言天下大計願陛下察之帝曰卿休矣事竟寖質實南昌唐南昌軍南唐升府明初曰洪都府尋復南昌府今因之召方孝孺為翰林院侍講帝在東宫時素聞孝孺賢及即位自漢中馳騾召至日侍左右備顧問帝好讀書有疑即使講解臨朝奏事臣僚面議可否或命孝孺就扆前批答之以齊泰為兵部尚書黃子澄為太常寺卿參預國事泰為兵部侍郎習邊事太祖嘗問邊將姓名泰厯數無遺又問諸圖籍出袖中手册以進簡要周密大竒之子澄先以修撰充東宫伴讀帝為太孫時嘗坐東角門謂曰諸王尊屬擁重兵多不法奈何對曰諸王護衛兵僅足自守倘有變臨以六師其誰能支漢七國非不強卒底滅亡順逆之禮異也至是遂命子澄兼翰林學士與秦同參國政時燕周齊湘代岷諸王相煽動流言聞於朝帝謂子澄曰先生憶昔東角門之言乎對曰不敢忘質實齊秦初名德賜名泰溧水人秋七月長星西隕有聲如雷詔行寬政赦有罪蠲逋稅周王橚有罪廢為庶人橚子有㷲告橚謀不軌辭連燕齊湘三王齊泰與黃子澄謀泰欲先圖燕子澄曰不然周齊湘岷諸王在先帝時多不法今告變者已在周矣莫若先取之周燕之母弟消周是剪燕手足也謀定入白帝遂命曹國公李景隆以備邊為名猝至開封圍王宫執之以歸帝欲釋之泰子澄不可未決出相語曰上婦人之仁耳事勢如此安可不斷明日復言之乃廢橚為庶人竄蒙化諸子皆别徙已復召還京錮之質實蒙化元置府尋升路降州明初因之屬大理府正統間升府今改雲南直𨽻廳李景隆文忠子小字九冮八月詔天下衛所軍單丁者放為民西平侯沐春卒于軍春在鎮七年大修屯政闢田三十餘萬畝鑿鐵池河灌冝良涸田數萬畝民復案者五千餘户至是卒年三十六無子弟晟嗣詔何福領其衆質實鐵池河一名大池江一名盤江在冝良縣東八十里源自曲靖府陸良州流入境至鐵池鋪入山峽數十里入澄江府界謂之鐵池河冝良縣元置明屬雲南府今因之冬十月熒惑守心詔求直言舉山林巖穴懷才抱德之士夀州學訓導劉亨言六卿秩卑於五府當並為一品國子祭酒師表天下士位不當在太僕下諸將子弟冝設武學教以事上使下之道帝嘉納之擢武進縣丞於是蘇州府知府姚善薦錢芹授户部司務又鄭恕樓璉鄭楷皆以薦擢用質實武進縣孫吳改丹徒曰武進明為常州府附郭縣今因之劉亨字嘉會廬陵人燕王立罷歸屢薦不出姚善字克一安陸人錢芹字繼忠吳縣人善迎芹上座質經義芹曰非今所急也授以一册皆守禦䇿鄭恕仙居人樓璉金華人成祖既殺方孝孺以草詔屬侍讀樓璉璉不敢辭歸語妻子曰我甘死恐纍汝輩耳其夕自經死或曰草詔乃栝蒼王景又曰無鍚王逹鄭楷浦江人前都督府斷事髙巍上書言時政巍在洪武時侍母蕭氏疾以孝行旌由太學生試前軍都督府左斷事尋謫戍貴州及帝即位赦還遼州知州王欽辟巍應詔時用事者方議削諸蕃巍獨上書請加恩略曰髙皇帝分封諸王比之古制既皆過當諸王又率多驕逸不法違犯朝制不削則紀綱不立削之則傷親親之恩賈誼曰欲天下治安莫如衆建諸侯而少其力今盍師其意勿行鼂錯削奪之謀而效主父偃推恩之䇿在北諸王子弟分封於南在南子弟分封於北如此則藩王之權不削而自削矣臣又願益隆親親之禮嵗時伏臘使人餽問賢者下詔褒賞之驕逸不法者初犯容之再犯赦之三犯不改則告太廟廢處之豈有不順服者哉帝頗嘉之不能用及燕兵起命從李景隆出師參贊軍務巍復上書請使燕令休兵歸籓代朝廷十萬師帝壯其言許之巍至燕自稱國朝處士上書燕王極陳禍福具言大喪未終毒興師旅其輿夷齊泰伯讓國求仁之義不大徑庭乎雖大王有肅清朝廷之心天下不無篡奪嫡統之議即幸而不敗謂大王何如人哉書屢上不報已而景隆兵敗遂自拔南歸質實斷事職官志洪武十七年五軍都統府各設左右斷事秩從五品尋升正丘品建文中革遼州隋置明直𨽻山西布政司今因之髙巍遼州人頒示御史尹昌隆諫疏於天下帝有疾晏朝昌隆疏諫略曰昔髙皇帝雞鳴而起昧爽而朝百官成懼不敢稍怠陛下嗣膺大業冝追繩祖武未明求衣日旰忘食今乃即於晏安日上數刻猶未臨朝恐自此上下懈弛曠職廢業非社稷福也左右請以疾諭之帝曰直諫難得何可沮也其以疏宣示天下使咸知朕過質實尹昌隆字彥謙泰和人發明有疾而晏朝御史諫而宣其疏可謂勉於勸言矣然明年昌隆即以抗疏謫福寧知縣則帝亦好名而非有改過遷善之實也厥後燕王入捕昌隆等為姦黨同驅就戮昌隆當陛大呼曰臣曾上章勸以位讓陛下奏牘尚在可覆按也將貸死改官昌隆以剛直自負卒被吕震之譛竟夷其族惜乎其死之不早耳十二月賜天下明年田租之半都督何福禽刀幹孟斬之沐英既卒賊復懷二福率兵討之禽斬刀幹孟思倫發始歸平緬以張昺為北平布政使謝貴張信為北平都指揮使自帝為太孫中外屬望獨燕王棣心不平常懷窺覬及即位削籓議起僧道衍勸棣為逆棣曰民心向彼奈何道衍曰臣知天道安問人心乃進相士袁珙及卜者金忠自是棣隂事一切與道衍謀棣居元故宫稱疾不出道衍練兵後苑穴地作重厔周繚厚垣密甃瓴甋瓦缶日夜鑄軍器畜鵝鴨亂其聲久之事益露上變者日甚帝問齊泰黃子澄子澄曰先發者制人請討之泰曰今方有邊報但當以防邊為名發軍戍開平護衛精鋭悉調出寨羽翼既除雖欲為變不能矣帝然之乃更置守臣以工部侍郎張昺為北平布改使謝貴張信為北平都指揮使並受密命伺察燕事尋命都督宋忠悉兵屯開平以燕護衛卒𨽻之又調北平二衛於彰德諸處質實張昺澤州人謝貴木詳所自洪武時官錦衣衛指揮僉事降河南衛指揮僉事張信臨淮人袁珙鄞縣人善相術棣召見諦視曰太平天子也年四十鬚過臍即登大寶矣已見藩邸諸校卒皆許以公侯將帥棣益自喜逆謀遂決金忠鄞縣人宋忠未詳何許人洪武時官錦衣衛指揮使御定資治通鑑綱目三編卷三
